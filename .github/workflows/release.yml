# =====================================================================
#  Build VibePlugin for macOS, Windows and Linux and publish the bundles to
#  the GitHub Release, so the downloads page (docs/releases.html) can pull
#  them live. Triggers on a version tag (v1.2.3) or manual dispatch.
#
#  NOTE: the macOS job mirrors the verified local build. The Windows and
#  Linux jobs are a best-effort starting point — wasmtime c-api layout and
#  linking differ per platform, so expect to tune paths on the first run.
# =====================================================================
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      os:
        description: "Which OS to build"
        type: choice
        options: [all, macos, linux, windows]
        default: all
      tag:
        description: "Release tag to attach artifacts to (optional; empty = artifacts only)"
        required: false

permissions:
  contents: write   # needed to create/update releases

env:
  WASMTIME_VERSION: "v27.0.0"   # pin the wasmtime c-api release used for builds

jobs:
  # Pick which OS rows to build. Tag pushes build all three; a manual dispatch can
  # target one OS, so you can iterate on e.g. Windows without rebuilding the rest.
  # (matrix.* isn't available in a job-level if:, so we filter the matrix here.)
  setup:
    name: select build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          all='[{"os":"macos","runner":"macos-14","wasmtime_asset":"aarch64-macos-c-api.tar.xz","wasmtime_lib":"lib/libwasmtime.a"},{"os":"linux","runner":"ubuntu-22.04","wasmtime_asset":"x86_64-linux-c-api.tar.xz","wasmtime_lib":"lib/libwasmtime.a"},{"os":"windows","runner":"windows-2022","wasmtime_asset":"x86_64-windows-c-api.zip","wasmtime_lib":"lib/wasmtime.dll.lib"}]'
          sel="${{ github.event_name == 'workflow_dispatch' && inputs.os || 'all' }}"
          if [ "$sel" = "all" ] || [ -z "$sel" ]; then
            inc="$all"
          else
            inc=$(printf '%s' "$all" | jq -c --arg os "$sel" '[.[]|select(.os==$os)]')
          fi
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Linux: JUCE networking needs libcurl; ALSA/GTK/webkit for the plugin + WebView.
      - name: Install Linux deps
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libasound2-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libfreetype6-dev \
            libfontconfig1-dev ninja-build

      # --- bundled AssemblyScript compiler (downloads a portable node + asc) ---
      - name: Build bundled compiler
        shell: bash
        working-directory: compiler
        run: ./build.sh

      # --- wasmtime c-api for this platform ---
      - name: Fetch wasmtime c-api
        shell: bash
        run: |
          set -e
          base="https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}"
          asset="wasmtime-${WASMTIME_VERSION}-${{ matrix.wasmtime_asset }}"
          mkdir -p "$RUNNER_TEMP/wasmtime"
          echo "downloading $asset"
          curl -fSL "$base/$asset" -o "$RUNNER_TEMP/$asset"
          case "$asset" in
            *.zip)    unzip -q "$RUNNER_TEMP/$asset" -d "$RUNNER_TEMP/wasmtime" ;;
            *.tar.xz) tar -xf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP/wasmtime" --strip-components=1 ;;
          esac
          # zip archives keep the top-level folder; normalise to $RUNNER_TEMP/wasmtime
          inner=$(find "$RUNNER_TEMP/wasmtime" -maxdepth 1 -type d -name 'wasmtime-*-c-api' | head -1)
          if [ -n "$inner" ]; then cp -R "$inner"/. "$RUNNER_TEMP/wasmtime"/; fi
          echo "WASMTIME_DIR=$RUNNER_TEMP/wasmtime" >> "$GITHUB_ENV"

      # --- WebView2 SDK (Windows): the plugin GUI is a WebView, and the modern
      #     WebView2 backend (resource providers) needs this NuGet package's
      #     headers + static loader lib. FindWebView2.cmake globs the parent dir
      #     for a *Microsoft.Web.WebView2* folder, so extract into one. ---
      - name: Fetch WebView2 SDK (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          set -e
          ver="1.0.1901.177"
          dest="$RUNNER_TEMP/nuget/Microsoft.Web.WebView2.$ver"
          mkdir -p "$dest"
          # Canonical direct download (lowercase id+version), no redirect dance.
          url="https://api.nuget.org/v3-flatcontainer/microsoft.web.webview2/$ver/microsoft.web.webview2.$ver.nupkg"
          curl -fSL --retry 3 "$url" -o "$RUNNER_TEMP/webview2.nupkg"
          ls -l "$RUNNER_TEMP/webview2.nupkg"
          unzip -q "$RUNNER_TEMP/webview2.nupkg" -d "$dest"
          test -f "$dest/build/native/include/WebView2.h" || { echo "WebView2.h missing"; exit 1; }
          echo "JUCE_WEBVIEW2_PACKAGE_LOCATION=$RUNNER_TEMP/nuget" >> "$GITHUB_ENV"

      # --- configure + build ---
      - name: Configure
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DWASMTIME_DIR="$WASMTIME_DIR" \
            -DWASMTIME_LIB="$WASMTIME_DIR/${{ matrix.wasmtime_lib }}" \
            ${JUCE_WEBVIEW2_PACKAGE_LOCATION:+-DJUCE_WEBVIEW2_PACKAGE_LOCATION="$JUCE_WEBVIEW2_PACKAGE_LOCATION"}

      # Linux serializes the build: JUCE generates the shared LinuxSubprocessHelper
      # binary-data for both plugin targets, and a parallel build races on its temp
      # file ("Error renaming BinaryData1.cpp"). -j is fine on macOS/Windows.
      - name: Build
        shell: bash
        run: |
          # Windows: JUCE's VST3 manifest helper LoadLibrary's the just-built plugin
          # to write moduleinfo.json, and the plugin links wasmtime.dll dynamically —
          # put the DLL on PATH so that load resolves (else "module could not be found").
          if [ "${{ matrix.os }}" = "windows" ]; then export PATH="$WASMTIME_DIR/lib:$PATH"; fi
          cmake --build build --config Release ${{ matrix.os == 'linux' && '-j 1' || '-j' }}

      # --- ad-hoc sign on macOS so Gatekeeper has something to verify ---
      # (Real Developer ID signing + notarization needs cert secrets — add later.)
      - name: Ad-hoc sign (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          for p in "VibePlugin FX" "VibePlugin Synth"; do
            b=$(find build -name "$p.vst3" -type d | head -1)
            [ -n "$b" ] && codesign --force --deep -s - "$b" || true
          done

      # --- package both .vst3 bundles into one zip per platform ---
      - name: Package
        shell: bash
        run: |
          set -e
          # Prefer the dispatch 'tag' input; on a tag push GITHUB_REF_NAME IS the tag.
          # (A plain dispatch with no input names artifacts after the branch — fine.)
          tag="${{ github.event.inputs.tag }}"
          [ -z "$tag" ] && tag="$GITHUB_REF_NAME"
          [ -z "$tag" ] && tag="dev"
          out="VibePlugin-${tag}-${{ matrix.os }}"
          mkdir -p "stage/$out"
          find build -name "*.vst3" -maxdepth 6 -type d -prune -exec cp -R {} "stage/$out/" \;
          cp README.md "stage/$out/" 2>/dev/null || true
          cd stage
          # Zip per-OS: macOS `ditto` is the native, bundle-safe archiver (the runner's
          # `zip -q` started erroring "option 'q' not negatable"); Windows runners ship
          # 7z, not zip; Linux uses Info-ZIP.
          case "${{ matrix.os }}" in
            macos)   ditto -c -k --keepParent "$out" "$out.zip" ;;
            windows) 7z a -tzip "$out.zip" "$out" >/dev/null ;;
            *)       zip -r "$out.zip" "$out" >/dev/null ;;
          esac
          echo "ASSET=stage/$out.zip" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibePlugin-${{ matrix.os }}
          path: ${{ env.ASSET }}

      # --- attach to the GitHub Release (tag pushes / dispatch with a tag) ---
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
