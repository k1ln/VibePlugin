  :root{--ac:#5ad0ff}

  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);

  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Cosmo Poly<\/title>\n<style>\n  :root {\n    --accent: #5ad0ff;\n    --accent2: #b08cff;\n    --bg0: #060912;\n    --bg1: #0c1230;\n    --bg2: #161a44;\n    --ink: #dfe9ff;\n    --ink-dim: #8a96c8;\n    --line: rgba(120,150,255,0.16);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background: var(--bg0);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .stage {\n    position: relative;\n    min-height: 100vh;\n    width: 100%;\n    overflow: hidden;\n    padding: clamp(14px, 2.6vw, 34px);\n    display: flex;\n    flex-direction: column;\n    gap: clamp(14px, 2vw, 26px);\n  }\n\n  /* ---- slow nebula / aurora behind everything ---- */\n  .nebula {\n    position: absolute;\n    inset: -20%;\n    z-index: 0;\n    background:\n      radial-gradient(40% 55% at 22% 28%, rgba(90,208,255,0.30), transparent 60%),\n      radial-gradient(45% 60% at 80% 30%, rgba(176,140,255,0.30), transparent 62%),\n      radial-gradient(60% 70% at 50% 95%, rgba(60,90,220,0.28), transparent 65%),\n      linear-gradient(160deg, var(--bg1), var(--bg0) 70%);\n    filter: saturate(1.15);\n    animation: drift 26s ease-in-out infinite alternate;\n  }\n  @keyframes drift {\n    0%   { transform: translate3d(-3%, -2%, 0) scale(1.05) rotate(0deg); }\n    50%  { transform: translate3d(2%, 2%, 0) scale(1.12) rotate(2deg); }\n    100% { transform: translate3d(3%, -1%, 0) scale(1.06) rotate(-2deg); }\n  }\n  .stars {\n    position: absolute;\n    inset: 0;\n    z-index: 0;\n    background-image:\n      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.7), transparent),\n      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.5), transparent),\n      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.6), transparent),\n      radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.45), transparent),\n      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.5), transparent),\n      radial-gradient(1px 1px at 12% 70%, rgba(255,255,255,0.4), transparent);\n    opacity: 0.5;\n    animation: twinkle 6s ease-in-out infinite alternate;\n  }\n  @keyframes twinkle { from { opacity: 0.25; } to { opacity: 0.6; } }\n\n  .stage > * { position: relative; z-index: 2; }\n\n  /* ---- header ---- */\n  header {\n    display: flex;\n    align-items: center;\n    gap: 18px;\n    flex-wrap: wrap;\n  }\n  .halo {\n    position: relative;\n    width: 62px;\n    height: 62px;\n    flex: none;\n  }\n  .halo svg { display: block; width: 100%; height: 100%; }\n  .halo .ring-spin { transform-origin: 50% 50%; animation: spin 9s linear infinite; }\n  .halo .ring-spin-2 { transform-origin: 50% 50%; animation: spin 14s linear infinite reverse; }\n  @keyframes spin { to { transform: rotate(360deg); } }\n  .halo .core { animation: pulse 3.4s ease-in-out infinite; transform-origin: 50% 50%; }\n  @keyframes pulse { 0%,100% { opacity: 0.7; r: 7; } 50% { opacity: 1; r: 9.5; } }\n\n  .titles h1 {\n    margin: 0;\n    font-size: clamp(22px, 3.4vw, 38px);\n    font-weight: 800;\n    letter-spacing: 0.14em;\n    background: linear-gradient(90deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    text-shadow: 0 0 30px rgba(90,208,255,0.25);\n  }\n  .titles .sub {\n    margin-top: 3px;\n    font-size: 11px;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n\n  /* ---- luminous ribbon strip ---- */\n  .ribbon {\n    height: 8px;\n    border-radius: 8px;\n    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);\n    background-size: 220% 100%;\n    box-shadow: 0 0 22px rgba(120,180,255,0.5);\n    animation: slide 7s linear infinite;\n  }\n  @keyframes slide { from { background-position: 0% 0; } to { background-position: 220% 0; } }\n\n  /* ---- control grid ---- */\n  .panel {\n    background: linear-gradient(180deg, rgba(22,26,68,0.62), rgba(8,12,30,0.62));\n    border: 1px solid var(--line);\n    border-radius: 18px;\n    padding: clamp(16px, 2.4vw, 28px);\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 18px 50px rgba(0,0,0,0.5);\n    backdrop-filter: blur(3px);\n  }\n\n  .knobs {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: clamp(12px, 2vw, 26px);\n  }\n  @media (max-width: 620px) { .knobs { grid-template-columns: repeat(2, 1fr); } }\n\n  .knob {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 8px;\n    user-select: none;\n  }\n  .knob .dial {\n    position: relative;\n    width: clamp(74px, 9vw, 104px);\n    height: clamp(74px, 9vw, 104px);\n    cursor: ns-resize;\n    touch-action: none;\n  }\n  .knob .dial svg { display: block; width: 100%; height: 100%; }\n  .knob .label {\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .knob .val {\n    font-size: 13px;\n    font-variant-numeric: tabular-nums;\n    color: var(--ink);\n    font-weight: 600;\n  }\n  .knob .dial:hover .arc { filter: drop-shadow(0 0 8px var(--accent)); }\n  .knob.active .arc { filter: drop-shadow(0 0 12px var(--accent)); }\n\n  /* ---- keyboard ---- */\n  .keys-wrap {\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n  }\n  .keys-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n  }\n  .keys-head .tag {\n    font-size: 10px;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .keyboard {\n    position: relative;\n    height: clamp(90px, 13vw, 128px);\n    display: flex;\n    border-radius: 12px;\n    overflow: hidden;\n    box-shadow: 0 12px
