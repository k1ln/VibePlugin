  <title>Ping Delay — test bench</title><style>
  :root{--ac:#5ad1ff}
  *{box-sizing:border-box}

    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}

  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;

    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Ping Delay</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  </div>

  document.getElementById('gui').srcdoc="<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>\n:root{--ac:#5ad1ff;--ac2:#8ae0ff;--bg0:#040810;--bg1:#0a1422}\n*{box-sizing:border-box}\nhtml,body{margin:0;height:100%}\nbody{font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;color:#dceaf6;\n  background:radial-gradient(120% 90% at 50% -10%,#0e1c30 0%,var(--bg1) 50%,var(--bg0) 100%);\n  display:flex;align-items:center;justify-content:center;padding:18px;overflow:hidden}\n.unit{position:relative;width:100%;max-width:560px;border-radius:20px;overflow:hidden;\n  background:linear-gradient(168deg,rgba(16,28,46,.96),rgba(5,10,18,.97));\n  border:1px solid rgba(120,200,255,.14);\n  box-shadow:0 36px 80px rgba(0,0,0,.66),inset 0 1px 0 rgba(140,220,255,.10),inset 0 0 60px rgba(8,20,40,.6)}\n.unit::after{content:\"\";position:absolute;inset:0;pointer-events:none;border-radius:20px;\n  background:linear-gradient(transparent 0,transparent 1px) 0 0/100% 3px,\n            repeating-linear-gradient(90deg,transparent 0 2px,rgba(90,209,255,.012) 2px 3px);\n  mix-blend-mode:screen;opacity:.5}\n/* header */\n.hd{position:relative;z-index:3;display:flex;align-items:center;gap:11px;padding:15px 20px 13px;\n  border-bottom:1px solid rgba(90,209,255,.12);\n  background:linear-gradient(180deg,rgba(90,209,255,.07),transparent)}\n.beacon{position:relative;width:11px;height:11px}\n.beacon i{position:absolute;inset:0;border-radius:50%;background:var(--ac);\n  box-shadow:0 0 12px var(--ac),0 0 3px #fff inset;animation:beat var(--beat,500ms) linear infinite}\n.beacon i::after{content:\"\";position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--ac);\n  animation:ring var(--beat,500ms) linear infinite;opacity:0}\n@keyframes beat{0%{transform:scale(.7);opacity:.5}30%{transform:scale(1);opacity:1}100%{transform:scale(.7);opacity:.5}}\n@keyframes ring{0%{transform:scale(.6);opacity:.8}100%{transform:scale(2.4);opacity:0}}\n.ttl{flex:1;min-width:0}\n.ttl h1{margin:0;font-size:16px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;\n  background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;background-clip:text;color:transparent}\n.ttl p{margin:2px 0 0;font-size:9.5px;letter-spacing:.34em;text-transform:uppercase;color:#5d7a94}\n.chip{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#7fb6d8;\n  border:1px solid rgba(90,209,255,.28);border-radius:999px;padding:4px 10px;white-space:nowrap}\n/* arena: the bounce field */\n.arena{position:relative;z-index:2;height:148px;margin:16px 18px 6px;border-radius:14px;\n  background:\n    radial-gradient(80% 130% at 50% 120%,rgba(90,209,255,.10),transparent 60%),\n    linear-gradient(180deg,#020912,#06121f);\n  border:1px solid rgba(90,209,255,.14);overflow:hidden;\n  box-shadow:inset 0 2px 18px rgba(0,0,0,.7),inset 0 0 0 1px rgba(0,0,0,.4)}\n/* L / R goal posts */\n.wall{position:absolute;top:0;bottom:0;width:34px;display:flex;align-items:center;justify-content:center;\n  font-size:11px;font-weight:800;letter-spacing:.1em;color:#3f5e78}\n.wall.l{left:0;border-right:1px solid rgba(90,209,255,.10);background:linear-gradient(90deg,rgba(90,209,255,.08),transparent)}\n.wall.r{right:0;border-left:1px solid rgba(90,209,255,.10);background:linear-gradient(270deg,rgba(90,209,255,.08),transparent)}\n.wall b{transition:color .12s,text-shadow .12s}\n.wall.hit b{color:var(--ac);text-shadow:0 0 14px var(--ac)}\n/* centre net + lane guides */\n.net{position:absolute;left:50%;top:8px;bottom:8px;width:1px;margin-left:-.5px;\n  background:repeating-linear-gradient(180deg,rgba(90,209,255,.30) 0 5px,transparent 5px 11px)}\n.lane{position:absolute;left:34px;right:34px;height:1px;background:rgba(90,209,255,.07)}\n/* travelling SVG path for taps/trail */\n.field{position:absolute;inset:0;width:100%;height:100%}\n.trail{fill:none;stroke:var(--ac);stroke-width:1.4;opacity:.28;\n  stroke-dasharray:3 6;animation:flow 1.4s linear infinite}\n@keyframes flow{to{stroke-dashoffset:-18}}\n/* the bouncing ball */\n.ball{position:absolute;top:50%;left:0;width:18px;height:18px;margin:-9px 0 0 -9px;border-radius:50%;\n  background:radial-gradient(circle at 36% 32%,#fff,var(--ac2) 38%,var(--ac) 70%,#1d6f95 100%);\n  box-shadow:0 0 18px var(--ac),0 0 40px rgba(90,209,255,.6);\n  animation:px var(--beat,500ms) cubic-bezier(.42,0,.58,1) infinite alternate,\n            py calc(var(--beat,500ms)/2) cubic-bezier(.33,0,.67,1) infinite alternate;\n  will-change:transform}\n@keyframes px{from{left:var(--lx,42px)}to{left:var(--rx,calc(100% - 42px))}}\n@keyframes py{from{transform:translateY(calc(-1*var(--arc,34px)))}to{transform:translateY(var(--arc,34px))}}\n/* echo ghosts trailing behind */\n.ghost{position:absolute;top:50%;left:0;width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%;\n  background:radial-gradient(circle,var(--ac),transparent 70%);pointer-events:none;\n  animation:px var(--beat,500ms) cubic-bezier(.42,0,.58,1) infinite alternate,\n            py calc(var(--beat,500ms)/2) cubic-bezier(.33,0,.67,1) infinite alternate;will-change:transform}\n.ghost.g1{opacity:.55;animation-delay:calc(-1*var(--beat,500ms)*.16),calc(-1*var(--beat,500ms)*.16)}\n.ghost.g2{opacity:.32;animation-delay:calc(-1*var(--beat,500ms)*.34),calc(-1*var(--beat,500ms)*.34)}\n.ghost.g3{opacity:.16;animation-delay:calc(-1*var(--beat,500ms)*.55),calc(-1*var(--beat,500ms)*.55)}\n/* tap pips along the bottom */\n.taps{position:absolute;left:40px;right:40px;bottom:9px;height:10px;display:flex;gap:5px;align-items:flex-end}\n.tap{flex:1;height:3px;border-radius:2px;background:rgba(90,209,255,.16);transition:.18s}\n.tap.on{height:9px;background:linear-gradient(var(--ac2),var(--ac));box-shadow:0 0 8px var(--ac)}\n/* readout overlay */\n.read{position:absolute;left:40px;bottom:24px;font-size:9px;letter-spacing:.22em;text-transform:uppercase;\n  color:#4f718c;pointer-events:none}\n/* ===== control deck — bespoke \"paddle rails\" (vertical bounce-faders) ===== */\n.deck{position:relative;z-index:2;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:14px 16px 8px}\n@media(max-width:520px){.deck{grid-template-columns:repeat(3,1fr)}}\n.rail{position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;\n  padding:10px 4px 11px;border-radius:14px;animation:rise .5s both;animation-delay:var(--d);\n  transition:background .18s,transform .18s}\n.rail:hover{background:rgba(90,209,255,.05);transform:translateY(-2px)}\n@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n/* the lane the paddle slides along */\n.slot{position:relative;width:34px;height:88px;cursor:ns-resize;touch-action:none;user-select:none;\n  border-radius:11px;\n  background:linear-gradient(180deg,#04101c,#020a13);\n  border:1px solid rgba(90,209,255,.14);\n  box-shadow:inset 0 2px 10px rgba(0,0,0,.7),inset 0 0 0 1px rgba(0,0,0,.4)}\n/* dashed centre net inside each lane — echoes the arena */\n.slot::before{content:\"\";position:absolute;left:50%;top:7px;bottom:7px;width:1px;margin-left:-.5px;\n  background:repeating-linear-gradient(180deg,rgba(90,209,255,.22) 0 4px,transparent 4px 9px)}\n/* the energy fill that rises with the value (the \"charge\" the ball gets) */\n.fill{position:absolute;left:3px;right:3px;bottom:3px;border-radius:9px;height:var(--h,30%);\n  background:linear-gradient(180deg,var(--ac2),var(--ac) 60%,rgba(90,209,255,.25));\n  box-shadow:0 0 14px rgba(90,209,255,.5),inset 0 1px 0 rgba(255,255,255,.25);\n  transition:height .12s cubic-bezier(.2,.8,.3,1)}\n/* the paddle puck that floats on top of the fill */\n.puck{position:absolute;left:-3px;right:-3px;height:11px;border-radius:7px;\n  bottom:calc(var(--h,30%) - 5px);\n  background:radial-gradient(120% 180% at 50% 0,#eafaff,var(--ac2) 45%,var(--ac) 100%);\n  box-shadow:0 0 12px var(--ac),0 2px 4px rgba(0,0,0,.6);\n  transition:bottom .12s cubic-bezier(.2,.8,.3,1)}\n/* a little pip that pings off the paddle when grabbed */\n.slot.act .puck{box-shadow:0 0 18px var(--ac),0 0 0 1px #eafaff,0 2px 4px rgba(0,0,0,.6)}\n.slot.act{border-color:rgba(90,209,255,.45)}\n.spark{position:absolute;left:50%;width:6px;height:6px;margin-left:-3px;border-radius:50%;\n  background:var(--ac2);box-shadow:0 0 10px var(--ac);opacity:0;pointer-events:none}\n.slot.act .spark{animation:spark .5s ease-out infinite}\n@keyframes spark{0%{opacity:.9;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-26px) scale(.3)}}\n.nm{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:#7f9ab4}\n.val{font-size:12px;font-weight:800;color:#eaf6ff;font-variant-numeric:tabular-nums;\n  text-shadow:0 0 10px rgba(90,209,255,.4)}\n.ft{position:relative;z-index:2;font-size:10px;line-height:1.5;color:#5d7a94;margin:2px 18px 14px;\n  border-top:1px solid rgba(90,209,255,.10);padding-top:9px}\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head><body>\n<div class=\"unit\">\n  <div class=\"hd\">\n    <span class=\"beacon\"><i><\/i><\/span>\n    <div class=\"ttl\"><h1>Ping&nbsp;Delay<\/h1><p>Stereo&nbsp;Bounce&nbsp;Engine<\/p><\/div>\n    <span class=\"chip\">6 · ping&#8596;pong<\/span>\n  <\/div>\n\n  <div class=\"arena\" id=\"arena\">\n    <div class=\"lane\" style=\"top:50%\"><\/div>\n    <div class=\"net\"><\/div>\n    <svg class=\"field\" viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\">\n      <path class=\"trail\" id=\"trail\" d=\"M8,50 Q50,12 92,50 Q50,88 8,50\"/>\n    <\/svg>\n    <div class=\"wall l\" id=\"wallL\"><b>L<\/b><\/div>\n    <div class=\"wall r\" id=\"wallR\"><b>R<\/b><\/div>\n    <div class=\"ghost g3\"><\/div><div class=\"ghost g2\"><\/div><div class=\"ghost g1\"><\/div>\n    <div class=\"ball\" id=\"ball\"><\/div>\n    <div class=\"taps\" id=\"taps\"><\/div>\n    <span class=\"read\" id=\"read\">— ms · ∞<\/span>\n  <\/div>\n\n  <div class=\"deck\" id=\"deck\"><\/div>\n  <div class=\"ft\" id=\"ft\"><\/div>\n<\/div>\n\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"Time\",index:0,min:0,max:1,def:0.33},\n    {name:\"Feedback\",index:1,min:0,max:1,def:0.45},\n    {name:\"Taps\",index:2,min:0,max:1,def:0.4},\n    {name:\"Tone\",index:3,min:0,max:1,def:0.55},\n    {name:\"Width\",index:4,min:0,max:1,def:0.8},\n    {name:\"Mix\",index:5,min:0,max:1,def:0.5}\n  ];\n  var STEP=0.001;\n  var vals={}; // index -> value\n  var deck=document.getElementById('deck');\n  var ft=document.getElementById('ft');\n  ft.textContent=\"A stereo ping-pong / multi-tap delay. The wet signal cross-feeds between left and right so every repeat bounces to the opposite side; extra taps thicken the pattern, Tone darkens repeats, Width spreads the bounce, and a saturated feedback path stays bounded near max.\";\n\n  function fmt(v){return (Math.round(v*100)/100).toFixed(2);}\n\n  function host(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n\n  /* each param is a bespoke vertical \"paddle rail\": grab the puck and slide;\n     the energy fill rises with the value and sparks ping off while dragging. */\n  function makeRail(p,di){\n    var rail=document.createElement('div');\n    rail.className='rail'; rail.style.setProperty('--d',(di*55)+'ms');\n    rail.innerHTML=\n      '<div class=\"slot\" tabindex=\"0\">'+\n        '<div class=\"fill\"><\/div><div class=\"puck\"><\/div><div class=\"spark\"><\/div>'+\n      '<\/div>'+\n      '<div class=\"nm\">'+p.name+'<\/div><div class=\"val\">0.00<\/div>';\n    deck.appendChild(rail);\n    var slot=rail.querySelector('.slot'),\n        fill=rail.querySelector('.fill'),\n        puck=rail.querySelector('.puck'),\n        spark=rail.querySelector('.spark'),\n        out=rail.querySelector('.val');\n\n    function paint(){\n      var n=(vals[p.index]-p.min)/(p.max-p.min||1);\n      var pct=(6+n*88); // keep puck inside the lane\n      fill.style.setProperty('--h',pct+'%');\n      slot.style.setProperty('--h',pct+'%');\n      out.textContent=fmt(vals[p.index]);\n      host(p.index,vals[p.index]);\n      onChange(p.index,n);\n    }\n    function setN(n){ n=n<0?0:n>1?1:n; var v=p.min+(p.max-p.min)*n;\n      v=Math.round(v/STEP)*STEP; vals[p.index]=v; paint(); }\n    function norm(){ return (vals[p.index]-p.min)/(p.max-p.min||1); }\n\n    // map a pointer Y inside the slot to a normalised value (bottom=0,top=1)\n    function yToN(clientY){ var r=slot.getBoundingClientRect();\n      return 1-(clientY-r.top)/(r.height||1); }\n\n    var drag=false;\n    slot.addEventListener('pointerdown',function(e){drag=true;\n      slot.classList.add('act');slot.setPointerCapture(e.pointerId);\n      setN(yToN(e.clientY));e.preventDefault();});\n    slot.addEventListener('pointermove',function(e){if(!drag)return;setN(yToN(e.clientY));});\n    slot.addEventListener('pointerup',function(){drag=false;slot.classList.remove('act');});\n    slot.addEventListener('pointercancel',function(){drag=false;slot.classList.remove('act');});\n    slot.addEventListener('dblclick',function(){vals[p.index]=p.def;paint();});\n    slot.addEventListener('wheel',function(e){e.preventDefault();setN(norm()+(e.deltaY<0?.025:-.025));},{passive:false});\n    slot.addEventListener('keydown',function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){setN(norm()+.02);e.preventDefault();}\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setN(norm()-.02);e.preventDefault();}});\n\n    vals[p.index]=p.def; paint();\n  }\n\n  /* ---- live bounce-field reactions ---- */\n  var ball=document.getElementById('ball'),\n      arena=document.getElementById('arena'),\n      wallL=document.getElementById('wallL'), wallR=document.getElementById('wallR'),\n      beacon=document.querySelector('.beacon'),\n      trail=document.getElementById('trail'),\n      read=document.getElementById('read'),\n      tapsBox=document.getElementById('taps');\n  var TAP_MAX=8, tapEls=[];\n  for(var t=0;t<TAP_MAX;t++){var el=document.createElement('span');el.className='tap';tapsBox.appendChild(el);tapEls.push(el);}\n\n  function onChange(i,n){\n    if(i===0){ // Time -> beat period (60..900ms), arc height shrinks as faster\n      var ms=60+(1-n)*840; // long time = slow bounce\n      var period=Math.max(140,ms*2);\n      document.documentElement.style.setProperty('--beat',period+'ms');\n      beacon.style.setProperty('--beat',period+'ms');\n      var arc=18+n*30;\n      ball.style.setProperty('--arc',arc+'px');\n      document.querySelectorAll('.ghost').forEach(function(g){g.style.setProperty('--arc',arc+'px');});\n      updateRead();\n    } else if(i===1){ // Feedback -> ghost count / persistence + walls glow + read\n      var ghosts=document.querySelectorAll('.ghost');\n      ghosts.forEach(function(g,k){g.style.display=(n>(k+1)/5)?'block':'none';});\n      arena.style.boxShadow='inset 0 2px 18px rgba(0,0,0,.7),inset 0 0 '+(20+n*60)+'px rgba(90,209,255,'+(n*.22)+')';\n      updateRead();\n    } else if(i===2){ // Taps -> number of lit pips\n      var cnt=Math.round(1+n*(TAP_MAX-1));\n      tapEls.forEach(function(e,k){e.classList.toggle('on',k<cnt);});\n    } else if(i===3){ // Tone -> trail opacity / blur of ball (darker = dimmer)\n      ball.style.filter='blur('+((1-n)*1.4)+'px)';\n      trail.style.opacity=(0.12+n*0.34).toFixed(2);\n      ball.style.opacity=(0.55+n*0.45).toFixed(2);\n    } else if(i===4){ // Width -> horizontal travel span (how far it pings)\n      var inset=42-n*22; // wider = closer to walls (bigger swing)\n      var lx=inset+'px', rx='calc(100% - '+inset+'px)';\n      ball.style.setProperty('--lx',lx); ball.style.setProperty('--rx',rx);\n      document.querySelectorAll('.ghost').forEach(function(g){g.style.setProperty('--lx',lx);g.style.setProperty('--rx',rx);});\n      // bend the trail arc with width\n      var q=8+n*8, e=92-n*8;\n      trail.setAttribute('d','M'+q+',50 Q50,'+(50-30-n*14)+' '+e+',50 Q50,'+(50+30+n*14)+' '+q+',50');\n    } else if(i===5){ // Mix -> overall ball brightness / size\n      ball.style.boxShadow='0 0 '+(8+n*22)+'px var(--ac),0 0 '+(20+n*40)+'px rgba(90,209,255,'+(0.2+n*0.5)+')';\n      ball.style.width=(14+n*8)+'px'; ball.style.height=(14+n*8)+'px';\n      ball.style.margin='-'+(7+n*4)+'px 0 0 -'+(7+n*4)+'px';\n    }\n  }\n  function updateRead(){\n    var tn=(vals[0]-0)/1, fbn=(vals[1]-0)/1;\n    var ms=Math.round(60+(1-tn)*840);\n    var rep = fbn>=0.98? '∞' : Math.max(1,Math.round(1/(1.02-fbn)));\n    read.textContent=ms+' ms · '+rep+' rpt';\n  }\n\n  /* sync ball flip to wall hits via animationiteration on the x animation */\n  function flashWall(side){\n    var w=side<0?wallL:wallR; w.classList.add('hit');\n    setTimeout(function(){w.classList.remove('hit');},120);\n  }\n  var lastDir=1;\n  ball.addEventListener('animationiteration',function(e){\n    if(e.animationName==='px'){ flashWall(lastDir); lastDir*=-1; }\n  });\n\n  function ready(){\n    PARAMS.forEach(makeRail);\n    updateRead();\n  }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body><\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,d.f,d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }

      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });

  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
