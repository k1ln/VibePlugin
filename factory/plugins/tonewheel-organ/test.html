<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tonewheel Organ — test bench</title><style>
  :root{--ac:#caa15a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Tonewheel Organ<\/title>\n<style>\n  :root {\n    --accent:   #caa15a;\n    --accent2:  #8a5a2a;\n    --wood-1:   #3a2415;\n    --wood-2:   #57361f;\n    --wood-3:   #79492a;\n    --panel:    #1c1611;\n    --chrome-1: #f4efe6;\n    --ink:      #f3e7d2;\n    --ink-dim:  #b69a72;\n    --felt:     #15100b;\n    font-size: 15px;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background: radial-gradient(140% 120% at 50% -10%, #2a1d12 0%, #150d07 60%, #0c0805 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    min-height: 100vh;\n  }\n\n  .shell {\n    max-width: 940px;\n    margin: 0 auto;\n    padding: 22px 18px 30px;\n  }\n\n  /* ---- console body : warm lacquered wood ---- */\n  .console {\n    position: relative;\n    border-radius: 18px;\n    padding: 20px 22px 24px;\n    background:\n      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.35)),\n      repeating-linear-gradient(92deg,\n        var(--wood-2) 0px, var(--wood-3) 6px, var(--wood-1) 11px, var(--wood-2) 17px),\n      linear-gradient(180deg, var(--wood-3), var(--wood-1));\n    box-shadow:\n      0 30px 60px -20px rgba(0,0,0,0.8),\n      inset 0 2px 0 rgba(255,236,200,0.18),\n      inset 0 -3px 14px rgba(0,0,0,0.6);\n    border: 1px solid #2c1c10;\n  }\n\n  /* ---- header ---- */\n  .header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n    margin-bottom: 18px;\n  }\n  .brand { display: flex; align-items: center; gap: 14px; }\n\n  .rotor {\n    width: 46px; height: 46px;\n    border-radius: 50%;\n    background:\n      radial-gradient(circle at 50% 50%, #2a2118 0 30%, #0c0905 31% 100%);\n    border: 2px solid var(--accent2);\n    box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 0 14px rgba(202,161,90,0.25);\n    position: relative;\n    overflow: hidden;\n    flex: 0 0 auto;\n  }\n  .rotor::before, .rotor::after {\n    content: \"\";\n    position: absolute;\n    inset: 5px;\n    border-radius: 50%;\n    background: conic-gradient(from 0deg,\n      var(--accent) 0deg, transparent 40deg, transparent 180deg,\n      var(--accent) 200deg, transparent 240deg, transparent 360deg);\n    opacity: 0.85;\n    animation: spin var(--rot-dur, 1.6s) linear infinite;\n  }\n  .rotor::after {\n    inset: 13px;\n    animation-direction: reverse;\n    animation-duration: calc(var(--rot-dur, 1.6s) * 1.4);\n    opacity: 0.55;\n  }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  .title h1 {\n    margin: 0;\n    font-size: 1.45rem;\n    letter-spacing: 0.04em;\n    font-weight: 700;\n    color: var(--ink);\n    text-shadow: 0 1px 0 rgba(0,0,0,0.5), 0 0 18px rgba(202,161,90,0.25);\n  }\n  .title .sub {\n    font-size: 0.62rem;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-top: 3px;\n  }\n\n  .badge {\n    font-size: 0.6rem;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    border: 1px solid rgba(202,161,90,0.4);\n    border-radius: 20px;\n    padding: 6px 12px;\n    background: rgba(0,0,0,0.25);\n  }\n\n  /* ---- main grid ---- */\n  .body {\n    display: grid;\n    grid-template-columns: minmax(0, 1.7fr) minmax(190px, 1fr);\n    gap: 18px;\n  }\n  @media (max-width: 720px) {\n    .body { grid-template-columns: 1fr; }\n  }\n\n  .bay {\n    background:\n      linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));\n    border-radius: 12px;\n    padding: 16px 16px 14px;\n    border: 1px solid rgba(0,0,0,0.6);\n    box-shadow: inset 0 2px 8px rgba(0,0,0,0.7), inset 0 -1px 0 rgba(255,255,255,0.05);\n  }\n  .bay-title {\n    font-size: 0.6rem;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin: 0 0 14px;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n  }\n  .bay-title::after {\n    content: \"\";\n    flex: 1;\n    height: 1px;\n    background: linear-gradient(90deg, rgba(202,161,90,0.5), transparent);\n  }\n\n  /* ---- DRAWBARS ---- */\n  .drawbars {\n    display: flex;\n    gap: 12px;\n    align-items: flex-end;\n    justify-content: space-between;\n  }\n  .bar {\n    flex: 1 1 0;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 7px;\n  }\n  .bar .rail {\n    position: relative;\n    width: 30px;\n    height: 178px;\n    border-radius: 8px;\n    background:\n      linear-gradient(90deg, rgba(0,0,0,0.6), rgba(255,255,255,0.04), rgba(0,0,0,0.6)),\n      var(--felt);\n    box-shadow: inset 0 0 6px rgba(0,0,0,0.85);\n    cursor: ns-resize;\n    touch-action: none;\n  }\n  /* the sliding drawbar knob — coloured caps like a real organ */\n  .bar .cap {\n    position: absolute;\n    left: 50%;\n    transform: translate(-50%, 0);\n    width: 38px;\n    height: 30px;\n    border-radius: 6px;\n    background:\n      linear-gradient(180deg, var(--cap-hi, #e9e2d4) 0%, var(--cap-lo, #9c9486) 55%, #4c463c 100%);\n    box-shadow:\n      0 4px 8px rgba(0,0,0,0.55),\n      inset 0 1px 0 rgba(255,255,255,0.7),\n      inset 0 -2px 3px rgba(0,0,0,0.4);\n    border: 1px solid rgba(0,0,0,0.5);\n    transition: box-shadow 0.12s ease;\n  }\n  .bar .cap::after {\n    content: \"\";\n    position: absolute;\n    left: 6px; right: 6px; top: 50%;\n    height: 3px;\n    transform: translateY(-50%);\n    border-radius: 2px;\n    background: rgba(0,0,0,0.35);\n    box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 -4px 0 rgba(0,0,0,0.2);\n  }\n  /* the metal shaft above the cap */\n  .bar .shaft {\n    position: absolute;\n    left: 50%;\n    transform: translateX(-50%);\n    width: 6px;\n    top: 0;\n    border-radius: 3px;\n    background: linear-gradient(90deg, #5a5448, #d8d0c0, #5a5448);\n    box-shadow: 0 1px 2px rgba(0,0,0,0.5);\n  }\n  .bar .rail.drag .cap, .bar .rail:hover .cap {\n    box-shadow:\n      0 5px 12px rgba(0,0,0,0.6),\n      0 0 14px var(--cap-glow, rgba(202,161,90,0.5)),\n      inset 0 1px 0 rgba(255,255,255,0.8);\n  }\n  .bar .foot {\n    font-size: 0.78rem;\n    font-weight: 700;\n    color: var(--ink);\n    letter-spacing: 0.02em;\n    text-align: center;\n    line-height: 1.05;\n  }\n  .bar .lbl {\n    font-size: 0.5rem;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    text-align: center;\n  }\n  .bar .val {\n    font-size: 0.6rem;\n    color: var(--accent);\n    font-variant-numeric: tabular-nums;\n  }\n\n  /* ---- right column controls ---- */\n  .ctl-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 16px 12px;\n    justify-items: center;\n  }\n  .knobwrap {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 6px;\n  }\n  .knob {\n    width: 70px; height: 70px;\n    cursor: ns-resize;\n    touch-action: none;\n    user-select: none;\n  }\n  .knob .face { transition: filter 0.12s ease; }\n  .knob:hover .face, .knob.drag .face { filter: drop-shadow(0 0 7px rgba(202,161,90,0.6)); }\n  .knob-name {\n    font-size: 0.55rem;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .knob-val {\n    font-size: 0.62rem;\n    color: var(--accent);\n    font-variant-numeric: tabular-nums;\n  }\n\n  /* ---- rocker switch (perc mode / vibrato look) ---- */\n  .rocker {\n    grid-column: span 2;\n    width: 100%;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 7px;\n  }\n  .rocker-name {\n    font-size: 0.55rem;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .switch {\n    position: relative;\n    width: 132px;\n    height: 34px;\n    border-radius: 8px;\n    background: linear-gradient(180deg, #14100b, #241a11);\n    box-shadow: inset 0 2px 6px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.06);\n    display: flex;\n    padding: 3px;\n    cursor: pointer;\n    border: 1px solid rgba(0,0,0,0.6);\n  }\n  .switch .opt {\n    flex: 1;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.6rem;\n    letter-spacing: 0.12em;\n    font-weight: 700;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    z-index: 2;\n    transition: color 0.18s ease;\n  }\n  .switch .opt.on { color: #1a120a; }\n  .switch .glide {\n    position: absolute;\n    top: 3px; bottom: 3px;\n    width: calc(50% - 3px);\n    border-radius: 6px;\n    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);\n    box-shadow: 0 2px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.5);\n    transition: left 0.2s cubic-bezier(0.4, 1.4, 0.5, 1);\n    left: 3px;\n  }\n  .switch.right .glide { left: 50%; }\n\n  /* ---- keyboard ---- */\n  .keyboard {\n    margin-top: 18px;\n    background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.7));\n    border-radius: 10px;\n    padding: 12px 12px 14px;\n    box-shadow: inset 0 2px 8px rgba(0,0,0,0.7);\n    border: 1px solid rgba(0,0,0,0.6);\n  }\n  .keys {\n    position: relative;\n    height: 120px;\n    display: flex;\n    user-select: none;\n    touch-action: none;\n  }\n  .wkey {\n    position: relative;\n    flex: 1;\n    margin: 0 1px;\n    border-radius: 0 0 5px 5px;\n    background: linear-gradient(180deg, #faf3e6 0%, #e6dcc8 88%, #cdbfa4 100%);\n    box-shadow: inset 0 -4px 6px rgba(0,0,0,0.12), 0 2px 3px rgba(0,0,0,0.4);\n    border: 1px solid #b6a888;\n    cursor: pointer;\n    transition: background 0.05s ease, transform 0.05s ease;\n  }\n  .wkey.down {\n    background: linear-gradient(180deg, var(--accent) 0%, #d9b878 90%);\n    transform: translateY(2px);\n    box-shadow: inset 0 -3px 8px rgba(0,0,0,0.25);\n  }\n  .bkey {\n    position: absolute;\n    top: 0;\n    width: 60%;\n    height: 62%;\n    transform: translateX(-50%);\n    border-radius: 0 0 4px 4px;\n    background: linear-gradient(180deg, #2a221a 0%, #0d0a07 100%);\n    box-shadow: 0 3px 5px rgba(0,0,0,0.6), inset 0 -3px 4px rgba(255,255,255,0.06);\n    z-index: 3;\n    cursor: pointer;\n  }\n  .bkey.down {\n    background: linear-gradient(180deg, var(--accent2) 0%, #1a120a 100%);\n    transform: translateX(-50%) translateY(1px);\n  }\n\n  .hint {\n    text-align: center;\n    margin-top: 10px;\n    font-size: 0.55rem;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"shell\">\n    <div class=\"console\">\n\n      <div class=\"header\">\n        <div class=\"brand\">\n          <div class=\"rotor\" id=\"rotor\"><\/div>\n          <div class=\"title\">\n            <h1>TONEWHEEL ORGAN<\/h1>\n            <div class=\"sub\">Drawbar &middot; Percussion &middot; Rotary<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"badge\">Additive Console<\/div>\n      <\/div>\n\n      <div class=\"body\">\n        <div class=\"bay\">\n          <div class=\"bay-title\">Drawbars<\/div>\n          <div class=\"drawbars\" id=\"drawbars\"><\/div>\n        <\/div>\n\n        <div class=\"bay\">\n          <div class=\"bay-title\">Voicing<\/div>\n          <div class=\"ctl-grid\">\n            <div class=\"knobwrap\" id=\"knob-perc\"><\/div>\n            <div class=\"knobwrap\" id=\"knob-drive\"><\/div>\n            <div class=\"knobwrap\" id=\"knob-rotary\"><\/div>\n            <div class=\"knobwrap\" id=\"knob-spare\" style=\"visibility:hidden\"><\/div>\n            <div class=\"rocker\">\n              <div class=\"rocker-name\">Percussion Harmonic<\/di   function down(m,el){ ensure().then(function(){ if(ctx.state==='suspended')ctx.resume(); if(ex&&ex.noteOn) ex.noteOn(m,hz(m),0.9); }); if(el)el.classList.add('dn'); }
  function up(m,el){ if(ex&&ex.noteOff) ex.noteOff(m); if(el)el.classList.remove('dn'); }
  KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];
    el.addEventListener('pointerdown',function(e){e.preventDefault();down(k[1],el);});
    el.addEventListener('pointerup',function(){up(k[1],el);}); el.addEventListener('pointerleave',function(){up(k[1],el);});
    KB.appendChild(el); });
  var held={};
  window.addEventListener('keydown',function(e){ var m=KMAP[e.key]; if(m&&!held[m]){held[m]=1;down(m,null);} });
  window.addEventListener('keyup',function(e){ var m=KMAP[e.key]; if(m){held[m]=0;up(m,null);} });
  
  </script></body></html>
