<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
/* ============================================================
   SPRING VERB — a vintage spring-tank reverb.
   Surf-amp tweed cabinet with a real, animated coiled-spring tank.
   The springs wobble/boing in response to Decay, Tension, Drip.
   ============================================================ */
:root{
  --ac:#4dd2a6;        /* tank accent (oxidised brass-green) */
  --ac2:#7ee8c0;
  --tweed:#c9a96a;     /* warm tweed weave */
  --tweed-dk:#8a6f3e;
  --cab:#3a2c1c;       /* cabinet wood */
  --chrome:#cfd6dc;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font:13px ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  color:#f3ead7;
  display:flex;align-items:center;justify-content:center;
  padding:18px;
  background:
    radial-gradient(120% 90% at 50% -10%,#2b2114 0%,#140d06 60%,#0a0603 100%);
}

/* ---- the amp cabinet ---------------------------------------------- */
.amp{
  position:relative;
  width:100%;max-width:620px;
  border-radius:18px;
  padding:16px;
  background:
    linear-gradient(150deg,#4a3826,#2c2013 55%,#1d1409);
  border:1px solid rgba(0,0,0,.6);
  box-shadow:
    0 34px 70px rgba(0,0,0,.65),
    inset 0 2px 0 rgba(255,225,170,.10),
    inset 0 0 0 2px rgba(0,0,0,.35),
    inset 0 -18px 40px rgba(0,0,0,.45);
}
/* corner protectors */
.amp::before,.amp::after{
  content:"";position:absolute;width:30px;height:30px;border-radius:7px;
  background:
    radial-gradient(circle at 35% 30%,#e9eef2,#9aa3ab 45%,#4a5158 75%,#23282d);
  box-shadow:0 2px 4px rgba(0,0,0,.55),inset 0 1px 1px rgba(255,255,255,.5);
  z-index:5;
}
.amp::before{top:8px;left:8px}
.amp::after{top:8px;right:8px}

/* ---- header / faceplate ------------------------------------------- */
.face{
  position:relative;z-index:3;
  display:flex;align-items:center;gap:12px;
  padding:9px 16px 9px 46px;
  margin:2px 4px 14px;
  border-radius:11px;
  background:linear-gradient(180deg,#1a120a,#0d0904);
  border:1px solid rgba(255,210,150,.14);
  box-shadow:inset 0 1px 0 rgba(255,220,170,.12),inset 0 -8px 16px rgba(0,0,0,.5);
}
.pilot{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#fff3c0,#ff8a3c 40%,#b53a10 80%);
  box-shadow:0 0 14px #ff7a2c,0 0 3px #fff inset,0 0 30px rgba(255,120,40,.5);
  animation:glow 3.4s ease-in-out infinite;
}
@keyframes glow{0%,100%{filter:brightness(.85)}50%{filter:brightness(1.35)}}
.brand{flex:1;display:flex;flex-direction:column;line-height:1}
.brand b{
  font-size:20px;letter-spacing:.16em;font-weight:900;font-style:italic;
  background:linear-gradient(180deg,#ffe9b0,#caa05a 60%,#7a5a28);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 1px 0 rgba(0,0,0,.4);
}
.brand small{
  font-size:9px;letter-spacing:.42em;color:#9d7e4e;text-transform:uppercase;margin-top:4px;
}
.plate{
  font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:#0e0a05;
  background:linear-gradient(180deg,#d9b772,#a07e3e);
  border:1px solid #5e4622;border-radius:5px;padding:5px 9px;font-weight:800;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.5);
}

/* ---- the spring tank window --------------------------------------- */
.tank{
  position:relative;z-index:2;
  margin:0 4px 16px;
  height:176px;
  border-radius:12px;
  overflow:hidden;
  background:
    radial-gradient(140% 120% at 50% 0%,#10171a,#070b0d 70%);
  border:1px solid rgba(120,232,192,.16);
  box-shadow:
    inset 0 2px 18px rgba(0,0,0,.85),
    inset 0 0 0 1px rgba(0,0,0,.6),
    0 0 0 4px rgba(0,0,0,.4);
}
/* mesh grille over the tank */
.tank .mesh{
  position:absolute;inset:0;pointer-events:none;z-index:4;opacity:.5;
  background-image:
    repeating-linear-gradient(45deg,rgba(0,0,0,.35) 0 1px,transparent 1px 5px),
    repeating-linear-gradient(-45deg,rgba(0,0,0,.35) 0 1px,transparent 1px 5px);
  -webkit-mask:radial-gradient(120% 120% at 50% 50%,#000 60%,transparent 100%);
  mask:radial-gradient(120% 120% at 50% 50%,#000 60%,transparent 100%);
}
/* sweep of light passing the tank as it resonates */
.tank .sheen{
  position:absolute;top:-30%;left:-30%;width:60%;height:160%;z-index:3;
  pointer-events:none;
  background:linear-gradient(105deg,transparent,rgba(126,232,192,.10),transparent);
  filter:blur(6px);
  animation:sheen 7s linear infinite;
}
@keyframes sheen{0%{transform:translateX(-40%)}100%{transform:translateX(240%)}}
svg{position:absolute;inset:0;width:100%;height:100%;z-index:2;display:block}
.post{ /* the end posts the springs anchor to */
  position:absolute;top:0;bottom:0;width:14px;z-index:3;
  background:linear-gradient(90deg,#1a1f22,#39434a 50%,#11161a);
  box-shadow:inset 0 0 6px rgba(0,0,0,.8);
}
.post.l{left:0;border-right:1px solid rgba(126,232,192,.25)}
.post.r{right:0;border-left:1px solid rgba(126,232,192,.25)}
.boing{
  position:absolute;right:24px;bottom:8px;z-index:5;
  font-size:9px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--ac2);opacity:.7;pointer-events:none;
  text-shadow:0 0 8px rgba(126,232,192,.6);
}

/* ---- knob row ----------------------------------------------------- */
.row{
  position:relative;z-index:2;
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  margin:0 4px;
}
.ctl{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:12px 4px 12px;border-radius:12px;
  background:linear-gradient(180deg,rgba(255,225,170,.05),rgba(0,0,0,.18));
  border:1px solid rgba(255,210,150,.10);
  box-shadow:inset 0 1px 0 rgba(255,225,170,.10);
  animation:rise .55s both;
}
.ctl:nth-child(1){animation-delay:.05s}
.ctl:nth-child(2){animation-delay:.13s}
.ctl:nth-child(3){animation-delay:.21s}
.ctl:nth-child(4){animation-delay:.29s}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.94)}to{opacity:1;transform:none}}

/* chicken-head amp knob */
.knob{
  position:relative;width:78px;height:78px;cursor:ns-resize;
  user-select:none;touch-action:none;
}
.skirt{ /* numbered skirt + active arc */
  position:absolute;inset:-2px;border-radius:50%;
  background:
    conic-gradient(from 215deg,
      var(--ac) calc(var(--n,0)*290deg),
      rgba(255,220,170,.10) calc(var(--n,0)*290deg) 290deg,
      transparent 290deg);
  -webkit-mask:radial-gradient(circle,transparent 35px,#000 36px,#000 40px,transparent 41px);
  mask:radial-gradient(circle,transparent 35px,#000 36px,#000 40px,transparent 41px);
  filter:drop-shadow(0 0 calc(2px + var(--n,0)*8px) color-mix(in srgb,var(--ac) 70%,transparent));
  transition:--n .12s cubic-bezier(.2,.8,.25,1);
}
.ticks{
  position:absolute;inset:-2px;border-radius:50%;
  background:repeating-conic-gradient(from 215deg,
     rgba(255,225,180,.35) 0 1.4deg,transparent 1.4deg 29deg);
  -webkit-mask:radial-gradient(circle,transparent 41px,#000 42px,#000 45px,transparent 46px);
  mask:radial-gradient(circle,transparent 41px,#000 42px,#000 45px,transparent 46px);
}
.body{
  position:absolute;inset:12px;border-radius:50%;
  background:
    radial-gradient(circle at 42% 28%,#5a4226,#2a1d0e 70%,#160e05);
  box-shadow:
    inset 0 2px 6px rgba(255,225,170,.18),
    inset 0 -4px 10px rgba(0,0,0,.7),
    0 3px 6px rgba(0,0,0,.55);
}
/* the chicken-head pointer */
.beak{
  position:absolute;top:50%;left:50%;width:30px;height:9px;
  transform-origin:6px 50%;
  transform:translate(0,-50%) rotate(calc((var(--n,0) - .5) * 290deg));
  transition:transform .12s cubic-bezier(.2,.8,.25,1);
}
.beak::before{
  content:"";position:absolute;left:0;top:0;width:0;height:0;
  border-top:4.5px solid transparent;border-bottom:4.5px solid transparent;
  border-left:30px solid #1a1208;
}
.beak::after{ /* highlight ridge on the beak */
  content:"";position:absolute;left:2px;top:50%;transform:translateY(-50%);
  width:24px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,#caa05a,transparent);opacity:.8;
}
.cap{ /* center hub */
  position:absolute;top:50%;left:50%;width:13px;height:13px;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 40% 35%,#e8d29a,#6e5226 70%);
  box-shadow:0 0 4px rgba(0,0,0,.6),inset 0 1px 1px rgba(255,255,255,.6);
}
.bub{
  position:absolute;top:-12px;left:50%;
  transform:translate(-50%,5px) scale(.8);opacity:0;pointer-events:none;
  font-size:11px;font-weight:800;color:#0a0603;background:var(--ac);
  padding:2px 7px;border-radius:6px;font-variant-numeric:tabular-nums;
  box-shadow:0 4px 12px rgba(0,0,0,.5);transition:.15s;z-index:6;
}
.knob.act .bub,.ctl:hover .bub{opacity:1;transform:translate(-50%,0) scale(1)}

.lbl{
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
  color:#e7cf9a;font-weight:700;text-shadow:0 1px 0 rgba(0,0,0,.5);
}
.num{
  font-size:13px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;
  text-shadow:0 0 8px rgba(126,232,192,.4);
}
.ctl:nth-child(4) .num{color:var(--ac2)}
</style>
</head>
<body>
  <div class="amp">
    <div class="face">
      <span class="pilot"></span>
      <div class="brand"><b>SPRING&nbsp;VERB</b><small>Reverberation Tank · Mk II</small></div>
      <span class="plate">2-Spring · Drip</span>
    </div>

    <div class="tank">
      <span class="post l"></span>
      <span class="post r"></span>
      <span class="sheen"></span>
      <svg viewBox="0 0 600 176" preserveAspectRatio="none" id="svg">
        <defs>
          <linearGradient id="wire" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#eafff6"/>
            <stop offset=".5" stop-color="#4dd2a6"/>
            <stop offset="1" stop-color="#1c5a45"/>
          </linearGradient>
          <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
        </defs>
        <!-- two coiled springs, paths rebuilt every frame in JS -->
        <path id="sp0" fill="none" stroke="url(#wire)" stroke-width="2.4" stroke-linecap="round" filter="url(#soft)" opacity=".95"/>
        <path id="sp1" fill="none" stroke="url(#wire)" stroke-width="2.0" stroke-linecap="round" filter="url(#soft)" opacity=".8"/>
      </svg>
      <span class="mesh"></span>
      <span class="boing" id="boing">boing</span>
    </div>

    <div class="row" id="row"></div>
  </div>

<!-- Single source of truth: mirrors spec.json "params" verbatim so the GUI
     can never silently drift from the DSP. Edit spec.json + repack and this
     block is the only place the names/defaults live in the GUI. -->
<script type="application/json" id="spec-params">
[
  { "name": "Decay",   "index": 0, "min": 0, "max": 1, "default": 0.55 },
  { "name": "Tension", "index": 1, "min": 0, "max": 1, "default": 0.5  },
  { "name": "Drip",    "index": 2, "min": 0, "max": 1, "default": 0.5  },
  { "name": "Mix",     "index": 3, "min": 0, "max": 1, "default": 0.35 }
]
</script>

<script>
(function(){
  /* ---- params (read from the embedded spec island, never duplicated) --
     spec order is Decay(0), Tension(1), Drip(2), Mix(3) — all [0,1].
     Parsing from #spec-params means a spec.json edit (which the packer
     mirrors into that block) can't drift from the GUI's knobs/animation. */
  var SPEC=[];
  try{ SPEC=JSON.parse(document.getElementById('spec-params').textContent)||[]; }catch(e){ SPEC=[]; }
  var PARAMS=SPEC.map(function(p){
    return {i:p.index,name:p.name,min:+p.min,max:+p.max,def:+p["default"]};
  });
  /* live values keyed by param index, seeded from the spec defaults */
  var state={};
  PARAMS.forEach(function(p){ state[p.i]=p.def; });

  function fmt(v){return (Math.round(v*100))+"%";}

  /* ---- build knobs -------------------------------------------------- */
  var row=document.getElementById('row');
  PARAMS.forEach(function(p){
    var ctl=document.createElement('div');ctl.className='ctl';
    ctl.innerHTML=
      '<div class="knob" tabindex="0">'+
        '<i class="ticks"></i><i class="skirt"></i>'+
        '<i class="body"></i><i class="beak"></i><i class="cap"></i>'+
        '<span class="bub"></span>'+
      '</div>'+
      '<div class="lbl">'+p.name+'</div>'+
      '<div class="num"></div>';
    row.appendChild(ctl);

    var knob=ctl.querySelector('.knob'),
        skirt=ctl.querySelector('.skirt'),
        beak=ctl.querySelector('.beak'),
        num=ctl.querySelector('.num'),
        bub=ctl.querySelector('.bub');
    var val=p.def;
    function norm(){return (val-p.min)/(p.max-p.min||1);}
    function paint(){
      var n=norm();
      skirt.style.setProperty('--n',n);
      beak.style.setProperty('--n',n);
      var t=fmt(n);num.textContent=t;bub.textContent=t;
      state[p.i]=val;
      if(window.vstai&&window.vstai.setParam)window.vstai.setParam(p.i,val);
    }
    function setN(n){n=n<0?0:n>1?1:n;val=p.min+(p.max-p.min)*n;paint();}
    knob.addEventListener('pointerdown',function(e){
      knob._d=1;knob._y=e.clientY;knob._n=norm();knob.classList.add('act');
      knob.setPointerCapture(e.pointerId);e.preventDefault();});
    knob.addEventListener('pointermove',function(e){
      if(!knob._d)return;setN(knob._n+(knob._y-e.clientY)/200);});
    function end(){knob._d=0;knob.classList.remove('act');}
    knob.addEventListener('pointerup',end);
    knob.addEventListener('pointercancel',end);
    knob.addEventListener('dblclick',function(){val=p.def;paint();});
    knob.addEventListener('wheel',function(e){
      e.preventDefault();setN(norm()+(e.deltaY<0?0.02:-0.02));},{passive:false});
    knob.addEventListener('keydown',function(e){
      if(e.key==='ArrowUp'||e.key==='ArrowRight'){setN(norm()+0.02);e.preventDefault();}
      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setN(norm()-0.02);e.preventDefault();}});
    paint();
  });

  /* ---- animated coiled springs ------------------------------------- */
  var sp=[document.getElementById('sp0'),document.getElementById('sp1')];
  var boing=document.getElementById('boing');
  var W=600,H=176;
  var t0=performance.now();
  /* per-spring phase so they wobble out of sync */
  var cfg=[{y:H*0.40,coils:26,rad:13,ph:0},
           {y:H*0.66,coils:20,rad:10,ph:1.7}];

  function build(now){
    var t=(now-t0)/1000;
    var decay=state[0], tension=state[1], drip=state[2], mix=state[3];

    /* Tension -> tighter, brighter coils + faster boing;
       Decay   -> longer-lasting, larger swaying amplitude;
       Drip    -> chirpy ripple travelling along the spring;
       Mix     -> overall visible intensity (opacity).            */
    var sway = 4 + decay*16;              // vertical sway amplitude
    var speed = 1.2 + tension*3.4;        // oscillation speed
    var ripAmp = drip*9;                  // chirp ripple amplitude
    var ripFreq = 5 + tension*9;          // ripple density

    /* envelope: a slowly pulsing "ping" that decays then re-pings,
       so the tank looks alive even when nothing is touched.        */
    var pingT = t % (1.6 - decay*0.7 + 0.4);
    var env = Math.exp(-pingT*(4.5 - decay*3.2));

    for(var s=0;s<2;s++){
      var c=cfg[s], left=18, right=W-18, span=right-left;
      var coils=Math.round(c.coils*(0.7+tension*0.6));
      var d="M "+left+" "+c.y+" ";
      var N=Math.max(60,coils*8);
      for(var k=0;k<=N;k++){
        var u=k/N;
        var x=left+span*u;
        /* coil spiral (projected) */
        var ang=u*coils*Math.PI*2 + c.ph + t*speed;
        var coilY=Math.sin(ang)*c.rad*(0.7+tension*0.5);
        /* travelling drip ripple (the chirp) */
        var rip=Math.sin(u*ripFreq*Math.PI - t*(6+drip*10)+c.ph)*ripAmp*env;
        /* global sway of the whole spring (the boing) */
        var bow=Math.sin(u*Math.PI)*Math.sin(t*speed*1.3+c.ph)*sway*env;
        var y=c.y + coilY + rip + bow;
        d+=(k?"L ":"")+x.toFixed(1)+" "+y.toFixed(1)+" ";
      }
      sp[s].setAttribute('d',d);
      sp[s].style.opacity=(0.35+mix*0.6*(0.5+0.5*env)).toFixed(3);
      sp[s].style.strokeWidth=((s?2.0:2.4)*(0.8+tension*0.5)).toFixed(2);
    }
    /* boing label flashes on each ping */
    boing.style.opacity=(0.25+env*0.7*(0.4+mix)).toFixed(2);
    requestAnimationFrame(build);
  }
  requestAnimationFrame(build);

  /* ---- host ready --------------------------------------------------- */
  function ready(){ /* knobs already initialised to defaults above */ }
  if(window.vstai&&window.vstai.onReady)window.vstai.onReady(ready);else ready();
})();
</script>
</body>
</html>
