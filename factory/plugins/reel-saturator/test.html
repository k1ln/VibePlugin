<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reel Saturator — test bench</title><style>
  :root{--ac:#e0b070}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Reel Saturator</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>\n@property --n{syntax:'<number>';inherits:true;initial-value:0}\n:root{--ac:#e0b070;--ac2:#f0d0a0;--drive:0.45;--warmth:0.4;--bump:0.35;--mix:1;--out:0.7}\n*{box-sizing:border-box}\nhtml,body{margin:0;height:100%}\nbody{min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;color:#efe3cf;\n  background:\n    radial-gradient(120% 90% at 50% -10%,#2a2118 0%,#16110b 55%,#0a0805 100%);\n  display:flex;align-items:center;justify-content:center;padding:18px}\n\n/* ===== chassis : a brushed-metal console strip ===== */\n.strip{position:relative;width:100%;max-width:640px;border-radius:16px;overflow:hidden;\n  background:\n    linear-gradient(180deg,#3a322a 0%,#2b241d 8%,#221c16 100%);\n  border:1px solid rgba(0,0,0,.7);\n  box-shadow:0 26px 60px rgba(0,0,0,.65),\n    inset 0 1px 0 rgba(255,236,205,.16),\n    inset 0 -2px 8px rgba(0,0,0,.6),\n    0 0 0 1px rgba(255,255,255,.03)}\n/* fine brushed lines */\n.strip::before{content:\"\";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;\n  background:repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px);\n  mix-blend-mode:overlay}\n/* warm saturation bloom that breathes with Drive */\n.strip::after{content:\"\";position:absolute;left:50%;top:-30%;width:160%;height:120%;z-index:0;pointer-events:none;\n  transform:translateX(-50%);\n  background:radial-gradient(closest-side,\n    color-mix(in srgb,var(--ac) calc(22% + var(--drive)*48%),transparent),transparent 72%);\n  filter:blur(34px);opacity:calc(.35 + var(--drive)*.5);\n  animation:bloom 6s ease-in-out infinite alternate}\n@keyframes bloom{from{transform:translateX(-50%) scale(1)}to{transform:translateX(-52%) scale(1.08)}}\n\n/* ===== faceplate header : screws + brand ===== */\n.head{position:relative;z-index:2;display:flex;align-items:center;gap:12px;padding:13px 20px 11px;\n  border-bottom:1px solid rgba(0,0,0,.55);\n  background:linear-gradient(180deg,rgba(255,236,205,.07),rgba(0,0,0,0))}\n.screw{width:11px;height:11px;border-radius:50%;flex:none;\n  background:radial-gradient(circle at 38% 32%,#6b5d49,#241d15 75%);\n  box-shadow:inset 0 1px 1px rgba(255,255,255,.25),0 1px 2px rgba(0,0,0,.6)}\n.screw::after{content:\"\";display:block;width:8px;height:1.6px;margin:4.7px auto 0;background:#0c0906;\n  border-radius:2px;transform:rotate(34deg);box-shadow:0 1px 0 rgba(255,255,255,.12)}\n.brand{flex:1;display:flex;flex-direction:column;line-height:1.05}\n.brand b{font-size:18px;font-weight:800;letter-spacing:.04em;\n  background:linear-gradient(180deg,#fff5e6,var(--ac));-webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 1px 0 rgba(0,0,0,.4)}\n.brand small{font-size:9px;letter-spacing:.42em;text-transform:uppercase;color:#9c8767;margin-top:3px}\n.power{display:flex;align-items:center;gap:6px;font-size:8.5px;letter-spacing:.18em;color:#9c8767;text-transform:uppercase}\n.led{width:8px;height:8px;border-radius:50%;background:var(--ac);\n  box-shadow:0 0 8px var(--ac),0 0 2px #fff8ea inset;animation:pulse 2.6s ease-in-out infinite}\n@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}\n\n/* ===== top deck : tape transport + VU meter ===== */\n.deck{position:relative;z-index:2;display:flex;gap:16px;align-items:stretch;padding:18px 20px 6px}\n\n/* -- the tape reel assembly -- */\n.transport{flex:none;width:200px;position:relative;border-radius:12px;padding:14px 10px 10px;\n  background:linear-gradient(160deg,#1c1610,#0e0a06);\n  border:1px solid rgba(0,0,0,.6);box-shadow:inset 0 2px 10px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,236,205,.05)}\n.reels{display:flex;justify-content:space-between;align-items:center;position:relative;height:96px}\n/* the tape path between reels */\n.tapepath{position:absolute;left:48px;right:48px;top:50%;height:14px;transform:translateY(-50%);\n  background:linear-gradient(180deg,#2a2117,#120d08);border-top:1px solid rgba(255,236,205,.07);\n  border-bottom:1px solid rgba(0,0,0,.7);overflow:hidden}\n.tapepath::before{content:\"\";position:absolute;inset:0;\n  background:repeating-linear-gradient(90deg,rgba(224,176,112,.0) 0 8px,rgba(224,176,112,.22) 8px 9px);\n  animation:tape 0.9s linear infinite;\n  animation-duration:calc(1.4s - var(--drive)*1s)}\n@keyframes tape{from{background-position:0 0}to{background-position:40px 0}}\n.reel{position:relative;width:86px;height:86px;border-radius:50%;\n  background:\n    radial-gradient(circle at 50% 50%,#211910 0 24%,#0c0906 24% 26%,#1a140d 26% 100%);\n  box-shadow:inset 0 0 0 2px rgba(0,0,0,.6),inset 0 4px 14px rgba(0,0,0,.7),0 2px 4px rgba(0,0,0,.5);\n  animation:spin 3s linear infinite;\n  animation-duration:calc(3.6s - var(--drive)*2.6s)}\n.reel.r2{animation-duration:calc(3.7s - var(--drive)*2.6s)}\n@keyframes spin{to{transform:rotate(360deg)}}\n/* three spokes + hub */\n.reel .spoke{position:absolute;left:50%;top:50%;width:9px;height:32px;margin:-16px 0 0 -4.5px;border-radius:4px;\n  background:linear-gradient(180deg,#4a3c2a,#241a10);box-shadow:inset 0 1px 0 rgba(255,236,205,.18),0 1px 2px rgba(0,0,0,.6)}\n.reel .spoke:nth-child(2){transform:rotate(60deg)}\n.reel .spoke:nth-child(3){transform:rotate(120deg)}\n.reel .hub{position:absolute;left:50%;top:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border-radius:50%;\n  background:radial-gradient(circle at 40% 35%,var(--ac2),#7a5a32 70%,#3a2a18);\n  box-shadow:0 0 8px color-mix(in srgb,var(--ac) 60%,transparent),inset 0 1px 1px rgba(255,255,255,.4)}\n/* amount of tape wound (driven by --out) */\n.reel .tape{position:absolute;border-radius:50%;\n  inset:calc(8px + (1 - var(--out))*22px);\n  background:repeating-radial-gradient(circle,#3a2c1c 0 1.5px,#241a10 1.5px 3px);\n  box-shadow:inset 0 0 6px rgba(0,0,0,.6)}\n\n/* -- VU meter -- */\n.vu{flex:1;min-width:0;position:relative;border-radius:12px;padding:10px 14px 8px;\n  background:linear-gradient(170deg,#efe4c8,#d8c8a3);\n  border:1px solid #4a3c28;box-shadow:inset 0 2px 8px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.1);\n  display:flex;flex-direction:column}\n.vu .face{position:relative;flex:1;min-height:96px}\n.vu svg{width:100%;height:100%;display:block;overflow:visible}\n.vu .lbl{position:absolute;top:6px;left:0;right:0;text-align:center;font-size:8px;letter-spacing:.34em;\n  color:#6a5535;text-transform:uppercase}\n.vu .vutxt{position:absolute;right:8px;bottom:2px;font-size:8px;letter-spacing:.2em;color:#7a6038;font-weight:700}\n.needle{transform-box:fill-box;transform-origin:50% 100%;\n  transition:transform .12s cubic-bezier(.3,.8,.3,1)}\n.glassglow{animation:warn 1.4s ease-in-out infinite}\n@keyframes warn{0%,100%{opacity:.0}50%{opacity:.55}}\n\n/* ===== control row : 5 chicken-head knobs ===== */\n.controls{position:relative;z-index:2;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:16px 14px 8px}\n.cell{display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 2px 8px;border-radius:12px;\n  transition:background .18s,transform .18s;animation:rise .55s both;animation-delay:var(--d)}\n.cell:hover{background:rgba(255,236,205,.04);transform:translateY(-2px)}\n@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n.knob{position:relative;width:74px;height:74px;cursor:ns-resize;user-select:none;touch-action:none}\n/* engraved tick ring */\n.ring{position:absolute;inset:-3px;border-radius:50%;\n  background:repeating-conic-gradient(from 215deg,rgba(255,236,205,.30) 0 1deg,transparent 1deg 27deg);\n  -webkit-mask:radial-gradient(circle,transparent 38px,#000 39px,#000 42px,transparent 43px);\n  mask:radial-gradient(circle,transparent 38px,#000 39px,#000 42px,transparent 43px)}\n/* glowing arc that fills with value */\n.arc{position:absolute;inset:1px;border-radius:50%;\n  background:conic-gradient(from 215deg,var(--ac) calc(var(--kn)*270deg),rgba(255,236,205,.07) calc(var(--kn)*270deg) 270deg,transparent 270deg);\n  filter:drop-shadow(0 0 calc(3px + var(--kn)*8px) color-mix(in srgb,var(--ac) 70%,transparent));\n  transition:--kn .14s cubic-bezier(.2,.75,.25,1)}\n/* bakelite chicken-head body */\n.body{position:absolute;inset:10px;border-radius:50%;\n  background:\n    radial-gradient(circle at 50% 28%,#4f4334,#241b12 72%,#140d08);\n  box-shadow:inset 0 2px 7px rgba(0,0,0,.6),inset 0 -2px 4px rgba(255,236,205,.06),0 2px 5px rgba(0,0,0,.55);\n  transform:rotate(calc((var(--kn) - 0.5)*270deg));transition:transform .14s cubic-bezier(.2,.75,.25,1)}\n/* the chicken-head pointer beak */\n.body::before{content:\"\";position:absolute;left:50%;top:-3px;width:0;height:0;margin-left:-7px;\n  border-left:7px solid transparent;border-right:7px solid transparent;\n  border-bottom:20px solid;border-bottom-color:var(--ac2);\n  filter:drop-shadow(0 0 5px var(--ac));border-radius:2px}\n.body::after{content:\"\";position:absolute;inset:38%;border-radius:50%;\n  background:radial-gradient(circle at 40% 35%,#5a4a36,#1c140d);box-shadow:inset 0 1px 1px rgba(255,236,205,.2)}\n.bub{position:absolute;top:-13px;left:50%;transform:translate(-50%,4px) scale(.8);opacity:0;pointer-events:none;\n  font-size:11px;font-weight:800;color:#1a0f04;background:var(--ac);padding:2px 7px;border-radius:6px;\n  font-variant-numeric:tabular-nums;box-shadow:0 4px 12px rgba(0,0,0,.5);transition:.15s;white-space:nowrap}\n.cell:hover .bub,.knob.act .bub{opacity:1;transform:translate(-50%,0) scale(1)}\n.nm{font-size:10px;letter-spacing:.16em;color:#c9b386;text-transform:uppercase;font-weight:700}\n.val{font-size:12px;color:#fff6e6;font-variant-numeric:tabular-nums;font-weight:800;\n  text-shadow:0 0 8px color-mix(in srgb,var(--ac) 50%,transparent)}\n\n.foot{position:relative;z-index:2;font-size:10.5px;line-height:1.5;color:#8a7656;\n  border-top:1px solid rgba(0,0,0,.5);margin:6px 20px 0;padding:11px 0 14px}\n.foot::before{content:\"TAPE PATH ▸ \";color:var(--ac);letter-spacing:.12em;font-weight:700}\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head><body>\n<div class=\"strip\">\n  <div class=\"head\">\n    <span class=\"screw\"><\/span>\n    <div class=\"brand\"><b>REEL SATURATOR<\/b><small>analog tape &middot; warmth processor<\/small><\/div>\n    <div class=\"power\"><span class=\"led\"><\/span>+48 / VU<\/div>\n    <span class=\"screw\"><\/span>\n  <\/div>\n\n  <div class=\"deck\">\n    <div class=\"transport\">\n      <div class=\"reels\">\n        <div class=\"reel r1\"><i class=\"tape\"><\/i><i class=\"spoke\"><\/i><i class=\"spoke\"><\/i><i class=\"spoke\"><\/i><i class=\"hub\"><\/i><\/div>\n        <div class=\"tapepath\"><\/div>\n        <div class=\"reel r2\"><i class=\"tape\"><\/i><i class=\"spoke\"><\/i><i class=\"spoke\"><\/i><i class=\"spoke\"><\/i><i class=\"hub\"><\/i><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"vu\">\n      <div class=\"face\">\n        <div class=\"lbl\">V U &nbsp; meter<\/div>\n        <svg viewBox=\"0 0 200 110\" preserveAspectRatio=\"xMidYMid meet\">\n          <defs>\n            <linearGradient id=\"scale\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n              <stop offset=\"0\" stop-color=\"#6a5535\"/><stop offset=\"0.7\" stop-color=\"#6a5535\"/>\n              <stop offset=\"0.7\" stop-color=\"#b8341e\"/><stop offset=\"1\" stop-color=\"#b8341e\"/>\n            <\/linearGradient>\n          <\/defs>\n          <!-- arc scale -->\n          <path d=\"M22 100 A 88 88 0 0 1 178 100\" fill=\"none\" stroke=\"rgba(0,0,0,.12)\" stroke-width=\"9\"/>\n          <path d=\"M22 100 A 88 88 0 0 1 178 100\" fill=\"none\" stroke=\"url(#scale)\" stroke-width=\"2.5\"/>\n          <!-- ticks -->\n          <g stroke=\"#5a4628\" stroke-width=\"1.4\">\n            <line x1=\"22\" y1=\"100\" x2=\"30\" y2=\"92\"/>\n            <line x1=\"61\" y1=\"64\" x2=\"66\" y2=\"74\"/>\n            <line x1=\"100\" y1=\"52\" x2=\"100\" y2=\"63\"/>\n            <line x1=\"139\" y1=\"64\" x2=\"134\" y2=\"74\"/>\n            <line x1=\"178\" y1=\"100\" x2=\"170\" y2=\"92\"/>\n          <\/g>\n          <text x=\"100\" y=\"46\" text-anchor=\"middle\" font-size=\"9\" fill=\"#7a3020\" font-weight=\"700\">0<\/text>\n          <text x=\"28\" y=\"92\" font-size=\"8\" fill=\"#6a5535\">-20<\/text>\n          <text x=\"160\" y=\"92\" font-size=\"8\" fill=\"#7a3020\">+3<\/text>\n          <!-- red overload glow -->\n          <path class=\"glassglow\" d=\"M139 64 A 88 88 0 0 1 178 100\" fill=\"none\" stroke=\"#ff4a2a\" stroke-width=\"3\" opacity=\"0\"/>\n          <!-- needle -->\n          <g class=\"needle\" id=\"needle\">\n            <line x1=\"100\" y1=\"100\" x2=\"100\" y2=\"20\" stroke=\"#1a120a\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n            <line x1=\"100\" y1=\"100\" x2=\"100\" y2=\"20\" stroke=\"#c8341e\" stroke-width=\"1\" stroke-linecap=\"round\"/>\n          <\/g>\n          <circle cx=\"100\" cy=\"100\" r=\"6\" fill=\"#2a2014\" stroke=\"#6a5535\" stroke-width=\"1\"/>\n        <\/svg>\n        <div class=\"vutxt\">dB<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"controls\" id=\"controls\">\n    <div class=\"cell\" style=\"--d:0ms\"   data-i=\"0\" data-min=\"0\" data-max=\"1\" data-def=\"0.45\" data-step=\"0.001\" data-var=\"--drive\"  data-fmt=\"pct\">\n      <div class=\"knob\"><i class=\"ring\"><\/i><i class=\"arc\"><\/i><i class=\"body\"><\/i><span class=\"bub\"><\/span><\/div>\n      <div class=\"nm\">Drive<\/div><div class=\"val\"><\/div><\/div>\n    <div class=\"cell\" style=\"--d:70ms\"  data-i=\"1\" data-min=\"0\" data-max=\"1\" data-def=\"0.4\"  data-step=\"0.001\" data-var=\"--warmth\" data-fmt=\"pct\">\n      <div class=\"knob\"><i class=\"ring\"><\/i><i class=\"arc\"><\/i><i class=\"body\"><\/i><span class=\"bub\"><\/span><\/div>\n      <div class=\"nm\">Warmth<\/div><div class=\"val\"><\/div><\/div>\n    <div class=\"cell\" style=\"--d:140ms\" data-i=\"2\" data-min=\"0\" data-max=\"1\" data-def=\"0.35\" data-step=\"0.001\" data-var=\"--bump\"   data-fmt=\"pct\">\n      <div class=\"knob\"><i class=\"ring\"><\/i><i class=\"arc\"><\/i><i class=\"body\"><\/i><span class=\"bub\"><\/span><\/div>\n      <div class=\"nm\">Bump<\/div><div class=\"val\"><\/div><\/div>\n    <div class=\"cell\" style=\"--d:210ms\" data-i=\"3\" data-min=\"0\" data-max=\"1\" data-def=\"1\"    data-step=\"0.001\" data-var=\"--mix\"    data-fmt=\"pct\">\n      <div class=\"knob\"><i class=\"ring\"><\/i><i class=\"arc\"><\/i><i class=\"body\"><\/i><span class=\"bub\"><\/span><\/div>\n      <div class=\"nm\">Mix<\/div><div class=\"val\"><\/div><\/div>\n    <div class=\"cell\" style=\"--d:280ms\" data-i=\"4\" data-min=\"0\" data-max=\"1\" data-def=\"0.7\"  data-step=\"0.001\" data-var=\"--out\"    data-fmt=\"pct\">\n      <div class=\"knob\"><i class=\"ring\"><\/i><i class=\"arc\"><\/i><i class=\"body\"><\/i><span class=\"bub\"><\/span><\/div>\n      <div class=\"nm\">Output<\/div><div class=\"val\"><\/div><\/div>\n  <\/div>\n\n  <div class=\"foot\">15 ips &middot; tanh soft-saturation, head-bump &amp; wow. Drag a knob, double-click to reset.<\/div>\n<\/div>\n\n<script>\n(function(){\n  var root=document.documentElement;\n  // live VU drive: blend of drive*mix*output so the needle reacts to the dial\n  var levels={drive:0.45,mix:1,out:0.7};\n\n  function fmtPct(v){ return Math.round(v*100)+'%'; }\n\n  function bindKnob(c){\n    var i=+c.dataset.i, mn=+c.dataset.min, mx=+c.dataset.max, def=+c.dataset.def,\n        step=+c.dataset.step||0.001, cssVar=c.dataset.var;\n    var val=def,\n        knob=c.querySelector('.knob'), arc=c.querySelector('.arc'),\n        body=c.querySelector('.body'), out=c.querySelector('.val'), bub=c.querySelector('.bub');\n    function norm(){ return (val-mn)/((mx-mn)||1); }\n    function paint(){\n      var n=norm();\n      arc.style.setProperty('--kn',n);\n      body.style.setProperty('--kn',n);\n      if(cssVar) root.style.setProperty(cssVar, n.toFixed(3));\n      var t=fmtPct(n);\n      out.textContent=t; bub.textContent=t;\n      if(cssVar==='--drive') levels.drive=n;\n      if(cssVar==='--mix')   levels.mix=n;\n      if(cssVar==='--out')   levels.out=n;\n      if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,val);\n    }\n    function setN(n){ n=n<0?0:(n>1?1:n); var v=mn+(mx-mn)*n; v=Math.round(v/step)*step;\n      v=v<mn?mn:(v>mx?mx:v); val=v; paint(); }\n    knob.addEventListener('pointerdown',function(e){ knob._d=1; knob._y=e.clientY; knob._n=norm();\n      knob.classList.add('act'); knob.setPointerCapture(e.pointerId); e.preventDefault(); });\n    knob.addEventListener('pointermove',function(e){ if(!knob._d)return; setN(knob._n+(knob._y-e.clientY)/200); });\n    function end(){ knob._d=0; knob.classList.remove('act'); }\n    knob.addEventListener('pointerup',end);\n    knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){ val=def; paint(); });\n    knob.addEventListener('wheel',function(e){ e.preventDefault(); setN(norm()+(e.deltaY<0?0.02:-0.02)); },{passive:false});\n    paint();\n  }\n\n  // ===== animated VU needle =====\n  var needle=document.getElementById('needle'), glow=document.querySelector('.glassglow');\n  var disp=0, t0=performance.now();\n  function tick(now){\n    var dt=(now-t0)/1000; t0=now;\n    // simulated programme level: signal energy driven by drive*mix*output + gentle wow\n    var target=levels.drive*0.85*levels.mix*(0.4+levels.out*0.7);\n    var wow=0.05*Math.sin(now/520)+0.03*Math.sin(now/170+1.3);\n    target=Math.max(0,Math.min(1.08, target+ (target>0.05?wow:0)));\n    // ballistic-ish smoothing\n    disp += (target-disp)*Math.min(1,dt*7);\n    // map 0..1.08 -> -45deg .. +52deg\n    var deg=-45 + disp*89;\n    needle.style.transform='rotate('+deg.toFixed(2)+'deg)';\n    if(glow) glow.style.opacity = disp>0.78 ? Math.min(0.6,(disp-0.78)*3).toFixed(2) : 0;\n    requestAnimationFrame(tick);\n  }\n  requestAnimationFrame(tick);\n\n  function ready(){\n    var cells=document.querySelectorAll('.cell');\n    for(var j=0;j<cells.length;j++) bindKnob(cells[j]);\n  }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body><\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
