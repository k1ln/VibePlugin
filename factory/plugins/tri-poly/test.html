<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tri Poly — test bench</title><style>
  :root{--ac:#43d0c4}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}

  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}

  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

:0.8}];\n  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });\n  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }\n  var R=33, C=2*Math.PI*R, A0=-135, A1=135;\n  var kw=document.getElementById(\"knobs\");\n  var knobs=P.map(function(p){\n    var el=document.createElement(\"div\"); el.className=\"knob\";\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 80 80\"><defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#43d0c4\"/><stop offset=\"1\" stop-color=\"#ffb86a\"/><\/linearGradient><\/defs>'+\n      '<circle class=\"track\" cx=\"40\" cy=\"40\" r=\"33\"><\/circle><circle class=\"arc\" cx=\"40\" cy=\"40\" r=\"33\" transform=\"rotate(135 40 40)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle>'+\n      '<circle class=\"pcap\" cx=\"40\" cy=\"40\" r=\"20\"><\/circle><line class=\"ptr\" x1=\"40\" y1=\"40\" x2=\"40\" y2=\"23\"><\/line><\/svg><\/div><span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el);\n    var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*v)).toString());\n      var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute(\"x2\",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute(\"y2\",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+\"%\"; }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; }); el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });\n    render(p.def); return {render:render};\n  });\n  var cv=document.getElementById(\"cv\"), ctx=cv.getContext(\"2d\"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);\n  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }\n  window.addEventListener(\"resize\",resize); resize();\n  function frame(ts){ ctx.clearRect(0,0,W,H); var cut=vals[0], xm=vals[3], ch=vals[4]; var mid=H*0.55;\n    ctx.strokeStyle=\"rgba(67,208,196,0.10)\"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(W,mid); ctx.stroke();\n    function w(off,col,amp){ ctx.beginPath();\n      for(var x=0;x<=W;x+=2){ var t=x/W; var p2=(t*4.5+ts/450+off)%1; var pulse=p2<0.5?1:-1;\n        var p1=(t*3*(1+pulse*xm*0.5)+ts/600+off)%1; if(p1<0)p1+=1; var saw=2*p1-1;\n        var y=(saw*0.6+pulse*0.4)*(0.4+cut*0.6); ctx.lineTo(x, mid + y*amp); }\n      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.shadowColor=col; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0; }\n    w(0,\"rgba(67,208,196,0.92)\",16);\n    if(ch>0.05) w(0.4+ch,\"rgba(255,184,106,\"+(0.3+ch*0.5)+\")\",14);\n    requestAnimationFrame(frame); }\n  requestAnimationFrame(frame);\n  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script>\n<\/body>\n<\/html>\n";

  document.getElementById('octdn').addEventListener('click',function(){setOct(oct-1);});
  document.getElementById('octup').addEventListener('click',function(){setOct(oct+1);});
  var held={};                                            // base note -> actual note played (so releases survive an octave change)
  window.addEventListener('keydown',function(e){ if(e.repeat)return;
    if(e.key==='z'||e.key==='Z'){setOct(oct-1);return;} if(e.key==='x'||e.key==='X'){setOct(oct+1);return;}
    var b=KMAP[e.key]; if(b&&!held[b]){var m=b+oct*12;held[b]=m;down(m,null);} });
  window.addEventListener('keyup',function(e){ var b=KMAP[e.key]; if(b&&held[b]!=null){up(held[b],null);held[b]=null;} });
  setOct(0);
  
  </script></body></html>
