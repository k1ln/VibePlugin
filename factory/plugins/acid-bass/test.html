));\n      glow.setAttribute(\"d\", arc(start, n<=0.0001?start+0.001:ang, r+4));\n      var inner=pt(ang,6), outer=pt(ang,14.5);\n      notch.setAttribute(\"x1\",inner[0]); notch.setAttribute(\"y1\",inner[1]);\n      notch.setAttribute(\"x2\",outer[0]); notch.setAttribute(\"y2\",outer[1]);\n      vbox.textContent=fmtVal(p,cur);\n      STATE[p.index]=cur;\n    }\n    function setVal(v,push){\n      cur=clamp(v,p.min,p.max); render();\n      if(push) send(p.index,cur);\n    }\n    render();\n\n    // ---- drag ----\n    var dragging=false,startY=0,startV=0;\n    function onMove(e){\n      if(!dragging)return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      var dy=startY-y;\n      var span=p.max-p.min;\n      var fine=e.shiftKey?0.25:1;\n      setVal(startV+ dy/180*span*fine, true);\n      e.preventDefault();\n    }\n    function onUp(){ if(!dragging)return; dragging=false; knob.classList.remove(\"dragging\");\n      window.removeEventListener(\"pointermove\",onMove);\n      window.removeEventListener(\"pointerup\",onUp);\n    }\n    knob.addEventListener(\"pointerdown\",function(e){\n      dragging=true; knob.classList.add(\"dragging\");\n      startY=e.clientY; startV=cur;\n      window.addEventListener(\"pointermove\",onMove);\n      window.addEventListener(\"pointerup\",onUp);\n      e.preventDefault();\n    });\n    knob.addEventListener(\"dblclick\",function(e){ setVal(p.def,true); e.preventDefault(); });\n    // wheel for fine tweaking\n    knob.addEventListener(\"wheel\",function(e){\n      setVal(cur - Math.sign(e.deltaY)*(p.max-p.min)*0.02, true); e.preventDefault();\n    },{passive:false});\n\n    return {set:setVal,get:function(){return cur;}};\n  }\n  var knobs=PARAMS.map(buildKnob);\n\n  // ============== STEP STRIP (the chaser) ==============\n  var strip=document.getElementById(\"strip\");\n  var STEPS=16, steps=[];\n  // a default acid pattern (purely decorative chaser; accents on the 1,5,9,11)\n  var pattern=[1,0,1,1, 1,0,0,1, 1,1,0,1, 0,1,1,0];\n  var accents=[1,0,0,0, 1,0,0,0, 1,0,1,0, 0,0,0,0];\n  for(var i=0;i<STEPS;i++){\n    var s=document.createElement(\"div\"); s.className=\"step\";\n    if(pattern[i]) s.classList.add(\"on\");\n    if(accents[i]) s.classList.add(\"acc\");\n    var led=document.createElement(\"div\"); led.className=\"led\"; s.appendChild(led);\n    if(i%4===0){var n=document.createElement(\"div\"); n.className=\"n\"; n.textContent=(i/4+1); s.appendChild(n);}\n    (function(idx,el){\n      el.addEventListener(\"click\",function(){\n        // toggle the step's accent state for tactile feedback\n        if(el.classList.contains(\"on\")){\n          if(el.classList.contains(\"acc\")) el.classList.remove(\"acc\",\"on\");\n          else el.classList.add(\"acc\");\n        } else { el.classList.add(\"on\"); }\n        pattern[idx]=el.classList.contains(\"on\")?1:0;\n        accents[idx]=el.classList.contains(\"acc\")?1:0;\n      });\n    })(i,s);\n    strip.appendChild(s); steps.push(s);\n  }\n\n  // ============== ANIMATION LOOP ==============\n  var scope=document.getElementById(\"scope\");\n  var sctx=scope.getContext(\"2d\");\n  var W=scope.width,H=scope.height;\n  var roCut=document.getElementById(\"roCut\"), roReso=document.getElementById(\"roReso\");\n\n  var cur=0, lastStep=-1, phase=0, t0=performance.now();\n  function applyCur(idx){\n    steps.forEach(function(s,i){ s.classList.toggle(\"cur\", i===idx && (pattern[i]===1)); });\n  }\n\n  function pad3(v){return (\"00\"+Math.round(v*100)).slice(-3);}\n\n  function loop(now){\n    var dt=(now-t0)/1000; t0=now;\n    // tempo: glide & decay nudge the chase speed for character\n    var decay=STATE[4], glide=STATE[6];\n    var bps = 2.0 + (1-decay)*2.6;       // faster with shorter decay\n    phase += dt*bps;\n    if(phase>=1){ phase-=1; cur=(cur+1)%STEPS;\n      // skip to next active-ish step occasionally for a \"chase\" feel\n    }\n    if(cur!==lastStep){ applyCur(cur); lastStep=cur; }\n\n    // ---- scope: resonant low-     el.addEventListener('pointerup',function(){up(k[1],el);}); el.addEventListener('pointerleave',function(){up(k[1],el);});
    KB.appendChild(el); });
  var held={};
  window.addEventListener('keydown',function(e){ var m=KMAP[e.key]; if(m&&!held[m]){held[m]=1;down(m,null);} });
  window.addEventListener('keyup',function(e){ var m=KMAP[e.key]; if(m){held[m]=0;up(m,null);} });
