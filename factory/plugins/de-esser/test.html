<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>De-Esser — test bench</title><style>
  :root{--ac:#9ad0e0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n  :root{\n    --ac:#9ad0e0;        /* cool aqua accent */\n    --ac2:#c0e0f0;       /* pale ice highlight */\n    --panel:#0e1820;\n    --panel2:#0a1219;\n    --glass:#10212c;\n    --ink:#dff2f8;\n    --dim:#7fa6b6;\n    --line:rgba(154,208,224,.16);\n  }\n\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{\n    margin:0;\n    font:13px ui-sans-serif,-apple-system,\"Segoe UI\",system-ui,sans-serif;\n    color:var(--ink);\n    background:\n      radial-gradient(120% 80% at 50% -8%,#13303c 0%,#0a151d 52%,#060c11 100%);\n    display:flex;align-items:center;justify-content:center;\n    padding:20px;min-height:100%;\n    -webkit-font-smoothing:antialiased;\n  }\n\n  /* ===================== panel shell ===================== */\n  .unit{\n    position:relative;\n    width:min(640px,96vw);\n    border-radius:20px;\n    padding:20px 22px 22px;\n    background:\n      linear-gradient(165deg,#16252f 0%,var(--panel) 42%,var(--panel2) 100%);\n    box-shadow:\n      0 40px 90px -28px rgba(0,0,0,.82),\n      0 1px 0 rgba(255,255,255,.07) inset,\n      0 -28px 50px -30px rgba(0,0,0,.7) inset,\n      0 0 0 1px rgba(0,0,0,.5),\n      0 0 0 4px #0a141a;\n    animation:rise .7s cubic-bezier(.2,.85,.25,1) both;\n    overflow:hidden;\n  }\n  @keyframes rise{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}\n\n  /* faint engraved grid texture */\n  .unit::before{\n    content:\"\";position:absolute;inset:0;border-radius:20px;pointer-events:none;\n    background:\n      repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 1px,transparent 1px 26px),\n      repeating-linear-gradient(90deg,rgba(255,255,255,.014) 0 1px,transparent 1px 26px);\n    mask:radial-gradient(120% 90% at 50% 0,#000 40%,transparent 100%);\n  }\n\n  /* ===================== header ===================== */\n  .head{display:flex;align-items:center;gap:14px;margin-bottom:16px;position:relative;z-index:2}\n  .logo{\n    width:42px;height:42px;flex:0 0 auto;border-radius:12px;\n    background:radial-gradient(120% 120% at 30% 20%,#1d4150,#0c1c25);\n    box-shadow:0 1px 0 rgba(255,255,255,.1) inset,0 0 0 1px var(--line),0 8px 18px -8px rgba(0,0,0,.7);\n    display:grid;place-items:center;\n  }\n  .title{line-height:1.05}\n  .title h1{\n    margin:0;font-size:18px;letter-spacing:.32em;font-weight:700;\n    text-transform:uppercase;\n    background:linear-gradient(180deg,#fff,var(--ac));\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n  }\n  .title .sub{\n    font-size:9.5px;letter-spacing:.42em;text-transform:uppercase;color:var(--dim);\n    margin-top:3px;\n  }\n  .head .spacer{flex:1}\n  .gr-led{\n    display:flex;align-items:center;gap:7px;font-size:9px;letter-spacing:.25em;\n    text-transform:uppercase;color:var(--dim);\n  }\n  .led{\n    width:9px;height:9px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#1a2c34,#0a141a);\n    box-shadow:0 0 0 1px rgba(0,0,0,.6) inset;\n    transition:box-shadow .08s,background .08s;\n  }\n  .led.on{\n    background:radial-gradient(circle at 35% 30%,#dff6ff,var(--ac));\n    box-shadow:0 0 10px 2px rgba(154,208,224,.7),0 0 0 1px rgba(0,0,0,.4) inset;\n  }\n\n  /* ===================== spectrum / sibilance scope ===================== */\n  .scope{\n    position:relative;z-index:2;\n    height:128px;border-radius:14px;margin-bottom:18px;overflow:hidden;\n    background:linear-gradient(180deg,#0a151c,#070e13);\n    box-shadow:0 0 0 1px var(--line),0 16px 30px -22px #000 inset,0 1px 0 rgba(255,255,255,.04);\n  }\n  .scope svg{display:block;width:100%;height:100%}\n  .scope .cap{\n    position:absolute;left:12px;top:9px;font-size:9px;letter-spacing:.3em;\n    text-transform:uppercase;color:var(--dim);\n  }\n  .scope .duck{\n    position:absolute;right:12px;top:9px;font-size:9px;letter-spacing:.18em;\n    text-transform:uppercase;color:var(--ac2);font-variant-numeric:tabular-nums;\n  }\n\n  /* ===================== controls ===================== */\n  .rack{\n    position:relative;z-index:2;\n    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\n  }\n  @media(max-width:520px){.rack{grid-template-columns:repeat(2,1fr)}}\n\n  .cell{\n    border-radius:14px;padding:14px 10px 12px;text-align:center;\n    background:linear-gradient(170deg,#12222c,#0b151c);\n    box-shadow:0 0 0 1px var(--line),0 1px 0 rgba(255,255,255,.05) inset,0 14px 26px -22px #000;\n  }\n  .cell .lbl{\n    font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);\n    margin-bottom:10px;\n  }\n  .knob{\n    --a:0;                /* -135..135 deg pointer angle, set by JS */\n    position:relative;width:84px;height:84px;margin:0 auto;cursor:ns-resize;\n    touch-action:none;user-select:none;\n  }\n  .knob svg{display:block;width:100%;height:100%;overflow:visible}\n  .knob .body{\n    filter:drop-shadow(0 8px 12px rgba(0,0,0,.55));\n  }\n  .knob:active{cursor:grabbing}\n  .val{\n    margin-top:9px;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;\n    color:var(--ink);letter-spacing:.02em;\n  }\n  .val small{color:var(--dim);font-weight:400;font-size:10px;margin-left:2px}\n\n  .hint{\n    position:relative;z-index:2;text-align:center;margin-top:14px;\n    font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(127,166,182,.55);\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n\n    <div class=\"head\">\n      <div class=\"logo\">\n        <!-- stylised \"sss\" caught in a net -->\n        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\">\n          <path d=\"M5 8c4-3 7 2 9-1\" stroke=\"#9ad0e0\" stroke-width=\"1.7\" stroke-linecap=\"round\"/>\n          <path d=\"M5 13c4-3 7 2 9-1\" stroke=\"#c0e0f0\" stroke-width=\"1.7\" stroke-linecap=\"round\" opacity=\".75\"/>\n          <path d=\"M5 18c4-3 7 2 9-1\" stroke=\"#9ad0e0\" stroke-width=\"1.7\" stroke-linecap=\"round\" opacity=\".5\"/>\n          <circle cx=\"18.5\" cy=\"6\" r=\"2.4\" stroke=\"#c0e0f0\" stroke-width=\"1.4\"/>\n        <\/svg>\n      <\/div>\n      <div class=\"title\">\n        <h1>De-Esser<\/h1>\n        <div class=\"sub\">Sibilance Control<\/div>\n      <\/div>\n      <div class=\"spacer\"><\/div>\n      <div class=\"gr-led\"><span class=\"led\" id=\"led\"><\/span>Reduction<\/div>\n    <\/div>\n\n    <!-- spectrum scope with highlighted sibilant band + sss particles -->\n    <div class=\"scope\">\n      <div class=\"cap\">Sibilant Band<\/div>\n      <div class=\"duck\" id=\"duckTxt\">-0.0 dB<\/div>\n      <svg viewBox=\"0 0 600 128\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"bandG\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#9ad0e0\" stop-opacity=\".42\"/>\n            <stop offset=\"1\" stop-color=\"#9ad0e0\" stop-opacity=\"0\"/>\n          <\/linearGradient>\n          <linearGradient id=\"specG\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#c0e0f0\" stop-opacity=\".9\"/>\n            <stop offset=\"1\" stop-color=\"#3f6f82\" stop-opacity=\".25\"/>\n          <\/linearGradient>\n        <\/defs>\n        <!-- baseline grid -->\n        <g stroke=\"rgba(154,208,224,.10)\" stroke-width=\"1\">\n          <line x1=\"0\" y1=\"32\" x2=\"600\" y2=\"32\"/>\n          <line x1=\"0\" y1=\"64\" x2=\"600\" y2=\"64\"/>\n          <line x1=\"0\" y1=\"96\" x2=\"600\" y2=\"96\"/>\n        <\/g>\n        <!-- highlighted sibilant band (moves/scales with Frequency + ducking) -->\n        <rect id=\"band\" x=\"380\" y=\"0\" width=\"120\" height=\"128\" fill=\"url(#bandG)\"/>\n        <line id=\"bandEdgeL\" x1=\"380\" y1=\"0\" x2=\"380\" y2=\"128\" stroke=\"#9ad0e0\" stroke-width=\"1\" stroke-dasharray=\"3 4\" opacity=\".5\"/>\n        <line id=\"bandEdgeR\" x1=\"500\" y1=\"0\" x2=\"500\" y2=\"128\" stroke=\"#9ad0e0\" stroke-width=\"1\" stroke-dasharray=\"3 4\" opacity=\".5\"/>\n        <!-- animated spectrum curve -->\n        <path id=\"spec\" d=\"\" fill=\"url(#specG)\" stroke=\"#c0e0f0\" stroke-width=\"1.4\"/>\n        <!-- \"sss\" particles streaming + being ducked at the band -->\n        <g id=\"particles\"><\/g>\n      <\/svg>\n    <\/div>\n\n    <div class=\"rack\" id=\"rack\"><\/div>\n\n    <div class=\"hint\">Drag vertically &nbsp;·&nbsp; Double-click to reset<\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- parameter map (indices MUST match assembly.ts P_*) ----\n  var PARAMS = [\n    { name:\"Frequency\", index:0, min:0, max:1, def:0.45, fmt:freqFmt },\n    { name:\"Threshold\", index:1, min:0, max:1, def:0.45, fmt:threshFmt },\n    { name:\"Amount\",    index:2, min:0, max:1, def:0.6,  fmt:amtFmt },\n    { name:\"Mix\",       index:3, min:0, max:1, def:1.0,  fmt:pctFmt }\n  ];\n\n  var state = PARAMS.map(function(p){ return p.def; });\n\n  // ---- value display formatters (norm 0..1 -> human) ----\n  function freqFmt(v){\n    var hz = 4000 + v*6000;\n    return { t:(hz/1000).toFixed(2), u:\"kHz\" };\n  }\n  function threshFmt(v){\n    var db = -50 + v*50;\n    return { t:db.toFixed(0), u:\"dB\" };\n  }\n  function amtFmt(v){\n    return { t:(v*24).toFixed(1), u:\"dB\" };\n  }\n  function pctFmt(v){\n    return { t:(v*100).toFixed(0), u:\"%\" };\n  }\n\n  // ---------------------------------------------------------------\n  //  host bridge\n  // ---------------------------------------------------------------\n  function push(i, v){\n    if (window.vstai && window.vstai.setParam) window.vstai.setParam(i, v);\n  }\n\n  // ---------------------------------------------------------------\n  //  knob factory — SVG arc + pointer, vertical drag\n  // ---------------------------------------------------------------\n  var SW = 270; // total sweep degrees\n\n  function makeKnob(p, idx){\n    var cell = document.createElement(\"div\");\n    cell.className = \"cell\";\n\n    var lbl = document.createElement(\"div\");\n    lbl.className = \"lbl\";\n    lbl.textContent = p.name;\n\n    var knob = document.createElement(\"div\");\n    knob.className = \"knob\";\n\n    knob.innerHTML =\n      '<svg viewBox=\"0 0 100 100\">' +\n        '<circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"rgba(154,208,224,.14)\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-dasharray=\"198 264\" transform=\"rotate(135 50 50)\"/>' +\n        '<circle class=\"arc\" cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"url(#kg'+idx+')\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-dasharray=\"0 264\" transform=\"rotate(135 50 50)\"/>' +\n        '<g class=\"body\">' +\n          '<circle cx=\"50\" cy=\"50\" r=\"30\" fill=\"#0c1a22\"/>' +\n          '<circle cx=\"50\" cy=\"50\" r=\"30\" fill=\"none\" stroke=\"rgba(255,255,255,.06)\" stroke-width=\"1\"/>' +\n          '<circle cx=\"50\" cy=\"46\" r=\"29\" fill=\"none\" stroke=\"rgba(255,255,255,.05)\" stroke-width=\"2\"/>' +\n        '<\/g>' +\n        '<g class=\"ptr\">' +\n          '<line x1=\"50\" y1=\"50\" x2=\"50\" y2=\"26\" stroke=\"#dff2f8\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>' +\n          '<circle cx=\"50\" cy=\"26\" r=\"2.6\" fill=\"#c0e0f0\"/>' +\n        '<\/g>' +\n        '<defs><linearGradient id=\"kg'+idx+'\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">' +\n          '<stop offset=\"0\" stop-color=\"#c0e0f0\"/><stop offset=\"1\" stop-color=\"#9ad0e0\"/>' +\n        '<\/linearGradient><\/defs>' +\n      '<\/svg>';\n\n    var val = document.createElement(\"div\");\n    val.className = \"val\";\n\n    cell.appendChild(lbl);\n    cell.appendChild(knob);\n    cell.appendChild(val);\n\n    var arc = knob.querySelector(\".arc\");\n    var ptr = knob.querySelector(\".ptr\");\n\n    function render(){\n      var v = state[idx];\n      var ang = -135 + v*SW;\n      ptr.setAttribute(\"transform\",\"rotate(\"+ang+\" 50 50)\");\n      arc.setAttribute(\"stroke-dasharray\", (v*198).toFixed(1)+\" 264\");\n      var f = p.fmt(v);\n      val.innerHTML = f.t + ' <small>'+f.u+'<\/small>';\n    }\n\n    // ---- drag handling ----\n    var dragging=false, startY=0, startV=0;\n    function onDown(e){\n      dragging=true;\n      startY = (e.touches? e.touches[0].clientY : e.clientY);\n      startV = state[idx];\n      knob.style.filter=\"brightness(1.18)\";\n      e.preventDefault();\n    }\n    function onMove(e){\n      if(!dragging) return;\n      var y = (e.touches? e.touches[0].clientY : e.clientY);\n      var dv = (startY - y)/200;            // 200px = full travel\n      var v = Math.max(0, Math.min(1, startV + dv));\n      state[idx]=v; render(); push(p.index, v);\n      e.preventDefault();\n    }\n    function onUp(){ dragging=false; knob.style.filter=\"\"; }\n\n    knob.addEventListener(\"mousedown\", onDown);\n    knob.addEventListener(\"touchstart\", onDown, {passive:false});\n    window.addEventListener(\"mousemove\", onMove);\n    window.addEventListener(\"touchmove\", onMove, {passive:false});\n    window.addEventListener(\"mouseup\", onUp);\n    window.addEventListener(\"touchend\", onUp);\n\n    // wheel fine-tune\n    knob.addEventListener(\"wheel\", function(e){\n      var v = Math.max(0,Math.min(1, state[idx] - Math.sign(e.deltaY)*0.02));\n      state[idx]=v; render(); push(p.index, v);\n      e.preventDefault();\n    }, {passive:false});\n\n    // double-click reset\n    knob.addEventListener(\"dblclick\", function(){\n      state[idx]=p.def; render(); push(p.index, p.def);\n    });\n\n    p._render = render;\n    return cell;\n  }\n\n  var rack = document.getElementById(\"rack\");\n  PARAMS.forEach(function(p, i){ rack.appendChild(makeKnob(p, i)); });\n\n  // ---------------------------------------------------------------\n  //  scope animation — spectrum + highlighted sibilant band + sss\n  // ---------------------------------------------------------------\n  var specEl  = document.getElementById(\"spec\");\n  var bandEl  = document.getElementById(\"band\");\n  var edgeL   = document.getElementById(\"bandEdgeL\");\n  var edgeR   = document.getElementById(\"bandEdgeR\");\n  var partG   = document.getElementById(\"particles\");\n  var duckTxt = document.getElementById(\"duckTxt\");\n  var led     = document.getElementById(\"led\");\n\n  var W=600, H=128, N=80;\n\n  // sss particle pool — little dashes that stream rightward into the band\n  var particles=[];\n  for(var i=0;i<14;i++){\n    var t=document.createElementNS(\"http://www.w3.org/2000/svg\",\"text\");\n    t.setAttribute(\"fill\",\"#c0e0f0\");\n    t.setAttribute(\"font-size\", (7+Math.random()*5).toFixed(0));\n    t.setAttribute(\"font-family\",\"ui-sans-serif,sans-serif\");\n    t.textContent=\"s\";\n    partG.appendChild(t);\n    particles.push({el:t, x:Math.random()*W, y:14+Math.random()*100, sp:0.8+Math.random()*1.4, base:0});\n  }\n\n  var phase=0;\n  var duckAmt=0;       // smoothed gain-reduction display 0..1\n\n  function bandX(){\n    // Frequency 0..1 maps centre 4..10kHz -> x along scope (log-ish feel)\n    var v = state[0];\n    var cx = 200 + v*320;          // band centre x\n    var halfW = 46;                 // visual band half-width\n    return { cx:cx, l:cx-halfW, r:cx+halfW };\n  }\n\n  function frame(){\n    if(document.hidden){ requestAnimationFrame(frame); return; }\n    phase += 0.045;\n\n    var b = bandX();\n    bandEl.setAttribute(\"x\", b.l.toFixed(1));\n    bandEl.setAttribute(\"width\", (b.r-b.l).toFixed(1));\n    edgeL.setAttribute(\"x1\", b.l.toFixed(1)); edgeL.setAttribute(\"x2\", b.l.toFixed(1));\n    edgeR.setAttribute(\"x1\", b.r.toFixed(1)); edgeR.setAttribute(\"x2\", b.r.toFixed(1));\n\n    // simulate sibilant energy: rises and falls; ducking responds to it\n    var sibDrive = 0.5 + 0.5*Math.sin(phase*1.7) * (0.6+0.4*Math.sin(phase*0.5));\n    var thr = state[1];                 // higher threshold -> harder to trigger\n    var over = Math.max(0, sibDrive - (0.25 + thr*0.6));\n    var targetDuck = Math.min(1, over*2.4) * state[2];   // scaled by Amount\n    targetDuck *= state[3];             // and by Mix\n    duckAmt += (targetDuck - duckAmt)*0.18;\n\n    // led + readout\n    if(duckAmt>0.04){ led.classList.add(\"on\"); } else { led.classList.remove(\"on\"); }\n    duckTxt.textContent = \"-\" + (duckAmt*24).toFixed(1) + \" dB\";\n\n    // build spectrum path: broadband hump + a sibilant peak inside the band\n    var d=\"M0 \"+H;\n    for(var k=0;k<=N;k++){\n      var x = k/N*W;\n      // base voice spectrum: energy tilts down with frequency\n      var nrm = x/W;\n      var voice = 0.55*Math.exp(-Math.pow((nrm-0.18)/0.16,2));   // body hump\n      var air   = 0.16*(1-nrm);\n      // sibilant peak sitting in the band, wobbling\n      var dist = (x - b.cx)/52;\n      var sib = sibDrive*0.7*Math.exp(-dist*dist);\n      // duck the sibilant peak when reducing\n      sib *= (1 - duckAmt*0.92);\n      var amp = voice + air + sib + 0.02*Math.sin(phase*3+ k*0.6);\n      var y = H - amp*H*0.92;\n      if(y<2)y=2; if(y>H)y=H;\n      d += \" L\"+x.toFixed(1)+\" \"+y.toFixed(1);\n    }\n    d += \" L\"+W+\" \"+H+\" Z\";\n    specEl.setAttribute(\"d\", d);\n\n    // animate sss particles: drift right, get \"caught\" (fade) in the band\n    for(var p=0;p<particles.length;p++){\n      var P=particles[p];\n      P.x += P.sp*(1.4 - duckAmt*0.9);\n      if(P.x>W){ P.x = -10; P.y = 14+Math.random()*100; }\n      var inBand = P.x > b.l && P.x < b.r;\n      var op;\n      if(inBand){\n        // caught & ducked: shrink + fade with reduction\n        op = 0.85*(1-duckAmt) + 0.05;\n        P.el.setAttribute(\"font-size\", (6 - duckAmt*3).toFixed(1));\n      } else {\n        op = 0.35;\n        P.el.setAttribute(\"font-size\",\"7\");\n      }\n      P.el.setAttribute(\"x\", P.x.toFixed(1));\n      P.el.setAttribute(\"y\", P.y.toFixed(1));\n      P.el.setAttribute(\"opacity\", op.toFixed(2));\n    }\n\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  // ---------------------------------------------------------------\n  //  init: render knobs + push defaults to engine\n  // ---------------------------------------------------------------\n  function start(){\n    PARAMS.forEach(function(p,i){\n      if(p._render) p._render();\n      push(p.index, state[i]);\n    });\n  }\n\n  if (window.vstai && window.vstai.onReady) {\n    window.vstai.onReady(start);\n  } else {\n    start();\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);

  function st(m){document.getElementById('st').textContent=m;}

  function draw(){

  function makeRiff(){

      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
