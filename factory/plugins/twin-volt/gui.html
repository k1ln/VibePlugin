<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twin Volt</title>
<style>
  :root {
    --accent:  #5ad0ff;   /* VCO 1 cyan */
    --accent2: #ff7a5a;   /* VCO 2 / ring orange */
    --bg0: #0b0e12;
    --bg1: #141a20;
    --silver0: #c7ced6;
    --silver1: #8b939c;
    --silver2: #5a626b;
    --ink: #e7edf3;
    --dim: #7c8893;
    --well: #05070a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: radial-gradient(120% 90% at 50% -10%, #1b232b 0%, var(--bg0) 60%, #05070a 100%);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    max-width: 880px;
    margin: 14px auto;
    padding: 16px 18px 20px;
    border-radius: 18px;
    /* brushed-silver chassis */
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.10)),
      repeating-linear-gradient(90deg, #20262d 0px, #262d35 2px, #20262d 4px),
      linear-gradient(180deg, #2a323b 0%, #171d23 100%);
    border: 1px solid #3a434d;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.10) inset,
      0 -2px 0 rgba(0,0,0,0.5) inset,
      0 24px 60px rgba(0,0,0,0.55);
    position: relative;
    overflow: hidden;
  }

  /* faint scanline shimmer over the whole face */
  .shell::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 3px);
    pointer-events: none;
    mix-blend-mode: screen;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 14px;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .bolt {
    width: 30px; height: 30px;
    filter: drop-shadow(0 0 6px rgba(90,208,255,0.6));
  }

  .title {
    font-weight: 800; font-size: 22px; letter-spacing: 3px;
    background: linear-gradient(180deg, #fff, var(--accent) 130%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub {
    font-size: 9.5px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--dim); margin-top: 2px;
  }

  .badge {
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid rgba(255,122,90,0.4);
    border-radius: 999px; padding: 5px 11px;
    background: rgba(255,122,90,0.07);
  }

  .body {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 16px;
  }
  @media (max-width: 720px) { .body { grid-template-columns: 1fr; } }

  .panel {
    border-radius: 14px;
    background: linear-gradient(180deg, #171d24, #0e1318);
    border: 1px solid #2c343d;
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 8px 22px rgba(0,0,0,0.4);
    padding: 14px;
  }

  .panel h2 {
    margin: 0 0 12px; font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--dim); font-weight: 700;
  }

  /* ============ OSCILLATOR + RING HALO ============ */
  .oscwrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }

  .halo {
    position: relative; width: 218px; height: 150px;
  }
  .halo svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  .ringGlow {
    position: absolute; left: 50%; top: 50%;
    width: 96px; height: 96px; transform: translate(-50%,-50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,122,90,0.55) 0%, rgba(90,208,255,0.22) 45%, transparent 70%);
    filter: blur(2px);
    animation: pulse 2.6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%,100% { transform: translate(-50%,-50%) scale(0.82); opacity: 0.55; }
    50%     { transform: translate(-50%,-50%) scale(1.10); opacity: 0.95; }
  }

  /* the metallic shimmer ring that intensifies with Ring amount */
  .shimmer {
    position: absolute; left: 50%; top: 50%;
    width: 70px; height: 70px; transform: translate(-50%,-50%) rotate(0deg);
    border-radius: 50%;
    border: 2px solid transparent;
    background:
      conic-gradient(from 0deg,
        var(--accent), #ffffff, var(--accent2), #ffffff, var(--accent)) border-box;
    -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: spin 6s linear infinite;
    opacity: 0.7;
    pointer-events: none;
  }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .oscsliders { display: flex; gap: 18px; justify-content: center; }

  .fader { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .fader .flabel { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }

  .track {
    position: relative; width: 30px; height: 122px;
    border-radius: 8px;
    background: linear-gradient(180deg, #04060a, #0b1016);
    box-shadow: 0 0 0 1px #2a323b inset, 0 2px 6px rgba(0,0,0,0.6) inset;
    cursor: ns-resize; touch-action: none;
  }
  .track .fill {
    position: absolute; left: 3px; right: 3px; bottom: 3px;
    border-radius: 6px;
    background: linear-gradient(180deg, var(--accent), rgba(90,208,255,0.15));
    box-shadow: 0 0 12px rgba(90,208,255,0.4);
  }
  .track.osc2 .fill {
    background: linear-gradient(180deg, var(--accent2), rgba(255,122,90,0.15));
    box-shadow: 0 0 12px rgba(255,122,90,0.4);
  }
  .cap {
    position: absolute; left: -4px; right: -4px; height: 16px;
    transform: translateY(-50%);
    border-radius: 5px;
    background: linear-gradient(180deg, var(--silver0), var(--silver2));
    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset, 0 -2px 3px rgba(0,0,0,0.5) inset, 0 4px 8px rgba(0,0,0,0.6);
    border: 1px solid #3a434d;
    transition: box-shadow 0.12s;
  }
  .track:hover .cap, .track.drag .cap {
    box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 -2px 3px rgba(0,0,0,0.5) inset, 0 0 14px var(--accent);
  }
  .track.osc2:hover .cap, .track.osc2.drag .cap {
    box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 -2px 3px rgba(0,0,0,0.5) inset, 0 0 14px var(--accent2);
  }
  .fval { font-size: 10px; color: var(--ink); font-variant-numeric: tabular-nums; }

  /* ============ KNOBS ============ */
  .knobgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 10px;
  }
  .knob { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .knob svg { cursor: ns-resize; touch-action: none; display: block; }
  .klabel { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); }
  .kval { font-size: 11px; color: var(--ink); font-variant-numeric: tabular-nums; font-weight: 600; }

  .arc { transition: stroke 0.15s; }
  .knob:hover .arc { filter: drop-shadow(0 0 4px currentColor); }

  /* ============ KEYBOARD ============ */
  .kbwrap { margin-top: 16px; }
  .keys {
    position: relative; height: 92px; display: flex;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5), 0 0 0 1px #2c343d;
    user-select: none;
  }
  .wkey {
    position: relative; flex: 1;
    background: linear-gradient(180deg, #f2f5f8, #cdd4db);
    border-right: 1px solid #aab2bb;
    cursor: pointer;
  }
  .wkey:last-child { border-right: none; }
  .wkey.on { background: linear-gradient(180deg, var(--accent), #2a9fce); }
  .bkey {
    position: absolute; top: 0; width: 58%; height: 60%;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #2a323b, #0c1116);
    border-radius: 0 0 4px 4px;
    box-shadow: 0 3px 5px rgba(0,0,0,0.6);
    cursor: pointer; z-index: 2;
  }
  .bkey.on { background: linear-gradient(180deg, var(--accent2), #b5462f); }

  .footnote { margin-top: 9px; font-size: 9px; color: var(--silver2); letter-spacing: 1.5px; text-align: center; }
</style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <svg class="bolt" viewBox="0 0 24 24" fill="none">
          <path d="M13 2 4 14h6l-2 8 10-13h-6l1-7z" fill="url(#bg)"/>
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="0" y2="24">
              <stop offset="0" stop-color="#5ad0ff"/>
              <stop offset="1" stop-color="#ff7a5a"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <div class="title">TWIN&nbsp;VOLT</div>
          <div class="sub">Dual&nbsp;VCO&nbsp;·&nbsp;Ring&nbsp;Mod&nbsp;·&nbsp;Mono</div>
        </div>
      </div>
      <div class="badge">Analog&nbsp;Mono&nbsp;Synth</div>
    </header>

    <div class="body">
      <!-- LEFT: dual oscillators + ring halo -->
      <div class="panel">
        <h2>Oscillators · Ring</h2>
        <div class="oscwrap">
          <div class="halo">
            <div class="ringGlow"></div>
            <div class="shimmer" id="shimmer"></div>
            <svg viewBox="0 0 218 150" preserveAspectRatio="none">
              <path id="wave1" fill="none" stroke="#5ad0ff" stroke-width="2" opacity="0.9"/>
              <path id="wave2" fill="none" stroke="#ff7a5a" stroke-width="2" opacity="0.9"/>
              <path id="waveR" fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.5"/>
            </svg>
          </div>
          <div class="oscsliders">
            <div class="fader">
              <div class="flabel" style="color:#5ad0ff">VCO 1 ▲</div>
              <div class="track" id="t-osc1" data-min="60" data-max="11000">
                <div class="fill" id="f-osc1"></div>
                <div class="cap" id="c-osc1"></div>
              </div>
              <div class="fval" id="v-osc1">—</div>
            </div>
            <div class="fader">
              <div class="flabel" style="color:#ff7a5a">VCO 2 ◼</div>
              <div class="track osc2" id="t-osc2" data-min="0" data-max="0.6">
                <div class="fill" id="f-osc2"></div>
                <div class="cap" id="c-osc2"></div>
              </div>
              <div class="fval" id="v-osc2">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: filter + voice knobs -->
      <div class="panel">
        <h2>Filter · Voice</h2>
        <div class="knobgrid" id="knobgrid"></div>
      </div>
    </div>

    <!-- KEYBOARD -->
    <div class="panel kbwrap">
      <div class="keys" id="keys"></div>
      <div class="footnote">Drag controls vertically · double-click to reset · play the keys</div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ---- host bridge ---------------------------------------------------
  var host = {
    set: function (i, v) { try { if (window.vstai && window.vstai.setParam) window.vstai.setParam(i, v); } catch (e) {} },
    on:  function (n, vel) { try { if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(n, vel); } catch (e) {} },
    off: function (n) { try { if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(n); } catch (e) {} }
  };

  // Param map (indices MUST match assembly.ts)
  // Cutoff/Detune are surfaced as the two faders (real engineering values);
  // the rest are knobs. Faders 0..1 internally but show mapped readouts.
  var P = {
    CUTOFF: 0, RESO: 1, ENVAMT: 2, RING: 3, DETUNE: 4, DECAY: 5, LEVEL: 6
  };
  var defaults = [0.45, 0.40, 0.60, 0.30, 0.30, 0.45, 0.80];

  // each param's normalised 0..1 current value
  var vals = defaults.slice();

  function pushAll() { for (var i = 0; i < vals.length; i++) host.set(i, vals[i]); }

  // ====================================================================
  //  FADERS — VCO1 = Cutoff, VCO2 = Detune
  // ====================================================================
  function fmtHz(hz) { return hz >= 1000 ? (hz / 1000).toFixed(2) + " kHz" : Math.round(hz) + " Hz"; }

  function setupFader(trackId, fillId, capId, valId, idx, fmt) {
    var track = document.getElementById(trackId);
    var fill = document.getElementById(fillId);
    var cap = document.getElementById(capId);
    var valEl = document.getElementById(valId);

    function render() {
      var n = vals[idx];
      var h = track.clientHeight;
      var usable = h - 6;
      var px = 3 + (1 - n) * usable;       // cap centre from top
      cap.style.top = px + "px";
      fill.style.height = (n * usable) + "px";
      valEl.textContent = fmt(n);
    }

    function fromEvent(e) {
      var r = track.getBoundingClientRect();
      var y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      var n = 1 - (y - 3) / (r.height - 6);
      vals[idx] = Math.max(0, Math.min(1, n));
      host.set(idx, vals[idx]);
      render();
    }

    var dragging = false;
    function down(e) { dragging = true; track.classList.add("drag"); fromEvent(e); e.preventDefault(); }
    function move(e) { if (dragging) fromEvent(e); }
    function up() { dragging = false; track.classList.remove("drag"); }

    track.addEventListener("mousedown", down);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    track.addEventListener("touchstart", down, { passive: false });
    track.addEventListener("touchmove", move, { passive: false });
    track.addEventListener("touchend", up);
    track.addEventListener("dblclick", function () {
      vals[idx] = defaults[idx]; host.set(idx, vals[idx]); render();
    });

    return render;
  }

  var cutoffFmt = function (n) {
    var hz = 60 * Math.pow(183, n);   // mirrors the DSP mapping
    return fmtHz(hz);
  };
  var detuneFmt = function (n) {
    var cents = n * 0.6 * 100;        // up to ~60 cents
    return "+" + cents.toFixed(0) + " ¢";
  };

  var renderOsc1 = setupFader("t-osc1", "f-osc1", "c-osc1", "v-osc1", P.CUTOFF, cutoffFmt);
  var renderOsc2 = setupFader("t-osc2", "f-osc2", "c-osc2", "v-osc2", P.DETUNE, detuneFmt);

  // ====================================================================
  //  KNOBS — Resonance, Env Amount, Ring, Decay, Level
  // ====================================================================
  var knobDefs = [
    { idx: P.RESO,   label: "Reso",     color: "#5ad0ff", fmt: function (n) { return Math.round(n * 100) + "%"; } },
    { idx: P.ENVAMT, label: "Env Amt",  color: "#9fe6ff", fmt: function (n) { return Math.round(n * 100) + "%"; } },
    { idx: P.RING,   label: "Ring",     color: "#ff7a5a", fmt: function (n) { return Math.round(n * 100) + "%"; } },
    { idx: P.DECAY,  label: "Decay",    color: "#ffb199", fmt: function (n) { var s = 0.04 + n * n * 2.2; return s.toFixed(2) + "s"; } },
    { idx: P.LEVEL,  label: "Level",    color: "#e7edf3", fmt: function (n) { var db = n <= 0 ? -60 : 20 * Math.log10(n * 1.4); return (db > 0 ? "+" : "") + db.toFixed(1) + " dB"; } }
  ];

  var KNOB_R = 26, KNOB_CX = 30, KNOB_CY = 30;
  var A0 = 135, A1 = 405;   // sweep degrees (270deg arc, gap at bottom)

  function polar(cx, cy, r, deg) {
    var rad = (deg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }
  function arcPath(cx, cy, r, a0, a1) {
    var p0 = polar(cx, cy, r, a0), p1 = polar(cx, cy, r, a1);
    var large = (a1 - a0) > 180 ? 1 : 0;
    return "M" + p0[0].toFixed(2) + " " + p0[1].toFixed(2) +
           " A" + r + " " + r + " 0 " + large + " 1 " + p1[0].toFixed(2) + " " + p1[1].toFixed(2);
  }

  var grid = document.getElementById("knobgrid");
  var knobRenderers = [];

  knobDefs.forEach(function (def) {
    var wrap = document.createElement("div");
    wrap.className = "knob";

    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "60"); svg.setAttribute("height", "60");
    svg.setAttribute("viewBox", "0 0 60 60");

    function mk(tag, attrs) {
      var el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (var k in attrs) el.setAttribute(k, attrs[k]);
      return el;
    }

    // outer silver body
    svg.appendChild(mk("circle", { cx: 30, cy: 30, r: 24, fill: "#11161c", stroke: "#3a434d", "stroke-width": 1.5 }));
    svg.appendChild(mk("circle", { cx: 30, cy: 29, r: 17, fill: "#1c232b", stroke: "#444d57", "stroke-width": 1 }));
    // track arc
    svg.appendChild(mk("path", { d: arcPath(KNOB_CX, KNOB_CY, KNOB_R, A0, A1), fill: "none", stroke: "#222a32", "stroke-width": 4, "stroke-linecap": "round" }));
    // value arc
    var arc = mk("path", { d: "", fill: "none", stroke: def.color, "stroke-width": 4, "stroke-linecap": "round" });
    arc.setAttribute("class", "arc");
    svg.appendChild(arc);
    // pointer
    var ptr = mk("line", { x1: 30, y1: 30, x2: 30, y2: 16, stroke: def.color, "stroke-width": 2.5, "stroke-linecap": "round" });
    svg.appendChild(ptr);
    svg.appendChild(mk("circle", { cx: 30, cy: 30, r: 3, fill: "#e7edf3" }));

    var label = document.createElement("div"); label.className = "klabel"; label.textContent = def.label;
    var valEl = document.createElement("div"); valEl.className = "kval"; valEl.style.color = def.color;

    wrap.appendChild(svg); wrap.appendChild(valEl); wrap.appendChild(label);
    grid.appendChild(wrap);
    wrap.style.color = def.color; // for hover glow

    function render() {
      var n = vals[def.idx];
      var ang = A0 + (A1 - A0) * n;
      arc.setAttribute("d", arcPath(KNOB_CX, KNOB_CY, KNOB_R, A0, ang));
      var p = polar(30, 30, 13, ang);
      ptr.setAttribute("x2", p[0].toFixed(2));
      ptr.setAttribute("y2", p[1].toFixed(2));
      valEl.textContent = def.fmt(n);
    }
    knobRenderers.push(render);

    // drag interaction
    var dragging = false, lastY = 0;
    function down(e) { dragging = true; lastY = (e.touches ? e.touches[0].clientY : e.clientY); e.preventDefault(); }
    function move(e) {
      if (!dragging) return;
      var y = (e.touches ? e.touches[0].clientY : e.clientY);
      var dy = lastY - y; lastY = y;
      vals[def.idx] = Math.max(0, Math.min(1, vals[def.idx] + dy / 180));
      host.set(def.idx, vals[def.idx]); render();
    }
    function up() { dragging = false; }

    svg.addEventListener("mousedown", down);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    svg.addEventListener("touchstart", down, { passive: false });
    svg.addEventListener("touchmove", move, { passive: false });
    svg.addEventListener("touchend", up);
    svg.addEventListener("dblclick", function () {
      vals[def.idx] = defaults[def.idx]; host.set(def.idx, vals[def.idx]); render();
    });
    svg.addEventListener("wheel", function (e) {
      e.preventDefault();
      vals[def.idx] = Math.max(0, Math.min(1, vals[def.idx] - Math.sign(e.deltaY) * 0.02));
      host.set(def.idx, vals[def.idx]); render();
    }, { passive: false });

    render();
  });

  // ====================================================================
  //  WAVE / RING ANIMATION in the halo
  // ====================================================================
  var w1 = document.getElementById("wave1");
  var w2 = document.getElementById("wave2");
  var wR = document.getElementById("waveR");
  var shimmer = document.getElementById("shimmer");
  var t0 = performance.now();

  function buildWave(phase, kind, amp, yOff, detune) {
    var pts = [];
    var W = 218, N = 64;
    for (var i = 0; i <= N; i++) {
      var x = (i / N) * W;
      var u = (i / N) * Math.PI * 2 * 3 + phase;   // 3 cycles
      var s;
      if (kind === "saw") {
        var fr = ((u / (Math.PI * 2)) % 1 + 1) % 1;
        s = fr * 2 - 1;
      } else { // pulse
        s = (Math.sin(u * detune) >= 0) ? 1 : -1;
      }
      pts.push(x.toFixed(1) + "," + (yOff - s * amp).toFixed(1));
    }
    return "M" + pts.join(" L");
  }

  function animate(now) {
    if (document.hidden) { requestAnimationFrame(animate); return; }
    var t = (now - t0) / 1000;
    var ph = t * 2.2;

    var ring = vals[P.RING];
    var det = 1 + vals[P.DETUNE] * 0.6;

    w1.setAttribute("d", buildWave(ph, "saw", 26, 45, 1));
    w2.setAttribute("d", buildWave(ph * 0.97, "pulse", 22, 105, det));

    // ring product wave through the middle, brighter with Ring amount
    var pts = [];
    for (var i = 0; i <= 64; i++) {
      var x = (i / 64) * 218;
      var u = (i / 64) * Math.PI * 2 * 3 + ph;
      var fr = ((u / (Math.PI * 2)) % 1 + 1) % 1;
      var saw = fr * 2 - 1;
      var pul = (Math.sin(u * det) >= 0) ? 1 : -1;
      var r = saw * pul;
      pts.push(x.toFixed(1) + "," + (75 - r * (10 + ring * 22)).toFixed(1));
    }
    wR.setAttribute("d", "M" + pts.join(" L"));
    wR.setAttribute("opacity", (0.25 + ring * 0.6).toFixed(2));
    wR.setAttribute("stroke-width", (1 + ring * 1.8).toFixed(2));

    // shimmer intensity tracks Ring
    shimmer.style.opacity = (0.25 + ring * 0.65).toFixed(2);
    shimmer.style.filter = "drop-shadow(0 0 " + (2 + ring * 10).toFixed(1) + "px rgba(255,170,120," + (0.3 + ring * 0.5).toFixed(2) + "))";

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ====================================================================
  //  KEYBOARD
  // ====================================================================
  var keysEl = document.getElementById("keys");
  var WHITE = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 17, 19, 21, 23, 24];
  var BASE = 36; // C2 — bass register suits a fat mono
  var whiteEls = [];

  WHITE.forEach(function (semi, i) {
    var k = document.createElement("div");
    k.className = "wkey";
    k.dataset.note = BASE + semi;
    keysEl.appendChild(k);
    whiteEls.push(k);
  });

  // black keys positioned over the gaps
  var BLACK = [1, 3, 6, 8, 10, 13, 15, 18, 20, 22]; // semitone offsets that have a sharp
  // map: which white index each black sits after
  var blackAfter = [0, 1, 3, 4, 5, 7, 8, 10, 11, 12];
  BLACK.forEach(function (semi, i) {
    var b = document.createElement("div");
    b.className = "bkey";
    b.dataset.note = BASE + semi;
    var wi = blackAfter[i];
    var pct = ((wi + 1) / WHITE.length) * 100;
    b.style.left = pct + "%";
    keysEl.appendChild(b);
  });

  var down = {};
  function noteOn(el) {
    var n = +el.dataset.note;
    if (down[n]) return;
    down[n] = true; el.classList.add("on");
    host.on(n, 0.9);
  }
  function noteOff(el) {
    var n = +el.dataset.note;
    if (!down[n]) return;
    down[n] = false; el.classList.remove("on");
    host.off(n);
  }

  function bindKey(el) {
    el.addEventListener("mousedown", function (e) { noteOn(el); e.preventDefault(); });
    el.addEventListener("mouseenter", function (e) { if (e.buttons === 1) noteOn(el); });
    el.addEventListener("mouseup", function () { noteOff(el); });
    el.addEventListener("mouseleave", function () { noteOff(el); });
    el.addEventListener("touchstart", function (e) { noteOn(el); e.preventDefault(); }, { passive: false });
    el.addEventListener("touchend", function (e) { noteOff(el); e.preventDefault(); }, { passive: false });
  }
  Array.prototype.forEach.call(keysEl.children, bindKey);

  // ====================================================================
  //  INIT
  // ====================================================================
  function boot() {
    renderOsc1(); renderOsc2();
    knobRenderers.forEach(function (r) { r(); });
    pushAll();
  }

  if (window.vstai && window.vstai.onReady) {
    window.vstai.onReady(boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
