  <title>Twin Volt — test bench</title><style>
  :root{--ac:#5ad0ff}

    box-shadow:0 16px 40px rgba(0,0,0,.4)}

  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Twin Volt<\/title>\n<style>\n  :root {\n    --accent:  #5ad0ff;   /* VCO 1 cyan */\n    --accent2: #ff7a5a;   /* VCO 2 / ring orange */\n    --bg0: #0b0e12;\n    --bg1: #141a20;\n    --silver0: #c7ced6;\n    --silver1: #8b939c;\n    --silver2: #5a626b;\n    --ink: #e7edf3;\n    --dim: #7c8893;\n    --well: #05070a;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background: radial-gradient(120% 90% at 50% -10%, #1b232b 0%, var(--bg0) 60%, #05070a 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .shell {\n    max-width: 880px;\n    margin: 14px auto;\n    padding: 16px 18px 20px;\n    border-radius: 18px;\n    /* brushed-silver chassis */\n    background:\n      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.10)),\n      repeating-linear-gradient(90deg, #20262d 0px, #262d35 2px, #20262d 4px),\n      linear-gradient(180deg, #2a323b 0%, #171d23 100%);\n    border: 1px solid #3a434d;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.10) inset,\n      0 -2px 0 rgba(0,0,0,0.5) inset,\n      0 24px 60px rgba(0,0,0,0.55);\n    position: relative;\n    overflow: hidden;\n  }\n\n  /* faint scanline shimmer over the whole face */\n  .shell::after {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 3px);\n    pointer-events: none;\n    mix-blend-mode: screen;\n  }\n\n  header {\n    display: flex; align-items: center; justify-content: space-between;\n    gap: 16px; margin-bottom: 14px;\n  }\n\n  .brand { display: flex; align-items: center; gap: 12px; }\n\n  .bolt {\n    width: 30px; height: 30px;\n    filter: drop-shadow(0 0 6px rgba(90,208,255,0.6));\n  }\n\n  .title {\n    font-weight: 800; font-size: 22px; letter-spacing: 3px;\n    background: linear-gradient(180deg, #fff, var(--accent) 130%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n  }\n  .sub {\n    font-size: 9.5px; letter-spacing: 4px; text-transform: uppercase;\n    color: var(--dim); margin-top: 2px;\n  }\n\n  .badge {\n    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;\n    color: var(--accent2);\n    border: 1px solid rgba(255,122,90,0.4);\n    border-radius: 999px; padding: 5px 11px;\n    background: rgba(255,122,90,0.07);\n  }\n\n  .body {\n    display: grid;\n    grid-template-columns: 250px 1fr;\n    gap: 16px;\n  }\n  @media (max-width: 720px) { .body { grid-template-columns: 1fr; } }\n\n  .panel {\n    border-radius: 14px;\n    background: linear-gradient(180deg, #171d24, #0e1318);\n    border: 1px solid #2c343d;\n    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 8px 22px rgba(0,0,0,0.4);\n    padding: 14px;\n  }\n\n  .panel h2 {\n    margin: 0 0 12px; font-size: 10px; letter-spacing: 3px;\n    text-transform: uppercase; color: var(--dim); font-weight: 700;\n  }\n\n  /* ============ OSCILLATOR + RING HALO ============ */\n  .oscwrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }\n\n  .halo {\n    position: relative; width: 218px; height: 150px;\n  }\n  .halo svg { position: absolute; inset: 0; width: 100%; height: 100%; }\n\n  .ringGlow {\n    position: absolute; left: 50%; top: 50%;\n    width: 96px; height: 96px; transform: translate(-50%,-50%);\n    border-radius: 50%;\n    background: radial-gradient(circle, rgba(255,122,90,0.55) 0%, rgba(90,208,255,0.22) 45%, transparent 70%);\n    filter: blur(2px);\n    animation: pulse 2.6s ease-in-out infinite;\n    pointer-events: none;\n  }\n  @keyframes pulse {\n    0%,100% { transform: translate(-50%,-50%) scale(0.82); opacity: 0.55; }\n    50%     { transform: translate(-50%,-50%) scale(1.10); opacity: 0.95; }\n  }\n\n  /* the metallic shimmer ring that intensifies with Ring amount */\n  .shimmer {\n    position: absolute; left: 50%; top: 50%;\n    width: 70px; height: 70px; transform: translate(-50%,-50%) rotate(0deg);\n    border-radius: 50%;\n    border: 2px solid transparent;\n    background:\n      conic-gradient(from 0deg,\n        var(--accent), #ffffff, var(--accent2), #ffffff, var(--accent)) border-box;\n    -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);\n    -webkit-mask-composite: xor; mask-composite: exclude;\n    animation: spin 6s linear infinite;\n    opacity: 0.7;\n    pointer-events: none;\n  }\n  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }\n\n  .oscsliders { display: flex; gap: 18px; justify-content: center; }\n\n  .fader { display: flex; flex-direction: column; align-items: center; gap: 7px; }\n  .fader .flabel { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }\n\n  .track {\n    position: relative; width: 30px; height: 122px;\n    border-radius: 8px;\n    background: linear-gradient(180deg, #04060a, #0b1016);\n    box-shadow: 0 0 0 1px #2a323b inset, 0 2px 6px rgba(0,0,0,0.6) inset;\n    cursor: ns-resize; touch-action: none;\n  }\n  .track .fill {\n    position: absolute; left: 3px; right: 3px; bottom: 3px;\n    border-radius: 6px;\n    background: linear-gradient(180deg, var(--accent), rgba(90,208,255,0.15));\n    box-shadow: 0 0 12px rgba(90,208,255,0.4);\n  }\n  .track.osc2 .fill {\n    background: linear-gradient(180deg, var(--accent2), rgba(255,122,90,0.15));\n    box-shadow: 0 0 12px rgba(255,122,90,0.4);\n  }\n  .cap {\n    position: absolute; left: -4px; right: -4px; height: 16px;\n    transform: translateY(-50%);\n    border-radius: 5px;\n    background: linear-gradient(180deg, var(--silver0), var(--silver2));\n    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset, 0 -2px 3px rgba(0,0,0,0.5) inset, 0 4px 8px rgba(0,0 80deg, var(--accent2), #b5462f); }\n\n  .footnote { margin-top: 9px; font-size: 9px; color: var(--silver2); letter-spacing: 1.5px; text-align: center; }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"shell\">\n    <header>\n      <div class=\"brand\">\n        <svg class=\"bolt\" viewBox=\"0 0 24 24\" fill=\"none\">\n          <path d=\"M13 2 4 14h6l-2 8 10-13h-6l1-7z\" fill=\"url(#bg)\"/>\n          <defs>\n            <linearGradient id=\"bg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"24\">\n              <stop offset=\"0\" stop-color=\"#5ad0ff\"/>\n              <stop offset=\"1\" stop-color=\"#ff7a5a\"/>\n            <\/linearGradient>\n          <\/defs>\n        <\/svg>\n        <div>\n          <div class=\"title\">TWIN&nbsp;VOLT<\/div>\n          <div class=\"sub\">Dual&nbsp;VCO&nbsp;·&nbsp;Ring&nbsp;Mod&nbsp;·&nbsp;Mono<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"badge\">Analog&nbsp;Mono&nbsp;Synth<\/div>\n    <\/header>\n\n    <div class=\"body\">\n      <!-- LEFT: dual oscillators + ring halo -->\n      <div class=\"panel\">\n        <h2>Oscillators · Ring<\/h2>\n        <div class=\"oscwrap\">\n          <div class=\"halo\">\n            <div class=\"ringGlow\"><\/div>\n            <div class=\"shimmer\" id=\"shimmer\"><\/div>\n            <svg viewBox=\"0 0 218 150\" preserveAspectRatio=\"none\">\n              <path id=\"wave1\" fill=\"none\" stroke=\"#5ad0ff\" stroke-width=\"2\" opacity=\"0.9\"/>\n              <path id=\"wave2\" fill=\"none\" stroke=\"#ff7a5a\" stroke-width=\"2\" opacity=\"0.9\"/>\n              <path id=\"waveR\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"1.4\" opacity=\"0.5\"/>\n            <\/svg>\n          <\/div>\n          <div class=\"oscsliders\">\n            < ;\n    track.addEventListener(\"touchmove\", move, { passive: false });\n    track.addEventListener(\"touchend\", up);\n    track.addEventListener(\"dblclick\", function () {\n      vals[idx] = defaults[idx]; host.set(idx, vals[idx]); render();\n    });\n\n    return render;\n  }\n\n  var cutoffFmt = function (n) {\n    var hz = 60 * Math.pow(183, n);   // mirrors the DSP mapping\n    return fmtHz(hz);\n  };\n  var detuneFmt = function (n) {\n    var cents = n * 0.6 * 100;        // up to ~60 cents\n    return \"+\" + cents.toFixed(0) + \" ¢\";\n  };\n\n  var renderOsc1 = setupFader(\"t-osc1\", \"f-osc1\", \"c-osc1\", \"v-osc1\", P.CUTOFF, cutoffFmt);\n  var renderOsc2 = setupFader(\"t-osc2\", \"f-osc2\", \"c-osc2\", \"v-osc2\", P.DETUNE, detuneFmt);\n\n  // ====================================================================\n  //  KNOBS — Resonance, Env Amount, Ring, Decay, Level\n  // ====================================================================\n  var knobDefs = [\n    { idx: P.RESO,   label: \"Reso\",     color: \"#5ad0ff\", fmt: function (n) { return Math.round(n * 100) + \"%\"; } },\n    { idx: P.ENVAMT, label: \"Env Amt\",  color: \"#9fe6ff\", fmt: function (n) { return Math.round(n * 100) + \"%\"; } },\n    { idx: P.RING,   label: \"Ring\",     color: \"#ff7a5a\", fmt: function (n) { return Math.round(n * 100) + \"%\"; } },\n    { idx: P.DECAY,  label: \"Decay\",    color: \"#ffb199\", fmt: function (n) { var s = 0.04 + n * n * 2.2; return s.toFixed(2) + \"s\"; } },\n    { idx: P.LEVEL,  label: \"Level\",    color: \"#e7edf3\", fmt: function (n) { var db = n <= 0 ? -60 : 20 * Math.log10(n * 1.4); return (db > 0 ? \"+\" : \"\") + db.toFixed(1) + \" dB\"; } }\n  ];\n\n  var KNOB_R = 26, KNOB_CX = 30, KNOB_CY = 30;\n  var A0 = 135, A1 = 405;   // sweep degrees (270deg arc, gap at bottom)\n\n  function polar(cx, cy, r, deg) {\n    var rad = (deg - 90) * Math.PI / 180;\n    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];\n  }\n  function arcPath(cx, cy, r, a0, a1) {\n    var p0 = polar(cx, cy, r, a0), p1 = polar(cx, cy, r, a1);\n    var large = (a1 - a0) > 180 ? 1 : 0;\n    return \"M\" + p0[0].toFixed(2) + \" \" + p0[1].toFixed(2) +\n           \" A\" + r + \" \" + r + \" 0 \" + large + \" 1 \" + p1[0].toFixed(2) + \" \" + p1[1].toFixed(2);\n  }\n\n  var grid = document.getElementById(\"knobgrid\");\n  var knobRenderers = [];\n\n  knobDefs.forEach(function (def) {\n    var wrap = document.createElement(\"div\");\n    wrap.className = \"knob\";\n\n    var svg = document.createElementNS(\"http://www.w3.org/2000/svg\", \"svg\");\n    svg.setAttribute(\"width\", \"60\"); svg.setAttribute(\"height\", \"60\");\n    svg.setAttribute(\"viewBox\", \"0 0 60 60\");\n\n    function mk(tag, attrs) {\n      var el = document.createElementNS(\"http://www.w3.org/2000/svg\", tag);\n      for (var k in attrs) el.setAttribute(k, attrs[k]);\n      return el;\n    }\n\n    // outer silver body\n    svg.appendChild(mk(\"circle\", { cx: 30, cy: 30, r: 24, fill: \"#11161c\", stroke: \"#3a434d\", \"stroke-width\": 1.5 }));\n    svg.appendChild(mk(\"circle\", { cx: 30, cy: 29, r: 17, fill: \"#1c232b\", stroke: \"#444d57\", \"stroke-width\": 1 }));\n    // track arc\n    svg.appendChild(mk(\"path\", { d: arcPath(KNOB_CX, KNOB_CY, KNOB_R, A0, A1), fill: \"none\", stroke: \"#222a32\", \"stroke-width\": 4, \"stroke-linecap\": \"round\" }));\n    // value arc\n    var arc = mk(\"path\", { d: \"\", fill: \"none\", stroke: def.color, \"stroke-width\": 4, \"stroke-linecap\": \"round\" });\n    arc.setAttribute(\"class\", \"arc\");\n    svg.appendChild(arc);\n    // pointer\n    var ptr = mk(\"line\", { x1: 30, y1: 30, x2: 30, y2: 16, stroke: def.color, \"stroke-width\": 2.5, \"stroke-linecap\": \"round\" });\n    svg.appendChild(ptr);\n    svg.appendChild(mk(\"circle\", { cx: 30, cy: 30, r: 3, fill: \"#e7edf3\" }));\n\n    var label = document.createElement(\"div\"); label.className = \"klabel\"; label.textContent = def.label;\n    var valEl = document.createElement(\"div\"); valEl.className = \"kval\"; valEl.style.color = def.color;\n\n    wrap.appendChild(svg); wrap.appendChild(valEl); wrap.appendChild(label);\n    grid.appendChild(wrap);\n    wrap.style.color = def.color; // for hover glow\n\n    function render() {\n      var n = vals[def.idx];\n      var ang = A0 + (A1 - A0) * n;\n      arc.setAttribute(\"d\", arcPath(KNOB_CX, KNOB_CY, KNOB_R, A0, ang));\n      var p = polar(30, 30, 13, ang);\n      ptr.setAttribute(\"x2\", p[0].toFixed(2));\n      ptr.setAttribute(\"y2\", p[1].toFixed(2));\n      valEl.textContent = def.fmt(n);\n    }\n    knobRenderers.push(render);\n\n    // drag interaction\n    var dragging = false, lastY = 0;\n    function down(e) { dragging = true; lastY = (e.touches ? e.touches[0].clientY : e.clientY); e.preventDefault(); }\n    function move(e) {\n      if (!dragging) return;\n      var y = (e.touches ? e.touches[0].clientY : e.clientY);\n      var dy = lastY - y; lastY = y;\n      vals[def.idx] = Math.max(0, Math.min(1, vals[def.idx] + dy / 180));\n      host.set(def.idx, vals[def.idx]); render();\n    }\n    function up() { dragging = false; }\n\n    svg.addEventListener(\"mousedown\", down);\n    window.addEventListener(\"mousemove\", move);\n    window.addEventListener(\"mouseup\", up);\n    svg.addEventListener(\"touchstart\", down, { passive: false });\n    svg.addEventListener(\"touchmove\", move, { passive: false });\n    svg.addEventListener(\"touchend\", up);\n    svg.addEventListener(\"dblclick\", function () {\n      vals[def.idx] = defaults[def.idx]; host.set(def.idx, vals[def.idx]); render();\n    });\n    svg.addEventListener(\"wheel\", function (e) {\n      e.preventDefault();\n      vals[def.idx] = Math.max(0, Math.min(1, vals[def.idx] - Math.sign(e.deltaY) * 0.02));\n      host.set(def.idx, vals[def.idx]); render();\n    }, { passive: false });\n\n    render();\n  });\n\n  // ====================================================================\n  //  WAVE / RING ANIMATION in the halo\n  // ====================================================================\n  var w1 = document.getElementById(\"wave1\");\n  var w2 = document.getElementById(\"wave2\");\n  var wR = document.getElementById(\"waveR\");\n  var shimmer = document.getElementById(\"shimmer\");\n  var t0 = performance.now();\n\n  function buildWave(phase, kind, amp, yOff, detune) {\n    var pts = [];\n    var W = 218, N = 64;\n    for (var i = 0; i <= N; i++) {\n      var x = (i / N) * W;\n      var u = (i / N) * Math.PI * 2 * 3 + phase;   // 3 cycles\n      var s;\n      if (kind === \"saw\") {\n        var fr = ((u / (Math.PI * 2)) % 1 + 1) % 1;\n        s = fr * 2 - 1;\n      } else { // pulse\n        s = (Math.sin(u * detune) >= 0) ? 1 : -1;\n      }\n      pts.push(x.toFixed(1) + \",\" + (yOff - s * amp).toFixed(1));\n    }\n    return \"M\" + pts.join(\" L\");\n  }\n\n  function animate(now) {\n    if (document.hidden) { requestAnimationFrame(animate); return; }\n    var t = (now - t0) / 1000;\n    var ph = t * 2.2;\n\n    var ring = vals[P.RING];\n    var det = 1 + vals[P.DETUNE] * 0.6;\n\n    w1.setAttribute(\"d\", buildWave(ph, \"saw\", 26, 45, 1));\n    w2.setAttribute(\"d\", buildWave(ph * 0.97, \"pulse\", 22, 105, det));\n\n    // ring product wave through the middle, brighter with Ring amount\n    var pts = [];\n    for (var i = 0; i <= 64; i++) {\n      var x = (i / 64) * 218;\n      var u = (i / 64) * Math.PI * 2 * 3 + ph;\n      var fr = ((u / (Math.PI * 2)) % 1 + 1) % 1;\n      var saw = fr * 2 - 1;\n      var pul = (Math.sin(u * det) >= 0) ? 1 : -1;\n      var r = saw * pul;\n      pts.push(x.toFixed(1) + \",\" + (75 - r * (10 + ring * 22)).toFixed(1));\n    }\n    wR.setAttribute(\"d\", \"M\" + pts.join(\" L\"));\n    wR.setAttribute(\"opacity\", (0.25 + ring * 0.6).toFixed(2));\n    wR.setAttribute(\"stroke-width\", (1 + ring * 1.8).toFixed(2));\n\n    // shimmer intensity tracks Ring\n    shimmer.style.opacity = (0.25 + ring * 0.65).toFixed(2);\n    shimmer.style.filter = \"drop-shadow(0 0 \" + (2 + ring * 10).toFixed(1) + \"px rgba(255,170,120,\" + (0.3 + ring * 0.5).toFixed(2) + \"))\";\n\n    requestAnimationFrame(animate);\n  }\n  requestAnimationFrame(animate);\n\n  // ====================================================================\n  //  KEYBOARD\n  // ====================================================================\n  var keysEl = document.getElementById(\"keys\");\n  var WHITE = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 17, 19, 21, 23, 24];\n  var BASE = 36; // C2 — bass register suits a fat mono\n  var whiteEls = [];\n\n  WHITE.forEach(function (semi, i) {\n    var k = document.createElement(\"div\");\n    k.className = \"wkey\";\n    k.dataset.note = BASE + semi;\n    keysEl.appendChild(k);\n    whiteEls.push(k);\n  });\n\n  // black keys positioned over the gaps\n  var BLACK = [1, 3, 6, 8, 10, 13, 15, 18, 20, 22]; // semitone offsets that have a sharp\n  // map: which white index each black sits after\n  var blackAfter = [0, 1, 3, 4, 5, 7, 8, 10, 11, 12];\n  BLACK.forEach(function (semi, i) {\n    var b = document.createElement(\"div\");\n    b.className = \"bkey\";\n    b.dataset.note = BASE + semi;\n    var wi = blackAfter[i];\n    var pct = ((wi + 1) / WHITE.length) * 100;\n    b.style.left = pct + \"%\";\n    keysEl.appendChild(b);\n  });\n\n  var down = {};\n  function noteOn(el) {\n    var n = +el.dataset.note;\n    if (down[n]) return;\n    down[n] = true; el.classList.add(\"on\");\n    host.on(n, 0.9);\n  }\n  function noteOff(el) {\n    var n = +el.dataset.note;\n    if (!down[n]) return;\n    down[n] = false; el.classList.remove(\"on\");\n    host.off(n);\n  }\n\n  function bindKey(el) {\n    el.addEventListener(\"mousedown\", function (e) { noteOn(el); e.preventDefault(); });\n    el.addEventListener(\"mouseenter\", function (e) { if (e.buttons === 1) noteOn(el); });\n    el.addEventListener(\"mouseup\", function () { noteOff(el); });\n    el.addEventListener(\"mouseleave\", function () { noteOff(el); });\n    el.addEventListener(\"touchstart\", function (e) { noteOn(el); e.preventDefault(); }, { passive: false });\n    el.addEventListener(\"touchend\", function (e) { noteOff(el); e.preventDefault(); }, { passive: false });\n  }\n  Array.prototype.forEach.call(keysEl.children, bindKey);\n\n  // ====================================================================\n  //  INIT\n  // ====================================================================\n  function boot() {\n    renderOsc1(); renderOsc2();\n    knobRenderers.forEach(function (r) { r(); });\n    pushAll();\n  }\n\n  if (window.vstai && window.vstai.onReady) {\n    window.vstai.onReady(boot);\n  } else {\n    boot();\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
