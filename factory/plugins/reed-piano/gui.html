<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reed Piano</title>
<style>
  :root{
    --ac:#8ad0a0; --ac2:#d0e8b0;
    --face1:#7fae84; --face2:#5e8d68; --face3:#456b50;
    --wood1:#7a4a2c; --wood2:#5a3318; --wood3:#3c2110;
    --cream:#efe8cf; --ink:#243027;
    --reed:#cfd6c4; --reed-hi:#f3f6e6;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; padding:18px;
    font:13px ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    background:radial-gradient(130% 100% at 50% -15%,#2c3a30,#141d18 60%,#0a0f0c 100%);
    display:flex; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  /* ============ the cabinet ============ */
  .cab{
    position:relative; width:100%; max-width:660px;
    border-radius:16px;
    background:
      linear-gradient(180deg,var(--wood1),var(--wood2) 55%,var(--wood3));
    padding:14px;
    box-shadow:
      0 40px 90px rgba(0,0,0,.6),
      0 2px 0 rgba(255,255,255,.08) inset,
      0 -20px 50px rgba(0,0,0,.45) inset;
    border:1px solid #1c0f06;
  }
  /* wood grain on the cabinet edge */
  .cab::before{
    content:""; position:absolute; inset:0; border-radius:16px; pointer-events:none; opacity:.4;
    background:
      repeating-linear-gradient(92deg,rgba(0,0,0,.16) 0 2px,transparent 2px 9px),
      repeating-linear-gradient(88deg,rgba(255,255,255,.04) 0 1px,transparent 1px 14px);
    mix-blend-mode:overlay;
  }
  .screw{position:absolute;width:12px;height:12px;border-radius:50%;z-index:8;
    background:radial-gradient(circle at 38% 32%,#d8c79a,#7a5a30 70%);
    box-shadow:0 1px 2px rgba(0,0,0,.7),0 0 0 1px #2a1a0c inset}
  .screw::after{content:"";position:absolute;inset:3px;border-radius:1px;
    background:linear-gradient(120deg,transparent 44%,#3c2812 44% 56%,transparent 56%)}
  .screw.tl{top:7px;left:7px} .screw.tr{top:7px;right:7px}
  .screw.bl{bottom:7px;left:7px} .screw.br{bottom:7px;right:7px}

  /* ============ the green faceplate ============ */
  .face{
    position:relative; z-index:2; border-radius:10px; overflow:hidden;
    background:
      radial-gradient(120% 80% at 30% 0%,#86b88c,transparent 60%),
      linear-gradient(180deg,var(--face1),var(--face2) 60%,var(--face3));
    border:1px solid #2c4634;
    box-shadow:0 2px 0 rgba(255,255,255,.12) inset,0 -10px 30px rgba(0,0,0,.3) inset;
  }
  /* crackle / hammertone speckle on the faceplate */
  .face::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.18;
    background:
      radial-gradient(rgba(255,255,255,.5) .6px,transparent .8px) 0 0/7px 7px,
      radial-gradient(rgba(0,0,0,.35) .6px,transparent .8px) 3px 4px/9px 9px;
  }

  /* ---- header / brand ---- */
  .head{position:relative;z-index:3;display:flex;align-items:center;gap:14px;
    padding:14px 20px 10px}
  .badge{flex:none;width:46px;height:46px;border-radius:8px;
    background:linear-gradient(180deg,#f4eed6,#cdbf94);
    border:1px solid #8a7a4c;
    box-shadow:0 2px 5px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.6) inset;
    display:flex;align-items:center;justify-content:center}
  .badge svg{width:30px;height:30px}
  .brand{flex:1;line-height:1.05}
  .brand .mk{font-size:8.5px;letter-spacing:.4em;color:#284332;text-transform:uppercase;opacity:.85}
  .brand h1{margin:2px 0 0;font-size:25px;font-weight:800;letter-spacing:.12em;
    color:var(--cream);
    text-shadow:0 1px 0 rgba(0,0,0,.35),0 0 16px rgba(208,232,176,.25)}
  .model{font-size:8px;letter-spacing:.3em;color:var(--cream);text-transform:uppercase;
    border:1px solid #2c4634;border-radius:5px;padding:5px 9px;
    background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.32));
    box-shadow:0 1px 0 rgba(255,255,255,.12) inset}

  /* ---- the swaying tremolo lamp ---- */
  .lamp{position:relative;flex:none;width:30px;height:46px}
  .lamp .glow{position:absolute;left:50%;top:6px;width:18px;height:18px;margin-left:-9px;border-radius:50%;
    background:radial-gradient(circle at 45% 40%,#fff3c0,var(--ac2) 45%,#7fae84 80%);
    box-shadow:0 0 14px var(--ac2),0 0 28px rgba(208,232,176,.5);
    transform-origin:50% 160%;
    animation:sway 1.6s ease-in-out infinite}
  .lamp .glow.fast{animation-duration:.7s}
  @keyframes sway{0%,100%{transform:rotate(-13deg);filter:brightness(.8)}
    50%{transform:rotate(13deg);filter:brightness(1.35)}}
  .lamp .stem{position:absolute;left:50%;top:22px;width:2px;height:18px;margin-left:-1px;
    background:linear-gradient(#caa,#864);border-radius:1px}

  /* ============ the reed bank (animated SVG) ============ */
  .reeds{position:relative;z-index:3;margin:4px 20px 6px;padding:12px 14px 10px;
    border-radius:8px;
    background:linear-gradient(180deg,#2a3a2e,#1b271f);
    border:1px solid #14201a;
    box-shadow:0 3px 12px rgba(0,0,0,.5) inset,0 1px 0 rgba(255,255,255,.06)}
  .reeds .cap{font-size:8px;letter-spacing:.34em;color:#9bbf9f;text-transform:uppercase;margin-bottom:4px}
  .reeds svg{display:block;width:100%;height:86px}
  .barbox{fill:url(#barg)}
  .reedwire{stroke:var(--reed);stroke-width:2.2;stroke-linecap:round;fill:none;
    filter:drop-shadow(0 0 2px rgba(243,246,230,.35))}
  .reedtip{fill:var(--reed-hi)}
  .hammer{fill:#caa37a;stroke:#6a4a28;stroke-width:1}

  /* ============ control deck ============ */
  .deck{position:relative;z-index:3;display:grid;
    grid-template-columns:repeat(6,1fr);gap:10px 8px;
    padding:10px 18px 6px}
  .ctl{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;
    padding:11px 4px 11px;border-radius:10px;
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(0,0,0,.14));
    border:1px solid #2c4634;
    box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 5px 12px rgba(0,0,0,.28);
    animation:rise .5s both;animation-delay:var(--d)}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .ctl:hover{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(0,0,0,.12))}

  /* knob — bakelite cap with a value arc */
  .knob{position:relative;width:54px;height:54px;cursor:ns-resize;touch-action:none;user-select:none}
  .knob .ring{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 220deg,
      var(--ac) calc(var(--n,0)*280deg),
      rgba(20,32,24,.65) calc(var(--n,0)*280deg) 280deg,
      transparent 280deg);
    filter:drop-shadow(0 0 calc(2px + var(--n,0)*7px) color-mix(in srgb,var(--ac) 70%,transparent));
    transition:filter .15s ease}
  .knob .cap{position:absolute;inset:6px;border-radius:50%;
    background:
      radial-gradient(circle at 50% 26%,#3a4d40,#16221b 74%);
    box-shadow:0 3px 8px rgba(0,0,0,.55) inset,0 -1px 0 rgba(255,255,255,.08) inset,0 1px 2px rgba(0,0,0,.6)}
  .knob .pip{position:absolute;left:50%;top:5px;width:3px;height:15px;margin-left:-1.5px;border-radius:2px;
    background:linear-gradient(var(--ac2),var(--ac));box-shadow:0 0 7px var(--ac);
    transform-origin:50% 22px;
    transform:rotate(calc((var(--n,0) - 0.5) * 280deg));
    transition:transform .14s cubic-bezier(.2,.8,.25,1)}
  .knob.live .ring,.knob.live .pip{transition:none}
  .knob.act .cap{box-shadow:0 4px 12px rgba(0,0,0,.7) inset,0 0 0 1px var(--ac) inset}

  .ctl .nm{font-size:8.5px;letter-spacing:.12em;color:var(--cream);text-transform:uppercase;text-align:center;
    text-shadow:0 1px 0 rgba(0,0,0,.3)}
  .ctl .vv{font-size:11px;font-weight:700;color:var(--ac2);font-variant-numeric:tabular-nums;
    text-shadow:0 0 7px rgba(208,232,176,.4)}

  /* ============ keyboard ============ */
  .kbwrap{position:relative;z-index:3;margin:6px 14px 4px;padding:10px;
    border-radius:8px;background:linear-gradient(180deg,#1b120a,#0e0905);
    box-shadow:0 4px 12px rgba(0,0,0,.5) inset}
  .keys{position:relative;display:flex;height:104px;border-radius:5px;overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .key{position:relative;flex:1;cursor:pointer;touch-action:none}
  .key.w{background:linear-gradient(180deg,#fdfbf2,#ddd7c4);
    border-right:1px solid #b8b2a0;border-radius:0 0 4px 4px}
  .key.w:last-child{border-right:none}
  .key.w.dn{background:linear-gradient(180deg,#cfe6cf,#a9d0a9);
    box-shadow:0 -2px 6px rgba(138,208,160,.5) inset}
  .key.b{position:absolute;top:0;width:6.2%;height:62%;z-index:4;
    background:linear-gradient(180deg,#2a322c,#0d130f);border-radius:0 0 3px 3px;
    box-shadow:0 3px 5px rgba(0,0,0,.6),0 -1px 0 rgba(255,255,255,.06) inset}
  .key.b.dn{background:linear-gradient(180deg,#4a7a55,#274d31);
    box-shadow:0 0 10px rgba(138,208,160,.6)}
  .hint{margin-top:7px;font-size:8.5px;letter-spacing:.16em;color:#9bbf9f;text-transform:uppercase;text-align:center;opacity:.8}

  .foot{position:relative;z-index:3;margin:6px 20px 2px;padding-top:8px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:8px;letter-spacing:.22em;color:#274332;text-transform:uppercase}

  @media(max-width:540px){.deck{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
  <div class="cab">
    <span class="screw tl"></span><span class="screw tr"></span>
    <span class="screw bl"></span><span class="screw br"></span>

    <div class="face">
      <div class="head">
        <div class="badge">
          <svg viewBox="0 0 30 30">
            <rect x="4" y="6" width="22" height="3" rx="1.5" fill="#5a3318"/>
            <rect x="6" y="9" width="2" height="14" rx="1" fill="#7a4a2c"/>
            <rect x="11" y="9" width="2" height="17" rx="1" fill="#7a4a2c"/>
            <rect x="16" y="9" width="2" height="13" rx="1" fill="#7a4a2c"/>
            <rect x="21" y="9" width="2" height="16" rx="1" fill="#7a4a2c"/>
          </svg>
        </div>
        <div class="brand">
          <div class="mk">Electric Reed Piano</div>
          <h1>REED&nbsp;PIANO</h1>
        </div>
        <div class="lamp"><span class="glow" id="lampGlow"></span><span class="stem"></span></div>
        <span class="model">200&middot;A</span>
      </div>

      <!-- ANIMATED REED BANK -->
      <div class="reeds">
        <div class="cap">Reed Bank &mdash; struck steel</div>
        <svg id="reedSvg" viewBox="0 0 620 86" preserveAspectRatio="none">
          <defs>
            <linearGradient id="barg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#3a4d40"/><stop offset="1" stop-color="#1b271f"/>
            </linearGradient>
          </defs>
          <!-- mounting bar the reeds clamp to -->
          <rect class="barbox" x="0" y="68" width="620" height="14" rx="3"/>
          <g id="reedGroup"></g>
        </svg>
      </div>

      <!-- CONTROL DECK -->
      <div class="deck" id="deck"></div>

      <!-- KEYBOARD -->
      <div class="kbwrap">
        <div class="keys" id="keys"></div>
        <div class="hint">Click keys or play A&ndash;K &middot; drag knobs &middot; double-click to reset</div>
      </div>

      <div class="foot">
        <span>12&nbsp;Voice&nbsp;Poly</span>
        <span>Vibrato &middot; Reed &middot; Tone</span>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---- param map (indices MUST match assembly.ts) ----
  var PARAMS = [
    { name:"Bark",      index:0, min:0, max:1, def:0.55, fmt:pct },
    { name:"Decay",     index:1, min:0, max:1, def:0.55, fmt:secFmt },
    { name:"Tone",      index:2, min:0, max:1, def:0.5,  fmt:hzFmt },
    { name:"Trem Dpt",  index:3, min:0, max:1, def:0.35, fmt:pct },
    { name:"Trem Rate", index:4, min:0, max:1, def:0.4,  fmt:rateFmt },
    { name:"Level",     index:5, min:0, max:1, def:0.7,  fmt:dbFmt }
  ];

  function pct(v){ return Math.round(v*100)+"%"; }
  function secFmt(v){ var s=0.6+v*v*5.4; return s.toFixed(2)+"s"; }
  function hzFmt(v){ var f=700+v*v*6300; return f>=1000?(f/1000).toFixed(1)+"k":Math.round(f)+"Hz"; }
  function rateFmt(v){ return (3+v*6).toFixed(1)+"Hz"; }
  function dbFmt(v){ if(v<=0.0001) return "-INF"; var db=20*Math.log10(v); return (db>=0?"+":"")+db.toFixed(1)+"dB"; }

  // ---- host bridge (guard undefined) ----
  function setParam(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }
  function noteOnH(n,vel){ if(window.vstai&&window.vstai.noteOn) window.vstai.noteOn(n,vel); }
  function noteOffH(n){ if(window.vstai&&window.vstai.noteOff) window.vstai.noteOff(n); }

  var state = PARAMS.map(function(p){ return p.def; });
  function nz(p,v){ return (v-p.min)/((p.max-p.min)||1); }

  // ===================================================================
  //  REED BANK — build N reeds; animate the struck ones vibrating
  // ===================================================================
  var REEDN = 22;
  var reedGroup = document.getElementById("reedGroup");
  var reeds = [];
  for(var r=0;r<REEDN;r++){
    var x = 18 + r*(584/(REEDN-1));
    var len = 56 - (r/REEDN)*34;            // higher reeds are shorter
    var path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("class","reedwire");
    var tip = document.createElementNS("http://www.w3.org/2000/svg","circle");
    tip.setAttribute("class","reedtip"); tip.setAttribute("r","2.6");
    reedGroup.appendChild(path); reedGroup.appendChild(tip);
    reeds.push({ x:x, len:len, base:68, amp:0, phase:Math.random()*6.28, path:path, tip:tip });
  }

  // active note -> reed mapping so played notes excite specific reeds
  var noteReed = {};
  function exciteReed(note,vel){
    var idx = ((note % REEDN) + REEDN) % REEDN;
    reeds[idx].amp = Math.min(1, 0.55 + vel*0.6);
    noteReed[note] = idx;
  }
  function relaxReed(note){ delete noteReed[note]; }

  // ===================================================================
  //  KNOBS / control deck
  // ===================================================================
  var deck = document.getElementById("deck");
  PARAMS.forEach(function(p,i){
    var ctl = document.createElement("div");
    ctl.className = "ctl";
    ctl.style.setProperty("--d",(i*55)+"ms");
    ctl.innerHTML =
      '<div class="knob"><div class="ring"></div><div class="cap"></div><div class="pip"></div></div>'+
      '<div class="nm">'+p.name+'</div><div class="vv"></div>';
    deck.appendChild(ctl);

    var knob = ctl.querySelector(".knob");
    var vv = ctl.querySelector(".vv");

    function paint(){
      var n = nz(p,state[i]);
      knob.style.setProperty("--n", n);
      vv.textContent = p.fmt(n);
    }
    function set(n){
      n = n<0?0:(n>1?1:n);
      state[i] = p.min+(p.max-p.min)*n;
      paint(); setParam(p.index,state[i]);
      reactGlobals();
    }
    function reset(){ state[i]=p.def; paint(); setParam(p.index,state[i]); reactGlobals(); }

    var dragY=0, dragN=0, dragging=false;
    knob.addEventListener("pointerdown",function(e){
      dragging=true; dragY=e.clientY; dragN=nz(p,state[i]);
      knob.classList.add("act","live"); knob.setPointerCapture(e.pointerId); e.preventDefault();
    });
    knob.addEventListener("pointermove",function(e){
      if(!dragging) return;
      set(dragN + (dragY-e.clientY)/180);
    });
    function end(){ dragging=false; knob.classList.remove("act","live"); }
    knob.addEventListener("pointerup",end);
    knob.addEventListener("pointercancel",end);
    knob.addEventListener("dblclick",reset);
    knob.addEventListener("wheel",function(e){
      e.preventDefault();
      set(nz(p,state[i]) + (e.deltaY<0?0.03:-0.03));
    },{passive:false});

    p._paint = paint;
  });

  // ---- globals that the reed bank + lamp react to ----
  var lampGlow = document.getElementById("lampGlow");
  function reactGlobals(){
    var rate = nz(PARAMS[4],state[4]);   // tremolo rate
    var depth = nz(PARAMS[3],state[3]);  // tremolo depth
    // lamp sways faster with rate, brighter with depth
    var dur = (1.9 - rate*1.3).toFixed(2);
    lampGlow.style.animationDuration = dur+"s";
    lampGlow.style.opacity = (0.45 + depth*0.55).toFixed(2);
  }

  // ===================================================================
  //  KEYBOARD — two octaves, click + computer keys
  // ===================================================================
  var keysEl = document.getElementById("keys");
  var START = 48;        // C3
  var OCT = 2;
  var WHITE = [0,2,4,5,7,9,11];
  var isBlack = {1:1,3:1,6:1,8:1,10:1};
  var keyEls = {};       // midi -> element
  var whiteCount = OCT*7 + 1;

  // build white keys first
  var whiteNotes = [];
  for(var o=0;o<=OCT;o++){
    for(var wi=0; wi<WHITE.length; wi++){
      var nn = START + o*12 + WHITE[wi];
      if(whiteNotes.length>=whiteCount) break;
      whiteNotes.push(nn);
    }
  }
  whiteNotes.forEach(function(nn){
    var k = document.createElement("div");
    k.className = "key w"; k.dataset.note = nn;
    keysEl.appendChild(k); keyEls[nn]=k;
  });
  // black keys positioned over the gaps
  var wWidth = 100/whiteNotes.length;
  whiteNotes.forEach(function(nn,wIdx){
    var rel = nn % 12;
    // a black key sits to the right of white notes with a sharp above
    if(rel===0||rel===2||rel===5||rel===7||rel===9){
      var bn = nn+1;
      if(isBlack[bn%12]){
        var b = document.createElement("div");
        b.className="key b"; b.dataset.note=bn;
        b.style.left = ((wIdx+1)*wWidth - 3.1)+"%";
        keysEl.appendChild(b); keyEls[bn]=b;
      }
    }
  });

  var down = {};
  function press(note,vel){
    if(down[note]) return;
    down[note]=true;
    var el=keyEls[note]; if(el) el.classList.add("dn");
    noteOnH(note, vel||0.85);
    exciteReed(note, vel||0.85);
  }
  function release(note){
    if(!down[note]) return;
    delete down[note];
    var el=keyEls[note]; if(el) el.classList.remove("dn");
    noteOffH(note);
    relaxReed(note);
  }

  // pointer interaction on keys (with glide)
  var pointerDown=false;
  function noteFromEvent(e){
    var el=document.elementFromPoint(e.clientX,e.clientY);
    if(el && el.dataset && el.dataset.note) return +el.dataset.note;
    return null;
  }
  keysEl.addEventListener("pointerdown",function(e){
    pointerDown=true; var n=noteFromEvent(e);
    if(n!=null){ press(n); keysEl.setPointerCapture(e.pointerId); }
    e.preventDefault();
  });
  keysEl.addEventListener("pointermove",function(e){
    if(!pointerDown) return;
    var n=noteFromEvent(e);
    for(var held in down){ if(+held!==n) release(+held); }
    if(n!=null) press(n);
  });
  function upAll(){ pointerDown=false; for(var held in down) release(+held); }
  keysEl.addEventListener("pointerup",upAll);
  keysEl.addEventListener("pointercancel",upAll);

  // computer keyboard A..K (white) + W E T Y U (black)
  var KEYMAP = { a:48,w:49,s:50,e:51,d:52,f:53,t:54,g:55,y:56,h:57,u:58,j:59,k:60 };
  window.addEventListener("keydown",function(e){
    if(e.repeat) return;
    var n=KEYMAP[e.key.toLowerCase()];
    if(n!=null){ press(n); }
  });
  window.addEventListener("keyup",function(e){
    var n=KEYMAP[e.key.toLowerCase()];
    if(n!=null){ release(n); }
  });

  // ===================================================================
  //  ANIMATION LOOP — reeds vibrate; struck reeds swing wider then decay
  // ===================================================================
  var t0=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    if(document.hidden) return;
    var dt=(now-t0)*0.001;
    var depth = nz(PARAMS[3],state[3]);
    var rate = nz(PARAMS[4],state[4]);
    var tremHz = 3 + rate*6;
    var tone = nz(PARAMS[2],state[2]);
    // global tremolo modulation factor (0..1) applied to all reed swing
    var trem = 1 - depth*(0.5 - 0.5*Math.sin(dt*tremHz*6.283));

    for(var i=0;i<reeds.length;i++){
      var rd=reeds[i];
      // decay any excited reed back to a gentle idle shimmer
      var idle = 0.06 + tone*0.05;
      if(rd.amp>idle){ rd.amp += (idle-rd.amp)*0.018; }
      else { rd.amp = idle; }
      // each reed vibrates at a rate scaled to its pitch
      var vib = Math.sin(dt*(14 + i*1.1) + rd.phase);
      var swing = rd.amp * vib * (10 + (1-i/reeds.length)*8) * trem;
      var tipX = rd.x + swing;
      var topY = rd.base - rd.len;
      // a curved reed: quadratic bezier from clamp to swinging tip
      var ctrlX = rd.x + swing*0.45;
      var ctrlY = rd.base - rd.len*0.55;
      rd.path.setAttribute("d","M"+rd.x.toFixed(1)+" "+rd.base+" Q"+ctrlX.toFixed(1)+" "+ctrlY.toFixed(1)+" "+tipX.toFixed(1)+" "+topY.toFixed(1));
      rd.tip.setAttribute("cx",tipX.toFixed(1));
      rd.tip.setAttribute("cy",topY.toFixed(1));
      var lit = Math.min(1, rd.amp*1.4);
      rd.tip.style.opacity = (0.4+lit*0.6).toFixed(2);
      rd.path.style.stroke = lit>0.5 ? "var(--ac2)" : "var(--reed)";
    }
  }
  requestAnimationFrame(frame);

  // ---- init ----
  function ready(){
    PARAMS.forEach(function(p,i){ p._paint(); setParam(p.index,state[i]); });
    reactGlobals();
  }
  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();
})();
</script>
