  :root{--ac:#8ad0a0}

    box-shadow:0 16px 40px rgba(0,0,0,.4)}

  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Reed Piano<\/title>\n<style>\n  :root{\n    --ac:#8ad0a0; --ac2:#d0e8b0;\n    --face1:#7fae84; --face2:#5e8d68; --face3:#456b50;\n    --wood1:#7a4a2c; --wood2:#5a3318; --wood3:#3c2110;\n    --cream:#efe8cf; --ink:#243027;\n    --reed:#cfd6c4; --reed-hi:#f3f6e6;\n  }\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{\n    margin:0; padding:18px;\n    font:13px ui-sans-serif,-apple-system,\"Segoe UI\",system-ui,sans-serif;\n    color:var(--ink);\n    background:radial-gradient(130% 100% at 50% -15%,#2c3a30,#141d18 60%,#0a0f0c 100%);\n    display:flex; align-items:center; justify-content:center;\n    -webkit-font-smoothing:antialiased;\n  }\n\n  /* ============ the cabinet ============ */\n  .cab{\n    position:relative; width:100%; max-width:660px;\n    border-radius:16px;\n    background:\n      linear-gradient(180deg,var(--wood1),var(--wood2) 55%,var(--wood3));\n    padding:14px;\n    box-shadow:\n      0 40px 90px rgba(0,0,0,.6),\n      0 2px 0 rgba(255,255,255,.08) inset,\n      0 -20px 50px rgba(0,0,0,.45) inset;\n    border:1px solid #1c0f06;\n  }\n  /* wood grain on the cabinet edge */\n  .cab::before{\n    content:\"\"; position:absolute; inset:0; border-radius:16px; pointer-events:none; opacity:.4;\n    background:\n      repeating-linear-gradient(92deg,rgba(0,0,0,.16) 0 2px,transparent 2px 9px),\n      repeating-linear-gradient(88deg,rgba(255,255,255,.04) 0 1px,transparent 1px 14px);\n    mix-blend-mode:overlay;\n  }\n  .screw{position:absolute;width:12px;height:12px;border-radius:50%;z-index:8;\n    background:radial-gradient(circle at 38% 32%,#d8c79a,#7a5a30 70%);\n    box-shadow:0 1px 2px rgba(0,0,0,.7),0 0 0 1px #2a1a0c inset}\n  .screw::after{content:\"\";position:absolute;inset:3px;border-radius:1px;\n    background:linear-gradient(120deg,transparent 44%,#3c2812 44% 56%,transparent 56%)}\n  .screw.tl{top:7px;left:7px} .screw.tr{top:7px;right:7px}\n  .screw.bl{bottom:7px;left:7px} .screw.br{bottom:7px;right:7px}\n\n  /* ============ the green faceplate ============ */\n  .face{\n    position:relative; z-index:2; border-radius:10px; overflow:hidden;\n    background:\n      radial-gradient(120% 80% at 30% 0%,#86b88c,transparent 60%),\n      linear-gradient(180deg,var(--face1),var(--face2) 60%,var(--face3));\n    border:1px solid #2c4634;\n    box-shadow:0 2px 0 rgba(255,255,255,.12) inset,0 -10px 30px rgba(0,0,0,.3) inset;\n  }\n  /* crackle / hammertone speckle on the faceplate */\n  .face::before{\n    content:\"\"; position:absolute; inset:0; pointer-events:none; opacity:.18;\n    background:\n      radial-gradient(rgba(255,255,255,.5) .6px,transparent .8px) 0 0/7px 7px,\n      radial-gradient(rgba(0,0,0,.35) .6px,transparent .8px) 3px 4px/9px 9px;\n  }\n\n  /* ---- header / brand ---- */\n  .head{position:relative;z-index:3;display:flex;align-items:center;gap:14px;\n    padding:14px 20px 10px}\n  .badge{flex:none;width:46px;height:46px;border-radius:8px;\n    background:linear-gradient(180deg,#f4eed6,#cdbf94);\n    border:1px solid #8a7a4c;\n    box-shadow:0 2px 5px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.6) inset;\n    display:flex;align-items:center;justify-content:center}\n  .badge svg{width:30px;height:30px}\n  .brand{flex:1;line-height:1.05}\n  .brand .mk{font-size:8.5px;letter-spacing:.4em;color:#284332;text-transform:uppercase;opacity:.85}\n  .brand h1{margin:2px 0 0;font-size:25px;font-weight:800;letter-spacing:.12em;\n    color:var(--cream);\n    text-shadow:0 1px 0 rgba(0,0,0,.35),0 0 16px rgba(208,232,176,.25)}\n  .model{font-size:8px;letter-spacing:.3em;color:var(--cream);text-transform:uppercase;\n    border:1px solid #2c4634;border-radius:5px;padding:5px 9px;\n    background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.32));\n    box-shadow:0 1px 0 rgba(255,255,255,.12) inset}\n\n  /* ---- the swaying tremolo lamp ---- */\n  .lamp{position:relative;flex:none;width:30px;height:46px}\n  .lamp .glow{position:absolute;left:50%;top:6px;width:18px;height:18px;margin-left:-9px;border-radius:50%;\n    background:radial-gradient(circle at 45% 40%,#fff3c0,var(--ac2) 45%,#7fae84 80%);\n    box-shadow:0 0 14px var(--ac2),0 0 28px rgba(208,232,176,.5);\n    transform-origin:50% 160%;\n    animation:sway 1.6s ease-in-out infinite}\n  .lamp .glow.fast{animation-duration:.7s}\n  @keyframes sway{0%,100%{transform:rotate(-13deg);filter:brightness(.8)}\n    50%{transform:rotate(13deg);filter:brightness(1.35)}}\n  .lamp .stem{position:absolute;left:50%;top:22px;width:2px;height:18px;margin-left:-1px;\n    background:linear-gradient(#caa,#864);border-radius:1px}\n\n  /* ============ the reed bank (animated SVG) ============ */\n  .reeds{position:relative;z-index:3;margin:4px 20px 6px;padding:12px 14px 10px;\n    border-radius:8px;\n    background:linear-gradient(180deg,#2a3a2e,#1b271f);\n    border:1px solid #14201a;\n    box-shadow:0 3px 12px rgba(0,0,0,.5) inset,0 1px 0 rgba(255,255,255,.06)}\n  .reeds .cap{font-size:8px;letter-spacing:.34em;color:#9bbf9f;text-transform:uppercase;margin-bottom:4px}\n  .reeds svg{display:block;width:100%;height:86px}\n  .barbox{fill:url(#barg)}\n  .reedwire{stroke:var(--reed);stroke-width:2.2;stroke-linecap:round;fill:none;\n    filter:drop-shadow(0 0 2px rgba(243,246,230,.35))}\n  .reedtip{fill:var(--reed-hi)}\n  .hammer{fill:#caa37a;stroke:#6a4a28;stroke-width:1}\n\n  /* ============ control deck ============ */\n  .deck{position:relative;z-index:3;display:grid;\n    grid-template-columns:repeat(6,1fr);gap:10px 8px;\n    padding:10px 18px 6px}\n  .ctl{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;\n    padding:11px 4px 11px;border-radius:10px;\n    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(0,0,0,.14));\n    border:1px solid #2c4634;\n    box-shadow:0 1px 0 rgba(255,255,255,.14) inset,0 5px 12px rgba(0,0,0,.28);\n    animation:rise .5s both;animation-delay:var(--d)}\n  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n  .ctl:hover{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(0,0,0,.12))}\n\n  /* knob — bakelite cap with a value arc */\n  .knob{position:relative;width:54px;height:54px;cursor:ns-resize;touch-action:none;user-select:none}\n  .knob .ring{position:absolute;inset:0;border-radius:50%;\n    background:conic-gradient(from 220deg,\n      var(--ac) calc(var(--n,0)*280deg),\n      rgba(20,32,24,.65) calc(var(--n,0)*280deg) 280deg,\n      transparent 280deg);\n    filter:drop-shadow(0 0 calc(2px + var(--n,0)*7px) color-mix(in srgb,var(--ac) 70%,transparent));\n    transition:filter .15s ease}\n  .knob .cap{position:absolute;inset:6px;border-radius:50%;\n    background:\n      radial-gradient(circle at 50% 26%,#3a4d40,#16221b 74%);\n    box-shadow:0 3px 8px rgba(0,0,0,.55) inset,0 -1px 0 rgba(255,255,255,.08) inset,0 1px 2px rgba(0,0,0,.6)}\n  .knob .pip{position:absolute;left:50%;top:5px;width:3px;height:15px;margin-left:-1.5px;border-radius:2px;\n    background:linear-gradient(var(--ac2),var(--ac));box-shadow:0 0 7px var(--ac);\n    transform-origin:50% 22px;\n    transform:rotate(calc((var(--n,0) - 0.5) * 280deg));\n    transition:transform .14s cubic-bezier(.2,.8,.25,1)}\n  .knob.live .ring,.knob.live .pip{transition:none}\n  .knob.act .cap{box-shadow:0 4px 12px rgba(0,0,0,.7) inset,0 0 0 1px var(--ac) inset}\n\n  .ctl .nm{font-size:8.5px;letter-spacing:.12em;color:var(--cream);text-transform:uppercase;text-align:center;\n    text-shadow:0 1px 0 rgba(0,0,0,.3)}\n  .ctl .vv{font-size:11px;font-weight:700;color:var(--ac2);font-variant-numeric:tabular-nums;\n    text-shadow:0 0 7px rgba(208,232,176,.4)}\n\n  /* ============ keyboard ============ */\n  .kbwrap{position:relative;z-index:3;margin:6px 14px 4px;padding:10px;\n    border-radius:8px;background:linear-gradient(180deg,#1b120a,#0e0905);\n    box-shadow:0 4px 12px rgba(0,0,0,.5) inset}\n  .keys{position:relative;display:flex;height:104px;border-radius:5px;overflow:hidden;\n    box-shadow:0 2px 6px rgba(0,0,0,.5)}\n  .key{position:relative;flex:1;cursor:pointer;touch-action:none}\n  .key.w{background:linear-gradient(180deg,#fdfbf2,#ddd7c4);\n    border-right:1px solid #b8b2a0;border-radius:0 0 4px 4px}\n  .key.w:last-child{border-right:none}\n  .key.w.dn{background:linear-gradient(180deg,#cfe6cf,#a9d0a9);\n    box-shadow:0 -2px 6px rgba(138,208,160,.5) inset}\n  .key.b{position:absolute;top:0;width:6.2%;height:62%;z-index:4;\n    background:linear-gradient(180deg,#2a322c,#0d130f);border-radius:0 0 3px 3px;\n    box-shadow:0 3px 5px rgba(0,0,0,.6),0 -1px 0 rgba(255,255,255,.06) inset}\n  .key.b.dn{background:linear-gradient(180deg,#4a7a55,#274d31);\n    box-shadow:0 0 10px rgba(138,208,160,.6)}\n  .hint{margin-top:7px;font-size:8.5px;letter-spacing:.16em;color:#9bbf9f;text-transform:uppercase;text-align:center;opacity:.8}\n\n  .foot{position:relative;z-index:3;margin:6px 20px 2px;padding-top:8px;\n    display:flex;justify-content:space-between;align-items:center;\n    font-size:8px;letter-spacing:.22em;color:#274332;text-transform:uppercase}\n\n  @media(max-width:540px){.deck{grid-template-columns:repeat(3,1fr)}}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"cab\">\n    <span class=\"screw tl\"><\/span><span class=\"screw tr\"><\/span>\n    <span class=\"screw bl\"><\/span><span class=\"screw br\"><\/span>\n\n    <div class=\"face\">\n      <div class=\"head\">\n        <div class=\"badge\">\n          <svg viewBox=\"0 0 30 30\">\n            <rect x=\"4\" y=\"6\" width=\"22\" height=\"3\" rx=\"1.5\" fill=\"#5a3318\"/>\n            <rect x=\"6\" y=\"9\" width=\"2\" height=\"14\" rx=\"1\" fill=\"#7a4a2c\"/>\n            <rect x=\"11\" y=\"9\" width=\"2\" height=\"17\" rx=\"1\" fill=\"#7a4a2c\"/>\n            <rect x=\"16\" y=\"9\" width=\"2\" height=\"13\" rx=\"1\" fill=\"#7a4a2c\"/>\n            <rect x=\"21\" y=\"9\" width=\"2\" height=\"16\" rx=\"1\" fill=\"#7a4a2c\"/>\n          <\/svg>\n        <\/div>\n        <div class=\"brand\">\n          <div class=\"mk\">Electric Reed Piano<\/div>\n          <h1>REED&nbsp;PIANO<\/h1>\n        <\/div>\n        <div class=\"lamp\"><span class=\"glow\" id=\"lampGlow\"><\/span><span class=\"stem\"><\/span><\/div>\n        <span class=\"model\">200&middot;A<\/span>\n      <\/div>\n\n      <!-- ANIMATED REED BANK -->\n      <div class=\"reeds\">\n        <div class=\"cap\">Reed Bank &mdash; struck steel<\/div>\n        <svg id=\"reedSvg\" viewBox=\"0 0 620 86\" preserveAspectRatio=\"none\">\n          <defs>\n            <linearGradient id=\"barg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#3a4d40\"/><stop offset=\"1\" stop-color=\"#1b271f\"/>\n            <\/linearGradient>\n          <\/defs>\n          <!-- mounting bar the reeds clamp to -->\n          <rect class=\"barbox\" x=\"0\" y=\"68\" width=\"620\" height=\"14\" rx=\"3\"/>\n          <g id=\"reedGroup\"><\/g>\n        <\/svg>\n      <\/div>\n\n      <!-- CONTROL DECK -->\n      <div class=\"deck\" id=\"deck\"><\/div>\n\n      <!-- KEYBOARD -->\n      <div class=\"kbwrap\">\n        <div class=\"keys\" id=\"keys\"><\/div>\n        <div class=\"hint\">Click keys or play A&ndash;K &middot; drag knobs &middot; double-click to reset<\/div>\n      <\/div>\n\n      <div class=\"foot\">\n        <span>12&nbsp;Voice&nbsp;Poly<\/span>\n        <span>Vibrato &middot; Reed &middot; Tone<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- param map (indices MUST match assembly.ts) ----\n  var PARAMS = [\n    { name:\"Bark\",      index:0, min:0, max:1, def:0.55, fmt:pct },\n    { name:\"Decay\",     index:1, min:0, max:1, def:0.55, fmt:secFmt },\n    { name:\"Tone\",      index:2, min:0, max:1, def:0.5,  fmt:hzFmt },\n    { name:\"Trem Dpt\",  index:3, min:0, max:1, def:0.35, fmt:pct },\n    { name:\"Trem Rate\", index:4, min:0, max:1, def:0.4,  fmt:rateFmt },\n    { name:\"Level\",     index:5, min:0, max:1, def:0.7,  fmt:dbFmt }\n  ];\n\n  function pct(v){ return Math.round(v*100)+\"%\"; }\n  function secFmt(v){ var s=0.6+v*v*5.4; return s.toFixed(2)+\"s\"; }\n  function hzFmt(v){ var f=700+v*v*6300; return f>=1000?(f/1000).toFixed(1)+\"k\":Math.round(f)+\"Hz\"; }\n  function rateFmt(v){ return (3+v*6).toFixed(1)+\"Hz\"; }\n  function dbFmt(v){ if(v<=0.0001) return \"-INF\"; var db=20*Math.log10(v); return (db>=0?\"+\":\"\")+db.toFixed(1)+\"dB\"; }\n\n  // ---- host bridge (guard undefined) ----\n  function setParam(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n  function noteOnH(n,vel){ if(window.vstai&&window.vstai.noteOn) window.vstai.noteOn(n,vel); }\n  function noteOffH(n){ if(window.vstai&&window.vstai.noteOff) window.vstai.noteOff(n); }\n\n  var state = PARAMS.map(function(p){ return p.def; });\n  function nz(p,v){ return (v-p.min)/((p.max-p.min)||1); }\n\n  // ===================================================================\n  //  REED BANK — build N reeds; animate the struck ones vibrating\n  // ===================================================================\n  var REEDN = 22;\n  var reedGroup = document.getElementById(\"reedGroup\");\n  var reeds = [];\n  for(var r=0;r<REEDN;r++){\n    var x = 18 + r*(584/(REEDN-1));\n    var len = 56 - (r/REEDN)*34;            // higher reeds are shorter\n    var path = document.createElementNS(\"http://www.w3.org/2000/svg\",\"path\");\n    path.setAttribute(\"class\",\"reedwire\");\n    var tip = document.createElementNS(\"http://www.w3.org/2000/svg\",\"circle\");\n    tip.setAttribute(\"class\",\"
