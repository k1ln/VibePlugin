<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Studio Delay — test bench</title><style>
  :root{--ac:#5ad1ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Studio Delay</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>Studio Delay<\/title>\n  <style>\n    :root {\n      --accent: #5ad1ff;\n      --accent2: #80c8ff;\n      --bg0: #0a0e14;\n      --bg1: #121823;\n      --panel: #1a2230;\n      --panel2: #222c3c;\n      --rail: #06090e;\n      --ink: #cdd9e6;\n      --ink-dim: #6b7a8d;\n      --led-off: #103040;\n    }\n\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n\n    html, body {\n      height: 100%;\n      background: var(--bg0);\n      color: var(--ink);\n      font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n      -webkit-font-smoothing: antialiased;\n    }\n\n    body {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 18px;\n      min-height: 100%;\n      background:\n        radial-gradient(1200px 500px at 50% -10%, rgba(90,209,255,0.08), transparent 60%),\n        linear-gradient(180deg, #0c111a 0%, #070a10 100%);\n    }\n\n    /* ---- the rack unit ---- */\n    .rack {\n      width: 100%;\n      max-width: 880px;\n      border-radius: 14px;\n      padding: 18px;\n      position: relative;\n      background: linear-gradient(180deg, #2a3543 0%, #161d28 100%);\n      box-shadow:\n        0 30px 70px rgba(0,0,0,0.6),\n        inset 0 1px 0 rgba(255,255,255,0.08),\n        inset 0 -2px 6px rgba(0,0,0,0.5);\n      border: 1px solid #0b0f16;\n    }\n\n    /* rack ears / screws */\n    .screw {\n      position: absolute;\n      width: 14px; height: 14px;\n      border-radius: 50%;\n      background: radial-gradient(circle at 35% 30%, #5b6675, #1b2230 70%);\n      box-shadow: inset 0 1px 1px rgba(255,255,255,0.25), 0 1px 2px rgba(0,0,0,0.6);\n    }\n    .screw::after {\n      content: \"\";\n      position: absolute;\n      inset: 4px;\n      border-radius: 50%;\n      background: linear-gradient(180deg, #0c1118, #2a323e);\n    }\n    .screw.tl { top: 10px; left: 10px; }\n    .screw.tr { top: 10px; right: 10px; }\n    .screw.bl { bottom: 10px; left: 10px; }\n    .screw.br { bottom: 10px; right: 10px; }\n\n    .faceplate {\n      border-radius: 9px;\n      padding: 16px 20px 20px;\n      background:\n        repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 4px),\n        linear-gradient(180deg, #1d2734 0%, #141b26 100%);\n      border: 1px solid #0a0e15;\n      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);\n      margin: 0 18px;\n    }\n\n    header {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 16px;\n      padding-bottom: 14px;\n      border-bottom: 1px solid rgba(255,255,255,0.05);\n    }\n\n    .brand { display: flex; align-items: center; gap: 12px; }\n\n    .logo-mark {\n      width: 34px; height: 34px;\n      border-radius: 8px;\n      display: grid;\n      place-items: center;\n      background: linear-gradient(160deg, #16202c, #0c121a);\n      border: 1px solid rgba(90,209,255,0.35);\n      box-shadow: 0 0 14px rgba(90,209,255,0.25), inset 0 1px 0 rgba(255,255,255,0.06);\n    }\n    .logo-mark svg { display: block; }\n\n    .titles h1 {\n      font-size: 17px;\n      font-weight: 700;\n      letter-spacing: 3px;\n      text-transform: uppercase;\n      background: linear-gradient(90deg, var(--accent), var(--accent2));\n      -webkit-background-clip: text;\n      background-clip: text;\n      color: transparent;\n    }\n    .titles .sub {\n      font-size: 9.5px;\n      letter-spacing: 4px;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      margin-top: 2px;\n    }\n\n    .model-badge {\n      font-size: 9px;\n      letter-spacing: 2px;\n      text-transform: uppercase;\n      color: var(--accent);\n      border: 1px solid rgba(90,209,255,0.3);\n      border-radius: 20px;\n      padding: 4px 11px;\n      background: rgba(90,209,255,0.06);\n    }\n\n    /* ---- segmented ms display ---- */\n    .display-wrap {\n      margin-top: 16px;\n      border-radius: 8px;\n      padding: 14px 18px;\n      background:\n        radial-gradient(120% 140% at 50% -20%, rgba(90,209,255,0.10), transparent 60%),\n        linear-gradient(180deg, #04080d, #02050a);\n      border: 1px solid #0a121b;\n      box-shadow: inset 0 2px 10px rgba(0,0,0,0.85), inset 0 0 0 1px rgba(90,209,255,0.04);\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 18px;\n      overflow: hidden;\n    }\n\n    .seg-block { display: flex; align-items: baseline; gap: 8px; }\n    .seg {\n      font-family: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n      font-size: 40px;\n      font-weight: 700;\n      letter-spacing: 2px;\n      font-variant-numeric: tabular-nums;\n      color: var(--accent);\n      text-shadow: 0 0 8px rgba(90,209,255,0.65), 0 0 22px rgba(90,209,255,0.35);\n    }\n    .seg.dim {\n      color: rgba(90,209,255,0.18);\n      text-shadow: none;\n      position: absolute;\n    }\n    .seg-host { position: relative; }\n    .seg-unit {\n      font-size: 13px;\n      letter-spacing: 3px;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n    }\n\n    /* tap indicator lane */\n    .taps {\n      flex: 1;\n      max-width: 360px;\n      display: flex;\n      align-items: center;\n      gap: 5px;\n      height: 46px;\n      padding: 0 4px;\n    }\n    .tap {\n      flex: 1;\n      height: 100%;\n      border-radius: 3px;\n      background: linear-gradient(180deg, #07131c, #050a10);\n      box-shadow: inset 0 0 0 1px rgba(90,209,255,0.05);\n      position: relative;\n      overflow: hidden;\n    }\n    .tap .fill {\n      position: absolute;\n      left: 0; right: 0; bottom: 0;\n      height: 0%;\n      background: linear-gradient(180deg, var(--accent2), var(--accent));\n      box-shadow: 0 0 10px rgba(90,209,255,0.7);\n      transition: height 0.06s linear;\n    }\n\
