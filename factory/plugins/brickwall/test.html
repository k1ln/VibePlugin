<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brickwall — test bench</title><style>
  :root{--ac:#ff6b6b}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Brickwall</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

    <div class="row"><label>Source

         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>Brickwall<\/title>\n  <style>\n    :root {\n      --accent: #ff6b6b;\n      --accent2: #ffb36b;\n      --bg0: #0b0a0c;\n      --bg1: #161318;\n      --mortar: #1c1820;\n      --brick-a: #2a2229;\n      --brick-b: #322631;\n      --ink: #efe7ea;\n      --ink-dim: #9a8f96;\n      --line: rgba(255,255,255,0.06);\n    }\n\n    * { box-sizing: border-box; }\n\n    html, body {\n      margin: 0;\n      height: 100%;\n    }\n\n    body {\n      font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n      color: var(--ink);\n      background:\n        radial-gradient(120% 90% at 50% -10%, #241a22 0%, var(--bg1) 42%, var(--bg0) 100%);\n      min-height: 100%;\n      display: flex;\n      justify-content: center;\n      padding: 18px;\n      overflow-x: hidden;\n    }\n\n    .panel {\n      width: 100%;\n      max-width: 560px;\n      background:\n        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.20)),\n        var(--bg1);\n      border: 1px solid rgba(255,255,255,0.08);\n      border-radius: 18px;\n      box-shadow:\n        0 24px 60px rgba(0,0,0,0.55),\n        inset 0 1px 0 rgba(255,255,255,0.07);\n      overflow: hidden;\n    }\n\n    /* ---------- header ---------- */\n    .header {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 16px 20px 12px;\n      border-bottom: 1px solid var(--line);\n      background: linear-gradient(180deg, rgba(255,107,107,0.06), transparent);\n    }\n\n    .brand {\n      display: flex;\n      align-items: center;\n      gap: 12px;\n    }\n\n    .logo {\n      width: 30px;\n      height: 30px;\n      border-radius: 7px;\n      position: relative;\n      background:\n        repeating-linear-gradient(0deg, #211a20 0 6px, #2c2230 6px 7px),\n        linear-gradient(180deg, var(--accent2), var(--accent));\n      box-shadow:\n        inset 0 0 0 1px rgba(0,0,0,0.4),\n        0 0 16px rgba(255,107,107,0.45);\n    }\n    .logo::after {\n      content: \"\";\n      position: absolute;\n      left: 4px; right: 4px; top: 9px;\n      height: 2px;\n      border-radius: 2px;\n      background: var(--accent);\n      box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);\n    }\n\n    .title {\n      font-size: 17px;\n      font-weight: 700;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n    }\n    .subtitle {\n      font-size: 10px;\n      letter-spacing: 0.32em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      margin-top: 2px;\n    }\n\n    .led {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      font-size: 10px;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n    }\n    .led-dot {\n      width: 11px;\n      height: 11px;\n      border-radius: 50%;\n      background: #3a2a2c;\n      box-shadow: inset 0 0 4px rgba(0,0,0,0.8);\n      transition: background 0.06s linear, box-shadow 0.06s linear;\n    }\n    .led-dot.hot {\n      background: var(--accent);\n      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent), inset 0 0 4px rgba(255,255,255,0.4);\n    }\n\n    /* ---------- the wall / visualiser ---------- */\n    .stage {\n      position: relative;\n      height: 200px;\n      margin: 16px;\n      border-radius: 12px;\n      overflow: hidden;\n      background:\n        linear-gradient(180deg, #0d0a0e, #120e13);\n      box-shadow: inset 0 2px 18px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);\n    }\n\n    /* the brick wall, drawn purely with gradients */\n    .wall {\n      position: absolute;\n      inset: 0;\n      background-color: var(--mortar);\n      background-image:\n        linear-gradient(335deg, rgba(255,107,107,0.05), transparent 60%),\n        linear-gradient(90deg, var(--brick-a) 0 49.3%, transparent 49.3% 50.7%, var(--brick-b) 50.7%),\n        linear-gradient(0deg, var(--mortar) 0 7%, transparent 7%);\n      background-size:\n        100% 100%,\n        96px 30px,\n        96px 30px;\n      background-position:\n        0 0,\n        0 0,\n        0 0;\n      opacity: 0.9;\n    }\n    /* offset every other row of bricks for the running-bond pattern */\n    .wall::before {\n      content: \"\";\n      position: absolute;\n      inset: 0;\n      background-image:\n        linear-gradient(90deg, var(--brick-b) 0 49.3%, transparent 49.3% 50.7%, var(--brick-a) 50.7%);\n      background-size: 96px 30px;\n      background-position: 48px 15px;\n      -webkit-mask-image: repeating-linear-gradient(0deg, transparent 0 30px, #000 30px 60px);\n      mask-image: repeating-linear-gradient(0deg, transparent 0 30px, #000 30px 60px);\n      opacity: 0.85;\n    }\n    /* subtle top-light on the bricks */\n    .wall::after {\n      content: \"\";\n      position: absolute;\n      inset: 0;\n      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 30%, rgba(0,0,0,0.35));\n      pointer-events: none;\n    }\n\n    canvas#scope {\n      position: absolute;\n      inset: 0;\n      width: 100%;\n      height: 100%;\n    }\n\n    /* the glowing ceiling line */\n    .ceiling {\n      position: absolute;\n      left: 0; right: 0;\n      height: 2px;\n      background: var(--accent);\n      box-shadow: 0 0 10px var(--accent), 0 0 26px var(--accent), 0 0 50px rgba(255,107,107,0.5);\n      z-index: 4;\n      transition: top 0.08s ease, bottom 0.08s ease;\n    }\n    .ceiling .tag {\n      position: absolute;\n      right: 8px;\n      top: -9px;\n      font-size: 9px;\n      letter-spacing: 0.2em;\n      color: var(--accent);\n      text-shadow: 0 0 8px rgba(255,107,107,0.8);\n      background: rgba(11,10,12,0.7);\n      padding: 1px 5px;\n      border-radius: 4px;\n    }\n    .ceiling.bottom {\n      box-shadow: 0 0 10px var(--accent), 0 0 26px var(--accent);\n    }\n    /* impact flash animation when the wave slams the ceiling */\n    @keyframes slam {\n      0%   { opacity: 1; height: 2px; }\n      40%  { opacity: 1; height: 5px; }\n      100% { opacity: 1; height: 2px; }\n    }\n    .ceiling.hit {\n      animation: slam 0.18s ease-out;\n      box-shadow: 0 0 16px var(--accent2), 0 0 40px var(--accent), 0 0 80px var(--accent);\n    }\n\n    /* gain-reduction meter on the right edge of the stage */\n    .gr {\n      position: absolute;\n      top: 8px; bottom: 8px; right: 8px;\n      width: 8px;\n      border-radius: 5px;\n      background: rgba(0,0,0,0.45);\n      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);\n      z-index: 5;\n      overflow: hidden;\n    }\n    .gr-fill {\n      position: absolute;\n      left: 0; right: 0; top: 0;\n      height: 0%;\n      background: linear-gradient(180deg, var(--accent2), var(--accent));\n      box-shadow: 0 0 12px var(--accent);\n      transition: height 0.06s linear;\n    }\n    .gr-label {\n      position: absolute;\n      bottom: 6px; right: 20px;\n      font-size: 8px;\n      letter-spacing: 0.18em;\n      color: var(--ink-dim);\n      writing-mode: vertical-rl;\n      z-index: 5;\n    }\n\n    /* ---------- controls ---------- */\n    .controls {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 12px;\n      padding: 4px 16px 22px;\n    }\n    @media (max-width: 460px) {\n      .controls { grid-template-columns: repeat(2, 1fr); }\n    }\n\n    .knobcell {\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 8px;\n      padding: 12px 6px;\n      border-radius: 12px;\n      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.18));\n      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 8px rgba(0,0,0,0.35);\n    }\n    .knob {\n      position: relative;\n      width: 76px;\n      height: 76px;\n      cursor: ns-resize;\n      touch-action: none;\n      user-select: none;\n    }\n    .knob svg { display: block; width: 100%; height: 100%; }\n    .klabel {\n      font-size: 10px;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n    }\n    .kval {\n      font-size: 13px;\n      font-weight: 600;\n      font-variant-numeric: tabular-nums;\n      color: var(--ink);\n      min-height: 16px;\n    }\n    .knobcell:hover .klabel { color: var(--accent2); }\n\n    .footer {\n      padding: 0 20px 16px;\n      font-size: 9px;\n      letter-spacing: 0.24em;\n      text-transform: uppercase;\n      color: rgba(154,143,150,0.5);\n      text-align: center;\n    }\n  <\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"panel\">\n    <div class=\"header\">\n      <div class=\"brand\">\n        <div class=\"logo\"><\/div>\n        <div>\n          <div class=\"title\">Brickwall<\/div>\n          <div class=\"subtitle\">Look-Ahead Limiter<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"led\">\n        <span id=\"ledtext\">limiting<\/span>\n        <span class=\"led-dot\" id=\"leddot\"><\/span>\n      <\/div>\n    <\/div>\n\n    <div class=\"stage\" id=\"stage\">\n      <div class=\"wall\"><\/div>\n      <canvas id=\"scope\"><\/canvas>\n      <div class=\"ceiling\" id=\"ceilTop\"><span class=\"tag\" id=\"ceilTag\">CEILING<\/span><\/div>\n      <div class=\"ceiling bottom\" id=\"ceilBot\"><\/div>\n      <div class=\"gr\"><div class=\"gr-fill\" id=\"grfill\"><\/div><\/div>\n      <div class=\"gr-label\">GR<\/div>\n    <\/div>\n\n    <div class=\"controls\" id=\"controls\"><\/div>\n    <div class=\"footer\">Original DSP &middot; Hard peak ceiling<\/div>\n  <\/div>\n\n  <script>\n    \"use strict\";\n\n    // ---- parameter definiti var leddot = document.getElementById(\"leddot\");\n    var grfill = document.getElementById(\"grfill\");\n    var lastHit = 0;\n\n    function resize() {\n      var r = stage.getBoundingClientRect();\n      canvas.width = Math.max(2, r.width) * (window.devicePixelRatio || 1);\n      canvas.height = Math.max(2, r.height) * (window.devicePixelRatio || 1);\n    }\n    window.addEventListener(\"resize\", function () { resize(); updateCeilingLine(); });\n\n    function draw(ts) {\n      if (document.hidden) { requestAnimationFrame(draw); return; }\n      var W = canvas.width, H = canvas.height;\n      var dpr = window.devicePixelRatio || 1;\n      ctx.clearRect(0, 0, W, H);\n\n      var lin = ceilingLin();\n      var mid = H / 2;\n      var ceilPix = (lin) * (H / 2); // distance from centre to ceiling\n\n      // synthesize a lively signal driven by Threshold (drive) + Release feel\n      var drive = 1 + values[0] * 3.2;            // visual drive amount\n      var rel = values[2];\n      phase += 0.05 + 0.02 * drive;\n\n      ctx.lineWidth = 2 * dpr;\n      ctx.lineJoin = \"round\";\n\n      var hitNow = false;\n      var grPeak = 0;\n\n      // draw a filled waveform\n      ctx.beginPath();\n      var N = 140;\n      for (var x = 0; x <= N; x++) {\n        var px = (x / N) * W;\n        var tt = x / N;\n        // composite \"musical\" looking wave\n        var raw =\n          Math.sin(phase + tt * 22) * 0.6 +\n          Math.sin(phase * 1.7 + tt * 9) * 0.4 +\n          Math.sin(phase * 0.6 + tt * 40) * 0.22;\n        // an occasional transient spike\n        var spike = Math.exp(-Math.pow((tt - ((ts * 0.0004) % 1)) * 9, 2)) * 1.4;\n        var amp = (raw + spike) * 0.42 * drive;\n\n        // hard-limit to the ceiling — the brickwall behaviour, visualised\n        var limited = amp;\n        if (limited > lin) { limited = lin; hitNow = true; }\n        if (limited < -lin) { limited = -lin; hitNow = true; }\n        var reduced = Math.abs(amp) - Math.abs(limited);\n
