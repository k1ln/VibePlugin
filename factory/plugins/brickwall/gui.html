<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brickwall</title>
  <style>
    :root {
      --accent: #ff6b6b;
      --accent2: #ffb36b;
      --bg0: #0b0a0c;
      --bg1: #161318;
      --mortar: #1c1820;
      --brick-a: #2a2229;
      --brick-b: #322631;
      --ink: #efe7ea;
      --ink-dim: #9a8f96;
      --line: rgba(255,255,255,0.06);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(120% 90% at 50% -10%, #241a22 0%, var(--bg1) 42%, var(--bg0) 100%);
      min-height: 100%;
      display: flex;
      justify-content: center;
      padding: 18px;
      overflow-x: hidden;
    }

    .panel {
      width: 100%;
      max-width: 560px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.20)),
        var(--bg1);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow:
        0 24px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.07);
      overflow: hidden;
    }

    /* ---------- header ---------- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,107,107,0.06), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      position: relative;
      background:
        repeating-linear-gradient(0deg, #211a20 0 6px, #2c2230 6px 7px),
        linear-gradient(180deg, var(--accent2), var(--accent));
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,0.4),
        0 0 16px rgba(255,107,107,0.45);
    }
    .logo::after {
      content: "";
      position: absolute;
      left: 4px; right: 4px; top: 9px;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-top: 2px;
    }

    .led {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .led-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #3a2a2c;
      box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
      transition: background 0.06s linear, box-shadow 0.06s linear;
    }
    .led-dot.hot {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent), inset 0 0 4px rgba(255,255,255,0.4);
    }

    /* ---------- the wall / visualiser ---------- */
    .stage {
      position: relative;
      height: 200px;
      margin: 16px;
      border-radius: 12px;
      overflow: hidden;
      background:
        linear-gradient(180deg, #0d0a0e, #120e13);
      box-shadow: inset 0 2px 18px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* the brick wall, drawn purely with gradients */
    .wall {
      position: absolute;
      inset: 0;
      background-color: var(--mortar);
      background-image:
        linear-gradient(335deg, rgba(255,107,107,0.05), transparent 60%),
        linear-gradient(90deg, var(--brick-a) 0 49.3%, transparent 49.3% 50.7%, var(--brick-b) 50.7%),
        linear-gradient(0deg, var(--mortar) 0 7%, transparent 7%);
      background-size:
        100% 100%,
        96px 30px,
        96px 30px;
      background-position:
        0 0,
        0 0,
        0 0;
      opacity: 0.9;
    }
    /* offset every other row of bricks for the running-bond pattern */
    .wall::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(90deg, var(--brick-b) 0 49.3%, transparent 49.3% 50.7%, var(--brick-a) 50.7%);
      background-size: 96px 30px;
      background-position: 48px 15px;
      -webkit-mask-image: repeating-linear-gradient(0deg, transparent 0 30px, #000 30px 60px);
      mask-image: repeating-linear-gradient(0deg, transparent 0 30px, #000 30px 60px);
      opacity: 0.85;
    }
    /* subtle top-light on the bricks */
    .wall::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 30%, rgba(0,0,0,0.35));
      pointer-events: none;
    }

    canvas#scope {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* the glowing ceiling line */
    .ceiling {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 26px var(--accent), 0 0 50px rgba(255,107,107,0.5);
      z-index: 4;
      transition: top 0.08s ease, bottom 0.08s ease;
    }
    .ceiling .tag {
      position: absolute;
      right: 8px;
      top: -9px;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow: 0 0 8px rgba(255,107,107,0.8);
      background: rgba(11,10,12,0.7);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .ceiling.bottom {
      box-shadow: 0 0 10px var(--accent), 0 0 26px var(--accent);
    }
    /* impact flash animation when the wave slams the ceiling */
    @keyframes slam {
      0%   { opacity: 1; height: 2px; }
      40%  { opacity: 1; height: 5px; }
      100% { opacity: 1; height: 2px; }
    }
    .ceiling.hit {
      animation: slam 0.18s ease-out;
      box-shadow: 0 0 16px var(--accent2), 0 0 40px var(--accent), 0 0 80px var(--accent);
    }

    /* gain-reduction meter on the right edge of the stage */
    .gr {
      position: absolute;
      top: 8px; bottom: 8px; right: 8px;
      width: 8px;
      border-radius: 5px;
      background: rgba(0,0,0,0.45);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
      z-index: 5;
      overflow: hidden;
    }
    .gr-fill {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 0%;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      box-shadow: 0 0 12px var(--accent);
      transition: height 0.06s linear;
    }
    .gr-label {
      position: absolute;
      bottom: 6px; right: 20px;
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--ink-dim);
      writing-mode: vertical-rl;
      z-index: 5;
    }

    /* ---------- controls ---------- */
    .controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 4px 16px 22px;
    }
    @media (max-width: 460px) {
      .controls { grid-template-columns: repeat(2, 1fr); }
    }

    .knobcell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 6px;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.18));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 8px rgba(0,0,0,0.35);
    }
    .knob {
      position: relative;
      width: 76px;
      height: 76px;
      cursor: ns-resize;
      touch-action: none;
      user-select: none;
    }
    .knob svg { display: block; width: 100%; height: 100%; }
    .klabel {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .kval {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      min-height: 16px;
    }
    .knobcell:hover .klabel { color: var(--accent2); }

    .footer {
      padding: 0 20px 16px;
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(154,143,150,0.5);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <div class="title">Brickwall</div>
          <div class="subtitle">Look-Ahead Limiter</div>
        </div>
      </div>
      <div class="led">
        <span id="ledtext">limiting</span>
        <span class="led-dot" id="leddot"></span>
      </div>
    </div>

    <div class="stage" id="stage">
      <div class="wall"></div>
      <canvas id="scope"></canvas>
      <div class="ceiling" id="ceilTop"><span class="tag" id="ceilTag">CEILING</span></div>
      <div class="ceiling bottom" id="ceilBot"></div>
      <div class="gr"><div class="gr-fill" id="grfill"></div></div>
      <div class="gr-label">GR</div>
    </div>

    <div class="controls" id="controls"></div>
    <div class="footer">Original DSP &middot; Hard peak ceiling</div>
  </div>

  <script>
    "use strict";

    // ---- parameter definitions (indices match the DSP module) ----------
    var PARAMS = [
      { name: "Threshold", index: 0, min: 0, max: 1, def: 0.0,
        fmt: function (v) { return "+" + (v * 24).toFixed(1) + " dB"; } },
      { name: "Ceiling", index: 1, min: 0, max: 1, def: 1.0,
        fmt: function (v) { var db = -24 + v * 24; return (db >= -0.05 ? "0.0" : db.toFixed(1)) + " dB"; } },
      { name: "Release", index: 2, min: 0, max: 1, def: 0.25,
        fmt: function (v) { return (1 + v * v * 599).toFixed(0) + " ms"; } },
      { name: "Gain", index: 3, min: 0, max: 1, def: 0.5,
        fmt: function (v) { var db = -12 + v * 24; return (db >= 0 ? "+" : "") + db.toFixed(1) + " dB"; } }
    ];

    var values = {};

    function pushParam(p, v) {
      values[p.index] = v;
      if (window.vstai && window.vstai.setParam) {
        window.vstai.setParam(p.index, v);
      }
      if (p.index === 1) updateCeilingLine();
    }

    // ---- knob builder --------------------------------------------------
    function makeKnob(p) {
      var cell = document.createElement("div");
      cell.className = "knobcell";

      var knob = document.createElement("div");
      knob.className = "knob";

      var NS = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(NS, "svg");
      svg.setAttribute("viewBox", "0 0 100 100");

      // static well / track
      var track = document.createElementNS(NS, "circle");
      track.setAttribute("cx", "50"); track.setAttribute("cy", "50");
      track.setAttribute("r", "38");
      track.setAttribute("fill", "none");
      track.setAttribute("stroke", "rgba(255,255,255,0.08)");
      track.setAttribute("stroke-width", "7");
      track.setAttribute("stroke-linecap", "round");
      track.setAttribute("stroke-dasharray", "179 360");
      track.setAttribute("transform", "rotate(135 50 50)");
      svg.appendChild(track);

      // value arc
      var arc = document.createElementNS(NS, "circle");
      arc.setAttribute("cx", "50"); arc.setAttribute("cy", "50");
      arc.setAttribute("r", "38");
      arc.setAttribute("fill", "none");
      arc.setAttribute("stroke", "url(#g" + p.index + ")");
      arc.setAttribute("stroke-width", "7");
      arc.setAttribute("stroke-linecap", "round");
      arc.setAttribute("transform", "rotate(135 50 50)");
      svg.appendChild(arc);

      // gradient
      var defs = document.createElementNS(NS, "defs");
      var grad = document.createElementNS(NS, "linearGradient");
      grad.setAttribute("id", "g" + p.index);
      grad.setAttribute("x1", "0"); grad.setAttribute("y1", "0");
      grad.setAttribute("x2", "1"); grad.setAttribute("y2", "1");
      var s1 = document.createElementNS(NS, "stop");
      s1.setAttribute("offset", "0"); s1.setAttribute("stop-color", "#ffb36b");
      var s2 = document.createElementNS(NS, "stop");
      s2.setAttribute("offset", "1"); s2.setAttribute("stop-color", "#ff6b6b");
      grad.appendChild(s1); grad.appendChild(s2);
      defs.appendChild(grad);
      svg.appendChild(defs);

      // body
      var body = document.createElementNS(NS, "circle");
      body.setAttribute("cx", "50"); body.setAttribute("cy", "50");
      body.setAttribute("r", "29");
      body.setAttribute("fill", "url(#b" + p.index + ")");
      body.setAttribute("stroke", "rgba(0,0,0,0.5)");
      body.setAttribute("stroke-width", "1");
      var bgrad = document.createElementNS(NS, "radialGradient");
      bgrad.setAttribute("id", "b" + p.index);
      bgrad.setAttribute("cx", "0.5"); bgrad.setAttribute("cy", "0.35");
      var b1 = document.createElementNS(NS, "stop");
      b1.setAttribute("offset", "0"); b1.setAttribute("stop-color", "#3a323a");
      var b2 = document.createElementNS(NS, "stop");
      b2.setAttribute("offset", "1"); b2.setAttribute("stop-color", "#1a161c");
      bgrad.appendChild(b1); bgrad.appendChild(b2);
      defs.appendChild(bgrad);

      // pointer notch
      var notch = document.createElementNS(NS, "line");
      notch.setAttribute("x1", "50"); notch.setAttribute("y1", "50");
      notch.setAttribute("x2", "50"); notch.setAttribute("y2", "26");
      notch.setAttribute("stroke", "#ffd9c2");
      notch.setAttribute("stroke-width", "3");
      notch.setAttribute("stroke-linecap", "round");
      svg.appendChild(notch);

      knob.appendChild(svg);

      var label = document.createElement("div");
      label.className = "klabel";
      label.textContent = p.name;

      var val = document.createElement("div");
      val.className = "kval";

      cell.appendChild(knob);
      cell.appendChild(label);
      cell.appendChild(val);

      var ARC_LEN = 2 * Math.PI * 38 * (270 / 360);

      function render(v) {
        var t = (v - p.min) / (p.max - p.min);
        if (t < 0) t = 0; if (t > 1) t = 1;
        arc.setAttribute("stroke-dasharray", (ARC_LEN * t).toFixed(1) + " 360");
        var ang = 135 + t * 270;
        notch.setAttribute("transform", "rotate(" + ang + " 50 50)");
        val.textContent = p.fmt(v);
      }

      function set(v, push) {
        if (v < p.min) v = p.min; if (v > p.max) v = p.max;
        render(v);
        if (push) pushParam(p, v);
      }

      // drag interaction (vertical)
      var dragging = false, startY = 0, startV = 0;
      knob.addEventListener("pointerdown", function (e) {
        dragging = true; startY = e.clientY; startV = values[p.index];
        knob.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      knob.addEventListener("pointermove", function (e) {
        if (!dragging) return;
        var dy = startY - e.clientY;
        var range = p.max - p.min;
        var v = startV + (dy / 200) * range;
        set(v, true);
      });
      knob.addEventListener("pointerup", function (e) {
        dragging = false;
        try { knob.releasePointerCapture(e.pointerId); } catch (err) {}
      });
      knob.addEventListener("dblclick", function () { set(p.def, true); });
      knob.addEventListener("wheel", function (e) {
        e.preventDefault();
        var range = p.max - p.min;
        var v = values[p.index] - Math.sign(e.deltaY) * range * 0.02;
        set(v, true);
      }, { passive: false });

      p._set = set;
      return cell;
    }

    var controlsEl = document.getElementById("controls");
    for (var i = 0; i < PARAMS.length; i++) {
      controlsEl.appendChild(makeKnob(PARAMS[i]));
    }

    // ---- ceiling line position from the Ceiling param ------------------
    var stage = document.getElementById("stage");
    var ceilTop = document.getElementById("ceilTop");
    var ceilBot = document.getElementById("ceilBot");
    var ceilTag = document.getElementById("ceilTag");

    function ceilingLin() {
      var v = values[1];
      var db = -24 + v * 24;
      return Math.exp(db * 0.11512925); // 0.063..1.0
    }

    function updateCeilingLine() {
      var lin = ceilingLin();
      // map ceiling (0..1 lin) to a fraction of half the stage height from centre
      var frac = lin; // portion of half-height the ceiling sits at
      var halfPct = 50 * frac;
      ceilTop.style.top = (50 - halfPct) + "%";
      ceilBot.style.bottom = (50 - halfPct) + "%";
      ceilTag.textContent = "CEILING " + (values[1] >= 0.999 ? "0.0" : (-24 + values[1] * 24).toFixed(1)) + " dB";
    }

    // ---- scope: an animated waveform that slams into the ceiling -------
    var canvas = document.getElementById("scope");
    var ctx = canvas.getContext("2d");
    var phase = 0;
    var grSmooth = 0;
    var leddot = document.getElementById("leddot");
    var grfill = document.getElementById("grfill");
    var lastHit = 0;

    function resize() {
      var r = stage.getBoundingClientRect();
      canvas.width = Math.max(2, r.width) * (window.devicePixelRatio || 1);
      canvas.height = Math.max(2, r.height) * (window.devicePixelRatio || 1);
    }
    window.addEventListener("resize", function () { resize(); updateCeilingLine(); });

    function draw(ts) {
      if (document.hidden) { requestAnimationFrame(draw); return; }
      var W = canvas.width, H = canvas.height;
      var dpr = window.devicePixelRatio || 1;
      ctx.clearRect(0, 0, W, H);

      var lin = ceilingLin();
      var mid = H / 2;
      var ceilPix = (lin) * (H / 2); // distance from centre to ceiling

      // synthesize a lively signal driven by Threshold (drive) + Release feel
      var drive = 1 + values[0] * 3.2;            // visual drive amount
      var rel = values[2];
      phase += 0.05 + 0.02 * drive;

      ctx.lineWidth = 2 * dpr;
      ctx.lineJoin = "round";

      var hitNow = false;
      var grPeak = 0;

      // draw a filled waveform
      ctx.beginPath();
      var N = 140;
      for (var x = 0; x <= N; x++) {
        var px = (x / N) * W;
        var tt = x / N;
        // composite "musical" looking wave
        var raw =
          Math.sin(phase + tt * 22) * 0.6 +
          Math.sin(phase * 1.7 + tt * 9) * 0.4 +
          Math.sin(phase * 0.6 + tt * 40) * 0.22;
        // an occasional transient spike
        var spike = Math.exp(-Math.pow((tt - ((ts * 0.0004) % 1)) * 9, 2)) * 1.4;
        var amp = (raw + spike) * 0.42 * drive;

        // hard-limit to the ceiling — the brickwall behaviour, visualised
        var limited = amp;
        if (limited > lin) { limited = lin; hitNow = true; }
        if (limited < -lin) { limited = -lin; hitNow = true; }
        var reduced = Math.abs(amp) - Math.abs(limited);
        if (reduced > grPeak) grPeak = reduced;

        var py = mid - limited * (H / 2);
        if (x === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      // close down the centre for a soft fill
      ctx.lineTo(W, mid); ctx.lineTo(0, mid); ctx.closePath();
      var fill = ctx.createLinearGradient(0, 0, 0, H);
      fill.addColorStop(0, "rgba(255,179,107,0.28)");
      fill.addColorStop(0.5, "rgba(255,107,107,0.10)");
      fill.addColorStop(1, "rgba(255,179,107,0.28)");
      ctx.fillStyle = fill;
      ctx.fill();

      // crisp top stroke of the wave
      ctx.beginPath();
      for (var x2 = 0; x2 <= N; x2++) {
        var px2 = (x2 / N) * W;
        var tt2 = x2 / N;
        var raw2 =
          Math.sin(phase + tt2 * 22) * 0.6 +
          Math.sin(phase * 1.7 + tt2 * 9) * 0.4 +
          Math.sin(phase * 0.6 + tt2 * 40) * 0.22;
        var spike2 = Math.exp(-Math.pow((tt2 - ((ts * 0.0004) % 1)) * 9, 2)) * 1.4;
        var amp2 = (raw2 + spike2) * 0.42 * drive;
        var lim2 = amp2; if (lim2 > lin) lim2 = lin; if (lim2 < -lin) lim2 = -lin;
        var py2 = mid - lim2 * (H / 2);
        if (x2 === 0) ctx.moveTo(px2, py2); else ctx.lineTo(px2, py2);
      }
      ctx.strokeStyle = "#ffd0b0";
      ctx.shadowColor = "rgba(255,107,107,0.6)";
      ctx.shadowBlur = 8 * dpr;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // gain-reduction meter + LED, eased
      var grTarget = Math.min(1, grPeak * 2.2);
      grSmooth += (grTarget - grSmooth) * (0.06 + rel * 0.0);
      grfill.style.height = (grSmooth * 100).toFixed(1) + "%";
      if (grTarget > 0.04) {
        leddot.classList.add("hot");
      } else {
        leddot.classList.remove("hot");
      }

      // slam flash, throttled
      if (hitNow && ts - lastHit > 140) {
        lastHit = ts;
        ceilTop.classList.remove("hit"); ceilBot.classList.remove("hit");
        void ceilTop.offsetWidth;
        ceilTop.classList.add("hit"); ceilBot.classList.add("hit");
      }

      requestAnimationFrame(draw);
    }

    // ---- init ----------------------------------------------------------
    function ready() {
      for (var i = 0; i < PARAMS.length; i++) {
        var p = PARAMS[i];
        var init = (window.vstai && window.vstai.getParam)
          ? window.vstai.getParam(p.index) : undefined;
        var v = (typeof init === "number" && isFinite(init)) ? init : p.def;
        values[p.index] = v;
        p._set(v, true); // initialise control + push default to engine
      }
      resize();
      updateCeilingLine();
      requestAnimationFrame(draw);
    }

    if (window.vstai && window.vstai.onReady) {
      window.vstai.onReady(ready);
    } else {
      ready();
    }
  </script>
</body>
</html>
