<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Valve Rotary — test bench</title><style>
  :root{--ac:#ffb347}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Valve Rotary</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Valve Rotary<\/title>\n<style>\n  :root{\n    --accent:#ffb347;\n    --accent2:#a0764a;\n    --wood1:#5a3a23;\n    --wood2:#3a2415;\n    --wood3:#71492c;\n    --grille:#1a120b;\n    --glow:#ffb347;\n    --spin:1.7s;        /* horn rotation period, driven by Speed */\n    --drive:0.45;       /* tube glow intensity */\n    --depth:0.7;        /* wobble amount */\n  }\n  *{box-sizing:border-box;-webkit-user-select:none;user-select:none;}\n  html,body{margin:0;height:100%;}\n  body{\n    font-family:\"Avenir Next\",\"Segoe UI\",system-ui,sans-serif;\n    background:\n      radial-gradient(120% 80% at 50% -10%, #2a1d12 0%, #16100a 60%, #0c0805 100%);\n    color:#f3e0c4;\n    display:flex;align-items:center;justify-content:center;\n    min-height:100%;padding:18px;overflow:hidden;\n  }\n  .unit{\n    width:560px;border-radius:18px;position:relative;\n    padding:18px 20px 20px;\n    background:\n      linear-gradient(180deg,#23160d,#160d07);\n    box-shadow:0 30px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,200,140,.08);\n    border:1px solid rgba(0,0,0,.6);\n  }\n  /* ---- header / nameplate ---- */\n  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}\n  .brand{display:flex;flex-direction:column;line-height:1;}\n  .brand .nm{\n    font-weight:800;font-size:22px;letter-spacing:.14em;\n    color:#fff;text-shadow:0 0 14px rgba(255,179,71,.45);\n  }\n  .brand .nm b{color:var(--accent);}\n  .brand .sub{font-size:9.5px;letter-spacing:.32em;color:#b58e63;margin-top:5px;text-transform:uppercase;}\n  .plate{\n    font-size:10px;letter-spacing:.2em;color:#1a120b;\n    background:linear-gradient(180deg,#e8c98e,#b78a4f);\n    padding:5px 11px;border-radius:5px;font-weight:800;\n    box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 5px rgba(0,0,0,.5);\n  }\n\n  /* ===== the cabinet ===== */\n  .cab{\n    position:relative;height:236px;border-radius:14px;overflow:hidden;\n    background:\n      repeating-linear-gradient(96deg,\n        var(--wood2) 0px, var(--wood3) 7px, var(--wood1) 13px, var(--wood2) 20px),\n      linear-gradient(180deg,#6b4427,#3a2415);\n    box-shadow:inset 0 0 36px rgba(0,0,0,.7), 0 4px 14px rgba(0,0,0,.5);\n    border:3px solid #2a1809;\n    padding:14px;\n    display:flex;gap:14px;\n  }\n  .cab::after{ /* lacquer sheen */\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:linear-gradient(115deg,rgba(255,235,200,.10) 0%,transparent 28%,transparent 72%,rgba(0,0,0,.22) 100%);\n  }\n\n  /* upper louvre = horn rotor compartment / lower = bass drum */\n  .bay{\n    position:relative;flex:1;border-radius:9px;overflow:hidden;\n    background:\n      radial-gradient(circle at 50% 42%, #2c2114, #120c06 75%);\n    box-shadow:inset 0 0 22px rgba(0,0,0,.85), inset 0 0 0 2px rgba(0,0,0,.5);\n  }\n  /* horizontal grille slats */\n  .grille{\n    position:absolute;inset:0;pointer-events:none;z-index:6;\n    background:repeating-linear-gradient(0deg,\n      rgba(0,0,0,.0) 0px, rgba(0,0,0,.0) 5px,\n      rgba(10,7,4,.78) 5px, rgba(10,7,4,.78) 8px);\n  }\n  .grille::before{ /* cloth weave */\n    content:\"\";position:absolute;inset:0;opacity:.4;\n    background:\n      repeating-linear-gradient(90deg,rgba(0,0,0,.35) 0 1px,transparent 1px 3px);\n  }\n\n  /* ---- spinning HORN rotor (top bay) ---- */\n  .horn-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:3;}\n  .horn-rot{\n    width:150px;height:150px;position:relative;\n    transform-style:preserve-3d;\n    animation:spin var(--spin) linear infinite;\n  }\n  /* the dual horn — two trumpets back to back */\n  .horn{\n    position:absolute;top:50%;left:50%;width:78px;height:30px;\n    transform-origin:left center;\n    border-radius:0 60% 60% 0 / 0 50% 50% 0;\n    background:linear-gradient(180deg,#ffce8a,#c98a3f 55%,#7c4f23);\n    box-shadow:0 0 16px rgba(255,179,71,.55), inset 0 2px 4px rgba(255,255,255,.4), inset 0 -3px 6px rgba(0,0,0,.4);\n  }\n  .horn.a{transform:translate(-2px,-50%) rotate(0deg) scaleX(1);}\n  .horn.b{transform:translate(-2px,-50%) rotate(180deg) scaleX(1);}\n  .horn-hub{\n    position:absolute;top:50%;left:50%;width:22px;height:22px;\n    transform:translate(-50%,-50%);border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#fff2d8,#9c6a32 70%,#3a2412);\n    box-shadow:0 0 10px rgba(255,179,71,.6),inset 0 -2px 3px rgba(0,0,0,.5);\n    z-index:2;\n  }\n  /* motion-blur swirl behind the horn */\n  .swirl{\n    position:absolute;top:50%;left:50%;width:168px;height:168px;\n    transform:translate(-50%,-50%);border-radius:50%;\n    background:conic-gradient(from 0deg,\n      rgba(255,179,71,.0),rgba(255,179,71,.30),rgba(255,179,71,.0) 40%,\n      rgba(255,179,71,.22),rgba(255,179,71,.0) 80%);\n    filter:blur(7px);opacity:.85;z-index:1;\n    animation:spin calc(var(--spin) * .85) linear infinite;\n  }\n\n  /* ---- spinning BASS rotor (bottom bay) ---- */\n  .drum-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:3;}\n  .drum-rot{\n    width:188px;height:118px;position:relative;\n    animation:spin calc(var(--spin) * 1.16) linear infinite reverse;\n  }\n  .drum{\n    position:absolute;top:50%;left:50%;width:182px;height:62px;\n    transform:translate(-50%,-50%);border-radius:50%;\n    background:\n      linear-gradient(90deg,#1c130a 0%,#5a3c20 18%,#caa066 50%,#5a3c20 82%,#1c130a 100%);\n    box-shadow:inset 0 4px 10px rgba(255,220,170,.25),inset 0 -6px 12px rgba(0,0,0,.6),0 0 18px rgba(0,0,0,.5);\n  }\n  .drum-port{ /* the scoop opening */\n    position:absolute;top:50%;left:14px;width:54px;height:40px;\n    transform:translateY(-50%);border-radius:50% 8px 8px 50%;\n    background:radial-gradient(circle at 70% 50%,#3a2614,#0d0804);\n    box-shadow:inset 0 0 12px rgba(0,0,0  1px 0 rgba(255,210,150,.18);\n  }\n  .knob .arc{\n    position:absolute;inset:-6px;border-radius:50%;\n    background:conic-gradient(from 130deg,\n      var(--accent) 0turn,\n      var(--accent2) calc(var(--n)*0.72turn),\n      rgba(255,255,255,.06) calc(var(--n)*0.72turn),\n      rgba(255,255,255,.06) 0.72turn,\n      transparent 0.72turn);\n    -webkit-mask:radial-gradient(circle, transparent 33px, #000 34px, #000 38px, transparent 39px);\n    mask:radial-gradient(circle, transparent 33px, #000 34px, #000 38px, transparent 39px);\n    filter:drop-shadow(0 0 5px rgba(255,179,71,.5));\n  }\n  .knob .cap{\n    position:absolute;inset:13px;border-radius:50%;\n    background:\n      radial-gradient(circle at 40% 30%,#7a542e,#3a2412 72%);\n    box-shadow:inset 0 2px 4px rgba(255,220,170,.25),inset 0 -4px 8px rgba(0,0,0,.6);\n  }\n  .knob .ptr{\n    position:absolute;left:50%;top:50%;width:3px;height:24px;border-radius:2px;\n    background:linear-gradient(180deg,var(--accent),#fff);\n    transform-origin:50% 100%;\n    transform:translate(-50%,-100%) rotate(calc((var(--n)*260deg) - 130deg));\n    box-shadow:0 0 7px rgba(255,179,71,.8);\n  }\n  .pname{font-size:10px;letter-spacing:.22em;color:#d9b483;text-transform:uppercase;}\n  .pval{font-size:11px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;\n    text-shadow:0 0 8px rgba(255,179,71,.4);}\n\n  /* speed rocker — visual chorale/tremolo indicator */\n  .foot{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px;font-size:9px;letter-spacing:.2em;color:#8d6a45;text-transform:uppercase;}\n  .foot .lamp{width:9px;height:9px;border-radius:50%;background:#3a2614;box-shadow:inset 0 0 3px #000;}\n  .foot .lamp.on{background:var(--accent);box-shadow:0 0 9px var(--accent);}\n\n  @keyframes spin{to{transform:rotate(360deg);}}\n  .horn-rot{animation-name:spin;}\n  @keyframes rise{to{opacity:1;transform:none;}}\n  @keyframes flicker{\n    0%{opacity:calc(.35 + var(--drive)*.55);}\n   function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
