  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Patch 2600<\/title>\n<style>\n  :root {\n    --accent:  #7c90b0;\n    --accent2: #c0d0e0;\n    --panel:   #2a3340;\n    --panel-2: #222a36;\n    --metal:   #3a4756;\n    --ink:     #e7eef6;\n    --dim:     #8a99ad;\n    --jack:    #11161d;\n    --slot:    #161d26;\n    --shadow:  rgba(0,0,0,0.55);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background: #0c1015;\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .wrap {\n    max-width: 940px;\n    margin: 0 auto;\n    padding: 16px 16px 26px;\n  }\n\n  /* ---- The console chassis ---- */\n  .console {\n    position: relative;\n    border-radius: 16px;\n    padding: 18px;\n    background:\n      linear-gradient(180deg, #36414f 0%, #2a3340 7%, #232b37 100%);\n    box-shadow:\n      0 18px 50px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(255,255,255,0.08),\n      inset 0 -2px 0 rgba(0,0,0,0.5);\n    border: 1px solid #4a5666;\n  }\n  /* brushed-metal sheen */\n  .console::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    border-radius: 16px;\n    pointer-events: none;\n    background:\n      repeating-linear-gradient(90deg,\n        rgba(255,255,255,0.015) 0 2px,\n        rgba(0,0,0,0.015) 2px 4px);\n    opacity: 0.6;\n  }\n\n  /* corner screws */\n  .screw {\n    position: absolute;\n    width: 12px; height: 12px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 35% 30%, #8d9aab, #2d3742 70%);\n    box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 1px 2px rgba(0,0,0,0.6);\n  }\n  .screw::after {\n    content: \"\";\n    position: absolute;\n    left: 2px; top: 5px; right: 2px; height: 2px;\n    background: rgba(0,0,0,0.45);\n    transform: rotate(35deg);\n    border-radius: 2px;\n  }\n  .screw.tl { top: 8px; left: 8px; }\n  .screw.tr { top: 8px; right: 8px; }\n  .screw.bl { bottom: 8px; left: 8px; }\n  .screw.br { bottom: 8px; right: 8px; }\n\n  /* ---- Header ---- */\n  header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 4px 14px 14px;\n    position: relative;\n  }\n  .brand { display: flex; align-items: baseline; gap: 12px; }\n  .brand h1 {\n    font-size: 22px;\n    letter-spacing: 0.42em;\n    margin: 0;\n    font-weight: 700;\n    text-transform: uppercase;\n    color: var(--ink);\n    text-shadow: 0 1px 0 rgba(0,0,0,0.6);\n  }\n  .brand .sub {\n    font-size: 10px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .powerlamp {\n    width: 11px; height: 11px; border-radius: 50%;\n    background: radial-gradient(circle at 40% 35%, var(--accent2), var(--accent) 60%, #2a3340 100%);\n    box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(124,144,176,0.5);\n    animation: lampPulse 3.2s ease-in-out infinite;\n  }\n  @keyframes lampPulse {\n    0%, 100% { opacity: 0.7; box-shadow: 0 0 6px var(--accent); }\n    50%      { opacity: 1;   box-shadow: 0 0 14px var(--accent2), 0 0 26px rgba(192,208,224,0.5); }\n  }\n\n  /* ---- Patch bay: faders + cords ---- */\n  .bay {\n    position: relative;\n    border-radius: 12px;\n    padding: 20px 16px 14px;\n    background:\n      radial-gradient(120% 100% at 50% -10%, rgba(124,144,176,0.10), transparent 60%),\n      linear-gradient(180deg, var(--panel-2), #1b222c);\n    box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);\n  }\n\n  /* SVG cords overlay sits above the faders but ignores pointer events */\n  #cords {\n    position: absolute;\n    inset: 0;\n    width: 100%; height: 100%;\n    pointer-events: none;\n    z-index: 5;\n  }\n\n  .modules {\n    position: relative;\n    z-index: 2;\n    display: grid;\n    grid-template-columns: r th: 16px; height: 22px;\n    transform: translateX(-50%);\n    top: 26px;\n    border-radius: 4px;\n    background: linear-gradient(180deg, #cfd7e0, #7a8696 55%, #4a5562);\n    box-shadow: 0 2px 5px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.6);\n    transition: top 0.16s cubic-bezier(.5,1.6,.5,1);\n  }\n  .toggle.on .lever {\n    top: 6px;\n    background: linear-gradient(180deg, var(--accent2), var(--accent) 60%, #4a5562);\n    box-shadow: 0 0 10px var(--accent), inset 0 1px 0 rgba(255,255,255,0.6);\n  }\n  .toggle .on-led {\n    position: absolute;\n    bottom: 4px; left: 50%;\n    transform: translateX(-50%);\n    width: 6px; height: 6px; border-radius: 50%;\n    background: #2a3340;\n    transition: background 0.18s, box-shadow 0.18s;\n  }\n  .toggle.on .on-led {\n    background: var(--accent2);\n    box-shadow: 0 0 8px var(--accent2);\n  }\n\n  .value {\n    font-size: 10px;\n    font-variant-numeric: tabular-nums;\n    letter-spacing: 0.04em;\n    color: var(--accent2);\n    min-height: 13px;\n  }\n\n  /* ---- keyboard ---- */\n  .keyboard {\n    margin-top: 16px;\n    display: flex;\n    position: relative;\n    height: 100px;\n    background: linear-gradient(180deg, #1b222c, #11161d);\n    border-radius: 8px;\n    padding: 8px 8px 8px;\n    box-shadow: inset 0 2px 8px rgba(0,0,0,0.7);\n    user-select: none;\n    touch-action: none;\n  }\n  .keys {\n    position: relative;\n    display: flex;\n    flex: 1;\n    height: 100%;\n  }\n  .wkey {\n    position: relative;\n    flex: 1;\n    margin: 0 1px;\n    border-radius: 0 0 4px 4px;\n    background: linear-gradient(180deg, #f2f5f9, #cdd5de);\n    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.18), 0 2px 3px rgba(0,0,0,0.4);\n    cursor: pointer;\n  }\n  .wkey.down {\n    background: linear-gradient(180deg, var(--accent2), var(--accent));\n    box-shadow: inset 0 3px 8px rgba(0,0,0,0.4);\n  }\n  .bkey {\n    position: absolute;\n    top: 0;\n    width: 60%;\n    height: 60%;\n    background: linear-gradient(
