  <title>String Ensemble — test bench</title><style>
  :root{--ac:#e8d6a0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}

  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}

  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>String Ensemble<\/title>\n<style>\n  :root {\n    --accent:  #e8d6a0;\n    --accent2: #c0a86a;\n    --wood1:   #3a2c1d;\n    --wood2:   #271c11;\n    --cream:   #f3e9cf;\n    --cream-d: #d9caa0;\n    --ink:     #1a140c;\n    --panel:   #2c2114;\n    --panel-hi:#48371f;\n    --text:    #f0e6cf;\n    --text-dim:#b9a784;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: #0e0a05;\n    color: var(--text);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .shell {\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 14px;\n  }\n\n  .cabinet {\n    position: relative;\n    border-radius: 16px;\n    padding: 18px 18px 16px;\n    background:\n      radial-gradient(120% 80% at 50% -10%, rgba(232,214,160,0.12), transparent 60%),\n      linear-gradient(160deg, var(--wood1), var(--wood2));\n    box-shadow:\n      0 18px 50px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(255,236,190,0.10),\n      inset 0 -2px 8px rgba(0,0,0,0.5);\n    border: 1px solid rgba(0,0,0,0.6);\n    overflow: hidden;\n  }\n\n  /* faint wood grain */\n  .cabinet::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    pointer-events: none;\n    opacity: 0.10;\n    background-image: repeating-linear-gradient(\n      92deg, rgba(255,220,160,0.5) 0 1px, transparent 1px 7px);\n    mix-blend-mode: overlay;\n  }\n\n  /* ---------- header ---------- */\n  .head {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    margin-bottom: 12px;\n    position: relative;\n    z-index: 2;\n  }\n  .brand {\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n  }\n  .title {\n    font-size: 26px;\n    font-weight: 800;\n    letter-spacing: 1.5px;\n    color: var(--cream);\n    text-shadow: 0 1px 0 rgba(0,0,0,0.6), 0 0 18px rgba(232,214,160,0.25);\n  }\n  .subtitle {\n    font-size: 10px;\n    letter-spacing: 4px;\n    text-transform: uppercase;\n    color: var(--accent2);\n  }\n  .badge {\n    font-size: 9px;\n    letter-spacing: 2.5px;\n    text-transform: uppercase;\n    color: var(--ink);\n    background: linear-gradient(180deg, var(--accent), var(--accent2));\n    padding: 5px 10px;\n    border-radius: 20px;\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 2px 6px rgba(0,0,0,0.4);\n    font-weight: 700;\n  }\n\n  /* ---------- string visualiser ---------- */\n  .stage {\n    position: relative;\n    height: 150px;\n    border-radius: 12px;\n    background:\n      radial-gradient(80% 130% at 50% 120%, rgba(232,214,160,0.18), transparent 55%),\n      linear-gradient(180deg, #120c06, #1d1409);\n    border: 1px solid rgba(0,0,0,0.6);\n    box-shadow: inset 0 2px 10px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(232,214,160,0.05);\n    overflow: hidden;\n    margin-bottom: 14px;\n  }\n  .stage svg { display: block; width: 100%; height: 100%; }\n\n  /* warm ensemble glow that breathes when playing */\n  .glow {\n    position: absolute;\n    left: 50%; top: 58%;\n    width: 70%; height: 80%;\n    transform: translate(-50%,-50%);\n    background: radial-gradient(closest-side, rgba(232,214,160,0.35), transparent 70%);\n    filter: blur(14px);\n    opacity: 0.25;\n    transition: opacity 0.4s ease;\n    pointer-events: none;\n  }\n  .stage.active .glow { animation: breathe 3.2s ease-in-out infinite; opacity: 0.5; }\n  @keyframes breathe {\n    0%, 100% { opacity: 0.30; transform: translate(-50%,-50%) scale(0.96); }\n    50%      { opacity: 0.62; transform: translate(-50%,-50%) scale(1.05); }\n  }\n\n  /* the bowed strings shimmer */\n  .bowstring {\n    transform-origin: center;\n  }\n  .stage.active .bowstring { animation: shimmer 2.6s ease-in-out infinite; }\n  @keyframes shimmer {\n    0%, 100% { opacity: 0.55; }\n    50%      { opacity: 1; }\n  }\n  .bow {\n    transition: transform 0.5s ease;\n  }\n  .stage.active .bow { animation: bowing 2.1s ease-in-out infinite; }\n  @keyframes bowing {\n    0%, 100% { transform: translateX(-14px) rotate(-1deg); }\n    50%      { transform: translateX(14px) rotate(1deg); }\n  }\n\n  /* ---------- controls ---------- */\n  .rack {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 10px;\n    margin-bottom: 14px;\n    position: relative;\n    z-index: 2;\n  }\n  @media (max-width: 560px) {\n    .rack { grid-template-columns: repeat(3, 1fr); }\n  }\n\n  .cell {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 6px;\n    padding: 10px 4px 8px;\n    border-radius: 10px;\n    background: linear-gradient(180deg, var(--panel-hi), var(--panel));\n    box-shadow:\n      inset 0 1px 0 rgba(255,236,190,0.12),\n      inset 0 -3px 8px rgba(0,0,0,0.45),\n      0 3px 8px rgba(0,0,0,0.35);\n  }\n  .knob-wrap {\n    position: relative;\n    width: 66px;\n    height: 66px;\n    cursor: ns-resize;\n    touch-action: none;\n  }\n  .knob-wrap svg { display: block; width: 100%; height: 100%; }\n  .label {\n    font-size: 9.5px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--text-dim);\n    font-weight: 700;\n  }\n  .value {\n    font-size: 11px;\n    color: var(--accent);\n    font-variant-numeric: tabular-nums;\n    letter-spacing: 0.5px;\n    min-height: 14px;\n  }\n\n  /* ---------- keyboard ---------- */\n  .keyboard {\n    position: relative;\n    height: 96px;\n    border-radius: 8px 8px 10px 10px;\n    padding: 8px 8px 0;\n    background: linear-gradient(180deg, #1b1308, #0f0a04);\n    box-shadow: inset 0 2px 8px rgba(0,0,0,0.7);\n    z-index: 2;\n  }\n  .keys {\n    position: relative;\n    height: 100%;\n    display: flex;\n  }\n  .wkey {\n    position: relative;\n    flex: 1;\n    margin: 0 1px;\n    border-radius: 0 0 5px 5px;\n    background: linear-gradient(180deg, var(--cream) 0%, var(--cream-d) 100%);\n    box-shadow:\n      inset 0 -6px 8px rgba(0,0,0,0.18),\n      inset 0 1px 0 rgba(255,255,255,0.7);\n    cursor: pointer;\n    transition: background 0.08s ease, transform 0.05s ease;\n  }\n  .wkey.down {\n    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);\n    transform: translateY(2px);\n    box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3);\n  }\n  .bkey {\n    position: absolute;\n    top: 0;\n    width: 60%;\n    height: 58%;\n    transform: translateX(-50%);\n    border-radius: 0 0 4px 4px;\n    background: linear-gradient(180deg, #2a2014, #0c0905);\n    box-shadow: inset 0 1px 0 rgba(255,236,190,0.18), 0 3px 5px rgba(0,0,0,0.6);\n    cursor: pointer;\n    z-index: 3;\n  }\n  .bkey.down {\n    background: linear-gradient(180deg, var(--accent2), #6e5a2c);\n    transform: translateX(-50%) translateY(2px);\n  }\n\n  .hint {\n    text-align: center;\n    font-size: 9px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--text-dim);\n    margin-top: 10px;\n    opacity: 0.7;\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"shell\">\n  <div class=\"cabinet\">\n\n    <div class=\"head\">\n      <div class=\"brand\">\n        <div class=\"title\">String Ensemble<\/div>\n        <div class=\"subtitle\">BBD String Machine<\/div>\n      <\/div>\n      <div class=\"badge\">Paraphonic<\/div>\n    <\/div>\n\n    <!-- bowed-string visualiser -->\n    <div class=\"stage\" id=\"stage\">\n      <div class=\"glow\"><\/div>\n      <svg viewBox=\"0 0 700 150\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"strGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#fbeec4\"/>\n            <stop offset=\"1\" stop-color=\"#c0a86a\"/>\n          <\/linearGradient>\n          <linearGradient id=\"bowGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n            <stop offset=\"0\" stop-color=\"#5a4427\"/>\n            <stop offset=\"0.5\" stop-color=\"#e8d6a0\"/>\n            <stop offset=\"1\" stop-color=\"#5a4427\"/>\n          <\/linearGradient>\n        <\/defs>\n\n        <!-- soundboard arc -->\n        <path d=\"M30 138 Q350 96 670 138\" fill=\"none\"\n              stroke=\"rgba(232,214,160,0.22)\" stroke-width=\"2\"/>\n\n        <!-- the section of strings -->\n        <g class=\"bowstring\" id=\"strings\"><\/g>\n\n        <!-- the bow gliding across -->\n        <g class=\"bow\" id=\"bow\">\n          <rect x=\"200\" y=\"44\" width=\"300\" height=\"4\" rx=\"2\" fill=\"url(#bowGrad)\"/>\n          <rect x=\"196\" y=\"40\" width=\"10\" height=\"12\" rx=\"2\" fill=\"#8a6f3c\"/>\n          <rect x=\"494\" y=\"40\" width=\"10\" height=\"12\" rx=\"2\" fill=\"#8a6f3c\"/>\n        <\/g>\n      <\/svg>\n    <\/div>\n\n    <!-- knob rack -->\n    <div class=\"rack\" id=\"rack\"><\/div>\n\n    <!-- keyboard -->\n    <div class=\"keyboard\">\n      <div class=\"keys\" id=\"keys\"><\/div>\n    <\/div>\n\n    <div class=\"hint\">Drag knobs · double-click to reset · click keys to play<\/div>\n  <\/div>\n<\/div>\n\n<script>\n  \"use strict\";\n\n  // ---- parameter map (must match assembly.ts indices) ----\n  var PARAMS = [\n    { name: \"Attack\",   index: 0, min: 0, max: 1, def: 0.35, fmt: timeFmtA },\n    { name: \"Release\",  index: 1, min: 0, max: 1, def: 0.45, fmt: timeFmtR },\n    { name: \"Ensemble\", index: 2, min: 0, max: 1, def: 0.70, fmt: pctFmt },\n    { name: \"Tone\",     index: 3, min: 0, max: 1, def: 0.55, fmt: pctFmt },\n    { name: \"Level\",    index: 4, min: 0, max: 1, def: 0.60, fmt: pctFmt }\n  ];\n\n  function pctFmt(v) { return Math.round(v * 100) + \"%\"; }\n  function timeFmtA(v) {\n    var s = 0.005 + v * v * 2.5;\n    return s < 1 ? Math.round(s * 1000) + \" ms\" : s.toFixed(2) + \" s\";\n  }\n  function timeFmtR(v) {\n    var s = 0.03 + v * v * 4.0;\n    return s < 1 ? Math.round(s * 1000) + \" ms\" : s.toFixed(2) + \" s\";\n  }\n\n  var values = PARAMS.map(function (p) { return p.def; });\n\n  // ---- host bridge ----\n  function pushParam(i) {\n    if (window.vstai && window.vstai.setParam) {\n      window.vstai.setParam(PARAMS[i].index, values[i]);\n    }\n  }\n  function pushAll() { for (var i = 0; i < PARAMS.length; i++) pushParam(i); }\n\n  // ---- knob rendering ----\n  var ARC0 = -135, ARC1 = 135; // degrees\n  function knobSVG() {\n    return '' +\n      '<svg viewBox=\"0 0 100 100\">' +\n      '<circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"rgba(0,0,0,0.55)\" stroke-width=\"8\"/>' +\n      '<path class=\"arc\" fill=\"none\" stroke=\"url(#kg)\" stroke-width=\"8\" stroke-linecap=\"round\"/>' +\n      '<defs><linearGradient id=\"kg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">' +\n      '<stop offset=\"0\" stop-color=\"#fbeec4\"/><stop offset=\"1\" stop-color=\"#c0a86a\"/>' +\n      '<\/linearGradient>' +\n      '<radialGradient id=\"kb\" cx=\"0.5\" cy=\"0.35\" r=\"0.8\">' +\n      '<stop offset=\"0\" stop-color=\"#5a4527\"/><stop offset=\"1\" stop-color=\"#241a0e\"/>' +\n      '<\/radialGradient><\/defs>' +\n      '<circle cx=\"50\" cy=\"50\" r=\"32\" fill=\"url(#kb)\" stroke=\"rgba(255,236,190,0.18)\" stroke-width=\"1\"/>' +\n      '<circle cx=\"50\" cy=\"50\" r=\"32\" fill=\"none\" stroke=\"rgba(0,0,0,0.4)\" stroke-width=\"1\" transform=\"translate(0,2)\"/>' +\n      '<line class=\"ptr\" x1=\"50\" y1=\"50\" x2=\"50\" y2=\"24\" stroke=\"#f3e9cf\" stroke-width=\"3\" stroke-linecap=\"round\"/>' +\n      '<\/svg>';\n  }\n\n  function polar(cx, cy, r, deg) {\n    var a = (deg - 90) * Math.PI / 180;\n    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];\n  }\n  function arcPath(cx, cy, r, a0, a1) {\n    var p0 = polar(cx, cy, r, a0);\n    var p1 = polar(cx, cy, r, a1);\n    var large = (a1 - a0) > 180 ? 1 : 0;\n    return \"M\" + p0[0].toFixed(2) + \" \" + p0[1].toFixed(2) +\n           \" A\" + r + \" \" + r + \" 0 \" + large + \" 1 \" +\n           p1[0].toFixed(2) + \" \" + p1[1].toFixed(2);\n  }\n\n  function makeKnob(i) {\n    var p = PARAMS[i];\n    var cell = document.createElement(\"div\");\n    cell.className = \"cell\";\n\n    var wrap = document.createElement(\"div\");\n    wrap.className = \"knob-wrap\";\n    wrap.innerHTML = knobSVG();\n\n    var label = document.createElement(\"div\");\n    label.className = \"label\";\n    label.textContent = p.name;\n\n    var val = document.createElement(\"div\");\n    val.className = \"value\";\n\n    cell.appendChild(wrap);\n    cell.appendChild(label);\n    cell.appendChild(val);\n\n    var arc = wrap.querySelector(\".arc\");\n    var ptr = wrap.querySelector(\".ptr\");\n\n    function norm() { return (values[i] - p.min) / (p.max - p.min); }\n    function render() {\n      var t = norm();\n      var deg = ARC0 + t * (ARC1 - ARC0);\n      arc.setAttribute(\"d\", arcPath(50, 50, 42, ARC0, deg));\n      ptr.setAttribute(\"transform\", \"rotate(\" + deg + \" 50 50)\");\n      val.textContent = p.fmt(values[i]);\n    }\n\n    // vertical drag to turn\n    var dragging = false, lastY = 0;\n    function onDown(e) {\n      dragging = true;\n      lastY = (e.touches ? e.touches[0].clientY : e.clientY);\n      e.preventDefault();\n    }\n    function onMove(e) {\n      if (!dragging) return;\n      var y = (e.touches ? e.touches[0].clientY : e.clientY);\n      var dy = lastY - y;\n      lastY = y;\n      var t = norm() + dy / 180;\n      t = Math.max(0, Math.min(1, t));\n      values[i] = p.min + t * (p.max - p.min);\n      render();\n      pushParam(i);\n    }\n    function onUp() { dragging = false; }\n\n    wrap.addEventListener(\"mousedown\", onDown);\n    wrap.addEventListener(\"touchstart\", onDown, { passive: false });\n    window.addEventListener(\"mousemove\", onMove);\n    window.addEventListener(\"touchmove\", onMove, { passive: false });\n    window.addEventListener(\"mouseup\", onUp);\n    window.addEventListener(\"touchend\", onUp);\n\n    wrap.addEventListener(\"wheel\", function (e) {\n      e.preventDefault();\n      var t = norm() - (e.deltaY > 0 ? 1 : -1) * 0.02;\n      t = Math.max(0, Math.min(1, t));\n      values[i] = p.min + t * (p.max - p.min);\n      render();\n      pushParam(i);\n    }, { passive: false });\n\n    wrap.addEventListener(\"dblclick\", function () {\n      values[i] = p.def;\n      render();\n      pushParam(i);\n    });\n\n    render();\n    return cell;\n  }\n\n  var rack = document.getElementById(\"rack\");\n  for (var ki = 0; ki < PARAMS.length; ki++) rack.appendChild(makeKnob(ki));\n\n  // ---- string section visual ----\n  var stringsG = document.getElementById(\"strings\");\n  var NSTR = 13;\n  for (var s = 0; s < NSTR; s++) {\n    var x = 60 + s * (580 / (NSTR - 1));\n    var ln = document.createElementNS(\"http://www.w3.org/2000/svg\", \"line\");\n    ln.setAttribute(\"x1\", x); ln.setAttribute(\"y1\", 16);\n    ln.setAttribute(\"x2\", x); ln.setAttribute(\"y2\", 134);\n    ln.setAttribute(\"stroke\", \"url(#strGrad)\");\n    ln.setAttribute(\"stroke-width\", (0.8 + (s % 3) * 0.5).toFixed(2));\n    ln.setAttribute(\"opacity\", \"0.6\");\n    ln.style.transition = \"opacity 0.2s ease\";\n    stringsG.appendChild(ln);\n  }\n  var stringLines = stringsG.querySelectorAll(\"line\");\n\n  function pluckString(idx) {\n    var li = ((idx % NSTR) + NSTR) % NSTR;\n    var ln = stringLines[li];\n    if (!ln) return;\n    ln.setAttribute(\"opacity\", \"1\");\n    ln.setAttribute(\"stroke-width\", \"2.4\");\n    setTimeout(function () {\n      ln.setAttribute(\"opacity\", \"0.6\");\n      ln.setAttribute(\"stroke-width\", (0.8 + (li % 3) * 0.5).toFixed(2));\n    }, 260);\n  }\n\n  // ---- keyboard ----\n  var stage = document.getElementById(\"stage\");\n  var heldCount = 0;\n  function updateStage() {\n    if (heldCount > 0) stage.classList.add(\"active\");\n    else stage.classList.remove(\"active\");\n  }\n\n  // C3..B4 (two octaves), MIDI 48..71\n  var WHITE = [0, 2, 4, 5, 7, 9, 11];\n  var BLACK = { 0: 1, 1: 3, 3: 6, 4: 8, 5: 10 }; // white-index -> semitone offset\n  var BASE = 48;\n  var OCTAVES = 2;\n  var keysEl = document.getElementById(\"keys\");\n  var downKeys = {};\n\n  function noteOn(midi, el, isBlack) {\n    if (downKeys[midi]) return;\n    downKeys[midi] = true;\n    el.classList.add(\"down\");\n    heldCount++;\n    updateStage();\n    pluckString(midi - BASE);\n    if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(midi, 0.85);\n  }\n  function noteOff(midi, el) {\n    if (!downKeys[midi]) return;\n    delete downKeys[midi];\n    el.classList.remove(\"down\");\n    heldCount = Math.max(0, heldCount - 1);\n    updateStage();\n    if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(midi);\n  }\n\n  function wireKey(el, midi, isBlack) {\n    el.addEventListener(\"mousedown\", function (e) { e.preventDefault(); noteOn(midi, el, isBlack); });\n    el.addEventListener(\"mouseup\", function () { noteOff(midi, el); });\n    el.addEventListener(\"mouseleave\", function () { noteOff(midi, el); });\n    el.addEventListener(\"touchstart\", function (e) { e.preventDefault(); noteOn(midi, el, isBlack); }, { passive: false });\n    el.addEventListener(\"touchend\", function (e) { e.preventDefault(); noteOff(midi, el); });\n  }\n\n  // build white keys first, then overlay black keys positioned over them\n  var whiteEls = [];\n  var totalWhite = OCTAVES * 7;\n  for (var o = 0; o < OCTAVES; o++) {\n    for (var w = 0; w < 7; w++) {\n      var midi = BASE + o * 12 + WHITE[w];\n      var k = document.createElement(\"div\");\n      k.className = \"wkey\";\n      keysEl.appendChild(k);\n      wireKey(k, midi, false);\n      whiteEls.push({ el: k, wIndex: o * 7 + w, octave: o, wpos: w });\n    }\n  }\n\n  // black keys: abs
