 W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }\n  window.addEventListener(\"resize\",resize); resize();\n  function frame(ts){\n    ctx.clearRect(0,0,W,H);\n    var str=vals[0], brass=vals[1], ens=vals[4], tone=vals[5];\n    var mid=H*0.55;\n    // ensemble shimmer background\n    ctx.globalAlpha=0.12+ens*0.18; ctx.fillStyle=\"rgba(255,180,90,1)\";\n    for(var sx=0;sx<6;sx++){ var px=(ts/40+sx*120)% (W+80)-40; ctx.fillRect(px,0,1.4,H); }\n    ctx.globalAlpha=1;\n    // strings layer (smooth bowed) + brass layer (richer harmonics)\n    function wave(amp,harm,col,sp,off){\n      ctx.beginPath();\n      for(var x=0;x<=W;x+=3){\n        var t=x/W;\n        var y=0;\n        for(var h=1;h<=harm;h++){ y+=Math.sin(t*Math.PI*2*(2+h*0.7)+ts/(sp)+off+h)* (1/h); }\n        var sw=0.55+0.45*Math.sin(ts/900+off); // slow swell\n        ctx.lineTo(x, mid + y*amp*sw*(0.6+tone*0.8));\n      }\n      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.shadowColor=col; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;\n    }\n    wave(16*str+2, 3, \"rgba(255,207,106,\"+(0.5+0.5*str)+\")\", 520, 0);      // strings\n    wave(13*brass+1, 6, \"rgba(255,138,106,\"+(0.4+0.6*brass)+\")\", 360, 1.7); // brass\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  function boot(){\n    host=window.vstai||null;\n    FADERS.forEach(function(p,i){ send(p.idx,vals[p.idx]); faderEls[i].render(vals[p.idx]); });\n    KNOBS.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobEls[i].render(vals[p.idx]); });\n  }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
