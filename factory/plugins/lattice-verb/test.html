<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lattice Verb — test bench</title><style>
  :root{--ac:#34e0c4}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Lattice Verb</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n:root{\n  --ac:#34e0c4;        /* teal accent */\n  --ac2:#6ad6ff;       /* cyan highlight */\n  --panel:#0a1620;\n  --panel2:#06101a;\n  --ink:#dffaf6;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px ui-sans-serif,-apple-system,\"Segoe UI\",system-ui,sans-serif;\n  color:var(--ink);\n  background:\n    radial-gradient(130% 100% at 50% -10%,#0c2330 0%,#081420 50%,#03080d 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:22px;overflow:auto;\n}\n\n.unit{\n  position:relative;\n  width:min(560px,96vw);\n  border-radius:22px;\n  padding:20px 22px 22px;\n  background:\n    linear-gradient(165deg,#102634 0%,var(--panel) 42%,var(--panel2) 100%);\n  box-shadow:\n    0 40px 90px -24px rgba(0,0,0,.8),\n    0 1px 0 rgba(120,230,255,.14) inset,\n    0 -26px 50px -22px rgba(0,0,0,.6) inset,\n    0 0 0 1px rgba(0,0,0,.5),\n    0 0 0 4px #04101a,\n    0 0 0 5px rgba(80,230,210,.06);\n  animation:rise .7s cubic-bezier(.2,.8,.25,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}\n\n/* faint engraved circuit texture */\n.unit::before{\n  content:\"\";position:absolute;inset:0;border-radius:22px;pointer-events:none;\n  background:\n    repeating-linear-gradient(90deg,rgba(106,214,255,.025) 0 1px,transparent 1px 26px),\n    radial-gradient(150% 70% at 30% 0%,rgba(120,240,255,.12),transparent 55%);\n  mix-blend-mode:screen;opacity:.55;\n}\n\n/* ===== header ===== */\n.head{position:relative;display:flex;align-items:flex-end;justify-content:space-between;margin:0 2px 14px}\n.brand{font-size:9px;letter-spacing:.42em;color:#7fd9d2;opacity:.7;text-transform:uppercase}\nh1{\n  margin:2px 0 0;font-size:25px;font-weight:900;letter-spacing:.01em;line-height:1;\n  background:linear-gradient(180deg,#eafffb,var(--ac) 55%,#1aa9b9);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  filter:drop-shadow(0 2px 7px rgba(40,200,200,.4));\n}\n.sub{font-size:8.5px;letter-spacing:.26em;color:#76c9d6;opacity:.65;text-transform:uppercase;margin-top:4px}\n.rt{display:flex;flex-direction:column;align-items:flex-end;gap:4px}\n.rtled{display:flex;align-items:center;gap:6px;font-size:7.5px;letter-spacing:.22em;color:#8fe3da;opacity:.75;text-transform:uppercase}\n.rtdot{width:8px;height:8px;border-radius:50%;\n  background:radial-gradient(circle at 40% 35%,#dffff8,var(--ac) 50%,#0a4a44 90%);\n  box-shadow:0 0 10px var(--ac);animation:dotpulse 2.4s ease-in-out infinite}\n@keyframes dotpulse{0%,100%{opacity:.55;box-shadow:0 0 5px var(--ac)}50%{opacity:1;box-shadow:0 0 14px var(--ac)}}\n\n/* ===== the lattice visualiser ===== */\n.viz{\n  position:relative;height:180px;margin:2px 0 18px;border-radius:14px;overflow:hidden;\n  background:\n    radial-gradient(120% 150% at 25% 120%,#06222a,#02080d 72%);\n  box-shadow:0 0 0 1px rgba(0,0,0,.6),\n             0 0 0 2px rgba(106,214,255,.08),\n             inset 0 2px 14px rgba(0,0,0,.85),\n             inset 0 0 44px rgba(52,224,196,.08);\n}\n.viz svg{position:absolute;inset:0;width:100%;height:100%}\n.viz::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 26%)}\n\n.glow{filter:drop-shadow(0 0 5px var(--ac))}\n/* comb rail base line */\n.rail{stroke:rgba(106,214,255,.16);stroke-width:1.4}\n/* node tick on each comb line (the tapped delay points) */\n.tick{stroke:rgba(106,214,255,.30);stroke-width:1.4}\n/* glowing energy pulse travelling down each comb line */\n.pulse{fill:var(--ac);filter:drop-shadow(0 0 6px var(--ac))}\n/* feedback return arc */\n.fb{fill:none;stroke:var(--ac);stroke-width:1.6;opacity:.5;\n  stroke-dasharray:4 6;animation:fbflow 1.4s linear infinite}\n@keyframes fbflow{to{stroke-dashoffset:-20}}\n/* allpass diffuser rings */\n.apring{fill:none;stroke:var(--ac2);stroke-width:2.2;\n  filter:drop-shadow(0 0 7px var(--ac2));transform-origin:center}\n.apring2{fill:none;stroke:var(--ac);stroke-width:1.4;opacity:.45}\n.ringpulse{animation:ringPulse 2.6s ease-in-out infinite}\n@keyframes ringPulse{0%,100%{opacity:.55;transform:scale(.92)}50%{opacity:1;transform:scale(1.04)}}\n.label{fill:#79d4d8;font:7px ui-sans-serif,sans-serif;letter-spacing:.18em;opacity:.55;text-transform:uppercase}\n.sumline{stroke:var(--ac2);stroke-width:1.6;opacity:.6;filter:drop-shadow(0 0 4px var(--ac2))}\n\n/* ===== knob deck ===== */\n.deck{display:grid;grid-template-columns:repeat(5,1fr);gap:6px 8px;margin:0 2px}\n@media (max-width:430px){.deck{grid-template-columns:repeat(3,1fr)}}\n.pot{display:flex;flex-direction:column;align-items:center;gap:7px;\n  animation:pop .5s both;animation-delay:var(--d)}\n@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n.knob{position:relative;width:76px;height:76px;cursor:ns-resize;touch-action:none;user-select:none}\n.arc{position:absolute;inset:2px;border-radius:50%;\n  background:conic-gradient(from 215deg,var(--ac) calc(var(--n)*270deg),rgba(120,200,220,.07) calc(var(--n)*270deg) 270deg,transparent 270deg);\n  filter:drop-shadow(0 0 calc(2px + var(--n)*8px) var(--ac));\n  transition:--n .12s cubic-bezier(.2,.8,.25,1)}\n.skirt{position:absolute;inset:-2px;border-radius:50%;\n  background:repeating-conic-gradient(from 215deg,rgba(150,230,240,.5) 0 1deg,transparent 1deg 13.846deg);\n  -webkit-mask:radial-gradient(circle,transparent 38px,#000 39px,#000 42px,transparent 43px);\n  mask:radial-gradient(circle,transparent 38px,#000 39px,#000 42px,transparent 43px)}\n.cap{position:absolute;top:11px;left:11px;width:54px;height:54px;border-radius:50%;\n  background:radial-gradient(circle at 50% 28%,#1c3340 0%,#0c1922 60%,#06101a 100%);\n  box-shadow:inset 0 2px 6px rgba(140,220,240,.14),inset 0 -6px 14px rgba(0,0,0,.8),0 4px 10px rgba(0,0,0,.55)}\n.cap::before{content:\"\";position:absolute;inset:6px;border-radius:50%;\n  background:repeating-conic-gradient(#152631 0 9deg,#0a141c 9deg 18deg);opacity:.5}\n.cap::after{content:\"\";position:absolute;inset:13px;border-radius:50%;\n  background:radial-gradient(circle at 50% 30%,#274652,#0c1820);\n  box-shadow:inset 0 1px 2px rgba(150,230,240,.2)}\n.ptr{position:absolute;top:7px;left:50%;width:4px;height:20px;margin-left:-2px;border-radius:3px;\n  background:linear-gradient(var(--ac2),var(--ac));\n  box-shadow:0 0 8px var(--ac),0 0 2px #fff;\n  transform-origin:50% 31px;\n  transform:rotate(calc((var(--n) - .5) * 270deg));\n  transition:transform .12s cubic-bezier(.2,.8,.25,1)}\n.pname{font-size:9px;font-weight:800;letter-spacing:.16em;color:#06181c;\n  background:linear-gradient(var(--ac2),var(--ac));padding:2px 9px;border-radius:999px;\n  text-transform:uppercase;box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 2px 5px rgba(0,0,0,.4);white-space:nowrap}\n.pval{font-size:11px;font-weight:800;color:#eafffb;font-variant-numeric:tabular-nums;\n  min-height:13px;text-shadow:0 0 8px rgba(52,224,196,.45)}\n.knob.act .cap{box-shadow:inset 0 2px 6px rgba(140,220,240,.14),inset 0 -6px 14px rgba(0,0,0,.8),0 4px 16px rgba(52,224,196,.55)}\n\n.footer{display:flex;justify-content:space-between;align-items:center;margin:16px 4px 0;\n  font-size:7px;letter-spacing:.18em;color:#5fa8b0;opacity:.5;text-transform:uppercase}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"unit\">\n  <div class=\"head\">\n    <div>\n      <div class=\"brand\">Lattice Series<\/div>\n      <h1>Lattice Verb<\/h1>\n      <div class=\"sub\">Schroeder / Moorer Algorithmic Reverb<\/div>\n    <\/div>\n    <div class=\"rt\">\n      <div class=\"rtled\"><span class=\"rtdot\"><\/span><span id=\"rtTxt\">RT 1.4s<\/span><\/div>\n      <div class=\"rtled\" style=\"opacity:.5\">Comb x4 &middot; AP x2<\/div>\n    <\/div>\n  <\/div>\n\n  <!-- ===== comb + allpass lattice ===== -->\n  <div class=\"viz\">\n    <svg id=\"svg\" viewBox=\"0 0 560 180\" preserveAspectRatio=\"none\">\n      <!-- comb rails + ticks + pulses built by JS -->\n      <g id=\"combs\"><\/g>\n      <!-- summing bus -->\n      <line id=\"sumv\" class=\"sumline\" x1=\"372\" y1=\"22\" x2=\"372\" y2=\"158\"/>\n      <!-- series allpass diffuser rings -->\n      <g id=\"rings\">\n        <g transform=\"translate(440,90)\">\n          <circle class=\"apring ringpulse glow\" r=\"30\"/>\n          <circle class=\"apring2 ringpulse\" r=\"20\" style=\"animation-delay:.4s\"/>\n          <text class=\"label\" x=\"0\" y=\"52\" text-anchor=\"middle\">Allpass 1<\/text>\n        <\/g>\n        <g transform=\"translate(508,90)\">\n          <circle class=\"apring ringpulse glow\" r=\"24\" style=\"animation-delay:.9s\"/>\n          <circle class=\"apring2 ringpulse\" r=\"15\" style=\"animation-delay:1.2s\"/>\n          <text class=\"label\" x=\"0\" y=\"52\" text-anchor=\"middle\">Allpass 2<\/text>\n        <\/g>\n      <\/g>\n      <text class=\"label\" x=\"14\" y=\"14\">Parallel Comb Bank<\/text>\n    <\/svg>\n  <\/div>\n\n  <!-- ===== knob deck ===== -->\n  <div class=\"deck\" id=\"deck\"><\/div>\n\n  <div class=\"footer\">\n    <span>Algorithmic Reverb<\/span>\n    <span>LV-4C2A &middot; 8P7SXGP<\/span>\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"Mix\",      index:0,min:0,max:1,def:0.35},\n    {name:\"Size\",     index:1,min:0,max:1,def:0.5},\n    {name:\"Decay\",    index:2,min:0,max:1,def:0.6},\n    {name:\"Damping\",  index:3,min:0,max:1,def:0.4},\n    {name:\"Pre-Delay\",index:4,min:0,max:1,def:0.0}\n  ];\n  var state={};\n  var deck=document.getElementById('deck');\n  var combsG=document.getElementById('combs');\n  var rtTxt=document.getElementById('rtTxt');\n\n  // ---- build the four comb rails (parallel lines, prime-ish relative lengths) ----\n  var COMB_REL=[1.557,1.617,1.491,1.422];        // relative prime lengths\n  var rails=[];                                   // {len, ticks[], pulse, baseLen}\n  var X0=92, X1=360, NTICK=7;                      // rail span + ticks\n  for(var i=0;i<4;i++){\n    var y=44+i*30;\n    // rail base line\n    var line=document.createElementNS('http://www.w3.org/2000/svg','line');\n    line.setAttribute('class','rail');\n    line.setAttribute('x1',X0); line.setAttribute('y1',y);\n    line.setAttribute('x2',X1); line.setAttribute('y2',y);\n    combsG.appendChild(line);\n    // feedback return arc (tail end loops back to start — the comb feedback)\n    var fb=document.createElementNS('http://www.w3.org/2000/svg','path');\n    fb.setAttribute('class','fb');\n    var arcH=10+i*2;\n    fb.setAttribute('d','M '+X1+' '+y+' C '+(X1+18)+' '+(y-arcH)+', '+(X0-18)+' '+(y-arcH)+', '+X0+' '+y);\n    combsG.appendChild(fb);\n    // ticks\n    var ticks=[];\n    for(var t=0;t<NTICK;t++){\n      var tx=X0+(X1-X0)*(t/(NTICK-1));\n      var tk=document.createElementNS('http://www.w3.org/2000/svg','line');\n      tk.setAttribute('class','tick');\n      tk.setAttribute('x1',tx); tk.setAttribute('y1',y-4);\n      tk.setAttribute('x2',tx); tk.setAttribute('y2',y+4);\n      combsG.appendChild(tk);\n      ticks.push(tk);\n    }\n    // travelling energy pulse\n    var pl=document.createElementNS('http://www.w3.org/2000/svg','circle');\n    pl.setAttribute('class','pulse');\n    pl.setAttribute('cx',X0); pl.setAttribute('cy',y); pl.setAttribute('r',3.2);\n    combsG.appendChild(pl);\n    // input feed line from left edge into the rail\n    var feed=document.createElementNS('http://www.w3.org/2000/svg','line');\n    feed.setAttribute('class','rail'); feed.setAttribute('x1',14); feed.setAttribute('y1',90);\n    feed.setAttribute('x2',X0); feed.setAttribute('y2',y); feed.setAttribute('opacity','.18');\n    combsG.appendChild(feed);\n    // output tap to sum bus\n    var tap=document.createElementNS('http://www.w3.org/2000/svg','line');\n    tap.setAttribute('class','rail'); tap.setAttribute('x1',X1); tap.setAttribute('y1',y);\n    tap.setAttribute('x2',372); tap.setAttribute('y2',90); tap.setAttribute('opacity','.20');\n    combsG.appendChild(tap);\n\n    rails.push({y:y, x0:X0, x1:X1, pulse:pl, ticks:ticks, rel:COMB_REL[i], phase:Math.random(), pos:Math.random()});\n  }\n\n  // ---- knob builder ----\n  function fmt(p,v){\n    var n=(v-p.min)/((p.max-p.min)||1);\n    if(p.name==='Pre-Delay') return Math.round(n*200)+' ms';\n    if(p.name==='Size'){ var m=Math.round((0.55+n*1.05)*100); return m+'%'; }\n    return Math.round(n*100)+'%';\n  }\n\n  function buildKnob(p,i){\n    var cell=document.createElement('div');\n    cell.className='pot'; cell.style.setProperty('--d',(i*70)+'ms');\n    cell.innerHTML=\n      '<div class=\"knob\" tabindex=\"0\">'+\n        '<i class=\"skirt\"><\/i><i class=\"arc\"><\/i><i class=\"cap\"><\/i><i class=\"ptr\"><\/i>'+\n      '<\/div>'+\n      '<div class=\"pname\">'+p.name+'<\/div>'+\n      '<div class=\"pval\"><\/div>';\n    deck.appendChild(cell);\n\n    var knob=cell.querySelector('.knob');\n    var arc=cell.querySelector('.arc');\n    var ptr=cell.querySelector('.ptr');\n    var val=cell.querySelector('.pval');\n    var v=p.def;\n\n    function norm(){ return (v-p.min)/((p.max-p.min)||1); }\n    function paint(){\n      var n=norm();\n      arc.style.setProperty('--n',n);\n      ptr.style.setProperty('--n',n);\n      val.textContent=fmt(p,v);\n      state[p.index]=v;\n      if(window.vstai&&window.vstai.setParam) window.vstai.setParam(p.index,v);\n      onChange();\n    }\n    function setNorm(n){ n=n<0?0:n>1?1:n; v=p.min+(p.max-p.min)*n; paint(); }\n\n    var drag=false,startY=0,startN=0;\n    knob.addEventListener('pointerdown',function(e){\n      drag=true; startY=e.clientY; startN=norm();\n      knob.classList.add('act'); knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener('pointermove',function(e){\n      if(!drag)return;\n      var speed=e.shiftKey?620:210;\n      setNorm(startN+(startY-e.clientY)/speed);\n    });\n    function end(){ drag=false; knob.classList.remove('act'); }\n    knob.addEventListener('pointerup',end);\n    knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){ v=p.def; paint(); });\n    knob.addEventListener('wheel',function(e){\n      e.preventDefault(); setNorm(norm()+(e.deltaY<0?0.025:-0.025));\n    },{passive:false});\n    knob.addEventListener('keydown',function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){setNorm(norm()+0.02);e.preventDefault();}\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setNorm(norm()-0.02);e.preventDefault();}\n    });\n\n    paint();\n  }\n\n  // ---- visualiser reacts to params ----\n  function onChange(){\n    var size =state[1]!=null?state[1]:0.5;\n    var decay=state[2]!=null?state[2]:0.6;\n    var damp =state[3]!=null?state[3]:0.4;\n    // approximate RT60 readout (seconds) — scales with size + decay\n    var rt=(0.4+ (0.55+decay*0.4)*2.6*(0.55+size*1.05));\n    rtTxt.textContent='RT '+rt.toFixed(1)+'s';\n  }\n\n  PARAMS.forEach(buildKnob);\n\n  // ---- animation loop: energy pulses crawl down each comb line; speed = size ----\n  var raf=null;\n  function tick(){\n    var size =state[1]!=null?state[1]:0.5;\n    var decay=state[2]!=null?state[2]:0.6;\n    var damp =state[3]!=null?state[3]:0.4;\n    var span=X1-X0;\n    for(var i=0;i<rails.length;i++){\n      var r=rails[i];\n      // longer comb (longer rel * size) -> slower pulse\n      var lenFac=r.rel*(0.55+size*1.05);\n      var spd=0.010/lenFac;\n      r.pos+=spd;\n      if(r.pos>=1){ r.pos-=1; }\n      var x=r.x0+span*r.pos;\n      r.pulse.setAttribute('cx',x.toFixed(1));\n      // brightness fades as pulse travels (decay) and HF damp dims it further\n      var fade=1-r.pos*(1-(0.55+decay*0.4));\n      var op=Math.max(0.25, fade*(1-damp*0.45));\n      r.pulse.setAttribute('opacity',op.toFixed(2));\n      var rad=2.4+ (decay*2.2)*(1-r.pos*0.5);\n      r.pulse.setAttribute('r',rad.toFixed(1));\n    }\n    raf=requestAnimationFrame(tick);\n  }\n  function startLoop(){ if(!raf) raf=requestAnimationFrame(tick); }\n  function stopLoop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }\n  document.addEventListener('visibilitychange',function(){\n    if(document.hidden) stopLoop(); else startLoop();\n  });\n\n  function ready(){ onChange(); startLoop(); }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
