<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Scout Mono</title>
<style>
  :root{ --acc:#50d0c0; --acc2:#b060e0; --bg0:#060f0e; --bg1:#0c1a19; --ink:#e6f5f2; --dim:#6f8f8a; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#10302c 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:14px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#0e211f,#060f0e); border:1px solid rgba(80,208,192,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(230,245,242,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
  .screen{ height:104px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#0a1817,#060f0e); border:1px solid rgba(80,208,192,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(210,235,230,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(80,208,192,.6)); }
  .pcap{ fill:#0a1615; stroke:rgba(80,208,192,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(80,208,192,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(80,208,192,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">SCOUT&nbsp;MONO</span><span class="sub">sample &amp; hold mono</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">S&amp;H&nbsp;·&nbsp;FILTER</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Cutoff",idx:0,def:0.4},{name:"Reso",idx:1,def:0.55},{name:"S&H Rate",idx:2,def:0.4},{name:"S&H Depth",idx:3,def:0.5},{name:"Env",idx:4,def:0.4},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#50d0c0"/><stop offset="1" stop-color="#b060e0"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  // deterministic pseudo-random step values (stable across frames)
  function srand(k){ var x=Math.sin(k*127.1+31.7)*43758.5453; return (x-Math.floor(x))*2-1; }
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function frame(ts){ ctx.clearRect(0,0,W,H); var cut=vals[0], reso=vals[1], rate=vals[2], depth=vals[3]; var topY=H*0.30;
    var shHz=0.5+rate*22; var stepPx=Math.max(10, W/(shHz*0.55)); // visual step width scaled by rate
    var scroll=(ts/1000)*shHz; var baseStep=Math.floor(scroll);
    // S&H staircase (teal) across the top region
    ctx.beginPath(); var prevY=null;
    for(var c=0;c<=Math.ceil(W/ (W/16))+1;c++){}
    var nSteps=16;
    for(var s=0;s<=nSteps;s++){ var stepIdx=baseStep+s; var frac=(scroll-baseStep); var x0=(s-frac)*(W/nSteps); var x1=x0+(W/nSteps);
      var val=srand(stepIdx)*depth; var y=topY - val*(H*0.20);
      if(x1<0||x0>W) continue;
      ctx.strokeStyle="rgba(80,208,192,0.85)"; ctx.lineWidth=2; ctx.shadowColor="#50d0c0"; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.moveTo(Math.max(0,x0),y); ctx.lineTo(Math.min(W,x1),y); ctx.stroke();
      if(prevY!==null && x0>0 && x0<W){ ctx.beginPath(); ctx.moveTo(x0,prevY); ctx.lineTo(x0,y); ctx.stroke(); }
      ctx.shadowBlur=0; prevY=y;
    }
    // current S&H value dot
    var curVal=srand(baseStep)*depth; var cy=topY-curVal*(H*0.20);
    ctx.fillStyle="#50d0c0"; ctx.beginPath(); ctx.arc(10,cy,3,0,Math.PI*2); ctx.fill();
    // filtered oscillator output (violet), brightness follows current S&H step
    var bright=0.4+cut*0.4 + curVal*0.5*depth; var midY=H*0.74;
    ctx.beginPath();
    for(var x=0;x<=W;x+=1.5){ var t=x/W; var ph=((t*6+ts/900)%1); var saw=(ph*2-1);
      var v=saw*Math.max(0.1,bright) + Math.sin(t*60*6.2831853)*reso*0.08*bright;
      ctx.lineTo(x, midY - v*(H*0.18)); }
    ctx.strokeStyle="rgba(176,96,224,0.9)"; ctx.lineWidth=1.8; ctx.shadowColor="#b060e0"; ctx.shadowBlur=6; ctx.stroke(); ctx.shadowBlur=0;
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
