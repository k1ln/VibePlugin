<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Crisp Beat</title>
<style>
  :root{ --acc:#28e0b0; --acc2:#ff5a7a; --bg0:#05100d; --bg1:#0a1d18; --ink:#e6f7f1; --dim:#5d8c80; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#0e2a23 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,780px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#0c2620,#05100d); border:1px solid rgba(40,224,176,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(220,255,245,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .beats{ margin-left:auto; display:flex; gap:7px; }
  .beat{ width:11px; height:11px; border-radius:3px; background:#0c2620; border:1px solid rgba(40,224,176,.35); }
  .screen{ height:108px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#081a16,#050f0c); border:1px solid rgba(40,224,176,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(210,240,232,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(40,224,176,.6)); }
  .pcap{ fill:#081a15; stroke:rgba(40,224,176,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(40,224,176,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(40,224,176,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">CRISP&nbsp;BEAT</span><span class="sub">digital rhythm box</span>
      <span class="beats"><span class="beat" id="b0"></span><span class="beat" id="b1"></span><span class="beat" id="b2"></span><span class="beat" id="b3"></span></span>
    </header>
    <div class="screen"><div class="scrlbl">STEP&nbsp;ENERGY</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Tune",idx:0,def:0.5},{name:"Decay",idx:1,def:0.45},{name:"Snap",idx:2,def:0.55},{name:"Hat",idx:3,def:0.55},{name:"Accent",idx:4,def:0.5},{name:"Level",idx:5,def:0.85}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#28e0b0"/><stop offset="1" stop-color="#ff5a7a"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  // per-step energy = how many voices fire on each 16th (four-on-floor groove)
  var ENERGY=[3,0,1,0, 4,0,2,0, 3,0,1,1, 4,0,2,0];   // approx voice-stacks per step
  var beats=[document.getElementById("b0"),document.getElementById("b1"),document.getElementById("b2"),document.getElementById("b3")];
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function frame(ts){ ctx.clearRect(0,0,W,H);
    var padL=12, padR=12, padB=12, padT=22; var bw=(W-padL-padR)/16; var step=Math.floor(ts/125)%16; var acc=vals[4], dec=vals[1];
    for(var c=0;c<16;c++){ var e=ENERGY[c]/4; var live=(c===step)?1:0; var phase=live?Math.max(0,1-((ts%125)/125)):0;
      var bh=(H-padT-padB)*(0.12+e*0.78)*(0.7+acc*0.3); var x=padL+c*bw+1.5; var y=H-padB-bh;
      var grd=ctx.createLinearGradient(0,y,0,H-padB); grd.addColorStop(0,"#ff5a7a"); grd.addColorStop(1,"#28e0b0");
      ctx.fillStyle=grd; ctx.globalAlpha=(e>0?0.5:0.12)+live*0.45*phase;
      var rw=bw-3; var rr=3; ctx.beginPath();
      ctx.moveTo(x+rr,y); ctx.lineTo(x+rw-rr,y); ctx.quadraticCurveTo(x+rw,y,x+rw,y+rr); ctx.lineTo(x+rw,H-padB); ctx.lineTo(x,H-padB); ctx.lineTo(x,y+rr); ctx.quadraticCurveTo(x,y,x+rr,y); ctx.closePath();
      if(live){ ctx.shadowColor="#28e0b0"; ctx.shadowBlur=12; } ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;
      // beat ticks at quarters
      if(c%4===0){ ctx.fillStyle="rgba(230,247,241,0.25)"; ctx.fillRect(x-1,padT-6,1.5,4); }
    }
    // update four-on-floor beat LEDs
    var qb=Math.floor(step/4);
    for(var bi=0;bi<4;bi++){ var on=(bi===qb); beats[bi].style.background=on?"#28e0b0":"#0c2620"; beats[bi].style.boxShadow=on?"0 0 10px #28e0b0":"none"; beats[bi].style.borderColor=on?"#28e0b0":"rgba(40,224,176,.35)"; }
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
