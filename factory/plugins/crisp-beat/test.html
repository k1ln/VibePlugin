  :root{--ac:#28e0b0}

  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>Crisp Beat<\/title>\n<style>\n  :root{ --acc:#28e0b0; --acc2:#ff5a7a; --bg0:#05100d; --bg1:#0a1d18; --ink:#e6f7f1; --dim:#5d8c80; }\n  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }\n  body{ font-family:\"Inter\",system-ui,-apple-system,\"Segoe UI\",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#0e2a23 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }\n  .unit{ width:min(95vw,780px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#0c2620,#05100d); border:1px solid rgba(40,224,176,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(220,255,245,.06); }\n  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }\n  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }\n  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }\n  .beats{ margin-left:auto; display:flex; gap:7px; }\n  .beat{ width:11px; height:11px; border-radius:3px; background:#0c2620; border:1px solid rgba(40,224,176,.35); }\n  .screen{ height:108px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#081a16,#050f0c); border:1px solid rgba(40,224,176,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }\n  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }\n  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }\n  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }\n  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }\n  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }\n  .track{ fill:none; stroke:rgba(210,240,232,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(40,224,176,.6)); }\n  .pcap{ fill:#081a15; stroke:rgba(40,224,176,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }\n  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(40,224,176,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(40,224,176,.2); }\n  .knob:hover .kn{ color:var(--acc); }\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <header><span class=\"logo\">CRISP&nbsp;BEAT<\/span><span class=\"sub\">digital rhythm box<\/span>\n      <span class=\"beats\"><span class=\"beat\" id=\"b0\"><\/span><span class=\"beat\" id=\"b1\"><\/span><span class=\"beat\" id=\"b2\"><\/span><span class=\"beat\" id=\"b3\"><\/span><\/span>\n    <\/header>\n    <div class=\"screen\"><div class=\"scrlbl\">STEP&nbsp;ENERGY<\/div><canvas id=\"cv\"><\/canvas><\/div>\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n  <\/div>\n<script>\n(function(){\"use strict\";\n  var P=[{name:\"Tune\",idx:0,def:0.5},{name:\"Decay\",idx:1,def:0.45},{name:\"Snap\",idx:2,def:0.55},{name:\"Hat\",idx:3,def:0.55},{name:\"Accent\",idx:4,def:0.5},{name:\"Level\",idx:5,def:0.85}];\n  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }\n  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById(\"knobs\");\n  var knobs=P.map(function(p){ var el=document.createElement(\"div\"); el.className=\"knob\";\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 80 80\"><defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#28e0b0\"/><stop offset=\"1\" stop-color=\"#ff5a7a\"/><\/linearGradient><\/defs><circle class=\"track\" cx=\"40\" cy=\"40\" r=\"33\"><\/circle><circle class=\"arc\" cx=\"40\" cy=\"40\" r=\"33\" transform=\"rotate(135 40 40)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle><circle class=\"pcap\" cx=\"40\" cy=\"40\" r=\"20\"><\/circle><line class=\"ptr\" x1=\"40\" y1=\"40\" x2=\"40\" y2=\"23\"><\/line><\/svg><\/div><span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el); var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute(\"x2\",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute(\"y2\",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+\"%\"; }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; }); el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });\n  // per-step energy = how many voices fire on each 16th (four-on-floor groove)\n  var ENERGY=[3,0,1,0, 4,0,2,0, 3,0,1,1, 4,0,2,0];   // approx voice-stacks per step\n  var beats=[document.getElementById(\"b0\"),document.getElementById(\"b1\"),document.getElementById(\"b2\"),document.getElementById(\"b3\")];\n  var cv=document.getElementById(\"cv\"), ctx=cv.getContext(\"2d\"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);\n  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener(\"resize\",resize); resize();\n  function frame(ts){ ctx.clearRect(0,0,W,H);\n    var padL=12, padR=12, padB=12, padT=22; var bw=(W-padL-padR)/16; var step=Math.floor(ts/125)%16; var acc=vals[4], dec=vals[1];\n    for(var c=0;c<16;c++){ var e=ENERGY[c]/4; var live=(c===step)?1:0; var phase=live?Math.max(0,1-((ts%125)/125)):0;\n      var bh=(H-padT-padB)*(0.12+e*0.78)*(0.7+acc*0.3); var x=padL+c*bw+1.5; var y=H-padB-bh;\n      var grd=ctx.createLinearGradient(0,y,0,H-padB); grd.addColorStop(0,\"#ff5a7a\"); grd.addColorStop(1,\"#28e0b0\");\n      ctx.fillStyle=grd; ctx.globalAlpha=(e>0?0.5:0.12)+live*0.45*phase;\n      var rw=bw-3; var rr=3; ctx.beginPath();\n      ctx.moveTo(x+rr,y); ctx.lineTo(x+rw-rr,y); ctx.quadraticCurveTo(x+rw,y,x+rw,y+rr); ctx.lineTo(x+rw,H-padB); ctx.lineTo(x,H-padB); ctx.lineTo(x,y+rr); ctx.quadraticCurveTo(x,y,x+rr,y); ctx.closePath();\n      if(live){ ctx.shadowColor=\"#28e0b0\"; ctx.shadowBlur=12; } ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;\n      // beat ticks at quarters\n      if(c%4===0){ ctx.fillStyle=\"rgba(230,247,241,0.25)\"; ctx.fillRect(x-1,padT-6,1.5,4); }\n    }\n    // update four-on-floor beat LEDs\n    var qb=Math.floor(step/4);\n    for(var bi=0;bi<4;bi++){ var on=(bi===qb); beats[bi].style.background=on?\"#28e0b0\":\"#0c2620\"; beats[bi].style.boxShadow=on?\"0 0 10px #28e0b0\":\"none\"; beats[bi].style.borderColor=on?\"#28e0b0\":\"rgba(40,224,176,.35)\"; }\n    requestAnimationFrame(frame); }\n  requestAnimationFrame(frame);\n  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script><\/body><\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};
  var oct=0;                                              // octave offset (−4..+4), applied at note-on
  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function setOct(o){ oct=o<-4?-4:(o>4?4:o); var ov=document.getElementById('octval'); if(ov)ov.textContent=(4+oct); }
  function down(m,el){ ensure().then(function(){ if(ctx.state==='suspended')ctx.resume(); if(ex&&ex.noteOn) ex.noteOn(m,hz(m),0.9); }); if(el)el.classList.add('dn'); }
  function up(m,el){ if(ex&&ex.noteOff) ex.noteOff(m); if(el)el.classList.remove('dn'); }
  KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];

  document.getElementById('octdn').addEventListener('click',function(){setOct(oct-1);});

  var held={};                                            // base note -> actual note played (so releases survive an octave change)
  window.addEventListener('keydown',function(e){ if(e.repeat)return;
    if(e.key==='z'||e.key==='Z'){setOct(oct-1);return;} if(e.key==='x'||e.key==='X'){setOct(oct+1);return;}
