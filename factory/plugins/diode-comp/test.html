<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Diode Comp — test bench</title><style>
  :root{--ac:#b0b8c0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Diode Comp</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Diode Comp<\/title>\n<style>\n  :root {\n    --accent:  #b0b8c0;\n    --accent2: #d96a6a;\n    --panel:   #c9cdce;\n    --panel-d: #a7adae;\n    --ink:     #2a2e30;\n    --screw:   #6f7577;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    width: 100%;\n    height: 100%;\n    background: #1b1d1e;\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .stage {\n    min-height: 100%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 22px;\n    background:\n      radial-gradient(120% 90% at 50% -10%, rgba(217,106,106,0.10), transparent 55%),\n      radial-gradient(140% 120% at 50% 120%, rgba(0,0,0,0.55), transparent 60%),\n      #18191a;\n  }\n\n  /* ---------- the console module ---------- */\n  .module {\n    width: clamp(540px, 96vw, 880px);\n    border-radius: 14px;\n    padding: 20px 22px 24px;\n    position: relative;\n    background:\n      linear-gradient(180deg, #d4d7d8 0%, #c2c6c7 18%, #b2b7b8 50%, #c2c6c7 82%, #d0d3d4 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.65) inset,\n      0 -2px 6px rgba(0,0,0,0.22) inset,\n      0 22px 50px rgba(0,0,0,0.55),\n      0 4px 0 #6f7375;\n    border: 1px solid #8d9293;\n  }\n\n  /* brushed-metal sheen */\n  .module::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    border-radius: 14px;\n    pointer-events: none;\n    background:\n      repeating-linear-gradient(90deg,\n        rgba(255,255,255,0.05) 0px,\n        rgba(255,255,255,0.05) 1px,\n        rgba(0,0,0,0.025) 2px,\n        rgba(0,0,0,0.025) 3px);\n    mix-blend-mode: overlay;\n    opacity: 0.5;\n  }\n\n  .screw {\n    position: absolute;\n    width: 13px; height: 13px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 35% 30%, #babfc0, var(--screw) 70%, #4d5152);\n    box-shadow: 0 1px 1px rgba(255,255,255,0.5) inset, 0 1px 2px rgba(0,0,0,0.45);\n  }\n  .screw::after {\n    content: \"\";\n    position: absolute;\n    left: 2px; top: 50%;\n    width: 9px; height: 1.6px;\n    background: rgba(0,0,0,0.45);\n    transform: translateY(-50%) rotate(40deg);\n    border-radius: 1px;\n  }\n  .screw.tl { top: 9px; left: 9px; }\n  .screw.tr { top: 9px; right: 9px; }\n  .screw.bl { bottom: 9px; left: 9px; }\n  .screw.br { bottom: 9px; right: 9px; }\n\n  /* ---------- header ---------- */\n  .header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 0 14px 14px;\n    border-bottom: 1px solid rgba(0,0,0,0.18);\n    margin-bottom: 18px;\n    position: relative;\n  }\n  .brand { display: flex; align-items: baseline; gap: 12px; }\n  .brand .mark {\n    font-weight: 800;\n    font-size: 22px;\n    letter-spacing: 1.5px;\n    color: var(--ink);\n    text-shadow: 0 1px 0 rgba(255,255,255,0.55);\n  }\n  .brand .mark b { color: var(--accent2); }\n  .brand .sub {\n    font-size: 9px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: #5a5f60;\n  }\n  .badge {\n    font-size: 8.5px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: #6a6f70;\n    border: 1px solid rgba(0,0,0,0.22);\n    border-radius: 4px;\n    padding: 4px 8px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(0,0,0,0.05));\n  }\n\n  /* ---------- main layout ---------- */\n  .body {\n    display: grid;\n    grid-template-columns: 1.15fr 1.4fr;\n    gap: 22px;\n    align-items: stretch;\n  }\n  @media (max-width: 620px) {\n    .body { grid-template-columns: 1fr; }\n  }\n\n  /* ---------- VU meter ---------- */\n  .meter-wrap {\n    background: linear-gradient(180deg, #2b2d2e, #1a1c1d);\n    border-radius: 10px;\n    padding: 12px;\n    border: 1px solid #0c0d0d;\n    box-shadow: 0 2px 6px rgba(0,0,0,0.5) inset, 0 1px 0 rgba(255,255,255,0.18);\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n  }\n  .vu-face {\n    position: relative;\n    border-radius: 7px;\n    overflow: hidden;\n    background:\n      radial-gradient(120% 130% at 50% 120%, #f4ead0, #efe2c0 55%, #e6d4a8 100%);\n    box-shadow: 0 0 0 2px #0a0b0b, 0 4px 10px rgba(0,0,0,0.4) inset;\n    aspect-ratio: 2 / 1.18;\n  }\n  .vu-glass {\n    position: absolute; inset: 0;\n    background: linear-gradient(140deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 40%);\n    pointer-events: none;\n    z-index: 4;\n  }\n  .vu-label {\n    text-align: center;\n    font-size: 8px;\n    letter-spacing: 2.5px;\n    color: #7a715a;\n    text-transform: uppercase;\n  }\n\n  /* ---------- controls grid ---------- */\n  .controls {\n    background: linear-gradient(180deg, rgba(0,0,0,0.05), rgba(255,255,255,0.18));\n    border-radius: 10px;\n    padding: 16px 14px 12px;\n    border: 1px solid rgba(0,0,0,0.14);\n    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset;\n  }\n  .section-title {\n    font-size: 9px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: #5a5f60;\n    margin-bottom: 14px;\n    padding-left: 4px;\n  }\n  .knobs {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 8px;\n  }\n  @media (max-width: 520px) {\n    .knobs { grid-template-columns: repeat(3, 1fr); row-gap: 18px; }\n  }\n\n  .knob-cell {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 6px;\n  }\n  .knob {\n    width: 74px; height: 74px;\n    position: relative;\n    cursor: ns-resize;\n    touch-action: none;\n    user-select: none;\n  }\n  .knob svg { display: block; width: 100%; height: 100%; }\n  .knob .arc-bg { stroke: rgba(0,0,0,0.22); }\n  .knob .arc-fg {\n    stroke: var(--accent2);\n    transition: stroke 0.15s;\n    filter: drop-shadow(0 0 3px rgba(217,106,106,0.55));\n  }\n  .knob.active .arc-fg { stroke: #ec8585; }\n\n  .knob-cap {\n    position: absolute;\n    left: 50%; top: 50%;\n    width: 46px; height: 46px;\n    transform: translate(-50%, -50%);\n    border-radius: 50%;\n    background:\n      radial-gradient(circle at 38% 30%, #6a6f71 0%, #4a4e50 45%, #34383a 100%);\n    box-shadow:\n      0 2px 5px rgba(0,0,0,0.5),\n      0 1px 0 rgba(255,255,255,0.18) inset,\n      0 -3px 6px rgba(0,0,0,0.4) inset;\n    pointer-events: none;\n  }\n  /* stepped knurling ring */\n  .knob-cap::before {\n    content: \"\";\n    position: absolute;\n    inset: 3px;\n    border-radius: 50%;\n    background:\n      repeating-conic-gradient(from 0deg,\n        rgba(255,255,255,0.10) 0deg 4deg,\n        rgba(0,0,0,0.22) 4deg 8deg);\n    -webkit-mask: radial-gradient(circle, transparent 56%, #000 57%);\n            mask: radial-gradient(circle, transparent 56%, #000 57%);\n    opacity: 0.55;\n  }\n  .knob-pointer {\n    position: absolute;\n    left: 50%; top: 50%;\n    width: 3px; height: 22px;\n    background: linear-gradient(180deg, var(--accent2), #b04a4a);\n    border-radius: 2px;\n    transform-origin: 50% 100%;\n    transform: translate(-50%, -100%) rotate(0deg);\n    box-shadow: 0 0 4px rgba(217,106,106,0.7);\n    pointer-events: none;\n  }\n\n  .knob-name {\n    font-size: 9px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: #4c5051;\n    font-weight: 600;\n  }\n  .knob-val {\n    font-size: 11px;\n    font-variant-numeric: tabular-nums;\n    color: var(--ink);\n    background: linear-gradient(180deg, #e7eaea, #cfd3d4);\n    border-radius: 4px;\n    padding: 2px 7px;\n    min-width: 52px;\n    text-align: center;\n    box-shadow: 0 1px 2px rgba(0,0,0,0.25) inset;\n    border: 1px solid rgba(0,0,0,0.12);\n  }\n\n  /* power lamp */\n  .lamp {\n    width: 9px; height: 9px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 35% 30%, #ff9a9a, var(--accent2));\n    box-shadow: 0 0 8px var(--accent2), 0 0 2px #fff inset;\n    anima
