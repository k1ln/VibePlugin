<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stereo Room — test bench</title><style>
  :root{--ac:#7ad0c0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Stereo Room</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Stereo Room<\/title>\n<style>\n  :root {\n    --accent: #7ad0c0;\n    --accent2: #a0e0d0;\n    --bg0: #0a1413;\n    --bg1: #0f1f1d;\n    --panel: #14201f;\n    --panel-hi: #1c2c2a;\n    --ink: #cfe9e3;\n    --ink-dim: #6f8a85;\n    --line: #233834;\n    --display-bg: #05100d;\n    --display-glow: #7ad0c0;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    background:\n      radial-gradient(120% 80% at 50% -10%, #16302c 0%, var(--bg0) 55%, #060d0c 100%);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n    min-height: 100%;\n  }\n\n  body {\n    display: flex;\n    justify-content: center;\n    padding: 18px 14px 26px;\n  }\n\n  .unit {\n    width: 100%;\n    max-width: 720px;\n    background:\n      linear-gradient(180deg, #1a2b29 0%, var(--panel) 18%, #101b1a 100%);\n    border: 1px solid #2a423e;\n    border-radius: 14px;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.05) inset,\n      0 -2px 0 rgba(0,0,0,0.45) inset,\n      0 22px 50px rgba(0,0,0,0.6);\n    padding: 16px 18px 20px;\n    position: relative;\n    overflow: hidden;\n  }\n\n  /* brushed-metal sheen */\n  .unit::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background:\n      repeating-linear-gradient(90deg,\n        rgba(255,255,255,0.018) 0 2px,\n        rgba(0,0,0,0.02) 2px 4px);\n    pointer-events: none;\n    opacity: 0.5;\n  }\n\n  /* ---------------- header / rack ears ---------------- */\n  .head {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    margin-bottom: 14px;\n    position: relative;\n    z-index: 2;\n  }\n\n  .screw {\n    width: 14px; height: 14px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 35% 30%, #3a524d, #0c1413 70%);\n    box-shadow: 0 1px 1px rgba(0,0,0,0.6), 0 0 0 1px #243733 inset;\n    position: relative;\n    flex: 0 0 auto;\n  }\n  .screw::after {\n    content: \"\";\n    position: absolute;\n    inset: 4px;\n    border-top: 1.5px solid rgba(0,0,0,0.55);\n    transform: rotate(35deg);\n  }\n\n  .title-block { flex: 1 1 auto; }\n  .brand {\n    font-size: 10px;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    margin-bottom: 3px;\n  }\n  .model {\n    font-size: 22px;\n    font-weight: 700;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink);\n    text-shadow: 0 0 14px rgba(122,208,192,0.25);\n  }\n  .model b { color: var(--accent); font-weight: 700; }\n\n  .power {\n    display: flex;\n    align-items: center;\n    gap: 7px;\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    color: var(--ink-dim);\n    text-transform: uppercase;\n  }\n  .led {\n    width: 9px; height: 9px; border-radius: 50%;\n    background: var(--accent);\n    box-shadow: 0 0 9px 2px rgba(122,208,192,0.8);\n    animation: pulse 3.4s ease-in-out infinite;\n  }\n  @keyframes pulse {\n    0%, 100% { opacity: 0.85; }\n    50% { opacity: 0.35; }\n  }\n\n  /* ---------------- display (room view) ---------------- */\n  .display {\n    position: relative;\n    z-index: 2;\n    background:\n      radial-gradient(130% 120% at 50% 0%, #0a1f1a 0%, var(--display-bg) 70%);\n    border: 1px solid #06231c;\n    border-radius: 9px;\n    box-shadow:\n      0 0 0 1px rgba(0,0,0,0.6),\n      0 6px 18px rgba(0,0,0,0.55) inset,\n      0 0 26px rgba(122,208,192,0.06) inset;\n    padding: 12px;\n    margin-bottom: 16px;\n    overflow: hidden;\n  }\n\n  /* scanline / vintage CRT texture */\n  .display::after {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background: repeating-linear-gradient(\n      0deg,\n      rgba(0,0,0,0) 0 2px,\n      rgba(0,0,0,0.16) 2px 3px);\n    pointer-events: none;\n    mix-blend-mode: multiply;\n  }\n\n  .display-top {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: 8px;\n    font-size: 9px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--accent);\n    text-shadow: 0 0 7px rgba(122,208,192,0.6);\n  }\n  .display-top .rt {\n    font-variant-numeric: tabular-nums;\n    color: var(--accent2);\n  }\n\n  .room-wrap {\n    position: relative;\n    width: 100%;\n    aspect-ratio: 16 / 7;\n    border-radius: 4px;\n    overflow: hidden;\n    background: linear-gradient(180deg, #06140f, #04100c);\n  }\n  .room-svg { display: block; width: 100%; height: 100%; }\n\n  /* ---------------- controls ---------------- */\n  .panel {\n    position: relative;\n    z-index: 2;\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 10px;\n  }\n  @media (max-width: 560px) {\n    .panel { grid-template-columns: repeat(3, 1fr); }\n  }\n\n  .cell {\n    background: linear-gradient(180deg, var(--panel-hi), #0f1817);\n    border: 1px solid var(--line);\n    border-radius: 11px;\n    padding: 12px 8px 11px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 7px;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.04) inset,\n      0 -3px 6px rgba(0,0,0,0.3) inset;\n  }\n\n  .knob {\n    position: relative;\n    width: 76px; height: 76px;\n    cursor: ns-resize;\n    touch-action: none;\n    -webkit-user-select: none;\n    user-select: none;\n  }\n  .knob svg { display: block; width: 100%; height: 100%; overflow: visible; }\n  .knob .body-grad { transition: filter 0.18s ease; }\n  .knob.active .body-grad,\n  .knob:hover .body-grad { filter: drop-shadow(0 0 8px rgba(122,208,192,0.5)); }\n\n  .label {\n    font-size: 9.5px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .value {\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.04em;\n    color: var(--accent2);\n    font-variant-numeric: tabular-nums;\n    text-shadow: 0 0 8px rgba(122,208,192,0.3);\n  }\n\n  .foot {\n    position: relative;\n    z-index: 2;\n    margin-top: 14px;\n    display: flex;\n    justify-content: space-between;\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .foot .digital {\n    color: var(--accent);\n    text-shadow: 0 0 6px rgba(122,208,192,0.4);\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <div class=\"head\">\n      <div class=\"screw\"><\/div>\n      <div class=\"title-block\">\n        <div class=\"brand\">Vibe&nbsp;&middot;&nbsp;Digital&nbsp;Reverb&nbsp;Processor<\/div>\n        <div class=\"model\"><b>Stereo<\/b> Room<\/div>\n      <\/div>\n      <div class=\"power\">\n        <span>On<\/span>\n        <span class=\"led\"><\/span>\n      <\/div>\n      <div class=\"screw\"><\/div>\n    <\/div>\n\n    <div class=\"display\">\n      <div class=\"display-top\">\n        <span>Room&nbsp;&middot;&nbsp;Top&nbsp;View<\/span>\n        <span class=\"rt\" id=\"rt\">RT 1.20 s<\/span>\n      <\/div>\n      <div class=\"room-wrap\">\n        <svg class=\"room-svg\" id=\"roomSvg\" viewBox=\"0 0 320 140\" preserveAspectRatio=\"none\">\n          <defs>\n            <linearGradient id=\"floor\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#0a221b\"/>\n              <stop offset=\"1\" stop-color=\"#040f0c\"/>\n            <\/linearGradient>\n            <radialGradient id=\"src\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n              <stop offset=\"0\" stop-color=\"#dffff6\"/>\n              <stop offset=\"0.5\" stop-color=\"#7ad0c0\"/>\n              <stop offset=\"1\" stop-color=\"#7ad0c0\" stop-opacity=\"0\"/>\n            <\/radialGradient>\n          <\/defs>\n\n          <!-- floor -->\n          <rect x=\"0\" y=\"0\" width=\"320\" height=\"140\" fill=\"url(#floor)\"/>\n\n          <!-- floor grid -->\n          <g stroke=\"#16352c\" stroke-width=\"0.5\" id=\"grid\"><\/g>\n\n          <!-- room walls (the box). inset rect, scales with Size -->\n          <rect id=\"walls\" x=\"26\" y=\"16\" width=\"268\" height=\"108\" rx=\"2\"\n                fill=\"none\" stroke=\"#3f7d70\" stroke-width=\"1.4\"\n                style=\"filter: drop-shadow(0 0 4px rgba(122,208,192,0.35));\"/>\n\n          <!-- early-reflection rays -->\n          <g id=\"rays\" stroke-linecap=\"round\"><\/g>\n\n          <!-- wall impact sparks -->\n          <g id=\"sparks\"><\/g>\n\n          <!-- source + two mic dots -->\n          <circle id=\"srcGlow\" cx=\"160\" cy=\"70\" r=\"13\" fill=\"url(#src)\"/>\n          <circle id=\"srcDot\" cx=\"160\" cy=\"70\" r=\"3.2\" fill=\"#eafff9\"/>\n\n          <circle class=\"mic\" cx=\"120\" cy=\"70\" r=\"2.6\" fill=\"#a0e0d0\" opacity=\"0.9\"/>\n          <circle class=\"mic\" cx=\"200\" cy=\"70\" r=\"2.6\" fill=\"#a0e0d0\" opacity=\"0.9\"/>\n        <\/svg>\n      <\/div>\n    <\/div>\n\n    <div class=\"panel\" id=\"panel\"><\/div>\n\n    <div class=\"foot\">\n      <span>Multitap&nbsp;ER&nbsp;+&nbsp;Diffuse&nbsp;Tail<\/span>\n      <span class=\"digital\">16&nbsp;Bit&nbsp;&middot;&nbsp;Stereo<\/span>\n    <\/div>\n  <\/div>\n\n<script>\n(function () {\n  \"use strict\";\n\n  // ---- parameter model -------------------------------------------------\n  var PARAMS = [\n    { name: \"Mix\",       index: 0, min: 0, max: 1, def: 0.35, unit: \"%\",  fmt: pct },\n    { name: \"Size\",      index: 1, min: 0, max: 1, def: 0.50, unit: \"\",   fmt: sizeFmt },\n    { name: \"Decay\",     index: 2, min: 0, max: 1, def: 0.50, unit: \"s\",  fmt: decayFmt },\n    { name: \"Diffusion\", index: 3, min: 0, max: 1, def: 0.70, unit: \"%\",  fmt: pct },\n    { name: \"Pre-Delay\", index: 4, min: 0, max: 1, def: 0.10, unit: \"ms\", fmt: preFmt }\n  ];\n\n  var values = {};   // index -> normalized 0..1\n\n  function pct(v)      { return Math.round(v * 100) + \" %\"; }\n  function sizeFmt(v)  {\n    var labels = [\"Booth\", \"Small\", \"Medium\", \"Large\", \"Hall\"];\n    return labels[Math.min(4, Math.floor(v * 4.999))];\n  }\n  function decayFmt(v) { return (0.25 + v * 2.55).toFixed(2) + \" s\"; }\n  function preFmt(v)   { return Math.round(v * 120) + \" ms\"; }\n\n  // ---- host wiring -----------------------------------------------------\n  function pushParam(p) {\n    var v = values[p.index];\n    if (window.vstai && window.vstai.setParam) {\n      window.vstai.setParam(p.index, p.min + v * (p.max - p.min));\n    }\n  }\n\n  // ---- build knobs -----------------------------------------------------\n  var panel = document.getElementById(\"panel\");\n  var knobEls = {};\n\n  function buildKnob(p) {\n    var cell = document.createElement(\"div\");\n    cell.className = \"cell\";\n\n    var knob = document.createElement(\"div\");\n    knob.className = \"knob\";\n\n    var ns = \"http://www.w3.org/2000/svg\";\n    var svg = document.createElementNS(ns, \"svg\");\n    svg.setAttribute(\"viewBox\", \"0 0 100 100\");\n\n    // defs (gradient body)\n    var defs = document.createElementNS(ns, \"defs\");\n    var gid = \"kbody\" + p.index;\n    var lg = document.createElementNS(ns, \"radialGradient\");\n    lg.setAttribute(\"id\", gid);\n    lg.setAttribute(\"cx\", \"38%\"); lg.setAttribute(\"cy\", \"32%\"); lg.setAttribute(\"r\", \"75%\");\n    [[\"0\", \"#2b3f3c\"], [\"0.55\", \"#1a2725\"], [\"1\", \"#0c1413\"]].forEach(function (s) {\n      var st = document.createElementNS(ns, \"stop\");\n      st.setAttribute(\"offset\", s[0]); st.setAttribute(\"stop-color\", s[1]);\n      lg.appendChild(st);\n    });\n    defs.appendChild(lg);\n    svg.appendChild(defs);\n\n    // track arc (background)\n    var track = document.createElementNS(ns, \"path\");\n    track.setAttribute(\"d\", arcPath(50, 52, 38, -135, 135));\n    track.setAttribute(\"fill\", \"none\");\n    track.setAttribute(\"stroke\", \"#16302b\");\n    track.setAttribute(\"stroke-width\", \"5\");\n    track.setAttribute(\"stroke-linecap\", \"round\");\n    svg.appendChild(track);\n\n    // value arc\n    var arc = document.createElementNS(ns, \"path\");\n    arc.setAttribute(\"fill\", \"none\");\n    arc.setAttribute(\"stroke\", \"var(--accent)\");\n    arc.setAttribute(\"stroke-width\", \"5\");\n    arc.setAttribute(\"stroke-linecap\", \"round\");\n    arc.style.filter = \"drop-shadow(0 0 4px rgba(122,208,192,0.7))\";\n    svg.appendChild(arc);\n\n    // body\n    var body = document.createElementNS(ns, \"circle\");\n    body.setAttribute(\"class\", \"body-grad\");\n    body.setAttribute(\"cx\", \"50\"); body.setAttribute(\"cy\", \"52\");\n    body.setAttribute(\"r\", \"27\");\n    body.setAttribute(\"fill\", \"url(#\" + gid + \")\");\n    body.setAttribute(\"stroke\", \"#33514b\");\n    body.setAttribute(\"stroke-width\", \"1\");\n    svg.appendChild(body);\n\n    // pointer notch\n    var notch = document.createElementNS(ns, \"line\");\n    notch.setAttribute(\"x1\", \"50\"); notch.setAttribute(\"y1\", \"52\");\n    notch.setAttribute(\"x2\", \"50\"); notch.setAttribute(\"y2\", \"30\");\n    notch.setAttribute(\"stroke\", \"var(--accent2)\");\n    notch.setAttribute(\"stroke-width\", \"2.6\");\n    notch.setAttribute(\"stroke-linecap\", \"round\");\n    svg.appendChild(notch);\n\n    knob.appendChild(svg);\n    cell.appendChild(knob);\n\n    var label = document.createElement(\"div\");\n    label.className = \"label\";\n    label.textContent = p.name;\n    cell.appendChild(label);\n\n    var val = document.createElement(\"div\");\n    val.className = \"value\";\n    cell.appendChild(val);\n\n    panel.appendChild(cell);\n\n    knobEls[p.index] = { knob: knob, arc: arc, notch: notch, val: val };\n    attachDrag(knob, p);\n    render(p);\n  }\n\n  function arcPath(cx, cy, r, a0deg, a1deg) {\n    var a0 = (a0deg - 90) * Math.PI / 180;\n    var a1 = (a1deg - 90) * Math.PI / 180;\n    var x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);\n    var x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);\n    var large = (a1deg - a0deg) > 180 ? 1 : 0;\n    return \"M \" + x0.toFixed(2) + \" \" + y0.toFixed(2) +\n           \" A \" + r + \" \" + r + \" 0 \" + large + \" 1 \" +\n           x1.toFixed(2) + \" \" + y1.toFixed(2);\n  }\n\n  function render(p) {\n    var v = values[p.index];\n    var el = knobEls[p.index];\n    var ang = -135 + v * 270;\n    // value arc\n    if (v <= 0.0001) {\n      el.arc.setAttribute(\"d\", \"\");\n    } else {\n      el.arc.setAttribute(\"d\", arcPath(50, 52, 38, -135, ang));\n    }\n    // notch rotation\n    el.notch.setAttribute(\"transform\", \"rotate(\" + ang + \" 50 52)\");\n    el.val.textContent = p.fmt(v);\n  }\n\n  // ---- drag interaction ------------------------------------------------\n  function attachDrag(knob, p) {\n    var dragging = false, startY = 0, startV = 0;\n\n    function onDown(e) {\n      dragging = true;\n      knob.classList.add(\"active\");\n      startY = (e.touches ? e.touches[0].clientY : e.clientY);\n      startV = values[p.index];\n      e.preventDefault();\n      window.addEventListener(\"mousemove\", onMove);\n      window.addEventListener(\"mouseup\", onUp);\n      window.addEventListener(\"touchmove\", onMove, { passive: false });\n      window.addEventListener(\"touchend\", onUp);\n    }\n    function onMove(e) {\n      if (!dragging) return;\n      var y = (e.touches ? e.touches[0].clientY : e.clientY);\n      var dy = startY - y;\n      var fine = e.shiftKey ? 0.25 : 1;\n      var nv = startV + (dy / 180) * fine;\n      values[p.index] = clamp01(nv);\n      render(p); pushParam(p); updateRoom();\n      e.preventDefault();\n    }\n    function onUp() {\n      dragging = false;\n      knob.classLi
