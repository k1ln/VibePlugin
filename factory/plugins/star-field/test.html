<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Star Field — test bench</title><style>
  :root{--ac:#7a8cff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Star Field</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  <div class="bar">

  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Star Field<\/title>\n<style>\n  :root {\n    --accent: #7a8cff;\n    --accent2: #54d1ff;\n    --vector: #54f1a8;      /* retro sci-fi vector green */\n    --vector-dim: #1d6b4c;\n    --bg0: #04060f;\n    --bg1: #0a1020;\n    --panel: #0c1226;\n    --line: rgba(122,140,255,0.14);\n    --ink: #cfd8ff;\n    --ink-dim: #6b76a8;\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    background: radial-gradient(120% 90% at 50% -10%, #0d1530 0%, var(--bg0) 70%);\n    color: var(--ink);\n    min-height: 100%;\n  }\n\n  body {\n    display: flex;\n    justify-content: center;\n    padding: 16px;\n  }\n\n  .station {\n    width: 100%;\n    max-width: 720px;\n    background:\n      linear-gradient(180deg, rgba(20,28,56,0.9), rgba(8,12,28,0.95));\n    border: 1px solid var(--line);\n    border-radius: 18px;\n    box-shadow:\n      0 30px 80px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(160,180,255,0.08);\n    overflow: hidden;\n    position: relative;\n  }\n\n  /* ---------- header ---------- */\n  .head {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 14px 20px;\n    border-bottom: 1px solid var(--line);\n    background: linear-gradient(180deg, rgba(122,140,255,0.07), transparent);\n  }\n\n  .brand { display: flex; align-items: center; gap: 12px; }\n\n  .sigil {\n    width: 34px; height: 34px;\n    position: relative;\n    flex: none;\n  }\n  .sigil svg { display: block; }\n  .sigil .core { transform-origin: 17px 17px; animation: spin 14s linear infinite; }\n\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n  .title {\n    font-size: 19px;\n    font-weight: 700;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    background: linear-gradient(90deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .subtitle {\n    font-size: 9.5px;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    margin-top: 2px;\n  }\n\n  .status {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 9px;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--vector);\n    font-variant-numeric: tabular-nums;\n  }\n  .status .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--vector);\n    box-shadow: 0 0 8px var(--vector);\n    animation: blink 2.2s ease-in-out infinite;\n  }\n  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }\n\n  /* ---------- radar / starfield viewport ---------- */\n  .scope {\n    position: relative;\n    margin: 16px;\n    height: 240px;\n    border: 1px solid rgba(84,241,168,0.18);\n    border-radius: 12px;\n    background:\n      radial-gradient(120% 140% at 50% 120%, rgba(84,241,168,0.05), transparent 60%),\n      linear-gradient(180deg, #030810, #02060c);\n    overflow: hidden;\n    cursor: crosshair;\n  }\n  .scope canvas { position: absolute; inset: 0; width: 100%; height: 100%; }\n\n  .scope .scan {\n    position: absolute; inset: 0;\n    background: linear-gradient(180deg, transparent, rgba(84,241,168,0.06) 50%, transparent);\n    height: 40%;\n    animation: scan 5.5s linear infinite;\n    mix-blend-mode: screen;\n    pointer-events: none;\n  }\n  @keyframes scan {\n    0% { transform: translateY(-120%); }\n    100% { transform: translateY(360%); }\n  }\n\n  .readout {\n    position: absolute;\n    left: 12px; bottom: 10px;\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    color: var(--vector);\n    text-shadow: 0 0 6px rgba(84,241,168,0.5);\n    font-variant-numeric: tabular-nums;\n    pointer-events: none;\n    line-height: 1.6;\n  }\n  .readout span { color: #aef7d4; }\n\n  .vlabel {\n    position: absolute;\n    right: 12px; top: 10px;\n    font-size: 8.5px;\n    letter-spacing: 0.3em;\n    color: var(--vector-dim);\n    text-transform: uppercase;\n    pointer-events: none;\n  }\n\n  /* ---------- controls ---------- */\n  .deck {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 8px;\n    padding: 6px 16px 22px;\n  }\n  @media (max-width: 560px) {\n    .deck { grid-template-columns: repeat(3, 1fr); }\n  }\n\n  .cell {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 8px;\n    padding: 14px 6px 12px;\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    background: linear-gradient(180deg, rgba(122,140,255,0.04), rgba(0,0,0,0.18));\n  }\n\n  .knob {\n    position: relative;\n    width: 84px; height: 84px;\n    cursor: ns-resize;\n    touch-action: none;\n    user-select: none;\n  }\n  .knob svg { display: block; overflow: visible; }\n\n  .knob .face {\n    fill: url(#knobGrad);\n    stroke: rgba(160,180,255,0.18);\n    stroke-width: 1;\n  }\n  .knob .pointer {\n    stroke: var(--accent2);\n    stroke-width: 2.5;\n    stroke-linecap: round;\n    filter: drop-shadow(0 0 4px var(--accent2));\n  }\n  .knob .arc-bg { stroke: rgba(122,140,255,0.16); }\n  .knob .arc {\n    stroke: url(#arcGrad);\n    filter: drop-shadow(0 0 5px rgba(84,209,255,0.55));\n    transition: stroke-dashoffset 0.04s linear;\n  }\n  .knob:hover .arc { filter: drop-shadow(0 0 9px rgba(84,209,255,0.9)); }\n\n  .name {\n    font-size: 9.5px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    text-align: center;\n  }\n  .val {\n    font-size: 12px;\n    font-weight: 600;\n    color: var(--accent2);\n    font-variant-numeric: tabular-nums;\n    text-shadow: 0 0 8px rgba(84,209,255,0.35);\n  }\n\n  .foot {\n    border-top: 1px solid var(--line);\n    padding: 8px 20px 12px;\n    display: flex;\n    justify-content: space-between;\n    font-size: 8px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"station\">\n    <div class=\"head\">\n      <div class=\"brand\">\n        <div class=\"sigil\">\n          <svg width=\"34\" height=\"34\" viewBox=\"0 0 34 34\">\n            <circle cx=\"17\" cy=\"17\" r=\"15.5\" fill=\"none\" stroke=\"rgba(122,140,255,0.35)\" stroke-width=\"1\"/>\n            <g class=\"core\">\n              <circle cx=\"17\" cy=\"17\" r=\"3.4\" fill=\"#54d1ff\"/>\n              <circle cx=\"17\" cy=\"4\" r=\"1.6\" fill=\"#7a8cff\"/>\n              <circle cx=\"29\" cy=\"20\" r=\"1.3\" fill=\"#54f1a8\"/>\n              <circle cx=\"6\" cy=\"22\" r=\"1.2\" fill=\"#7a8cff\"/>\n              <line x1=\"17\" y1=\"17\" x2=\"17\" y2=\"4\" stroke=\"rgba(84,209,255,0.4)\" stroke-width=\"0.7\"/>\n              <line x1=\"17\" y1=\"17\" x2=\"29\" y2=\"20\" stroke=\"rgba(84,209,255,0.3)\" stroke-width=\"0.7\"/>\n            <\/g>\n          <\/svg>\n        <\/div>\n        <div>\n          <div class=\"title\">Star Field<\/div>\n          <div class=\"subtitle\">Multitap Space Station<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"status\"><span class=\"dot\"><\/span> Online<\/div>\n    <\/div>\n\n    <div class=\"scope\" id=\"scope\">\n      <canvas id=\"cv\"><\/canvas>\n      <div class=\"scan\"><\/div>\n      <div class=\"vlabel\">SECTOR // RVB-01<\/div>\n      <div class=\"readout\">\n        FIELD DEPTH <span id=\"roSize\">0.00<\/span> &nbsp; SPREAD <span id=\"roSpread\">0.00<\/span><br>\n        DECAY <span id=\"roDecay\">0.00<\/span> &nbsp; DRIFT <span id=\"roMod\">0.00<\/span> &nbsp; MIX <span id=\"roMix\">0.00<\/span>\n      <\/div>\n    <\/div>\n\n    <div class=\"deck\" id=\"deck\"><\/div>\n\n    <div class=\"foot\">\n      <span>Drag &middot; Wheel fine &middot; Dbl-click reset<\/span>\n      <span>Vector Reverb Array<\/span>\n    <\/div>\n  <\/div>\n\n<script>\n(function () {\n  \"use strict\";\n\n  var PARAMS = [\n    { name: \"Size\",   index: 0, min: 0, max: 1, def: 0.55 },\n    { name: \"Spread\", index: 1, min: 0, max: 1, def: 0.70 },\n    { name: \"Decay\",  index: 2, min: 0, max: 1, def: 0.55 },\n    { name: \"Drift\",  index: 3, min: 0, max: 1, def: 0.35 },\n    { name: \"Mix\",    index: 4, min: 0, max: 1, def: 0.35 }\n  ];\n\n  var state = PARAMS.map(function (p) { return p.def; });\n\n  // ----- host bridge ------------------------------------------------\n  function push(idx, val) {\n    if (window.vstai && typeof window.vstai.setParam === \"function\") {\n      window.vstai.setParam(idx, val);\n    }\n  }\n\n  // ----- shared SVG defs (knob gradients) ---------------------------\n  var SVG_DEFS =\n    '<defs>' +\n    '<radialGradient id=\"knobGrad\" cx=\"38%\" cy=\"32%\" r=\"75%\">' +\n      '<stop offset=\"0%\" stop-color=\"#2a3566\"/>' +\n      '<stop offset=\"55%\" stop-color=\"#141b38\"/>' +\n      '<stop offset=\"100%\" stop-color=\"#070b1c\"/>' +\n    '<\/radialGradient>' +\n    '<linearGradient id=\"arcGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">' +\n      '<stop offset=\"0%\" stop-color=\"#7a8cff\"/>' +\n      '<stop offset=\"100%\" stop-color=\"#54d1ff\"/>' +\n    '<\/linearGradient>' +\n    '<\/defs>';\n\n  // arc geometry\n  var R = 33, CX = 42, CY = 42;\n  var A0 = 135, A1 = 405; // sweep degrees (270deg gap at bottom)\n  var ARC_LEN = 2 * Math.PI * R * ((A1 - A0) / 360);\n\n  function polar(deg) {\n    var a = deg * Math.PI / 180;\n    return { x: CX + R * Math.cos(a), y: CY + R * Math.sin(a) };\n  }\n\n  function arcPath() {\n    var s = polar(A0), e = polar(A1);\n    var large = (A1 - A0) > 180 ? 1 : 0;\n    return \"M \" + s.x.toFixed(2) + \" \" + s.y.toFixed(2) +\n           \" A \" + R + \" \" + R + \" 0 \" + large + \" 1 \" + e.x.toFixed(2) + \" \" + e.y.toFixed(2);\n  }\n\n  var deck = document.getElementById(\"deck\");\n  var knobs = [];\n\n  PARAMS.forEach(function (p, i) {\n    var cell = document.createElement(\"div\");\n    cell.className = \"cell\";\n\n    var knob = document.createElement(\"div\");\n    knob.className = \"knob\";\n    var path = arcPath();\n    knob.innerHTML =\n      '<svg width=\"84\" height=\"84\" viewBox=\"0 0 84 84\">' +\n        SVG_DEFS +\n        '<path class=\"arc-bg\" d=\"' + path + '\" fill=\"none\" stroke-width=\"4\" stroke-linecap=\"round\"/>' +\n        '<path class=\"arc\" d=\"' + path + '\" fill=\"none\" stroke-width=\"4\" stroke-linecap=\"round\" ' +\n          'stroke-dasharray=\"' + ARC_LEN.toFixed(2) + '\" stroke-dashoffset=\"' + ARC_LEN.toFixed(2) + '\"/>' +\n        '<circle class=\"face\" cx=\"42\" cy=\"42\" r=\"26\"/>' +\n        '<line class=\"pointer\" x1=\"42\" y1=\"42\" x2=\"42\" y2=\"22\" transform=\"rotate(0 42 42)\"/>' +\n        '<circle cx=\"42\" cy=\"42\" r=\"3\" fill=\"#54d1ff\"/>' +\n      '<\/svg>';\n\n    var nm = document.createElement(\"div\");\n    nm.className = \"name\";\n    nm.textContent = p.name;\n\n    var vv = document.createElement(\"div\");\n    vv.className = \"val\";\n    vv.textContent = p.def.toFixed(2);\n\n    cell.appendChild(knob);\n    cell.appendChild(nm);\n    cell.appendChild(vv);\n    deck.appendChild(cell);\n\n    var arc = knob.querySelector(\".arc\");\n    var ptr = knob.querySelector(\".pointer\");\n\n    function render() {\n      var v = state[i];\n      var frac = (v - p.min) / (p.max - p.min);\n      arc.setAttribute(\"stroke-dashoffset\", (ARC_LEN * (1 - frac)).toFixed(2));\n      var deg = A0 + (A1 - A0) * frac;\n      // pointer points outward along the arc angle\n      ptr.setAttribute(\"transform\", \"rotate(\" + (deg + 90).toFixed(1) + \" 42 42)\");\n      vv.textContent = v.toFixed(2);\n    }\n\n    function setVal(v) {\n      if (v < p.min) v = p.min;\n      if (v > p.max) v = p.max;\n      state[i] = v;\n      push(p.index, v);\n      render();\n    }\n\n    // drag (vertical)\n    var dragging = false, lastY = 0;\n    knob.addEventListener(\"pointerdown\", function (e) {\n      dragging = true; lastY = e.clientY;\n      knob.setPointerCapture(e.pointerId);\n      e.preventDefault();\n    });\n    knob.addEventListener(\"pointermove\", function (e) {\n      if (!dragging) return;\n      var dy = lastY - e.clientY;\n      lastY = e.clientY;\n      var span = p.max - p.min;\n      setVal(state[i] + dy / 180 * span);\n    });\n    knob.addEventListener(\"pointerup\", function (e) {\n      dragging = false;\n      try { knob.releasePointerCapture(e.pointerId); } catch (err) {}\n    });\n    knob.addEventListener(\"dblclick\", function () { setVal(p.def); });\n    knob.addEventListener(\"wheel\", function (e) {\n      e.preventDefault();\n      var span = p.max - p.min;\n      setVal(state[i] - Math.sign(e.deltaY) * span * 0.01);\n    }, { passive: false });\n\n    knobs.push({ p: p, render: render, setVal: setVal });\n    render();\n  });\n\n  // ----- starfield / multitap radar canvas --------------------------\n  var cv = document.getElementById(\"cv\");\n  var ctx = cv.getContext(\"2d\");\n  var W = 0, H = 0, DPR = 1;\n\n  function resize() {\n    DPR = window.devicePixelRatio || 1;\n    var r = cv.getBoundingClientRect();\n    W = r.width; H = r.height;\n    cv.width = Math.max(1, Math.round(W * DPR));\n    cv.height = Math.max(1, Math.round(H * DPR));\n    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);\n  }\n  window.addEventListener(\"resize\", resize);\n\n  // background stars\n  var stars = [];\n  for (var s = 0; s < 90; s++) {\n    stars.push({\n      x: Math.random(), y: Math.random(),\n      z: 0.3 + Math.random() * 0.7,\n      tw: Math.random() * 6.28\n    });\n  }\n\n  // pings: discrete echoes that expand outward from the centre\n  var pings = [];\n  var pingTimer = 0;\n\n  function spawnPing(t) {\n    var size = state[0], spread = state[1], mix = state[4];\n    var n = Math.round(3 + spread * 9); // density of taps\n    for (var k = 0; k < n; k++) {\n      var ang = (k / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;\n      // spread widens the horizontal fan\n      var wob = 0.5 + spread * 1.2;\n      pings.push({\n        born: t,\n        ang: ang,\n        wob: wob,\n        speed: 0.18 + size * 0.5,\n        life: 1.6 + state[2] * 3.2,    // decay -> longer-lived\n        amp: (0.5 + mix * 0.5) * (1 - k / (n + 4))\n      });\n    }\n  }\n\n  var ro = {\n    Size: document.getElementById(\"roSize\"),\n    Spread: document.getElementById(\"roSpread\"),\n    Decay: document.getElementById(\"roDecay\"),\n    Mod: document.getElementById(\"roMod\"),\n    Mix: document.getElementById(\"roMix\")\n  };\n\n  var running = true;\n  var startT = performance.now();\n\n  function frame(now) {\n    if (!running) return;\n    var t = (now - startT) / 1000;\n\n    if (W === 0) resize();\n    ctx.clearRect(0, 0, W, H);\n\n    var size = state[0], spread = state[1], decay = state[2], mod = state[3], mix = state[4];\n\n    // horizon grid (perspective floor)\n    var hy = H * 0.62;\n    ctx.strokeStyle = \"rgba(84,241,168,0.12)\";\n    ctx.lineWidth = 1;\n    var rows = 7;\n    for (var g = 0; g <= rows; g++) {\n      var f = g / rows;\n      var y = hy + (H - hy) * f * f;\n      ctx.globalAlpha = 0.4 * (1 - f) + 0.1;\n      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();\n    }\n    var cols = 12;\n    for (var c2 = 0; c2 <= cols; c2++) {\n      var fx = c2 / cols - 0.5;\n      ctx.globalAlpha = 0.16;\n      ctx.beginPath();\n      ctx.moveTo(W / 2 + fx * W * 0.18, hy);\n      ctx.lineTo(W / 2 + fx * W * 1.6, H);\n      ctx.stroke();\n    }\n    ctx.globalAlpha = 1;\n\n    // twinkling stars, drifting with Drift/mod\n    var drift = t * (0.005 + mod * 0.05);\n    for (var i = 0; i < stars.length; i++) {\n      var st = stars[i];\n      var sx = ((st.x + drift * st.z) % 1) * W;\n      var sy = st.y * hy;\n      var tw = 0.5 + 0.5 * Math.sin(t * (1 + st.z) + st.tw);\n      var rad = st.z * 1.4;\n      ctx.fillStyle = \"rgba(180,200,255,\" + (0.25 + 0.55 * tw * st.z) + \")\";\n      ctx.beginPath(); ctx.arc(sx, sy, rad, 0, 6.28); ctx.fill();\n    }\n\n    // central station core glow\n    var cx = W / 2, cy = hy;\n    var pulse = 0.5 + 0.5 * Math.sin(t * 2.2);\n    var grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 26 + pulse * 8);\n    grd.addColorStop(0, \"rgba(84,209,255,0.55)\");\n    grd.addColorStop(1, \"rgba(84,209,255,0)\");\n    ctx.fillStyle = grd;\n    ctx.beginPath(); ctx.arc(cx, cy, 30, 0, 6.28); ctx.fill();\n    ctx.fillStyle = \"#7a8cff\";\n    ctx.beginPath(); ctx.arc(cx, cy, 3.2, 0, 6.28); ctx.fill();\n\n    // spawn pings at a rate tied to size (bigger space = slower revolutions)\n    pingTimer += 0.016;\n    var interval = 0.55 + size * 0.7;\n    if (pingTimer >= interval) {\n      pingTimer = 0;\n      spawnPing(t);\n    }\n\n    // draw + advance pings (the multitap echoes)\n    var maxR = Math.min(W, H) * 0.7;\n    for (var pidx = pings.length - 1; pidx >= 0; pidx--) {\n      var pg = pings[pidx];\n      var age = t - pg.born;\n      if (age > pg.life) { pings.splice(pidx, 1); continue; }\n      var prog = age / pg.life;\n      var rr = age * pg.speed * maxR;\n      var px = cx + Math.cos(pg.ang) * rr * pg.wob;\n      var py = cy + Math.sin(pg.ang) * rr * 0.55; // flatten vertically toward horizon\n      var a = pg.amp * (1 - prog);\n      // tap dot\n      ctx.fillStyle = \"rgba(84,241,168,\" + a + \")\";\n      ctx.shadowColor = \"rgba(84,241,168,0.9)\";\n      ctx.shadowBlur = 8 * a;\n      ctx.beginPath(); ctx.arc(px, py, 2 + a * 2.5, 0, 6.28); ctx.fill();\n      // faint trail back toward core\n      ctx.shadowBlur = 0;\n      ctx.strokeStyle = \"rgba(122,140,255,\" + (a * 0.35) + \")\";\n      ctx.lineWidth = 1;\n      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke();\n    }\n    ctx.shadowBlur = 0;\n\n    // readout\n    ro.Size.textContent = size.toFixed(2);\n    ro.Spread.textContent = spread.toFixed(2);\n    ro.Decay.textContent = decay.toFixed(2);\n    ro.Mod.textContent = mod.toFixed(2);\n    ro.Mix.textContent = mix.toFixed(2);\n\n    requestAnimationFrame(frame);\n  }\n\n  document.addEventListener(\"visibilitychange\", function () {\n    if (document.hidden) {\n      running = false;\n    } else if (!running) {\n      running = true;\n      startT = performance.now() - 0;\n      requestAnimationFrame(frame);\n    }\n  });\n\n  // ----- init: push defaults to engine ------------------------------\n  function boot() {\n    resize();\n    for (var i = 0; i < PARAMS.length; i++) {\n      push(PARAMS[i].index, state[i]);\n    }\n    requestAnimationFrame(frame);\n  }\n\n  if (window.vstai && typeof window.vstai.onReady === \"function\") {\n    window.vstai.onReady(boot);\n  } else {\n    boot();\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);

  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
