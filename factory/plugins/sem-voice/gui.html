<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sem Voice</title>
<style>
  :root{
    --acc:#e8c27a;     /* amber */
    --acc2:#7ad0ff;    /* sky blue */
    --amber-dim:#9c7a3e;
    --cream0:#f4ecdc;
    --cream1:#e8ddc6;
    --cream2:#d8cbac;
    --ink:#2a2218;
    --chrome0:#fbfdff;
    --chrome1:#b9c2cb;
    --chrome2:#79848e;
    --chrome3:#454d54;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(130% 100% at 50% -15%,#3a342a 0%,#211d16 50%,#100d09 100%);
    color:var(--ink);
    font-family:"Helvetica Neue",Arial,sans-serif;
    overflow:hidden;display:flex;align-items:center;justify-content:center;
    letter-spacing:.02em;
  }

  /* ============ THE PANEL ============ */
  .panel{
    position:relative;width:790px;height:466px;border-radius:16px;padding:20px 24px 22px;
    background:
      linear-gradient(180deg,#fff8ec 0%,#efe5cf 5%,#e3d6ba 8%,#ddd0b2 50%,#cdbf9c 93%,#bbac86 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 -2px 8px rgba(120,95,55,.35) inset,
      0 34px 70px rgba(0,0,0,.6),
      0 2px 0 #8a7a55;
    overflow:hidden;
  }
  /* subtle paper grain */
  .panel::before{
    content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 2px,rgba(110,85,45,.045) 2px 4px);
    mix-blend-mode:overlay;opacity:.7;
  }
  /* slow warm sheen */
  .panel::after{
    content:"";position:absolute;top:0;left:-45%;width:38%;height:100%;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);
    transform:skewX(-18deg);pointer-events:none;animation:sheen 9s ease-in-out infinite;
  }
  @keyframes sheen{0%,70%{left:-50%}88%{left:135%}100%{left:135%}}

  /* chrome bezel screws */
  .screw{position:absolute;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 35% 28%,#fff,#c2cad1 50%,#5e676e 100%);
    box-shadow:0 1px 1px rgba(0,0,0,.45),0 0 0 1px rgba(70,40,10,.35);}
  .screw::after{content:"";position:absolute;inset:3px;border-radius:1px;
    background:linear-gradient(90deg,transparent 44%,#3a4147 44% 56%,transparent 56%);transform:rotate(35deg)}
  .screw.tl{top:10px;left:10px}.screw.tr{top:10px;right:10px}
  .screw.bl{bottom:10px;left:10px}.screw.br{bottom:10px;right:10px}

  /* ============ HEADER ============ */
  .head{display:flex;align-items:flex-end;justify-content:space-between;margin:0 8px 14px}
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .sub{font-size:9px;letter-spacing:.46em;color:#8a6f3c;font-weight:800;margin-bottom:6px;text-transform:uppercase;
    text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .brand .name{font-size:31px;font-weight:800;letter-spacing:.01em;color:#2a2014;
    text-shadow:0 1px 0 rgba(255,255,255,.7),0 -1px 1px rgba(80,55,20,.25)}
  .brand .name b{color:var(--amber-dim);
    text-shadow:0 0 10px rgba(232,194,122,.6),0 1px 0 rgba(255,255,255,.6)}
  .badge{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .badge .chip{font-size:8px;letter-spacing:.28em;font-weight:800;color:#5b4a2a;
    border:1px solid #a8916a;border-radius:20px;padding:3px 10px;
    background:linear-gradient(180deg,#f3ead6,#dac9a4);
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 1px 2px rgba(80,55,20,.2)}
  .badge .voices{font-size:8px;letter-spacing:.2em;color:#7a6537;font-weight:700}

  /* ============ MAIN STAGE ============ */
  .stage{display:flex;gap:20px;align-items:stretch;margin:0 6px}

  /* --- the big MODE morph dial + response window --- */
  .morph{
    position:relative;width:330px;border-radius:13px;padding:14px;
    background:linear-gradient(180deg,#1d2024,#0c0e10);
    box-shadow:0 2px 6px rgba(0,0,0,.55) inset,0 1px 0 rgba(255,255,255,.5),0 0 0 1px rgba(60,40,10,.4);
  }
  .scopeWrap{position:relative;width:302px;height:150px;border-radius:9px;overflow:hidden;
    background:linear-gradient(180deg,#0a1418,#050a0c);
    box-shadow:0 2px 5px rgba(0,0,0,.7) inset;border:1px solid #1c2226;}
  .scopeWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .scope-grid{position:absolute;inset:0;pointer-events:none;
    background:
      repeating-linear-gradient(0deg,rgba(122,208,255,.06) 0 1px,transparent 1px 18px),
      repeating-linear-gradient(90deg,rgba(122,208,255,.06) 0 1px,transparent 1px 22px);}
  .scope-glass{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(130% 80% at 50% 0%,rgba(232,194,122,.12),transparent 62%)}
  .scope-tags{position:absolute;inset:0;pointer-events:none;font-size:8px;font-weight:800;letter-spacing:.14em}
  .scope-tags span{position:absolute;color:#5e7686;text-shadow:0 0 5px rgba(122,208,255,.4)}
  .scope-tags .lp{left:8px;bottom:6px}
  .scope-tags .ntc{left:50%;transform:translateX(-50%);bottom:6px}
  .scope-tags .hp{right:8px;bottom:6px}
  .scope-tags .modeName{top:7px;left:8px;color:var(--acc);font-size:10px;letter-spacing:.18em;
    text-shadow:0 0 7px rgba(232,194,122,.7)}

  /* the dial itself */
  .dialBox{display:flex;align-items:center;gap:14px;margin-top:13px}
  .bigdial{position:relative;width:108px;height:108px;cursor:ns-resize;touch-action:none;flex:0 0 auto}
  .bigdial svg{display:block;width:108px;height:108px;overflow:visible}
  .bigdial .cap{filter:drop-shadow(0 4px 6px rgba(0,0,0,.6))}
  .bigdial:hover .bigGlow,.bigdial.dragging .bigGlow{opacity:1}
  .bigGlow{transition:opacity .25s;opacity:.4}
  .modeMeta{flex:1;display:flex;flex-direction:column;gap:6px}
  .modeMeta .ml{font-size:9px;letter-spacing:.3em;color:#7fd0ff;font-weight:800;text-transform:uppercase}
  .modeMeta .mv{font-size:22px;font-weight:800;color:#f2e6cf;letter-spacing:.02em;
    text-shadow:0 0 9px rgba(232,194,122,.45)}
  .modeMeta .mdesc{font-size:9px;color:#9bb6c6;letter-spacing:.05em;line-height:1.35}
  .modeMeta .mhint{font-size:7.5px;color:#5d6f7c;letter-spacing:.12em;margin-top:2px}

  /* --- knob rack (the smaller controls) --- */
  .rack{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:10px 6px;
    padding:8px 6px;border-radius:13px;
    background:linear-gradient(180deg,rgba(255,253,247,.55),rgba(206,191,156,.4));
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 -2px 5px rgba(120,95,55,.18) inset,0 0 0 1px rgba(120,95,55,.25);}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .label{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:#5b4a2a;font-weight:800;
    text-shadow:0 1px 0 rgba(255,255,255,.6)}
  .knob{position:relative;width:58px;height:58px;cursor:ns-resize;touch-action:none}
  .knob svg{display:block;width:58px;height:58px;overflow:visible}
  .knob .cap{filter:drop-shadow(0 3px 4px rgba(0,0,0,.45))}
  .knob:hover .ringGlow,.knob.dragging .ringGlow{opacity:1}
  .ringGlow{transition:opacity .2s;opacity:.3}
  .vbox{font-size:9.5px;font-weight:800;color:#2a2014;
    background:linear-gradient(180deg,#f6e8c6,#e3cf9c);
    border:1px solid #a8916a;border-radius:4px;padding:1px 7px;min-width:44px;text-align:center;
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 1px 2px rgba(80,55,20,.25);}

  .credit{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.36em;
    color:#7a6537;font-weight:800;text-shadow:0 1px 0 rgba(255,255,255,.5)}
</style>
</head>
<body>
  <div class="panel" id="panel">
    <span class="screw tl"></span><span class="screw tr"></span>
    <span class="screw bl"></span><span class="screw br"></span>

    <div class="head">
      <div class="brand">
        <span class="sub">multimode &middot; state-variable voice</span>
        <span class="name">Sem<b>Voice</b></span>
      </div>
      <div class="badge">
        <span class="chip">DUO &middot; 2 VOICE</span>
        <span class="voices">12&nbsp;dB/OCT &middot; SVF</span>
      </div>
    </div>

    <div class="stage">
      <!-- big morph dial + filter response window -->
      <div class="morph">
        <div class="scopeWrap">
          <canvas id="scope" width="604" height="300"></canvas>
          <div class="scope-grid"></div>
          <div class="scope-glass"></div>
          <div class="scope-tags">
            <span class="modeName" id="modeName">LOW&middot;PASS</span>
            <span class="lp">LP</span><span class="ntc">NOTCH</span><span class="hp">HP</span>
          </div>
        </div>
        <div class="dialBox">
          <div class="bigdial" id="bigdial" title="MODE &mdash; drag to morph LP &rarr; notch &rarr; HP &middot; double-click resets"></div>
          <div class="modeMeta">
            <span class="ml">Mode</span>
            <span class="mv" id="modeVal">LP</span>
            <span class="mdesc" id="modeDesc">low-pass &mdash; warm and round</span>
            <span class="mhint">drag &middot; dbl-click resets</span>
          </div>
        </div>
      </div>

      <!-- knob rack -->
      <div class="rack" id="rack"></div>
    </div>

    <div class="credit">SEM VOICE &middot; AMERICAN MONO</div>
  </div>

<script>
(function(){
  "use strict";

  var ACC="#e8c27a", ACC2="#7ad0ff";
  // ---- params straight from spec.json ----
  var PARAMS=[
    {name:"Mode",       index:0, min:0, max:1, def:0.00, fmt:"mode"},
    {name:"Cutoff",     index:1, min:0, max:1, def:0.45, fmt:"hz"},
    {name:"Resonance",  index:2, min:0, max:1, def:0.45, fmt:"pct"},
    {name:"Env Amount", index:3, min:0, max:1, def:0.60, fmt:"pct"},
    {name:"Detune",     index:4, min:0, max:1, def:0.35, fmt:"cent"},
    {name:"Decay",      index:5, min:0, max:1, def:0.50, fmt:"ms"},
    {name:"Level",      index:6, min:0, max:1, def:0.80, fmt:"pct"}
  ];
  // smaller knobs shown in the rack (Mode handled by the big dial)
  var RACK=[1,2,3,4,5,6];

  function clamp(v,a,b){return v<a?a:v>b?b:v;}
  function norm(p,v){return (v-p.min)/(p.max-p.min);}
  function fmtVal(p,v){
    var n=norm(p,v);
    if(p.fmt==="pct")  return Math.round(n*100)+"%";
    if(p.fmt==="hz"){ var hz=90*Math.exp(n*4.71); return hz<1000?Math.round(hz)+"Hz":(hz/1000).toFixed(1)+"k"; }
    if(p.fmt==="ms")  return Math.round(40+n*n*1360)+"ms";
    if(p.fmt==="cent")return "+"+Math.round(n*24)+"¢";
    if(p.fmt==="mode")return modeLabel(n).short;
    return n.toFixed(2);
  }
  function modeLabel(n){
    if(n<0.04) return {short:"LP",  name:"LOW·PASS",  desc:"low-pass — warm and round"};
    if(n<0.46) return {short:Math.round(n*100)+"%", name:"LP → NOTCH", desc:"low-pass thinning toward the notch"};
    if(n<0.54) return {short:"NOTCH", name:"NOTCH", desc:"notch — hollow, vocal scoop"};
    if(n<0.96) return {short:Math.round(n*100)+"%", name:"NOTCH → HP", desc:"opening up into high-pass"};
    return {short:"HP", name:"HIGH·PASS", desc:"high-pass — thin and airy"};
  }

  // live shared state
  var STATE={};
  PARAMS.forEach(function(p){STATE[p.index]=p.def;});

  var host=window.vstai||null;
  function send(i,v){ if(host&&host.setParam) host.setParam(i,v); }

  var ns="http://www.w3.org/2000/svg";

  // ============ shared SVG defs ============
  function ensureDefs(svg){
    if(document.getElementById("kdefs")) return;
    var defs=document.createElementNS(ns,"defs"); defs.setAttribute("id","kdefs");
    defs.innerHTML=
      '<radialGradient id="cap" cx="36%" cy="28%" r="82%">'+
        '<stop offset="0%" stop-color="#eef2f6"/><stop offset="42%" stop-color="#aab3bb"/>'+
        '<stop offset="100%" stop-color="#3b4248"/></radialGradient>'+
      '<radialGradient id="capBig" cx="36%" cy="26%" r="84%">'+
        '<stop offset="0%" stop-color="#fbfdff"/><stop offset="38%" stop-color="#c4ccd3"/>'+
        '<stop offset="72%" stop-color="#7a838b"/><stop offset="100%" stop-color="#2c3236"/></radialGradient>'+
      '<linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">'+
        '<stop offset="0%" stop-color="'+ACC2+'"/><stop offset="100%" stop-color="'+ACC+'"/></linearGradient>'+
      '<linearGradient id="gradBig" x1="0" y1="0" x2="1" y2="1">'+
        '<stop offset="0%" stop-color="'+ACC2+'"/><stop offset="50%" stop-color="#cfe6f2"/><stop offset="100%" stop-color="'+ACC+'"/></linearGradient>'+
      '<filter id="blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6"/></filter>'+
      '<filter id="nglow" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="1.2" result="b"/>'+
        '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
    svg.appendChild(defs);
  }

  // arc helpers
  function pt(cx,cy,deg,rr){var a=(deg-90)*Math.PI/180;return [cx+Math.cos(a)*rr, cy+Math.sin(a)*rr];}
  function arc(cx,cy,a0,a1,rr){
    var s=pt(cx,cy,a0,rr),e=pt(cx,cy,a1,rr),large=(a1-a0)>180?1:0;
    return "M"+s[0]+" "+s[1]+" A"+rr+" "+rr+" 0 "+large+" 1 "+e[0]+" "+e[1];
  }

  // ============ generic dial builder ============
  function makeDial(host,p,opts){
    opts=opts||{};
    var SIZE=opts.size||58, CX=SIZE/2, CY=SIZE/2+1, R=opts.r||(SIZE*0.40);
    var SW=opts.sweep||272, start=-(SW/2), end=(SW/2);
    var capR=opts.capR||(SIZE*0.27);
    var capGrad=opts.big?"url(#capBig)":"url(#cap)";
    var valGrad=opts.big?"url(#gradBig)":"url(#grad)";
    var sw=opts.big?5:3.4;

    var svg=document.createElementNS(ns,"svg"); svg.setAttribute("viewBox","0 0 "+SIZE+" "+SIZE);
    ensureDefs(svg);

    var glow=document.createElementNS(ns,"path"); glow.setAttribute("class",opts.big?"bigGlow":"ringGlow");
    glow.setAttribute("d",arc(CX,CY,start,end,R+4)); glow.setAttribute("fill","none");
    glow.setAttribute("stroke",ACC2); glow.setAttribute("stroke-width",opts.big?3:2);
    glow.setAttribute("stroke-linecap","round"); glow.setAttribute("filter","url(#blur)"); svg.appendChild(glow);

    var track=document.createElementNS(ns,"path");
    track.setAttribute("d",arc(CX,CY,start,end,R)); track.setAttribute("fill","none");
    track.setAttribute("stroke","#11151a"); track.setAttribute("stroke-width",sw);
    track.setAttribute("stroke-linecap","round"); svg.appendChild(track);

    var val=document.createElementNS(ns,"path"); val.setAttribute("fill","none");
    val.setAttribute("stroke",valGrad); val.setAttribute("stroke-width",sw);
    val.setAttribute("stroke-linecap","round"); svg.appendChild(val);

    // tick marks for the big dial (LP / NOTCH / HP)
    if(opts.big){
      [start,0,end].forEach(function(d){
        var a=document.createElementNS(ns,"line");
        var i1=pt(CX,CY,d,R+7),o1=pt(CX,CY,d,R+11);
        a.setAttribute("x1",i1[0]);a.setAttribute("y1",i1[1]);
        a.setAttribute("x2",o1[0]);a.setAttribute("y2",o1[1]);
        a.setAttribute("stroke","#9bb6c6");a.setAttribute("stroke-width","1.4");a.setAttribute("stroke-linecap","round");
        svg.appendChild(a);
      });
    }

    var cap=document.createElementNS(ns,"circle"); cap.setAttribute("class","cap");
    cap.setAttribute("cx",CX); cap.setAttribute("cy",CY); cap.setAttribute("r",capR);
    cap.setAttribute("fill",capGrad); cap.setAttribute("stroke","#23282b"); cap.setAttribute("stroke-width","1");
    svg.appendChild(cap);
    var rim=document.createElementNS(ns,"circle");
    rim.setAttribute("cx",CX); rim.setAttribute("cy",CY); rim.setAttribute("r",capR);
    rim.setAttribute("fill","none"); rim.setAttribute("stroke","rgba(255,255,255,.22)"); rim.setAttribute("stroke-width","1");
    svg.appendChild(rim);

    var notch=document.createElementNS(ns,"line");
    notch.setAttribute("stroke",ACC); notch.setAttribute("stroke-width",opts.big?3.4:2.6);
    notch.setAttribute("stroke-linecap","round"); notch.setAttribute("filter","url(#nglow)"); svg.appendChild(notch);

    host.appendChild(svg);

    var cur=p.def;
    function render(){
      var nn=norm(p,cur);
      var ang=start+nn*(end-start);
      val.setAttribute("d", arc(CX,CY,start, nn<=0.0001?start+0.001:ang, R));
      glow.setAttribute("d", arc(CX,CY,start, nn<=0.0001?start+0.001:ang, R+4));
      var inr=pt(CX,CY,ang,capR*0.34), outr=pt(CX,CY,ang,capR*0.92);
      notch.setAttribute("x1",inr[0]); notch.setAttribute("y1",inr[1]);
      notch.setAttribute("x2",outr[0]); notch.setAttribute("y2",outr[1]);
      STATE[p.index]=cur;
      if(opts.onRender) opts.onRender(cur,nn);
    }
    function setVal(v,push){ cur=clamp(v,p.min,p.max); render(); if(push) send(p.index,cur); }
    render();

    var dragging=false,startY=0,startV=0;
    function onMove(e){
      if(!dragging)return;
      var y=(e.touches?e.touches[0].clientY:e.clientY);
      var dy=startY-y, span=p.max-p.min, fine=e.shiftKey?0.25:1;
      setVal(startV+dy/200*span*fine,true); e.preventDefault();
    }
    function onUp(){ if(!dragging)return; dragging=false; host.classList.remove("dragging");
      window.removeEventListener("pointermove",onMove); window.removeEventListener("pointerup",onUp); }
    host.addEventListener("pointerdown",function(e){
      dragging=true; host.classList.add("dragging"); startY=e.clientY; startV=cur;
      window.addEventListener("pointermove",onMove); window.addEventListener("pointerup",onUp); e.preventDefault();
    });
    host.addEventListener("dblclick",function(e){ setVal(p.def,true); e.preventDefault(); });
    host.addEventListener("wheel",function(e){
      setVal(cur-Math.sign(e.deltaY)*(p.max-p.min)*0.02,true); e.preventDefault();
    },{passive:false});

    return {set:setVal,get:function(){return cur;}};
  }

  // ============ big MODE dial ============
  var modeValEl=document.getElementById("modeVal");
  var modeDescEl=document.getElementById("modeDesc");
  var modeNameEl=document.getElementById("modeName");
  var bigdial=document.getElementById("bigdial");
  var modeP=PARAMS[0];
  var modeKnob=makeDial(bigdial,modeP,{size:108,r:43,capR:30,sweep:272,big:true,
    onRender:function(v,nn){
      var L=modeLabel(nn);
      modeValEl.textContent=L.short;
      modeDescEl.textContent=L.desc;
      modeNameEl.textContent=L.name;
    }});

  // ============ rack knobs ============
  var rack=document.getElementById("rack");
  var knobs={};
  RACK.forEach(function(idx){
    var p=PARAMS[idx];
    var cell=document.createElement("div"); cell.className="cell";
    var lab=document.createElement("div"); lab.className="label"; lab.textContent=p.name;
    var kd=document.createElement("div"); kd.className="knob"; kd.title=p.name+" — drag · dbl-click resets";
    var vbox=document.createElement("div"); vbox.className="vbox";
    cell.appendChild(lab); cell.appendChild(kd); cell.appendChild(vbox); rack.appendChild(cell);
    var k=makeDial(kd,p,{size:58,r:23,capR:15.5,sweep:272,onRender:function(v){ vbox.textContent=fmtVal(p,v); }});
    vbox.textContent=fmtVal(p,p.def);
    knobs[idx]=k;
  });

  // ============ live filter-response curve ============
  var scope=document.getElementById("scope");
  var sctx=scope.getContext("2d");
  var W=scope.width, H=scope.height;
  var t0=performance.now(), tAcc=0;

  // map log-frequency 0..1 across width; magnitude 0..1 up the height
  function svfMag(fNorm, fcNorm, q, mode){
    // model a 2-pole SVF: lp/bp/hp magnitudes at ratio r = f/fc
    var r=Math.pow(10,(fNorm-fcNorm)*2.2); // decade ratio
    var d=q;                                // damping 0..2 (we pass 0.1..2)
    // |H| for 2nd-order, normalized; classic biquad-ish forms
    var denom=Math.sqrt(Math.pow(1-r*r,2)+Math.pow(d*r,2));
    var lp=1/denom;
    var hp=(r*r)/denom;
    var bp=(d*r)/denom;
    // Mode morph: 0 LP -> 0.5 notch(lp+hp) -> 1 HP, with bp honk near notch
    var wLp,wHp;
    if(mode<=0.5){ wLp=1; wHp=mode*2; } else { wLp=1-(mode-0.5)*2; wHp=1; }
    var bpMid=1-Math.abs(mode-0.5)*2;
    var wBp=bpMid*(0.15+(2-d)/1.85*0.45);
    return lp*wLp+hp*wHp+bp*wBp;
  }

  function draw(now){
    var dt=(now-t0)/1000; t0=now; tAcc+=dt;
    var mode=STATE[0], cut=STATE[1], reso=STATE[2], envm=STATE[3], dec=STATE[5];
    var q=2-reso*1.85; // matches DSP damping
    // animated sweep: the filter env opens cutoff and breathes
    var breath=0.5+0.5*Math.sin(tAcc*(0.7+(1-dec)*1.4));
    var fcNorm=clamp(cut+envm*0.30*breath,0.02,0.98);

    sctx.clearRect(0,0,W,H);

    // baseline 0 dB grid line
    sctx.strokeStyle="rgba(122,208,255,.10)"; sctx.lineWidth=1;
    sctx.beginPath(); sctx.moveTo(0,H*0.5); sctx.lineTo(W,H*0.5); sctx.stroke();

    // cutoff marker (vertical), glides with the breathing sweep
    var mx=fcNorm*W;
    sctx.strokeStyle="rgba(232,194,122,.30)"; sctx.lineWidth=2;
    sctx.beginPath(); sctx.moveTo(mx,0); sctx.lineTo(mx,H); sctx.stroke();

    // ---- the response curve ----
    var grad=sctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,ACC2); grad.addColorStop(0.5,"#cfe6f2"); grad.addColorStop(1,ACC);

    // filled area under curve
    sctx.beginPath();
    var first=true, pts=[];
    for(var x=0;x<=W;x+=3){
      var fN=x/W;
      var mag=svfMag(fN,fcNorm,q,mode);
      mag=mag/(1+mag*0.55);               // gentle compression so peaks stay on-screen
      var y=H-(0.10+mag*0.80)*H;
      pts.push([x,y]);
      if(first){ sctx.moveTo(x,y); first=false; } else sctx.lineTo(x,y);
    }
    sctx.lineTo(W,H); sctx.lineTo(0,H); sctx.closePath();
    var fill=sctx.createLinearGradient(0,0,0,H);
    fill.addColorStop(0,"rgba(232,194,122,.22)");
    fill.addColorStop(1,"rgba(122,208,255,.02)");
    sctx.fillStyle=fill; sctx.fill();

    // stroke curve glowing
    sctx.beginPath();
    for(var i=0;i<pts.length;i++){ if(i===0) sctx.moveTo(pts[i][0],pts[i][1]); else sctx.lineTo(pts[i][0],pts[i][1]); }
    sctx.lineWidth=3; sctx.strokeStyle=grad;
    sctx.shadowColor=ACC; sctx.shadowBlur=10; sctx.stroke(); sctx.shadowBlur=0;

    // a notch dimple highlight: when in notch zone, mark the dip
    if(mode>0.30&&mode<0.70){
      var dipX=fcNorm*W, dipMag=svfMag(fcNorm,fcNorm,q,mode);
      dipMag=dipMag/(1+dipMag*0.55);
      var dipY=H-(0.10+dipMag*0.80)*H;
      sctx.fillStyle="rgba(122,208,255,"+(0.5*(1-Math.abs(mode-0.5)*2)+0.2)+")";
      sctx.beginPath(); sctx.arc(dipX,dipY,3.5,0,7); sctx.fill();
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  // ============ host wiring ============
  function ready(){
    send(modeP.index, modeKnob.get());
    RACK.forEach(function(idx){ send(PARAMS[idx].index, knobs[idx].get()); });
  }
  if(host&&host.onReady) host.onReady(ready); else ready();

})();
</script>
</body>
</html>
