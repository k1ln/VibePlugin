  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>FM Four<\/title>\n<style>\n  :root{\n    --accent:#7a86ff;\n    --accent2:#42e6c4;\n    --bg0:#070912;\n    --bg1:#0d1226;\n    --panel:#10162e;\n    --line:#202a4d;\n    --txt:#cfe0ff;\n    --dim:#5e6a93;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}\n  html,body{height:100%;}\n  body{\n    font-family:\"SF Mono\",ui-monospace,Menlo,Consolas,monospace;\n    color:var(--txt);\n    background:\n      radial-gradient(1200px 500px at 20% -10%, rgba(122,134,255,.12), transparent 60%),\n      radial-gradient(900px 500px at 110% 120%, rgba(66,230,196,.10), transparent 55%),\n      linear-gradient(160deg,var(--bg1),var(--bg0));\n    overflow:hidden;\n    padding:14px;\n  }\n  .shell{\n    position:relative;\n    height:100%;\n    border:1px solid var(--line);\n    border-radius:16px;\n    background:linear-gradient(180deg,rgba(20,28,56,.55),rgba(8,11,22,.65));\n    box-shadow:0 0 0 1px rgba(122,134,255,.06) inset, 0 18px 60px rgba(0,0,0,.6);\n    overflow:hidden;\n    display:flex;\n    flex-direction:column;\n  }\n  /* subtle moving scanline texture */\n  .shell::before{\n    content:\"\";position:absolute;inset:0;pointer-events:none;z-index:5;\n    background:repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 1px,transparent 1px 3px);\n    animation:scan 6s linear infinite;opacity:.5;\n  }\n  @keyframes scan{from{background-position:0 0}to{background-position:0 3px}}\n\n  header{\n    display:flex;align-items:center;justify-content:space-between;\n    padding:14px 20px 10px;border-bottom:1px solid var(--line);\n    position:relative;z-index:6;\n  }\n  .brand{display:flex;align-items:baseline;gap:10px;}\n  .logo{\n    font-weight:700;font-size:22px;letter-spacing:3px;\n    background:linear-gradient(90deg,var(--accent),var(--accent2));\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n    text-shadow:0 0 18px rgba(122,134,255,.35);\n  }\n  .logo .four{font-style:italic;}\n  .sub{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}\n  .badge{\n    font-size:9px;letter-spacing:2px;color:var(--accent2);\n    border:1px solid rgba(66,230,196,.4);border-radius:20px;padding:4px 10px;\n    text-transform:uppercase;\n    box-shadow:0 0 12px rgba(66,230,196,.15) inset;\n  }\n\n  .main{flex:1;display:grid;grid-template-columns:1.1fr 1fr;gap:14px;padding:14px 18px;min-height:0;position:relative;z-index:6;}\n\n  .viz{display:flex;flex-direction:column;gap:12px;min-height:0;}\n  .card{\n    border:1px solid var(--line);border-radius:12px;\n    background:linear-gradient(180deg,rgba(13,18,38,.7),rgba(8,11,22,.5));\n    padding:12px 14px;position:relative;overflow:hidden;\n  }\n  .card h3{font-size:9px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;}\n\n  .algoCard{flex:0 0 auto;}\n  .graph{height:160px;width:100%;display:block;}\n  .opbox{transition:all .25s ease;}\n  .opLabel{font:600 11px \"SF Mono\",monospace;fill:var(--txt);}\n  .opSub{font:9px \"SF Mono\",monospace;fill:var(--dim);}\n\n  .specCard{flex:1;min-height:0;display:flex;flex-direction:column;}\n  .spectrum{flex:1;width:100%;display:block;}\n\n  .controls{display:flex;flex-direction:column;gap:12px;min-height:0;overflow:auto;}\n  .algoPick{display:flex;gap:8px;}\n  .algoBtn{\n    flex:1;font:600 10px \"SF Mono\",monospace;letter-spacing:1.5px;\n    color:var(--dim);background:rgba(16,22,46,.6);\n    border:1px solid var(--line);border-radius:9px;padding:10px 4px;cursor:pointer;\n    text-transform:uppercase;transition:all .18s ease;position:relative;\n  }\n  .algoBtn small{display:block;font-size:8px;letter-spacing:1px;margin-top:3px;color:var(--dim);font-weight:400;}\n  .algoBtn:hover{border-color:rgba(122,134,255,.5);color:var(--txt);}\n  .algoBtn.on{\n    color:#fff;border-color:var(--accent);\n    background:linear-gradient(180deg,rgba(122,134,255,.28),rgba(122,134,255,.08));\n    box-shadow:0 0 16px rgba(122,134,255,.3),0 0 0 1px rgba(122,134,255,.4) inset;\n  }\n  .algoBtn.on small{color:var(--accent2);}\n\n  .knobs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 6px;}\n  .knob{display:flex;flex-direction:column;align-items:center;gap:5px;}\n  .dial{\n    width:74px;height:74px;cursor:ns-resize;position:relative;touch-action:none;\n  }\n  .dial svg{display:block;overflow:visible;}\n  .kName{font-size:9px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;}\n  .kVal{font-size:11px;color:var(--accent2);min-height:13px;font-variant-numeric:tabular-nums;}\n  .dial .needle{transition:transform .04s linear;transform-origin:50% 50%;}\n  .dial:hover .ring{filter:drop-shadow(0 0 6px rgba(122,134,255,.7));}\n\n  footer{\n    padding:8px 20px;border-top:1px solid var(--line);\n    display:flex;justify-content:space-between;align-items:center;\n    font-size:9px;letter-spacing:1.5px;color:var(--dim);position:relative;z-index:6;\n  }\n  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent2);\n    box-shadow:0 0 8px var(--accent2);animation:pulse 1.6s ease-in-out infinite;margin-right:6px;}\n  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"shell\">\n  <header>\n    <div class=\"brand\">\n      <span class=\"logo\">FM<span class=\"four\"> FOUR<\/span><\/span>\n      <span class=\"sub\">4-operator digital fm<\/span>\n    <\/div>\n    <span class=\"badge\">phase modulation engine<\/span>\n  <\/header>\n\n  <div class=\"main\">\n    <div class=\"viz\">\n      <div class=\"card algoCard\">\n        <h3>Operator Algorithm<\/h3>\n        <svg class=\"graph\" viewBox=\"0 0 320 160\" preserveAspectRatio=\"xMidYMid meet\">\n          <defs>\n            <linearGradient id=\"opg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#1a2247\"/>\n              <stop offset=\"1\" stop-color=\"#0d1430\"/>\n            <\/linearGradient>\n            <linearGradient id=\"wire\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n              <stop offset=\"0\" stop-color=\"#7a86ff\"/>\n              <stop offset=\"1\" stop-color=\"#42e6c4\"/>\n            <\/linearGradient>\n            <filter id=\"glow\" x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n              <feGaussianBlur stdDeviation=\"2.4\" result=\"b\"/>\n              <feMerge><feMergeNode in=\"b\"/><feMergeNode in=\"SourceGraphic\"/><\/feMerge>\n            <\/filter>\n          <\/defs>\n          <g id=\"wires\" filter=\"url(#glow)\"><\/g>\n          <g id=\"ops\"><\/g>\n        <\/svg>\n      <\/div>\n      <div class=\"card specCard\">\n        <h3>FM Spectrum<\/h3>\n        <canvas class=\"spectrum\" id=\"spec\"><\/canvas>\n      <\/div>\n    <\/div>\n\n    <div class=\"controls\">\n      <div class=\"card\">\n        <h3>Algorithm Select<\/h3>\n        <div class=\"algoPick\" id=\"algoPick\">\n          <button class=\"algoBtn\" data-a=\"0\">Stack<small>4→3→2→1<\/small><\/button>\n          <button class=\"algoBtn\" data-a=\"1\">Pair<small>2 fm pairs<\/small><\/button>\n          <button class=\"algoBtn\" data-a=\"2\">Parallel<small>3→1 carrier<\/small><\/button>\n        <\/div>\n      <\/div>\n      <div class=\"card\" style=\"flex:1;\">\n        <h3>Voice<\/h3>\n        <div class=\"knobs\" id=\"knobs\"><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <footer>\n    <span><span class=\"dot\"><\/span>FM FOUR · 12-VOICE POLY<\/span>\n    <span id=\"status\">READY<\/span>\n  <\/footer>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- host bridge -------------------------------------------------\n  var host = window.vstai || null;\n  function sendParam(i,v){ try{ if(host && host.setParam) host.setParam(i, v); }catch(e){} }\n\n  // ---- param model (must match spec.json indices) -----------------\n  // continuous knobs use 0..1; algorithm is its own stepped control\n  var KNOBS = [\n    {idx:0, name:\"Ratio\",    def:0.32, fmt:function(v){return (0.5+v*11.5).toFixed(2)+\"×\";}},\n    {idx:1, name:\"FM Depth\", def:0.55, fmt:function(v){return Math.round(v*100)+\"%\";}},\n    {idx:2, name:\"Feedback\", def:0.25, fmt:function(v){return Math.round(v*100)+\"%\";}},\n    {idx:4, name:\"Attack\",   def:0.02, fmt:function(v){var s=0.001+v*v*0.399;return s<1?Math.round(s*1000)+\"ms\":s.toFixed(2)+\"s\";}},\n    {idx:5, name:\"Release\",  def:0.45, fmt:function(v){var s=0.04+v*v*3.96;return s<1?Math.round(s*1000)+\"ms\":s.toFixed(2)+\"s\";}},\n    {idx:6, name:\"Level\",    def:0.7,  fmt:function(v){return Math.round(v*100)+\"%\";}}\n  ];\n  var ALGO_IDX = 3;\n  var state = {};           // idx -> 0..1 value\n  var algo = 0;             // 0,1,2\n\n  KNOBS.forEach(function(k){ state[k.idx] = k.def; });\n\n  // =================================================================\n  //  KNOBS\n  // =================================================================\n  var knobWrap = document.getElementById(\"knobs\");\n  var dials = {};\n\n  function makeDial(k){\n    var wrap = document.createElement(\"div\"); wrap.className=\"knob\";\n    var dial = document.createElement(\"div\"); dial.className=\"dial\";\n    dial.innerHTML =\n      '<svg viewBox=\"0 0 74 74\">'+\n      '<circle cx=\"37\" cy=\"37\" r=\"30\" fill=\"none\" stroke=\"#202a4d\" stroke-width=\"5\"/>'+\n      '<circle class=\"ring\" cx=\"37\" cy=\"37\" r=\"30\" fill=\"none\" stroke=\"url(#kg)\" stroke-width=\"5\" stroke-linecap=\"round\" '+\n        'stroke-dasharray=\"0 999\" transform=\"rotate(135 37 37)\"/>'+\n      '<defs><linearGradient id=\"kg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">'+\n        '<stop offset=\"0\" stop-color=\"#7a86ff\"/><stop offset=\"1\" stop-color=\"#42e6c4\"/><\/linearGradient><\/defs>'+\n      '<g class=\"needle\"><line class=\"ndl\" x1=\"37\" y1=\"37\" x2=\"37\" y2=\"14\" stroke=\"#cfe0ff\" stroke-width=\"2.5\" stroke-linecap=\"round\"/><\/g>'+\n      '<circle cx=\"37\" cy=\"37\" r=\"4.5\" fill=\"#0d1226\" stroke=\"#42e6c4\" stroke-width=\"1.4\"/>'+\n      '<\/svg>';\n    var name = document.createElement(\"div\"); name.className=\"kName\"; name.textContent=k.name;\n    var val  = document.createElement(\"div\"); val.className=\"kVal\";\n    wrap.appendChild(dial); wrap.appendChild(name); wrap.appendChild(val);\n    knobWrap.appendChild(wrap);\n\n    var ring = dial.querySelector(\".ring\");\n    var ndl = dial.querySelector(\".ndl\");\n    var C = 2*Math.PI*30;              // circumference\n    var SWEEP = 270/360;               // 270deg arc\n\n    function render(){\n      var v = state[k.idx];\n      var len = C*SWEEP*v;\n      ring.setAttribute(\"stroke-dasharray\", len+\" 999\");\n      // compute the needle tip directly (avoids CSS transform-origin conflict\n      // that was flinging the pointer off-centre)\n      var th = (-135 + v*270) * Math.PI/180;\n      ndl.setAttribute(\"x2\", (37 + 23*Math.sin(th)).toFixed(2));\n      ndl.setAttribute(\"y2\", (37 - 23*Math.cos(th)).toFixed(2));\n      val.textContent = k.fmt(v);\n    }\n    function set(v){\n      v = Math.max(0,Math.min(1,v));\n      state[k.idx]=v; render(); sendParam(k.idx, v);\n    }\n\n    // drag (vertical)\n    var dragging=false, startY=0, startV=0;\n    function down(e){ dragging=true; startY=(e.touches?e.touches[0].clientY:e.clientY); startV=state[k.idx];\n      document.body.style.cursor=\"ns-resize\"; e.preventDefault(); }\n    function move(e){ if(!dragging)return; var y=(e.touches?e.touches[0].clientY:e.clientY);\n      set(startV + (startY-y)/180); e.preventDefault(); }\n    function up(){ dragging=false; document.body.style.cursor=\"\"; }\n    dial.addEventListener(\"mousedown\",down);\n    window.addEventListener(\"mousemove\",move);\n    window.addEventListener(\"mouseup\",up);\n    dial.addEventListener(\"touchstart\",down,{passive:false});\n    window.addEventListener(\"touchmove\",move,{passive:false});\n    window.addEventListener(\"touchend\",up);\n    dial.addEventListener(\"wheel\",function(e){ set(state[k.idx]-e.deltaY*0.0011); e.preventDefault(); },{passive:false});\n    dial.addEventListener(\"dblclick\",function(){ set(k.def); });\n\n    dials[k.idx]={set:set,render:render};\n    render();\n  }\n  KNOBS.forEach(makeDial);\n\n  // =================================================================\n  //  ALGORITHM SELECT\n  // =================================================================\n  var algoBtns = Array.prototype.slice.call(document.querySelectorAll(\".algoBtn\"));\n  function setAlgo(a){\n    algo = a|0;\n    algoBtns.forEach(function(b){ b.classList.toggle(\"on\", (+b.dataset.a)===algo); });\n    sendParam(ALGO_IDX, algo);     // real value 0/1/2 (stepped)\n    drawGraph();\n  }\n  algoBtns.forEach(function(b){\n    b.addEventListener(\"click\",function(){ setAlgo(+b.dataset.a); });\n    b.addEventListener(\"dblclick\",function(){ setAlgo(0); });\n  });\n\n  // =================================================================\n  //  ALGORITHM NODE GRAPH (animated)\n  // =================================================================\n  var opsG = document.getElementById(\"ops\");\n  var wiresG = document.getElementById(\"wires\");\n  // operator box positions (4 ops)\n  var POS = { 1:{x:130,y:118}, 2:{x:130,y:42}, 3:{x:230,y:80}, 4:{x:230,y:30} };\n  // algorithm wiring: list of [from,to]; \"to\" of 0 means audio out\n  var ALGOS = [\n    // STACK 4->3->2->1->out\n    {carriers:[1], wires:[[4,3],[3,2],[2,1]], pos:{1:{x:120,y:120},2:{x:120,y:84},3:{x:120,y:48},4:{x:120,y:12}}},\n    // PAIR (4->3)+(2->1)\n    {carriers:[1,3],
