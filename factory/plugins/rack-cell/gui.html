<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Rack Cell</title>
<style>
  :root{ --acc:#40c8b0; --acc2:#e0e0e8; --bg0:#0a0d0e; --bg1:#141a1c; --ink:#eaf2f2; --dim:#7a8a8c; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#1c2628 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:12px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#1a2224,#0a0d0e); border:1px solid rgba(64,200,176,.2); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(234,242,242,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .spec{ margin-left:auto; font-size:9px; letter-spacing:.15em; color:var(--dim); font-variant-numeric:tabular-nums; border:1px solid rgba(64,200,176,.25); border-radius:4px; padding:2px 7px; }
  .screen{ height:100px; border-radius:6px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#101718,#0a1011); border:1px solid rgba(64,200,176,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(220,232,232,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(64,200,176,.6)); }
  .pcap{ fill:#0e1516; stroke:rgba(64,200,176,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(64,200,176,.1); padding:1px 7px; border-radius:6px; border:1px solid rgba(64,200,176,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">RACK&nbsp;CELL</span><span class="sub">12-bit rack sampler</span><span class="spec">12-BIT · 24k</span></header>
    <div class="screen"><div class="scrlbl">SAMPLE&nbsp;01 · MALLET</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Tune",idx:0,def:0.5},{name:"Cutoff",idx:1,def:0.75},{name:"Decay",idx:2,def:0.5},{name:"Crunch",idx:3,def:0.12},{name:"Attack",idx:4,def:0.05},{name:"Level",idx:5,def:0.85}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#40c8b0"/><stop offset="1" stop-color="#e0e0e8"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  // approximate the baked mallet waveform (fast attack, multi-rate decay)
  var NS=300, WAVE=new Float32Array(NS);
  for(var i=0;i<NS;i++){ var u=i/NS; var t=u*0.5;
    var v=Math.sin(2*Math.PI*220*t)*Math.exp(-u*3) + Math.sin(2*Math.PI*880*t)*0.55*Math.exp(-u*5) + Math.sin(2*Math.PI*2100*t)*0.22*Math.exp(-u*11);
    if(t<0.004) v+= (1-t/0.004)*0.5; WAVE[i]=v; }
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function frame(ts){ ctx.clearRect(0,0,W,H); var mid=H*0.54, cut=vals[1], crunch=vals[3], dec=vals[2];
    var padL=12, padR=12, sw=W-padL-padR;
    // center line
    ctx.strokeStyle="rgba(64,200,176,0.15)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padL,mid); ctx.lineTo(W-padR,mid); ctx.stroke();
    // decay end marker scales with Decay
    var endx=padL+ (0.35+dec*0.6)*sw; ctx.strokeStyle="rgba(224,224,232,0.25)"; ctx.setLineDash([2,3]); ctx.beginPath(); ctx.moveTo(endx,10); ctx.lineTo(endx,H-10); ctx.stroke(); ctx.setLineDash([]);
    // filled sample waveform (mirror), crunch = stepped
    var step=Math.max(1, Math.round(1+crunch*7));
    ctx.fillStyle="rgba(64,200,176,0.45)";
    for(var x=0;x<sw;x+=step){ var idx=Math.floor(x/sw*NS); var a=WAVE[idx]*(0.4+cut*0.6); var h=a*(H*0.4);
      ctx.fillRect(padL+x, mid-Math.abs(h), Math.max(1,step-1), Math.abs(h)*2); }
    // crisp outline
    ctx.beginPath(); for(var x2=0;x2<=sw;x2+=1.5){ var i2=Math.floor(x2/sw*NS); var vv=WAVE[i2]*(0.4+cut*0.6); ctx.lineTo(padL+x2, mid - vv*(H*0.4)); }
    ctx.strokeStyle="rgba(200,255,245,0.85)"; ctx.lineWidth=1; ctx.shadowColor="#40c8b0"; ctx.shadowBlur=4; ctx.stroke(); ctx.shadowBlur=0;
    // playback cursor
    var cur=(ts/700)%1; var cx=padL+cur*sw; ctx.strokeStyle="rgba(224,224,232,0.8)"; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(cx,8); ctx.lineTo(cx,H-8); ctx.stroke();
    ctx.fillStyle="#e0e0e8"; ctx.beginPath(); ctx.arc(cx,mid,2.6,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
