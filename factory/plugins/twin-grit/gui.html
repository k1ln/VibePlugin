<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>TWIN GRIT</title>
<style>
  :root{
    --accent:#ff5a52; --accent2:#ffcf5a;
    --panel-a:#2a2013; --panel-b:#170f07;
    --face-a:#f3e8cd; --face-b:#e6d6b2;
    --ink:#2a2013; --dim:#8a7c5e; --line:#c9b78c;
    --rail-a:#6a4a22; --rail-b:#4a3116; --rail-w:26px;
    --sec-a:rgba(255,255,255,.5); --sec-b:rgba(255,255,255,.14);
    --track:#cbb489; --cap:#fbf4e2; --cap-line:#c3ad82; --ptr:#2a2013;
    --patch-a:#1c140a; --patch-b:#0e0904; --patch-line:#3a2c16;
    --jack-a:#4a4030; --jack-b:#0c0a05; --jack-ring:#6b5a38; --jack-hole:#080602;
    --jlab:#8a7550; --jlab-on:#efe3c8;
    --wk-a:#fdf8ec; --wk-b:#e9dec6; --wk-line:#c9b78c; --bk-a:#241a0c; --bk-b:#0d0905;
    --body-bg:radial-gradient(130% 100% at 50% -10%,#5a4a2e,#2a2114 55%,#160f08);
    --font:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    --unit-max:960px; --unit-radius:16px; --unit-border:1px solid rgba(255,210,63,.18);
    --flag-ink:#fff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:var(--font); background:var(--body-bg); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; padding:12px; color:var(--ink); }
  .unit{ width:min(97vw,var(--unit-max)); border-radius:var(--unit-radius); overflow:hidden; position:relative; background:linear-gradient(180deg,var(--panel-a),var(--panel-b)); box-shadow:0 30px 80px rgba(0,0,0,.62); border:var(--unit-border); }
  .rail{ position:absolute; top:0; bottom:0; width:var(--rail-w); background:linear-gradient(90deg,var(--rail-a),var(--rail-b)); box-shadow:inset -3px 0 8px rgba(0,0,0,.5),inset 3px 0 8px rgba(0,0,0,.5); z-index:5; }
  .rail::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(180deg,transparent,transparent 12px,rgba(0,0,0,.18) 12px,rgba(0,0,0,.18) 13px); }
  .rail.l{ left:0; } .rail.r{ right:0; }
  .face{ margin:0 var(--rail-w); background:linear-gradient(180deg,var(--face-a),var(--face-b)); padding:14px 20px 16px; position:relative; }
  header{ display:flex; align-items:center; gap:14px; margin-bottom:12px; position:relative; z-index:2; }
  .mark{ width:34px; height:34px; border-radius:9px; background:conic-gradient(from 210deg,var(--accent),var(--accent2),var(--accent)); box-shadow:0 2px 8px rgba(0,0,0,.25); }
  .title h1{ font-size:23px; font-weight:800; letter-spacing:.06em; color:var(--ink); line-height:1; }
  .title .s{ font-size:9.5px; letter-spacing:.32em; text-transform:uppercase; color:var(--dim); margin-top:3px; }
  .flag{ margin-left:auto; font-size:9.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--flag-ink); background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:20px; padding:4px 12px; box-shadow:0 3px 10px rgba(0,0,0,.25); }
  .grid{ display:flex; flex-wrap:wrap; gap:9px; position:relative; z-index:2; }
  .sec{ border-radius:11px; padding:9px 11px 7px; background:linear-gradient(180deg,var(--sec-a),var(--sec-b)); border:1px solid var(--line); position:relative; }
  .sec h4{ font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; margin-bottom:7px; text-align:center; font-weight:700; }
  .sec .bar{ position:absolute; top:0; left:11px; right:11px; height:3px; border-radius:0 0 3px 3px; }
  .ks{ display:flex; gap:7px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:ns-resize; touch-action:none; width:54px; }
  .dial{ width:46px; height:46px; position:relative; } .dial svg{ width:100%; height:100%; overflow:visible; display:block; }
  .trk{ fill:none; stroke:var(--track); stroke-width:5.5; stroke-linecap:round; } .arc{ fill:none; stroke-width:5.5; stroke-linecap:round; }
  .cap{ fill:var(--cap); stroke:var(--cap-line); stroke-width:1; } .ptr{ stroke:var(--ptr); stroke-width:2.6; stroke-linecap:round; }
  .kn{ font-size:7.6px; letter-spacing:.03em; text-transform:uppercase; color:var(--dim); text-align:center; height:15px; line-height:1.05; }
  .kv{ font-size:8.4px; font-variant-numeric:tabular-nums; color:var(--ink); }
  .patch{ margin-top:11px; border-radius:12px; background:linear-gradient(180deg,var(--patch-a),var(--patch-b)); border:1px solid var(--patch-line); padding:11px 16px 12px; position:relative; }
  .patch .ph{ display:flex; align-items:center; gap:12px; margin-bottom:9px; position:relative; z-index:3; }
  .patch .ph b{ font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent2); }
  .patch .ph span{ font-size:9.5px; color:var(--dim); }
  .bay{ position:relative; display:flex; justify-content:space-between; align-items:stretch; gap:20px; min-height:130px; }
  .jc{ display:flex; flex-direction:column; gap:9px; z-index:3; }
  .jc.right{ align-items:flex-end; }
  .jrow{ display:flex; align-items:center; gap:9px; }
  .jc.right .jrow{ flex-direction:row-reverse; }
  .jack{ width:26px; height:26px; border-radius:50%; flex:none; cursor:grab; position:relative;
    background:radial-gradient(circle at 38% 32%,var(--jack-a),var(--jack-b) 70%); border:2.5px solid var(--jack-ring);
    box-shadow:inset 0 2px 4px rgba(0,0,0,.8), 0 1px 0 rgba(255,255,255,.06); transition:border-color .1s,box-shadow .1s,transform .06s; }
  .jack::after{ content:""; position:absolute; inset:7px; border-radius:50%; background:var(--jack-hole); box-shadow:inset 0 1px 2px rgba(0,0,0,.9); }
  .jack:hover{ transform:scale(1.08); }
  .jack.hot{ border-color:var(--accent2); box-shadow:0 0 12px var(--accent2), inset 0 2px 4px rgba(0,0,0,.8); }
  .jack.wired{ border-color:var(--accent); }
  .jlab{ font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--jlab); white-space:nowrap; }
  .jack.wired ~ .jlab, .jc.right .jack.wired + .jlab{ color:var(--jlab-on); }
  svg.cbl{ position:absolute; inset:0; width:100%; height:100%; z-index:2; overflow:visible; pointer-events:none; }
  .cbl path{ pointer-events:stroke; cursor:pointer; }
  .midcol{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; opacity:.5; z-index:1; }
  .midcol .lbl{ font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); }
  .kbd{ margin-top:11px; height:56px; display:flex; position:relative; border-radius:7px; overflow:hidden; box-shadow:0 3px 10px rgba(0,0,0,.4); z-index:2; }
  .wk{ flex:1; background:linear-gradient(180deg,var(--wk-a),var(--wk-b)); border-right:1px solid var(--wk-line); cursor:pointer; }
  .wk:active,.wk.on{ background:linear-gradient(180deg,var(--accent2),var(--accent)); }
  .bk{ position:absolute; top:0; width:5.2%; height:62%; background:linear-gradient(180deg,var(--bk-a),var(--bk-b)); border-radius:0 0 3px 3px; z-index:4; cursor:pointer; }
  .bk:active,.bk.on{ background:linear-gradient(180deg,var(--accent2),var(--rail-a)); }


  :root{
    --accent:#ffe14a; --accent2:#ff5a4a; --flag-ink:#241f06;
    --body-bg:radial-gradient(130% 100% at 50% -10%,#43454b,#1a1b1e 55%,#0a0a0c);
    --panel-a:#1b1c20; --panel-b:#090a0c; --unit-border:1px solid rgba(255,225,74,.14);
    --face-a:#26272c; --face-b:#161719; --ink:#f0efe6; --dim:#9a9a92; --line:#3a3b40;
    --sec-a:rgba(255,255,255,.06); --sec-b:rgba(255,255,255,.015);
    --rail-a:#54565c; --rail-b:#26272b;
    --track:#3a3b40; --cap:#d9d7cc; --cap-line:#8a897f; --ptr:#161719;
    --patch-a:#33343a; --patch-b:#202126; --patch-line:#55565c;
    --jack-a:#45464c; --jack-b:#0d0e10; --jack-ring:#8a8b92; --jack-hole:#0a0a0c;
    --jlab:#b7b6ac; --jlab-on:#ffe14a;
    --wk-a:#f2efe4; --wk-b:#d6d3c6; --wk-line:#a7a496; --bk-a:#26272b; --bk-b:#0d0e10;
  }
  .patch{ background-image:radial-gradient(rgba(255,255,255,.055) 1.4px,transparent 1.6px); background-size:15px 15px; background-position:8px 30px; }
  .sec{ border-radius:6px; } .flag{ letter-spacing:.24em; }
  </style></head>
<body>

  <div class="unit">
    <div class="rail l"></div><div class="rail r"></div>
    
    <div class="face">
      <header>
        <svg width="34" height="34" viewBox="0 0 34 34" style="flex:none"><rect x="1" y="1" width="32" height="32" rx="6" fill="#0d0e10" stroke="#8a8b92"/><path d="M6 23 L11 11 L14 20 L17 8 L20 20 L23 11 L28 23" fill="none" stroke="#ffe14a" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/></svg>
        <div class="title"><h1>TWIN GRIT</h1><div class="s">Dual Filter · Screamer</div></div>
        <div class="flag">MK II</div>
        
      </header>
      <div class="grid" id="grid"></div>
      <div class="patch">
        <div class="ph"><b>Patch Panel</b><span id="phint">drag a cable from any jack to another · click a wired jack to unplug</span></div>
        <div class="bay" id="bay">
          
          <svg class="cbl" id="cbl"></svg>
          <div class="jc left" id="srcCol"></div>
          <div class="midcol"><div class="lbl">Sources</div><div class="lbl" style="opacity:.6">↔</div><div class="lbl">Dests</div></div>
          <div class="jc right" id="dstCol"></div>
        </div>
      </div>
      <div class="kbd" id="kbd"></div>
      
    </div>
  </div>
<script>
(function(){"use strict";
  var SECTIONS=[{"name":"Oscillators","col":"#ff5a52","idx":[0,1,2]},{"name":"Filters","col":"#31c6ff","idx":[3,4,11]},{"name":"Envelope","col":"#4bd66a","idx":[6,7,8]},{"name":"Mod","col":"#b06cff","idx":[9,10,5]},{"name":"Output","col":"#ff9f43","idx":[12,13]}];
  var P=[{"n":"Osc Wave","d":0.25},{"n":"Osc2 Int","d":0.5},{"n":"Osc Mix","d":0.4},{"n":"LP Cut","d":0.55},{"n":"Reso","d":0.4},{"n":"Env Amt","d":0.6},{"n":"Attack","d":0.06},{"n":"Decay","d":0.45},{"n":"Sustain","d":0.6},{"n":"LFO Rate","d":0.35},{"n":"Glide","d":0.12},{"n":"HP Cut","d":0.3},{"n":"Drive","d":0.4},{"n":"Level","d":0.75}];
  var SRC=["LFO","ENV","S&H","NOISE","OSC2"];
  var DST=["PITCH","LP CUT","PWM","HP CUT"];
  var ROUTE_BASE=14, NDST=4, CABLE_AMT=0.68;
  var CCOL=["#e8e2d0","#e8e2d0","#e8e2d0","#e8e2d0","#e8e2d0"];
  var NORMALLED=[[1,1,0.55],[0,2,0.35]];

  var host=null, vals={}; P.forEach(function(p,i){ vals[i]=p.d; });
  function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,+v); }catch(e){} }
  var colOf=function(v){ var m={"var(--r)":"#ff5a52","var(--o)":"#ff9f43","var(--y)":"#ffd23f","var(--g)":"#4bd66a","var(--c)":"#31c6ff","var(--b)":"#4a7bff","var(--v)":"#b06cff"}; return m[v]||v; };

  // ---- knobs ----
  var grid=document.getElementById("grid"), knobEls={};
  function makeKnob(i,accent){
    var p=P[i], el=document.createElement("div"); el.className="knob"; el.title=p.n;
    el.innerHTML='<div class="dial"><svg viewBox="0 0 48 48"><circle class="trk" cx="24" cy="24" r="18"/><circle class="arc" cx="24" cy="24" r="18" transform="rotate(135 24 24)" stroke="'+accent+'"/><circle class="cap" cx="24" cy="24" r="11"/><line class="ptr" x1="24" y1="24" x2="24" y2="10"/></svg></div><span class="kn">'+p.n+'</span><span class="kv"></span>';
    var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), kv=el.querySelector(".kv"), C=2*Math.PI*18;
    function render(v){ arc.setAttribute("stroke-dasharray",C); arc.setAttribute("stroke-dashoffset",(C*(1-0.75*v)).toFixed(2));
      var a=(-135+270*v)*Math.PI/180; ptr.setAttribute("x2",(24+Math.sin(a)*13).toFixed(2)); ptr.setAttribute("y2",(24-Math.cos(a)*13).toFixed(2)); kv.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[i]}; try{el.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/175)); vals[i]=nv; render(nv); send(i,nv); });
    el.addEventListener("pointerup",function(){drag=null;}); el.addEventListener("pointercancel",function(){drag=null;});
    el.addEventListener("dblclick",function(){ vals[i]=p.d; render(p.d); send(i,p.d); });
    render(vals[i]); knobEls[i]={render:render}; return el;
  }
  SECTIONS.forEach(function(s){
    var sec=document.createElement("div"); sec.className="sec";
    var bar=document.createElement("div"); bar.className="bar"; bar.style.background=colOf(s.col); sec.appendChild(bar);
    var h=document.createElement("h4"); h.textContent=s.name; h.style.color=colOf(s.col); sec.appendChild(h);
    var ks=document.createElement("div"); ks.className="ks";
    s.idx.forEach(function(i){ ks.appendChild(makeKnob(i,colOf(s.col))); });
    sec.appendChild(ks); grid.appendChild(sec);
  });

  // ---- patch bay: DRAG to connect ----
  var srcCol=document.getElementById("srcCol"), dstCol=document.getElementById("dstCol"), cbl=document.getElementById("cbl"), bay=document.getElementById("bay");
  var srcJ=[], dstJ=[];
  var patched=[]; for(var s=0;s<SRC.length;s++){ patched[s]=[]; for(var d=0;d<DST.length;d++) patched[s][d]=0; }
  function mkJack(kind,i,name){
    var row=document.createElement("div"); row.className="jrow";
    var j=document.createElement("div"); j.className="jack"; j.dataset.kind=kind; j.dataset.i=i;
    var lb=document.createElement("span"); lb.className="jlab"; lb.textContent=name;
    row.appendChild(j); row.appendChild(lb);
    (kind==="src"?srcCol:dstCol).appendChild(row);
    (kind==="src"?srcJ:dstJ)[i]=j;
    j.addEventListener("pointerdown",function(e){ startDrag(kind,i,e); e.preventDefault(); });
    return j;
  }
  SRC.forEach(function(n,i){ mkJack("src",i,n); });
  DST.forEach(function(n,i){ mkJack("dst",i,n); });
  function routeIdx(s,d){ return ROUTE_BASE + s*NDST + d; }
  function setPatch(s,d,amt){ patched[s][d]=amt; var idx=routeIdx(s,d); vals[idx]=amt; send(idx,amt); }
  function center(j){ var b=j.getBoundingClientRect(), p=cbl.getBoundingClientRect(); return {x:b.left+b.width/2-p.left,y:b.top+b.height/2-p.top}; }
  function cablePath(a,b){ var mx=(a.x+b.x)/2, sag=Math.min(60,Math.abs(a.y-b.y)*0.35+Math.abs(a.x-b.x)*0.12+16); return "M"+a.x+","+a.y+" Q"+mx+","+(Math.max(a.y,b.y)+sag)+" "+b.x+","+b.y; }
  function draw(){
    while(cbl.firstChild) cbl.removeChild(cbl.firstChild);
    for(var s=0;s<SRC.length;s++)for(var d=0;d<DST.length;d++){ if(!patched[s][d])continue;
      var a=center(srcJ[s]), b=center(dstJ[d]);
      var sh=document.createElementNS("http://www.w3.org/2000/svg","path"); sh.setAttribute("d",cablePath(a,b)); sh.setAttribute("fill","none"); sh.setAttribute("stroke","rgba(0,0,0,.45)"); sh.setAttribute("stroke-width","5.5"); sh.setAttribute("stroke-linecap","round"); cbl.appendChild(sh);
      var pth=document.createElementNS("http://www.w3.org/2000/svg","path"); pth.setAttribute("d",cablePath(a,b)); pth.setAttribute("fill","none"); pth.setAttribute("stroke",CCOL[s%CCOL.length]); pth.setAttribute("stroke-width","3.4"); pth.setAttribute("stroke-linecap","round");
      pth.addEventListener("pointerdown",function(ss,dd){ return function(e){ setPatch(ss,dd,0); refresh(); draw(); e.stopPropagation(); e.preventDefault(); }; }(s,d));
      cbl.appendChild(pth);
    }
  }
  function refresh(){
    srcJ.forEach(function(j,s){ var w=false; for(var d=0;d<DST.length;d++) if(patched[s][d])w=true; j.classList.toggle("wired",w); });
    dstJ.forEach(function(j,d){ var w=false; for(var s=0;s<SRC.length;s++) if(patched[s][d])w=true; j.classList.toggle("wired",w); });
  }
  // drag state
  var drag=null, live=null, moved=false;
  function startDrag(kind,i,e){
    drag={kind:kind,i:i}; moved=false;
    (kind==="src"?srcJ:dstJ)[i].classList.add("hot");
    live=document.createElementNS("http://www.w3.org/2000/svg","path"); live.setAttribute("fill","none"); live.setAttribute("stroke","#ffd23f"); live.setAttribute("stroke-width","3.4"); live.setAttribute("stroke-linecap","round"); live.setAttribute("opacity","0.9"); cbl.appendChild(live);
    window.addEventListener("pointermove",onMove,true); window.addEventListener("pointerup",onUp,true);
  }
  function onMove(e){ if(!drag)return; moved=true; var from=center((drag.kind==="src"?srcJ:dstJ)[drag.i]); var pr=cbl.getBoundingClientRect(); var to={x:e.clientX-pr.left,y:e.clientY-pr.top}; live.setAttribute("d",cablePath(from,to)); }
  function onUp(e){
    window.removeEventListener("pointermove",onMove,true); window.removeEventListener("pointerup",onUp,true);
    if(live){ cbl.removeChild(live); live=null; }
    (drag.kind==="src"?srcJ:dstJ)[drag.i].classList.remove("hot");
    var el=document.elementFromPoint(e.clientX,e.clientY); var tj=el&&el.closest?el.closest(".jack"):null;
    if(tj){ var tk=tj.dataset.kind, ti=+tj.dataset.i;
      if(tk!==drag.kind){ var s=drag.kind==="src"?drag.i:ti, d=drag.kind==="src"?ti:drag.i;
        setPatch(s,d, patched[s][d]?0:CABLE_AMT); }
      else if(!moved){ // clicked own jack without dragging: unplug all its cables
        if(drag.kind==="src"){ for(var d2=0;d2<DST.length;d2++) if(patched[drag.i][d2]) setPatch(drag.i,d2,0); }
        else { for(var s2=0;s2<SRC.length;s2++) if(patched[s2][drag.i]) setPatch(s2,drag.i,0); } }
    } else if(!moved){ // click on empty: unplug this jack
      if(drag.kind==="src"){ for(var d3=0;d3<DST.length;d3++) if(patched[drag.i][d3]) setPatch(drag.i,d3,0); }
      else { for(var s3=0;s3<SRC.length;s3++) if(patched[s3][drag.i]) setPatch(s3,drag.i,0); }
    }
    drag=null; refresh(); draw();
  }
  window.addEventListener("resize",draw);

  // ---- keyboard ----
  var kbd=document.getElementById("kbd"), BASE=48, NW=15, pcW=[0,2,4,5,7,9,11], held={};
  function down(m,el){ held[m]=1; if(el)el.classList.add("on"); try{ if(host&&host.noteOn)host.noteOn(m,0.9);}catch(e){} }
  function up(m,el){ delete held[m]; if(el)el.classList.remove("on"); try{ if(host&&host.noteOff)host.noteOff(m);}catch(e){} }
  for(var w=0;w<NW;w++){ var oct=Math.floor(w/7), m=BASE+oct*12+pcW[w%7]; var wk=document.createElement("div"); wk.className="wk";
    (function(m,wk){ wk.addEventListener("pointerdown",function(e){down(m,wk);e.preventDefault();}); wk.addEventListener("pointerup",function(){up(m,wk);}); wk.addEventListener("pointerleave",function(){if(held[m])up(m,wk);}); })(m,wk); kbd.appendChild(wk); }
  for(var w=0;w<NW-1;w++){ var pi=w%7; if(pi===2||pi===6)continue; var oct=Math.floor(w/7), m=BASE+oct*12+pcW[w%7]+1;
    var bk=document.createElement("div"); bk.className="bk"; bk.style.left=((w+1)/NW*100-5.2/2)+"%";
    (function(m,bk){ bk.addEventListener("pointerdown",function(e){down(m,bk);e.preventDefault();e.stopPropagation();}); bk.addEventListener("pointerup",function(){up(m,bk);}); bk.addEventListener("pointerleave",function(){if(held[m])up(m,bk);}); })(m,bk); kbd.appendChild(bk); }

  // ---- boot ----
  function boot(){ host=window.vstai||null;
    for(var i=0;i<P.length;i++){ send(i,vals[i]); knobEls[i].render(vals[i]); }
    for(var s=0;s<SRC.length;s++)for(var d=0;d<DST.length;d++){ var idx=routeIdx(s,d); var cur=(host&&host.getParam)?host.getParam(idx):0;
      var amt=(typeof cur==="number"&&isFinite(cur)&&cur>0.001)?cur:0;
      if(amt===0){ for(var k=0;k<NORMALLED.length;k++) if(NORMALLED[k][0]===s&&NORMALLED[k][1]===d) amt=NORMALLED[k][2]; }
      patched[s][d]=amt; vals[idx]=amt; send(idx,amt); }
    refresh(); requestAnimationFrame(draw); setTimeout(draw,90);
  }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot);}catch(e){boot();} } else boot();
})();
</script>
</body></html>
