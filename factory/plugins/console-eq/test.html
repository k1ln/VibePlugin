<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Console EQ — test bench</title><style>
  :root{--ac:#ffd166}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Console EQ</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>\n@property --rot{syntax:'<angle>';inherits:false;initial-value:0deg}\n:root{\n  --ac:#ffd166;--ac2:#ffe08a;\n  --red:#c4302b;--red2:#e94e3c;--redDk:#7a1410;\n  --face:#1d1c1b;--face2:#262321;\n  --steel:#3a352f;\n  --ink:#0c0b0a;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{margin:0;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e8e1d4;\n  background:\n    radial-gradient(120% 80% at 50% -10%,#2a2724 0%,#121110 60%,#070605 100%);\n  display:flex;align-items:center;justify-content:center;padding:18px}\n\n/* ====== THE CHANNEL STRIP ====== */\n.strip{\n  position:relative;width:300px;\n  border-radius:8px 8px 10px 10px;\n  background:\n    /* brushed vertical satin */\n    repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0 1px,transparent 1px 3px),\n    linear-gradient(180deg,#34302a 0%,#27231f 7%,#1f1c19 8%,#221f1b 60%,#1a1815 100%);\n  border:1px solid #0a0908;\n  box-shadow:\n    0 40px 80px rgba(0,0,0,.7),\n    0 6px 14px rgba(0,0,0,.55),\n    inset 0 1px 0 rgba(255,255,255,.07),\n    inset 0 0 0 1px rgba(0,0,0,.45);\n  padding:0 0 18px;\n  animation:rise .7s cubic-bezier(.2,.8,.25,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:none}}\n\n/* screws in the four corners */\n.screw{position:absolute;width:13px;height:13px;border-radius:50%;z-index:6;\n  background:radial-gradient(circle at 38% 32%,#7d756a,#2c2823 70%,#181513);\n  box-shadow:inset 0 1px 1px rgba(255,255,255,.35),inset 0 -1px 2px rgba(0,0,0,.7),0 1px 2px rgba(0,0,0,.6)}\n.screw::after{content:\"\";position:absolute;inset:3px;border-radius:1px;\n  background:linear-gradient(var(--sa,55deg),transparent 44%,#0c0a09 44% 56%,transparent 56%)}\n.screw.tl{top:9px;left:9px;--sa:120deg}.screw.tr{top:9px;right:9px;--sa:35deg}\n.screw.bl{bottom:9px;left:9px;--sa:70deg}.screw.br{bottom:9px;right:9px;--sa:150deg}\n\n/* ====== HEADER PLATE ====== */\n.head{position:relative;margin:0;padding:16px 16px 13px;text-align:center;\n  border-bottom:1px solid #0b0a09;\n  background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 70%)}\n.brand{display:flex;align-items:center;justify-content:center;gap:9px}\n.pwr{width:8px;height:8px;border-radius:50%;background:var(--red2);\n  box-shadow:0 0 8px var(--red2),0 0 2px #fff;animation:beat 2.6s ease-in-out infinite}\n@keyframes beat{0%,100%{opacity:.5;box-shadow:0 0 4px var(--red)}50%{opacity:1;box-shadow:0 0 12px var(--red2)}}\nh1{margin:0;font-size:15px;font-weight:800;letter-spacing:.34em;text-transform:uppercase;\n  color:#efe7d8;text-shadow:0 1px 0 #000,0 0 14px rgba(255,209,102,.12)}\n.model{margin-top:4px;font-size:8.5px;letter-spacing:.42em;color:#8a7f6c;text-transform:uppercase}\n.serial{position:absolute;top:14px;right:14px;font-size:7px;letter-spacing:.2em;color:#5d564b;\n  font-variant-numeric:tabular-nums}\n\n/* ====== EQ CURVE WINDOW ====== */\n.scope{position:relative;margin:13px 16px 4px;height:84px;border-radius:5px;\n  background:\n    radial-gradient(120% 140% at 50% 0%,#0e1612 0%,#070b09 70%),\n    #060807;\n  border:1px solid #000;\n  box-shadow:inset 0 2px 8px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,209,102,.05),\n    0 0 0 1px rgba(255,255,255,.03);\n  overflow:hidden}\n.scope svg{position:absolute;inset:0;width:100%;height:100%}\n.glassgrid line{stroke:rgba(255,209,102,.07);stroke-width:.5}\n.zeroline{stroke:rgba(255,209,102,.22);stroke-width:.8;stroke-dasharray:2 3}\n#curve{fill:none;stroke:var(--ac);stroke-width:2;\n  filter:drop-shadow(0 0 4px rgba(255,209,102,.7));\n  transition:none}\n#fill{fill:url(#fg);opacity:.16}\n.scan{position:absolute;inset:0;pointer-events:none;\n  background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px)}\n.glow{position:absolute;inset:0;pointer-events:none;\n  background:radial-gradient(60% 80% at 50% 120%,rgba(255,209,102,.10),transparent 70%)}\n.scoplbl{position:absolute;bottom:3px;left:6px;font-size:7px;letter-spacing:.18em;color:#5e7568}\n.scoplbl.r{left:auto;right:6px}\n\n/* ====== KNOB ROWS ====== */\n.bank{padding:8px 6px 0}\n.row{position:relative;display:flex;align-items:center;gap:13px;\n  padding:11px 14px;margin:0 8px;border-radius:6px;\n  transition:background .2s ease}\n.row+.row{border-top:1px solid rgba(0,0,0,.55);box-shadow:0 -1px 0 rgba(255,255,255,.025)}\n.row:hover{background:rgba(255,255,255,.022)}\n.row.drv{margin-top:6px}\n\n/* the knob */\n.knob{position:relative;width:74px;height:74px;flex:0 0 74px;cursor:ns-resize;\n  user-select:none;touch-action:none;--rot:0deg}\n.knob .ring{position:absolute;inset:-3px;border-radius:50%;\n  background:conic-gradient(from 215deg,\n    color-mix(in srgb,var(--kc,var(--red2)) 90%,#fff) 0deg,\n    var(--kc,var(--red2)) calc(var(--rot) + .001deg),\n    rgba(255,255,255,.06) var(--rot) 290deg, transparent 290deg);\n  -webkit-mask:radial-gradient(circle,transparent 35px,#000 36px);\n  mask:radial-gradient(circle,transparent 35px,#000 36px);\n  filter:drop-shadow(0 0 5px color-mix(in srgb,var(--kc,var(--red2)) 55%,transparent))}\n.knob .ticks{position:absolute;inset:-7px;border-radius:50%;\n  background:repeating-conic-gradient(from 211deg,\n    rgba(255,255,255,.3) 0 .9deg,transparent .9deg 25.4deg);\n  -webkit-mask:radial-gradient(circle,transparent 39px,#000 40px,#000 43px,transparent 44px);\n  mask:radial-gradient(circle,transparent 39px,#000 40px,#000 43px,transparent 44px);\n  opacity:.7}\n/* the body of the knob — chicken-head console style */\n.knob .body{position:absolute;inset:7px;border-radius:50%;\n  background:\n    radial-gradient(circle at 50% 22%,#5a504a 0%,#2c2724 38%,#171311 72%,#0a0807 100%);\n  box-shadow:\n    inset 0 3px 6px rgba(255,255,255,.14),\n    inset 0 -6px 12px rgba(0,0,0,.8),\n    0 4px 8px rgba(0,0,0,.65),\n    0 1px 0 rgba(255,255,255,.05);\n  transform:rotate(var(--rot));\n  transition:filter .15s}\n.knob .body::before{content:\"\";position:absolute;inset:11px;border-radius:50%;\n  background:radial-gradient(circle at 50% 35%,#352f2a,#141110);\n  box-shadow:inset 0 1px 2px rgba(255,255,255,.08),inset 0 -2px 4px rgba(0,0,0,.7)}\n/* pointer notch */\n.knob .body::after{content:\"\";position:absolute;top:6px;left:50%;width:4px;height:17px;\n  margin-left:-2px;border-radius:2px;\n  background:linear-gradient(var(--kc,var(--red2)),color-mix(in srgb,var(--kc,var(--red2)) 50%,#000));\n  box-shadow:0 0 7px var(--kc,var(--red2)),inset 0 1px 0 rgba(255,255,255,.4)}\n.knob.act .body{filter:brightness(1.12)}\n.knob.act .ring{filter:drop-shadow(0 0 11px color-mix(in srgb,var(--kc,var(--red2)) 80%,transparent))}\n\n/* the label + readout block */\n.meta{flex:1;min-width:0}\n.lbl{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#d7cdba}\n.sub{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:#857a68;margin-top:2px}\n.readout{margin-top:8px;display:inline-flex;align-items:baseline;gap:4px;\n  padding:4px 9px;border-radius:4px;min-width:74px;justify-content:center;\n  background:linear-gradient(#0a0d0b,#050706);\n  border:1px solid #000;box-shadow:inset 0 1px 3px rgba(0,0,0,.8),0 1px 0 rgba(255,255,255,.04)}\n.num{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;\n  color:#9ff0c8;text-shadow:0 0 7px rgba(120,255,190,.45);letter-spacing:.02em}\n.row.drv .num{color:#ffb37a;text-shadow:0 0 7px rgba(255,150,80,.5)}\n.unit{font-size:8px;letter-spacing:.1em;color:#5f7a6c}\n.row.drv .unit{color:#7a5f4f}\n\n/* drive: small VU needle next to the readout */\n.vu{position:relative;width:54px;height:30px;flex:0 0 54px;border-radius:3px;\n  background:radial-gradient(120% 150% at 50% 120%,#f3e6c4,#d8c79b 60%,#b9a878);\n  border:1px solid #2a2218;overflow:hidden;\n  box-shadow:inset 0 1px 2px rgba(255,255,255,.5),inset 0 -3px 6px rgba(120,90,40,.4),0 1px 2px rgba(0,0,0,.5)}\n.vu .arc{position:absolute;inset:0}\n.vu .arc path{fill:none;stroke:#6b5a3a;stroke-width:.7}\n.vu .arc .hot{stroke:#b3361f;stroke-width:1.4}\n.vu .needle{position:absolute;left:50%;bottom:-2px;width:1.4px;height:26px;margin-left:-.7px;\n  background:linear-gradient(#1a1208,#3a2a14);transform-origin:50% 100%;\n  transform:rotate(var(--vu,-42deg));transition:transform .18s cubic-bezier(.3,.7,.3,1)}\n.vu .pin{position:absolute;left:50%;bottom:-2px;width:5px;height:5px;margin-left:-2.5px;\n  border-radius:50%;background:#2a1f10;box-shadow:0 0 0 1px rgba(0,0,0,.4)}\n.vu .lbl{position:absolute;top:1px;left:0;right:0;text-align:center;font-size:6px;\n  letter-spacing:.1em;color:#5a4a2c}\n\n/* footer */\n.foot{margin:14px 18px 0;padding-top:11px;border-top:1px solid rgba(255,255,255,.045);\n  font-size:9.5px;line-height:1.5;color:#8a7f6c;letter-spacing:.02em}\n.foot b{color:#bfae90;font-weight:700;letter-spacing:.06em}\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head><body>\n  <div class=\"strip\">\n    <span class=\"screw tl\"><\/span><span class=\"screw tr\"><\/span>\n    <span class=\"screw bl\"><\/span><span class=\"screw br\"><\/span>\n\n    <div class=\"head\">\n      <div class=\"serial\">№ 1073 · CH-01<\/div>\n      <div class=\"brand\"><span class=\"pwr\"><\/span><h1>Console&nbsp;EQ<\/h1><\/div>\n      <div class=\"model\">Class-A Discrete Channel Equaliser<\/div>\n    <\/div>\n\n    <!-- live EQ transfer-curve window -->\n    <div class=\"scope\">\n      <svg viewBox=\"0 0 300 84\" preserveAspectRatio=\"none\">\n        <defs><linearGradient id=\"fg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0\" stop-color=\"#ffd166\"/><stop offset=\"1\" stop-color=\"#ffd166\" stop-opacity=\"0\"/>\n        <\/linearGradient><\/defs>\n        <g class=\"glassgrid\">\n          <line x1=\"0\" y1=\"21\" x2=\"300\" y2=\"21\"/><line x1=\"0\" y1=\"63\" x2=\"300\" y2=\"63\"/>\n          <line x1=\"75\" y1=\"0\" x2=\"75\" y2=\"84\"/><line x1=\"150\" y1=\"0\" x2=\"150\" y2=\"84\"/><line x1=\"225\" y1=\"0\" x2=\"225\" y2=\"84\"/>\n        <\/g>\n        <line class=\"zeroline\" x1=\"0\" y1=\"42\" x2=\"300\" y2=\"42\"/>\n        <path id=\"fill\"><\/path>\n        <path id=\"curve\"><\/path>\n      <\/svg>\n      <div class=\"scan\"><\/div><div class=\"glow\"><\/div>\n      <div class=\"scoplbl\">20 Hz<\/div><div class=\"scoplbl r\">20 kHz<\/div>\n    <\/div>\n\n    <div class=\"bank\" id=\"bank\"><\/div>\n\n    <div class=\"foot\">\n      <b>SIGNAL PATH<\/b> — musical low shelf · proportional-Q mid bell · airy high shelf, all driven through transformer-style saturation. Drag knobs · double-click to reset.\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  // ---- params straight from spec ----\n  var P=[\n    {i:0,name:\"Low Gain\", sub:\"Shelf · 100 Hz\",  min:0,max:1,def:0.5,  kc:\"var(--red2)\", unit:\"dB\", map:gainDb},\n    {i:1,name:\"Mid Freq\", sub:\"Sweep · Hz\",       min:0,max:1,def:0.45, kc:\"#ff8a3c\",     unit:\"Hz\", map:freqHz},\n    {i:2,name:\"Mid Gain\", sub:\"Prop-Q Bell\",      min:0,max:1,def:0.5,  kc:\"var(--red2)\", unit:\"dB\", map:gainDb},\n    {i:3,name:\"High Gain\",sub:\"Shelf · Air\",      min:0,max:1,def:0.5,  kc:\"#ffb454\",     unit:\"dB\", map:gainDb},\n    {i:4,name:\"Drive\",    sub:\"Transformer\",      min:0,max:1,def:0.25, kc:\"#e94e3c\",     unit:\"%\",  map:pct, drive:true}\n  ];\n  // value mappers (purely for the readout/curve; raw [min,max] still sent to host)\n  function gainDb(n){ return (n*2-1)*15; }        // -15..+15 dB\n  function freqHz(n){ return Math.round(200*Math.pow(50,n)); } // 200 Hz .. 10 kHz log\n  function pct(n){ return n*100; }\n  function fmt(p,n){ var v=p.map(n);\n    if(p.unit===\"Hz\"){ return v>=1000?(v/1000).toFixed(2).replace(/0$/,\"\")+\"k\":Math.round(v); }\n    if(p.unit===\"dB\"){ return (v>=0?\"+\":\"\")+v.toFixed(1); }\n    return Math.round(v); }\n\n  var bank=document.getElementById('bank'), state=[];\n  P.forEach(function(p){\n    var row=document.createElement('div');\n    row.className='row'+(p.drive?' drv':'');\n    row.style.setProperty('--kc',p.kc);\n    var vu = p.drive\n      ? '<div class=\"vu\"><svg class=\"arc\" viewBox=\"0 0 54 30\">'\n       +'<path d=\"M8 28 A 22 22 0 0 1 46 28\"/>'\n       +'<path class=\"hot\" d=\"M37 13.2 A 22 22 0 0 1 46 28\"/><\/svg>'\n       +'<div class=\"lbl\">DRIVE<\/div><div class=\"needle\"><\/div><div class=\"pin\"><\/div><\/div>'\n      : '';\n    row.innerHTML=\n      '<div class=\"knob\" tabindex=\"0\"><div class=\"ticks\"><\/div><div class=\"ring\"><\/div><div class=\"body\"><\/div><\/div>'+\n      '<div class=\"meta\"><div class=\"lbl\">'+p.name+'<\/div><div class=\"sub\">'+p.sub+'<\/div>'+\n        '<div class=\"readout\"><span class=\"num\"><\/span><span class=\"unit\">'+p.unit+'<\/span><\/div><\/div>'+\n      vu;\n    bank.appendChild(row);\n\n    var knob=row.querySelector('.knob'), num=row.querySelector('.num'),\n        needle=row.querySelector('.needle');\n    var st={p:p, n:p.def, knob:knob,\n      paint:function(){\n        var n=this.n;\n        knob.style.setProperty('--rot',(n*290)+'deg');\n        num.textContent=fmt(p,n);\n        if(needle) needle.style.setProperty('--vu',(-42+n*84)+'deg');\n        if(window.vstai&&window.vstai.setParam){\n          var v=p.min+(p.max-p.min)*n; window.vstai.setParam(p.i,v);\n        }\n        drawCurve();\n      }};\n    state.push(st);\n\n    var dy=0,start=0;\n    knob.addEventListener('pointerdown',function(e){\n      knob.classList.add('act'); dy=e.clientY; start=st.n;\n      knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener('pointermove',function(e){\n      if(!knob.classList.contains('act'))return;\n      var n=start+(dy-e.clientY)/220; st.n=n<0?0:n>1?1:n; st.paint();\n    });\n    function end(){ knob.classList.remove('act'); }\n    knob.addEventListener('pointerup',end);\n    knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){ st.n=p.def; st.paint(); });\n    knob.addEventListener('wheel',function(e){ e.preventDefault();\n      st.n=Math.max(0,Math.min(1,st.n+(e.deltaY<0?.03:-.03))); st.paint(); },{passive:false});\n    knob.addEventListener('keydown',function(e){\n      var s=e.shiftKey?.1:.02;\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){st.n=Math.min(1,st.n+s);st.paint();e.preventDefault();}\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){st.n=Math.max(0,st.n-s);st.paint();e.preventDefault();}\n    });\n  });\n\n  // ---- live EQ transfer curve ----\n  var curve=document.getElementById('curve'), fill=document.getElementById('fill');\n  var rafPending=false;\n  function drawCurve(){ if(rafPending)return; rafPending=true; requestAnimationFrame(_draw); }\n  function _draw(){\n    rafPending=false;\n    var lo=gainDb(state[0].n), mf=state[1].n, mg=gainDb(state[2].n),\n        hi=gainDb(state[3].n), dr=state[4].n;\n    // proportional Q: bell narrows as gain pushes\n    var Q=0.6+Math.abs(mg)/15*1.7;\n    var fc=Math.log(freqHz(state[1].n))/Math.log(2);   // mid centre in log2\n    var W=300,H=84, pts=[];\n    for(var x=0;x<=W;x+=3){\n      var f=Math.log2(20)+(x/W)*(Math.log2(20000)-Math.log2(20)); // log freq axis\n      // low shelf around ~120Hz\n      var ls=lo*0.5*(1-Math.tanh((f-Math.log2(160))*1.3));\n      // high shelf around ~5kHz\n      var hs=hi*0.5*(1+Math.tanh((f-Math.log2(4500))*1.1));\n      // mid bell\n      var d=(f-fc)*Q;\n      var bell=mg*Math.exp(-d*d*1.1);\n      // drive lifts the whole curve slightly (transformer weight)\n      var g=ls+hs+bell+dr*1.2;\n      var y=H/2 - g*(H/2/18); // ±18 dB fits window\n      pts.push([x,y]);\n    }\n    var dpath=\"M\"+pts.map(function(q){return q[0].toFixed(1)+\" \"+q[1].toFixed(1);}).join(\" L\");\n    curve.setAttribute('d',dpath);\n    fill.setAttribute('d',dpath+\" L\"+W+\" \"+H+\" L0 \"+H+\" Z\");\n  }\n\n  function init(){ state.forEach(function(s){ s.paint(); }); drawCurve(); }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(init); else init();\n})();\n<\/script>\n<\/body><\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,d.f,d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
