<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Strip EQ — test bench</title><style>
  :root{--ac:#5ad0ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Strip EQ<\/title>\n<style>\n  :root{\n    --accent:#5ad0ff;      /* blue */\n    --accent2:#ff5a5a;     /* red  */\n    --green:#7fe6a8;\n    --panel:#0c0e11;\n    --panel2:#141821;\n    --metal:#1c2129;\n    --ink:#e7edf5;\n    --ink-dim:#7d8896;\n    --line:#2a313c;\n  }\n  *{box-sizing:border-box;-webkit-user-select:none;user-select:none;}\n  html,body{margin:0;height:100%;}\n  body{\n    font-family:\"Helvetica Neue\",Arial,sans-serif;\n    background:\n      radial-gradient(1200px 600px at 50% -10%, #1a2029 0%, #07090c 60%, #050608 100%);\n    color:var(--ink);\n    display:flex;align-items:center;justify-content:center;\n    min-height:100%;padding:18px;overflow:auto;\n  }\n\n  /* ---- the console module ---- */\n  .strip{\n    position:relative;\n    width:560px;max-width:96vw;\n    background:linear-gradient(180deg,#171b22 0%,#0e1116 100%);\n    border:1px solid #000;\n    border-radius:14px;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.05) inset,\n      0 40px 90px rgba(0,0,0,.65),\n      0 0 0 1px rgba(90,208,255,.04);\n    padding:18px 20px 22px;\n    display:flex;flex-direction:column;gap:14px;\n  }\n  /* screw decorations */\n  .screw{position:absolute;width:11px;height:11px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#3a414c,#10131a 70%);\n    box-shadow:0 1px 1px rgba(0,0,0,.6),0 0 0 1px #05070a;}\n  .screw::after{content:\"\";position:absolute;inset:3px;border-top:1px solid #0a0c10;transform:rotate(35deg);}\n  .screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}\n  .screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}\n\n  .head{display:flex;align-items:center;justify-content:space-between;padding:0 4px;}\n  .brand{display:flex;flex-direction:column;line-height:1;}\n  .brand b{font-size:19px;letter-spacing:.32em;font-weight:800;\n    background:linear-gradient(90deg,var(--accent),#bfefff);\n    -webkit-background-clip:text;background-clip:text;color:transparent;}\n  .brand span{font-size:9px;letter-spacing:.42em;color:var(--ink-dim);margin-top:5px;}\n  .model{font-size:9px;letter-spacing:.3em;color:var(--ink-dim);\n    border:1px solid var(--line);border-radius:4px;padding:5px 8px;}\n\n  /* ---- EQ curve display ---- */\n  .scope{\n    position:relative;height:148px;border-radius:9px;overflow:hidden;\n    background:linear-gradient(180deg,#070a0e,#0a0e13);\n    border:1px solid #000;\n    box-shadow:0 2px 8px rgba(0,0,0,.6) inset, 0 0 0 1px rgba(255,255,255,.03) inset;\n  }\n  .scope svg{position:absolute;inset:0;width:100%;height:100%;}\n  .scanline{position:absolute;left:0;right:0;height:34px;pointer-events:none;\n    background:linear-gradient(180deg,rgba(90,208,255,.10),transparent);\n    animation:scan 5s linear infinite;mix-blend-mode:screen;}\n  @keyframes scan{0%{top:-34px}100%{top:148px}}\n  .scope .lbl{position:absolute;bottom:4px;font-size:8px;color:var(--ink-dim);letter-spacing:.12em;}\n\n  /* ---- knob rows ---- */\n  .rack{display:flex;flex-direction:column;gap:18px;padding:2px 2px 0;}\n  .band{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start;}\n  .cell{display:flex;flex-direction:column;align-items:center;gap:7px;}\n\n  .knob{\n    --col:var(--accent);\n    position:relative;width:74px;height:74px;border-radius:50%;\n    cursor:grab;touch-action:none;\n    background:\n      radial-gradient(circle at 50% 38%, #2b323d 0%, #161a21 62%, #0c0f14 100%);\n    box-shadow:\n      0 3px 7px rgba(0,0,0,.6),\n      0 0 0 1px #04060a,\n      0 1px 0 rgba(255,255,255,.06) inset;\n    transition:box-shadow .18s, transform .05s;\n  }\n  .knob:active{cursor:grabbing;transform:scale(.985);}\n  .knob:hover{box-shadow:0 3px 7px rgba(0,0,0,.6),0 0 0 1px #04060a,\n    0 1px 0 rgba(255,255,255,.06) inset, 0 0 16px -2px var(--col);}\n  /* coloured cap */\n  .knob .cap{\n    position:absolute;inset:13px;border-radius:50%;\n    background:radial-gradient(circle at 42% 32%, color-mix(in srgb,var(--col) 78%,#fff 0%) , color-mix(in srgb,var(--col) 38%, #0a0d12 70%));\n    box-shadow:0 2px 5px rgba(0,0,0,.5) inset, 0 -1px 1px rgba(255,255,255,.18) inset, 0 0 0 1px rgba(0,0,0,.4);\n  }\n  /* pointer */\n  .knob .ptr{\n    position:absolute;left:50%;top:7px;width:3px;height:24px;margin-left:-1.5px;\n    border-radius:2px;background:#0a0d12;\n    transform-origin:50% 30px;\n    box-shadow:0 0 0 1px rgba(255,255,255,.12);\n  }\n  /* tick ring */\n  .knob .ring{position:absolute;inset:-7px;border-radius:50%;pointer-events:none;}\n  .knob .ring svg{position:absolute;inset:0;width:100%;height:100%;}\n\n  .cap-lbl{font-size:9.5px;letter-spacing:.16em;color:var(--ink);text-transform:uppercase;font-weight:600;}\n  .val{font-size:10px;color:var(--ink-dim);font-variant-numeric:tabular-nums;letter-spacing:.04em;\n    background:#05080c;border:1px solid var(--line);border-radius:4px;padding:2px 7px;min-width:54px;text-align:center;}\n  .val b{color:var(--col,#fff);font-weight:600;}\n\n  .sect-tag{grid-column:1/-1;display:flex;align-items:center;gap:8px;margin-bottom:-6px;}\n  .sect-tag i{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);}\n  .sect-tag s{font-style:normal;font-size:8.5px;letter-spacing:.34em;color:var(--ink-dim);}\n\n  .foot{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 0;font-size:8px;letter-spacing:.22em;color:#454f5b;}\n  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);\n    box-shadow:0 0 8px var(--green);margin-right:6px;animation:pulse 2.4s ease-in-out infinite;}\n  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"strip\">\n    <i class=\"screw tl\"><\/i><i class=\"screw tr\"><\/i><i class=\"screw bl\"><\/i><i class=\"screw br\"><\/i>\n\n    <div class=\"head\">\n      <div class=\"brand\"><b>STRIP&nbsp;EQ<\/b><span>4-BAND CHANNEL EQUALISER<\/span><\/div>\n      <div class=\"model\">BRITISH&nbsp;CONSOLE<\/div>\n    <\/div>\n\n    <div class=\"scope\">\n      <svg id=\"grid\" viewBox=\"0 0 560 148\" preserveAspectRatio=\"none\"><\/svg>\n      <svg id=\"curve\" viewBox=\"0 0 560 148\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"fill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"var(--accent)\" stop-opacity=\".34\"/>\n            <stop offset=\"1\" stop-color=\"var(--accent)\" stop-opacity=\"0\"/>\n          <\/linearGradient>\n        <\/defs>\n        <path id=\"area\" fill=\"url(#fill)\"/>\n        <path id=\"line\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2\"\n              stroke-linejoin=\"round\" stroke-linecap=\"round\"\n              style=\"filter:drop-shadow(0 0 6px rgba(90,208,255,.6))\"/>\n        <g id=\"nodes\"><\/g>\n      <\/svg>\n      <div class=\"scanline\"><\/div>\n      <div class=\"lbl\" style=\"left:8px\">20Hz<\/div>\n      <div class=\"lbl\" style=\"left:50%;transform:translateX(-50%)\">1k<\/div>\n      <div class=\"lbl\" style=\"right:8px\">20k<\/div>\n    <\/div>\n\n    <div class=\"rack\" id=\"rack\"><\/div>\n\n    <div class=\"foot\">\n      <span><i class=\"dot\"><\/i>ACTIVE<\/span>\n      <span>SERIES&nbsp;BIQUAD&nbsp;·&nbsp;CLEAN<\/span>\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- param model -------------------------------------------------\n  // group: which band tag, col: knob colour\n  const P = [\n    {i:0, name:\"Low\",     def:0.5, col:\"var(--accent2)\", grp:\"LF\",  unit:\"db\",  fmt:v=>fmtDb((v-0.5)*32)},\n    {i:1, name:\"Lo-Mid\",  def:0.5, col:\"var(--accent)\",  grp:\"LMF\", unit:\"db\",  fmt:v=>fmtDb((v-0.5)*32)},\n    {i:2, name:\"Freq\",    def:0.3, col:\"var(--accent)\",  grp:\"LMF\", unit:\"hz\",  fmt:v=>fmtHz(logmap(v,80,2000))},\n    {i:3, name:\"Hi-Mid\",  def:0.5, col:\"var(--green)\",   grp:\"HMF\", unit:\"db\",  fmt:v=>fmtDb((v-0.5)*32)},\n    {i:4, name:\"Freq\",    def:0.5, col:\"var(--green)\",   grp:\"HMF\", unit:\"hz\",  fmt:v=>fmtHz(logmap(v,600,15000))},\n    {i:5, name:\"High\",    def:0.5, col:\"var(--accent2)\", grp:\"HF\",  unit:\"db\",  fmt:v=>fmtDb((v-0.5)*32)},\n    {i:6, name:\"HP\",      def:0.0, col:\"#cdd6e0\",        grp:\"FILT\",unit:\"hp\",  fmt:v=>v<0.02?\"OFF\":fmtHz(logmap(v,16,400))},\n    {i:7, name:\"Output\",  def:0.5, col:\"#cdd6e0\",        grp:\"FILT\",unit:\"db\",  fmt:v=>v<=0.001?\"-∞\":fmtDb((v-0.5)*24)}\n  ];\n  const val = P.map(p=>p.def);\n\n  function logmap(t,lo,hi){t=Math.max(0,Math.min(1,t));return lo*Math.exp(t*Math.log(hi/lo));}\n  function fmtDb(d){return (d>=0?\"+\":\"\")+d.toFixed(1)+\" dB\";}\n  function fmtHz(h){return h>=1000?(h/1000).toFixed(h<10000?2:1)+\" k\":Math.round(h)+\" Hz\";}\n\n  // ---- layout the rack ---------------------------------------------\n  // rows: [Low | Lo-Mid Lo-Mid-F | Hi-Mid Hi-Mid-F | High | HP Output]\n  const rack=document.getElementById('rack');\n  const layout=[\n    {tag:\"LOW / LO-MID\",   idx:[0,1,2,null]},\n    {tag:\"HI-MID / HIGH\",  idx:[3,4,5,null]},\n    {tag:\"FILTER / TRIM\",  idx:[6,7,null,null]}\n  ];\n  const knobs=[];\n\n  layout.forEach(row=>{\n    const band=document.createElement('div');band.className='band';\n    const tag=document.createElement('div');tag.className='sect-tag';\n    tag.innerHTML='<i><\/i><s>'+row.tag+'<\/s><i><\/i>';\n    band.appendChild(tag);\n    row.idx.forEach(pi=>{\n      const cell=document.createElement('div');cell.className='cell';\n      if(pi===null){band.appendChild(cell);return;}\n      const p=P[pi];\n      cell.innerHTML=\n        '<div class=\"knob\" style=\"--col:'+p.col+'\">'+\n          '<div class=\"ring\"><svg viewBox=\"0 0 100 100\">'+ticks()+'<\/svg><\/div>'+\n          '<div class=\"cap\"><\/div>'+\n          '<div class=\"ptr\"><\/div>'+\n        '<\/div>'+\n        '<div class=\"cap-lbl\">'+p.name+'<\/div>'+\n        '<div class=\"val\" style=\"--col:'+p.col+'\"><b>'+p.fmt(val[pi])+'<\/b><\/div>';\n      band.appendChild(cell);\n      const kn=cell.querySelector('.knob');\n      kn.dataset.pi=pi;\n      knobs[pi]={el:kn,ptr:cell.querySelector('.ptr'),val:cell.querySelector('.val b')};\n      attach(kn,pi);\n    });\n    rack.appendChild(band);\n  });\n\n  function ticks(){\n    let s='';for(let k=0;k<=10;k++){\n      const a=(-135+k*27)*Math.PI/180;\n      const x1=50+Math.sin(a)*46,y1=50-Math.cos(a)*46;\n      const x2=50+Math.sin(a)*40,y2=50-Math.cos(a)*40;\n      s+='<line x1=\"'+x1.toFixed(1)+'\" y1=\"'+y1.toFixed(1)+'\" x2=\"'+x2.toFixed(1)+'\" y2=\"'+y2.toFixed(1)+\n         '\" stroke=\"#3a434f\" stroke-width=\"1.4\"/>';\n    }return s;\n  }\n\n  // ---- knob interaction --------------------------------------------\n  function render(pi){\n    const v=val[pi];const p=P[pi];\n    const ang=-135+v*270;\n    knobs[pi].ptr.style.transform='rotate('+ang+'deg)';\n    knobs[pi].val.textContent=p.fmt(v);\n    // active arc glow on cap intensity\n    knobs[pi].el.querySelector('.cap').style.filter='brightness('+(0.85+0.4*Math.abs(v-(p.unit==='db'?0.5:v?0:0)) ).toFixed(2)+')';\n  }\n  function setV(pi,v,push){\n    v=Math.max(0,Math.min(1,v));\n    val[pi]=v;render(pi);\n    if(push&&window.vstai&&window.vstai.setParam)window.vstai.setParam(P[pi].i,v);\n    drawCurve();\n  }\n  function attach(el,pi){\n    let drag=false,sy=0,sv=0;\n    el.addEventListener('pointerdown',e=>{\n      drag=true;sy=e.clientY;sv=val[pi];el.setPointerCapture(e.pointerId);e.preventDefault();\n    });\n    el.addEventListener('pointermove',e=>{\n      if(!drag)return;\n      const dy=sy-e.clientY;\n      const step=e.shiftKey?0.0008:0.004;\n      setV(pi,sv+dy*step,true);\n    });\n    el.addEventListener('pointerup',e=>{drag=false;el.releasePointerCapture(e.pointerId);});\n    el.addEventListener('dblclick',()=>setV(pi,P[pi].def,true));\n    el.addEventListener('wheel',e=>{e.preventDefault();setV(pi,val[pi]-Math.sign(e.deltaY)*0.02,true);},{passive:false});\n  }\n\n  // ---- EQ response curve -------------------------------------------\n  // frequency axis 20Hz..20kHz log across width\n  const W=560,H=148,N=160,SR=48000;\n  function bandResponse(freqs){\n    // mirror the DSP: HP, low shelf@110, loMid bell, hiMid bell, high shelf@9k\n    const out=new Array(freqs.length).fill(0); // dB\n    const lowDb=(val[0]-0.5)*32, loDb=(val[1]-0.5)*32, hiDb=(val[3]-0.5)*32, hsDb=(val[5]-0.5)*32;\n    const lmF=logmap(val[2],80,2000), hmF=logmap(val[4],600,15000);\n    const hpN=val[6];\n    for(let i=0;i<freqs.length;i++){\n      const f=freqs[i];let db=0;\n      db+=shelfMag(f,110,lowDb,true);\n      db+=peakMag(f,lmF,1.0,loDb);\n      db+=peakMag(f,hmF,1.0,hiDb);\n      db+=shelfMag(f,9000,hsDb,false);\n      if(hpN>=0.02){db+=hpMag(f,logmap(hpN,16,400));}\n      out[i]=db;\n    }\n    return out;\n  }\n  // analytic-ish magnitude approximations (smooth, visual)\n  function peakMag(f,fc,q,g){\n    const x=Math.log2(f/fc), bw=1/q;\n    return g/(1+ (x/(bw*0.7))*(x/(bw*0.7)) );\n  }\n  function shelfMag(f,fc,g,low){\n    const r=Math.log2(f/fc);\n    const t= low ? 1/(1+Math.exp(r*2.2)) : 1/(1+Math.exp(-r*2.2));\n    return g*t;\n  }\n  function hpMag(f,fc){\n    if(f<=0)return -60;\n    const r=f/fc;\n    // 2nd order ~ -12dB/oct\n    return 10*Math.log10( (r*r*r*r) / (1 + r*r*r*r) );\n  }\n\n  const gridSvg=document.getElementById('grid');\n  (function grid(){\n    let s='';\n    // horizontal dB lines (-18,-12,-6,0,+6,+12,+18 -> over ±20 range)\n    for(let d=-18;d<=18;d+=6){\n      const y=H/2 - (d/20)*(H/2-8);\n      const main=d===0;\n      s+='<line x1=\"0\" y1=\"'+y.toFixed(1)+'\" x2=\"'+W+'\" y2=\"'+y.toFixed(1)+\n         '\" stroke=\"'+(main?'#33424f':'#1a2129')+'\" stroke-width=\"'+(main?1.3:1)+'\"/>';\n    }\n    // vertical decade lines 100,1k,10k\n    [100,1000,10000].forEach(fc=>{\n      const x=fx(fc);\n      s+='<line x1=\"'+x.toFixed(1)+'\" y1=\"0\" x2=\"'+x.toFixed(1)+'\" y2=\"'+H+'\" stroke=\"#161d25\"/>';\n    });\n    gridSvg.innerHTML=s;\n  })();\n\n  function fx(f){return (Math.log10(f/20)/Math.log10(20000/20))*W;}\n  function fy(db){return H/2 - (db/20)*(H/2-8);}\n\n  const freqs=[];for(let i=0;i<N;i++){const t=i/(N-1);freqs.push(20*Math.pow(1000,t));}\n  const lineP=document.getElementById('line'),areaP=document.getElementById('area'),nodesG=document.getElementById('nodes');\n\n  function drawCurve(){\n    const mag=bandResponse(freqs);\n    let d='',a='';\n    for(let i=0;i<N;i++){\n      const x=(i/(N-1))*W, y=Math.max(2,Math.min(H-2,fy(mag[i])));\n      d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';\n    }\n    a='M0 '+H+' '+d.replace(/^M/,'L')+'L'+W+' '+H+' Z';\n    lineP.setAttribute('d',d);\n    areaP.setAttribute('d',a);\n    // band node markers (LF shelf, LMF bell, HMF bell, HF shelf)\n    const marks=[\n      {f:110, c:'var(--accent2)'},\n      {f:logmap(val[2],80,2000), c:'var(--accent)'},\n      {f:logmap(val[4],600,15000),c:'var(--green)'},\n      {f:9000, c:'var(--accent2)'}\n    ];\n    let g='';\n    marks.forEach(m=>{\n      // sample curve magnitude near f\n      const t=Math.log10(m.f/20)/Math.log10(1000);\n      const idx=Math.max(0,Math.min(N-1,Math.round(t*(N-1))));\n      const x=fx(m.f),y=Math.max(4,Math.min(H-4,fy(mag[idx])));\n      g+='<circle cx=\"'+x.toFixed(1)+'\" cy=\"'+y.toFixed(1)+'\" r=\"3.4\" fill=\"'+m.c+\n         '\" stroke=\"#05080c\" stroke-width=\"1\" style=\"filter:drop-shadow(0 0 5px '+m.c+')\"/>';\n    });\n    nodesG.innerHTML=g;\n  }\n\n  // ---- host wiring --------------------------------------------------\n  function start(){\n    for(let i=0;i<P.length;i++){\n      // init host param to default\n      if(window.vstai&&window.vstai.setParam)window.vstai.setParam(P[i].i,val[i]);\n      render(i);\n    }\n    drawCurve();\n  }\n  if(window.vstai&&typeof window.vstai.onReady==='function')window.vstai.onReady(start);\n  else start();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
