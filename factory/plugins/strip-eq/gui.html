<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strip EQ</title>
<style>
  :root{
    --accent:#5ad0ff;      /* blue */
    --accent2:#ff5a5a;     /* red  */
    --green:#7fe6a8;
    --panel:#0c0e11;
    --panel2:#141821;
    --metal:#1c2129;
    --ink:#e7edf5;
    --ink-dim:#7d8896;
    --line:#2a313c;
  }
  *{box-sizing:border-box;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1a2029 0%, #07090c 60%, #050608 100%);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100%;padding:18px;overflow:auto;
  }

  /* ---- the console module ---- */
  .strip{
    position:relative;
    width:560px;max-width:96vw;
    background:linear-gradient(180deg,#171b22 0%,#0e1116 100%);
    border:1px solid #000;
    border-radius:14px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 40px 90px rgba(0,0,0,.65),
      0 0 0 1px rgba(90,208,255,.04);
    padding:18px 20px 22px;
    display:flex;flex-direction:column;gap:14px;
  }
  /* screw decorations */
  .screw{position:absolute;width:11px;height:11px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#3a414c,#10131a 70%);
    box-shadow:0 1px 1px rgba(0,0,0,.6),0 0 0 1px #05070a;}
  .screw::after{content:"";position:absolute;inset:3px;border-top:1px solid #0a0c10;transform:rotate(35deg);}
  .screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}
  .screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}

  .head{display:flex;align-items:center;justify-content:space-between;padding:0 4px;}
  .brand{display:flex;flex-direction:column;line-height:1;}
  .brand b{font-size:19px;letter-spacing:.32em;font-weight:800;
    background:linear-gradient(90deg,var(--accent),#bfefff);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .brand span{font-size:9px;letter-spacing:.42em;color:var(--ink-dim);margin-top:5px;}
  .model{font-size:9px;letter-spacing:.3em;color:var(--ink-dim);
    border:1px solid var(--line);border-radius:4px;padding:5px 8px;}

  /* ---- EQ curve display ---- */
  .scope{
    position:relative;height:148px;border-radius:9px;overflow:hidden;
    background:linear-gradient(180deg,#070a0e,#0a0e13);
    border:1px solid #000;
    box-shadow:0 2px 8px rgba(0,0,0,.6) inset, 0 0 0 1px rgba(255,255,255,.03) inset;
  }
  .scope svg{position:absolute;inset:0;width:100%;height:100%;}
  .scanline{position:absolute;left:0;right:0;height:34px;pointer-events:none;
    background:linear-gradient(180deg,rgba(90,208,255,.10),transparent);
    animation:scan 5s linear infinite;mix-blend-mode:screen;}
  @keyframes scan{0%{top:-34px}100%{top:148px}}
  .scope .lbl{position:absolute;bottom:4px;font-size:8px;color:var(--ink-dim);letter-spacing:.12em;}

  /* ---- knob rows ---- */
  .rack{display:flex;flex-direction:column;gap:18px;padding:2px 2px 0;}
  .band{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:7px;}

  .knob{
    --col:var(--accent);
    position:relative;width:74px;height:74px;border-radius:50%;
    cursor:grab;touch-action:none;
    background:
      radial-gradient(circle at 50% 38%, #2b323d 0%, #161a21 62%, #0c0f14 100%);
    box-shadow:
      0 3px 7px rgba(0,0,0,.6),
      0 0 0 1px #04060a,
      0 1px 0 rgba(255,255,255,.06) inset;
    transition:box-shadow .18s, transform .05s;
  }
  .knob:active{cursor:grabbing;transform:scale(.985);}
  .knob:hover{box-shadow:0 3px 7px rgba(0,0,0,.6),0 0 0 1px #04060a,
    0 1px 0 rgba(255,255,255,.06) inset, 0 0 16px -2px var(--col);}
  /* coloured cap */
  .knob .cap{
    position:absolute;inset:13px;border-radius:50%;
    background:radial-gradient(circle at 42% 32%, color-mix(in srgb,var(--col) 78%,#fff 0%) , color-mix(in srgb,var(--col) 38%, #0a0d12 70%));
    box-shadow:0 2px 5px rgba(0,0,0,.5) inset, 0 -1px 1px rgba(255,255,255,.18) inset, 0 0 0 1px rgba(0,0,0,.4);
  }
  /* pointer */
  .knob .ptr{
    position:absolute;left:50%;top:7px;width:3px;height:24px;margin-left:-1.5px;
    border-radius:2px;background:#0a0d12;
    transform-origin:50% 30px;
    box-shadow:0 0 0 1px rgba(255,255,255,.12);
  }
  /* tick ring */
  .knob .ring{position:absolute;inset:-7px;border-radius:50%;pointer-events:none;}
  .knob .ring svg{position:absolute;inset:0;width:100%;height:100%;}

  .cap-lbl{font-size:9.5px;letter-spacing:.16em;color:var(--ink);text-transform:uppercase;font-weight:600;}
  .val{font-size:10px;color:var(--ink-dim);font-variant-numeric:tabular-nums;letter-spacing:.04em;
    background:#05080c;border:1px solid var(--line);border-radius:4px;padding:2px 7px;min-width:54px;text-align:center;}
  .val b{color:var(--col,#fff);font-weight:600;}

  .sect-tag{grid-column:1/-1;display:flex;align-items:center;gap:8px;margin-bottom:-6px;}
  .sect-tag i{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);}
  .sect-tag s{font-style:normal;font-size:8.5px;letter-spacing:.34em;color:var(--ink-dim);}

  .foot{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 0;font-size:8px;letter-spacing:.22em;color:#454f5b;}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);margin-right:6px;animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style>
</head>
<body>
  <div class="strip">
    <i class="screw tl"></i><i class="screw tr"></i><i class="screw bl"></i><i class="screw br"></i>

    <div class="head">
      <div class="brand"><b>STRIP&nbsp;EQ</b><span>4-BAND CHANNEL EQUALISER</span></div>
      <div class="model">BRITISH&nbsp;CONSOLE</div>
    </div>

    <div class="scope">
      <svg id="grid" viewBox="0 0 560 148" preserveAspectRatio="none"></svg>
      <svg id="curve" viewBox="0 0 560 148" preserveAspectRatio="none">
        <defs>
          <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="var(--accent)" stop-opacity=".34"/>
            <stop offset="1" stop-color="var(--accent)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path id="area" fill="url(#fill)"/>
        <path id="line" fill="none" stroke="var(--accent)" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round"
              style="filter:drop-shadow(0 0 6px rgba(90,208,255,.6))"/>
        <g id="nodes"></g>
      </svg>
      <div class="scanline"></div>
      <div class="lbl" style="left:8px">20Hz</div>
      <div class="lbl" style="left:50%;transform:translateX(-50%)">1k</div>
      <div class="lbl" style="right:8px">20k</div>
    </div>

    <div class="rack" id="rack"></div>

    <div class="foot">
      <span><i class="dot"></i>ACTIVE</span>
      <span>SERIES&nbsp;BIQUAD&nbsp;·&nbsp;CLEAN</span>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---- param model -------------------------------------------------
  // group: which band tag, col: knob colour
  const P = [
    {i:0, name:"Low",     def:0.5, col:"var(--accent2)", grp:"LF",  unit:"db",  fmt:v=>fmtDb((v-0.5)*32)},
    {i:1, name:"Lo-Mid",  def:0.5, col:"var(--accent)",  grp:"LMF", unit:"db",  fmt:v=>fmtDb((v-0.5)*32)},
    {i:2, name:"Freq",    def:0.3, col:"var(--accent)",  grp:"LMF", unit:"hz",  fmt:v=>fmtHz(logmap(v,80,2000))},
    {i:3, name:"Hi-Mid",  def:0.5, col:"var(--green)",   grp:"HMF", unit:"db",  fmt:v=>fmtDb((v-0.5)*32)},
    {i:4, name:"Freq",    def:0.5, col:"var(--green)",   grp:"HMF", unit:"hz",  fmt:v=>fmtHz(logmap(v,600,15000))},
    {i:5, name:"High",    def:0.5, col:"var(--accent2)", grp:"HF",  unit:"db",  fmt:v=>fmtDb((v-0.5)*32)},
    {i:6, name:"HP",      def:0.0, col:"#cdd6e0",        grp:"FILT",unit:"hp",  fmt:v=>v<0.02?"OFF":fmtHz(logmap(v,16,400))},
    {i:7, name:"Output",  def:0.5, col:"#cdd6e0",        grp:"FILT",unit:"db",  fmt:v=>v<=0.001?"-∞":fmtDb((v-0.5)*24)}
  ];
  const val = P.map(p=>p.def);

  function logmap(t,lo,hi){t=Math.max(0,Math.min(1,t));return lo*Math.exp(t*Math.log(hi/lo));}
  function fmtDb(d){return (d>=0?"+":"")+d.toFixed(1)+" dB";}
  function fmtHz(h){return h>=1000?(h/1000).toFixed(h<10000?2:1)+" k":Math.round(h)+" Hz";}

  // ---- layout the rack ---------------------------------------------
  // rows: [Low | Lo-Mid Lo-Mid-F | Hi-Mid Hi-Mid-F | High | HP Output]
  const rack=document.getElementById('rack');
  const layout=[
    {tag:"LOW / LO-MID",   idx:[0,1,2,null]},
    {tag:"HI-MID / HIGH",  idx:[3,4,5,null]},
    {tag:"FILTER / TRIM",  idx:[6,7,null,null]}
  ];
  const knobs=[];

  layout.forEach(row=>{
    const band=document.createElement('div');band.className='band';
    const tag=document.createElement('div');tag.className='sect-tag';
    tag.innerHTML='<i></i><s>'+row.tag+'</s><i></i>';
    band.appendChild(tag);
    row.idx.forEach(pi=>{
      const cell=document.createElement('div');cell.className='cell';
      if(pi===null){band.appendChild(cell);return;}
      const p=P[pi];
      cell.innerHTML=
        '<div class="knob" style="--col:'+p.col+'">'+
          '<div class="ring"><svg viewBox="0 0 100 100">'+ticks()+'</svg></div>'+
          '<div class="cap"></div>'+
          '<div class="ptr"></div>'+
        '</div>'+
        '<div class="cap-lbl">'+p.name+'</div>'+
        '<div class="val" style="--col:'+p.col+'"><b>'+p.fmt(val[pi])+'</b></div>';
      band.appendChild(cell);
      const kn=cell.querySelector('.knob');
      kn.dataset.pi=pi;
      knobs[pi]={el:kn,ptr:cell.querySelector('.ptr'),val:cell.querySelector('.val b')};
      attach(kn,pi);
    });
    rack.appendChild(band);
  });

  function ticks(){
    let s='';for(let k=0;k<=10;k++){
      const a=(-135+k*27)*Math.PI/180;
      const x1=50+Math.sin(a)*46,y1=50-Math.cos(a)*46;
      const x2=50+Math.sin(a)*40,y2=50-Math.cos(a)*40;
      s+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+
         '" stroke="#3a434f" stroke-width="1.4"/>';
    }return s;
  }

  // ---- knob interaction --------------------------------------------
  function render(pi){
    const v=val[pi];const p=P[pi];
    const ang=-135+v*270;
    knobs[pi].ptr.style.transform='rotate('+ang+'deg)';
    knobs[pi].val.textContent=p.fmt(v);
    // active arc glow on cap intensity
    knobs[pi].el.querySelector('.cap').style.filter='brightness('+(0.85+0.4*Math.abs(v-(p.unit==='db'?0.5:v?0:0)) ).toFixed(2)+')';
  }
  function setV(pi,v,push){
    v=Math.max(0,Math.min(1,v));
    val[pi]=v;render(pi);
    if(push&&window.vstai&&window.vstai.setParam)window.vstai.setParam(P[pi].i,v);
    drawCurve();
  }
  function attach(el,pi){
    let drag=false,sy=0,sv=0;
    el.addEventListener('pointerdown',e=>{
      drag=true;sy=e.clientY;sv=val[pi];el.setPointerCapture(e.pointerId);e.preventDefault();
    });
    el.addEventListener('pointermove',e=>{
      if(!drag)return;
      const dy=sy-e.clientY;
      const step=e.shiftKey?0.0008:0.004;
      setV(pi,sv+dy*step,true);
    });
    el.addEventListener('pointerup',e=>{drag=false;el.releasePointerCapture(e.pointerId);});
    el.addEventListener('dblclick',()=>setV(pi,P[pi].def,true));
    el.addEventListener('wheel',e=>{e.preventDefault();setV(pi,val[pi]-Math.sign(e.deltaY)*0.02,true);},{passive:false});
  }

  // ---- EQ response curve -------------------------------------------
  // frequency axis 20Hz..20kHz log across width
  const W=560,H=148,N=160,SR=48000;
  function bandResponse(freqs){
    // mirror the DSP: HP, low shelf@110, loMid bell, hiMid bell, high shelf@9k
    const out=new Array(freqs.length).fill(0); // dB
    const lowDb=(val[0]-0.5)*32, loDb=(val[1]-0.5)*32, hiDb=(val[3]-0.5)*32, hsDb=(val[5]-0.5)*32;
    const lmF=logmap(val[2],80,2000), hmF=logmap(val[4],600,15000);
    const hpN=val[6];
    for(let i=0;i<freqs.length;i++){
      const f=freqs[i];let db=0;
      db+=shelfMag(f,110,lowDb,true);
      db+=peakMag(f,lmF,1.0,loDb);
      db+=peakMag(f,hmF,1.0,hiDb);
      db+=shelfMag(f,9000,hsDb,false);
      if(hpN>=0.02){db+=hpMag(f,logmap(hpN,16,400));}
      out[i]=db;
    }
    return out;
  }
  // analytic-ish magnitude approximations (smooth, visual)
  function peakMag(f,fc,q,g){
    const x=Math.log2(f/fc), bw=1/q;
    return g/(1+ (x/(bw*0.7))*(x/(bw*0.7)) );
  }
  function shelfMag(f,fc,g,low){
    const r=Math.log2(f/fc);
    const t= low ? 1/(1+Math.exp(r*2.2)) : 1/(1+Math.exp(-r*2.2));
    return g*t;
  }
  function hpMag(f,fc){
    if(f<=0)return -60;
    const r=f/fc;
    // 2nd order ~ -12dB/oct
    return 10*Math.log10( (r*r*r*r) / (1 + r*r*r*r) );
  }

  const gridSvg=document.getElementById('grid');
  (function grid(){
    let s='';
    // horizontal dB lines (-18,-12,-6,0,+6,+12,+18 -> over ±20 range)
    for(let d=-18;d<=18;d+=6){
      const y=H/2 - (d/20)*(H/2-8);
      const main=d===0;
      s+='<line x1="0" y1="'+y.toFixed(1)+'" x2="'+W+'" y2="'+y.toFixed(1)+
         '" stroke="'+(main?'#33424f':'#1a2129')+'" stroke-width="'+(main?1.3:1)+'"/>';
    }
    // vertical decade lines 100,1k,10k
    [100,1000,10000].forEach(fc=>{
      const x=fx(fc);
      s+='<line x1="'+x.toFixed(1)+'" y1="0" x2="'+x.toFixed(1)+'" y2="'+H+'" stroke="#161d25"/>';
    });
    gridSvg.innerHTML=s;
  })();

  function fx(f){return (Math.log10(f/20)/Math.log10(20000/20))*W;}
  function fy(db){return H/2 - (db/20)*(H/2-8);}

  const freqs=[];for(let i=0;i<N;i++){const t=i/(N-1);freqs.push(20*Math.pow(1000,t));}
  const lineP=document.getElementById('line'),areaP=document.getElementById('area'),nodesG=document.getElementById('nodes');

  function drawCurve(){
    const mag=bandResponse(freqs);
    let d='',a='';
    for(let i=0;i<N;i++){
      const x=(i/(N-1))*W, y=Math.max(2,Math.min(H-2,fy(mag[i])));
      d+=(i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    }
    a='M0 '+H+' '+d.replace(/^M/,'L')+'L'+W+' '+H+' Z';
    lineP.setAttribute('d',d);
    areaP.setAttribute('d',a);
    // band node markers (LF shelf, LMF bell, HMF bell, HF shelf)
    const marks=[
      {f:110, c:'var(--accent2)'},
      {f:logmap(val[2],80,2000), c:'var(--accent)'},
      {f:logmap(val[4],600,15000),c:'var(--green)'},
      {f:9000, c:'var(--accent2)'}
    ];
    let g='';
    marks.forEach(m=>{
      // sample curve magnitude near f
      const t=Math.log10(m.f/20)/Math.log10(1000);
      const idx=Math.max(0,Math.min(N-1,Math.round(t*(N-1))));
      const x=fx(m.f),y=Math.max(4,Math.min(H-4,fy(mag[idx])));
      g+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3.4" fill="'+m.c+
         '" stroke="#05080c" stroke-width="1" style="filter:drop-shadow(0 0 5px '+m.c+')"/>';
    });
    nodesG.innerHTML=g;
  }

  // ---- host wiring --------------------------------------------------
  function start(){
    for(let i=0;i<P.length;i++){
      // init host param to default
      if(window.vstai&&window.vstai.setParam)window.vstai.setParam(P[i].i,val[i]);
      render(i);
    }
    drawCurve();
  }
  if(window.vstai&&typeof window.vstai.onReady==='function')window.vstai.onReady(start);
  else start();
})();
</script>
</body>
</html>
