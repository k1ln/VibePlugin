<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tube Echo — test bench</title><style>
  :root{--ac:#ff9a3d}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Tube Echo</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Tube Echo<\/title>\n<style>\n  :root{\n    --accent:#ff9a3d;\n    --accent2:#ffd86a;\n    --tan:#caa472;\n    --tan-d:#a07b48;\n    --cream:#efe3c6;\n    --panel:#1c1611;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}\n  html,body{height:100%;}\n  body{\n    font-family:\"Helvetica Neue\",Arial,sans-serif;\n    background:radial-gradient(120% 120% at 50% 0%,#2a201a 0%,#100b07 70%);\n    color:#f4e9d2;\n    display:flex;align-items:center;justify-content:center;\n    overflow:hidden;\n  }\n\n  /* ---------------- chassis ---------------- */\n  .unit{\n    position:relative;\n    width:560px;\n    border-radius:18px;\n    padding:22px 26px 26px;\n    background:\n      linear-gradient(180deg,#d8b886 0%,#c19a64 45%,#a87f4b 100%);\n    box-shadow:\n      0 30px 60px rgba(0,0,0,.6),\n      inset 0 2px 0 rgba(255,255,255,.35),\n      inset 0 -4px 12px rgba(0,0,0,.4);\n    border:1px solid #7d5c34;\n  }\n  /* brushed-metal sheen overlay */\n  .unit:before{\n    content:\"\";position:absolute;inset:0;border-radius:18px;\n    background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 2px,rgba(0,0,0,.03) 2px 4px);\n    pointer-events:none;mix-blend-mode:overlay;\n  }\n  /* corner screws */\n  .screw{position:absolute;width:13px;height:13px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#f3e6c8,#8b6c3e 70%,#5c4426);\n    box-shadow:inset 0 0 0 1px rgba(0,0,0,.3),0 1px 1px rgba(0,0,0,.4);}\n  .screw:after{content:\"\";position:absolute;inset:3px;border-top:2px solid rgba(60,40,15,.7);transform:rotate(35deg);}\n  .screw.tl{top:9px;left:9px}.screw.tr{top:9px;right:9px}\n  .screw.bl{bottom:9px;left:9px}.screw.br{bottom:9px;right:9px}\n\n  .brand{\n    display:flex;align-items:baseline;gap:10px;margin:2px 4px 16px;\n  }\n  .brand h1{\n    font-size:21px;letter-spacing:3px;font-weight:800;\n    color:#3a2a16;text-transform:uppercase;\n    text-shadow:0 1px 0 rgba(255,255,255,.45);\n  }\n  .brand .sub{\n    font-size:9px;letter-spacing:4px;color:#5e4524;text-transform:uppercase;\n    border:1px solid rgba(60,40,15,.4);padding:2px 7px;border-radius:4px;\n  }\n\n  /* ---------------- top deck: reel + tube + VU ---------------- */\n  .deck{\n    display:flex;gap:18px;align-items:stretch;\n    background:linear-gradient(180deg,#241b12,#15100b);\n    border-radius:12px;padding:16px;\n    box-shadow:inset 0 3px 10px rgba(0,0,0,.7),0 1px 0 rgba(255,255,255,.15);\n    border:1px solid #5c4326;\n  }\n\n  /* spinning reel */\n  .reel-wrap{position:relative;width:150px;height:150px;flex:0 0 auto;}\n  .reel{\n    width:150px;height:150px;\n    animation:spin 4s linear infinite;\n    transform-origin:50% 50%;\n  }\n  @keyframes spin{to{transform:rotate(360deg);}}\n\n  /* glowing tube */\n  .tube-col{flex:0 0 70px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}\n  .tube{\n    position:relative;width:46px;height:96px;border-radius:23px 23px 10px 10px;\n    background:linear-gradient(180deg,rgba(255,230,180,.18),rgba(120,80,30,.25));\n    border:1px solid rgba(255,210,150,.35);\n    overflow:hidden;\n    box-shadow:0 0 18px rgba(255,150,60,.25), inset 0 0 20px rgba(0,0,0,.4);\n  }\n  .filament{\n    position:absolute;left:50%;bottom:10px;width:6px;height:60px;\n    transform:translateX(-50%);\n    background:linear-gradient(180deg,#fff2c0,#ff8a2a);\n    border-radius:3px;\n    filter:blur(1px);\n    box-shadow:0 0 14px 4px rgba(255,140,40,.9);\n    animation:flick 2.6s ease-in-out infinite;\n  }\n  .glowpool{\n    position:absolute;inset:0;border-radius:inherit;\n    background:radial-gradient(circle at 50% 78%,rgba(255,150,50,.55),transparent 65%);\n    animation:flick 2.6s ease-in-out infinite;\n  }\n  @keyframes flick{0%,100%{opacity:.78}45%{opacity:1}6 nt.getElementById(\"vuGlow\");\n  var vuNeedle = document.getElementById(\"vuNeedle\");\n  var phead = document.getElementById(\"phead\");\n  var tube = document.querySelector(\".tube\");\n\n  function reflectMacros(){\n    var time = state[0], fb = state[1], drive = state[2];\n    // reel speed: slower time = faster transport (more reps/sec); 1.2s..6s\n    var dur = (1.4 + time*5.0).toFixed(2);\n    reel.style.animationDuration = dur + \"s\";\n    // playback head position tracks Time across the track\n    phead.style.left = (8 + time*84) + \"%\";\n    // VU driven by Drive (preamp warmth)\n    var lvl = drive*0.8 + fb*0.2;\n    vuGlow.style.setProperty(\"--vux\", (20 + lvl*60) + \"%\");\n    vuNeedle.style.transform = \"rotate(\" + (-50 + lvl*100) + \"deg)\";\n    // tube glow intensity from drive\n    tube.style.boxShadow = \"0 0 \"+(14+drive*26)+\"px rgba(255,150,60,\"+(0.2+drive*0.5)+\"), inset 0 0 20px rgba(0,0,0,.4)\";\n  }\n\n  // gentle idle VU shimmer\n  var t=0;\n  setInterval(function(){\n    t+=0.08;\n    var base = state[2]*0.8 + state[1]*0.2;\n    var shimmer = base + Math.sin(t)*0.05*(0.3+base);\n    if(shimmer<0)shimmer=0; if(shimmer>1)shimmer=1;\n    vuGlow.style.setProperty(\"--vux\",(20+shimmer*60)+\"%\");\n    vuNeedle.style.transform=\"rotate(\"+(-50+shimmer*100)+\"deg)\";\n  },60);\n\n  function initAll(){\n    state.forEach(function(v,i){ setParam(i,v); });\n    knobs.forEach(function(k){ k.render(); });\n    reflectMacros();\n  }\n\n  if(host && host.onReady){ host.onReady(initAll); }\n  else { initAll(); }\n})();\n<\/script>\n<\/body>\n<\/html>\n";

    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
