  <title>Micro Beat — test bench</title><style>
  :root{--ac:#5ad0ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}

    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

ng:.04em; text-transform:uppercase; text-align:center; padding:3px 0; border-radius:4px; color:#3f6; background:rgba(0,0,0,.25); border:1px solid rgba(90,255,200,.18); transition:all .06s; }\n  .lamp.on{ background:rgba(90,255,200,.85); color:#04130f; box-shadow:0 0 10px rgba(90,255,200,.6); }\n  .grid{ display:grid; grid-template-columns:repeat(16,1fr); gap:3px; }\n  .cell{ height:8px; border-radius:2px; background:rgba(90,255,200,.12); }\n  .cell.play{ background:#6affce; box-shadow:0 0 6px #6affce; }\n  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }\n  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }\n  .dial{ width:64px; height:64px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }\n  .track{ fill:none; stroke:rgba(180,205,225,.14); stroke-width:7; stroke-linecap:round; }\n  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(90,208,255,.6)); }\n  .pcap{ fill:#10151a; stroke:rgba(90,208,255,.22); stroke-width:1; }\n  .ptr{ stroke:var(--acc); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }\n  .kn{ font-size:8px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }\n  .kv{ font-size:10px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(90,208,255,.1); padding:1px 6px; border-radius:6px; border:1px solid rgba(90,208,255,.2); }\n  .knob:hover .kn{ color:var(--acc); }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <header><span class=\"logo\">MICRO&nbsp;BEAT<\/span><span class=\"sub\">budget drum box<\/span><span class=\"led\"><\/span><\/header>\n    <div class=\"lcd\"><div class=\"lamps\" id=\"lamps\"><\/div><div class=\"grid\" id=\"grid\"><\/div><\/div>\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n  <\/div>\n<script>\n(function(){\n  \"use strict\";\n  var VOICES=[\"Kick\",\"Snare\",\"Hat\",\"Clap\",\"Cym\"];\n  var P=[{name:\"Pitch\",idx:0,def:0.5},{name:\"Decay\",idx:1,def:0.4},{name:\"Click\",idx:2,def:0.6},{name:\"Hat\",idx:3,def:0.6},{name:\"Accent\",idx:4,def:0.5},{name:\"Level\",idx:5,def:0.85}];\n  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });\n  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }\n  var lw=document.getElementById(\"lamps\");\n  var lamps=VOICES.map(function(nm){ var e=document.createElement(\"div\"); e.className=\"lamp\"; e.textContent=nm; lw.appendChild(e); return e; });\n  var gw=document.getElementById(\"grid\"), cells=[];\n  for(var i=0;i<16;i++){ var c=document.createElement(\"div\"); c.className=\"cell\"; gw.appendChild(c); cells.push(c); }\n  var PAT=[0,2,1,2, 0,2,1,2, 0,2,3,2, 0,2,1,4];\n  var R=29, C=2*Math.PI*R, A0=-135, A1=135;\n  var kw=document.getElementById(\"knobs\");\n  var knobs=P.map(function(p){\n    var el=document.createElement(\"div\"); el.className=\"knob\";\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 72 72\"><defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#5ad0ff\"/><stop offset=\"1\" stop-color=\"#aab4c0\"/><\/linearGradient><\/defs>'+\n      '<circle class=\"track\" cx=\"36\" cy=\"36\" r=\"29\"><\/circle><circle class=\"arc\" cx=\"36\" cy=\"36\" r=\"29\" transform=\"rotate(135 36 36)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle>'+\n      '<circle class=\"pcap\" cx=\"36\" cy=\"36\" r=\"18\"><\/circle><line class=\"ptr\" x1=\"36\" y1=\"36\" x2=\"36\" y2=\"21\"><\/line><\/svg><\/div><span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el);\n    var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*v)).toString());\n      var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute(\"x2\",(36+Math.sin(ang)*14).toFixed(2)); ptr.setAttribute(\"y2\",(36-Math.cos(ang)*14).toFixed(2)); val.textContent=Math.round(v*100)+\"%\"; }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/160)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; }); el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });\n    render(p.def); return {render:render};\n  });\n  var step=-1,last=0,acc=0;\n  function frame(ts){ if(!last)last=ts; var dt=ts-last; last=ts; acc+=dt; var ms=60000/115/4;\n    if(acc>=ms){ acc-=ms; if(step>=0) cells[step].classList.remove(\"play\"); step=(step+1)%16; cells[step].classList.add(\"play\");\n      var v=PAT[step]; for(var i=0;i<5;i++) lamps[i].classList.toggle(\"on\", i===v); }\n    requestAnimationFrame(frame); }\n  requestAnimationFrame(frame);\n  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;

  function st(m){document.getElementById('st').textContent=m;}

  function makeRiff(){
