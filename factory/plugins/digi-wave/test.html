  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\" />\n<title>Digi Wave<\/title>\n<style>\n  :root {\n    --ac: #43e0c4;     /* teal */\n    --ac2: #7a86ff;    /* indigo */\n    --panel: #232529;\n    --panel2: #1a1c20;\n    --ink: #cdd6dd;\n    --lcd: #0a1f17;\n    --lcdink: #57f6b8;\n    --metal: #3a3d43;\n  }\n  * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }\n  html, body { margin: 0; height: 100%; }\n  body {\n    font: 12px ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", sans-serif;\n    color: var(--ink);\n    background:\n      radial-gradient(120% 80% at 50% -10%, #2c2f35 0%, #15161a 60%, #0c0d10 100%);\n    display: flex; align-items: center; justify-content: center;\n    overflow: hidden;\n  }\n\n  .unit {\n    width: 720px;\n    border-radius: 14px;\n    padding: 18px 20px 22px;\n    background:\n      linear-gradient(180deg, #2b2e33 0%, #212327 8%, #1d1f23 100%);\n    box-shadow:\n      0 24px 60px rgba(0,0,0,.6),\n      inset 0 1px 0 rgba(255,255,255,.05),\n      inset 0 -2px 6px rgba(0,0,0,.5);\n    border: 1px solid #0c0d10;\n    position: relative;\n  }\n  /* brushed-metal hairlines */\n  .unit::before {\n    content: \"\"; position: absolute; inset: 0; border-radius: 14px; pointer-events: none;\n    background: repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 2px, transparent 2px 4px);\n    opacity: .6;\n  }\n\n  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }\n  .brand { display: flex; align-items: baseline; gap: 10px; }\n  .brand .logo {\n    font-weight: 800; letter-spacing: 2px; font-size: 19px;\n    color: #eef3f6; text-shadow: 0 1px 0 #000;\n  }\n  .brand .logo b { color: var(--ac); }\n  .brand .sub {\n    font-size: 9px; letter-spacing: 3px; color: #7d848c; text-transform: uppercase;\n  }\n  .poly-leds { display: flex; gap: 5px; }\n  .pled {\n    width: 8px; height: 8px; border-radius: 50%;\n    background: #16181b; box-shadow: inset 0 0 2px #000;\n    transition: background .08s, box-shadow .08s;\n  }\n  .pled.on { background: var(--ac); box-shadow: 0 0 7px var(--ac), inset 0 0 2px #073; }\n\n  .grid { display: grid; grid-template-columns: 300px 1fr; gap: 18px; }\n\n  /* ---------- LCD + wave readout ---------- */\n  .lcd {\n    background:\n      linear-gradient(180deg, #0c2a1f 0%, #08201700 30%),\n      repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 2px, transparent 2px 4px),\n      var(--lcd);\n    border-radius: 7px;\n    border: 2px solid #05130d;\n    box-shadow: inset 0 0 18px rgba(0,0,0,.85), inset 0 0 0 1px #143b2c, 0 0 18px rgba(67,224,196,.08);\n    padding: 12px 14px;\n    position: relative;\n    overflow: hidden;\n  }\n  .lcd::after { /* scan glow sweep */\n    content:\"\"; position:absolute; left:-30%; top:0; width:30%; height:100%;\n    background: linear-gradient(90deg, transparent, rgba(87,246,184,.07), transparent);\n    animation: scan 5.5s linear infinite;\n  }\n  @keyframes scan { 0% { left:-30%; } 100% { left:120%; } }\n\n  .lcd-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }\n  .lcd-title { color: var(--lcdink); font: 700 11px ui-monospace, monospace; letter-spacing:2px; text-shadow:0 0 6px rgba(87,246,184,.6); }\n  .lcd-wn { color: var(--lcdink); font: 700 11px ui-monospace, monospace; opacity:.85; text-shadow:0 0 6px rgba(87,246,184,.5); }\n\n  svg.scope { display:block; width:100%; height:96px; }\n  .scope .grid-line { stroke: rgba(87,246,184,.10); stroke-width:1; }\n  .scope .wave { fill:none; stroke: var(--lcdink); stroke-width:2.2;\n    filter: drop-shadow(0 0 4px rgba(87,246,184,.75));\n    stroke-linejoin:round; stroke-linecap:round; }\n  .scope .ghost { fill:none; stroke: rgba(87,246,184,.18); stroke-width:6; }\n\n  .lcd-foot { margin-top:6px; display:flex; justify-content:space-between;\n    color: rgba(87,246,184,.6); font: 700 9px ui-monospace, monospace; letter-spacing:1px; }\n  .blink { animation: blink 1.1s steps(2,start) infinite; }\n  @keyframes blink { 50% { opacity:.25; } }\n\n  /* ---------- membrane wave buttons ---------- */\n  .waves { margin-top:14px; }\n  .waves .lbl { font-size:9px; letter-spacing:2px; color:#8a929a; text-transform:uppercase; margin-bottom:6px; }\n  .wgrid { display:grid; grid-template-columns: repeat(4, 1fr); gap:7px; }\n  .wbtn {\n    height:38px; border-radius:5px; cursor:pointer; position:relative;\n    background: linear-gradient(180deg, #34373d, #232529);\n    border: 1px solid #0e0f12;\n    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 2px 3px rgba(0,0,0,.4);\n    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;\n    transition: transform .05s, box-shadow .12s, background .12s;\n    color:#9aa2aa;\n  }\n  .wbtn .num { font:700 8px ui-monospace,monospace; opacity:.6; }\n  .wbtn .nm { font:700 9px ui-sans-serif,system-ui,sans-serif; letter-spacing:.5px; }\n  .wbtn:hover { background: linear-gradient(180deg, #3b3f46, #26282d); color:#c6ced5; }\n  .wbtn:active { transform: translateY(1px); }\n  .wbtn.sel {\n    color:#04130d;\n    background: linear-gradient(180deg, var(--ac), #28b79c);\n    border-color: #0c5a4c;\n    box-shadow: 0 0 14px rgba(67,224,196,.5), inset 0 1px 0 rgba(255,255,255,.4);\n  }\n  .wbtn.sel .num { opacity:.55; }\n\n  /* ---------- right: dials ---------- */\n  .dials {\n    display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px 6px;\n    align-content:start;\n  }\n  .dial { display:flex; flex-direction:column; align-items:center; gap:4px; }\n  .knob {\n    --ang: -135deg;\n    width:62px; height:62px; border-radius:50%; position:relative; cursor:ns-resize;\n    background:\n      radial-gradient(60% 60% at 38% 32%, #4a4e55 0%, #2c2f34 55%, #202226 100%);\n    box-shadow:\n      0 4px 8px rgba(0,0,0,.55),\n      inset 0 1px 0 rgba(255,255,255,.10),\n      ins   KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];
    el.addEventListener('pointerdown',function(e){e.preventDefault();el._n=k[1]+oct*12;down(el._n,el);});
    el.addEventListener('pointerup',function(){up(el._n,el);}); el.addEventListener('pointerleave',function(){if(el.classList.contains('dn'))up(el._n,el);});
    KB.appendChild(el); });
  document.getElementById('octdn').addEventListener('click',function(){setOct(oct-1);});
  document.getElementById('octup').addEventListener('click',function(){setOct(oct+1);});
  var held={};                                            // base note -> actual note played (so releases survive an octave change)
  window.addEventListener('keydown',function(e){ if(e.repeat)return;
    if(e.key==='z'||e.key==='Z'){setOct(oct-1);return;} if(e.key==='x'||e.key==='X'){setOct(oct+1);return;}
    var b=KMAP[e.key]; if(b&&!held[b]){var m=b+oct*12;held[b]=m;down(m,null);} });
  window.addEventListener('keyup',function(e){ var b=KMAP[e.key]; if(b&&held[b]!=null){up(held[b],null);held[b]=null;} });
  setOct(0);
  
  </script></body></html>
