<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Granular Cloud — test bench</title><style>
  :root{--ac:#a0b0ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Granular Cloud</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Granular Cloud<\/title>\n<style>\n  :root {\n    --accent:  #a0b0ff;\n    --accent2: #d0c0ff;\n    --bg0: #07060f;\n    --bg1: #110d22;\n    --ink: #e8e6ff;\n    --ink-dim: #8d88b8;\n    --panel: rgba(22, 18, 44, 0.55);\n    --stroke: rgba(160, 176, 255, 0.16);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: var(--bg0);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* ---------- ambient backdrop ---------- */\n  .stage {\n    position: relative;\n    min-height: 100vh;\n    overflow: hidden;\n    background:\n      radial-gradient(1200px 700px at 75% -10%, rgba(208,192,255,0.18), transparent 60%),\n      radial-gradient(900px 600px at 10% 110%, rgba(160,176,255,0.16), transparent 60%),\n      linear-gradient(180deg, var(--bg1), var(--bg0) 70%);\n  }\n\n  /* the particle cloud canvas sits behind everything */\n  #cloud {\n    position: absolute;\n    inset: 0;\n    width: 100%;\n    height: 100%;\n    display: block;\n    z-index: 0;\n  }\n\n  /* slow drifting nebula veils */\n  .veil {\n    position: absolute;\n    border-radius: 50%;\n    filter: blur(60px);\n    opacity: 0.5;\n    pointer-events: none;\n    z-index: 0;\n    mix-blend-mode: screen;\n  }\n  .veil.a {\n    width: 46vmax; height: 46vmax;\n    left: -8vmax; top: -10vmax;\n    background: radial-gradient(circle, rgba(160,176,255,0.45), transparent 65%);\n    animation: drift1 26s ease-in-out infinite alternate;\n  }\n  .veil.b {\n    width: 40vmax; height: 40vmax;\n    right: -10vmax; bottom: -12vmax;\n    background: radial-gradient(circle, rgba(208,192,255,0.45), transparent 65%);\n    animation: drift2 31s ease-in-out infinite alternate;\n  }\n  @keyframes drift1 {\n    from { transform: translate(0,0) scale(1); }\n    to   { transform: translate(8vmax, 6vmax) scale(1.15); }\n  }\n  @keyframes drift2 {\n    from { transform: translate(0,0) scale(1.1); }\n    to   { transform: translate(-7vmax, -5vmax) scale(0.95); }\n  }\n\n  .wrap {\n    position: relative;\n    z-index: 2;\n    max-width: 920px;\n    margin: 0 auto;\n    padding: 26px 22px 34px;\n  }\n\n  /* ---------- header ---------- */\n  header {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    margin-bottom: 22px;\n  }\n  .mark {\n    width: 46px; height: 46px;\n    flex: 0 0 auto;\n    filter: drop-shadow(0 0 10px rgba(160,176,255,0.6));\n  }\n  .title-block h1 {\n    margin: 0;\n    font-size: 21px;\n    font-weight: 650;\n    letter-spacing: 0.06em;\n    background: linear-gradient(90deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .title-block .sub {\n    margin-top: 3px;\n    font-size: 10.5px;\n    letter-spacing: 0.28em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n\n  /* ---------- control grid ---------- */\n  .panel {\n    background: var(--panel);\n    border: 1px solid var(--stroke);\n    border-radius: 20px;\n    padding: 26px 22px 20px;\n    backdrop-filter: blur(14px) saturate(1.2);\n    box-shadow:\n      0 30px 80px rgba(0,0,0,0.5),\n      inset 0 1px 0 rgba(255,255,255,0.05);\n  }\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 14px 10px;\n    justify-items: center;\n  }\n  @media (max-width: 560px) {\n    .grid { grid-template-columns: repeat(2, 1fr); }\n  }\n\n  .knob {\n    position: relative;\n    width: 132px;\n    padding: 8px 4px 12px;\n    text-align: center;\n    user-select: none;\n    -webkit-user-select: none;\n  }\n  .knob .dial {\n    cursor: ns-resize;\n    display: block;\n    margin: 0 auto;\n    touch-action: none;\n  }\n  .knob .name {\n    margin-top: 6px;\n    font-size: 10.5px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    transition: color 0.2s;\n  }\n  .knob .val {\n    margin-top: 2px;\n    font-size: 13px;\n    font-variant-numeric: tabular-nums;\n    color: var(--ink);\n    letter-spacing: 0.02em;\n  }\n  .knob:hover .name { color: var(--accent); }\n\n  .glow-ring { transition: opacity 0.2s; opacity: 0.5; }\n  .knob:hover .glow-ring,\n  .knob.dragging .glow-ring { opacity: 1; }\n\n  .hint {\n    margin-top: 16px;\n    text-align: center;\n    font-size: 10px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: rgba(141,136,184,0.6);\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"stage\">\n    <div class=\"veil a\"><\/div>\n    <div class=\"veil b\"><\/div>\n    <canvas id=\"cloud\"><\/canvas>\n\n    <div class=\"wrap\">\n      <header>\n        <svg class=\"mark\" viewBox=\"0 0 48 48\" fill=\"none\" aria-hidden=\"true\">\n          <defs>\n            <radialGradient id=\"mg\" cx=\"50%\" cy=\"40%\" r=\"60%\">\n              <stop offset=\"0%\" stop-color=\"#d0c0ff\"/>\n              <stop offset=\"100%\" stop-color=\"#a0b0ff\"/>\n            <\/radialGradient>\n          <\/defs>\n          <circle cx=\"16\" cy=\"22\" r=\"9\" fill=\"url(#mg)\" opacity=\"0.85\"/>\n          <circle cx=\"28\" cy=\"16\" r=\"7\" fill=\"url(#mg)\" opacity=\"0.7\"/>\n          <circle cx=\"33\" cy=\"27\" r=\"8\" fill=\"url(#mg)\" opacity=\"0.8\"/>\n          <circle cx=\"9\"  cy=\"12\" r=\"2.4\" fill=\"#fff\" opacity=\"0.9\"/>\n          <circle cx=\"40\" cy=\"36\" r=\"2\" fill=\"#fff\" opacity=\"0.8\"/>\n          <circle cx=\"22\" cy=\"36\" r=\"1.6\" fill=\"#fff\" opacity=\"0.7\"/>\n        <\/svg>\n        <div class=\"title-block\">\n          <h1>GRANULAR CLOUD<\/h1>\n          <div class=\"sub\">grain delay &middot; particle resynthesis<\/div>\n        <\/div>\n      <\/header>\n\n      <div class=\"panel\">\n        <div class=\"grid\" id=\"grid\"><\/div>\n        <div class=\"hint\">drag vertically &middot; double-click to reset<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n<script>\n(function () {\n  \"use strict\";\n\n  // ---- parameter map (indices match the DSP module) ----\n  var PARAMS = [\n    { name: \"Size\",     index: 0, min: 0, max: 1, def: 0.45, fmt: sizeFmt },\n    { name: \"Density\",  index: 1, min: 0, max: 1, def: 0.50, fmt: densFmt },\n    { name: \"Pitch\",    index: 2, min: 0, max: 1, def: 0.50, fmt: pitchFmt },\n    { name: \"Spray\",    index: 3, min: 0, max: 1, def: 0.40, fmt: pctFmt },\n    { name: \"Feedback\", index: 4, min: 0, max: 1, def: 0.35, fmt: pctFmt },\n    { name: \"Mix\",      index: 5, min: 0, max: 1, def: 0.60, fmt: pctFmt }\n  ];\n\n  function pctFmt(v)  { return Math.round(v * 100) + \"%\"; }\n  function sizeFmt(v) { return Math.round(20 + v * 380) + \" ms\"; }\n  function densFmt(v) { return Math.round(4 + v * v * 120) + \" gr/s\"; }\n  function pitchFmt(v){\n    var s = Math.round((v - 0.5) * 24);\n    return (s > 0 ? \"+\" : \"\") + s + \" st\";\n  }\n\n  // live state used by the particle cloud\n  var state = { size: 0.45, density: 0.5, pitch: 0.5, spray: 0.4, feedback: 0.35, mix: 0.6 };\n  var stateKey = [\"size\", \"density\", \"pitch\", \"spray\", \"feedback\", \"mix\"];\n\n  // ---- host bridge ----\n  function pushParam(index, value) {\n    if (window.vstai && typeof window.vstai.setParam === \"function\") {\n      window.vstai.setParam(index, value);\n    }\n  }\n\n  // ---- knob factory (SVG) ----\n  var R = 40, CX = 50, CY = 50;\n  var A0 = 135, A1 = 405;           // sweep degrees (270°)\n\n  function polar(cx, cy, r, deg) {\n    var a = (deg - 90) * Math.PI / 180;\n    return [cx + r * Math.cos
