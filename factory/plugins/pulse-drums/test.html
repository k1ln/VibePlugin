<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pulse Drums — test bench</title><style>
  :root{--ac:#ff5470}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}

  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n@property --n{syntax:'<number>';inherits:true;initial-value:0}\n:root{\n  --ac:#ff5470;        /* hot pink-orange accent */\n  --ac2:#ff8090;\n  --amber:#ff8a2b;     /* sequencer amber */\n  --amber2:#ffc14d;\n  --steel:#3a4150;\n  --steel-d:#1a1e27;\n}\n*{box-sizing:border-box}\nhtml,body{margin:0;height:100%}\nbody{\n  font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:#e8ecf3;\n  background:\n    radial-gradient(120% 90% at 50% -10%,#23262d 0%,#141519 55%,#0a0b0e 100%);\n  display:flex;align-items:center;justify-content:center;padding:18px;\n  -webkit-user-select:none;user-select:none;overflow:hidden;\n}\n\n/* ============ CHASSIS ============ */\n.machine{\n  position:relative;width:100%;max-width:760px;border-radius:18px;overflow:hidden;\n  background:\n    linear-gradient(180deg,#2c2f37 0%,#21242b 8%,#191b21 100%);\n  border:1px solid #44474f;\n  box-shadow:\n    0 40px 90px rgba(0,0,0,.65),\n    0 2px 0 rgba(255,255,255,.05) inset,\n    0 -30px 60px rgba(0,0,0,.5) inset;\n}\n/* brushed-metal sheen */\n.machine::before{\n  content:\"\";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;\n  background:repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 2px,transparent 2px 4px);\n  mix-blend-mode:overlay;\n}\n/* warm amber haze that breathes with the sequencer */\n.machine::after{\n  content:\"\";position:absolute;left:-10%;right:-10%;bottom:-30%;height:70%;z-index:0;pointer-events:none;\n  background:radial-gradient(60% 100% at 50% 100%,color-mix(in srgb,var(--amber) 26%,transparent),transparent 70%);\n  filter:blur(30px);animation:haze 4.2s ease-in-out infinite;\n}\n@keyframes haze{0%,100%{opacity:.45}50%{opacity:.9}}\n\n/* ============ HEADER ============ */\n.head{\n  position:relative;z-index:2;display:flex;align-items:center;gap:14px;\n  padding:16px 22px 14px;\n  background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);\n  border-bottom:1px solid #000;\n  box-shadow:0 1px 0 rgba(255,255,255,.04);\n}\n.logo{display:flex;flex-direction:column;line-height:1;flex:1;min-width:0}\n.brand{\n  font-size:22px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;\n  background:linear-gradient(90deg,var(--ac),var(--amber2) 60%,var(--ac2));\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  filter:drop-shadow(0 1px 0 rgba(0,0,0,.6));\n}\n.sub{font-size:9.5px;letter-spacing:.42em;text-transform:uppercase;color:#7a8194;margin-top:6px}\n\n/* transport: pulsing power + BPM-ish strobe */\n.transport{display:flex;align-items:center;gap:11px}\n.pwr{\n  width:11px;height:11px;border-radius:50%;background:var(--ac);\n  box-shadow:0 0 12px var(--ac),0 0 3px #fff inset;animation:pwr 1.6s ease-in-out infinite;\n}\n@keyframes pwr{0%,100%{opacity:.55;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}\n.beat{\n  display:flex;gap:5px;padding:7px 11px;border-radius:9px;\n  background:#0c0d11;border:1px solid #2c2f38;\n  box-shadow:0 2px 5px rgba(0,0,0,.5) inset;\n}\n.beat i{width:7px;height:7px;border-radius:2px;background:#2a2e38;transition:none}\n.beat i.lit{background:var(--amber2);box-shadow:0 0 8px var(--amber2)}\n\n/* ============ TRANSPORT/SEQUENCER ============ */\n.seq{\n  position:relative;z-index:2;margin:16px 18px 6px;\n  padding:14px 14px 10px;border-radius:13px;\n  background:linear-gradient(180deg,#0e0f13,#15171d);\n  border:1px solid #000;\n  box-shadow:0 2px 0 rgba(255,255,255,.03) inset,0 14px 26px rgba(0,0,0,.4) inset;\n}\n.seqhd{display:flex;align-items:center;gap:10px;margin-bottom:11px}\n.seqhd .tag{font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:#79808f}\n.seqhd .scan{\n  flex:1;height:2px;border-radius:2px;overflow:hidden;\n  background:linear-gradient(90deg,transparent,#2a2e38,transparent);position:relative;\n}\n.seqhd .scan::after{\n  content:\"\";position:absolute;top:0;left:0;width:30%;height:100%;border-radius:2px;\n  background:linear-gradient(90deg,transparent,var(--amber2),transparent);\n  animation:scan 2s linear infinite;\n}\n@keyframes scan{0%{left:-30%}100%{left:100%}}\n\n.rows{display:flex;flex-direction:column;gap:7px}\n.row{display:grid;grid-template-columns:64px 1fr;align-items:center;gap:10px}\n.rlbl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#9aa3b5;text-align:right}\n.steps{display:grid;grid-template-columns:repeat(16,1fr);gap:4px}\n.step{\n  position:relative;height:14px;border-radius:4px;cursor:pointer;\n  background:linear-gradient(180deg,#23262e,#16181e);\n  border:1px solid #2e323c;\n  box-shadow:0 1px 0 rgba(255,255,255,.04) inset;\n  transition:background .12s,box-shadow .12s,transform .08s;\n}\n.step.on{\n  background:linear-gradient(180deg,\n    color-mix(in srgb,var(--amber,#ff8a2b) 30%,#15171d),\n    color-mix(in srgb,var(--amber,#ff8a2b) 14%,#0e0f13));\n  border-color:color-mix(in srgb,var(--amber,#ff8a2b) 50%,#2e323c);\n}\n/* downbeats slightly brighter base */\n.step.beat{border-color:#3a3f4a}\n/* the playhead column glow */\n.step.cur{box-shadow:0 0 0 1px var(--amber2) inset,0 0 10px rgba(255,193,77,.35)}\n/* FIRING: an active step on the playhead */\n.step.on.cur{\n  background:linear-gradient(180deg,#fff,var(--amber2,var(--amber,#ff8a2b)));\n  border-color:#fff;\n  box-shadow:\n    0 0 14px var(--amber2,var(--amber,#ff8a2b)),\n    0 0 26px color-mix(in srgb,var(--amber2,var(--amber,#ff8a2b)) 70%,transparent),\n    0 0 0 1px #fff8 inset;\n  transform:scale(1.14);\n  animation:fire .18s ease-out;\n}\n@keyframes fire{0%{transform:scale(1.3);filter:brightness(1.7)}100%{transform:scale(1.12);filter:brightness(1)}}\n.step:hover{border-color:#555c69}\n\n/* ============ KNOB DECK ============ */\n.deck{\n  position:relative;z-index:2;\n  display:grid;grid-template-columns:repeat(4,1fr);\n  gap:6px 4px;padding:14px 18px 8px;\n}\n.cell
