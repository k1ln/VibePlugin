<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edge Echo</title>
<style>
  :root{ --acc:#6ad0ff; --acc2:#b0a0ff; --bg0:#070a0e; --bg1:#0d141c; --ink:#dceaf2; --dim:#5e7686; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,#16222e 0%,var(--bg1) 42%,var(--bg0) 100%);
    color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(94vw,760px); border-radius:14px; padding:16px 20px 20px; position:relative; overflow:hidden;
    background:linear-gradient(160deg,#1c2a36,#0a1118);
    border:1px solid rgba(120,200,255,.16);
    box-shadow:0 22px 64px rgba(0,0,0,.6),inset 0 1px 0 rgba(190,230,255,.06); }
  /* rack ears */
  .unit::before,.unit::after{ content:""; position:absolute; top:8px; bottom:8px; width:12px; border-radius:4px;
    background:repeating-linear-gradient(180deg,#243441 0 6px,#1a2630 6px 12px); }
  .unit::before{ left:6px;} .unit::after{ right:6px;}
  header{ display:flex; align-items:center; gap:12px; margin:0 18px 12px; position:relative; z-index:2; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:20px;
    background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .readout{ margin-left:auto; font-variant-numeric:tabular-nums; font-size:15px; letter-spacing:.08em;
    color:#7fffce; text-shadow:0 0 8px rgba(80,255,180,.7); background:#06120c; padding:3px 10px; border-radius:5px;
    border:1px solid rgba(80,255,180,.25); }

  .stage{ position:relative; z-index:2; margin:0 18px; }
  .screen{ height:110px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative;
    background:linear-gradient(180deg,#0a121a,#0c1820); border:1px solid rgba(120,200,255,.14); box-shadow:inset 0 2px 20px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.26em; color:var(--dim); z-index:2; }

  .knobs{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:6px 2px; cursor:ns-resize; touch-action:none; }
  .dial{ width:74px; height:74px; position:relative; }
  .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(150,200,230,.14); stroke-width:7; stroke-linecap:round; }
  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(106,208,255,.6)); }
  .pcap{ fill:#0c1620; stroke:rgba(120,200,255,.22); stroke-width:1; }
  .ptr{ stroke:var(--acc); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }
  .kv{ font-size:11px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(106,208,255,.08);
    padding:1px 8px; border-radius:7px; border:1px solid rgba(106,208,255,.18); }
  .knob:hover .kn{ color:var(--acc); }
</style>
</head>
<body>
  <div class="unit">
    <header>
      <span class="logo">EDGE&nbsp;ECHO</span>
      <span class="sub">preamp digital delay</span>
      <span class="readout" id="ro">— ms</span>
    </header>
    <div class="stage">
      <div class="screen"><div class="scrlbl">REPEATS</div><canvas id="cv"></canvas></div>
      <div class="knobs" id="knobs"></div>
    </div>
  </div>
<script>
(function(){
  "use strict";
  var PARAMS=[
    {name:"Drive",idx:0,def:0.45},
    {name:"Time", idx:1,def:0.38},
    {name:"Feedback",idx:2,def:0.4},
    {name:"Tone", idx:3,def:0.6},
    {name:"Mix",  idx:4,def:0.35}
  ];
  var vals={}; PARAMS.forEach(function(p){ vals[p.idx]=p.def; });
  var host=null;
  function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  function fmtTime(v){ var ms=Math.round(20+v*1180); return ms>=1000?(ms/1000).toFixed(2)+" s":ms+" ms"; }
  function fmt(p,v){ return p.name==="Time"?fmtTime(v):Math.round(v*100)+"%"; }
  var ro=document.getElementById("ro");

  var R=33, C=2*Math.PI*R, A0=-135, A1=135;
  var wrap=document.getElementById("knobs");
  var knobs=PARAMS.map(function(p){
    var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 86 86">'+
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6ad0ff"/><stop offset="1" stop-color="#b0a0ff"/></linearGradient></defs>'+
      '<circle class="track" cx="43" cy="43" r="33"></circle>'+
      '<circle class="arc" cx="43" cy="43" r="33" transform="rotate(135 43 43)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'+
      '<circle class="pcap" cx="43" cy="43" r="21"></circle>'+
      '<line class="ptr" x1="43" y1="43" x2="43" y2="26"></line></svg></div>'+
      '<span class="kn">'+p.name+'</span><span class="kv"></span>';
    wrap.appendChild(el);
    var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){
      var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString());
      var ang=(A0+(A1-A0)*v)*Math.PI/180;
      ptr.setAttribute("x2",(43+Math.sin(ang)*17).toFixed(2));
      ptr.setAttribute("y2",(43-Math.cos(ang)*17).toFixed(2));
      val.textContent=fmt(p,v);
      if(p.idx===1 && ro) ro.textContent=fmtTime(v);
    }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; });
    el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });
    render(p.def);
    return {render:render};
  });

  // ---- repeats visualization: an impulse re-triggers, echoes march across, fading by feedback ----
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener("resize",resize); resize();
  var pulses=[]; var acc=0, last=0;
  function frame(ts){
    if(!last)last=ts; var dt=Math.min(50,ts-last); last=ts; acc+=dt;
    var time=vals[1], fb=vals[2], drive=vals[0], tone=vals[3];
    var gapMs=120+time*900; // visual spacing follows Time
    if(acc>gapMs*0.9){ acc=0; pulses.push({t:0, born:ts}); }
    ctx.clearRect(0,0,W,H);
    // base line
    ctx.strokeStyle="rgba(106,208,255,0.12)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,H*0.62); ctx.lineTo(W,H*0.62); ctx.stroke();
    // input "edge" marker on the left, brighter with drive
    var gx=14;
    ctx.fillStyle="rgba(176,160,255,"+(0.5+0.5*drive)+")"; ctx.shadowColor="#b0a0ff"; ctx.shadowBlur=10+drive*14;
    ctx.fillRect(gx-3,H*0.18,6,H*0.44); ctx.shadowBlur=0;
    // echoes march right, amplitude decays by feedback
    var spacing=(W-40)/8;
    for(var i=pulses.length-1;i>=0;i--){
      var p=pulses[i]; p.t+=dt*0.05*(0.5+ (1-time)*0.8);
      if(p.t>9){ pulses.splice(i,1); continue; }
      for(var k=1;k<=8;k++){
        var x=gx+spacing*k - (p.t*0); // static comb positions, animate brightness
        var amp=Math.pow(0.55+fb*0.42,k)*(1-Math.min(1,Math.abs(p.t-k)));
        if(amp<=0.01) continue;
        var h=amp*(H*0.40);
        var hue=tone; var col="rgba("+Math.round(106+ (1-tone)*60)+","+Math.round(208*0.7+tone*60)+","+Math.round(255)+","+amp+")";
        ctx.fillStyle=col; ctx.shadowColor="#6ad0ff"; ctx.shadowBlur=6*amp;
        ctx.fillRect(x-2, H*0.62-h, 4, h*1.0);
        ctx.shadowBlur=0;
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function boot(){ host=window.vstai||null; PARAMS.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script>
</body>
</html>
