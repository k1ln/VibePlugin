<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{
  --ac:#ffb86a;        /* warm sepia amber accent */
  --ac2:#9a7bff;       /* worn violet accent */
  --deck:#2a2118;      /* deck enclosure */
  --deck2:#1a140d;
  --tape:#3a2c1e;      /* tape brown */
  --ink:#f6e7cf;       /* warm cream text */
  --dim:#b89a74;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font:13px ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(130% 100% at 50% -10%,#3a2c1d 0%,#241a11 50%,#120c07 100%);
  display:flex;align-items:center;justify-content:center;
  padding:20px;min-height:100%;
}

/* ===== deck enclosure ===== */
.deck{
  position:relative;
  width:380px;max-width:96vw;
  border-radius:18px;
  padding:18px 20px 22px;
  background:
    linear-gradient(165deg,#4a3a28 0%,var(--deck) 34%,var(--deck2) 100%);
  box-shadow:
    0 40px 80px -22px rgba(0,0,0,.8),
    0 2px 0 rgba(255,220,170,.10) inset,
    0 -24px 44px -20px rgba(0,0,0,.65) inset,
    0 0 0 2px rgba(0,0,0,.5),
    0 0 0 5px #160f08;
  animation:rise .7s cubic-bezier(.2,.8,.25,1) both;
  overflow:hidden;
}
@keyframes rise{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
/* worn-tape grain + sheen overlay */
.deck::before{
  content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
  background:
    repeating-linear-gradient(98deg,rgba(255,235,200,.025) 0 1px,transparent 1px 4px),
    radial-gradient(150% 60% at 24% -8%,rgba(255,230,190,.14),transparent 52%);
  mix-blend-mode:screen;opacity:.75;
}
/* faint flicker like an aging bulb */
.deck::after{
  content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 120%,rgba(255,184,106,.10),transparent 60%);
  animation:flick 5.5s ease-in-out infinite;
}
@keyframes flick{0%,100%{opacity:.5}43%{opacity:.78}47%{opacity:.4}71%{opacity:.66}}

.screw{position:absolute;width:11px;height:11px;border-radius:50%;z-index:3;
  background:radial-gradient(circle at 35% 30%,#e7d6b8,#8a7355 55%,#3a2e1e);
  box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.35) inset;}
.screw::after{content:"";position:absolute;inset:2.5px;border-radius:1px;
  background:linear-gradient(45deg,transparent 44%,#5a4730 44% 56%,transparent 56%);}
.screw.tl{top:11px;left:11px}.screw.tr{top:11px;right:11px}
.screw.bl{bottom:11px;left:11px}.screw.br{bottom:11px;right:11px}

/* ===== header ===== */
.head{position:relative;z-index:2;text-align:center;margin:0 0 12px}
.brand{font-size:8.5px;letter-spacing:.42em;color:var(--dim);text-transform:uppercase}
h1{
  margin:3px 0 0;font-size:25px;font-weight:900;letter-spacing:.04em;line-height:1;
  font-style:italic;
  background:linear-gradient(180deg,#fff3df,var(--ac) 52%,#c77a3a);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.45));
}
.sub{font-size:8px;letter-spacing:.30em;color:var(--ac2);opacity:.8;text-transform:uppercase;margin-top:5px}

/* ===== tape transport window (reels + warbling repeats) ===== */
.transport{
  position:relative;z-index:2;height:138px;margin:2px 2px 16px;border-radius:12px;overflow:hidden;
  background:radial-gradient(120% 150% at 50% 120%,#241a10,#0d0905 72%);
  box-shadow:0 0 0 1px rgba(0,0,0,.6),
             0 0 0 2px rgba(255,184,106,.07),
             inset 0 2px 12px rgba(0,0,0,.85),
             inset 0 0 40px rgba(255,160,90,.06);
}
.transport svg{position:absolute;inset:0;width:100%;height:100%}
.transport::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,240,215,.09),transparent 28%);}

.reel{transform-origin:center;animation:spin 2.6s linear infinite}
.reel.right{animation-duration:2.0s}
@keyframes spin{to{transform:rotate(360deg)}}
.reelbody{fill:#1c140c;stroke:#6a543a;stroke-width:2}
.spoke{stroke:#7a6038;stroke-width:3;stroke-linecap:round}
.hub{fill:url(#hubg)}
.tapepath{fill:none;stroke:#5a4226;stroke-width:5;opacity:.85}

/* repeat waveform — pitch-warbles via @keyframes wobble */
.wavewrap{transform-origin:center;animation:wob 3.1s ease-in-out infinite}
@keyframes wob{
  0%,100%{transform:translateY(0) scaleY(1)}
  22%{transform:translateY(-1.2px) scaleY(1.08) skewX(-1.4deg)}
  47%{transform:translateY(1.4px) scaleY(.9) skewX(1.2deg)}
  68%{transform:translateY(-.6px) scaleY(1.05) skewX(-.8deg)}
}
.wpath{fill:none;stroke-linecap:round;stroke-linejoin:round}
.flutline{stroke:rgba(255,184,106,.13);stroke-width:1}
.flow{stroke-dasharray:4 8;animation:flow 1.0s linear infinite}
@keyframes flow{to{stroke-dashoffset:-12}}
.pin{fill:var(--ac);filter:drop-shadow(0 0 4px var(--ac))}

/* ===== knob deck ===== */
.knobs{position:relative;z-index:2;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:0 1px}
.pot{display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:pop .5s both;animation-delay:var(--d)}
@keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.knob{position:relative;width:60px;height:60px;cursor:ns-resize;touch-action:none;user-select:none}
.skirt{position:absolute;inset:-2px;border-radius:50%;
  background:repeating-conic-gradient(from 215deg,rgba(255,225,185,.45) 0 1deg,transparent 1deg 13.846deg);
  -webkit-mask:radial-gradient(circle,transparent 29px,#000 30px,#000 33px,transparent 34px);
  mask:radial-gradient(circle,transparent 29px,#000 30px,#000 33px,transparent 34px)}
.arc{position:absolute;inset:1px;border-radius:50%;
  background:conic-gradient(from 215deg,var(--ac) calc(var(--n)*270deg),rgba(255,255,255,.05) calc(var(--n)*270deg) 270deg,transparent 270deg);
  filter:drop-shadow(0 0 calc(2px + var(--n)*7px) var(--ac));
  transition:--n .12s cubic-bezier(.2,.8,.25,1)}
.cap{position:absolute;top:8px;left:8px;width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 50% 26%,#5a4630 0%,#2a1f14 62%,#150e08 100%);
  box-shadow:inset 0 2px 5px rgba(255,220,170,.16),inset 0 -6px 13px rgba(0,0,0,.85),0 3px 8px rgba(0,0,0,.55)}
.cap::after{content:"";position:absolute;inset:10px;border-radius:50%;
  background:radial-gradient(circle at 50% 30%,#6a533a,#1c130b);
  box-shadow:inset 0 1px 2px rgba(255,225,180,.2)}
.ptr{position:absolute;top:5px;left:50%;width:3px;height:17px;margin-left:-1.5px;border-radius:3px;
  background:linear-gradient(var(--ac2),var(--ac));
  box-shadow:0 0 7px var(--ac),0 0 2px #fff;
  transform-origin:50% 25px;
  transform:rotate(calc((var(--n) - .5) * 270deg));
  transition:transform .12s cubic-bezier(.2,.8,.25,1)}
.pname{font-size:8.5px;font-weight:800;letter-spacing:.12em;color:#1c130b;
  background:linear-gradient(var(--ac2),var(--ac));padding:2px 8px;border-radius:999px;
  text-transform:uppercase;box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 2px 4px rgba(0,0,0,.4)}
.pval{font-size:11px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;
  min-height:13px;text-shadow:0 0 8px rgba(255,184,106,.4)}
.knob.act .cap{box-shadow:inset 0 2px 5px rgba(255,220,170,.18),inset 0 -6px 13px rgba(0,0,0,.85),0 3px 12px rgba(255,184,106,.55)}

/* ===== VU strip ===== */
.foot{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;
  margin:16px 4px 0;gap:12px}
.vu{flex:1;height:9px;border-radius:5px;overflow:hidden;position:relative;
  background:linear-gradient(#0d0905,#1a120a);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.8),0 0 0 1px rgba(255,184,106,.08)}
.vufill{position:absolute;left:0;top:0;bottom:0;width:30%;
  background:linear-gradient(90deg,#7a5a2a,var(--ac) 70%,#fff0d8);
  box-shadow:0 0 8px var(--ac);transition:width .08s ease-out}
.led{width:11px;height:11px;border-radius:50%;flex:0 0 auto;
  background:radial-gradient(circle at 40% 35%,#fff0d8,var(--ac) 45%,#5a3a16 90%);
  box-shadow:0 0 12px var(--ac),0 0 4px #fff inset;animation:ledp 2.3s ease-in-out infinite}
@keyframes ledp{0%,100%{opacity:.8;box-shadow:0 0 7px var(--ac),0 0 3px #fff inset}
  50%{opacity:1;box-shadow:0 0 16px var(--ac),0 0 5px #fff inset}}
.serial{font-size:7px;letter-spacing:.16em;color:var(--dim);opacity:.55;flex:0 0 auto}
</style>
</head>
<body>
<div class="deck">
  <span class="screw tl"></span><span class="screw tr"></span>
  <span class="screw bl"></span><span class="screw br"></span>

  <div class="head">
    <div class="brand">Vintage Transport Series</div>
    <h1>Flutter Echo</h1>
    <div class="sub">Wow &amp; Flutter Tape Delay</div>
  </div>

  <!-- tape transport: two reels + warbling repeat waveform -->
  <div class="transport">
    <svg viewBox="0 0 380 138" preserveAspectRatio="none">
      <defs>
        <radialGradient id="hubg" cx="50%" cy="42%" r="60%">
          <stop offset="0%" stop-color="#caa873"/>
          <stop offset="60%" stop-color="#6a533a"/>
          <stop offset="100%" stop-color="#241a10"/>
        </radialGradient>
        <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#9a7bff"/>
          <stop offset="55%" stop-color="#ffb86a"/>
          <stop offset="100%" stop-color="#fff0d8"/>
        </linearGradient>
      </defs>

      <!-- tape path between reels -->
      <path class="tapepath" d="M 70 92 C 130 116, 250 116, 310 92"/>

      <!-- left reel -->
      <g class="reel" id="reelL" transform="translate(70,52)">
        <circle class="reelbody" r="34"/>
        <circle class="hub" r="13"/>
        <g class="spokes">
          <line class="spoke" x1="0" y1="-13" x2="0" y2="-30"/>
          <line class="spoke" x1="0" y1="13" x2="0" y2="30"/>
          <line class="spoke" x1="-13" y1="0" x2="-30" y2="0"/>
          <line class="spoke" x1="13" y1="0" x2="30" y2="0"/>
        </g>
      </g>

      <!-- right reel -->
      <g class="reel right" id="reelR" transform="translate(310,52)">
        <circle class="reelbody" r="34"/>
        <circle class="hub" r="13"/>
        <g class="spokes">
          <line class="spoke" x1="0" y1="-13" x2="0" y2="-30"/>
          <line class="spoke" x1="0" y1="13" x2="0" y2="30"/>
          <line class="spoke" x1="-13" y1="0" x2="-30" y2="0"/>
          <line class="spoke" x1="13" y1="0" x2="30" y2="0"/>
        </g>
      </g>

      <!-- flutter grid -->
      <line class="flutline flow" x1="110" y1="40" x2="270" y2="40"/>
      <line class="flutline flow" x1="110" y1="64" x2="270" y2="64"/>

      <!-- the warbling repeat waveforms (decaying echoes) -->
      <g class="wavewrap">
        <path id="wave1" class="wpath" stroke="url(#wg)" stroke-width="2.6" style="filter:drop-shadow(0 0 5px var(--ac))" d=""/>
        <path id="wave2" class="wpath" stroke="var(--ac2)" stroke-width="1.8" opacity=".55" d=""/>
        <path id="wave3" class="wpath" stroke="var(--ac)" stroke-width="1.2" opacity=".3" d=""/>
      </g>
      <!-- record-head pin -->
      <circle class="pin" cx="190" cy="52" r="2.6"/>
    </svg>
  </div>

  <!-- knob deck -->
  <div class="knobs" id="knobs"></div>

  <!-- VU + status -->
  <div class="foot">
    <div class="led"></div>
    <div class="vu"><div class="vufill" id="vu"></div></div>
    <div class="serial">FE&middot;1751</div>
  </div>
</div>

<script>
(function(){
  var PARAMS=[
    {name:"Time",    index:0,min:0,max:1,def:0.45},
    {name:"Feedback",index:1,min:0,max:1,def:0.5},
    {name:"Warble",  index:2,min:0,max:1,def:0.4},
    {name:"Tone",    index:3,min:0,max:1,def:0.55},
    {name:"Mix",     index:4,min:0,max:1,def:0.5}
  ];
  var state={};
  var knobsEl=document.getElementById('knobs');
  var w1=document.getElementById('wave1');
  var w2=document.getElementById('wave2');
  var w3=document.getElementById('wave3');
  var wrap=document.querySelector('.wavewrap');
  var reelL=document.getElementById('reelL');
  var reelR=document.getElementById('reelR');
  var vu=document.getElementById('vu');

  function pct(v){ return Math.round(v*100)+"%"; }

  function buildKnob(p,i){
    var cell=document.createElement('div');
    cell.className='pot'; cell.style.setProperty('--d',(i*65)+'ms');
    cell.innerHTML=
      '<div class="knob" tabindex="0">'+
        '<i class="skirt"></i>'+
        '<i class="arc"></i>'+
        '<i class="cap"></i>'+
        '<i class="ptr"></i>'+
      '</div>'+
      '<div class="pname">'+p.name+'</div>'+
      '<div class="pval"></div>';
    knobsEl.appendChild(cell);

    var knob=cell.querySelector('.knob');
    var arc=cell.querySelector('.arc');
    var ptr=cell.querySelector('.ptr');
    var val=cell.querySelector('.pval');
    var v=p.def;

    function norm(){ return (v-p.min)/((p.max-p.min)||1); }
    function paint(){
      var n=norm();
      arc.style.setProperty('--n',n);
      ptr.style.setProperty('--n',n);
      val.textContent=pct(n);
      state[p.index]=v;
      if(window.vstai&&window.vstai.setParam) window.vstai.setParam(p.index,v);
      onChange();
    }
    function setNorm(n){
      n=n<0?0:n>1?1:n;
      v=p.min+(p.max-p.min)*n;
      paint();
    }

    var drag=false, startY=0, startN=0;
    knob.addEventListener('pointerdown',function(e){
      drag=true; startY=e.clientY; startN=norm();
      knob.classList.add('act'); knob.setPointerCapture(e.pointerId); e.preventDefault();
    });
    knob.addEventListener('pointermove',function(e){
      if(!drag)return;
      var speed=e.shiftKey?700:230;
      setNorm(startN+(startY-e.clientY)/speed);
    });
    function end(){ drag=false; knob.classList.remove('act'); }
    knob.addEventListener('pointerup',end);
    knob.addEventListener('pointercancel',end);
    knob.addEventListener('dblclick',function(){ v=p.def; paint(); });
    knob.addEventListener('wheel',function(e){
      e.preventDefault(); setNorm(norm()+(e.deltaY<0?0.025:-0.025));
    },{passive:false});
    knob.addEventListener('keydown',function(e){
      if(e.key==='ArrowUp'||e.key==='ArrowRight'){setNorm(norm()+0.02);e.preventDefault();}
      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setNorm(norm()-0.02);e.preventDefault();}
    });

    paint();
  }

  // ---- live repeat-waveform shaping from the params ----
  function buildWave(amp,warble,tone,phaseShift,cycles){
    var pts=[], N=90;
    for(var x=0;x<=N;x++){
      var t=x/N;
      var ph=t*Math.PI*2*cycles + phaseShift;
      // wow (slow) + flutter (fast) pitch-warble baked into the phase
      var wow=Math.sin(t*Math.PI*1.0)*warble*1.1;
      var flut=Math.sin(t*Math.PI*9.0)*warble*0.45;
      var s=Math.sin(ph + wow + flut);
      // tone darkens => softer/rounder top end
      s*= (0.55+0.45*tone);
      var px=110 + t*160;
      var py=52 - s*amp;
      pts.push(px.toFixed(1)+","+py.toFixed(1));
    }
    return 'M'+pts.join(' L');
  }

  function onChange(){
    var time=state[0]!=null?state[0]:0.45;
    var fb  =state[1]!=null?state[1]:0.5;
    var warb=state[2]!=null?state[2]:0.4;
    var tone=state[3]!=null?state[3]:0.55;
    var mix =state[4]!=null?state[4]:0.5;

    // more repeats visible with higher feedback
    w1.setAttribute('d',buildWave(15, warb, tone, 0,   2.0));
    w2.setAttribute('d',buildWave(11, warb, tone, 1.1, 2.0));
    w3.setAttribute('d',buildWave(7,  warb, tone, 2.2, 2.0));
    w2.style.opacity=(0.18+fb*0.6).toFixed(2);
    w3.style.opacity=(0.05+fb*0.5).toFixed(2);

    // warble drives the wobble animation strength + speed
    var wobDur=(4.2 - warb*2.6).toFixed(2)+'s';
    wrap.style.animationDuration=wobDur;
    // longer Time => slower reels
    var spinL=(1.6 + time*2.4).toFixed(2)+'s';
    reelL.style.animationDuration=spinL;
    reelR.style.animationDuration=(parseFloat(spinL)*0.78).toFixed(2)+'s';

    // VU reflects wet energy (mix * (1+feedback))
    var energy=Math.min(1, mix*(0.5+fb*0.9)+0.1);
    vu.style.width=(12+energy*86).toFixed(0)+'%';
  }

  PARAMS.forEach(buildKnob);

  function ready(){ onChange(); }
  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();
})();
</script>
</body>
</html>
