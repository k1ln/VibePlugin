<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Realm FM — test bench</title><style>
  :root{--ac:#e0509a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}

  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>Realm FM<\/title>\n<style>\n  :root{ --acc:#e0509a; --acc2:#50c8d0; --bg0:#0e0710; --bg1:#1a0d1e; --ink:#f6e9f2; --dim:#9a7090; }\n  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }\n  body{ font-family:\"Inter\",system-ui,-apple-system,\"Segoe UI\",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#2a1230 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }\n  .unit{ width:min(95vw,760px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#1c0f22,#0e0710); border:1px solid rgba(224,80,154,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(246,233,242,.06); }\n  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }\n  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }\n  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }\n  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.0s ease-in-out infinite; }\n  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }\n  .screen{ height:104px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#180b1c,#0d0710); border:1px solid rgba(224,80,154,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }\n  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }\n  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }\n  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }\n  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }\n  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }\n  .track{ fill:none; stroke:rgba(232,214,228,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(224,80,154,.6)); }\n  .pcap{ fill:#160a1a; stroke:rgba(224,80,154,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }\n  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(224,80,154,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(224,80,154,.2); }\n  .knob:hover .kn{ color:var(--acc); }\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <header><span class=\"logo\">REALM&nbsp;FM<\/span><span class=\"sub\">fm + filter (rcm)<\/span><span class=\"led\"><\/span><\/header>\n    <div class=\"screen\"><div class=\"scrlbl\">FM&nbsp;·&nbsp;FILTER<\/div><canvas id=\"cv\"><\/canvas><\/div>\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n  <\/div>\n<script>\n(function(){\"use strict\";\n  var P=[{name:\"Ratio\",idx:0,def:0.28},{name:\"Index\",idx:1,def:0.45},{name:\"Cutoff\",idx:2,def:0.5},{name:\"Env\",idx:3,def:0.6},{name:\"Decay\",idx:4,def:0.6},{name:\"Level\",idx:5,def:0.8}];\n  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }\n  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById(\"knobs\");\n  var knobs=P.map(function(p){ var el=document.createElement(\"div\"); el.className=\"knob\";\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 80 80\"><defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#e0509a\"/><stop offset=\"1\" stop-color=\"#50c8d0\"/><\/linearGradient><\/defs><circle class=\"track\" cx=\"40\" cy=\"40\" r=\"33\"><\/circle><circle class=\"arc\" cx=\"40\" cy=\"40\" r=\"33\" transform=\"rotate(135 40 40)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle><circle class=\"pcap\" cx=\"40\" cy=\"40\" r=\"20\"><\/circle><line class=\"ptr\" x1=\"40\" y1=\"40\" x2=\"40\" y2=\"23\"><\/line><\/svg><\/div><span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el); var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute(\"x2\",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute(\"y2\",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=(p.idx===0)?(Math.round((0.5+v*6.5)*2)/2).toFixed(1)+\":1\":Math.round(v*100)+\"%\"; }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; }); el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });\n  var cv=document.getElementById(\"cv\"), ctx=cv.getContext(\"2d\"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);\n  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener(\"resize\",resize); resize();\n  function frame(ts){ ctx.clearRect(0,0,W,H); var ratio=vals[0], index=vals[1], cut=vals[2], env=vals[3]; var baseY=H-12, top=14;\n    var rq=Math.round((0.5+ratio*6.5)*2)/2;\n    // filter env sweeps cutoff (loops) — RCM movement\n    var cyc=(ts/1600)%1; var fenv=Math.exp(-cyc*(1+env*3)); var effCut=cut+env*0.5*fenv; if(effCut>1)effCut=1;\n    // FM harmonic spectrum bars (magenta), attenuated above cutoff\n    var N=30;\n    for(var h=1;h<=N;h++){ var f=(h*rq*0.11)%3.0; // spectral position spread by ratio (folded)\n      var lx=(h/N); // draw evenly for clarity\n      // FM harmonic amplitude grows with Index\n      var amp=(1/(1+h*0.35))*(0.4+index*0.9*Math.abs(Math.sin(h*rq*0.7)));\n      // filter attenuation\n      var roll = lx<=effCut ? 1 : Math.exp(-(lx-effCut)*7);\n      var reso = (Math.abs(lx-effCut)<0.03)?1.6:1; // resonant bump\n      var a=amp*roll*reso; var bh=Math.min(baseY-top, a*(baseY-top));\n      var x=12+lx*(W-24);\n      ctx.strokeStyle=\"rgba(224,80,154,\"+(0.35+a*0.5)+\")\"; ctx.lineWidth=Math.max(2,(W-24)/N-2.5);\n      ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x,baseY-bh); ctx.stroke();\n    }\n    // filter response curve (cyan)\n    ctx.beginPath();\n    for(var xx=0;xx<=W-24;xx+=3){ var lx=xx/(W-24); var roll= lx<=effCut?1:Math.exp(-(lx-effCut)*7); var reso=(Math.abs(lx-effCut)<0.04)?(1+ (0.6)):1; var y=baseY-(roll*reso)*(baseY-top)*0.9; if(xx===0)ctx.moveTo(12+xx,y); else ctx.lineTo(12+xx,y); }\n    ctx.strokeStyle=\"rgba(80,200,208,0.9)\"; ctx.lineWidth=1.8; ctx.shadowColor=\"#50c8d0\"; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0;\n    // cutoff marker\n    var cx=12+effCut*(W-24); ctx.strokeStyle=\"rgba(80,200,208,0.4)\"; ctx.setLineDash([3,3]); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx,top); ctx.lineTo(cx,baseY); ctx.stroke(); ctx.setLineDash([]);\n    requestAnimationFrame(frame); }\n  requestAnimationFrame(frame);\n  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script><\/body><\/html>\n";

  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};
  var oct=0;                                              // octave offset (−4..+4), applied at note-on
  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function setOct(o){ oct=o<-4?-4:(o>4?4:o); var ov=document.getElementById('octval'); if(ov)ov.textContent=(4+oct); }
  function down(m,el){ ensure().then(function(){ if(ctx.state==='suspended')ctx.resume(); if(ex&&ex.noteOn) ex.noteOn(m,hz(m),0.9); }); if(el)el.classList.add('dn'); }
  function up(m,el){ if(ex&&ex.noteOff) ex.noteOff(m); if(el)el.classList.remove('dn'); }
  KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];
    el.addEventListener('pointerdown',function(e){e.preventDefault();el._n=k[1]+oct*12;down(el._n,el);});
    el.addEventListener('pointerup',function(){up(el._n,el);}); el.addEventListener('pointerleave',function(){if(el.classList.contains('dn'))up(el._n,el);});
    KB.appendChild(el); });
  document.getElementById('octdn').addEventListener('click',function(){setOct(oct-1);});
  document.getElementById('octup').addEventListener('click',function(){setOct(oct+1);});
  var held={};                                            // base note -> actual note played (so releases survive an octave change)
  window.addEventListener('keydown',function(e){ if(e.repeat)return;
    if(e.key==='z'||e.key==='Z'){setOct(oct-1);return;} if(e.key==='x'||e.key==='X'){setOct(oct+1);return;}
    var b=KMAP[e.key]; if(b&&!held[b]){var m=b+oct*12;held[b]=m;down(m,null);} });
  window.addEventListener('keyup',function(e){ var b=KMAP[e.key]; if(b&&held[b]!=null){up(held[b],null);held[b]=null;} });
  setOct(0);
  
  </script></body></html>
