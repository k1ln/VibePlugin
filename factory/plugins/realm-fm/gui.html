<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Realm FM</title>
<style>
  :root{ --acc:#e0509a; --acc2:#50c8d0; --bg0:#0e0710; --bg1:#1a0d1e; --ink:#f6e9f2; --dim:#9a7090; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#2a1230 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#1c0f22,#0e0710); border:1px solid rgba(224,80,154,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(246,233,242,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.0s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
  .screen{ height:104px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#180b1c,#0d0710); border:1px solid rgba(224,80,154,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(232,214,228,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(224,80,154,.6)); }
  .pcap{ fill:#160a1a; stroke:rgba(224,80,154,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(224,80,154,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(224,80,154,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">REALM&nbsp;FM</span><span class="sub">fm + filter (rcm)</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">FM&nbsp;·&nbsp;FILTER</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Ratio",idx:0,def:0.28},{name:"Index",idx:1,def:0.45},{name:"Cutoff",idx:2,def:0.5},{name:"Env",idx:3,def:0.6},{name:"Decay",idx:4,def:0.6},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0509a"/><stop offset="1" stop-color="#50c8d0"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=(p.idx===0)?(Math.round((0.5+v*6.5)*2)/2).toFixed(1)+":1":Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function frame(ts){ ctx.clearRect(0,0,W,H); var ratio=vals[0], index=vals[1], cut=vals[2], env=vals[3]; var baseY=H-12, top=14;
    var rq=Math.round((0.5+ratio*6.5)*2)/2;
    // filter env sweeps cutoff (loops) — RCM movement
    var cyc=(ts/1600)%1; var fenv=Math.exp(-cyc*(1+env*3)); var effCut=cut+env*0.5*fenv; if(effCut>1)effCut=1;
    // FM harmonic spectrum bars (magenta), attenuated above cutoff
    var N=30;
    for(var h=1;h<=N;h++){ var f=(h*rq*0.11)%3.0; // spectral position spread by ratio (folded)
      var lx=(h/N); // draw evenly for clarity
      // FM harmonic amplitude grows with Index
      var amp=(1/(1+h*0.35))*(0.4+index*0.9*Math.abs(Math.sin(h*rq*0.7)));
      // filter attenuation
      var roll = lx<=effCut ? 1 : Math.exp(-(lx-effCut)*7);
      var reso = (Math.abs(lx-effCut)<0.03)?1.6:1; // resonant bump
      var a=amp*roll*reso; var bh=Math.min(baseY-top, a*(baseY-top));
      var x=12+lx*(W-24);
      ctx.strokeStyle="rgba(224,80,154,"+(0.35+a*0.5)+")"; ctx.lineWidth=Math.max(2,(W-24)/N-2.5);
      ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x,baseY-bh); ctx.stroke();
    }
    // filter response curve (cyan)
    ctx.beginPath();
    for(var xx=0;xx<=W-24;xx+=3){ var lx=xx/(W-24); var roll= lx<=effCut?1:Math.exp(-(lx-effCut)*7); var reso=(Math.abs(lx-effCut)<0.04)?(1+ (0.6)):1; var y=baseY-(roll*reso)*(baseY-top)*0.9; if(xx===0)ctx.moveTo(12+xx,y); else ctx.lineTo(12+xx,y); }
    ctx.strokeStyle="rgba(80,200,208,0.9)"; ctx.lineWidth=1.8; ctx.shadowColor="#50c8d0"; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0;
    // cutoff marker
    var cx=12+effCut*(W-24); ctx.strokeStyle="rgba(80,200,208,0.4)"; ctx.setLineDash([3,3]); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(cx,top); ctx.lineTo(cx,baseY); ctx.stroke(); ctx.setLineDash([]);
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
