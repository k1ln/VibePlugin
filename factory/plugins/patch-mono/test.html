<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patch Mono — test bench</title><style>
  :root{--ac:#ffd23f}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Patch Mono</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

    <div class="kb" id="kb"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n/* ============================================================\n   PATCH MONO — semi-modular monophonic voice\n   Aggressive grey/green panel, live patch cables, dual HP/LP\n   filters, brass patchbay. Bespoke. Nothing templated.\n   ============================================================ */\n@property --n{syntax:'<number>';inherits:true;initial-value:0}\n\n:root{\n  --ac:#ffd23f;              /* spec accent (gold) — cable + jack glow */\n  --ac2:#ffe066;\n  --grn:#5fe08a;             /* signal green */\n  --grn2:#2fb56a;\n  --grn-dk:#0c2417;\n  --metal:#3a4248;\n  --metal2:#262c31;\n  --line:rgba(150,255,190,.10);\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:#cdd8d2;\n  background:\n    radial-gradient(120% 90% at 50% -10%,#1a221f 0%,#0c100e 60%,#050806 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:18px;\n  -webkit-font-smoothing:antialiased;\n}\n\n/* ---- the chassis -------------------------------------------------- */\n.unit{\n  position:relative;width:100%;max-width:640px;\n  border-radius:14px;overflow:hidden;\n  background:\n    linear-gradient(180deg,#454d52 0%,#363d42 6%,#2b3136 7%,#262b30 100%);\n  border:1px solid #11161a;\n  box-shadow:\n    0 36px 80px rgba(0,0,0,.62),\n    0 2px 0 rgba(255,255,255,.06) inset,\n    0 -16px 40px rgba(0,0,0,.5) inset;\n  animation:rise .6s cubic-bezier(.2,.8,.2,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(22px) scale(.985)}to{opacity:1;transform:none}}\n\n/* brushed-metal micro texture via repeating gradient */\n.unit::before{\n  content:\"\";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.5;\n  background:repeating-linear-gradient(96deg,rgba(255,255,255,.035) 0 1px,transparent 1px 3px);\n  mix-blend-mode:overlay;\n}\n/* rack screws */\n.scr{position:absolute;width:13px;height:13px;border-radius:50%;z-index:6;\n  background:radial-gradient(circle at 38% 34%,#7c858b,#2a2f33 70%,#16191c);\n  box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4) inset}\n.scr::after{content:\"\";position:absolute;inset:4px;border-top:1.5px solid rgba(0,0,0,.55);transform:rotate(35deg)}\n.scr.tl{top:9px;left:9px}.scr.tr{top:9px;right:9px}\n.scr.bl{bottom:9px;left:9px}.scr.br{bottom:9px;right:9px}\n\n/* ---- header strip ------------------------------------------------- */\n.head{position:relative;z-index:3;display:flex;align-items:center;gap:12px;\n  padding:13px 22px;border-bottom:1px solid #11161a;\n  background:linear-gradient(180deg,rgba(95,224,138,.06),rgba(0,0,0,0))}\n.pwr{position:relative;width:13px;height:13px;border-radius:50%;flex:none;\n  background:radial-gradient(circle at 40% 35%,#bfffd6,var(--grn) 45%,#0a3a22 90%);\n  box-shadow:0 0 10px var(--grn),0 0 2px #fff inset;animation:beat 2.6s ease-in-out infinite}\n@keyframes beat{0%,100%{box-shadow:0 0 6px var(--grn)}50%{box-shadow:0 0 16px var(--grn),0 0 4px #eafff1}}\n.title{flex:1;min-width:0}\n.title b{display:block;font-size:17px;font-weight:800;letter-spacing:.04em;\n  color:#eaf4ee;text-shadow:0 1px 0 #000,0 0 18px rgba(95,224,138,.25)}\n.title b i{font-style:normal;color:var(--grn)}\n.title span{display:block;font-size:9.5px;letter-spacing:.32em;text-transform:uppercase;color:#7d8a83;margin-top:2px}\n.tag{font:700 9px/1 ui-monospace,monospace;letter-spacing:.18em;color:#0b1410;\n  background:linear-gradient(180deg,var(--grn),var(--grn2));\n  padding:5px 9px;border-radius:5px;box-shadow:0 0 14px rgba(95,224,138,.4)}\n\n/* ---- main body : two halves : modules + patchbay ------------------ */\n.body{position:relative;z-index:2;display:grid;grid-template-columns:1fr;gap:0;padding:0}\n\n/* SVG cable overlay sits above panel, under jacks' glow but over knobs labels */\n#cables{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:visible}\n\n/* module section heading */\n.sect{position:relative;z-index:2;display:flex;align-items:center;gap:9px;\n  padding:14px 22px 2px;font:700 9.5px/1 ui-monospace,monospace;\n  letter-spacing:.26em;text-transform:uppercase;color:#5fe08a;opacity:.85}\n.sect::after{content:\"\";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}\n.sect .dot{width:5px;height:5px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn)}\n\n/* knob grid */\n.rack{position:relative;z-index:2;display:grid;\n  grid-template-columns:repeat(4,1fr);gap:6px 4px;padding:8px 16px 4px}\n@media(max-width:520px){.rack{grid-template-columns:repeat(2,1fr)}}\n\n.mod{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;\n  padding:12px 6px 11px;border-radius:11px;\n  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.18));\n  border:1px solid rgba(255,255,255,.04);\n  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 -8px 18px rgba(0,0,0,.25) inset;\n  transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;\n  animation:pop .5s both;animation-delay:var(--d)}\n@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n.mod:hover{transform:translateY(-2px);border-color:rgba(95,224,138,.28);\n  box-shadow:0 10px 24px rgba(0,0,0,.4),0 0 0 1px rgba(95,224,138,.18) inset}\n.mod.filt{background:linear-gradient(180deg,rgba(95,224,138,.07),rgba(0,0,0,.22))}\n\n/* ---- the KNOB ----------------------------------------------------- */\n.knob{position:relative;width:74px;height:74px;cursor:ns-resize;user-select:none;touch-action:none}\n/* outer scale ticks */\n.knob .scale{position:absolute;inset:-6px;border-radius:50%;\n  background:repeating-conic-gradient(from 215deg,\n     rgba(180,200,190,.35) 0 1.1deg,transparent 1.1deg 14.7deg);\n  -webkit-mask:radial-gradient(circle,transparent 38px,#000 39px,#000 41px,transparent 42px);\n  mask:radial-gradient(circle,transparent 38px,#000 39px,#000 41px,transparent 42px)}\n/* progress arc — green by default, gold on the filter knobs via .gold */\n.knob .arc{--n:0;position:absolute;inset:0;border-radius:50%;\n  background:conic-gradient(from 215deg,\n     var(--ring,var(--grn)) calc(var(--n)*270deg),\n     rgba(255,255,255,.06) calc(var(--n)*270deg) 270deg,\n     transparent 270deg 360deg);\n  filter:drop-shadow(0 0 calc(3px + var(--n)*8px) color-mix(in srgb,var(--ring,var(--grn)) 65%,transparent));\n  transition:--n .13s cubic-bezier(.2,.75,.25,1)}\n/* metal cap */\n.knob .cap{position:absolute;top:9px;left:9px;width:56px;height:56px;border-radius:50%;\n  background:\n    radial-gradient(circle at 50% 26%,#5b656c,#2a3035 58%,#13181c 100%);\n  box-shadow:\n    0 2px 6px rgba(0,0,0,.6),\n    0 1px 0 rgba(255,255,255,.10) inset,\n    0 -10px 14px rgba(0,0,0,.55) inset}\n/* knurled grip ring */\n.knob .cap::before{content:\"\";position:absolute;inset:3px;border-radius:50%;\n  background:repeating-conic-gradient(#0000 0 6deg,rgba(255,255,255,.05) 6deg 7deg);\n  mask:radial-gradient(circle,transparent 18px,#000 19px)}\n/* pointer notch */\n.knob .ptr{position:absolute;top:6px;left:50%;width:3px;height:21px;margin-left:-1.5px;border-radius:2px;\n  background:linear-gradient(var(--ring,var(--grn)),#fff);\n  box-shadow:0 0 8px var(--ring,var(--grn));\n  transform-origin:50% 31px;\n  transform:rotate(calc((var(--n,0) - .5) * 270deg));\n  transition:transform .13s cubic-bezier(.2,.75,.25,1)}\n.knob.act .cap{box-shadow:0 2px 6px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.14) inset,\n  0 -10px 14px rgba(0,0,0,.55) inset,0 0 0 2px color-mix(in srgb,var(--ring,var(--grn)) 50%,transparent)}\n\n.lbl{font:700 9.5px/1.1 ui-monospace,monospace;letter-spacing:.07em;text-transform:uppercase;\n  color:#9fb0a8;text-align:center}\n.mod.filt .lbl{color:#e9dca0}\n.read{font:800 12px/1 ui-monospace,monospace;color:#eaf4ee;font-variant-numeric:tabular-nums;\n  min-height:12px;text-shadow:0 0 8px rgba(95,224,138,.3)}\n\n/* bubble while dragging */\n.bub{position:absolute;top:-15px;left:50%;transform:translate(-50%,5px) scale(.85);opacity:0;\n  pointer-events:none;font:800 11px/1 ui-monospace,monospace;color:#06120c;\n  background:var(--ring,var(--grn));padding:3px 7px;border-radius:5px;\n  font-variant-numeric:tabular-nums;box-shadow:0 4px 12px rgba(0,0,0,.5);transition:.14s;white-space:nowrap}\n.knob.act .bub,.mod:hover .bub{opacity:1;transform:translate(-50%,0) scale(1)}\n\n/* ---- PATCHBAY ----------------------------------------------------- */\n.bay{position:relative;z-index:2;margin:10px 16px 16px;border-radius:11px;\n  background:linear-gradient(180deg,#1b211e,#0d120f);\n  border:1px solid #0a0e0c;\n  box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 14px 30px rgba(0,0,0,.4) inset}\n.bay .baylabel{font:700 9px/1 ui-monospace,monospace;letter-spacing:.26em;color:#6f7d76;\n  text-transform:uppercase;padding:9px 14px 0}\n.jacks{display:flex;gap:14px;flex-wrap:wrap;padding:9px 16px 14px;justify-content:center}\n.jk{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px}\n.jk .ring{position:relative;width:30px;height:30px;border-radius:50%;\n  background:radial-gradient(circle at 40% 34%,#c9a23a,#7a5e16 55%,#3a2c09 100%);\n  box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 0 2px #1a130400 inset}\n.jk .ring::after{content:\"\";position:absolute;inset:8px;border-radius:50%;\n  background:radial-gradient(circle at 50% 40%,#14110a,#000 80%);\n  box-shadow:0 0 0 1px rgba(255,220,120,.25) inset,0 1px 2px rgba(0,0,0,.9) inset}\n.jk.lit .ring{box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 12px var(--ac)}\n.jk .jl{font:700 8px/1 ui-monospace,monospace;letter-spacing:.1em;color:#8c9a91;text-transform:uppercase}\n\n/* ---- footer / explanation ---------------------------------------- */\n.foot{position:relative;z-index:2;font:11px/1.5 ui-sans-serif,system-ui;\n  color:#7e8b83;padding:0 22px 16px;border-top:1px solid rgba(255,255,255,.04);margin-top:2px;padding-top:11px}\n.foot b{color:var(--grn);font-weight:700}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"unit\" id=\"unit\">\n  <span class=\"scr tl\"><\/span><span class=\"scr tr\"><\/span>\n  <span class=\"scr bl\"><\/span><span class=\"scr br\"><\/span>\n\n  <div class=\"head\">\n    <span class=\"pwr\"><\/span>\n    <div class=\"title\"><b>PATCH&nbsp;<i>MONO<\/i><\/b><span>semi&middot;modular monophonic voice<\/span><\/div>\n    <span class=\"tag\">8&nbsp;CV<\/span>\n  <\/div>\n\n  <!-- cables drawn over everything but jacks' light -->\n  <svg id=\"cables\" preserveAspectRatio=\"none\"><\/svg>\n\n  <div class=\"body\">\n\n    <div class=\"sect\"><span class=\"dot\"><\/span>oscillators<\/div>\n    <div class=\"rack\" id=\"rackOsc\"><\/div>\n\n    <div class=\"sect\"><span class=\"dot\"><\/span>dual filter<\/div>\n    <div class=\"rack\" id=\"rackFilt\"><\/div>\n\n    <div class=\"sect\"><span class=\"dot\"><\/span>envelope<\/div>\n    <div class=\"rack\" id=\"rackEnv\"><\/div>\n\n    <div class=\"bay\">\n      <div class=\"baylabel\">patchbay &mdash; routed<\/div>\n      <div class=\"jacks\" id=\"jacks\"><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"foot\">\n    Two detuned oscillators (<b>saw<\/b> + triangle-pulse with ring-mod core) drive an\n    <b>HP&rarr;LP<\/b> resonant chain that can self-oscillate. ADSR shapes amp &amp; cutoff. Last-note priority.\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  /* ---- SINGLE SOURCE OF TRUTH : a verbatim mirror of spec.json -------\n   * These rows MUST match factory/plugins/patch-mono/spec.json exactly\n   * (index, name, min, max, default). They are the contract the engine\n   * sees; nothing here may diverge from the spec. Keep them byte-for-byte\n   * with the spec's \"name\" so host automation, presets and the param\n   * tooltips all agree. checkSpec() below shouts in the console if a row\n   * ever drifts (gap / dupe / out-of-range default / wrong count).      */\n  var SPEC = [\n    {index:0, name:\"OscMix\",    min:0, max:1, default:0.4 },\n    {index:1, name:\"Detune\",    min:0, max:1, default:0.25},\n    {index:2, name:\"LP Cutoff\", min:0, max:1, default:0.55},\n    {index:3, name:\"HP Cutoff\", min:0, max:1, default:0.05},\n    {index:4, name:\"Resonance\", min:0, max:1, default:0.6 },\n    {index:5, name:\"EnvAmount\", min:0, max:1, default:0.55},\n    {index:6, name:\"Attack\",    min:0, max:1, default:0.04},\n    {index:7, name:\"Release\",   min:0, max:1, default:0.35}\n  ];\n\n  /* ---- DISPLAY-ONLY skin, keyed by spec index ----------------------- *\n   * Purely cosmetic: a friendlier on-panel label, which rack the knob\n   * lives in, its ring colour and its short patchbay tag. None of this\n   * touches the contract — only what the human sees. Where the spec name\n   * is already display-ready (Detune, Attack…) the label just repeats it.*/\n  var VIEW = {\n    0:{label:\"Osc Mix\",   grp:\"Osc\",  ring:\"grn\", jack:\"MIX\"},\n    1:{label:\"Detune\",    grp:\"Osc\",  ring:\"grn\", jack:\"DET\"},\n    2:{label:\"LP Cutoff\", grp:\"Filt\", ring:\"gold\",jack:\"LP\" },\n    3:{label:\"HP Cutoff\", grp:\"Filt\", ring:\"gold\",jack:\"HP\" },\n    4:{label:\"Resonance\", grp:\"Filt\", ring:\"gold\",jack:\"RES\"},\n    5:{label:\"Env Amount\",grp:\"Env\",  ring:\"grn\", jack:\"ENV\"},\n    6:{label:\"Attack\",    grp:\"Env\",  ring:\"grn\", jack:\"ATK\"},\n    7:{label:\"Release\",   grp:\"Env\",  ring:\"grn\", jack:\"REL\"}\n  };\n\n  /* derive the working view-model from the one source of truth, so there\n   * is exactly ONE place (SPEC) to edit when the spec changes.          */\n  var PARAMS = SPEC.map(function(s){\n    var v = VIEW[s.index] || {};\n    return {\n      i:s.index, name:s.name,                 // contract name (== spec.json)\n      label:v.label || s.name,                // what the panel prints\n      min:s.min, max:s.max, def:s.default,\n      grp:v.grp || \"Osc\", ring:v.ring || \"grn\",\n      jack:v.jack || (\"P\"+s.index)\n    };\n  });\n\n  /* loud-on-drift guard: never silently desync from the spec. Validates\n   * the SPEC rows are a contiguous 0..n-1 set with sane defaults.       */\n  function checkSpec(){\n    var seen={}, ok=true;\n    SPEC.forEach(function(s){\n      if(s.index in seen){ ok=false; console.warn(\"[patch-mono] duplicate param index \"+s.index); }\n      seen[s.index]=1;\n      if(s.default<s.min || s.default>s.max){ ok=false;\n        console.warn(\"[patch-mono] param \"+s.index+\" (\"+s.name+\") default \"+s.default+\" outside [\"+s.min+\",\"+s.max+\"]\"); }\n    });\n    for(var i=0;i<SPEC.length;i++) if(!(i in seen)){\n      ok=false; console.warn(\"[patch-mono] missing param index \"+i+\" (indices must be contiguous 0..\"+(SPEC.length-1)+\")\"); }\n    return ok;\n  }\n\n  var GOLD=\"#ffd23f\", GRN=\"#5fe08a\";\n\n  function fmt(v){ return (v*100).toFixed(0).padStart(2,'0')+\"%\"; } /* 0..1 → percent */\n\n  var ctrls=[]; /* each: {p, knob, paint, jack, cx, cy} */\n\n  function build(p){\n    var grpClass = p.grp===\"Filt\" ? \" filt\" : \"\";\n    var mod=document.createElement('div');\n    mod.className='mod'+grpClass;\n    mod.style.setProperty('--d', (p.i*55)+'ms');\n    mod.style.setProperty('--ring', p.ring==='gold'?GOLD:GRN);\n\n    var knob=document.createElement('div'); knob.className='knob';\n    knob.innerHTML='<i class=\"scale\"><\/i><i class=\"arc\"><\/i><i class=\"cap\"><\/i><i class=\"ptr\"><\/i><span class=\"bub\"><\/span>';\n    var lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=p.label;\n    var read=document.createElement('div'); read.className='read';\n    mod.appendChild(knob); mod.appendChild(lbl); mod.appendChild(read);\n\n    var arc=knob.querySelector('.arc'), ptr=knob.querySelector('.ptr'), bub=knob.querySelector('.bub');\n    var val=p.def;\n    function norm(){ return (val-p.min)/((p.max-p.min)||1); }\n    function paint(){\n      var n=norm();\n      arc.style.setProperty('--n',n);\n      ptr.style.setProperty('--n',n);\n      var t=fmt(n);\n      read.textContent=t; bub.textContent=p.label+\"  \"+t;\n      if(window.vstai && window.vstai.setParam) window.vstai.setParam(p.i, val);\n    }\n    function setN(n){ n=n<0?0:(n>1?1:n); val=p.min+(p.max-p.min)*n; paint(); refreshCable(p.i,n); }\n\n    /* drag */\n    var dragging=false, startY=0, startN=0;\n    knob.addEventListener('pointerdown',function(e){\n      dragging=true; startY=e.clientY; startN=norm(); knob.classList.add('act');\n      knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener('pointermove',function(e){\n      if(!dragging) return;\n      var fine=e.shiftKey?4:1;\n      setN(startN+(startY-e.clientY)/(190*fine));\n    });\n    function end(){ dragging=false; knob.classList.remove('act'); }\n    knob.addEventListener('pointerup',end);\n    knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){ val=p.def; paint(); refreshCable(p.i,norm()); });\n    knob.addEventListener('wheel',function(e){ e.preventDefault(); setN(norm()+(e.deltaY<0?0.02:-0.02)); },{passive:false});\n\n    var rack = p.grp===\"Osc\"?document.getElementById('rackOsc')\n             : p.grp===\"Filt\"?document.getElementById('rackFilt')\n             : document.getElementById('rackEnv');\n    rack.appendChild(mod);\n\n    return {p:p, knob:knob, mod:mod, paint:paint, norm:norm};\n  }\n\n  /* ---- patchbay jacks ---------------------------------------------- */\n  function buildJacks(){\n    var wrap=document.getElementById('jacks');\n    PARAMS.forEach(function(p){\n      var jk=document.createElement('div'); jk.className='jk'; jk.dataset.i=p.i;\n      jk.innerHTML='<div class=\"ring\"><\/div><div class=\"jl\">'+p.jack+'<\/div>';\n      jk.style.setProperty('--ac', p.ring==='gold'?GOLD:GRN);\n      wrap.appendChild(jk);\n    });\n  }\n\n  /* ---- live patch cables (SVG) ------------------------------------- *\n   * Each knob is wired to its matching jack with a sagging bezier.\n   * The cable's brightness/sag responds to the param value.            */\n  var svg=document.getElementById('cables');\n  var cableEls={}; /* i -> {path, glow} */\n\n  function center(el, ref){\n    var r=el.getBoundingClientRect(), b=ref.getBoundingClientRect();\n    return {x:r.left-b.left+r.width/2, y:r.top-b.top+r.height/2};\n  }\n  function layoutCables(){\n    var unit=document.getElementById('unit');\n    var ub=unit.getBoundingClientRect();\n    svg.setAttribute('viewBox','0 0 '+ub.width+' '+ub.height);\n    svg.setAttribute('width',ub.width); svg.setAttribute('height',ub.height);\n    PARAMS.forEach(function(p){\n      var c=ctrls[p.i];\n      var jk=document.querySelector('.jk[data-i=\"'+p.i+'\"] .ring');\n      if(!c||!jk) return;\n      var a=center(c.knob, unit), b=center(jk, unit);\n      var d=cableEls[p.i];\n      d._a=a; d._b=b;\n      drawCable(p.i, c.norm());\n    });\n  }\n  function drawCable(i,n){\n    var d=cableEls[i]; if(!d||!d._a) return;\n    var a=d._a, b=d._b;\n    var dx=b.x-a.x, dy=b.y-a.y;\n    var dist=Math.sqrt(dx*dx+dy*dy);\n    var sag = 26 + n*46;                  /* more signal → heavier droop */\n    var mx=(a.x+b.x)/2, my=(a.y+b.y)/2 + sag;\n    var path='M '+a.x+' '+a.y+' Q '+mx+' '+my+' '+b.x+' '+b.y;\n    d.glow.setAttribute('d',path);\n    d.core.setAttribute('d',path);\n    var op = 0.18 + n*0.55;\n    d.glow.setAttribute('opacity', op);\n    d.core.setAttribute('stroke-width', 2.2);\n  }\n  function refreshCable(i,n){\n    drawCable(i,n);\n    var jk=document.querySelector('.jk[data-i=\"'+i+'\"]');\n    if(jk){ if(n>0.04) jk.classList.add('lit'); else jk.classList.remove('lit'); }\n  }\n\n  function
