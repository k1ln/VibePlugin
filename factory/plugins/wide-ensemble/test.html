<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wide Ensemble — test bench</title><style>
  :root{--ac:#5ad0ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Wide Ensemble</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

    <div class="row"><label>Source

  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Wide Ensemble<\/title>\n<style>\n  :root{\n    --acc:#5ad0ff; --acc2:#9a7bff;\n    --cream:#efe6d2; --cream2:#e3d6bb; --ink:#2a2418;\n    --chrome1:#fbfdff; --chrome2:#aeb6bf; --chrome3:#6c747d;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}\n  html,body{height:100%}\n  body{\n    font-family:\"Avenir Next\",\"Helvetica Neue\",Arial,sans-serif;\n    background:radial-gradient(120% 140% at 50% -10%,#3a4350 0%,#1a1d22 55%,#0c0e11 100%);\n    color:var(--ink); display:flex; align-items:center; justify-content:center;\n    padding:18px; overflow:hidden;\n  }\n\n  /* ---------- the unit ---------- */\n  .unit{\n    width:560px; border-radius:18px; position:relative;\n    background:\n      linear-gradient(180deg,#f6efde 0%,var(--cream) 18%,var(--cream2) 82%,#cdbe9d 100%);\n    box-shadow:\n      0 26px 60px rgba(0,0,0,.55),\n      0 2px 0 rgba(255,255,255,.6) inset,\n      0 -3px 14px rgba(0,0,0,.22) inset;\n    border:1px solid #b7a884;\n    padding:18px 20px 22px;\n  }\n  /* faint speckled vintage texture */\n  .unit::before{\n    content:\"\"; position:absolute; inset:0; border-radius:18px; pointer-events:none;\n    background-image:radial-gradient(rgba(120,100,60,.10) 1px,transparent 1px);\n    background-size:5px 5px; opacity:.5; mix-blend-mode:multiply;\n  }\n  /* corner screws */\n  .screw{position:absolute;width:13px;height:13px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#fff,#9a9088 60%,#5c554b);\n    box-shadow:0 1px 2px rgba(0,0,0,.4),0 0 0 1px rgba(0,0,0,.15);}\n  .screw::after{content:\"\";position:absolute;inset:3px;border-top:1.5px solid #6a6258;transform:rotate(35deg);border-radius:2px}\n  .screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}\n  .screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}\n\n  /* ---------- header ---------- */\n  .head{display:flex;align-items:center;justify-content:space-between;margin:2px 6px 14px}\n  .brand{display:flex;flex-direction:column;gap:1px}\n  .brand .mk{font-size:10px;letter-spacing:3px;color:#8a7c5c;font-weight:700}\n  .brand h1{\n    font-size:25px;font-weight:800;letter-spacing:.5px;\n    color:#23201a;text-shadow:0 1px 0 rgba(255,255,255,.55);\n  }\n  .brand h1 .b{\n    background:linear-gradient(90deg,var(--acc),var(--acc2));\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n  }\n  .badge{\n    font-size:9px;letter-spacing:2px;color:#7a6e50;border:1px solid #b3a583;\n    padding:4px 8px;border-radius:20px;background:rgba(255,255,255,.35);text-align:right;line-height:1.5\n  }\n\n  /* ---------- stereo scope ---------- */\n  .scope{\n    position:relative;height:150px;border-radius:12px;overflow:hidden;margin:0 0 16px;\n    background:linear-gradient(180deg,#0c1620,#12202c 50%,#0a141c);\n    box-shadow:0 2px 10px rgba(0,0,0,.5) inset,0 0 0 1px #2b2316,0 1px 0 rgba(255,255,255,.4);\n    border:3px solid #1b160d;\n  }\n  .scope svg{position:absolute;inset:0;width:100%;height:100%}\n  .glass{position:absolute;inset:0;pointer-events:none;\n    background:linear-gradient(120deg,rgba(255,255,255,.10),transparent 40%);}\n  .lbl{position:absolute;font-size:9px;letter-spacing:2px;color:rgba(140,200,235,.55);top:7px}\n  .lbl.l{left:9px}.lbl.r{right:9px}\n  .lbl.mid{left:50%;transform:translateX(-50%);bottom:6px;top:auto;color:rgba(160,150,235,.55)}\n\n  /* ---------- mode rocker ---------- */\n  .moderow{display:flex;align-items:center;gap:14px;margin:0 4px 16px}\n  .rocker{\n    position:relative;width:188px;height:42px;border-radius:24px;cursor:pointer;\n    background:linear-gradient(180deg,#cfc09f,#b7a67f);\n    box-shadow:0 2px 5px rgba(0,0,0,.35) inset,0 1px 0 rgba(255,255,255,.5);\n    border:1px solid #9c8c66;overflow:hidden;flex:none;\n  }\n  .rocker .track{position:absolute;inset:4px;border-radius:20px;display:flex}\n  .rocker .opt{flex:1;display:flex;align-items:center;justify-content:center;\n    font-size:10px;letter-spacing:2px;font-weight:800;color:#6d6044;z-index:2;transition:color .25s}\n  .rocker .opt.on{color:#0b1a22}\n  .rocker .knobcap{\n    position:absolute;top:3px;left:3px;width:50%;height:calc(100% - 6px);border-radius:18px;\n    background:linear-gradient(180deg,var(--chrome1),var(--chrome2) 55%,var(--chrome3));\n    box-shadow:0 2px 6px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.8) inset;\n    transition:transform .32s cubic-bezier(.5,1.6,.4,1),background .3s;z-index:1;\n  }\n  .rocker.vib .knobcap{transform:translateX(calc(100% - 6px));\n    background:linear-gradient(180deg,#dfe6ff,#b9a8ff 55%,#7c63d4);}\n  .modeval{font-size:10px;color:#6c5f44;letter-spacing:1px}\n  .modeval b{color:#3a3324}\n\n  /* ---------- knob row ---------- */\n  .knobs{display:flex;justify-content:space-between;gap:10px;padding:4px 2px 0}\n  .ctl{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1}\n  .dial{\n    --a:135deg; position:relative;width:84px;height:84px;border-radius:50%;cursor:grab;\n    background:\n      radial-gradient(circle at 50% 38%,#fafafa,#dfe3e7 42%,#aab1b8 70%,#7d848b 100%);\n    box-shadow:0 6px 12px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.9) inset,0 -3px 8px rgba(0,0,0,.25) inset;\n    border:1px solid #6b727a;touch-action:none;\n  }\n  .dial:active{cursor:grabbing}\n  .dial .ring{position:absolute;inset:-7px;border-radius:50%;pointer-events:none}\n  .dial .cap{position:absolute;inset:13px;border-radius:50%;\n    background:radial-gradient(circle at 42% 32%,#fff,#e7eaee 45%,#c2c8ce 78%,#9aa1a8);\n    box-shadow:0 1px 3px rgba(0,0,0,.3) inset;}\n  .dial .ptr{position:absolute;left:50%;top:9px;width:4px;height:24px;margin-left:-2px;\n    border-radius:3px;background:linear-gradient(180deg,var(--acc),var(--acc2));\n    transform-origin:50% 33px;box-shadow:0 0 7px var(--acc);}\n  .ctl .nm{font-size:10px;lett " stop-opacity=\"1\"/>\n            <stop offset=\"1\" stop-color=\"#9a7bff\" stop-opacity=\"0\"/>\n          <\/linearGradient>\n        <\/defs>\n        <line x1=\"0\" y1=\"75\" x2=\"560\" y2=\"75\" stroke=\"rgba(120,160,190,.18)\" stroke-width=\"1\"/>\n        <path id=\"waveL\" fill=\"none\" stroke=\"url(#gl)\" stroke-width=\"2.2\" opacity=\".95\"/>\n        <path id=\"waveR\" fill=\"none\" stroke=\"url(#gr)\" stroke-width=\"2.2\" opacity=\".95\"/>\n        <path id=\"waveLg\" fill=\"none\" stroke=\"#5ad0ff\" stroke-width=\"6\" opacity=\".10\"/>\n        <path id=\"waveRg\" fill=\"none\" stroke=\"#9a7bff\" stroke-width=\"6\" opacity=\".10\"/>\n      <\/svg>\n      <div class=\"glass\"><\/div>\n      <div class=\"lbl l\">LEFT<\/div>\n      <div class=\"lbl r\">RIGHT<\/div>\n      <div class=\"lbl mid\" id=\"modetag\">CHORUS · WIDE<\/div>\n    <\/div>\n\n    <div class=\"moderow\">\n      <div class=\"rocker\" id=\"rocker\">\n        <div class=\"knobcap\"><\/div>\n        <div class=\"track\">\n          <div class=\"opt on\" data-m=\"0\">CHORUS<\/div>\n          <div class=\"opt\" data-m=\"1\">VIBRATO<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"modeval\">MODE&nbsp; <b id=\"modeNum\">0%<\/b> &nbsp;swirl→wobble<\/div>\n    <\/div>\n\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n\n    <div class=\"foot\">\n      <span><span class=\"led\"><\/span>BUCKET-BRIGADE<\/span>\n      <span>WIDE ENSEMBLE · MK I<\/span>\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n  // host bridge ------------------------------------------------------\n  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n\n  // params: index, name, default, value-formatter -------------------\n  var SPEC=[\n    {i:0,nm:\"RATE\", def:0.32, fmt:function(v){return (0.05+v*v*5.95).toFixed(2)+\" Hz\";}},\n    {i:1,nm:\"DEPTH\",def:0.55, fmt:function(v){return Math.round(v*100)+\"%\";}},\n    {i:3,nm:\"TONE\", def:0.45, fmt:function(v){return Math.round(v*100)+\"%\";}},\n    {i:4,nm:\"MIX\",  def:0.85, fmt:function(v){return Math.round(v*100)+\"%\";}}\n  ];\n  var MODE={i:2,def:0,val:0};\n  var state={}; // index -> value\n  state[0]=SPEC[0].def; state[1]=SPEC[1].def; state[3]=SPEC[2].def; state[4]=SPEC[3].def;\n  state[2]=MODE.def;\n\n  // build knobs ------------------------------------------------------\n  var host=document.getElementById(\"knobs\");\n  var dials={};\n  SPEC.forEach(function(p){\n    var ctl=document.createElement(\"div\"); ctl.className=\"ctl\";\n    ctl.innerHTML=\n      '<div class=\"dial\"><div class=\"cap\"><\/div><div class=\"ptr\"><\/div><\/div>'+\n      '<div class=\"nm\">'+p.nm+'<\/div><div class=\"vl\"><\/div>';\n    host.appendChild(ctl);\n    var dial=ctl.querySelector(\".dial\");\n    var ptr =ctl.querySelector(\".ptr\");\n    var vl  =ctl.querySelector(\".vl\");\n    dials[p.i]={dial:dial,ptr:ptr,vl:vl,p:p};\n\n    function render(v){\n      var deg=-135+v*270;\n      ptr.style.transform=\"rotate(\"+deg+\"deg)\";\n      // conic progress ring\n      dial.style.background=\n        \"radial-gradient(circle at 50% 38%,#fafafa,#dfe3e7 42%,#aab1b8 70%,#7d848b 100%)\";\n      dial.querySelector('.cap');\n      var ring=dial.querySelector('.ring');\n      if(!ring){ring=document.createElement('div');ring.className='ring';dial.appendChild(ring);}\n      var a=v*270;\n      ring.style.background=\"conic-gradient(from 225deg,var(--acc) 0deg,var(--acc2) \"+a+\"deg,transparent \"+a+\"deg)\";\n      ring.style.mask=\"radial-gradient(circle,transparent 39px,#000 40px,#000 44px,transparent 45px)\";\n      ring.style.webkitMask=ring.style.mask;\n      ring.style.opacity=.85;\n      vl.textContent=p.fmt(v);\n    }\n    function set(v,silent){\n      v=Math.max(0,Math.min(1,v));\n      state[p.i]=v; render(v);\n      if(!silent) send(p.i,v);\n    }\n    p._set=set; p._render=render;\n    set(state[p.i],true);\n\n    // drag --------------------------------------------------------\n    var dragging=false,startY=0,startV=0;\n    function down(e){\n      dragging=true; startY=(e.touches?e.touches[0].clientY:e.clientY);\n      startV=state[p.i]; e.preventDefault();\n      document.body.style.cursor=\"grabbing\";\n    }\n    function move(e){\n      if(!dragging)return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      var dv=(startY-y)/180;\n      set(startV+dv);\n      e.preventDefault();\n    }\n    function up(){dragging=false;document.body.style.cursor=\"\";}\n    dial.addEventListener(\"mousedown\",down);\n    dial.addEventListener(\"touchstart\",down,{passive:false});\n    window.addEventListener(\"mousemove\",move);\n    window.addEventListener(\"touchmove\",move,{passive:false});\n    window.addEventListener(\"mouseup\",up);\n    window.addEventListener(\"touchend\",up);\n    dial.addEventListener(\"dblclick\",function(){set(p.def);});\n    dial.addEventListener(\"wheel\",function(e){\n      set(state[p.i]-e.deltaY*0.0012);e.preventDefault();\n    },{passive:false});\n  });\n\n  // mode rocker ------------------------------------------------------\n  var rocker=document.getElementById(\"rocker\");\n  var modeNum=document.getElementById(\"modeNum\");\n  var modetag=document.getElementById(\"modetag\");\n  var opts=rocker.querySelectorAll(\".opt\");\n  function setMode(v,silent){\n    v=Math.max(0,Math.min(1,v));\n    MODE.val=v; state[2]=v;\n    rocker.classList.toggle(\"vib\",v>=0.5);\n    opts[0].classList.toggle(\"on\",v<0.5);\n    opts[1].classList.toggle(\"on\",v>=0.5);\n    modeNum.textContent=Math.round(v*100)+\"%\";\n    modetag.textContent = v<0.5 ? \"CHORUS · WIDE\" : \"VIBRATO · WOBBLE\";\n    if(!silent) send(2,v);\n  }\n  // click toggles 0<->1; drag horizontally to blend\n  var rdrag=false,rsx=0,rsv=0,moved=false;\n  rocker.addEventListener(\"mousedown\",function(e){rdrag=true;moved=false;rsx=e.clientX;rsv=MODE.val;e.preventDefault();});\n  window.addEventListener(\"mousemove\",function(e){\n    if(!rdrag)return; var dv=(e.clientX-rsx)/170; if(Math.abs(e.clientX-rsx)>3)moved=true;\n    setMode(rsv+dv);\n  });\n  window.addEventListener(\"mouseup\",function(){\n    if(rdrag&&!moved){ setMode(MODE.val<0.5?1:0); }\n    rdrag=false;\n  });\n  rocker.addEventListener(\"dblclick\",function(){setMode(0);});\n\n  // ---------- animated stereo waveforms ----------\n  var wL=document.getElementById(\"waveL\"),wR=document.getElementById(\"waveR\");\n  var wLg=document.getElementById(\"waveLg\"),wRg=document.getElementById(\"waveRg\");\n  var W=560,H=150,MID=75,N=70;\n  var t0=performance.now();\n  function path(phaseSign,depth,extra){\n    var d=\"M0 \"+MID, amp=22*depth+4;\n    for(var k=0;k<=N;k++){\n      var x=k/N*W;\n      var env=Math.sin(Math.PI*k/N); // taper at edges\n      // base carrier + slow LFO swirl (anti-phase via phaseSign)\n      var y=MID\n        + Math.sin(k*0.55 + extra*3.0) * amp*env\n        + phaseSign*Math.sin(extra*1.0 + k*0.16) * (10+18*depth)*env;\n      d+=\" L\"+x.toFixed(1)+\" \"+y.toFixed(1);\n    }\n    return d;\n  }\n  function frame(now){\n    var t=(now-t0)/1000;\n    var rate=0.05+state[0]*state[0]*5.95;       // Hz, matches DSP\n    var depth=state[1]*(1+0.8*state[2]);         // vibrato deepens\n    var ph=t*rate;\n    var dl=path( 1,depth,ph), dr=path(-1,depth,ph);\n    wL.setAttribute(\"d\",dl); wLg.setAttribute(\"d\",dl);\n    wR.setAttribute(\"d\",dr); wRg.setAttribute(\"d\",dr);\n    // tone affects line brightness/opacity\n    var op=0.45+0.5*state[3];\n    wL.style.opacity=op; wR.style.opacity=op;\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  // ---------- init / push defaults ----------\n  function ready(){\n    SPEC.forEach(function(p){ p._set(state[p.i]); });\n    setMode(MODE.def);\n  }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
