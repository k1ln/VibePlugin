<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Thin Kit</title>
<style>
  :root{ --acc:#e0d24a; --acc2:#e06a8a; --bg0:#0f0e08; --bg1:#1c1a0f; --ink:#f3eecf; --dim:#9a9060; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#2a2712 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:13px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#232010,#0f0e08); border:1px solid rgba(224,210,74,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(243,238,207,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:2px; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 1.0s steps(2,end) infinite; }
  @keyframes pulse{ 0%,50%{ opacity:1;} 51%,100%{ opacity:.3;} }
  .screen{ height:104px; border-radius:7px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#191708,#0d0c06); border:1px solid rgba(224,210,74,.18); box-shadow:inset 0 2px 18px rgba(0,0,0,.5); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(232,224,190,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(224,210,74,.6)); }
  .pcap{ fill:#171509; stroke:rgba(224,210,74,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(224,210,74,.1); padding:1px 7px; border-radius:5px; border:1px solid rgba(224,210,74,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">THIN&nbsp;KIT</span><span class="sub">12-bit drum box</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">PATTERN&nbsp;A</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Tune",idx:0,def:0.5},{name:"Decay",idx:1,def:0.4},{name:"Snap",idx:2,def:0.5},{name:"Bright",idx:3,def:0.45},{name:"Accent",idx:4,def:0.5},{name:"Level",idx:5,def:0.85}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0d24a"/><stop offset="1" stop-color="#e06a8a"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  var ENERGY=[3,0,2,0, 2,0,1,0, 3,0,2,0, 2,0,3,0]; // stacked voices per step (approx)
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function frame(ts){ ctx.clearRect(0,0,W,H); var bright=vals[3], acc=vals[4];
    var padL=14, padR=14, padT=24, padB=22; var gw=(W-padL-padR)/16; var ROWS=6; var cellH=(H-padT-padB)/ROWS;
    var step=Math.floor(ts/125)%16;
    // dot-matrix bar-graph: each step column lights bottom-up by its energy
    for(var c=0;c<16;c++){ var e=ENERGY[c]; var live=(c===step); var cx=padL+c*gw;
      for(var r=0;r<ROWS;r++){ var on=(r < (e + (live?1:0))); var yy=H-padB-(r+1)*cellH;
        var w=gw-3, hh=cellH-3;
        if(on){ ctx.fillStyle= live? "#e06a8a" : "#e0d24a"; ctx.globalAlpha=0.55+(live?0.35:0)+r*0.04; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=live?7:2; }
        else { ctx.fillStyle="#e0d24a"; ctx.globalAlpha=0.08; ctx.shadowBlur=0; }
        ctx.fillRect(cx+1.5, yy, w, hh); ctx.shadowBlur=0; ctx.globalAlpha=1;
      }
    }
    // beat counter dots (1..4)
    var qb=Math.floor(step/4);
    for(var b=0;b<4;b++){ var bxx=W-14-(3-b)*16; ctx.fillStyle=(b===qb)?"#e0d24a":"rgba(224,210,74,0.2)"; ctx.beginPath(); ctx.arc(bxx,12,3,0,Math.PI*2); ctx.fill(); }
    // "bright" glow line at bottom
    ctx.strokeStyle="rgba(224,106,138,"+(0.2+bright*0.5)+")"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padL,H-padB+6); ctx.lineTo(W-padR,H-padB+6); ctx.stroke();
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
