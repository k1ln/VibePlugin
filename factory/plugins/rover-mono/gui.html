<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Rover Mono</title>
<style>
  :root{ --acc:#e08040; --acc2:#3a90c0; --bg0:#0e0a06; --bg1:#1b130b; --ink:#f4ece0; --dim:#988570; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#2a1e10 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:14px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#231810,#0e0a06); border:1px solid rgba(224,128,64,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(244,236,224,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.0s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
  .screen{ height:100px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#19110a,#0e0906); border:1px solid rgba(224,128,64,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(230,220,205,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(224,128,64,.6)); }
  .pcap{ fill:#170f09; stroke:rgba(224,128,64,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(224,128,64,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(224,128,64,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">ROVER&nbsp;MONO</span><span class="sub">two-osc moog mono</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">OSC&nbsp;·&nbsp;LADDER</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Cutoff",idx:0,def:0.45},{name:"Reso",idx:1,def:0.5},{name:"Env",idx:2,def:0.6},{name:"Interval",idx:3,def:0.52},{name:"Osc Mix",idx:4,def:0.5},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e08040"/><stop offset="1" stop-color="#3a90c0"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2));
      val.textContent=(p.idx===3)?((Math.round(v*24-12)>0?"+":"")+Math.round(v*24-12)+" st"):Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function frame(ts){ ctx.clearRect(0,0,W,H); var cut=vals[0], reso=vals[1], env=vals[2], interval=vals[3], mix=vals[4]; var mid=H*0.54;
    var ratio2=Math.pow(2,(interval*24-12)/12);
    var fenv=Math.exp(-((ts/1300)%1)*(1+env*3)); var effCut=cut+env*0.5*fenv; if(effCut>1)effCut=1;
    // faint osc1 (orange) and osc2 (blue at interval)
    function saw(rt,col,amp,off){ ctx.beginPath(); for(var x=0;x<=W;x+=2){ var t=x/W; var ph=((t*3*rt+ts/1100+off)%1); var v=(ph*2-1); ctx.lineTo(x, mid - v*amp); } ctx.strokeStyle=col; ctx.lineWidth=1; ctx.stroke(); }
    saw(1,"rgba(224,128,64,0.3)",H*0.12,0); saw(ratio2,"rgba(58,144,192,0.3)",H*0.12,0.3);
    // combined + ladder-rolloff output (thicker, gradient)
    ctx.beginPath();
    for(var x2=0;x2<=W;x2+=1.5){ var t=x2/W; var ph1=((t*3+ts/1100)%1); var ph2=((t*3*ratio2+ts/1100+0.3)%1);
      var o1=(ph1*2-1), o2=(ph2*2-1); var s=(o1*(1-mix)+o2*mix);
      // crude lowpass shaping by cutoff (attenuate high-freq wiggle)
      var v=s*(0.35+effCut*0.55); v = v/(1+reso*0.2) + Math.sin(t*40*6.2831853+ts/200)*reso*0.05*effCut;
      ctx.lineTo(x2, mid - v*(H*0.30)); }
    var grd=ctx.createLinearGradient(0,0,W,0); grd.addColorStop(0,"#e08040"); grd.addColorStop(1,"#3a90c0");
    ctx.strokeStyle=grd; ctx.lineWidth=2; ctx.shadowColor="#e08040"; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0;
    // ladder cutoff bar at bottom
    var bx=12+effCut*(W-24); ctx.fillStyle="rgba(58,144,192,0.6)"; ctx.fillRect(12, H-8, effCut*(W-24), 3);
    ctx.strokeStyle="rgba(224,128,64,0.7)"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(bx,H-12); ctx.lineTo(bx,H-4); ctx.stroke();
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
