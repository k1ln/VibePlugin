<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ring Mod — test bench</title><style>
  :root{--ac:#ff5ad1}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Ring Mod</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Ring Mod<\/title>\n<style>\n  :root{\n    --acc:#ff5ad1;\n    --acc2:#ff8ae0;\n    --steel:#9fb0bd;\n    --steel-d:#3a4650;\n    --bg0:#0a0d12;\n    --bg1:#141a22;\n    --ink:#dfe9f2;\n    --glass:rgba(255,90,209,.12);\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%}\n  body{\n    font-family:\"DIN Alternate\",\"Bahnschrift\",\"Avenir Next Condensed\",system-ui,sans-serif;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #1d2530 0%, #0a0d12 60%, #05070a 100%);\n    color:var(--ink);\n    overflow:hidden;\n    user-select:none;\n    -webkit-user-select:none;\n    -webkit-font-smoothing:antialiased;\n  }\n  /* ===== chassis / bezel ===== */\n  .unit{\n    position:relative;\n    width:100%;height:100%;\n    min-height:100vh;\n    padding:14px;\n    display:flex;flex-direction:column;\n    background:\n      repeating-linear-gradient(115deg, rgba(255,255,255,.018) 0 2px, transparent 2px 7px),\n      linear-gradient(160deg, #1a212b 0%, #0c1016 100%);\n    border:1px solid #000;\n    box-shadow:inset 0 1px 0 rgba(255,255,255,.06), inset 0 0 60px rgba(0,0,0,.6);\n  }\n  /* corner rivets */\n  .rivet{position:absolute;width:10px;height:10px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%, #cdd6dd, #4a555e 60%, #1b2127);\n    box-shadow:0 1px 2px rgba(0,0,0,.8), inset 0 1px 1px rgba(255,255,255,.5);}\n  .rivet.tl{top:7px;left:7px}.rivet.tr{top:7px;right:7px}\n  .rivet.bl{bottom:7px;left:7px}.rivet.br{bottom:7px;right:7px}\n\n  /* ===== header ===== */\n  header{display:flex;align-items:flex-end;justify-content:space-between;\n    padding:2px 10px 10px;border-bottom:1px solid rgba(255,255,255,.05)}\n  .brand{display:flex;flex-direction:column;line-height:1}\n  .brand .sub{font-size:9px;letter-spacing:4px;color:var(--steel);opacity:.7}\n  .brand h1{\n    font-size:26px;letter-spacing:7px;font-weight:700;\n    background:linear-gradient(180deg,#fff 0%,var(--acc2) 45%,var(--acc) 100%);\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n    filter:drop-shadow(0 0 10px rgba(255,90,209,.35));\n    margin-top:4px;\n  }\n  .powerlamp{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:2px;color:var(--steel)}\n  .lamp{width:11px;height:11px;border-radius:50%;\n    background:radial-gradient(circle at 40% 35%, #fff, var(--acc) 55%, #6a0040 100%);\n    box-shadow:0 0 10px var(--acc),0 0 22px rgba(255,90,209,.5);\n    animation:pulse 2.6s ease-in-out infinite}\n  @keyframes pulse{0%,100%{opacity:.55;box-shadow:0 0 6px var(--acc)}50%{opacity:1;box-shadow:0 0 16px var(--acc),0 0 30px rgba(255,90,209,.6)}}\n\n  /* ===== main grid ===== */\n  main{flex:1;display:grid;grid-template-columns:1.35fr .95fr;gap:14px;padding:12px 6px 6px;min-height:0}\n\n  /* ===== scope ===== */\n  .scope-wrap{position:relative;border-radius:10px;overflow:hidden;\n    background:radial-gradient(120% 130% at 50% 0%, #0c1820 0%, #04080b 75%);\n    border:1px solid #000;\n    box-shadow:inset 0 0 0 2px #11181f, inset 0 0 40px rgba(0,0,0,.9), 0 6px 18px rgba(0,0,0,.6);}\n  .scope-wrap::after{/* glass glare + scanlines */\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:\n      linear-gradient(180deg, rgba(255,255,255,.07), transparent 30%),\n      repeating-linear-gradient(0deg, rgba(0,0,0,.20) 0 1px, transparent 1px 3px);\n    mix-blend-mode:screen;}\n  canvas{display:block;width:100%;height:100%}\n  .scope-tag{position:absolute;left:10px;top:8px;font-size:8.5px;letter-spacing:3px;\n    color:var(--acc2);opacity:.65;text-shadow:0 0 8px var(--acc)}\n  .scope-tag.r{left:auto;right:10px;color:var(--steel)}\n  .scope-readout{position:absolute;left:10px;bottom:8px;font-size:9px;letter-spacing:1px;\n    color:var(--steel);font-variant-numeric:tabular-nums}\n  .scope-readout b{color:var(--acc2)}\n\n  /* ===== control bay ===== */\n  .bay{display:flex;flex-direction:column;gap:10px;min-height:0}\n  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n  .panel{\n    position:relative;border-radius:9px;padding:9px 9px 7px;\n    background:linear-gradient(165deg,#222b35 0%,#10151b 100%);\n    border:1px solid #000;\n    box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 3px 8px rgba(0,0,0,.5);\n  }\n  .plabel{font-size:8.5px;letter-spacing:2.5px;color:var(--steel);opacity:.85;text-align:center;margin-bottom:2px}\n  .pval{font-size:11px;letter-spacing:.5px;color:var(--acc2);text-align:center;\n    font-variant-numeric:tabular-nums;text-shadow:0 0 9px rgba(255,90,209,.4)}\n\n  /* ===== big carrier dial ===== */\n  .carrier{grid-column:1 / -1;display:flex;flex-direction:column;align-items:center;padding-bottom:10px}\n  .dial{position:relative;width:128px;height:128px;cursor:ns-resize;touch-action:none}\n  .dial svg{display:block;width:100%;height:100%;overflow:visible}\n  .dial .glow-ring{filter:drop-shadow(0 0 6px var(--acc))}\n  .dial .knob-cap{transition:filter .15s}\n  .dial:hover .knob-cap{filter:drop-shadow(0 0 4px rgba(255,90,209,.5))}\n  .dial:active{cursor:grabbing}\n\n  /* small dials */\n  .mini{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:ns-resize;touch-action:none}\n  .mini svg{width:62px;height:62px;display:block;overflow:visible}\n  .mini:active{cursor:grabbing}\n\n  /* ===== waveform toggle ===== */\n  .wave-toggle{grid-column:1 / -1}\n  .seg{display:flex;background:#0b1017;border-radius:7px;padding:3px;gap:3px;\n    box-shadow:inset 0 2px 5px rgba(0,0,0,.7)}\n  .seg button{flex:1;border:0;cursor:pointer;border-radius:5px;padding:8px 4px;\n    background:transparent;color:var(--steel);font-family:inherit;font-size:10px;\n    letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:6px;\n    transition:all .2s;position:relative}\n  .seg button svg{width:30px;height         <circle cx=\"50\" cy=\"50\" r=\"30\" fill=\"url(#capg)\" stroke=\"#000\"/>\n              <g class=\"mptr\"><rect x=\"48\" y=\"22\" width=\"4\" height=\"18\" rx=\"2\" fill=\"#fff\"/><\/g>\n            <\/svg>\n          <\/div>\n          <div class=\"pval\" id=\"v-rate\">—<\/div>\n        <\/div>\n        <div class=\"panel\">\n          <div class=\"plabel\">LFO DEPTH<\/div>\n          <div class=\"mini\" id=\"d-depth\" data-idx=\"3\" data-min=\"0\" data-max=\"1\" data-def=\"0.25\">\n            <svg viewBox=\"0 0 100 100\">\n              <g class=\"mtick\"><\/g>\n              <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"#10161d\" stroke-width=\"6\"/>\n              <circle class=\"marc\" cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"var(--acc2)\" stroke-width=\"6\" stroke-linecap=\"round\" transform=\"rotate(135 50 50)\"/>\n              <circle cx=\"50\" cy=\"50\" r=\"30\" fill=\"url(#capg)\" stroke=\"#000\"/>\n              <g class=\"mptr\"><rect x=\"48\" y=\"22\" width=\"4\" height=\"18\" rx=\"2\" fill=\"#fff\"/><\/g>\n            <\/svg>\n          <\/div>\n          <div class=\"pval\" id=\"v-depth\">—<\/div>\n        <\/div>\n      <\/div>\n\n      <!-- mix fader -->\n      <div class=\"panel mixpanel\">\n        <div class=\"plabel\">DRY / WET MIX<\/div>\n        <div class=\"fader-track\" id=\"f-mix\" data-idx=\"4\" data-min=\"0\" data-max=\"1\" data-def=\"1\">\n          <div class=\"fader-fill\" id=\"mix-fill\"><\/div>\n          <div class=\"fader-thumb\" id=\"mix-thumb\"><\/div>\n        <\/div>\n        <div class=\"fader-ends\"><span>DRY<\/span><span id=\"v-mix\">—<\/span><span>WET<\/span><\/div>\n      <\/div>\n    <\/div>\n  <\/main>\n  <div class=\"hint\">DRAG VERTICAL · DOUBLE-CLICK TO RESET<\/div>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n  var TAU=Math.PI*2;\n\n  function clamp(v,a,b){return v<a?a:v>b?b:v;}\n  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n\n  // ---- shared state mirror for the scope animation ----\n  var state={freq:0.5,wave:0,rate:0.3,depth:0.25,mix:1};\n\n  // ============================================================\n  //  ROTARY DIALS (big + minis): drag = change, dblclick = reset\n  // ============================================================\n  // sweep: 270deg, from -135 to +135 (135 rotation offset on the arc)\n  var SWEEP=270, START=-135, CIRC=2*Math.PI*42;\n\n  function drawTicks(g,count,big){\n    var ns=\"http://www.w3.org/2000/svg\",html=\"\";\n    for(var k=0;k<count;k++){\n      var t=k/(count-1), a=(START + t*SWEEP)*Math.PI/180;\n      var r1=big?47:46, r2=big?50:50;\n      var x1=50+Math.sin(a)*r1, y1=50-Math.cos(a)*r1;\n      var x2=50+Math.sin(a)*r2, y2=50-Math.cos(a)*r2;\n      var ln=document.createElementNS(ns,\"line\");\n      ln.setAttribute(\"x1\",x1);ln.setAttribute(\"y1\",y1);\n      ln.setAttribute(\"x2\",x2);ln.setAttribute(\"y2\",y2);\n      ln.setAttribute(\"stroke\",(k===0||k===count-1)?\"var(--acc2)\":\"#46525c\");\n      ln.setAttribute(\"stroke-width\",(k===0||k===count-1)?\"1.4\":\"0.9\");\n      g.appendChild(ln);\n    }\n  }\n\n  function setRotary(o){\n    var frac=(o.val-o.min)/(o.max-o.min);\n    var ang=START + frac*SWEEP;\n    o.ptr.setAttribute(\"transform\",\"rotate(\"+ang+\" 50 50)\");\n    // arc: dasharray reveal\n    if(o.arc){\n      var on=CIRC*(frac*SWEEP/360);\n      o.arc.setAttribute(\"stroke-dasharray\", on+\" \"+CIRC);\n    }\n  }\n\n  function makeDial(el, onChange){\n    var idx=+el.dataset.idx, min=+el.dataset.min, max=+el.dataset.max, def=+el.dataset.def;\n    var ptr=el.querySelector('#freq-ptr, .mptr');\n    var arc=el.querySelector('#freq-arc, .marc');\n    var ticksG=el.querySelector('#freq-ticks, .mtick');\n    var big=el.id==='d-freq';\n    if(ticksG) drawTicks(ticksG, big?21:11, big);\n    var o={val:def,min:min,max:max,ptr:ptr,arc:arc};\n    setRotary(o);\n    onChange(o.val,true);\n\n    var dragging=false, lastY=0;\n    function apply(v){ o.val=clamp(v,min,max); setRotary(o); send(idx,o.val); onChange(o.val,false); }\n    el.addEventListener('pointerdown',function(e){\n      dragging=true; lastY=e.clientY; el.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    el.addEventListener('pointermove',function(e){\n      if(!dragging)return;\n      var dy=lastY-e.clientY; lastY=e.clientY;\n      var span=(max-min);\n      var step= e.shiftKey?0.25:1;          // shift = fine\n      apply(o.val + dy*0.005*span/step);\n    });\n    function end(e){ if(dragging){dragging=false; try{el.releasePointerCapture(e.pointerId);}catch(_){}} }\n    el.addEventListener('pointerup',end);\n    el.addEventListener('pointercancel',end);\n    el.addEventListener('dblclick',function(){ apply(def); });\n    el.addEventListener('wheel',function(e){\n      e.preventDefault();\n      apply(o.val - (e.deltaY>0?1:-1)*0.02*(max-min));\n    },{passive:false});\n    return {apply:apply, get:function(){return o.val;}};\n  }\n\n  // hz mapping for display only (20 Hz .. ~6 kHz, exponential)\n  function toHz(f){ return Math.round(20*Math.pow(300,f)); }\n  function fmtHz(h){ return h>=1000?(h/1000).toFixed(2)+\" kHz\":h+\" Hz\"; }\n  function lfoHz(f){ return (0.05*Math.pow(400,f)).toFixed(2); } // 0.05..20 Hz\n\n  // FREQUENCY\n  var vFreq=document.getElementById('v-freq'), roHz=document.getElementById('ro-hz');\n  makeDial(document.getElementById('d-freq'), function(v){\n    state.freq=v;\n    var h=toHz(v); vFreq.textContent=fmtHz(h); roHz.textContent=fmtHz(h);\n  });\n\n  // LFO RATE\n  var vRate=document.getElementById('v-rate'), roLfo=document.getElementById('ro-lfo');\n  makeDial(document.getElementById('d-rate'), function(v){\n    state.rate=v;\n    var h=lfoHz(v); vRate.textContent=h+\" Hz\"; roLfo.textContent=h+\" Hz\";\n  });\n\n  // LFO DEPTH\n  var vDepth=document.getElementById('v-depth');\n  makeDial(document.getElementById('d-depth'), function(v){\n    state.depth=v; vDepth.textContent=Math.round(v*100)+\" %\";\n  });\n\n  // ============================================================\n  //  WAVEFORM SEGMENTED TOGGLE  (param 1, step 1)\n  // ============================================================\n  (function(){\n    var seg=document.getElementById('seg-wave');\n    var idx=+seg.dataset.idx, def=+seg.dataset.def;\n    var btns=seg.querySelectorAll('button');\n    function select(v,quiet){\n      v=v|0;\n      btns.forEach(function(b){ b.classList.toggle('on', +b.dataset.v===v); });\n      state.wave=v;\n      if(!quiet) send(idx,v);\n    }\n    btns.forEach(function(b){\n      b.addEventListener('click',function(){ select(+b.dataset.v,false); });\n    });\n    seg.addEventListener('dblclick',function(){ select(def,false); });\n    select(def,true); send(idx,def);\n  })();\n\n  // ============================================================\n  //  MIX FADER  (param 4)  drag horizontal\n  // ============================================================\n  (function(){\n    var f=document.getElementById('f-mix');\n    var idx=+f.dataset.idx, min=+f.dataset.min, max=+f.dataset.max, def=+f.dataset.def;\n    var fill=document.getElementById('mix-fill'), thumb=document.getElementById('mix-thumb');\n    var vMix=document.getElementById('v-mix'), roMix=document.getElementById('ro-mix');\n    var val=def;\n    function render(){\n      var frac=(val-min)/(max-min);\n      fill.style.width=(frac*100)+\"%\";\n      thumb.style.left=(frac*100)+\"%\";\n      var pct=Math.round(frac*100);\n      vMix.textContent=pct+\"%\"; roMix.textContent=pct+\"%\";\n      state.mix=frac;\n    }\n    function setFrac(frac,quiet){\n      val=clamp(min+frac*(max-min),min,max); render();\n      if(!quiet) send(idx,val);\n    }\n    function fromEvent(e){\n      var r=f.getBoundingClientRect();\n      setFrac((e.clientX-r.left)/r.width,false);\n    }\n    var dragging=false;\n    f.addEventListener('pointerdown',function(e){\n      dragging=true; f.setPointerCapture(e.pointerId); fro   var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;

    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});

  function makeRiff(){
