<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vocal Wah — test bench</title><style>
  :root{--ac:#ffd23f}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Vocal Wah</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>Vocal Wah<\/title>\n  <style>\n    :root {\n      --accent: #ffd23f;\n      --accent2: #ff9e2c;\n      --bg0: #16110a;\n      --bg1: #221a0f;\n      --panel: #2c2114;\n      --ink: #f4e9d2;\n      --ink-dim: #b6a079;\n      --chrome-hi: #fff7e0;\n      --chrome-lo: #3a2e1c;\n    }\n\n    * { box-sizing: border-box; }\n\n    html, body {\n      margin: 0;\n      padding: 0;\n      background:\n        radial-gradient(120% 90% at 50% -10%, #3a2c16 0%, var(--bg1) 45%, var(--bg0) 100%);\n      color: var(--ink);\n      font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n      -webkit-font-smoothing: antialiased;\n    }\n\n    .stage {\n      max-width: 760px;\n      margin: 0 auto;\n      padding: 18px 16px 26px;\n      min-height: 100vh;\n      display: flex;\n      flex-direction: column;\n      gap: 16px;\n    }\n\n    /* ---------- header ---------- */\n    .head {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n    }\n    .brand {\n      display: flex;\n      flex-direction: column;\n      line-height: 1;\n    }\n    .brand .kicker {\n      font-size: 10px;\n      letter-spacing: 0.42em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      margin-bottom: 7px;\n    }\n    .brand .title {\n      font-size: 30px;\n      font-weight: 800;\n      letter-spacing: 0.02em;\n      background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);\n      -webkit-background-clip: text;\n      background-clip: text;\n      color: transparent;\n      text-shadow: 0 1px 0 rgba(0,0,0,0.3);\n    }\n    .badge {\n      font-size: 10px;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      color: var(--bg0);\n      background: linear-gradient(180deg, var(--accent), var(--accent2));\n      padding: 6px 11px;\n      border-radius: 999px;\n      font-weight: 800;\n      box-shadow: 0 3px 10px rgba(255,158,44,0.35), inset 0 1px 0 rgba(255,255,255,0.5);\n    }\n\n    /* ---------- main layout ---------- */\n    .main {\n      display: grid;\n      grid-template-columns: 1.15fr 1fr;\n      gap: 16px;\n    }\n    @media (max-width: 620px) {\n      .main { grid-template-columns: 1fr; }\n    }\n\n    .card {\n      background:\n        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.18)),\n        var(--panel);\n      border: 1px solid rgba(255,255,255,0.06);\n      border-radius: 18px;\n      box-shadow:\n        0 18px 40px rgba(0,0,0,0.45),\n        inset 0 1px 0 rgba(255,255,255,0.07);\n      padding: 16px;\n    }\n    .card h2 {\n      margin: 0 0 12px;\n      font-size: 10px;\n      letter-spacing: 0.32em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      font-weight: 700;\n    }\n\n    /* ---------- pedal treadle ---------- */\n    .pedal-wrap {\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 12px;\n    }\n    .treadle-svg {\n      width: 100%;\n      max-width: 280px;\n      cursor: grab;\n      touch-action: none;\n      user-select: none;\n      filter: drop-shadow(0 14px 18px rgba(0,0,0,0.55));\n    }\n    .treadle-svg.drag { cursor: grabbing; }\n\n    .pedal-read {\n      font-variant-numeric: tabular-nums;\n      font-size: 13px;\n      letter-spacing: 0.08em;\n      color: var(--accent);\n      text-transform: uppercase;\n    }\n    .pedal-read b { color: var(--ink); }\n\n    /* mouth / vowel formant */\n    .mouth-label {\n      font-size: 10px;\n      letter-spacing: 0.3em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      text-align: center;\n    }\n\n    /* ---------- knobs ---------- */\n    .knob-grid {\n      display: grid;\n      grid-template-columns: repeat(2, 1fr);\n      gap: 14px 10px;\n    }\n    .knob-cell {\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 7px;\n    }\n    .knob {\n      width: 84px;\n      height: 84px;\n      cursor: ns-resize;\n      touch-action: none;\n      user-select: none;\n    }\n    .knob-name {\n      font-size: 10px;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      font-weight: 700;\n    }\n    .knob-val {\n      font-size: 12px;\n      font-variant-numeric: tabular-nums;\n      color: var(--accent);\n      letter-spacing: 0.04em;\n    }\n\n    /* ---------- mode switch ---------- */\n    .mode-row {\n      display: flex;\n      gap: 8px;\n      margin-top: 4px;\n    }\n    .mode-btn {\n      flex: 1;\n      appearance: none;\n      border: 1px solid rgba(255,255,255,0.1);\n      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.25));\n      color: var(--ink-dim);\n      font-family: inherit;\n      font-size: 11px;\n      font-weight: 800;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      padding: 11px 8px;\n      border-radius: 12px;\n      cursor: pointer;\n      transition: all 0.18s ease;\n    }\n    .mode-btn:hover { color: var(--ink); border-color: rgba(255,210,63,0.4); }\n    .mode-btn.on {\n      color: var(--bg0);\n      background: linear-gradient(180deg, var(--accent), var(--accent2));\n      border-color: var(--accent);\n      box-shadow: 0 0 18px rgba(255,158,44,0.5), inset 0 1px 0 rgba(255,255,255,0.6);\n    }\n\n    .mode-card { display: flex; flex-direction: column; }\n    .auto-lamp {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      margin-top: 14px;\n      font-size: 10px;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n    }\n    .lamp {\n      width: 12px;\n      height: 12px;\n      border-radius: 50%;\n      background: #3a2e1c;\n      box-shadow: inset 0 1px 2px rgba(0,0,0,0.7);\n      transition:              <stop offset=\"1\" stop-color=\"#ff9e2c\"/>\n            <\/linearGradient>\n            <linearGradient id=\"base\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0\" stop-color=\"#2b2114\"/>\n              <stop offset=\"1\" stop-color=\"#0e0a05\"/>\n            <\/linearGradient>\n            <radialGradient id=\"mouthG\" cx=\"0.5\" cy=\"0.4\" r=\"0.7\">\n              <stop offset=\"0\" stop-color=\"#ffe487\"/>\n              <stop offset=\"0.6\" stop-color=\"#ff9e2c\"/>\n              <stop offset=\"1\" stop-color=\"#7a3d08\"/>\n            <\/radialGradient>\n            <filter id=\"soft\" x=\"-30%\" y=\"-30%\" width=\"160%\" height=\"160%\">\n              <feGaussianBlur stdDeviation=\"1.4\"/>\n            <\/filter>\n          <\/defs>\n\n          <!-- base box -->\n          <rect x=\"22\" y=\"120\" width=\"176\" height=\"66\" rx=\"12\" fill=\"url(#base)\"\n                stroke=\"#000\" stroke-width=\"1.5\"/>\n          <!-- mouth / vowel formant sits on the base -->\n          <g id=\"mouthGroup\">\n            <ellipse id=\"mouth\" cx=\"110\" cy=\"150\" rx=\"34\" ry=\"9\" fill=\"url(#mouthG)\"/>\n            <ellipse cx=\"110\" cy=\"146\" rx=\"34\" ry=\"3\" fill=\"rgba(255,255,255,0.35)\" filter=\"url(#soft)\"/>\n          <\/g>\n\n          <!-- rocking treadle group, pivots near the toe -->\n          <g id=\"rock\" transform=\"rotate(0 110 158)\">\n            <!-- side cheeks -->\n            <rect x=\"40\" y=\"42\" width=\"140\" height=\"92\" rx=\"14\" fill=\"url(#chrome)\"\n                  stroke=\"#1c150b\" stroke-width=\"1.5\"/>\n            <!-- treadle face -->\n            <rect x=\"54\" y=\"34\" width=\"112\" height=\"86\" rx=\"12\" fill=\"url(#tread)\"\n                  stroke=\"#7a4a0c\" stroke-width=\"1.2\"/>\n            <!-- ribbed grip lines -->\n            <g stroke=\"rgba(60,30,0,0.55)\" stroke-width=\"2.4\" stroke-linecap=\"round\">\n              <line x1=\"66\" y1=\"50\" x2=\"154\" y2=\"50\"/>\n              <line x1=\"66\" y1=\"62\" x2=\"154\" y2=\"62\"/>\n              <line x1=\"66\" y1=\"74\" x2=\"154\" y2=\"74\"/>\n              <line x1=\"66\" y1=\"86\" x2=\"154\" y2=\"86\"/>\n              <line x1=\"66\" y1=\"98\" x2=\"154\" y2=\"98\"/>\n            <\/g>\n            <!-- top highlight -->\n            <rect x=\"58\" y=\"38\" width=\"104\" height=\"9\" rx=\"5\" fill=\"rgba(255,255,255,0.4)\"/>\n            <!-- pivot bolt -->\n            <circle cx=\"110\" cy=\"120\" r=\"6\" fill=\"#2a2012\" stroke=\"#cdbf9c\" stroke-width=\"1.5\"/>\n          <\/g>\n        <\/svg>\n\n        <div class=\"pedal-read\">POS <b id=\"pedalPct\">50%<\/b> &middot; <span id=\"pedalHz\">—<\/span><\/div>\n        <div class=\"mouth-label\" id=\"vowel\">vowel: &laquo; uh &raquo;<\/div>\n      <\/div>\n\n      <!-- ============ CONTROLS ============ -->\n      <div style=\"display:flex; flex-direction:column; gap:16px;\">\n\n        <div class=\"card\">\n          <h2>Voicing<\/h2>\n          <div class=\"knob-grid\">\n            <div class=\"knob-cell\">\n              <svg class=\"knob\" id=\"knob-q\" viewBox=\"0 0 100 100\"><\/svg>\n              <div class=\"knob-name\">Q &middot; Reso<\/div>\n              <div class=\"knob-val\" id=\"val-q\">0.60<\/div>\n            <\/div>\n            <div class=\"knob-cell\">\n              <svg class=\"knob\" id=\"knob-range\" viewBox=\"0 0 100 100\"><\/svg>\n              <div class=\"knob-name\">Range<\/div>\n              <div class=\"knob-val\" id=\"val-range\">0.70<\/div>\n            <\/div>\n            <div class=\"knob-cell\">\n              <svg class=\"knob\" id=\"knob-mix\" viewBox=\"0 0 100 100\"><\/svg>\n              <div class=\"knob-name\">Mix<\/div>\n              <div class=\"knob-val\" id=\"val-mix\">100%<\/div>\n            <\/div>\n            <div class=\"knob-cell\">\n              <svg class=\"knob\" id=\"knob-pedal\" viewBox=\"0 0 100 100\"><\/svg>\n              <div class=\"knob-name\">Pedal<\/div>\n              <div class=\"knob-val\" id=\"val-pedal2\">0.50<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div class=\"card mode-card\">\n          <h2>Drive Mode<\/h2>\n          <div class=\"mode-row\">\n            <button class=\"mode-btn on\" id=\"mode-manual\">Manual<\/button>\n            <button class=\"mode-btn\" id=\"mode-auto\">Auto Env<\/button>\n          <\/div>\n          <div class=\"auto-lamp\">\n            <span class=\"lamp\" id=\"autoLamp\"><\/span>\n            <span id=\"modeText\">treadle drives the sweep<\/span>\n          <\/div>\n        <\/div>\n\n      <\/div>\n    <\/div>\n\n    <div class=\"foot\">Original resonant wah &middot; double-click any control to reset<\/div>\n  <\/div>\n\n  <script>\n    \"use strict\";\n\n    // ---- param indices (match spec.json) ----\n    var P_PEDAL = 0, P_Q = 1, P_RANGE = 2, P_MODE = 3, P_MIX = 4;\n\n    var defaults = {};\n    defaults[P_PEDAL] = 0.5;\n    defaults[P_Q] = 0.6;\n    defaults[P_RANGE] = 0.7;\n    defaults[P_MODE] = 0;\n    defaults[P_MIX] = 1.0;\n\n    var state = {};\n    for (var k in defaults) state[k] = defaults[k];\n\n    // ---- host bridge ----\n    function push(index, value) {\n      state[index] = value;\n      if (window.vstai && window.vstai.setParam) {\n        window.vstai.setParam(index, value);\n      }\n    }\n\n    // ====================================================================\n    //  PEDAL TREADLE  (drag to tilt)\n    // ====================================================================\n    var treadle = document.getElementById(\"treadle\");\n    var rock = document.getElementById(\"rock\");\n    var mouth = document.getElementById(\"mouth\");\n    var pedalPct = document.getElementById(\"pedalPct\");\n    var pedalHz = document.getElementById(\"pedalHz\");\n    var vowel = document.getElementById(\"vowel\");\n\n    var VOWELS = [\"oo\", \"oh\", \"uh\", \"ah\", \"eh\", \"ee\"];\n\n    function approxHz(pos) {\n      // mirrors the DSP map: fMin + fSpan * pos^2, fSpan ~ from Range\n      var span = 400 + state[P_RANGE] * 2200;\n      return Math.round(320 + span * pos * pos);\n    }\n\n    function renderPedal() {\n      var pos = state[P_PEDAL];\n      // heel (0) tilts back +18deg, toe (1) tilts forward -22deg\n      var deg = 18 - pos * 40;\n      rock.setAttribute(\"transform\", \"rotate(\" + deg.toFixed(2) + \" 110 158)\");\n      // mouth opens as the sweep rises\n      var ry = 4 + pos * 18;\n      mouth.setAttribute(\"ry\", ry.toFixed(1));\n      pedalPct.textContent = Math.round(pos * 100) + \"%\";\n      pedalHz.textContent = approxHz(pos) + \" Hz\";\n      var vi = Math.min(VOWELS.length - 1, Math.floor(pos * VOWELS.length));\n      vowel.innerHTML = \"vowel: &laquo; \" + VOWELS[vi] + \" &raquo;\";\n      // keep the pedal knob mirror in sync\n      drawKnob(knobs.pedal);\n      document.getElementById(\"val-pedal2\").textContent = pos.toFixed(2);\n    }\n\n    (function () {\n      var dragging = false;\n      var startY = 0, startPos = 0;\n\n      function setFromDrag(clientY) {\n        var dy = startY - clientY;        // up = increase\n        var pos = startPos + dy / 180;\n        pos = Math.max(0, Math.min(1, pos));\n        push(P_PEDAL, pos);\n        renderPedal();\n      }\n      function down(e) {\n        dragging = true;\n        treadle.classList.add(\"drag\");\n        startY = (e.touches ? e.touches[0].clientY : e.clientY);\n        startPos = state[P_PEDAL];\n        e.preventDefault();\n      }\n      function move(e) {\n        if (!dragging) return;\n        var y = (e.touches ? e.touches[0].clientY : e.clientY);\n        setFromDrag(y);\n        e.preventDefault();\n      }\n      function up() { dragging = false; treadle.classList.remove(\"drag\"); }\n\n      treadle.addEventListener(\"mousedown\", down);\n      window.addEventListener(\"mousemove\", move);\n      window.addEventListener(\"mouseup\", up);\n      treadle.addEventListener(\"touchstart\", down, { passive: false });\n      window.addEventListener(\"touchmove\", move, { passive: false });\n      window.addEventListener(\"touchend\", up);\n      treadle.addEventListener(\"dblclick\", function () {\n        push(P_PEDAL, defaults[P_PEDAL]);\n        renderPedal();\n      });\n    })();\n\n    // ====================================================================\n    //  KNOBS  (SVG, drag vertical, dblclick reset, wheel fine-tune)\n    // ====================================================================\n    var knobs = {};\n\n    function makeKnob(id, index, fmt) {\n      var el = document.getElementById(id);\n      var k = { el: el, index: index, fmt: fmt };\n      knobs[index === P_PEDAL ? \"pedal\" : id.replace(\"knob-\", \"\")] = k;\n      buildKnob(k);\n      drawKnob(k);\n      attachKnob(k);\n      return k;\n    }\n\n    function buildKnob(k) {\n      k.el.innerHTML =\n        '<defs>' +\n          '<radialGradient id=\"kbody-' + k.index + '\" cx=\"0.5\" cy=\"0.38\" r=\"0.65\">' +\n            '<stop offset=\"0\" stop-color=\"#403018\"/>' +\n            '<stop offset=\"1\" stop-color=\"#1a130a\"/>' +\n          '<\/radialGradient>' +\n        '<\/defs>' +\n        '<circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"#0c0905\" stroke=\"rgba(255,255,255,0.05)\" stroke-width=\"1\"/>' +\n        '<linearGradient id=\"karc-' + k.index + '\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">' +\n          '<stop offset=\"0\" stop-color=\"#ffd23f\"/>' +\n          '<stop offset=\"1\" stop-color=\"#ff9e2c\"/>' +\n        '<\/linearGradient>' +\n        '<path id=\"arc-' + k.index + '\" fill=\"none\" stroke=\"url(#karc-' + k.index + ')\" stroke-width=\"6\" stroke-linecap=\"round\"/>' +\n        '<circle cx=\"50\" cy=\"50\" r=\"31\" fill=\"url(#kbody-' + k.index + ')\" stroke=\"#000\" stroke-width=\"1\"/>' +\n        '<circle cx=\"50\" cy=\"50\" r=\"31\" fill=\"none\" stroke=\"rgba(255,255,255,0.08)\" stroke-width=\"1\"/>' +\n        '<line id=\"ptr-' + k.index + '\" x1=\"50\" y1=\"50\" x2=\"50\" y2=\"24\" stroke=\"#ffd23f\" stroke-width=\"3\" stroke-linecap=\"round\"/>';\n    }\n\n    function polar(cx, cy, r, ang) {\n      return [cx + r * Math.cos(ang), cy + r * Math.sin(ang)];\n    }\n\n    function drawKnob(k) {\n      var v = state[k.index];\n      // sweep from 135deg to 405deg (270deg total), top-centred\n      var a0 = Math.PI * 0.75;\n      var a1 = Math.PI * 0.75 + Math.PI * 1.5 * v;\n      var arc = k.el.querySelector(\"#arc-\" + k.index);\n      var p0 = polar(50, 50, 42, Math.PI / 2 + a0);\n      var p1 = polar(50, 50, 42, Math.PI / 2 + a1);\n      var large = (a1 - a0) > Math.PI ? 1 : 0;\n      arc.setAttribute(\"d\",\n        \"M \" + p0[0].toFixed(2) + \" \" + p0[1].toFixed(2) +\n        \" A 42 42 0 \" + large + \" 1 \" + p1[0].toFixed(2) + \" \" + p1[1].toFixed(2));\n      var ptr = k.el.querySelector(\"#ptr-\" + k.index);\n      var pa = Math.PI / 2 + a1;\n      var px = 50 + 24 * Math.cos(pa);\n      var py = 50 + 24 * Math.sin(pa);\n      ptr.setAttribute(\"x2\", px.toFixed(2));\n      ptr.setAttribute(\"y2\", py.toFixed(2));\n    }\n\n    function attachKnob(k) {\n      var dragging = false, startY = 0, startV = 0;\n\n      function commit() {\n        drawKnob(k);\n        if (k.onChange) k.onChange();\n      }\n      k.el.addEventListener(\"mousedown\", function (e) {\n        dragging = true; startY = e.clientY; startV = state[k.index]; e.preventDefault();\n      });\n      window.addEventListener(\"mousemove\", function (e) {\n        if (!dragging) return;\n        var v = startV + (startY - e.clientY) / 160;\n        v = Math.max(0, Math.min(1, v));\n        push(k.index, v); commit();\n      });\n      window.addEventListener(\"mouseup\", function () { dragging = false; });\n      k.el.addEventListener(\"dblclick\", function () {\n        push(k.index, defaults[k.index]); commit();\n      });\n      k.el.addEventListener(\"wheel\", function (e) {\n        e.preventDefault();\n        var v = state[k.index] - Math.sign(e.deltaY) * 0.02;\n        v = Math.max(0, Math.min(1, v));\n        push(k.index, v); commit();\n      }, { passive: false });\n\n      // touch\n      k.el.addEventListener(\"touchstart\", function (e) {\n        dragging = true; startY = e.touches[0].clientY; startV = state[k.index]; e.preventDefault();\n      }, { passive: false });\n      window.addEventListener(\"touchmove\", function (e) {\n        if (!dragging) return;\n        var v = startV + (startY - e.touches[0].clientY) / 160;\n        v = Math.max(0, Math.min(1, v));\n        push(k.index, v); commit();\n      }, { passive: false });\n      window.addEventListener(\"touchend\", function () { dragging = false; });\n    }\n\n    // ---- value readouts ----\n    function fmtQ() { document.getElementById(\"val-q\").textContent = state[P_Q].toFixed(2); }\n    function fmtRange() {\n      document.getElementById(\"val-range\").textContent = state[P_RANGE].toFixed(2);\n      renderPedal(); // range changes the Hz readout\n    }\n    function fmtMix() { document.getElementById(\"val-mix\").textContent = Math.round(state[P_MIX] * 100) + \"%\"; }\n\n    var kQ = makeKnob(\"knob-q\", P_Q); kQ.onChange = fmtQ;\n    var kR = makeKnob(\"knob-range\", P_RANGE); kR.onChange = fmtRange;\n    var kM = makeKnob(\"knob-mix\", P_MIX); kM.onChange = fmtMix;\n    var kP = makeKnob(\"knob-pedal\", P_PEDAL);\n    kP.onChange = function () {\n      document.getElementById(\"val-pedal2\").textContent = state[P_PEDAL].toFixed(2);\n      renderPedal();\n    };\n\n    // ====================================================================\n    //  MODE SWITCH\n    // ====================================================================\n    var btnManual = document.getElementById(\"mode-manual\");\n    var btnAuto = document.getElementById(\"mode-auto\");\n    var autoLamp = document.getElementById(\"autoLamp\");\n    var modeText = document.getElementById(\"modeText\");\n\n    function renderMode() {\n      var auto = state[P_MODE] >= 0.5;\n      btnAuto.classList.toggle(\"on\", auto);\n      btnManual.classList.toggle(\"on\", !auto);\n      autoLamp.classList.toggle(\"lit\", auto);\n      modeText.textContent = auto ? \"envelope drives the sweep\" : \"treadle drives the sweep\";\n      treadle.style.opacity = auto ? \"0.55\" : \"1\";\n    }\n    btnManual.addEventListener(\"click\", function () { push(P_MODE, 0); renderMode(); });\n    btnAuto.addEventListener(\"click\", function () { push(P_MODE, 1); renderMode(); });\n\n    // ====================================================================\n    //  INIT — push every param to its default\n    // ====================================================================\n    function initAll() {\n      push(P_PEDAL, defaults[P_PEDAL]);\n      push(P_Q, defaults[P_Q]);\n      push(P_RANGE, defaults[P_RANGE]);\n      push(P_MODE, defaults[P_MODE]);\n      push(P_MIX, defaults[P_MIX]);\n      renderPedal();\n      drawKnob(kQ); drawKnob(kR); drawKnob(kM); drawKnob(kP);\n      fmtQ(); fmtRange(); fmtMix();\n      renderMode();\n    }\n\n    if (window.vstai && window.vstai.onReady) {\n      window.vstai.onReady(initAll);\n    } else {\n      initAll();\n    }\n  <\/script>\n<\/body>\n<\/html>\n";

  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
