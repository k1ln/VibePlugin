<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pitch Snap</title>
<style>
  :root{ --acc:#43e0c4; --acc2:#ff5a8c; --bg0:#070d0c; --bg1:#0e1a18; --ink:#e4f4f0; --dim:#5e8480; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,#0f2a28 0%,var(--bg1) 44%,var(--bg0) 100%);
    color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(94vw,720px); border-radius:14px; padding:16px 22px 20px; position:relative; overflow:hidden;
    background:linear-gradient(160deg,#143230,#070f0e); border:1px solid rgba(67,224,196,.2); box-shadow:0 22px 64px rgba(0,0,0,.6),inset 0 1px 0 rgba(200,255,245,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:20px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4; transform:scale(.85);} 50%{ opacity:1; transform:scale(1.2);} }
  .screen{ height:100px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#0a1c1a,#0a1312); border:1px solid rgba(67,224,196,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.5); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:74px; height:74px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(180,230,225,.14); stroke-width:7; stroke-linecap:round; }
  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(67,224,196,.6)); }
  .pcap{ fill:#0a1614; stroke:rgba(67,224,196,.22); stroke-width:1; }
  .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim); }
  .kv{ font-size:11px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(67,224,196,.1); padding:1px 8px; border-radius:7px; border:1px solid rgba(67,224,196,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style>
</head>
<body>
  <div class="unit">
    <header><span class="logo">PITCH&nbsp;SNAP</span><span class="sub">pitch correction</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">NOTE GRID</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){
  "use strict";
  var KEYS=["Chromatic","Major","Minor","Fifths"];
  var P=[{name:"Speed",idx:0,def:0.6},{name:"Amount",idx:1,def:0.8},{name:"Key",idx:2,def:0.0},{name:"Mix",idx:3,def:1.0},{name:"Output",idx:4,def:0.7}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });
  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  function keyName(){ var k=Math.floor(vals[2]*3.999); return KEYS[k<0?0:(k>3?3:k)]; }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135;
  var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){
    var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 86 86"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#43e0c4"/><stop offset="1" stop-color="#ff5a8c"/></linearGradient></defs>'+
      '<circle class="track" cx="43" cy="43" r="33"></circle><circle class="arc" cx="43" cy="43" r="33" transform="rotate(135 43 43)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'+
      '<circle class="pcap" cx="43" cy="43" r="21"></circle><line class="ptr" x1="43" y1="43" x2="43" y2="26"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el);
    var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString());
      var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(43+Math.sin(ang)*17).toFixed(2)); ptr.setAttribute("y2",(43-Math.cos(ang)*17).toFixed(2));
      val.textContent=(p.idx===2)?keyName():Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });
    render(p.def); return {render:render};
  });
  // note-grid with a wandering "detected" pitch that snaps toward grid lines (speed/amount)
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener("resize",resize); resize();
  var trail=[];
  function frame(ts){ ctx.clearRect(0,0,W,H); var rows=8; var amt=vals[1], spd=vals[0];
    for(var r=0;r<rows;r++){ var y=10+r*((H-20)/(rows-1)); ctx.strokeStyle="rgba(67,224,196,0.12)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(10,y); ctx.lineTo(W-10,y); ctx.stroke(); }
    var raw=3.5+2.6*Math.sin(ts/700)+0.6*Math.sin(ts/130);
    var snapped=Math.round(raw); var cur=raw+(snapped-raw)*amt*(0.3+spd*0.7);
    trail.push(cur); if(trail.length>90) trail.shift();
    ctx.beginPath();
    for(var i=0;i<trail.length;i++){ var x=10+(i/89)*(W-20); var yy=10+(trail[i]/(rows-1))*(H-20); if(i===0)ctx.moveTo(x,yy); else ctx.lineTo(x,yy); }
    ctx.strokeStyle="rgba(255,90,140,0.9)"; ctx.lineWidth=2; ctx.shadowColor="#ff5a8c"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    // dot at current
    var dx=W-12, dy=10+(cur/(rows-1))*(H-20); ctx.fillStyle="#43e0c4"; ctx.beginPath(); ctx.arc(dx,dy,3,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script>
</body>
</html>
