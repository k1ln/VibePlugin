<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Polar Six</title>
<style>
  :root{ --acc:#6ab8e0; --acc2:#f0e2c0; --bg0:#070c11; --bg1:#0d1822; --ink:#e8f1f7; --dim:#708595; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#122736 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#0f1e2a,#070c11); border:1px solid rgba(106,184,224,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(232,241,247,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
  .screen{ height:100px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#0b1824,#070d13); border:1px solid rgba(106,184,224,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(214,230,240,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(106,184,224,.6)); }
  .pcap{ fill:#0b1620; stroke:rgba(106,184,224,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(106,184,224,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(106,184,224,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">POLAR&nbsp;SIX</span><span class="sub">hard-sync poly</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">OSC&nbsp;SYNC</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Cutoff",idx:0,def:0.6},{name:"Reso",idx:1,def:0.3},{name:"Env",idx:2,def:0.4},{name:"Sync",idx:3,def:0.4},{name:"Detune",idx:4,def:0.4},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6ab8e0"/><stop offset="1" stop-color="#f0e2c0"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function frame(ts){ ctx.clearRect(0,0,W,H); var cut=vals[0], env=vals[2], sync=vals[3], det=vals[4]; var mid=H*0.54;
    // polar aurora wash
    var g=ctx.createLinearGradient(0,0,W,H); g.addColorStop(0,"rgba(106,184,224,0.05)"); g.addColorStop(0.5,"rgba(240,226,192,0.03)"); g.addColorStop(1,"rgba(106,184,224,0.05)"); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // envelope sweeps the effective sync ratio a touch (movement)
    var sr=1+ (sync*2.2) * (1 + env*0.4*Math.sin(ts/900));
    var cycles=2.2;
    // hard-sync saw: master period, osc2 reset at each master wrap (teeth)
    ctx.beginPath();
    for(var x=0;x<=W;x+=1.2){ var t=x/W; var mp=(t*cycles + ts/1400)%1; // master phase
      var sp=(mp*sr)%1; // synced phase resets each master cycle
      var o1=(mp*2-1)*0.4; var o2=(sp*2-1)*0.55; var v=(o1+o2)*(0.4+cut*0.5);
      ctx.lineTo(x, mid - v*(H*0.34)); }
    ctx.strokeStyle="rgba(106,184,224,0.92)"; ctx.lineWidth=2; ctx.shadowColor="#6ab8e0"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    // warmth detune layer (cream)
    if(det>0.02){ ctx.beginPath(); for(var x2=0;x2<=W;x2+=2){ var t2=x2/W; var p3=(t2*cycles*(1.01)+ts/1400)%1; var v3=(p3*2-1)*det*0.35*(0.4+cut*0.4); ctx.lineTo(x2, mid - v3*(H*0.22)); }
      ctx.strokeStyle="rgba(240,226,192,0.5)"; ctx.lineWidth=1.3; ctx.stroke(); }
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
