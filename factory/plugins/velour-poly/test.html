<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Velour Poly — test bench</title><style>
  :root{--ac:#c87aff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Velour Poly<\/title>\n<style>\n  :root {\n    --accent: #c87aff;\n    --accent2: #ffb0d0;\n    --panel: #1a1620;\n    --panel-hi: #261f30;\n    --ink: #ece6f3;\n    --ink-dim: #9a8fac;\n    --well: #120f17;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    width: 100%;\n    min-height: 100%;\n    background: #0d0a12;\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n  }\n\n  body {\n    display: flex;\n    justify-content: center;\n    padding: 18px;\n  }\n\n  .shell {\n    width: 100%;\n    max-width: 760px;\n    border-radius: 22px;\n    padding: 22px 24px 26px;\n    position: relative;\n    overflow: hidden;\n    background:\n      radial-gradient(120% 90% at 12% -10%, rgba(200,122,255,0.22), transparent 55%),\n      radial-gradient(120% 90% at 92% 0%, rgba(255,176,208,0.18), transparent 55%),\n      linear-gradient(160deg, #221b2c 0%, #16121d 55%, #110d16 100%);\n    box-shadow:\n      0 30px 70px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(255,255,255,0.06),\n      inset 0 -2px 14px rgba(0,0,0,0.5);\n    border: 1px solid rgba(200,122,255,0.18);\n  }\n\n  /* soft moving velvet sheen */\n  .shell::before {\n    content: \"\";\n    position: absolute;\n    inset: -40%;\n    background:\n      radial-gradient(40% 30% at 30% 30%, rgba(200,122,255,0.10), transparent 60%),\n      radial-gradient(40% 30% at 70% 60%, rgba(255,176,208,0.10), transparent 60%);\n    filter: blur(20px);\n    animation: drift 16s ease-in-out infinite alternate;\n    pointer-events: none;\n  }\n  @keyframes drift {\n    0%   { transform: translate(-3%, -2%) scale(1.0); }\n    100% { transform: translate(3%, 2%) scale(1.08); }\n  }\n\n  header {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    position: relative;\n    z-index: 2;\n    margin-bottom: 14px;\n  }\n  .title {\n    font-size: 22px;\n    font-weight: 700;\n    letter-spacing: 0.5px;\n    background: linear-gradient(95deg, var(--accent2), var(--accent));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    text-shadow: 0 0 24px rgba(200,122,255,0.25);\n  }\n  .subtitle {\n    font-size: 10px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n\n  /* ---- waveform scope ---- */\n  .scope-wrap {\n    position: relative;\n    z-index: 2;\n    border-radius: 14px;\n    padding: 8px;\n    background:\n      linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.5));\n    box-shadow: inset 0 2px 12px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(200,122,255,0.12);\n    margin-bottom: 18px;\n  }\n  canvas#scope {\n    display: block;\n    width: 100%;\n    height: 96px;\n    border-radius: 8px;\n  }\n\n  /* ---- controls grid ---- */\n  .rack {\n    position: relative;\n    z-index: 2;\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 14px 10px;\n    margin-bottom: 18px;\n  }\n  @media (max-width: 540px) {\n    .rack { grid-template-columns: repeat(2, 1fr); }\n  }\n\n  .knob {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    user-select: none;\n    -webkit-user-select: none;\n  }\n  .knob .dial {\n    cursor: ns-resize;\n    touch-action: none;\n    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.55));\n    transition: filter 0.18s ease;\n  }\n  .knob:hover .dial { filter: drop-shadow(0 6px 16px rgba(200,122,255,0.4)); }\n  .knob .label {\n    margin-top: 7px;\n    font-size: 10px;\n    letter-spacing: 1.6px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .knob .val {\n    margin-top: 3px;\n    font-size: 12px;\n    font-variant-numeric: tabular-nums;\n    color: var(--ink);\n    font-weight: 600;\n  }\n\n  /* ---- bender ---- */\n  .bender-zone {\n    position: relative;\n    z-index: 2;\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    padding: 12px 16px;\n    border-radius: 14px;\n    background: linear-gradient(180deg, var(--panel-hi), var(--panel));\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -3px 10px rgba(0,0,0,0.5);\n    margin-bottom: 16px;\n  }\n  .bender-zone .tag {\n    font-size: 10px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    white-space: nowrap;\n  }\n  .bender {\n    position: relative;\n    flex: 1;\n    height: 26px;\n    border-radius: 13px;\n    background: var(--well);\n    box-shadow: inset 0 2px 6px rgba(0,0,0,0.8);\n    cursor: ew-resize;\n    touch-action: none;\n    overflow: hidden;\n  }\n  .bender .center-line {\n    position: absolute;\n    left: 50%;\n    top: 4px; bottom: 4px;\n    width: 1px;\n    background: rgba(200,122,255,0.3);\n    transform: translateX(-0.5px);\n  }\n  .bender .cap {\n    position: absolute;\n    top: 3px; bottom: 3px;\n    width: 38px;\n    border-radius: 10px;\n    left: 50%;\n    transform: translateX(-50%);\n    background: linear-gradient(180deg, #4a3b5e, #2a2238);\n    box-shadow: 0 2px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.12);\n    border: 1px solid rgba(200,122,255,0.35);\n    transition: box-shadow 0.15s ease;\n  }\n  .bender:hover .cap { box-shadow: 0 2px 14px rgba(255,176,208,0.45), inset 0 1px 0 rgba(255,255,255,0.2); }\n\n  /* ---- keyboard ---- */\n  .keys {\n    position: relative;\n    z-index: 2;\n    display: flex;\n    height: 96px;\n    border-radius: 10px;\n    padding: 6px;\n    background: linear-gradient(180deg, #0a070e, #15101d);\n    box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);\n  }\n  .keybed {\n    position: relative;\n    flex: 1;\n    height: 100%;\n  }\n  .wkey {\n    position: absolute;\n    top: 0; bottom: 0;\n    border-radius: 0 0 5px 5px;\n    background: linear-g
