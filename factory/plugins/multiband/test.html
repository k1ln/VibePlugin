<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Multiband — test bench</title><style>
  :root{--ac:#ff8a5a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Multiband</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\n:root{\n  --ac:#ff8a5a;        /* warm coral accent */\n  --ac2:#ffd166;       /* amber highlight  */\n  --bg0:#0c0d12;\n  --bg1:#14161f;\n  --panel:#191c27;\n  --panel2:#1f2230;\n  --line:rgba(255,255,255,.07);\n  --ink:#eef1f7;\n  --dim:#8b91a6;\n  --low:#ff7a59;\n  --mid:#ffb24d;\n  --high:#ffd166;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px ui-sans-serif,-apple-system,\"Segoe UI\",system-ui,sans-serif;\n  color:var(--ink);\n  background:\n    radial-gradient(130% 80% at 50% -10%,#1b1d28 0%,#0d0e14 55%,#070809 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:20px;min-height:100%;\n}\n\n.unit{\n  position:relative;\n  width:min(560px,96vw);\n  border-radius:18px;\n  padding:18px 20px 20px;\n  background:\n    linear-gradient(180deg,#20232f 0%,var(--panel) 18%,var(--bg1) 100%);\n  box-shadow:\n    0 30px 70px -22px rgba(0,0,0,.8),\n    0 1px 0 rgba(255,255,255,.06) inset,\n    0 0 0 1px rgba(0,0,0,.5),\n    0 0 0 1px var(--line) inset;\n  animation:rise .6s cubic-bezier(.2,.8,.25,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:none}}\n\n/* faint top rack-rail texture */\n.unit::before{\n  content:\"\";position:absolute;inset:0;border-radius:18px;pointer-events:none;\n  background:\n    repeating-linear-gradient(180deg,rgba(255,255,255,.018) 0 1px,transparent 1px 4px);\n  opacity:.5;mix-blend-mode:screen;\n}\n\n/* ===== header ===== */\n.head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}\n.brand{font-size:8.5px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase}\nh1{\n  margin:2px 0 0;font-size:23px;font-weight:800;letter-spacing:.04em;line-height:1;\n  background:linear-gradient(90deg,var(--ac) 0%,var(--ac2) 100%);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n}\n.sub{font-size:8px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;margin-top:5px}\n.pwr{display:flex;align-items:center;gap:8px}\n.dot{width:9px;height:9px;border-radius:50%;\n  background:radial-gradient(circle at 38% 32%,#fff,var(--ac2) 45%,#a8521f 90%);\n  box-shadow:0 0 12px var(--ac2),0 0 3px #fff inset;\n  animation:beat 2.4s ease-in-out infinite}\n@keyframes beat{0%,100%{box-shadow:0 0 7px var(--ac2),0 0 3px #fff inset}50%{box-shadow:0 0 16px var(--ac2),0 0 5px #fff inset}}\n.pwr span{font-size:8px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase}\n\n/* ===== band lanes ===== */\n.lanes{display:flex;flex-direction:column;gap:10px}\n.lane{\n  position:relative;\n  display:grid;\n  grid-template-columns:74px 1fr 96px;\n  gap:14px;align-items:center;\n  padding:12px 14px;border-radius:13px;\n  background:linear-gradient(180deg,var(--panel2),#171a24);\n  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 0 0 1px rgba(0,0,0,.45),0 8px 18px -12px rgba(0,0,0,.7);\n  animation:pop .5s both;animation-delay:var(--d);\n}\n@keyframes pop{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}\n.lane::before{ /* left accent strip = band colour */\n  content:\"\";position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:3px;\n  background:var(--bc);box-shadow:0 0 10px var(--bc);}\n\n/* band identity */\n.bid{display:flex;flex-direction:column;gap:3px}\n.bname{font-size:11px;font-weight:800;letter-spacing:.14em;color:var(--bc);text-transform:uppercase}\n.brange{font-size:8px;letter-spacing:.1em;color:var(--dim);font-variant-numeric:tabular-nums}\n\n/* ===== gain-reduction meter (the centrepiece, pumps independently) ===== */\n.meter{\n  position:relative;height:46px;border-radius:9px;overflow:hidden;\n  background:radial-gradient(120% 160% at 50% 130%,#0b0d13,#05060a 75%);\n  box-shadow:inset 0 2px 8px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,255,255,.03);\n}\n/* scale ticks (dB-ish) */\n.meter .scale{position:absolute;inset:0;pointer-events:none;\n  background:repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,transparent 1px 10%);}\n/* spectrum bars across the lane, animated */\n.bars{position:absolute;inset:6px 8px;display:flex;align-items:flex-end;gap:2px}\n.bars i{flex:1;border-radius:2px 2px 0 0;transform-origin:bottom;\n  background:linear-gradient(180deg,var(--bc),rgba(255,255,255,.05));\n  opacity:.55;}\n/* gain-reduction fill: grows DOWN from the top in the band colour */\n.gr{position:absolute;top:0;left:0;right:0;height:0%;\n  background:linear-gradient(180deg,var(--bc),transparent);\n  box-shadow:0 0 14px var(--bc);opacity:.85;\n  transition:height .05s linear;}\n.gr::after{content:\"\";position:absolute;left:0;right:0;bottom:0;height:2px;\n  background:var(--ac2);box-shadow:0 0 8px var(--ac2);}\n.thrline{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,.35);\n  box-shadow:0 0 5px rgba(255,255,255,.4);transition:top .12s ease;}\n.grtxt{position:absolute;right:6px;top:5px;font-size:9px;font-weight:700;letter-spacing:.06em;\n  color:#fff;font-variant-numeric:tabular-nums;opacity:.85;text-shadow:0 1px 3px #000}\n\n/* ===== per-lane threshold knob ===== */\n.knobwrap{display:flex;flex-direction:column;align-items:center;gap:5px}\n.knob{position:relative;width:54px;height:54px;cursor:ns-resize;touch-action:none;user-select:none}\n.arc{position:absolute;inset:0;border-radius:50%;\n  background:conic-gradient(from 215deg,var(--bc) calc(var(--n)*270deg),rgba(255,255,255,.05) calc(var(--n)*270deg) 270deg,transparent 270deg);\n  filter:drop-shadow(0 0 calc(1px + var(--n)*6px) var(--bc));\n  transition:filter .12s ease;}\n.cap{position:absolute;top:8px;left:8px;width:38px;height:38px;border-radius:50%;\n  background:radial-gradient(circle at 50% 30%,#3a3e4d 0%,#191c26 62%,#0e1016 100%);\n  box-shadow:inset 0 2px 5px rgba(255,255,255,.12),inset 0 -5px 10px rgba(0,0,0,.8),0 3px 7px rgba(0,0,0,.5);}\n.ptr{position:absolute;top:5px;left:50%;width:3px;height:15px;margin-left:-1.5px;border-radius:3px;\n  background:linear-gradient(var(--ac2),var(--bc));box-shadow:0 0 6px var(--bc),0 0 2px #fff;\n  transform-origin:50% 22px;transform:rotate(calc((var(--n) - .5) * 270deg));\n  transition:transform .12s cubic-bezier(.2,.8,.25,1)}\n.klabel{font-size:8px;font-weight:700;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}\n.kval{font-size:10px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}\n.knob.act .cap{box-shadow:inset 0 2px 5px rgba(255,255,255,.14),inset 0 -5px 10px rgba(0,0,0,.8),0 3px 11px var(--bc)}\n\n/* ===== bottom master row ===== */\n.master{display:flex;align-items:center;justify-content:space-between;gap:16px;\n  margin-top:14px;padding:14px 16px;border-radius:13px;\n  background:linear-gradient(180deg,#1d2030,#13151e);\n  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 0 0 1px rgba(0,0,0,.45)}\n.mctl{display:flex;align-items:center;gap:12px}\n.bigknob{position:relative;width:64px;height:64px;cursor:ns-resize;touch-action:none;user-select:none}\n.bigknob .arc{background:conic-gradient(from 215deg,var(--ac) calc(var(--n)*270deg),rgba(255,255,255,.05) calc(var(--n)*270deg) 270deg,transparent 270deg);\n  filter:drop-shadow(0 0 calc(2px + var(--n)*8px) var(--ac));}\n.bigknob .cap{top:9px;left:9px;width:46px;height:46px}\n.bigknob .ptr{top:6px;height:18px;transform-origin:50% 26px;background:linear-gradient(var(--ac2),var(--ac));box-shadow:0 0 7px var(--ac),0 0 2px #fff}\n.mmeta{display:flex;flex-direction:column;gap:2px}\n.mmeta .t{font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}\n.mmeta .v{font-size:16px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}\n.mmeta .v small{font-size:9px;color:var(--dim);font-weight:600;margin-left:2px}\n\n@media (max-width:460px){\n  .lane{grid-template-columns:60px 1fr 76px;gap:9px;padding:10px}\n  .master{flex-direction:column;align-items:stretch;gap:14px}\n}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"unit\">\n\n  <div class=\"head\">\n    <div>\n      <div class=\"brand\">Mastering Series<\/div>\n      <h1>Multiband<\/h1>\n      <div class=\"sub\">3-Band Dynamics<\/div>\n    <\/div>\n    <div class=\"pwr\"><span>Active<\/span><span class=\"dot\"><\/span><\/div>\n  <\/div>\n\n  <div class=\"lanes\" id=\"lanes\"><\/div>\n\n  <div class=\"master\">\n    <div class=\"mctl\">\n      <div class=\"bigknob\" id=\"ratioKnob\" tabindex=\"0\">\n        <i class=\"arc\"><\/i><i class=\"cap\"><\/i><i class=\"ptr\"><\/i>\n      <\/div>\n      <div class=\"mmeta\">\n        <div class=\"t\">Ratio<\/div>\n        <div class=\"v\" id=\"ratioVal\">1.0<small>:1<\/small><\/div>\n      <\/div>\n    <\/div>\n    <div class=\"mctl\">\n      <div class=\"mmeta\" style=\"text-align:right;align-items:flex-end\">\n        <div class=\"t\">Output<\/div>\n        <div class=\"v\" id=\"outVal\">0.0<small>dB<\/small><\/div>\n      <\/div>\n      <div class=\"bigknob\" id=\"outKnob\" tabindex=\"0\">\n        <i class=\"arc\"><\/i><i class=\"cap\"><\/i><i class=\"ptr\"><\/i>\n      <\/div>\n    <\/div>\n  <\/div>\n\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- parameter map (indices MUST match assembly.ts) ----\n  var P = {\n    LOW:0, MID:1, HIGH:2, RATIO:3, OUT:4\n  };\n\n  var BANDS = [\n    { key:\"LOW\",  index:P.LOW,  name:\"Low\",  range:\"&lt; 220 Hz\",      colour:\"var(--low)\",  def:0.5 },\n    { key:\"MID\",  index:P.MID,  name:\"Mid\",  range:\"220 Hz – 2.5 kHz\", colour:\"var(--mid)\",  def:0.5 },\n    { key:\"HIGH\", index:P.HIGH, name:\"High\", range:\"&gt; 2.5 kHz\",     colour:\"var(--high)\", def:0.5 }\n  ];\n\n  var state = {};          // index -> raw 0..1 value\n  var lanesEl = document.getElementById('lanes');\n\n  function pushParam(index, value){\n    state[index] = value;\n    if (window.vstai && window.vstai.setParam) window.vstai.setParam(index, value);\n  }\n\n  // ---------------------------------------------------------------\n  //  Build the three band lanes\n  // ---------------------------------------------------------------\n  var laneRefs = [];   // { gr, bars[], grtxt, thr, arc, ptr, kval, threshold }\n\n  BANDS.forEach(function(b, i){\n    var lane = document.createElement('div');\n    lane.className = 'lane';\n    lane.style.setProperty('--bc', b.colour);\n    lane.style.setProperty('--d', (i*80)+'ms');\n\n    var barsHtml = '';\n    var NB = 14;\n    for (var k=0;k<NB;k++) barsHtml += '<i><\/i>';\n\n    lane.innerHTML =\n      '<div class=\"bid\">'+\n        '<div class=\"bname\">'+b.name+'<\/div>'+\n        '<div class=\"brange\">'+b.range+'<\/div>'+\n      '<\/div>'+\n      '<div class=\"meter\">'+\n        '<div class=\"scale\"><\/div>'+\n        '<div class=\"bars\">'+barsHtml+'<\/div>'+\n        '<div class=\"thrline\"><\/div>'+\n        '<div class=\"gr\"><\/div>'+\n        '<div class=\"grtxt\">0.0 dB<\/div>'+\n      '<\/div>'+\n      '<div class=\"knobwrap\">'+\n        '<div class=\"knob\" tabindex=\"0\"><i class=\"arc\"><\/i><i class=\"cap\"><\/i><i class=\"ptr\"><\/i><\/div>'+\n        '<div class=\"klabel\">Thresh<\/div>'+\n        '<div class=\"kval\"><\/div>'+\n      '<\/div>';\n\n    lanesEl.appendChild(lane);\n\n    var ref = {\n      gr:    lane.querySelector('.gr'),\n      bars:  Array.prototype.slice.call(lane.querySelectorAll('.bars i')),\n      grtxt: lane.querySelector('.grtxt'),\n      thr:   lane.querySelector('.thrline'),\n      arc:   lane.querySelector('.knob .arc'),\n      ptr:   lane.querySelector('.knob .ptr'),\n      kval:  lane.querySelector('.kval'),\n      knob:  lane.querySelector('.knob'),\n      env:   0,     // simulated band detector\n      grSmooth:0,   // smoothed gain reduction in dB (positive number)\n      phase: Math.random()*6.28,\n      colour:b.colour\n    };\n    laneRefs.push(ref);\n\n    var v = b.def;\n    function paintKnob(){\n      ref.arc.style.setProperty('--n', v);\n      ref.ptr.style.setProperty('--n', v);\n      // show as a threshold in dB: 0 -> -40 dB (aggressive), 1 -> -1 dB (open)\n      var thrDb = -40 + v*39;\n      ref.kval.textContent = thrDb.toFixed(0)+' dB';\n      // threshold guide line on the meter (top = 0 GR, lower = deeper)\n      ref.thr.style.top = ((1 - v) * 70 + 6) + '%';\n      pushParam(b.index, v);\n    }\n    function setNorm(n){ v = n<0?0:n>1?1:n; paintKnob(); }\n\n    var drag=false, startY=0, startN=0;\n    ref.knob.addEventListener('pointerdown', function(e){\n      drag=true; startY=e.clientY; startN=v;\n      ref.knob.classList.add('act'); ref.knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    ref.knob.addEventListener('pointermove', function(e){\n      if(!drag) return;\n      var speed = e.shiftKey?700:200;\n      setNorm(startN + (startY-e.clientY)/speed);\n    });\n    function end(){ drag=false; ref.knob.classList.remove('act'); }\n    ref.knob.addEventListener('pointerup', end);\n    ref.knob.addEventListener('pointercancel', end);\n    ref.knob.addEventListener('dblclick', function(){ setNorm(b.def); });\n    ref.knob.addEventListener('wheel', function(e){\n      e.preventDefault(); setNorm(v + (e.deltaY<0?0.03:-0.03));\n    }, {passive:false});\n    ref.knob.addEventListener('keydown', function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){ setNorm(v+0.02); e.preventDefault(); }\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){ setNorm(v-0.02); e.preventDefault(); }\n    });\n\n    ref.getThresh = function(){ return v; };\n    paintKnob();\n  });\n\n  // ---------------------------------------------------------------\n  //  Master knobs (Ratio, Output)\n  // ---------------------------------------------------------------\n  function makeBigKnob(elId, index, def, onPaint){\n    var knob = document.getElementById(elId);\n    var arc = knob.querySelector('.arc');\n    var ptr = knob.querySelector('.ptr');\n    var v = def;\n    function paint(){\n      arc.style.setProperty('--n', v);\n      ptr.style.setProperty('--n', v);\n      pushParam(index, v);\n      onPaint(v);\n    }\n    function setNorm(n){ v = n<0?0:n>1?1:n; paint(); }\n    var drag=false, startY=0, startN=0;\n    knob.addEventListener('pointerdown', function(e){\n      drag=true; startY=e.clientY; startN=v;\n      knob.classList.add('act'); knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener('pointermove', function(e){\n      if(!drag) return;\n      var speed = e.shiftKey?700:200;\n      setNorm(startN + (startY-e.clientY)/speed);\n    });\n    function end(){ drag=false; knob.classList.remove('act'); }\n    knob.addEventListener('pointerup', end);\n    knob.addEventListener('pointercancel', end);\n    knob.addEventListener('dblclick', function(){ setNorm(def); });\n    knob.addEventListener('wheel', function(e){\n      e.preventDefault(); setNorm(v + (e.deltaY<0?0.03:-0.03));\n    }, {passive:false});\n    knob.addEventListener('keydown', function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){ setNorm(v+0.02); e.preventDefault(); }\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){ setNorm(v-0.02); e.preventDefault(); }\n    });\n    paint();\n    return { get:function(){ return v; } };\n  }\n\n  var ratioVal = document.getElementById('ratioVal');\n  var outVal = document.getElementById('outVal');\n\n  var ratioCtl = makeBigKnob('ratioKnob', P.RATIO, 0.5, function(v){\n    var r = 1 + v*11;\n    ratioVal.innerHTML = r.toFixed(1)+'<small>:1<\/small>';\n  });\n  var outCtl = makeBigKnob('outKnob', P.OUT, 0.6, function(v){\n    // 0..1 -> 0..1.6 linear -> dB\n    var lin = v*1.6;\n    var db = lin>0.0001 ? 20*Math.log10(lin) : -60;\n    outVal.innerHTML = (db>=0?'+':'')+db.toFixed(1)+'<small>dB<\/small>';\n  });\n\n  // ---------------------------------------------------------------\n  //  Animated visualiser — each band runs its OWN simulated detector\n  //  and compressor so the three GR meters pump independently. The low\n  //  band uses a slow release (big pumping swells); highs are snappy.\n  // ---------------------------------------------------------------\n  var BAND_RATE = [0.9, 1.7, 3.1];     // pseudo-modulation rates per band (Hz-ish)\n  var REL = [0.018, 0.045, 0.09];      // per-frame release toward target (low = slow)\n  var last = performance.now();\n\n  function frame(now){\n    var dt = Math.min(0.05, (now-last)/1000); last = now;\n    var ratioN = ratioCtl.get();\n    var ratio = 1 + ratioN*11;\n    var slope = 1 - 1/ratio;\n\n    for (var i=0;i<laneRefs.length;i++){\n      var L = laneRefs[i];\n      L.phase += dt * BAND_RATE[i] * 6.283;\n\n      // synthetic band energy: a couple of beating sines -> lively level 0..1\n      var drive = 0.55 + 0.40*Math.sin(L.phase) * Math.sin(L.phase*0.37+i);\n      drive = drive<0?0:drive>1?1:drive;\n      // peak detector follow (fast attack, slow-ish release per band)\n      if (drive > L.env) L.env += (drive - L.env) * 0.6;\n      else               L.env += (drive - L.env) * (REL[i]*4);\n\n      // static compression curve mirrors the DSP: thr knob sets threshold\n      var thrN = L.getThresh();\n      var thr = 0.02 + thrN*0.88;\n      var grDb = 0;\n      if (L.env > thr){\n        var over = L.env/thr;\n        var gain = Math.pow(over, -slope);          // linear gain <1\n        grDb = -20*Math.log10(Math.max(gain,0.02)); // positive dB of reduction\n      }\n      // smooth the displayed GR with band-dependent release\n      var k = grDb > L.grSmooth ? 0.55 : REL[i];\n      L.grSmooth += (grDb - L.grSmooth) * k;\n\n      // paint GR fill (0 dB -> 0 height, ~24 dB -> full)\n      var h = Math.min(100, (L.grSmooth/24)*100);\n      L.gr.style.height = h.toFixed(1)+'%';\n      L.grtxt.textContent = '-'+L.grSmooth.toFixed(1)+' dB';\n\n      // animate spectrum bars (driven by env + a little per-bar wobble)\n      var bars = L.bars, NB = bars.length;\n      for (var k2=0;k2<NB;k2++){\n        var w = 0.5 + 0.5*Math.sin(L.phase*1.3 + k2*0.7 + i);\n        var hgt = (0.25 + 0.75*L.env*w) * 100;\n        var b = bars[k2];\n        b.style.height = hgt.toFixed(0)+'%';\n        // dim a bar more when this band is being reduced (visual \"duck\")\n        b.style.opacity = (0.35 + 0.45*(1 - L.grSmooth/24)).toFixed(2);\n      }\n    }\n\n    if (!document.hidden) rafId = requestAnimationFrame(frame);\n    else rafId = 0;\n  }\n\n  var rafId = requestAnimationFrame(frame);\n  document.addEventListener('visibilitychange', function(){\n    if (!document.hidden && !rafId){ last = performance.now(); rafId = requestAnimationFrame(frame); }\n  });\n\n  // ---------------------------------------------------------------\n  function ready(){\n    // re-push every default so the engine matches the GUI on load\n    BANDS.forEach(function(b){ pushParam(b.index, state[b.index]); });\n    pushParam(P.RATIO, ratioCtl.get());\n    pushParam(P.OUT, outCtl.get());\n  }\n  if (window.vstai && window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";

    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
