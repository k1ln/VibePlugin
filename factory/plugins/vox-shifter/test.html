<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vox Shifter — test bench</title><style>
  :root{--ac:#ff5ab0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Vox Shifter</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>Vox Shifter<\/title>\n<style>\n  :root{ --acc:#ff5ab0; --acc2:#5ad0ff; --bg0:#0f060c; --bg1:#1e0c18; --ink:#fae8f3; --dim:#9a708a; }\n  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }\n  body{ font-family:\"Inter\",system-ui,-apple-system,\"Segoe UI\",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#341830 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }\n  .unit{ width:min(95vw,720px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#261024,#0f060c); border:1px solid rgba(255,90,176,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(250,232,243,.06); }\n  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }\n  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }\n  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }\n  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.0s ease-in-out infinite; }\n  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }\n  .screen{ height:110px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#180a14,#0e060b); border:1px solid rgba(255,90,176,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }\n  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }\n  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }\n  .knobs{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:480px; margin:0 auto; }\n  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }\n  .dial{ width:76px; height:76px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }\n  .track{ fill:none; stroke:rgba(238,214,230,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(255,90,176,.6)); }\n  .pcap{ fill:#160a12; stroke:rgba(255,90,176,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }\n  .kn{ font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:11px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(255,90,176,.1); padding:1px 8px; border-radius:7px; border:1px solid rgba(255,90,176,.2); }\n  .knob:hover .kn{ color:var(--acc); }\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <header><span class=\"logo\">VOX&nbsp;SHIFTER<\/span><span class=\"sub\">formant pitch shift<\/span><span class=\"led\"><\/span><\/header>\n    <div class=\"screen\"><div class=\"scrlbl\">FORMANT&nbsp;/&nbsp;PITCH<\/div><canvas id=\"cv\"><\/canvas><\/div>\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n  <\/div>\n<script>\n(function(){\"use strict\";\n  var P=[{name:\"Shift\",idx:0,def:5,min:-12,max:12,fmt:\"st\"},{name:\"Formant\",idx:1,def:0.5},{name:\"Mix\",idx:2,def:0.6},{name:\"Output\",idx:3,def:0.7}];\n  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }\n  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById(\"knobs\");\n  var knobs=P.map(function(p){ var el=document.createElement(\"div\"); el.className=\"knob\"; var isBip=(p.min!==undefined);\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 86 86\"><defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#ff5ab0\"/><stop offset=\"1\" stop-color=\"#5ad0ff\"/><\/linearGradient><\/defs><circle class=\"track\" cx=\"43\" cy=\"43\" r=\"33\"><\/circle><circle class=\"arc\" cx=\"43\" cy=\"43\" r=\"33\" transform=\"rotate(135 43 43)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle><circle class=\"pcap\" cx=\"43\" cy=\"43\" r=\"21\"><\/circle><line class=\"ptr\" x1=\"43\" y1=\"43\" x2=\"43\" y2=\"26\"><\/line><\/svg><\/div><span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el); var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function norm(v){ return isBip ? (v-p.min)/(p.max-p.min) : v; }\n    function render(v){ var nv=norm(v); var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*nv)).toString()); var ang=(A0+(A1-A0)*nv)*Math.PI/180; ptr.setAttribute(\"x2\",(43+Math.sin(ang)*17).toFixed(2)); ptr.setAttribute(\"y2\",(43-Math.cos(ang)*17).toFixed(2));\n      val.textContent = isBip ? ((v>0?\"+\":\"\")+Math.round(v)+\" st\") : Math.round(v*100)+\"%\"; }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var span=isBip?(p.max-p.min):1; var nv=drag.v+(drag.y-e.clientY)/170*span; nv=Math.max(isBip?p.min:0,Math.min(isBip?p.max:1,nv)); if(isBip)nv=Math.round(nv); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; }); el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });\n  var cv=document.getElementById(\"cv\"), ctx=cv.getContext(\"2d\"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);\n  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener(\"resize\",resize); resize();\n  function frame(ts){ ctx.clearRect(0,0,W,H); var shift=vals[0], form=vals[1], mix=vals[2]; var baseY=H-14, top=16;\n    // formant peak positions (log-ish x across width)\n    var f1=(320+form*520), f2=(900+form*1500); var fx1=Math.log(f1/200)/Math.log(4000/200), fx2=Math.log(f2/200)/Math.log(4000/200);\n    // pitch-shifted harmonic comb (vertical lines), spacing scaled by 2^(shift/12)\n    var ratio=Math.pow(2,shift/12); var nH=26;\n    for(var h=1;h<=nH;h++){ var f=120*h*ratio; if(f>4500)break; var lx=Math.log(f/200)/Math.log(4000/200); if(lx<0||lx>1)continue;\n      // amplitude shaped by the two formants\n      var e1=Math.exp(-((lx-fx1)*(lx-fx1))/0.02), e2=Math.exp(-((lx-fx2)*(lx-fx2))/0.03)*0.85;\n      var amp=(0.12+e1+e2)/(1+h*0.05); var bh=amp*(baseY-top)*0.8; if(bh>baseY-top)bh=baseY-top;\n      var x=12+lx*(W-24);\n      ctx.strokeStyle=\"rgba(255,90,176,\"+(0.3+amp*0.5)+\")\"; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(x,baseY); ctx.lineTo(x,baseY-bh); ctx.stroke();\n    }\n    // formant envelope curve (cyan)\n    ctx.beginPath();\n    for(var xx=0;xx<=W-24;xx+=3){ var lx=xx/(W-24); var e1=Math.exp(-((lx-fx1)*(lx-fx1))/0.02), e2=Math.exp(-((lx-fx2)*(lx-fx2))/0.03)*0.85; var env=(0.1+e1+e2); var y=baseY-env*(baseY-top)*0.85; if(xx===0)ctx.moveTo(12+xx,y); else ctx.lineTo(12+xx,y); }\n    ctx.strokeStyle=\"rgba(90,208,255,0.85)\"; ctx.lineWidth=1.8; ctx.shadowColor=\"#5ad0ff\"; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0;\n    // formant peak markers\n    [ [fx1,\"F1\"],[fx2,\"F2\"] ].forEach(function(p2){ var x=12+p2[0]*(W-24); ctx.fillStyle=\"#5ad0ff\"; ctx.beginPath(); ctx.arc(x,top+4,3,0,Math.PI*2); ctx.fill(); ctx.fillStyle=\"rgba(90,208,255,0.6)\"; ctx.font=\"8px Inter,sans-serif\"; ctx.fillText(p2[1],x-5,top-2); });\n    // shift readout\n    ctx.fillStyle=\"rgba(255,90,176,0.9)\"; ctx.font=\"bold 11px Inter,sans-serif\"; ctx.textAlign=\"right\"; ctx.fillText((shift>0?\"+\":\"\")+Math.round(shift)+\" st\", W-14, H-6); ctx.textAlign=\"left\";\n    requestAnimationFrame(frame); }\n  requestAnimationFrame(frame);\n  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script><\/body><\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();

    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }

  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);

      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);

    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
