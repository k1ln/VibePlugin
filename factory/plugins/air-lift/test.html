<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Air Lift — test bench</title><style>
  :root{--ac:#8fdcff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Air Lift</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>

    <div class="row"><label>Source

         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Air Lift<\/title>\n<style>\n  :root{\n    --accent:#8fdcff;\n    --accent2:#cdebff;\n    --ink:#10202c;\n    --face:#f3fafe;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}\n  html,body{height:100%;}\n  body{\n    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\n    background:\n      radial-gradient(140% 90% at 50% -10%, #ffffff 0%, #eaf6ff 38%, #d6ecfb 72%, #c3e2f7 100%);\n    color:var(--ink);\n    display:flex;align-items:center;justify-content:center;\n    min-height:100%;\n    overflow:hidden;\n  }\n\n  /* ===== faceplate ===== */\n  .plate{\n    position:relative;\n    width:560px;\n    border-radius:22px;\n    padding:22px 26px 26px;\n    background:\n      linear-gradient(180deg, rgba(255,255,255,.95), rgba(232,246,255,.92));\n    box-shadow:\n      0 24px 60px -20px rgba(40,90,130,.45),\n      0 2px 0 rgba(255,255,255,.9) inset,\n      0 -1px 0 rgba(120,170,200,.25) inset;\n    border:1px solid rgba(180,215,235,.7);\n    overflow:hidden;\n  }\n  /* sparkle field */\n  .sparkles{position:absolute;inset:0;pointer-events:none;z-index:0;}\n  .spk{\n    position:absolute;width:3px;height:3px;border-radius:50%;\n    background:radial-gradient(circle,#fff 0%, var(--accent) 60%, transparent 70%);\n    opacity:0;\n    animation:twinkle 4.5s ease-in-out infinite;\n    filter:drop-shadow(0 0 4px var(--accent));\n  }\n  @keyframes twinkle{\n    0%,100%{opacity:0;transform:scale(.4);}\n    45%{opacity:.9;transform:scale(1.25);}\n    60%{opacity:.5;transform:scale(.9);}\n  }\n\n  .head{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;}\n  .brand{display:flex;align-items:center;gap:12px;}\n  .logo{\n    width:38px;height:38px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%, #ffffff, var(--accent) 55%, #5fbfe6 100%);\n    box-shadow:0 0 18px rgba(143,220,255,.9), 0 2px 4px rgba(0,0,0,.12);\n    position:relative;\n  }\n  .logo::after{\n    content:\"\";position:absolute;inset:6px;border-radius:50%;\n    border:1.5px solid rgba(255,255,255,.85);\n    animation:halo 3.2s ease-in-out infinite;\n  }\n  @keyframes halo{0%,100%{transform:scale(.7);opacity:.3;}50%{transform:scale(1.15);opacity:.9;}}\n  .title{font-size:26px;font-weight:800;letter-spacing:2px;\n    background:linear-gradient(90deg,#2b6b8f,#5cc0ea,#2b6b8f);\n    -webkit-background-clip:text;background-clip:text;color:transparent;}\n  .sub{font-size:10px;letter-spacing:4px;color:#6fa6c5;text-transform:uppercase;margin-top:1px;}\n\n  /* ===== response graph ===== */\n  .graph{\n    position:relative;z-index:2;\n    height:160px;border-radius:14px;\n    background:\n      linear-gradient(180deg, rgba(255,255,255,.6), rgba(214,238,252,.55));\n    border:1px solid rgba(170,210,235,.7);\n    box-shadow:inset 0 2px 10px rgba(120,170,200,.18);\n    overflow:hidden;margin-bottom:20px;\n  }\n  .graph svg{position:absolute;inset:0;width:100%;height:100%;}\n  .grid line{stroke:rgba(120,170,200,.18);stroke-width:1;}\n  .zeroline{stroke:rgba(90,150,185,.4);stroke-width:1;stroke-dasharray:4 4;}\n  .curveFill{fill:url(#airgrad);opacity:.55;}\n  .curve{fill:none;stroke:url(#stroke);stroke-width:2.4;\n    filter:drop-shadow(0 0 6px rgba(143,220,255,.9));}\n  .scanlbl{font-size:8px;fill:#6fa6c5;letter-spacing:1px;}\n  /* drifting air shimmer band at the very top */\n  .airband{\n    position:absolute;top:0;left:0;right:0;height:46px;pointer-events:none;\n    background:linear-gradient(90deg,\n      transparent, rgba(205,235,255,.0) 20%, rgba(255,255,255,.6) 50%, rgba(205,235,255,0) 80%, transparent);\n    mix-blend-mode:screen;\n    animation:drift 6s linear infinite;\n  }\n  @keyframes drift{0%{transform:translateX(-60%);}100%{transform:translateX(60%);}}\n\n  /* ===== controls ===== */\n  .controls{position:relative;z-index:2;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}\n  .ctl{display:flex;flex-direction:column;align-items:center;flex:1;}\n  .knobwrap{position:relative;width:78px;height:78px;cursor:ns-resize;}\n  .knob{\n    width:78px;height:78px;border-radius:50%;\n    background:\n      radial-gradient(circle at 38% 32%, #ffffff, #e3f3ff 45%, #bfe2f6 100%);\n    box-shadow:\n      0 6px 14px -4px rgba(60,120,160,.5),\n      0 1px 0 rgba(255,255,255,.9) inset,\n      0 -3px 8px rgba(120,170,200,.25) inset;\n    position:relative;transition:box-shadow .15s;\n  }\n  .knobwrap:hover .knob{box-shadow:\n      0 6px 18px -3px rgba(60,120,160,.6),\n      0 0 16px rgba(143,220,255,.7),\n      0 1px 0 rgba(255,255,255,.95) inset;}\n  .knob::after{\n    content:\"\";position:absolute;left:50%;top:9px;width:3px;height:22px;\n    border-radius:2px;background:linear-gradient(var(--accent),#3aa0cf);\n    transform:translateX(-50%);transform-origin:50% 30px;\n    box-shadow:0 0 6px rgba(143,220,255,.9);\n  }\n  .ring{position:absolute;inset:-6px;}\n  .ring circle{fill:none;stroke-width:3;stroke-linecap:round;}\n  .ringbg{stroke:rgba(150,200,225,.3);}\n  .ringfg{stroke:url(#ringgrad);filter:drop-shadow(0 0 4px rgba(143,220,255,.9));}\n  .lbl{font-size:11px;font-weight:700;letter-spacing:1px;color:#3a7794;margin-top:9px;text-transform:uppercase;}\n  .val{font-size:11px;color:#5a93b3;margin-top:2px;font-variant-numeric:tabular-nums;}\n\n  /* discrete air-freq selector */\n  .selwrap{display:flex;flex-direction:column;align-items:center;flex:1;}\n  .seldial{\n    width:78px;height:78px;border-radius:50%;cursor:ns-resize;position:relative;\n    background:\n      radial-gradient(circle at 38% 32%, #ffffff, #e3f3ff 45%, #bfe2f6 100%);\n    box-shadow:\n      0 6px 14px -4px rgba(60,120,160,.5),\n      0 1px 0 rgba(255,255,255,.9) inset;\n    display:flex;align-items:center;justify-content:center;\n    transition:box-shadow .15s;\n  }\n  .selwrap:hover .seldial{box-shadow:0 0 16px rgba(143,220,255,.7),0 1px 0 rgba(255,255,255,.95) inset;}\n  .seldial .freq{font-size:15px;font-weight:800;color:#2b6b8f;text-shadow:0 0 6px rgba(143,220,255,.6);}\n  .dots{position:absolute;inset:0;}\n  .dots span{position:absolute;width:5px;height:5px;border-radius:50%;\n    background:rgba(150,200,225,.4);left:50%;top:50%;transform-origin:0 0;}\n  .dots span.on{background:var(--accent);box-shadow:0 0 6px var(--accent);}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"plate\">\n    <div class=\"sparkles\" id=\"sparkles\"><\/div>\n\n    <div class=\"head\">\n      <div class=\"brand\">\n        <div class=\"logo\"><\/div>\n        <div>\n          <div class=\"title\">AIR LIFT<\/div>\n          <div class=\"sub\">Air-Band Shelving EQ<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"sub\" style=\"text-align:right\">silky&nbsp;·&nbsp;open&nbsp;·&nbsp;clean<\/div>\n    <\/div>\n\n    <div class=\"graph\">\n      <div class=\"airband\"><\/div>\n      <svg viewBox=\"0 0 520 160\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"airgrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#cdebff\" stop-opacity=\".9\"/>\n            <stop offset=\"100%\" stop-color=\"#8fdcff\" stop-opacity=\"0\"/>\n          <\/linearGradient>\n          <linearGradient id=\"stroke\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n            <stop offset=\"0%\" stop-color=\"#5cc0ea\"/>\n            <stop offset=\"55%\" stop-color=\"#8fdcff\"/>\n            <stop offset=\"100%\" stop-color=\"#ffffff\"/>\n          <\/linearGradient>\n          <linearGradient id=\"ringgrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#8fdcff\"/>\n            <stop offset=\"100%\" stop-color=\"#cdebff\"/>\n          <\/linearGradient>\n        <\/defs>\n        <g class=\"grid\" id=\"grid\"><\/g>\n        <line class=\"zeroline\" id=\"zero\" x1=\"0\" y1=\"80\" x2=\"520\" y2=\"80\"/>\n        <path class=\"curveFill\" id=\"fill\"><\/path>\n        <path class=\"curve\" id=\"curve\"><\/path>\n        <text class=\"scanlbl\" x=\"6\" y=\"153\">20Hz<\/text>\n        <text class=\"scanlbl\" x=\"250\" y=\"153\">1kHz<\/text>\n        <text class=\"scanlbl\" x=\"468\" y=\"153\">20kHz<\/text>\n      <\/svg>\n    <\/div>\n\n    <div class=\"controls\" id=\"controls\"><\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- parameter model (indices MUST match assembly.ts + spec.json) ----\n  var PARAMS = [\n    { i:0, key:\"air\",  name:\"Air\",      min:0, max:1, def:0.45, kind:\"knob\" },\n    { i:1, key:\"freq\", name:\"Air Freq\", min:0, max:4, def:2,    kind:\"sel\", step:1 },\n    { i:2, key:\"low\",  name:\"Low\",      min:0, max:1, def:0.5,  kind:\"knob\" },\n    { i:3, key:\"mid\",  name:\"Mid\",      min:0, max:1, def:0.5,  kind:\"knob\" },\n    { i:4, key:\"out\",  name:\"Output\",   min:0, max:1, def:0.5,  kind:\"knob\" }\n  ];\n  var FREQS = [2500,5000,10000,20000,40000];\n  var FREQ_LBL = [\"2.5k\",\"5k\",\"10k\",\"20k\",\"40k\"];\n\n  var state = {}; // key -> raw value\n  PARAMS.forEach(function(p){ state[p.key]=p.def; });\n\n  function send(p, val){\n    if(window.vstai && window.vstai.setParam){ window.vstai.setParam(p.i, val); }\n  }\n\n  // ---------- response-curve math (display only, mirrors the DSP shape) ----\n  // map x in 0..1 (log freq 20..20k) -> magnitude in dB\n  function dbToA(db){ return Math.pow(10, db/20); }\n  function freqAt(t){ return 20*Math.pow(1000, t); } // 20 .. 20000\n\n  // simple shelf/bell magnitude approximations for the picture\n  function shelfHi(f, fc, gainDb){\n    var g = dbToA(gainDb);\n    var r = f/fc;\n    // smooth transition; reaches full gain well above fc\n    var t = 1/(1+Math.pow(fc/(f+1e-9), 1.4));\n    return 1 + (g-1)*t;\n  }\n  function shelfLo(f, fc, gainDb){\n    var g = dbToA(gainDb);\n    var t = 1/(1+Math.pow((f+1e-9)/fc, 1.4));\n    return 1 + (g-1)*t;\n  }\n  function bell(f, fc, gainDb, q){\n    var g = dbToA(gainDb);\n    var bw = fc/q;\n    var x = (f-fc)/bw;\n    var shape = 1/(1+x*x);\n    return 1 + (g-1)*shape;\n  }\n\n  function computeMag(f){\n    var airDb = state.air*14;\n    var lowDb = (state.low-0.5)*24;\n    var midDb = (state.mid-0.5)*24;\n    var fc = FREQS[Math.round(state.freq)];\n    var m = 1;\n    m *= shelfLo(f, 120, lowDb);\n    m *= bell(f, 900, midDb, 0.9);\n    m *= shelfHi(f, fc, airDb);\n    return 20*Math.log10(Math.max(1e-4, m));\n  }\n\n  var curve = document.getElementById(\"curve\");\n  var fill  = document.getElementById(\"fill\");\n  var W=520, H=160, MID=80, SCALE=4.2; // px per dB\n\n  function drawCurve(){\n    var d=\"\", df=\"M0,\"+H+\" \";\n    for(var px=0; px<=W; px+=4){\n      var t=px/W;\n      var f=freqAt(t);\n      var db=computeMag(f);\n      var y=MID - db*SCALE;\n      if(y<2)y=2; if(y>H-2)y=H-2;\n      d += (px===0?\"M\":\"L\")+px+\",\"+y.toFixed(1)+\" \";\n      df += \"L\"+px+\",\"+y.toFixed(1)+\" \";\n    }\n    df += \"L\"+W+\",\"+H+\" Z\";\n    curve.setAttribute(\"d\", d);\n    fill.setAttribute(\"d\", df);\n  }\n\n  // grid\n  (function(){\n    var g=document.getElementById(\"grid\"), s=\"\";\n    for(var i=1;i<6;i++){var x=i*(W/6);s+='<line x1=\"'+x+'\" y1=\"0\" x2=\"'+x+'\" y2=\"'+H+'\"/>';}\n    for(var j=1;j<4;j++){var y=j*(H/4);s+='<line x1=\"0\" y1=\"'+y+'\" x2=\"'+W+'\" y2=\"'+y+'\"/>';}\n    g.innerHTML=s;\n  })();\n\n  // ---------- sparkles (denser near the air band / top) ----\n  (function(){\n    var host=document.getElementById(\"sparkles\");\n    for(var i=0;i<26;i++){\n      var s=document.createElement(\"div\");\n      s.className=\"spk\";\n      s.style.left=(Math.random()*100)+\"%\";\n      s.style.top=(Math.pow(Math.random(),1.8)*70)+\"%\"; // bias toward top\n      s.style.animationDelay=(Math.random()*4.5)+\"s\";\n      s.style.animationDuration=(3.5+Math.random()*3)+\"s\";\n      host.appendChild(s);\n    }\n  })();\n\n  // ---------- build controls ----\n  var host=document.getElementById(\"controls\");\n\n  function valLabel(p){\n    if(p.kind===\"sel\"){ return FREQ_LBL[Math.round(state[p.key])]+\"Hz\"; }\n    if(p.key===\"air\"){ return \"+\"+(state.air*14).toFixed(1)+\" dB\"; }\n    if(p.key===\"out\"){\n      var g=state.out<=0.5?state.out*2:1+(state.out-0.5)*2;\n      var db=20*Math.log10(Math.max(1e-4,g));\n      return (db>=0?\"+\":\"\")+db.toFixed(1)+\" dB\";\n    }\n    // low / mid bipolar\n    var d=(state[p.key]-0.5)*24;\n    return (d>=0?\"+\":\"\")+d.toFixed(1)+\" dB\";\n  }\n\n  function makeKnob(p){\n    var wrap=document.createElement(\"div\"); wrap.className=\"ctl\";\n    var kw=document.createElement(\"div\"); kw.className=\"knobwrap\";\n    kw.innerHTML=\n      '<svg class=\"ring\" viewBox=\"0 0 90 90\">'+\n      '<circle class=\"ringbg\" cx=\"45\" cy=\"45\" r=\"40\"/>'+\n      '<circle class=\"ringfg\" cx=\"45\" cy=\"45\" r=\"40\"/><\/svg>'+\n      '<div class=\"knob\"><\/div>';\n    var knob=kw.querySelector(\".knob\");\n    var ringfg=kw.querySelector(\".ringfg\");\n    var lbl=document.createElement(\"div\"); lbl.className=\"lbl\"; lbl.textContent=p.name;\n    var val=document.createElement(\"div\"); val.className=\"val\";\n    wrap.appendChild(kw); wrap.appendChild(lbl); wrap.appendChild(val);\n\n    var R=40, C=2*Math.PI*R, ARC=0.75; // 270deg sweep\n    ringfg.style.strokeDasharray=C;\n\n    function paint(){\n      var n=(state[p.key]-p.min)/(p.max-p.min);\n      var ang=-135 + n*270;\n      knob.style.setProperty(\"--a\", ang);\n      knob.querySelector || 0;\n      knob.style.transform=\"rotate(\"+ang+\"deg)\";\n      var dash=C*(1-n*ARC);\n      ringfg.style.strokeDashoffset \n    function paint(){\n      var idx=Math.round(state[p.key]);\n      freq.textContent=FREQ_LBL[idx];\n      val.textContent=\"corner\";\n      var sps=dots.querySelectorAll(\"span\");\n      for(var k=0;k<sps.length;k++){ sps[k].className = (k<=idx)?\"on\":\"\"; }\n    }\n    function setIdx(idx){\n      idx=Math.max(0,Math.min(4,idx));\n      state[p.key]=idx; send(p,idx); paint(); drawCurve();\n    }\n\n    var dragging=false, acc=0, lastY=0;\n    dial.addEventListener(\"mousedown\",function(e){dragging=true;lastY=e.clientY;acc=0;e.preventDefault();});\n    window.addEventListener(\"mousemove\",function(e){\n      if(!dragging)return;\n      acc += (lastY-e.clientY); lastY=e.clientY;\n      if(Math.abs(acc)>=26){\n        var step=acc>0?1:-1; acc=0;\n        setIdx(Math.round(state[p.key])+step);\n      }\n    });\n    window.addEventListener(\"mouseup\",function(){dragging=false;});\n    dial.addEventListener(\"dblclick\",function(){ setIdx(p.def); });\n    dial.addEventListener(\"wheel\",function(e){\n      e.preventDefault();\n      setIdx(Math.round(state[p.key]) - Math.sign(e.deltaY));\n    },{passive:false});\n\n    paint();\n    return wrap;\n  }\n\n  PARAMS.forEach(function(p){\n    host.appendChild(p.kind===\"sel\" ? makeSelector(p) : makeKnob(p));\n  });\n\n  function init(){\n    // push every default to the host on load\n    PARAMS.forEach(function(p){ send(p, state[p.key]); });\n    drawCurve();\n  }\n\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(init); else init();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
