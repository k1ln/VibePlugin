<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lab Mono — test bench</title><style>
  :root{--ac:#43e0a0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Lab Mono</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  <div class="bar">

    <div class="krow"><span class="klabel">Octave</span><button id="octdn" class="oct" type="button">−</button><span id="octval" class="octval">4</span><button id="octup" class="oct" type="button">+</button><span class="khint">or Z / X keys</span></div>
       <div class="kb" id="kb"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Lab Mono<\/title>\n<style>\n  :root {\n    --accent: #43e0a0;\n    --accent2: #ff7adf;\n    --bg0: #07120e;\n    --bg1: #0d1f18;\n    --panel: #11271e;\n    --panel2: #0a1812;\n    --ink: #cfeede;\n    --ink-dim: #6f9886;\n    --jack: #1c3a2c;\n    --line: #20473500;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: var(--bg0);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  #app {\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 14px;\n    min-height: 100vh;\n  }\n\n  .face {\n    position: relative;\n    border-radius: 16px;\n    padding: 18px 20px 22px;\n    background:\n      radial-gradient(120% 90% at 12% -10%, rgba(67,224,160,0.10), transparent 55%),\n      radial-gradient(120% 120% at 110% 120%, rgba(255,122,223,0.10), transparent 55%),\n      linear-gradient(165deg, var(--panel) 0%, var(--panel2) 100%);\n    border: 1px solid rgba(67,224,160,0.18);\n    box-shadow:\n      0 24px 60px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(255,255,255,0.06),\n      inset 0 -2px 14px rgba(0,0,0,0.5);\n    overflow: hidden;\n  }\n\n  /* faint engraved grid texture */\n  .face::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(rgba(67,224,160,0.045) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(67,224,160,0.045) 1px, transparent 1px);\n    background-size: 26px 26px;\n    mask-image: radial-gradient(120% 100% at 50% 0%, #000 30%, transparent 90%);\n    pointer-events: none;\n  }\n\n  header {\n    display: flex;\n    align-items: flex-end;\n    justify-content: space-between;\n    position: relative;\n    z-index: 2;\n    margin-bottom: 14px;\n  }\n\n  .brand {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n  }\n\n  .logo {\n    width: 40px;\n    height: 40px;\n    flex: none;\n  }\n\n  .titles h1 {\n    margin: 0;\n    font-size: 22px;\n    letter-spacing: 3px;\n    font-weight: 800;\n    text-transform: uppercase;\n    background: linear-gradient(90deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n\n  .titles .sub {\n    margin: 2px 0 0;\n    font-size: 9.5px;\n    letter-spacing: 4px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n\n  .badge {\n    text-align: right;\n    font-size: 8.5px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    line-height: 1.7;\n  }\n  .badge .dot {\n    display: inline-block;\n    width: 7px; height: 7px;\n    border-radius: 50%;\n    background: var(--accent);\n    box-shadow: 0 0 8px var(--accent);\n    margin-right: 5px;\n    animation: blink 2.4s ease-in-out infinite;\n  }\n  @keyframes blink { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }\n\n  /* ---- patch-jack mod field ---- */\n  .modrack {\n    position: relative;\n    z-index: 2;\n    display: grid;\n    grid-template-columns: 132px 1fr;\n    gap: 14px;\n    background: linear-gradient(160deg, rgba(0,0,0,0.35), rgba(0,0,0,0.15));\n    border: 1px solid rgba(67,224,160,0.12);\n    border-radius: 12px;\n    padding: 12px 14px;\n    margin-bottom: 16px;\n  }\n\n  .jacks {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 8px 10px;\n    align-content: center;\n  }\n  .jack {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 4px;\n  }\n  .jack svg { display: block; }\n  .jack .jl {\n    font-size: 7px;\n    letter-spacing: 1px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .jack.live .jl { color: var(--accent); }\n\n  /* stepped S&H readout */\n  .sh {\n    position: re     <canvas class=\"scope\" id=\"scope\" width=\"380\" height=\"64\"><\/canvas>\n      <\/div>\n    <\/section>\n\n    <!-- knobs -->\n    <section class=\"knobs\" id=\"knobs\"><\/section>\n\n    <!-- keyboard -->\n    <div class=\"kbwrap\">\n      <div class=\"kbhead\">\n        <span class=\"lab\">Keys<\/span>\n        <span class=\"hint\">drag / click to play &middot; double-click a knob to reset<\/span>\n      <\/div>\n      <div class=\"keys\" id=\"keys\"><\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<script>\n(function () {\n  \"use strict\";\n\n  var ACCENT = \"#43e0a0\";\n  var ACCENT2 = \"#ff7adf\";\n\n  // --- parameter model (indices MUST match assembly.ts / spec.json) ---\n  var PARAMS = [\n    { name: \"Cutoff\",     index: 0, min: 0, max: 1, def: 0.35, scream: false },\n    { name: \"Resonance\",  index: 1, min: 0, max: 1, def: 0.62, scream: true  },\n    { name: \"Env Amount\", index: 2, min: 0, max: 1, def: 0.55, scream: false },\n    { name: \"Mod\",        index: 3, min: 0, max: 1, def: 0.45, scream: true  },\n    { name: \"Mod Rate\",   index: 4, min: 0, max: 1, def: 0.40, scream: false },\n    { name: \"Decay\",      index: 5, min: 0, max: 1, def: 0.45, scream: false },\n    { name: \"Level\",      index: 6, min: 0, max: 1, def: 0.80, scream: false }\n  ];\n\n  var values = PARAMS.map(function (p) { return p.def; });\n\n  // --- host bridge ---\n  function pushParam(i) {\n    if (window.vstai && window.vstai.setParam) {\n      window.vstai.setParam(PARAMS[i].index, values[i]);\n    }\n  }\n  function pushAll() { for (var i = 0; i < PARAMS.length; i++) pushParam(i); }\n\n  // ===================================================================\n  //  KNOBS  (hand-drawn SVG, drag to turn, dblclick reset, wheel fine)\n  // ===================================================================\n  var knobEls = [];\n\n  function makeKnob(p, i) {\n    var wrap = document.createElement(\"div\");\n    wrap.className = \"knob\" + (p.scream ? \" scream\" : \"\") );\n    wrap.appendChild(val);\n\n    var svg = dial.querySelector(\"svg\");\n    var arc = svg.querySelector(\".arc\");\n    var track = svg.querySelector(\".track\");\n    var ptr = svg.querySelector(\".ptr\");\n\n    function deg2pt(a, r) {\n      var rad = (a - 90) * Math.PI / 180;\n      return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];\n    }\n    function arcPath(fromA, toA, r) {\n      var a = deg2pt(fromA, r), b = deg2pt(toA, r);\n      var large = (toA - fromA) > 180 ? 1 : 0;\n      return \"M\" + a[0].toFixed(2) + \" \" + a[1].toFixed(2) +\n             \" A\" + r + \" \" + r + \" 0 \" + large + \" 1 \" + b[0].toFixed(2) + \" \" + b[1].toFixed(2);\n    }\n    track.setAttribute(\"d\", arcPath(A0, A1, R));\n\n    function render() {\n      var v = values[i];\n      var t = (v - p.min) / (p.max - p.min);\n      var a = A0 + (A1 - A0) * t;\n      arc.setAttribute(\"d\", arcPath(A0, a, R));\n      var pe = deg2pt(a, 16);\n      ptr.setAttribute(\"x2\", pe[0].toFixed(2));\n      ptr.setAttribute(\"y2\", pe[1].toFixed(2));\n      val.textContent = Math.round(t * 100) + \"%\";\n    }\n\n    // drag vertically to turn\n    var dragging = false, lastY = 0;\n    function onDown(e) {\n      dragging = true;\n      lastY = (e.touches ? e.touches[0].clientY : e.clientY);\n      e.preventDefault();\n      window.addEventListener(\"mousemove\", onMove);\n      window.addEventListener(\"mouseup\", onUp);\n      window.addEventListener(\"touchmove\", onMove, { passive: false });\n      window.addEventListener(\"touchend\", onUp);\n    }\n    function onMove(e) {\n      if (!dragging) return;\n      var y = (e.touches ? e.touches[0].clientY : e.clientY);\n      var dy = lastY - y;\n      lastY = y;\n      var step = (e.shiftKey ? 0.0015 : 0.006);\n      values[i] = Math.max(p.min, Math.min(p.max, values[i] + dy * step * (p.max - p.min)));\n      render();\n      pushParam(i);\n      e.preventDefault();\n    }\n    function onUp() {\n      dragging = false;\n      window.removeEventListener(\"mousemove\", onMove);\n      window.removeEventListener(\"mouseup\", onUp);\n      window.removeEventListener(\"touchmove\", onMove);\n      window.removeEventListener(\"touchend\", onUp);\n    }\n    dial.addEventListener(\"mousedown\", onDown);\n    dial.addEventListener(\"touchstart\", onDown, { passive: false });\n\n    dial.addEventListener(\"dblclick\", function () {\n      values[i] = p.def;\n      render();\n      pushParam(i);\n    });\n    dial.addEventListener(\"wheel\", function (e) {\n      values[i] = Math.max(p.min, Math.min(p.max, values[i] - Math.sign(e.deltaY) * 0.02 * (p.max - p.min)));\n      render();\n      pushParam(i);\n      e.preventDefault();\n    }, { passive: false });\n\n    knobEls.push({ render: render });\n    document.getElementById(\"knobs\").appendChild(wrap);\n    render();\n  }\n\n  PARAMS.forEach(makeKnob);\n\n  // ===================================================================\n  //  PATCH JACKS  (decorative semi-modular field; light up live)\n  // ===================================================================\n  var JACK_DEFS = [\n    { n: \"VCO\",  live: true  },\n    { n: \"PWM\",  live: true  },\n    { n: \"S&H\",  live: true  },\n    { n: \"LFO\",  live: false },\n    { n: \"ENV\",  live: true  },\n    { n: \"VCF\",  live: true  }\n  ];\n  var jackEls = [];\n  (function buildJacks() {\n    var host = document.getElementById(\"jacks\");\n    JACK_DEFS.forEach(function (j) {\n      var el = document.createElement(\"div\");\n      el.className = \"jack\" + (j.live ? \" live\" : \"\");\n      el.innerHTML =\n        '<svg width=\"26\" height=\"26\" viewBox=\"0 0 26 26\">' +\n          '<circle cx=\"13\" cy=\"13\" r=\"11\" fill=\"#04100b\" stroke=\"#214234\" stroke-width=\"1.5\"/>' +\n          '<circle cx=\"13\" cy=\"13\" r=\"7\" fill=\"#0a1c14\" stroke=\"#16302440\" stroke-width=\"1\"/>' +\n          '<circle class=\"hole\" cx=\"13\" cy=\"13\" r=\"3.4\" fill=\"#020a07\"/>' +\n        '<\/s
