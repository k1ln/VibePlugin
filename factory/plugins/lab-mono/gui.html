<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lab Mono</title>
<style>
  :root {
    --accent: #43e0a0;
    --accent2: #ff7adf;
    --bg0: #07120e;
    --bg1: #0d1f18;
    --panel: #11271e;
    --panel2: #0a1812;
    --ink: #cfeede;
    --ink-dim: #6f9886;
    --jack: #1c3a2c;
    --line: #20473500;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg0);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px;
    min-height: 100vh;
  }

  .face {
    position: relative;
    border-radius: 16px;
    padding: 18px 20px 22px;
    background:
      radial-gradient(120% 90% at 12% -10%, rgba(67,224,160,0.10), transparent 55%),
      radial-gradient(120% 120% at 110% 120%, rgba(255,122,223,0.10), transparent 55%),
      linear-gradient(165deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid rgba(67,224,160,0.18);
    box-shadow:
      0 24px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -2px 14px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  /* faint engraved grid texture */
  .face::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(67,224,160,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(67,224,160,0.045) 1px, transparent 1px);
    background-size: 26px 26px;
    mask-image: radial-gradient(120% 100% at 50% 0%, #000 30%, transparent 90%);
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
    z-index: 2;
    margin-bottom: 14px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 40px;
    height: 40px;
    flex: none;
  }

  .titles h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 3px;
    font-weight: 800;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .titles .sub {
    margin: 2px 0 0;
    font-size: 9.5px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .badge {
    text-align: right;
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
    line-height: 1.7;
  }
  .badge .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    margin-right: 5px;
    animation: blink 2.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* ---- patch-jack mod field ---- */
  .modrack {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 132px 1fr;
    gap: 14px;
    background: linear-gradient(160deg, rgba(0,0,0,0.35), rgba(0,0,0,0.15));
    border: 1px solid rgba(67,224,160,0.12);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }

  .jacks {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px 10px;
    align-content: center;
  }
  .jack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .jack svg { display: block; }
  .jack .jl {
    font-size: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .jack.live .jl { color: var(--accent); }

  /* stepped S&H readout */
  .sh {
    position: relative;
    border-left: 1px solid rgba(67,224,160,0.12);
    padding-left: 14px;
    display: flex;
    flex-direction: column;
  }
  .sh .shhead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .sh .shhead .lab {
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .sh .shhead .mode {
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--accent2);
    text-shadow: 0 0 10px rgba(255,122,223,0.5);
  }
  .scope {
    flex: 1;
    width: 100%;
    height: 64px;
    border-radius: 8px;
    background:
      radial-gradient(80% 120% at 50% 0%, rgba(67,224,160,0.07), transparent 70%),
      #04100b;
    border: 1px solid rgba(67,224,160,0.15);
    box-shadow: inset 0 0 18px rgba(0,0,0,0.7);
    display: block;
  }

  /* ---- knob grid ---- */
  .knobs {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px 6px;
    margin-bottom: 16px;
  }
  @media (max-width: 560px) {
    .knobs { grid-template-columns: repeat(3, 1fr); }
    .modrack { grid-template-columns: 1fr; }
    .sh { border-left: none; border-top: 1px solid rgba(67,224,160,0.12); padding-left: 0; padding-top: 12px; }
  }

  .knob {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 4px 10px;
    border-radius: 12px;
    cursor: ns-resize;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .knob:hover {
    background: rgba(67,224,160,0.05);
    box-shadow: inset 0 0 0 1px rgba(67,224,160,0.18);
  }
  .knob.scream:hover {
    background: rgba(255,122,223,0.06);
    box-shadow: inset 0 0 0 1px rgba(255,122,223,0.25);
  }
  .knob .dial { position: relative; }
  .knob svg { display: block; overflow: visible; }
  .knob .name {
    margin-top: 8px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-dim);
    transition: color 0.2s;
  }
  .knob:hover .name { color: var(--ink); }
  .knob .val {
    margin-top: 2px;
    font-size: 10.5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
    color: var(--accent);
    font-weight: 600;
  }
  .knob.scream .val { color: var(--accent2); }

  /* ---- keyboard ---- */
  .kbwrap {
    position: relative;
    z-index: 2;
    border-radius: 12px;
    padding: 10px 12px 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
    border: 1px solid rgba(67,224,160,0.12);
  }
  .kbhead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .kbhead .lab {
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .kbhead .hint {
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--ink-dim);
    opacity: 0.7;
  }
  .keys {
    position: relative;
    height: 92px;
    display: flex;
    touch-action: none;
  }
  .wkey {
    position: relative;
    flex: 1;
    margin: 0 1px;
    border-radius: 0 0 6px 6px;
    background: linear-gradient(180deg, #d8efe4 0%, #aecdbe 100%);
    box-shadow: inset 0 -6px 8px rgba(0,0,0,0.18), 0 2px 4px rgba(0,0,0,0.4);
    cursor: pointer;
  }
  .wkey.down {
    background: linear-gradient(180deg, var(--accent) 0%, #2bb585 100%);
    box-shadow: inset 0 0 14px rgba(0,0,0,0.3), 0 0 16px rgba(67,224,160,0.55);
  }
  .bkey {
    position: absolute;
    top: 0;
    width: 8.4%;
    height: 58%;
    margin-left: -4.2%;
    border-radius: 0 0 4px 4px;
    background: linear-gradient(180deg, #0c1c15 0%, #03100a 100%);
    box-shadow: inset 0 -4px 6px rgba(255,255,255,0.05), 0 3px 6px rgba(0,0,0,0.7);
    cursor: pointer;
    z-index: 3;
  }
  .bkey.down {
    background: linear-gradient(180deg, var(--accent2) 0%, #b94f97 100%);
    box-shadow: 0 0 18px rgba(255,122,223,0.6);
  }
</style>
</head>
<body>
<div id="app">
  <div class="face">
    <header>
      <div class="brand">
        <svg class="logo" viewBox="0 0 40 40" aria-hidden="true">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#43e0a0"/>
              <stop offset="1" stop-color="#ff7adf"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="36" height="36" rx="9" fill="none" stroke="url(#lg)" stroke-width="2"/>
          <path d="M9 26 L9 12 L16 12" fill="none" stroke="#43e0a0" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M21 14 q5 -6 10 0 q-5 12 0 12" fill="none" stroke="#ff7adf" stroke-width="2.4" stroke-linecap="round"/>
          <circle cx="9" cy="29" r="2.1" fill="#43e0a0"/>
        </svg>
        <div class="titles">
          <h1>Lab Mono</h1>
          <p class="sub">Patchable Single&nbsp;&middot;&nbsp;VCO Mono</p>
        </div>
      </div>
      <div class="badge">
        <div><span class="dot"></span>SELF-OSC FILTER</div>
        <div>S&amp;H&nbsp;/&nbsp;LFO MOD BUS</div>
      </div>
    </header>

    <!-- patch field + stepped mod readout -->
    <section class="modrack">
      <div class="jacks" id="jacks"></div>
      <div class="sh">
        <div class="shhead">
          <span class="lab">Mod Bus</span>
          <span class="mode" id="modMode">S&amp;H</span>
        </div>
        <canvas class="scope" id="scope" width="380" height="64"></canvas>
      </div>
    </section>

    <!-- knobs -->
    <section class="knobs" id="knobs"></section>

    <!-- keyboard -->
    <div class="kbwrap">
      <div class="kbhead">
        <span class="lab">Keys</span>
        <span class="hint">drag / click to play &middot; double-click a knob to reset</span>
      </div>
      <div class="keys" id="keys"></div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var ACCENT = "#43e0a0";
  var ACCENT2 = "#ff7adf";

  // --- parameter model (indices MUST match assembly.ts / spec.json) ---
  var PARAMS = [
    { name: "Cutoff",     index: 0, min: 0, max: 1, def: 0.35, scream: false },
    { name: "Resonance",  index: 1, min: 0, max: 1, def: 0.62, scream: true  },
    { name: "Env Amount", index: 2, min: 0, max: 1, def: 0.55, scream: false },
    { name: "Mod",        index: 3, min: 0, max: 1, def: 0.45, scream: true  },
    { name: "Mod Rate",   index: 4, min: 0, max: 1, def: 0.40, scream: false },
    { name: "Decay",      index: 5, min: 0, max: 1, def: 0.45, scream: false },
    { name: "Level",      index: 6, min: 0, max: 1, def: 0.80, scream: false }
  ];

  var values = PARAMS.map(function (p) { return p.def; });

  // --- host bridge ---
  function pushParam(i) {
    if (window.vstai && window.vstai.setParam) {
      window.vstai.setParam(PARAMS[i].index, values[i]);
    }
  }
  function pushAll() { for (var i = 0; i < PARAMS.length; i++) pushParam(i); }

  // ===================================================================
  //  KNOBS  (hand-drawn SVG, drag to turn, dblclick reset, wheel fine)
  // ===================================================================
  var knobEls = [];

  function makeKnob(p, i) {
    var wrap = document.createElement("div");
    wrap.className = "knob" + (p.scream ? " scream" : "");

    var col = p.scream ? ACCENT2 : ACCENT;
    var R = 30, CX = 36, CY = 36;
    var A0 = 135, A1 = 405; // sweep degrees

    var dial = document.createElement("div");
    dial.className = "dial";
    dial.innerHTML =
      '<svg width="72" height="72" viewBox="0 0 72 72">' +
        '<defs>' +
          '<radialGradient id="kb' + i + '" cx="50%" cy="38%" r="65%">' +
            '<stop offset="0" stop-color="#1a3a2c"/>' +
            '<stop offset="1" stop-color="#091811"/>' +
          '</radialGradient>' +
          '<filter id="gl' + i + '" x="-60%" y="-60%" width="220%" height="220%">' +
            '<feGaussianBlur stdDeviation="2.4" result="b"/>' +
            '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>' +
          '</filter>' +
        '</defs>' +
        '<circle cx="36" cy="36" r="31" fill="none" stroke="#06140e" stroke-width="6"/>' +
        '<path class="track" fill="none" stroke="#16332650" stroke-width="4" stroke-linecap="round"/>' +
        '<path class="arc" fill="none" stroke="' + col + '" stroke-width="4" stroke-linecap="round" filter="url(#gl' + i + ')"/>' +
        '<circle cx="36" cy="36" r="22" fill="url(#kb' + i + ')" stroke="#2a5040" stroke-width="1"/>' +
        '<circle cx="36" cy="36" r="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>' +
        '<line class="ptr" x1="36" y1="36" x2="36" y2="18" stroke="' + col + '" stroke-width="2.6" stroke-linecap="round" filter="url(#gl' + i + ')"/>' +
        '<circle class="hub" cx="36" cy="36" r="3.4" fill="' + col + '"/>' +
      '</svg>';

    var name = document.createElement("div");
    name.className = "name";
    name.textContent = p.name;

    var val = document.createElement("div");
    val.className = "val";

    wrap.appendChild(dial);
    wrap.appendChild(name);
    wrap.appendChild(val);

    var svg = dial.querySelector("svg");
    var arc = svg.querySelector(".arc");
    var track = svg.querySelector(".track");
    var ptr = svg.querySelector(".ptr");

    function deg2pt(a, r) {
      var rad = (a - 90) * Math.PI / 180;
      return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
    }
    function arcPath(fromA, toA, r) {
      var a = deg2pt(fromA, r), b = deg2pt(toA, r);
      var large = (toA - fromA) > 180 ? 1 : 0;
      return "M" + a[0].toFixed(2) + " " + a[1].toFixed(2) +
             " A" + r + " " + r + " 0 " + large + " 1 " + b[0].toFixed(2) + " " + b[1].toFixed(2);
    }
    track.setAttribute("d", arcPath(A0, A1, R));

    function render() {
      var v = values[i];
      var t = (v - p.min) / (p.max - p.min);
      var a = A0 + (A1 - A0) * t;
      arc.setAttribute("d", arcPath(A0, a, R));
      var pe = deg2pt(a, 16);
      ptr.setAttribute("x2", pe[0].toFixed(2));
      ptr.setAttribute("y2", pe[1].toFixed(2));
      val.textContent = Math.round(t * 100) + "%";
    }

    // drag vertically to turn
    var dragging = false, lastY = 0;
    function onDown(e) {
      dragging = true;
      lastY = (e.touches ? e.touches[0].clientY : e.clientY);
      e.preventDefault();
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("touchend", onUp);
    }
    function onMove(e) {
      if (!dragging) return;
      var y = (e.touches ? e.touches[0].clientY : e.clientY);
      var dy = lastY - y;
      lastY = y;
      var step = (e.shiftKey ? 0.0015 : 0.006);
      values[i] = Math.max(p.min, Math.min(p.max, values[i] + dy * step * (p.max - p.min)));
      render();
      pushParam(i);
      e.preventDefault();
    }
    function onUp() {
      dragging = false;
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    }
    dial.addEventListener("mousedown", onDown);
    dial.addEventListener("touchstart", onDown, { passive: false });

    dial.addEventListener("dblclick", function () {
      values[i] = p.def;
      render();
      pushParam(i);
    });
    dial.addEventListener("wheel", function (e) {
      values[i] = Math.max(p.min, Math.min(p.max, values[i] - Math.sign(e.deltaY) * 0.02 * (p.max - p.min)));
      render();
      pushParam(i);
      e.preventDefault();
    }, { passive: false });

    knobEls.push({ render: render });
    document.getElementById("knobs").appendChild(wrap);
    render();
  }

  PARAMS.forEach(makeKnob);

  // ===================================================================
  //  PATCH JACKS  (decorative semi-modular field; light up live)
  // ===================================================================
  var JACK_DEFS = [
    { n: "VCO",  live: true  },
    { n: "PWM",  live: true  },
    { n: "S&H",  live: true  },
    { n: "LFO",  live: false },
    { n: "ENV",  live: true  },
    { n: "VCF",  live: true  }
  ];
  var jackEls = [];
  (function buildJacks() {
    var host = document.getElementById("jacks");
    JACK_DEFS.forEach(function (j) {
      var el = document.createElement("div");
      el.className = "jack" + (j.live ? " live" : "");
      el.innerHTML =
        '<svg width="26" height="26" viewBox="0 0 26 26">' +
          '<circle cx="13" cy="13" r="11" fill="#04100b" stroke="#214234" stroke-width="1.5"/>' +
          '<circle cx="13" cy="13" r="7" fill="#0a1c14" stroke="#16302440" stroke-width="1"/>' +
          '<circle class="hole" cx="13" cy="13" r="3.4" fill="#020a07"/>' +
        '</svg>' +
        '<span class="jl">' + j.n + '</span>';
      host.appendChild(el);
      jackEls.push({ el: el, hole: el.querySelector(".hole"), def: j });
    });
  })();

  // ===================================================================
  //  MOD-BUS SCOPE  (animated stepped S&H / smooth LFO readout)
  // ===================================================================
  var scope = document.getElementById("scope");
  var ctx = scope.getContext("2d");
  var modModeEl = document.getElementById("modMode");
  var W = scope.width, H = scope.height;

  var hist = new Array(120).fill(0);
  var modPhase = 0;
  var shVal = 0;
  var shSmooth = 0;
  var rng = 0x1234567 >>> 0;
  function nextRand() {
    rng ^= rng << 13; rng ^= rng >>> 17; rng ^= rng << 5; rng >>>= 0;
    return (rng / 0xffffffff) * 2 - 1;
  }

  var glow = 0;        // pulses when a note triggers / S&H steps
  var lastT = 0;

  function drawScope(now) {
    var dt = lastT ? (now - lastT) / 1000 : 0.016;
    lastT = now;
    if (dt > 0.05) dt = 0.05;

    var rate = 0.3 + Math.pow(values[4], 2) * 27.7; // Hz, mirrors DSP
    var depth = values[3];
    var lfoBlend = Math.max(0, Math.min(1, (values[4] - 0.5) * 2));
    modModeEl.textContent = lfoBlend > 0.5 ? "LFO" : "S&H";

    modPhase += rate * dt;
    while (modPhase >= 1) {
      modPhase -= 1;
      shVal = nextRand();
      glow = 1;
    }
    shSmooth += Math.min(1, 14 * dt) * (shVal - shSmooth);
    var tri = 4 * Math.abs(modPhase - 0.5) - 1;
    var src = shSmooth * (1 - lfoBlend) + tri * lfoBlend;
    var modOut = src * depth;

    hist.push(modOut);
    hist.shift();

    glow *= Math.pow(0.0001, dt); // fast decay

    // --- render ---
    ctx.clearRect(0, 0, W, H);

    // baseline grid
    ctx.strokeStyle = "rgba(67,224,160,0.10)";
    ctx.lineWidth = 1;
    for (var gx = 0; gx <= 4; gx++) {
      var x = (gx / 4) * W;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();

    // waveform
    var col = lfoBlend > 0.5 ? ACCENT2 : ACCENT;
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.shadowColor = col;
    ctx.shadowBlur = 6 + glow * 10;
    ctx.beginPath();
    for (var k = 0; k < hist.length; k++) {
      var px = (k / (hist.length - 1)) * W;
      var py = H / 2 - hist[k] * (H / 2 - 6);
      if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // leading dot
    var ly = H / 2 - hist[hist.length - 1] * (H / 2 - 6);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(W - 2, ly, 2.6 + glow * 2, 0, Math.PI * 2); ctx.fill();

    // pulse the S&H / VCF jacks with the mod glow
    var a = 0.35 + glow * 0.65;
    jackEls.forEach(function (jk) {
      if (jk.def.n === "S&H" || jk.def.n === "VCF") {
        jk.hole.setAttribute("fill", glow > 0.05
          ? "rgba(67,224,160," + a.toFixed(2) + ")"
          : "#020a07");
      }
    });

    if (!document.hidden) requestAnimationFrame(drawScope);
  }
  requestAnimationFrame(drawScope);
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) { lastT = 0; requestAnimationFrame(drawScope); }
  });

  // ===================================================================
  //  KEYBOARD  (on-screen, mono — calls vstai.noteOn / noteOff)
  // ===================================================================
  var START = 48; // C3
  var NUM_WHITE = 15;
  var WHITE_SEMI = [0, 2, 4, 5, 7, 9, 11];
  var BLACK_AFTER = { 0: 1, 1: 3, 3: 6, 4: 8, 5: 10 }; // white-index -> black semitone offset

  var keysHost = document.getElementById("keys");
  var keyEls = {}; // midi -> element
  var pressed = {};

  function noteOn(m) {
    if (pressed[m]) return;
    pressed[m] = true;
    if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(m, 0.9);
    if (keyEls[m]) keyEls[m].classList.add("down");
    glow = 1;
  }
  function noteOff(m) {
    if (!pressed[m]) return;
    pressed[m] = false;
    if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(m);
    if (keyEls[m]) keyEls[m].classList.remove("down");
  }

  // build white keys
  var whiteMidis = [];
  for (var w = 0; w < NUM_WHITE; w++) {
    var oct = Math.floor(w / 7);
    var semi = WHITE_SEMI[w % 7];
    var m = START + oct * 12 + semi;
    whiteMidis.push(m);
    var el = document.createElement("div");
    el.className = "wkey";
    el.dataset.midi = m;
    keysHost.appendChild(el);
    keyEls[m] = el;
  }
  // build black keys positioned over the white row
  for (var b = 0; b < NUM_WHITE; b++) {
    var local = b % 7;
    if (BLACK_AFTER[local] === undefined) continue;
    if (b === NUM_WHITE - 1) continue;
    var octB = Math.floor(b / 7);
    var bm = START + octB * 12 + BLACK_AFTER[local];
    var bk = document.createElement("div");
    bk.className = "bkey";
    bk.dataset.midi = bm;
    bk.style.left = (((b + 1) / NUM_WHITE) * 100) + "%";
    keysHost.appendChild(bk);
    keyEls[bm] = bk;
  }

  // pointer interaction (mono glide via drag across keys)
  var mouseHeld = false;
  function midiAt(target) {
    if (target && target.dataset && target.dataset.midi) return +target.dataset.midi;
    return null;
  }
  function elFromPoint(x, y) {
    var t = document.elementFromPoint(x, y);
    return midiAt(t);
  }
  keysHost.addEventListener("mousedown", function (e) {
    mouseHeld = true;
    var m = elFromPoint(e.clientX, e.clientY);
    if (m != null) { lastDown = m; noteOn(m); }
    e.preventDefault();
  });
  var lastDown = null;
  window.addEventListener("mousemove", function (e) {
    if (!mouseHeld) return;
    var m = elFromPoint(e.clientX, e.clientY);
    if (m != null && m !== lastDown) {
      if (lastDown != null) noteOff(lastDown);
      lastDown = m;
      noteOn(m);
    }
  });
  window.addEventListener("mouseup", function () {
    mouseHeld = false;
    if (lastDown != null) { noteOff(lastDown); lastDown = null; }
  });

  // touch
  keysHost.addEventListener("touchstart", function (e) {
    var t = e.changedTouches[0];
    var m = elFromPoint(t.clientX, t.clientY);
    if (m != null) { lastDown = m; noteOn(m); }
    e.preventDefault();
  }, { passive: false });
  keysHost.addEventListener("touchmove", function (e) {
    var t = e.changedTouches[0];
    var m = elFromPoint(t.clientX, t.clientY);
    if (m != null && m !== lastDown) {
      if (lastDown != null) noteOff(lastDown);
      lastDown = m;
      noteOn(m);
    }
    e.preventDefault();
  }, { passive: false });
  keysHost.addEventListener("touchend", function (e) {
    if (lastDown != null) { noteOff(lastDown); lastDown = null; }
    e.preventDefault();
  }, { passive: false });

  // computer keyboard row (a..) for quick play
  var KEYMAP = { a:48, w:49, s:50, e:51, d:52, f:53, t:54, g:55, y:56, h:57, u:58, j:59, k:60, o:61, l:62, p:63 };
  window.addEventListener("keydown", function (e) {
    if (e.repeat) return;
    var m = KEYMAP[e.key];
    if (m != null) noteOn(m);
  });
  window.addEventListener("keyup", function (e) {
    var m = KEYMAP[e.key];
    if (m != null) noteOff(m);
  });

  // ===================================================================
  //  INIT — push defaults once the host bridge is ready
  // ===================================================================
  function start() {
    pushAll();
  }
  if (window.vstai && window.vstai.onReady) {
    window.vstai.onReady(start);
  } else {
    start();
  }
})();
</script>
</body>
</html>
