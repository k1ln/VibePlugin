  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Cinematic Poly<\/title>\n<style>\n  :root {\n    --accent: #e0b070;\n    --accent2: #c08040;\n    --wood1: #5a3320;\n    --wood2: #3a1f12;\n    --panel1: #211b18;\n    --panel2: #16110e;\n    --ink: #efe2cf;\n    --ink-dim: #9c8a76;\n    --metal1: #46403a;\n    --metal2: #24201c;\n  }\n\n  * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #2a221d 0%, #120d0a 60%, #0a0706 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    min-height: 100%;\n  }\n\n  body {\n    display: flex;\n    justify-content: center;\n    padding: 18px;\n  }\n\n  .cabinet {\n    width: 100%;\n    max-width: 880px;\n    border-radius: 16px;\n    padding: 14px;\n    background:\n      linear-gradient(180deg, #1d1714 0%, #100c0a 100%);\n    box-shadow:\n      0 26px 60px rgba(0,0,0,0.7),\n      0 2px 0 rgba(255,255,255,0.05) inset,\n      0 -2px 0 rgba(0,0,0,0.6) inset;\n    position: relative;\n    display: flex;\n    gap: 10px;\n  }\n\n  /* wooden end cheeks */\n  .cheek {\n    width: 30px;\n    flex: 0 0 30px;\n    border-radius: 10px;\n    background:\n      repeating-linear-gradient(180deg,\n        rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 2px,\n        rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 5px),\n      linear-gradient(95deg, var(--wood1), var(--wood2));\n    box-shadow:\n      0 2px 0 rgba(255,210,150,0.18) inset,\n      0 -6px 14px rgba(0,0,0,0.6) inset,\n      0 14px 26px rgba(0,0,0,0.5);\n    position: relative;\n  }\n  .cheek::after {\n    content: \"\";\n    position: absolute;\n    inset: 5px;\n    border-radius: 7px;\n    border: 1px solid rgba(0,0,0,0.4);\n    box-shadow: 0 1px 0 size: 11px;\n    font-variant-numeric: tabular-nums;\n    letter-spacing: 0.04em;\n    color: var(--accent);\n    min-height: 13px;\n  }\n\n  /* ribbon controller strip */\n  .ribbon-wrap {\n    position: relative;\n    z-index: 2;\n    margin-bottom: 12px;\n  }\n  .ribbon-label {\n    font-size: 8.5px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    margin: 0 0 4px 2px;\n  }\n  .ribbon {\n    height: 26px;\n    border-radius: 13px;\n    position: relative;\n    cursor: pointer;\n    touch-action: none;\n    background:\n      linear-gradient(180deg, #2b231d, #15100c);\n    box-shadow:\n      0 0 0 1px rgba(0,0,0,0.6),\n      0 2px 6px rgba(0,0,0,0.5) inset,\n      0 1px 0 rgba(255,255,255,0.05);\n    overflow: hidden;\n  }\n  .ribbon-grooves {\n    position: absolute;\n    inset: 0;\n    background: repeating-linear-gradient(90deg,\n      rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px,\n      transparent 1px, transparent 14px);\n  }\n  .ribbon-glow {\n    position: absolute;\n    top: 0;\n    bottom: 0;\n    width: 46px;\n    left: 50%;\n    transform: translateX(-50%);\n    border-radius: 13px;\n    background: radial-gradient(closest-side, var(--accent), rgba(224,176,112,0.0));\n    opacity: 0.35;\n    transition: opacity 0.2s;\n    pointer-events: none;\n  }\n  .ribbon.touched .ribbon-glow { opacity: 0.85; }\n\n  /* keyboard */\n  .keys {\n    position: relative;\n    z-index: 2;\n    height: 116px;\n    border-radius: 7px;\n    padding: 7px 7px 0;\n    background: linear-gradient(180deg, #0c0907, #050302);\n    box-shadow: 0 8px 16px rgba(0,0,0,0.5) inset, 0 0 0 1px rgba(224,176,112,0.12);\n    display: flex;\n    position: relative;\n  }\n  .key {\n    position: relative;\n    flex: 1 1 0;\n    margin: 0 1px;\n    border-radius: 0 0 5px 5px;\n    background: linear-gradient(180deg, #f3ead8 0%, #d8cab2 88%, #b6a888 100%);\n    box-shadow:\n      0 -1px 0 rgba(0,0,0,0.3) inset,\n      0 4px 5px rgba(0,0,0,0.4);\n    cursor: pointer;\n    transition: background 0.04s, transform 0.04s;\n  }\n  .key.down {\n    background: linear-gradient(180deg, var(--accent) 0%, #d8a45c 70%, #b6843c 100%);\n    transform: translateY(2px);\n    box-shadow: 0 0 14px rgba(224,176,112,0.7) inset, 0 1px 2px rgba(0,0,0,0.5);\n  }\n  .key.black {\n    position: absolute;\n    top: 7px;\n    width: 5.4%;\n    height: 64%;\n    margin: 0;\n    border-radius: 0 0 4px 4px;\n    background: linear-gradient(180deg, #2a221c 0%, #100c09 100%);\n    box-shadow: 0 3px 4px rgba(0,0,0,0.6), 0 -1px 0 rgba(255,255,255,0.08) inset;\n    z-index: 3;\n  }\n  .key.black.down {\n    background: linear-gradient(180deg, var(--accent2) 0%, #6a3c16 100%);\n    box-shadow: 0 0 12px rgba(192,128,64,0.8) inset;\n    transform: translateY(1px);\n  }\n\n  .footer {\n    position: relative;\n    z-index: 2;\n    margin-top: 9px;\n    display: flex;\n    justify-content: space-between;\n    font-size: 8.5px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"cabinet\">\n    <div class=\"cheek\"><\/div>\n    <div class=\"face\">\n      <header>\n        <div class=\"brand\">\n          <div class=\"logo-orb\"><\/div>\n          <div class=\"titles\">\n            <h1>Cinematic Poly<\/h1>\n            <p class=\"sub\">Dual-Layer Grand Polysynth<\/p>\n          <\/div>\n        <\/div>\n        <div class=\"lamps\" id=\"lamps\"><\/div>\n      <\/header>\n\n      <div class=\"scope\"><canvas id=\"scope\"><\/canvas><\/div>\n\n      <div class=\"controls\" id=\"controls\"><\/div>\n\n      <div class=\"ribbon-wrap\">\n        <p class=\"ribbon-label\">Ribbon &mdash; Brightness<\/p>\n        <div class=\"ribbon\" id=\"ribbon\">\n          <div class=\"ribbon-grooves\"><\/div>\n          <div class=\"ribbon-glow\" id=\"ribbonGlow\"><\/div>\n        <\/div>\n      <\/div>\n\n      <div class=\"keys\" id=\"keys\"><\/div>\n\n      <div class=\"footer\">\n        <span>8 Voices &middot; 2 Layers<\/span>\n        <span>Drag knobs &middot; dbl-click resets<\/span>\n      <\/div>\n    <\/div>\n    <div class=\"cheek\"><\/div>\n  <\/div>\n\n<script>\n  \"use strict\";\n\n  // ---- host bridge --------------------------------------------------\n  function setParam(i, v) {\n    if (window.vstai && window.vstai.setParam) window.vstai.setParam(i, v);\n  }\n  function hostNoteOn(n, vel) {\n    if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(n, vel);\n  }\n  function hostNoteOff(n) {\n    if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(n);\n  }\n\n  // ---- parameter model (indices match assembly.ts / spec.json) ------\n  var PARAMS = [\n    { name: \"Detune\",     index: 0, min: 0, max: 1, def: 0.35, fmt: pct },\n    { name: \"Cutoff\",     index: 1, min: 0, max: 1, def: 0.5,  fmt: pct },\n    { name: \"Resonance\",  index: 2, min: 0, max: 1, def: 0.3,  fmt: pct },\n    { name: \"Filt Env\",   index: 3, min: 0, max: 1, def: 0.55, fmt: pct },\n    { name: \"Attack\",     index: 4, min: 0, max: 1, def: 0.18, fmt: secs },\n    { name: \"Release\",    index: 5, min: 0, max: 1, def: 0.4,  fmt: secs },\n    { name: \"Brightness\", index: 6, min: 0, max: 1, def: 0.55, fmt: pct },\n    { name: \"Level\",      index: 7, min: 0, max: 1, def: 0.7,  fmt: pct }\n  ];\n\n  function pct(v) { return Math.round(v * 100) + \"%\"; }\n  function secs(v, p) {\n    // Attack maps ~0..2.2s, Release ~0.02..3.5s in the DSP; show approx time.\n    var t = p.index === 4 ? 0.002 + v * 2.2 : 0.02 + v * 3.5;\n    return t < 1 ? Math.round(t * 1000) + \" ms\" : t.toFixed(2) + \" s\";\n  }\n\n  var ACCENT = \"#e0b070\";\n  var ACCENT2 = \"#c08040\";\n  var values = PARAMS.map(function (p) { return p.def; });\n\n  // ---- knob factory (SVG, drag vertical, wheel, dbl-click reset) ----\n  function makeKnob(p) {\n    var cell = document.createElement(\"div\");\n    cell.className = \"knob-cell\";\n\n    var knob = document.createElement(\"div\");\n    knob.className = \"knob\";\n\n    var NS = \"http://www.w3.org/2000/svg\";\n    var svg = document.createElementNS(NS, \"svg\");\n    svg.setAttribute(\"viewBox\", \"0 0 100 100\");\n\n    function arc(r, a0, a1) {\n      var x0 = 50 + r * Math.cos(a0), y0 = 50 + r * Math.sin(a0);\n      var x1 = 50 + r * Math.cos(a1), y1 = 50 + r * Math.sin(a1);\n      var large = (a1 - a0) > Math.PI ? 1 : 0;\n      return \"M \" + x0 + \" \" + y0 + \" A \" + r + \" \" + r + \" 0 \" + large + \" 1 \" + x1 + \" \" + y1;\n    }\n    var A_START = Math.PI * 0.75;\n    var A_END = Math.PI * 2.25;\n\n    var track = document.createElementNS(NS, \"path\");\n    track.setAttribute(\"d\", arc(38, A_START, A_END));\n    track.setAttribute(\"fill\", \"none\");\n    track.setAttribute(\"stroke\", \"#000\");\n    track.setAttribute(\"stroke-width\", \"7\");\n    track.setAttribute(\"stroke-linecap\", \"round\");\n    track.setAttribute(\"opacity\", \"0.55\");\n    svg.appendChild(track);\n\n    var fill = document.createElementNS(NS, \"path\");\n    fill.setAttribute(\"fill\", \"none\");\n    fill.setAttribute(\"stroke\", \"url(#g\" + p.index + \")\");\n    fill.setAttribute(\"stroke-width\", \"7\");\n    fill.setAttribute(\"stroke-linecap\", \"round\");\n    svg.appendChild(fill);\n\n    var defs = document.createElementNS(NS, \"defs\");\n    var grad = document.createElementNS(NS, \"linearGradient\");\n    grad.setAttribute(\"id\", \"g\" + p.index);\n    grad.setAttribute(\"x1\", \"0\"); grad.setAttribute(\"y1\", \"1\");\n    grad.setAttribute(\"x2\", \"1\"); grad.setAttribute(\"y2\", \"0\");\n    var st1 = document.createElementNS(NS, \"stop\");\n    st1.setAttribute(\"offset\", \"0%\"); st1.setAttribute(\"stop-color\", ACCENT2);\n    var st2 = document.createElementNS(NS, \"stop\");\n    st2.setAttribute(\"offset\", \"100%\"); st2.setAttribute(\"stop-color\", ACCENT);\n    grad.appendChild(st1); grad.appendChild(st2);\n    defs.appendChild(grad);\n    svg.appendChild(defs);\n\n    // body\n    var body = document.createElementNS(NS, \"circle\");\n    body.setAttribute(\"cx\", \"50\"); body.setAttribute(\"cy\", \"50\"); body.setAttribute(\"r\", \"27\");\n    body.setAttribute(\"fill\", \"#1c1713\");\n    body.setAttribute(\"stroke\", \"#0a0706\");\n    body.setAttribute(\"stroke-width\", \"2\");\n    svg.appendChild(body);\n\n    var bevel = document.createElementNS(NS, \"circle\");\n    bevel.setAttribute(\"cx\", \"50\"); bevel.setAttribute(\"cy\", \"47\"); bevel.setAttribute(\"r\", \"24\");\n    bevel.setAttribute(\"fill\", \"none\");\n    bevel.setAttribute(\"stroke\", \"rgba(255,225,180,0.18)\");\n    bevel.setAttribute(\"stroke-width\", \"1.5\");\n    svg.appendChild(bevel);\n\n    var pointer = document.createElementNS(NS, \"line\");\n    pointer.setAttribute(\"x1\", \"50\"); pointer.setAttribute(\"y1\", \"50\");\n    pointer.setAttribute(\"stroke\", ACCENT);\n    pointer.setAttribute(\"stroke-width\", \"3\");\n    pointer.setAttribute(\"stroke-linecap\", \"round\");\n    svg.appendChild(pointer);\n\n    knob.appendChild(svg);\n    cell.appendChild(knob);\n\n    var lbl = document.createElement(\"div\");\n    lbl.className = \"lbl\";\n    lbl.textContent = p.name;\n    cell.appendChild(lbl);\n\n    var val = document.createElement(\"div\");\n    val.className = \"val\";\n    cell.appendChild(val);\n\n    function norm() { return (values[p.index] - p.min) / (p.max - p.min); }\n\n    function paint() {\n      var t = norm();\n      var a = A_START + t * (A_END - A_START);\n      fill.setAttribute(\"d\", arc(38, A_START, a + 0.0001));\n      var px = 50 + 30 * Math.cos(a), py = 50 + 30 * Math.sin(a);\n      pointer.setAttribute(\"x2\", px);\n      pointer.setAttribute(
