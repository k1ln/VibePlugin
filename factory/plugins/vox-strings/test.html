  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Vox Strings<\/title>\n<style>\n  :root {\n    --accent: #d8b0e0;\n    --accent2: #a0c0ff;\n    --cream: #efe6d2;\n    --cream-2: #e2d4b6;\n    --wood: #3a2c22;\n    --panel: #2a2230;\n    --panel-2: #1c1722;\n    --ink: #efe7df;\n    --ink-dim: #b6a9c4;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: radial-gradient(120% 90% at 50% -10%, #322a3a 0%, #1a1520 60%, #120e18 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .shell {\n    max-width: 880px;\n    margin: 0 auto;\n    padding: 18px 16px 26px;\n  }\n\n  /* ---- the cabinet: a soft vintage tilt panel ---- */\n  .cabinet {\n    position: relative;\n    border-radius: 18px;\n    padding: 16px 18px 20px;\n    background:\n      linear-gradient(180deg, #36293f 0%, #2a2030 48%, #221a28 100%);\n    border: 1px solid rgba(216,176,224,0.18);\n    box-shadow:\n      0 30px 60px -20px rgba(0,0,0,0.7),\n      inset 0 1px 0 rgba(255,255,255,0.07),\n      inset 0 -2px 14px rgba(0,0,0,0.5);\n    transform: perspective(1400px) rotateX(2.2deg);\n  }\n\n  /* warm ensemble glow that breathes behind everything */\n  .glow {\n    position: absolute;\n    inset: -2px;\n    border-radius: 18px;\n    pointer-events: none;\n    background: radial-gradient(60% 50% at 50% 30%,\n      rgba(216,176,224,0.20), rgba(160,192,255,0.10) 45%, transparent 70%);\n    filter: blur(8px);\n    opacity: 0.5;\n    animation: breathe 7s ease-in-out infinite;\n  }\n  @keyframes breathe {\n    0%, 100% { opacity: 0.35; transform: scale(1.0); }\n    50%      { opacity: 0.62; transform: scale(1.03); }\n  }\n\n  /* ---- header / brand ---- */\n  .header {\n    display: flex;\n    align-items: flex-end;\n    justify-content: space-between;\n    gap: 14px;\n    margin-bottom: 12px;\n    position: relative;\n    z-index: 2;\n  }\n  .brand { display: flex; flex-direction: column; gap: 2px; }\n  .brand .kicker {\n    font-size: 10px;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--accent2);\n    opacity: 0.85;\n  }\n  .brand h1 {\n    margin: 0;\n    font-size: 30px;\n    font-weight: 800;\n    letter-spacing: 0.02em;\n    line-height: 1;\n    background: linear-gradient(180deg, #fff, var(--accent) 70%, #c79ad2);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    text-shadow: 0 1px 0 rgba(0,0,0,0.3);\n  }\n  .badge {\n    font-size: 9px;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    border: 1px solid rgba(216,176,224,0.25);\n    border-radius: 999px;\n    padding: 5px 11px;\n    background: rgba(0,0,0,0.2);\n  }\n\n  /* ---- the choir scene above the strings ---- */\n  .scene {\n    position: relative;\n    z-index: 2;\n    height: 132px;\n    border-radius: 12px;\n    overflow: hidden;\n    margin-bottom: 14px;\n    background:\n      linear-gradient(180deg, #241b2c 0%, #1a1422 55%, #15101c 100%);\n    border: 1px solid rgba(0,0,0,0.4);\n    box-shadow: inset 0 2px 18px rgba(0,0,0,0.6);\n  }\n  .scene svg { display: block; width: 100%; height: 100%; }\n\n  /* ---- control bays ---- */\n  .bays {\n    position: relative;\n    z-index: 2;\n    display: grid;\n    grid-template-columns: repeat(7, 1fr);\n    gap: 10px;\n  }\n  @media (max-width: 660px) {\n    .bays { grid-template-columns: repeat(4, 1fr); }\n  }\n  .bay {\n    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.18));\n    border: 1px solid rgba(216,176,224,0.10);\n    border-radius: 12px;\n    padding: 12px 6px 9px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 7px;\n  }\n  .knob-wrap { position: relative; width: 72px; height: 72px; cursor: ns-resize; }\n  .knob-wrap svg { width: 72px; height: 72px; display: block; }\n  .klabel {\n    font-size: 9px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    text-align: center;\n  }\n  .kval {\n    font-size: 11px;\n    font-variant-numeric: tabular-nums;\n    color: var(--accent);\n    font-weight: 700;\n    letter-spacing: 0.02em;\n  }\n\n  /* ---- cream tabs row ---- */\n  .tabs {\n    position: relative;\n    z-index: 2;\n    display: flex;\n    gap: 6px;\n    margin: 14px 0 12px;\n    flex-wrap: wrap;\n  }\n  .tab {\n    font-size: 10px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    padding: 7px 13px;\n    border-radius: 7px 7px 3px 3px;\n    color: #4a3a2c;\n    background: linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);\n    border: 1px solid rgba(0,0,0,0.25);\n    box-shadow: 0 2px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.6);\n    cursor: pointer;\n    user-select: none;\n    font-weight: 700;\n    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;\n  }\n  .tab:hover { filter: brightness(1.05); }\n  .tab.on {\n    transform: translateY(2px);\n    box-shadow: 0 0 0 rgba(0,0,0,0.3),\n      inset 0 2px 5px rgba(0,0,0,0.35),\n      0 0 14px var(--accent);\n    background: linear-gradient(180deg, #f6ecd6, #ead9b4);\n  }\n\n  /* ---- keyboard ---- */\n  .kbd {\n    position: relative;\n    z-index: 2;\n    margin-top: 8px;\n    height: 110px;\n    border-radius: 8px;\n    background: linear-gradient(180deg, #100c16, #1a1420);\n    padding: 8px 8px 0;\n    box-shadow: inset 0 2px 10px rgba(0,0,0,0.6);\n    overflow: hidden;\n  }\n  .keys { position: relative; height: 100%; display: flex; }\n  .wkey {\n    position: relative;\n    flex: 1;\n    margin: 0 1px;\n    border-radius: 0 0 5px 5px;\n    background: linear-gradient(180deg, #f3ece0 0%, #d9cfbe 100%);\n    box-shadow: inset 0 -6px 8px rgba(0,0,0,0.12), 0 2px 3px rgba(0,0,0,0.4);\n    cursor: pointer;\n    transition: background .06s ease, box-shadow .06s ease;\n  }\n  .wkey.down {\n    background: linear-gradient(180deg, var(--accent) 0%, #b890c6 100%);\n    box-shadow: inset 0 -3px 10px rgba(0,0,0,0.3), 0 0 16px var(--accent);\n  }\n  .bkeys {\n    position: absolute;\n    top: 8px;\n    left: 8px;\n    right: 8px;\n    height: 62%;\n    display: flex;\n    pointer-events: none;\n  }\n  .bkey {\n    position: absolute;\n    width: 5%;\n    height: 100%;\n    border-radius: 0 0 4px 4px;\n    background: linear-gradient(180deg, #2a2230, #0d0a12);\n    box-shadow: 0 3px 4px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);\n    cursor: pointer;\n    pointer-events: auto;\n  }\n  .bkey.down {\n    background: linear-gradient(180deg, var(--accent2), #5e76b0);\n    box-shadow: 0 0 16px var(--accent2);\n  }\n\n  .foot {\n    position: relative;\n    z-index: 2;\n    margin-top: 10px;\n    font-size: 9px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    text-align: center;\n    opacity: 0.7;\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"shell\">\n  <div class=\"cabinet\">\n    <div class=\"glow\"><\/div>\n\n    <div class=\"header\">\n      <div class=\"brand\">\n        <div class=\"kicker\">Ensemble Instrument<\/div>\n        <h1>Vox Strings<\/h1>\n      <\/div>\n      <div class=\"badge\">Strings &middot; Voice<\/div>\n    <\/div>\n\n    <!-- choir mouths above a bowed string section -->\n    <div class=\"scene\">\n      <svg viewBox=\"0 0 800 132\" preserveAspectRatio=\"none\">\n        <defs>\n          <radialGradient id=\"head\" cx=\"50%\" cy=\"40%\" r=\"60%\">\n            <stop offset=\"0%\" stop-color=\"#3a3048\"/>\n  for (var i = 0; i < PARAMS.length; i++) makeKnob(i);\n\n  // ============================================================\n  //  CREAM TABS — quick voicing presets (purely client-side macros)\n  // ============================================================\n  var TABS = [\n    { name: \"Strings\", set: { 0: 0.85, 1: 0.20, 2: 0.55, 5: 0.55 } },\n    { name: \"Choir\",   set: { 0: 0.20, 1: 0.85, 2: 0.65, 5: 0.62 } },\n    { name: \"Ensemble\", set: { 0: 0.70, 1: 0.60, 2: 0.92, 5: 0.6 } },\n    { name: \"Pad\",     set: { 0: 0.65, 1: 0.55, 2: 0.7, 3: 0.7, 4: 0.75, 5: 0.5 } }\n  ];\n  var tabsEl = document.getElementById(\"tabs\");\n  var tabEls = [];\n  TABS.forEach(function (t, ti) {\n    var el = document.createElement(\"div\");\n    el.className = \"tab\";\n    el.textContent = t.name;\n    el.addEventListener(\"click\", function () {\n      Object.keys(t.set).forEach(function (k) {\n        var idx = +k;\n        values[idx] = clamp01(t.set[k]);\n        knobEls[idx].render();\n        pushParam(idx);\n      });\n      tabEls.forEach(function (e) { e.classList.remove(\"on\"); });\n      el.classList.add(\"on\");\n    });\n    tabsEl.appendChild(el);\n    tabEls.push(el);\n  });\n\n  // ============================================================\n  //  KEYBOARD\n  // ============================================================\n  var WHITE = [60, 62, 64, 65, 67, 69, 71, 72, 74, 76, 77, 79, 81, 83]; // 2 octaves C4..\n  var BLACK = [ // { note, leftFraction }\n    { n: 61, after: 0 }, { n: 63, after: 1 },\n    { n: 66, after: 3 }, { n: 68, after: 4 }, { n: 70, after: 5 },\n    { n: 73, after: 7 }, { n: 75, after: 8 },\n    { n: 78, after: 10 }, { n: 80, after: 11 }, { n: 82, after: 12 }\n  ];\n\n  var whiteRow = document.getElementById(\"whiteKeys\");\n  var blackRow = document.getElementById(\"blackKeys\");\n  var keyEls = {};\n  var heldCount = 0;\n\n  WHITE.forEach(function (note) {\n    var k = document.createElement(\"div\");\n    k.className = \"wkey\";\n ults once the host is ready\n  // ============================================================\n  function start() {\n    pushAll();\n    for (var i = 0; i < knobEls.length; i++) knobEls[i].render();\n  }\n  if (window.vstai && window.vstai.onReady) {\n    window.vstai.onReady(start);\n  } else {\n    start();\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";

  }
  async function ensure(){

    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};

  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){

  document.getElementById('go').addEventListener('click',async function(){
    await ensure();

  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};

  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function setOct(o){ oct=o<-4?-4:(o>4?4:o); var ov=document.getElementById('octval'); if(ov)ov.textContent=(4+oct); }

    el.addEventListener('pointerdown',function(e){e.preventDefault();el._n=k[1]+oct*12;down(el._n,el);});

  var held={};                                            // base note -> actual note played (so releases survive an octave change)
