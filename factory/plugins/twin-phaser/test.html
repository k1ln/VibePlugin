<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Twin Phaser — test bench</title><style>
  :root{--ac:#7ad0c0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Twin Phaser</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Twin Phaser<\/title>\n<style>\n  :root {\n    --acc:  #7ad0c0;\n    --acc2: #9ad0ff;\n    --bg0:  #0d1416;\n    --bg1:  #14201f;\n    --panel:#1b2a2b;\n    --panel2:#15211f;\n    --ink:  #d8e8e6;\n    --dim:  #6f8a89;\n    --line: rgba(122,208,192,0.16);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background:\n      radial-gradient(1200px 600px at 50% -10%, #1d3231 0%, transparent 60%),\n      linear-gradient(160deg, #0d1416 0%, #0a1011 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .wrap {\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 18px 18px 28px;\n  }\n\n  /* ===== panel shell ===== */\n  .panel {\n    position: relative;\n    border-radius: 18px;\n    padding: 18px 20px 22px;\n    background:\n      linear-gradient(180deg, #21302f 0%, #16221f 55%, #111a18 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.06) inset,\n      0 -2px 0 rgba(0,0,0,0.55) inset,\n      0 22px 50px rgba(0,0,0,0.55),\n      0 2px 0 rgba(0,0,0,0.6);\n    border: 1px solid rgba(255,255,255,0.04);\n  }\n  /* corner screws */\n  .screw {\n    position: absolute; width: 11px; height: 11px; border-radius: 50%;\n    background: radial-gradient(circle at 35% 30%, #4a5b59, #1a2322 70%);\n    box-shadow: 0 1px 1px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.4);\n  }\n  .screw::after {\n    content: \"\"; position: absolute; inset: 3px; border-radius: 1px;\n    background: linear-gradient(90deg, transparent 44%, #0c1211 44%, #0c1211 56%, transparent 56%);\n  }\n  .screw.tl { top: 10px; left: 10px; } .screw.tr { top: 10px; right: 10px; }\n  .screw.bl { bottom: 10px; left: 10px; } .screw.br { bottom: 10px; right: 10px; }\n\n  /* ===== header ===== */\n  header {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 2px 6px 14px;\n    border-bottom: 1px solid var(--line);\n    margin-bottom: 16px;\n  }\n  .brand { display: flex; align-items: center; gap: 12px; }\n  .glyph {\n    width: 40px; height: 40px; flex: 0 0 auto;\n    filter: drop-shadow(0 0 6px rgba(122,208,192,0.4));\n  }\n  .titles h1 {\n    margin: 0; font-size: 20px; letter-spacing: 5px; font-weight: 700;\n    background: linear-gradient(90deg, var(--acc), var(--acc2));\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n  }\n  .titles p {\n    margin: 2px 0 0; font-size: 9.5px; letter-spacing: 3.5px;\n    text-transform: uppercase; color: var(--dim);\n  }\n  .stamp {\n    font-size: 8.5px; letter-spacing: 2px; text-transform: uppercase;\n    color: var(--dim); text-align: right; line-height: 1.5;\n    border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px;\n  }\n  .stamp b { color: var(--acc); }\n\n  /* ===== twin scope ===== */\n  .scopes {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\n    margin-bottom: 18px;\n  }\n  .scope {\n    position: relative; border-radius: 12px; overflow: hidden;\n    background:\n      radial-gradient(120% 80% at 50% 0%, #16302d 0%, #0a1413 70%);\n    border: 1px solid rgba(122,208,192,0.18);\n    box-shadow: 0 2px 0 rgba(0,0,0,0.5) inset, 0 0 24px rgba(0,0,0,0.4) inset;\n  }\n  .scope .tag {\n    position: absolute; top: 7px; left: 10px; z-index: 2;\n    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;\n    color: var(--dim);\n  }\n  .scope .rateread {\n    position: absolute; top: 7px; right: 10px; z-index: 2;\n    font-size: 10px; letter-spacing: 1px; color: var(--acc);\n    font-variant-numeric: tabular-nums;\n  }\n  .scope.b .rateread { color: var(--acc2); }\n  .scope canvas { display: block; width: 100%; height: 120px; }\n\n  .modepill {\n    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);\n    z-index: 5; pointer-events: none;\n    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;\n    color: var(--ink); background: rgba(8,16,15,0.7);\n    border: 1px solid var(--line); border-radius: 20px; padding: 4px 12px;\n    opacity: 0; transition: opacity 0.35s;\n  }\n  .scopes.linkflash .modepill { opacity: 1; }\n\n  /* link bracket between scopes */\n  .linkrow {\n    grid-column: 1 / -1; display: flex; justify-content: center;\n    margin-top: -4px;\n  }\n\n  /* ===== controls ===== */\n  .rack {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));\n    gap: 14px;\n    align-items: start;\n  }\n  .cell {\n    display: flex; flex-direction: column; align-items: center; gap: 8px;\n    padding: 12px 6px 10px;\n    border-radius: 12px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(0,0,0,0.18));\n    border: 1px solid rgba(255,255,255,0.03);\n  }\n  .cell .lab {\n    font-size: 9.5px; letter-spacing: 2.5px; text-transform: uppercase;\n    color: var(--dim);\n  }\n  .cell .val {\n    font-size: 12px; color: var(--ink); font-variant-numeric: tabular-nums;\n    letter-spacing: 0.5px;\n  }\n  .knob { width: 72px; height: 72px; cursor: ns-resize; touch-action: none; }\n  .knob:focus { outline: none; }\n\n  /* mode toggle (discrete) */\n  .modecell { justify-content: space-between; }\n  .seg {\n    display: flex; gap: 4px; padding: 4px;\n    background: rgba(0,0,0,0.32); border-radius: 10px;\n    border: 1px solid rgba(0,0,0,0.4);\n  }\n  .seg button {\n    font: inherit; font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase;\n    color: var(--dim); background: transparent; border: 0; cursor: pointer;\n    padding: 8px 10px; border-radius: 7px; transition: all 0.2s;\n  }\n  .seg button.on {\n    color: #07110f;\n    background: linear-gradient(180deg, var(--acc2), var(--acc));\n    box-shadow: 0 0 12px rgba(122,208,192,0.5), 0 1px 0 rgba(255,255,255,0.3) inset;\n  }\n\n     if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
