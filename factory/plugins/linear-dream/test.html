<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Linear Dream — test bench</title><style>
  :root{--ac:#5ad0c4}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

animation:pulse 2.6s ease-in-out infinite; }\n  @keyframes pulse{ 0%,100%{ opacity:.45; transform:scale(.85);} 50%{ opacity:1; transform:scale(1.2);} }\n\n  .screen{ height:96px; border-radius:10px; overflow:hidden; margin-bottom:12px; position:relative;\n    background:linear-gradient(180deg,#08201d,#06140f); border:1px solid rgba(90,208,196,.15); box-shadow:inset 0 2px 20px rgba(0,0,0,.55); }\n  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }\n  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }\n  .leg{ position:absolute; right:12px; top:8px; font-size:9px; letter-spacing:.06em; z-index:2; }\n  .leg b{ color:var(--acc); } .leg i{ color:var(--acc2); font-style:normal; }\n\n  .asel{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }\n  .abtn{ text-align:center; padding:8px 4px; border-radius:9px; cursor:pointer; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;\n    background:#0c1c1f; border:1px solid rgba(90,208,196,.2); color:var(--dim); transition:all .12s; }\n  .abtn.sel{ color:#04140f; background:linear-gradient(180deg,var(--acc),#39b0a4); box-shadow:0 0 16px rgba(90,208,196,.5); font-weight:700; }\n\n  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }\n  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }\n  .dial{ width:66px; height:66px; position:relative; }\n  .dial svg{ width:100%; height:100%; display:block; overflow:visible; }\n  .track{ fill:none; stroke:rgba(180,230,225,.14); stroke-width:7; stroke-linecap:round; }\n  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(90,208,196,.6)); }\n  .pcap{ fill:#0a1a18; stroke:rgba(90,208,196,.22); stroke-width:1; }\n  .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }\n <3;i++) abtns[i].classList.toggle(\"sel\",i===s); }\n\n  var R=31, C=2*Math.PI*R, A0=-135, A1=135;\n  var kw=document.getElementById(\"knobs\");\n  var knobs=PARAMS.map(function(p){\n    var el=document.createElement(\"div\"); el.className=\"knob\";\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 76 76\">'+\n      '<defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#5ad0c4\"/><stop offset=\"1\" stop-color=\"#b08cff\"/><\/linearGradient><\/defs>'+\n      '<circle class=\"track\" cx=\"38\" cy=\"38\" r=\"31\"><\/circle>'+\n      '<circle class=\"arc\" cx=\"38\" cy=\"38\" r=\"31\" transform=\"rotate(135 38 38)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle>'+\n      '<circle class=\"pcap\" cx=\"38\" cy=\"38\" r=\"19\"><\/circle>'+\n      '<line class=\"ptr\" x1=\"38\" y1=\"38\" x2=\"38\" y2=\"22\"><\/line><\/svg><\/div>'+\n      '<span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el);\n    var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function render(v){\n      var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*v)).toString());\n      var ang=(A0+(A1-A0)*v)*Math.PI/180;\n      ptr.setAttribute(\"x2\",(38+Math.sin(ang)*15).toFixed(2));\n      ptr.setAttribute(\"y2\",(38-Math.cos(ang)*15).toFixed(2));\n      val.textContent=Math.round(v*100)+\"%\";\n    }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; });\n    el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });\n    render(p.def);\n    return {render:render};\n  });\n\n  // ---- LA layering visualization: a sharp attack spike + a sustained body envelope ----\n  var cv=document.getElementById(\"cv\"), ctx=cv.getContext(\"2d\"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);\n  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }\n  window.addEventListener(\"resize\",resize); resize();\n  function frame(ts){\n    ctx.clearRect(0,0,W,H);\n    var atkType=selFromV(atkV), env=vals[3], cut=vals[1];\n    var base=H-14, pulse=0.5+0.5*Math.sin(ts/700);\n    ctx.strokeStyle=\"rgba(90,208,196,0.10)\"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,base); ctx.lineTo(W,base); ctx.stroke();\n    // BODY envelope (purple): rises then sustains, filter env affects the curve\n    ctx.beginPath();\n    for(var x=0;x<=W;x++){ var t=x/W; var a=Math.min(1,t/0.08); var dec=0.5+0.5*Math.exp(-t*(1+env*3)); var y=base-(a*dec)*(H*0.6)*(0.5+cut*0.5); ctx.lineTo(x,y); }\n    ctx.strokeStyle=\"rgba(176,140,255,0.85)\"; ctx.lineWidth=2; ctx.shadowColor=\"#b08cff\"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;\n    // ATTACK transient (teal): a sharp spike whose shape depends on type\n    ctx.beginPath();\n    for(var x2=0;x2<=W;x2++){ var t2=x2/W; var spike;\n      if(atkType===0) spike=Math.exp(-t2*40)*Math.abs(Math.sin(t2*120));        // mallet: ringy\n      else if(atkType===1) spike=Math.exp(-t2*16)*(0.4+0.6*Math.abs(Math.sin(t2*60)));  // blown: softer chiff\n      else spike=Math.exp(-t2*55);                                            // pluck: sharp\n      var y2=base - spike*(H*0.66)*pulse;\n      if(x2===0) ctx.moveTo(x2,y2); else ctx.lineTo(x2,y2); }\n    ctx.strokeStyle=\"rgba(90,208,196,0.95)\"; ctx.lineWidth=2; ctx.shadowColor=\"#5ad0c4\"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  function boot(){ host=window.vstai||null; send(0,atkV); setAtkUI(); PARAMS.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;

  function st(m){document.getElementById('st').textContent=m;}

  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);

  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
