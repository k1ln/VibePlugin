<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lately FM — test bench</title><style>
  :root{--ac:#42e6c4}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}

  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;

    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}

  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}

  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

block; }\n  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }\n  .opg{ position:absolute; right:12px; top:8px; z-index:2; display:flex; gap:8px; align-items:center; font-size:9px; color:var(--dim); }\n  .op{ width:18px; height:18px; border-radius:5px; border:1px solid rgba(66,230,196,.35); display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--acc); }\n  .arrowfm{ color:var(--acc2); }\n  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }\n  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }\n  .dial{ width:70px; height:70px; position:relative; }\n  .dial svg{ width:100%; height:100%; display:block; overflow:visible; }\n  .track{ fill:none; stroke:rgba(180,230,225,.14); stroke-width:7; stroke-linecap:round; }\n  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(66,230,196,.6)); }\n  .pcap{ fill:#0a141c; stroke:rgba(66,230,196,.22); stroke-width:1; }\n  .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }\n  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }\n  .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(66,230,196,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(66,230,196,.2); }\n  .knob:hover .kn{ color:var(--acc); }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <header><span class=\"logo\">LATELY&nbsp;FM<\/span><span class=\"sub\">fm · op waveforms<\/span><span class=\"led\"><\/span><\/header>\n    <div class=\"screen\"><div class=\"scrlbl\">OPERATOR WAVE<\/div><div class=\"opg\"><span class=\"op\">M<\/span><span class=\"arrowfm\">→<\/span><span class=\"op\">C<\/span><\/div><canvas id=\"cv\"><\/canvas><\/div>\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n  <\/div>\n<script>\n(function(){\n  \"use strict\";\n  var WAVES=[\"Sine\",\"Half\",\"Abs\",\"Quarter\",\"Even\",\"Square\"];\n  var P=[{name:\"Wave\",idx:0,def:0.45},{name:\"Ratio\",idx:1,def:0.5},{name:\"Depth\",idx:2,def:0.5},{name:\"Feedbk\",idx:3,def:0.2},{name:\"Decay\",idx:4,def:0.5},{name:\"Level\",idx:5,def:0.8}];\n  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });\n  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }\n  function selWave(){ var w=Math.floor(vals[0]*5.999); return w<0?0:(w>5?5:w); }\n  function opVal(ph,w){ var s=Math.sin(ph*Math.PI*2);\n    if(w===0)return s; if(w===1)return ph<0.5?s:0; if(w===2)return Math.abs(s);\n    if(w===3)return (ph<0.25||(ph>=0.5&&ph<0.75))?Math.abs(s):0;\n    if(w===4){var s2=Math.sin(ph*Math.PI*4); return ph<0.5?Math.abs(s2):0;}\n    return s>=0?1:-1; }\n  var R=33, C=2*Math.PI*R, A0=-135, A1=135;\n  var kw=document.getElementById(\"knobs\");\n  var knobs=P.map(function(p){\n    var el=document.createElement(\"div\"); el.className=\"knob\";\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 80 80\">'+\n      '<defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#42e6c4\"/><stop offset=\"1\" stop-color=\"#7a86ff\"/><\/linearGradient><\/defs>'+\n      '<circle class=\"track\" cx=\"40\" cy=\"40\" r=\"33\"><\/circle>'+\n      '<circle class=\"arc\" cx=\"40\" cy=\"40\" r=\"33\" transform=\"rotate(135 40 40)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle>'+\n      '<circle class=\"pcap\" cx=\"40\" cy=\"40\" r=\"20\"><\/circle>'+\n      '<line class=\"ptr\" x1=\"40\" y1=\"40\" x2=\"40\" y2=\"23\"><\/line><\/svg><\/div>'+\n      '<span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el);\n    var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*v)).toString());\n      var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute(\"x2\",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute(\"y2\",(40-Math.cos(ang)*16).toFixed(2));\n      val.textContent=(p.idx===0)?WAVES[selWave()]:Math.round(v*100)+\"%\"; }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; });\n    el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });\n    render(p.def);\n    return {render:render};\n  });\n  var cv=document.getElementById(\"cv\"), ctx=cv.getContext(\"2d\"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);\n  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }\n  window.addEventListener(\"resize\",resize); resize();\n  function frame(ts){\n    ctx.clearRect(0,0,W,H); var w=selWave(), depth=vals[2], ratio=vals[1], fb=vals[3]; var mid=H*0.55;\n    ctx.strokeStyle=\"rgba(66,230,196,0.10)\"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(W,mid); ctx.stroke();\n    // resulting FM-ish wave using the selected op wave\n    ctx.beginPath();\n    for(var x=0;x<=W;x+=2){ var t=x/W; var ph=(t*3+ts/700)%1; var mo=opVal((t*3*(1+ratio*3)+ts/500)%1,w);\n      var cph=(ph+mo*depth*0.3)%1; if(cph<0)cph+=1; var y=opVal(cph,w);\n      ctx.lineTo(x, mid - y*(H*0.34)); }\n    ctx.strokeStyle=\"rgba(66,230,196,0.95)\"; ctx.lineWidth=2; ctx.shadowColor=\"#42e6c4\"; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;

  function makeRiff(){

  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
