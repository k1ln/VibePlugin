<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Punch Comp — test bench</title><style>
  :root{--ac:#ff6b6b}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Punch Comp</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Punch Comp<\/title>\n<style>\n  @property --gr{syntax:'<number>';inherits:false;initial-value:0}\n  :root{\n    --ac:#ff6b6b; --ac2:#ff9a9a;\n    --steel:#2a3038; --steel2:#161a20;\n    --face:#1d2228;\n  }\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{\n    margin:0; color:#e8edf3;\n    font:13px/1.4 ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n    background:\n      radial-gradient(120% 90% at 50% -10%,#20262f 0%,#0c0f13 60%,#05070a 100%);\n    display:flex; align-items:center; justify-content:center; padding:18px;\n    -webkit-font-smoothing:antialiased;\n  }\n\n  /* ===== rack unit chassis ===== */\n  .unit{\n    position:relative; width:100%; max-width:640px;\n    border-radius:14px; overflow:hidden;\n    background:\n      linear-gradient(180deg,#3a424d 0%,#262c34 6%,#1b2026 12%,#1b2026 90%,#13171c 100%);\n    box-shadow:\n      0 40px 80px rgba(0,0,0,.65),\n      0 2px 0 rgba(255,255,255,.07) inset,\n      0 -2px 0 rgba(0,0,0,.5) inset,\n      0 0 0 1px rgba(0,0,0,.7);\n    animation:boot .6s ease both;\n  }\n  @keyframes boot{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}\n\n  /* brushed-metal faceplate texture */\n  .unit::before{\n    content:\"\"; position:absolute; inset:0; pointer-events:none; opacity:.5;\n    background:repeating-linear-gradient(90deg,\n      rgba(255,255,255,.015) 0 1px, rgba(0,0,0,.02) 1px 2px);\n    mix-blend-mode:overlay;\n  }\n  /* warm accent glow that drifts behind the plate */\n  .unit::after{\n    content:\"\"; position:absolute; inset:-30%; z-index:0; pointer-events:none;\n    background:radial-gradient(closest-side,\n      color-mix(in srgb,var(--ac) 18%,transparent),transparent 70%);\n    filter:blur(40px); animation:drift 9s ease-in-out infinite alternate;\n  }\n  @keyframes drift{from{transform:translate(-18%,-6%)}to{transform:translate(18%,8%)}}\n\n  /* mounting screws */\n  .screw{position:absolute; width:13px; height:13px; border-radius:50%; z-index:6;\n    background:radial-gradient(circle at 38% 32%,#5a6470,#1a1e24 75%);\n    box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.5) inset;}\n  .screw::after{content:\"\"; position:absolute; inset:3px; border-radius:1px;\n    background:linear-gradient(40deg,transparent 44%,rgba(0,0,0,.55) 44% 56%,transparent 56%);}\n  .screw.tl{top:10px;left:10px} .screw.tr{top:10px;right:10px}\n  .screw.bl{bottom:10px;left:10px} .screw.br{bottom:10px;right:10px}\n\n  /* ===== header ===== */\n  .hd{position:relative; z-index:2; display:flex; align-items:center; gap:12px;\n    padding:16px 30px 12px;}\n  .pwr{width:11px;height:11px;border-radius:50%;flex:none;\n    background:var(--ac);\n    box-shadow:0 0 10px var(--ac),0 0 3px #fff inset;\n    animation:beat 1.6s ease-in-out infinite;}\n  @keyframes beat{0%,100%{opacity:.5;box-shadow:0 0 5px var(--ac)}50%{opacity:1;box-shadow:0 0 16px var(--ac),0 0 4px #fff inset}}\n  .titles{flex:1;min-width:0}\n  .brand{font-size:9px;letter-spacing:.42em;color:#8593a6;text-transform:uppercase;margin-bottom:2px}\n  h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.02em;line-height:1;\n    background:linear-gradient(92deg,#fff,var(--ac2) 60%,var(--ac));\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n    text-shadow:0 1px 0 rgba(0,0,0,.4);}\n  .model{font-size:9px;letter-spacing:.3em;color:#7b8aa0;text-transform:uppercase;\n    border:1px solid rgba(255,255,255,.13);border-radius:4px;padding:5px 9px;white-space:nowrap;\n    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.2))}\n\n  /* ===== meter section ===== */\n  .meterbay{position:relative; z-index:2; margin:6px 22px 16px; border-radius:11px;\n    padding:14px 16px 12px;\n    background:linear-gradient(180deg,#0a0d11,#04060a);\n    box-shadow:0 2px 6px rgba(0,0,0,.6) inset,0 0 0 1px rgba(255,255,255,.04),\n      0 0 0 1px rgba(0,0,0,.6);}\n  .mlabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}\n  .mlabel .t{font-size:9px;letter-spacing:.34em;color:#7f8da0;text-transform:uppercase}\n  .gnum{font-size:13px;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums;\n    text-shadow:0 0 12px color-mix(in srgb,var(--ac) 70%,transparent)}\n  .gnum small{color:#7f8da0;font-weight:600;font-size:9px;letter-spacing:.1em}\n\n  /* segmented bar-graph: 28 LED segments that light from the right as GR rises */\n  .bars{display:flex; gap:2px; height:46px; align-items:stretch}\n  .seg{flex:1; border-radius:2px; position:relative;\n    background:#11161c;\n    box-shadow:0 0 0 1px rgba(0,0,0,.55) inset;\n    overflow:hidden;}\n  .seg i{position:absolute; inset:0; opacity:0;\n    transition:opacity .05s linear;}\n  /* color zones come from JS via class */\n  .seg.on i{opacity:1}\n  .seg.g i{background:linear-gradient(180deg,#7dffb0,#2bd47e);box-shadow:0 0 8px #2bd47e}\n  .seg.y i{background:linear-gradient(180deg,#ffe07d,#ffb02b);box-shadow:0 0 8px #ffb02b}\n  .seg.r i{background:linear-gradient(180deg,var(--ac2),var(--ac));box-shadow:0 0 9px var(--ac)}\n  /* scale ticks under the bars */\n  .scale{display:flex;justify-content:space-between;margin-top:6px;\n    font-size:8px;letter-spacing:.05em;color:#5f6c80;font-variant-numeric:tabular-nums}\n\n  /* needle VU mini on the right — a sweeping pointer driven by GR */\n  .meterrow{display:flex;gap:14px;align-items:stretch}\n  .barcol{flex:1;min-width:0}\n  .vu{flex:none;width:96px;position:relative;border-radius:9px;overflow:hidden;\n    background:radial-gradient(120% 140% at 50% 120%,#1a2027,#0a0e12);\n    box-shadow:0 0 0 1px rgba(255,255,255,.05) inset,0 2px 5px rgba(0,0,0,.5) inset}\n  .vu svg{display:block;width:100%;height:100%}\n  .vu .arc{fill:none;stroke:rgba(255,255,255,.1);stroke-width:1.5}\n  .vu .arc.hot{stroke:var(--ac);opacity:.5}\n  .vu .needle{stroke:var(--ac);stroke-width:2;stroke-linecap:round;\n    filter:drop-shadow(0 0 4px var(--ac));\n    transform-box:fill-box;transform-origin:50% 100%;\n    transition:transform .08s cubic-bezier(.3,.8,.3,1)}\n  .vu .vt{font:7px ui-sans-serif;fill:#6b7890;letter-spacing:.1em}\n\n  /* ===== controls deck ===== */\n  .deck{position:relative; z-index:2; display:grid;\n    grid-template-columns:repeat(5,1fr); gap:4px;\n    padding:4px 18px 14px;}\n  .ctl{display:flex;flex-direction:column;align-items:center;gap:9px;\n    padding:12px 4px 12px;border-radius:11px;\n    transition:background .18s ease,transform .18s ease;\n    animation:rise .5s both;}\n  .ctl:nth-child(1){animation-delay:.06s}.ctl:nth-child(2){animation-delay:.12s}\n  .ctl:nth-child(3){animation-delay:.18s}.ctl:nth-child(4){animation-delay:.24s}\n  .ctl:nth-child(5){animation-delay:.30s}\n  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n  .ctl:hover{background:rgba(255,255,255,.03)}\n\n  /* the knob — chunky aluminium VCA knob with skirt + indent line */\n  .knob{position:relative;width:74px;height:74px;cursor:ns-resize;\n    touch-action:none;user-select:none;-webkit-user-select:none}\n  .knob .ring{position:absolute;inset:-3px;border-radius:50%;\n    background:conic-gradient(from 215deg,\n      var(--ac) calc(var(--gr)*290deg),\n      rgba(255,255,255,.07) calc(var(--gr)*290deg) 290deg,\n      transparent 290deg);\n    filter:drop-shadow(0 0 calc(2px + var(--gr)*8px) color-mix(in srgb,var(--ac) 60%,transparent));\n    transition:--gr .12s cubic-bezier(.2,.8,.25,1);\n    -webkit-mask:radial-gradient(circle,transparent 33px,#000 34px);\n    mask:radial-gradient(circle,transparent 33px,#000 34px);}\n  /* faint tick crown */\n  .knob .crown{position:absolute;inset:-3px;border-radius:50%;\n    background:repeating-conic-gradient(from 215deg,\n      rgba(255,255,255,.16) 0 .8deg,transparent .8deg 20.7deg);\n    -webkit-mask:radial-gradient(circle,transparent 36px,#000 37px,#000 39px,transparent 40px);\n    mask:radial-gradient(circle,transparent 36px,#000 37px,#000 39px,transparent 40px);}\n  .knob .body{position:absolute;inset:8px;border-radius:50%;\n    background:\n      radial-gradient(circle at 50% 26%,#4b545f,#2b323b 52%,#10141a 100%);\n    box-shadow:\n      0 4px 10px rgba(0,0,0,.6),\n      0 1px 0 rgba(255,255,255,.1) inset,\n      0 -3px 6px rgba(0,0,0,.6) inset;}\n  /* brushed sheen on cap */\n  .knob .body::before{content:\"\";position:absolute;inset:0;border-radius:50%;\n    background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.05) 0 2deg,transparent 2deg 5deg);\n    opacity:.4;-webkit-mask:radial-gradient(circle,#000 60%,transparent 72%);\n    mask:radial-gradient(circle,#000 60%,transparent 72%)}\n  /* indicator notch — rotates with value */\n  .knob .ind{position:absolute;top:8px;left:50%;width:4px;height:24px;margin-left:-2px;\n    border-radius:3px;background:linear-gradient(var(--ac),var(--ac2));\n    box-shadow:0 0 9px var(--ac),0 0 2px #fff;\n    transform-origin:50% 29px;\n    transform:rotate(calc((var(--gr) - .5) * 290deg));\n    transition:transform .12s cubic-bezier(.2,.8,.25,1)}\n  .knob.live .body{box-shadow:0 4px 10px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.1) inset,\n      0 -3px 6px rgba(0,0,0,.6) inset,0 0 0 2px color-mix(in srgb,var(--ac) 45%,transparent)}\n\n  .ctl .nm{font-size:10px;letter-spacing:.16em;color:#9fadc2;text-transform:uppercase;font-weight:600}\n  .ctl .val{font-size:13px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;\n    text-shadow:0 0 10px color-mix(in srgb,var(--ac) 40%,transparent)}\n  .ctl .unitlbl{font-size:8px;color:#6f7d92;letter-spacing:.1em;margin-top:-6px}\n\n  .foot{position:relative;z-index:2;font-size:10.5px;line-height:1.5;color:#7b889d;\n    margin:0 22px 14px;padding-top:11px;border-top:1px solid rgba(255,255,255,.06)}\n  .foot b{color:var(--ac2);font-weight:700}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <span class=\"screw tl\"><\/span><span class=\"screw tr\"><\/span>\n    <span class=\"screw bl\"><\/span><span class=\"screw br\"><\/span>\n\n    <div class=\"hd\">\n      <span class=\"pwr\"><\/span>\n      <div class=\"titles\">\n        <div class=\"brand\">1LN Studio Series<\/div>\n        <h1>Punch&nbsp;Comp<\/h1>\n      <\/div>\n      <div class=\"model\">VCA&nbsp;·&nbsp;mono-link<\/div>\n    <\/div>\n\n    <div class=\"meterbay\">\n      <div class=\"mlabel\">\n        <span class=\"t\">Gain Reduction<\/span>\n        <span class=\"gnum\" id=\"grNum\">0.0<small> dB<\/small><\/span>\n      <\/div>\n      <div class=\"meterrow\">\n        <div class=\"barcol\">\n          <div class=\"bars\" id=\"bars\"><\/div>\n          <div class=\"scale\"><span>0<\/span><span>-3<\/span><span>-6<\/span><span>-10<\/span><span>-15<\/span><span>-20+<\/span><\/div>\n        <\/div>\n        <div class=\"vu\">\n          <svg viewBox=\"0 0 96 70\" preserveAspectRatio=\"xMidYMid meet\">\n            <path class=\"arc\" d=\"M14 60 A38 38 0 0 1 82 60\"/>\n            <path class=\"arc hot\" d=\"M58 22 A38 38 0 0 1 82 60\"/>\n            <line class=\"needle\" id=\"needle\" x1=\"48\" y1=\"60\" x2=\"48\" y2=\"22\"/>\n            <circle cx=\"48\" cy=\"60\" r=\"3.5\" fill=\"#3a434f\" stroke=\"#0a0e12\"/>\n            <text class=\"vt\" x=\"10\" y=\"58\">-20<\/text>\n            <text class=\"vt\" x=\"74\" y=\"58\">0<\/text>\n          <\/svg>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"deck\" id=\"deck\"><\/div>\n\n    <div class=\"foot\" id=\"foot\"><\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- spec-derived param table (index + range + default + display) ----\n  // value sent to host is the RAW normalised param in [min,max] = [0,1].\n  // display maps the same normalised value into musical units, purely for UI.\n  var PARAMS = [\n    { i:0, name:\"Threshold\", min:0, max:1, def:0.35, unit:\"dB\",\n      disp:function(n){ return (-60 + n*60).toFixed(1); } },          // -60..0 dB\n    { i:1, name:\"Ratio\",     min:0, max:1, def:0.30, unit:\":1\",\n      disp:function(n){ var r=1+n*19; return r.toFixed(r<10?1:0)+\":1\"; }, raw:true }, // 1:1..20:1\n    { i:2, name:\"Attack\",    min:0, max:1, def:0.20, unit:\"ms\",\n      disp:function(n){ var v=0.1*Math.pow(2000,n); return (v<10?v.toFixed(1):Math.round(v))+\"\"; } }, // .1..200ms\n    { i:3, name:\"Release\",   min:0, max:1, def:0.30, unit:\"ms\",\n      disp:function(n){ var v=5*Math.pow(400,n); return v<1000?Math.round(v)+\"\":(v/1000).toFixed(2)+\"k\"; } }, //5..2000ms\n    { i:4, name:\"Gain\",      min:0, max:1, def:0.32, unit:\"dB\",\n      disp:function(n){ return (n*24).toFixed(1); } }                 // 0..+24 dB\n  ];\n\n  var deck = document.getElementById('deck');\n  var state = {};   // index -> normalised value\n\n  function host(i,v){ if(window.vstai && window.vstai.setParam) window.vstai.setParam(i,v); }\n\n  // index -> setter, so host automation / external controllers can drive knobs\n  var followers = {};\n\n  function buildKnob(p){\n    var cell = document.createElement('div'); cell.className='ctl';\n    cell.innerHTML =\n      '<div class=\"knob\" tabindex=\"0\">'+\n        '<div class=\"ring\"><\/div><div class=\"crown\"><\/div>'+\n        '<div class=\"body\"><\/div><div class=\"ind\"><\/div>'+\n      '<\/div>'+\n      '<div class=\"nm\">'+p.name+'<\/div>'+\n      '<div class=\"val\">--<\/div>'+\n      '<div class=\"unitlbl\">'+p.unit+'<\/div>';\n    deck.appendChild(cell);\n\n    var knob = cell.querySelector('.knob');\n    var ring = cell.querySelector('.ring');\n    var ind  = cell.querySelector('.ind');\n    var out  = cell.querySelector('.val');\n\n    var norm = p.def;\n\n    // render the knob for the current `norm`. push=true also sends to host.\n    function paint(push){\n      ring.style.setProperty('--gr', norm);\n      ind.style.setProperty('--gr', norm);\n      out.textContent = p.disp(norm);\n      var v = p.min + norm*(p.max-p.min);\n      state[p.i] = v;\n      if(push!==false) host(p.i, v);\n    }\n    function setNorm(n){ norm = n<0?0:(n>1?1:n); paint(true); }\n\n    // host automation / external controller — update UI WITHOUT echoing back.\n    followers[p.i] = function(raw){\n      var n = (p.max>p.min) ? (raw - p.min)/(p.max-p.min) : raw;\n      norm = n<0?0:(n>1?1:n); paint(false);\n    };\n\n    // pointer drag (vertical) — fine with shift\n    var dragY=0, dragN=0, active=false;\n    knob.addEventListener('pointerdown', function(e){\n      active=true; dragY=e.clientY; dragN=norm;\n      knob.classList.add('live'); knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener('pointermove', function(e){\n      if(!active) return;\n      var span = e.shiftKey ? 620 : 200;\n      setNorm(dragN + (dragY - e.clientY)/span);\n    });\n    function end(){ active=false; knob.classList.remove('live'); }\n    knob.addEventListener('pointerup', end);\n    knob.addEventListener('pointercancel', end);\n    knob.addEventListener('dblclick', function(){ setNorm(p.def); });\n    knob.addEventListener('wheel', function(e){\n      e.preventDefault();\n      setNorm(norm + (e.deltaY<0?1:-1)*(e.shiftKey?0.004:0.02));\n    }, {passive:false});\n    // keyboard for accessibility\n    knob.addEventListener('keydown', function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){ setNorm(norm+0.02); e.preventDefault(); }\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){ setNorm(norm-0.02); e.preventDefault(); }\n      else if(e.key==='Home'){ setNorm(p.def); e.preventDefault(); }\n    });\n\n    return { p:p, get:function(){ return norm; }, paint:paint };\n  }\n\n  // ---- build segmented GR meter ----\n  var BARS=28, barEls=[];\n  var barsWrap=document.getElementById('bars');\n  for(var b=0;b<BARS;b++){\n    var s=document.createElement('div'); s.className='seg';\n    // color zone by position: leftmost (heaviest GR) = red\n    var frac=b/(BARS-1);\n    s.classList.add(frac>0.78?'r':(frac>0.5?'y':'g'));\n    s.innerHTML='<i><\/i>'; barsWrap.appendChild(s); barEls.push(s);\n  }\n  var grNum=document.getElementById('grNum');\n  var needle=document.getElementById('needle');\n\n  var knobs = PARAMS.map(buildKnob);\n\n  // footer (uses spec explanation flavour, kept short)\n  document.getElementById('foot').innerHTML =\n    '<b>Punch Comp<\/b> — stereo-linked RMS+peak detector into a dB-domain '+\n    'gain computer with over-easy soft knee. Drag knobs vertically '+\n    '(shift = fine), double-click to reset.';\n\n  // =====================================================================\n  //  Animated GR meter — a *simulated* envelope so the unit always looks\n  //  alive: a recurring transient ducks the gain by an amount that scales\n  //  with Threshold & Ratio, shaped by Attack/Release. Purely cosmetic.\n  // =====================================================================\n  var gr=0;          // current gain reduction, 0..1 (1 = ~24dB max)\n  var phase=0;       // transient clock\n  var last=performance.now();\n\n  function tEnv(){    // value of the synthetic input transient 0..1\n    // pulse train ~ 2.2 Hz with sharp attacks, used to drive GR\n    var x = phase % 1;\n    return Math.exp(-x*7) * (1 - 0.35*Math.sin(phase*0.7));\n  }\n\n  function frame(now){\n    var dt = Math.min(0.05,(now-last)/1000); last=now;\n    phase += dt*2.2;\n\n    var thr = knobs[0].get();   // higher thr => earlier compression\n    var rat = knobs[1].get();   // more ratio => deeper GR\n    var atk = knobs[2].get();   // attack normalised\n    var rel = knobs[3].get();\n\n    // target GR from the synthetic transient above threshold\n    var drive = tEnv();\n    var over = drive - (1 - thr)*0.55;          // how far over threshold\n    var target = over>0 ? over * (0.25 + rat*0.9) : 0;\n    target = target<0?0:(target>1?1:target);\n\n    // attack/release smoothing — map normalised times to coefficients\n    var aMs = 0.1*Math.pow(2000,atk);\n    var rMs = 5*Math.pow(400,rel);\n    var coef = target>gr\n      ? 1 - Math.exp(-dt*1000/(aMs+0.5))\n      : 1 - Math.exp(-dt*1000/(rMs+0.5));\n    gr += (target-gr)*coef;\n\n    // ---- paint segments ----\n    var lit = gr*BARS;\n    for(var k=0;k<BARS;k++){\n      // segments light from the RIGHT (light GR) leftward (heavy GR)\n      var idxFromRight = (BARS-1-k);\n      if(idxFromRight < lit) barEls[k].classList.add('on');\n      else barEls[k].classList.remove('on');\n    }\n    var db = gr*24;\n    grNum.innerHTML = (db<0.05?'0.0':'-'+db.toFixed(1))+'<small> dB<\/small>';\n\n    // ---- needle: 0dB at right (-... -52deg) to -20+ swings left ----\n    var ang = -52 + gr*104;          // degrees: rest right-ish, sweeps left\n    needle.style.transform = 'rotate('+ang+'deg)';\n\n    requestAnimationFrame(frame);\n  }\n\n  function start(){\n    knobs.forEach(function(k){ k.paint(true); });   // init host + UI to defaults\n\n    // follow value changes coming from OUTSIDE the GUI (DAW automation, etc.)\n    if(window.vstai && window.vstai.onParam){\n      window.vstai.onParam(function(i,v){\n        var f = followers[i]; if(f) f(+v);\n      });\n    }\n\n    requestAnimationFrame(frame);\n  }\n\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(start);\n  else start();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,d.f,d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}

    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }

  }

  function makeRiff(){

    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);

      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}

  }
