<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mu Leveler</title>
<style>
  :root{
    --accent:#ffcf6a;
    --accent2:#ff9a52;
    --cream:#f3e6c8;
    --panel:#2a2118;
    --panel2:#1c160f;
    --metal:#cdb98c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(120% 140% at 50% -10%, #4a3a26 0%, #241b12 55%, #140e08 100%);
    color:var(--cream);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:18px;overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }

  /* ---------- rack unit chassis ---------- */
  .unit{
    width:760px;max-width:100%;
    border-radius:16px;
    background:
      linear-gradient(180deg,#3a2d1d 0%, #2c2115 38%, #221910 100%);
    box-shadow:
      0 30px 60px rgba(0,0,0,.6),
      inset 0 2px 0 rgba(255,220,150,.12),
      inset 0 -3px 8px rgba(0,0,0,.5);
    border:1px solid #59462c;
    position:relative;
    padding:20px 26px 26px;
  }
  /* brushed-gold faceplate sheen */
  .unit::before{
    content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:
      repeating-linear-gradient(115deg, rgba(255,255,255,.025) 0 2px, rgba(0,0,0,.02) 2px 4px);
    mix-blend-mode:overlay;
  }
  /* rack ears with screws */
  .ear{position:absolute;top:0;bottom:0;width:22px;background:
      linear-gradient(90deg,#564325,#3a2c18);border-radius:16px 4px 4px 16px;}
  .ear.r{right:0;border-radius:4px 16px 16px 4px;transform:scaleX(-1);}
  .screw{position:absolute;width:11px;height:11px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#e9d6a4,#7a6334 70%,#4a3a1e);
    box-shadow:inset 0 0 2px rgba(0,0,0,.6),0 1px 1px rgba(0,0,0,.5);}
  .screw::after{content:"";position:absolute;inset:3px;border-top:1.5px solid rgba(60,46,20,.8);transform:rotate(30deg);}

  .head{display:flex;align-items:center;justify-content:space-between;margin:2px 6px 14px;}
  .brand{display:flex;flex-direction:column;line-height:1;}
  .brand .name{font-size:21px;font-weight:800;letter-spacing:3px;
    color:var(--accent);text-shadow:0 0 14px rgba(255,154,82,.35);}
  .brand .sub{font-size:9px;letter-spacing:5px;color:#a08c63;margin-top:5px;text-transform:uppercase;}
  .badge{font-size:8.5px;letter-spacing:2px;color:#7a6a48;border:1px solid #5a4a2c;
    border-radius:20px;padding:4px 10px;text-transform:uppercase;}

  .row{display:flex;gap:22px;align-items:stretch;}

  /* ---------- tube glass + VU bay ---------- */
  .bay{
    flex:0 0 300px;
    background:linear-gradient(180deg,#0f0b06,#161009);
    border-radius:12px;border:1px solid #4a3a22;
    box-shadow:inset 0 4px 14px rgba(0,0,0,.7);
    padding:16px;display:flex;flex-direction:column;gap:14px;align-items:center;
  }

  /* VU meter */
  .vu{width:268px;height:122px;position:relative;border-radius:8px;
    background:radial-gradient(120% 150% at 50% 120%, #f6eccf 0%, #e7d6a8 60%, #d8c490 100%);
    box-shadow:inset 0 2px 8px rgba(120,90,40,.45),0 2px 4px rgba(0,0,0,.5);
    border:2px solid #2c2114;overflow:hidden;}
  .vu .glass{position:absolute;inset:0;border-radius:6px;pointer-events:none;
    background:linear-gradient(160deg,rgba(255,255,255,.45),rgba(255,255,255,0) 40%);}
  .vu svg{position:absolute;inset:0;width:100%;height:100%;}
  .vu .lbl{position:absolute;top:8px;width:100%;text-align:center;font-size:8px;
    letter-spacing:3px;color:#6a5226;}
  .vu .gr{position:absolute;bottom:6px;width:100%;text-align:center;font-size:8px;
    letter-spacing:2px;color:#8a6a2e;}
  .needle{transform-origin:134px 116px;transition:transform .05s linear;}

  /* glowing vacuum tube */
  .tubeWrap{display:flex;align-items:flex-end;justify-content:center;gap:20px;}
  .tube{width:64px;height:118px;position:relative;}
  .glassEnv{position:absolute;inset:0;border-radius:32px 32px 14px 14px;
    background:linear-gradient(180deg,rgba(255,240,210,.10),rgba(120,90,40,.06) 60%,rgba(40,28,12,.2));
    border:1px solid rgba(255,220,160,.18);
    box-shadow:inset 0 0 18px rgba(0,0,0,.4);overflow:hidden;}
  .filament{position:absolute;left:50%;top:24px;width:6px;height:64px;transform:translateX(-50%);
    border-radius:4px;background:linear-gradient(180deg,#ffd98a,#ff8a3a);
    box-shadow:0 0 10px 3px rgba(255,150,70,.6);
    animation:flicker 2.6s ease-in-out infinite;}
  .glow{position:absolute;left:50%;top:50%;width:120px;height:120px;
    transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,var(--accent) 0%,rgba(255,154,82,.35) 35%,rgba(255,120,50,0) 70%);
    opacity:.25;filter:blur(4px);transition:opacity .12s ease, transform .12s ease;}
  .pins{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
    width:46px;height:16px;border-radius:0 0 10px 10px;
    background:linear-gradient(180deg,#3a2d1a,#1c150c);border:1px solid #59462c;}
  .tubeCap{position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    width:18px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 40% 30%,#cdb98c,#6a5430);}
  @keyframes flicker{
    0%,100%{filter:brightness(1);}
    18%{filter:brightness(1.18);}
    44%{filter:brightness(.92);}
    70%{filter:brightness(1.1);}
  }

  .legend{font-size:8px;letter-spacing:2px;color:#8a734a;text-align:center;}

  /* ---------- knob deck ---------- */
  .deck{flex:1;display:grid;grid-template-columns:repeat(3,1fr);
    gap:12px 8px;align-content:center;
    background:linear-gradient(180deg,#241b11,#1a130b);
    border-radius:12px;border:1px solid #4a3a22;
    box-shadow:inset 0 3px 10px rgba(0,0,0,.55);padding:18px 10px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .knob{width:74px;height:74px;position:relative;cursor:grab;touch-action:none;}
  .knob.dragging{cursor:grabbing;}
  .dial{position:absolute;inset:9px;border-radius:50%;
    background:
      radial-gradient(circle at 38% 30%, #f3e2bb 0%, #cdb98c 30%, #8a7344 70%, #4a3a1e 100%);
    box-shadow:0 4px 10px rgba(0,0,0,.55),inset 0 -3px 6px rgba(0,0,0,.4),
      inset 0 2px 4px rgba(255,240,200,.4);}
  .dial::after{content:"";position:absolute;inset:14px;border-radius:50%;
    background:radial-gradient(circle at 42% 35%,#2c2114,#15100a);
    box-shadow:inset 0 2px 4px rgba(0,0,0,.6);}
  .pointer{position:absolute;left:50%;top:7px;width:3px;height:24px;
    transform-origin:50% 30px;transform:translateX(-50%);border-radius:2px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));
    box-shadow:0 0 6px rgba(255,180,90,.7);}
  .ring{position:absolute;inset:0;}
  .ring circle{fill:none;stroke-linecap:round;}
  .pname{font-size:9.5px;letter-spacing:2px;color:#bca884;text-transform:uppercase;}
  .pval{font-size:10px;font-variant-numeric:tabular-nums;color:var(--accent);
    background:#120d07;border:1px solid #4a3a22;border-radius:5px;
    padding:2px 7px;min-width:54px;text-align:center;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.6);}

  .foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;
    font-size:8px;letter-spacing:2px;color:#6a5836;padding:0 6px;}
  .vents{display:flex;gap:4px;}
  .vents span{width:3px;height:14px;border-radius:2px;background:#120d07;
    box-shadow:inset 0 0 2px rgba(0,0,0,.7);}
</style>
</head>
<body>
  <div class="unit">
    <div class="ear">
      <div class="screw" style="top:14px;left:5px;"></div>
      <div class="screw" style="bottom:14px;left:5px;"></div>
    </div>
    <div class="ear r">
      <div class="screw" style="top:14px;left:5px;"></div>
      <div class="screw" style="bottom:14px;left:5px;"></div>
    </div>

    <div class="head">
      <div class="brand">
        <div class="name">MU LEVELER</div>
        <div class="sub">variable&middot;mu&nbsp; valve&nbsp; leveling&nbsp; amplifier</div>
      </div>
      <div class="badge">Tube Tone &bull; Program-Dependent</div>
    </div>

    <div class="row">
      <div class="bay">
        <div class="vu">
          <div class="lbl">GAIN REDUCTION</div>
          <svg viewBox="0 0 268 122" aria-hidden="true">
            <!-- arc ticks -->
            <g stroke="#8a6a2e" stroke-width="1.4" fill="none" opacity=".75">
              <path id="arc" d="M 40 104 A 96 96 0 0 1 228 104" stroke="#9c7a36" stroke-width="1"/>
            </g>
            <g id="ticks" stroke="#7a5d28"></g>
            <g id="labels" fill="#6a5226" font-size="8" font-family="sans-serif" text-anchor="middle"></g>
            <!-- red overload zone -->
            <path d="M 178 51 A 96 96 0 0 1 228 104" stroke="#c24a2a" stroke-width="3" fill="none" opacity=".85"/>
            <!-- needle -->
            <g class="needle" id="needle">
              <line x1="134" y1="116" x2="134" y2="26" stroke="#241a0c" stroke-width="2.4"/>
              <circle cx="134" cy="116" r="7" fill="#241a0c"/>
              <circle cx="134" cy="116" r="3" fill="#c9b582"/>
            </g>
          </svg>
          <div class="glass"></div>
          <div class="gr" id="grTxt">0.0 dB</div>
        </div>

        <div class="tubeWrap">
          <div class="tube">
            <div class="tubeCap"></div>
            <div class="glassEnv">
              <div class="glow" id="glow"></div>
              <div class="filament"></div>
            </div>
            <div class="pins"></div>
          </div>
          <div class="legend">6386<br>VARI-MU<br>VALVE</div>
        </div>
      </div>

      <div class="deck" id="deck"></div>
    </div>

    <div class="foot">
      <div class="vents"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div id="status">DRAG &bull; DOUBLE-CLICK TO RESET</div>
      <div class="vents"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  var PARAMS = [
    { name:"Input",     index:0, def:0.45, fmt:function(v){ return (1+v*5).toFixed(2)+"x"; } },
    { name:"Threshold", index:1, def:0.40, fmt:function(v){ return (-40+v*40).toFixed(1)+" dB"; } },
    { name:"Recovery",  index:2, def:0.40, fmt:function(v){ return (0.10+v*v*2.90).toFixed(2)+" s"; } },
    { name:"Makeup",    index:3, def:0.35, fmt:function(v){ return "+"+(v*12).toFixed(1)+" dB"; } },
    { name:"Mix",       index:4, def:1.0,  fmt:function(v){ return Math.round(v*100)+" %"; } }
  ];

  var state = PARAMS.map(function(p){ return p.def; });

  function host(i,v){ if(window.vstai && window.vstai.setParam) window.vstai.setParam(i,v); }
  function clamp(v){ return v<0?0:(v>1?1:v); }

  // ---- build VU ticks/labels ----
  function buildMeter(){
    var ticks = document.getElementById("ticks");
    var labels = document.getElementById("labels");
    var cx=134, cy=116, r=96;
    var marks = [
      {t:0.0,  l:"0"}, {t:0.2, l:""}, {t:0.4, l:"3"},
      {t:0.6,  l:"6"}, {t:0.8, l:""}, {t:1.0, l:"12"}
    ];
    // sweep from 150deg (left) to 30deg (right), GR grows rightward
    for(var i=0;i<=20;i++){
      var f=i/20;
      var ang=(150 - f*120)*Math.PI/180;
      var inner = (i%4===0)? r-12 : r-6;
      var x1=cx+Math.cos(ang)*r, y1=cy-Math.sin(ang)*r;
      var x2=cx+Math.cos(ang)*inner, y2=cy-Math.sin(ang)*inner;
      var ln=document.createElementNS("http://www.w3.org/2000/svg","line");
      ln.setAttribute("x1",x1.toFixed(1));ln.setAttribute("y1",y1.toFixed(1));
      ln.setAttribute("x2",x2.toFixed(1));ln.setAttribute("y2",y2.toFixed(1));
      ln.setAttribute("stroke-width", (i%4===0)?"1.6":"0.8");
      ticks.appendChild(ln);
    }
    marks.forEach(function(m){
      if(!m.l) return;
      var ang=(150 - m.t*120)*Math.PI/180;
      var rr=r-20;
      var x=cx+Math.cos(ang)*rr, y=cy-Math.sin(ang)*rr+3;
      var tx=document.createElementNS("http://www.w3.org/2000/svg","text");
      tx.setAttribute("x",x.toFixed(1));tx.setAttribute("y",y.toFixed(1));
      tx.textContent=m.l;
      labels.appendChild(tx);
    });
  }

  // ---- knobs ----
  var RING_R = 33, RING_C = 2*Math.PI*RING_R;
  function buildDeck(){
    var deck=document.getElementById("deck");
    PARAMS.forEach(function(p,idx){
      var cell=document.createElement("div"); cell.className="cell";
      var knob=document.createElement("div"); knob.className="knob";
      knob.innerHTML =
        '<svg class="ring" viewBox="0 0 74 74">'+
          '<circle cx="37" cy="37" r="'+RING_R+'" stroke="#1a130b" stroke-width="4"/>'+
          '<circle class="arc" cx="37" cy="37" r="'+RING_R+'" stroke="url(#g'+idx+')" stroke-width="4" '+
            'stroke-dasharray="'+RING_C.toFixed(1)+'" stroke-dashoffset="'+RING_C.toFixed(1)+'" '+
            'transform="rotate(135 37 37)"/>'+
          '<defs><linearGradient id="g'+idx+'" x1="0" y1="0" x2="1" y2="1">'+
            '<stop offset="0" stop-color="#ffcf6a"/><stop offset="1" stop-color="#ff9a52"/>'+
          '</linearGradient></defs>'+
        '</svg>'+
        '<div class="dial"></div>'+
        '<div class="pointer"></div>';
      var name=document.createElement("div"); name.className="pname"; name.textContent=p.name;
      var val=document.createElement("div"); val.className="pval";
      cell.appendChild(knob); cell.appendChild(name); cell.appendChild(val);
      deck.appendChild(cell);

      p._knob=knob; p._val=val;
      p._arc=knob.querySelector(".arc");
      p._ptr=knob.querySelector(".pointer");

      attachDrag(p, idx);
      render(p, idx);
    });
  }

  function render(p, idx){
    var v=state[idx];
    // pointer sweeps 270deg: -135deg .. +135deg
    var deg = -135 + v*270;
    p._ptr.style.transform = "translateX(-50%) rotate("+deg+"deg)";
    p._arc.setAttribute("stroke-dashoffset", (RING_C*(1-v*0.75)).toFixed(1));
    p._val.textContent = p.fmt(v);
  }

  function attachDrag(p, idx){
    var knob=p._knob, dragging=false, startY=0, startV=0;
    knob.addEventListener("pointerdown", function(e){
      dragging=true; startY=e.clientY; startV=state[idx];
      knob.classList.add("dragging");
      knob.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    knob.addEventListener("pointermove", function(e){
      if(!dragging) return;
      var dy=startY-e.clientY;
      var nv=clamp(startV + dy/200);
      state[idx]=nv; host(p.index,nv); render(p,idx);
    });
    function up(e){ if(dragging){dragging=false;knob.classList.remove("dragging");} }
    knob.addEventListener("pointerup",up);
    knob.addEventListener("pointercancel",up);
    knob.addEventListener("dblclick", function(){
      state[idx]=p.def; host(p.index,p.def); render(p,idx);
      flashStatus(p.name+" reset");
    });
    knob.addEventListener("wheel", function(e){
      e.preventDefault();
      var nv=clamp(state[idx] - e.deltaY/2000);
      state[idx]=nv; host(p.index,nv); render(p,idx);
    },{passive:false});
  }

  var statusEl=document.getElementById("status");
  var statusTimer=null;
  function flashStatus(msg){
    statusEl.textContent=msg.toUpperCase();
    if(statusTimer) clearTimeout(statusTimer);
    statusTimer=setTimeout(function(){ statusEl.textContent="DRAG • DOUBLE-CLICK TO RESET"; },1100);
  }

  // ---- animated meter + tube glow (driven by current settings) ----
  var needle=document.getElementById("needle");
  var grTxt=document.getElementById("grTxt");
  var glow=document.getElementById("glow");
  var meterPos=0;     // smoothed displayed GR position 0..1
  var phase=0;

  function loop(){
    phase += 0.018;
    // estimate the leveler's "activity" from the controls:
    // more Input + lower Threshold + more Makeup -> more gain reduction.
    var input = state[0], thr = state[1], mk = state[3], mix = state[4];
    var drive = input;                       // 0..1
    var threshPull = (1-thr);                // low threshold => more
    var target = clamp((drive*0.55 + threshPull*0.6) * (0.5+mk*0.5)) * mix;
    // slow breathing modulation so the needle drifts like a real VU
    var breathe = 0.5 + 0.5*Math.sin(phase) ;
    var live = target * (0.78 + 0.22*breathe);
    meterPos += (live - meterPos) * 0.06;    // slow ballistics

    var deg = -60 + meterPos*120;            // -60..+60 across the dial
    needle.style.transform = "rotate("+deg.toFixed(2)+"deg)";
    grTxt.textContent = "-"+(meterPos*12).toFixed(1)+" dB";

    // tube brightens as it compresses (and with input drive)
    var bright = 0.18 + meterPos*0.85 + input*0.15;
    glow.style.opacity = Math.min(0.95, bright).toFixed(3);
    var sc = 0.85 + meterPos*0.5;
    glow.style.transform = "translate(-50%,-50%) scale("+sc.toFixed(3)+")";

    requestAnimationFrame(loop);
  }

  // ---- host param echo ----
  function bindHostEcho(){
    if(window.vstai && window.vstai.onParam){
      window.vstai.onParam(function(i,v){
        for(var k=0;k<PARAMS.length;k++){
          if(PARAMS[k].index===i){ state[k]=clamp(v); render(PARAMS[k],k); break; }
        }
      });
    }
  }

  function start(){
    buildMeter();
    buildDeck();
    bindHostEcho();
    // push defaults to host on load
    PARAMS.forEach(function(p,idx){ host(p.index, state[idx]); });
    requestAnimationFrame(loop);
  }

  if(window.vstai && window.vstai.onReady) window.vstai.onReady(start);
  else start();
})();
</script>
</body>
</html>
