<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mu Leveler — test bench</title><style>
  :root{--ac:#ffcf6a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Mu Leveler</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

    <div class="row"><label>Source

         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Mu Leveler<\/title>\n<style>\n  :root{\n    --accent:#ffcf6a;\n    --accent2:#ff9a52;\n    --cream:#f3e6c8;\n    --panel:#2a2118;\n    --panel2:#1c160f;\n    --metal:#cdb98c;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{height:100%;}\n  body{\n    font-family:\"Avenir Next\",\"Segoe UI\",system-ui,sans-serif;\n    background:radial-gradient(120% 140% at 50% -10%, #4a3a26 0%, #241b12 55%, #140e08 100%);\n    color:var(--cream);\n    display:flex;align-items:center;justify-content:center;\n    min-height:100vh;padding:18px;overflow:hidden;\n    -webkit-user-select:none;user-select:none;\n  }\n\n  /* ---------- rack unit chassis ---------- */\n  .unit{\n    width:760px;max-width:100%;\n    border-radius:16px;\n    background:\n      linear-gradient(180deg,#3a2d1d 0%, #2c2115 38%, #221910 100%);\n    box-shadow:\n      0 30px 60px rgba(0,0,0,.6),\n      inset 0 2px 0 rgba(255,220,150,.12),\n      inset 0 -3px 8px rgba(0,0,0,.5);\n    border:1px solid #59462c;\n    position:relative;\n    padding:20px 26px 26px;\n  }\n  /* brushed-gold faceplate sheen */\n  .unit::before{\n    content:\"\";position:absolute;inset:0;border-radius:16px;pointer-events:none;\n    background:\n      repeating-linear-gradient(115deg, rgba(255,255,255,.025) 0 2px, rgba(0,0,0,.02) 2px 4px);\n    mix-blend-mode:overlay;\n  }\n  /* rack ears with screws */\n  .ear{position:absolute;top:0;bottom:0;width:22px;background:\n      linear-gradient(90deg,#564325,#3a2c18);border-radius:16px 4px 4px 16px;}\n  .ear.r{right:0;border-radius:4px 16px 16px 4px;transform:scaleX(-1);}\n  .screw{position:absolute;width:11px;height:11px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#e9d6a4,#7a6334 70%,#4a3a1e);\n    box-shadow:inset 0 0 2px rgba(0,0,0,.6),0 1px 1px rgba(0,0,0,.5);}\n  .screw::after{content:\"\";position:absolute;inset:3px;border-top:1.5px solid rgba(60,46,20,.8);transform:rotate(30deg);}\n\n  .head{display:flex;align-items:center;justify-content:space-between;margin:2px 6px 14px;}\n  .brand{display:flex;flex-direction:column;line-height:1;}\n  .brand .name{font-size:21px;font-weight:800;letter-spacing:3px;\n    color:var(--accent);text-shadow:0 0 14px rgba(255,154,82,.35);}\n  .brand .sub{font-size:9px;letter-spacing:5px;color:#a08c63;margin-top:5px;text-transform:uppercase;}\n  .badge{font-size:8.5px;letter-spacing:2px;color:#7a6a48;border:1px solid #5a4a2c;\n    border-radius:20px;padding:4px 10px;text-transform:uppercase;}\n\n  .row{display:flex;gap:22px;align-items:stretch;}\n\n  /* ---------- tube glass + VU bay ---------- */\n  .bay{\n    flex:0 0 300px;\n    background:linear-gradient(180deg,#0f0b06,#161009);\n    border-radius:12px;border:1px solid #4a3a22;\n    box-shadow:inset 0 4px 14px rgba(0,0,0,.7);\n    padding:16px;display:flex;flex-direction:column;gap:14px;align-items:center;\n  }\n\n  /* VU meter */\n  .vu{width:268px;height:122px;position:relative;border-radius:8px;\n    background:radial-gradient(120% 150% at 50% 120%, #f6eccf 0%, #e7d6a8 60%, #d8c490 100%);\n    box-shadow:inset 0 2px 8px rgba(120,90,40,.45),0 2px 4px rgba(0,0,0,.5);\n    border:2px solid #2c2114;overflow:hidden;}\n  .vu .glass{position:absolute;inset:0;border-radius:6px;pointer-events:none;\n    background:linear-gradient(160deg,rgba(255,255,255,.45),rgba(255,255,255,0) 40%);}\n  .vu svg{position:absolute;inset:0;width:100%;height:100%;}\n  .vu .lbl{position:absolute;top:8px;width:100%;text-align:center;font-size:8px;\n    letter-spacing:3px;color:#6a5226;}\n  .vu .gr{position:absolute;bottom:6px;width:100%;text-align:center;font-size:8px;\n    letter-spacing:2px;color:#8a6a2e;}\n  .needle{transform-origin:134px 116px;transition:transform .05s linear;}\n\n  /* glowing vacuum tube */\n  .tubeWrap{display:flex;align-items:flex-end;justify-content:center;gap:20px;}\n  .tube{width:64px;height:118px;position:relative;}\n  .glassEnv{position:absolute;inset:0;border-radius:32px 32px 14px 14px;\n    background:linear-gradient(180deg,rgba(255,240,210,.10),rgba(120,90,40,.06) 60%,rgba(40,28,12,.2));\n    border:1px solid rgba(255,220,160,.18);\n    box-shadow:inset 0 0 18px rgba(0,0,0,.4);overflow:hidden;}\n  .filament{position:absolute;left:50%;top:24px;width:6px;height:64px;transform:translateX(-50%);\n    border-radius:4px;background:linear-gradient(180deg,#ffd98a,#ff8a3a);\n    box-shadow:0 0 10px 3px rgba(255,150,70,.6);\n    animation:flicker 2.6s ease-in-out infinite;}\n  .glow{position:absolute;left:50%;top:50%;width:120px;height:120px;\n    transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;\n    background:radial-gradient(circle,var(--accent) 0%,rgba(255,154,82,.35) 35%,rgba(255,120,50,0) 70%);\n    opacity:.25;filter:blur(4px);transition:opacity .12s ease, transform .12s ease;}\n  .pins{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);\n    width:46px;height:16px;border-radius:0 0 10px 10px;\n    background:linear-gradient(180deg,#3a2d1a,#1c150c);border:1px solid #59462c;}\n  .tubeCap{position:absolute;top:-7px;left:50%;transform:translateX(-50%);\n    width:18px;height:12px;border-radius:50%;\n    background:radial-gradient(circle at 40% 30%,#cdb98c,#6a5430);}\n  @keyframes flicker{\n    0%,100%{filter:brightness(1);}\n    18%{filter:brightness(1.18);}\n    44%{filter:brightness(.92);}\n    70%{filter:brightness(1.1);}\n  }\n\n  .legend{font-size:8px;letter-spacing:2px;color:#8a734a;text-align:center;}\n\n  /* ---------- knob deck ---------- */\n  .deck{flex:1;display:grid;grid-template-columns:repeat(3,1fr);\n    gap:12px 8px;align-content:center;\n    background:linear-gradient(180deg,#241b11,#1a130b);\n    border-radius:12px;border:1px solid #4a3a22;\n    box-shadow:inset 0 3px 10px rgba(0,0,0,.55);padding:18px 10px;}\n  .cell{display:flex;flex-direction:column;align-items:center;gap:7px;}\n  .knob{width:74px;height:74px;position:relative;cursor:grab;touch-action:none;}\n  .knob.dragging{cursor:grabbing;}\n  .dial{position:absolute;inset:9px;border-radius:50%;\n    background:\n      radial-gradient(circle at 38% 30%, #f3e2bb 0%, #cdb98c 30%, #8a7344 70%, #4a3a1e 100%);\n    box-shadow:0 4px 10px rgba(0,0,0,.55),inset 0 -3px 6px rgba(0,0,0,.4),\n      inset 0 2px 4px rgba(255,240,200,.4);}\n  .dial::after{content:\"\";position:absolute;inset:14px;border-radius:50%;\n    background:radial-gradient(circle at 42% 35%,#2c2114,#15100a);\n    box-shadow:inset 0 2px 4px rgba(0,0,0,.6);}\n  .pointer{position:absolute;left:50%;top:7px;width:3px;height:24px;\n    transform-origin:50% 30px;transform:translateX(-50%);border-radius:2px;\n    background:linear-gradient(180deg,var(--accent),var(--accent2));\n    box-shadow:0 0 6px rgba(255,180,90,.7);}\n  .ring{position:absolute;inset:0;}\n  .ring circle{fill:none;stroke-linecap:round;}\n  .pname{font-size:9.5px;letter-spacing:2px;color:#bca884;text-transform:uppercase;}\n  .pval{font-size:10px;font-variant-numeric:tabular-nums;color:var(--accent);\n    background:#120d07;border:1px solid #4a3a22;border-radius:5px;\n    padding:2px 7px;min-width:54px;text-align:center;\n    box-shadow:inset 0 1px 3px rgba(0,0,0,.6);}\n\n  .foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;\n    font-size:8px;letter-spacing:2px;color:#6a5836;padding:0 6px;}\n  .vents{display:flex;gap:4px;}\n  .vents span{width:3px;height:14px;border-radius:2px;background:#120d07;\n    box-shadow:inset 0 0 2px rgba(0,0,0,.7);}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <div class=\"ear\">\n      <div class=\"screw\" style=\"top:14px;left:5px;\"><\/div>\n      <div class=\"screw\" style=\"bottom:14px;left:5px;\"><\/div>\n    <\/div>\n    <div class=\"ear r\">\n      <div class=\"screw\" style=\"top:14px;left:5px;\"><\/div>\n      <div class=\"screw\" style=\"bottom:14px;left:5px;\"><\/div>\n    <\/div>\n\n    <div class=\"head\">\n      <div class=\"brand\">\n        <div class=\"name\">MU LEVELER<\/div>\n        <div class=\"sub\">variable&middot;mu&nbsp; valve&nbsp; leveling&nbsp; amplifier<\/div>\n      <\/div>\n      <div class=\"badge\">Tube Tone &bull; Program-Dependent<\/div>\n    <\/div>\n\n    <div class=\"row\">\n      <div class=\"bay\">\n        <div class=\"vu\">\n          <div class=\"lbl\">GAIN REDUCTION<\/div>\n          <svg viewBox=\"0 0 268 122\" aria-hidden=\"true\">\n            <!-- arc ticks -->\n            <g stroke=\"#8a6a2e\" stroke-width=\"1.4\" fill=\"none\" opacity=\".75\">\n              <path id=\"arc\" d=\"M 40 104 A 96 96 0 0 1 228 104\" stroke=\"#9c7a36\" stroke-width=\"1\"/>\n            <\/g>\n            <g id=\"ticks\" stroke=\"#7a5d28\"><\/g>\n            <g id=\"labels\" fill=\"#6a5226\" font-size=\"8\" font-family=\"sans-serif\" text-anchor=\"middle\"><\/g>\n            <!-- red overload zone -->\n            <path d=\"M 178 51 A 96 96 0 0 1 228 104\" stroke=\"#c24a2a\" stroke-width=\"3\" fill=\"none\" opacity=\".85\"/>\n            <!-- needle -->\n            <g class=\"needle\" id=\"needle\">\n              <line x1=\"134\" y1=\"116\" x2=\"134\" y2=\"26\" stroke=\"#241a0c\" stroke-width=\"2.4\"/>\n              <circle cx=\"134\" cy=\"116\" r=\"7\" fill=\"#241a0c\"/>\n              <circle cx=\"134\" cy=\"116\" r=\"3\" fill=\"#c9b582\"/>\n            <\/g>\n          <\/svg>\n          <div class=\"glass\"><\/div>\n          <div class=\"gr\" id=\"grTxt\">0.0 dB<\/div>\n        <\/div>\n\n        <div class=\"tubeWrap\">\n          <div class=\"tube\">\n            <div class=\"tubeCap\"><\/div>\n            <div class=\"glassEnv\">\n              <div class=\"glow\" id=\"glow\"><\/div>\n              <div class=\"filament\"><\/div>\n            <\/div>\n            <div class=\"pins\"><\/div>\n          <\/div>\n          <div class=\"legend\">6386<br>VARI-MU<br>VALVE<\/div>\n        <\/div>\n      <\/div>\n\n      <div class=\"deck\" id=\"deck\"><\/div>\n    <\/div>\n\n    <div class=\"foot\">\n      <div class=\"vents\"><span><\/span><span><\/span><span><\/span><span><\/span><span><\/span><span><\/span><\/div>\n      <div id=\"status\">DRAG &bull; DOUBLE-CLICK TO RESET<\/div>\n      <div class=\"vents\"><span><\/span><span><\/span><span><\/span><span><\/span><span><\/span><span><\/span><\/div>\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  var PARAMS = [\n    { name:\"Input\",     index:0, def:0.45, fmt:function(v){ return (1+v*5).toFixed(2)+\"x\"; } },\n    { name:\"Threshold\", index:1, def:0.40, fmt:function(v){ return (-40+v*40).toFixed(1)+\" dB\"; } },\n    { name:\"Recovery\",  index:2, def:0.40, fmt:function(v){ return (0.10+v*v*2.90).toFixed(2)+\" s\"; } },\n    { name:\"Makeup\",    index:3, def:0.35, fmt:function(v){ return \"+\"+(v*12).toFixed(1)+\" dB\"; } },\n    { name:\"Mix\",       index:4, def:1.0,  fmt:function(v){ return Math.round(v*100)+\" %\"; } }\n  ];\n\n  var state = PARAMS.map(function(p){ return p.def; });\n\n  function host(i,v){ if(window.vstai && window.vstai.setParam) window.vstai.setParam(i,v); }\n  function clamp(v){ return v<0?0:(v>1?1:v); }\n\n  // ---- build VU ticks/labels ----\n  function buildMeter(){\n    var ticks = document.getElementById(\"ticks\");\n    var labels = document.getElementById(\"labels\");\n    var cx=134, cy=116, r=96;\n    var marks = [\n      {t:0.0,  l:\"0\"}, {t:0.2, l:\"\"}, {t:0.4, l:\"3\"},\n      {t:0.6,  l:\"6\"}, {t:0.8, l:\"\"}, {t:1.0, l:\"12\"}\n    ];\n    // sweep from 150deg (left) to 30deg (right), GR grows rightward\n    for(var i=0;i<=20;i++){\n      var f=i/20;\n      var ang=(150 - f*120)*Math.PI/180;\n      var inner = (i%4===0)? r-12 : r-6;\n      var x1=cx+Math.cos(ang)*r, y1=cy-Math.sin(ang)*r;\n      var x2=cx+Math.cos(ang)*inner, y2=cy-Math.sin(ang)*inner;\n      var ln=document.createElementNS(\"http://www.w3.org/2000/svg\",\"line\");\n      ln.setAttribute(\"x1\",x1.toFixed(1));ln.setAttribute(\"y1\",y1.toFixed(1));\n      ln.setAttribute(\"x2\",x2.toFixed(1));ln.setAttribute(\"y2\",y2.toFixed(1));\n      ln.setAttribute(\"stroke-width\", (i%4===0)?\"1.6\":\"0.8\");\n      ticks.appendChild(ln);\n    }\n    marks.forEach(function(m){\n      if(!m.l) return;\n      var ang=(150 - m.t*120)*Math.PI/180;\n      var rr=r-20;\n      var x=cx+Math.cos(ang)*rr, y=cy-Math.sin(ang)*rr+3;\n      var tx=document.createElementNS(\"http://www.w3.org/2000/svg\",\"text\");\n      tx.setAttribute(\"x\",x.toFixed(1));tx.setAttribute(\"y\",y.toFixed(1));\n      tx.textContent=m.l;\n      labels.appendChild(tx);\n    });\n  }\n\n  // ---- knobs ----\n  var RING_R = 33, RING_C = 2*Math.PI*RING_R;\n  function buildDeck(){\n    var deck=document.getElementById(\"deck\");\n    PARAMS.forEach(function(p,idx){\n      var cell=document.createElement(\"div\"); cell.className=\"cell\";\n      var knob=document.createElement(\"div\"); knob.className=\"knob\";\n      knob.innerHTML =\n        '<svg class=\"ring\" viewBox=\"0 0 74 74\">'+\n          '<circle cx=\"37\" cy=\"37\" r=\"'+RING_R+'\" stroke=\"#1a130b\" stroke-width=\"4\"/>'+\n          '<circle class=\"arc\" cx=\"37\" cy=\"37\" r=\"'+RING_R+'\" stroke=\"url(#g'+idx+')\" stroke-width=\"4\" '+\n            'stroke-dasharray=\"'+RING_C.toFixed(1)+'\" stroke-dashoffset=\"'+RING_C.toFixed(1)+'\" '+\n            'transform=\"rotate(135 37 37)\"/>'+\n          '<defs><linearGradient id=\"g'+idx+'\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">'+\n            '<stop offset=\"0\" stop-color=\"#ffcf6a\"/><stop offset=\"1\" stop-color=\"#ff9a52\"/>'+\n          '<\/linearGradient><\/defs>'+\n        '<\/svg>'+\n        '<div class=\"dial\"><\/div>'+\n        '<div class=\"pointer\"><\/div>';\n      var name=document.createElement(\"div\"); name.className=\"pname\"; name.textContent=p.name;\n      var val=document.createElement(\"div\"); val.className=\"pval\";\n      cell.appendChild(knob); cell.appendChild(name); cell.appendChild(val);\n      deck.appendChild(cell);\n\n      p._knob=knob; p._val=val;\n      p._arc=knob.querySelector(\".arc\");\n      p._ptr=knob.querySelector(\".pointer\");\n\n      attachDrag(p, idx);\n      render(p, idx);\n    });\n  }\n\n  function render(p, idx){\n    var v=state[idx];\n    // pointer sweeps 270deg: -135deg .. +135deg\n    var deg = -135 + v*270;\n    p._ptr.style.transform = \"translateX(-50%) rotate(\"+deg+\"deg)\";\n    p._arc.setAttribute(\"stroke-dashoffset\", (RING_C*(1-v*0.75)).toFixed(1));\n    p._val.textContent = p.fmt(v);\n  }\n\n  function attachDrag(p, idx){\n    var knob=p._knob, dragging=false, startY=0, startV=0;\n    knob.addEventListener(\"pointerdown\", function(e){\n      dragging=true; startY=e.clientY; startV=state[idx];\n      knob.classList.add(\"dragging\");\n      knob.setPointerCapture(e.pointerId);\n      e.preventDefault();\n    });\n    knob.addEventListener(\"pointermove\", function(e){\n      if(!dragging) return;\n      var dy=startY-e.clientY;\n      var nv=clamp(startV + dy/200);\n      state[idx]=nv; host(p.index,nv); render(p,idx);\n    });\n    function up(e){ if(dragging){dragging=false;knob.classList.remove(\"dragging\");} }\n    knob.addEventListener(\"pointerup\",up);\n    knob.addEventListener(\"pointercancel\",up);\n    knob.addEventListener(\"dblclick\", function(){\n      state[idx]=p.def; host(p.index,p.def); render(p,idx);\n      flashStatus(p.name+\" reset\");\n    });\n    knob.addEventListener(\"wheel\", function(e){\n      e.preventDefault();\n      var nv=clamp(state[idx] - e.deltaY/2000);\n      state[idx]=nv; host(p.index,nv); render(p,idx);\n    },{passive:false});\n  }\n\n  var statusEl=document.getElementById(\"status\");\n  var statusTimer=null;\n  function flashStatus(msg){\n    statusEl.textContent=msg.toUpperCase();\n    if(statusTimer) clearTimeout(statusTimer);\n    statusTimer=setTimeout(function(){ statusEl.textContent=\"DRAG • DOUBLE-CLICK TO RESET\"; },1100);\n  }\n\n  // ---- animated meter + tube glow (driven by current settings) ----\n  var needle=document.getElementById(\"needle\");\n  var grTxt=document.getElementById(\"grTxt\");\n  var glow=document.getElementById(\"glow\");\n  var meterPos=0;     // smoothed displayed GR position 0..1\n  var phase=0;\n\n  function loop(){\n    phase += 0.018;\n    // estimate the leveler's \"activity\" from the controls:\n    // more Input + lower Threshold + more Makeup -> more gain reduction.\n    var input = state[0], thr = state[1], mk = state[3], mix = state[4];\n    var drive = input;                       // 0..1\n    var threshPull = (1-thr);                // low threshold => more\n    var target = clamp((drive*0.55 + threshPull*0.6) * (0.5+mk*0.5)) * mix;\n    // slow breathing modulation so the needle drifts like a real VU\n    var breathe = 0.5 + 0.5*Math.sin(phase) ;\n    var live = target * (0.78 + 0.22*breathe);\n    meterPos += (live - meterPos) * 0.06;    // slow ballistics\n\n    var deg = -60 + meterPos*120;            // -60..+60 across the dial\n    needle.style.transform = \"rotate(\"+deg.toFixed(2)+\"deg)\";\n    grTxt.textContent = \"-\"+(meterPos*12).toFixed(1)+\" dB\";\n\n    // tube brightens as it compresses (and with input drive)\n    var bright = 0.18 + meterPos*0.85 + input*0.15;\n    glow.style.opacity = Math.min(0.95, bright).toFixed(3);\n    var sc = 0.85 + meterPos*0.5;\n    glow.style.transform = \"translate(-50%,-50%) scale(\"+sc.toFixed(3)+\")\";\n\n    requestAnimationFrame(loop);\n  }\n\n  // ---- host param echo ----\n  function bindHostEcho(){\n    if(window.vstai && window.vstai.onParam){\n      window.vstai.onParam(function(i,v){\n        for(var k=0;k<PARAMS.length;k++){\n          if(PARAMS[k].index===i){ state[k]=clamp(v); render(PARAMS[k],k); break; }\n        }\n      });\n    }\n  }\n\n  function start(){\n    buildMeter();\n    buildDeck();\n    bindHostEcho();\n    // push defaults to host on load\n    PARAMS.forEach(function(p,idx){ host(p.index, state[idx]); });\n    requestAnimationFrame(loop);\n  }\n\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(start);\n  else start();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
