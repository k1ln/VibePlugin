  <title>Grit Distortion — test bench</title><style>
  :root{--ac:#c0c8d0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>\n@property --grind{syntax:'<number>';inherits:false;initial-value:0}\n@property --sludge{syntax:'<number>';inherits:false;initial-value:0}\n@property --vol{syntax:'<number>';inherits:false;initial-value:0}\n@property --mix{syntax:'<number>';inherits:false;initial-value:0}\n:root{\n  --steel:#c0c8d0;--steel2:#9aa6b4;\n  --rust:#a5552a;--rust2:#6e3217;\n  --plate:#21211e;\n}\n*{box-sizing:border-box}\nhtml,body{margin:0;height:100%}\nbody{\n  font:13px ui-monospace,\"SF Mono\",Menlo,Consolas,monospace;color:#d6dae0;\n  background:#0a0a09;display:flex;align-items:center;justify-content:center;padding:16px;\n  -webkit-user-select:none;user-select:none;overflow:hidden;\n}\n\n/* ===== RUSTED CONCRETE FACEPLATE ===== */\n.machine{\n  position:relative;width:100%;max-width:600px;border-radius:6px;overflow:hidden;\n  background:\n    /* rust bleed */\n    radial-gradient(140% 60% at 18% -8%,rgba(165,85,42,.40),transparent 55%),\n    radial-gradient(120% 70% at 92% 108%,rgba(110,50,23,.45),transparent 50%),\n    /* concrete mottle */\n    repeating-radial-gradient(circle at 30% 20%,rgba(0,0,0,.05) 0 2px,transparent 2px 5px),\n    repeating-radial-gradient(circle at 78% 72%,rgba(255,255,255,.025) 0 1px,transparent 1px 4px),\n    linear-gradient(160deg,#33332e,#1a1a17 60%,#111110);\n  box-shadow:\n    0 40px 80px rgba(0,0,0,.7),\n    inset 0 2px 0 rgba(255,255,255,.06),\n    inset 0 -3px 14px rgba(0,0,0,.8),\n    inset 0 0 0 2px rgba(0,0,0,.5);\n  border:1px solid #2c2c27;\n}\n/* grime/grain noise overlay */\n.machine::before{\n  content:\"\";position:absolute;inset:0;pointer-events:none;z-index:6;mix-blend-mode:overlay;opacity:.5;\n  background-image:\n    repeating-linear-gradient(43deg,rgba(255,255,255,.04) 0 1px,transparent 1px 3px),\n    repeating-linear-gradient(137deg,rgba(0,0,0,.06) 0 1px,transparent 1px 4px);\n}\n/* scratched diagonal hazard stripes top corner */\n.machine::after{\n  content:\"\";position:absolute;top:-30px;right:-30px;width:150px;height:150px;transform:rotate(45deg);z-index:1;pointer-events:none;\n  background:repeating-linear-gradient(90deg,rgba(180,120,30,.16) 0 12px,transparent 12px 24px);\n  -webkit-mask:radial-gradient(circle at 50% 120%,#000 40%,transparent 70%);\n  mask:radial-gradient(circle at 50% 120%,#000 40%,transparent 70%);\n}\n\n/* corner bolts */\n.bolt{position:absolute;width:18px;height:18px;border-radius:50%;z-index:5;\n  background:radial-gradient(circle at 38% 32%,#8d949c,#3c3f42 60%,#16181a);\n  box-shadow:inset 0 1px 1px rgba(255,255,255,.4),inset 0 -2px 3px rgba(0,0,0,.7),0 2px 3px rgba(0,0,0,.6);}\n.bolt::after{content:\"\";position:absolute;inset:5px;border-radius:1px;background:linear-gradient(#1c1e20,#0b0c0d);transform:rotate(22deg);\n  box-shadow:inset 0 0 2px rgba(0,0,0,.9);}\n.bolt.tl{top:10px;left:10px}.bolt.tr{top:10px;right:10px}\n.bolt.bl{bottom:10px;left:10px}.bolt.br{bottom:10px;right:10px}\n\n/* ===== HEADER PLATE ===== */\n.head{position:relative;z-index:4;display:flex;align-items:center;gap:12px;padding:18px 30px 12px}\n.stencil{\n  font-weight:800;font-size:26px;letter-spacing:.14em;line-height:1;\n  font-family:\"Arial Black\",\"Helvetica Neue\",sans-serif;text-transform:uppercase;\n  color:transparent;-webkit-text-stroke:1.4px #cdd2d8;\n  background:repeating-linear-gradient(90deg,#e2e6ea 0 14px,rgba(226,230,234,.45) 14px 17px);\n  -webkit-background-clip:text;background-clip:text;\n  filter:drop-shadow(0 2px 0 rgba(0,0,0,.6));\n}\n.stencil .x{-webkit-text-stroke-color:var(--rust);color:transparent;\n  background:repeating-linear-gradient(90deg,#c9692f 0 14px,rgba(201,105,47,.4) 14px 17px);-webkit-background-clip:text;background-clip:text;}\n.sub{margin-left:auto;text-align:right}\n.tag{font-size:9px;letter-spacing:.32em;color:#7d8489;text-transform:uppercase}\n.serial{font-size:9px;letter-spacing:.18em;color:#5d6266;margin-top:3px}\n.pwr{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--rust);margin-right:5px;\n  box-shadow:0 0 8px var(--rust),0 0 2px #ffae6e inset;animation:flick 3.3s infinite}\n@keyframes flick{0%,93%,97%{opacity:1}94%,96%{opacity:.25}}\n\n/* ===== MAIN DECK ===== */\n.deck{position:relative;z-index:4;display:grid;grid-template-columns:1.25fr 1fr;gap:18px;padding:6px 30px 8px}\n.rivetline{position:absolute;left:30px;right:30px;top:0;height:1px;z-index:4;\n  background:linear-gradient(90deg,transparent,rgba(0,0,0,.6),transparent)}\n\n/* ---- GRINDER (Distortion) ---- */\n.grinder{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;\n  padding:14px 0 10px;border-radius:8px;\n  background:radial-gradient(circle at 50% 42%,rgba(0,0,0,.55),rgba(0,0,0,.15) 70%,transparent);\n  box-shadow:inset 0 0 30px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.03)}\n.grind-wrap{position:relative;width:160px;height:160px;cursor:grab;touch-action:none}\n.grind-wrap:active{cursor:grabbing}\n/* sparks ring (intensifies with distortion) */\n.sparks{position:absolute;inset:-14px;border-radius:50%;pointer-events:none;opacity:calc(.15 + var(--grind)*.85);\n  background:\n    radial-gradient(circle at 50% -2%,rgba(255,160,60,.9),transparent 6%),\n    radial-gradient(circle at 100% 50%,rgba(255,120,40,.9),transparent 6%),\n    radial-gradient(circle at 50% 102%,rgba(255,180,80,.9),transparent 6%),\n    radial-gradient(circle at 0% 50%,rgba(255,140,50,.9),transparent 6%);\n  filter:blur(calc(1px + var(--grind)*3px));animation:spin calc(1.4s - var(--grind)*1s) linear infinite;}\n@keyframes spin{to{transform:rotate(360deg)}}\n/* heat glow */\n.heat{position:absolute;inset:6px;border-radius:50%;pointer-events:none;\n  box-shadow:0 0 calc(6px + var(--grind)*40px) calc(var(--grind)*8px) rgba(255,90,20,calc(.2 + var(--grind)*.55));\n  background:radial-gradient(circle,rgba(255,70,20,calc(var(--grind)*.30)),transparent 65%)}\n/* serrated grinding wheel — rotates while dragging */\n.wheel{position:absolute;inset:14px;border-radius:50%;\n  background:\n    conic-gradient(from 0deg,#4a4d52,#1d1f22 8%,#5b5f64 16%,#222428 24%,#54585d 32%,#1d1f22 40%,#5b5f64 48%,#222428 56%,#54585d 64%,#1d1f22 72%,#5b5f64 80%,#222428 88%,#4a4d52 100%);\n  box-shadow:inset 0 0 0 3px #0c0d0e,inset 0 4px 14px rgba(0,0,0,.8),0 2px 6px rgba(0,0,0,.6);\n  transform:rotate(calc(var(--grind)*900deg));transition:transform .12s linear;\n  animation:idle calc(7s - var(--grind)*5.5s) linear infinite}\n@keyframes idle{to{transform:rotate(360deg)}}\n/* teeth ring */\n.teeth{position:absolute;inset:8px;border-radius:50%;pointer-events:none;\n  background:repeating-conic-gradient(#7c8085 0 3deg,transparent 3deg 9deg);\n  -webkit-mask:radial-gradient(circle,transparent 64px,#000 65px,#000 72px,transparent 73px);\n  mask:radial-gradient(circle,transparent 64px,#000 65px,#000 72px,transparent 73px);}\n/* hub cap with the value */\n.hub{position:absolute;inset:46px;border-radius:50%;z-index:2;display:flex;align-items:center;justify-content:center;\n  background:radial-gradient(circle at 42% 34%,#3a3d42,#121315 72%);\n  box-shadow:inset 0 2px 5px rgba(255,255,255,.08),inset 0 -3px 8px rgba(0,0,0,.8),0 0 0 2px #0a0b0c,0 0 0 4px rgba(255,120,40,calc(var(--grind)*.6));}\n.hub b{font-size:20px;font-weight:800;color:#e9c6a4;font-variant-numeric:tabular-nums;\n  text-shadow:0 0 calc(2px + var(--grind)*12px) rgba(255,120,40,.9)}\n.dlabel{margin-top:10px;font-size:11px;letter-spacing:.3em;color:#b9bfc5;text-transform:uppercase}\n.dsub{font-size:9px;letter-spacing:.22em;color:#6e7479;margin-top:2px}\n\n/* ---- RIGHT COLUMN ---- */\n.side{display:flex;flex-direction:column;gap:14px;justify-content:center}\n\n/* SLUDGE filter gauge (vertical, fills DOWN/darker as value rises) */\n.gauge{position:relative;display:flex;gap:12px;align-items:stretch;\n  padding:10px 12px;border-radius:8px;background:linear-gradient(#16140f,#0 et 0 0 0 1px rgba(255,255,255,.03)}\n.fhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}\n.fhead .fn{font-size:10px;letter-spacing:.26em;color:#aab0b6;text-transform:uppercase}\n.fhead .fvv{font-size:14px;font-weight:800;color:var(--steel);font-variant-numeric:tabular-nums}\n.track{position:relative;height:14px;border-radius:7px;cursor:pointer;touch-action:none;\n  background:linear-gradient(#070707,#191917);box-shadow:inset 0 1px 3px rgba(0,0,0,.9),inset 0 0 0 1px rgba(255,255,255,.04)}\n.track .fill{position:absolute;left:0;top:0;bottom:0;border-radius:7px 0 0 7px;\n  background:linear-gradient(90deg,var(--rust2),var(--rust) 60%,var(--steel));box-shadow:0 0 10px rgba(165,85,42,.4);transition:width .1s ease}\n.track .grip{position:absolute;top:50%;width:22px;height:30px;margin-left:-11px;transform:translateY(-50%);border-radius:4px;\n  background:linear-gradient(#9aa0a6,#4b4f54 55%,#2a2d30);\n  box-shadow:0 2px 5px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.5),inset 0 -2px 3px rgba(0,0,0,.6);transition:left .1s ease}\n.track .grip::after{content:\"\";position:absolute;inset:5px 8px;border-radius:1px;\n  background:repeating-linear-gradient(90deg,#2c2f32 0 2px,#73787d 2px 4px)}\n\n/* footer plate */\n.plate{position:relative;z-index:4;margin:6px 30px 18px;padding-top:11px;\n  border-top:1px solid rgba(0,0,0,.55);box-shadow:0 -1px 0 rgba(255,255,255,.04);\n  font-size:10px;line-height:1.5;color:#7b7468;letter-spacing:.03em}\n.plate b{color:#b08a5e;font-weight:700}\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head><body>\n<div class=\"machine\">\n  <span class=\"bolt tl\"><\/span><span class=\"bolt tr\"><\/span><span class=\"bolt bl\"><\/span><span class=\"bolt br\"><\/span>\n\n  <div class=\"head\">\n  if(k==='PageDown')h=-step*5;\n      else if(k==='Home'){setN(0);e.preventDefault();return;}\n      else if(k==='End'){setN(1);e.preventDefault();return;}\n      else return;\n      setN(n+h);e.preventDefault();\n    });\n  }\n\n  // ---- DISTORTION grinder (rotary drag) ----\n  function grinder(){\n    var el=document.getElementById('grind'), val=+el.dataset.def, def=val, i=+el.dataset.i;\n    var dv=document.getElementById('dval');\n    function norm(){ return val; }\n    function paint(){\n      root.style.setProperty('--grind',val);\n      var pc=Math.round(val*100);\n      dv.textContent=pc;\n      el.setAttribute('aria-valuenow',pc);\n      el.setAttribute('aria-valuetext',pc+'%');\n      send(i,val);\n    }\n    function setN(n){ val=clamp(n); paint(); }\n    var dy=0,n0=0,drag=0;\n    el.addEventListener('pointerdown',function(e){drag=1;dy=e.clientY;n0=norm();el.setPointerCapture(e.pointerId);e.preventDefault();});\n    el.addEventListener('pointermove',function(e){ if(!drag)return; setN(n0+(dy-e.clientY)/220); });\n    el.addEventListener('pointerup',function(){drag=0;});\n    el.addEventListener('pointercancel',function(){drag=0;});\n    el.addEventListener('dblclick',function(){val=def;paint();});\n    el.addEventListener('wheel',function(e){e.preventDefault();setN(norm()+(e.deltaY<0?.03:-.03));},{passive:false});\n    keyNudge(el,norm,setN,false);\n    paint();\n  }\n\n  // ---- FILTER sludge tube (vertical drag) ----\n  function filter(){\n    var el=document.getElementById('filt'), val=+el.dataset.def, def=val, i=+el.dataset.i;\n    var muck=document.getElementById('muck'), fv=document.getElementById('fval');\n    function norm(){ return val; }\n    function paint(){\n      muck.style.height=(val*100)+'%';\n      root.style.setProperty('--sludge',val);\n      fv.textContent=fmt(val);\n      el.setAttribute('aria-valuenow',fmt(val));\n      el.setAttribute('aria-valuetext',fmt(val)+', '+(val>.5?'darker':'brighter'));\n      send(i,val);\n    }\n    function setN(n){ val=clamp(n); paint(); }\n    var drag=0;\n    // bottom-up mapping: dragging up raises the value (standard fader feel),\n    // the muck still fills visually from the top so \"higher = more sludge = darker\".\n    function fromY(e){ var r=el.getBoundingClientRect(); return clamp(1-(e.clientY-r.top)/r.height); }\n    el.addEventListener('pointerdown',function(e){drag=1;el.setPointerCapture(e.pointerId);\n      setN(fromY(e));e.preventDefault();});\n    el.addEventListener('pointermove',function(e){ if(!drag)return; setN(fromY(e)); });\n    el.addEventListener('pointerup',function(){drag=0;});\n    el.addEventListener('pointercancel',function(){drag=0;});\n    el.addEventListener('dblclick',function(){val=def;paint();});\n    el.addEventListener('wheel',function(e){e.preventDefault();setN(val+(e.deltaY<0?.03:-.03));},{passive:false});\n    keyNudge(el,norm,setN,false);\n    paint();\n  }\n\n  // ---- FADERS (Volume, Mix) ----\n  function fader(cellId,trackId,fillId,gripId,valId){\n    var el=document.getElementById(cellId), tr=document.getElementById(trackId),\n        fill=document.getElementById(fillId), grip=document.getElementById(gripId), vv=document.getElementById(valId);\n    var val=+el.dataset.def, def=val, i=+el.dataset.i;\n    function norm(){ return val; }\n    function paint(){\n      var pct=val*100;\n      fill.style.width=pct+'%';\n      grip.style.left=pct+'%';\n      vv.textContent=fmt(val);\n      tr.setAttribute('aria-valuenow',fmt(val));\n      tr.setAttribute('aria-valuetext',fmt(val));\n      send(i,val);\n    }\n    function setN(n){ val=clamp(n); paint(); }\n    function fromX(e){ var r=tr.getBoundingClientRect(); return clamp((e.clientX-r.left)/r.width); }\n    var drag=0;\n    tr.addEventListener('pointerdown',function(e){drag=1;tr.setPointerCapture(e.pointerId);setN(fromX(e));e.preventDefault();});\n    tr.addEventListener('pointermove',function(e){ if(!drag)return; setN(fromX(e)); });\n    tr.addEventListener('pointerup',function(){drag=0;});\n    tr.addEventListener('pointercancel',function(){drag=0;});\n    tr.addEventListener('dblclick',function(){val=def;paint();});\n    tr.addEventListener('wheel',function(e){e.preventDefault();setN(val+(e.deltaY<0?.02:-.02));},{passive:false});\n    keyNudge(tr,norm,setN,false);\n    paint();\n  }\n\n  function ready(){\n    grinder();\n    filter();\n    fader('vol','vtrack','vfill','vgrip','vval');\n    fader('mix','mtrack','mfill','mgrip','mval');\n  }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body><\/html>\n";
