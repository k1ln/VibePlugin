<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mammoth Fuzz — test bench</title><style>
  :root{--ac:#ff7a3c}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Mammoth Fuzz</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Mammoth Fuzz<\/title>\n<style>\n:root{\n  --accent:#ff7a3c;\n  --accent2:#ffb454;\n  --enclosure:#2b6b5a;\n  --enclosure2:#1c4a3e;\n  --metal:#c9ccc7;\n  --bg:#0b0f0e;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml,body{width:100%;height:100%;}\nbody{\n  background:\n    radial-gradient(120% 90% at 50% -10%, #14201d 0%, #060908 70%, #020403 100%);\n  font-family:\"Helvetica Neue\",Arial,sans-serif;\n  color:#e9e4d8;\n  display:flex;align-items:center;justify-content:center;\n  overflow:hidden;\n  -webkit-user-select:none;user-select:none;\n  touch-action:none;\n}\n\n/* ===== woolly fuzz texture backdrop ===== */\n.fuzz-bg{\n  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;\n  opacity:.5;\n}\n.fuzz-bg span{\n  position:absolute;border-radius:50%;\n  background:radial-gradient(circle at 35% 35%, rgba(255,180,84,.22), rgba(255,122,60,.05) 60%, transparent 72%);\n  filter:blur(6px);\n  animation:drift linear infinite;\n}\n@keyframes drift{\n  0%{transform:translate3d(0,0,0) scale(1);}\n  50%{transform:translate3d(var(--dx),var(--dy),0) scale(1.25);}\n  100%{transform:translate3d(0,0,0) scale(1);}\n}\n\n/* ===== pedal enclosure ===== */\n.pedal{\n  position:relative;z-index:2;\n  width:340px;\n  padding:26px 26px 30px;\n  border-radius:18px;\n  background:\n    linear-gradient(180deg, var(--enclosure) 0%, var(--enclosure2) 100%);\n  box-shadow:\n    inset 0 2px 0 rgba(255,255,255,.18),\n    inset 0 -8px 22px rgba(0,0,0,.55),\n    inset 0 0 60px rgba(0,0,0,.25),\n    0 28px 60px rgba(0,0,0,.7),\n    0 4px 0 #0d2620;\n  border:1px solid rgba(0,0,0,.4);\n}\n/* brushed-metal sheen overlay */\n.pedal::before{\n  content:\"\";position:absolute;inset:0;border-radius:18px;pointer-events:none;\n  background:\n    repeating-linear-gradient(115deg, rgba(255,255,255,.035) 0 2px, transparent 2px 5px);\n  mix-blend-mode:overlay;\n}\n/* moving specular highlight */\n.pedal::after{\n  content:\"\";position:absolute;inset:0;border-radius:18px;pointer-events:none;\n  background:linear-gradient(115deg, transparent 30%, rgba(255,255,255,.10) 48%, transparent 62%);\n  background-size:300% 100%;\n  animation:sheen 7s ease-in-out infinite;\n}\n@keyframes sheen{0%,100%{background-position:160% 0;}50%{background-position:-60% 0;}}\n\n/* corner screws */\n.screw{\n  position:absolute;width:16px;height:16px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%, #f2f2ee, #8a8d88 55%, #4c4f4a 100%);\n  box-shadow:0 1px 2px rgba(0,0,0,.6), inset 0 0 2px rgba(0,0,0,.5);\n}\n.screw::before{\n  content:\"\";position:absolute;inset:3px;border-radius:50%;\n  background:linear-gradient(0deg,#5b5e58,#9a9d97);\n}\n.screw::after{\n  content:\"\";position:absolute;left:50%;top:50%;width:11px;height:2px;\n  background:#2a2c28;border-radius:1px;\n  transform:translate(-50%,-50%) rotate(var(--rot,40deg));\n  box-shadow:0 1px 0 rgba(255,255,255,.2);\n}\n.screw.tl{top:9px;left:9px;--rot:35deg;}\n.screw.tr{top:9px;right:9px;--rot:-50deg;}\n.screw.bl{bottom:9px;left:9px;--rot:-25deg;}\n.screw.br{bottom:9px;right:9px;--rot:60deg;}\n\n/* ===== silkscreen nameplate ===== */\n.nameplate{position:relative;text-align:center;margin:4px 0 18px;}\n.brand{\n  font-size:10px;letter-spacing:.42em;text-transform:uppercase;\n  color:rgba(255,255,255,.55);margin-bottom:4px;text-indent:.42em;\n}\n.title{\n  font-family:\"Arial Black\",\"Helvetica Neue\",sans-serif;\n  font-weight:900;font-style:italic;\n  font-size:34px;line-height:.92;letter-spacing:-1px;\n  text-transform:uppercase;\n  background:linear-gradient(180deg,#fff,var(--accent2) 55%,var(--accent));\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  -webkit-text-stroke:.6px rgba(0,0,0,.25);\n  filter:drop-shadow(0 2px 1px rgba(0,0,0,.5));\n}\n.title .big{font-size:46px;}\n.tag{\n  margin-top:6px;font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;\n  color:rgba(255,255,255,.45);\n}\n\n/* ===== knob row ===== */\n.knobs{display:grid;grid-template-columns:1fr 1fr;gap:22px 26px;margin:6px 6px 22px;}\n.knob-cell{display:flex;flex-direction:column;align-items:center;}\n.knob{\n  position:relative;width:78px;height:78px;cursor:grab;touch-action:none;\n}\n.knob:active{cursor:grabbing;}\n.knob .base{\n  position:absolute;inset:0;border-radius:50%;\n  background:\n    radial-gradient(circle at 50% 18%, #4a4d49 0%, #2a2c29 40%, #161817 100%);\n  box-shadow:0 6px 12px rgba(0,0,0,.6), inset 0 2px 3px rgba(255,255,255,.12);\n}\n/* rubber knob cap with ridges */\n.knob .cap{\n  position:absolute;inset:9px;border-radius:50%;\n  background:\n    radial-gradient(circle at 38% 30%, #3c3e3b, #1a1c1a 70%, #0c0d0c 100%);\n  box-shadow:inset 0 3px 6px rgba(255,255,255,.10), inset 0 -6px 10px rgba(0,0,0,.7), 0 2px 4px rgba(0,0,0,.5);\n}\n.knob .cap::before{\n  content:\"\";position:absolute;inset:0;border-radius:50%;\n  background:repeating-conic-gradient(from 0deg, rgba(255,255,255,.05) 0 4deg, transparent 4deg 12deg);\n}\n/* rotating pointer group */\n.knob .dial{position:absolute;inset:0;will-change:transform;}\n.knob .tick{\n  position:absolute;left:50%;top:7px;width:4px;height:24px;margin-left:-2px;\n  border-radius:2px;\n  background:linear-gradient(180deg,var(--accent2),var(--accent));\n  box-shadow:0 0 7px var(--accent), 0 0 2px #fff;\n}\n/* dotted tick scale */\n.scale{position:absolute;inset:-7px;border-radius:50%;pointer-events:none;}\n.scale i{\n  position:absolute;left:50%;top:0;width:2px;height:5px;margin-left:-1px;\n  background:rgba(255,255,255,.35);transform-origin:1px 46px;\n}\n.scale i.on{background:var(--accent2);box-shadow:0 0 4px var(--accent);}\n.k-name{margin-top:9px;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.72);}\n.k-val{margin-top:2px;font-size:13px;font-weight:700;color:var(--accent2);font-variant-numeric:tabular-nums;\n  text-shadow:0 0 6px rgba(255,180,84,.5);}\n\n/* ===== footswitch + LED bar ===== */\n.foot-row{display:flex;align-items:center;justify-content:space-between;padding:0 14px;}\n.led-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;width:64px;}\n.led{\n  width:14px;height:14px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%, #5a1500, #2a0a00);\n  box-shadow:inset 0 0 3px rgba(0,0,0,.8);transition:background .15s;\n}\n.led.on{\n  background:radial-gradient(circle at 35% 30%, #fff, var(--accent2) 40%, var(--accent) 75%);\n  box-shadow:0 0 10px var(--accent), 0 0 22px rgba(255,122,60,.7), inset 0 0 4px #fff;\n  animation:ledpulse 1.6s ease-in-out infinite;\n}\n@keyframes ledpulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.35);}}\n.led-lbl{font-size:7.5px;letter-spacing:.2em;color:rgba(255,255,255,.45);text-transform:uppercase;}\n\n.footswitch{\n  position:relative;width:96px;height:96px;border-radius:50%;cursor:pointer;\n  background:radial-gradient(circle at 50% 28%, #d6d9d4, #9a9d98 45%, #5b5e59 100%);\n  box-shadow:0 8px 16px rgba(0,0,0,.6), inset 0 2px 3px rgba(255,255,255,.5), inset 0 -6px 10px rgba(0,0,0,.4);\n  display:flex;align-items:center;justify-content:center;\n  transition:transform .09s ease, box-shadow .09s ease;\n}\n.footswitch .stem{\n  width:46px;height:46px;border-radius:50%;\n  background:radial-gradient(circle at 45% 35%, #f4f5f2, #b9bcb7 50%, #6c6f6a 100%);\n  box-shadow:inset 0 2px 3px rgba(255,255,255,.7), inset 0 -4px 8px rgba(0,0,0,.45), 0 2px 4px rgba(0,0,0,.4);\n}\n.footswitch.pressed{transform:translateY(4px) scale(.97);box-shadow:0 3px 7px rgba(0,0,0,.6), inset 0 2px 4px rgba(0,0,0,.4);}\n.footswitch::after{\n  content:\"\";position:absolute;inset:-6px;border-radius:50%;\n  border:2px solid rgba(0,0,0,.25);\n}\n\n/* ribbed jack plates */\n.jacks{display:flex;flex-direction:column;align-items:center;gap:5px;width:64px;}\n.jack{width:24px;height:24px;border-radius:50%;\n  background:radial-gradient(circle at 40% 35%, #4a4d48, #161816 70%);\n  box-shadow:inset 0 0 4px rgba(0,0,0,.9), 0 1px 0 rgba(255,255,255,.1);}\n.jack i{display:block;width:8px;height:8px;border-radius:50%;margin:8px auto;background:#000;box-shadow:inset 0 0 3px rgba(255,255,255,.15);}\n.jacks .jlbl{font-size:7px;letter-spacing:.15em;color:rgba(255,255,255,.4);text-transform:uppercase;}\n\n.bypass-note{text-align:center;margin-top:14px;font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.35);}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"fuzz-bg\" id=\"fuzzbg\"><\/div>\n\n<div class=\"pedal\" id=\"pedal\">\n  <span class=\"screw tl\"><\/span><span class=\"screw tr\"><\/span>\n  <span class=\"screw bl\"><\/span><span class=\"screw br\"><\/span>\n\n  <div class=\"nameplate\">\n    <div class=\"brand\">Boutique &middot; Tone Co.<\/div>\n    <div class=\"title\"><span class=\"big\">M<\/span>ammoth <span class=\"big\">F<\/span>uzz<\/div>\n    <div class=\"tag\">Cascaded Sustaining Fuzz<\/div>\n  <\/div>\n\n  <div class=\"knobs\" id=\"knobs\"><\/div>\n\n  <div class=\"foot-row\">\n    <div class=\"jacks\">\n      <div class=\"jack\"><i><\/i><\/div><div class=\"jlbl\">In<\/div>\n    <\/div>\n    <div class=\"footswitch\" id=\"footswitch\"><div class=\"stem\"><\/div><\/div>\n    <div class=\"led-wrap\">\n      <div class=\"led on\" id=\"led\"><\/div><div class=\"led-lbl\">On<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bypass-note\">True&nbsp;Bypass &mdash; Tap&nbsp;Footswitch<\/div>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n  var PARAMS=[\n    {name:\"Sustain\",index:0,min:0,max:1,def:0.7},\n    {name:\"Tone\",   index:1,min:0,max:1,def:0.5},\n    {name:\"Volume\", index:2,min:0,max:1,def:0.6},\n    {name:\"Mix\",    index:3,min:0,max:1,def:1}\n  ];\n  var MINA=-135, MAXA=135; // sweep degrees\n\n  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n  function fmt(p,v){ return Math.round((v-p.min)/(p.max-p.min)*100)+\"%\"; }\n\n  // build woolly background blobs\n  (function(){\n    var bg=document.getElementById('fuzzbg'),f=document.createDocumentFragment();\n    for(var i=0;i<14;i++){\n      var s=document.createElement('span');\n      var sz=60+Math.random()*160;\n      s.style.width=s.style.height=sz+'px';\n      s.style.left=(Math.random()*100)+'%';\n      s.style.top=(Math.random()*100)+'%';\n      s.style.setProperty('--dx',(Math.random()*60-30)+'px');\n      s.style.setProperty('--dy',(Math.random()*60-30)+'px');\n      s.style.animationDuration=(8+Math.random()*10)+'s';\n      s.style.animationDelay=(-Math.random()*10)+'s';\n      f.appendChild(s);\n    }\n    bg.appendChild(f);\n  })();\n\n  var knobsEl=document.getElementById('knobs');\n  var controls=[];\n\n  PARAMS.forEach(function(p){\n    var cell=document.createElement('div');cell.className='knob-cell';\n    var k=document.createElement('div');k.className='knob';k.tabIndex=-1;\n    k.innerHTML=\n      '<div class=\"base\"><\/div>'+\n      '<div class=\"scale\"><\/div>'+\n      '<div class=\"cap\"><\/div>'+\n      '<div class=\"dial\"><div class=\"tick\"><\/div><\/div>';\n    var name=document.createElement('div');name.className='k-name';name.textContent=p.name;\n    var val=document.createElement('div');val.className='k-val';\n    cell.appendChild(k);cell.appendChild(name);cell.appendChild(val);\n    knobsEl.appendChild(cell);\n\n    // build tick scale\n    var scale=k.querySelector('.scale');\n    var N=11;\n    for(var t=0;t<N;t++){\n      var i=document.createElement('i');\n      var ang=MINA+(MAXA-MINA)*(t/(N-1));\n      i.style.transform='rotate('+ang+'deg)';\n      i.dataset.ang=ang;\n      scale.appendChild(i);\n    }\n\n    var dial=k.querySelector('.dial');\n    var ctl={p:p,dial:dial,val:val,scale:scale,value:p.def};\n\n    function render(v){\n      ctl.value=v;\n      var norm=(v-p.min)/(p.max-p.min);\n      var deg=MINA+(MAXA-MINA)*norm;\n      dial.style.transform='rotate('+deg+'deg)';\n      val.textContent=fmt(p,v);\n      // light up scale ticks up to current\n      var lit=scale.querySelectorAll('i');\n      for(var j=0;j<lit.length;j++){\n        var a=+lit[j].dataset.ang;\n        if(a<=deg+0.5) lit[j].classList.add('on'); else lit[j].classList.remove('on');\n      }\n    }\n    function set(v,emit){\n      v=Math.max(p.min,Math.min(p.max,v));\n      render(v);\n      if(emit) send(p.index,v);\n    }\n    ctl.set=set;\n\n    // pointer drag (vertical)\n    var dragging=false,startY=0,startV=0;\n    k.addEventListener('pointerdown',function(e){\n      dragging=true;startY=e.clientY;startV=ctl.value;\n      k.setPointerCapture(e.pointerId);e.preventDefault();\n    });\n    k.addEventListener('pointermove',function(e){\n      if(!dragging)return;\n      var dy=startY-e.clientY;\n      var span=p.max-p.min;\n      var fine=e.shiftKey?0.25:1;\n      set(startV+(dy/180)*span*fine,true);\n    });\n    function endDrag(e){ if(dragging){dragging=false;try{k.releasePointerCapture(e.pointerId);}catch(_){}}}\n    k.addEventListener('pointerup',endDrag);\n    k.addEventListener('pointercancel',endDrag);\n    // wheel\n    k.addEventListener('wheel',function(e){\n      e.preventDefault();\n      var span=p.max-p.min;\n      set(ctl.value-(e.deltaY>0?1:-1)*span*0.04,true);\n    },{passive:false});\n    // double-click reset\n    k.addEventListener('dblclick',function(){ set(p.def,true); });\n\n    controls.push(ctl);\n  });\n\n  // footswitch / bypass (visual only — does not touch params)\n  var fs=document.getElementById('footswitch'),led=document.getElementById('led'),on=true;\n  fs.addEventListener('pointerdown',function(){fs.classList.add('pressed');});\n  function relFs(){fs.classList.remove('pressed');}\n  fs.addEventListener('pointerup',relFs);\n  fs.addEventListener('pointercancel',relFs);\n  fs.addEventListener('click',function(){\n    on=!on; led.classList.toggle('on',on);\n    document.getElementById('pedal').style.filter=on?'':'saturate(.4) brightness(.85)';\n  });\n\n  function ready(){ controls.forEach(function(c){ c.set(c.p.def,true); }); }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');

  function draw(){

    if(!analyser){ return; }

    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){

    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}

  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});

    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);

    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
