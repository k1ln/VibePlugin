<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bias Tremolo — test bench</title><style>
  :root{--ac:#5ad19b}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Bias Tremolo</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>\n/* ===== Bias Tremolo — tweed amp panel, pulsing waveform, vintage pilot lamp ===== */\n:root{\n  --ac:#5ad19b; --ac2:#8ae0b0;\n  --tweed1:#c7a567; --tweed2:#9a7a3f; --tweed3:#6e5526;\n  --cream:#efe4c4; --gold:#d9b25a;\n}\n*{box-sizing:border-box}\nhtml,body{margin:0;height:100%}\nbody{\n  font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#efe7d2;\n  background:#1a140c;\n  display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}\n\n/* ---- the amp cabinet ---- */\n.amp{\n  position:relative;width:100%;max-width:640px;border-radius:20px;\n  padding:16px;\n  /* tweed fabric: diagonal woven threads */\n  background:\n    repeating-linear-gradient(48deg, rgba(60,42,18,.45) 0 2px, rgba(60,42,18,0) 2px 5px),\n    repeating-linear-gradient(-42deg, rgba(255,240,200,.10) 0 2px, rgba(255,240,200,0) 2px 5px),\n    repeating-linear-gradient(48deg, var(--tweed3) 0 3px, var(--tweed2) 3px 6px, var(--tweed1) 6px 9px, var(--tweed2) 9px 12px),\n    linear-gradient(160deg,#b59458,#7c5f2e);\n  box-shadow:\n    0 34px 70px rgba(0,0,0,.62),\n    inset 0 2px 0 rgba(255,255,255,.18),\n    inset 0 -3px 8px rgba(0,0,0,.5);\n  border:3px solid #4a3818}\n/* leather corner protectors */\n.amp::before,.amp::after{content:\"\";position:absolute;width:34px;height:34px;\n  background:radial-gradient(circle at 35% 35%,#2a2018,#0b0805);border-radius:7px;\n  box-shadow:inset 0 1px 2px rgba(255,255,255,.18),0 2px 4px rgba(0,0,0,.5);z-index:5}\n.amp::before{top:-3px;left:-3px;border-radius:18px 4px 14px 4px}\n.amp::after{top:-3px;right:-3px;border-radius:4px 18px 4px 14px}\n\n/* ---- the brushed-gold control plate ---- */\n.plate{\n  position:relative;z-index:2;border-radius:12px;padding:14px 18px 16px;\n  background:\n    repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 1px, rgba(0,0,0,.05) 1px 2px),\n    linear-gradient(180deg,#2a2c30,#15171a 60%,#0d0e10);\n  border:1px solid rgba(255,255,255,.10);\n  box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -2px 10px rgba(0,0,0,.6),0 6px 18px rgba(0,0,0,.5)}\n/* plate mounting screws */\n.scr{position:absolute;width:10px;height:10px;border-radius:50%;z-index:3;\n  background:radial-gradient(circle at 35% 30%,#cfd3d8,#5a5e64 60%,#26282b);\n  box-shadow:0 1px 2px rgba(0,0,0,.6)}\n.scr::after{content:\"\";position:absolute;inset:2px;border-top:1.5px solid rgba(0,0,0,.5);transform:rotate(35deg)}\n.scr.tl{top:7px;left:7px}.scr.tr{top:7px;right:7px}.scr.bl{bottom:7px;left:7px}.scr.br{bottom:7px;right:7px}\n\n/* ---- header: badge + pilot lamp ---- */\n.head{display:flex;align-items:center;gap:14px;margin:2px 6px 12px}\n.brand{flex:1}\n.brand h1{margin:0;font-size:20px;letter-spacing:.16em;font-weight:900;font-style:italic;\n  color:var(--gold);text-shadow:0 1px 0 #000,0 0 12px rgba(217,178,90,.35);font-family:\"Times New Roman\",Georgia,serif}\n.brand .sub{font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:#8a8478;margin-top:3px}\n\n/* vintage jewel pilot lamp — blinks with the tremolo */\n.lamp{position:relative;width:42px;height:42px;flex:none}\n.lamp .bezel{position:absolute;inset:0;border-radius:50%;\n  background:radial-gradient(circle at 38% 32%,#777,#2c2c2c 62%,#0a0a0a);\n  box-shadow:inset 0 2px 3px rgba(255,255,255,.3),inset 0 -3px 6px rgba(0,0,0,.7),0 2px 5px rgba(0,0,0,.6)}\n.lamp .jewel{position:absolute;inset:8px;border-radius:50%;\n  background:radial-gradient(circle at 38% 32%,#ffe6a0,#ff3b2e 55%,#7a1008 100%);\n  box-shadow:inset 0 0 6px rgba(255,255,255,.55),0 0 0 1px rgba(0,0,0,.4)}\n.lamp .glow{position:absolute;inset:-10px;border-radius:50%;pointer-events:none;\n  background:radial-gradient(circle,rgba(255,80,40,.85),transparent 65%);\n  opacity:.25;animation:lampBlink calc(2.2s / var(--rate,1)) ease-in-out infinite}\n.lamp .jewel{animation:lampJewel calc(2.2s / var(--rate,1)) ease-in-out infinite}\n@keyframes lampBlink{0%,100%{opacity:calc(.12 + var(--depth,.5)*.05)}50%{opacity:calc(.45 + var(--depth,.5)*.55)}}\n@keyframes lampJewel{0%,100%{filter:brightness(calc(.55 + (1 - var(--depth,.5))*.45))}\n  50%{filter:brightness(calc(1.05 + var(--depth,.5)*.9)) saturate(1.2)}}\n\n/* ---- the speaker-grille scope window ---- */\n.scope{position:relative;height:86px;margin:0 0 14px;border-radius:9px;overflow:hidden;\n  background:linear-gradient(180deg,#070a07,#0c130c);\n  border:1px solid rgba(0,0,0,.7);\n  box-shadow:inset 0 2px 10px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,255,255,.04),0 1px 0 rgba(255,255,255,.08)}\n/* grille cloth weave overlaid faintly */\n.scope::after{content:\"\";position:absolute;inset:0;pointer-events:none;opacity:.18;\n  background:\n    repeating-linear-gradient(0deg,rgba(255,255,255,.5) 0 1px,transparent 1px 4px),\n    repeating-linear-gradient(90deg,rgba(255,255,255,.4) 0 1px,transparent 1px 4px)}\n.scope svg{position:absolute;inset:0;width:100%;height:100%}\n.tracer{fill:none;stroke:var(--ac);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;\n  filter:drop-shadow(0 0 5px var(--ac))}\n.tracerFill{fill:var(--ac);opacity:.10}\n.midline{stroke:rgba(255,255,255,.10);stroke-width:1;stroke-dasharray:3 4}\n\n/* ---- knob row ---- */\n.row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}\n.ctl{display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 2px 4px;\n  animation:rise .5s both;animation-delay:var(--d)}\n@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n\n/* chickenhead-style amp knob */\n.knob{position:relative;width:76px;height:76px;cursor:ns-resize;user-select:none;touch-action:none}\n.knob .num{position:absolute;inset:-3px;border-radius:50%;\n  /* tick numerals ring as conic dashes */\n  background:repeating-conic-gradient(from 215deg, rgba(255,255,255,.5) 0 1.2deg, transparent 1.2deg 27deg);\n  -webkit-mask:radial-gradient(circle,transparent 36px,#000 37px,#000 39px,transparent 40px);\n          mask:radial-gradient(circle,transparent 36px,#000 37px,#000 39px,transparent 40px)}\n.knob .arc{position:absolute;inset:1px;border-radius:50%;\n  background:conic-gradient(from 215deg,\n    var(--ac) calc(var(--n,0)*290deg), rgba(255,255,255,.07) calc(var(--n,0)*290deg) 290deg, transparent 290deg);\n  filter:drop-shadow(0 0 calc(2px + var(--n,0)*8px) color-mix(in srgb,var(--ac) 65%,transparent))}\n.knob .body{position:absolute;inset:9px;border-radius:50%;\n  background:\n    radial-gradient(circle at 50% 24%, #4a4035 0%, #221d16 58%, #0c0a07 100%);\n  box-shadow:inset 0 2px 5px rgba(255,235,190,.18),inset 0 -4px 9px rgba(0,0,0,.75),0 3px 6px rgba(0,0,0,.55);\n  transition:transform .12s}\n/* the bakelite pointer wing */\n.knob .wing{position:absolute;top:8px;left:50%;width:7px;height:30px;margin-left:-3.5px;border-radius:4px 4px 2px 2px;\n  background:linear-gradient(180deg,#1a140d,#000);transform-origin:50% 30px;\n  transform:rotate(calc((var(--n,0) - 0.5) * 290deg));transition:transform .12s cubic-bezier(.2,.8,.25,1)}\n.knob .wing::after{content:\"\";position:absolute;top:2px;left:50%;width:2px;height:11px;margin-left:-1px;border-radius:2px;\n  background:var(--ac2);box-shadow:0 0 6px var(--ac)}\n.knob.act .body{transform:scale(.97)}\n\n.nm{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#cdb87f;font-weight:700;\n  font-family:\"Times New Roman\",Georgia,serif}\n.val{font-size:13px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:.02em;\n  background:rgba(0,0,0,.4);padding:1px 8px;border-radius:5px;min-width:42px;text-align:center;\n  box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head><body>\n<div class=\"amp\">\n  <div class=\"plate\">\n    <span class=\"scr tl\"><\/span><span class=\"scr tr\"><\/span><span class=\"scr bl\"><\/span><span class=\"scr br\"><\/span>\n    <div class=\"head\">\n      <div class=\"lamp\"><span class=\"glow\"><\/span><span class=\"bezel\"><\/span><span class=\"jewel\"><\/span><\/div>\n      <div class=\"brand\">\n        <h1>Bias&nbsp;Tremolo<\/h1>\n        <div class=\"sub\">Vintage Combo · Amplitude Throb<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"scope\">\n      <svg viewBox=\"0 0 600 86\" preserveAspectRatio=\"none\">\n        <line class=\"midline\" x1=\"0\" y1=\"43\" x2=\"600\" y2=\"43\"><\/line>\n        <path class=\"tracerFill\" id=\"fill\"><\/path>\n        <path class=\"tracer\" id=\"wave\"><\/path>\n      <\/svg>\n    <\/div>\n    <div class=\"row\" id=\"row\"><\/div>\n  <\/div>\n<\/div>\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"Rate\",  index:0, min:0, max:1, def:0.42},\n    {name:\"Depth\", index:1, min:0, max:1, def:0.7},\n    {name:\"Shape\", index:2, min:0, max:1, def:0.3},\n    {name:\"Stereo\",index:3, min:0, max:1, def:0},\n    {name:\"Output\",index:4, min:0, max:1, def:0.7}\n  ];\n  var state={};\n  var root=document.documentElement;\n\n  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n\n  function buildKnob(p,d){\n    var ctl=document.createElement('div'); ctl.className='ctl'; ctl.style.setProperty('--d',d+'ms');\n    ctl.innerHTML=\n      '<div class=\"knob\"><i class=\"num\"><\/i><i class=\"arc\"><\/i><i class=\"body\"><\/i><i class=\"wing\"><\/i><\/div>'+\n      '<div class=\"nm\">'+p.name+'<\/div><div class=\"val\"><\/div>';\n    var knob=ctl.querySelector('.knob'),\n        arc=ctl.querySelector('.arc'),\n        wing=ctl.querySelector('.wing'),\n        out=ctl.querySelector('.val');\n    var val=p.def;\n    function norm(){return (val-p.min)/((p.max-p.min)||1);}\n    function paint(){\n      var n=norm();\n      arc.style.setProperty('--n',n); wing.style.setProperty('--n',n);\n      out.textContent=Math.round(n*100)+(p.name==='Rate'?'':'%');\n      // Rate shows percent too but feed a label; keep simple: percent for all 0..1\n      out.textContent=Math.round(n*100);\n      state[p.name]=val; send(p.index,val); reflect();\n    }\n    function setN(n){ n=n<0?0:(n>1?1:n); val=p.min+(p.max-p.min)*n; paint(); }\n    knob.addEventListener('pointerdown',function(e){\n      knob._d=1;knob._y=e.clientY;knob._n=norm();knob.classList.add('act');\n      knob.setPointerCapture(e.pointerId);e.preventDefault();});\n    knob.addEventListener('pointermove',function(e){ if(!knob._d)return; setN(knob._n+(knob._y-e.clientY)/180); });\n    function end(){knob._d=0;knob.classList.remove('act');}\n    knob.addEventListener('pointerup',end); knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){val=p.def;paint();});\n    knob.addEventListener('wheel',function(e){e.preventDefault();setN(norm()+(e.deltaY<0?0.02:-0.02));},{passive:false});\n    document.getElementById('row').appendChild(ctl);\n    paint();\n  }\n\n  // ---- live waveform + lamp reaction ----\n  function reflect(){\n    var rate=state.Rate||0, depth=state.Depth||0;\n    root.style.setProperty('--rate',(0.35+rate*2.6).toFixed(3));\n    root.style.setProperty('--depth',(depth).toFixed(3));\n  }\n\n  var wave=document.getElementById('wave'), fill=document.getElementById('fill');\n  var t0=performance.now();\n  function shapeFn(ph,shape){\n    // morph: sine (glassy) -> hard chop (bias) as shape rises\n    var s=Math.sin(ph);            // -1..1\n    var sq=s>=0?1:-1;              // hard square\n    // soft-clip blend for the \"choppy bias chop\"\n    var k=1+shape*22;\n    var hard=Math.tanh(s*k)/Math.tanh(k);\n    return s*(1-shape)+hard*shape;\n  }\n  function tick(now){\n    var rate=state.Rate||0, depth=state.Depth||0, shape=state.Shape||0,\n        stereo=state.Stereo||0, out=state.Output!=null?state.Output:0.7;\n    var hz=0.4+rate*7.5;                 // visual LFO speed\n    var t=(now-t0)/1000;\n    var N=120, dL='', dR='', H=86, mid=43, amp=30*(0.25+out*0.85);\n    var lagR=stereo*Math.PI;             // stereo phase spread\n    for(var i=0;i<=N;i++){\n      var x=i/N*600;\n      var ph=2*Math.PI*hz*t - i/N*6.0;   // travelling wave\n      var modL=1-depth*(0.5-0.5*shapeFn(ph,shape));        // 0..1 amplitude env\n      var carrier=Math.sin(i/N*Math.PI*9 + t*6);           // carrier tone\n      var yL=mid - carrier*amp*modL;\n      dL+=(i?'L':'M')+x.toFixed(1)+' '+yL.toFixed(1)+' ';\n    }\n    wave.setAttribute('d',dL);\n    fill.setAttribute('d',dL+'L600 '+H+' L0 '+H+' Z');\n    requestAnimationFrame(tick);\n  }\n\n  function ready(){\n    PARAMS.forEach(function(p,idx){ buildKnob(p,idx*60); });\n    reflect();\n    requestAnimationFrame(tick);\n  }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body><\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;

  function st(m){document.getElementById('st').textContent=m;}

  function makeRiff(){
