<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crystal Station</title>
<style>
  :root{ --acc:#5ad0ff; --acc2:#ffcf6a; --bg0:#05080d; --bg1:#0c141f; --ink:#e6f2fb; --dim:#5f7488; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,#102032 0%,var(--bg1) 44%,var(--bg0) 100%);
    color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,780px); border-radius:16px; padding:16px 20px 20px; position:relative; overflow:hidden;
    background:linear-gradient(160deg,#16263a,#070d15);
    border:1px solid rgba(90,208,255,.18); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(190,235,255,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; position:relative; z-index:2; }
  .logo{ font-weight:800; letter-spacing:.15em; font-size:21px;
    background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc2);
    box-shadow:0 0 10px var(--acc2),0 0 20px var(--acc2); animation:pulse 2.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.45; transform:scale(.85);} 50%{ opacity:1; transform:scale(1.2);} }

  .screen{ height:96px; border-radius:10px; overflow:hidden; margin-bottom:12px; position:relative;
    background:linear-gradient(180deg,#02201c,#04140f); border:1px solid rgba(90,255,200,.14); box-shadow:inset 0 2px 20px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:10px; letter-spacing:.22em; color:#6affce; z-index:2; text-shadow:0 0 6px rgba(80,255,180,.6); }

  .vsel{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .vbtn{ text-align:center; padding:9px 4px; border-radius:9px; cursor:pointer; font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    background:linear-gradient(180deg,#13243600,#0c1a28); border:1px solid rgba(90,208,255,.2); color:var(--dim); transition:all .12s; }
  .vbtn.sel{ color:#06121c; background:linear-gradient(180deg,var(--acc),#3ba8e0); box-shadow:0 0 16px rgba(90,208,255,.5); font-weight:700; }

  .knobs{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 2px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; }
  .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(150,210,240,.14); stroke-width:7; stroke-linecap:round; }
  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(90,208,255,.6)); }
  .pcap{ fill:#0a1622; stroke:rgba(90,208,255,.22); stroke-width:1; }
  .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim); }
  .kv{ font-size:11px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(90,208,255,.08);
    padding:1px 8px; border-radius:7px; border:1px solid rgba(90,208,255,.18); }
  .knob:hover .kn{ color:var(--acc); }
</style>
</head>
<body>
  <div class="unit">
    <header>
      <span class="logo">CRYSTAL&nbsp;STATION</span>
      <span class="sub">pcm workstation</span>
      <span class="led"></span>
    </header>
    <div class="screen"><div class="scrlbl" id="vname">UNIVERSE</div><canvas id="cv"></canvas></div>
    <div class="vsel" id="vsel"></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){
  "use strict";
  var VOICES=["Piano","Universe","Bell"];
  var PARAMS=[
    {name:"Attack",idx:1,def:0.04,ms:true},
    {name:"Decay", idx:2,def:0.4,ms:true},
    {name:"Tone",  idx:3,def:0.7},
    {name:"Chorus",idx:4,def:0.45},
    {name:"Level", idx:5,def:0.8}
  ];
  var vals={1:0.04,2:0.4,3:0.7,4:0.45,5:0.8};
  var voiceV=0.5; // param 0
  var host=null;
  function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  function ms(v){ var m=Math.round(2+v*v*1500); return m>=1000?(m/1000).toFixed(1)+"s":m+"ms"; }
  function fmt(p,v){ return p.ms?ms(v):Math.round(v*100)+"%"; }
  function selFromV(v){ var s=Math.floor(v*2.999); return s<0?0:(s>2?2:s); }

  // ---- voice selector ----
  var vsel=document.getElementById("vsel"), vname=document.getElementById("vname");
  var vbtns=VOICES.map(function(nm,i){
    var b=document.createElement("div"); b.className="vbtn"; b.textContent=nm; vsel.appendChild(b);
    b.addEventListener("click",function(){ voiceV=(i+0.5)/3; setVoiceUI(); send(0,voiceV); });
    return b;
  });
  function setVoiceUI(){ var s=selFromV(voiceV); for(var i=0;i<3;i++) vbtns[i].classList.toggle("sel",i===s); vname.textContent=VOICES[s].toUpperCase(); }

  // ---- knobs ----
  var R=33, C=2*Math.PI*R, A0=-135, A1=135;
  var kw=document.getElementById("knobs");
  var knobs=PARAMS.map(function(p){
    var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80">'+
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5ad0ff"/><stop offset="1" stop-color="#ffcf6a"/></linearGradient></defs>'+
      '<circle class="track" cx="40" cy="40" r="33"></circle>'+
      '<circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'+
      '<circle class="pcap" cx="40" cy="40" r="20"></circle>'+
      '<line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div>'+
      '<span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el);
    var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){
      var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString());
      var ang=(A0+(A1-A0)*v)*Math.PI/180;
      ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2));
      ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2));
      val.textContent=fmt(p,v);
    }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; });
    el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });
    render(p.def);
    return {render:render};
  });

  // ---- evolving PCM waveform display (changes with voice + tone) ----
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener("resize",resize); resize();
  function frame(ts){
    ctx.clearRect(0,0,W,H);
    var s=selFromV(voiceV), tone=vals[3], ch=vals[4];
    var mid=H*0.55;
    ctx.strokeStyle="rgba(80,255,200,0.10)"; ctx.lineWidth=1;
    for(var gx=0;gx<=8;gx++){var X=W*gx/8;ctx.beginPath();ctx.moveTo(X,8);ctx.lineTo(X,H-8);ctx.stroke();}
    function w(off,col,amp){
      ctx.beginPath();
      for(var x=0;x<=W;x+=2){
        var t=x/W; var y=0;
        if(s===0){ for(var h=1;h<=6;h++) y+=Math.sin(t*Math.PI*2*h*2+ts/300+off)/h; y*=Math.exp(-t*1.5); } // piano: decaying harmonics
        else if(s===1){ y=Math.sin(t*Math.PI*4+ts/600+off)+0.4*Math.sin(t*Math.PI*8+ts/420); } // pad: smooth
        else { var m=Math.sin(t*Math.PI*2*3.5+ts/200); y=Math.sin(t*Math.PI*2*4+m*2+off); } // bell: FM
        ctx.lineTo(x, mid + y*amp*(0.5+tone*0.7));
      }
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.shadowColor=col; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    }
    w(0,"rgba(90,208,255,0.9)",18);
    if(ch>0.05) w(0.5+ch,"rgba(255,207,106,"+(0.25+ch*0.5)+")",16); // chorus ghost
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function boot(){ host=window.vstai||null; send(0,voiceV); setVoiceUI(); PARAMS.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script>
</body>
</html>
