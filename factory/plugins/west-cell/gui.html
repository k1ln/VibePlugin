<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>West Cell</title>
<style>
  :root{
    --accent:#ffd24a;
    --accent2:#ff5fa2;
    --cream:#f4ecd8;
    --cream2:#e9dcc0;
    --panel:#1c1712;
    --ink:#2a221a;
    --jack:#2b2620;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;}
  body{
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 18% 8%, #fff6e0 0%, var(--cream) 38%, var(--cream2) 100%);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  /* sunburst behind the panel */
  body::before{
    content:"";position:fixed;inset:-30%;z-index:0;
    background:
      conic-gradient(from 0deg at 50% 42%,
        rgba(255,210,74,.16) 0deg, rgba(255,95,162,.05) 18deg,
        rgba(255,210,74,.16) 36deg, rgba(255,95,162,.05) 54deg,
        rgba(255,210,74,.16) 72deg, rgba(255,95,162,.05) 90deg,
        rgba(255,210,74,.16) 108deg, rgba(255,95,162,.05) 126deg,
        rgba(255,210,74,.16) 144deg, rgba(255,95,162,.05) 162deg,
        rgba(255,210,74,.16) 180deg, rgba(255,95,162,.05) 198deg,
        rgba(255,210,74,.16) 216deg, rgba(255,95,162,.05) 234deg,
        rgba(255,210,74,.16) 252deg, rgba(255,95,162,.05) 270deg,
        rgba(255,210,74,.16) 288deg, rgba(255,95,162,.05) 306deg,
        rgba(255,210,74,.16) 324deg, rgba(255,95,162,.05) 342deg,
        rgba(255,210,74,.16) 360deg);
    animation:spin 60s linear infinite;
    pointer-events:none;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .module{
    position:relative;z-index:1;
    width:760px;max-width:96vw;
    background:linear-gradient(180deg,#fbf3df,#ece0c4);
    border-radius:14px;
    padding:22px 26px 26px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 -3px 10px rgba(120,90,40,.18) inset,
      0 26px 60px rgba(60,40,10,.42),
      0 4px 0 #b89a62;
    border:1px solid #d9c79a;
  }
  /* mounting screws */
  .screw{position:absolute;width:13px;height:13px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#b59c6a 70%,#7d6840);
    box-shadow:0 1px 2px rgba(0,0,0,.4);}
  .screw::after{content:"";position:absolute;inset:4px;border-top:1.5px solid rgba(60,40,10,.5);transform:rotate(40deg);}
  .screw.tl{top:9px;left:9px}.screw.tr{top:9px;right:9px}
  .screw.bl{bottom:9px;left:9px}.screw.br{bottom:9px;right:9px}

  header{display:flex;align-items:baseline;gap:14px;margin:2px 6px 16px;}
  .brand{font-weight:800;font-size:26px;letter-spacing:1.5px;
    background:linear-gradient(90deg,var(--accent2),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 1px 0 rgba(255,255,255,.4);}
  .sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#9c8456;font-weight:600;}
  .lamp{margin-left:auto;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff7cc,var(--accent) 60%,#c79a18);
    box-shadow:0 0 10px var(--accent),0 0 22px rgba(255,210,74,.5);
    animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.55;box-shadow:0 0 6px var(--accent);}50%{opacity:1;box-shadow:0 0 16px var(--accent),0 0 30px rgba(255,210,74,.6);}}

  .stage{
    display:grid;grid-template-columns:1.15fr 1fr;gap:18px;margin-bottom:18px;
  }
  .scope{
    background:radial-gradient(120% 120% at 40% 20%,#241d15,#0e0b07);
    border-radius:10px;padding:10px;border:1px solid #3a2f20;
    box-shadow:0 2px 8px rgba(0,0,0,.45) inset;position:relative;overflow:hidden;
  }
  .scope-label{position:absolute;top:8px;left:12px;font-size:9px;letter-spacing:2px;
    color:#7c6a44;text-transform:uppercase;z-index:2;}
  svg{display:block;width:100%;height:100%;}

  /* patch panel with banana jacks */
  .patch{
    background:linear-gradient(180deg,#efe3c6,#ddccA0);
    border-radius:10px;border:1px solid #cdb887;
    padding:12px 14px;display:flex;flex-direction:column;gap:9px;
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset;
  }
  .patch-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#9c8456;font-weight:700;margin-bottom:1px;}
  .jrow{display:flex;align-items:center;gap:10px;}
  .jack{width:22px;height:22px;border-radius:50%;flex:0 0 auto;position:relative;
    background:radial-gradient(circle at 38% 32%,#5a5044,#211d16 72%);
    box-shadow:0 1px 2px rgba(0,0,0,.5),0 0 0 3px #c9b685,0 0 0 4px #a8915f;}
  .jack i{position:absolute;inset:7px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#fff5cc,var(--jc,#ffd24a) 70%,#000 130%);}
  .jrow span{font-size:11px;color:#5a4a30;font-weight:600;}
  /* animated patch cables drawn as SVG overlay */
  .cables{position:absolute;inset:0;pointer-events:none;z-index:3;}

  .controls{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .knobwrap{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .knob{
    --val:0;
    width:84px;height:84px;border-radius:50%;position:relative;cursor:grab;
    background:
      radial-gradient(circle at 38% 30%,#fff6e2,#e7d6ad 55%,#c8b078 100%);
    box-shadow:
      0 2px 4px rgba(0,0,0,.35),
      0 6px 14px rgba(70,45,10,.3),
      0 0 0 5px #d8c594,
      0 0 0 6px #b89a62;
    transition:box-shadow .2s;
  }
  .knob:active{cursor:grabbing;}
  .knob:hover{box-shadow:0 2px 4px rgba(0,0,0,.35),0 8px 18px rgba(70,45,10,.35),0 0 0 5px var(--accent),0 0 0 6px #b89a62,0 0 18px rgba(255,210,74,.45);}
  /* the rotating indicator group */
  .dial{position:absolute;inset:0;border-radius:50%;
    transform:rotate(calc(-135deg + var(--val) * 270deg));
    transition:transform .05s linear;}
  .dial .ptr{position:absolute;left:50%;top:7px;width:4px;height:30px;margin-left:-2px;border-radius:3px;
    background:linear-gradient(180deg,var(--accent2),#7a2a4a);box-shadow:0 0 6px rgba(255,95,162,.6);}
  .dial .cap{position:absolute;left:50%;top:50%;width:30px;height:30px;margin:-15px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#fff,#d8c08a);box-shadow:0 1px 2px rgba(0,0,0,.3) inset;}
  /* arc track */
  .arc{position:absolute;inset:-12px;}
  .knob-name{font-size:11px;font-weight:700;letter-spacing:.5px;color:#5a4a30;text-transform:uppercase;}
  .knob-val{font-size:11px;font-weight:600;color:var(--accent2);font-variant-numeric:tabular-nums;}

  .foot{margin-top:16px;display:flex;align-items:center;gap:10px;font-size:10px;color:#9c8456;letter-spacing:1px;}
  .foot .dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2);}
  .hint{margin-left:auto;font-size:9px;color:#b09c6e;letter-spacing:.5px;}
</style>
</head>
<body>
  <div class="module">
    <div class="screw tl"></div><div class="screw tr"></div>
    <div class="screw bl"></div><div class="screw br"></div>

    <header>
      <div class="brand">WEST CELL</div>
      <div class="sub">Complex&nbsp;Osc · Folder · Low-Pass&nbsp;Gate</div>
      <div class="lamp"></div>
    </header>

    <div class="stage">
      <div class="scope">
        <div class="scope-label">Wavefolder</div>
        <svg viewBox="0 0 360 170" preserveAspectRatio="none">
          <defs>
            <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#ff5fa2"/>
              <stop offset="1" stop-color="#ffd24a"/>
            </linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <line x1="0" y1="85" x2="360" y2="85" stroke="#3a2f20" stroke-width="1"/>
          <path id="foldPath" fill="none" stroke="url(#fg)" stroke-width="2.4" filter="url(#glow)"/>
          <!-- LPG pluck ripple -->
          <circle id="ripple" cx="40" cy="85" r="4" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0"/>
        </svg>
      </div>

      <div class="patch" style="position:relative">
        <div class="patch-title">Patch&nbsp;Bay</div>
        <div class="jrow"><span class="jack" style="--jc:#ff5fa2"><i></i></span><span>Primary&nbsp;Osc</span></div>
        <div class="jrow"><span class="jack" style="--jc:#ffd24a"><i></i></span><span>Modulator</span></div>
        <div class="jrow"><span class="jack" style="--jc:#ff5fa2"><i></i></span><span>Folder&nbsp;In</span></div>
        <div class="jrow"><span class="jack" style="--jc:#ffd24a"><i></i></span><span>LPG&nbsp;Control</span></div>
        <div class="jrow"><span class="jack" style="--jc:#ff5fa2"><i></i></span><span>Voice&nbsp;Out</span></div>
        <svg class="cables" viewBox="0 0 320 230" preserveAspectRatio="none">
          <path id="cable1" fill="none" stroke="#ff5fa2" stroke-width="3.5" stroke-linecap="round" opacity=".85"/>
          <path id="cable2" fill="none" stroke="#ffd24a" stroke-width="3.5" stroke-linecap="round" opacity=".85"/>
        </svg>
      </div>
    </div>

    <div class="controls" id="controls"></div>

    <div class="foot">
      <span class="dot"></span><span>WEST&nbsp;COAST&nbsp;VOICE — pluck the gate, fold the wave</span>
      <span class="hint">drag knobs · double-click to reset</span>
    </div>
  </div>

<script>
(function(){
  // ---- param model (indices MUST match assembly.ts / spec.json) ----
  var PARAMS = [
    { name:"Timbre",     index:0, min:0, max:1, def:0.4  },
    { name:"Fold",       index:1, min:0, max:1, def:0.45 },
    { name:"Gate Decay", index:2, min:0, max:1, def:0.5  },
    { name:"Tone",       index:3, min:0, max:1, def:0.55 },
    { name:"Level",      index:4, min:0, max:1, def:0.7  }
  ];
  var values = PARAMS.map(function(p){ return p.def; });

  function send(i, v){
    try{
      if (window.vstai && typeof window.vstai.setParam === "function")
        window.vstai.setParam(i, v);
    }catch(e){}
  }

  // ---- build knobs ----
  var root = document.getElementById("controls");
  function fmt(v){ return Math.round(v*100); }

  PARAMS.forEach(function(p, idx){
    var wrap = document.createElement("div"); wrap.className="knobwrap";
    var knob = document.createElement("div"); knob.className="knob";
    knob.innerHTML =
      '<svg class="arc" viewBox="0 0 108 108">'+
        '<path d="M16 92 A 46 46 0 1 1 92 92" fill="none" stroke="#cdb887" stroke-width="5" stroke-linecap="round"/>'+
        '<path class="arcfill" d="M16 92 A 46 46 0 1 1 92 92" fill="none" stroke="url(#fg2_'+idx+')" stroke-width="5" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>'+
        '<defs><linearGradient id="fg2_'+idx+'" x1="0" y1="0" x2="1" y2="1">'+
        '<stop offset="0" stop-color="#ff5fa2"/><stop offset="1" stop-color="#ffd24a"/></linearGradient></defs>'+
      '</svg>'+
      '<div class="dial"><div class="ptr"></div><div class="cap"></div></div>';
    var name = document.createElement("div"); name.className="knob-name"; name.textContent=p.name;
    var val  = document.createElement("div"); val.className="knob-val";

    wrap.appendChild(knob); wrap.appendChild(name); wrap.appendChild(val);
    root.appendChild(wrap);

    var arcfill = knob.querySelector(".arcfill");

    function norm(v){ return (v - p.min) / (p.max - p.min); }
    function render(){
      var nv = norm(values[idx]);
      knob.style.setProperty("--val", nv);
      arcfill.style.strokeDashoffset = (100 - nv*100).toFixed(2);
      val.textContent = fmt(nv);
    }
    function set(v, push){
      v = Math.max(p.min, Math.min(p.max, v));
      values[idx] = v;
      render();
      if (push !== false) send(p.index, v);
      updateVis();
    }

    // ---- drag interaction (vertical) ----
    var dragging=false, startY=0, startV=0;
    knob.addEventListener("mousedown", function(e){
      dragging=true; startY=e.clientY; startV=values[idx];
      document.body.style.cursor="grabbing"; e.preventDefault();
    });
    window.addEventListener("mousemove", function(e){
      if(!dragging) return;
      var dy = startY - e.clientY;
      var range = p.max - p.min;
      set(startV + (dy/180)*range);
    });
    window.addEventListener("mouseup", function(){
      if(dragging){ dragging=false; document.body.style.cursor=""; }
    });
    knob.addEventListener("dblclick", function(){ set(p.def); });
    // wheel fine-tune
    knob.addEventListener("wheel", function(e){
      e.preventDefault();
      set(values[idx] - Math.sign(e.deltaY)*0.02*(p.max-p.min));
    }, {passive:false});

    p._render = render;
    render();
  });

  // ---- PATCH BAY: make the banana jacks real vertical-drag controls ----
  // Each jack patches a stage and IS a control: drag = set its parameter,
  // dbl-click = default, wheel = fine. Mirrors the knobs so the patch bay
  // actually does something.
  (function(){
    var jackEls = Array.prototype.slice.call(document.querySelectorAll(".jack"));
    var JMAP = [3, 0, 1, 2, 4]; // Primary Osc->Tone, Modulator->Timbre, Folder In->Fold, LPG->Gate Decay, Voice Out->Level
    function applyParam(idx, v){
      var p = PARAMS[idx]; v = Math.max(p.min, Math.min(p.max, v));
      values[idx] = v; if (p._render) p._render(); send(p.index, v);
      if (typeof updateVis === "function") updateVis(); renderJacks();
    }
    function renderJacks(){
      jackEls.forEach(function(j, k){ var pi = JMAP[k]; if (pi == null) return; var nv = values[pi];
        var inner = j.querySelector("i"); if (inner) inner.style.opacity = (0.25 + 0.75*nv).toFixed(2);
        j.style.boxShadow = "0 0 " + (2 + nv*11).toFixed(1) + "px var(--jc)";
      });
    }
    jackEls.forEach(function(j, k){
      var pi = JMAP[k]; if (pi == null) return;
      j.style.cursor = "ns-resize"; j.title = "drag: " + PARAMS[pi].name;
      var dragging=false, startY=0, startV=0;
      j.addEventListener("mousedown", function(e){ dragging=true; startY=e.clientY; startV=values[pi]; document.body.style.cursor="grabbing"; e.preventDefault(); });
      window.addEventListener("mousemove", function(e){ if(!dragging)return; applyParam(pi, startV + (startY-e.clientY)/180); });
      window.addEventListener("mouseup", function(){ if(dragging){ dragging=false; document.body.style.cursor=""; } });
      j.addEventListener("click", function(){ /* click nudges up a touch for discoverability */ applyParam(pi, values[pi] + 0.08 > 1 ? PARAMS[pi].def : values[pi] + 0.08); });
      j.addEventListener("dblclick", function(){ applyParam(pi, PARAMS[pi].def); });
      j.addEventListener("wheel", function(e){ e.preventDefault(); applyParam(pi, values[pi] - Math.sign(e.deltaY)*0.02); }, {passive:false});
    });
    renderJacks();
  })();

  // ---- live visualisation: wavefolder curve + patch cables + ripple ----
  var foldPath = document.getElementById("foldPath");
  var ripple   = document.getElementById("ripple");
  var cable1   = document.getElementById("cable1");
  var cable2   = document.getElementById("cable2");
  var t = 0;

  function buildFoldPath(){
    var timbre = values[0], fold = values[1], tone = values[3];
    var drive = 1 + fold*fold*6;
    var depth = timbre*5;
    var N = 180, W=360, H=170, mid=85, amp=58*(0.5+tone*0.5);
    var d = "";
    for (var i=0;i<=N;i++){
      var x = i/N;
      var phase = x*Math.PI*2;
      // complex osc: modulator FM the primary
      var s = Math.sin(phase + Math.sin(phase*1.41 + t*0.6)*depth);
      // wavefolder (matches the DSP shape)
      var dr = s*drive;
      var fo = Math.sin(dr) + 0.5*Math.sin(dr*2);
      fo *= 0.7/(0.6+fold*0.9);
      var px = x*W;
      var py = mid - fo*amp;
      d += (i===0?"M":"L") + px.toFixed(1) + " " + py.toFixed(1) + " ";
    }
    foldPath.setAttribute("d", d);
  }

  function buildCables(){
    // gentle drooping patch cables that sway with Timbre / Fold
    var sag1 = 30 + values[0]*40;
    var sag2 = 30 + values[1]*40;
    var sway = Math.sin(t*0.8)*6;
    cable1.setAttribute("d","M14 24 C "+(90+sway)+" "+(24+sag1)+", 230 "+(110-sag1*0.3)+", 306 196");
    cable2.setAttribute("d","M14 70 C "+(110-sway)+" "+(70+sag2)+", 210 "+(150-sag2*0.3)+", 306 24");
  }

  function updateVis(){ buildFoldPath(); buildCables(); }

  // LPG pluck ripple keyed to Gate Decay — periodic "ping"
  var lastPing=0;
  function loop(ts){
    t += 0.016;
    buildFoldPath();
    buildCables();

    var decay = values[2];
    var period = 600 + decay*1600; // ms between pings, longer decay = slower
    if (ts - lastPing > period){
      lastPing = ts;
      ripple.setAttribute("opacity","0.9");
      ripple.setAttribute("r","4");
      ripple._start = ts;
    }
    if (ripple._start){
      var age = (ts - ripple._start)/1000;
      var life = 0.25 + decay*1.6;
      var k = age/life;
      if (k >= 1){ ripple.setAttribute("opacity","0"); ripple._start=0; }
      else {
        ripple.setAttribute("r", (4 + k*180).toFixed(1));
        ripple.setAttribute("opacity", (0.9*(1-k)).toFixed(3));
      }
    }
    requestAnimationFrame(loop);
  }

  function start(){
    // push every default to the host so DSP matches the displayed state
    PARAMS.forEach(function(p,i){ send(p.index, values[i]); });
    updateVis();
    requestAnimationFrame(loop);
  }

  if (window.vstai && typeof window.vstai.onReady === "function") {
    window.vstai.onReady(start);
  } else {
    start();
  }
})();
</script>
</body>
</html>
