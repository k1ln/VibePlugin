  <title>Vivid Poly — test bench</title><style>
  :root{--ac:#ffd23d}
  *{box-sizing:border-box}

  button.off{background:#28313f;color:#e7eef6}

  .st{font-size:12px;color:#8da0bd;min-height:16px}

  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Vivid Poly<\/title>\n<style>\n  :root{\n    --gold:#ffd23d;\n    --red:#ff5a4d;\n    --ink:#1a0f0a;\n    --cream:#fff4dc;\n    --panel:#c8231d;\n    --panel2:#8e110d;\n  }\n  *{ box-sizing:border-box; margin:0; padding:0; }\n  html,body{ height:100%; }\n  body{\n    font-family:\"Helvetica Neue\",Arial,sans-serif;\n    background:\n      radial-gradient(120% 90% at 20% -10%, #e6433a 0%, transparent 55%),\n      radial-gradient(130% 110% at 110% 120%, #6b0c08 0%, transparent 60%),\n      linear-gradient(160deg,#b81d18 0%, #7d0d09 100%);\n    color:var(--cream);\n    -webkit-user-select:none; user-select:none;\n    overflow:hidden;\n    display:flex; align-items:center; justify-content:center;\n    min-height:100%;\n  }\n\n  /* ---------- bezel / panel ---------- */\n  .unit{\n    position:relative;\n    width:760px; max-width:96vw;\n    border-radius:18px;\n    padding:18px 20px 22px;\n    background:\n      linear-gradient(180deg,#d9261f 0%, #a3140f 60%, #7d0d09 100%);\n    box-shadow:\n      0 30px 80px rgba(0,0,0,.55),\n      0 2px 0 rgba(255,210,61,.35) inset,\n      0 -18px 40px rgba(0,0,0,.35) inset;\n    border:2px solid #5d0805;\n  }\n  .unit::before{\n    /* gold pin-stripe frame */\n    content:\"\"; position:absolute; inset:9px;\n    border:2px solid var(--gold);\n    border-radius:12px;\n    opacity:.85;\n    pointer-events:none;\n    box-shadow:0 0 18px rgba(255,210,61,.25);\n  }\n\n  /* ---------- header ---------- */\n  .head{\n    position:relative; display:flex; align-items:center; gap:14px;\n    padding:6px 8px 14px;\n  }\n  .logo{\n    display:flex; flex-direction:column; line-height:.92;\n  }\n  .logo .vivid{\n    font-weight:900; font-size:34px; letter-spacing:2px;\n    color:var(--cream);\n    text-shadow:0 2px 0 #5d0805, 0 0 22px rgba(255,210,61,.45);\n  }\n  .logo .poly{\n    font-weight:800; font-size:15px; letter-spacing:7px;\n    color:var(--gold);\n    text-shadow:0 1px 0 #5d0805;\n  }\n  .tag{\n    margin-left:auto; text-align:right; font-size:10px; letter-spacing:2px;\n    color:#ffe8a8; opacity:.8; text-transform:uppercase;\n  }\n  .power{\n    width:14px; height:14px; border-radius:50%;\n    background:radial-gradient(circle at 35% 30%, #fff6c4, var(--gold) 55%, #b58400);\n    box-shadow:0 0 14px var(--gold), 0 0 4px #fff inset;\n    animation:pulse 2.4s ease-in-out infinite;\n  }\n  @keyframes pulse{ 0%,100%{ box-shadow:0 0 10px var(--gold);} 50%{ box-shadow:0 0 22px var(--gold), 0 0 6px #fff;} }\n\n  /* ---------- scope ---------- */\n  .scope-wrap{\n    position:relative; height:118px; margin:0 8px 16px;\n    border-radius:10px;\n    background:linear-gradient(180deg,#240603,#3a0a06);\n    border:2px solid #5d0805;\n    box-shadow:0 6px 18px rgba(0,0,0,.5) inset, 0 0 0 2px rgba(255,210,61,.18);\n    overflow:hidden;\n  }\n  .scope-wrap::after{ /* scanline sheen */\n    content:\"\"; position:absolute; inset:0;\n    background:repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0 1px, transparent 1px 4px);\n    pointer-events:none;\n  }\n  svg.scope{ display:block; width:100%; height:100%; }\n  .gridline{ stroke:rgba(255,210,61,.12); stroke-width:1; }\n  .wave{ fill:none; stroke:var(--gold); stroke-width:2.4; filter:drop-shadow(0 0 6px rgba(255,210,61,.8)); }\n  .wave2{ fill:none; stroke:var(--red); stroke-width:1.6; opacity:.85; filter:drop-shadow(0 0 5px rgba(255,90,77,.7)); }\n\n  /* segment meter */\n  .meter{ position:absolute; right:10px; top:10px; bottom:10px; width:12px;\n    display:flex; flex-direction:column-reverse; gap:3px; }\n  .seg{ flex:1; border-radius:2px; background:rgba(255,255,255,.08); transition:background .08s, box-shadow .08s; }\n  .seg.on{ background:var(--gold); box-shadow:0 0 8px var(--gold); }\n  .seg.hot{ background:var(--red); box-shadow:0 0 9px var(--red); }\n\n  /* ---------- knob grid ---------- */\n  .grid{\n    display:grid; grid-template-columns:repeat(4,1fr);\n    gap:8px 6px; padding:4px 6px 2px;\n  }\n  .cell{\n    position:relative; display:flex; flex-direction:column; align-items:center;\n    padding:8px 4px 10px;\n    border-radius:10px;\n    background:linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.22));\n    box-shadow:0 1px 0 rgba(255,210,61,.10) inset;\n  }\n  .knob{\n    position:relative; width:84px; height:84px; cursor:ns-resize; touch-action:none;\n  }\n  .knob svg{ position:absolute; inset:0; overflow:visible; }\n  .arc-bg{ fill:none; stroke:rgba(0,0,0,.45); stroke-width:7; stroke-linecap:round; }\n  .arc-fg{ fill:none; stroke:url(#vg); stroke-width:7; stroke-linecap:round;\n           filter:drop-shadow(0 0 6px rgba(255,210,61,.6)); transition:stroke-dashoffset .04s linear; }\n  .cap{\n    position:absolute; inset:16px;\n    border-radius:50%;\n    background:\n      radial-gradient(circle at 38% 30%, #ffffff 0%, #f3f0e6 38%, #cfc8b6 78%, #a59d88 100%);\n    box-shadow:\n      0 4px 10px rgba(0,0,0,.5),\n      0 1px 0 #fff inset,\n      0 -3px 8px rgba(0,0,0,.25) inset;\n    border:1px solid rgba(0,0,0,.25);\n  }\n  .cap::after{\n    /* white pointer line */\n    content:\"\"; position:absolute; left:50%; top:7px;\n    width:3px; height:34%;\n    margin-left:-1.5px;\n    border-radius:2px;\n    background:linear-gradient(180deg,var(--red),#9c1c14);\n    box-shadow:0 0 5px rgba(255,90,77,.7);\n  }\n  .pointer{ position:absolute; inset:16px; pointer-events:none; }\n  .knob:hover .cap{ box-shadow:0 5px 14px rgba(0,0,0,.55), 0 0 0 2px rgba(255,210,61,.5), 0 1px 0 #fff inset; }\n  .knob.drag .cap{ box-shadow:0 5px 16px rgba(0,0,0,.6), 0 0 0 3px var(--gold), 0 1px 0 #fff inset; }\n\n  .lbl{ margin-top:9px; font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--cream); }\n  .val{ margin-top:2px; font-size:11px; font-weight:700; color:var(--gold); font-variant-numeric:tabular-nums; min-height:13px; }\n\n  .foot{ display:flex; align-items:center; gap:8px; padding:10px 10px 2px; font-size:10px; letter-spacing:2px; color:#ffd9a0; opacity:.7; }\n  .foot .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 6px var(--gold); }\n  .made{ margin-left:auto; text-transform:uppercase; }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <div class=\"head\">\n      <span class=\"power\" title=\"on\"><\/span>\n      <div class=\"logo\">\n        <span class=\"vivid\">VIVID<\/span>\n        <span class=\"poly\">POLY&nbsp;&middot;&nbsp;8<\/span>\n      <\/div>\n      <div class=\"tag\">Bright&nbsp;Italian&nbsp;Polyphonic<br>DCO &middot; PWM &middot; RING<\/div>\n    <\/div>\n\n    <div class=\"scope-wrap\">\n      <svg class=\"scope\" viewBox=\"0 0 700 118\" preserveAspectRatio=\"none\">\n        <line class=\"gridline\" x1=\"0\" y1=\"59\" x2=\"700\" y2=\"59\"/>\n        <line class=\"gridline\" x1=\"0\" y1=\"29\" x2=\"700\" y2=\"29\"/>\n        <line class=\"gridline\" x1=\"0\" y1=\"89\" x2=\"700\" y2=\"89\"/>\n        <polyline class=\"wave2\" id=\"wave2\" points=\"\"/>\n        <polyline class=\"wave\" id=\"wave\" points=\"\"/>\n      <\/svg>\n      <div class=\"meter\" id=\"meter\"><\/div>\n    <\/div>\n\n    <div class=\"grid\" id=\"grid\"><\/div>\n\n    <div class=\"foot\">\n      <span class=\"dot\"><\/span><span>VIVID POLY ENGINE<\/span>\n      <span class=\"made\">Original instrument &mdash; bright &middot; punchy &middot; forward<\/span>\n    <\/div>\n  <\/div>\n\n<svg width=\"0\" height=\"0\"><defs>\n  <linearGradient id=\"vg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n    <stop offset=\"0\" stop-color=\"#ffd23d\"/>\n    <stop offset=\"1\" stop-color=\"#ff5a4d\"/>\n  <\/linearGradient>\n<\/defs><\/svg>\n\n<script>\n(function(){\n  \"use strict\";\n  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n\n  // ----- param definitions (index must match spec.json) -----\n  var PARAMS=[\n    { i:0, name:\"CUTOFF\",  def:0.62, fmt:function(v){ return Math.round(120*Math.pow(150,v))+\" Hz\"; } },\n    { i:1, name:\"RESO\",    def:0.40, fmt:function(v){ return Math.round(v*100)+\"%\"; } },\n    { i:2, name:\"ENV AMT\", def:0.65, fmt:function(v){ return (v*6.5).toFixed(1)+\" oct\"; } },\n    { i:3, name:\"PWM\",     def:0.35, fmt:function(v){ return Math.round((0.5+v*0.42)*100)+\"%\"; } },\n    { i:4, name:\"RING\",    def:0.25, fmt:function(v){ return Math.round(v*100)+\"%\"; } },\n    { i:5, name:\"ATTACK\",  def:0.04, fmt:function(v){ return Math.round((1+v*120))+\" ms\"; } },\n    { i:6, name:\"RELEASE\", def:0.30, fmt:function(v){ return ((0.005+v*1.6)*1000|0)+\" ms\"; } },\n    { i:7, name:\"LEVEL\",   def:0.80, fmt:function(v){ return Math.round(v*100)+\"%\"; } }\n  ];\n\n  var ARC_LEN=Math.PI*1.5*38; // radius 38, 270deg sweep\n  var grid=document.getElementById(\"grid\");\n  var state={}; // index -> value\n\n  function buildKnob(p){\n    var cell=document.createElement(\"div\"); cell.className=\"cell\";\n    var knob=document.createElement(\"div\"); knob.className=\"knob\";\n    knob.innerHTML=\n      '<svg viewBox=\"0 0 84 84\">'+\n      '<path class=\"arc-bg\" d=\"M 17 67 A 38 38 0 1 1 67 67\"/>'+\n      '<path class=\"arc-fg\" d=\"M 17 67 A 38 38 0 1 1 67 67\" '+\n        'stroke-dasharray=\"'+ARC_LEN+'\" stroke-dashoffset=\"'+ARC_LEN+'\"/>'+\n      '<\/svg>'+\n      '<div class=\"pointer\"><div class=\"cap\"><\/div><\/div>';\n    var lbl=document.createElement(\"div\"); lbl.className=\"lbl\"; lbl.textContent=p.name;\n    var val=document.createElement(\"div\"); val.className=\"val\";\n    cell.appendChild(knob); cell.appendChild(lbl); cell.appendChild(val);\n    grid.appendChild(cell);\n\n    var arc=knob.querySelector(\".arc-fg\");\n    var pointer=knob.querySelector(\".pointer\");\n    var v=p.def;\n\n    function paint(){\n      // arc fill\n      arc.style.strokeDashoffset=(ARC_LEN*(1-v))+\"\";\n      // rotate cap: -135deg .. +135deg\n      var deg=-135+v*270;\n      pointer.style.transform=\"rotate(\"+deg+\"deg)\";\n      val.textContent=p.fmt(v);\n      state[p.i]=v;\n    }\n    function set(nv){ v=Math.max(0,Math.min(1,nv)); send(p.i,v); paint(); }\n\n    // ----- drag (vertical) -----\n    var dragging=false, lastY=0;\n    knob.addEventListener(\"pointerdown\",function(e){\n      dragging=true; lastY=e.clientY; knob.classList.add(\"drag\");\n      knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener(\"pointermove\",function(e){\n      if(!dragging) return;\n      var dy=lastY-e.clientY; lastY=e.clientY;\n      var speed=e.shiftKey?0.0008:0.004;\n      set(v+dy*speed);\n    });\n    function up(e){ dragging=false; knob.classList.remove(\"drag\"); try{knob.releasePointerCapture(e.pointerId);}catch(_){} }\n    knob.addEventListener(\"pointerup\",up);\n    knob.addEventListener(\"pointercancel\",up);\n    knob.addEventListener(\"wheel\",function(e){ e.preventDefault(); set(v-(e.deltaY>0?1:-1)*0.03); },{passive:false});\n    knob.addEventListener(\"dblclick\",function(){ set(p.def); });\n\n    set(p.def); // init -> sends default\n    return { get:function(){return v;} };\n  }\n\n  var knobs=PARAMS.map(buildKnob);\n\n  // ----- segment meter -----\n  var meter=document.getElementById(\"meter\");\n  var SEGS=14, segEls=[];\n  for(var s=0;s<SEGS;s++){ var d=document.createElement(\"div\"); d.className=\"seg\"; meter.appendChild(d); segEls.push(d); }\n\n  // ----- animated scope -----\n  var wave=document.getElementById(\"wave\");\n  var wave2=document.getElementById(\"wave2\");\n  var W=700,H=118,N=140;\n  var t=0;\n  function frame(){\n    t+=0.045;\n    var cut=state[0]||0.5, reso=state[1]||0.4, pwm=state[3]||0.35, ring=state[4]||0.25, lvl=state[7]||0.8;\n    // bright snapping saw: harmonics scale with cutoff; ring adds metallic upper partials\n    var bright=1+cut*9;\n    var pw=0.5+pwm*0.42;\n    var pts1=\"\", pts2=\"\";\n    var amp=24+lvl*22;\n    var peak=0;\n    for(var x=0;x<=N;x++){\n      var ph=(x/N)*4 + t;             // 4 cycles across screen, scrolling\n      var fr=ph-Math.floor(ph);       // 0..1 saw ramp\n      // band-limited-ish saw with cutoff brightening the edge snap\n      var saw=(fr*2-1);\n      saw= saw*(0.6+0.4*Math.tanh(saw*bright)); // sharpen edge with cutoff\n      // resonant ring on the falling edge\n      saw+= reso*0.35*Math.sin(ph*6.283*(2+ring*5))*Math.exp(-fr*4);\n      // pulse component (PWM)\n      var pul=(fr<pw)?1:-1;\n      var y1=H/2 - saw*amp*0.9;\n      var y2=H/2 - (pul*0.6 + saw*0.2)*amp*0.6;\n      var px=(x/N)*W;\n      pts1+=px.toFixed(1)+\",\"+y1.toFixed(1)+\" \";\n      pts2+=px.toFixed(1)+\",\"+y2.toFixed(1)+\" \";\n      var a=Math.abs(saw); if(a>peak)peak=a;\n    }\n    wave.setAttribute(\"points\",pts1);\n    wave2.setAttribute(\"points\",pts2);\n\n    // meter: drive by level*peak with a little movement\n    var lit=Math.round((0.25+lvl*0.7)*SEGS*(0.7+0.3*Math.abs(Math.sin(t*1.3))));\n    for(var s=0;s<SEGS;s++){\n      var on=s<lit;\n      segEls[s].className=\"seg\"+(on?(s>=SEGS-3?\" hot\":\" on\"):\"\");\n    }\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  // host ready hook\n  function ready(){ /* defaults already sent during build */ }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();

    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};
  var oct=0;                                              // octave offset (−4..+4), applied at note-on
  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function setOct(o){ oct=o<-4?-4:(o>4?4:o); var ov=document.getElementById('octval'); if(ov)ov.textContent=(4+oct); }
  function down(m,el){ ensure().then(function(){ if(ctx.state==='suspended')ctx.resume(); if(ex&&ex.noteOn) ex.noteOn(m,hz(m),0.9); }); if(el)el.classList.add('dn'); }
  function up(m,el){ if(ex&&ex.noteOff) ex.noteOff(m); if(el)el.classList.remove('dn'); }
  KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];
    el.addEventListener('pointerdown',function(e){e.preventDefault();el._n=k[1]+oct*12;down(el._n,el);});
    el.addEventListener('pointerup',function(){up(el._n,el);}); el.addEventListener('pointerleave',function(){if(el.classList.contains('dn'))up(el._n,el);});
    KB.appendChild(el); });
  document.getElementById('octdn').addEventListener('click',function(){setOct(oct-1);});
  document.getElementById('octup').addEventListener('click',function(){setOct(oct+1);});
  var held={};                                            // base note -> actual note played (so releases survive an octave change)
  window.addEventListener('keydown',function(e){ if(e.repeat)return;
    if(e.key==='z'||e.key==='Z'){setOct(oct-1);return;} if(e.key==='x'||e.key==='X'){setOct(oct+1);return;}
    var b=KMAP[e.key]; if(b&&!held[b]){var m=b+oct*12;held[b]=m;down(m,null);} });
  window.addEventListener('keyup',function(e){ var b=KMAP[e.key]; if(b&&held[b]!=null){up(held[b],null);held[b]=null;} });
  setOct(0);
  
  </script></body></html>
