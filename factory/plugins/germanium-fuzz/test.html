<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Germanium Fuzz — test bench</title><style>
  :root{--ac:#d98b4a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Germanium Fuzz</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n  @property --n0{syntax:'<number>';inherits:false;initial-value:0}\n  @property --n1{syntax:'<number>';inherits:false;initial-value:0}\n  :root{\n    --ac:#d98b4a;            /* germanium amber */\n    --ac2:#e8a860;           /* warm highlight */\n    --case:#b56a2e;          /* hammered enclosure */\n    --caseD:#5e3414;         /* shadow side */\n    --eye:#f4ead6;           /* knob face cream */\n    --smile:#3a2412;         /* engraving brown */\n  }\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{\n    margin:0;\n    font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n    color:#f3e6d2;\n    background:\n      radial-gradient(120% 95% at 50% 8%,#2a1b10 0%,#160d07 55%,#0a0603 100%);\n    display:flex;align-items:center;justify-content:center;\n    padding:18px;overflow:hidden;\n    -webkit-tap-highlight-color:transparent;\n  }\n\n  /* ---- floor shadow + workbench glow -------------------------------- */\n  .stage{\n    position:relative;width:100%;max-width:420px;\n    display:flex;flex-direction:column;align-items:center;gap:14px;\n    animation:rise .8s cubic-bezier(.2,.8,.2,1) both;\n  }\n  @keyframes rise{from{opacity:0;transform:translateY(22px) scale(.94)}to{opacity:1;transform:none}}\n\n  /* ===================================================================\n     THE PEDAL — a round die-cast fuzz-face enclosure\n     =================================================================== */\n  .pedal{\n    position:relative;width:340px;height:340px;flex:0 0 auto;\n    border-radius:50%;\n    /* warm rim light + a slow idle wobble like it's alive */\n    animation:idle 7s ease-in-out infinite;\n    will-change:transform;\n    cursor:default;\n  }\n  @keyframes idle{0%,100%{transform:rotate(-1.1deg)}50%{transform:rotate(1.1deg)}}\n\n  /* hammered metal body */\n  .body{\n    position:absolute;inset:0;border-radius:50%;\n    background:\n      radial-gradient(60% 55% at 38% 30%,#e89a52 0%,#c4742f 38%,#9a531f 70%,#5e3414 100%);\n    box-shadow:\n      0 26px 50px -10px rgba(0,0,0,.7),\n      0 8px 18px rgba(0,0,0,.55),\n      inset 0 -14px 30px rgba(0,0,0,.55),\n      inset 0 14px 26px rgba(255,225,180,.35);\n  }\n  /* hammered speckle texture (pure CSS) */\n  .body::before{\n    content:\"\";position:absolute;inset:0;border-radius:50%;opacity:.5;mix-blend-mode:overlay;\n    background:\n      radial-gradient(2px 2px at 20% 30%,rgba(255,255,255,.5),transparent 60%),\n      radial-gradient(2px 2px at 70% 22%,rgba(0,0,0,.4),transparent 60%),\n      radial-gradient(3px 3px at 48% 60%,rgba(255,255,255,.35),transparent 60%),\n      radial-gradient(2px 2px at 33% 78%,rgba(0,0,0,.45),transparent 60%),\n      radial-gradient(2px 2px at 82% 65%,rgba(255,255,255,.4),transparent 60%),\n      radial-gradient(2px 2px at 60% 40%,rgba(0,0,0,.35),transparent 60%),\n      radial-gradient(3px 3px at 12% 55%,rgba(255,255,255,.3),transparent 60%);\n  }\n  /* moving specular sweep — a soft light gliding across the metal */\n  .body::after{\n    content:\"\";position:absolute;inset:0;border-radius:50%;pointer-events:none;\n    background:linear-gradient(115deg,transparent 38%,rgba(255,240,210,.5) 50%,transparent 62%);\n    mix-blend-mode:screen;animation:sweep 6.5s ease-in-out infinite;\n  }\n  @keyframes sweep{0%,100%{transform:translateX(-30%);opacity:.25}50%{transform:translateX(30%);opacity:.85}}\n\n  /* outer engraved ring + bolts */\n  .ring{position:absolute;inset:14px;border-radius:50%;\n    border:2px solid rgba(60,30,12,.55);\n    box-shadow:inset 0 0 0 6px rgba(255,225,180,.12),inset 0 0 22px rgba(0,0,0,.45);\n    pointer-events:none;}\n  .bolt{position:absolute;width:13px;height:13px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#f0d9b3,#7a4a22 70%,#3a2310);\n    box-shadow:0 1px 2px rgba(0,0,0,.6),inset 0 1px 1px rgba(255,255,255,.5);}\n  .bolt::after{content:\"\";position:absolute;inset:4px;border-radius:1px;\n    background:linear-gradient(90deg,transparent 45%,rgba(40,20,8,.8) 45% 55%,transparent 55%);\n    transform:rotate(35deg);}\n  .b0{top:8px;left:50%;margin-left:-6.5px}\n  .b1{bottom:8px;left:50%;margin-left:-6.5px}\n  .b2{top:50%;left:8px;margin-top:-6.5px}\n  .b3{top:50%;right:8px;margin-top:-6.5px}\n\n  /* the engraved SMILE — an SVG arc with eyebrow ticks */\n  .face{position:absolute;inset:0;pointer-events:none;overflow:visible}\n  .smile{\n    fill:none;stroke:var(--smile);stroke-width:9;stroke-linecap:round;\n    filter:drop-shadow(0 1px 0 rgba(255,225,180,.35));\n    opacity:.85;\n  }\n  /* the smile brightens & widens a touch when the fuzz is cranked */\n  .smileGlow{\n    fill:none;stroke:var(--ac2);stroke-width:5;stroke-linecap:round;\n    opacity:calc(.15 + var(--fuzzn,.5)*.7);\n    filter:drop-shadow(0 0 6px var(--ac));\n    transition:opacity .25s ease;\n  }\n\n  /* nose: the germanium status LED / footswitch jewel */\n  .nose{\n    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);\n    width:30px;height:30px;border-radius:50%;cursor:pointer;\n    background:radial-gradient(circle at 38% 32%,#fff5e6,var(--ac) 45%,#7a3d12 90%);\n    box-shadow:\n      0 0 0 5px rgba(40,20,8,.6),\n      0 0 14px var(--ac),\n      inset 0 -2px 4px rgba(0,0,0,.5),\n      inset 0 2px 3px rgba(255,255,255,.6);\n    animation:beat 2.2s ease-in-out infinite;\n    z-index:6;\n  }\n  @keyframes beat{0%,100%{box-shadow:0 0 0 5px rgba(40,20,8,.6),0 0 8px var(--ac),inset 0 -2px 4px rgba(0,0,0,.5),inset 0 2px 3px rgba(255,255,255,.6)}\n    50%{box-shadow:0 0 0 5px rgba(40,20,8,.6),0 0 22px var(--ac2),inset 0 -2px 4px rgba(0,0,0,.5),inset 0 2px 3px rgba(255,255,255,.7)}}\n\n  /* ---- the two EYES (knobs) ----------------------------------------- */\n  .eye{\n    position:absolute;width:104px;height:104px;cursor:ns-resize;\n    touch-action:none;user-select:none;z-index:5;\n  }\n  .eyeL{left:58px;top:78px}\n  .eyeR{right:58px;top:78px}\n\n  /* dark eye-socket recess */\n  .socket{position:absolute;inset:-9px;border-radius:50%;\n    background:radial-gradient(circle at 50% 38%,rgba(0,0,0,.15),rgba(0,0,0,.55) 75%);\n    box-shadow:inset 0 4px 10px rgba(0,0,0,.65),0 1px 0 rgba(255,225,180,.25);}\n\n  /* the value arc that wraps the knob (filled by --nX) */\n  .arc{position:absolute;inset:-2px;border-radius:50%;}\n  .arcL{background:conic-gradient(from 225deg,\n      var(--ac) calc(var(--n0)*270deg),\n      rgba(0,0,0,.35) calc(var(--n0)*270deg) 270deg,\n      transparent 270deg);\n    filter:drop-shadow(0 0 calc(2px + var(--n0)*8px) var(--ac));}\n  .arcR{background:conic-gradient(from 225deg,\n      var(--ac) calc(var(--n1)*270deg),\n      rgba(0,0,0,.35) calc(var(--n1)*270deg) 270deg,\n      transparent 270deg);\n    filter:drop-shadow(0 0 calc(2px + var(--n1)*8px) var(--ac));}\n  .arc{-webkit-mask:radial-gradient(circle,transparent 49px,#000 50px);\n       mask:radial-gradient(circle,transparent 49px,#000 50px);}\n\n  /* the cream chicken-head knob cap */\n  .cap{position:absolute;inset:4px;border-radius:50%;\n    background:\n      radial-gradient(circle at 42% 30%,#fffaf0 0%,var(--eye) 40%,#d8c5a0 78%,#9a8460 100%);\n    box-shadow:\n      inset 0 -6px 12px rgba(120,90,50,.5),\n      inset 0 5px 10px rgba(255,255,255,.7),\n      0 4px 9px rgba(0,0,0,.5);\n    transition:transform .12s ease;\n  }\n  .eye:active .cap,.eye.act .cap{transform:scale(.97)}\n  /* the iris / pointer indent that rotates */\n  .iris{position:absolute;inset:0;border-radius:50%;\n    transform:rotate(calc((var(--nn,0) - 0.5)*270deg));\n    transition:transform .12s cubic-bezier(.2,.75,.25,1);}\n  .pupil{position:absolute;top:9px;left:50%;width:11px;height:11px;margin-left:-5.5px;border-radius:50%;\n    background:radial-gradient(circle at 40% 35%,#5a3a18,#1c0f04);\n    box-shadow:0 0 5px rgba(0,0,0,.6),inset 0 1px 1px rgba(255,255,255,.25);}\n  .pupil::after{content:\"\";position:absolute;left:50%;top:13px;transform:translateX(-50%);\n    width:3px;height:13px;border-radius:2px;background:var(--smile);opacity:.55}\n\n  /* value bubble over each eye */\n  .bub{position:absolute;left:50%;top:-6px;transform:translate(-50%,-100%) scale(.85);\n    opacity:0;pointer-events:none;font-weight:800;font-size:12px;color:#1c0f04;\n    background:linear-gradient(var(--ac2),var(--ac));padding:3px 9px;border-radius:7px;\n    font-variant-numeric:tabular-nums;box-shadow:0 6px 14px rgba(0,0,0,.45);\n    transition:.16s;white-space:nowrap;z-index:9;}\n  .bub::after{content:\"\";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%) rotate(45deg);\n    width:8px;height:8px;background:var(--ac);}\n  .eye:hover .bub,.eye.act .bub{opacity:1;transform:translate(-50%,-100%) scale(1)}\n\n  /* tiny etched label under each eye */\n  .eyelbl{position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);\n    font-size:10px;letter-spacing:.22em;font-weight:800;color:#3a2412;\n    text-shadow:0 1px 0 rgba(255,225,180,.4);white-space:nowrap;}\n\n  /* ===================================================================\n     CHASSIS RAIL — Tone & Volume as boutique vertical slide-faders\n     mounted on a brushed plate below the round can\n     =================================================================== */\n  .rail{\n    position:relative;width:340px;border-radius:16px;padding:14px 20px 16px;\n    background:linear-gradient(180deg,#3a2615,#241409);\n    border:1px solid rgba(255,225,180,.14);\n    box-shadow:0 14px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,225,180,.18);\n    display:flex;gap:18px;\n  }\n  .plate{position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:.5;mix-blend-mode:overlay;\n    background:repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0 1px,transparent 1px 3px);}\n  .fader{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1}\n  .track{position:relative;width:100%;height:118px;border-radius:9px;cursor:ns-resize;\n    touch-action:none;user-select:none;\n    background:linear-gradient(180deg,#0c0703,#1c0f06);\n    box-shadow:inset 0 2px 6px rgba(0,0,0,.7),inset 0 -1px 0 rgba(255,225,180,.1);\n    border:1px solid rgba(0,0,0,.5);overflow:hidden;}\n  /* the slot the cap rides in */\n  .slot{position:absolute;left:50%;top:10px;bottom:10px;width:5px;margin-left:-2.5px;border-radius:3px;\n    background:#000;box-shadow:inset 0 0 4px rgba(0,0,0,.9);}\n  /* glowing fill from bottom up to the cap */\n  .fill{position:absolute;left:50%;width:7px;margin-left:-3.5px;bottom:10px;border-radius:3px;\n    background:linear-gradient(var(--ac2),var(--ac));\n    box-shadow:0 0 9px var(--ac);\n    height:calc((var(--fn,0))*98px);\n    transition:height .1s linear;}\n  /* the fader knob */\n  .grip{position:absolute;left:50%;width:46px;height:22px;margin-left:-23px;border-radius:6px;\n    bottom:calc(10px + (var(--fn,0))*98px - 11px);\n    background:linear-gradient(180deg,#fffaf0,#d8c5a0 55%,#9a8460);\n    box-shadow:0 3px 7px rgba(0,0,0,.55),inset 0 1px 1px rgba(255,255,255,.8),inset 0 -2px 3px rgba(120,90,50,.5);\n    transition:bottom .1s linear,filter .15s;}\n  .grip::after{content:\"\";position:absolute;left:8px;right:8px;top:50%;height:2px;margin-top:-1px;border-radius:2px;\n    background:linear-gradient(90deg,transparent,var(--ac),transparent);box-shadow:0 0 5px var(--ac);}\n  .track:hover .grip,.track.act .grip{filter:brightness(1.06)}\n  .flbl{font-size:10px;letter-spacing:.2em;font-weight:800;color:#e8a860;text-transform:uppercase}\n  .fval{font-size:13px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}\n\n  /* maker's mark */\n  .mark{display:flex;align-items:center;gap:8px;font-size:9.5px;letter-spacing:.28em;\n    text-transform:uppercase;color:#a8753f;font-weight:700;opacity:.85}\n  .mark .dot{width:6px;height:6px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac)}\n\n  @media(max-width:380px){\n    .pedal{width:300px;height:300px}\n    .eyeL{left:48px}.eyeR{right:48px}\n    .rail{width:300px}\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"stage\">\n\n    <!-- ============ THE ROUND FUZZ-FACE PEDAL ============ -->\n    <div class=\"pedal\" id=\"pedal\">\n      <div class=\"body\"><\/div>\n      <div class=\"ring\"><\/div>\n      <span class=\"bolt b0\"><\/span><span class=\"bolt b1\"><\/span>\n      <span class=\"bolt b2\"><\/span><span class=\"bolt b3\"><\/span>\n\n      <!-- engraved smile -->\n      <svg class=\"face\" id=\"faceSvg\" viewBox=\"0 0 340 340\">\n        <path class=\"smile\"     d=\"M96 214 Q170 286 244 214\"><\/path>\n        <path class=\"smileGlow\" id=\"smileGlow\" d=\"M96 214 Q170 286 244 214\"><\/path>\n      <\/svg>\n\n      <!-- LEFT EYE = FUZZ (param 0) -->\n      <div class=\"eye eyeL\" id=\"eye0\" data-i=\"0\" data-min=\"0\" data-max=\"1\" data-def=\"0.75\" data-step=\"0.001\" data-nv=\"n0\">\n        <div class=\"socket\"><\/div>\n        <div class=\"arc arcL\"><\/div>\n        <div class=\"cap\"><div class=\"iris\"><span class=\"pupil\"><\/span><\/div><\/div>\n        <span class=\"bub\"><\/span>\n        <span class=\"eyelbl\">FUZZ<\/span>\n      <\/div>\n\n      <!-- RIGHT EYE = BIAS (param 1) -->\n      <div class=\"eye eyeR\" id=\"eye1\" data-i=\"1\" data-min=\"0\" data-max=\"1\" data-def=\"0.65\" data-step=\"0.001\" data-nv=\"n1\">\n        <div class=\"socket\"><\/div>\n        <div class=\"arc arcR\"><\/div>\n        <div class=\"cap\"><div class=\"iris\"><span class=\"pupil\"><\/span><\/div><\/div>\n        <span class=\"bub\"><\/span>\n        <span class=\"eyelbl\">BIAS<\/span>\n      <\/div>\n\n      <!-- nose jewel / status LED -->\n      <div class=\"nose\" id=\"nose\" title=\"germanium status\"><\/div>\n    <\/div>\n\n    <!-- ============ TONE / VOLUME FADER RAIL ============ -->\n    <div class=\"rail\">\n      <div class=\"plate\"><\/div>\n\n      <!-- TONE (param 2) -->\n      <div class=\"fader\">\n        <div class=\"track\" id=\"fad2\" data-i=\"2\" data-min=\"0\" data-max=\"1\" data-def=\"0.5\" data-step=\"0.001\">\n          <div class=\"slot\"><\/div><div class=\"fill\"><\/div><div class=\"grip\"><\/div>\n        <\/div>\n        <div class=\"flbl\">Tone<\/div><div class=\"fval\" id=\"v2\"><\/div>\n      <\/div>\n\n      <!-- VOLUME (param 3) -->\n      <div class=\"fader\">\n        <div class=\"track\" id=\"fad3\" data-i=\"3\" data-min=\"0\" data-max=\"1\" data-def=\"0.5\" data-step=\"0.001\">\n          <div class=\"slot\"><\/div><div class=\"fill\"><\/div><div class=\"grip\"><\/div>\n        <\/div>\n        <div class=\"flbl\">Volume<\/div><div class=\"fval\" id=\"v3\"><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"mark\"><span class=\"dot\"><\/span>GERMANIUM FUZZ &nbsp;·&nbsp; HAND-WIRED<\/div>\n  <\/div>\n\n<script>\n(function(){\n  function fmt(v){ return (Math.round(v*100)).toString(); } // 0–100 % display\n  function clamp(n){ return n<0?0:(n>1?1:n); }\n\n  var pedal = document.getElementById('pedal');\n  var smileGlow = document.getElementById('smileGlow');\n\n  function send(i,val){ if(window.vstai && window.vstai.setParam) window.vstai.setParam(i,val); }\n\n  // ---- the two EYE knobs ----\n  function initEye(el){\n    var i=+el.dataset.i, mn=+el.dataset.min, mx=+el.dataset.max,\n        def=+el.dataset.def, step=+el.dataset.step||0.001, nv=el.dataset.nv;\n    var iris=el.querySelector('.iris'), bub=el.querySelector('.bub');\n    var val=def, dragging=false, sy=0, sn=0;\n    function norm(){ return (val-mn)/((mx-mn)||1); }\n    function paint(){\n      var n=norm();\n      pedal.style.setProperty('--'+nv, n.toFixed(4));     // arc + glow filter\n      iris.style.setProperty('--nn', n.toFixed(4));        // pointer rotation\n      bub.textContent = fmt(n);\n      if(i===0){ pedal.style.setProperty('--fuzzn', n.toFixed(4));\n                 smileGlow.style.setProperty('--fuzzn', n.toFixed(4)); }\n      send(i,val);\n    }\n    function setN(n){ n=clamp(n); var v=mn+(mx-mn)*n; v=Math.round(v/step)*step; val=v; paint(); }\n    el.addEventListener('pointerdown',function(e){\n      dragging=true; sy=e.clientY; sn=norm(); el.classList.add('act');\n      el.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    el.addEventListener('pointermove',function(e){\n      if(!dragging) return; setN(sn + (sy - e.clientY)/220);\n    });\n    function end(){ dragging=false; el.classList.remove('act'); }\n    el.addEventListener('pointerup',end);\n    el.addEventListener('pointercancel',end);\n    el.addEventListener('dblclick',function(){ val=def; paint(); });\n    el.addEventListener('wheel',function(e){ e.preventDefault(); setN(norm()+(e.deltaY<0?0.02:-0.02)); },{passive:false});\n    paint();\n  }\n\n  // ---- the two vertical FADERS ----\n  function initFader(el){\n    var i=+el.dataset.i, mn=+el.dataset.min, mx=+el.dataset.max,\n        def=+el.dataset.def, step=+el.dataset.step||0.001;\n    var out=document.getElementById('v'+i);\n    var val=def, dragging=false;\n    function norm(){ return (val-mn)/((mx-mn)||1); }\n    function paint(){\n      var n=norm();\n      el.style.setProperty('--fn', n.toFixed(4));\n      if(out) out.textContent=fmt(n);\n      send(i,val);\n    }\n    function setN(n){ n=clamp(n); var v=mn+(mx-mn)*n; v=Math.round(v/step)*step; val=v; paint(); }\n    function fromY(e){\n      var r=el.getBoundingClientRect();\n      // active travel is inset 10px top & bottom (slot)\n      var top=r.top+10, h=r.height-20;\n      setN(1-((e.clientY-top)/h));\n    }\n    el.addEventListener('pointerdown',function(e){\n      dragging=true; el.classList.add('act'); el.setPointerCapture(e.pointerId);\n      fromY(e); e.preventDefault();\n    });\n    el.addEventListener('pointermove',function(e){ if(dragging) fromY(e); });\n    function end(){ dragging=false; el.classList.remove('act'); }\n    el.addEventListener('pointerup',end);\n    el.addEventListener('pointercancel',end);\n    el.addEventListener('dblclick',function(){ val=def; paint(); });\n    el.addEventListener('wheel',function(e){ e.preventDefault(); setN(norm()+(e.deltaY<0?0.03:-0.03)); },{passive:false});\n    paint();\n  }\n\n  function ready(){\n    initEye(document.getElementById('eye0'));\n    initEye(document.getElementById('eye1'));\n    initFader(document.getElementById('fad2'));\n    initFader(document.getElementById('fad3'));\n  }\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,d.f,d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){

  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
