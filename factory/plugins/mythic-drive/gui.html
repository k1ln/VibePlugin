<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mythic Drive</title>
<style>
:root{
  --ac:#e0b24a; --ac2:#f0d080;
  --gold-lo:#7a5c1c; --gold-mid:#c79b38; --gold-hi:#fdeeb0;
  --ink:#1a1305; --ink2:#0c0903;
  --eng:#6b5118;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font:13px "Trajan Pro",Georgia,"Times New Roman",serif; color:#f3e3b6;
  background:
    radial-gradient(120% 90% at 50% -10%, #241a07 0%, #120c02 55%, #070500 100%);
  display:flex; align-items:center; justify-content:center; padding:22px;
  -webkit-font-smoothing:antialiased;
}

/* ---------- the brass faceplate ---------- */
.face{
  position:relative; width:100%; max-width:560px; border-radius:18px;
  padding:22px 24px 20px;
  background:
    /* brushed-metal vertical streaks */
    repeating-linear-gradient(92deg, rgba(255,255,255,.05) 0 1px, rgba(0,0,0,.05) 1px 2px, transparent 2px 5px),
    /* warm gold sheen */
    linear-gradient(160deg, #d9b357 0%, #a87c2a 26%, #8a5f1c 52%, #b88c34 74%, #e6c468 100%);
  border:1px solid #5a3f12;
  box-shadow:
    0 30px 70px rgba(0,0,0,.66),
    inset 0 2px 1px rgba(255,248,210,.55),
    inset 0 -3px 6px rgba(40,24,2,.7),
    inset 0 0 0 1px rgba(120,86,28,.5);
  overflow:hidden;
}
/* moving specular highlight sweeping across the plate */
.face::before{
  content:""; position:absolute; inset:0; pointer-events:none; z-index:3; mix-blend-mode:screen;
  background:linear-gradient(105deg, transparent 32%, rgba(255,250,220,.0) 40%, rgba(255,250,220,.42) 50%, rgba(255,250,220,.0) 60%, transparent 68%);
  background-size:280% 100%;
  animation:sheen 9s linear infinite;
}
@keyframes sheen{0%{background-position:140% 0}100%{background-position:-60% 0}}
/* corner screws */
.scr{position:absolute;width:13px;height:13px;border-radius:50%;z-index:4;
  background:radial-gradient(circle at 38% 32%,#fcecb4,#9c722a 60%,#5b3f12);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.7),0 1px 2px rgba(0,0,0,.6)}
.scr::after{content:"";position:absolute;inset:3px;border-radius:1px;
  background:linear-gradient(90deg,transparent 44%,#4a3310 44% 56%,transparent 56%);
  transform:rotate(40deg)}
.scr.tl{top:9px;left:9px}.scr.tr{top:9px;right:9px}
.scr.bl{bottom:9px;left:9px}.scr.br{bottom:9px;right:9px}

/* engraved inner bevel frame */
.plate{position:relative;z-index:2;border-radius:12px;padding:14px 14px 12px;
  border:1px solid rgba(60,42,12,.6);
  box-shadow:inset 0 0 0 1px rgba(255,243,200,.18), inset 0 2px 10px rgba(40,24,2,.4);
}

/* ---------- header: emblem + name engraving ---------- */
.head{display:flex;align-items:center;gap:14px;padding:2px 4px 14px}
.emblem{width:78px;height:78px;flex:none;filter:drop-shadow(0 2px 3px rgba(40,22,2,.6))}
.title{flex:1;min-width:0}
.title h1{
  margin:0;font-size:27px;line-height:1;font-weight:700;letter-spacing:.14em;
  color:#3a2806;
  text-shadow:0 1px 0 rgba(255,248,210,.55), 0 -1px 1px rgba(30,18,2,.5);
}
.title .sub{margin-top:5px;font-family:Georgia,serif;font-size:9.5px;letter-spacing:.42em;
  text-transform:uppercase;color:#5a4112;text-shadow:0 1px 0 rgba(255,248,210,.4)}
.filigree{height:1px;margin:11px 2px 0;border:0;
  background:linear-gradient(90deg,transparent,rgba(58,40,8,.7) 12%,rgba(255,243,200,.5) 50%,rgba(58,40,8,.7) 88%,transparent)}

/* ---------- knob row ---------- */
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:18px 2px 6px}
.cell{display:flex;flex-direction:column;align-items:center;gap:9px;
  animation:rise .6s both cubic-bezier(.2,.8,.25,1);animation-delay:var(--d)}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.92)}to{opacity:1;transform:none}}

.knob{position:relative;width:92px;height:92px;cursor:grab;touch-action:none;user-select:none}
.knob.drag{cursor:grabbing}
/* engraved ring well */
.well{position:absolute;inset:-3px;border-radius:50%;
  background:radial-gradient(circle at 50% 40%, #b88e35 0%, #7e5a1d 62%, #5a3f12 100%);
  box-shadow:inset 0 3px 6px rgba(30,16,2,.7), inset 0 -2px 3px rgba(255,243,200,.3), 0 1px 2px rgba(255,248,210,.3)}
/* gauge ring drawn by conic gradient driven by --n (0..1) */
.gauge{position:absolute;inset:4px;border-radius:50%;
  background:conic-gradient(from 215deg,
     var(--ac) calc(var(--n)*270deg),
     rgba(40,26,4,.55) calc(var(--n)*270deg) 270deg,
     transparent 270deg);
  -webkit-mask:radial-gradient(circle, transparent 36px, #000 37px);
  mask:radial-gradient(circle, transparent 36px, #000 37px);
  filter:drop-shadow(0 0 calc(2px + var(--n)*8px) rgba(240,208,128,calc(.3 + var(--n)*.55)));
  transition:--n .12s cubic-bezier(.2,.8,.25,1)}
@property --n{syntax:'<number>';inherits:true;initial-value:0}
/* tick marks around the dial */
.ticks{position:absolute;inset:-3px;border-radius:50%;
  background:repeating-conic-gradient(from 213deg, rgba(30,18,2,.6) 0 .8deg, transparent .8deg 27deg);
  -webkit-mask:radial-gradient(circle, transparent 44px, #000 45px, #000 47px, transparent 48px);
  mask:radial-gradient(circle, transparent 44px, #000 45px, #000 47px, transparent 48px)}
/* the gold cap */
.cap{position:absolute;top:13px;left:13px;width:66px;height:66px;border-radius:50%;
  background:
    radial-gradient(circle at 50% 32%, #fdeeb0 0%, #d9b357 24%, #a87c2a 60%, #6e4d18 100%);
  box-shadow:
    inset 0 2px 3px rgba(255,250,220,.7),
    inset 0 -4px 7px rgba(40,24,2,.7),
    0 3px 6px rgba(20,12,2,.55);
  transform:rotate(calc((var(--n) - .5) * 270deg));
  transition:transform .12s cubic-bezier(.2,.8,.25,1)}
/* knurled rim on the cap */
.cap::before{content:"";position:absolute;inset:2px;border-radius:50%;
  background:repeating-conic-gradient(rgba(255,250,220,.5) 0 1.4deg, rgba(60,40,10,.5) 1.4deg 4deg);
  -webkit-mask:radial-gradient(circle, transparent 24px, #000 25px);
  mask:radial-gradient(circle, transparent 24px, #000 25px);opacity:.55}
/* pointer notch engraved into cap */
.cap::after{content:"";position:absolute;top:7px;left:50%;width:4px;height:17px;margin-left:-2px;border-radius:2px;
  background:linear-gradient(#3a2806,#1a1205);
  box-shadow:0 0 4px rgba(255,243,200,.6),inset 0 1px 1px rgba(0,0,0,.6)}
/* glowing jewel value bubble */
.bub{position:absolute;top:-9px;left:50%;transform:translate(-50%,6px) scale(.85);opacity:0;pointer-events:none;z-index:6;
  font:700 11px Georgia,serif;color:#2a1c04;background:linear-gradient(var(--gold-hi),var(--ac));
  padding:2px 8px;border-radius:7px;font-variant-numeric:tabular-nums;
  box-shadow:0 4px 10px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.6);transition:.16s}
.knob:hover .bub,.knob.drag .bub{opacity:1;transform:translate(-50%,0) scale(1)}

.nm{font:700 11px Georgia,serif;letter-spacing:.2em;text-transform:uppercase;color:#2e2006;
  text-shadow:0 1px 0 rgba(255,248,210,.5)}
.val{font:700 13px Georgia,serif;color:#fbeec0;font-variant-numeric:tabular-nums;
  text-shadow:0 0 6px rgba(224,178,74,.6),0 1px 1px rgba(30,18,2,.7)}

/* ---------- footer engraving ---------- */
.foot{margin:14px 4px 2px;padding-top:11px;border-top:1px solid rgba(58,40,8,.45);
  font:italic 10.5px Georgia,serif;line-height:1.5;color:#4a3410;text-align:center;
  text-shadow:0 1px 0 rgba(255,248,210,.35)}
.foot b{font-style:normal;letter-spacing:.3em;color:#5a4112}
.lamp{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;margin:0 6px 2px 0;
  background:var(--ac);box-shadow:0 0 8px var(--ac);animation:flick 2.6s ease-in-out infinite}
@keyframes flick{0%,100%{opacity:.5;box-shadow:0 0 5px var(--ac)}50%{opacity:1;box-shadow:0 0 12px var(--ac)}}
</style>
</head>
<body>
<div class="face">
  <span class="scr tl"></span><span class="scr tr"></span><span class="scr bl"></span><span class="scr br"></span>
  <div class="plate">
    <div class="head">
      <!-- centaur emblem: rearing horse-archer in a gold medallion -->
      <svg class="emblem" viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <radialGradient id="med" cx="42%" cy="34%" r="72%">
            <stop offset="0" stop-color="#fdeeb0"/>
            <stop offset=".45" stop-color="#d9b357"/>
            <stop offset=".8" stop-color="#9c722a"/>
            <stop offset="1" stop-color="#5a3f12"/>
          </radialGradient>
          <linearGradient id="cent" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#3a2806"/>
            <stop offset="1" stop-color="#1a1205"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#med)" stroke="#5a3f12" stroke-width="2"/>
        <circle cx="50" cy="50" r="40" fill="none" stroke="#3a2806" stroke-width="1" opacity=".55"/>
        <!-- radiating mythic rays behind the centaur, animated -->
        <g class="rays" stroke="#fdeeb0" stroke-width="1" opacity=".35">
          <line x1="50" y1="50" x2="50" y2="14"/><line x1="50" y1="50" x2="76" y2="24"/>
          <line x1="50" y1="50" x2="86" y2="50"/><line x1="50" y1="50" x2="76" y2="76"/>
          <line x1="50" y1="50" x2="50" y2="86"/><line x1="50" y1="50" x2="24" y2="76"/>
          <line x1="50" y1="50" x2="14" y2="50"/><line x1="50" y1="50" x2="24" y2="24"/>
        </g>
        <!-- centaur: human torso drawing a bow atop a horse body -->
        <g fill="url(#cent)">
          <!-- horse body + rear legs rearing -->
          <path d="M30 64 q-4 8 -2 14 q1 3 4 2 q1 -6 4 -9 q3 8 2 11 q4 1 5 -2 q0 -6 -2 -11 l10 -2 q3 6 2 11 q4 1 5 -2 q0 -6 -3 -12 q9 -3 12 -11 q3 -7 -1 -13 q-5 4 -10 4 q-9 0 -16 4 q-9 5 -10 16z"/>
          <!-- human torso -->
          <path d="M55 40 q3 -7 9 -8 q5 -1 8 2 l-3 4 q-4 -2 -7 0 q-3 2 -3 7 q0 6 -3 11 q-4 -3 -5 -8 q-1 -5 4 -8z"/>
          <!-- head -->
          <circle cx="66" cy="29" r="5"/>
          <!-- bow + arrow -->
          <path d="M70 26 q12 4 9 18" fill="none" stroke="#3a2806" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="70" y1="27" x2="80" y2="42" stroke="#3a2806" stroke-width="1" />
          <line x1="62" y1="34" x2="86" y2="32" stroke="#1a1205" stroke-width="1.6" stroke-linecap="round"/>
        </g>
      </svg>
      <div class="title">
        <h1>MYTHIC DRIVE</h1>
        <div class="sub">Boutique&nbsp;&middot;&nbsp;Overdrive</div>
      </div>
    </div>
    <hr class="filigree">

    <div class="row" id="row"></div>

    <div class="foot">
      <span class="lamp"></span><b>HAND&middot;VOICED</b> transparent gold overdrive &middot; low-end preserved, treble alive
    </div>
  </div>
</div>

<script>
(function(){
  var PARAMS=[
    {name:"Gain",   index:0, min:0, max:1, def:0.5},
    {name:"Treble", index:1, min:0, max:1, def:0.5},
    {name:"Output", index:2, min:0, max:1, def:0.7},
    {name:"Mix",    index:3, min:0, max:1, def:0.6}
  ];
  var row=document.getElementById('row');

  function fmt(v){ return Math.round(v*100)+'%'; }

  function build(p,di){
    var cell=document.createElement('div');
    cell.className='cell'; cell.style.setProperty('--d',di+'ms');
    cell.innerHTML=
      '<div class="knob">'+
        '<i class="well"></i><i class="ticks"></i><i class="gauge"></i><i class="cap"></i>'+
        '<span class="bub"></span>'+
      '</div>'+
      '<div class="nm"></div><div class="val"></div>';
    cell.querySelector('.nm').textContent=p.name;
    row.appendChild(cell);

    var knob=cell.querySelector('.knob'),
        gauge=cell.querySelector('.gauge'),
        cap=cell.querySelector('.cap'),
        bub=cell.querySelector('.bub'),
        valEl=cell.querySelector('.val');
    var val=p.def;

    function norm(){ return (val-p.min)/((p.max-p.min)||1); }
    function paint(){
      var n=norm();
      gauge.style.setProperty('--n',n);
      cap.style.setProperty('--n',n);
      var t=fmt(n);
      valEl.textContent=t; bub.textContent=t;
      if(window.vstai&&window.vstai.setParam) window.vstai.setParam(p.index,val);
    }
    function setN(n){
      n=n<0?0:(n>1?1:n);
      val=p.min+(p.max-p.min)*n;
      paint();
    }

    var dy=0, n0=0;
    knob.addEventListener('pointerdown',function(e){
      knob._d=1; dy=e.clientY; n0=norm(); knob.classList.add('drag');
      knob.setPointerCapture(e.pointerId); e.preventDefault();
    });
    knob.addEventListener('pointermove',function(e){
      if(!knob._d) return;
      var fine=e.shiftKey?4:1;
      setN(n0+(dy-e.clientY)/(180*fine));
    });
    function end(){ knob._d=0; knob.classList.remove('drag'); }
    knob.addEventListener('pointerup',end);
    knob.addEventListener('pointercancel',end);
    knob.addEventListener('dblclick',function(){ val=p.def; paint(); });
    knob.addEventListener('wheel',function(e){
      e.preventDefault(); setN(norm()+(e.deltaY<0?0.02:-0.02));
    },{passive:false});

    paint();
  }

  function ready(){
    for(var i=0;i<PARAMS.length;i++) build(PARAMS[i], i*70);
  }
  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();
})();
</script>
</body>
</html>
