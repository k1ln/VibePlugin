<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whammy</title>
<style>
  :root{
    --accent:#ff3b5c; --accent2:#ff8a3b;
    --ink:#1a0d10; --steel:#cfd4da; --steel2:#9aa3ad;
    --panel:#181014;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;}
  body{
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(120% 90% at 50% -10%, #2a161c 0%, #120a0d 55%, #080506 100%);
    color:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;
  }
  .stage{
    width:540px;max-width:96vw;aspect-ratio:540/700;position:relative;
    perspective:1200px;
  }

  /* ---- pedal chassis ---- */
  .pedal{
    position:absolute;inset:0;border-radius:34px;
    background:linear-gradient(160deg,#ff5570 0%,var(--accent) 38%,#c41f3c 100%);
    box-shadow:
      0 38px 60px -18px rgba(0,0,0,.75),
      inset 0 2px 0 rgba(255,255,255,.35),
      inset 0 -10px 28px rgba(0,0,0,.45);
    overflow:hidden;
  }
  .pedal::before{ /* brushed sheen */
    content:"";position:absolute;inset:0;border-radius:34px;
    background:repeating-linear-gradient(115deg,rgba(255,255,255,.05) 0 2px,transparent 2px 5px);
    mix-blend-mode:overlay;opacity:.6;pointer-events:none;
  }
  .screw{position:absolute;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#8a8f96 60%,#4a4d52);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.5);}
  .screw::after{content:"";position:absolute;inset:4px;border-top:2px solid rgba(0,0,0,.45);transform:rotate(35deg);}
  .screw.tl{top:16px;left:16px}.screw.tr{top:16px;right:16px}
  .screw.bl{bottom:16px;left:16px}.screw.br{bottom:16px;right:16px}

  .brand{position:absolute;top:22px;left:0;right:0;text-align:center;
    font-weight:800;letter-spacing:.42em;font-size:13px;color:#2a0c12;
    text-shadow:0 1px 0 rgba(255,255,255,.35);text-indent:.42em;}
  .sub{position:absolute;top:42px;left:0;right:0;text-align:center;
    font-size:9px;letter-spacing:.3em;color:rgba(40,8,14,.7);text-indent:.3em;}

  /* ---- top control deck ---- */
  .deck{
    position:absolute;top:62px;left:26px;right:26px;height:188px;
    border-radius:20px;
    background:linear-gradient(180deg,#241319,#150b0f);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.7),inset 0 -1px 0 rgba(255,255,255,.05),0 2px 0 rgba(255,120,140,.25);
    padding:14px 16px;
  }

  /* pitch-bend ribbon (animated) */
  .ribbon{position:relative;height:54px;border-radius:11px;overflow:hidden;
    background:#0c0709;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06),inset 0 6px 16px rgba(0,0,0,.8);}
  .ribbon svg{position:absolute;inset:0;width:100%;height:100%;}
  .grid line{stroke:rgba(255,255,255,.05);stroke-width:1;}
  .wave{fill:none;stroke:url(#g1);stroke-width:2.4;filter:drop-shadow(0 0 5px var(--accent));}
  .scan{position:absolute;top:0;bottom:0;width:2px;left:0;
    background:linear-gradient(var(--accent2),transparent);opacity:.8;
    box-shadow:0 0 10px var(--accent2);animation:scan 2.4s linear infinite;}
  @keyframes scan{from{left:-2%}to{left:102%}}
  .note{position:absolute;font-size:9px;color:var(--accent2);font-weight:700;
    top:4px;right:8px;letter-spacing:.08em;text-shadow:0 0 6px var(--accent2);}

  /* knob row */
  .knobs{display:flex;justify-content:space-around;margin-top:14px;}
  .ctrl{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .knob{width:64px;height:64px;position:relative;cursor:ns-resize;touch-action:none;}
  .knob .ring{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 220deg,var(--accent) 0deg,var(--accent2) var(--deg,180deg),#2a1b20 var(--deg,180deg) 280deg,#2a1b20 360deg);
    -webkit-mask:radial-gradient(circle,transparent 56%,#000 57%);
            mask:radial-gradient(circle,transparent 56%,#000 57%);
    filter:drop-shadow(0 0 6px rgba(255,59,92,.35));}
  .knob .cap{position:absolute;inset:9px;border-radius:50%;
    background:radial-gradient(circle at 38% 30%,#3a262c,#140c0f 72%);
    box-shadow:0 4px 8px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.12);}
  .knob .ptr{position:absolute;left:50%;top:11px;width:3px;height:18px;border-radius:2px;
    background:linear-gradient(var(--accent2),var(--accent));transform-origin:50% 21px;
    transform:translateX(-50%) rotate(var(--rot,0deg));box-shadow:0 0 6px var(--accent2);}
  .lab{font-size:10px;letter-spacing:.18em;color:#e9c2c8;font-weight:700;}
  .val{font-size:10px;color:var(--accent2);font-variant-numeric:tabular-nums;min-height:12px;font-weight:700;}

  /* mode switch */
  .modewrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .modes{display:flex;gap:4px;background:#0c0709;border-radius:9px;padding:4px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06),inset 0 4px 10px rgba(0,0,0,.7);}
  .mbtn{font-size:9px;font-weight:800;letter-spacing:.06em;color:#7a5b61;
    padding:6px 7px;border-radius:6px;cursor:pointer;transition:.18s;min-width:34px;text-align:center;}
  .mbtn.on{color:#1a0d10;background:linear-gradient(var(--accent2),var(--accent));
    box-shadow:0 0 10px rgba(255,59,92,.6),inset 0 1px 0 rgba(255,255,255,.4);}

  /* ---- rocking treadle ---- */
  .treadle-zone{position:absolute;left:26px;right:26px;top:268px;bottom:30px;
    border-radius:24px;background:linear-gradient(180deg,#160c10,#0a0507);
    box-shadow:inset 0 4px 12px rgba(0,0,0,.8);overflow:hidden;cursor:ns-resize;touch-action:none;}
  .hinge{position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:60%;height:8px;border-radius:5px;
    background:linear-gradient(var(--steel),var(--steel2));box-shadow:0 2px 4px rgba(0,0,0,.6);}
  .treadle{position:absolute;left:7%;right:7%;top:18px;bottom:14px;border-radius:16px;
    transform-origin:50% 0%;transform:rotateX(var(--tilt,38deg));
    transition:transform .08s ease-out;
    background:linear-gradient(180deg,#ff5570,#d8243f 60%,#9a1730);
    box-shadow:0 -10px 26px -6px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.4),inset 0 -16px 30px rgba(0,0,0,.5);}
  /* chrome footplate ridges */
  .plate{position:absolute;inset:10px 14px;border-radius:10px;
    background:repeating-linear-gradient(180deg,#e8edf2 0 5px,#aab1ba 5px 10px);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.25),inset 0 2px 4px rgba(255,255,255,.6);}
  .plate::after{content:"";position:absolute;inset:0;border-radius:10px;
    background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);
    background-size:300% 100%;animation:shine 3.4s ease-in-out infinite;}
  @keyframes shine{0%,100%{background-position:120% 0}50%{background-position:-40% 0}}
  .toe{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:8px;
    letter-spacing:.3em;color:rgba(20,6,10,.8);font-weight:800;text-indent:.3em;}
  /* pedal glow that intensifies with toe */
  .glow{position:absolute;left:7%;right:7%;bottom:14px;height:30px;border-radius:0 0 16px 16px;
    background:radial-gradient(80% 140% at 50% 100%,rgba(255,138,59,var(--g,.5)),transparent 70%);
    filter:blur(6px);pointer-events:none;transition:opacity .1s;}
  .heeltoe{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:30px;font-size:8px;color:#6b4b51;
    letter-spacing:.15em;font-weight:700;text-align:right;}

  .readout{position:absolute;left:50%;bottom:38px;transform:translate(-50%,0);
    font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--accent2);
    text-shadow:0 0 10px var(--accent2);font-variant-numeric:tabular-nums;pointer-events:none;}
  .hint{position:absolute;left:0;right:0;bottom:8px;text-align:center;font-size:8px;
    letter-spacing:.18em;color:rgba(255,255,255,.28);}
</style>
</head>
<body>
  <div class="stage">
    <div class="pedal">
      <span class="screw tl"></span><span class="screw tr"></span>
      <span class="screw bl"></span><span class="screw br"></span>
      <div class="brand">WHAMMY</div>
      <div class="sub">EXTREME PITCH</div>

      <div class="deck">
        <div class="ribbon">
          <svg viewBox="0 0 320 54" preserveAspectRatio="none">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#ff3b5c"/><stop offset="1" stop-color="#ff8a3b"/>
              </linearGradient>
            </defs>
            <g class="grid">
              <line x1="0" y1="27" x2="320" y2="27"/>
              <line x1="0" y1="13" x2="320" y2="13"/>
              <line x1="0" y1="41" x2="320" y2="41"/>
            </g>
            <path class="wave" id="wave" d=""/>
          </svg>
          <div class="scan"></div>
          <div class="note" id="note">+12 st</div>
        </div>

        <div class="knobs">
          <div class="ctrl">
            <div class="knob" id="k0" title="Pitch"><div class="ring"></div><div class="cap"></div><div class="ptr"></div></div>
            <div class="lab">PITCH</div><div class="val" id="v0"></div>
          </div>
          <div class="modewrap">
            <div class="modes" id="modes">
              <div class="mbtn" data-m="0">UP</div>
              <div class="mbtn" data-m="1">DOWN</div>
              <div class="mbtn" data-m="2">DUAL</div>
            </div>
            <div class="lab">MODE</div><div class="val" id="v2"></div>
          </div>
          <div class="ctrl">
            <div class="knob" id="k3" title="Mix"><div class="ring"></div><div class="cap"></div><div class="ptr"></div></div>
            <div class="lab">MIX</div><div class="val" id="v3"></div>
          </div>
        </div>
      </div>

      <div class="treadle-zone" id="pedalZone">
        <div class="hinge"></div>
        <div class="glow" id="glow"></div>
        <div class="treadle" id="treadle">
          <div class="plate"></div>
          <div class="toe">TOE</div>
        </div>
        <div class="heeltoe"><span>TOE</span><span>HEEL</span></div>
        <div class="readout" id="ro">+12 st</div>
        <div class="hint">DRAG TREADLE · DOUBLE-CLICK TO RESET</div>
      </div>
    </div>
  </div>

<script>
(function(){
  // ---- host bridge ----
  var host = (window.vstai && typeof window.vstai.setParam==="function") ? window.vstai : null;
  function send(i,v){ if(host) try{host.setParam(i,v);}catch(e){} }

  // param defs: index, min, max, default
  var P = {
    pitch:{i:0,min:-24,max:24,def:12,v:12},
    pedal:{i:1,min:0,max:1,def:1,v:1},
    mode: {i:2,min:0,max:2,def:0,v:0},
    mix:  {i:3,min:0,max:1,def:1,v:1}
  };

  // ---------- KNOBS (Pitch, Mix) ----------
  function bindKnob(el, p, fmt){
    var range=p.max-p.min;
    function paint(){
      var t=(p.v-p.min)/range;            // 0..1
      var deg=t*280;                       // ring sweep
      el.querySelector('.ring').style.setProperty('--deg',deg+'deg');
      el.querySelector('.ptr').style.setProperty('--rot',(-140+t*280)+'deg');
    }
    function commit(){ send(p.i,p.v); paint(); fmt(); }
    var drag=false,sy=0,sv=0;
    function down(e){drag=true;sy=(e.touches?e.touches[0].clientY:e.clientY);sv=p.v;e.preventDefault();}
    function move(e){ if(!drag)return;
      var y=(e.touches?e.touches[0].clientY:e.clientY);
      p.v=clamp(sv+(sy-y)/180*range, p.min,p.max); commit();
    }
    function up(){drag=false;}
    el.addEventListener('mousedown',down); el.addEventListener('touchstart',down,{passive:false});
    window.addEventListener('mousemove',move); window.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
    el.addEventListener('dblclick',function(){p.v=p.def;commit();});
    el.addEventListener('wheel',function(e){e.preventDefault();
      p.v=clamp(p.v - Math.sign(e.deltaY)*range*0.03, p.min,p.max); commit();},{passive:false});
    p._paint=function(){commit();};
  }
  function clamp(x,a,b){return x<a?a:(x>b?b:x);}

  bindKnob(document.getElementById('k0'),P.pitch,function(){
    var s=(P.pitch.v>=0?'+':'')+Math.round(P.pitch.v);
    document.getElementById('v0').textContent=s+' st';
    document.getElementById('note').textContent=s+' st';
    drawWave();
  });
  bindKnob(document.getElementById('k3'),P.mix,function(){
    document.getElementById('v3').textContent=Math.round(P.mix.v*100)+'%';
  });

  // ---------- MODE switch ----------
  var MODES=['UP','DOWN','DUAL'];
  var modeBtns=document.querySelectorAll('#modes .mbtn');
  function paintMode(){
    modeBtns.forEach(function(b){ b.classList.toggle('on', +b.dataset.m===Math.round(P.mode.v)); });
    document.getElementById('v2').textContent=MODES[Math.round(P.mode.v)];
    drawWave();
  }
  modeBtns.forEach(function(b){
    b.addEventListener('click',function(){ P.mode.v=+b.dataset.m; send(P.mode.i,P.mode.v); paintMode(); });
  });

  // ---------- TREADLE (Pedal) ----------
  var zone=document.getElementById('pedalZone'), treadle=document.getElementById('treadle'),
      glow=document.getElementById('glow'), ro=document.getElementById('ro');
  function paintPedal(){
    var p=P.pedal.v;                        // 0 heel .. 1 toe
    var tilt=38-p*36;                        // 38deg (up/heel) -> 2deg (down/toe)
    treadle.style.setProperty('--tilt',tilt+'deg');
    glow.style.setProperty('--g',(0.15+p*0.7).toFixed(2));
    glow.style.opacity=(0.3+p*0.7).toFixed(2);
    // live shifted-pitch readout = current target
    var dir=Math.round(P.mode.v);
    var mag=Math.abs(P.pitch.v)*p;
    var st = dir===1 ? -mag : (dir===2 ? P.pitch.v*p : mag);
    ro.textContent=(st>=0?'+':'')+st.toFixed(1)+' st';
  }
  var pdrag=false,py=0,pv=0;
  function pdown(e){pdrag=true;py=(e.touches?e.touches[0].clientY:e.clientY);pv=P.pedal.v;e.preventDefault();}
  function pmove(e){ if(!pdrag)return;
    var y=(e.touches?e.touches[0].clientY:e.clientY);
    P.pedal.v=clamp(pv+(py-y)/220,0,1); send(P.pedal.i,P.pedal.v); paintPedal();
  }
  function pup(){pdrag=false;}
  zone.addEventListener('mousedown',pdown); zone.addEventListener('touchstart',pdown,{passive:false});
  window.addEventListener('mousemove',pmove); window.addEventListener('touchmove',pmove,{passive:false});
  window.addEventListener('mouseup',pup); window.addEventListener('touchend',pup);
  zone.addEventListener('dblclick',function(){P.pedal.v=P.pedal.def;send(P.pedal.i,P.pedal.v);paintPedal();});

  // ---------- animated pitch-bend ribbon ----------
  var wavePath=document.getElementById('wave'), phase=0;
  function drawWave(){
    var dir=Math.round(P.mode.v);
    var bend=(P.pitch.v/24);               // -1..1
    var pts=[],W=320,H=54;
    for(var x=0;x<=W;x+=8){
      var u=x/W;
      // base ripple + a swooping bend curve shaped by mode
      var swoop = dir===2 ? Math.sin(u*Math.PI*2+phase)*0.5 : (dir===1? u : 1-u);
      var amp = 10 + 8*Math.abs(bend);
      var y = H/2 - bend*16*swoop + Math.sin(u*9+phase)*amp*0.25;
      pts.push(x.toFixed(1)+','+y.toFixed(1));
    }
    wavePath.setAttribute('d','M'+pts.join(' L'));
  }
  function loop(){ phase+=0.06; drawWave(); requestAnimationFrame(loop); }

  // ---------- init ----------
  function init(){
    P.pitch._paint(); P.mix._paint(); paintMode(); paintPedal();
    // push every default to host
    send(P.pitch.i,P.pitch.v); send(P.pedal.i,P.pedal.v);
    send(P.mode.i,P.mode.v);  send(P.mix.i,P.mix.v);
    loop();
  }
  if(host && typeof host.onReady==="function") host.onReady(init); else init();
})();
</script>
</body>
</html>
