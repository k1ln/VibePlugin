  <title>Phase Synth — test bench</title><style>
  :root{--ac:#6affb0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}

  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}

  button.off{background:#28313f;color:#e7eef6}

  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Phase Synth<\/title>\n<style>\n  :root{\n    --acc:#6affb0;\n    --acc2:#54d1ff;\n    --lcd:#0a2a14;\n    --lcd-grid:rgba(106,255,176,.10);\n    --case0:#11151a;\n    --case1:#1c232b;\n    --case2:#2a333d;\n    --case3:#3c4854;\n    --ink:#070a0c;\n    --label:#aebac4;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}\n  html,body{height:100%}\n  body{\n    background:radial-gradient(130% 100% at 50% -20%, #232d36 0%, #131920 48%, #080b0e 100%);\n    color:#e8eef2;\n    font-family:\"Helvetica Neue\",Arial,sans-serif;\n    overflow:hidden;\n    display:flex;align-items:center;justify-content:center;\n    letter-spacing:.03em;\n  }\n\n  /* ============ CHASSIS ============ */\n  .unit{\n    position:relative;\n    width:780px;height:452px;\n    border-radius:16px;\n    padding:16px 20px 18px;\n    background:\n      linear-gradient(180deg,#3c4854 0%,#2a333d 5%,#1c232b 8%,#222a32 50%,#171d24 93%,#0d1116 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.10) inset,\n      0 -3px 8px rgba(0,0,0,.6) inset,\n      0 34px 70px rgba(0,0,0,.7),\n      0 2px 0 #05080a;\n    overflow:hidden;\n  }\n  /* dotted ABS plastic texture */\n  .unit::before{\n    content:\"\";position:absolute;inset:0;border-radius:16px;pointer-events:none;\n    background-image:radial-gradient(rgba(255,255,255,.025) 1px,transparent 1px);\n    background-size:4px 4px;opacity:.6;mix-blend-mode:overlay;\n  }\n  /* angled top stripe (the classic deck color band) */\n  .unit::after{\n    content:\"\";position:absolute;left:0;right:0;top:0;height:7px;pointer-events:none;\n    background:linear-gradient(90deg,var(--acc2),var(--acc));\n    box-shadow:0 0 14px rgba(106,255,176,.55);\n  }\n\n  /* ============ TOP BAR ============ */\n  .topbar{display:flex;align-items:center;justify-content:space-between;height:34px;margin-bottom:10px}\n  .brand{display:flex;align-items:baseline;gap:10px}\n  .logo{\n    font-weight:800;font-size:19px;letter-spacing:.16em;\n    color:#eef4f7;text-shadow:0 1px 0 #000;\n  }\n  .logo b{color:var(--acc)}\n  .sub{font-size:9px;letter-spacing:.34em;color:var(--label);opacity:.7}\n  .modeltag{\n    font-size:9px;letter-spacing:.26em;color:#0a0d0f;\n    background:linear-gradient(180deg,var(--acc),var(--acc2));\n    padding:4px 9px;border-radius:3px;font-weight:700;\n    box-shadow:0 0 10px rgba(84,209,255,.4),0 1px 0 rgba(255,255,255,.5) inset;\n  }\n\n  /* ============ LAYOUT ============ */\n  .main{display:flex;gap:16px;height:330px}\n\n  /* ---- LCD ---- */\n  .lcdwrap{\n    flex:1;position:relative;border-radius:8px;\n    padding:9px;\n    background:linear-gradient(180deg,#05140b,#04210f);\n    box-shadow:\n      0 0 0 2px #0a0d0f,\n      0 0 0 4px #2a333d,\n      0 6px 18px rgba(0,0,0,.6) inset,\n      0 0 22px rgba(106,255,176,.10);\n  }\n  .lcd{position:relative;width:100%;height:100%;border-radius:5px;overflow:hidden;\n    background:radial-gradient(120% 130% at 50% 0%, #0d3a1d 0%, #082813 55%, #051d0d 100%);}\n  /* scanlines + flicker */\n  .lcd::before{\n    content:\"\";position:absolute;inset:0;pointer-events:none;z-index:5;\n    background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px);\n    animation:flick 5.5s steps(60) infinite;\n  }\n  @keyframes flick{0%,97%{opacity:.55}98%{opacity:.38}100%{opacity:.55}}\n  /* glass glare */\n  .lcd::after{\n    content:\"\";position:absolute;inset:0;pointer-events:none;z-index:6;border-radius:5px;\n    background:linear-gradient(135deg,rgba(255,255,255,.10) 0%,transparent 32%);\n  }\n  .scope{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2}\n  .lcdhud{position:absolute;z-index:4;font-family:\"Courier New\",monospace;color:var(--acc);\n    text-shadow:0 0 6px rgba(106,255,176,.7)}\n  .hud-tl{top:8px;left:10px;font-size:10px;letter-spacing:.18em}\n  .hud-tr{top:8px;right:10px;font-size:10px;letter-spacing:.18em;text-align:right;color:var(--acc2);text-shadow:0 0 6px rgba(84,209,255,.7)}\n  .hud-bl{bottom:8px;left:10px;font-size:22px;font-weight:700;letter-spacing:.06em}\n  .hud-bl small{font-size:10px;opacity:.7;letter-spacing:.2em}\n  .hud-br{bottom:9px;right:10px;font-size:9px;letter-spacing:.2em;opacity:.6}\n  .waveword{display:inline-block;min-width:64px}\n\n  /* ============ RIGHT: KNOB GRID ============ */\n  .panel{width:300px;display:flex;flex-direction:column;gap:12px}\n  .rack{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 6px}\n  .cell{display:flex;flex-direction:column;align-items:center;gap:3px}\n  .knob{width:70px;height:70px;cursor:ns-resize;position:relative}\n  .knob svg{display:block;width:100%;height:100%;overflow:visible}\n  .knob.dragging .cap{filter:brightness(1.18)}\n  .label{font-size:8.5px;letter-spacing:.16em;color:var(--label);text-transform:uppercase}\n  .vbox{font-family:\"Courier New\",monospace;font-size:10px;color:var(--acc);\n    background:#0a0d0f;border:1px solid #2a333d;border-radius:3px;padding:1px 6px;min-width:48px;text-align:center;\n    box-shadow:0 1px 2px rgba(0,0,0,.5) inset}\n  .knob.dragging + .vbox, .cell:hover .vbox{color:var(--acc2);border-color:var(--acc2)}\n\n  /* ============ MEMBRANE BUTTON STRIP ============ */\n  .membrane{\n    display:flex;gap:6px;padding:9px;border-radius:7px;\n    background:linear-gradient(180deg,#0e1216,#171d23);\n    box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 4px 10px rgba(0,0,0,.5) inset;\n  }\n  .mbtn{\n    flex:1;height:36px;border-radius:4px;cursor:pointer;position:relative;\n    background:linear-gradient(180deg,#2c353f,#1a2128);\n    box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 2px 4px rgba(0,0,0,.5);\n    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;\n    transition:transform .05s eas ute(\"stroke\",ACC); glow.setAttribute(\"stroke-width\",\"2\");\n    glow.setAttribute(\"stroke-linecap\",\"round\"); glow.setAttribute(\"filter\",\"url(#kblur)\"); glow.setAttribute(\"opacity\",\".8\"); svg.appendChild(glow);\n\n    var track=document.createElementNS(ns,\"path\");\n    track.setAttribute(\"d\",arc(start,end,r)); track.setAttribute(\"fill\",\"none\");\n    track.setAttribute(\"stroke\",\"#0b0f12\"); track.setAttribute(\"stroke-width\",\"3.4\");\n    track.setAttribute(\"stroke-linecap\",\"round\"); svg.appendChild(track);\n\n    var val=document.createElementNS(ns,\"path\"); val.setAttribute(\"fill\",\"none\");\n    val.setAttribute(\"stroke\",\"url(#grad)\"); val.setAttribute(\"stroke-width\",\"3.4\");\n    val.setAttribute(\"stroke-linecap\",\"round\"); svg.appendChild(val);\n\n    var cap=document.createElementNS(ns,\"circle\"); cap.setAttribute(\"class\",\"cap\");\n    cap.setAttribute(\"cx\",cx); cap.setAttribute(\"cy\",cy); cap.setAttribute(\"r\",\"15.5\");\n    cap.setAttribute(\"fill\",\"url(#cap)\"); cap.setAttribute(\"stroke\",\"#222a32\"); cap.setAttribute(\"stroke-width\",\"1\"); svg.appendChild(cap);\n\n    var notch=document.createElementNS(ns,\"line\");\n    notch.setAttribute(\"stroke\",ACC); notch.setAttribute(\"stroke-width\",\"2.6\");\n    notch.setAttribute(\"stroke-linecap\",\"round\"); notch.setAttribute(\"filter\",\"url(#nglow)\"); svg.appendChild(notch);\n\n    knob.appendChild(svg);\n    cell.appendChild(knob); cell.appendChild(lab); cell.appendChild(vbox);\n    rack.appendChild(cell);\n\n    var cur=p.def;\n    function render(){\n      var n=(cur-p.min)/(p.max-p.min);\n      var ang=start+n*(end-start);\n      var a1=n<=0.0001?start+0.001:ang;\n      val.setAttribute(\"d\", arc(start,a1,r));\n      glow.setAttribute(\"d\", arc(start,a1,r+4));\n      var inner=pt(ang,5.5), outer=pt(ang,14);\n      notch.setAttribute(\"x1\",inner[0]); notch.setAttribute(\"y1\",inner[1]);\n      notch.setAttribute(\"x2\",outer[0]); notch.setAttribute(\"y2\",outer[1]);\n      vbox.textContent=fmtVal(p,cur);\n      STATE[p.index]=cur;\n    }\n    function setVal(v,push){ cur=clamp(v,p.min,p.max); render(); if(push) send(p.index,cur); }\n    render();\n\n    var dragging=false,startY=0,startV=0;\n    function onMove(e){\n      if(!dragging)return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      var dy=startY-y, span=p.max-p.min, fine=e.shiftKey?0.25:1;\n      setVal(startV+dy/170*span*fine,true); e.preventDefault();\n    }\n    function onUp(){ if(!dragging)return; dragging=false; knob.classList.remove(\"dragging\");\n      window.removeEventListener(\"pointermove\",onMove); window.removeEventListener(\"pointerup\",onUp); }\n    knob.addEventListener(\"pointerdown\",function(e){\n      dragging=true; knob.classList.add(\"dragging\"); startY=e.clientY; startV=cur;\n      window.addEventListener(\"pointermove\",onMove); window.addEventListener(\"pointerup\",onUp); e.preventDefault();\n    });\n    knob.addEventListener(\"dblclick\",function(e){ setVal(p.def,true); e.preventDefault(); });\n    knob.addEventListener(\"wheel\",function(e){ setVal(cur-Math.sign(e.deltaY)*(p.max-p.min)*0.02,true); e.preventDefault(); },{passive:false});\n\n    return {set:setVal,get:function(){return cur;}};\n  }\n  var knobs=PARAMS.map(buildKnob);\n\n  // ===================== MEMBRANE BUTTONS (preset waveshapes) =====================\n  // Decorative tactile pad row that snaps the Shape control to characteristic\n  // phase-distortion waveshapes — wires to the real Shape param (index 0).\n  var membrane=document.getElementById(\"membrane\");\n  var WAVES=[\n    {mt:\"SINE\",  shape:0.0},\n    {mt:\"SAW\",   shape:0.42},\n    {mt:\"SQR\",   shape:0.66},\n    {mt:\"RESO 1\",shape:0.82},\n    {mt:\"RESO 2\",shape:1.0}\n  ];\n  var mbtns=[];\n  WAVES.forEach(function(w,i){\n    var b=document.createElement(\"div\"); b.className=\"mbtn\";\n    var dot=document.createElement(\"div\"); dot.className=\"dot\";\n    var t=document.createElement(\"div\"); t.className=\"mt\"; t.textContent=w.mt;\n    b.appendChild(dot); b.appendChild(t); membrane.appendChild(b); mbtns.push(b);\n    b.addEventListener(\"click\",function(){\n      knobs[0].set(w.shape,true);\n      refreshMembrane();\n    });\n  });\n  function refreshMembrane(){\n    var s=STATE[0];\n    // light the closest waveshape pad\n    var best=0,bd=1e9;\n    WAVES.forEach(function(w,i){ var d=Math.abs(w.shape-s); if(d<bd){bd=d;best=i;} });\n    mbtns.forEach(function(b,i){ b.classList.toggle(\"on\", i===best); });\n  }\n\n  // ===================== LCD ANIMATION =====================\n  var scope=document.getElementById(\"scope\");\n  var sx=scope.getContext(\"2d\");\n  var W=scope.width,H=scope.height;\n  var waveWord=document.getElementById(\"waveWord\");\n  var hudWave=document.getElementById(\"hudWave\");\n  var hudTL=document.getElementById(\"hudTL\");\n  var hudBR=document.getElementById(\"hudBR\");\n\n  function pad3(v){return (\"00\"+Math.round(v*100)).slice(-3);}\n\n  // phase-distortion phase warp (mirrors the DSP feel)\n  function pdWarp(p,d,knee){\n    var k=0.5+(knee-0.5)*d; if(k<0.02)k=0.02; if(k>0.98)k=0.98;\n    return p<k ? 0.5*(p/k) : 0.5+0.5*((p-k)/(1-k));\n  }\n\n  // simulated DCW envelope that re-triggers on a slow musical clock for life\n  var t0=performance.now(), trig=0, dcwEnv=1;\n  function loop(now){\n    var dt=(now-t0)/1000; t0=now;\n\n    var shape=STATE[0], dcwAmt=STATE[1], dcwDec=STATE[2], detune=STATE[5], level=STATE[6];\n\n    // auto re-trigger DCW so the LCD breathes like a played note\n    var decS=0.05+dcwDec*2.2;\n    dcwEnv*=Math.exp(-dt/decS);\n    trig+=dt;\n    if(trig> (0.7+dcwDec*1.4)){ trig=0; dcwEnv=1; }\n\n    var d = shape*0.35 + dcwAmt*dcwEnv; if(d>1)d=1;\n    var knee=0.5+shape*0.42;\n    var reso=shape*shape, resoMult=1+shape*6;\n\n    // HUD\n    waveWord.textContent = fmtVal(PARAMS[0],shape);\n    hudWave.textContent=\"SHAPE \"+pad3(shape);\n    var bars=Math.round(dcwEnv*7);\n    hudTL.textContent=\"DCW \"+(\"███████\".slice(0,bars)+\"───────\".slice(0,7-bars));\n    hudBR.textContent=(detune>0.01?\"DET \"+Math.round(detune*12)+\"c\":\"48kHz\")+\" · 16BIT\";\n\n    // ---- draw ----\n    sx.clearRect(0,0,W,H);\n\n    // faint grid\n    sx.strokeStyle=\"rgba(106,255,176,.10)\"; sx.lineWidth=1;\n    for(var gx=0;gx<=W;gx+=W/16){ sx.beginPath(); sx.moveTo(gx,0); sx.lineTo(gx,H); sx.stroke(); }\n    for(var gy=0;gy<=H;gy+=H/8){ sx.beginPath(); sx.moveTo(0,gy); sx.lineTo(W,gy); sx.stroke(); }\n    // center line\n    sx.strokeStyle=\"rgba(106,255,176,.22)\"; sx.beginPath(); sx.moveTo(0,H/2); sx.lineTo(W,H/2); sx.stroke();\n\n    // scroll offset so it feels alive\n    var scroll=(now/1000*0.35)%1;\n    var cycles=3;\n\n    // ghost (previous) trace in dim accent2\n    function trace(phaseOff,style,lw,glowc,blur,scaleY){\n      sx.beginPath();\n      for(var x=0;x<=W;x+=2){\n        var u=(x/W);\n        var p=((u*cycles)+phaseOff)%1;\n        var wa=pdWarp(p,d,knee);\n        var s=Math.sin(wa*Math.PI*2);\n        if(reso>0.001){\n          var win=1-p;\n          var rr=Math.sin(wa*Math.PI*2*resoMult)*win;\n          var rg=reso*(0.4+0.6*d);\n          s=s*(1-rg)+rr*rg;\n        }\n        var y=H/2 - s*(H*scaleY)*(0.5+level*0.5);\n        if(x===0) sx.moveTo(x,y); else sx.lineTo(x,y);\n      }\n      sx.strokeStyle=style; sx.lineWidth=lw;\n      sx.shadowColor=glowc; sx.shadowBlur=blur; sx.stroke(); sx.shadowBlur=0;\n    }\n\n    // detune ghost behind (slightly phase-shifted, cyan)\n    if(detune>0.01) trace(scroll+0.02+detune*0.05,\"rgba(84,209,255,.45)\",2,ACC2,6,0.40);\n    // main bright-green trace\n    trace(scroll,ACC,3,ACC,12,0.42);\n\n    // moving sweep highlight\n    var hp=((now/1000*0.5)%1)*W;\n    var g=sx.createLinearGradient(hp-40,0,hp+40,0);\n    g.addColorStop(0,\"rgba(106,255,176,0)\"); g.addColorStop(.5,\"rgba(106,255,176,.10)\"); g.addColorStop(1,\"rgba(106,255,176,0)\");\n    sx.fillStyle=g; sx.fillRect(hp-40,0,8   var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
