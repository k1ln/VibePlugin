  <title>Bus Glue — test bench</title><style>
  :root{--ac:#c0c8d0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Bus Glue</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Bus Glue<\/title>\n<style>\n  :root{\n    --accent:#c0c8d0;\n    --accent2:#9aa6b4;\n    --panel:#3a3d42;\n    --panel-hi:#4a4e54;\n    --panel-lo:#2a2c30;\n    --ink:#d8dde3;\n    --ink-dim:#8b9298;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{height:100%;}\n  body{\n    font-family:\"Helvetica Neue\",Arial,sans-serif;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #43474d 0%, #2e3034 55%, #232528 100%);\n    color:var(--ink);\n    display:flex;align-items:center;justify-content:center;\n    padding:18px;overflow:hidden;-webkit-font-smoothing:antialiased;\n  }\n\n  /* ---------- console chassis ---------- */\n  .unit{\n    width:560px;max-width:100%;\n    border-radius:14px;\n    background:linear-gradient(180deg,var(--panel-hi),var(--panel) 18%,var(--panel) 82%,var(--panel-lo));\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.10) inset,\n      0 -2px 0 rgba(0,0,0,.45) inset,\n      0 22px 50px rgba(0,0,0,.55),\n      0 2px 4px rgba(0,0,0,.4);\n    padding:18px 20px 22px;\n    position:relative;\n    border:1px solid rgba(0,0,0,.45);\n  }\n  /* rack screws */\n  .screw{position:absolute;width:13px;height:13px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#6a6e74,#34363a 70%,#1c1d20);\n    box-shadow:0 1px 1px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4) inset;}\n  .screw::after{content:\"\";position:absolute;inset:3px;border-top:1px solid rgba(0,0,0,.55);\n    transform:rotate(28deg);}\n  .screw.tl{top:9px;left:9px}.screw.tr{top:9px;right:9px}\n  .screw.bl{bottom:9px;left:9px}.screw.br{bottom:9px;right:9px}\n\n  .brand{\n    display:flex;align-items:baseline;justify-content:space-between;\n    padding:0 6px 12px;border-bottom:1px solid rgba(0,0,0,.35);\n    margin-bottom:14px;\n  }\n  .brand h1{\n    font-size:15px;let 9\" text-anchor=\"middle\" font-family=\"Helvetica,Arial\" letter-spacing=\"2\">GAIN REDUCTION<\/text>\n          <!-- needle -->\n          <g id=\"needle\">\n            <line x1=\"150\" y1=\"138\" x2=\"150\" y2=\"34\" stroke=\"#23252a\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>\n            <circle cx=\"150\" cy=\"138\" r=\"7\" fill=\"#23252a\"/>\n            <circle cx=\"150\" cy=\"138\" r=\"3\" fill=\"#54585e\"/>\n          <\/g>\n        <\/svg>\n        <div class=\"glass\"><\/div>\n        <div class=\"gr-num\" id=\"grNum\">−0.0 dB<\/div>\n        <div class=\"label\">VU · dB<\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"row\" id=\"row\">\n      <div class=\"cell\">\n        <div class=\"knob\" id=\"k0\" data-idx=\"0\"><div class=\"face\"><\/div><div class=\"grip\"><\/div><\/div>\n        <div class=\"cap\">Threshold<\/div><div class=\"val\" id=\"v0\"><\/div>\n      <\/div>\n\n      <div class=\"ratio-cell\">\n        <div class=\"switch\" id=\"ratio\">\n          <button data-v=\"0\">2 : 1<\/button>\n          <button data-v=\"1\">4 : 1<\/button>\n          <button data-v=\"2\">10 : 1<\/button>\n        <\/div>\n        <div class=\"cap\">Ratio<\/div><div class=\"val\" id=\"v1\"><\/div>\n      <\/div>\n\n      <div class=\"cell\">\n        <div class=\"knob\" id=\"k2\" data-idx=\"2\"><div class=\"face\"><\/div><div class=\"grip\"><\/div><\/div>\n        <div class=\"cap\">Attack<\/div><div class=\"val\" id=\"v2\"><\/div>\n      <\/div>\n      <div class=\"cell\">\n        <div class=\"knob\" id=\"k3\" data-idx=\"3\"><div class=\"face\"><\/div><div class=\"grip\"><\/div><\/div>\n        <div class=\"cap\">Release<\/div><div class=\"val\" id=\"v3\"><\/div>\n      <\/div>\n      <div class=\"cell\">\n        <div class=\"knob\" id=\"k4\" data-idx=\"4\"><div class=\"face\"><\/div><div class=\"grip\"><\/div><\/div>\n        <div class=\"cap\">Makeup<\/div><div class=\"val\" id=\"v4\"><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"hint\">Drag knobs · double-click to reset · click ratio to switch<\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- host bridge -------------------------------------------------\n  function host(){ return (typeof window!==\"undefined\" && window.vstai) ? window.vstai : null; }\n  function send(idx,val){ const h=host(); if(h && typeof h.setParam===\"function\") h.setParam(idx, val); }\n\n  // ---- param model -------------------------------------------------\n  // (min,max,default,fmt) — Ratio handled separately as a stepped switch\n  var P = {\n    0:{def:0.45, fmt:function(v){ return (-40*v).toFixed(1)+\" dB\"; }},\n    2:{def:0.40, fmt:function(v){ var ms=30*Math.pow(0.0033333,v); return ms.toFixed(ms<1?2:1)+\" ms\"; }},\n    3:{def:0.50, fmt:function(v){ if(v>0.92) return \"AUTO\"; return (0.1+v*1.1).toFixed(2)+\" s\"; }},\n    4:{def:0.30, fmt:function(v){ return \"+\"+(24*v).toFixed(1)+\" dB\"; }}\n  };\n  var state = {0:0.45, 1:1, 2:0.40, 3:0.50, 4:0.30};\n\n  // sweep -135deg..+135deg for the knob grip\n  function knobAngle(v){ return (-135 + v*270); }\n\n  function paintKnob(idx){\n    var k=document.getElementById(\"k\"+idx);\n    if(k) k.style.setProperty(\"--ang\", knobAngle(state[idx])+\"deg\");\n    var vEl=document.getElementById(\"v\"+idx);\n    if(vEl && P[idx]) vEl.textContent = P[idx].fmt(state[idx]);\n  }\n\n  function setParam(idx,val,silent){\n    val = Math.max(0, Math.min(1, val));\n    state[idx]=val;\n    paintKnob(idx);\n    if(!silent) send(idx, val);\n  }\n\n  // ---- continuous knob drag ---------------------------------------\n  function wireKnob(idx){\n    var k=document.getElementById(\"k\"+idx);\n    if(!k) return;\n    var dragging=false, lastY=0;\n    function down(e){\n      dragging=true; lastY=(e.touches?e.touches[0].clientY:e.clientY);\n      k.style.cursor=\"grabbing\"; e.preventDefault();\n    }\n    function move(e){\n      if(!dragging) return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n ionFrame(tick);\n  }\n\n  // ---- init --------------------------------------------------------\n  function boot(){\n    [0,2,3,4].forEach(function(i){ wireKnob(i); });\n    // initialise to defaults and push to host\n    setParam(0, state[0]);\n    setRatio(state[1]);\n    setParam(2, state[2]);\n    setParam(3, state[3]);\n    setParam(4, state[4]);\n    // disable idle CSS sway once the live needle takes over\n    unit.classList.remove(\"idle\");\n    requestAnimationFrame(tick);\n  }\n\n  var h=host();\n  if(h && typeof h.onReady===\"function\"){ h.onReady(boot); }\n  else { boot(); }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
