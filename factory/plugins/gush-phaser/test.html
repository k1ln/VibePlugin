<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gush Phaser — test bench</title><style>
  :root{--ac:#5ad0ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Gush Phaser<\/title>\n<style>\n:root{\n  --cy:#5ad0ff; --mg:#ff5ad0;\n  --face1:#0b2c4a; --face2:#06192e;\n  --ink:#dff3ff;\n}\n*{box-sizing:border-box;-webkit-user-select:none;user-select:none}\nhtml,body{margin:0;height:100%}\nbody{\n  font:13px/1.3 ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:var(--ink);\n  background:radial-gradient(120% 90% at 50% -10%,#0a3357 0%,#04101e 60%,#020812 100%);\n  display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;\n}\n/* ===== PEDAL ===== */\n.pedal{\n  position:relative;width:340px;border-radius:26px;padding:22px 22px 26px;\n  background:\n    linear-gradient(160deg,#10416c 0%,#0a2c4c 38%,#072037 100%);\n  box-shadow:\n    0 30px 60px -18px rgba(0,0,0,.75),\n    0 2px 0 rgba(255,255,255,.10) inset,\n    0 -22px 50px -28px rgba(90,208,255,.5) inset;\n  border:1px solid rgba(120,210,255,.18);\n  overflow:hidden;\n}\n/* phthalo gloss sheen */\n.pedal::before{\n  content:\"\";position:absolute;inset:0;border-radius:26px;pointer-events:none;\n  background:\n    radial-gradient(70% 40% at 25% 8%,rgba(255,255,255,.22),transparent 60%),\n    radial-gradient(60% 50% at 90% 100%,rgba(255,90,208,.10),transparent 60%);\n  mix-blend-mode:screen;\n}\n/* corner bolts */\n.bolt{position:absolute;width:11px;height:11px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%,#cfe9ff,#3a6f94 60%,#173247);\n  box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.3)}\n.bolt.tl{top:10px;left:10px}.bolt.tr{top:10px;right:10px}\n.bolt.bl{bottom:10px;left:10px}.bolt.br{bottom:10px;right:10px}\n\n.brand{display:flex;align-items:baseline;gap:8px;justify-content:center;margin:2px 0 14px}\n.brand b{\n  font-size:22px;letter-spacing:.16em;font-weight:800;\n  background:linear-gradient(90deg,var(--cy),#bfe9ff 45%,var(--mg));\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 0 18px rgba(90,208,255,.25);\n}\n.brand span{font-size:9px;letter-spacing:.34em;color:#7fb6d8;text-transform:uppercase}\n\n/* ===== SPECTRUM / NOTCH WAVES ===== */\n.scope{\n  position:relative;height:96px;border-radius:14px;margin:0 2px 18px;\n  background:linear-gradient(180deg,#031322,#01070f);\n  border:1px solid rgba(90,208,255,.22);\n  box-shadow:0 0 22px rgba(90,208,255,.12) inset,0 2px 6px rgba(0,0,0,.5);\n  overflow:hidden;\n}\n.scope svg{display:block;width:100%;height:100%}\n.grid line{stroke:rgba(120,200,255,.07);stroke-width:1}\n.notch{filter:drop-shadow(0 0 4px rgba(90,208,255,.6))}\n\n/* ===== KNOB ROW ===== */\n.knobs{display:flex;justify-content:space-around;align-items:flex-start;margin:4px 0 6px}\n.kc{display:flex;flex-direction:column;align-items:center;width:88px}\n.knob{\n  position:relative;width:70px;height:70px;border-radius:50%;cursor:ns-resize;touch-action:none;\n  background:\n    radial-gradient(circle at 38% 30%,#1d557f,#0c2c47 55%,#06182a);\n  box-shadow:\n    0 6px 14px rgba(0,0,0,.55),\n    0 1px 0 rgba(255,255,255,.18) inset,\n    0 -8px 16px -8px rgba(90,208,255,.5) inset;\n  border:1px solid rgba(120,210,255,.22);\n  transition:box-shadow .15s, transform .08s;\n}\n.knob:hover{box-shadow:0 6px 18px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.22) inset,0 0 24px rgba(90,208,255,.4)}\n.knob:active{transform:translateY(1px)}\n.knob .dial{position:absolute;inset:0;border-radius:50%}\n.knob .ind{\n  position:absolute;left:50%;top:7px;width:3px;height:24px;border-radius:2px;margin-left:-1.5px;\n  background:linear-gradient(180deg,#eaffff,var(--cy));\n  box-shadow:0 0 8px var(--cy);transform-origin:50% 28px;\n}\n.ring{position:absolute;inset:-7px;border-radius:50%;pointer-events:none}\n.kc label{margin-top:9px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9ed0ec}\n.kc .val{margin-top:2px;font-size:11px;font-variant-numeric \",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"pedal\">\n  <i class=\"bolt tl\"><\/i><i class=\"bolt tr\"><\/i><i class=\"bolt bl\"><\/i><i class=\"bolt br\"><\/i>\n  <div class=\"brand\"><b>GUSH<\/b><span>Phaser<\/span><\/div>\n\n  <div class=\"scope\">\n    <svg id=\"scope\" viewBox=\"0 0 320 96\" preserveAspectRatio=\"none\">\n      <g class=\"grid\" id=\"grid\"><\/g>\n      <path id=\"wave2\" class=\"notch\" fill=\"none\" stroke=\"#ff5ad0\" stroke-width=\"2\" opacity=\".55\"/>\n      <path id=\"wave1\" class=\"notch\" fill=\"none\" stroke=\"#5ad0ff\" stroke-width=\"2.2\"/>\n    <\/svg>\n  <\/div>\n\n  <div class=\"knobs\">\n    <div class=\"kc big\" id=\"kc-0\">\n      <div class=\"knob\"><div class=\"ring\"><\/div><div class=\"dial\"><div class=\"ind\"><\/div><\/div><\/div>\n      <label>Rate<\/label><div class=\"val\">—<\/div>\n    <\/div>\n    <div class=\"kc\" id=\"kc-1\">\n      <div class=\"knob\"><div class=\"ring\"><\/div><div class=\"dial\"><div class=\"ind\"><\/div><\/div><\/div>\n      <label>Depth<\/label><div class=\"val\">—<\/div>\n    <\/div>\n    <div class=\"kc\" id=\"kc-3\">\n      <div class=\"knob\"><div class=\"ring\"><\/div><div class=\"dial\"><div class=\"ind\"><\/div><\/div><\/div>\n      <label>Mix<\/label><div class=\"val\">—<\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"colorbox\">\n    <div class=\"csw\" id=\"csw\"><div class=\"fill\" id=\"cfill\"><\/div><div class=\"cap\" id=\"ccap\"><\/div><span class=\"lbl\">Color<\/span><\/div>\n    <div class=\"name\">Color · Feedback<\/div>\n    <div class=\"v\" id=\"cval\">—<\/div>\n  <\/div>\n\n  <div class=\"hint\">drag knobs · drag Color switch · double-click to reset<\/div>\n<\/div>\n\n<script>\n(function(){\n  // ---- host bridge ----\n  var V = window.vstai || null;\n  function setParam(i,v){ if(V && V.setParam) V.setParam(i, v); }\n\n  var DEF = {0:0.35, 1:0.7, 2:0.5, 3:0.5};\n  var state = {0:DEF[0], 1:DEF[1], 2:DEF[2], 3:DEF[3]};\n\n  // ---- knobs (Rate, Depth, Mix) ----\n  var KNOBS = [0,1,3];\n  function fmt(i){\n    if(i===0){ var hz=(0.03*Math.exp(state[0]*5.7)); return hz<1? hz.toFixed(2)+\" Hz\" : hz.toFixed(1)+\" Hz\"; }\n    return Math.round(state[i]*100)+\"%\";\n  }\n  function drawKnob(i){\n    var el=document.getElementById('kc-'+i);\n    var ind=el.querySelector('.ind');\n    var ang=-135 + state[i]*270;\n    ind.style.transform='rotate('+ang+'deg)';\n    var ring=el.querySelector('.ring');\n    var deg = state[i]*270;\n    var ac = i===3 ? 'var(--mg)' : 'var(--cy)';\n    ring.style.background='conic-gradient(from -135deg, '+ac+' '+deg+'deg, rgba(120,200,255,.10) 0)';\n    ring.style.webkitMaskImage='radial-gradient(circle, transparent 60%, #000 61%)';\n    ring.style.maskImage='radial-gradient(circle, transparent 60%, #000 61%)';\n    el.querySelector('.val').textContent=fmt(i);\n  }\n  KNOBS.forEach(function(i){\n    var el=document.getElementById('kc-'+i);\n    var knob=el.querySelector('.knob');\n    var dragging=false, sy=0, sv=0;\n    knob.addEventListener('pointerdown',function(e){dragging=true;sy=e.clientY;sv=state[i];knob.setPointerCapture(e.pointerId);e.preventDefault();});\n    knob.addEventListener('pointermove',function(e){\n      if(!dragging)return;\n      var dv=(sy-e.clientY)/180;\n      state[i]=Math.max(0,Math.min(1,sv+dv));\n      setParam(i,state[i]); drawKnob(i);\n    });\n    function up(){dragging=false;}\n    knob.addEventListener('pointerup',up);knob.addEventListener('pointercancel',up);\n    knob.addEventListener('dblclick',function(){state[i]=DEF[i];setParam(i,state[i]);drawKnob(i);});\n  });\n\n  // ---- Color switch (param 2) ----\n  var csw=document.getElementById('csw'), cfill=document.getElementById('cfill'),\n      ccap=document.getElementById('ccap'), cval=document.getElementById('cval');\n  function drawColor(){\n    var v=state[2];\n    cfill.style.width=(v*100)+'%';\n    cfill.style.filter='brightness('+(0.8+v*0.9)+')';\n    var x=3 + v*(104-3-34);\n    ccap.style.left=x+'px';\n n        var notch=0;\n        for(var s=0;s<4;s++){\n          var c2=center*(1+s*0.6); if(c2>1)c2-=1;\n          var dd=(fx-c2)/width;\n          notch += dip*Math.exp(-dd*dd);\n        }\n        var y=base + Math.sin(fx*40+t*3+off)*0.04*amp - notch*0.34;\n        y=Math.max(0.04,Math.min(0.96,y));\n        d+=(k?'L':'M')+x.toFixed(1)+' '+(y*96).toFixed(1)+' ';\n      }\n      return d;\n    }\n    w1.setAttribute('d',build(0,1));\n    w2.setAttribute('d',build(1.6,0.7));\n    requestAnimationFrame(frame);\n  }\n\n  function boot(){\n    KNOBS.forEach(function(i){ setParam(i,state[i]); drawKnob(i); });\n    setParam(2,state[2]); drawColor();\n    requestAnimationFrame(frame);\n  }\n  if(V && V.onReady) V.onReady(boot); else boot();\n})();\n<\/script>\n<\/body><\/html>\n";
