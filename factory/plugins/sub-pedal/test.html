  <title>Sub Pedal — test bench</title><style>
  :root{--ac:#ff5a2a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />\n<title>Sub Pedal<\/title>\n<style>\n  :root{\n    --accent:#ff5a2a;\n    --accent2:#7a3dff;\n    --wood1:#3a2418;\n    --wood2:#1c110a;\n    --panel1:#3a0d12;\n    --panel2:#1a0420;\n    --ink:#ffd9c4;\n  }\n  *{box-sizing:border-box;-webkit-user-select:none;user-select:none;}\n  html,body{margin:0;height:100%;}\n  body{\n    font-family:\"Avenir Next\",\"Segoe UI\",system-ui,sans-serif;\n    background:\n      radial-gradient(120% 80% at 50% -10%, #2a0a2e 0%, #0a0307 70%),\n      #060205;\n    color:var(--ink);\n    display:flex;align-items:center;justify-content:center;\n    min-height:100%;\n    overflow:hidden;\n  }\n\n  /* ----- the cabinet ----- */\n  .cabinet{\n    position:relative;\n    width:560px;\n    border-radius:22px;\n    padding:22px 22px 0;\n    background:\n      linear-gradient(180deg, var(--panel1), var(--panel2));\n    box-shadow:\n      0 40px 90px rgba(0,0,0,.75),\n      inset 0 1px 0 rgba(255,255,255,.06),\n      inset 0 0 60px rgba(122,61,255,.10);\n    border:1px solid rgba(255,90,42,.18);\n    overflow:hidden;\n  }\n  .cabinet::before{\n    /* throbbing under-glow seeping up from the floor */\n    content:\"\";\n    position:absolute;left:-20%;right:-20%;bottom:-60px;height:200px;\n    background:radial-gradient(60% 100% at 50% 100%,\n      rgba(255,90,42,.55), rgba(122,61,255,.20) 55%, transparent 75%);\n    filter:blur(8px);\n    animation:throb 2.4s ease-in-out infinite;\n    pointer-events:none;\n  }\n  @keyframes throb{\n    0%,100%{opacity:.45;transform:translateY(8px) scaleX(.96);}\n    50%{opacity:.95;transform:translateY(0) scaleX(1.04);}\n  }\n\n  .brand{\n    display:flex;align-items:baseline;justify-content:space-between;\n    margin-bottom:14px;position:relative;z-index:2;\n  }\n  .brand h1{\n    margin:0;font-size:26px;letter-spacing:3px;font-weight:800;\n    background:linear-gradient(90deg,var(--accent),var(--accent2));\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n    text-shadow:0 0 22px rgba(255,90,42,.25);\n  }\n  .brand .tag{font-size:10px;letter-spacing:4px;opacity:.55;text-transform:uppercase;}\n\n  /* ----- waveform scope ----- */\n  .scope{\n    position:relative;z-index:2;\n    height:96px;border-radius:14px;margin-bottom:18px;\n    background:linear-gradient(180deg,#150208,#06010a);\n    border:1px solid rgba(255,90,42,.22);\n    box-shadow:inset 0 0 30px rgba(0,0,0,.6), 0 0 24px rgba(122,61,255,.12);\n    overflow:hidden;\n  }\n  .scope svg{display:block;width:100%;height:100%;}\n  .scope .lbl{\n    position:absolute;left:12px;top:8px;font-size:9px;letter-spacing:3px;\n    opacity:.5;text-transform:uppercase;\n  }\n\n  /* ----- control rows ----- */\n  .controls{\n    position:relative;z-index:2;\n    display:grid;grid-template-columns:repeat(3,1fr);\n    gap:10px 18px;margin-bottom:18px;\n  }\n  /* giant filter knob spans a feature cell */\n  .feature{grid-column:1 / span 3;display:flex;justify-content:center;margin-bottom:4px;}\n\n  .knob{\n    display:flex;flex-direction:column;align-items:center;gap:6px;\n    cursor:ns-resize;\n  }\n  .knob .dial{\n    position:relative;width:62px;height:62px;border-radius:50%;\n    background:\n      radial-gradient(60% 60% at 38% 32%, #4a3326, #170d07 70%),\n      #120a06;\n    box-shadow:\n      0 6px 14px rgba(0,0,0,.6),\n      inset 0 2px 3px rgba(255,255,255,.10),\n      inset 0 -6px 12px rgba(0,0,0,.6);\n    transition:transform .08s;\n  }\n  .knob.big .dial{width:128px;height:128px;}\n  .knob .dial:active{transform:scale(.97);}\n  .knob .ring{\n    position:absolute;inset:-7px;border-radius:50%;\n    pointer-events:none;\n  }\n  .knob .pointer{\n    position:absolute;left:50%;top:50%;width:3px;height:42%;\n    background:linear-gradient(var(--accent),#fff);\n    border-radius:2px;transform-origin:bottom center;\ var W=560,H=96,t=0;\n  function drawWave(){\n    t += 0.035;\n    var amp = 26 + 8*Math.sin(t*0.6);      // breathing depth\n    var pts = \"\", N=70;\n    for(var i=0;i<=N;i++){\n      var x = i/N*W;\n      var ph = i/N*Math.PI*2*1.5 + t;       // ~1.5 cycles of a deep wave\n      var y = H/2 + Math.sin(ph)*amp + Math.sin(ph*2+t*0.5)*amp*0.18;\n      pts += (i?\"L\":\"M\") + x.toFixed(1) + \" \" + y.toFixed(1) + \" \";\n    }\n    wave.setAttribute(\"d\", pts);\n    requestAnimationFrame(drawWave);\n  }\n  drawWave();\n\n  function init(){\n    // push every default into the host on load\n    knobs.forEach(function(k){ k.commit(); });\n  }\n  if (window.vstai && window.vstai.onReady) window.vstai.onReady(init);\n  else init();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
