<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sub Pedal</title>
<style>
  :root{
    --accent:#ff5a2a;
    --accent2:#7a3dff;
    --wood1:#3a2418;
    --wood2:#1c110a;
    --panel1:#3a0d12;
    --panel2:#1a0420;
    --ink:#ffd9c4;
  }
  *{box-sizing:border-box;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #2a0a2e 0%, #0a0307 70%),
      #060205;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100%;
    overflow:hidden;
  }

  /* ----- the cabinet ----- */
  .cabinet{
    position:relative;
    width:560px;
    border-radius:22px;
    padding:22px 22px 0;
    background:
      linear-gradient(180deg, var(--panel1), var(--panel2));
    box-shadow:
      0 40px 90px rgba(0,0,0,.75),
      inset 0 1px 0 rgba(255,255,255,.06),
      inset 0 0 60px rgba(122,61,255,.10);
    border:1px solid rgba(255,90,42,.18);
    overflow:hidden;
  }
  .cabinet::before{
    /* throbbing under-glow seeping up from the floor */
    content:"";
    position:absolute;left:-20%;right:-20%;bottom:-60px;height:200px;
    background:radial-gradient(60% 100% at 50% 100%,
      rgba(255,90,42,.55), rgba(122,61,255,.20) 55%, transparent 75%);
    filter:blur(8px);
    animation:throb 2.4s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes throb{
    0%,100%{opacity:.45;transform:translateY(8px) scaleX(.96);}
    50%{opacity:.95;transform:translateY(0) scaleX(1.04);}
  }

  .brand{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:14px;position:relative;z-index:2;
  }
  .brand h1{
    margin:0;font-size:26px;letter-spacing:3px;font-weight:800;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 22px rgba(255,90,42,.25);
  }
  .brand .tag{font-size:10px;letter-spacing:4px;opacity:.55;text-transform:uppercase;}

  /* ----- waveform scope ----- */
  .scope{
    position:relative;z-index:2;
    height:96px;border-radius:14px;margin-bottom:18px;
    background:linear-gradient(180deg,#150208,#06010a);
    border:1px solid rgba(255,90,42,.22);
    box-shadow:inset 0 0 30px rgba(0,0,0,.6), 0 0 24px rgba(122,61,255,.12);
    overflow:hidden;
  }
  .scope svg{display:block;width:100%;height:100%;}
  .scope .lbl{
    position:absolute;left:12px;top:8px;font-size:9px;letter-spacing:3px;
    opacity:.5;text-transform:uppercase;
  }

  /* ----- control rows ----- */
  .controls{
    position:relative;z-index:2;
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:10px 18px;margin-bottom:18px;
  }
  /* giant filter knob spans a feature cell */
  .feature{grid-column:1 / span 3;display:flex;justify-content:center;margin-bottom:4px;}

  .knob{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    cursor:ns-resize;
  }
  .knob .dial{
    position:relative;width:62px;height:62px;border-radius:50%;
    background:
      radial-gradient(60% 60% at 38% 32%, #4a3326, #170d07 70%),
      #120a06;
    box-shadow:
      0 6px 14px rgba(0,0,0,.6),
      inset 0 2px 3px rgba(255,255,255,.10),
      inset 0 -6px 12px rgba(0,0,0,.6);
    transition:transform .08s;
  }
  .knob.big .dial{width:128px;height:128px;}
  .knob .dial:active{transform:scale(.97);}
  .knob .ring{
    position:absolute;inset:-7px;border-radius:50%;
    pointer-events:none;
  }
  .knob .pointer{
    position:absolute;left:50%;top:50%;width:3px;height:42%;
    background:linear-gradient(var(--accent),#fff);
    border-radius:2px;transform-origin:bottom center;
    transform:translate(-50%,-100%) rotate(0deg);
    box-shadow:0 0 8px var(--accent);
  }
  .knob.big .pointer{width:4px;box-shadow:0 0 14px var(--accent);}
  .knob .name{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.8;}
  .knob .val{font-size:11px;font-variant-numeric:tabular-nums;color:var(--accent);opacity:.95;}
  .knob.big .name{font-size:12px;letter-spacing:4px;}
  .knob.big .val{font-size:14px;}

  /* ----- organ foot-pedal board ----- */
  .pedals{
    position:relative;z-index:2;
    display:flex;gap:3px;
    padding:14px 16px 18px;
    margin:0 -22px;
    background:
      repeating-linear-gradient(90deg,var(--wood1) 0 26px,#2c190f 26px 28px),
      linear-gradient(180deg,var(--wood1),var(--wood2));
    border-top:2px solid rgba(0,0,0,.5);
    box-shadow:inset 0 14px 30px rgba(0,0,0,.55);
  }
  .pedal{
    flex:1;height:64px;border-radius:0 0 6px 6px;
    background:linear-gradient(180deg,#241a12,#0d0805);
    border:1px solid rgba(0,0,0,.6);
    border-top:2px solid rgba(255,255,255,.05);
    box-shadow:inset 0 2px 4px rgba(255,255,255,.06), inset 0 -8px 14px rgba(0,0,0,.6);
    transition:transform .07s, box-shadow .12s, background .12s;
    cursor:pointer;position:relative;
  }
  .pedal.sharp{height:40px;background:linear-gradient(180deg,#120c08,#000);}
  .pedal:hover{box-shadow:inset 0 0 16px rgba(255,90,42,.25), inset 0 -8px 14px rgba(0,0,0,.6);}
  .pedal.lit{
    transform:translateY(3px);
    background:linear-gradient(180deg,var(--accent),#7a1f0a);
    box-shadow:0 0 26px rgba(255,90,42,.7), inset 0 0 18px rgba(255,200,150,.4);
  }
  .hint{
    position:relative;z-index:2;text-align:center;font-size:9px;letter-spacing:2px;
    opacity:.4;padding:8px 0 12px;text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="cabinet">
    <div class="brand">
      <h1>SUB&nbsp;PEDAL</h1>
      <div class="tag">deep&nbsp;·&nbsp;bass&nbsp;·&nbsp;engine</div>
    </div>

    <div class="scope">
      <span class="lbl">sub waveform</span>
      <svg viewBox="0 0 560 96" preserveAspectRatio="none">
        <defs>
          <linearGradient id="wgrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#7a3dff"/>
            <stop offset="1" stop-color="#ff5a2a"/>
          </linearGradient>
        </defs>
        <path id="wave" fill="none" stroke="url(#wgrad)" stroke-width="2.5"
              stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="controls">
      <div class="feature">
        <div class="knob big" data-idx="0" data-min="0" data-max="1" data-def="0.40">
          <div class="dial">
            <svg class="ring" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3"/>
              <circle class="arc" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)"
                      stroke-width="3" stroke-linecap="round"
                      transform="rotate(-90 50 50)"/>
            </svg>
            <div class="pointer"></div>
          </div>
          <div class="name">Cutoff</div>
          <div class="val">—</div>
        </div>
      </div>

      <div class="knob" data-idx="1" data-min="0" data-max="1" data-def="0.30">
        <div class="dial"><svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle class="arc" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg><div class="pointer"></div></div>
        <div class="name">Reso</div><div class="val">—</div>
      </div>
      <div class="knob" data-idx="2" data-min="0" data-max="1" data-def="0.70">
        <div class="dial"><svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle class="arc" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg><div class="pointer"></div></div>
        <div class="name">Sub</div><div class="val">—</div>
      </div>
      <div class="knob" data-idx="3" data-min="0" data-max="1" data-def="0.30">
        <div class="dial"><svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle class="arc" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg><div class="pointer"></div></div>
        <div class="name">Glide</div><div class="val">—</div>
      </div>
      <div class="knob" data-idx="4" data-min="0" data-max="1" data-def="0.45">
        <div class="dial"><svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle class="arc" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg><div class="pointer"></div></div>
        <div class="name">Decay</div><div class="val">—</div>
      </div>
      <div class="knob" data-idx="5" data-min="0" data-max="1" data-def="0.35">
        <div class="dial"><svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle class="arc" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg><div class="pointer"></div></div>
        <div class="name">Drive</div><div class="val">—</div>
      </div>
      <div class="knob" data-idx="6" data-min="0" data-max="1" data-def="0.80">
        <div class="dial"><svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle class="arc" cx="50" cy="50" r="46" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg><div class="pointer"></div></div>
        <div class="name">Level</div><div class="val">—</div>
      </div>
    </div>

    <div class="pedals" id="pedals"></div>
    <div class="hint">drag knobs · double-click to reset</div>
  </div>

<script>
(function(){
  var ARC_LEN = 2 * Math.PI * 46;   // circumference for the progress arc
  var ARC_SPAN = 0.75;              // use 270° of the circle

  function host(){ return (window.vstai && window.vstai.setParam) ? window.vstai : null; }

  var knobs = [];
  function fmt(v){ return Math.round(v*100) + "%"; }

  function makeKnob(el){
    var idx = +el.dataset.idx,
        min = +el.dataset.min, max = +el.dataset.max,
        def = +el.dataset.def;
    var pointer = el.querySelector(".pointer");
    var arc = el.querySelector(".arc");
    var valEl = el.querySelector(".val");
    var norm = (def - min)/(max-min);

    function render(){
      // 270° sweep, -135°..+135°
      var deg = -135 + norm*270;
      pointer.style.transform = "translate(-50%,-100%) rotate("+deg+"deg)";
      arc.style.strokeDasharray = ARC_LEN;
      arc.style.strokeDashoffset = ARC_LEN * (1 - norm*ARC_SPAN);
      valEl.textContent = fmt(norm);
    }
    function commit(){
      var real = min + norm*(max-min);
      var h = host(); if (h) h.setParam(idx, real);
      render();
    }
    function setNorm(nn){ norm = Math.max(0,Math.min(1,nn)); commit(); }

    // drag (vertical)
    var dragging=false, lastY=0;
    el.addEventListener("mousedown", function(e){
      dragging=true; lastY=e.clientY; e.preventDefault();
    });
    window.addEventListener("mousemove", function(e){
      if(!dragging) return;
      var dy = lastY - e.clientY; lastY = e.clientY;
      setNorm(norm + dy*0.005);
    });
    window.addEventListener("mouseup", function(){ dragging=false; });
    el.addEventListener("dblclick", function(){ setNorm((def-min)/(max-min)); });
    el.addEventListener("wheel", function(e){
      e.preventDefault(); setNorm(norm - e.deltaY*0.0008);
    }, {passive:false});

    knobs.push({setNorm:setNorm, commit:commit, render:render});
    render();
    return {commit:commit};
  }

  document.querySelectorAll(".knob").forEach(makeKnob);

  // build the organ-pedal board (one octave of foot pedals)
  var pat = [0,1,0,1,0,0,1,0,1,0,1,0]; // 1 = sharp/black
  var pedals = document.getElementById("pedals");
  for (var i=0;i<13;i++){
    var p = document.createElement("div");
    p.className = "pedal" + (pat[i%12] ? " sharp":"");
    (function(node){
      node.addEventListener("mousedown", function(){
        node.classList.add("lit");
      });
      node.addEventListener("mouseup", function(){ node.classList.remove("lit"); });
      node.addEventListener("mouseleave", function(){ node.classList.remove("lit"); });
    })(p);
    pedals.appendChild(p);
  }

  // animated sub waveform — a slow, heavy low-frequency wave that breathes
  var wave = document.getElementById("wave");
  var W=560,H=96,t=0;
  function drawWave(){
    t += 0.035;
    var amp = 26 + 8*Math.sin(t*0.6);      // breathing depth
    var pts = "", N=70;
    for(var i=0;i<=N;i++){
      var x = i/N*W;
      var ph = i/N*Math.PI*2*1.5 + t;       // ~1.5 cycles of a deep wave
      var y = H/2 + Math.sin(ph)*amp + Math.sin(ph*2+t*0.5)*amp*0.18;
      pts += (i?"L":"M") + x.toFixed(1) + " " + y.toFixed(1) + " ";
    }
    wave.setAttribute("d", pts);
    requestAnimationFrame(drawWave);
  }
  drawWave();

  function init(){
    // push every default into the host on load
    knobs.forEach(function(k){ k.commit(); });
  }
  if (window.vstai && window.vstai.onReady) window.vstai.onReady(init);
  else init();
})();
</script>
</body>
</html>
