<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Amber Crunch — test bench</title><style>
  :root{--ac:#ffb02a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Amber Crunch</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n:root{\n  --ac:#ffb02a;        /* amber accent */\n  --ac2:#ff5a2a;       /* orange highlight */\n  --face:#f6b227;      /* mustard pedal face */\n  --face2:#d98a13;\n  --face3:#b06a08;\n  --ink:#2a1602;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:#2a1602;\n  background:\n    radial-gradient(130% 90% at 50% -12%,#241a10 0%,#140d06 55%,#070403 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:24px;overflow:hidden;\n}\n\n/* ===== die-cast stompbox enclosure ===== */\n.stomp{\n  position:relative;\n  width:312px;\n  border-radius:22px;\n  padding:20px 22px 24px;\n  background:\n    linear-gradient(157deg,#ffd35a 0%,var(--face) 26%,var(--face2) 70%,var(--face3) 100%);\n  box-shadow:\n    0 42px 78px -20px rgba(0,0,0,.78),\n    0 2px 0 rgba(255,255,255,.35) inset,\n    0 -22px 44px -16px rgba(90,40,0,.55) inset,\n    0 0 0 2px rgba(60,30,0,.45),\n    0 0 0 5px #1b1207,\n    0 0 0 6px rgba(255,180,60,.06);\n  animation:rise .7s cubic-bezier(.2,.8,.25,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(28px) scale(.95)}to{opacity:1;transform:none}}\n\n/* cast-metal speckle + top sheen */\n.stomp::before{\n  content:\"\";position:absolute;inset:0;border-radius:22px;pointer-events:none;\n  background:\n    repeating-radial-gradient(circle at 20% 30%,rgba(255,255,255,.05) 0 1px,transparent 1px 4px),\n    radial-gradient(150% 65% at 35% -5%,rgba(255,255,255,.4),transparent 52%);\n  mix-blend-mode:screen;opacity:.55;\n}\n/* worn edge vignette */\n.stomp::after{\n  content:\"\";position:absolute;inset:0;border-radius:22px;pointer-events:none;\n  box-shadow:0 0 60px rgba(120,60,0,.35) inset;\n}\n\n/* mounting screws */\n.screw{position:absolute;width:13px;height:13px;border-radius:50%;z-index:3;\n  background:radial-gradient(circle at 35% 30%,#fff6e0,#caa86e 55%,#6a4d20);\n  box-shadow:0 1px 2px rgba(0,0,0,.55),0 0 0 1px rgba(60,30,0,.4) inset;}\n.screw::after{content:\"\";position:absolute;inset:3px;border-radius:1px;\n  background:linear-gradient(45deg,transparent 44%,#5a4220 44% 56%,transparent 56%);}\n.screw.tl{top:11px;left:11px}.screw.tr{top:11px;right:11px}\n.screw.bl{bottom:11px;left:11px}.screw.br{bottom:11px;right:11px}\n\n/* ===== header ===== */\n.head{position:relative;text-align:center;margin:2px 0 12px;z-index:2}\n.brand{font-size:9px;letter-spacing:.42em;color:#5a3206;opacity:.8;text-transform:uppercase;font-weight:700}\nh1{\n  margin:2px 0 0;font-size:27px;font-weight:900;letter-spacing:.01em;line-height:1;\n  font-style:italic;\n  color:#3a1d02;\n  text-shadow:0 1px 0 rgba(255,230,170,.6),0 2px 5px rgba(120,60,0,.35);\n}\n.sub{font-size:8.5px;letter-spacing:.3em;color:#6a3c06;opacity:.78;text-transform:uppercase;margin-top:5px;font-weight:700}\n\n/* ===== glowing clip-wave window (signature graphic) ===== */\n.window{\n  position:relative;height:88px;margin:6px 4px 16px;border-radius:13px;overflow:hidden;z-index:2;\n  background:radial-gradient(120% 150% at 50% 130%,#2a1505,#0c0602 72%);\n  box-shadow:0 0 0 1px rgba(40,20,0,.7),\n    0 6px 16px -6px rgba(0,0,0,.7) inset,\n    0 0 0 3px rgba(60,32,4,.5);\n}\n.window .grid{position:absolute;inset:0;\n  background:\n    repeating-linear-gradient(90deg,rgba(255,170,40,.06) 0 1px,transparent 1px 26px),\n    repeating-linear-gradient(0deg,rgba(255,170,40,.06) 0 1px,transparent 1px 22px);}\n.window .mid{position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,140,40,.22)}\n.scope{position:absolute;inset:0;width:100%;height:100%}\n/* the soft amber glow that pulses with distortion */\n.wave{fill:none;stroke:url(#ag);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;\n  filter:drop-shadow(0 0 6px rgba(255,150,40,.85)) drop-shadow(0 0 14px rgba(255,90,30,.5));}\n.wglow{fill:none;stroke:rgba(255,180,70,.18);stroke-width:8;stroke-linecap:round;stroke-linejoin:round;\n  filter:blur(3px)}\n/* clip ceiling/floor markers that light up when the wave hits them */\n.clipline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac2),transparent);\n  opacity:.0;transition:opacity .15s}\n.clipline.top{top:12%}.clipline.bot{bottom:12%}\n.window.hot .clipline{opacity:.55;animation:flick .9s steps(2,end) infinite}\n@keyframes flick{0%,100%{opacity:.5}50%{opacity:.85}}\n.scan{position:absolute;top:0;bottom:0;width:42px;\n  background:linear-gradient(90deg,transparent,rgba(255,190,80,.14),transparent);\n  animation:sweep 3.4s linear infinite;mix-blend-mode:screen}\n@keyframes sweep{from{left:-42px}to{left:100%}}\n\n/* ===== knob deck — two chicken-head knobs ===== */\n.deck{display:flex;justify-content:space-around;align-items:flex-start;gap:14px;\n  margin:2px 6px 8px;position:relative;z-index:2}\n.pot{display:flex;flex-direction:column;align-items:center;gap:8px;\n  animation:pop .55s cubic-bezier(.2,.9,.3,1.2) both;animation-delay:var(--d,0ms)}\n@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.85)}to{opacity:1;transform:none}}\n\n.knob{position:relative;width:88px;height:88px;border-radius:50%;cursor:grab;touch-action:none;outline:none}\n.knob.act{cursor:grabbing}\n/* the dial value ring */\n.skirt{position:absolute;inset:0;border-radius:50%;\n  background:radial-gradient(circle at 50% 38%,#3a2206,#1a0e02 70%);\n  box-shadow:0 6px 12px -4px rgba(0,0,0,.65),0 0 0 1px rgba(0,0,0,.5);}\n/* tick marks around the skirt */\n.ticks{position:absolute;inset:-3px;border-radius:50%;pointer-events:none}\n.ticks i{position:absolute;left:50%;top:50%;width:2px;height:7px;margin-left:-1px;\n  background:rgba(60,32,4,.7);transform-origin:50% 44px;\n  transform:rotate(var(--a)) translateY(-44px)}\n/* progress arc (conic) */\n.arc{position:absolute;inset:7px;border-radius:50%;\n  background:conic-gradient(from -135deg,\n    var(--ac2) 0deg,\n    var(--ac) calc(var(--n,0)*270deg),\n    rgba(40,22,4,.6) calc(var(--n,0)*270deg),\n    rgba(40,22,4,.6) 270deg,\n    transparent 270deg);\n  -webkit-mask:radial-gradient(circle,transparent 30px,#000 31px);\n          mask:radial-gradient(circle,transparent 30px,#000 31px);\n  filter:drop-shadow(0 0 5px rgba(255,150,40,.6));}\n/* the chicken-head pointer cap */\n.cap{position:absolute;inset:16px;border-radius:50%;\n  background:\n    radial-gradient(circle at 42% 30%,#5a3a12,#241405 62%,#120a02 100%);\n  box-shadow:0 3px 7px rgba(0,0,0,.6),0 1px 0 rgba(255,200,120,.18) inset;\n  transform:rotate(calc(-135deg + var(--n,0)*270deg));transition:transform .04s linear}\n.cap::before{/* chicken-head beak */\n  content:\"\";position:absolute;left:50%;top:-7px;width:0;height:0;margin-left:-7px;\n  border-left:7px solid transparent;border-right:7px solid transparent;\n  border-bottom:22px solid #f6b85a;\n  filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}\n.cap::after{content:\"\";position:absolute;inset:35%;border-radius:50%;\n  background:radial-gradient(circle at 40% 35%,#caa86a,#6a4514);\n  box-shadow:0 1px 1px rgba(0,0,0,.5) inset}\n\n.pname{font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:#4a2a06;font-weight:800}\n.pval{font-size:13px;font-weight:800;color:#3a1d02;font-variant-numeric:tabular-nums;\n  background:linear-gradient(180deg,#ffe39a,#f0a020);\n  padding:1px 9px;border-radius:7px;\n  box-shadow:0 1px 2px rgba(120,60,0,.4),0 1px 0 rgba(255,255,255,.4) inset;\n  min-width:46px;text-align:center}\n\n/* ===== footer: tone mini-slider + mix + footswitch ===== */\n.footrow{display:flex;align-items:center;gap:12px;margin:8px 6px 2px;z-index:2;position:relative}\n.minis{flex:1;display:flex;flex-direction:column;gap:9px}\n.mini{display:flex;align-items:center;gap:8px}\n.mlabel{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:#4a2a06;font-weight:800;width:4 Message({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"stomp\" id=\"stomp\">\n  <span class=\"screw tl\"><\/span><span class=\"screw tr\"><\/span>\n  <span class=\"screw bl\"><\/span><span class=\"screw br\"><\/span>\n\n  <div class=\"head\">\n    <div class=\"brand\">Vibe Effects<\/div>\n    <h1>Amber Crunch<\/h1>\n    <div class=\"sub\">Germanium Distortion<\/div>\n  <\/div>\n\n  <div class=\"window\" id=\"window\">\n    <div class=\"grid\"><\/div>\n    <div class=\"mid\"><\/div>\n    <div class=\"clipline top\"><\/div>\n    <div class=\"clipline bot\"><\/div>\n    <div class=\"scan\"><\/div>\n    <svg class=\"scope\" viewBox=\"0 0 300 88\" preserveAspectRatio=\"none\">\n      <defs>\n        <linearGradient id=\"ag\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n          <stop offset=\"0\" stop-color=\"#ff5a2a\"/>\n          <stop offset=\".5\" stop-color=\"#ffb02a\"/>\n          <stop offset=\"1\" stop-color=\"#ff5a2a\"/>\n        <\/linearGradient>\n      <\/defs>\n      <path class=\"wglow\" id=\"wglow\" d=\"\"><\/path>\n      <path class=\"wave\" id=\"wave\" d=\"\"><\/path>\n    <\/svg>\n  <\/div>\n\n  <div class=\"deck\" id=\"deck\"><\/div>\n\n  <div class=\"footrow\">\n    <div class=\"minis\" id=\"minis\"><\/div>\n    <div class=\"fsw\">\n      <button class=\"switch\" id=\"bypass\" title=\"True bypass\"><\/button>\n      <div class=\"led\" id=\"led\"><\/div>\n      <div class=\"fslabel\">On<\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"serial\">AC&middot;DISTORTION+&middot;8P7SXGP<\/div>\n<\/div>\n\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"Distortion\",index:0,min:0,max:1,def:0.55},\n    {name:\"Output\",    index:1,min:0,max:1,def:0.6},\n    {name:\"Tone\",      index:2,min:0,max:1,def:0.45},\n    {name:\"Mix\",       index:3,min:0,max:1,def:1}\n  ];\n  var state={};\n  var deck=document.getElementById('deck');\n  var minis=document.getElementById('minis');\n  var win=document.getElementById('window');\n  var wave=document.getElementById('wave');\n  var wglow=document.getElementById('wglow');\n\n  function send(idx,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(idx,v); }\n  function pct(n){ return Math.round(n*100)+\"%\"; }\n\n  function makeCtl(p,setVis){\n    var v=p.def;\n    function norm(){ return (v-p.min)/((p.max-p.min)||1); }\n    function setNorm(n){ n=n<0?0:n>1?1:n; v=p.min+(p.max-p.min)*n; setVis(norm()); state[p.index]=v; send(p.index,v); onChange(); }\n    state[p.index]=v; send(p.index,v); setVis(norm());\n    return {p:p,norm:norm,setNorm:setNorm,reset:function(){v=p.def;setNorm(norm());}};\n  }\n\n  // ---- big chicken-head knobs: Distortion + Output ----\n  function buildKnob(p,i){\n    var cell=document.createElement('div');\n    cell.className='pot'; cell.style.setProperty('--d',(i*90)+'ms');\n    var ticks='';\n    for(var t=0;t<11;t++){ ticks+='<i style=\"--a:'+(-135+t*27)+'deg\"><\/i>'; }\n    cell.innerHTML=\n      '<div class=\"knob\" tabindex=\"0\">'+\n        '<i class=\"skirt\"><\/i>'+\n        '<div class=\"ticks\">'+ticks+'<\/div>'+\n        '<i class=\"arc\"><\/i>'+\n        '<i class=\"cap\"><\/i>'+\n      '<\/div>'+\n      '<div class=\"pname\">'+p.name+'<\/div>'+\n      '<div class=\"pval\"><\/div>';\n    deck.appendChild(cell);\n    var knob=cell.querySelector('.knob');\n    var arc=cell.querySelector('.arc');\n    var cap=cell.querySelector('.cap');\n    var val=cell.querySelector('.pval');\n\n    var ctl=makeCtl(p,function(n){\n      arc.style.setProperty('--n',n);\n      cap.style.setProperty('--n',n);\n      val.textContent=pct(n);\n    });\n\n    var drag=false,startY=0,startN=0;\n    knob.addEventListener('pointerdown',function(e){\n      drag=true;startY=e.clientY;startN=ctl.norm();\n      knob.classList.add('act');knob.setPointerCapture(e.pointerId);e.preventDefault();\n    });\n    knob.addEvent ener('dblclick',ctl.reset);\n    track.addEventListener('wheel',function(e){e.preventDefault();ctl.setNorm(ctl.norm()+(e.deltaY<0?.03:-.03));},{passive:false});\n  }\n\n  // ---- live germanium clip waveform ----\n  function onChange(){\n    var dist=state[0]!=null?state[0]:0.55;\n    var out =state[1]!=null?state[1]:0.6;\n    var tone=state[2]!=null?state[2]:0.45;\n    var mix =state[3]!=null?state[3]:1;\n    var g=1.5+dist*dist*16;                 // visual drive into clippers\n    var amp=(0.26+0.5*out);\n    var vf=0.92;                            // round germanium clamp\n    var hot=dist>0.55;\n    win.classList.toggle('hot',hot);\n    var pts=[],N=140;\n    for(var x=0;x<=N;x++){\n      var t=x/N, ph=t*Math.PI*4;\n      var dry=Math.sin(ph);\n      // asymmetric round soft-clip then firm clamp (matches DSP voicing)\n      var xb=dry*g+0.06*dry*dry*g;\n      var y=Math.tanh(xb);\n      if(y>vf) y=vf+(y-vf)*0.12; else if(y<-vf) y=-vf+(y+vf)*0.12;\n      // tone tilt: bright lifts a touch of upper ripple\n      var bright=(tone-0.5)*2;\n      y+=bright*0.12*Math.sin(ph*3)*Math.abs(y);\n      var s=dry*(1-mix)+y*mix;\n      var py=44 - s*amp*40;\n      pts.push((x*(300/N)).toFixed(1)+\",\"+py.toFixed(1));\n    }\n    var d='M'+pts.join(' L');\n    wave.setAttribute('d',d); wglow.setAttribute('d',d);\n  }\n\n  PARAMS.filter(function(p){return p.index<2;}).forEach(buildKnob);\n  PARAMS.filter(function(p){return p.index>=2;}).forEach(buildSlider);\n\n  // cosmetic true-bypass footswitch\n  var engaged=true;\n  var stomp=document.getElementById('stomp');\n  var led=document.getElementById('led');\n  document.getElementById('bypass').addEventListener('click',function(){\n    engaged=!engaged;\n    stomp.style.filter=engaged?'none':'saturate(.4) brightness(.82)';\n    led.style.animationPlayState=engaged?'running':'paused';\n    led.style.opacity=engaged?'':'0.2';\n    document.querySelector('.fslabel').textContent=engaged?'On':'Off';\n  });\n\n  function ready(){ onChange(); }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
