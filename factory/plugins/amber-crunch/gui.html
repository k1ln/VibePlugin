<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{
  --ac:#ffb02a;        /* amber accent */
  --ac2:#ff5a2a;       /* orange highlight */
  --face:#f6b227;      /* mustard pedal face */
  --face2:#d98a13;
  --face3:#b06a08;
  --ink:#2a1602;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font:13px ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  color:#2a1602;
  background:
    radial-gradient(130% 90% at 50% -12%,#241a10 0%,#140d06 55%,#070403 100%);
  display:flex;align-items:center;justify-content:center;
  padding:24px;overflow:hidden;
}

/* ===== die-cast stompbox enclosure ===== */
.stomp{
  position:relative;
  width:312px;
  border-radius:22px;
  padding:20px 22px 24px;
  background:
    linear-gradient(157deg,#ffd35a 0%,var(--face) 26%,var(--face2) 70%,var(--face3) 100%);
  box-shadow:
    0 42px 78px -20px rgba(0,0,0,.78),
    0 2px 0 rgba(255,255,255,.35) inset,
    0 -22px 44px -16px rgba(90,40,0,.55) inset,
    0 0 0 2px rgba(60,30,0,.45),
    0 0 0 5px #1b1207,
    0 0 0 6px rgba(255,180,60,.06);
  animation:rise .7s cubic-bezier(.2,.8,.25,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(28px) scale(.95)}to{opacity:1;transform:none}}

/* cast-metal speckle + top sheen */
.stomp::before{
  content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;
  background:
    repeating-radial-gradient(circle at 20% 30%,rgba(255,255,255,.05) 0 1px,transparent 1px 4px),
    radial-gradient(150% 65% at 35% -5%,rgba(255,255,255,.4),transparent 52%);
  mix-blend-mode:screen;opacity:.55;
}
/* worn edge vignette */
.stomp::after{
  content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;
  box-shadow:0 0 60px rgba(120,60,0,.35) inset;
}

/* mounting screws */
.screw{position:absolute;width:13px;height:13px;border-radius:50%;z-index:3;
  background:radial-gradient(circle at 35% 30%,#fff6e0,#caa86e 55%,#6a4d20);
  box-shadow:0 1px 2px rgba(0,0,0,.55),0 0 0 1px rgba(60,30,0,.4) inset;}
.screw::after{content:"";position:absolute;inset:3px;border-radius:1px;
  background:linear-gradient(45deg,transparent 44%,#5a4220 44% 56%,transparent 56%);}
.screw.tl{top:11px;left:11px}.screw.tr{top:11px;right:11px}
.screw.bl{bottom:11px;left:11px}.screw.br{bottom:11px;right:11px}

/* ===== header ===== */
.head{position:relative;text-align:center;margin:2px 0 12px;z-index:2}
.brand{font-size:9px;letter-spacing:.42em;color:#5a3206;opacity:.8;text-transform:uppercase;font-weight:700}
h1{
  margin:2px 0 0;font-size:27px;font-weight:900;letter-spacing:.01em;line-height:1;
  font-style:italic;
  color:#3a1d02;
  text-shadow:0 1px 0 rgba(255,230,170,.6),0 2px 5px rgba(120,60,0,.35);
}
.sub{font-size:8.5px;letter-spacing:.3em;color:#6a3c06;opacity:.78;text-transform:uppercase;margin-top:5px;font-weight:700}

/* ===== glowing clip-wave window (signature graphic) ===== */
.window{
  position:relative;height:88px;margin:6px 4px 16px;border-radius:13px;overflow:hidden;z-index:2;
  background:radial-gradient(120% 150% at 50% 130%,#2a1505,#0c0602 72%);
  box-shadow:0 0 0 1px rgba(40,20,0,.7),
    0 6px 16px -6px rgba(0,0,0,.7) inset,
    0 0 0 3px rgba(60,32,4,.5);
}
.window .grid{position:absolute;inset:0;
  background:
    repeating-linear-gradient(90deg,rgba(255,170,40,.06) 0 1px,transparent 1px 26px),
    repeating-linear-gradient(0deg,rgba(255,170,40,.06) 0 1px,transparent 1px 22px);}
.window .mid{position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,140,40,.22)}
.scope{position:absolute;inset:0;width:100%;height:100%}
/* the soft amber glow that pulses with distortion */
.wave{fill:none;stroke:url(#ag);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  filter:drop-shadow(0 0 6px rgba(255,150,40,.85)) drop-shadow(0 0 14px rgba(255,90,30,.5));}
.wglow{fill:none;stroke:rgba(255,180,70,.18);stroke-width:8;stroke-linecap:round;stroke-linejoin:round;
  filter:blur(3px)}
/* clip ceiling/floor markers that light up when the wave hits them */
.clipline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac2),transparent);
  opacity:.0;transition:opacity .15s}
.clipline.top{top:12%}.clipline.bot{bottom:12%}
.window.hot .clipline{opacity:.55;animation:flick .9s steps(2,end) infinite}
@keyframes flick{0%,100%{opacity:.5}50%{opacity:.85}}
.scan{position:absolute;top:0;bottom:0;width:42px;
  background:linear-gradient(90deg,transparent,rgba(255,190,80,.14),transparent);
  animation:sweep 3.4s linear infinite;mix-blend-mode:screen}
@keyframes sweep{from{left:-42px}to{left:100%}}

/* ===== knob deck — two chicken-head knobs ===== */
.deck{display:flex;justify-content:space-around;align-items:flex-start;gap:14px;
  margin:2px 6px 8px;position:relative;z-index:2}
.pot{display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:pop .55s cubic-bezier(.2,.9,.3,1.2) both;animation-delay:var(--d,0ms)}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.85)}to{opacity:1;transform:none}}

.knob{position:relative;width:88px;height:88px;border-radius:50%;cursor:grab;touch-action:none;outline:none}
.knob.act{cursor:grabbing}
/* the dial value ring */
.skirt{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 50% 38%,#3a2206,#1a0e02 70%);
  box-shadow:0 6px 12px -4px rgba(0,0,0,.65),0 0 0 1px rgba(0,0,0,.5);}
/* tick marks around the skirt */
.ticks{position:absolute;inset:-3px;border-radius:50%;pointer-events:none}
.ticks i{position:absolute;left:50%;top:50%;width:2px;height:7px;margin-left:-1px;
  background:rgba(60,32,4,.7);transform-origin:50% 44px;
  transform:rotate(var(--a)) translateY(-44px)}
/* progress arc (conic) */
.arc{position:absolute;inset:7px;border-radius:50%;
  background:conic-gradient(from -135deg,
    var(--ac2) 0deg,
    var(--ac) calc(var(--n,0)*270deg),
    rgba(40,22,4,.6) calc(var(--n,0)*270deg),
    rgba(40,22,4,.6) 270deg,
    transparent 270deg);
  -webkit-mask:radial-gradient(circle,transparent 30px,#000 31px);
          mask:radial-gradient(circle,transparent 30px,#000 31px);
  filter:drop-shadow(0 0 5px rgba(255,150,40,.6));}
/* the chicken-head pointer cap */
.cap{position:absolute;inset:16px;border-radius:50%;
  background:
    radial-gradient(circle at 42% 30%,#5a3a12,#241405 62%,#120a02 100%);
  box-shadow:0 3px 7px rgba(0,0,0,.6),0 1px 0 rgba(255,200,120,.18) inset;
  transform:rotate(calc(-135deg + var(--n,0)*270deg));transition:transform .04s linear}
.cap::before{/* chicken-head beak */
  content:"";position:absolute;left:50%;top:-7px;width:0;height:0;margin-left:-7px;
  border-left:7px solid transparent;border-right:7px solid transparent;
  border-bottom:22px solid #f6b85a;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));}
.cap::after{content:"";position:absolute;inset:35%;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#caa86a,#6a4514);
  box-shadow:0 1px 1px rgba(0,0,0,.5) inset}

.pname{font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:#4a2a06;font-weight:800}
.pval{font-size:13px;font-weight:800;color:#3a1d02;font-variant-numeric:tabular-nums;
  background:linear-gradient(180deg,#ffe39a,#f0a020);
  padding:1px 9px;border-radius:7px;
  box-shadow:0 1px 2px rgba(120,60,0,.4),0 1px 0 rgba(255,255,255,.4) inset;
  min-width:46px;text-align:center}

/* ===== footer: tone mini-slider + mix + footswitch ===== */
.footrow{display:flex;align-items:center;gap:12px;margin:8px 6px 2px;z-index:2;position:relative}
.minis{flex:1;display:flex;flex-direction:column;gap:9px}
.mini{display:flex;align-items:center;gap:8px}
.mlabel{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:#4a2a06;font-weight:800;width:48px}
.track{flex:1;height:8px;border-radius:5px;position:relative;cursor:pointer;touch-action:none;
  background:linear-gradient(180deg,#2a1604,#160c02);
  box-shadow:0 1px 2px rgba(0,0,0,.5) inset,0 0 0 1px rgba(60,32,4,.5)}
.fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;width:calc(var(--n,0)*100%);
  background:linear-gradient(90deg,var(--ac2),var(--ac));
  box-shadow:0 0 8px rgba(255,150,40,.55)}
.thumb{position:absolute;top:50%;width:15px;height:15px;border-radius:50%;margin:-7.5px 0 0 -7.5px;
  left:calc(var(--n,0)*100%);
  background:radial-gradient(circle at 38% 32%,#fff0cc,#e0a02a 60%,#a06010);
  box-shadow:0 1px 3px rgba(0,0,0,.6),0 0 0 1px rgba(60,32,4,.4)}

.fsw{display:flex;flex-direction:column;align-items:center;gap:6px}
.switch{width:50px;height:50px;border-radius:50%;cursor:pointer;border:none;position:relative;
  background:radial-gradient(circle at 40% 32%,#e9eef0,#9aa4a6 52%,#5a6264);
  box-shadow:0 6px 12px -4px rgba(0,0,0,.7),0 0 0 4px #20140a,0 0 0 5px rgba(255,190,90,.15),
    0 2px 0 rgba(255,255,255,.5) inset;
  transition:transform .08s}
.switch:active{transform:scale(.93)}
.switch::after{content:"";position:absolute;inset:16px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#cfd6d8,#6f7779);box-shadow:0 1px 2px rgba(0,0,0,.5) inset}
.led{width:9px;height:9px;border-radius:50%;background:var(--ac2);
  box-shadow:0 0 9px var(--ac2),0 0 16px rgba(255,90,30,.6);
  animation:pulse 1.7s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 9px var(--ac2),0 0 16px rgba(255,90,30,.6)}
  50%{opacity:.55;box-shadow:0 0 5px var(--ac2)}}
.fslabel{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#4a2a06;font-weight:800}

.serial{position:absolute;bottom:5px;left:0;right:0;text-align:center;
  font-size:7px;letter-spacing:.28em;color:#5a3206;opacity:.6;z-index:2}
</style>
</head>
<body>
<div class="stomp" id="stomp">
  <span class="screw tl"></span><span class="screw tr"></span>
  <span class="screw bl"></span><span class="screw br"></span>

  <div class="head">
    <div class="brand">Vibe Effects</div>
    <h1>Amber Crunch</h1>
    <div class="sub">Germanium Distortion</div>
  </div>

  <div class="window" id="window">
    <div class="grid"></div>
    <div class="mid"></div>
    <div class="clipline top"></div>
    <div class="clipline bot"></div>
    <div class="scan"></div>
    <svg class="scope" viewBox="0 0 300 88" preserveAspectRatio="none">
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#ff5a2a"/>
          <stop offset=".5" stop-color="#ffb02a"/>
          <stop offset="1" stop-color="#ff5a2a"/>
        </linearGradient>
      </defs>
      <path class="wglow" id="wglow" d=""></path>
      <path class="wave" id="wave" d=""></path>
    </svg>
  </div>

  <div class="deck" id="deck"></div>

  <div class="footrow">
    <div class="minis" id="minis"></div>
    <div class="fsw">
      <button class="switch" id="bypass" title="True bypass"></button>
      <div class="led" id="led"></div>
      <div class="fslabel">On</div>
    </div>
  </div>

  <div class="serial">AC&middot;DISTORTION+&middot;8P7SXGP</div>
</div>

<script>
(function(){
  var PARAMS=[
    {name:"Distortion",index:0,min:0,max:1,def:0.55},
    {name:"Output",    index:1,min:0,max:1,def:0.6},
    {name:"Tone",      index:2,min:0,max:1,def:0.45},
    {name:"Mix",       index:3,min:0,max:1,def:1}
  ];
  var state={};
  var deck=document.getElementById('deck');
  var minis=document.getElementById('minis');
  var win=document.getElementById('window');
  var wave=document.getElementById('wave');
  var wglow=document.getElementById('wglow');

  function send(idx,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(idx,v); }
  function pct(n){ return Math.round(n*100)+"%"; }

  function makeCtl(p,setVis){
    var v=p.def;
    function norm(){ return (v-p.min)/((p.max-p.min)||1); }
    function setNorm(n){ n=n<0?0:n>1?1:n; v=p.min+(p.max-p.min)*n; setVis(norm()); state[p.index]=v; send(p.index,v); onChange(); }
    state[p.index]=v; send(p.index,v); setVis(norm());
    return {p:p,norm:norm,setNorm:setNorm,reset:function(){v=p.def;setNorm(norm());}};
  }

  // ---- big chicken-head knobs: Distortion + Output ----
  function buildKnob(p,i){
    var cell=document.createElement('div');
    cell.className='pot'; cell.style.setProperty('--d',(i*90)+'ms');
    var ticks='';
    for(var t=0;t<11;t++){ ticks+='<i style="--a:'+(-135+t*27)+'deg"></i>'; }
    cell.innerHTML=
      '<div class="knob" tabindex="0">'+
        '<i class="skirt"></i>'+
        '<div class="ticks">'+ticks+'</div>'+
        '<i class="arc"></i>'+
        '<i class="cap"></i>'+
      '</div>'+
      '<div class="pname">'+p.name+'</div>'+
      '<div class="pval"></div>';
    deck.appendChild(cell);
    var knob=cell.querySelector('.knob');
    var arc=cell.querySelector('.arc');
    var cap=cell.querySelector('.cap');
    var val=cell.querySelector('.pval');

    var ctl=makeCtl(p,function(n){
      arc.style.setProperty('--n',n);
      cap.style.setProperty('--n',n);
      val.textContent=pct(n);
    });

    var drag=false,startY=0,startN=0;
    knob.addEventListener('pointerdown',function(e){
      drag=true;startY=e.clientY;startN=ctl.norm();
      knob.classList.add('act');knob.setPointerCapture(e.pointerId);e.preventDefault();
    });
    knob.addEventListener('pointermove',function(e){
      if(!drag)return; var speed=e.shiftKey?620:210;
      ctl.setNorm(startN+(startY-e.clientY)/speed);
    });
    function end(){drag=false;knob.classList.remove('act');}
    knob.addEventListener('pointerup',end);
    knob.addEventListener('pointercancel',end);
    knob.addEventListener('dblclick',ctl.reset);
    knob.addEventListener('wheel',function(e){e.preventDefault();ctl.setNorm(ctl.norm()+(e.deltaY<0?.025:-.025));},{passive:false});
    knob.addEventListener('keydown',function(e){
      if(e.key==='ArrowUp'||e.key==='ArrowRight'){ctl.setNorm(ctl.norm()+.02);e.preventDefault();}
      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){ctl.setNorm(ctl.norm()-.02);e.preventDefault();}
    });
  }

  // ---- mini sliders: Tone + Mix ----
  function buildSlider(p){
    var row=document.createElement('div');
    row.className='mini';
    row.innerHTML='<div class="mlabel">'+p.name+'</div>'+
      '<div class="track"><div class="fill"></div><div class="thumb"></div></div>'+
      '<div class="pval" style="min-width:42px;font-size:11px">'+'</div>';
    minis.appendChild(row);
    var track=row.querySelector('.track');
    var fill=row.querySelector('.fill');
    var thumb=row.querySelector('.thumb');
    var val=row.querySelector('.pval');

    var ctl=makeCtl(p,function(n){
      fill.style.setProperty('--n',n);
      thumb.style.setProperty('--n',n);
      val.textContent=pct(n);
    });

    function fromEvt(e){ var r=track.getBoundingClientRect(); ctl.setNorm((e.clientX-r.left)/r.width); }
    var drag=false;
    track.addEventListener('pointerdown',function(e){drag=true;track.setPointerCapture(e.pointerId);fromEvt(e);e.preventDefault();});
    track.addEventListener('pointermove',function(e){if(drag)fromEvt(e);});
    track.addEventListener('pointerup',function(){drag=false;});
    track.addEventListener('pointercancel',function(){drag=false;});
    track.addEventListener('dblclick',ctl.reset);
    track.addEventListener('wheel',function(e){e.preventDefault();ctl.setNorm(ctl.norm()+(e.deltaY<0?.03:-.03));},{passive:false});
  }

  // ---- live germanium clip waveform ----
  function onChange(){
    var dist=state[0]!=null?state[0]:0.55;
    var out =state[1]!=null?state[1]:0.6;
    var tone=state[2]!=null?state[2]:0.45;
    var mix =state[3]!=null?state[3]:1;
    var g=1.5+dist*dist*16;                 // visual drive into clippers
    var amp=(0.26+0.5*out);
    var vf=0.92;                            // round germanium clamp
    var hot=dist>0.55;
    win.classList.toggle('hot',hot);
    var pts=[],N=140;
    for(var x=0;x<=N;x++){
      var t=x/N, ph=t*Math.PI*4;
      var dry=Math.sin(ph);
      // asymmetric round soft-clip then firm clamp (matches DSP voicing)
      var xb=dry*g+0.06*dry*dry*g;
      var y=Math.tanh(xb);
      if(y>vf) y=vf+(y-vf)*0.12; else if(y<-vf) y=-vf+(y+vf)*0.12;
      // tone tilt: bright lifts a touch of upper ripple
      var bright=(tone-0.5)*2;
      y+=bright*0.12*Math.sin(ph*3)*Math.abs(y);
      var s=dry*(1-mix)+y*mix;
      var py=44 - s*amp*40;
      pts.push((x*(300/N)).toFixed(1)+","+py.toFixed(1));
    }
    var d='M'+pts.join(' L');
    wave.setAttribute('d',d); wglow.setAttribute('d',d);
  }

  PARAMS.filter(function(p){return p.index<2;}).forEach(buildKnob);
  PARAMS.filter(function(p){return p.index>=2;}).forEach(buildSlider);

  // cosmetic true-bypass footswitch
  var engaged=true;
  var stomp=document.getElementById('stomp');
  var led=document.getElementById('led');
  document.getElementById('bypass').addEventListener('click',function(){
    engaged=!engaged;
    stomp.style.filter=engaged?'none':'saturate(.4) brightness(.82)';
    led.style.animationPlayState=engaged?'running':'paused';
    led.style.opacity=engaged?'':'0.2';
    document.querySelector('.fslabel').textContent=engaged?'On':'Off';
  });

  function ready(){ onChange(); }
  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();
})();
</script>
</body>
</html>
