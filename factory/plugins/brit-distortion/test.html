<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brit Distortion — test bench</title><style>
  :root{--ac:#ffcf3d}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Brit Distortion</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

    <div class="row"><label>Source

  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n:root{\n  --gold:#ffcf3d;        /* faceplate gold accent */\n  --ember:#d94a2a;       /* hot clipping ember */\n  --panel:#0c0b0a;       /* black tolex */\n  --brass:#caa23b;\n  --ink:#15110a;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:#f3e6c4;\n  background:\n    radial-gradient(130% 100% at 50% -20%,#211a12 0%,#0d0a07 60%,#040302 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:22px;overflow:hidden;\n}\n\n/* ===================== AMP CABINET ===================== */\n.amp{\n  position:relative;\n  width:360px;\n  border-radius:16px;\n  padding:16px;\n  background:\n    linear-gradient(180deg,#1c1714 0%,#100c09 55%,#070504 100%);\n  box-shadow:\n    0 44px 90px -22px rgba(0,0,0,.85),\n    0 0 0 2px #060403,\n    0 0 0 10px #18130d,           /* black tolex border */\n    0 0 0 12px #2a2014,\n    0 0 0 13px rgba(255,207,61,.08);\n  animation:rise .7s cubic-bezier(.2,.8,.25,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(26px) scale(.96)}to{opacity:1;transform:none}}\n\n/* tolex grain over the whole cab */\n.amp::before{\n  content:\"\";position:absolute;inset:0;border-radius:16px;pointer-events:none;\n  background:\n    repeating-linear-gradient(58deg,rgba(255,255,255,.022) 0 1px,transparent 1px 4px),\n    repeating-linear-gradient(-58deg,rgba(0,0,0,.18) 0 1px,transparent 1px 4px);\n  opacity:.6;mix-blend-mode:overlay;\n}\n\n/* corner protectors */\n.corner{position:absolute;width:24px;height:24px;z-index:3;\n  background:radial-gradient(circle at 35% 30%,#3a3326,#1a160f 70%);\n  box-shadow:0 1px 2px rgba(0,0,0,.7),inset 0 1px 1px rgba(255,255,255,.12);}\n.corner.tl{top:-7px;left:-7px;border-radius:14px 4px 14px 4px}\n.corner.tr{top:-7px;right:-7px;border-radius:4px 14px 4px 14px}\n.corner.bl{bottom:-7px;left:-7px;border-radius:4px 14px 4px 14px}\n.corner.br{bottom:-7px;right:-7px;border-radius:14px 4px 14px 4px}\n\n/* ===================== GOLD FACEPLATE ===================== */\n.faceplate{\n  position:relative;\n  border-radius:9px;\n  padding:14px 16px 12px;\n  background:\n    linear-gradient(180deg,#ffe07a 0%,#f2bb33 18%,#d99a1e 55%,#b97e16 100%);\n  box-shadow:\n    inset 0 1px 0 rgba(255,255,255,.7),\n    inset 0 -3px 8px rgba(80,45,0,.5),\n    0 2px 4px rgba(0,0,0,.6),\n    0 0 0 1px #6e4d0d;\n}\n/* brushed gold sheen */\n.faceplate::before{\n  content:\"\";position:absolute;inset:0;border-radius:9px;pointer-events:none;\n  background:\n    repeating-linear-gradient(90deg,rgba(255,255,255,.10) 0 1px,transparent 1px 3px),\n    radial-gradient(120% 80% at 25% 0%,rgba(255,255,255,.45),transparent 50%);\n  mix-blend-mode:screen;opacity:.55;\n}\n\n/* brand row */\n.brandrow{display:flex;align-items:center;justify-content:space-between;\n  position:relative;z-index:2;margin-bottom:6px}\n.logo{\n  font-family:\"Brush Script MT\",\"Segoe Script\",cursive;\n  font-size:30px;font-weight:700;font-style:italic;\n  color:#1a1206;\n  text-shadow:0 1px 0 rgba(255,255,255,.55),0 2px 3px rgba(80,50,0,.5);\n  letter-spacing:.5px;line-height:1;\n}\n.modeltag{\n  font:700 9px/1 ui-sans-serif,system-ui;letter-spacing:.22em;\n  color:#3a2807;text-transform:uppercase;\n  border:1px solid rgba(58,40,7,.5);border-radius:3px;padding:4px 6px;\n  background:rgba(255,255,255,.12);\n}\n\n/* power lamp (jewel) */\n.jewel{\n  position:relative;width:16px;height:16px;border-radius:50%;\n  background:radial-gradient(circle at 38% 32%,#ffe8a0,var(--ember) 55%,#5c1503 100%);\n  box-shadow:0 0 12px 3px rgba(217,74,42,.7),inset 0 0 4px rgba(0,0,0,.4);\n  animation:flicker 3.4s ease-in-out infinite;\n}\n@keyframes flicker{\n  0%,100%{box-shadow:0 0 12px 3px rgba(217,74,42,.7),inset 0 0 4px rgba(0,0,0,.4)}\n  50%{box-shadow:0 0 18px 5px rgba(255,160,60,.85),inset 0 0 4px rgba(0,0,0,.4)}\n}\n\n/* ===================== CLIPPING SCOPE ===================== */\n.scope{\n  position:relative;z-index:2;\n  margin:4px 0 10px;border-radius:6px;height:78px;overflow:hidden;\n  background:\n    radial-gradient(120% 140% at 50% 0%,#2a1404 0%,#170a02 70%,#0a0401 100%);\n  box-shadow:inset 0 0 0 1px #6e4d0d,inset 0 4px 14px rgba(0,0,0,.7);\n}\n.scope svg{display:block;width:100%;height:100%}\n.grid{stroke:rgba(255,207,61,.10);stroke-width:1}\n.wave{fill:none;stroke:url(#emberg);stroke-width:2.4;\n  filter:drop-shadow(0 0 5px rgba(217,74,42,.85));\n  stroke-linejoin:round;stroke-linecap:round}\n.rail{stroke:rgba(255,207,61,.28);stroke-width:1;stroke-dasharray:4 5}\n.glow{animation:pulse 1.6s ease-in-out infinite}\n@keyframes pulse{0%,100%{opacity:.92}50%{opacity:.6}}\n\n/* ===================== TWEED GRILLE + KNOBS ===================== */\n.deck{\n  position:relative;z-index:2;\n  border-radius:7px;padding:16px 8px 12px;\n  background:\n    repeating-linear-gradient(48deg,#7a6336 0 2px,#5e4c28 2px 4px),\n    repeating-linear-gradient(-48deg,rgba(0,0,0,.22) 0 2px,transparent 2px 4px),\n    linear-gradient(180deg,#6b572f,#4a3c20);\n  box-shadow:inset 0 0 0 1px #2c2310,inset 0 2px 10px rgba(0,0,0,.6),\n             0 1px 0 rgba(255,255,255,.06);\n}\n.deck::after{ /* grille cloth weave shimmer */\n  content:\"\";position:absolute;inset:0;border-radius:7px;pointer-events:none;\n  background:repeating-linear-gradient(90deg,rgba(0,0,0,.10) 0 3px,transparent 3px 6px);\n  opacity:.5;\n}\n.knobs{display:flex;justify-content:space-around;position:relative;z-index:2}\n\n.pot{display:flex;flex-direction:column;align-items:center;gap:7px;\n  opacity:0;transform:translateY(10px);\n  animation:potin .55s cubic-bezier(.2,.8,.25,1) forwards;animation-delay:var(--d)}\n@keyframes potin{to{opacity:1;transform:none}}\n\n.knob{position:relative;width:64px;height:64px;cursor:ns-resize;touch-action:none;\n  outline:none;transition:transform .12s ease}\n.knob:hover{transform:translateY(-2px)}\n.knob.act{transform:scale(1.04)}\n\n/* glowing ring behind the cap reflects value */\n.arc{position:absolute;inset:-7px;border-radius:50%;\n  background:conic-gradient(from 220deg,\n     var(--ember) 0deg,\n     var(--gold) calc(var(--n,0)*280deg),\n     rgba(255,255,255,.06) calc(var(--n,0)*280deg),\n     rgba(255,255,255,.06) 280deg,\n     transparent 280deg);\n  -webkit-mask:radial-gradient(circle,transparent 56%,#000 58%);\n          mask:radial-gradient(circle,transparent 56%,#000 58%);\n  filter:drop-shadow(0 0 6px rgba(255,180,60,.55));}\n\n.skirt{position:absolute;inset:2px;border-radius:50%;\n  background:radial-gradient(circle at 50% 38%,#2a2a2c,#101012 70%,#050506);\n  box-shadow:0 5px 10px rgba(0,0,0,.6),inset 0 1px 1px rgba(255,255,255,.08);}\n\n/* chicken-head pointer cap */\n.cap{position:absolute;inset:11px;border-radius:50%;\n  background:\n    radial-gradient(circle at 42% 32%,#fff4cf 0%,var(--gold) 30%,#b9821a 70%,#6e4d0d 100%);\n  box-shadow:inset 0 1px 2px rgba(255,255,255,.7),inset 0 -3px 6px rgba(80,45,0,.6),\n             0 2px 3px rgba(0,0,0,.5);\n  transform:rotate(calc(-140deg + var(--n,0)*280deg));transition:transform .05s linear;}\n.cap::after{content:\"\";position:absolute;left:50%;top:5px;width:5px;height:16px;\n  margin-left:-2.5px;border-radius:2px;\n  background:linear-gradient(#1a1206,#3a2807);\n  box-shadow:0 0 5px rgba(217,74,42,.7);}\n\n.pname{font:700 10px/1 ui-sans-serif,system-ui;letter-spacing:.16em;\n  text-transform:uppercase;color:#f0d690;text-shadow:0 1px 1px rgba(0,0,0,.7)}\n.pval{font:700 11px/1 ui-monospace,Menlo,monospace;color:var(--gold);\n  text-shadow:0 0 6px rgba(255,180,60,.6);min-height:11px}\n\n/* bottom strip / serial */\n.foot{display:flex;justify-content:space-between;align-items:center;\n  margin-top:10px;position:relative;z-index:2;\n  font:600 9px/1 ui-monospace,Menlo,monospace;letter-spacing:.14em;color:#7c6a3c}\n.foot .input{display:flex;align-items:center;gap:6px}\n.jack{width:13px;height:13px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%,#3a3326,#0c0a06 70%);\n  box-shadow:inset 0 0 3px rgba(0,0,0,.9),0 0 0 2px #4a3c20}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"amp\">\n  <i class=\"corner tl\"><\/i><i class=\"corner tr\"><\/i><i class=\"corner bl\"><\/i><i class=\"corner br\"><\/i>\n\n  <div class=\"faceplate\">\n    <div class=\"brandrow\">\n      <div class=\"logo\">Brit&nbsp;Distortion<\/div>\n      <div class=\"jewel\" title=\"Power\"><\/div>\n    <\/div>\n\n    <div class=\"scope\">\n      <svg viewBox=\"0 0 320 78\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"emberg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#ffe07a\"/>\n            <stop offset=\"0.5\" stop-color=\"var(--gold)\"/>\n            <stop offset=\"1\" stop-color=\"#d94a2a\"/>\n          <\/linearGradient>\n        <\/defs>\n        <line class=\"grid\" x1=\"0\" y1=\"39\" x2=\"320\" y2=\"39\"/>\n        <line class=\"grid\" x1=\"80\" y1=\"0\" x2=\"80\" y2=\"78\"/>\n        <line class=\"grid\" x1=\"160\" y1=\"0\" x2=\"160\" y2=\"78\"/>\n        <line class=\"grid\" x1=\"240\" y1=\"0\" x2=\"240\" y2=\"78\"/>\n        <line class=\"rail\" id=\"railT\" x1=\"0\" y1=\"12\" x2=\"320\" y2=\"12\"/>\n        <line class=\"rail\" id=\"railB\" x1=\"0\" y1=\"66\" x2=\"320\" y2=\"66\"/>\n        <path class=\"wave glow\" id=\"wave\" d=\"\"/>\n      <\/svg>\n    <\/div>\n\n    <div class=\"deck\">\n      <div class=\"knobs\" id=\"knobs\"><\/div>\n    <\/div>\n\n    <div class=\"foot\">\n      <div class=\"input\"><span class=\"jack\"><\/span>INPUT<\/div>\n      <div>BD-1 &middot; CLASS-A PREAMP<\/div>\n      <div class=\"modeltag\">Amp&nbsp;In&nbsp;A&nbsp;Box<\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"Gain\",  index:0,min:0,max:1,def:0.55},\n    {name:\"Bass\",  index:1,min:0,max:1,def:0.5},\n    {name:\"Mid\",   index:2,min:0,max:1,def:0.5},\n    {name:\"Treble\",index:3,min:0,max:1,def:0.55},\n    {name:\"Level\", index:4,min:0,max:1,def:0.6}\n  ];\n  var state={};\n  var knobsEl=document.getElementById('knobs');\n  var waveEl=document.getElementById('wave');\n\n  function disp(v){ return Math.round(v*10); } // 0..10 amp-knob feel\n\n  function buildKnob(p,i){\n    var cell=document.createElement('div');\n    cell.className='pot'; cell.style.setProperty('--d',(i*70)+'ms');\n    cell.innerHTML=\n      '<div class=\"knob\" tabindex=\"0\" title=\"'+p.name+'\">'+\n        '<i class=\"arc\"><\/i><i class=\"skirt\"><\/i><i class=\"cap\"><\/i>'+\n      '<\/div>'+\n      '<div class=\"pname\">'+p.name+'<\/div>'+\n      '<div class=\"pval\"><\/div>';\n    knobsEl.appendChild(cell);\n\n    var knob=cell.querySelector('.knob');\n    var arc=cell.querySelector('.arc');\n    var cap=cell.querySelector('.cap');\n    var val=cell.querySelector('.pval');\n    var v=p.def;\n\n    function norm(){ return (v-p.min)/((p.max-p.min)||1); }\n    function paint(){\n      var nrm=norm();\n      arc.style.setProperty('--n',nrm);\n      cap.style.setProperty('--n',nrm);\n      val.textContent=disp(nrm);\n      state[p.index]=v;\n      if(window.vstai&&window.vstai.setParam) window.vstai.setParam(p.index,v);\n      onChange();\n    }\n    function setNorm(nrm){\n      nrm=nrm<0?0:nrm>1?1:nrm;\n      v=p.min+(p.max-p.min)*nrm;\n      paint();\n    }\n\n    var drag=false,startY=0,startN=0;\n    knob.addEventListener('pointerdown',function(e){\n      drag=true;startY=e.clientY;startN=norm();\n      knob.classList.add('act');knob.setPointerCapture(e.pointerId);e.preventDefault();\n    });\n    knob.addEventListener('pointermove',function(e){\n      if(!drag)return;\n      var speed=e.shiftKey?620:210;\n      setNorm(startN+(startY-e.clientY)/speed);\n    });\n    function end(){drag=false;knob.classList.remove('act');}\n    knob.addEventListener('pointerup',end);\n    knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){v=p.def;paint();});\n    knob.addEventListener('wheel',function(e){\n      e.preventDefault();setNorm(norm()+(e.deltaY<0?0.025:-0.025));\n    },{passive:false});\n    knob.addEventListener('keydown',function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){setNorm(norm()+0.02);e.preventDefault();}\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setNorm(norm()-0.02);e.preventDefault();}\n    });\n\n    paint();\n  }\n\n  // ---- live amp-in-a-box clip + tone-stack visualisation ----\n  function onChange(){\n    var gain =state[0]!=null?state[0]:0.55;\n    var bass =state[1]!=null?state[1]:0.5;\n    var mid  =state[2]!=null?state[2]:0.5;\n    var treb =state[3]!=null?state[3]:0.55;\n    var level=state[4]!=null?state[4]:0.6;\n\n    var g=1+gain*22;                         // visual drive\n    var amp=18+22*level;\n    var bassG=0.35+bass*1.85, midG=0.18+mid*2.42, trebG=0.30+treb*2.10;\n\n    var pts=[],N=160;\n    for(var x=0;x<=N;x++){\n      var t=x/N;\n      var ph=t*Math.PI*4;\n      var dry=Math.sin(ph);\n      // tone stack reshaping: low fundamental + mid harmonic + treble fizz\n      var shaped=dry*(0.5+0.5*bassG/2.2)\n               + 0.35*Math.sin(ph*2)*(midG/2.6)\n               + 0.20*Math.sin(ph*4)*(trebG/2.4);\n      // soft-knee -> hard tanh rail (amp-in-a-box clipper)\n      var soft=shaped*g; soft=soft-(soft*soft*soft)/9;\n      var wet=Math.tanh(soft*0.7)*0.92;\n      var y=39 - wet*amp;\n      pts.push((x*(320/N)).toFixed(1)+\",\"+y.toFixed(2));\n    }\n    waveEl.setAttribute('d','M'+pts.join(' L'));\n    // clip rails tighten as gain climbs\n    var railY=amp*0.92;\n    document.getElementById('railT').setAttribute('y1',(39-railY).toFixed(1));\n    document.getElementById('railT').setAttribute('y2',(39-railY).toFixed(1));\n    document.getElementById('railB').setAttribute('y1',(39+railY).toFixed(1));\n    document.getElementById('railB').setAttribute('y2',(39+railY).toFixed(1));\n  }\n\n  PARAMS.forEach(buildKnob);\n\n  function ready(){ onChange(); }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;

  function st(m){document.getElementById('st').textContent=m;}

  function makeRiff(){

      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
