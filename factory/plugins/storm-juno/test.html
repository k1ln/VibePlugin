  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Storm Juno<\/title>\n<style>\n  :root {\n    --accent: #9a7bff;\n    --accent2: #3de0ff;\n    --bg0: #0a0716;\n    --bg1: #160d2e;\n    --bg2: #1d1142;\n    --ink: #e7e3ff;\n    --dim: #8a82b8;\n    --panel: #120a26;\n    --line: rgba(154,123,255,0.16);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background: var(--bg0);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .wrap {\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 16px;\n  }\n\n  /* ---- stormy shell ------------------------------------------------ */\n  .shell {\n    position: relative;\n    border-radius: 18px;\n    padding: 18px 20px 20px;\n    overflow: hidden;\n    background:\n      radial-gradient(120% 90% at 20% -10%, rgba(154,123,255,0.22), transparent 55%),\n      radial-gradient(120% 120% at 110% 120%, rgba(61,224,255,0.18), transparent 55%),\n      linear-gradient(160deg, var(--bg2), var(--bg0) 70%);\n    border: 1px solid rgba(154,123,255,0.28);\n    box-shadow:\n      0 20px 60px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(255,255,255,0.06);\n  }\n\n  /* drifting storm clouds */\n  .shell::before {\n    content: \"\";\n    position: absolute;\n    inset: -40%;\n    background:\n      radial-gradient(40% 30% at 30% 40%, rgba(80,40,160,0.30), transparent 60%),\n      radial-gradient(35% 28% at 70% 60%, rgba(20,120,170,0.26), transparent 60%),\n      radial-gradient(30% 24% at 50% 20%, rgba(120,80,220,0.22), transparent 60%);\n    filter: blur(8px);\n    animation: drift 26s ease-in-out infinite alternate;\n    pointer-events: none;\n  }\n  @keyframes drift {\n    0%   { transform: translate(0,0) scale(1); }\n    100% { transform: translate(-6%, 4%) scale(1.08); }\n  }\n\n  /* ---- header ------------------------------------------------------ */\n  header {\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 14px;\n  }\n  .brand { display: flex; align-items: baseline; gap: 10px; }\n  .logo {\n    font-weight: 800;\n    font-size: 26px;\n    letter-spacing: 0.5px;\n    background: linear-gradient(90deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    text-shadow: 0 0 24px rgba(154,123,255,0.35);\n  }\n  .sub {\n    font-size: 10px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: var(--dim);\n  }\n\n  /* rave LED strip */\n  .leds { display: flex; gap: 6px; }\n  .led {\n    width: 9px; height: 9px;\n    border-radius: 50%;\n    background: rgba(154,123,255,0.25);\n    box-shadow: inset 0 0 3px rgba(0,0,0,0.6);\n  }\n  .led.on {\n    background: var(--accent2);\n    box-shadow: 0 0 10px var(--accent2), 0 0 18px rgba(61,224,255,0.6);\n  }\n\n  /* ---- visualiser -------------------------------------------------- */\n  .viz {\n    position: relative;\n    height: 132px;\n    border-radius: 12px;\n    background:\n      linear-gradient(180deg, rgba(8,4,20,0.9), rgba(20,10,44,0.55));\n    border: 1px solid var(--line);\n    overflow: hidden;\n    margin-bottom: 16px;\n  }\n  .viz canvas { display: block; width: 100%; height: 100%; }\n  .viz .tag {\n    position: absolute; top: 8px; left: 10px;\n    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;\n    color: var(--dim);\n  }\n\n  /* ---- control grid ------------------------------------------------ */\n  .rack {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 12px 8px;\n    background: rgba(8,4,20,0.4);\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 16px 12px 14px;\n    margin-bottom: 16px;\n  }\n\n  .cell {\n    display: flex;\n oard ------------------------------------------\n  var keysHost = document.getElementById(\"keys\");\n  var FIRST = 48;        // C3\n  var OCTAVES = 2;\n  var WHITE = [0, 2, 4, 5, 7, 9, 11];\n  var BLACK = { 1: 0, 3: 1, 6: 3, 8: 4, 10: 5 };\n  var heldKeys = {};\n\n  function buildKeys() {\n    var whiteCount = OCTAVES * 7 + 1;\n    var wW = 100 / whiteCount;\n    var whiteIdx = 0;\n    for (var oct = 0; oct <= OCTAVES; oct++) {\n      for (var s = 0; s < 7; s++) {\n        if (oct === OCTAVES && s > 0) break;\n        var note = FIRST + oct * 12 + WHITE[s];\n        var el = document.createElement(\"div\");\n        el.className = \"wkey\";\n        el.style.left = (whiteIdx * wW) + \"%\";\n        el.style.width = (wW - 0.4) + \"%\";\n        bindKey(el, note);\n        keysHost.appendChild(el);\n        whiteIdx++;\n      }\n    }\n    whiteIdx = 0;\n    for (var oct2 = 0; oct2 <= OCTAVES; oct2++) {\n      for (var s2 = 0; s2 < 7; s2++) {\n        if (oct2 === OCTAVES) break;\n        var semi = WHITE[s2];\n        whiteIdx++;\n        if (semi === 0 || semi === 2 || semi === 5 || semi === 7 || semi === 9) {\n          var note2 = FIRST + oct2 * 12 + semi + 1;\n          var bk = document.createElement(\"div\");\n          bk.className = \"bkey\";\n          bk.style.left = (whiteIdx * wW - wW * 0.3) + \"%\";\n          bk.style.width = (wW * 0.6) + \"%\";\n          bindKey(bk, note2);\n          keysHost.appendChild(bk);\n        }\n      }\n    }\n  }\n\n  function bindKey(el, note) {\n    function on(e) {\n      e.preventDefault();\n      if (heldKeys[note]) return;\n      heldKeys[note] = true;\n      el.classList.add(\"down\");\n      if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(note, 0.9);\n    }\n    function off() {\n      if (!heldKeys[note]) return;\n      heldKeys[note] = false;\n      el.classList.remove(\"down\");\n      if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(note);\n    }\n    el.addEventListener(\"mousedown   function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);

  }
  async function ensure(){

    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};

  document.getElementById('go').addEventListener('click',async function(){

    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }

  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};

  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function setOct(o){ oct=o<-4?-4:(o>4?4:o); var ov=document.getElementById('octval'); if(ov)ov.textContent=(4+oct); }

  var held={};                                            // base note -> actual note played (so releases survive an octave change)
