<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tilt EQ — test bench</title><style>
  :root{--ac:#9ad0e0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

    <div class="row"><label>Source

         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>Tilt EQ<\/title>\n  <style>\n    :root {\n      --accent: #9ad0e0;\n      --accent2: #c0e0f0;\n      --bg0: #0b1116;\n      --bg1: #121b22;\n      --panel: #18242c;\n      --panel2: #1f2e38;\n      --line: rgba(154, 208, 224, 0.14);\n      --ink: #dce9ef;\n      --ink-dim: #7d94a0;\n      --beam: #aebcc4;\n      --shadow: rgba(0, 0, 0, 0.55);\n    }\n\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n\n    html, body {\n      width: 100%;\n      height: 100%;\n      background:\n        radial-gradient(120% 80% at 50% -10%, #16242d 0%, var(--bg0) 60%),\n        var(--bg0);\n      color: var(--ink);\n      font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n      -webkit-font-smoothing: antialiased;\n    }\n\n    body {\n      display: flex;\n      justify-content: center;\n      align-items: flex-start;\n      padding: 18px;\n      overflow-y: auto;\n    }\n\n    .shell {\n      width: 100%;\n      max-width: 540px;\n      background:\n        linear-gradient(180deg, var(--panel2) 0%, var(--panel) 100%);\n      border: 1px solid var(--line);\n      border-radius: 18px;\n      box-shadow:\n        0 1px 0 rgba(255, 255, 255, 0.04) inset,\n        0 28px 60px -30px var(--shadow),\n        0 0 0 1px rgba(0, 0, 0, 0.4);\n      padding: 22px 24px 26px;\n      position: relative;\n      overflow: hidden;\n    }\n\n    .shell::before {\n      content: \"\";\n      position: absolute;\n      inset: 0 0 auto 0;\n      height: 2px;\n      background: linear-gradient(90deg, transparent, var(--accent), transparent);\n      opacity: 0.5;\n    }\n\n    /* ---------- header ---------- */\n    header {\n      display: flex;\n      align-items: baseline;\n      justify-content: space-between;\n      margin-bottom: 16px;\n    }\n    .brand {\n      display: flex;\n      align-items: baseline;\n      gap: 10px;\n    }\n    .brand h1 {\n      font-size: 15px;\n      letter-spacing: 0.32em;\n      font-weight: 600;\n      text-transform: uppercase;\n      color: var(--ink);\n    }\n    .brand .dot {\n      width: 7px;\n      height: 7px;\n      border-radius: 50%;\n      background: var(--accent);\n      box-shadow: 0 0 10px var(--accent);\n      align-self: center;\n    }\n    .sub {\n      font-size: 9px;\n      letter-spacing: 0.34em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n    }\n\n    /* ---------- see-saw stage ---------- */\n    .stage {\n      position: relative;\n      height: 180px;\n      border-radius: 14px;\n      background:\n        radial-gradient(120% 140% at 50% 120%, #1c2c36 0%, #101a20 70%);\n      border: 1px solid var(--line);\n      box-shadow: inset 0 2px 14px rgba(0, 0, 0, 0.5);\n      overflow: hidden;\n      margin-bottom: 8px;\n    }\n\n    .grid-lines {\n      position: absolute;\n      inset: 0;\n      background-image:\n        linear-gradient(var(--line) 1px, transparent 1px);\n      background-size: 100% 30px;\n      opacity: 0.35;\n      pointer-events: none;\n    }\n\n    /* labels for the two ends */\n    .end-label {\n      position: absolute;\n      bottom: 12px;\n      font-size: 9px;\n      letter-spacing: 0.28em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      pointer-events: none;\n    }\n    .end-label.bass { left: 22px; }\n    .end-label.treble { right: 22px; }\n\n    svg.seesaw { position: absolute; inset: 0; width: 100%; height: 100%; }\n\n    .fulcrum-glow {\n      filter: drop-shadow(0 0 6px var(--accent));\n    }\n\n    /* pivot frequency readout, floats above the fulcrum */\n    .pivot-readout {\n      position: absolute;\n      left: 50%;\n      top: 14px;\n      transform: translateX(-50%);\n      font-size: 10px;\n      letter-spacing: 0.12em;\n      color: var(--accent2);\n      font-variant-numeric: tabular-nums;\n      text-shadow: 0 0 8px rgba(154, 208, 224, 0.4);\n      pointer-events: none;\n      white-space: nowrap;\n    }\n\n    /* subtle breathing pulse on the fulcrum ring */\n    @keyframes pulse {\n      0%, 100% { opacity: 0.45; transform: scale(1); }\n      50%      { opacity: 0.9;  transform: scale(1.12); }\n    }\n    .pulse-ring { animation: pulse 3.4s ease-in-out infinite; transform-origin: center; }\n\n    /* ---------- tilt scrub strip ---------- */\n    .tilt-strip {\n      position: relative;\n      height: 34px;\n      margin: 6px 0 18px;\n      border-radius: 10px;\n      background: linear-gradient(90deg, #16222a, #1d2c35, #16222a);\n      border: 1px solid var(--line);\n      box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.5);\n      cursor: ew-resize;\n      user-select: none;\n      overflow: hidden;\n    }\n    .tilt-strip .center-mark {\n      position: absolute;\n      left: 50%;\n      top: 0; bottom: 0;\n      width: 1px;\n      background: var(--line);\n    }\n    .tilt-fill {\n      position: absolute;\n      top: 0; bottom: 0;\n      left: 50%;\n      width: 0;\n      background: linear-gradient(90deg, rgba(154,208,224,0.05), rgba(154,208,224,0.28));\n      transition: none;\n    }\n    .tilt-thumb {\n      position: absolute;\n      top: 50%;\n      width: 14px;\n      height: 22px;\n      border-radius: 5px;\n      background: linear-gradient(180deg, #e9f4f8, #9fc3d2);\n      box-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 0 10px rgba(154,208,224,0.5);\n      transform: translate(-50%, -50%);\n      pointer-events: none;\n    }\n    .tilt-meta {\n      position: absolute;\n      top: 50%;\n      transform: translateY(-50%);\n      font-size: 9px;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n      pointer-events: none;\n    }\n    .tilt-meta.l { left: 10px; }\n    .tilt-meta.r { right: 10px; }\n    .tilt-value {\n      position: absolute;\n      left: 50%;\n      top: -16px;\n      transform: translateX(-50%);\n      font-size: 11px;\n      font-variant-numeric: tabular-nums;\n      letter-spacing: 0.1em;\n      color: var(--accent2);\n    }\n\n    /* ---------- knob row ---------- */\n    .knobs {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 12px;\n    }\n    .knob-cell {\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      gap: 7px;\n      padding: 12px 6px 10px;\n      border-radius: 12px;\n      background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(0,0,0,0.18));\n      border: 1px solid var(--line);\n    }\n    .knob {\n      position: relative;\n      width: 64px;\n      height: 64px;\n      cursor: ns-resize;\n      user-select: none;\n      touch-action: none;\n    }\n    .knob svg { width: 100%; height: 100%; display: block; }\n    .knob-name {\n      font-size: 9px;\n      letter-spacing: 0.24em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n    }\n    .knob-val {\n      font-size: 11px;\n      font-variant-numeric: tabular-nums;\n      letter-spacing: 0.06em;\n      color: var(--accent2);\n      min-height: 14px;\n    }\n    .knob:hover .arc-active { filter: drop-shadow(0 0 4px var(--accent)); }\n\n    footer {\n      margin-top: 16px;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      font-size: 8.5px;\n      letter-spacing: 0.26em;\n      text-transform: uppercase;\n      color: var(--ink-dim);\n    }\n  <\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"shell\">\n    <header>\n      <div class=\"brand\">\n        <span class=\"dot\"><\/span>\n        <h1>Tilt&nbsp;EQ<\/h1>\n      <\/div>\n      <div class=\"sub\">Spectral&nbsp;Balance<\/div>\n    <\/header>\n\n    <!-- See-saw stage: the beam physically pivots with Tilt -->\n    <div class=\"stage\">\n      <div class=\"grid-lines\"><\/div>\n      <div class=\"end-label bass\">Bass<\/div>\n      <div class=\"end-label treble\">Treble<\/div>\n      <div class=\"pivot-readout\" id=\"pivotReadout\">630 Hz<\/div>\n      <svg class=\"seesaw\" viewBox=\"0 0 540 180\" preserveAspectRatio=\"xMidYMid meet\">\n        <defs>\n          <linearGradient id=\"beamFill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#e7f1f5\"/>\n            <stop offset=\"1\" stop-color=\"#8ca6b2\"/>\n          <\/linearGradient>\n          <radialGradient id=\"ballBass\" cx=\"0.35\" cy=\"0.3\" r=\"0.8\">\n            <stop offset=\"0\" stop-color=\"#cfeaf3\"/>\n            <stop offset=\"1\" stop-color=\"#5f93a6\"/>\n          <\/radialGradient>\n          <radialGradient id=\"ballTreb\" cx=\"0.35\" cy=\"0.3\" r=\"0.8\">\n            <stop offset=\"0\" stop-color=\"#eaf6fb\"/>\n            <stop offset=\"1\" stop-color=\"#7fb6cb\"/>\n          <\/radialGradient>\n          <filter id=\"soft\" x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n            <feGaussianBlur stdDeviation=\"2.2\"/>\n          <\/filter>\n        <\/defs>\n\n        <!-- base shadow under fulcrum -->\n        <ellipse cx=\"270\" cy=\"150\" rx=\"70\" ry=\"9\" fill=\"rgba(0,0,0,0.45)\" filter=\"url(#soft)\"/>\n\n        <!-- the rotating beam group, pivoting about (270,118) -->\n        <g id=\"beamGroup\" transform=\"rotate(0 270 118)\">\n          <!-- beam bar -->\n          <rect x=\"60\" y=\"113\" width=\"420\" height=\"10\" rx=\"5\" fill=\"url(#beamFill)\"\n                stroke=\"rgba(255,255,255,0.25)\" stroke-width=\"0.6\"/>\n          <!-- end weights -->\n          <circle id=\"ballBass\"  cx=\"72\"  cy=\"118\" r=\"20\" fill=\"url(#ballBass)\"\n                  stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"0.8\"/>\n          <circle id=\"ballTreb\"  cx=\"468\" cy=\"118\    // ---------------------------------------------------------------\n    var P = {\n      TILT:   { index: 0, min: 0, max: 1, def: 0.5 },\n      PIVOT:  { index: 1, min: 0, max: 1, def: 0.5 },\n      BASS:   { index: 2, min: 0, max: 1, def: 0.5 },\n      TREBLE: { index: 3, min: 0, max: 1, def: 0.5 },\n      OUTPUT: { index: 4, min: 0, max: 1, def: 0.5 }\n    };\n\n    var values = {}; // index -> normalised 0..1\n\n    function pushParam(index, norm) {\n      values[index] = norm;\n      if (window.vstai && window.vstai.setParam) {\n        // params are normalised 0..1 in this plugin (min=0,max=1)\n        window.vstai.setParam(index, norm);\n      }\n    }\n\n    // ---- value formatting helpers (display only) ----\n    function fmtTiltDb(norm) {\n      // -1..+1 -> ±~8.4 dB of effective rebalance (tilt*0.7 -> ~±3 dB linear/octave feel)\n      var t = norm * 2 - 1;\n      var db = t * 8.4;\n      var s = (db >= 0 ? \"+\" : \"\") + db.toFixed(1) + \" dB\";\n      return s;\n    }\n    function pivotHz(norm) {\n      // 200..2000 Hz log (matches assembly: 200 * 10^norm)\n      return Math.round(200 * Math.pow(10, norm));\n    }\n    function shelfDb(norm) {\n      var db = (norm * 2 - 1) * 12;\n      return (db >= 0 ? \"+\" : \"\") + db.toFixed(1) + \" dB\";\n    }\n    function outDb(norm) {\n      var lin = norm * 2; // 0..2x\n      if (lin <= 0.0001) return \"-inf\";\n      var db = 20 * Math.log10(lin);\n      return (db >= 0 ? \"+\" : \"\") + db.toFixed(1) + \" dB\";\n    }\n\n    // ===============================================================\n    //  See-saw beam — rotates with Tilt, scales the weights too\n    // ===============================================================\n    var beamGroup = document.getElementById(\"beamGroup\");\n    var ballBass = document.getElementById(\"ballBass\");\n    var ballTreb = document.getElementById(\"ballTreb\");\n    var pivotReadout = document.getElementById(\"pivotReadout\");\n\n    function renderBeam() {\n      var t = values[P.TILT.index] * 2 - 1; // -1..+1\n      // positive tilt = brighter -> treble side DOWN (heavier high), bass side UP.\n      var angle = t * 9; // max ±9 degrees, tasteful\n      beamGroup.setAttribute(\"transform\", \"rotate(\" + angle.toFixed(2) + \" 270 118)\");\n      // weight sizes respond: heavier side grows slightly\n      var rBass = 20 - t * 5;   // tilt up -> bass shrinks\n      var rTreb = 20 + t * 5;   // tilt up -> treble grows\n      ballBass.setAttribute(\"r\", rBass.toFixed(2));\n      ballTreb.setAttribute(\"r\", rTreb.toFixed(2));\n    }\n\n    function renderPivot() {\n      pivotReadout.textContent = pivotHz(values[P.PIVOT.index]) + \" Hz\";\n      // shift the readout horizontally a touch with pivot for spatial cue\n      var n = values[P.PIVOT.index];\n      pivotReadout.style.left = (38 + n * 24) + \"%\";\n    }\n\n    // ===============================================================\n    //  Tilt scrub strip (horizontal drag, bipolar)\n    // ===============================================================\n    var tiltStrip = document.getElementById(\"tiltStrip\");\n    var tiltFill = document.getElementById(\"tiltFill\");\n    var tiltThumb = document.getElementById(\"tiltThumb\");\n    var tiltValue = document.getElementById(\"tiltValue\");\n\n    function renderTilt() {\n      var n = values[P.TILT.index]; // 0..1\n      var pct = n * 100;\n      tiltThumb.style.left = pct + \"%\";\n      tiltValue.textContent = fmtTiltDb(n);\n      // fill spreads from centre toward the thumb\n      if (n >= 0.5) {\n        tiltFill.style.left = \"50%\";\n        tiltFill.style.width = ((n - 0.5) * 100) + \"%\";\n      } else {\n        tiltFill.style.left = (n * 100) + \"%\";\n        tiltFill.style.width = ((0.5 - n) * 100) + \"%\";\n      }\n      renderBeam();\n    }\n\n    function tiltFromClientX(clientX) {\n      var r = tiltStrip.getBoundingClientRect();\n      var n = (clientX - r.left) / r.width;\n      return Math.max(0, Mat stroke=\"rgba(0,0,0,0.4)\" stroke-width=\"0.6\" ' +\n                  'transform=\"translate(0,1)\"/>' +\n          '<line class=\"pointer\" x1=\"32\" y1=\"32\" x2=\"32\" y2=\"16\" ' +\n                'stroke=\"var(--accent2)\" stroke-width=\"2.4\" stroke-linecap=\"round\"/>' +\n        '<\/svg>';\n\n      var valEl = document.createElement(\"div\");\n      valEl.className = \"knob-val\";\n\n      cell.appendChild(nameEl);\n      cell.appendChild(knob);\n      cell.appendChild(valEl);\n\n      var arcActive = knob.querySelector(\".arc-active\");\n      var pointer = knob.querySelector(\".pointer\");\n\n      function render() {\n        var n = values[meta.index];\n        // active arc: bipolar knobs fill from centre, unipolar from start\n        if (def.bipolar) {\n          var mid = START + SWEEP * 0.5;\n          var a = START + SWEEP * n;\n          if (n >= 0.5) arcActive.setAttribute(\"d\", makeArcPath(cx, cy, r, mid, a));\n          else          arcActive.setAttribute(\"d\", makeArcPath(cx, cy, r, a, mid));\n        } else {\n          arcActive.setAttribute(\"d\", makeArcPath(cx, cy, r, START, START + SWEEP * n));\n        }\n        var ang = START + SWEEP * n;\n        var px = cx + 16 * Math.cos(ang);\n        var py = cy + 16 * Math.sin(ang);\n        pointer.setAttribute(\"x2\", px.toFixed(2));\n        pointer.setAttribute(\"y2\", py.toFixed(2));\n        valEl.textContent = def.fmt(n);\n        if (def.key === \"PIVOT\") renderPivot();\n      }\n\n      // vertical drag\n      var dragging = false, lastY = 0;\n      function down(e) {\n        dragging = true;\n        lastY = e.touches ? e.touches[0].clientY : e.clientY;\n        e.preventDefault();\n      }\n      function move(e) {\n        if (!dragging) return;\n        var y = e.touches ? e.touches[0].clientY : e.clientY;\n        var dy = lastY - y;\n        lastY = y;\n        var n = Math.max(0, Math.min(1, values[meta.index] + dy * 0.005));\n        pushParam(meta.index, n);\n        render();\n        e.preventDefault();\n      }\n      function up() { dragging = false; }\n\n      knob.addEventListener(\"mousedown\", down);\n      window.addEventListener(\"mousemove\", move);\n      window.addEventListener(\"mouseup\", up);\n      knob.addEventListener(\"touchstart\", down, { passive: false });\n      window.addEventListener(\"touchmove\", move, { passive: false });\n      window.addEventListener(\"touchend\", up);\n      knob.addEventListener(\"dblclick\", function () {\n        pushParam(meta.index, meta.def);\n        render();\n      });\n      knob.addEventListener(\"wheel\", function (e) {\n        var n = Math.max(0, Math.min(1, values[meta.index] - Math.sign(e.deltaY) * 0.01));\n        pushParam(meta.index, n);\n        render();\n        e.preventDefault();\n      }, { passive: false });\n\n      knobRow.appendChild(cell);\n      return render;\n    }\n\n    // ===============================================================\n    //  Init\n    // ===============================================================\n    var knobRenderers = [];\n\n    function init() {\n      // seed all defaults\n      Object.keys(P).forEach(function (k) {\n        var p = P[k];\n        values[p.index] = p.def;\n      });\n      // push to engine\n      Object.keys(P).forEach(function (k) {\n        var p = P[k];\n        pushParam(p.index, p.def);\n      });\n      // build controls\n      renderTilt();\n      knobDefs.forEach(function (d) { knobRenderers.push(buildKnob(d)); });\n      knobRenderers.forEach(function (r) { r(); });\n      renderPivot();\n\n      var led = document.getElementById(\"statusLed\");\n      led.textContent = \"● Live\";\n      led.style.color = \"var(--accent)\";\n    }\n\n    if (window.vstai && window.vstai.onReady) {\n      window.vstai.onReady(init);\n    } else {\n      init();\n    }\n  <\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
