<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Atrium — test bench</title><style>
  :root{--ac:#9ad6e0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Atrium</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>

  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Atrium<\/title>\n<style>\n  :root {\n    --accent:  #9ad6e0;\n    --accent2: #c0e8c0;\n    --ink:     #1d3a40;\n    --ink-soft:#5b7e84;\n    --panel:   #eef7f6;\n    --panel-2: #e2f1ef;\n    --line:    rgba(40, 90, 96, 0.14);\n    --glow:    rgba(154, 214, 224, 0.55);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    height: 100%;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #ffffff 0%, var(--panel) 45%, var(--panel-2) 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  body {\n    display: flex;\n    justify-content: center;\n    align-items: flex-start;\n    padding: 18px;\n    overflow-x: hidden;\n  }\n\n  .shell {\n    width: 100%;\n    max-width: 680px;\n    border-radius: 22px;\n    background:\n      linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.55));\n    border: 1px solid rgba(255,255,255,0.8);\n    box-shadow:\n      0 24px 60px -24px rgba(34, 86, 92, 0.45),\n      0 2px 0 rgba(255,255,255,0.9) inset,\n      0 -1px 0 var(--line) inset;\n    padding: 20px 22px 24px;\n    backdrop-filter: blur(6px);\n  }\n\n  /* ---------- header ---------- */\n  header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 14px;\n  }\n  .brand { display: flex; align-items: center; gap: 12px; }\n  .mark {\n    width: 34px; height: 34px;\n    border-radius: 10px;\n    background: linear-gradient(150deg, var(--accent), var(--accent2));\n    box-shadow: 0 6px 16px -6px var(--glow), 0 1px 0 rgba(255,255,255,0.8) inset;\n    position: relative;\n    flex: none;\n  }\n  .mark::after {\n    content: \"\";\n    position: absolute; inset: 7px;\n    border: 1.6px solid rgba(255,255,255,0.85);\n    border-bottom: none;\n    border-radius: 8px 8px 0 0;\n  }\n  h1 {\n    font-size: 19px;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    font-weight: 600;\n    margin: 0;\n    color: var(--ink);\n  }\n  .tagline {\n    font-size: 9.5px;\n    letter-spacing: 0.34em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n    margin-top: 3px;\n  }\n  .badge {\n    font-size: 9px;\n    letter-spacing: 0.26em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n    border: 1px solid var(--line);\n    border-radius: 999px;\n    padding: 5px 11px;\n    background: rgba(255,255,255,0.6);\n  }\n\n  /* ---------- the room visualiser ---------- */\n  .room {\n    position: relative;\n    height: 188px;\n    border-radius: 16px;\n    overflow: hidden;\n    margin-bottom: 20px;\n    background:\n      radial-gradient(130% 120% at 50% 120%, rgba(192,232,192,0.35), rgba(154,214,224,0.12) 55%, rgba(255,255,255,0.0) 100%),\n      linear-gradient(180deg, #f4fbfa, #e6f4f2);\n    border: 1px solid var(--line);\n    box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset;\n  }\n  .room canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }\n  .room svg { position: absolute; inset: 0; width: 100%; height: 100%; }\n\n  .roomLabel {\n    position: absolute;\n    left: 14px; bottom: 11px;\n    font-size: 9px;\n    letter-spacing: 0.28em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n    pointer-events: none;\n  }\n\n  /* ---------- controls ---------- */\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 14px 10px;\n  }\n  @media (max-width: 460px) { .grid { grid-template-columns: repeat(2, 1fr); } }\n\n  .knob {\n    position: relative;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 7px;\n    padding: 12px 6px 11px;\n    border-radius: 14px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(232,244,242,0.45));\n    border: 1px solid var(--line);\n    box-shadow: 0 1px 0 rgba(255,255,255,0.85) inset;\n    cursor: ns-resize;\n    user-select: none;\n    transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease;\n  }\n  .knob:hover { border-color: rgba(120,180,188,0.4); }\n  .knob.active {\n    box-shadow: 0 0 0 1px var(--glow), 0 10px 24px -12px var(--glow);\n    transform: translateY(-1px);\n  }\n\n  .dial { width: 76px; height: 76px; position: relative; }\n  .dial svg { width: 100%; height: 100%; overflow: visible; }\n\n  .pName {\n    font-size: 10px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n  .pVal {\n    font-size: 13px;\n    font-variant-numeric: tabular-nums;\n    font-weight: 600;\n    color: var(--ink);\n    letter-spacing: 0.02em;\n  }\n  .pVal small { font-size: 9px; color: var(--ink-soft); font-weight: 500; margin-left: 1px; }\n\n  .foot {\n    margin-top: 16px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    font-size: 9px;\n    letter-spacing: 0.24em;\n    text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n  .foot .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); display: inline-block; margin-right: 6px;\n    box-shadow: 0 0 8px var(--glow); animation: pulse 2.6s ease-in-out infinite; }\n  @keyframes pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"shell\">\n    <header>\n      <div class=\"brand\">\n        <div class=\"mark\"><\/div>\n        <div>\n          <h1>Atrium<\/h1>\n          <div class=\"tagline\">Natural Ambience Reverb<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"badge\">Diffuse Room<\/div>\n    <\/header>\n\n    <div class=\"room\" id=\"room\">\n      <canvas id=\"cloud\"><\/canvas>\n      <svg viewBox=\"0 0 600 188\" preserveAspectRatio=\"none\" id=\"outline\">\n        <!-- luminous room outline, drawn in script so it can breathe with Size -->\n        <polyline id=\"roomPath\" fill=\"none\" stroke=\"rgba(70,140,148,0.45)\" stroke-width=\"1.4\"\n                  stroke-linejoin=\"round\" vector-effect=\"non-scaling-stroke\"><\/polyline>\n        <polyline id=\"roomGlow\" fill=\"none\" stroke=\"rgba(154,214,224,0.5)\" stroke-width=\"3\"\n                  stroke-linejoin=\"round\" vector-effect=\"non-scaling-stroke\" filter=\"url(#soft)\"><\/polyline>\n        <defs>\n          <filter id=\"soft\" x=\"-20%\" y=\"-20%\" width=\"140%\" height=\"140%\">\n            <feGaussianBlur stdDeviation=\"2.4\"/>\n          <\/filter>\n        <\/defs>\n      <\/svg>\n      <div class=\"roomLabel\">Ambience Field<\/div>\n    <\/div>\n\n    <div class=\"grid\" id=\"grid\"><\/div>\n\n    <div class=\"foot\">\n      <span><span class=\"dot\"><\/span>Natural diffuse room<\/span>\n      <span id=\"srLabel\">48 kHz<\/span>\n    <\/div>\n  <\/div>\n\n<script>\n(function () {\n  \"use strict\";\n\n  // -------- parameter model (indices match assembly.ts) --------\n  var PARAMS = [\n    { name: \"Mix\",       index: 0, def: 0.35, unit: \"%\",  fmt: pct },\n    { name: \"Size\",      index: 1, def: 0.50, unit: \"\",   fmt: room },\n    { name: \"Decay\",     index: 2, def: 0.55, unit: \"s\",  fmt: secs },\n    { name: \"Diffusion\", index: 3, def: 0.70, unit: \"%\",  fmt: pct },\n    { name: \"Air\",       index: 4, def: 0.60, unit: \"%\",  fmt: pct },\n    { name: \"Width\",     index: 5, def: 0.80, unit: \"%\",  fmt: pct }\n  ];\n\n  function pct(v)  { return Math.round(v * 100) + \"<small>%<\/small>\"; }\n  function room(v) {\n    var labels = [\"Booth\", \"Small Room\", \"Studio\", \"Chamber\", \"Large Room\", \"Hall\"];\n    return labels[Math.min(labels.length - 1, Math.floor(v * labels.length))];\n  }\n  function secs(v) { return (0.4 + v * 7.6).toFixed(1) + \"<small>s<\/small>\"; }\n\n  var values = PARAMS.map(function (p) { return p.def; });\n\n  // -------- host bridge --------\n  function push(i) {\n    if (window.vstai && window.vstai.setParam) {\n      try { window.vstai.setParam(PARAMS[i].index, values[i]); } catch (e) {}\n    }\n  }\n  function pushAll() { for (var i = 0; i < PARAMS.length; i++) push(i); }\n\n  // ===================================================================\n  //  KNOBS\n  // ===================================================================\n  var grid = document.getElementById(\"grid\");\n  var knobEls = [];\n\n  PARAMS.forEach(function (p, i) {\n    var wrap = document.createElement(\"div\");\n    wrap.className = \"knob\";\n    wrap.innerHTML =\n      '<div class=\"dial\">' +\n        '<svg viewBox=\"0 0 100 100\">' +\n          '<circle cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke=\"rgba(40,90,96,0.12)\" stroke-width=\"7\"/>' +\n          '<circle class=\"arc\" cx=\"50\" cy=\"50\" r=\"40\" fill=\"none\" stroke-width=\"7\" stroke-linecap=\"round\" ' +\n                  'transform=\"rotate(135 50 50)\"/>' +\n          '<circle class=\"body\" cx=\"50\" cy=\"50\" r=\"31\" />' +\n          '<line class=\"ptr\" x1=\"50\" y1=\"50\" x2=\"50\" y2=\"24\" stroke-width=\"3.4\" stroke-linecap=\"round\"/>' +\n        '<\/svg>' +\n      '<\/div>' +\n      '<div class=\"pName\">' + p.name + '<\/div>' +\n      '<div class=\"pVal\"><\/div>';\n    grid.appendChild(wrap);\n\n    var arc  = wrap.querySelector(\".arc\");\n    var body = wrap.querySelector(\".body\");\n    var ptr  = wrap.querySelector(\".ptr\");\n    var valEl = wrap.querySelector(\".pVal\");\n\n    body.setAttribute(\"fill\", \"url(#cap\" + i + \")\");\n    // build a per-knob radial gradient\n    var svg = wrap.querySelector(\"svg\");\n    var defs = document.createElementNS(\"http://www.w3.org/2000/svg\", \"defs\");\n    defs.innerHTML =\n      '<radialGradient id=\"cap' + i + '\" cx=\"42%\" cy=\"36%\" r=\"72%\">' +\n        '<stop offset=\"0%\" stop-color=\"#ffffff\"/>' +\n        '<stop offset=\"55%\" stop-color=\"#eef7f6\"/>' +\n        '<stop offset=\"100%\" stop-color=\"#d4e9e6\"/>' +\n      '<\/radialGradient>';\n    svg.insertBefore(defs, svg.firstChild);\n    arc.setAttribute(\"stroke\", \"url(#cap\" + i + \")\");\n    arc.setAttribute(\"stroke\", i % 2 ? \"#bfe6c0\" : \"#9ad6e0\");\n    ptr.setAttribute(\"stroke\", \"#3f7a82\");\n\n    var CIRC = 2 * Math.PI * 40;\n    var SWEEP = 0.75; // 270deg of the circle\n\n    function render() {\n      var v = values[i];\n      // arc fill: a 270deg sweep starting at the 135deg transform origin\n      arc.style.strokeDasharray = (CIRC * SWEEP * v) + \" \" + (CIRC * 2);\n      // pointer rotation: -135deg .. +135deg\n      var ang = -135 + v * 270;\n      ptr.setAttribute(\"transform\", \"rotate(\" + ang + \" 50 50)\");\n      valEl.innerHTML = p.fmt(v);\n    }\n\n    knobEls.push({ wrap: wrap, render: render, p: p, i: i });\n\n    // ----- drag interaction -----\n    var dragging = false, lastY = 0;\n\n    function down(e) {\n      dragging = true;\n      wrap.classList.add(\"active\");\n      lastY = (e.touches ? e.touches[0].clientY : e.clientY);\n      e.preventDefault();\n      window.addEventListener(\"mousemove\", move);\n      window.addEventListener(\"touchmove\", move, { passive: false });\n      window.addEventListener(\"mouseup\", up);\n      window.addEventListener(\"touchend\", up);\n    }\n    function move(e) {\n      if (!dragging) return;\n      var y = (e.touches ? e.touches[0].clientY : e.clientY);\n      var dy = lastY - y;\n      lastY = y;\n      var fine = e.shiftKey ? 0.25 : 1;\n      values[i] = clamp01(values[i] + dy * 0.005 * fine);\n      render();\n      push(i);\n      e.preventDefault();\n    }\n    function up() {\n      dragging = false;\n      wrap.classList.remove(\"active\");\n      window.removeEventListener(\"mousemove\", move);\n      window.removeEventListener(\"touchmove\", move);\n      window.removeEventListener(\"mouseup\", up);\n      window.removeEventListener(\"touchend\", up);\n    }\n\n    wrap.addEventListener(\"mousedown\", down);\n    wrap.addEventListener(\"touchstart\", down, { passive: false });\n    wrap.addEventListener(\"dblclick\", function () {\n      values[i] = p.def; render(); push(i);\n    });\n    wrap.addEventListener(\"wheel\", function (e) {\n      values[i] = clamp01(values[i] - Math.sign(e.deltaY) * (e.shiftKey ? 0.005 : 0.02));\n      render(); push(i);\n      e.preventDefault();\n    }, { passive: false });\n\n    render();\n  });\n\n  function clamp01(x) { return x < 0 ? 0 : (x > 1 ? 1 : x); }\n\n  // ===================================================================\n  //  ROOM OUTLINE — breathes with Size\n  // ===================================================================\n  var roomPath = document.getElementById(\"roomPath\");\n  var roomGlow = document.getElementById(\"roomGlow\");\n\n  function drawRoom() {\n    var size = values[1];          // 0..1\n    var cx = 300, cyBase = 96;\n    var halfW = 120 + size * 150;  // width grows with size\n    var halfH = 46 + size * 30;\n    var topY = cyBase - halfH, botY = cyBase + halfH;\n    // a soft hexagonal room cross-section\n    var pts = [\n      [cx - halfW, botY],\n      [cx - halfW * 0.78, topY + 6],\n      [cx, topY],\n      [cx + halfW * 0.78, topY + 6],\n      [cx + halfW, botY],\n      [cx, botY + 10],\n      [cx - halfW, botY]\n    ];\n    var s = pts.map(function (p) { return p[0].toFixed(1) + \",\" + p[1].toFixed(1); }).join(\" \");\n    roomPath.setAttribute(\"points\", s);\n    roomGlow.setAttribute(\"points\", s);\n  }\n\n  // ===================================================================\n  //  DIFFUSING PARTICLE CLOUD\n  // ===================================================================\n  var canvas = document.getElementById(\"cloud\");\n  var ctx = canvas.getContext(\"2d\");\n  var roomBox = document.getElementById(\"room\");\n  var W = 0, H = 0, DPR = 1;\n\n  function resize() {\n    DPR = Math.min(2, window.devicePixelRatio || 1);\n    W = roomBox.clientWidth; H = roomBox.clientHeight;\n    canvas.width = W * DPR; canvas.height = H * DPR;\n    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);\n  }\n  window.addEventListener(\"resize\", function () { resize(); drawRoom(); });\n\n  var N = 120;\n  var parts = [];\n  function seed() {\n    parts = [];\n    for (var k = 0; k < N; k++) {\n      parts.push({\n        x: Math.random(),\n        y: Math.random(),\n        a: Math.random() * Math.PI * 2,\n        sp: 0.2 + Math.random() * 0.8,\n        r: 0.6 + Math.random() * 1.8,\n        life: Math.random()\n      });\n    }\n  }\n  seed();\n\n  var t0 = performance.now();\n\n  function frame(now) {\n    if (document.hidden) { requestAnimationFrame(frame); return; }\n    var dt = Math.min(40, now - (frame._last || now)); frame._last = now;\n\n    var mix   = values[0];\n    var size  = values[1];\n    var decay = values[2];\n    var diff  = values[3];\n    var air   = values[4];\n    var width = values[5];\n\n    ctx.clearRect(0, 0, W, H);\n\n    // luminous room interior tint, brighter with Air\n    var cx = W * 0.5, cy = H * 0.62;\n    var g = ctx.createRadialGradient(cx, cy, 8, cx, cy, W * (0.32 + size * 0.3));\n    g.addColorStop(0, \"rgba(192,232,192,\" + (0.10 + air * 0.16).toFixed(3) + \")\");\n    g.addColorStop(1, \"rgba(154,214,224,0)\");\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, W, H);\n\n    // particle field — density scales with Diffusion, energy with Mix+Decay\n    var active = Math.round(N * (0.3 + diff * 0.7));\n    var spread = 0.18 + size * 0.5;           // how far the cloud fills the room\n    var speed = (0.0006 + decay * 0.0009) * dt;\n    var energy = 0.25 + mix * 0.75;\n\n    ctx.globalCompositeOperation = \"lighter\";\n    for (var k = 0; k < active; k++) {\n      var pt = parts[k];\n      // drift outward then recycle — an expanding diffuse cloud\n      pt.life += speed;\n      if (pt.life > 1) { pt.life -= 1; pt.a = Math.random() * Math.PI * 2; }\n      var rad = pt.life * spread;\n      // decorrelate horizontal motion by width for a wide field\n      var px = cx + Math.cos(pt.a) * rad * W * (0.9 + width * 0.5);\n      var py = cy + Math.sin(pt.a) * rad * H * 0.85 - pt.life * 6;\n      var fade = Math.sin(pt.life * Math.PI); // fade in/out over life\n      var alpha = fade * energy * (0.18 + air * 0.22);\n      var rr = pt.r * (1 + air * 0.6);\n      var grd = ctx.createRadialGradient(px, py, 0, px, py, rr * 4);\n      var col = (k % 3 === 0) ? \"192,232,192\" : \"154,214,224\";\n      grd.addColorStop(0, \"rgba(\" + col + \",\" + alpha.toFixed(3) + \")\");\n      grd.addColorStop(1, \"rgba(\" + col + \",0)\");\n      ctx.fillStyle = grd;\n      ctx.beginPath();\n      ctx.arc(px, py, rr * 4, 0, Math.PI * 2);\n      ctx.fill();\n    }\n    ctx.globalCompositeOperation = \"source-over\";\n\n    requestAnimationFrame(frame);\n  }\n\n  // ===================================================================\n  //  BOOT\n  // ===================================================================\n  function start() {\n    resize();\n    drawRoom();\n    pushAll();\n    // re-render room outline whenever Size knob changes: hook into knob render\n    var sizeKnob = knobEls[1];\n    var origRender = sizeKnob.render;\n    sizeKnob.render = function () { origRender(); drawRoom(); };\n    requestAnimationFrame(frame);\n\n    if (window.vstai && window.vstai.getParam) {\n      // adopt any host-side values\n      for (var i = 0; i < PARAMS.length; i++) {\n        try {\n          var v = window.vstai.getParam(PARAMS[i].index);\n          if (typeof v === \"number\" && isFinite(v)) {\n            values[i] = clamp01(v);\n            knobEls[i].render();\n          }\n        } catch (e) {}\n      }\n      drawRoom();\n    }\n  }\n\n  if (window.vstai && window.vstai.onReady) {\n    window.vstai.onReady(start);\n  } else {\n    start();\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();

    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);

  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();

    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);

    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);

      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};

    node.connect(analyser); node.connect(ctx.destination); started=true;

  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();

    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }

  document.getElementById('file').addEventListener('change',function(e){

  });
