<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lush Chorus — test bench</title><style>
  :root{--ac:#6ad0ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Lush Chorus</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Lush Chorus<\/title>\n<style>\n/* ============================================================\n   LUSH CHORUS — a liquid bucket-brigade ensemble.\n   Animated water surface, doubled \"voice\" droplets, gentle\n   Juno pastel shimmer. Bespoke vertical-fluid faders + a\n   central tide pool. Every control is hand-built SVG/CSS.\n   ============================================================ */\n:root{\n  --ac:#6ad0ff;          /* aqua */\n  --ac2:#7a8cff;         /* periwinkle */\n  --foam:#d8f4ff;\n  --ink:#dff0fb;\n  --deep:#06121f;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px/1.4 \"Avenir Next\",ui-rounded,\"Segoe UI\",system-ui,-apple-system,sans-serif;\n  color:var(--ink);\n  background:\n    radial-gradient(120% 90% at 50% -10%, #16344d 0%, #0b2237 42%, #06121f 78%, #030a12 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:18px;overflow:hidden;\n  -webkit-user-select:none;user-select:none;\n}\n\n/* ---- panel ------------------------------------------------ */\n.tank{\n  position:relative;width:100%;max-width:620px;border-radius:26px;\n  padding:0 0 18px;overflow:hidden;\n  background:linear-gradient(168deg,rgba(20,52,76,.92),rgba(7,20,33,.96));\n  border:1px solid rgba(150,220,255,.16);\n  box-shadow:\n    0 40px 90px rgba(0,0,0,.6),\n    inset 0 1px 0 rgba(190,235,255,.18),\n    inset 0 0 0 1px rgba(0,0,0,.35),\n    inset 0 -60px 90px rgba(7,18,30,.55);\n}\n/* slow caustic light slick over everything */\n.tank::before{\n  content:\"\";position:absolute;inset:-30%;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(closest-side at 28% 30%, color-mix(in srgb,var(--ac) 26%,transparent), transparent 70%),\n    radial-gradient(closest-side at 74% 64%, color-mix(in srgb,var(--ac2) 24%,transparent), transparent 70%);\n  filter:blur(34px);\n  animation:slick 17s ease-in-out infinite alternate;\n}\n@keyframes slick{\n  0%{transform:translate(-6%,-4%) scale(1) rotate(0deg)}\n  100%{transform:translate(8%,6%) scale(1.14) rotate(8deg)}\n}\n\n/* ---- header ----------------------------------------------- */\n.cap{\n  position:relative;z-index:2;display:flex;align-items:center;gap:13px;\n  padding:17px 22px 14px;\n  border-bottom:1px solid rgba(150,220,255,.12);\n  background:linear-gradient(180deg,rgba(160,225,255,.07),rgba(160,225,255,0));\n}\n.drop{position:relative;width:26px;height:26px;flex:none}\n.drop svg{width:100%;height:100%;overflow:visible}\n.ttl{flex:1;min-width:0}\n.ttl h1{\n  margin:0;font-size:19px;font-weight:800;letter-spacing:.12em;\n  background:linear-gradient(96deg,var(--foam),var(--ac) 45%,var(--ac2));\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 0 22px rgba(106,208,255,.25);\n}\n.ttl p{margin:2px 0 0;font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:#74a6c4}\n.tag{\n  font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#9fd6f0;\n  border:1px solid rgba(150,220,255,.28);border-radius:999px;padding:4px 11px;\n  background:rgba(106,208,255,.06);white-space:nowrap;\n}\n\n/* ---- body layout ------------------------------------------ */\n.body{\n  position:relative;z-index:2;\n  display:grid;grid-template-columns:1fr 188px 1fr;gap:14px;\n  padding:18px 20px 6px;align-items:stretch;\n}\n@media(max-width:560px){\n  .body{grid-template-columns:1fr 1fr}\n  .pool{grid-column:1 / -1;order:-1}\n}\n\n/* ---- fluid faders (Rate / Depth | Mix / Width) ------------ */\n.bank{display:flex;flex-direction:column;gap:14px}\n.fader{\n  position:relative;display:flex;gap:13px;align-items:stretch;\n  padding:11px 12px;border-radius:18px;\n  background:linear-gradient(160deg,rgba(140,205,240,.05),rgba(8,22,36,.35));\n  border:1px solid rgba(150,220,255,.1);\n  box-shadow:inset 0 1px 0 rgba(190,235,255,.08),0 8px 20px rgba(0,0,0,.28);\n  transition:border-color .25s,transform .25s,box-shadow .25s;\n  animation:rise .6s both;\n}\n.fader:hover{border-color:rgba(150,220,255,.32);transform:translateY(-2px)}\n.fader.live{border-color:var(--ac);box-shadow:inset 0 1px 0 rgba(190,235,255,.1),0 0 26px rgba(106,208,255,.28)}\n@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}\n\n/* the glass tube + liquid */\n.tube{\n  position:relative;width:34px;flex:none;border-radius:16px;overflow:hidden;cursor:ns-resize;\n  touch-action:none;\n  background:linear-gradient(90deg,rgba(0,0,0,.4),rgba(40,70,95,.25) 40%,rgba(0,0,0,.4));\n  border:1px solid rgba(150,220,255,.2);\n  box-shadow:inset 0 2px 9px rgba(0,0,0,.6),inset -2px 0 4px rgba(190,235,255,.06);\n}\n.liquid{\n  position:absolute;left:0;right:0;bottom:0;height:50%;\n  background:linear-gradient(180deg,\n     color-mix(in srgb,var(--ac) 78%,#fff 0%),\n     color-mix(in srgb,var(--ac) 60%,var(--ac2)) 55%,\n     color-mix(in srgb,var(--ac2) 70%,#06121f) 100%);\n  box-shadow:0 -6px 18px color-mix(in srgb,var(--ac) 55%,transparent);\n  transition:height .12s cubic-bezier(.2,.8,.25,1);\n}\n/* animated wavy meniscus drawn with two offset svg waves */\n.surf{position:absolute;left:-25%;right:-25%;top:-9px;height:14px;pointer-events:none}\n.surf svg{width:100%;height:100%;display:block}\n.surf .w1{fill:color-mix(in srgb,var(--ac) 82%,#fff 18%);opacity:.95;\n  animation:swim 3.6s linear infinite}\n.surf .w2{fill:color-mix(in srgb,var(--ac) 55%,#fff);opacity:.5;\n  animation:swim 5.4s linear infinite reverse}\n@keyframes swim{from{transform:translateX(0)}to{transform:translateX(-25%)}}\n/* glass highlight */\n.tube::after{\n  content:\"\";position:absolute;top:4px;left:5px;width:6px;bottom:4px;border-radius:6px;\n  background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,0));\n  opacity:.5;pointer-events:none;\n}\n/* rising bubbles inside the liquid */\n.tube .bub{posit rflow:hidden;\n}\n.disc.drag{cursor:grabbing}\n.disc svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}\n/* expanding ripple rings — frequency tied to intensity via animation-duration */\n.ring{\n  fill:none;stroke:var(--ac);stroke-width:1.4;transform-origin:50% 50%;\n  animation:ripple var(--rp,3.4s) ease-out infinite;\n}\n.ring.r2{stroke:var(--ac2);animation-delay:calc(var(--rp,3.4s) * .33)}\n.ring.r3{stroke:var(--foam);animation-delay:calc(var(--rp,3.4s) * .66);opacity:.7}\n@keyframes ripple{\n  0%{r:8px;opacity:.9;stroke-width:2.4}\n  100%{r:74px;opacity:0;stroke-width:.3}\n}\n/* doubled voice droplets orbiting — the \"ensemble\" */\n.voices{position:absolute;inset:0;animation:orbit var(--sp,9s) linear infinite}\n.voices.b{animation-direction:reverse;animation-duration:calc(var(--sp,9s) * 1.35)}\n@keyframes orbit{from{transform:rotate(0)}to{transform:rotate(360deg)}}\n.voice{position:absolute;top:8px;left:50%;width:11px;height:11px;margin-left:-5.5px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%,#fff,var(--ac));\n  box-shadow:0 0 12px var(--ac);}\n.voices.b .voice{background:radial-gradient(circle at 35% 30%,#fff,var(--ac2));box-shadow:0 0 12px var(--ac2)}\n/* core readout */\n.core{\n  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);\n  display:flex;flex-direction:column;align-items:center;pointer-events:none;\n}\n.core b{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;color:#f1fbff;\n  text-shadow:0 0 20px rgba(106,208,255,.55)}\n.core span{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#7fb4d2;margin-top:1px}\n.poolhint{font-size:10px;color:#6e9ab6;text-align:center;line-height:1.4;max-width:170px}\n\n/* ---- footer ----------------------------------------------- */\n.ft{\n  position:relative;z-index:2;margin:14px 22px 0;padding-top:12px;\n  border-top:1px solid rgba(150,220,255,.1);\n  font-size:11px;line-height:1.55;color:#6e9ab6;\n}\n.ft b{color:#a9d6ef;font-weig     disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
