<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sonic Max — test bench</title><style>
  :root{--ac:#5ad1ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  </div>

var(--glow);\n  }\n  .logo svg { display: block; }\n  .title { display: flex; flex-direction: column; line-height: 1.05; }\n  .title b {\n    font-size: 17px; letter-spacing: 2px; font-weight: 700;\n    color: #eaf6ff;\n  }\n  .title span {\n    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;\n    color: var(--ink-dim); margin-top: 3px;\n  }\n  .leds { display: flex; gap: 6px; align-items: center; }\n  .led {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: #0c2235;\n    box-shadow: 0 0 0 1px rgba(90,209,255,0.2) inset;\n  }\n  .led.on {\n    background: var(--accent);\n    box-shadow: 0 0 8px var(--accent), 0 0 0 1px rgba(255,255,255,0.4) inset;\n    animation: ledpulse 1.6s ease-in-out infinite;\n  }\n  @keyframes ledpulse {\n    0%, 100% { opacity: 0.55; }\n    50% { opacity: 1; }\n  }\n\n  /* ---------------- scope ---------------- */\n  .scope-wrap {\n    margin: 16px 18px 4px;\n    border-radius: 12px;\n    border: 1px solid var(--line);\n    background:\n      radial-gradient(120% 90% at 50% 0%, rgba(90,209,255,0.07), transparent 70%),\n      linear-gradient(180deg, #07101d, #060c16);\n    box-shadow: 0 2px 0 rgba(255,255,255,0.04) inset, 0 -10px 30px rgba(0,0,0,0.4) inset;\n    overflow: hidden;\n    position: relative;\n  }\n  .scope-wrap svg { display: block; width: 100%; height: 150px; }\n  .scope-label {\n    position: absolute; top: 8px; left: 12px;\n    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .scope-label.right { left: auto; right: 12px; }\n\n  /* ---------------- controls ---------------- */\n  .controls {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 8px;\n    padding: 14px 16px 22px;\n  }\n  .knobcell {\n    display: flex; flex-direction: column; align-items: center; gap: 8px;\n    padding: 12px 4px 10px;\n    border-radius: 12px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.18));\n    border: 1px  \"6\");\n    arc.setAttribute(\"stroke-linecap\", \"round\");\n    arc.style.filter = \"drop-shadow(0 0 5px rgba(90,209,255,0.7))\";\n    svg.appendChild(arc);\n\n    // body\n    var body = document.createElementNS(NS, \"circle\");\n    body.setAttribute(\"cx\", \"50\"); body.setAttribute(\"cy\", \"50\"); body.setAttribute(\"r\", \"30\");\n    body.setAttribute(\"fill\", \"url(#kbody\" + i + \")\");\n    body.setAttribute(\"stroke\", \"rgba(0,0,0,0.5)\");\n    body.setAttribute(\"stroke-width\", \"1\");\n\n    var grad = document.createElementNS(NS, \"radialGradient\");\n    grad.setAttribute(\"id\", \"kbody\" + i);\n    grad.setAttribute(\"cx\", \"38%\"); grad.setAttribute(\"cy\", \"32%\");\n    var s1 = document.createElementNS(NS, \"stop\");\n    s1.setAttribute(\"offset\", \"0%\"); s1.setAttribute(\"stop-color\", \"#1f3954\");\n    var s2 = document.createElementNS(NS, \"stop\");\n    s2.setAttribute(\"offset\", \"100%\"); s2.setAttribute(\"stop-color\", \"#0a1726\");\n    grad.appendChild(s1); grad.appendChild(s2);\n    var defs = document.createElementNS(NS, \"defs\");\n    defs.appendChild(grad);\n    svg.appendChild(defs);\n    svg.appendChild(body);\n\n    // pointer notch\n    var notch = document.createElementNS(NS, \"line\");\n    notch.setAttribute(\"x1\", \"50\"); notch.setAttribute(\"y1\", \"50\");\n    notch.setAttribute(\"x2\", \"50\"); notch.setAttribute(\"y2\", \"26\");\n    notch.setAttribute(\"stroke\", \"#b0e0ff\");\n    notch.setAttribute(\"stroke-width\", \"3\");\n    notch.setAttribute(\"stroke-linecap\", \"round\");\n    notch.style.filter = \"drop-shadow(0 0 3px rgba(176,224,255,0.8))\";\n    svg.appendChild(notch);\n\n    knob.appendChild(svg);\n    cell.appendChild(knob);\n\n    var label = document.createElement(\"div\");\n    label.className = \"klabel\";\n    label.textContent = p.name;\n    cell.appendChild(label);\n\n    var val = document.createElement(\"div\");\n    val.className = \"kval\";\n    cell.appendChild(val);\n\n    va xis\n      // low bloom: bump centred near u=0.12\n      var loB = contour * 34 * Math.exp(-Math.pow((u - 0.10) / 0.13, 2));\n      // high air: rising shelf past u=0.6\n      var hiB = proc * 40 * (1 / (1 + Math.exp(-(u - 0.66) * 14)));\n      // animated shimmer riding the highs\n      var shim = proc * 4 * Math.sin(u * 26 + tt * 6) * Math.max(0, (u - 0.55));\n      var y = midY - loB - hiB - shim;\n      y = midY - (midY - y) * (0.4 + 0.6 * mix); // mix scales the deflection\n      pts.push([x, y]);\n    }\n    var d = \"M \" + pts[0][0] + \" \" + pts[0][1].toFixed(2);\n    for (var i = 1; i < pts.length; i++) d += \" L \" + pts[i][0] + \" \" + pts[i][1].toFixed(2);\n    curveEl.setAttribute(\"d\", d);\n\n    // bloom fill under the low portion\n    var bd = \"M 0 \" + H;\n    for (var j = 0; j < pts.length && pts[j][0] <= 230; j++) {\n      bd += \" L \" + pts[j][0] + \" \" + pts[j][1].toFixed(2);\n    }\n    bd += \" L 230 \" + H + \" Z\";\n    bloomEl.setAttribute(\"d\", bd);\n    bloomEl.style.opacity = (0.25 + contour * 0.75).toFixed(2);\n\n    // sparkles rise off the highs, intensity ~ process\n    for (var k = 0; k < sparks.length; k++) {\n      var sp = sparks[k];\n      sp.y -= sp.vy * (0.3 + proc * 1.4);\n      if (sp.y < 8) {\n        sp.y = 95 + Math.random() * 30;\n        sp.x = 360 + Math.random() * 190;\n      }\n      var twk = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(tt * 5 + sp.ph));\n      sp.el.setAttribute(\"cx\", sp.x.toFixed(1));\n      sp.el.setAttribute(\"cy\", sp.y.toFixed(1));\n      sp.el.setAttribute(\"opacity\", (twk * proc).toFixed(2));\n      sp.el.setAttribute(\"r\", (1 + proc * 1.4).toFixed(2));\n    }\n\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  // -------- mount -----------------------------------------------------\n  function mount() {\n    var host = document.getElementById(\"controls\");\n    PARAMS.forEach(function (p, i) {\n      host.appendChild(buildKnob(p, i));\n    });\n    // init all par
