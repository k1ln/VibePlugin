  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n  @property --sweep{syntax:'<number>';inherits:false;initial-value:0}\n  :root{\n    --ac:#ff5a3c; --ac2:#ff8a5a;\n    --char:#1a150f; --char2:#0d0a07;\n    --metal:#2a241c; --metal-hi:#3b332699;\n    --lcd:#ffae5a; --lcd-bg:#1a0d04;\n    --screw:#0b0906;\n  }\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{\n    margin:0; min-height:100vh;\n    font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n    color:#f0e2cf;\n    background:\n      radial-gradient(120% 90% at 50% -10%,#2a1f15 0%,#140e09 55%,#070504 100%);\n    display:flex; align-items:center; justify-content:center; padding:18px;\n    -webkit-font-smoothing:antialiased;\n  }\n\n  /* ============ HARDWARE CHASSIS ============ */\n  .unit{\n    position:relative; width:100%; max-width:620px;\n    border-radius:18px; padding:16px 16px 18px;\n    background:\n      linear-gradient(180deg,#39301f 0%,#241c12 7%,#1c160d 100%);\n    border:1px solid #4b3f2a;\n    box-shadow:\n      0 36px 80px rgba(0,0,0,.7),\n      inset 0 1px 0 #6b5a3c,\n      inset 0 -2px 6px rgba(0,0,0,.7),\n      0 0 0 1px #000;\n  }\n  /* brushed-metal sheen overlay */\n  .unit::before{\n    content:\"\"; position:absolute; inset:0; border-radius:18px; pointer-events:none;\n    background:\n      repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0 2px,transparent 2px 4px),\n      linear-gradient(180deg,rgba(255,255,255,.05),transparent 30%);\n    mix-blend-mode:screen; opacity:.6;\n  }\n  .screw{\n    position:absolute; width:13px; height:13px; border-radius:50%;\n    background:radial-gradient(circle at 38% 32%,#5a4d34,#171008 75%);\n    box-shadow:inset 0 1px 1px rgba(255,255,255,.25),0 1px 2px rgba(0,0,0,.7);\n  }\n  .screw::after{\n    content:\"\"; position:absolute; inset:3px; border-radius:1px;\n    background:linear-gradient(45deg,transparent 44%,#000 44% 56%,transparent 56%);\n    opacity:.55;\n  }\n  .screw.tl{top:9px;left:9px}.screw.tr{top:9px;right:9px}\n  .screw.bl{bottom:9px;left:9px}.screw.br{bottom:9px;right:9px}\n\n  /* ============ HEADER / LCD ============ */\n  .head{\n    position:relative; z-index:1; display:flex; align-items:stretch; gap:12px;\n    margin:2px 6px 14px;\n  }\n  .logo{display:flex; flex-direction:column; justify-content:center; gap:3px; padding:2px 4px}\n  .logo .bolt{\n    display:flex; align-items:center; gap:7px;\n    font-size:20px; font-weight:900; letter-spacing:.04em; line-height:1;\n    color:#fff;\n    text-shadow:0 1px 0 #000,0 0 18px rgba(255,90,60,.35);\n  }\n  .logo .bolt svg{filter:drop-shadow(0 0 6px var(--ac))}\n  .logo .bolt .vd{\n    background:linear-gradient(180deg,var(--ac2),var(--ac));\n    -webkit-background-clip:text; background-clip:text; color:transparent;\n  }\n  .logo .sub{\n    font-size:8.5px; letter-spacing:.42em; text-transform:uppercase;\n    color:#a08552; padding-left:2px;\n  }\n\n  /* LCD readout */\n  .lcd{\n    flex:1; position:relative; border-radius:8px; overflow:hidden;\n    background:\n      linear-gradient(180deg,#2a1607,#140a03);\n    border:1px solid #000;\n    box-shadow:\n      inset 0 0 0 1px #4a2f12,\n      inset 0 2px 10px rgba(0,0,0,.9),\n      inset 0 0 22px rgba(255,140,60,.07);\n    padding:7px 12px; display:flex; flex-direction:column; justify-content:center;\n    min-width:0;\n  }\n  .lcd::after{ /* scanlines */\n    content:\"\"; position:absolute; inset:0; pointer-events:none;\n    background:repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0 1px,transparent 1px 3px);\n    opacity:.5;\n  }\n  .lcd .row1{\n    display:flex; align-items:baseline; gap:8px; min-width:0;\n  }\n  .lcd .pname{\n    font:700 12px/1 \"DejaVu Sans Mono\",ui-monospace,monospace;\n    letter-spacing:.12em; text-transform:uppercase;\n    color:var(--lcd); text-shadow:0 0 7px rgba(255,150,60,.55);\n    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\n  }\n  .lcd .pval{\n    margin-left:auto;\n    font:800 18px/1 \"DejaVu Sans Mono\",ui-monospace,monospace;\n    color:#ffd9a0; text-shadow:0 0 10px rgba(255,170,80,.6);\n    font-variant-numeric:tabular-nums; white-space:nowrap;\n  }\n  .lcd .meter{\n    margin-top:6px; height:7px; border-radius:3px; overflow:hidden;\n    background:rgba(0,0,0,.55); box-shadow:inset 0 1px 3px #000;\n    position:relative;\n  }\n  .lcd .meter i{\n    position:absolute; inset:0 100% 0 0;\n    background:\n      repeating-linear-gradient(90deg,var(--lcd) 0 4px,transparent 4px 6px);\n    box-shadow:0 0 8px rgba(255,150,60,.6);\n    transition:right .12s cubic-bezier(.2,.8,.3,1);\n  }\n\n  /* ============ TRANSPORT / SEQUENCER STRIP ============ */\n  .seq{\n    position:relative; z-index:1; display:flex; align-items:center; gap:5px;\n    margin:0 6px 16px; padding:8px 9px;\n    border-radius:9px;\n    background:linear-gradient(180deg,#120c06,#0a0704);\n    border:1px solid #000; box-shadow:inset 0 1px 0 #3a2e1c,inset 0 -1px 4px rgba(0,0,0,.6);\n  }\n  .seq .play{\n    flex:0 0 auto; width:30px; height:30px; border-radius:7px; border:1px solid #000;\n    background:linear-gradient(180deg,#3a2c18,#1d150b);\n    color:var(--ac); cursor:pointer; display:flex; align-items:center; justify-content:center;\n    box-shadow:inset 0 1px 0 #6b5736,0 2px 4px rgba(0,0,0,.5);\n    transition:.12s;\n  }\n  .seq .play:hover{color:var(--ac2); box-shadow:inset 0 1px 0 #6b5736,0 0 12px rgba(255,90,60,.4)}\n  .seq .play.on{\n    background:linear-gradient(180deg,#5a2414,#2a0f08);\n    color:#fff; text-shadow:0 0 8px var(--ac);\n  }\n  .seq .steps{display:flex; gap:4px; flex:1; min-width:0}\n  .step{\n    flex:1; height:24px; border-radius:4px; min-width:0;\n    background:linear-gradient(180deg,#241a0e,#120c06);\n    border:1px solid #000;\n    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);\n    position:relative; cursor:pointer; transition:transform .08s;\n  }\n       for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};
  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function down(m,el){ ensure().then(function(){ if(ctx.state==='suspended')ctx.resume(); if(ex&&ex.noteOn) ex.noteOn(m,hz(m),0.9); }); if(el)el.classList.add('dn'); }
  function up(m,el){ if(ex&&ex.noteOff) ex.noteOff(m); if(el)el.classList.remove('dn'); }
  KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];
    el.addEventListener('pointerdown',function(e){e.preventDefault();down(k[1],el);});
    el.addEventListener('pointerup',function(){up(k[1],el);}); el.addEventListener('pointerleave',function(){up(k[1],el);});
    KB.appendChild(el); });
  var held={};
  window.addEventListener('keydown',function(e){ var m=KMAP[e.key]; if(m&&!held[m]){held[m]=1;down(m,null);} });
  window.addEventListener('keyup',function(e){ var m=KMAP[e.key]; if(m){held[m]=0;up(m,null);} });
  
  </script></body></html>
