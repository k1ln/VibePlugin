<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sub Station</title>
<style>
  :root {
    --accent: #3dff9a;
    --accent2: #ff3d6a;
    --bg0: #07090c;
    --bg1: #0e1218;
    --panel: #11161d;
    --panel2: #161c25;
    --edge: #232c38;
    --ink: #c9d6e2;
    --dim: #6b7886;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg0);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
  }

  .unit {
    width: 100%;
    max-width: 760px;
    background:
      radial-gradient(120% 90% at 18% -10%, rgba(61,255,154,0.07), transparent 55%),
      radial-gradient(120% 90% at 95% 0%, rgba(255,61,106,0.06), transparent 55%),
      linear-gradient(160deg, var(--bg1), var(--bg0) 70%);
    border: 1px solid var(--edge);
    border-radius: 18px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 30px 70px -28px rgba(0,0,0,0.9),
      0 0 0 1px rgba(0,0,0,0.5);
    padding: 20px 22px 22px;
    position: relative;
    overflow: hidden;
  }

  /* faint carbon texture */
  .unit::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 4px);
    pointer-events: none;
    opacity: 0.7;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 40px; height: 40px;
    border-radius: 11px;
    background: linear-gradient(150deg, #1a2230, #0b0e13);
    border: 1px solid var(--edge);
    display: grid; place-items: center;
    box-shadow: 0 0 18px -6px rgba(61,255,154,0.5);
  }
  .logo svg { display: block; }

  .titles h1 {
    margin: 0;
    font-size: 19px;
    letter-spacing: 3px;
    font-weight: 800;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), #d9fff0 60%, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .titles .sub {
    margin-top: 2px;
    font-size: 9.5px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--dim);
    font-family: var(--mono);
  }

  .badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid rgba(255,61,106,0.4);
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(255,61,106,0.07);
    box-shadow: 0 0 16px -8px var(--accent2) inset;
  }

  /* ---- scope ---- */
  .scope {
    position: relative;
    z-index: 1;
    height: 116px;
    border-radius: 13px;
    border: 1px solid var(--edge);
    background:
      radial-gradient(120% 140% at 50% -30%, rgba(61,255,154,0.10), transparent 60%),
      linear-gradient(180deg, #090d12, #05070a);
    overflow: hidden;
    box-shadow: 0 2px 0 rgba(255,255,255,0.03) inset, 0 14px 30px -22px #000 inset;
    margin-bottom: 18px;
  }
  .scope canvas { display: block; width: 100%; height: 100%; }
  .scope .tag {
    position: absolute;
    top: 9px; left: 12px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .scope .tag b { color: var(--accent); }

  /* ---- controls ---- */
  .rack {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  @media (max-width: 560px) { .rack { grid-template-columns: repeat(2, 1fr); } }

  .cell {
    background: linear-gradient(170deg, var(--panel2), var(--panel));
    border: 1px solid var(--edge);
    border-radius: 13px;
    padding: 13px 10px 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 12px 22px -18px #000;
    transition: border-color .18s, box-shadow .18s, transform .18s;
  }
  .cell.live {
    border-color: rgba(61,255,154,0.55);
    box-shadow: 0 0 22px -8px var(--accent), 0 1px 0 rgba(255,255,255,0.05) inset;
  }
  .cell.od.live {
    border-color: rgba(255,61,106,0.6);
    box-shadow: 0 0 24px -7px var(--accent2), 0 1px 0 rgba(255,255,255,0.05) inset;
  }

  .knob {
    width: 84px; height: 84px;
    position: relative;
    cursor: ns-resize;
    touch-action: none;
    user-select: none;
  }
  .knob svg { display: block; width: 100%; height: 100%; }

  .label {
    font-size: 9.5px;
    letter-spacing: 2.2px;
    text-transform: uppercase;
    color: var(--dim);
    font-weight: 700;
  }
  .cell.live .label { color: var(--accent); }
  .cell.od.live .label { color: var(--accent2); }

  .value {
    font-family: var(--mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    background: #070a0e;
    border: 1px solid var(--edge);
    border-radius: 6px;
    padding: 2px 8px;
    min-width: 56px;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* ---- overdrive stage glow ---- */
  .od .knob::after {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 0 transparent;
    transition: box-shadow .2s;
  }

  /* ---- keyboard ---- */
  .keys {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    height: 96px;
    display: flex;
    border-radius: 11px;
    overflow: hidden;
    border: 1px solid var(--edge);
    background: #05070a;
    box-shadow: 0 12px 26px -20px #000 inset;
    user-select: none;
    touch-action: none;
  }
  .wkey {
    position: relative;
    flex: 1;
    background: linear-gradient(180deg, #e7edf2, #aeb8c2);
    border-right: 1px solid #2a323d;
    cursor: pointer;
  }
  .wkey:last-child { border-right: none; }
  .wkey.down {
    background: linear-gradient(180deg, var(--accent), #1fcf7a);
    box-shadow: 0 0 22px -4px var(--accent) inset;
  }
  .bkeys {
    position: absolute;
    inset: 0 0 auto 0;
    height: 60%;
    display: flex;
    pointer-events: none;
  }
  .bk {
    position: absolute;
    top: 0;
    width: 7.2%;
    height: 100%;
    background: linear-gradient(180deg, #1b222c, #05070a);
    border: 1px solid #000;
    border-radius: 0 0 5px 5px;
    pointer-events: auto;
    cursor: pointer;
    box-shadow: 0 4px 8px -2px #000;
  }
  .bk.down {
    background: linear-gradient(180deg, var(--accent2), #b21f43);
    box-shadow: 0 0 20px -2px var(--accent2) inset;
  }

  .hint {
    position: relative;
    z-index: 1;
    margin-top: 9px;
    text-align: center;
    font-family: var(--mono);
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #4a5663;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="unit">
    <header>
      <div class="brand">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M2 14 L6 14 L6 7 L10 7 L10 16 L14 16 L14 5 L18 5 L18 14 L20 14"
                  stroke="#3dff9a" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="titles">
          <h1>Sub Station</h1>
          <div class="sub">Virtual-Analog Acid Bass</div>
        </div>
      </div>
      <div class="badge">Mono · Sync · Drive</div>
    </header>

    <div class="scope">
      <div class="tag">OSC SYNC · <b id="scopeMode">SAW × PULSE</b></div>
      <canvas id="scope"></canvas>
    </div>

    <div class="rack" id="rack"></div>

    <div class="keys" id="keys"></div>
    <div class="hint">drag knobs vertically · double-click resets · click / hold keys to play</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---- parameter definitions (index MUST match the DSP module) ----
  var PARAMS = [
    { name: "Cutoff",     index: 0, def: 0.30, fmt: hz },
    { name: "Resonance",  index: 1, def: 0.72, fmt: pct },
    { name: "Env Amount", index: 2, def: 0.78, fmt: pct },
    { name: "Sync",       index: 3, def: 0.45, fmt: sync },
    { name: "Overdrive",  index: 4, def: 0.40, fmt: pct, od: true },
    { name: "Decay",      index: 5, def: 0.35, fmt: ms },
    { name: "Level",      index: 6, def: 0.80, fmt: pct }
  ];

  function pct(v) { return Math.round(v * 100) + "%"; }
  function hz(v) {
    var f = 70 * Math.exp(v * 4.96);
    return f >= 1000 ? (f / 1000).toFixed(2) + " kHz" : Math.round(f) + " Hz";
  }
  function sync(v) { return (1 + v * 2.5).toFixed(2) + "×"; }
  function ms(v) {
    var s = 0.025 + v * v * 1.1;
    return s >= 1 ? s.toFixed(2) + " s" : Math.round(s * 1000) + " ms";
  }

  var state = {};   // index -> current value
  var cells = {};   // index -> {cell, arc, dot, valEl}

  // ---- host bridge (guard against vstai being briefly absent) ----
  function push(index, value) {
    if (window.vstai && typeof window.vstai.setParam === "function") {
      window.vstai.setParam(index, value);
    }
  }

  // ---- build knobs ----
  var rack = document.getElementById("rack");

  PARAMS.forEach(function (p) {
    var cell = document.createElement("div");
    cell.className = "cell" + (p.od ? " od" : "");

    var knob = document.createElement("div");
    knob.className = "knob";
    knob.innerHTML = knobSvg(p.od);

    var label = document.createElement("div");
    label.className = "label";
    label.textContent = p.name;

    var val = document.createElement("div");
    val.className = "value";

    cell.appendChild(knob);
    cell.appendChild(label);
    cell.appendChild(val);
    rack.appendChild(cell);

    var arc = knob.querySelector(".arc");
    var dot = knob.querySelector(".dot");

    cells[p.index] = { cell: cell, arc: arc, dot: dot, val: val, p: p };

    attachDrag(knob, cell, p);
    setValue(p.index, p.def, false);
  });

  function knobSvg(isOd) {
    var col = isOd ? "var(--accent2)" : "var(--accent)";
    // arc from -135deg to +135deg, radius 32, center 42,42
    return ''
      + '<svg viewBox="0 0 84 84">'
      + '  <defs>'
      + '    <radialGradient id="g' + (isOd ? 'r' : 'g') + '" cx="50%" cy="38%" r="62%">'
      + '      <stop offset="0%" stop-color="#222b36"/>'
      + '      <stop offset="100%" stop-color="#0a0e13"/>'
      + '    </radialGradient>'
      + '  </defs>'
      + '  <circle cx="42" cy="42" r="38" fill="none" stroke="#1b232e" stroke-width="6"/>'
      + '  <path class="track" d="" fill="none" stroke="#161d27" stroke-width="6" stroke-linecap="round"/>'
      + '  <path class="arc" d="" fill="none" stroke="' + col + '" stroke-width="6" stroke-linecap="round"/>'
      + '  <circle cx="42" cy="42" r="27" fill="url(#g' + (isOd ? 'r' : 'g') + ')" stroke="#2a3340" stroke-width="1"/>'
      + '  <circle cx="42" cy="42" r="27" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" transform="translate(0,-1)"/>'
      + '  <line class="dot" x1="42" y1="42" x2="42" y2="20" stroke="' + col + '" stroke-width="2.5" stroke-linecap="round"/>'
      + '</svg>';
  }

  // polar arc helper
  function polar(cx, cy, r, deg) {
    var a = (deg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }
  function arcPath(r, frac) {
    var start = -135, end = 135;
    var a0 = start, a1 = start + (end - start) * frac;
    var p0 = polar(42, 42, r, a0);
    var p1 = polar(42, 42, r, a1);
    var large = (a1 - a0) > 180 ? 1 : 0;
    return "M " + p0[0].toFixed(2) + " " + p0[1].toFixed(2)
      + " A " + r + " " + r + " 0 " + large + " 1 "
      + p1[0].toFixed(2) + " " + p1[1].toFixed(2);
  }

  function setValue(index, v, doPush) {
    v = Math.max(0, Math.min(1, v));
    state[index] = v;
    var c = cells[index];
    // full track
    c.arc.parentNode.querySelector(".track").setAttribute("d", arcPath(34, 1));
    c.arc.setAttribute("d", arcPath(34, v));
    // pointer rotation: -135..+135
    var deg = -135 + 270 * v;
    c.dot.setAttribute("transform", "rotate(" + deg + " 42 42)");
    c.val.textContent = c.p.fmt(v);
    if (doPush) push(index, v);
  }

  // ---- knob drag / wheel / dblclick ----
  function attachDrag(knob, cell, p) {
    var dragging = false, lastY = 0;

    function glow(on) {
      cell.classList.toggle("live", on);
    }

    function onMove(e) {
      if (!dragging) return;
      var y = (e.touches ? e.touches[0].clientY : e.clientY);
      var dy = lastY - y;
      lastY = y;
      var fine = e.shiftKey ? 0.25 : 1;
      setValue(p.index, state[p.index] + dy * 0.006 * fine, true);
      e.preventDefault();
    }
    function onUp() {
      dragging = false;
      glow(false);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    }
    function onDown(e) {
      dragging = true;
      glow(true);
      lastY = (e.touches ? e.touches[0].clientY : e.clientY);
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("touchend", onUp);
      e.preventDefault();
    }

    knob.addEventListener("mousedown", onDown);
    knob.addEventListener("touchstart", onDown, { passive: false });

    knob.addEventListener("wheel", function (e) {
      var fine = e.shiftKey ? 0.25 : 1;
      setValue(p.index, state[p.index] - Math.sign(e.deltaY) * 0.03 * fine, true);
      glow(true);
      clearTimeout(knob._wt);
      knob._wt = setTimeout(function () { glow(false); }, 240);
      e.preventDefault();
    }, { passive: false });

    knob.addEventListener("dblclick", function () {
      setValue(p.index, p.def, true);
    });
  }

  // =====================================================================
  //  Animated osc-sync scope — draws the live saw × synced-pulse tearing
  //  waveform, brightened by Overdrive, swept by Cutoff/Resonance.
  // =====================================================================
  var cv = document.getElementById("scope");
  var ctx = cv.getContext("2d");
  var scopeMode = document.getElementById("scopeMode");

  function fitCanvas() {
    var r = cv.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    cv.width = Math.max(1, Math.round(r.width * dpr));
    cv.height = Math.max(1, Math.round(r.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", fitCanvas);
  fitCanvas();

  var t = 0;
  function frame() {
    if (document.hidden) { raf = requestAnimationFrame(frame); return; }
    var r = cv.getBoundingClientRect();
    var w = r.width, h = r.height, mid = h * 0.5;

    ctx.clearRect(0, 0, w, h);

    // grid
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;
    for (var gx = 0; gx <= w; gx += 28) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(w, mid); ctx.stroke();

    var cutoff = state[0], reso = state[1], env = state[2];
    var syncR = 1 + state[3] * 2.5;
    var od = state[4];

    scopeMode.textContent = "SAW × PULSE  " + syncR.toFixed(2) + "×";

    // scroll speed
    t += 0.02 + cutoff * 0.03;

    // synthesize the visual waveform: master saw + hard-synced pulse + sub
    var cycles = 2;            // master cycles across the view
    var amp = (0.30 + env * 0.5);
    var glow = 6 + od * 18;

    // red overdrive "edge" trace under the main green trace
    drawWave(w, h, mid, cycles, syncR, reso, amp * (0.9 + od * 0.4),
             "rgba(255,61,106," + (0.25 + od * 0.5).toFixed(3) + ")", 2 + od * 2, true);

    // main green sync trace
    ctx.shadowColor = "var(--accent)";
    drawWave(w, h, mid, cycles, syncR, reso, amp,
             "#3dff9a", 2.2, false, glow);

    raf = requestAnimationFrame(frame);
  }

  function drawWave(w, h, mid, cycles, syncR, reso, amp, color, lw, jitter, glow) {
    ctx.save();
    ctx.beginPath();
    ctx.lineWidth = lw;
    ctx.strokeStyle = color;
    if (glow) { ctx.shadowBlur = glow; ctx.shadowColor = color; }
    var N = Math.max(160, Math.round(w));
    for (var i = 0; i <= N; i++) {
      var x = i / N;
      var ph = (x * cycles + t) % 1;          // master phase 0..1
      var saw = ph * 2 - 1;
      var ph2 = (ph * syncR) % 1;              // synced (resets each master cycle)
      var pulse = ph2 < 0.5 ? 1 : -1;
      var sub = ((x * cycles * 0.5 + t * 0.5) % 1) < 0.5 ? 0.9 : -0.9;
      var s = saw * 0.5 + pulse * 0.5 + sub * 0.35;
      // resonance adds a ringy overshoot near the sync reset
      s += Math.sin(ph * Math.PI * 2 * (2 + reso * 6)) * reso * 0.18 * (1 - ph);
      if (jitter) s += (Math.random() - 0.5) * 0.04;
      var px = x * w;
      var py = mid - s * mid * amp;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  var raf = requestAnimationFrame(frame);

  // =====================================================================
  //  Playable keyboard — two octaves, mouse + touch, calls noteOn/noteOff.
  // =====================================================================
  var keysEl = document.getElementById("keys");
  var START = 36;     // C2 — bass register
  var WHITE = [0, 2, 4, 5, 7, 9, 11];
  var BLACK = { 0: 1, 1: 3, 3: 6, 4: 8, 5: 10 }; // white-index -> semitone offset
  var OCTAVES = 2;

  var whiteNotes = [];
  for (var o = 0; o < OCTAVES; o++) {
    for (var wi = 0; wi < WHITE.length; wi++) {
      whiteNotes.push(START + o * 12 + WHITE[wi]);
    }
  }
  // add final C
  whiteNotes.push(START + OCTAVES * 12);

  var down = {};

  function noteOn(n, el) {
    if (down[n]) return;
    down[n] = el;
    if (el) el.classList.add("down");
    if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(n, 0.95);
  }
  function noteOff(n) {
    var el = down[n];
    if (!el && el !== null) return;
    if (el) el.classList.remove("down");
    delete down[n];
    if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(n);
  }

  var mouseHeld = false;
  window.addEventListener("mousedown", function () { mouseHeld = true; });
  window.addEventListener("mouseup", function () {
    mouseHeld = false;
    for (var n in down) noteOff(+n);
  });

  // build white keys
  whiteNotes.forEach(function (n) {
    var k = document.createElement("div");
    k.className = "wkey";
    bindKey(k, n);
    keysEl.appendChild(k);
  });

  // black keys overlay
  var bwrap = document.createElement("div");
  bwrap.className = "bkeys";
  keysEl.appendChild(bwrap);

  var nWhite = whiteNotes.length;
  var unit = 100 / nWhite; // % width per white key
  for (var o2 = 0; o2 < OCTAVES; o2++) {
    for (var key in BLACK) {
      var idx = o2 * 7 + (+key);
      var semitone = START + o2 * 12 + BLACK[key];
      var bk = document.createElement("div");
      bk.className = "bk";
      bk.style.left = (unit * (idx + 1) - unit * 0.36) + "%";
      bk.style.width = (unit * 0.72) + "%";
      bindKey(bk, semitone);
      bwrap.appendChild(bk);
    }
  }

  function bindKey(el, n) {
    el.addEventListener("mousedown", function (e) { noteOn(n, el); e.preventDefault(); });
    el.addEventListener("mouseenter", function () { if (mouseHeld) noteOn(n, el); });
    el.addEventListener("mouseleave", function () { if (mouseHeld) noteOff(n); });
    el.addEventListener("touchstart", function (e) { noteOn(n, el); e.preventDefault(); }, { passive: false });
    el.addEventListener("touchend", function (e) { noteOff(n); e.preventDefault(); }, { passive: false });
  }

  // =====================================================================
  //  Init: push all defaults once the host is ready.
  // =====================================================================
  function initAll() {
    PARAMS.forEach(function (p) { setValue(p.index, state[p.index], true); });
  }

  if (window.vstai && typeof window.vstai.onReady === "function") {
    window.vstai.onReady(initAll);
  } else {
    initAll();
  }
})();
</script>
</body>
</html>
