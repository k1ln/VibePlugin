<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Air Exciter — test bench</title><style>
  :root{--ac:#bfe3ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Air Exciter</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

    <div class="row"><label>Source

         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Air Exciter<\/title>\n<style>\n  :root {\n    --accent: #bfe3ff;\n    --accent2: #e6f0ff;\n    --ink: #eaf4ff;\n    --dim: #7d93ad;\n    --panel: #0c1722;\n    --panel2: #122433;\n    --glow: rgba(191, 227, 255, 0.55);\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    height: 100%;\n    background: #060d14;\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  body {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 18px;\n    overflow: auto;\n  }\n\n  /* ----- the panel ----- */\n  .shell {\n    position: relative;\n    width: min(560px, 96vw);\n    border-radius: 22px;\n    padding: 26px 28px 30px;\n    background:\n      radial-gradient(130% 90% at 50% -10%, rgba(191,227,255,0.16), transparent 55%),\n      linear-gradient(180deg, #14283a 0%, #0b1622 48%, #08111a 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.07) inset,\n      0 -30px 60px -40px rgba(191,227,255,0.25) inset,\n      0 30px 80px -30px rgba(0,0,0,0.85),\n      0 0 0 1px rgba(120,170,210,0.10);\n    overflow: hidden;\n  }\n\n  /* faint scanline / sheen texture */\n  .shell::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background:\n      repeating-linear-gradient(180deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);\n    pointer-events: none;\n    mix-blend-mode: screen;\n    opacity: 0.6;\n  }\n\n  /* ----- particle field rising behind the controls ----- */\n  .field {\n    position: absolute;\n    inset: 0;\n    pointer-events: none;\n    overflow: hidden;\n    z-index: 0;\n  }\n  .spark {\n    position: absolute;\n    bottom: -8px;\n    width: 4px;\n    height: 4px;\n    border-radius: 50%;\n    background: radial-gradient(circle, var(--accent2), var(--accent) 40%, transparent 70%);\n    filter: drop-shadow(0 0 5px var(--glow));\n    opacity: 0;\n    animation: rise linear infinite;\n  }\n  @keyframes rise {\n    0%   { transform: translateY(0) scale(0.5); opacity: 0; }\n    12%  { opacity: 0.9; }\n    70%  { opacity: 0.7; }\n    100% { transform: translateY(-340px) scale(1.1); opacity: 0; }\n  }\n\n  .content { position: relative; z-index: 2; }\n\n  /* ----- header ----- */\n  header {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    margin-bottom: 22px;\n  }\n  .mark {\n    width: 46px; height: 46px;\n    flex: 0 0 auto;\n    filter: drop-shadow(0 0 8px var(--glow));\n  }\n  .titles h1 {\n    font-size: 19px;\n    font-weight: 700;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    background: linear-gradient(90deg, var(--accent2), var(--accent));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .titles p {\n    margin-top: 3px;\n    font-size: 10px;\n    letter-spacing: 3.5px;\n    text-transform: uppercase;\n    color: var(--dim);\n  }\n\n  /* live shimmer meter strip */\n  .shimmer {\n    margin: 0 0 22px;\n    height: 30px;\n    border-radius: 9px;\n    background: linear-gradient(180deg, #081420, #0a1a28);\n    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 6px 14px -8px #000 inset;\n    overflow: hidden;\n    position: relative;\n  }\n  .shimmer canvas { display: block; width: 100%; height: 100%; }\n\n  /* ----- knob grid ----- */\n  .knobs {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 14px;\n  }\n  @media (max-width: 440px) {\n    .knobs { grid-template-columns: repeat(2, 1fr); gap: 18px; }\n  }\n\n  .cell {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    padding: 14px 6px 12px;\n    border-radius: 16px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.01));\n    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 10px 24px -18px #000;\n    transition: box-shadow 0.25s, transform 0.15s;\n  }\n  .cell:hover { transform: translateY(-2px); }\n  .cell.live {\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.07) inset,\n      0 0 0 1px rgba(191,227,255,0.35),\n      0 0 26px -4px var(--glow);\n  }\n\n  .knob {\n    position: relative;\n    width: 92px; height: 92px;\n    cursor: ns-resize;\n    touch-action: none;\n    user-select: none;\n  }\n  .knob svg { display: block; width: 100%; height: 100%; overflow: visible; }\n\n  .label {\n    margin-top: 12px;\n    font-size: 10.5px;\n    letter-spacing: 2.5px;\n    text-transform: uppercase;\n    color: var(--dim);\n  }\n  .val {\n    margin-top: 4px;\n    font-size: 14px;\n    font-weight: 600;\n    font-variant-numeric: tabular-nums;\n    color: var(--accent2);\n    text-shadow: 0 0 10px rgba(191,227,255,0.25);\n  }\n\n  .foot {\n    margin-top: 20px;\n    text-align: center;\n    font-size: 9.5px;\n    letter-spacing: 2.5px;\n    text-transform: uppercase;\n    color: #43586d;\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"shell\">\n    <div class=\"field\" id=\"field\"><\/div>\n    <div class=\"content\">\n      <header>\n        <svg class=\"mark\" viewBox=\"0 0 48 48\" fill=\"none\">\n          <defs>\n            <radialGradient id=\"g\" cx=\"50%\" cy=\"35%\" r=\"70%\">\n              <stop offset=\"0%\" stop-color=\"#e6f0ff\"/>\n              <stop offset=\"100%\" stop-color=\"#5fa8d8\"/>\n            <\/radialGradient>\n          <\/defs>\n          <path d=\"M24 3 L28 20 L45 24 L28 28 L24 45 L20 28 L3 24 L20 20 Z\"\n                fill=\"url(#g)\" opacity=\"0.95\"/>\n          <circle cx=\"38\" cy=\"11\" r=\"2.2\" fill=\"#e6f0ff\"/>\n          <circle cx=\"10\" cy=\"36\" r=\"1.6\" fill=\"#bfe3ff\" opacity=\"0.8\"/>\n        <\/svg>\n        <div class=\"titles\">\n          <h1>Air Exciter<\/h1>\n          <p>Harmonic Presence Generator<\/p>\n        <\/div>\n      <\/header>\n\n      <div class=\"shimmer\"><canvas id=\"viz\"><\/canvas><\/div>\n\n      <div class=\"knobs\" id=\"knobs\"><\/div>\n\n      <div class=\"foot\">Drag vertically · double-click to reset<\/div>\n    <\/div>\n  <\/div>\n\n<script>\n  \"use strict\";\n\n  // ---- parameter map (indices MUST match assembly.ts) ----\n  const PARAMS = [\n    { index: 0, name: \"Tune\",   min: 0, max: 1, def: 0.45, fmt: tuneFmt },\n    { index: 1, name: \"Amount\", min: 0, max: 1, def: 0.5,  fmt: pctFmt },\n    { index: 2, name: \"Air\",    min: 0, max: 1, def: 0.5,  fmt: pctFmt },\n    { index: 3, name: \"Mix\",    min: 0, max: 1, def: 1.0,  fmt: pctFmt }\n  ];\n\n  function pctFmt(v) { return Math.round(v * 100) + \"%\"; }\n  function tuneFmt(v) {\n    // mirror the DSP mapping: 1200 + v^2 * 7800 Hz\n    const hz = 1200 + v * v * 7800;\n    return hz >= 1000 ? (hz / 1000).toFixed(2) + \" kHz\" : Math.round(hz) + \" Hz\";\n  }\n\n  const norm = (p, v) => (v - p.min) / (p.max - p.min);\n  const denorm = (p, t) => p.min + t * (p.max - p.min);\n\n  // ---- host bridge ----\n  function pushParam(index, value) {\n    if (window.vstai && typeof window.vstai.setParam === \"function\") {\n      window.vstai.setParam(index, value);\n    }\n  }\n\n  // ---- build a knob ----\n  const ARC0 = -135, ARC1 = 135; // degrees\n  const R = 34, CX = 46, CY = 46;\n\n  function polar(cx, cy, r, deg) {\n    const a = (deg - 90) * Math.PI / 180;\n    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];\n  }\n  function arcPath(r, a0, a1) {\n    const [x0, y0] = polar(CX, CY, r, a0);\n    const [x1, y1] = polar(CX, CY, r, a1);\n    const large = (a1 - a0) > 180 ? 1 : 0;\n    return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;\n  }\n\n  const controls = [];\n  const knobsEl = document.getElementById(\"knobs\");\n\n  PARAMS.forEach((p) => {\n    const cell = document.createElement(\"div\");\n    cell.className = \"cell\";\n\n    const knob = document.createElement(\"div\");\n    knob.className = \"knob\";\n    knob.innerHTML = `\n      <svg viewBox=\"0 0 92 92\">\n        <defs>\n          <radialGradient id=\"body${p.index}\" cx=\"50%\" cy=\"38%\" r=\"65%\">\n            <stop offset=\"0%\" stop-color=\"#1d3346\"/>\n            <stop offset=\"60%\" stop-color=\"#0e1f2d\"/>\n            <stop offset=\"100%\" stop-color=\"#081119\"/>\n          <\/radialGradient>\n          <linearGradient id=\"rim${p.index}\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"rgba(191,227,255,0.55)\"/>\n            <stop offset=\"100%\" stop-color=\"rgba(0,0,0,0.4)\"/>\n          <\/linearGradient>\n        <\/defs>\n        <path d=\"${arcPath(R + 6, ARC0, ARC1)}\" stroke=\"#0a151f\" stroke-width=\"5\"\n              fill=\"none\" stroke-linecap=\"round\"/>\n        <path class=\"track\" d=\"${arcPath(R + 6, ARC0, ARC1)}\" stroke=\"#16293a\"\n              stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/>\n        <path class=\"fill\" d=\"\" stroke=\"var(--accent)\" stroke-width=\"3.4\"\n              fill=\"none\" stroke-linecap=\"round\"\n              style=\"filter: drop-shadow(0 0 5px var(--glow));\"/>\n        <circle cx=\"${CX}\" cy=\"${CY}\" r=\"${R}\" fill=\"url(#body${p.index})\"\n                stroke=\"url(#rim${p.index})\" stroke-width=\"1.4\"/>\n        <circle cx=\"${CX}\" cy=\"${CY}\" r=\"${R - 3}\" fill=\"none\"\n                stroke=\"rgba(255,255,255,0.04)\" stroke-width=\"1\"/>\n        <line class=\"pointer\" x1=\"${CX}\" y1=\"${CY}\" x2=\"${CX}\" y2=\"${CY - R + 7}\"\n              stroke=\"var(--accent2)\" stroke-width=\"2.6\" stroke-linecap=\"round\"\n              style=\"filter: drop-shadow(0 0 4px var(--glow));\"/>\n        <circle cx=\"${CX}\" cy=\"${CY}\" r=\"2.6\" fill=\"#bfe3ff\"/>\n      <\/svg>`;\n\n    const label = document.createElement(\"div\");\n    label.className = \"label\";\n    label.textContent = p.name;\n\n    const val = document.createElement(\"div\");\n    val.className = \"val\";\n\n    cell.appendChild(knob);\n    cell.appendChild(label);\n    cell.appendChild(val);\n    knobsEl.appendChild(cell);\n\n    const ctrl = {\n      p, cell, knob, val,\n      fill: knob.querySelector(\".fill\"),\n      pointer: knob.querySelector(\".pointer\"),\n      t: norm(p, p.def)\n    };\n    controls.push(ctrl);\n\n    function render() {\n      const t = ctrl.t;\n      const ang = ARC0 + t * (ARC1 - ARC0);\n      ctrl.fill.setAttribute(\"d\", t > 0.001 ? arcPath(R + 6, ARC0, ang) : \"\");\n      ctrl.pointer.setAttribute(\"transform\", `rotate(${ang} ${CX} ${CY})`);\n      const real = denorm(p, t);\n      ctrl.val.textContent = p.fmt(real);\n    }\n    function commit() { render(); pushParam(p.index, denorm(p, ctrl.t)); }\n    ctrl.render = render;\n    ctrl.commit = commit;\n\n    // ---- drag interaction (vertical) ----\n    let dragging = false, lastY = 0;\n\n    function onDown(e) {\n      dragging = true;\n      cell.classList.add(\"live\");\n      lastY = (e.touches ? e.touches[0].clientY : e.clientY);\n      e.preventDefault();\n    }\n    function onMove(e) {\n      if (!dragging) return;\n      const y = (e.touches ? e.touches[0].clientY : e.clientY);\n      const dy = lastY - y;\n      lastY = y;\n      const fine = e.shiftKey ? 0.25 : 1;\n      ctrl.t = Math.min(1, Math.max(0, ctrl.t + (dy / 200) * fine));\n      commit();\n      e.preventDefault();\n    }\n    function onUp() {\n      if (!dragging) return;\n      dragging = false;\n      cell.classList.remove(\"live\");\n    }\n\n    knob.addEventListener(\"mousedown\", onDown);\n    window.addEventListener(\"mousemove\", onMove);\n    window.addEventListener(\"mouseup\", onUp);\n    knob.addEventListener(\"touchstart\", onDown, { passive: false });\n    window.addEventListener(\"touchmove\", onMove, { passive: false });\n    window.addEventListener(\"touchend\", onUp);\n\n    knob.addEventListener(\"wheel\", (e) => {\n      const fine = e.shiftKey ? 0.25 : 1;\n      ctrl.t = Math.min(1, Math.max(0, ctrl.t - Math.sign(e.deltaY) * 0.03 * fine));\n      commit();\n      e.preventDefault();\n    }, { passive: false });\n\n    knob.addEventListener(\"dblclick\", () => {\n      ctrl.t = norm(p, p.def);\n      cell.classList.add(\"live\");\n      commit();\n      setTimeout(() => cell.classList.remove(\"live\"), 220);\n    });\n\n    render();\n  });\n\n  // ---- initialise all params to defaults on the engine ----\n  function init() {\n    controls.forEach((c) => pushParam(c.p.index, denorm(c.p, c.t)));\n  }\n  if (window.vstai && typeof window.vstai.onReady === \"function\") {\n    window.vstai.onReady(init);\n  } else {\n    init();\n  }\n\n  // ---- rising-sparkle particle field ----\n  const field = document.getElementById(\"field\");\n  for (let i = 0; i < 26; i++) {\n    const s = document.createElement(\"div\");\n    s.className = \"spark\";\n    s.style.left = Math.random() * 100 + \"%\";\n    const dur = 4 + Math.random() * 6;\n    s.style.animationDuration = dur + \"s\";\n    s.style.animationDelay = (-Math.random() * dur) + \"s\";\n    const sz = 2 + Math.random() * 4;\n    s.style.width = sz + \"px\";\n    s.style.height = sz + \"px\";\n    field.appendChild(s);\n  }\n\n  // ---- live shimmer visualiser (driven by Amount + Air) ----\n  const viz = document.getElementById(\"viz\");\n  const vctx = viz.getContext(\"2d\");\n  let phase = 0;\n\n  function amountVal() {\n    const a = controls.find((c) => c.p.name === \"Amount\");\n    return a ? a.t : 0.5;\n  }\n  function airVal() {\n    const a = controls.find((c) => c.p.name === \"Air\");\n    return a ? a.t : 0.5;\n  }\n\n  function resizeViz() {\n    const r = viz.getBoundingClientRect();\n    const dpr = window.devicePixelRatio || 1;\n    viz.width = Math.max(1, r.width * dpr);\n    viz.height = Math.max(1, r.height * dpr);\n    vctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n  }\n\n  function drawViz() {\n    if (document.hidden) { requestAnimationFrame(drawViz); return; }\n    const r = viz.getBoundingClientRect();\n    const w = r.width, h = r.height;\n    vctx.clearRect(0, 0, w, h);\n\n    const amt = amountVal();\n    const air = airVal();\n    phase += 0.04 + air * 0.05;\n\n    // layered shimmer: higher Air = more high-frequency ripples; Amount = height\n    vctx.lineWidth = 1.6;\n    for (let layer = 0; layer < 3; layer++) {\n      const alpha = 0.25 + layer * 0.22;\n      vctx.strokeStyle = `rgba(191, 227, 255, ${alpha * (0.4 + amt * 0.6)})`;\n      vctx.beginPath();\n      const freq = 6 + layer * 6 + air * 22;\n      const amp = (h * 0.32) * (0.3 + amt * 0.7) * (1 - layer * 0.22);\n      for (let x = 0; x <= w; x += 3) {\n        const t = x / w;\n        const y = h / 2\n          + Math.sin(t * freq + phase + layer) * amp\n          * Math.sin(t * Math.PI); // taper at the edges\n        if (x === 0) vctx.moveTo(x, y); else vctx.lineTo(x, y);\n      }\n      vctx.stroke();\n    }\n    requestAnimationFrame(drawViz);\n  }\n\n  window.addEventListener(\"resize\", resizeViz);\n  resizeViz();\n  requestAnimationFrame(drawViz);\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();

    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}

  async function ensure(){

    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);

      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
