  <title>Master Glue — test bench</title><style>

  .kb{display:flex;gap:3px;flex-wrap:wrap}

    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}

  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

ing:2px;color:#5a616a;text-transform:uppercase;}\n\n  /* ---- VU meter ---- */\n  .meterBox{\n    margin:0 6px 16px;border-radius:8px;padding:12px 14px 8px;\n    background:linear-gradient(180deg,#f3ead2 0%,#e7dcc0 100%);\n    border:1px solid #8c8674;box-shadow:inset 0 2px 8px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.5);\n    position:relative;overflow:hidden;\n  }\n  .meterBox::before{content:\"GAIN REDUCTION (dB)\";position:absolute;top:6px;left:0;right:0;text-align:center;font-size:8px;letter-spacing:2px;color:#7a6f52;}\n  svg.vu{display:block;width:100%;height:118px;}\n  .needle{transform-box:fill-box;transform-origin:50% 100%;transition:transform .05s linear;}\n  .glass{position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.35),rgba(255,255,255,0) 45%);pointer-events:none;border-radius:8px;}\n\n  /* ---- controls row ---- */\n  .controls{display:flex;justify-content:space-between;gap:6px;margin:0 4px;}\n  .ctl{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;}\n  .ctl .cap{font-size:10px;letter-spacing:1.5px;font-weight:700;color:#2a2f34;text-transform:uppercase;}\n  .ctl .val{font-size:10px;color:#3a4047;font-variant-numeric:tabular-nums;min-height:12px;letter-spacing:.5px;}\n\n  .knob{position:relative;width:78px;height:78px;cursor:grab;touch-action:none;}\n  .knob.drag{cursor:grabbing;}\n  .knob .dial{position:absolute;inset:9px;border-radius:50%;\n    background:radial-gradient(circle at 38% 32%,#43494f,#22262b 70%,#15181b);\n    box-shadow:0 4px 8px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.18),inset 0 -3px 6px rgba(0,0,0,.6);}\n  .knob .ring{position:absolute;inset:0;}\n  /* chicken-head pointer */\n  .pointer{position:absolute;left:50%;top:50%;width:0;height:0;transform-origin:50% 50%;}\n  .pointer i{position:absolute;left:-5px;top:-3px;width:0;height:0;\n    border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:26px solid var(--ph,#e9edf1);\n    filter:drop-shadow(0 1px 1px r ereo&nbsp;Bus&nbsp;Compressor<\/span>\n    <\/div>\n\n    <div class=\"meterBox\">\n      <svg class=\"vu\" viewBox=\"0 0 320 120\" preserveAspectRatio=\"xMidYMid meet\">\n        <!-- arc -->\n        <path d=\"M40 110 A120 120 0 0 1 280 110\" fill=\"none\" stroke=\"#b6a987\" stroke-width=\"2\"/>\n        <!-- centre zero tick + scale -->\n        <g id=\"scale\" fill=\"#5d543b\" font-size=\"9\" font-family=\"Arial\" text-anchor=\"middle\"><\/g>\n        <line x1=\"160\" y1=\"20\" x2=\"160\" y2=\"34\" stroke=\"#2a3a1a\" stroke-width=\"2\"/>\n        <text x=\"160\" y=\"14\" fill=\"#2a3a1a\" font-size=\"9\" text-anchor=\"middle\" font-weight=\"700\">0<\/text>\n        <!-- red zone right (heavy reduction) -->\n        <path d=\"M205 41 A120 120 0 0 1 280 110\" fill=\"none\" stroke=\"#c44\" stroke-width=\"3\" opacity=\".55\"/>\n        <!-- needle -->\n        <g class=\"needle\" id=\"needle\">\n          <line x1=\"160\" y1=\"110\" x2=\"160\" y2=\"30\" stroke=\"#1a1d12\" stroke-width=\"2.4\"/>\n          <circle cx=\"160\" cy=\"110\" r=\"6\" fill=\"#2a2d20\"/>\n        <\/g>\n        <text x=\"160\" y=\"106\" fill=\"#7a6f52\" font-size=\"7\" text-anchor=\"middle\" letter-spacing=\"1\">VU<\/text>\n      <\/svg>\n      <div class=\"glass\"><\/div>\n    <\/div>\n\n    <div class=\"controls\" id=\"controls\"><\/div>\n\n    <div class=\"footer\">\n      <span>BRITISH&nbsp;MIX-BUS&nbsp;GLUE<\/span>\n      <span style=\"display:flex;align-items:center;gap:6px;\"><span class=\"led\"><\/span>POWER<\/span>\n    <\/div>\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n  // ---------- host bridge ----------\n  var HOST = (window.vstai && typeof window.vstai.setParam === \"function\") ? window.vstai : null;\n  function send(i,v){ if(HOST) try{ HOST.setParam(i,v); }catch(e){} }\n\n  // ---------- param model ----------\n  // continuous knobs map 0..1; stepped knobs map integer positions.\n  var RATIO_LBL = [\"2:1\",\"4:1\",\"10:1\"];\n  var ATTACK_LBL = [\"0.1\",\"0.3\",\"3\",\"10\"];        // ms feel\n  var RELEASE_LBL = [\"0.1\",\"0.3\",\"0.6\",\"1.2\",\"AUTO\"]; // s + AUTO\n\n  var PARAMS = [\n    {name:\"Threshold\", idx:0, type:\"cont\", min:0,max:1, def:0.5, fmt:function(v){return (-30+v*30).toFixed(1)+\" dB\";}},\n    {name:\"Ratio\",     idx:1, type:\"step\", steps:RATIO_LBL,  def:1, ph:\"var(--blue)\", color:\"var(--blue)\"},\n    {name:\"Attack\",    idx:2, type:\"step\", steps:ATTACK_LBL, def:1, ph:\"var(--red)\",  color:\"var(--red)\", unit:\" ms\"},\n    {name:\"Release\",   idx:3, type:\"step\", steps:RELEASE_LBL,def:4, ph:\"var(--blue)\", color:\"var(--blue)\", unit:\" s\"},\n    {name:\"Makeup\",    idx:4, type:\"cont\", min:0,max:1, def:0.3, fmt:function(v){return \"+\"+(v*18).toFixed(1)+\" dB\";}},\n    {name:\"Mix\",       idx:5, type:\"cont\", min:0,max:1, def:1.0, fmt:function(v){return Math.round(v*100)+\"%\";}}\n  ];\n\n  var state = {};   // idx -> current real value\n  var autoBadgeEl = null;\n\n  // sweep arc: -135deg .. +135deg\n  var A0=-135, A1=135;\n\n  function buildKnob(p){\n    var ctl = document.createElement(\"div\"); ctl.className=\"ctl\";\n    var cap = document.createElement(\"div\"); cap.className=\"cap\"; cap.textContent=p.name;\n    var knob = document.createElement(\"div\"); knob.className=\"knob\";\n    var ring = document.createElement(\"div\"); ring.className=\"ring\";\n    var ticks = document.createElement(\"div\"); ticks.className=\"ticks\";\n    var dial = document.createElement(\"div\"); dial.className=\"dial\";\n    var ptr = document.createElement(\"div\"); ptr.className=\"pointer\";\n    if(p.ph) ptr.style.setProperty(\"--ph\", p.ph.indexOf(\"var\")===0? getCss(p.ph):p.ph);\n    var pi=document.createElement(\"i\"); var pb=document.createElement(\"b\");\n    ptr.appendChild(pi); ptr.appendChild(pb);\n    knob.appendChild(ring); knob.appendChild(dial); knob.appendChild(ticks); knob.appendChild(ptr);\n    var val = document.createElement(\"div\"); val.className=\"val\";\n\n    // stepped tick marks\n    if(p.type===\"step\"){\n      var nS=p.steps.length;\n      for(var s=0;s<nS;s++){\n        var a=A0+(A1-A0)*(s/(nS-1));\n        var t=document.createElement(\"div\"); t.className=\"tick\";\n        t.style.transform=\"translate(-50%,-50%) rotate(\"+a+\"deg)\";\n        ticks.appendChild(t);\n      }\n    }\n\n    ctl.appendChild(cap); ctl.appendChild(knob); ctl.appendChild(val);\n\n    // AUTO badge under Release\n    var badge=null;\n    if(p.name===\"Release\"){\n      badge=document.createElement(\"div\"); badge.className=\"autoBadge\"; badge.textContent=\"AUTO\";\n      ctl.appendChild(badge); autoBadgeEl=badge;\n    }\n\n    p._el={knob:knob,ptr:ptr,val:val,badge:badge};\n    wireKnob(p);\n    return ctl;\n  }\n\n  function getCss(varExpr){\n    var name=varExpr.replace(\"var(\",\"\").replace(\")\",\"\").trim();\n    return getComputedStyle(document.documentElement).getPropertyValue(name).trim()||\"#e9edf1\";\n  }\n\n  function norm(p){ // current value -> 0..1 for the dial\n    var v=state[p.idx];\n    if(p.type===\"step\"){ return v/(p.steps.length-1); }\n    return (v-p.min)/(p.max-p.min);\n  }\n\n  function render(p){\n    var t=norm(p);\n    var ang=A0+(A1-A0)*t;\n    p._el.ptr.style.transform=\"rotate(\"+ang+\"deg)\";\n    // label\n    if(p.type===\"step\"){\n      var i=state[p.idx]|0;\n      var lbl=p.steps[i];\n      p._el.val.textContent = (lbl===\"AUTO\"? \"AUTO\" : lbl + (p.unit||\"\"));\n      if(p.badge){\n        if(lbl===\"AUTO\") p.badge.classList.add(\"on\"); else p.badge.classList.remove(\"on\");\n      }\n    }else{\n      p._el.val.textContent = p.fmt(state[p.idx]);\n    }\n  }\n\n  function setVal(p,v,push){\n    if(p.type===\"step\"){\n      var n=p.steps.length-1;\n      v=Math.max(0,Math.min(n,Math.round(v)));\n    }else{\n      v=Math.max(p.min,Math.min(p.max,v));\n    }\n    state[p.idx]=v;\n    render(p);\n    if(push!==false) send(p.idx,v);\n    updateMeter();\n  }\n\n  function wireKnob(p){\n    var el=p._el.knob;\n    var dragging=false, startY=0, startVal=0;\n\n    function down(e){\n      dragging=true; el.classList.add(\"drag\");\n      startY=(e.touches?e.touches[0].clientY:e.clientY);\n      startVal=norm(p);\n      e.preventDefault();\n      window.addEventListener(\"mousemove\",move); window.addEventListener(\"mouseup\",up);\n      window.addEventListener(\"touchmove\",move,{passive:false}); window.addEventListener(\"touchend\",up);\n    }\n    function move(e){\n      if(!dragging) return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      var dn=(startY-y)/180; // up = increase\n      var nt=Math.max(0,Math.min(1,startVal+dn));\n      if(p.type===\"step\"){\n        setVal(p, nt*(p.steps.length-1));\n      }else{\n        setVal(p, p.min+(p.max-p.min)*nt);\n      }\n      e.preventDefault();\n    }\n    function up(){ dragging=false; el.classList.remove(\"drag\");\n      window.removeEventListener(\"mousemove\",move); window.removeEventListener(\"mouseup\",up);\n      window.removeEventListener(\"touchmove\",move); window.removeEventListener(\"touchend\",up);\n    }\n    el.addEventListener(\"mousedown\",down);\n    el.addEventListener(\"touchstart\",down,{passive:false});\n    el.addEventListener(\"dblclick\",function(){ setVal(p, p.def); });\n    el.addEventListener(\"wheel\",function(e){\n      e.preventDefault();\n      var step=(p.type===\"step\")?1:(e.shiftKey?0.005:0.02);\n      var dir=e.deltaY<0?1:-1;\n      if(p.type===\"step\") setVal(p, state[p.idx]+dir);\n      else setVal(p, state[p.idx]+dir*step*(p.max-p.min));\n    },{passive:false});\n  }\n\n  // ---------- GR meter (centre-zero, swings RIGHT with reduction) ----------\n  var needle=document.getElementById(\"needle\");\n  var grShown=0; // smoothed displayed reduction dB\n  function estimateGR(){\n    // rough visual estimate from threshold + ratio (no audio here): show a\n    // gentle, breathing reduction so the iconic needle moves.\n    var thr=state[0], ratioSel=state[1]|0, mix=state[5];\n    var ratio=[2,4,10][ratioSel];\n    // lower threshold -> more reduction; scale to ~0..10 dB\n    var base=(1-thr)*( (ratio-1)/9 *0.6+0.4 )*8.0*mix;\n    return base;\n  }\n  function updateMeter(){ grTarget=estimateGR(); }\n  var grTarget=0;\n  function tick(){\n    // breathing wobble when AUTO release is engaged\n    var auto=(state[3]|0)===4;\n    var t=performance.now()/1000;\n    var wob=auto? (Math.sin(t*1.7)*0.6+Math.sin(t*0.9)*0.4) : 0;\n    var target=grTarget+ (auto? wob:0);\n    grShown += (target-grShown)*0.08;\n    // map 0..12 dB reduction -> 0..+62deg (right of centre)\n    var dB=Math.max(0,Math.min(12,grShown));\n    var ang = dB/12*62;\n    needle.style.transform=\"rotate(\"+ang+\"deg)\";\n    requestAnimationFrame(tick);\n  }\n\n  // VU scale labels\n  (function(){\n    var g=document.getElementById(\"scale\");\n    var marks=[{db:\"-3\",a:-40},{db:\"-6\",a:-70},{db:\"3\",a:40},{db:\"6\",a:70}];\n    marks.forEach(function(m){\n      var rad=(m.a-90)*Math.PI/180;\n      var x=160+118*Math.cos(rad), y=110+118*Math.sin(rad);\n      var txt=document.createElementNS(\"http://www.w3.org/2000/svg\",\"text\");\n      txt.setAttribute(\"x\",x); txt.setAttribute(\"y\",y); txt.textContent=m.db;\n      g.appendChild(txt);\n    });\n  })();\n\n  // ---------- init ----------\n  function init(){\n    var host=document.getElementById(\"controls\");\n    PARAMS.forEach(function(p){\n      state[p.idx]=p.def;\n      host.appendChild(buildKnob(p));\n    });\n    PARAMS.forEach(function(p){ render(p); send(p.idx,state[p.idx]); });\n    updateMeter();\n    requestAnimationFrame(tick);\n  }\n\n  if(window.vstai && typeof window.vstai.onReady===\"function\"){\n    window.vstai.onReady(init);\n  }else{\n    init();\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);

    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}

  function makeRiff(){

    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);

      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
