<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Noise Gate — test bench</title><style>
  :root{--ac:#ff6b6b}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Noise Gate<\/title>\n<style>\n  :root {\n    --accent: #ff6b6b;\n    --accent2: #ffb36b;\n    --bg0: #0c0d10;\n    --bg1: #15171c;\n    --panel: #1b1e25;\n    --panel2: #23272f;\n    --ink: #e7e9ee;\n    --ink-dim: #8b909b;\n    --line: #2c313b;\n    --shadow: rgba(0,0,0,.55);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #20232b 0%, var(--bg0) 60%) fixed;\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .shell {\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 18px clamp(12px, 3vw, 26px) 26px;\n  }\n\n  /* ---------- header ---------- */\n  header {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    padding: 10px 4px 16px;\n    border-bottom: 1px solid var(--line);\n  }\n  .brand {\n    display: flex;\n    flex-direction: column;\n    line-height: 1.05;\n  }\n  .brand .kicker {\n    font-size: 10px;\n    letter-spacing: .34em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .brand h1 {\n    margin: 3px 0 0;\n    font-size: 22px;\n    letter-spacing: .04em;\n    font-weight: 700;\n    background: linear-gradient(180deg, #fff, #c9ccd4);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n\n  /* open/closed LED + status */\n  .status {\n    margin-left: auto;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 7px 12px;\n    border-radius: 10px;\n    background: linear-gradient(180deg, var(--panel2), var(--panel));\n    border: 1px solid var(--line);\n    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 2px 6px var(--shadow);\n  }\n  .led {\n    width: 13px; height: 13px;\n    border-radius: 50%;\n    background: #3a1414;\n    box-shadow: inset 0 0 4px rgba(0,0,0,.8);\n    transition: background .08s, box-shadow .08s;\n  }\n  .led.open {\n    background: var(--accent);\n    box-shadow: 0 0 4px var(--accent), 0 0 12px var(--accent), inset 0 0 3px #fff6;\n  }\n  .status .txt {\n    font-size: 11px;\n    letter-spacing: .22em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    font-variant-numeric: tabular-nums;\n    min-width: 56px;\n  }\n\n  /* ---------- the gate door stage ---------- */\n  .stage {\n    position: relative;\n    margin: 18px 0 6px;\n    height: 200px;\n    border-radius: 14px;\n    background:\n      linear-gradient(180deg, #0a0b0e, #121419);\n    border: 1px solid var(--line);\n    box-shadow: inset 0 2px 14px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.03);\n    overflow: hidden;\n  }\n  /* signal flow lanes behind the door */\n  .lanes {\n    position: absolute;\n    inset: 0;\n    opacity: .5;\n  }\n  .lane {\n    position: absolute;\n    left: 0; right: 0;\n    height: 1px;\n    background: linear-gradient(90deg, transparent, #3a4150 40%, #3a4150 60%, transparent);\n  }\n\n  /* the doorway frame in the middle */\n  .frame {\n    position: absolute;\n    top: 16px; bottom: 16px;\n    left: 50%;\n    width: 150px;\n    transform: translateX(-50%);\n    border-radius: 8px;\n    background: repeating-linear-gradient(45deg, #14161b 0 6px, #171a20 6px 12px);\n    border: 2px solid #0a0b0e;\n    box-shadow: inset 0 0 22px rgba(0,0,0,.9);\n  }\n\n  /* the two swinging gate doors */\n  .door {\n    position: absolute;\n    top: 16px; bottom: 16px;\n    width: 75px;\n    background:\n      linear-gradient(100deg, #2a2e37 0%, #1d2027 55%, #15171c 100%);\n    border: 1px solid #353b46;\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,.06),\n      0 8px 18px rgba(0,0,0,.55);\n    transform-style: preserve-3d;\n    will-change: transform;\n  }\n  .door::after {\n    /* a bolt strip / handle */\n    content: \"\";\n    position: absolute;\n    top: 8px; bottom: 8px;\n    width: 4px;\n    border-radius: 2px;\n    background: linear-gradient(180deg, var(--accent2), var(--accent));\n    box-shadow: 0 0 6px var(--accent);\n    opacity: .8;\n  }\n  .door.left {\n    left: calc(50% - 75px);\n    transform-origin: left center;\n    border-radius: 6px 2px 2px 6px;\n  }\n  .door.left::after { right: 7px; }\n  .door.right {\n    left: 50%;\n    transform-origin: right center;\n    border-radius: 2px 6px 6px 2px;\n  }\n  .door.right::after { left: 7px; }\n\n  /* the threshold line that runs across the stage */\n  .threshold {\n    position: absolute;\n    left: 0; right: 0;\n    height: 0;\n    border-top: 2px dashed var(--accent2);\n    opacity: .85;\n    box-shadow: 0 0 8px rgba(255,179,107,.4);\n    transition: top .12s ease;\n  }\n  .threshold .tag {\n    position: absolute;\n    right: 8px;\n    top: -9px;\n    font-size: 9px;\n    letter-spacing: .18em;\n    text-transform: uppercase;\n    color: var(--accent2);\n    background: #0c0d10cc;\n    padding: 1px 5px;\n    border-radius: 4px;\n  }\n  /* a rising level bar that pokes above/below the threshold */\n  .levelbar {\n    position: absolute;\n    left: 14px;\n    bottom: 16px;\n    width: 8px;\n    border-radius: 4px 4px 0 0;\n    background: linear-gradient(180deg, var(--accent), var(--accent2));\n    box-shadow: 0 0 10px rgba(255,107,107,.5);\n    height: 4px;\n  }\n\n  /* sweeping shimmer when gate is open (signal passing) */\n  @keyframes flow {\n    0%   { transform: translateX(-120%); opacity: 0; }\n    25%  { opacity: .9; }\n    100% { transform: translateX(120%); opacity: 0; }\n  }\n  .flow {\n    position: absolute;\n    top: 0; bottom: 0;\n    width: 60px;\n    background: linear-gradient(90deg, transparent, rgba(255,107,107,.22), transparent);\n    pointer-events: none;\n  }\n  .stage.open .flow { animation: flow 1.1s linear infinite; }\n\n  /* ---------- controls ---------- */\n  .rack {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));\n    gap: 12px;\n    margin-top: 18px;\n  }\n  .cell {\n    position: relative;\n    padding: 14px 10px 12px;\n    border-radius: 12px;\n    background: linear-gradient(180deg, var(--panel2), var(--panel));\n    border: 1px solid var(--line);\n    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 4px 12px var(--shadow);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 8px;\n    user-select: none;\n  }\n  .cell .label {\n    font-size: 10px;\n    letter-spacing: .26em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .knob {\n    position: relative;\n    width: 78px; height: 78px;\n    cursor: ns-resize;\n    touch-action: none;\n  }\n  .knob svg { display: block; }\n  .knob .cap {\n    fill: url(#capGrad);\n    stroke: #0a0b0e;\n    stroke-width: 1.5;\n  }\n  .knob .tick {\n    stroke: var(--ink);\n    stroke-width: 3;\n    stroke-linecap: round;\n    filter: drop-shadow(0 0 3px var(--accent));\n  }\n  .value {\n    font-size: 12px;\n    font-variant-numeric: tabular-nums;\n    letter-spacing: .04em;\n    color: var(--ink);\n    background: #0c0d10;\n    border: 1px solid var(--line);\n    border-radius: 6px;\n    padding: 2px 8px;\n    min-width: 62px;\n    text-align: center;\n  }\n\n  footer {\n    margin-top: 16px;\n    text-align: center;\n    font-size: 10px;\n    letter-spacing: .22em;\n    text-transform: uppercase;\n    color: #565b66;\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"shell\">\n  <header>\n    <div class=\"brand\">\n      <span class=\"kicker\">Dynamics · Downward Expander<\/span>\n      <h1>NOISE GATE<\/h1>\n    <\/div>\n    <div class=\"status\">\n      <span class=\"led\" id=\"led\"><\/span>\n      <span class=\"txt\" id=\"statusTxt\">CLOSED<\/span>\n    <\/div>\n  <\/header>\n\n  <!-- the gate door stage -->\n  <div class=\"stage\" id=\"stage\">\n    <div class=\"lanes\" id=\"lanes\"><\/div>\n    <div class=\"threshold\" id=\"threshold\"><span class=\"tag\">Threshold<\/span><\/div>\n    <div class=\"levelbar\" id=\"levelbar\"><\/div>\n    <div class=\"frame\"><\/div>\n    <div class=\"door left\"  id=\"doorL\"><\/div>\n    <div class=\"door right\" id=\"doorR\"><\/div>\n    <div class=\"flow\"><\/div>\n  <\/div>\n\n  <!-- controls -->\n  <div class=\"rack\" id=\"rack\"><\/div>\n\n  <footer>Below threshold the gate slams shut · loud signal passes clean<\/footer>\n<\/div>\n\n<!-- shared SVG gradient defs for every knob cap -->\n<svg width=\"0\" height=\"0\" style=\"position:absolute\">\n  <defs>\n    <radialGradient id=\"capGrad\" cx=\"38%\" cy=\"30%\" r=\"80%\">\n      <stop offset=\"0%\"  stop-color=\"#343a45\"/>\n      <stop offset=\"55%\" stop-color=\"#22262e\"/>\n      <stop offset=\"100%\" stop-color=\"#14161b\"/>\n    <\/radialGradient>\n  <\/defs>\n<\/svg>\n\n<script>\n  \"use strict\";\n\n  // ---- parameter map (indices MUST match assembly.ts) ----\n  var PARAMS = [\n    { name: \"Threshold\", index: 0, min: 0, max: 1, def: 0.55, fmt: thr },\n    { name: \"Range\",     index: 1, min: 0, max: 1, def: 0.80, fmt: rng },\n    { name: \"Attack\",    index: 2, min: 0, max: 1, def: 0.15, fmt: atk },\n    { name: \"Release\",   index: 3, min: 0, max: 1, def: 0.35, fmt: rel },\n    { name: \"Hold\",      index: 4, min: 0, max: 1, def: 0.20, fmt: hld }\n  ];\n\n  // ---- value formatters mirror the DSP unit mapping ----\n  function thr(v) { return (-72 + v * 72).toFixed(1) + \" dB\"; }\n  function rng(v) { return v <= 0.001 ? \"0.0 dB\" : (v * -90).toFixed(0) + \" dB\"; }\n  function atk(v) { return (0.05 + v * v * 49.95).toFixed(2) + \" ms\"; }\n  function rel(v) { var m = 5 + v * v * 995; return (m >= 100 ? m.toFixed(0) : m.toFixed(1)) + \" ms\"; }\n  function hld(v) { return (v * 500).toFixed(0) + \" ms\"; }\n\n  var state = PARAMS.map(function (p) { return p.def; });\n\n  // ---- host bridge ----\n  function push(i, value) {\n    if (window.vstai && window.vstai.setParam) {\n      window.vstai.setParam(i, value);\n    }\n  }\n\n  // ---- build the knobs ----\n  var rack = document.getElementById(\"rack\");\n  var ARC0 = -135, ARC1 = 135; // degrees sweep\n\n  function makeKnob(p) {\n    var cell = document.createElement(\"div\");\n    cell.className = \"cell\";\n\n    var label = document.createElement(\"div\");\n    label.className = \"label\";\n    label.textContent = p.name;\n\n    var knob = document.createElement(\"div\");\n    knob.className = \"knob\";\n    knob.innerHTML =\n      '<svg viewBox=\"0 0 78 78\" width=\"78\" height=\"78\">' +\n      '  <circle cx=\"39\" cy=\"39\" r=\"34\" fill=\"none\" stroke=\"#0a0b0e\" stroke-width=\"6\"/>' +\n      '  <path class=\"arcbg\" d=\"\" fill=\"none\" stroke=\"#2c313b\" stroke-width=\"5\" stroke-linecap=\"round\"/>' +\n      '  <path class=\"arc\"   d=\"\" fill=\"none\" stroke=\"url(#capGrad)\" stroke-width=\"5\" stroke-linecap=\"round\"/>' +\n      '  <circle class=\"cap\" cx=\"39\" cy=\"39\" r=\"26\"/>' +\n      '  <line class=\"tick\" x1=\"39\" y1=\"39\" x2=\"39\" y2=\"18\"/>' +\n      '<\/svg>';\n\n    var value = document.createElement(\"div\");\n    value.className = \"value\";\n\n    cell.appendChild(label);\n    cell.appendChild(knob);\n    cell.appendChild(value);\n    rack.appendChild(cell);\n\n    var arc = knob.querySelector(\".arc\");\n    var arcbg = knob.querySelector(\".arcbg\");\n    var tick = knob.querySelector(\".tick\");\n    arcbg.setAttribute(\"d\", arcPath(0, 1));\n\n    function render() {\n      var v = state[p.index];\n      var ang = ARC0 + (ARC1 - ARC0) * v;\n      tick.setAttribute(\"transform\", \"rotate(\" + ang + \" 39 39)\");\n      // accent the active arc with the theme gradient via stroke colour\n      arc.setAttribute(\"d\", arcPath(0, v));\n      arc.setAttribute(\"stroke\", v > 0.5 ? \"var(--accent)\" : \"var(--accent2)\");\n      value.textContent = p.fmt(v);\n    }\n    render();\n\n    // ---- drag to turn (vertical), wheel fine-tune, dbl-click reset ----\n    var dragging = false, startY = 0, startV = 0;\n\n    function setV(v) {\n      v = Math.max(0, Math.min(1, v));\n      state[p.index] = v;\n      push(p.index, v);\n      render();\n    }\n\n    knob.addEventListener(\"pointerdown\", function (e) {\n      dragging = true; startY = e.clientY; startV = state[p.index];\n      knob.setPointerCapture(e.pointerId);\n      e.preventDefault();\n    });\n    knob.addEventListener(\"pointermove\", function (e) {\n      if (!dragging) return;\n      var dy = startY - e.clientY;\n      setV(startV + dy / 200);\n    });\n    knob.addEventListener(\"pointerup\", function () { dragging = false; });\n    knob.addEventListener(\"pointercancel\", function () { dragging = false; });\n    knob.addEventListener(\"wheel\", function (e) {\n      e.preventDefault();\n      setV(state[p.index] - Math.sign(e.deltaY) * 0.02);\n    }, { passive: false });\n    knob.addEventListener(\"dblclick\", function () { setV(p.def); });\n\n    return render;\n  }\n\n  // build an SVG arc path (value 0..1) along the -135..135 sweep\n  function arcPath(from, to) {\n    var r = 31, cx = 39, cy = 39;\n    var a0 = (ARC0 + (ARC1 - ARC0) * from) * Math.PI / 180;\n    var a1 = (ARC0 + (ARC1 - ARC0) * to) * Math.PI / 180;\n    // start at bottom: rotate so 0deg points down. Our tick points up at 0deg,\n    // so map angle to screen coordinates with up = -y.\n    function pt(a) {\n      return [cx + r * Math.sin(a), cy - r * Math.cos(a)];\n    }\n    var p0 = pt(a0), p1 = pt(a1);\n    var large = (to - from) > 0.5 ? 1 : 0;\n    return \"M \" + p0[0].toFixed(2) + \" \" + p0[1].toFixed(2) +\n           \" A \" + r + \" \" + r + \" 0 \" + large + \" 1 \" +\n           p1[0].toFixed(2) + \" \" + p1[1].toFixed(2);\n  }\n\n  var renderers = PARAMS.map(makeKnob);\n\n  // ---- build the lane lines behind the door ----\n  (function () {\n    var lanes = document.getElementById(\"lanes\");\n    for (var i = 0; i < 9; i++) {\n      var l = document.createElement(\"div\");\n      l.className = \"lane\";\n      l.style.top = (18 + i * 20) + \"px\";\n      lanes.appendChild(l);\n    }\n  })();\n\n  // ---- animated gate visual: simulate a level, drive the doors ----\n  var stage = document.getElementById(\"stage\");\n  var doorL = document.getElementById(\"doorL\");\n  var doorR = document.getElementById(\"doorR\");\n  var led = document.getElementById(\"led\");\n  var statusTxt = document.getElementById(\"statusTxt\");\n  var thresholdEl = document.getElementById(\"threshold\");\n  var levelbar = document.getElementById(\"levelbar\");\n\n  var simLevel = 0;     // 0..1 pseudo input level\n  var gateGain = 0;     // 0..1 smoothed open amount\n  var holdLeft = 0;\n  var t = 0;\n\n  function loop() {\n    if (document.hidden) { requestAnimationFrame(loop); return; }\n    t += 0.016;\n\n    // a lively pseudo signal: bursts of \"loud\" with quiet gaps so the gate works\n    var burst = Math.max(0, Math.sin(t * 1.7)) * (0.6 + 0.4 * Math.sin(t * 11.0));\n    var noise = 0.08 * Math.random();\n    simLevel = simLevel * 0.6 + Math.max(burst, noise) * 0.4;\n\n    var thrV = state[0];                 // 0..1 threshold position\n    var open = simLevel > (thrV * 0.85 + 0.05);\n    if (open) holdLeft = 0.25 + state[4] * 0.8;\n    else if (holdLeft > 0) holdLeft -= 0.016;\n\n    var target = (open || holdLeft > 0) ? 1 : (1 - state[1]) * 0.0; // range = how shut\n    var rangeFloor = (1 - state[1]);     // closed gain visual\n    target = (open || holdLeft > 0) ? 1 : rangeFloor;\n\n    var atkV = 0.20 + state[2] * 0.5;    // smoothing speeds for the visual\n    var relV = 0.04 + (1 - state[3]) * 0.25;\n    var speed = target > gateGain ? atkV : relV;\n    gateGain += (target - gateGain) * speed;\n\n    // swing the doors: 0 gain -> fully shut (0deg), 1 -> swung open (~78deg)\n    var swing = gateGain * 78;\n    doorL.style.transform = \"perspective(600px) rotateY(\" + (-swing) + \"deg)\";\n    doorR.style.transform = \"perspective(600px) rotateY(\" + ( swing) + \"deg)\";\n\n    // threshold line position (top: high threshold = lower line)\n    var stageH = 200;\n    thresholdEl.style.top = (24 + (1 - thrV) * (stageH - 56)) + \"px\";\n\n    // level bar height tracks the sim level\n    var lh = 6 + simLevel * (stageH - 40);\n    levelbar.style.height = lh + \"px\";\n    levelbar.style.opacity = (0.5 + gateGain * 0.5).toFixed(2);\n\n    // LED + status\n    var isOpen = gateGain > 0.55;\n    led.classList.toggle(\"open\", isOpen);\n    stage.classList.toggle(\"open\", isOpen);\n    statusTxt.textContent = isOpen ? \"OPEN\" : \"CLOSED\";\n    statusTxt.style.color = isOpen ? \"var(--accent)\" : \"var(--ink-dim)\";\n\n    requestAnimationFrame(loop);\n  }\n  requestAnimationFrame(loop);\n\n  // ---- initialise host with defaults ----\n  function init() {\n    for (var i = 0; i < PARAMS.length; i++) {\n      push(PARAMS[i].index, state[i]);\n    }\n    renderers.forEach(function (r) { r(); });\n  }\n\n  if (window.vstai && window.vstai.onReady) {\n    window.vstai.onReady(init);\n  } else {\n    init();\n  }\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,d.f,d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
