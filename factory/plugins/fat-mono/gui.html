<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
:root{
  --ac:#ff8c42;     /* accent  */
  --ac2:#ffb454;    /* accent2 */
  --wood1:#7a4a23; --wood2:#5a3318; --wood3:#43250f;
  --panel1:#2c2622; --panel2:#16120f; --panel3:#0a0807;
  --metal1:#cdb89a; --metal2:#8a7656; --ink:#1a140d;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#f0e3d2;
  background:radial-gradient(120% 90% at 50% -10%,#241a13 0%,#100b08 60%,#050302 100%);
  display:flex;align-items:center;justify-content:center;padding:18px;overflow:hidden}

/* ---- whole instrument: tilted hardware on a stand ---- */
.synth{position:relative;width:100%;max-width:660px;
  transform:perspective(1500px) rotateX(7deg);transform-style:preserve-3d;
  animation:rise 1s cubic-bezier(.2,.8,.2,1) both}
@keyframes rise{from{opacity:0;transform:perspective(1500px) rotateX(20deg) translateY(34px)}}

/* wood end-cheeks frame the unit */
.cab{position:relative;display:grid;grid-template-columns:30px 1fr 30px;
  border-radius:14px 14px 10px 10px;padding:0;
  box-shadow:0 38px 60px rgba(0,0,0,.65),0 6px 0 #000,inset 0 1px 0 rgba(255,255,255,.05)}
.cheek{position:relative;border-radius:12px 12px 6px 6px;
  background:
    repeating-linear-gradient(178deg,rgba(0,0,0,.16) 0 2px,rgba(255,255,255,.04) 2px 5px,transparent 5px 11px),
    linear-gradient(100deg,var(--wood1),var(--wood2) 45%,var(--wood3));
  box-shadow:inset 0 2px 4px rgba(255,225,190,.22),inset 0 -3px 8px rgba(0,0,0,.6),inset -2px 0 5px rgba(0,0,0,.4)}
.cheek::after{content:"";position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(120% 60% at 30% 8%,rgba(255,210,160,.25),transparent 55%)}
.cheek.l{box-shadow:inset 0 2px 4px rgba(255,225,190,.22),inset 0 -3px 8px rgba(0,0,0,.6),inset 2px 0 5px rgba(0,0,0,.4)}

/* the brushed-metal face plate */
.face{position:relative;overflow:hidden;border-top:1px solid rgba(255,255,255,.08);
  border-bottom:1px solid rgba(0,0,0,.7);
  background:
    repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0 2px,transparent 2px 4px),
    linear-gradient(168deg,var(--panel1),var(--panel2) 70%,var(--panel3));
  box-shadow:inset 0 2px 18px rgba(0,0,0,.6)}

/* ---- title strip ---- */
.head{position:relative;display:flex;align-items:center;gap:12px;padding:13px 20px 11px;
  border-bottom:1px solid rgba(0,0,0,.6)}
.head::before{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:rgba(255,225,190,.07)}
.logo{display:flex;flex-direction:column;line-height:1}
.brand{font-size:9px;letter-spacing:.45em;color:var(--metal2);text-transform:uppercase;margin-bottom:5px}
.model{font-size:20px;font-weight:900;letter-spacing:.02em;
  background:linear-gradient(180deg,#fff6ea,var(--ac2) 55%,var(--ac));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 1px 0 rgba(0,0,0,.3);filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.plate{margin-left:auto;display:flex;align-items:center;gap:10px}
.power{display:flex;align-items:center;gap:7px;font-size:9px;letter-spacing:.2em;color:var(--metal2);text-transform:uppercase}
.led{width:11px;height:11px;border-radius:50%;background:var(--ac);
  box-shadow:0 0 10px var(--ac),0 0 22px var(--ac),inset 0 0 3px #fff7;
  animation:hum 2.6s ease-in-out infinite}
@keyframes hum{0%,100%{opacity:.6;box-shadow:0 0 5px var(--ac),0 0 10px var(--ac)}
  50%{opacity:1;box-shadow:0 0 12px var(--ac),0 0 26px var(--ac),0 0 4px #fff inset}}
.screws{display:flex;gap:7px}
.screw{width:11px;height:11px;border-radius:50%;
  background:radial-gradient(circle at 38% 30%,var(--metal1),var(--metal2) 60%,#3a2f1f);
  box-shadow:inset 0 -1px 2px rgba(0,0,0,.7),0 1px 1px rgba(0,0,0,.6);position:relative}
.screw::after{content:"";position:absolute;inset:0;margin:auto;width:7px;height:1.6px;border-radius:1px;
  background:rgba(0,0,0,.55);transform:rotate(35deg)}

/* ---- the FAT oscilloscope ---- */
.scopebay{margin:14px 18px 4px;padding:9px;border-radius:10px;
  background:linear-gradient(#05140f,#020a07);
  border:1px solid rgba(0,0,0,.8);
  box-shadow:inset 0 0 24px rgba(0,0,0,.9),inset 0 0 2px rgba(120,255,200,.15),0 1px 0 rgba(255,255,255,.05)}
.scope{position:relative;height:104px;border-radius:6px;overflow:hidden;
  background:
    repeating-linear-gradient(0deg,transparent 0 15px,rgba(80,255,180,.05) 15px 16px),
    repeating-linear-gradient(90deg,transparent 0 24px,rgba(80,255,180,.05) 24px 25px),
    radial-gradient(110% 130% at 50% 50%,#08251a,#020806);
  box-shadow:inset 0 0 30px rgba(0,0,0,.85)}
.scope svg{position:absolute;inset:0;width:100%;height:100%}
.scope .glass{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 0%,rgba(180,255,220,.10),transparent 60%);
  animation:scan 5s linear infinite}
@keyframes scan{0%{background-position:0 -10px}100%{background-position:0 110px}}
.wave{fill:none;stroke:var(--ac2);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round;
  filter:drop-shadow(0 0 5px var(--ac)) drop-shadow(0 0 11px color-mix(in srgb,var(--ac) 70%,transparent))}
.wave.ghost{stroke:var(--ac);opacity:.32;stroke-width:5}
.scopelbl{position:absolute;top:6px;left:9px;font-size:8px;letter-spacing:.25em;color:rgba(150,255,200,.55);text-transform:uppercase}

/* ---- knob rows on the tilt panel ---- */
.rows{padding:12px 16px 8px}
.rowlbl{display:flex;align-items:center;gap:9px;margin:6px 4px 2px;
  font-size:8.5px;letter-spacing:.32em;color:var(--metal2);text-transform:uppercase}
.rowlbl::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(255,225,190,.18),transparent)}
.bank{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}

.cell{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:11px 4px 9px;border-radius:11px;
  animation:pop .55s both;animation-delay:var(--d);transition:background .2s}
.cell:hover{background:rgba(255,210,160,.04)}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.92)}to{opacity:1;transform:none}}

/* chunky moog knob */
.knob{position:relative;width:82px;height:82px;cursor:ns-resize;user-select:none;touch-action:none}
.knob svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.ringbg{fill:none;stroke:rgba(0,0,0,.55);stroke-width:5}
.ringfg{fill:none;stroke:url(#g);stroke-width:5;stroke-linecap:round;
  filter:drop-shadow(0 0 4px var(--ac));transition:stroke-dasharray .12s cubic-bezier(.2,.8,.2,1)}
/* the physical cap */
.cap{position:absolute;top:13px;left:13px;width:56px;height:56px;border-radius:50%;
  background:
    radial-gradient(circle at 50% 22%,#4a4036,#231c14 62%,#0c0907);
  box-shadow:inset 0 3px 6px rgba(255,220,180,.18),inset 0 -5px 10px rgba(0,0,0,.85),
    0 4px 8px rgba(0,0,0,.6),0 0 0 2px rgba(0,0,0,.55);
  transition:transform .12s cubic-bezier(.2,.8,.2,1)}
.cap::before{content:"";position:absolute;inset:9px;border-radius:50%;
  background:repeating-conic-gradient(from 0deg,#2c241b 0 6deg,#1a140e 6deg 12deg);
  box-shadow:inset 0 0 6px rgba(0,0,0,.8)}
.cap::after{content:"";position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(60% 40% at 38% 24%,rgba(255,240,220,.30),transparent 60%)}
/* pointer line painted onto the cap, rotated by JS via --rot */
.ptr{position:absolute;top:13px;left:13px;width:56px;height:56px;border-radius:50%;z-index:3;
  transform:rotate(var(--rot,-135deg));transition:transform .12s cubic-bezier(.2,.8,.2,1)}
.ptr i{position:absolute;top:3px;left:50%;width:4px;height:16px;margin-left:-2px;border-radius:2px;
  background:linear-gradient(var(--ac2),var(--ac));box-shadow:0 0 7px var(--ac),0 0 2px #fff}
.knob.act .cap{transform:scale(1.04)}

.bub{position:absolute;top:-12px;left:50%;transform:translate(-50%,5px) scale(.8);opacity:0;pointer-events:none;
  font-size:11px;font-weight:800;color:var(--ink);background:linear-gradient(var(--ac2),var(--ac));
  padding:2px 8px;border-radius:5px;font-variant-numeric:tabular-nums;z-index:5;
  box-shadow:0 4px 10px rgba(0,0,0,.5);transition:.15s}
.cell:hover .bub,.knob.act .bub{opacity:1;transform:translate(-50%,0) scale(1)}

.nm{font-size:9.5px;letter-spacing:.16em;color:#c9b59a;text-transform:uppercase;text-align:center}
.val{font-size:12px;font-weight:800;color:#fff4e6;font-variant-numeric:tabular-nums;
  background:rgba(0,0,0,.35);border:1px solid rgba(255,210,160,.12);border-radius:5px;padding:1px 8px;min-width:46px;text-align:center}

.foot{display:flex;align-items:center;gap:10px;padding:9px 22px 13px;font-size:10px;color:#9c8568;
  border-top:1px solid rgba(0,0,0,.55)}
.foot::before{content:"";position:absolute;left:0;right:0;height:1px;background:rgba(255,225,190,.06);margin-top:-9px}
.foot b{color:var(--ac2);font-weight:800;letter-spacing:.04em}
.vu{margin-left:auto;display:flex;gap:3px;align-items:flex-end;height:14px}
.vu i{width:3px;border-radius:1px;background:var(--metal2);animation:vu 1.1s ease-in-out infinite}
.vu i:nth-child(1){height:5px;animation-delay:0s}
.vu i:nth-child(2){height:9px;animation-delay:.12s}
.vu i:nth-child(3){height:14px;animation-delay:.24s}
.vu i:nth-child(4){height:8px;animation-delay:.36s}
.vu i:nth-child(5){height:11px;animation-delay:.48s}
@keyframes vu{0%,100%{background:var(--metal2);transform:scaleY(.5)}50%{background:var(--ac);transform:scaleY(1)}}
</style></head><body>
  <div class="synth">
    <div class="cab">
      <div class="cheek l"></div>
      <div class="face">
        <div class="head">
          <div class="logo">
            <span class="brand">Boutique Analog</span>
            <span class="model">FAT MONO</span>
          </div>
          <div class="plate">
            <div class="power"><span class="led"></span>ON</div>
            <div class="screws"><span class="screw"></span><span class="screw"></span></div>
          </div>
        </div>

        <div class="scopebay">
          <div class="scope">
            <span class="scopelbl">OSC // live</span>
            <svg viewBox="0 0 600 104" preserveAspectRatio="none">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="var(--ac2)"/><stop offset="1" stop-color="var(--ac)"/>
                </linearGradient>
              </defs>
              <path id="wghost" class="wave ghost" d=""/>
              <path id="wave" class="wave" d=""/>
            </svg>
            <div class="glass"></div>
          </div>
        </div>

        <div class="rows">
          <div class="rowlbl">Oscillators &amp; Voice</div>
          <div class="bank" id="bankA"></div>
          <div class="rowlbl">Transistor Ladder Filter &amp; Envelope</div>
          <div class="bank" id="bankB"></div>
        </div>

        <div class="foot">
          <span>3&times; OSC &rarr; <b>4-pole ladder</b> &middot; tanh drive &middot; last-note priority</span>
          <span class="vu"><i></i><i></i><i></i><i></i><i></i></span>
        </div>
      </div>
      <div class="cheek"></div>
    </div>
  </div>

  <script>
  (function(){
    // ---- EXACT params from spec.json (re-read) ----
    var PARAMS=[
      {name:"Detune",       index:0, min:0, max:1, def:0.35},
      {name:"Cutoff",       index:1, min:0, max:1, def:0.45},
      {name:"Resonance",    index:2, min:0, max:1, def:0.55},
      {name:"FilterEnvAmt", index:3, min:0, max:1, def:0.70, label:"Env Amt"},
      {name:"Attack",       index:4, min:0, max:1, def:0.08},
      {name:"Release",      index:5, min:0, max:1, def:0.30},
      {name:"Glide",        index:6, min:0, max:1, def:0.25},
      {name:"Level",        index:7, min:0, max:1, def:0.70}
    ];
    var BANKS={bankA:[0,1,2,3], bankB:[4,5,6,7]}; // OSC/voice vs filter/env layout

    var R=33, C=41, CIRC=2*Math.PI*R;       // ring geometry for the SVG knob
    var SWEEP=270;                           // degrees of knob travel
    var ctrls=[];

    // params are normalised 0..1; show them as a clean 0..100 dial position
    // (no "%" suffix, since these are not literal percentages).
    function fmt(p,val){ return String(Math.round(val*100)); }

    function makeKnob(p, delay){
      var cell=document.createElement('div');
      cell.className='cell'; cell.style.setProperty('--d',delay+'ms');
      cell.innerHTML=
        '<div class="knob">'+
          '<svg viewBox="0 0 82 82">'+
            '<circle class="ringbg" cx="41" cy="41" r="33"/>'+
            '<circle class="ringfg" cx="41" cy="41" r="33"/>'+
          '</svg>'+
          '<div class="cap"></div>'+
          '<div class="ptr"><i></i></div>'+
          '<span class="bub"></span>'+
        '</div>'+
        '<div class="nm">'+(p.label||p.name)+'</div>'+
        '<div class="val"></div>';
      var knob=cell.querySelector('.knob'),
          fg=cell.querySelector('.ringfg'),
          ptr=cell.querySelector('.ptr'),
          out=cell.querySelector('.val'),
          bub=cell.querySelector('.bub');

      // ring is drawn from -225deg start over 270deg; rotate the svg so the
      // gap sits at the bottom.
      fg.style.transform='rotate(135deg)'; fg.style.transformOrigin='41px 41px';
      cell.querySelector('.ringbg').style.transform='rotate(135deg)';
      cell.querySelector('.ringbg').style.transformOrigin='41px 41px';
      var GAP=CIRC*(SWEEP/360);
      fg.setAttribute('stroke-dasharray','0 '+CIRC);
      cell.querySelector('.ringbg').setAttribute('stroke-dasharray',GAP+' '+CIRC);

      var val=p.def;
      function norm(){ return (val-p.min)/((p.max-p.min)||1); }
      function paint(){
        var n=norm();
        fg.setAttribute('stroke-dasharray',(GAP*n)+' '+CIRC);
        ptr.style.setProperty('--rot',(-135+SWEEP*n)+'deg');
        var t=fmt(p,val); out.textContent=t; bub.textContent=t;
        if(window.vstai&&window.vstai.setParam) window.vstai.setParam(p.index,val);
      }
      function setN(n){ n=n<0?0:(n>1?1:n); val=p.min+(p.max-p.min)*n; paint(); }

      knob.addEventListener('pointerdown',function(e){
        knob._d=1; knob._y=e.clientY; knob._n=norm(); knob.classList.add('act');
        try{knob.setPointerCapture(e.pointerId);}catch(_){}
        e.preventDefault();
      });
      knob.addEventListener('pointermove',function(e){
        if(!knob._d)return; setN(knob._n+(knob._y-e.clientY)/220);
      });
      function end(){ knob._d=0; knob.classList.remove('act'); }
      knob.addEventListener('pointerup',end);
      knob.addEventListener('pointercancel',end);
      knob.addEventListener('dblclick',function(){ val=p.def; paint(); });
      knob.addEventListener('wheel',function(e){ e.preventDefault(); setN(norm()+(e.deltaY<0?0.025:-0.025)); },{passive:false});

      paint();
      ctrls.push({p:p, get:norm});
      return cell;
    }

    function build(){
      Object.keys(BANKS).forEach(function(bid){
        var host=document.getElementById(bid);
        BANKS[bid].forEach(function(pi,k){ host.appendChild(makeKnob(PARAMS[pi], pi*55)); });
      });
      startScope();
    }

    // ---- the FAT animated oscilloscope -------------------------------
    // Synthesises the actual voice shape: detuned saws + pulse through a
    // resonant low-pass envelope, so the trace REACTS to the knobs live.
    var wave=document.getElementById('wave'), ghost=document.getElementById('wghost');
    var N=120, W=600, H=104, t=0;
    function val(i){ var c=ctrls[i]; return c?c.get():PARAMS[i].def; }
    function startScope(){
      function saw(ph){ return 2*(ph-Math.floor(ph+0.5)); }
      function frame(){
        t+=0.024;
        var det=val(0), cut=val(1), res=val(2), envA=val(3), level=val(7);
        // a moving filter-envelope “breath” modulates brightness over time
        var breath=0.5+0.5*Math.sin(t*0.7);
        var bright=0.12+ (cut + envA*breath)*1.1;        // harmonic count factor
        var harm=Math.max(2,Math.round(2+bright*9));
        var rq=1+res*7;                                   // resonance emphasis
        var pts=[], gpts=[];
        var f=2.1+det*1.6;                                // base cycles across screen
        var d2=det*0.06;                                  // detune spread between osc
        for(var x=0;x<=N;x++){
          var u=x/N, ph=u*f, s=0, norm=0;
          for(var h=1;h<=harm;h++){
            var amp=1/h;
            // resonant bump near the (moving) cutoff harmonic
            var fc=harm*(0.35+0.4*breath);
            amp*= 1/(1+Math.pow(h/Math.max(1.2,fc),3));   // low-pass roll-off
            amp*= 1+(rq-1)*Math.exp(-Math.pow((h-fc)/1.4,2)); // resonance peak
            s+= amp*( Math.sin(2*Math.PI*(h*ph))
                    + 0.6*Math.sin(2*Math.PI*(h*(ph+d2)))   // detuned osc 2 (saw)
                    + 0.4*(Math.sin(2*Math.PI*(h*(ph-d2)))) // osc 3 (pulse-ish)
                    );
            norm+=amp;
          }
          s=s/(norm*2.0);
          s=Math.tanh(s*(1.4+res*1.6));                   // ladder tanh drive
          var y=H/2 - s*(H*0.40)*(0.5+level*0.6);
          var px=(x/N*W).toFixed(1);
          pts.push((x?'L':'M')+px+' '+y.toFixed(1));
          gpts.push((x?'L':'M')+px+' '+(H/2-(s)*(H*0.40)*(0.5+level*0.6)).toFixed(1));
        }
        wave.setAttribute('d',pts.join(' '));
        ghost.setAttribute('d',gpts.join(' '));
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    if(window.vstai&&window.vstai.onReady) window.vstai.onReady(build); else build();
  })();
  </script>
</body></html>
