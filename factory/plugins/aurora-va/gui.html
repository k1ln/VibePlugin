<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aurora VA</title>
<style>
  :root{ --acc:#ff3d3d; --acc2:#ff9a5a; --bg0:#0c0606; --bg1:#1c0e0e; --ink:#f6e6e2; --dim:#9c7a76; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,#2c1212 0%,var(--bg1) 44%,var(--bg0) 100%);
    color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden;
    background:linear-gradient(160deg,#3a1414,#160a0a); border:1px solid rgba(255,61,61,.22);
    box-shadow:0 22px 64px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,220,210,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px;
    background:linear-gradient(90deg,#fff,var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 12px var(--acc); animation:pulse 2.2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4; transform:scale(.85);} 50%{ opacity:1; transform:scale(1.2);} }
  .screen{ height:100px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative;
    background:linear-gradient(180deg,#1a0c0c,#160a0a); border:1px solid rgba(255,61,61,.18); box-shadow:inset 0 2px 18px rgba(0,0,0,.5); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .shp{ position:absolute; right:12px; top:8px; font-size:10px; letter-spacing:.14em; color:var(--acc2); z-index:2; font-weight:700; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; }
  .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(255,180,170,.14); stroke-width:7; stroke-linecap:round; }
  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(255,61,61,.6)); }
  .pcap{ fill:#180a0a; stroke:rgba(255,61,61,.22); stroke-width:1; }
  .ptr{ stroke:#fff; stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
  .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(255,61,61,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(255,61,61,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style>
</head>
<body>
  <div class="unit">
    <header><span class="logo">AURORA&nbsp;VA</span><span class="sub">virtual analog · morph</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">OSCILLATOR</div><div class="shp" id="shp">SAW</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){
  "use strict";
  var P=[{name:"Shape",idx:0,def:0.6},{name:"Cutoff",idx:1,def:0.6},{name:"Reso",idx:2,def:0.35},{name:"Sync",idx:3,def:0.0},{name:"Env",idx:4,def:0.5},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });
  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  function morph(ph,sh){ var sine=Math.sin(ph*Math.PI*2), tri=1-4*Math.abs(ph-0.5), saw=ph*2-1, pulse=ph<0.5?0.85:-0.85;
    if(sh<0.333){var t=sh/0.333;return sine*(1-t)+tri*t;} if(sh<0.666){var t2=(sh-0.333)/0.333;return tri*(1-t2)+saw*t2;}
    var t3=(sh-0.666)/0.334;return saw*(1-t3)+pulse*t3; }
  var shp=document.getElementById("shp");
  function shpName(){ var s=vals[0]; return s<0.2?"SINE":(s<0.45?"TRI":(s<0.72?"SAW":"PULSE")); }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135;
  var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){
    var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80">'+
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff3d3d"/><stop offset="1" stop-color="#ff9a5a"/></linearGradient></defs>'+
      '<circle class="track" cx="40" cy="40" r="33"></circle>'+
      '<circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'+
      '<circle class="pcap" cx="40" cy="40" r="20"></circle>'+
      '<line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div>'+
      '<span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el);
    var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString());
      var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2));
      val.textContent=Math.round(v*100)+"%"; if(p.idx===0&&shp) shp.textContent=shpName(); }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; });
    el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });
    render(p.def);
    return {render:render};
  });
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener("resize",resize); resize();
  function frame(ts){
    ctx.clearRect(0,0,W,H); var sh=vals[0], cut=vals[1], sync=vals[3]; var mid=H*0.55;
    ctx.strokeStyle="rgba(255,61,61,0.10)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,mid); ctx.lineTo(W,mid); ctx.stroke();
    ctx.beginPath();
    for(var x=0;x<=W;x+=2){ var t=x/W; var ph=(t*3*(1+sync*2.5)+ts/700)%1; var y=morph(ph,sh)*(0.5+cut*0.5);
      if(x===0) ctx.moveTo(x,mid-y*(H*0.34)); else ctx.lineTo(x,mid-y*(H*0.34)); }
    ctx.strokeStyle="rgba(255,80,70,0.95)"; ctx.lineWidth=2.4; ctx.shadowColor="#ff3d3d"; ctx.shadowBlur=9; ctx.stroke(); ctx.shadowBlur=0;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script>
</body>
</html>
