  <title>Additive — test bench</title><style>
  :root{--ac:#54d1ff}
  *{box-sizing:border-box}

  button.off{background:#28313f;color:#e7eef6}

  .st{font-size:12px;color:#8da0bd;min-height:16px}

  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Additive<\/title>\n<style>\n  :root{\n    --accent:#54d1ff;\n    --accent2:#b0e0ff;\n    --bg:#04080d;\n    --panel:#0a131c;\n    --grid:#0e2230;\n    --ink:#dff3ff;\n    --dim:#5b7b8c;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}\n  html,body{height:100%;}\n  body{\n    background:\n      radial-gradient(1200px 600px at 70% -10%, rgba(84,209,255,.10), transparent 60%),\n      radial-gradient(900px 500px at -10% 120%, rgba(176,224,255,.07), transparent 55%),\n      var(--bg);\n    color:var(--ink);\n    font-family:\"SF Mono\",ui-monospace,\"Roboto Mono\",Menlo,Consolas,monospace;\n    overflow:hidden;\n    display:flex;align-items:center;justify-content:center;\n    height:100%;\n  }\n  .unit{\n    width:760px;max-width:96vw;\n    border:1px solid #11303f;\n    border-radius:18px;\n    background:linear-gradient(180deg,#08121b,#050b12);\n    box-shadow:0 30px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(176,224,255,.06);\n    padding:20px 22px 22px;\n    position:relative;\n    overflow:hidden;\n  }\n  /* faint moving scan sheen */\n  .unit::before{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:linear-gradient(115deg,transparent 40%,rgba(84,209,255,.05) 50%,transparent 60%);\n    background-size:300% 300%;\n    animation:sheen 9s linear infinite;\n  }\n  @keyframes sheen{0%{background-position:120% 0}100%{background-position:-120% 0}}\n\n  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;z-index:2;}\n  .brand{display:flex;align-items:center;gap:11px;}\n  .logo{\n    width:30px;height:30px;border-radius:8px;\n    border:1px solid rgba(84,209,255,.5);\n    display:grid;place-items:center;\n    background:radial-gradient(circle at 50% 30%,rgba(84,209,255,.25),transparent 70%);\n  }\n  .logo span{width:3px;height:16px;background:var(--accent);border-radius:2px;box-shadow:0 0 8px var(--accent);animation:pulse 1.6s ease-in-out infinite;}\n  @keyframes pulse{0%,100%{transform:scaleY(.5);opacity:.6}50%{transform:scaleY(1);opacity:1}}\n  .title h1{font-size:17px;letter-spacing:3px;font-weight:600;}\n  .title small{font-size:9.5px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;}\n  .badge{font-size:9px;letter-spacing:2px;color:var(--accent2);border:1px solid #163a4c;border-radius:20px;padding:5px 11px;text-transform:uppercase;}\n\n  .scope-wrap{\n    position:relative;z-index:2;\n    border:1px solid var(--grid);border-radius:12px;\n    background:linear-gradient(180deg,#061018,#040a10);\n    padding:8px 10px 4px;margin-bottom:14px;\n    overflow:hidden;\n  }\n  .scope-wrap .tag{position:absolute;top:7px;left:11px;font-size:8.5px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;z-index:3;}\n  svg{display:block;width:100%;}\n\n  .row{display:grid;grid-template-columns:1fr 300px;gap:16px;position:relative;z-index:2;}\n  .card{border:1px solid var(--grid);border-radius:12px;background:linear-gradient(180deg,#08121a,#050c13);padding:11px 12px;}\n  .card h2{font-size:9px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;margin-bottom:9px;display:flex;justify-content:space-between;}\n\n  /* harmonic bars */\n  .bars{display:flex;align-items:flex-end;gap:4px;height:118px;}\n  .bar{\n    flex:1;position:relative;display:flex;flex-direction:column;justify-content:flex-end;\n    height:100%;border-radius:3px 3px 0 0;cursor:default;\n  }\n  .bar i{\n    display:block;width:100%;border-radius:3px 3px 0 0;\n    background:linear-gradient(180deg,var(--accent),#1d7aa8);\n    box-shadow:0 0 7px rgba(84,209,255,.45);\n    transition:height .12s cubic-bezier(.2,.8,.2,1),background .2s;\n  }\n  .bar.even i{background:linear-gradient(180deg,var(--accent2),#3a6f93);}\n  .bar:hover i{filter:brightness(1.35);}\n  .bar b{position:absolute;bottom:-13px;left:0;right:0;text-align:center;font-size:7px;color:var(--dim);}\n\n  /* knobs */\n  .knobs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 6px;}\n  .knob{display:flex;flex-direction:column;align-items:center;gap:5px;}\n  .dial{\n    width:52px;height:52px;border-radius:50%;position:relative;cursor:ns-resize;\n    background:radial-gradient(circle at 50% 35%,#15303f,#091820);\n    border:1px solid #1c4256;\n    box-shadow:inset 0 2px 6px rgba(0,0,0,.6), 0 0 0 1px rgba(84,209,255,.06);\n    touch-action:none;\n  }\n  .dial::after{\n    content:\"\";position:absolute;inset:6px;border-radius:50%;\n    background:conic-gradient(from -135deg,var(--accent) var(--deg,0deg),#0c1c26 0);\n    -webkit-mask:radial-gradient(circle,transparent 56%,#000 57%);\n    mask:radial-gradient(circle,transparent 56%,#000 57%);\n    opacity:.9;\n  }\n  .dial .ptr{\n    position:absolute;left:50%;top:50%;width:2px;height:18px;\n    background:var(--accent2);border-radius:2px;transform-origin:50% 100%;\n    transform:translate(-50%,-100%) rotate(var(--rot,0deg));\n    box-shadow:0 0 6px var(--accent);\n  }\n  .dial:hover{border-color:var(--accent);}\n  .knob label{font-size:8.5px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;text-align:center;}\n  .knob .val{font-size:10px;color:var(--accent2);letter-spacing:.5px;font-variant-numeric:tabular-nums;}\n\n  .foot{margin-top:13px;display:flex;justify-content:space-between;align-items:center;font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;position:relative;z-index:2;}\n  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px var(--accent);animation:blink 2s ease-in-out infinite;margin-right:6px;vertical-align:middle;}\n  @keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"unit\">\n  <header>\n    <div class=\"brand\">\n      <div class=\"logo\"><span><\/span><\/div>\n      <div class=\"title\"><h1>ADDITIVE<\/h1><small>Fourier Voice Engine<\/small><\/div>\n    <\/div>\n    <div class=\"badge\">32 partials · 8 voices<\/div>\n  <\/header>\n\n  <div class=\"scope-wrap\">\n    <div class=\"tag\">Summed Waveform<\/div>\n    <svg id=\"scope\" viewBox=\"0 0 720 120\" preserveAspectRatio=\"none\">\n      <defs>\n        <linearGradient id=\"wf\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0\" stop-color=\"#b0e0ff\"/>\n          <stop offset=\"1\" stop-color=\"#54d1ff\"/>\n        <\/linearGradient>\n        <linearGradient id=\"fill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0\" stop-color=\"rgba(84,209,255,.28)\"/>\n          <stop offset=\"1\" stop-color=\"rgba(84,209,255,0)\"/>\n        <\/linearGradient>\n      <\/defs>\n      <line x1=\"0\" y1=\"60\" x2=\"720\" y2=\"60\" stroke=\"#0e2230\" stroke-width=\"1\"/>\n      <path id=\"wfFill\" fill=\"url(#fill)\" d=\"\"/>\n      <path id=\"wfLine\" fill=\"none\" stroke=\"url(#wf)\" stroke-width=\"2\" d=\"\"/>\n    <\/svg>\n  <\/div>\n\n  <div class=\"row\">\n    <div class=\"card\">\n      <h2><span>Harmonic Spectrum<\/span><span id=\"specInfo\">live<\/span><\/h2>\n      <div class=\"bars\" id=\"bars\"><\/div>\n      <div style=\"height:14px\"><\/div>\n    <\/div>\n    <div class=\"card\">\n      <h2><span>Voice<\/span><span>drag · dbl-click reset<\/span><\/h2>\n      <div class=\"knobs\" id=\"knobs\"><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"foot\">\n    <div><span class=\"dot\"><\/span>Additive Synthesis<\/div>\n    <div>cyan lab · #54d1ff<\/div>\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n  var NHARM = 16;\n\n  // ---- param model (index must match assembly.ts / spec.json) -------\n  var PARAMS = [\n    { name:\"Odd\",      idx:0, def:0.85 },\n    { name:\"Even\",     idx:1, def:0.45 },\n    { name:\"Bright\",   idx:2, def:0.55 },\n    { name:\"S.Decay\",  idx:3, def:0.40 },\n    { name:\"Attack\",   idx:4, def:0.04 },\n    { name:\"Release\",  idx:5, def:0.45 },\n    { name:\"Level\",    idx:6, def:0.60 }\n  ];\n  var val = PARAMS.map(function(p){ return p.def; });\n\n  function send(i,v){\n    if(window.vstai && window.vstai.setParam) window.vstai.setParam(i, v);\n  }\n  function pushAll(){ for(var i=0;i<PARAMS.length;i++) send(PARAMS[i].idx, val[i]); }\n\n  // ---- harmonic bars (visual model of the spectral shape) ----------\n  var barsEl = document.getElementById(\"bars\");\n  var barInner = [];\n  for(var h=0; h<NHARM; h++){\n    var b = document.createElement(\"div\");\n    b.className = \"bar\" + (((h+1)&1)===0 ? \" even\" : \"\");\n    var inn = document.createElement(\"i\");\n    var lbl = document.createElement(\"b\");\n    lbl.textContent = (h+1);\n    b.appendChild(inn); b.appendChild(lbl);\n    barsEl.appendChild(b);\n    barInner.push(inn);\n  }\n\n  // compute the static harmonic amplitude profile exactly like the DSP\n  function harmAmps(){\n    var odd=val[0], even=val[1], bright=val[2];\n    var tilt = 0.35 + bright*1.35;\n    var a = new Array(NHARM), norm=0;\n    for(var h=0; h<NHARM; h++){\n      var hn=h+1, isOdd=(hn&1)===1;\n      var oe = isOdd?odd:even;\n      var roll = Math.pow(hn, -tilt);\n      var v = oe*roll;\n      a[h]=v; norm+=v;\n    }\n    var inv = norm>1e-4 ? 1/norm : 1;\n    for(var k=0;k<NHARM;k++) a[k]*=inv;\n    return a;\n  }\n\n  function drawBars(){\n    var a = harmAmps();\n    var mx = 0; for(var i=0;i<a.length;i++) mx=Math.max(mx,a[i]);\n    mx = mx>1e-4?mx:1;\n    for(var h=0;h<NHARM;h++){\n      var pct = Math.max(2, (a[h]/mx)*100);\n      barInner[h].style.height = pct + \"%\";\n    }\n    return a;\n  }\n\n  // ---- summed-waveform scope (animated) ----------------------------\n  var line = document.getElementById(\"wfLine\");\n  var fill = document.getElementById(\"wfFill\");\n  var W=720, H=120, MID=60, N=240;\n  var t=0;\n  function drawScope(amps){\n    var sdecay = val[3];\n    var d = \"M0 \"+MID, fd = \"M0 \"+H;\n    for(var x=0; x<=N; x++){\n      var ph = x/N; // one fundamental cycle across the view\n      var s=0;\n      for(var h=0;h<NHARM;h++){\n        var hn=h+1;\n        // animated spectral fade: highs shimmer with S.Decay\n        var fade = 1 - (hn/NHARM)*(1-sdecay)*0.5*(0.5+0.5*Math.sin(t*0.9 + hn*0.4));\n        s += amps[h]*fade*Math.sin(2*Math.PI*hn*ph);\n      }\n      var px = (x/N)*W;\n      var py = MID - s*48;\n      d  += \" L\"+px.toFixed(1)+\" \"+py.toFixed(1);\n      fd += \" L\"+px.toFixed(1)+\" \"+py.toFixed(1);\n    }\n    fd += \" L\"+W+\" \"+H+\" Z\";\n    line.setAttribute(\"d\", d);\n    fill.setAttribute(\"d\", fd);\n  }\n\n  var cachedAmps = null;\n  function refreshVisual(){ cachedAmps = drawBars(); }\n  function loop(){ t+=0.05; if(cachedAmps) drawScope(cachedAmps); requestAnimationFrame(loop); }\n\n  // ---- knobs --------------------------------------------------------\n  var knobsEl = document.getElementById(\"knobs\");\n  var dials = [];\n  PARAMS.forEach(function(p, i){\n    var wrap = document.createElement(\"div\"); wrap.className=\"knob\";\n    var dial = document.createElement(\"div\"); dial.className=\"dial\";\n    var ptr  = document.createElement(\"div\"); ptr.className=\"ptr\";\n    dial.appendChild(ptr);\n    var label= document.createElement(\"label\"); label.textContent=p.name;\n    var vEl  = document.createElement(\"div\"); vEl.className=\"val\";\n    wrap.appendChild(dial); wrap.appendChild(label); wrap.appendChild(vEl);\n    knobsEl.appendChild(wrap);\n\n    function paint(){\n      var v = val[i];\n      var deg = v*270;             // arc fill\n      var rot = -135 + v*270;      // pointer\n      dial.style.setProperty(\"--deg\", deg+\"deg\");\n      dial.style.setProperty(\"--rot\", rot+\"deg\");\n      vEl.textContent = v.toFixed(2);\n    }\n    function set(v, push){\n      v = v<0?0:(v>1?1:v);\n      val[i]=v; paint();\n      refreshVisual();\n      if(push!==false) send(p.idx, v);\n    }\n    dials.push({ paint:paint, set:set });\n\n    // vertical drag\n    var dragging=false, startY=0, startV=0;\n    function down(e){\n      dragging=true;\n      startY=(e.touches?e.touches[0].clientY:e.clientY);\n      startV=val[i];\n      e.preventDefault();\n    }\n    function move(e){\n      if(!dragging) return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      set(startV + (startY-y)/180);\n      e.preventDefault();\n    }\n    function up(){ dragging=false; }\n    dial.addEventListener(\"mousedown\", down);\n    dial.addEventListener(\"touchstart\", down, {passive:false});\n    window.addEventListener(\"mousemove\", move);\n    window.addEventListener(\"touchmove\", move, {passive:false});\n    window.addEventListener(\"mouseup\", up);\n    window.addEventListener(\"touchend\", up);\n    dial.addEventListener(\"dblclick\", function(){ set(p.def); });\n    dial.addEventListener(\"wheel\", function(e){ set(val[i] - e.deltaY*0.0008); e.preventDefault(); }, {passive:false});\n\n    paint();\n  });\n\n  // ---- boot ---------------------------------------------------------\n  function ready(){\n    for(var i=0;i<PARAMS.length;i++){ dials[i].paint(); }\n    refreshVisual();\n    pushAll();\n    loop();\n  }\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(ready);\n  else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){

    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }

    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}

  async function ensure(){

    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);

      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}

  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }

  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
