<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shimmer Hall — test bench</title><style>
  :root{--ac:#b08cff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Shimmer Hall</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n:root{\n  --ac:#b08cff;\n  --ac2:#ff8cf0;\n  --glass:rgba(255,255,255,.06);\n}\n*{box-sizing:border-box;-webkit-user-select:none;user-select:none}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px/1.4 ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:#eaf0fb;\n  background:#04060d;\n  overflow:hidden;\n}\n\n/* ---- night-sky stage ---- */\n.sky{\n  position:fixed;inset:0;\n  background:\n    radial-gradient(120% 80% at 50% 120%, #0a1430 0%, #060a18 45%, #03040b 100%);\n  overflow:hidden;\n}\n/* faint stars */\n.stars{position:absolute;inset:0;opacity:.8;\n  background-image:\n    radial-gradient(1px 1px at 12% 22%, #fff, transparent),\n    radial-gradient(1px 1px at 28% 64%, #cfe, transparent),\n    radial-gradient(1px 1px at 47% 18%, #fff, transparent),\n    radial-gradient(1px 1px at 63% 72%, #def, transparent),\n    radial-gradient(1px 1px at 78% 33%, #fff, transparent),\n    radial-gradient(1.4px 1.4px at 88% 58%, #fff, transparent),\n    radial-gradient(1px 1px at 8% 80%, #cdf, transparent),\n    radial-gradient(1px 1px at 38% 88%, #fff, transparent),\n    radial-gradient(1px 1px at 70% 12%, #fff, transparent),\n    radial-gradient(1px 1px at 92% 84%, #bdf, transparent);\n  animation:twinkle 6s ease-in-out infinite;\n}\n@keyframes twinkle{0%,100%{opacity:.55}50%{opacity:.95}}\n\n/* ---- aurora curtains (SVG, animated) ---- */\n.aurora{position:absolute;left:-10%;right:-10%;top:-15%;height:78%;width:120%;\n  filter:blur(2px);opacity:.92;mix-blend-mode:screen}\n.aurora svg{width:100%;height:100%}\n.curtain{transform-origin:50% 0;}\n.c1{animation:sway1 13s ease-in-out infinite}\n.c2{animation:sway2 17s ease-in-out infinite}\n.c3{animation:sway3 21s ease-in-out infinite}\n@keyframes sway1{0%,100%{transform:translateX(-3%) skewX(-4deg) scaleY(1)}50%{transform:translateX(4%) skewX(5deg) scaleY(1.08)}}\n@keyframes sway2{0%,100%{transform:translateX(3%) skewX(4deg) scaleY(1.05)}50%{transform:translateX(-4%) skewX(-5deg) scaleY(.95)}}\n@keyframes sway3{0%,100%{transform:translateX(-2%) skewX(-2deg) scaleY(.97)}50%{transform:translateX(5%) skewX(6deg) scaleY(1.1)}}\n/* shimmer bands that travel up the curtains */\n@keyframes glow{0%,100%{opacity:.35}50%{opacity:1}}\n\n/* ground reflection / horizon haze */\n.haze{position:absolute;left:0;right:0;bottom:0;height:46%;\n  background:linear-gradient(to top, rgba(176,140,255,.10), transparent);\n  pointer-events:none}\n\n/* ---- main glass console ---- */\n.wrap{position:relative;z-index:5;height:100%;display:flex;flex-direction:column;\n  align-items:center;justify-content:center;padding:18px}\n\n.console{\n  position:relative;width:100%;max-width:640px;border-radius:26px;padding:20px 22px 22px;\n  background:linear-gradient(160deg, rgba(28,34,58,.46), rgba(8,12,26,.62));\n  border:1px solid rgba(255,255,255,.12);\n  backdrop-filter:blur(14px) saturate(1.3);\n  -webkit-backdrop-filter:blur(14px) saturate(1.3);\n  box-shadow:\n    0 40px 90px rgba(0,0,0,.6),\n    inset 0 1px 0 rgba(255,255,255,.18),\n    inset 0 0 60px rgba(176,140,255,.05);\n}\n/* top sheen */\n.console::before{content:\"\";position:absolute;inset:0;border-radius:26px;pointer-events:none;\n  background:linear-gradient(180deg, rgba(255,255,255,.10), transparent 26%)}\n\n.head{display:flex;align-items:center;gap:13px;margin-bottom:4px}\n.orb{position:relative;width:15px;height:15px;border-radius:50%;flex:none;\n  background:radial-gradient(circle at 38% 32%, #fff, var(--ac) 55%, var(--ac2) 100%);\n  box-shadow:0 0 14px var(--ac),0 0 28px var(--ac2);\n  animation:breathe 4s ease-in-out infinite}\n@keyframes breathe{0%,100%{box-shadow:0 0 10px var(--ac),0 0 18px var(--ac2);transform:scale(.92)}\n  50%{box-shadow:0 0 20px var(--ac),0 0 40px var(--ac2);transform:scale(1.06)}}\n.title{flex:1;min-width:0}\n.title h1{margin:0;font-size:20px;font-weight:800;letter-spacing:.10em;line-height:1;\n  background:linear-gradient(95deg, #fff 0%, var(--ac) 45%, var(--ac2) 100%);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 0 30px rgba(176,140,255,.25)}\n.title .sub{margin-top:5px;font-size:9.5px;letter-spacing:.34em;text-transform:uppercase;color:#8ea0c8}\n.tag{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#aeb9d8;\n  border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:4px 11px;white-space:nowrap;\n  background:rgba(255,255,255,.04)}\n\n.grid{margin-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px 12px}\n\n/* ---- bespoke aurora knobs ---- */\n.cell{position:relative;display:flex;flex-direction:column;align-items:center;gap:9px;\n  padding:14px 6px 12px;border-radius:18px;\n  background:linear-gradient(165deg, rgba(255,255,255,.045), rgba(255,255,255,.012));\n  border:1px solid rgba(255,255,255,.07);\n  transition:transform .22s cubic-bezier(.2,.8,.2,1), border-color .22s, box-shadow .22s;\n  animation:rise .6s both;animation-delay:var(--d)}\n@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}\n.cell:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--ac) 50%,transparent);\n  box-shadow:0 16px 40px rgba(0,0,0,.45),0 0 30px color-mix(in srgb,var(--ac) 22%,transparent)}\n\n.dial{position:relative;width:96px;height:96px;cursor:grab;touch-action:none}\n.dial.drag{cursor:grabbing}\n.dial svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}\n\n/* outer tick ring */\n.ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:5}\n.ring-fg{fill:none;stroke:var(--ac);stroke-width:5;stroke-linecap:round;\n  filter:drop-shadow(0 0 4px var(--ac));transition:stroke-dashoffset .12s linear}\n\n/* glass cap */\n.cap{transition:filter .2s}\n.dial:hover .cap{filter:brightness(1.12)}\n\n/* shimmer sweep over the cap when active */\n.sweep{opacity:0;transition:opacity .2s}\n.dial.drag .sweep,.dial:hover .sweep{opacity:1;animation:sweep 1.8s linear infinite}\n@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}\n\n.nm{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9fb0d4;text-align:center}\n.val{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;\n  color:#fff;text-shadow:0 0 12px color-mix(in srgb,var(--ac) 70%,transparent);min-height:17px}\n.unit{font-size:9px;font-weight:600;color:#8ea0c8;margin-left:2px}\n\n.foot{margin-top:16px;font-size:10.5px;line-height:1.6;color:#7e8db0;\n  border-top:1px solid rgba(255,255,255,.07);padding-top:12px;letter-spacing:.01em}\n\n@media (max-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"sky\">\n  <div class=\"stars\"><\/div>\n  <div class=\"aurora\">\n    <svg viewBox=\"0 0 800 600\" preserveAspectRatio=\"none\">\n      <defs>\n        <linearGradient id=\"au1\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#b08cff\" stop-opacity=\"0\"/>\n          <stop offset=\"35%\" stop-color=\"#b08cff\" stop-opacity=\".55\"/>\n          <stop offset=\"100%\" stop-color=\"#7affd6\" stop-opacity=\".05\"/>\n        <\/linearGradient>\n        <linearGradient id=\"au2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#ff8cf0\" stop-opacity=\"0\"/>\n          <stop offset=\"40%\" stop-color=\"#ff8cf0\" stop-opacity=\".5\"/>\n          <stop offset=\"100%\" stop-color=\"#b08cff\" stop-opacity=\".04\"/>\n        <\/linearGradient>\n        <linearGradient id=\"au3\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#8affd6\" stop-opacity=\"0\"/>\n          <stop offset=\"45%\" stop-color=\"#9fa8ff\" stop-opacity=\".42\"/>\n          <stop offset=\"100%\" stop-color=\"#ff8cf0\" stop-opacity=\".04\"/>\n        <\/linearGradient>\n      <\/defs>\n      <g class=\"curtain c1\" style=\"animation:sway1 13s ease-in-out infinite,glow 7s ease-in-out infinite\">\n        <path d=\"M0,0 C120,180 60,360 160,540 L300,540 C220,340 280,170 200,0 Z\" fill=\"url(#au1)\"/>\n      <\/g>\n      <g class=\"curtain c2\" style=\"animation:sway2 17s ease-in-out infinite,glow 9s ease-in-out infinite .8s\">\n        <path d=\"M260,0 C400,160 320,380 440,560 L600,560 C500,360 560,180 460,0 Z\" fill=\"url(#au2)\"/>\n      <\/g>\n      <g class=\"curtain c3\" style=\"animation:sway3 21s ease-in-out infinite,glow 11s ease-in-out infinite 1.6s\">\n        <path d=\"M520,0 C660,200 600,380 700,560 L800,560 C740,360 800,170 720,0 Z\" fill=\"url(#au3)\"/>\n      <\/g>\n    <\/svg>\n  <\/div>\n  <div class=\"haze\"><\/div>\n<\/div>\n\n<div class=\"wrap\">\n  <div class=\"console\">\n    <div class=\"head\">\n      <span class=\"orb\"><\/span>\n      <div class=\"title\">\n        <h1>SHIMMER HALL<\/h1>\n        <div class=\"sub\">Aurora Reverb<\/div>\n      <\/div>\n      <span class=\"tag\">6 voices of light<\/span>\n    <\/div>\n\n    <div class=\"grid\" id=\"grid\"><\/div>\n\n    <div class=\"foot\">Bright, modulated digital hall — an 8-line feedback delay network whose\n      taps drift on slow LFOs, dissolving metallic ring into a chorused, shimmering tail.<\/div>\n  <\/div>\n<\/div>\n\n<!-- ===================================================================\n     PARAM SOURCE OF TRUTH — mirrors spec.json \"params\" verbatim\n     (name/index/min/max/default). This is the SAME shape spec.json uses,\n     so it is byte-checkable against it and cannot silently drift to a\n     different schema. Display hints (unit/format) are a separate, purely\n     cosmetic map keyed by index below. Edit spec.json -> mirror here.\n==================================================================== -->\n<script type=\"application/json\" id=\"vstai-params\">\n[\n  { \"name\": \"Mix\",        \"index\": 0, \"min\": 0,   \"max\": 1,    \"default\": 0.3 },\n  { \"name\": \"Size\",       \"index\": 1, \"min\": 0.3, \"max\": 1,    \"default\": 0.8 },\n  { \"name\": \"Decay\",      \"index\": 2, \"min\": 0,   \"max\": 1,    \"default\": 0.65 },\n  { \"name\": \"Tone\",       \"index\": 3, \"min\": 0,   \"max\": 1,    \"default\": 0.7 },\n  { \"name\": \"Modulation\", \"index\": 4, \"min\": 0,   \"max\": 1,    \"default\": 0.4 },\n  { \"name\": \"Pre-Delay\",  \"index\": 5, \"min\": 0,   \"max\": 0.12, \"default\": 0.015 }\n]\n<\/script>\n\n<script>\n(function(){\n  // ---- params parsed from the embedded JSON (mirrors spec.json) ----------\n  // Reading from a JSON block instead of a hand-written JS array keeps the\n  // canonical metadata in spec.json's exact schema, so a divergence is an\n  // obvious diff rather than a subtle code change. Per-index display hints\n  // (units / formatter) live in DISPLAY and are cosmetic only.\n  var DISPLAY = {\n    0: {unit:\"%\",  fmt:\"pct\"},   // Mix\n    1: {unit:\"\",   fmt:\"num\"},   // Size\n    2: {unit:\"%\",  fmt:\"pct\"},   // Decay\n    3: {unit:\"\",   fmt:\"num\"},   // Tone\n    4: {unit:\"%\",  fmt:\"pct\"},   // Modulation\n    5: {unit:\"ms\", fmt:\"ms\"}     // Pre-Delay\n  };\n  var SPEC = JSON.parse(document.getElementById('vstai-params').textContent);\n  var PARAMS = SPEC.map(function(p){\n    var d = DISPLAY[p.index] || {unit:\"\", fmt:\"num\"};\n    return { name:p.name, index:p.index, min:p.min, max:p.max, def:p[\"default\"],\n             unit:d.unit, fmt:d.fmt };\n  });\n\n  var SWEEP = 270;          // degrees of travel\n  var START = -135;         // degrees from top (12 o'clock = 0)\n  var R = 38;               // arc radius\n  var grid = document.getElementById('grid');\n\n  function fmt(p, v){\n    if(p.fmt===\"pct\") return Math.round(v*100) + \"\";\n    if(p.fmt===\"ms\")  return (v*1000).toFixed(0);\n    return v.toFixed(2);\n  }\n\n  function makeCell(p, i){\n    var cell = document.createElement('div');\n    cell.className = 'cell';\n    cell.style.setProperty('--d', (i*70)+'ms');\n    cell.innerHTML =\n      '<div class=\"dial\" tabindex=\"0\">'+\n        '<svg viewBox=\"0 0 96 96\">'+\n          '<defs>'+\n            '<linearGradient id=\"stroke'+i+'\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">'+\n              '<stop offset=\"0%\" stop-color=\"var(--ac)\"/>'+\n              '<stop offset=\"100%\" stop-color=\"var(--ac2)\"/>'+\n            '<\/linearGradient>'+\n            '<radialGradient id=\"cap'+i+'\" cx=\"42%\" cy=\"34%\" r=\"72%\">'+\n              '<stop offset=\"0%\" stop-color=\"#3a3f63\"/>'+\n              '<stop offset=\"62%\" stop-color=\"#161a33\"/>'+\n              '<stop offset=\"100%\" stop-color=\"#080b1a\"/>'+\n            '<\/radialGradient>'+\n            '<radialGradient id=\"swp'+i+'\" cx=\"50%\" cy=\"14%\" r=\"60%\">'+\n              '<stop offset=\"0%\" stop-color=\"#ffffff\" stop-opacity=\".55\"/>'+\n              '<stop offset=\"55%\" stop-color=\"var(--ac2)\" stop-opacity=\".18\"/>'+\n              '<stop offset=\"100%\" stop-color=\"#ffffff\" stop-opacity=\"0\"/>'+\n            '<\/radialGradient>'+\n          '<\/defs>'+\n          // tick ring background arc\n          '<path class=\"ring-bg\" d=\"'+arcPath(48,48,R,START,START+SWEEP)+'\"/>'+\n          // value arc\n          '<path class=\"ring-fg\" d=\"'+arcPath(48,48,R,START,START+SWEEP)+'\" '+\n              'stroke=\"url(#stroke'+i+')\" pathLength=\"100\" '+\n              'stroke-dasharray=\"100\" stroke-dashoffset=\"100\"/>'+\n          // glass cap\n          '<circle class=\"cap\" cx=\"48\" cy=\"48\" r=\"27\" fill=\"url(#cap'+i+')\" '+\n              'stroke=\"rgba(255,255,255,.10)\" stroke-width=\"1\"/>'+\n          // shimmer sweep group (rotates)\n          '<g class=\"sweep\" style=\"transform-origin:48px 48px\">'+\n            '<circle cx=\"48\" cy=\"48\" r=\"26\" fill=\"url(#swp'+i+')\"/>'+\n          '<\/g>'+\n          // pointer\n          '<line class=\"ptr\" x1=\"48\" y1=\"48\" x2=\"48\" y2=\"27\" '+\n              'stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" '+\n              'style=\"filter:drop-shadow(0 0 5px var(--ac))\"/>'+\n          '<circle cx=\"48\" cy=\"48\" r=\"3\" fill=\"#fff\" style=\"filter:drop-shadow(0 0 4px var(--ac))\"/>'+\n        '<\/svg>'+\n      '<\/div>'+\n      '<div class=\"nm\">'+p.name+'<\/div>'+\n      '<div class=\"val\"><span class=\"v\"><\/span><span class=\"unit\">'+p.unit+'<\/span><\/div>';\n    grid.appendChild(cell);\n\n    var dial = cell.querySelector('.dial');\n    var fg   = cell.querySelector('.ring-fg');\n    var ptr  = cell.querySelector('.ptr');\n    var vEl  = cell.querySelector('.v');\n\n    var val = p.def;\n    function norm(){ var n=(val-p.min)/(p.max-p.min); return n<0?0:(n>1?1:n); }\n    function send(){ if(window.vstai && window.vstai.setParam) window.vstai.setParam(p.index, val); }\n    function paint(){\n      var n = norm();\n      // pathLength=100 normalises THIS arc's length to 100, so offset is just (1-n)*100\n      fg.setAttribute('stroke-dashoffset', (100*(1-n)).toFixed(2));\n      ptr.setAttribute('transform','rotate('+(START+SWEEP*n)+' 48 48)');\n      vEl.textContent = fmt(p, val);\n    }\n    function setNorm(n){ n=n<0?0:(n>1?1:n); val=p.min+(p.max-p.min)*n; paint(); send(); }\n\n    // --- pointer drag (vertical) ---\n    var dragY=0, dragN=0, dragging=false;\n    dial.addEventListener('pointerdown', function(e){\n      dragging=true; dragY=e.clientY; dragN=norm(); dial.classList.add('drag');\n      dial.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    dial.addEventListener('pointermove', function(e){\n      if(!dragging) return;\n      var dy = dragY - e.clientY;\n      var speed = e.shiftKey ? 600 : 200;   // hold shift for fine control\n      setNorm(dragN + dy/speed);\n    });\n    function end(){ dragging=false; dial.classList.remove('drag'); }\n    dial.addEventListener('pointerup', end);\n    dial.addEventListener('pointercancel', end);\n    dial.addEventListener('lostpointercapture', end);\n    dial.addEventListener('dblclick', function(){ val=p.def; paint(); send(); });\n    dial.addEventListener('wheel', function(e){\n      e.preventDefault();\n      setNorm(norm() + (e.deltaY<0?1:-1)*0.025);\n    }, {passive:false});\n    dial.addEventListener('keydown', function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){ setNorm(norm()+0.02); e.preventDefault(); }\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){ setNorm(norm()-0.02); e.preventDefault(); }\n    });\n\n    // init at default\n    paint(); send();\n  }\n\n  // SVG arc path helper (start/end in degrees, 0 = top, clockwise)\n  function arcPath(cx, cy, r, a0, a1){\n    var p0 = pt(cx,cy,r,a0), p1 = pt(cx,cy,r,a1);\n    var large = (a1-a0) > 180 ? 1 : 0;\n    return \"M\"+p0.x+\",\"+p0.y+\" A\"+r+\",\"+r+\" 0 \"+large+\" 1 \"+p1.x+\",\"+p1.y;\n  }\n  function pt(cx, cy, r, deg){\n    var rad = (deg-90)*Math.PI/180;\n    return { x:(cx+r*Math.cos(rad)).toFixed(2), y:(cy+r*Math.sin(rad)).toFixed(2) };\n  }\n\n  function ready(){\n    PARAMS.forEach(makeCell);\n  }\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(ready);\n  else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";

    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
