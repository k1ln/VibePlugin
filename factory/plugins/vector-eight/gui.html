<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Vector Eight</title>
<style>
  :root{ --acc:#6ce0a0; --acc2:#ffd24a; --bg0:#060f0b; --bg1:#0c1a14; --ink:#e7f6ee; --dim:#6d9484; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#102a20 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#0e2018,#060f0b); border:1px solid rgba(108,224,160,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(225,246,238,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.0s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
  .screen{ height:128px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#0a1812,#06100b); border:1px solid rgba(108,224,160,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(214,238,228,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(108,224,160,.6)); }
  .pcap{ fill:#0a1812; stroke:rgba(108,224,160,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(108,224,160,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(108,224,160,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">VECTOR&nbsp;EIGHT</span><span class="sub">vector-scan poly</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">VECTOR&nbsp;PAD</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Cutoff",idx:0,def:0.6},{name:"Reso",idx:1,def:0.25},{name:"Vec X",idx:2,def:0.4},{name:"Vec Y",idx:3,def:0.6},{name:"Scan",idx:4,def:0.4},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6ce0a0"/><stop offset="1" stop-color="#ffd24a"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  var trail=[];
  var CORN=[["A·SIN","#6ce0a0",0,0],["B·SAW","#ffd24a",1,0],["C·SQR","#ff7ad0",1,1],["D·DIG","#56c0e0",0,1]]; // x,y corner (0=left/top,1=right/bottom)
  function frame(ts){ ctx.clearRect(0,0,W,H);
    var pad=22; var sz=H-pad*2; var ox=pad+8, oy=(H-sz)/2;
    // pad frame + crosshair grid
    ctx.strokeStyle="rgba(108,224,160,0.14)"; ctx.lineWidth=1; ctx.strokeRect(ox,oy,sz,sz);
    ctx.beginPath(); ctx.moveTo(ox+sz/2,oy); ctx.lineTo(ox+sz/2,oy+sz); ctx.moveTo(ox,oy+sz/2); ctx.lineTo(ox+sz,oy+sz/2); ctx.stroke();
    // corner labels with glow proportional to current weight
    var vx=vals[2], vy=vals[3], scan=vals[4], reso=vals[1];
    var ang=ts/1000*(0.4+scan*5.0)*0.5;
    var px=(vx*2-1)+scan*0.9*Math.sin(ang); var py=(vy*2-1)+scan*0.9*Math.cos(ang*0.73);
    px=Math.max(-1,Math.min(1,px)); py=Math.max(-1,Math.min(1,py));
    var fx=(px+1)/2, fy=(py+1)/2;
    var wts=[(1-fx)*(1-fy),(fx)*(1-fy),(fx)*(fy),(1-fx)*(fy)];
    for(var k=0;k<4;k++){ var c=CORN[k]; var cx=ox+c[2]*sz, cy=oy+c[3]*sz;
      var g=ctx.createRadialGradient(cx,cy,0,cx,cy,sz*0.5); g.addColorStop(0,c[1]+""); g.addColorStop(1,"rgba(0,0,0,0)");
      ctx.globalAlpha=0.10+wts[k]*0.5; ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,sz*0.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
      ctx.fillStyle=c[1]; ctx.font="8px Inter,sans-serif"; ctx.textAlign=c[2]?"right":"left"; ctx.textBaseline=c[3]?"bottom":"top";
      ctx.fillText(c[0], cx+(c[2]?-4:4), cy+(c[3]?-3:3)); }
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    // orbit trail
    var dx=ox+fx*sz, dy=oy+fy*sz; trail.push([dx,dy]); if(trail.length>40) trail.shift();
    ctx.beginPath(); for(var i=0;i<trail.length;i++){ if(i===0)ctx.moveTo(trail[i][0],trail[i][1]); else ctx.lineTo(trail[i][0],trail[i][1]); }
    ctx.strokeStyle="rgba(255,210,74,0.45)"; ctx.lineWidth=1.4; ctx.stroke();
    // position dot
    ctx.fillStyle="#fff"; ctx.shadowColor="#6ce0a0"; ctx.shadowBlur=12; ctx.beginPath(); ctx.arc(dx,dy,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    // right side: live blended-output scope
    var sx=ox+sz+22, sw=W-12-sx, smid=H*0.5;
    if(sw>40){ ctx.fillStyle="rgba(108,224,160,0.45)"; ctx.font="8px Inter,sans-serif"; ctx.fillText("OUTPUT", sx, oy+8);
      ctx.beginPath();
      for(var x=0;x<=sw;x+=2){ var t=x/sw*6+ts/300; var ph=(t)%1; var a2=ph*6.2831853;
        var oA=Math.sin(a2), oB=2*ph-1, oC=ph<0.5?1:-1, oD=(Math.sin(a2)+0.5*Math.sin(a2*3)+0.3*Math.sin(a2*5))*0.6;
        var v=(oA*wts[0]+oB*wts[1]+oC*wts[2]+oD*wts[3]); // weights order A,B(top), C(bot-r), D(bot-l) -> reuse wts indices
        ctx.lineTo(sx+x, smid - v*(H*0.32)); }
      ctx.strokeStyle="rgba(255,210,74,0.9)"; ctx.lineWidth=1.8; ctx.shadowColor="#ffd24a"; ctx.shadowBlur=6; ctx.stroke(); ctx.shadowBlur=0;
    }
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
