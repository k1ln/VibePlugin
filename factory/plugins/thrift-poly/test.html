<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thrift Poly — test bench</title><style>
  :root{--ac:#5ad0a0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Thrift Poly<\/title>\n<style>\n  :root{\n    --mint:#5ad0a0;\n    --amber:#ffd24a;\n    --panel:#23262a;\n    --panel2:#1a1c1f;\n    --char:#2c3035;\n    --ink:#0c0d0e;\n    --lcd:#0a1410;\n    --lcdtxt:#7dffc4;\n    --label:#9aa3a0;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{height:100%;}\n  body{\n    font-family:\"Helvetica Neue\",Arial,sans-serif;\n    background:radial-gradient(120% 120% at 30% -10%, #34383d 0%, #1c1e21 55%, #131416 100%);\n    color:var(--label);\n    display:flex;align-items:center;justify-content:center;\n    padding:14px;\n    -webkit-user-select:none;user-select:none;\n    overflow:hidden;\n  }\n  .unit{\n    width:680px;max-width:100%;\n    background:\n      linear-gradient(180deg,#2b2f34 0%, #24272b 8%, #202326 100%);\n    border-radius:14px;\n    padding:18px 20px 22px;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.06) inset,\n      0 -2px 0 rgba(0,0,0,.5) inset,\n      0 18px 40px rgba(0,0,0,.55),\n      0 2px 6px rgba(0,0,0,.6);\n    border:1px solid #0e0f10;\n    position:relative;\n  }\n  /* faux ventilation / brand groove */\n  .unit::before{\n    content:\"\";position:absolute;left:20px;right:20px;top:0;height:6px;\n    background:repeating-linear-gradient(90deg,transparent 0 7px,rgba(0,0,0,.25) 7px 8px);\n    border-radius:14px 14px 0 0;opacity:.4;\n  }\n  .top{\n    display:flex;align-items:flex-end;justify-content:space-between;\n    margin-bottom:14px;gap:14px;\n  }\n  .brand{display:flex;flex-direction:column;gap:2px;}\n  .brand .name{\n    font-weight:800;letter-spacing:.14em;font-size:19px;\n    color:#e9efe9;text-transform:uppercase;\n    text-shadow:0 1px 0 #000;\n  }\n  .brand .name b{color:var(--mint);}\n  .brand .sub{\n    font-size:9px;letter-spacing:.35em;color:#6f7873;text-transform:uppercase;\n  }\n  /* numeric LCD */\n  .lcd{\n    background:linear-gradient(180deg,#0d1a14,#06100b);\n    border:1px solid #000;border-radius:6px;\n    padding:7px 12px;min-width:188px;\n    box-shadow:inset 0 2px 6px rgba(0,0,0,.8),0 0 0 2px #15181a;\n    position:relative;overflow:hidden;\n  }\n  .lcd::after{ /* scanline glass */\n    content:\"\";position:absolute;inset:0;\n    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);\n    pointer-events:none;\n  }\n  .lcd .pname{\n    font:700 9px/1 \"Courier New\",monospace;letter-spacing:.22em;\n    color:#3f7a5e;text-transform:uppercase;\n  }\n  .lcd .pval{\n    font:700 26px/1 \"Courier New\",monospace;letter-spacing:.04em;\n    color:var(--lcdtxt);\n    text-shadow:0 0 6px rgba(125,255,196,.55);\n    display:flex;align-items:baseline;gap:4px;margin-top:3px;\n  }\n  .lcd .pval small{font-size:11px;color:#4d9a76;}\n  .lcd .blink{\n    position:absolute;right:9px;top:9px;width:7px;height:7px;border-radius:50%;\n    background:var(--amber);box-shadow:0 0 8px var(--amber);\n    animation:beat 1.6s steps(1,end) infinite;\n  }\n  @keyframes beat{0%,55%{opacity:1}56%,100%{opacity:.15}}\n\n  /* main 2-column body */\n  .body{display:grid;grid-template-columns:218px 1fr;gap:18px;}\n\n  /* left: scope + chorus lamp */\n  .scopeWrap{\n    background:linear-gradient(180deg,#11241b,#081310);\n    border-radius:9px;border:1px solid #000;\n    box-shadow:inset 0 2px 8px rgba(0,0,0,.85),0 0 0 2px #15181a;\n    padding:10px;display:flex;flex-direction:column;gap:9px;\n  }\n  .scope{\n    width:100%;height:104px;border-radius:5px;display:block;\n    background:\n      repeating-linear-gradient(0deg,rgba(90,208,160,.06) 0 11px,transparent 11px 12px),\n      repeating-linear-gradient(90deg,rgba(90,208,160,.06) 0 11px,transparent 11px 12px),\n      #06100b;\n  }\n  .lampRow{display:flex;align-items:center;gap:9px;padding:0 2px 2px;}\n  .lamp{\n    width:14px;height:14px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%, #fff6cf 0%, var(--amber) 45%, #6a4f00 100%);\n    box-shadow:0 0 0 2px #0a0a0a, 0 0 12px var(--amber);\n    transition:opacity .2s, box-shadow .2s;\n  }\n  .lamp.on{animation:chorusPulse 1.7s ease-in-out infinite;}\n  @keyframes chorusPulse{\n    0%,100%{box-shadow:0 0 0 2px #0a0a0a,0 0 6px rgba(255,210,74,.5);opacity:.7}\n    50%{box-shadow:0 0 0 2px #0a0a0a,0 0 18px rgba(255,210,74,1);opacity:1}\n  }\n  .lampRow .lt{font:700 9px/1 \"Courier New\",monospace;letter-spacing:.2em;color:#8a8f8c;text-transform:uppercase;}\n\n  /* right: controls grid */\n  .controls{\n    display:grid;\n    grid-template-columns:repeat(3,1fr);\n    gap:14px 8px;\n    background:linear-gradient(180deg,#2a2e33,#212429);\n    border-radius:9px;padding:16px 12px 10px;\n    box-shadow:inset 0 1px 0 rgba(255,255,255,.05),inset 0 -2px 4px rgba(0,0,0,.4);\n    border:1px solid #141618;\n  }\n  .cell{display:flex;flex-direction:column;align-items:center;gap:7px;}\n\n  /* the BIG shared filter dial spans full width on top */\n  .cell.big{grid-column:1 / -1;flex-direction:row;justify-content:center;gap:18px;align-items:center;}\n  .bigtxt{display:flex;flex-direction:column;gap:3px;max-width:150px;}\n  .bigtxt .t{font:800 12px/1 sans-serif;letter-spacing:.12em;color:var(--mint);text-transform:uppercase;}\n  .bigtxt .d{font:400 10px/1.35 sans-serif;color:#7f8784;}\n\n  .knob{\n    --val:0.5;\n    width:58px;height:58px;border-radius:50%;cursor:grab;position:relative;\n    background:\n      radial-gradient(circle at 38% 30%, #4a4f55 0%, #2e3237 55%, #191b1d 100%);\n    box-shadow:\n      0 2px 4px rgba(0,0,0,.6),\n      0 -1px 1px rgba(255,255,255,.06) inset,\n      0 4px 8px rgba(0,0,0,.5);\n    border:1px solid #0c0d0e;\n    touch-action:none;\n  }\n  .knob.dragging{cursor:grabbing;}\n  .knob::after{ /* pointer */\n    content:\"\";position:absolute;left:50%;top:7px;width:3px;height:18px;\n    margin-left:-1.5px;border-radius:2px;\n    background:var(--mint);\n    box-shadow:0 0 6px var(--mint);\n    transform-origin:50% 22px;\n    transform:rotate(calc((var(--val) * 270deg) - 135deg));\n    transition:transform .04s linear;\n  }\n  /* glowing ring driven by --val */\n  .knob .ring{\n    position:absolute;inset:-7px;border-radius:50%;pointer-events:none;\n    background:conic-gradient(from 225deg,\n      var(--mint) 0deg,\n      var(--mint) calc(var(--val) * 270deg),\n      rgba(255,255,255,.05) calc(var(--val) * 270deg),\n      rgba(255,255,255,.05) 270deg,\n      transparent 270deg);\n    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 4px));\n    mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 4px));\n    filter:drop-shadow(0 0 4px rgba(90,208,160,.6));\n    opacity:.9;\n  }\n  .knob.big2{width:96px;height:96px;}\n  .knob.big2::after{top:9px;height:30px;transform-origin:50% 39px;}\n  .knob.big2.glow .ring{\n    filter:drop-shadow(0 0 9px rgba(90,208,160,.95));\n    animation:filterGlow 2.4s ease-in-out infinite;\n  }\n  @keyframes filterGlow{0%,100%{opacity:.85}50%{opacity:1}}\n\n  .lab{font:700 9px/1 \"Courier New\",monospace;letter-spacing:.16em;color:var(--label);text-transform:uppercase;}\n\n  /* membrane buttons row (decorative voice indicators) */\n  .voices{\n    grid-column:1 / -1;\n    display:flex;gap:6px;justify-content:center;margin-top:4px;\n  }\n  .mbtn{\n    flex:1;max-width:54px;height:26px;border-radius:4px;\n    background:linear-gradient(180deg,#33373c,#202326);\n    border:1px solid #0c0d0e;\n    box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 2px 3px rgba(0,0,0,.5);\n    display:flex;align-items:center;justify-content:center;\n    font:700 9px/1 \"Courier New\",monospace;color:#5c6460;letter-spacing:.05em;\n    position:relative;overflow:hidden;\n  }\n  .mbtn .dot{\n    width:6px;height:6px;border-radius:50%;background:#2a3a33;margin-right:5px;\n    transition:background .08s, box-shadow .08s;\n  }\n  .mbtn.lit .dot{background:var(--mint);box-shadow:0 0 8px var(--mint);}\n  .mbtn.lit{color:#cdd4cf;}\n\n  .foot{\n    margin-top:13px;display:flex;justify-content:space-between;align-items:center;\n    font:600 8.5px/1 \"Courier New\",monospace;letter-spacing:.18em;color:#5a615d;\n    text-transform:uppercase;\n  }\n  .foot .para{color:var(--mint);}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <div class=\"top\">\n      <div class=\"brand\">\n        <div class=\"name\">THRIFT<b>·<\/b>POLY<\/div>\n        <div class=\"sub\">8-Voice Paraphonic DCO<\/div>\n      <\/div>\n      <div class=\"lcd\">\n        <div class=\"blink\"><\/div>\n        <div class=\"pname\" id=\"lcdName\">CUTOFF<\/div>\n        <div class=\"pval\"><span id=\"lcdVal\">045<\/span><small id=\"lcdUnit\">%<\/small><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"body\">\n      <div class=\"scopeWrap\">\n        <canvas class=\"scope\" id=\"scope\" width=\"380\" height=\"208\"><\/canvas>\n        <div class=\"lampRow\">\n          <div class=\"lamp\" id=\"chorusLamp\"><\/div>\n          <div class=\"lt\">Chorus<\/div>\n        <\/div>\n      <\/div>\n\n      <div class=\"controls\" id=\"controls\">\n        <div class=\"cell big\">\n          <div class=\"knob big2 glow\" data-idx=\"0\" data-min=\"0\" data-max=\"1\" data-def=\"0.45\" id=\"kCut\">\n            <div class=\"ring\"><\/div>\n          <\/div>\n          <div class=\"bigtxt\">\n            <div class=\"t\">Shared Filter<\/div>\n            <div class=\"d\">One resonant low-pass for all voices — sweep it and whole chords gurgle together.<\/div>\n          <\/div>\n        <\/div>\n\n        <div class=\"cell\"><div class=\"knob\" data-idx=\"1\" data-min=\"0\" data-max=\"1\" data-def=\"0.4\"><div class=\"ring\"><\/div><\/div><div class=\"lab\">Reso<\/div><\/div>\n        <div class=\"cell\"><div class=\"knob\" data-idx=\"2\" data-min=\"0\" data-max=\"1\" data-def=\"0.6\"><div class=\"ring\"><\/div><\/div><div class=\"lab\">Env Amt<\/div><\/div>\n        <div class=\"cell\"><div class=\"knob\" data-idx=\"3\" data-min=\"0\" data-max=\"1\" data-def=\"0.5\"><div class=\"ring\"><\/div><\/div><div class=\"lab\">Sub<\/div><\/div>\n        <div class=\"cell\"><div class=\"knob\" data-idx=\"4\" data-min=\"0\" data-max=\"1\" data-def=\"0.5\" id=\"kChor\"><div class=\"ring\"><\/div><\/div><div class=\"lab\">Chorus<\/div><\/div>\n        <div class=\"cell\"><div class=\"knob\" data-idx=\"5\" data-min=\"0\" data-max=\"1\" data-def=\"0.35\"><div class=\"ring\"><\/div><\/div><div class=\"lab\">Release<\/div><\/div>\n        <div class=\"cell\"><div class=\"knob\" data-idx=\"6\" data-min=\"0\" data-max=\"1\" data-def=\"0.7\"><div class=\"ring\"><\/div><\/div><div class=\"lab\">Level<\/div><\/div>\n\n        <div class=\"voices\" id=\"voices\"><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"foot\">\n      <span class=\"para\">◆ Paraphonic Architecture<\/span>\n      <span>Budget Classic · DCO + Sub + Chorus<\/span>\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n  var LABELS = [\"CUTOFF\",\"RESONANCE\",\"ENV AMOUNT\",\"SUB\",\"CHORUS\",\"RELEASE\",\"LEVEL\"];\n  var host = null;\n\n  function setParam(i,v){\n    try{ if(window.vstai && window.vstai.setParam) window.vstai.setParam(i, v); }catch(e){}\n  }\n\n  // ---- voice indicator buttons (decorative, animated on activity) ----\n  var voicesEl = document.getElementById(\"voices\");\n  for (var i=0;i<8;i++){\n    var b=document.createElement(\"div\");\n    b.className=\"mbtn\";\n    b.innerHTML='<span class=\"dot\"><\/span>V'+(i+1);\n    voicesEl.appendChild(b);\n  }\n  var voiceBtns = voicesEl.querySelectorAll(\".mbtn\");\n\n  // ---- knob wiring ----\n  var lcdName=document.getElementById(\"lcdName\");\n  var lcdVal=document.getElementById(\"lcdVal\");\n  var chorusLamp=document.getElementById(\"chorusLamp\");\n\n  var knobs=[].slice.call(document.querySelectorAll(\".knob\"));\n  var state={}; // idx -> norm value 0..1\n\n  function fmt(n){ var s=Math.round(n*100); return (s<10?\"00\":s<100?\"0\":\"\")+s; }\n\n  function showLcd(idx){\n    lcdName.textContent = LABELS[idx];\n    lcdVal.textContent = fmt(state[idx]);\n  }\n\n  function applyKnob(k, norm, show){\n    var idx=+k.getAttribute(\"data-idx\");\n    var mn=+k.getAttribute(\"data-min\"), mx=+k.getAttribute(\"data-max\");\n    norm = norm<0?0:norm>1?1:norm;\n    state[idx]=norm;\n    k.style.setProperty(\"--val\", norm.toFixed(4));\n    var real = mn + norm*(mx-mn);\n    setParam(idx, real);\n    if(show!==false) showLcd(idx);\n    if(idx===4){ // chorus lamp\n      if(norm>0.02){ chorusLamp.classList.add(\"on\"); chorusLamp.style.opacity=\"1\"; }\n      else { chorusLamp.classList.remove(\"on\"); chorusLamp.style.opacity=\".22\"; }\n    }\n  }\n\n  knobs.forEach(function(k){\n    var idx=+k.getAttribute(\"data-idx\");\n    var def=+k.getAttribute(\"data-def\");\n    applyKnob(k, def, false);\n\n    var dragging=false, lastY=0;\n    function down(e){\n      dragging=true; k.classList.add(\"dragging\");\n      lastY=(e.touches?e.touches[0].clientY:e.clientY);\n      showLcd(idx);\n      e.preventDefault();\n    }\n    function move(e){\n      if(!dragging) return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      var dy=lastY-y; lastY=y;\n      var step = e.shiftKey?0.0008:0.004;\n      applyKnob(k, state[idx]+dy*step, true);\n      e.preventDefault();\n    }\n    function up(){ dragging=false; k.classList.remove(\"dragging\"); }\n\n    k.addEventListener(\"mousedown\",down);\n    window.addEventListener(\"mousemove\",move);\n    window.addEventListener(\"mouseup\",up);\n    k.addEventListener(\"touchstart\",down,{passive:false});\n    window.addEventListener(\"touchmove\",move,{passive:false});\n    window.addEventListener(\"touchend\",up);\n    k.addEventListener(\"dblclick\",function(e){ applyKnob(k,def,true); e.preventDefault(); });\n    k.addEventListener(\"wheel\",function(e){\n      applyKnob(k, state[idx] - (e.deltaY>0?0.03:-0.03), true);\n      e.preventDefault();\n    },{passive:false});\n  });\n\n  // ---- animated scope: stacked gurgly square/saw waves driven by params ----\n  var cv=document.getElementById(\"scope\");\n  var ctx=cv.getContext(\"2d\");\n  var W=cv.width, H=cv.height;\n  var t=0;\n\n  function draw(){\n    t+=0.018;\n    ctx.clearRect(0,0,W,H);\n    var cut=state[0], reso=state[1], sub=state[3], chor=state[4], lvl=state[6];\n\n    // gurgle: shared cutoff modulates how 'open' the waves look + a slow LFO wobble\n    var open = 0.18 + cut*0.82;\n    var wob = Math.sin(t*0.9)*chor*0.5;       // chorus wobble\n    var nLayers = 3;                           // stacked voices\n    for (var L=0; L<nLayers; L++){\n      var yMid = H*(0.28 + L*0.24);\n      var amp = (H*0.16) * open * (0.7+0.3*lvl);\n      var freq = 0.045 * (1 + L*0.45);\n      var alpha = 0.85 - L*0.18;\n      ctx.beginPath();\n      for (var x=0;x<=W;x+=2){\n        // square-ish core with saw lean + sub octave + chorus wobble\n        var ph = x*freq + t*1.3 + L*1.1 + wob;\n        var sq = Math.sin(ph) >= 0 ? 1 : -1;\n        var saw = ((ph/Math.PI)%2)-1;\n        var subw = (Math.sin(ph*0.5) >= 0 ? 1 : -1) * sub*0.5;\n        // resonance => ringing overshoot near edges\n        var ring = Math.sin(ph*6)*reso*0.22*Math.max(0,1-Math.abs(saw));\n        var v = (sq*0.6 + saw*0.4 + subw + ring);\n        var y = yMid - v*amp;\n        if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);\n      }\n      ctx.strokeStyle = \"rgba(90,208,160,\"+alpha.toFixed(3)+\")\";\n      ctx.lineWidth = 2;\n      ctx.shadowColor=\"rgba(90,208,160,.7)\";\n      ctx.shadowBlur=6;\n      ctx.stroke();\n    }\n    ctx.shadowBlur=0;\n\n    // amber cutoff marker line\n    var cy = H - cut*H*0.92 - 4;\n    ctx.strokeStyle=\"rgba(255,210,74,.5)\";\n    ctx.lineWidth=1;\n    ctx.setLineDash([4,4]);\n    ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();\n    ctx.setLineDash([]);\n\n    // animate voice lamps with a gentle running pattern\n    var lit = Math.floor((Math.sin(t*0.7)*0.5+0.5)*5)+3;\n    for (var vi=0; vi<8; vi++){\n      if(vi<lit) voiceBtns[vi].classList.add(\"lit\");\n      else voiceBtns[vi].classList.remove(\"lit\");\n    }\n\n    requestAnimationFrame(draw);\n  }\n  draw();\n\n  // init chorus lamp state\n  applyKnob(document.getElementById(\"kChor\"), state[4], false);\n  showLcd(0);\n\n  // ---- host contract ----\n  function boot(){\n    // re-push all current values so DSP matches GUI defaults\n    knobs.forEach(function(k){\n      var idx=+k.getAttribute(\"data-idx\");\n      applyKnob(k, state[idx], false);\n    });\n  }\n  if (window.vstai && typeof window.vstai.onReady === \"function\"){\n    window.vstai.onReady(boot);\n  } else {\n    boot();\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};
  var oct=0;                                              // octave offset (−4..+4), applied at note-on
  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function setOct(o){ oct=o<-4?-4:(o>4?4:o); var ov=document.getElementById('octval'); if(ov)ov.textContent=(4+oct); }
  function down(m,el){ ensure().then(function(){ if(ctx.state==='suspended')ctx.resume(); if(ex&&ex.noteOn) ex.noteOn(m,hz(m),0.9); }); if(el)el.classList.add('dn'); }
  function up(m,el){ if(ex&&ex.noteOff) ex.noteOff(m); if(el)el.classList.remove('dn'); }
  KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];
    el.addEventListener('pointerdown',function(e){e.preventDefault();el._n=k[1]+oct*12;down(el._n,el);});
    el.addEventListener('pointerup',function(){up(el._n,el);}); el.addEventListener('pointerleave',function(){if(el.classList.contains('dn'))up(el._n,el);});
    KB.appendChild(el); });
  document.getElementById('octdn').addEventListener('click',function(){setOct(oct-1);});
  document.getElementById('octup').addEventListener('click',function(){setOct(oct+1);});
  var held={};                                            // base note -> actual note played (so releases survive an octave change)
  window.addEventListener('keydown',function(e){ if(e.repeat)return;
    if(e.key==='z'||e.key==='Z'){setOct(oct-1);return;} if(e.key==='x'||e.key==='X'){setOct(oct+1);return;}
    var b=KMAP[e.key]; if(b&&!held[b]){var m=b+oct*12;held[b]=m;down(m,null);} });
  window.addEventListener('keyup',function(e){ var b=KMAP[e.key]; if(b&&held[b]!=null){up(held[b],null);held[b]=null;} });
  setOct(0);
  
  </script></body></html>
