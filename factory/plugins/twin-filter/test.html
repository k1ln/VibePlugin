  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Twin Filter<\/title>\n<style>\n  :root{\n    --teal:#4ad0c8;\n    --orange:#ff8a5a;\n    --teal-dim:#1f5a56;\n    --orange-dim:#7a3f29;\n    --panel0:#0c1012;\n    --panel1:#161c1f;\n    --panel2:#212a2e;\n    --ink:#070a0b;\n    --txt:#cfe2e0;\n  }\n  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}\n  html,body{height:100%}\n  body{\n    background:radial-gradient(130% 100% at 50% -15%,#1a2226 0%,#0c1113 50%,#05080a 100%);\n    color:var(--txt);\n    font-family:\"Helvetica Neue\",Arial,sans-serif;\n    overflow:hidden;\n    display:flex;align-items:center;justify-content:center;\n    letter-spacing:.02em;\n  }\n\n  /* ===== slim charcoal chassis ===== */\n  .unit{\n    position:relative;\n    width:720px;height:404px;\n    border-radius:14px;\n    padding:16px 20px 18px;\n    background:\n      linear-gradient(180deg,#2b3438 0%,#222b2f 7%,#1a2125 12%,#141a1d 55%,#10161a 92%,#0a0f12 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.12) inset,\n      0 -2px 8px rgba(0,0,0,.6) inset,\n      0 26px 60px rgba(0,0,0,.7),\n      0 2px 0 #05090b;\n    overflow:hidden;\n  }\n  /* fine vertical brushed grain */\n  .unit::before{\n    content:\"\";position:absolute;inset:0;border-radius:14px;pointer-events:none;\n    background:repeating-linear-gradient(90deg,rgba(255,255,255,.022) 0 1px,rgba(0,0,0,.05) 1px 3px);\n    mix-blend-mode:overlay;opacity:.6;\n  }\n  /* slow drifting sheen */\n  .unit::after{\n    content:\"\";position:absolute;top:0;left:-40%;width:30%;height:100%;\n    background:linear-gradient(105deg,transparent,rgba(255,255,255,.06),transparent);\n    transform:skewX(-16deg);pointer-events:none;\n    animation:sheen 11s ease-in-out infinite;\n  }\n  @keyframes sheen{0%,78%{left:-45%}94%{left:135%}100%{left:135%}}\n\n  .screw{position:absolute;width:11px;height:11px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#5a656a,#2b3236 55%,#13191c 100%);\n    box-shadow:0 1px 1px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4) inset;}\n  .screw::after{content:\"\";position:absolute;inset:2.5px;border-radius:1px;\n    background:linear-gradient(90deg,transparent 44%,#0a0f11 44% 56%,transparent 56%);transform:rotate(-22deg)}\n  .screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}\n  .screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}\n\n  /* ===== header ===== */\n  .head{display:flex;align-items:flex-end;justify-content:space-between;margin:1px 4px 11px}\n  .brand{display:flex;flex-direction:column;line-height:1}\n  .brand .sub{font-size:8.5px;letter-spacing:.46em;color:#6f8582;font-weight:700;margin-bottom:6px;text-transform:uppercase}\n  .brand .name{font-size:25px;font-weight:800;letter-spacing:.01em;color:#e8f3f1;\n    text-shadow:0 1px 0 rgba(0,0,0,.6)}\n  .brand .name b{color:var(--teal);text-shadow:0 0 10px rgba(74,208,200,.6)}\n  .brand .name i{font-style:normal;color:var(--orange);text-shadow:0 0 10px rgba(255,138,90,.55)}\n  .tag{display:flex;flex-direction:column;align-items:flex-end;gap:3px}\n  .tag .mono{font-size:8px;letter-spacing:.34em;color:#5a6e6b;font-weight:700}\n  .tag .voice{display:flex;gap:5px;align-items:center}\n  .vled{width:7px;height:7px;border-radius:50%;background:#16201f;\n    box-shadow:0 0 0 1px rgba(0,0,0,.5) inset}\n  .vled.on{background:var(--teal);box-shadow:0 0 7px var(--teal),0 0 0 1px rgba(0,0,0,.4) inset}\n\n  /* ===== response scope ===== */\n  .scope{\n    position:relative;width:100%;height:150px;border-radius:10px;\n    background:linear-gradient(180deg,#05100f 0%,#040b0c 60%,#030708 100%);\n    border:1.5px solid #1b2528;\n    box-shadow:0 3px 7px rgba(0,0,0,.7) inset,0 1px 0 rgba(255,255,255,.08);\n    overflow:hidden;margin-bottom:14px;\n  }\n  .scope svg{position:absolute;inset:0;width:100%;height:100%;display:block}\n  .grid{position:absolute;inset:0;pointer-events:none;\n    background:\n      repeating-linear-gradient(0deg,rgba(74,208,200,.05) 0 1px,transparent 1px 19px),\n      repeating-linear-gradient(90deg,rgba(74,208,200,.05) 0 1px,transparent 1px 30px);}\n  .glass{position:absolute;inset:0;pointer-events:none;\n    background:radial-gradient(130% 80% at 50% -10%,rgba(120,220,210,.10),transparent 60%)}\n  .scan{position:absolute;left:0;right:0;height:34px;pointer-events:none;\n    background:linear-gradient(180deg,transparent,rgba(74,208,200,.06),transparent);\n    animation:scan 5.5s linear infinite}\n  @keyframes scan{0%{top:-34px}100%{top:150px}}\n  .lbl{position:absolute;font-size:8px;font-weight:700;letter-spacing:.16em;pointer-events:none}\n  .lbl.hp{left:9px;top:8px;color:var(--orange);text-shadow:0 0 6px rgba(255,138,90,.7)}\n  .lbl.lp{right:9px;top:8px;color:var(--teal);text-shadow:0 0 6px rgba(74,208,200,.7)}\n  .lbl.band{bottom:7px;left:50%;transform:translateX(-50%);color:#9fdfd9;opacity:.7;letter-spacing:.3em}\n\n  /* ===== controls row ===== */\n  .controls{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;align-items:start}\n  .cell{display:flex;flex-direction:column;align-items:center;gap:7px}\n  .knob{\n    position:relative;width:62px;height:62px;border-radius:50%;cursor:ns-resize;\n    background:\n      radial-gradient(circle at 50% 38%,#2a3438 0%,#1b2327 55%,#11171a 100%);\n    box-shadow:\n      0 2px 5px rgba(0,0,0,.6),\n      0 1px 0 rgba(255,255,255,.08) inset,\n      0 -3px 6px rgba(0,0,0,.5) inset;\n    touch-action:none;\n  }\n  .knob::before{ /* outer ring tick gauge */\n    content:\"\";position:absolute;inset:-5px;border-radius:50%;\n    background:conic-gradient(from 220deg,\n      rgba(255,255,255,.04) 0deg,\n      rgba(255,255,255,.04) 280deg,\n      transparent 280deg);\n    -webkit-mask:radial-gradient(circle,transparent 30px,#000 31px,#000 33px,transparent 34px);\n            mask:radial-gradient(circle,transparent 30px,#000 31px,#000 33px,transparent 34px);\n  }\n  .knob .arc{position:absolute;inset:-5px;border-radius:50%;pointer-events:none}\n  .knob .cap{position:absolute;inset:9px;border-radius:50%;\n    background:radial-gradient(circle at 50% 34%,#323d41,#1d2529 60%,#141a1d 100%);\n    box-shadow:0 1px 2px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.07) inset}\n  .knob .ptr{position:absolute;left:50%;top:9px;width:2.4px;height:21px;border-radius:2px;\n    background:linear-gradient(180deg,var(--teal),#bff3ef);\n    transform-origin:50% 22px;transform:translateX(-50%) rotate(0deg);\n    box-shadow:0 0 7px var(--teal)}\n  .knob.orange .ptr{background:linear-gradient(180deg,var(--orange),#ffd2bf);box-shadow:0 0 7px var(--orange)}\n  .knob .dot{position:absolute;left:50%;top:50%;width:5px;height:5px;border-radius:50%;\n    transform:translate(-50%,-50%);background:#0a0f11;box-shadow:0 0 0 1px rgba(255,255,255,.06) inset}\n  .cell .nm{font-size:8.5px;letter-spacing:.13em;font-weight:700;color:#9fb2af;text-transform:uppercase}\n  .cell .val{font-size:9.5px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;\n    text-shadow:0 0 6px rgba(74,208,200,.4)}\n  .cell.orange .val{color:var(--orange);text-shadow:0 0 6px rgba(255,138,90,.4)}\n  .knob:hover .cap{filter:brightness(1.12)}\n  .knob:active{cursor:grabbing}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <span class=\"screw tl\"><\/span><span class=\"screw tr\"><\/span>\n    <span class=\"screw bl\"><\/span><span class=\"screw br\"><\/span>\n\n    <div class=\"head\">\n      <div class=\"brand\">\n        <span class=\"sub\">Dual Series Filter · Mono Synth<\/span>\n        <span class=\"name\"><b>TWIN<\/b> <i>FILTER<\/i><\/span>\n      <\/div>\n      <div class=\"tag\">\n        <span class=\"mono\">HP → LP · 2-VOICE<\/span>\n        <span class=\"voice\"><span class=\"vled\" id=\"v0\"><\/span><span class=\"vled\" id=\"v1\"><\/span><\/span>\n      <\/div>\n    <\/div>\n\n    <div class=\"scope\">\n      <svg viewBox=\"0 0 600 150\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"hpFill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#ff8a5a\" stop-opacity=\".30\"/>\n            <stop offset=\"1\" stop-color=\"#ff8a5a\" stop-opacity=\"0\"/>\n          <\/linearGradient>\n          <linearGradient id=\"lpFill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#4ad0c8\" stop-opacity=\".30\"/>\n            <stop offset=\"1\" stop-color=\"#4ad0c8\" stop-opacity=\"0\"/>\n          <\/linearGradient>\n          <filter id=\"glow\"><feGaussianBlur stdDeviation=\"2.2\" result=\"b\"/>\n            <feMerge><feMergeNode in=\"b\"/><feMergeNode in=\"SourceGraphic\"/><\/feMerge><\/filter>\n        <\/defs>\n        <path id=\"hpArea\" fill=\"url(#hpFill)\"><\/path>\n        <path id=\"lpArea\" fill=\"url(#lpFill)\"><\/path>\n        <path id=\"bandArea\" fill=\"#bff3ef\" fill-opacity=\".10\"><\/path>\n        <path id=\"hpCurve\" fill=\"none\" stroke=\"var(--orange)\" stroke-width=\"2.2\" filter=\"url(#glow)\"><\/path>\n        <path id=\"lpCurve\" fill=\"none\" stroke=\"var(--teal)\" stroke-width=\"2.2\" filter=\"url(#glow)\"><\/path>\n        <circle id=\"hpKnee\" r=\"3.4\" fill=\"#fff\" stroke=\"var(--orange)\" stroke-width=\"1.6\"><\/circle>\n        <circle id=\"lpKnee\" r=\"3.4\" fill=\"#fff\" stroke=\"var(--teal)\" stroke-width=\"1.6\"><\/circle>\n      <\/svg>\n      <div class=\"grid\"><\/div>\n      <div class=\"glass\"><\/div>\n      <div class=\"scan\"><\/div>\n      <span class=\"lbl hp\">HIGH-PASS<\/span>\n      <span class=\"lbl lp\">LOW-PASS<\/span>\n      <span class=\"lbl band\">BAND<\/span>\n    <\/div>\n\n    <div class=\"controls\" id=\"controls\"><\/div>\n  <\/div>\n\n<script>\n(function(){\n  var host = window.vstai || null;\n  function send(i,v){ if(host && host.setParam) host.setParam(i,v); }\n\n  // param defs: index matches assembly.ts / spec.json\n  var PARAMS = [\n    {i:0, nm:\"LP Cutoff\",  def:0.62, accent:\"teal\"},\n    {i:1, nm:\"HP Cutoff\",  def:0.32, accent:\"orange\"},\n    {i:2, nm:\"Resonance\",  def:0.55, accent:\"teal\"},\n    {i:3, nm:\"Env Amount\", def:0.60, accent:\"orange\"},\n    {i:4, nm:\"Decay\",      def:0.42, accent:\"teal\"},\n    {i:5, nm:\"Detune\",     def:0.30, accent:\"orange\"},\n    {i:6, nm:\"Level\",      def:0.80, accent:\"teal\"}\n  ];\n  var state = {};\n  PARAMS.forEach(function(p){ state[p.i] = p.def; });\n\n  var controls = document.getElementById(\"controls\");\n  var els = {};\n\n  function fmt(p){\n    var v = state[p.i];\n    if(p.i===5) return (v*3.5).toFixed(1)+\"%\";       // detune percent-ish\n    return Math.round(v*100)+\"\";\n  }\n\n  PARAMS.forEach(function(p){\n    var cell = document.createElement(\"div\");\n    cell.className = \"cell\" + (p.accent===\"orange\" ? \" orange\" : \"\");\n    var knob = document.createElement(\"div\");\n    knob.className = \"knob\" + (p.accent===\"orange\" ? \" orange\" : \"\");\n    knob.setAttribute(\"title\",\"drag · double-click resets\");\n    knob.innerHTML =\n      '<svg class=\"arc\" viewBox=\"0 0 72 72\"><path class=\"arcpath\" fill=\"none\" '+\n      'stroke=\"'+(p.accent===\"orange\"?\"#ff8a5a\":\"#4ad0c8\")+'\" stroke-width=\"2.4\" '+\n      'stroke-linecap=\"round\" stroke-opacity=\".85\"><\/path><\/svg>'+\n      '<div class=\"cap\"><\/div><div class=\"ptr\"><\/div><div class=\"dot\"><\/div>';\n    var nm = document.createElement(\"div\"); nm.className=\"nm\"; nm.textContent=p.nm;\n    var val = document.createElement(\"div\"); val.className=\"val\";\n    cell.appendChild(knob); cell.appendChild(nm); cell.appendChild(val);\n    controls.appendChild(cell);\n    els[p.i] = { knob:knob, ptr:knob.querySelector(\".ptr\"), arc:knob.querySelector(\".arcpath\"), val:val };\n\n    // ---- interaction: vertical drag ----\n    var dragging=false, startY=0, startV=0;\n    function setV(nv, doSend){\n      nv = Math.max(0, Math.min(1, nv));\n      state[p.i]=nv;\n      paint(p);\n      if(doSend!==false) send(p.i, nv);\n    }\n    knob.addEventListener(\"pointerdown\", function(e){\n      dragging=true; startY=e.clientY; startV=state[p.i];\n      knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener(\"pointermove\", function(e){\n      if(!dragging) return;\n      var dy = startY - e.clientY;\n      setV(startV + dy/180);\n    });\n    knob.addEventListener(\"pointerup\", function(e){ dragging=false; });\n    knob.addEventListener(\"pointercancel\", function(e){ dragging=false; });\n    knob.addEventListener(\"dblclick\", function(e){ setV(p.def); e.preventDefault(); });\n    knob.addEventListener(\"wheel\", function(e){\n      setV(state[p.i] - e.deltaY/2400); e.preventDefault();\n    }, {passive:false});\n  });\n\n  var ARC_LEN = 0; // computed lazily per knob via path\n  function paint(p){\n    var e = els[p.i];\n    var v = state[p.i];\n    // pointer: -135deg .. +135deg (270 deg sweep)\n    var ang = -135 + v*270;\n    e.ptr.style.transform = \"translateX(-50%) rotate(\"+ang+\"deg)\";\n    // arc gauge (start at 220deg sweeping 280deg of the ring, mapped to value)\n    var R=33, cx=36, cy=36;\n    var a0 = (220)*Math.PI/180;\n    var a1 = (220 + v*280)*Math.PI/180;\n    var x0 = cx + R*Math.cos(a0), y0 = cy + R*Math.sin(a0);\n    var x1 = cx + R*Math.cos(a1), y1 = cy + R*Math.sin(a1);\n    var large = (v*280) > 180 ? 1 : 0;\n    e.arc.setAttribute(\"d\",\"M \"+x0.toFixed(2)+\" \"+y0.toFixed(2)+\n      \" A \"+R+\" \"+R+\" 0 \"+large+\" 1 \"+x1.toFixed(2)+\" \"+y1.toFixed(2));\n    e.val.textContent = fmt(p);\n    drawScope();\n  }\n\n  // ===== response-curve scope =====\n  var W=600, H=150;\n  var hpCurve=document.getElementById(\"hpCurve\"),\n      lpCurve=document.getElementById(\"lpCurve\"),\n      hpArea=document.getElementById(\"hpArea\"),\n      lpArea=document.getElementById(\"lpArea\"),\n      bandArea=document.getElementById(\"bandArea\"),\n      hpKnee=document.getElementById(\"hpKnee\"),\n      lpKnee=document.getElementById(\"lpKnee\");\n\n  function xForCut(norm){ return 30 + norm*540; }   // map 0..1 -> 30..570 px\n\n  function drawScope(){\n    var lp = state[0], hp = state[1], reso = state[2];\n    // knee x positions on the log-ish axis\n    var hpX = xForCut(hp*0.78 + 0.04);   // HP corner travels right as HP rises\n    var lpX = xForCut(lp*0.82 + 0.12);   // LP corner travels right as LP rises\n    var peak = 10 + reso*26;             // resonance bump height\n\n    // HIGH-PASS: low freq attenuated (rises from bottom-left up to flat top),\n    // with a resonant peak at its knee.\n    var hp_d = \"M 0 \"+H+\" \";\n    var hp_top = 34;\n    for(var x=0;x<=W;x+=6){\n      var t=(x-hpX)/55;\n      var s=1/(1+Math.exp(-t));          // sigmoid rise\n      var y = H-10 - s*(H-44);\n      // resonant bump near knee\n      var bump = peak*Math.exp(-Math.pow((x-hpX)/22,2));\n      y -= bump;\n      if(y<hp_top) y=hp_top;\n      hp_d += \"L \"+x+\" \"+y.toFixed(1)+\" \";\n    }\n    hpCurve.setAttribute(\"d\", hp_d);\n    hpArea.setAttribute(\"d\", hp_d + \"L \"+W+\" \"+H+\" L 0 \"+H+\" Z\");\n\n    // LOW-PASS: high freq attenuated (flat top then falls), resonant peak at knee.\n    var lp_d = \"M 0 34 \";\n    for(var x2=0;x2<=W;x2+=6){\n      var t2=(x2-lpX)/55;\n      var s2=1/(1+Math.exp(t2));          // sigmoid fall\n      var y2 = H-10 - s2*(H-44);\n      var bump2 = peak*Math.exp(-Math.pow((x2-lpX)/22,2));\n      y2 -= bump2;\n      if(y2<34) y2=34;\n      lp_d += \"L \"+x2+\" \"+y2.toFixed(1)+\" \";\n    }\n    lpCurve.setAttribute(\"d\", lp_d);\n    lpArea.setAttribute(\"d\", lp_d + \"L \"+W+\" \"+H+\" L 0 \"+H+\" Z\");\n\n    // BAND region between the two knees\n    var lo = Math.min(hpX,lpX), hi=Math.max(hpX,lpX);\n    bandArea.setAttribute(\"d\",\"M \"+lo+\" 34 L \"+hi+\" 34 L \"+hi+\" \"+H+\" L \"+lo+\" \"+H+\" Z\");\n\n    // knee markers\n    hpKnee.setAttribute(\"cx\",hpX); hpKnee.setAttribute(\"cy\", (H-10)-0.5*(H-44)-peak);\n    lpKnee.setAttribute(\"cx\",lpX); lpKnee.setAttribute(\"cy\", (H-10)-0.5*(H-44)-peak);\n  }\n\n  // voice LED shimmer (purely decorative — alternates with the scan)\n  var t=0;\n  function tick(){\n    t+=0.016;\n    var a=document.getElementById(\"v0\"), b=document.getElementById(\"v1\");\n    if(a) a.classList.toggle(\"on\", (Math.sin(t*2.1)>0.4));\n    if(b) b.classList.toggle(\"on\", (Math.sin(t*2.1+1.7)>0.6));\n    requestAnimationFrame(tick);\n  }\n  requestAnimationFrame(tick);\n\n  function ready(){\n    PARAMS.forEach(function(p){\n      send(p.i, state[p.i]);   // push defaults to host\n      paint(p);\n    });\n    drawScope();\n  }\n  if(host && host.onReady) host.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};

    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');

  function draw(){

    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);

      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);

  async function ensure(){

  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};
