<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jove Eight — test bench</title><style>
  :root{--ac:#6a8cff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;

  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><title>Jove Eight<\/title><style>\n@property --sweep{syntax:'<number>';inherits:false;initial-value:0}\n:root{\n  --ac:#6a8cff; --ac2:#b06aff;\n  --panel0:#171436; --panel1:#241a52; --panel2:#0c0a22;\n  --ink:#dfe4ff; --dim:#8b91c8; --line:rgba(150,160,255,.16);\n}\n*{box-sizing:border-box}\nhtml,body{margin:0;height:100%}\nbody{\n  font:12px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:var(--ink);\n  background:radial-gradient(130% 110% at 50% -20%,#1a163d 0%,#0a0820 55%,#05040f 100%);\n  display:flex;align-items:center;justify-content:center;padding:16px;\n  -webkit-font-smoothing:antialiased;overflow:hidden;\n}\n\n/* ============ flagship chassis ============ */\n.synth{\n  position:relative;width:100%;max-width:820px;border-radius:16px;padding:2px;\n  background:linear-gradient(150deg,#3a3170,#171338 60%,#0c0a22);\n  box-shadow:0 40px 90px rgba(0,0,0,.65),0 2px 0 rgba(180,190,255,.10) inset,0 -3px 16px rgba(0,0,0,.6) inset;\n  animation:rise .8s cubic-bezier(.2,.85,.2,1) both;\n  overflow:hidden;\n}\n@keyframes rise{from{opacity:0;transform:translateY(26px) scale(.98)}to{opacity:1;transform:none}}\n.surface{\n  position:relative;border-radius:14px;overflow:hidden;\n  background:linear-gradient(180deg,var(--panel1) 0%,var(--panel0) 46%,var(--panel2) 100%);\n  box-shadow:0 1px 0 rgba(180,190,255,.14) inset,0 0 0 1px rgba(120,130,255,.12);\n}\n\n/* ---- aurora / starfield backdrop ---- */\n.aurora{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}\n.aurora::before{\n  content:\"\";position:absolute;inset:-30% -10%;\n  background:\n    radial-gradient(40% 30% at 22% 20%,rgba(106,140,255,.30),transparent 70%),\n    radial-gradient(45% 32% at 78% 12%,rgba(176,106,255,.26),transparent 72%),\n    radial-gradient(60% 40% at 50% 110%,rgba(106,140,255,.18),transparent 70%);\n  filter:blur(8px);\n  animation:drift 14s ease-in-out infinite alternate;\n}\n@keyframes drift{0%{transform:translate3d(-4%,-2%,0) rotate(-2deg)}100%{transform:translate3d(4%,3%,0) rotate(2deg)}}\n.aurora .sweep{\n  position:absolute;top:0;bottom:0;width:38%;left:-40%;\n  background:linear-gradient(100deg,transparent,rgba(190,200,255,.10) 40%,rgba(220,210,255,.18) 50%,transparent);\n  filter:blur(2px);\n  animation:scan 7s linear infinite;\n}\n@keyframes scan{0%{left:-40%}100%{left:130%}}\n.stars{position:absolute;inset:0;opacity:.55}\n.stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#cfd6ff;\n  box-shadow:0 0 5px #aab4ff;animation:tw 3.4s ease-in-out infinite}\n@keyframes tw{0%,100%{opacity:.18;transform:scale(.7)}50%{opacity:.95;transform:scale(1.15)}}\n\n/* ---- header / brand ---- */\n.head{position:relative;z-index:3;display:flex;align-items:flex-end;gap:16px;\n  padding:18px 24px 14px;border-bottom:1px solid var(--line)}\n.brand{display:flex;flex-direction:column;line-height:1}\n.brand .mk{font-size:9px;letter-spacing:.46em;color:var(--dim);font-weight:800;text-transform:uppercase}\n.brand h1{margin:5px 0 0;font-size:27px;font-weight:900;letter-spacing:.06em;\n  background:linear-gradient(92deg,var(--ac),var(--ac2));-webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 0 22px rgba(140,140,255,.35)}\n.brand .tag{font-size:9px;letter-spacing:.34em;color:var(--dim);text-transform:uppercase;margin-top:5px}\n\n/* ---- 8 voltage voice-bars ---- */\n.voices{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}\n.voices .vlbl{font-size:8px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase;font-weight:800}\n.bank{display:flex;gap:7px;padding:9px 11px;border-radius:11px;\n  background:linear-gradient(180deg,#0c0a26,#06051a);\n  box-shadow:0 1px 0 rgba(160,170,255,.10) inset,0 -2px 7px rgba(0,0,0,.6) inset,0 3px 9px rgba(0,0,0,.45)}\n.vbar{position:relative;width:9px;height:42px;border-radius:5px;overflow:hidden;\n  background:linear-gradient(180deg,#1a1740,#0a0824);\n  box-shadow:0 1px 1px rgba(0,0,0,.6) inset,0 1px 0 rgba(160,170,255,.08)}\n.vbar .fill{position:absolute;left:1px;right:1px;bottom:1px;height:18%;border-radius:4px;\n  background:linear-gradient(180deg,var(--ac2),var(--ac));\n  box-shadow:0 0 9px var(--ac),0 0 16px var(--ac2);\n  transition:height .14s cubic-bezier(.3,1,.4,1),opacity .3s;opacity:.35}\n.vbar.lit .fill{opacity:1}\n\n/* ---- main body grid ---- */\n.body{position:relative;z-index:3;padding:20px 24px 22px;\n  display:grid;grid-template-columns:repeat(8,1fr);gap:16px 18px}\n.sect{grid-column:span 2;display:flex;flex-direction:column;gap:13px}\n.sect.osc{grid-column:span 2}\n.sect.flt{grid-column:span 3}\n.sect.amp{grid-column:span 3}\n.shdr{font-size:8.5px;letter-spacing:.34em;color:var(--dim);text-transform:uppercase;font-weight:800;\n  display:flex;align-items:center;gap:8px}\n.shdr::after{content:\"\";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}\n.row{display:flex;gap:18px;flex-wrap:wrap}\n\n/* ============ slider control ============ */\n.ctl{display:flex;flex-direction:column;align-items:center;gap:7px;user-select:none;width:58px}\n.ctl .name{font-size:9px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;font-weight:700}\n.ctl .val{font-size:10px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;\n  text-shadow:0 0 8px rgba(120,140,255,.4)}\n.slider{position:relative;width:30px;height:124px;border-radius:9px;cursor:ns-resize;touch-action:none;\n  background:linear-gradient(180deg,#0c0a26,#070518);\n  box-shadow:0 1px 0 rgba(160,170,255,.10) inset,0 -2px 6px rgba(0,0,0,.6) inset,0 2px 6px rgba(0,0,0,.4)}\n.slider .track{position:absolute;left:50%;top:9px;bottom:9px;width:4px;transform:translateX(-50%);border-radius:3px;\n  background:linear-gradient(180deg,#1c1948,#0a0824);overflow:hidden}\n.slider .lit{position:absolute;left:0;r lass=\"synth\"><div class=\"surface\">\n  <div class=\"aurora\"><div class=\"sweep\"><\/div><div class=\"stars\" id=\"stars\"><\/div><\/div>\n\n  <div class=\"head\">\n    <div class=\"brand\">\n      <div class=\"mk\">Polyphonic Voltage Synthesizer<\/div>\n      <h1>JOVE EIGHT<\/h1>\n      <div class=\"tag\">Eight Voice · Dual Osc · Sub<\/div>\n    <\/div>\n    <div class=\"voices\">\n      <div class=\"vlbl\">Voices<\/div>\n      <div class=\"bank\" id=\"bank\"><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"body\" id=\"body\">\n    <div class=\"sect osc\">\n      <div class=\"shdr\">Oscillators<\/div>\n      <div class=\"row\" id=\"r-osc\"><\/div>\n    <\/div>\n    <div class=\"sect flt\">\n      <div class=\"shdr\">Filter<\/div>\n      <div class=\"row\" id=\"r-flt\"><\/div>\n    <\/div>\n    <div class=\"sect amp\">\n      <div class=\"shdr\">Envelope · Output<\/div>\n      <div class=\"row\" id=\"r-amp\"><\/div>\n    <\/div>\n  <\/div>\n\n  <div class=\"foot\"><span class=\"dot\"><\/span> Analog Poly Engine\n    <span class=\"sp\">Drag · Double-click resets<\/span><\/div>\n<\/div><\/div>\n\n<script>\n(function(){\n  // ---- param model (indices match assembly.ts / spec.json) ----\n  var PARAMS = [\n    {name:\"Cutoff\",    index:0, def:0.5,  grp:\"flt\"},\n    {name:\"Resonance\", index:1, def:0.3,  grp:\"flt\"},\n    {name:\"Env Amt\",   index:2, def:0.55, grp:\"flt\"},\n    {name:\"PW\",        index:3, def:0.35, grp:\"osc\"},\n    {name:\"Detune\",    index:4, def:0.32, grp:\"osc\"},\n    {name:\"Attack\",    index:5, def:0.08, grp:\"amp\"},\n    {name:\"Release\",   index:6, def:0.4,  grp:\"amp\"},\n    {name:\"Level\",     index:7, def:0.7,  grp:\"amp\"}\n  ];\n  var vals = {};\n\n  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }\n  function fmt(v){ return Math.round(v*100)+\"%\"; }\n\n  // ---- build starfield ----\n  var stars=document.getElementById(\"stars\");\n  for(var s=0;s<46;s++){\n    var st=document.c ion down(e){\n      dragging=true; sl.classList.add(\"drag\");\n      startY=(e.touches?e.touches[0].clientY:e.clientY);\n      startV=vals[p.index];\n      e.preventDefault();\n    }\n    function move(e){\n      if(!dragging) return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      var dv=(startY-y)/130;            // upward = increase\n      set(startV+dv);\n      e.preventDefault();\n    }\n    function up(){ dragging=false; sl.classList.remove(\"drag\"); }\n    sl.addEventListener(\"mousedown\",down);\n    window.addEventListener(\"mousemove\",move);\n    window.addEventListener(\"mouseup\",up);\n    sl.addEventListener(\"touchstart\",down,{passive:false});\n    window.addEventListener(\"touchmove\",move,{passive:false});\n    window.addEventListener(\"touchend\",up);\n    // double-click reset\n    sl.addEventListener(\"dblclick\",function(){ set(p.def); });\n\n    p._set=set;\n    document.getElementById(\"r-\"+p.grp).appendChild(wrap);\n    set(p.def,false); // init visual to default (send happens in ready())\n  }\n\n  PARAMS.forEach(makeCtl);\n\n  // ---- ready: push all defaults to host, start voice animation ----\n  function ready(){\n    PARAMS.forEach(function(p){ send(p.index, p.def); });\n    // ambient voice-bar shimmer driven by Detune + Cutoff for life\n    var t=0;\n    setInterval(function(){\n      t+=0.08;\n      var cut=vals[0]!=null?vals[0]:0.5;\n      var det=vals[4]!=null?vals[4]:0.3;\n      for(var i=0;i<8;i++){\n        var ph=t+i*0.7;\n        var amp=0.2+0.8*cut*(0.5+0.5*Math.sin(ph + det*6*Math.sin(ph*0.31)));\n        amp=Math.max(0.12,Math.min(1,amp));\n        bars[i].fill.style.height=(amp*100)+\"%\";\n        if(amp>0.55) bars[i].el.classList.add(\"lit\"); else bars[i].el.classList.remove(\"lit\");\n      }\n    },90);\n  }\n\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body><\/html>\n";
