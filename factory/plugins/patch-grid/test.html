<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patch Grid — test bench</title><style>
  :root{--ac:#7ad090}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:1000px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:1000px;height:600px;border:0;background:transparent;display:block}
  .bar{width:100%;max-width:1000px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  gf.srcdoc="<!DOCTYPE html>\n<html lang=\"en\"><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>Patch Grid<\/title>\n<style>\n  :root{ --acc:#7ad090; --acc2:#e0b040; --bg0:#080e09; --bg1:#111c12; --ink:#e8f3e8; --dim:#7a8c7a; }\n  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }\n  body{ font-family:\"Inter\",system-ui,-apple-system,\"Segoe UI\",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#182c1a 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }\n  .unit{ width:min(96vw,860px); border-radius:13px; padding:15px 20px 18px; position:relative; overflow:hidden; background:linear-gradient(160deg,#132214,#080e09); border:1px solid rgba(122,208,144,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(232,243,232,.06); }\n  header{ display:flex; align-items:center; gap:12px; margin-bottom:11px; }\n  .logo{ font-weight:800; letter-spacing:.15em; font-size:20px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }\n  .sub{ font-size:9.5px; letter-spacing:.26em; text-transform:uppercase; color:var(--dim); }\n  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.2s ease-in-out infinite; }\n  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }\n  .stage{ display:flex; gap:12px; margin-bottom:13px; }\n  .screen{ height:212px; border-radius:9px; overflow:hidden; position:relative; background:linear-gradient(180deg,#0e1a0f,#080f09); border:1px solid rgba(122,208,144,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }\n  .matrix{ flex:1.55; } .wave{ flex:1; }\n  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }\n  .scrlbl{ position:absolute; left:11px; top:8px; font-size:8.5px; letter-spacing:.2em; color:var(--dim); z-index:2; }\n  .hint{ position:absolute; right:10px; bottom:7px; font-size:8px; letter-spacing:.14em; color:rgba(122,208,144,.42); z-index:2; }\n  .knobs{ display:grid; grid-template-columns:repeat(5,1fr); gap:5px 6px; }\n  .knob{ display:flex; flex-direction:column; align-items:center; gap:4px; padding:3px 1px; cursor:ns-resize; touch-action:none; }\n  .dial{ width:58px; height:58px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }\n  .track{ fill:none; stroke:rgba(214,232,214,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(122,208,144,.6)); }\n  .pcap{ fill:#0d180e; stroke:rgba(122,208,144,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }\n  .kn{ font-size:8px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:9.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(122,208,144,.1); padding:1px 6px; border-radius:6px; border:1px solid rgba(122,208,144,.2); }\n  .knob:hover .kn{ color:var(--acc); }\n<\/style><script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"unit\">\n    <header><span class=\"logo\">PATCH&nbsp;GRID<\/span><span class=\"sub\">ems&nbsp;synthi&nbsp;100&nbsp;&middot;&nbsp;7&times;7&nbsp;pin&nbsp;matrix<\/span><span class=\"led\"><\/span><\/header>\n    <div class=\"stage\">\n      <div class=\"screen matrix\"><span class=\"hint\">click a hole to patch<\/span><canvas id=\"mv\"><\/canvas><\/div>\n      <div class=\"screen wave\"><div class=\"scrlbl\">OUTPUT<\/div><canvas id=\"wv\"><\/canvas><\/div>\n    <\/div>\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n  <\/div>\n<script>\n(function(){\"use strict\";\n  // ---- params: 10 module knobs (0..9) + 49 matrix routes (10..58) ----\n  var P=[{name:\"Osc2\",idx:0,def:0.36},{name:\"Osc3\",idx:1,def:0.5},{name:\"Osc4\",idx:2,def:0.2},\n    {name:\"Noise\",idx:3,def:0.35},{name:\"Cutoff\",idx:4,def:0.5},{name:\"Reso\",idx:5,def:0.6},\n    {name:\"Attack\",idx:6,def:0.14},{name:\"Decay\",idx:7,def:0.5},{name:\"Reverb\",idx:8,def:0.22},{name:\"Level\",idx:9,def:0.8}];\n  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });\n  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }\n\n  // ---- knobs ----\n  var R=31, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById(\"knobs\");\n  var knobs=P.map(function(p){ var el=document.createElement(\"div\"); el.className=\"knob\";\n    el.innerHTML='<div class=\"dial\"><svg viewBox=\"0 0 76 76\"><defs><linearGradient id=\"g\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#7ad090\"/><stop offset=\"1\" stop-color=\"#e0b040\"/><\/linearGradient><\/defs><circle class=\"track\" cx=\"38\" cy=\"38\" r=\"31\"><\/circle><circle class=\"arc\" cx=\"38\" cy=\"38\" r=\"31\" transform=\"rotate(135 38 38)\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\"><\/circle><circle class=\"pcap\" cx=\"38\" cy=\"38\" r=\"19\"><\/circle><line class=\"ptr\" x1=\"38\" y1=\"38\" x2=\"38\" y2=\"22\"><\/line><\/svg><\/div><span class=\"kn\">'+p.name+'<\/span><span class=\"kv\"><\/span>';\n    kw.appendChild(el); var arc=el.querySelector(\".arc\"), ptr=el.querySelector(\".ptr\"), val=el.querySelector(\".kv\");\n    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute(\"stroke-dashoffset\",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute(\"x2\",(38+Math.sin(ang)*15).toFixed(2)); ptr.setAttribute(\"y2\",(38-Math.cos(ang)*15).toFixed(2)); val.textContent=Math.round(v*100)+\"%\"; }\n    var drag=null;\n    el.addEventListener(\"pointerdown\",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });\n    el.addEventListener(\"pointermove\",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });\n    el.addEventListener(\"pointerup\",function(){ drag=null; }); el.addEventListener(\"pointercancel\",function(){ drag=null; });\n    el.addEventListener(\"dblclick\",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });\n\n  function C2(id){ var cv=document.getElementById(id); var ctx=cv.getContext(\"2d\"); var o={cv:cv,ctx:ctx,W:0,H:0,DPR:Math.min(2,window.devicePixelRatio||1)};\n    function rs(){ var r=cv.getBoundingClientRect(); o.W=r.width; o.H=r.height; cv.width=o.W*o.DPR; cv.height=o.H*o.DPR; ctx.setTransform(o.DPR,0,0,o.DPR,0,0); } o.rs=rs; window.addEventListener(\"resize\",rs); rs(); return o; }\n  var mv=C2(\"mv\"), wv=C2(\"wv\");\n\n  // ================================================================\n  //  EMS SYNTHI-100 PIN MATRIX — 7 sources x 7 destinations, REAL.\n  //  Each hole is param index 10 + src*7 + dst. Click to insert/pull a\n  //  pin; the engine reads every route every sample.\n  // ================================================================\n  var SRC=[\"OSC 1\",\"OSC 2\",\"OSC 3\",\"OSC 4\",\"NOISE\",\"RING\",\"ENV\"];        // rows\n  var DST=[\"1 FM\",\"2 FM\",\"3 FM\",\"4 FM\",\"CUT\",\"F·IN\",\"OUT\"];          // cols\n  var DCOL=[\"#e0b040\",\"#e0a038\",\"#e09038\",\"#e08038\",\"#6aa0e0\",\"#7ad090\",\"#e07050\"]; // per-dest pin colour\n  var AMT_ON=0.8;\n  var DEF={\"0,5\":0.85,\"0,6\":0.25,\"5,6\":0.70,\"4,5\":0.22,\"6,4\":0.60};      // default patch (matches spec)\n  var pin=[], amt=[];\n  for(var s=0;s<7;s++){ pin[s]=[]; amt[s]=[]; for(var d=0;d<7;d++){ var a=DEF[s+\",\"+d]||0; amt[s][d]=a; pin[s][d]=a>0?1:0; } }\n  function midx(s,d){ return 10+s*7+d; }\n  function setPin(s,d,on){ pin[s][d]=on?1:0; amt[s][d]= on ? (amt[s][d]>0?amt[s][d]:AMT_ON) : 0; send(midx(s,d), amt[s][d]); }\n\n  function geo(o){ var lx=50, ty=20, pad=9; return {lx:lx,ty:ty,cw:(o.W-lx-pad)/7, ch:(o.H-ty-pad)/7}; }\n  function hole(o,s,d){ var g=geo(o); return {x:g.lx+d*g.cw+g.cw/2, y:g.ty+s*g.ch+g.ch/2}; }\n  mv.cv.addEventListener(\"click\",function(e){\n    var rect=mv.cv.getBoundingClientRect(); var cx=e.clientX-rect.left, cy=e.clientY-rect.top;\n    var best=null, bd=1e9;\n    for(var s=0;s<7;s++)for(var d=0;d<7;d++){ var p=hole(mv,s,d); var dd=(p.x-cx)*(p.x-cx)+(p.y-cy)*(p.y-cy); if(dd<bd){bd=dd;best={s:s,d:d};} }\n    var g=geo(mv); var rad=Math.min(g.cw,g.ch)*0.6; if(best && bd<rad*rad){ setPin(best.s,best.d,!pin[best.s][best.d]); }\n  });\n\n  // representative live level per source (for pin shimmer + scope)\n  function ratio(v){ return 0.25 + v*3.4; }\n  function frame(ts){\n    // ---------- PIN MATRIX ----------\n    var mc=mv.ctx, W=mv.W, H=mv.H; mc.clearRect(0,0,W,H); var g=geo(mv);\n    mc.textBaseline=\"middle\"; mc.font=\"8px Inter,system-ui,sans-serif\";\n    // column headers + guides\n    mc.textAlign=\"center\";\n    for(var d=0;d<7;d++){ var cx=g.lx+d*g.cw+g.cw/2; mc.globalAlpha=0.92; mc.fillStyle=DCOL[d]; mc.fillText(DST[d],cx,10); mc.globalAlpha=1;\n      mc.strokeStyle=\"rgba(122,208,144,0.055)\"; mc.lineWidth=1; mc.beginPath(); mc.moveTo(cx,g.ty-2); mc.lineTo(cx,H-4); mc.stroke(); }\n    // row labels + guides (lit if the source drives anything)\n    mc.textAlign=\"right\";\n    for(var s=0;s<7;s++){ var cy=g.ty+s*g.ch+g.ch/2; var act=false; for(var dd=0;dd<7;dd++) if(pin[s][dd]) act=true;\n      mc.globalAlpha=act?1:0.7; mc.fillStyle=act?\"#e8f3e8\":\"#7a8c7a\"; mc.fillText(SRC[s],g.lx-8,cy); mc.globalAlpha=1;\n      mc.strokeStyle=act?\"rgba(122,208,144,0.09)\":\"rgba(122,208,144,0.04)\"; mc.beginPath(); mc.moveTo(g.lx-2,cy); mc.lineTo(W-5,cy); mc.stroke(); }\n    // holes + seated pins\n    for(var s2=0;s2<7;s2++)for(var d2=0;d2<7;d2++){ var p=hole(mv,s2,d2);\n      mc.fillStyle=\"rgba(0,0,0,0.5)\"; mc.beginPath(); mc.arc(p.x,p.y,3.3,0,6.2832); mc.fill();\n      mc.strokeStyle=\"rgba(122,208,144,0.22)\"; mc.lineWidth=1; mc.beginPath(); mc.arc(p.x,p.y,3.3,0,6.2832); mc.stroke();\n      if(pin[s2][d2]){ var col=DCOL[d2]; var pulse=0.6+0.4*Math.sin(ts/380+s2*1.4+d2*0.7);\n        mc.shadowColor=col; mc.shadowBlur=8*pulse; mc.globalAlpha=0.95; mc.fillStyle=col; mc.beginPath(); mc.arc(p.x,p.y,4.5,0,6.2832); mc.fill(); mc.shadowBlur=0;\n        mc.globalAlpha=0.7; mc.fillStyle=\"rgba(255,255,255,0.85)\"; mc.beginPath(); mc.arc(p.x-1.4,p.y-1.4,1.2,0,6.2832); mc.fill(); mc.globalAlpha=1; } }\n\n    // ---------- OUTPUT SCOPE (reflects the patch) ----------\n    var wc=wv.ctx, SW=wv.W, SH=wv.H; wc.clearRect(0,0,SW,SH); var mid=SH*0.53;\n    var f2=ratio(vals[0]), f3=ratio(vals[1]), f4=ratio(vals[2]), cut=vals[4], nzc=vals[3];\n    var lpf=0, any=false;\n    wc.beginPath();\n    for(var x=0;x<=SW;x+=1.5){ var t=x/SW*4+ts/820;\n      var o1=((t%1)*2-1), o2=Math.sin(t*f2*6.2831853), o3=(4*Math.abs((t*f3)%1-0.5)-1), o4=((t*f4)%1)<0.5?1:-1;\n      var ring=o1*o2; var nzv=(Math.sin(t*131.7)*0.6+Math.sin(t*57.3)*0.4)*(0.4+nzc*0.9);\n      var src=[o1,o2,o3,o4,nzv,ring,0.6];\n      var sig=0; for(var k=0;k<7;k++){ var w=amt[k][6]+amt[k][5]*0.85; if(w>0){sig+=src[k]*w; any=true;} }\n      lpf += (0.06+cut*0.55)*(sig-lpf);\n      wc.lineTo(x, mid - lpf*(SH*0.30)); }\n    wc.strokeStyle=any?\"rgba(224,176,64,0.92)\":\"rgba(122,140,122,0.5)\"; wc.lineWidth=1.8; wc.shadowColor=\"#e0b040\"; wc.shadowBlur=any?6:0; wc.stroke(); wc.shadowBlur=0;\n    if(!any){ wc.fillStyle=\"rgba(122,140,122,0.6)\"; wc.font=\"9px Inter,sans-serif\"; wc.textAlign=\"center\"; wc.fillText(\"patch a source → OUT / F·IN to hear it\", SW/2, mid+22); }\n    requestAnimationFrame(frame); }\n  requestAnimationFrame(frame);\n\n  function boot(){ host=window.vstai||null;\n    P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); });\n    for(var s=0;s<7;s++)for(var d=0;d<7;d++) send(midx(s,d), amt[s][d]); }\n  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();\n})();\n<\/script><\/body><\/html>\n";
  // Size the iframe to the GUI's true content so nothing is cut off (buttons,

  gf.addEventListener('load',function(){ sizeGui(); setTimeout(sizeGui,150); setTimeout(sizeGui,500); });

  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);

  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}

  function st(m){document.getElementById('st').textContent=m;}

  function draw(){

  function makeRiff(){

  async function ensure(){
