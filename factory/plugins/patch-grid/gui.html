<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Patch Grid</title>
<style>
  :root{ --acc:#7ad090; --acc2:#e0b040; --bg0:#080e09; --bg1:#111c12; --ink:#e8f3e8; --dim:#7a8c7a; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#182c1a 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,780px); border-radius:13px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#132214,#080e09); border:1px solid rgba(122,208,144,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(232,243,232,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
  .stage{ display:flex; gap:12px; margin-bottom:14px; }
  .screen{ height:150px; border-radius:9px; overflow:hidden; position:relative; background:linear-gradient(180deg,#0e1a0f,#080f09); border:1px solid rgba(122,208,144,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  .matrix{ width:150px; flex:0 0 150px; } .wave{ flex:1; }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:10px; top:7px; font-size:8.5px; letter-spacing:.2em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:66px; height:66px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(214,232,214,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(122,208,144,.6)); }
  .pcap{ fill:#0d180e; stroke:rgba(122,208,144,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(122,208,144,.1); padding:1px 7px; border-radius:6px; border:1px solid rgba(122,208,144,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">PATCH&nbsp;GRID</span><span class="sub">matrix modular</span><span class="led"></span></header>
    <div class="stage">
      <div class="screen matrix"><div class="scrlbl">PIN&nbsp;MATRIX</div><canvas id="mv"></canvas></div>
      <div class="screen wave"><div class="scrlbl">RING&nbsp;OUT</div><canvas id="wv"></canvas></div>
    </div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Osc2",idx:0,def:0.4},{name:"Ring",idx:1,def:0.5},{name:"Noise",idx:2,def:0.15},{name:"Cutoff",idx:3,def:0.55},{name:"Decay",idx:4,def:0.6},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=31, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 76 76"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7ad090"/><stop offset="1" stop-color="#e0b040"/></linearGradient></defs><circle class="track" cx="38" cy="38" r="31"></circle><circle class="arc" cx="38" cy="38" r="31" transform="rotate(135 38 38)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="38" cy="38" r="19"></circle><line class="ptr" x1="38" y1="38" x2="38" y2="22"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(38+Math.sin(ang)*15).toFixed(2)); ptr.setAttribute("y2",(38-Math.cos(ang)*15).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  // fixed set of "patched" pins (row,col) + which param controls their glow
  var PINS=[[0,1,1],[1,3,1],[2,0,2],[3,5,1],[4,2,0],[1,6,3],[5,4,0],[6,7,4],[2,5,1],[7,1,3]];
  function C2(id){ var cv=document.getElementById(id); var ctx=cv.getContext("2d"); var o={cv:cv,ctx:ctx,W:0,H:0,DPR:Math.min(2,window.devicePixelRatio||1)};
    function rs(){ var r=cv.getBoundingClientRect(); o.W=r.width; o.H=r.height; cv.width=o.W*o.DPR; cv.height=o.H*o.DPR; ctx.setTransform(o.DPR,0,0,o.DPR,0,0); } o.rs=rs; window.addEventListener("resize",rs); rs(); return o; }
  var mv=C2("mv"), wv=C2("wv");
  // ---- REAL patch pins: click to route sources into Ring-mod / Noise ----
  // amber = osc -> ring modulator (Ring), green = noise -> mix (Noise).
  var routable=[
    {r:2,c:1,p:1,amt:0.28,on:true},  {r:4,c:3,p:1,amt:0.28,on:true},  {r:6,c:5,p:1,amt:0.28,on:false},
    {r:0,c:6,p:2,amt:0.18,on:true},  {r:5,c:2,p:2,amt:0.18,on:false}, {r:3,c:7,p:2,amt:0.18,on:false}
  ];
  function recomputeGrid(){
    var ring=0.03, noise=0.0;
    for(var i=0;i<routable.length;i++){ if(!routable[i].on)continue; if(routable[i].p===1)ring+=routable[i].amt; else noise+=routable[i].amt; }
    ring=Math.min(1,ring); noise=Math.min(1,noise);
    vals[1]=ring; vals[2]=noise; send(1,ring); send(2,noise);
    if(knobs[1])knobs[1].render(ring); if(knobs[2])knobs[2].render(noise);
  }
  mv.cv.addEventListener("click",function(e){
    var rect=mv.cv.getBoundingClientRect(); var cxp=e.clientX-rect.left, cyp=e.clientY-rect.top;
    var pad=20, gx=(mv.W-pad-8)/8, gy=(mv.H-pad-6)/8; var best=-1, bd=1e9;
    for(var i=0;i<routable.length;i++){ var x=8+routable[i].c*gx+gx/2, y=pad+routable[i].r*gy+gy/2; var d=(x-cxp)*(x-cxp)+(y-cyp)*(y-cyp); if(d<bd){bd=d;best=i;} }
    var rad=Math.min(gx,gy)*0.75; if(best>=0 && bd < rad*rad){ routable[best].on=!routable[best].on; recomputeGrid(); }
  });
  function frame(ts){
    // PIN MATRIX 8x8
    var mc=mv.ctx, W=mv.W, H=mv.H; mc.clearRect(0,0,W,H);
    var pad=20, gx=(W-pad-8)/8, gy=(H-pad-6)/8;
    for(var r=0;r<8;r++)for(var c=0;c<8;c++){ var x=8+c*gx+gx/2, y=pad+r*gy+gy/2;
      mc.fillStyle="rgba(122,208,144,0.14)"; mc.beginPath(); mc.arc(x,y,1.4,0,Math.PI*2); mc.fill(); }
    for(var k=0;k<PINS.length;k++){ var pn=PINS[k]; var x=8+pn[1]*gx+gx/2, y=pad+pn[0]*gy+gy/2;
      var lvl=vals[pn[2]]; var pulse=0.5+0.5*Math.sin(ts/500+k);
      mc.fillStyle="#7ad090"; mc.globalAlpha=0.4+lvl*0.5; mc.shadowColor="#7ad090"; mc.shadowBlur=4+lvl*8*pulse;
      mc.beginPath(); mc.arc(x,y,2.8+lvl*1.5,0,Math.PI*2); mc.fill(); mc.shadowBlur=0; mc.globalAlpha=1; }
    // clickable routing pins (amber=ring, green=noise); ring around = seated
    for(var kk=0;kk<routable.length;kk++){ var rp=routable[kk]; var rx=8+rp.c*gx+gx/2, ry=pad+rp.r*gy+gy/2; var col=rp.p===1?"#e0b040":"#7ad090";
      if(rp.on){ mc.fillStyle=col; mc.globalAlpha=0.95; mc.shadowColor=col; mc.shadowBlur=8; mc.beginPath(); mc.arc(rx,ry,4,0,Math.PI*2); mc.fill(); mc.shadowBlur=0;
        mc.strokeStyle=col; mc.globalAlpha=0.45; mc.lineWidth=1.2; mc.beginPath(); mc.arc(rx,ry,7.5,0,Math.PI*2); mc.stroke(); mc.globalAlpha=1; }
      else { mc.strokeStyle=col; mc.globalAlpha=0.35; mc.lineWidth=1.3; mc.beginPath(); mc.arc(rx,ry,4,0,Math.PI*2); mc.stroke(); mc.globalAlpha=1; } }
    // WAVE (ring-mod output)
    var wc=wv.ctx, SW=wv.W, SH=wv.H; wc.clearRect(0,0,SW,SH); var mid=SH*0.52;
    var osc2=vals[0], ring=vals[1], noise=vals[2], cut=vals[3];
    var f2=40*Math.exp(osc2*3.4)/220;   // osc2 ratio relative to display base
    wc.beginPath();
    for(var x2=0;x2<=SW;x2+=1.5){ var t=x2/SW*3+ts/900; var o1=(( (t)%1)*2-1); var o2=Math.sin(t*f2*6.2831853);
      var rr=o1*o2; var v=(o1*(0.5-ring*0.35)+rr*ring*1.2)*(0.4+cut*0.5); v += (Math.sin(t*97)*0.5)*noise*0.6;
      wc.lineTo(x2, mid - v*(SH*0.30)); }
    wc.strokeStyle="rgba(224,176,64,0.9)"; wc.lineWidth=1.8; wc.shadowColor="#e0b040"; wc.shadowBlur=6; wc.stroke(); wc.shadowBlur=0;
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); recomputeGrid(); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
