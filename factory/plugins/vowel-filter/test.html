  <title>Vowel Filter — test bench</title><style>
  :root{--ac:#ff9ec0}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Vowel Filter</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Vowel Filter<\/title>\n<style>\n  :root {\n    --accent: #ff9ec0;\n    --accent2: #ffd089;\n    --bg0: #1a1016;\n    --bg1: #241420;\n    --panel: #2c1a28;\n    --ink: #ffe9f2;\n    --muted: #b78aa2;\n    --line: rgba(255,158,192,0.16);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #3a1f30 0%, var(--bg1) 42%, var(--bg0) 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  body {\n    min-height: 100vh;\n    display: flex;\n    justify-content: center;\n    padding: 18px;\n  }\n\n  .shell {\n    width: 100%;\n    max-width: 680px;\n    background:\n      linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.18)),\n      var(--panel);\n    border: 1px solid var(--line);\n    border-radius: 22px;\n    box-shadow:\n      0 24px 60px rgba(0,0,0,0.55),\n      inset 0 1px 0 rgba(255,255,255,0.07),\n      inset 0 -2px 18px rgba(0,0,0,0.4);\n    padding: 22px 24px 26px;\n    overflow: hidden;\n  }\n\n  /* ---------- header ---------- */\n  .head {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n    margin-bottom: 18px;\n  }\n  .logo {\n    width: 42px; height: 42px;\n    border-radius: 13px;\n    background:\n      radial-gradient(70% 70% at 35% 25%, var(--accent), #c75d85 70%, #7c3354 100%);\n    box-shadow:\n      0 6px 16px rgba(255,99,150,0.35),\n      inset 0 1px 0 rgba(255,255,255,0.5),\n      inset 0 -4px 10px rgba(0,0,0,0.35);\n    position: relative;\n    flex: none;\n  }\n  .logo::after {\n    content: \"\";\n    position: absolute;\n    left: 50%; top: 52%;\n    width: 16px; height: 20px;\n    transform: translate(-50%,-50%);\n    border-radius: 50%;\n    background: radial-gradient(60% 60% at 50% 38%, var(--accent2), #b35a2e 70%, #3a1408 100%);\n    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.3);\n  }\n  .titles h1 {\n    margin: 0;\n    font-size: 19px;\n    letter-spacing: 0.5px;\n    font-weight: 700;\n    background: linear-gradient(90deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .titles p {\n    margin: 2px 0 0;\n    font-size: 10.5px;\n    letter-spacing: 2.4px;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n\n  /* ---------- mouth stage ---------- */\n  .stage {\n    position: relative;\n    border-radius: 16px;\n    background:\n      radial-gradient(80% 120% at 50% 0%, #3b2030 0%, #1d0f18 75%),\n      #160b12;\n    border: 1px solid var(--line);\n    box-shadow: inset 0 2px 22px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.02);\n    padding: 14px;\n    margin-bottom: 20px;\n  }\n  .stage svg { display: block; width: 100%; height: auto; }\n\n  .vowel-tag {\n    position: absolute;\n    top: 12px; right: 16px;\n    font-size: 40px;\n    font-weight: 800;\n    letter-spacing: 1px;\n    color: var(--accent);\n    text-shadow: 0 0 24px rgba(255,158,192,0.55);\n    transition: opacity 0.15s;\n  }\n\n  /* gum / lip parts get gentle idle motion */\n  @keyframes breathe {\n    0%, 100% { transform: translateY(0); }\n    50% { transform: translateY(1.2px); }\n  }\n  #upperLip { animation: breathe 3.4s ease-in-out infinite; transform-origin: center; }\n  #lowerLip { animation: breathe 3.4s ease-in-out infinite reverse; transform-origin: center; }\n\n  @keyframes glow {\n    0%, 100% { opacity: 0.55; }\n    50% { opacity: 1; }\n  }\n  .formantGlow { animation: glow 2.2s ease-in-out infinite; }\n\n  /* ---------- controls ---------- */\n  .vowel-row {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 8px;\n    margin-bottom: 22px;\n  }\n  .vbtn {\n    appearance: none;\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.25)), #2a1824;\n    color: var(--muted);\n    font-size: 20px;\n    font-weight: 800;\n    padding: 12px 0 14px;\n    cursor: pointer;\n    transition: transform 0.08s, color 0.15s, box-shadow 0.2s, background 0.2s;\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 10px rgba(0,0,0,0.3);\n    position: relative;\n  }\n  .vbtn small {\n    display: block;\n    font-size: 8.5px;\n    letter-spacing: 1.5px;\n    font-weight: 600;\n    margin-top: 4px;\n    opacity: 0.5;\n  }\n  .vbtn:hover { color: var(--ink); transform: translateY(-1px); }\n  .vbtn.active {\n    color: #1a0d14;\n    background: linear-gradient(180deg, var(--accent), #e07ba1);\n    box-shadow:\n      0 0 0 1px rgba(255,158,192,0.5),\n      0 6px 18px rgba(255,99,150,0.4),\n      inset 0 1px 0 rgba(255,255,255,0.6);\n  }\n  .vbtn.active small { opacity: 0.7; }\n\n  .knobs {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 12px;\n  }\n  @media (max-width: 480px) {\n    .knobs { grid-template-columns: repeat(2, 1fr); }\n  }\n\n  .knob {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 8px;\n    padding: 12px 6px 10px;\n    border-radius: 14px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(0,0,0,0.18));\n    border: 1px solid var(--line);\n  }\n  .knob .dial {\n    width: 78px; height: 78px;\n    cursor: ns-resize;\n    touch-action: none;\n    user-select: none;\n  }\n  .knob .label {\n    font-size: 9.5px;\n    letter-spacing: 1.8px;\n    text-transform: uppercase;\n    color: var(--muted);\n    font-weight: 700;\n  }\n  .knob .val {\n    font-size: 12.5px;\n    font-variant-numeric: tabular-nums;\n    color: var(--accent2);\n    font-weight: 700;\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"shell\">\n    <div class=\"head\">\n      <div class=\"logo\"><\/div>\n      <div class=\"titles\">\n        <h1>Vowel Filter<\/h1>\n        <p>Formant &middot; Talkbox<\/p>\n      <\/div>\n    <\/div>\n\n    <div class=\"stage\">\n      <div class=\"vowel-tag\" id=\"vowelTag\">A<\/div>\n      <svg viewBox=\"0 0 360 180\" id=\"mouthSvg\" aria-hidden=\"true\">\n        <defs>\n          <radialGradient id=\"mouthGrad\" cx=\"50%\" cy=\"50%\" r=\"65%\">\n            <stop offset=\"0%\" stop-color=\"#5a1326\"/>\n            <stop offset=\"60%\" stop-color=\"#360a17\"/>\n            <stop offset=\"100%\" stop-color=\"#1a050c\"/>\n          <\/radialGradient>\n          <linearGradient id=\"lipGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#ffb9d2\"/>\n            <stop offset=\"55%\" stop-color=\"#ff8fb6\"/>\n            <stop offset=\"100%\" stop-color=\"#c75d85\"/>\n          <\/linearGradient>\n          <filter id=\"soft\" x=\"-40%\" y=\"-40%\" width=\"180%\" height=\"180%\">\n            <feGaussianBlur stdDeviation=\"3\"/>\n          <\/filter>\n        <\/defs>\n\n        <!-- formant resonance bands behind the mouth -->\n        <g class=\"formantGlow\" filter=\"url(#soft)\">\n          <ellipse id=\"band1\" cx=\"180\" cy=\"90\" rx=\"60\" ry=\"40\" fill=\"rgba(255,158,192,0.30)\"/>\n          <ellipse id=\"band2\" cx=\"180\" cy=\"90\" rx=\"36\" ry=\"24\" fill=\"rgba(255,208,137,0.30)\"/>\n          <ellipse id=\"band3\" cx=\"180\" cy=\"90\" rx=\"18\" ry=\"12\" fill=\"rgba(255,255,255,0.20)\"/>\n        <\/g>\n\n        <!-- mouth cavity, shaped by the vowel -->\n        <ellipse id=\"cavity\" cx=\"180\" cy=\"90\" rx=\"70\" ry=\"46\" fill=\"url(#mouthGrad)\"\n                 stroke=\"rgba(0,0,0,0.5)\" stroke-width=\"2\"/>\n\n        <!-- tongue -->\n        <path id=\"tongue\" d=\"M120 118 Q180 100 240 118 Q180 150 120 118 Z\" fill=\"#a83a55\" opacity=\"0.85\"/>\n\n        <!-- lips -->\n        <path id=\"upperLip\" d=\"M104 90 Q180 38 256 90 Q180 64 104 90 Z\" fill=\"url(#lipGrad)\"\n              stroke=\"rgba(120,30,60,0.6)\" stroke-width=\"1.5\"/>\n        <path id=\"lowerLip\" d=\"M104 90 Q180 142 256 90 Q180 116 104 90 Z\" fill=\"url(#lipGrad)\"\n              stroke=\"rgba(120,30,60,0.6)\" stroke-width=\"1.5\"/>\n      <\/svg>\n    <\/div>\n\n    <div class=\"vowel-row\" id=\"vowelRow\"><\/div>\n\n    <div class=\"knobs\" id=\"knobs\"><\/div>\n  <\/div>\n\n<script>\n(function () {\n  \"use strict\";\n\n  // ---- parameter map (indices MUST match spec.json) ----\n  var P = {\n    VOWEL: 0,\n    RES:   1,\n    RATE:  2,\n    DEPTH: 3,\n    MIX:   4\n  };\n\n  var VOWELS = [\"A\", \"E\", \"I\", \"O\", \"U\"];\n  var VOWEL_SUB = [\"ah\", \"eh\", \"ee\", \"oh\", \"oo\"];\n\n  // morph targets per vowel: mouth shape descriptors for the animation\n  // [openY (cavity ry), wide (cavity rx), lipPucker (0..1)]\n  var SHAPES = [\n    { rx: 78, ry: 52, pucker: 0.0, tongue: 118 }, // A wide open\n    { rx: 70, ry: 36, pucker: 0.1, tongue: 110 }, // E\n    { rx: 60, ry: 24, pucker: 0.0, tongue: 96 },  // I narrow, tongue high\n    { rx: 50, ry: 44, pucker: 0.5, tongue: 122 }, // O rounded\n    { rx: 38, ry: 30, pucker: 0.85, tongue: 116 } // U pucker\n  ];\n\n  var host = null;\n  var pending = {};\n\n  function pushParam(index, value) {\n    if (host && host.setParam) {\n      host.setParam(index, value);\n    } else {\n      pending[index] = value;\n    }\n  }\n\n  // ---------------------------------------------------------------\n  //  KNOB factory\n  // ---------------------------------------------------------------\n  function makeKnob(def) {\n    var wrap = document.createElement(\"div\");\n    wrap.className = \"knob\";\n\n    var NS = \"http://www.w3.   label.textContent = def.label;\n    wrap.appendChild(label);\n\n    var val = document.createElement(\"div\");\n    val.className = \"val\";\n    wrap.appendChild(val);\n\n    var value = def.def;\n\n    function norm() { return (value - def.min) / (def.max - def.min); }\n\n    function render() {\n      var t = norm();\n      var ang = 135 + t * 270;\n      fill.setAttribute(\"d\", arcPath(50, 50, 38, 135, ang));\n      var rad = (ang - 90) * Math.PI / 180;\n      notch.setAttribute(\"x2\", (50 + Math.cos(rad) * 22).toFixed(2));\n      notch.setAttribute(\"y2\", (50 + Math.sin(rad) * 22).toFixed(2));\n      val.textContent = def.format(value);\n    }\n\n    function set(v, push) {\n      value = Math.max(def.min, Math.min(def.max, v));\n      render();\n      if (push) pushParam(def.index, value);\n    }\n\n    // drag\n    var dragging = false, lastY = 0;\n    function down(e) {\n      dragging = true;\n      lastY = (e.touches ? e.touches[0].clientY : e.clientY);\n      e.preventDefault();\n    }\n    function move(e) {\n      if (!dragging) return;\n      var y = (e.touches ? e.touches[0].clientY : e.clientY);\n      var dy = lastY - y;\n      lastY = y;\n      var span = def.max - def.min;\n      set(value + dy / 180 * span, true);\n      e.preventDefault();\n    }\n    function up() { dragging = false; }\n\n    svg.addEventListener(\"mousedown\", down);\n    window.addEventListener(\"mousemove\", move);\n    window.addEventListener(\"mouseup\", up);\n    svg.addEventListener(\"touchstart\", down, { passive: false });\n    window.addEventListener(\"touchmove\", move, { passive: false });\n    window.addEventListener(\"touchend\", up);\n\n    svg.addEventListener(\"dblclick\", function () { set(def.def, true); });\n    svg.addEventListener(\"wheel\", function (e) {\n      var span = def.max - def.min;\n      set(value - Math.sign(e.deltaY) * span * 0.02, true);\n      e.preventDefault();\n    }, { passive: false });\n\n    set(def.def, false);\n\n    return { el: wrap, set: function (v) { set(v, true); }, get: function () { return value; } };\n  }\n\n  function arcPath(cx, cy, r, a0, a1) {\n    var s = polar(cx, cy, r, a0);\n    var e = polar(cx, cy, r, a1);\n    var large = (a1 - a0) > 180 ? 1 : 0;\n    return \"M \" + s.x + \" \" + s.y + \" A \" + r + \" \" + r + \" 0 \" + large + \" 1 \" + e.x + \" \" + e.y;\n  }\n  function polar(cx, cy, r, deg) {\n    var rad = (deg - 90) * Math.PI / 180;\n    return { x: (cx + r * Math.cos(rad)).toFixed(2), y: (cy + r * Math.sin(rad)).toFixed(2) };\n  }\n\n  // ---------------------------------------------------------------\n  //  build knobs\n  // ---------------------------------------------------------------\n  var knobsHost = document.getElementById(\"knobs\");\n\n  var resKnob = makeKnob({\n    label: \"Resonance\", index: P.RES, min: 0, max: 1, def: 0.6, color: \"#ff9ec0\",\n    format: function (v) { return Math.round(v * 100) + \"%\"; }\n  });\n  var rateKnob = makeKnob({\n    label: \"LFO Rate\", index: P.RATE, min: 0, max: 1, def: 0.25, color: \"#ffd089\",\n    format: function (v) {\n      var hz = 0.02 + v * v * 7.98;\n      return hz.toFixed(2) + \" Hz\";\n    }\n  });\n  var depthKnob = makeKnob({\n    label: \"LFO Depth\", index: P.DEPTH, min: 0, max: 1, def: 0.35, color: \"#ff9ec0\",\n    format: function (v) { return Math.round(v * 100) + \"%\"; }\n  });\n  var mixKnob = makeKnob({\n    label: \"Mix\", index: P.MIX, min: 0, max: 1, def: 1.0, color: \"#ffd089\",\n    format: function (v) { return Math.round(v * 100) + \"%\"; }\n  });\n\n  knobsHost.appendChild(resKnob.el);\n  knobsHost.appendChild(rateKnob.el);\n  knobsHost.appendChild(depthKnob.el);\n  knobsHost.appendChild(mixKnob.el);\n\n  // ---------------------------------------------------------------\n  //  vowel selector buttons\n  // ---------------------------------------------------------------\n  var vowelRow = document.getElementById(\"vowelRow\");\n  var vowelTag = document.getElementById(\"vowelTag\");\n  var currentVowel = 0;\n  var btns = [];\n\n  function selectVowel(i, push) {\n    currentVowel = i;\n    for (var k = 0; k < btns.length; k++) {\n      btns[k].classList.toggle(\"active\", k === i);\n    }\n    if (push) pushParam(P.VOWEL, i);\n  }\n\n  VOWELS.forEach(function (v, i) {\n    var b = document.createElement(\"button\");\n    b.className = \"vbtn\";\n    b.innerHTML = v + \"<small>\" + VOWEL_SUB[i].toUpperCase() + \"<\/small>\";\n    b.addEventListener(\"click\", function () { selectVowel(i, true); });\n    vowelRow.appendChild(b);\n    btns.push(b);\n  });\n\n  // ---------------------------------------------------------------\n  //  mouth animation — morphs toward current vowel + LFO sweep\n  // ---------------------------------------------------------------\n  var cavity = document.getElementById(\"cavity\");\n  var tongue = document.getElementById(\"tongue\");\n  var upperLip = document.getElementById(\"upperLip\");\n  var lowerLip = document.getElementById(\"lowerLip\");\n  var band1 = document.getElementById(\"band1\");\n  var band2 = document.getElementById(\"band2\");\n  var band3 = document.getElementById(\"band3\");\n\n  // animated continuous vowel position (eased toward target, plus LFO)\n  var animPos = 0;\n  var lfoT = 0;\n\n  function lerp(a, b, t) { return a + (b - a) * t; }\n\n  function shapeAt(p) {\n    var i0 = Math.floor(p);\n    var i1 = Math.min(i0 + 1, SHAPES.length - 1);\n    var f = p - i0;\n    var a = SHAPES[i0], b = SHAPES[i1];\n    return {\n      rx: lerp(a.rx, b.rx, f),\n      ry: lerp(a.ry, b.ry, f),\n      pucker: lerp(a.pucker, b.pucker, f),\n      tongue: lerp(a.tongue, b.tongue, f)\n    };\n  }\n\n  function tick(now) {\n    if (document.hidden) { requestAnimationFrame(tick); return; }\n\n    // LFO contribution mirrors the DSP: depth sweeps vowel position over time\n    var depth = depthKnob.get();\n    var rate = rateKnob.get();\n    var hz = 0.02 + rate * rate * 7.98;\n    lfoT += hz / 60;\n    var lfo = 0.5 + 0.5 * Math.sin(lfoT * Math.PI * 2);\n\n    var target = currentVowel + depth * (lfo - 0.5) * 4.0;\n    target = Math.max(0, Math.min(4, target));\n\n    // ease the displayed position toward target\n    animPos += (target - animPos) * 0.12;\n\n    var s = shapeAt(animPos);\n    var res = resKnob.get();\n\n    // cavity opening\n    cavity.setAttribute(\"rx\", s.rx.toFixed(1));\n    cavity.setAttribute(\"ry\", s.ry.toFixed(1));\n\n    // lips: pucker pulls them inward + rounds them\n    var lw = lerp(76, 30, s.pucker);   // half-width of lips\n    var lh = lerp(s.ry * 0.95, 22, s.pucker);\n    upperLip.setAttribute(\"d\",\n      \"M \" + (180 - lw) + \" 90 Q 180 \" + (90 - lh) + \" \" + (180 + lw) + \" 90 Q 180 \" + (90 - lh * 0.45) + \" \" + (180 - lw) + \" 90 Z\");\n    lowerLip.setAttribute(\"d\",\n      \"M \" + (180 - lw) + \" 90 Q 180 \" + (90 + lh) + \" \" + (180 + lw) + \" 90 Q 180 \" + (90 + lh * 0.45) + \" \" + (180 - lw) + \" 90 Z\");\n\n    // tongue raise\n    tongue.setAttribute(\"d\",\n      \"M 120 \" + (s.tongue + 4) + \" Q 180 \" + s.tongue + \" 240 \" + (s.tongue + 4) +\n      \" Q 180 150 120 \" + (s.tongue + 4) + \" Z\");\n\n    // formant resonance bands react to resonance + sweep\n    var sharp = 0.4 + res * 1.6;\n    band1.setAttribute(\"rx\", (s.rx * 0.85).toFixed(1));\n    band1.setAttribute(\"ry\", (s.ry * 0.85 / sharp + 6).toFixed(1));\n    band2.setAttribute(\"rx\", (s.rx * 0.5).toFixed(1));\n    band2.setAttribute(\"ry\", (s.ry * 0.5 / sharp + 4).toFixed(1));\n    band3.setAttribute(\"rx\", (s.rx * 0.26).toFixed(1));\n    band3.setAttribute(\"ry\", (s.ry * 0.26 / sharp + 3).toFixed(1));\n\n    // big vowel letter follows the swept position when LFO is active\n    var near = Math.round(animPos);\n    vowelTag.textContent = VOWELS[Math.max(0, Math.min(4, near))];\n    vowelTag.style.opacity = (0.55 + 0.45 * (1 - Math.abs(animPos - near))).toFixed(2);\n\n    requestAnimationFrame(tick);\n  }\n  requestAnimationFrame(tick);\n\n  // ------     var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);

    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
