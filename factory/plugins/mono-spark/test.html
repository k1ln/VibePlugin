<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mono Spark — test bench</title><style>
  :root{--ac:#ff5a4d}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Mono Spark<\/title>\n<style>\n  :root {\n    --accent: #ff5a4d;\n    --accent2: #3da0ff;\n    --panel: #c9cdd2;\n    --panel-dark: #a7acb2;\n    --ink: #23262b;\n    --slot: #1b1d21;\n    --led-off: #4a1714;\n    --led-on: #ff5a4d;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background:\n      radial-gradient(120% 120% at 50% -10%, #2c3036 0%, #16181b 55%, #0c0d0f 100%);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    color: var(--ink);\n    min-height: 100vh;\n  }\n\n  .wrap {\n    max-width: 960px;\n    margin: 0 auto;\n    padding: 18px 14px 30px;\n  }\n\n  /* ------- the ribbon-strip body ------- */\n  .unit {\n    position: relative;\n    border-radius: 14px;\n    padding: 0;\n    background:\n      linear-gradient(180deg, #e7e9ec 0%, #c9cdd2 6%, #b7bcc2 50%, #a4a9af 94%, #c4c8cd 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.7) inset,\n      0 -3px 8px rgba(0,0,0,0.25) inset,\n      0 22px 48px rgba(0,0,0,0.55),\n      0 2px 0 rgba(0,0,0,0.4);\n    overflow: hidden;\n  }\n\n  /* brushed-metal sheen overlay */\n  .unit::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background:\n      repeating-linear-gradient(90deg,\n        rgba(255,255,255,0.035) 0px,\n        rgba(255,255,255,0.035) 1px,\n        rgba(0,0,0,0.02) 2px,\n        rgba(0,0,0,0.02) 3px);\n    pointer-events: none;\n    mix-blend-mode: overlay;\n  }\n\n  /* red top rail */\n  .rail {\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 10px 18px;\n    background:\n      linear-gradient(180deg, var(--accent) 0%, #e23e33 60%, #b62c23 100%);\n    color: #fff;\n    box-shadow: 0 2px 6px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;\n  }\n\n  .brand {\n    display: flex;\n    align-items: baseline;\n    gap: 10px;\n  }\n  .brand .logo {\n    font-weight: 900;\n    letter-spacing: 2px;\n    font-size: 20px;\n    text-shadow: 0 1px 0 rgba(0,0,0,0.35);\n  }\n  .brand .model {\n    font-size: 10px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    opacity: 0.85;\n    padding: 2px 7px;\n    border: 1px solid rgba(255,255,255,0.45);\n    border-radius: 4px;\n  }\n  .rail .tag {\n    font-size: 9.5px;\n    letter-spacing: 2.5px;\n    text-transform: uppercase;\n    opacity: 0.9;\n  }\n\n  /* main body grid */\n  .body {\n    position: relative;\n    display: grid;\n    grid-template-columns: 224px 1fr;\n    gap: 16px;\n    padding: 18px;\n  }\n  @media (max-width: 720px) {\n    .body { grid-template-columns: 1fr; }\n  }\n\n  /* ------- left: big filter knob + scope ------- */\n  .filter-bay {\n    background:\n      linear-gradient(180deg, #9da2a8, #babfc5);\n    border-radius: 10px;\n    padding: 14px 12px 12px;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.6) inset,\n      0 -2px 6px rgba(0,0,0,0.2) inset,\n      0 2px 5px rgba(0,0,0,0.18);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n  }\n  .bay-label {\n    font-size: 10px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: #3a3e44;\n    margin-bottom: 8px;\n    font-weight: 700;\n  }\n\n  .bigknob-wrap {\n    position: relative;\n    width: 160px;\n    height: 160px;\n    cursor: ns-resize;\n    user-select: none;\n  }\n  .bigknob-wrap svg { display: block; width: 100%; height: 100%; }\n\n  .knob-cap {\n    transition: filter 0.18s ease;\n  }\n  .bigknob-wrap:hover .knob-cap,\n  .bigknob-wrap.drag .knob-cap {\n    filter: drop-shadow(0 0 9px var(--accent));\n  }\n\n  .bigval {\n    margin-top: 6px;\n    font-variant-numeric: tabular-nums;\n    font-size: 15px;\n    font-weight: 800;\n    color: var(--ink);\n    letter-spacing: 0.5px;\n  }\n  .bigval span { color: var(--accent); }\n\n  /* sub/saw scope */\n  .scope {\n    margin-top: 12px;\n    width: 100%;\n    height: 64px;\n    border-radius: 7px;\n    background:\n      linear-gradient(180deg, #0f1114, #1b1f24);\n    box-shadow:\n      0 0 0 1px rgba(0,0,0,0.5) inset,\n      0 2px 4px rgba(0,0,0,0.4) inset;\n    display: block;\n  }\n\n  /* ------- right: knob row, sub fader, LED seq, keys ------- */\n  .right {\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n  }\n\n  .knob-strip {\n    display: grid;\n    grid-template-columns: repeat(6, 1fr);\n    gap: 8px;\n    background:\n      linear-gradient(180deg, #9da2a8, #b6bbc1);\n    border-radius: 10px;\n    padding: 12px 10px 10px;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,0.6) inset,\n      0 -2px 6px rgba(0,0,0,0.2) inset,\n      0 2px 5px rgba(0,0,0,0.18);\n  }\n  @media (max-width: 540px) {\n    .knob-strip { grid-template-columns: repeat(3, 1fr); row-gap: 14px; }\n  }\n\n  .ctl {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 4px;\n  }\n  .ctl .knob {\n    width: 58px;\n    height: 58px;\n    cursor: ns-resize;\n    user-select: none;\n  }\n  .ctl .knob svg { display: block; width: 100%; height: 100%; }\n  .ctl .knob:hover .miniarc,\n  .ctl .knob.drag .miniarc { filter: drop-shadow(0 0 5px var(--accent)); }\n\n  .ctl .lbl {\n    font-size: 9px;\n    letter-spacing: 1.6px;\n    text-transform: uppercase;\n    color: #3a3e44;\n    font-weight: 700;\n  }\n  .ctl .val {\n    font-size: 10px;\n    font-variant-numeric: tabular-nums;\n    color: #56307a00; /* hidden until needed; we show on hover via .show */\n    color: #2c2f34;\n    opacity: 0.55;\n  }\n\n  /* LED sequencer strip (decorative + animated pulse meter) */\n  .seq {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    background:\n      linear-gradient(180deg, #2a2d31, #17191c);\n    border-radius: 9px;\n    padding: 10px 12px;\n    box-shadow:\n      0 1px 0 rgba(255,255,2
