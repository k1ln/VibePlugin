  <title>Clip Stage — test bench</title><style>
  :root{--ac:#ffd86a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}

    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}

  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  background:repeating-linear-gradient(0deg,transparent 0 10px,rgba(0,0,0,.35) 10px 11px)}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n  <div class=\"module\">\n    <i class=\"screw tl\"><\/i><i class=\"screw tr\"><\/i><i class=\"screw bl\"><\/i><i class=\"screw br\"><\/i>\n\n    <header>\n      <div class=\"brand\">\n        <div class=\"name\">CLIP&nbsp;STAGE<\/div>\n        <div class=\"sub\">transparent saturator<\/div>\n      <\/div>\n      <div class=\"pilot\"><span id=\"modeTxt\">DIODE<\/span><span class=\"lamp\"><\/span><\/div>\n    <\/header>\n\n    <div class=\"scope\">\n      <span class=\"badge\">transfer curve<\/span>\n      <span class=\"readout\" id=\"readout\">+0.0 dB<\/span>\n      <svg viewBox=\"0 0 520 170\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"curveFill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0\" stop-color=\"#ffd86a\" stop-opacity=\"0.28\"/>\n            <stop offset=\"1\" stop-color=\"#ff9a5a\" stop-opacity=\"0.02\"/>\n          <\/linearGradient>\n          <linearGradient id=\"curveLine\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n            <stop offset=\"0\" stop-color=\"#ff9a5a\"/>\n            <stop offset=\"0.5\" stop-color=\"#ffd86a\"/>\n            <stop offset=\"1\" stop-color=\"#ff9a5a\"/>\n          <\/linearGradient>\n          <filter id=\"glow\"><feGaussianBlur stdDeviation=\"2.2\" result=\"b\"/>\n            <feMerge><feMergeNode in=\"b\"/><feMergeNode in=\"SourceGraphic\"/><\/feMerge><\/filter>\n        <\/defs>\n        <!-- grid -->\n        <g stroke=\"rgba(200,168,90,0.13)\" stroke-width=\"1\">\n          <line x1=\"0\" y1=\"42.5\" x2=\"520\" y2=\"42.5\"/>\n          <line x1=\"0\" y1=\"85\" x2=\"520\" y2=\"85\"/>\n          <line x1=\"0\" y1=\"127.5\" x2=\"520\" y2=\"127.5\"/>\n          <line x1=\"130\" y1=\"0\" x2=\"130\" y2=\"170\"/>\n          <line x1=\"260\" y1=\"0\" x2=\"260\" y2=\"170\"/>\n          <line x1=\"390\" y1=\"0\" x2=\"390\" y2=\"170\"/>\n        <\/g>\n        <!-- unity reference (diagonal) -->\n        <line x1=\"0\" y1=\"170\" x2=\"520\" y2=\"0\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"1\" stroke-dasharray=\"4 5\"/>\n        <path id=\"curveArea\" fill=\"url(#curveFill)\"/>\n        <path id=\"curvePath\" fill=\"none\" stroke=\"url(#curveLine)\" stroke-width=\"2.6\"\n              stroke-linecap=\"round\" filter=\"url(#glow)\"/>\n        <circle id=\"dot\" r=\"4\" fill=\"#fff3cf\" stroke=\"#ff9a5a\" stroke-width=\"1.5\"\n                style=\"filter:drop-shadow(0 0 6px rgba(255,200,90,.9))\"/>\n        <line class=\"scanline\" x1=\"0\" y1=\"0\" x2=\"520\" y2=\"0\"\n              stroke=\"rgba(255,216,106,0.12)\" stroke-width=\"2\"/>\n      <\/svg>\n    <\/div>\n\n    <div class=\"controls\">\n      <div class=\"knob-wrap\" data-knob=\"0\">\n        <div class=\"knob\"><\/div>\n        <div class=\"klabel\">Drive<\/div>\n        <div class=\"kval\">—<\/div>\n      <\/div>\n\n      <div class=\"toggle-wrap\">\n        <div class=\"toggle\" id=\"curveToggle\">\n          <span class=\"on\">DIODE<\/span><span>TUBE<\/span>\n          <div class=\"slider\"><\/div>\n        <\/div>\n        <div class=\"klabel\">Curve<\/div>\n      <\/div>\n\n      <div class=\"knob-wrap\" data-knob=\"2\">\n        <div class=\"knob\"><\/div>\n        <div class=\"klabel\">Tone<\/div>\n        <div class=\"kval\">—<\/div>\n      <\/div>\n\n      <div class=\"knob-wrap\" data-knob=\"3\">\n        <div class=\"knob\"><\/div>\n        <div class=\"klabel\">Trim<\/div>\n        <div class=\"kval\">—<\/div>\n      <\/div>\n\n      <div class=\"knob-wrap\" data-knob=\"4\">\n        <div class=\"knob\"><\/div>\n        <div class=\"klabel\">Mix<\/div>\n        <div class=\"kval\">—<\/div>\n      <\/div>\n\n      <div class=\"meter-wrap\">\n        <div class=\"meter\"><div class=\"fill\" id=\"meterFill\"><\/div><div class=\"ticks\"><\/div><\/div>\n        <div class=\"klabel\">Out<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- param model (index, default match spec.json) ----\n  var PARAMS = {\n    0:{name:\"Drive\", def:0.40},\n    1:{name:\"Curve\", def:0,    step:1, max:1},\n    2:{name:\"Tone\",  def:0.60},\n    3:{name:\"Trim\",  def:0.65},\n    4:{name:\"Mix\",   def:1.00}\n  };\n  var state = {0:0.40, 1:0, 2:0.60, 3:0.65, 4:1.00};\n\n  function send(i,v){\n    if(window.vstai && window.vstai.setParam) window.vstai.setParam(i, v);\n  }\n\n  // ---- value formatting per param ----\n  function fmt(i){\n    var v = state[i];\n    if(i===0) return Math.round(v*100)+\"%\";            // drive\n    if(i===2) return Math.round(v*100)+\"%\";            // tone\n    if(i===3){ var db = (v*1.5); db = db<=0?-60:20*Math.log10(db);\n               return (db>=0?\"+\":\"\")+db.toFixed(1)+\" dB\"; }\n    if(i===4) return Math.round(v*100)+\"%\";            // mix\n    return v.toFixed(2);\n  }\n\n  // ====================================================================\n  //  KNOBS — custom SVG, draggable (ns), double-click reset\n  // ====================================================================\n  var ARC_A0 = -135, ARC_A1 = 135; // degrees sweep\n  function knobSVG(){\n    var ns=\"http://www.w3.org/2000/svg\";\n    var svg=document.createElementNS(ns,\"svg\");\n    svg.setAttribute(\"viewBox\",\"0 0 66 66\");svg.setAttribute(\"width\",\"66\");svg.setAttribute(\"height\",\"66\");\n    svg.innerHTML =\n      '<defs>'+\n        '<radialGradient id=\"kc\" cx=\"38%\" cy=\"30%\" r=\"75%\">'+\n          '<stop offset=\"0\" stop-color=\"#fff7e2\"/><stop offset=\"0.55\" stop-color=\"#e7d3a4\"/>'+\n          '<stop offset=\"1\" stop-color=\"#b89a5c\"/><\/radialGradient>'+\n      '<\/defs>'+\n      '<circle cx=\"33\" cy=\"33\" r=\"30\" fill=\"none\" stroke=\"rgba(80,60,25,.25)\" stroke-width=\"4\"/>'+\n      '<circle class=\"track\" cx=\"33\" cy=\"33\" r=\"30\" fill=\"none\" stroke=\"rgba(80,60,25,.18)\" stroke-width=\"4\"'+\n        ' stroke-linecap=\"round\"/>'+\n      '<circle class=\"arc\" cx=\"33\" cy=\"33\" r=\"30\" fill=\"none\" stroke=\"#ffce5e\" stroke-width=\"4\"'+\n        ' stroke-linecap=\"round\" style=\"filter:drop-shadow(0 0 4px rgba(255,190,70,.7))\"/>'+\n      '<circle class=\"cap\" cx=\"33\" cy=\"33\" r=\"22\" fill=\"url(#kc)\" stroke=\"#9a824c\" stroke-width=\"1\"/>'+\n      '<line class=\"ptr\" x1=\"33\" y1=\"33\" x2=\"33\" y2=\"16\" stroke=\"#5c4a22\" stroke-width=\"3\" stroke-linecap=\"round\"/>';\n    return svg;\n  }\n  var R=30, C=2*Math.PI*R, ARC_LEN=(270/360)*C;\n\n  function renderKnob(el, frac){\n    var arc=el.querySelector(\".arc\"), track=el.querySelector(\".track\"), ptr=el.querySelector(\".ptr\");\n    track.setAttribute(\"stroke-dasharray\", ARC_LEN+\" \"+C);\n    track.setAttribute(\"transform\",\"rotate(135 33 33)\");\n    arc.setAttribute(\"stroke-dasharray\", (ARC_LEN*frac)+\" \"+C);\n    arc.setAttribute(\"transform\",\"rotate(135 33 33)\");\n    var ang = ARC_A0 + frac*(ARC_A1-ARC_A0);\n    ptr.setAttribute(\"transform\",\"rotate(\"+ang+\" 33 33)\");\n  }\n\n  document.querySelectorAll(\".knob-wrap\").forEach(function(wrap){\n    var idx = parseInt(wrap.getAttribute(\"data-knob\"),10);\n    var holder = wrap.querySelector(\".knob\");\n    var valEl = wrap.querySelector(\".kval\");\n    var svg = knobSVG();\n    holder.appendChild(svg);\n\n    function refresh(){\n      renderKnob(svg, state[idx]);\n      valEl.textContent = fmt(idx);\n    }\n    function set(v, push){\n      v = Math.max(0, Math.min(1, v));\n      state[idx]=v;\n      refresh();\n      if(push) send(idx, v);\n      scheduleScope();\n    }\n\n    // drag\n    var dragging=false, lastY=0;\n    holder.addEventListener(\"pointerdown\", function(e){\n      dragging=true; lastY=e.clientY; holder.setPointerCapture(e.pointerId);\n      svg.querySelector(\".cap\").style.filter=\"drop-shadow(0 0 8px rgba(255,200,90,.6))\";\n      e.preventDefault();\n    });\n    holder.addEventListener(\"pointermove\", function(e){\n      if(!dragging) return;\n      var dy = lastY - e.clientY; lastY=e.clientY;\n      var fine = e.shiftKey?0.25:1;\n      set(state[idx] + dy*0.005*fine, true);\n    });\n    function end(){ dragging=false; svg.querySelector(\".cap\").style.filter=\"\"; }\n    holder.addEventListener(\"pointerup\", end);\n    holder.addEventListener(\"pointercancel\", end);\n    // double-click reset\n    holder.addEventListener(\"dblclick\", function(){ set(PARAMS[idx].def, true); });\n\n    wrap._set=set; wrap._refresh=refresh;\n    refresh();\n  });\n\n  // ====================================================================\n  //  CURVE TOGGLE (stepped 0/1)\n  // ====================================================================\n  var toggle = document.getElementById(\"curveToggle\");\n  var spans = toggle.querySelectorAll(\"span\");\n  var modeTxt = document.getElementById(\"modeTxt\");\n  function applyCurve(v, push){\n    state[1] = v?1:0;\n    toggle.classList.toggle(\"tube\", state[1]===1);\n    spans[0].classList.toggle(\"on\", state[1]===0);\n    spans[1].classList.toggle(\"on\", state[1]===1);\n    modeTxt.textContent = state[1]===1 ? \"TUBE\" : \"DIODE\";\n    if(push) send(1, state[1]);\n    scheduleScope();\n  }\n  toggle.addEventListener(\"click\", function(){ applyCurve(state[1]===1?0:1, true); });\n  toggle.addEventListener(\"dblclick\", function(e){ e.preventDefault(); applyCurve(PARAMS[1].def, true); });\n\n  // ====================================================================\n  //  TRANSFER CURVE — mirrors the DSP math so the graph is truthful\n  // ====================================================================\n  var curvePath = document.getElementById(\"curvePath\");\n  var curveArea = document.getElementById(\"curveArea\");\n  var dot = document.getElementById(\"dot\");\n  var readout = document.getElementById(\"readout\");\n  var meterFill = document.getElementById(\"meterFill\");\n  var W=520, H=170;\n\n  function tanh(x){ if(x>20)return 1; if(x<-20)return -1;\n    var e=Math.exp(2*x); return (e-1)/(e+1); }\n\n  function shape(x, drive, comp, isTube){\n    var pre = x*drive, y;\n    if(isTube){ var bias=0.18; y = tanh(pre+bias) - tanh(bias); }\n    else { y = tanh(pre); }\n    return y*comp;\n  }\n\n  var scopeQueued=false;\n  function scheduleScope(){ if(scopeQueued)return; scopeQueued=true; requestAnimationFrame(drawScope); }\n\n  function drawScope(){\n    scopeQueued=false;\n    var driveN=state[0], isTube=state[1]===1, trim=state[3]*1.5, mix=state[4];\n    var drive=1+driveN*11, comp=1/Math.sqrt(drive);\n\n    var d=\"\", a=\"M0 \"+H, N=90, lastX=0,lastY=0;\n    for(var k=0;k<=N;k++){\n      var t=k/N;                       // 0..1\n      var xin=(t*2-1);                 // -1..1 input\n      var wet=shape(xin, drive, comp, isTube)*trim;\n      var yout=xin*(1-mix)+wet*mix;\n      var px=t*W;\n      var py=H/2 - yout*(H/2-6);\n      py=Math.max(2,Math.min(H-2,py));\n      d += (k===0?\"M\":\"L\")+px.toFixed(1)+\" \"+py.toFixed(1);\n      a += \"L\"+px.toFixed(1)+\" \"+py.toFixed(1);\n      lastX=px; lastY=py;\n    }\n    a += \"L\"+W+\" \"+H+\"Z\";\n    curvePath.setAttribute(\"d\", d);\n    curveArea.setAttribute(\"d\", a);\n\n    // moving dot at a representative ~+drive operating point\n    var probe=0.6;\n    var wetP=shape(probe, drive, comp, isTube)*trim;\n    var outP=probe*(1-mix)+wetP*mix;\n    dot.setAttribute(\"cx\", (((probe+1)/2)*W).toFixed(1));\n    dot.setAttribute(\"cy\", (H/2 - outP*(H/2-6)).toFixed(1));\n\n    // gain readout = output level at probe vs input (dB)\n    var g = Math.abs(outP)/probe;\n    var db = g<=0.0001?-60:20*Math.log10(g);\n    readout.textContent = (db>=0?\"+\":\"\")+db.toFixed(1)+\" dB\";\n\n    // meter target = peak of |out| over sweep\n    var peak=Math.abs(lastY); // placeholder, compute true peak below\n    peak=0;\n    for(var s=0;s<=40;s++){\n      var xx=(s/40)*2-1, ww=shape(xx,drive,comp,isTube)*trim;\n      var oo=Math.abs(xx*(1-mix)+ww*mix);\n      if(oo>peak)peak=oo;\n    }\n    meterTarget=Math.min(1,peak);\n  }\n\n  // animated meter eases toward target\n  var meterTarget=0, meterVal=0;\n  (function meterLoop(){\n    meterVal += (meterTarget - meterVal)*0.12;\n    meterFill.style.height=(meterVal*100).toFixed(1)+\"%\";\n    requestAnimationFrame(meterLoop);\n  })();\n\n  // ====================================================================\n  //  READY / INIT\n  // ====================================================================\n  function ready(){\n    // init host to defaults\n    for(var i in PARAMS){ send(parseInt(i,10), state[i]); }\n    document.querySelectorAll(\".knob-wrap\").forEach(function(w){ w._refresh(); });\n    applyCurve(state[1], false);\n    drawScope();\n  }\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);

  function st(m){document.getElementById('st').textContent=m;}
