  <title>Unison Four — test bench</title><style>
  :root{--ac:#ff6a3d}
  *{box-sizing:border-box}

  button.off{background:#28313f;color:#e7eef6}

  .st{font-size:12px;color:#8da0bd;min-height:16px}

  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Unison Four<\/title>\n<style>\n  :root {\n    --accent:  #ff6a3d;\n    --accent2: #ffe14a;\n    --bg0: #16100c;\n    --bg1: #221610;\n    --panel: #2a1c13;\n    --panel2: #34241a;\n    --ink: #ffdfc4;\n    --ink-dim: #c79877;\n    --line: #4a3322;\n    --glow: rgba(255,106,61,0.55);\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #3a2415 0%, var(--bg1) 45%, var(--bg0) 100%);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .shell {\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 18px 18px 26px;\n  }\n\n  /* ---------- header ---------- */\n  .head {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 14px;\n    padding: 14px 18px;\n    border-radius: 16px 16px 0 0;\n    background: linear-gradient(180deg, var(--panel2), var(--panel));\n    border: 1px solid var(--line);\n    border-bottom: none;\n    box-shadow: inset 0 1px 0 rgba(255,225,74,0.12);\n  }\n  .brand { display: flex; align-items: baseline; gap: 12px; }\n  .logo {\n    font-weight: 800;\n    font-size: 26px;\n    letter-spacing: 1px;\n    background: linear-gradient(92deg, var(--accent2), var(--accent) 70%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    text-shadow: 0 0 22px rgba(255,106,61,0.25);\n  }\n  .logo b { font-weight: 800; }\n  .sub {\n    font-size: 10px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n\n  /* mode toggle */\n  .mode {\n    display: flex;\n    border: 1px solid var(--line);\n    border-radius: 11px;\n    overflow: hidden;\n    background: #1c130d;\n    box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);\n  }\n  .mode button {\n    appearance: none;\n    border: none;\n    background: transparent;\n    color: var(--ink-dim);\n    font: inherit;\n    font-size: 10px;\n    font-weight: 700;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    padding: 8px 14px;\n    cursor: pointer;\n    transition: color .2s, background .2s, box-shadow .2s;\n  }\n  .mode button.on {\n    color: #1a0e06;\n    background: linear-gradient(180deg, var(--accent2), var(--accent));\n    box-shadow: 0 0 16px var(--glow);\n  }\n\n  /* ---------- scope panel ---------- */\n  .scopewrap {\n    border: 1px solid var(--line);\n    border-top: none;\n    background:\n      linear-gradient(180deg, #150d08, #100a06);\n    padding: 0;\n    position: relative;\n    overflow: hidden;\n  }\n  svg.scope { display: block; width: 100%; height: 168px; }\n\n  /* the four oscillator bars overlay */\n  .vcobars {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    align-items: flex-end;\n    justify-content: center;\n    gap: 0;\n    pointer-events: none;\n  }\n\n  /* ---------- body ---------- */\n  .body {\n    border: 1px solid var(--line);\n    border-top: none;\n    border-radius: 0 0 16px 16px;\n    background: linear-gradient(180deg, var(--panel), #1d130c);\n    padding: 18px 16px 8px;\n  }\n\n  .row {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 8px;\n    justify-content: center;\n  }\n\n  .knob {\n    width: 92px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    padding: 8px 4px 10px;\n    border-radius: 12px;\n    cursor: ns-resize;\n    user-select: none;\n    transition: background .2s;\n  }\n  .knob:hover { background: rgba(255,106,61,0.06); }\n  .knob .dial { position: relative; width: 70px; height: 70px; }\n  .knob .dial svg { display: block; }\n  .knob .label {\n    margin-top: 7px;\n    font-size: 9.5px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .knob .val {\n    margin-top: 3px;\n    font-size: 12px;\n    font-variant-numeric: tabular-nums;\n    color: var(--ink);\n    font-weight: 600;\n  }\n\n  /* ---------- keyboard ---------- */\n  .keys {\n    margin-top: 14px;\n    position: relative;\n    height: 96px;\n    border-radius: 9px;\n    background: #0c0805;\n    border: 1px solid var(--line);\n    box-shadow: inset 0 3px 9px rgba(0,0,0,0.7);\n    overflow: hidden;\n    touch-action: none;\n  }\n  .wkey, .bkey {\n    position: absolute;\n    bottom: 0;\n    cursor: pointer;\n  }\n  .wkey {\n    top: 0;\n    background: linear-gradient(180deg, #efe2d2, #c9b59c);\n    border: 1px solid #2c1d12;\n    border-radius: 0 0 5px 5px;\n  }\n  .wkey.down {\n    background: linear-gradient(180deg, var(--accent2), var(--accent));\n    box-shadow: inset 0 0 18px rgba(0,0,0,0.25);\n  }\n  .bkey {\n    top: 0;\n    height: 58%;\n    background: linear-gradient(180deg, #2a1c12, #100a06);\n    border: 1px solid #000;\n    border-radius: 0 0 4px 4px;\n    z-index: 3;\n    box-shadow: 0 3px 5px rgba(0,0,0,0.6);\n  }\n  .bkey.down {\n    background: linear-gradient(180deg, var(--accent), #b23a16);\n    box-shadow: 0 0 14px var(--glow);\n  }\n\n  .foot {\n    margin-top: 9px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    font-size: 9px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .stack-pill {\n    color: var(--accent2);\n    font-weight: 700;\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"shell\">\n\n  <div class=\"head\">\n    <div class=\"brand\">\n      <div class=\"logo\">UNISON<b>·<\/b>FOUR<\/div>\n      <div class=\"sub\">4&times;VCO Unison Monster<\/div>\n    <\/d
