<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Scream Filter — test bench</title><style>
  :root{--ac:#a8e063}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Scream Filter</b><span class="sub">live test bench — turn the knobs, play audio</span></div>
  <iframe id="gui"></iframe>
  <div class="bar">
    <canvas id="scope" width="620" height="74"></canvas>
    <div class="row"><button id="go" class="off">▶ Start audio</button><span class="st" id="st">click Start (browsers need a gesture to begin audio)</span></div>
    <div class="row"><label>Source
         <select id="src"><option value="riff">Musical riff</option><option value="mic">Microphone</option><option value="file">Audio file…</option></select></label>
         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n:root{\n  --ac:#a8e063;        /* acid green accent */\n  --ac2:#54d18f;       /* teal-green highlight */\n  --panel:#3a3d3a;\n  --panel2:#242725;\n  --metal:#c7cdc8;\n  --ink:#0c1109;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:#e6f3da;\n  background:\n    radial-gradient(120% 90% at 50% -10%,#23271f 0%,#15170f 55%,#08090a 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:22px;overflow:hidden;\n}\n\n/* ===== synth-module panel ===== */\n.panel{\n  position:relative;\n  width:360px;\n  border-radius:14px;\n  padding:18px 20px 22px;\n  background:\n    linear-gradient(155deg,#4a4e49 0%,var(--panel) 26%,#33352f 70%,#22241f 100%);\n  box-shadow:\n    0 42px 80px -22px rgba(0,0,0,.8),\n    0 2px 0 rgba(255,255,255,.10) inset,\n    0 -22px 44px -18px rgba(0,0,0,.6) inset,\n    0 0 0 2px #15170f,\n    0 0 0 5px #0a0c08;\n  animation:rise .65s cubic-bezier(.2,.8,.25,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}\n/* brushed-metal micro texture */\n.panel::before{\n  content:\"\";position:absolute;inset:0;border-radius:14px;pointer-events:none;\n  background:\n    repeating-linear-gradient(92deg,rgba(255,255,255,.028) 0 1px,transparent 1px 3px),\n    radial-gradient(140% 60% at 28% 0%,rgba(255,255,255,.12),transparent 55%);\n  mix-blend-mode:screen;opacity:.55;\n}\n/* hex mounting bolts */\n.bolt{position:absolute;width:14px;height:14px;border-radius:3px;\n  background:radial-gradient(circle at 35% 30%,#e3e8e1,#878d83 55%,#3d423b);\n  box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.35) inset;\n  transform:rotate(15deg)}\n.bolt::after{content:\"\";position:absolute;inset:3px;border-radius:1px;\n  background:linear-gradient(0deg,transparent 44%,#4a4f47 44% 56%,transparent 56%)}\n.bolt.tl{top:11px;left:11px}.bolt.tr{top:11px;right:11px}\n.bolt.bl{bottom:11px;left:11px}.bolt.br{bottom:11px;right:11px}\n\n/* ===== header ===== */\n.head{position:relative;display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px}\n.title{}\n.brand{font-size:8.5px;letter-spacing:.4em;color:#bfe39a;opacity:.7;text-transform:uppercase}\nh1{\n  margin:2px 0 0;font-size:23px;font-weight:900;letter-spacing:.01em;line-height:1;\n  font-style:italic;\n  background:linear-gradient(180deg,#f3ffe2,var(--ac) 55%,#4fae3c);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 1px 0 rgba(0,0,0,.3);\n  filter:drop-shadow(0 2px 6px rgba(40,60,0,.5));\n}\n.sub{font-size:8px;letter-spacing:.26em;color:#a9cf86;opacity:.6;text-transform:uppercase;margin-top:4px}\n\n/* tiny patch jack (MS-20 nod) */\n.jack{position:relative;width:34px;height:34px;border-radius:50%;flex:0 0 auto;\n  background:radial-gradient(circle at 42% 35%,#3b3e39,#181a16 70%);\n  box-shadow:0 0 0 2px #0c0e09,0 0 0 4px #2c2f2a,inset 0 2px 5px rgba(0,0,0,.9);}\n.jack::before{content:\"\";position:absolute;inset:9px;border-radius:50%;\n  background:radial-gradient(circle at 45% 35%,#13150f,#000 75%);\n  box-shadow:inset 0 0 6px rgba(0,0,0,.9),0 0 7px var(--ac2)}\n.jack::after{content:\"\";position:absolute;inset:13px;border-radius:50%;\n  background:radial-gradient(circle,var(--ac2),#0c4a30);opacity:.55;\n  animation:jackpulse 2.4s ease-in-out infinite}\n@keyframes jackpulse{0%,100%{opacity:.35}50%{opacity:.8}}\n\n/* ===== response window — the screaming peak ===== */\n.window{\n  position:relative;height:128px;margin:4px 2px 16px;border-radius:11px;overflow:hidden;\n  background:\n    radial-gradient(120% 150% at 50% 130%,#0e1a0c,#04080a 72%);\n  box-shadow:0 0 0 1px rgba(0,0,0,.6),\n             0 0 0 2px rgba(120,220,140,.08),\n             inset 0 2px 10px rgba(0,0,0,.85),\n             inset 0 0 38px rgba(84,209,143,.08);\n}\n.window svg{position:absolute;inset:0;width:100%;height:100%}\n.window::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background:linear-gradient(180deg,rgba(255,255,255,.09),transparent 28%)}\n.gridln{stroke:rgba(120,220,140,.10);stroke-width:1}\n.gridv{stroke:rgba(120,220,140,.055);stroke-width:1}\n.flow{stroke-dasharray:4 10;animation:flow 1.3s linear infinite}\n@keyframes flow{to{stroke-dashoffset:-14}}\n/* the response curve */\n#curve{fill:none;stroke:var(--ac);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;\n  filter:drop-shadow(0 0 6px var(--ac));}\n#fill{fill:url(#grad);opacity:.22}\n/* the resonant peak marker — glows hotter as Q rises */\n#peak{fill:none;stroke:#fff;stroke-width:2;}\n.peakdot{transform-origin:center}\n/* sweeping scan line */\n#scan{stroke:rgba(168,224,99,.0);stroke-width:1.5}\n\n/* ===== knob deck ===== */\n.deck{display:grid;grid-template-columns:repeat(5,1fr);gap:6px 4px;margin:0 2px}\n.pot{display:flex;flex-direction:column;align-items:center;gap:6px;\n  animation:pop .5s both;animation-delay:var(--d)}\n@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n.knob{position:relative;width:60px;height:60px;cursor:ns-resize;touch-action:none;user-select:none}\n/* tick skirt */\n.skirt{position:absolute;inset:-2px;border-radius:50%;\n  background:repeating-conic-gradient(from 215deg,rgba(220,240,210,.5) 0 1deg,transparent 1deg 13.846deg);\n  -webkit-mask:radial-gradient(circle,transparent 30px,#000 31px,#000 33px,transparent 34px);\n  mask:radial-gradient(circle,transparent 30px,#000 31px,#000 33px,transparent 34px)}\n/* glowing value arc */\n.arc{position:absolute;inset:1px;border-radius:50%;\n  background:conic-gradient(from 215deg,var(--ac) calc(var(--n)*270deg),rgba(255,255,255,.05) calc(var(--n)*270deg) 270deg,transparent 270deg);\n  filter:drop-shadow(0 0 calc(2px + var(--n)*7px) var(--ac));\n  transition:--n .12s cubic-bezier(.2,.8,.25,1)}\n/* metal cap */\n.cap{position:absolute;top:9px;left:9px;width:42px;height:42px;border-radius:50%;\n  background:radial-gradient(circle at 50% 28%,#454a42 0%,#1d211b 62%,#0d100b 100%);\n  box-shadow:inset 0 2px 5px rgba(255,255,255,.13),inset 0 -5px 12px rgba(0,0,0,.8),0 3px 8px rgba(0,0,0,.55)}\n.cap::before{content:\"\";position:absolute;inset:5px;border-radius:50%;\n  background:repeating-conic-gradient(#262b23 0 9deg,#0e120c 9deg 18deg);opacity:.5}\n/* pointer notch */\n.ptr{position:absolute;top:5px;left:50%;width:3px;height:17px;margin-left:-1.5px;border-radius:3px;\n  background:linear-gradient(var(--ac2),var(--ac));\n  box-shadow:0 0 7px var(--ac),0 0 2px #fff;\n  transform-origin:50% 25px;\n  transform:rotate(calc((var(--n) - .5) * 270deg));\n  transition:transform .12s cubic-bezier(.2,.8,.25,1)}\n.pname{font-size:8.5px;font-weight:800;letter-spacing:.1em;color:#0d1808;\n  background:linear-gradient(var(--ac2),var(--ac));padding:2px 7px;border-radius:999px;\n  text-transform:uppercase;box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 2px 4px rgba(0,0,0,.4);white-space:nowrap}\n.pval{font-size:10.5px;font-weight:800;color:#eefce0;font-variant-numeric:tabular-nums;\n  min-height:13px;text-shadow:0 0 8px rgba(168,224,99,.4)}\n.knob.act .cap{box-shadow:inset 0 2px 5px rgba(255,255,255,.13),inset 0 -5px 12px rgba(0,0,0,.8),0 3px 12px rgba(168,224,99,.55)}\n\n/* patchbay strip / footer */\n.foot{display:flex;align-items:center;justify-content:space-between;margin:16px 4px 0;\n  padding-top:11px;border-top:1px solid rgba(120,220,140,.12)}\n.serial{font-size:7.5px;letter-spacing:.2em;color:#8fbf6f;opacity:.55;text-transform:uppercase}\n.osc{display:flex;align-items:center;gap:6px}\n.osclbl{font-size:7.5px;letter-spacing:.2em;color:#8fbf6f;opacity:.55;text-transform:uppercase}\n.led{width:9px;height:9px;border-radius:50%;\n  background:radial-gradient(circle at 40% 35%,#eaffd8,var(--ac) 50%,#3a5a18 90%);\n  box-shadow:0 0 9px var(--ac)}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"panel\">\n  <span class=\"bolt tl\"><\/span><span class=\"bolt tr\"><\/span>\n  <span class=\"bolt bl\"><\/span><span class=\"bolt br\"><\/span>\n\n  <div class=\"head\">\n    <div class=\"title\">\n      <div class=\"brand\">Dual Sallen-Key VCF<\/div>\n      <h1>Scream Filter<\/h1>\n      <div class=\"sub\">Resonant HP &middot; LP Series<\/div>\n    <\/div>\n    <div class=\"jack\" title=\"Patch in\"><\/div>\n  <\/div>\n\n  <!-- frequency-response window with the screaming resonant peak -->\n  <div class=\"window\">\n    <svg viewBox=\"0 0 340 128\" preserveAspectRatio=\"none\">\n      <defs>\n        <linearGradient id=\"grad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0\" stop-color=\"var(--ac)\" stop-opacity=\"0.9\"/>\n          <stop offset=\"1\" stop-color=\"var(--ac2)\" stop-opacity=\"0\"/>\n        <\/linearGradient>\n      <\/defs>\n      <line class=\"gridln\" x1=\"0\" y1=\"64\" x2=\"340\" y2=\"64\"/>\n      <line class=\"gridln flow\" x1=\"0\" y1=\"32\" x2=\"340\" y2=\"32\"/>\n      <line class=\"gridln flow\" x1=\"0\" y1=\"96\" x2=\"340\" y2=\"96\"/>\n      <line class=\"gridv\" x1=\"85\"  y1=\"0\" x2=\"85\"  y2=\"128\"/>\n      <line class=\"gridv\" x1=\"170\" y1=\"0\" x2=\"170\" y2=\"128\"/>\n      <line class=\"gridv\" x1=\"255\" y1=\"0\" x2=\"255\" y2=\"128\"/>\n      <path id=\"fill\" d=\"\"/>\n      <path id=\"curve\" d=\"\"/>\n      <line id=\"scan\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"128\"/>\n      <circle id=\"peak\" class=\"peakdot\" cx=\"0\" cy=\"0\" r=\"0\"/>\n    <\/svg>\n  <\/div>\n\n  <!-- knob deck -->\n  <div class=\"deck\" id=\"deck\"><\/div>\n\n  <div class=\"foot\">\n    <div class=\"serial\">SK-2 &middot; 8P7SXGP<\/div>\n    <div class=\"osc\"><span class=\"osclbl\">Self-Osc<\/span><span class=\"led\" id=\"oled\"><\/span><\/div>\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"LP Cut\", index:0,min:0,max:1,def:0.85},\n    {name:\"HP Cut\", index:1,min:0,max:1,def:0.12},\n    {name:\"Reso\",   index:2,min:0,max:1,def:0.55},\n    {name:\"Drive\",  index:3,min:0,max:1,def:0.35},\n    {name:\"Mix\",    index:4,min:0,max:1,def:1}\n  ];\n  var state={};\n  var deck=document.getElementById('deck');\n  var curveEl=document.getElementById('curve');\n  var fillEl=document.getElementById('fill');\n  var peakEl=document.getElementById('peak');\n  var scanEl=document.getElementById('scan');\n  var oled=document.getElementById('oled');\n\n  function pct(v){ return Math.round(v*100)+\"%\"; }\n\n  function buildKnob(p,i){\n    var cell=document.createElement('div');\n    cell.className='pot'; cell.style.setProperty('--d',(i*65)+'ms');\n    cell.innerHTML=\n      '<div class=\"knob\" tabindex=\"0\">'+\n        '<i class=\"skirt\"><\/i>'+\n        '<i class=\"arc\"><\/i>'+\n        '<i class=\"cap\"><\/i>'+\n        '<i class=\"ptr\"><\/i>'+\n      '<\/div>'+\n      '<div class=\"pname\">'+p.name+'<\/div>'+\n      '<div class=\"pval\"><\/div>';\n    deck.appendChild(cell);\n\n    var knob=cell.querySelector('.knob');\n    var arc=cell.querySelector('.arc');\n    var ptr=cell.querySelector('.ptr');\n    var val=cell.querySelector('.pval');\n    var v=p.def;\n\n    function norm(){ return (v-p.min)/((p.max-p.min)||1); }\n    function paint(){\n      var nn=norm();\n      arc.style.setProperty('--n',nn);\n      ptr.style.setProperty('--n',nn);\n      val.textContent=pct(nn);\n      state[p.index]=v;\n      if(window.vstai&&window.vstai.setParam) window.vstai.setParam(p.index,v);\n      onChange();\n    }\n    function setNorm(nn){ nn=nn<0?0:nn>1?1:nn; v=p.min+(p.max-p.min)*nn; paint(); }\n\n    var drag=false,startY=0,startN=0;\n    knob.addEventListener('pointerdown',function(e){\n      drag=true;startY=e.clientY;startN=norm();\n      knob.classList.add('act');knob.setPointerCapture(e.pointerId);e.preventDefault();\n    });\n    knob.addEventListener('pointermove',function(e){\n      if(!drag)return;\n      var speed=e.shiftKey?700:230;\n      setNorm(startN+(startY-e.clientY)/speed);\n    });\n    function end(){drag=false;knob.classList.remove('act');}\n    knob.addEventListener('pointerup',end);\n    knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){v=p.def;paint();});\n    knob.addEventListener('wheel',function(e){\n      e.preventDefault();setNorm(norm()+(e.deltaY<0?0.025:-0.025));\n    },{passive:false});\n    knob.addEventListener('keydown',function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){setNorm(norm()+0.02);e.preventDefault();}\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setNorm(norm()-0.02);e.preventDefault();}\n    });\n\n    paint();\n  }\n\n  // ---- live filter response curve with the screaming resonant peak ----\n  // x axis log-freq across the window; HP rolls off lows, LP rolls off highs,\n  // both gain a sharp resonant peak at their corner that grows with Reso.\n  var W=340,H=128,N=160;\n  function onChange(){\n    var lp =state[0]!=null?state[0]:0.85; // LP cutoff norm\n    var hp =state[1]!=null?state[1]:0.12; // HP cutoff norm\n    var res=state[2]!=null?state[2]:0.55;\n    var drv=state[3]!=null?state[3]:0.35;\n    var mix=state[4]!=null?state[4]:1;\n\n    // peak sharpness/height grows with resonance (Q) and a touch of drive\n    var Q=0.6+res*res*22;            // resonance peak gain\n    var pk=1+res*(2.4+drv*1.4);      // visual peak multiplier\n    var pts=[],fillpts=[];\n    var maxY=0,maxX=0;\n    for(var i=0;i<=N;i++){\n      var x=i/N;                     // 0..1 across freq axis\n      // distance to each corner (in normalized freq)\n      var dl=(x-lp), dh=(x-hp);\n      // low-pass magnitude (1 below cutoff, rolls off bute('x1',sx.toFixed(1));\n    scanEl.setAttribute('x2',sx.toFixed(1));\n    var res=state[2]!=null?state[2]:0.55;\n    scanEl.setAttribute('stroke','rgba(168,224,99,'+(0.05+res*0.18).toFixed(3)+')');\n    requestAnimationFrame(loop);\n  }\n  requestAnimationFrame(loop);\n\n  PARAMS.forEach(buildKnob);\n\n  function ready(){ onChange(); }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
