  <title>Bender Fuzz — test bench</title><style>
  :root{--ac:#c8a85a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  document.getElementById('gui').srcdoc="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Bender Fuzz<\/title>\n<style>\n:root{\n  --gold:#c8a85a;\n  --flame:#ff6a3d;\n  --steel:#8b8d8f;\n  --steel-d:#4a4c4e;\n  --ink:#171514;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{height:100%}\nbody{\n  font-family:\"Trebuchet MS\",ui-sans-serif,system-ui,sans-serif;\n  background:radial-gradient(120% 120% at 50% -10%,#23211d 0%,#100f0d 70%);\n  color:#e9e2d2;display:flex;align-items:center;justify-content:center;\n  min-height:100%;padding:18px;overflow:hidden;\n}\n\n/* ---------- the pedal box ---------- */\n.pedal{\n  position:relative;width:340px;border-radius:16px;padding:22px 22px 26px;\n  background:\n    /* hammered-metal speckle */\n    radial-gradient(2px 2px at 12% 18%,rgba(255,255,255,.10),transparent 60%),\n    radial-gradient(2px 2px at 70% 35%,rgba(0,0,0,.28),transparent 60%),\n    radial-gradient(2px 2px at 35% 70%,rgba(255,255,255,.07),transparent 60%),\n    radial-gradient(2px 2px at 85% 80%,rgba(0,0,0,.30),transparent 60%),\n    radial-gradient(3px 3px at 50% 50%,rgba(255,255,255,.05),transparent 60%),\n    linear-gradient(150deg,#9a9b96 0%,#6f706c 38%,#83847f 60%,#56575400 100%),\n    linear-gradient(150deg,#7c7d78,#54554f);\n  background-blend-mode:overlay,overlay,overlay,overlay,overlay,normal,normal;\n  box-shadow:\n    inset 0 2px 0 rgba(255,255,255,.30),\n    inset 0 -5px 14px rgba(0,0,0,.55),\n    0 22px 40px rgba(0,0,0,.6),\n    0 2px 0 rgba(0,0,0,.4);\n  border:1px solid #3c3d39;\n}\n/* corner bolts */\n.bolt{position:absolute;width:13px;height:13px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%,#e7e3d6,#6b6c66 60%,#3a3b37);\n  box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 1px 2px rgba(0,0,0,.7);}\n.bolt::after{content:\"\";position:absolute;inset:4px;border-top:1.5px solid rgba(0,0,0,.45);transform:rotate(35deg)}\n.bolt.tl{top:8px;left:8px}.bolt.tr{top:8px;right:8px}\n.bolt.bl{bottom:8px;left:8px}.bolt.br{bottom:8px;right:8px}\n\n.brand{text-align:center;margin-bottom:6px}\n.brand h1{\n  font-family:Georgia,\"Times New Roman\",serif;font-style:italic;\n  font-size:30px;letter-spacing:1px;line-height:1;\n  background:linear-gradient(180deg,#f6e6b4,var(--gold) 55%,#8a6f2e);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 2px 1px rgba(0,0,0,.4);filter:drop-shadow(0 1px 0 rgba(0,0,0,.5));\n}\n.brand .sub{font-size:9px;letter-spacing:4px;color:#cfc7b2;\n  text-transform:uppercase;margin-top:3px;opacity:.8}\n\n/* ---------- waveform window ---------- */\n.scope{\n  position:relative;margin:12px 4px 16px;height:96px;border-radius:8px;\n  background:linear-gradient(180deg,#0c0b0a,#1a1714);\n  box-shadow:inset 0 0 0 2px #2c2924,inset 0 6px 16px rgba(0,0,0,.8),\n    inset 0 0 22px rgba(255,106,61,.05);\n  overflow:hidden;\n}\n.scope svg{display:block;width:100%;height:100%}\n.scope .glass{position:absolute;inset:0;pointer-events:none;\n  background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 30%,transparent 70%,rgba(0,0,0,.25));}\n\n/* ---------- knobs ---------- */\n.knobs{display:grid;grid-template-columns:1fr 1fr;gap:14px 10px;margin:2px 6px 4px}\n.cell{display:flex;flex-direction:column;align-items:center;gap:6px;\n  padding:8px 4px 6px;border-radius:10px;\n  background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.32));\n  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -2px 6px rgba(0,0,0,.4);}\n.dial{position:relative;width:84px;height:84px;cursor:ns-resize;touch-action:none}\n.dial svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}\n\n/* chicken-head pointer */\n.chicken{transition:filter .15s}\n.dial:hover .chicken{filter:drop-shadow(0 0 5px var(--flame))}\n.dial.drag .chicken{filter:drop-shadow(0 0 9px var(--flame))}\n\n.label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#cfc7b2}\n.val{font:600 11px ui-monospace,Menlo,monospace;color:var(--gold);\n  background:rgba(0,0,0,.4);padding:1px 7px;border-radius:5px;\n  box-shadow:inset 0 0 0 1px rgba(200,168,90,.25)}\n\n/* footswitch + LED */\n.footrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}\n.led{width:13px;height:13px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%,#ffd9c4,var(--flame) 55%,#7a1d05);\n  box-shadow:0 0 10px var(--flame),0 0 22px rgba(255,106,61,.5),inset 0 -1px 2px rgba(0,0,0,.5);\n  animation:led 1.6s ease-in-out infinite}\n@keyframes led{0%,100%{opacity:.55;box-shadow:0 0 6px var(--flame)}\n  50%{opacity:1;box-shadow:0 0 14px var(--flame),0 0 26px rgba(255,106,61,.6)}}\n.stomp{width:54px;height:54px;border-radius:50%;\n  background:radial-gradient(circle at 38% 30%,#d9dad4,#9b9c96 50%,#5f605b 80%,#3c3d39);\n  box-shadow:inset 0 2px 2px rgba(255,255,255,.5),inset 0 -4px 8px rgba(0,0,0,.6),0 4px 8px rgba(0,0,0,.5);\n  border:2px solid #34352f}\n.tag{font-size:8px;letter-spacing:3px;color:#b8b1a0;text-transform:uppercase;opacity:.7}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"pedal\">\n  <span class=\"bolt tl\"><\/span><span class=\"bolt tr\"><\/span>\n  <span class=\"bolt bl\"><\/span><span class=\"bolt br\"><\/span>\n\n  <div class=\"brand\">\n    <h1>Bender&nbsp;Fuzz<\/h1>\n    <div class=\"sub\">Gated&nbsp;&middot;&nbsp;Germanium&nbsp;&middot;&nbsp;MkII<\/div>\n  <\/div>\n\n  <div class=\"scope\">\n    <svg viewBox=\"0 0 320 96\" preserveAspectRatio=\"none\">\n      <defs>\n        <linearGradient id=\"wgrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0\" stop-color=\"#ffd6a0\"/>\n          <stop offset=\"0.5\" stop-color=\"var(--flame)\"/>\n          <stop offset=\"1\" stop-color=\"#c8a85a\"/>\n        <\/linearGradient>\n      <\/defs>\n      <path id=\"wave\" fill=\"none\" stroke=\"url(#wgrad)\" stroke-width=\"2.2\"\n            stroke-linejoin=\"round\" stroke-linecap=\"round\"\n            style=\"filter:drop-shadow(0 0 4px rgba(255,106,61,.6))\"/>\n    <\/svg>\n    <div class=\"glass\"><\/div>\n  <\/div>\n\n  <div class=\"knobs\" id=\"knobs\"><\/div>\n\n  <div class=\"footrow\">\n    <span class=\"led\"><\/span>\n    <div class=\"stomp\"><\/div>\n    <span class=\"tag\">true&nbsp;bypass<\/span>\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- host bridge ---------------------------------------------------\n  var host = (window.vstai && typeof window.vstai.setParam === \"function\")\n    ? window.vstai : { setParam:function(){}, onReady:null };\n\n  var PARAMS = [\n    { name:\"Fuzz\",  index:0, min:0, max:1, def:0.7  },\n    { name:\"Gate\",  index:1, min:0, max:1, def:0.4  },\n    { name:\"Tone\",  index:2, min:0, max:1, def:0.55 },\n    { name:\"Level\", index:3, min:0, max:1, def:0.5  }\n  ];\n  var state = {}; // index -> normalized 0..1\n\n  // ---- knob rendering ------------------------------------------------\n  var SWEEP = 270, START = -135; // degrees\n  function knobSVG(){\n    return ''+\n      '<svg viewBox=\"0 0 100 100\">'+\n        // base body\n        '<circle cx=\"50\" cy=\"50\" r=\"34\" fill=\"#1c1a18\" stroke=\"#000\" stroke-width=\"2\"/>'+\n        '<circle cx=\"50\" cy=\"50\" r=\"34\" fill=\"none\" stroke=\"rgba(255,255,255,.06)\" stroke-width=\"1\"/>'+\n        // tick ring\n        '<g class=\"ticks\" stroke=\"#7a766b\" stroke-width=\"1.4\"><\/g>'+\n        // active arc\n        '<path class=\"arc\" fill=\"none\" stroke=\"#ff6a3d\" stroke-width=\"3.2\" stroke-linecap=\"round\"'+\n        ' style=\"filter:drop-shadow(0 0 3px rgba(255,106,61,.7))\"/>'+\n        // chicken-head knob\n        '<g class=\"chicken\">'+\n          '<circle cx=\"50\" cy=\"50\" r=\"22\" fill=\"url(#kbody)\"/>'+\n          '<path d=\"M50 50 L50 18 L57 30 L50 26 L43 30 Z\" fill=\"#161412\"'+\n          ' stroke=\"#000\" stroke-width=\"1\"/>'+\n          '<circle cx=\"50\" cy=\"50\" r=\"6\" fill=\"#0d0c0b\" stroke=\"#000\"/>'+\n        '<\/g>'+\n        '<defs>'+\n          '<radialGradient id=\"kbody\" cx=\"40%\" cy=\"32%\" r=\"75%\">'+\n            '<stop offset=\"0\" stop-color=\"#3a3631\"/>'+\n            '<stop offset=\"0.6\" stop-color=\"#211e1b\"/>'+\n            '<stop offset=\"1\" stop-color=\"#0e0d0c\"/>'+\n          '<\/radialGradient>'+\n        '<\/defs>'+\n      '<\/svg>';\n  }\n\n  function polar(cx,cy,r,deg){\n    var a=(deg-90)*Math.PI/180;\n    return [cx+r*Math.cos(a), cy+r*Math.sin(a)];\n  }\n  function arcPath(cx,cy,r,a0,a1){\n    var p0=polar(cx,cy,r,a0), p1=polar(cx,cy,r,a1);\n    var large=(a1-a0)>180?1:0;\n    return 'M'+p0[0].toFixed(2)+' '+p0[1].toFixed(2)+\n           ' A'+r+' '+r+' 0 '+large+' 1 '+p1[0].toFixed(2)+' '+p1[1].toFixed(2);\n  }\n\n  function buildTicks(g){\n    var html='';\n    for(var i=0;i<=10;i++){\n      var deg=START+SWEEP*(i/10);\n      var a=polar(50,50,30,deg), b=polar(50,50,(i%5===0?35:33),deg);\n      html+='<line x1=\"'+a[0].toFixed(1)+'\" y1=\"'+a[1].toFixed(1)+\n            '\" x2=\"'+b[0].toFixed(1)+'\" y2=\"'+b[1].toFixed(1)+'\"/>';\n    }\n    g.innerHTML=html;\n  }\n\n  function render(cell){\n    var p=cell._p, v=state[p.index];\n    var deg=START+SWEEP*v;\n    cell._chick.setAttribute('transform','rotate('+deg+' 50 50)');\n    cell._arc.setAttribute('d', arcPath(50,50,30,START, START+SWEEP*Math.max(0.0001,v)));\n    cell._val.textContent=Math.round(v*100);\n  }\n\n  function commit(p,v){\n    v=Math.max(0,Math.min(1,v));\n    state[p.index]=v;\n    host.setParam(p.index, p.min + (p.max-p.min)*v); // real value\n  }\n\n  // ---- build cells ---------------------------------------------------\n  var root=document.getElementById('knobs');\n  PARAMS.forEach(function(p){\n    state[p.index]=p.def;\n    var cell=document.createElement('div'); cell.className='cell';\n    var dial=document.createElement('div'); dial.className='dial';\n    dial.innerHTML=knobSVG();\n    var label=document.createElement('div'); label.className='label'; label.textContent=p.name;\n    var val=document.createElement('div'); val.className='val';\n    cell.appendChild(dial); cell.appendChild(label); cell.appendChild(val);\n    root.appendChild(cell);\n\n    cell._p=p;\n    cell._chick=dial.querySelector('.chicken');\n    cell._arc=dial.querySelector('.arc');\n    cell._val=val;\n    buildTicks(dial.querySelector('.ticks'));\n    render(cell);\n\n    // ---- interactions ----\n    var dragging=false, lastY=0;\n    function down(e){\n      dragging=true; dial.classList.add('drag');\n      lastY=(e.touches?e.touches[0].clientY:e.clientY);\n      e.preventDefault();\n      window.addEventListener('mousemove',move);\n      window.addEventListener('mouseup',up);\n      window.addEventListener('touchmove',move,{passive:false});\n      window.addEventListener('touchend',up);\n    }\n    function move(e){\n      if(!dragging)return;\n      var y=(e.touches?e.touches[0].clientY:e.clientY);\n      var dy=lastY-y; lastY=y;\n      var step=(e.shiftKey?0.0015:0.005);\n      commit(p, state[p.index]+dy*step);\n      render(cell); e.preventDefault();\n    }\n    function up(){\n      dragging=false; dial.classList.remove('drag');\n      window.removeEventListener('mousemove',move);\n      window.removeEventListener('mouseup',up);\n      window.removeEventListener('touchmove',move);\n      window.removeEventListener('touchend',up);\n    }\n    dial.addEventListener('mousedown',down);\n    dial.addEventListener('touchstart',down,{passive:false});\n    dial.addEventListener('wheel',function(e){\n      commit(p, state[p.index] - Math.sign(e.deltaY)*0.03);\n      render(cell); e.preventDefault();\n    },{passive:false});\n    dial.addEventListener('dblclick',function(){\n      commit(p,p.def); render(cell);\n    });\n  });\n\n  // push initial defaults to host\n  PARAMS.forEach(function(p){ host.setParam(p.index, p.min+(p.max-p.min)*p.def); });\n\n  // ---- animated ragged / gated clipping waveform ---------------------\n  var wave=document.getElementById('wave');\n  var W=320,H=96,MID=H/2;\n  var t=0;\n  function rand(seed){ // deterministic-ish jitter per frame\n    var x=Math.sin(seed*12.9898)*43758.5453; return x-Math.floor(x);\n  }\n  function frame(){\n    t+=0.045;\n    var fuzz=state[0], gate=state[1], tone=state[2];\n    var pts=[], N=96;\n    // gate phase: a slow \"note decay\" envelope that periodically chokes\n    var phase=(t*0.5)%1;               // 0..1 note cycle\n    var decay=Math.exp(-phase*3.0);    // amplitude decays across the note\n    // gate threshold: as Gate rises, output cuts off earlier (staccato)\n    var cut=decay > (0.08+gate*0.55);  // boolean: is the gate open?\n    var amp=cut ? decay : decay*0.06;  // ragged collapse when gated shut\n    for(var i=0;i<=N;i++){\n      var u=i/N, x=u*W;\n      // base oscillation, denser/harder with Fuzz\n      var freq=4+fuzz*8;\n      var s=Math.sin(u*freq*Math.PI*2 + t*4);\n      // square it up into a fuzzy wall (hard clip grows with Fuzz)\n      var clip=1.2+ (1-fuzz)*2.5;\n      s=Math.max(-1,Math.min(1,s*clip));\n      // torn / ragged edge: high-freq jitter, more when gating spits\n      var grit=(rand(i*1.7+Math.floor(t*30))-0.5)*(0.10+gate*0.35*(cut?1:1.6));\n      // brightness adds fizzy high partials\n      s+= Math.sin(u*freq*5*Math.PI*2 + t*9)*0.18*tone;\n      s=s*0.42*amp + grit*amp;\n      var y=MID - s*MID*0.92;\n      pts.push(x.toFixed(1)+' '+y.toFixed(1));\n    }\n    wave.setAttribute('d','M'+pts.join(' L'));\n    // dim the trace when gated shut for visible cut-off\n    wave.style.opacity = cut ? '1' : '0.28';\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n\n  // ---- ready hook ----------------------------------------------------\n  if(host.onReady && typeof host.onReady===\"function\"){\n    host.onReady(function(){\n      PARAMS.forEach(function(p){ host.setParam(p.index, p.min+(p.max-p.min)*p.def); });\n    });\n  }\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,440*Math.pow(2,(d.id-69)/12),d.v==null?0.9:d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }

    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}

  async function ensure(){

    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);

    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);

      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);

  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){

    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){

      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
