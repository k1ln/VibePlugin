<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bender Fuzz</title>
<style>
:root{
  --gold:#c8a85a;
  --flame:#ff6a3d;
  --steel:#8b8d8f;
  --steel-d:#4a4c4e;
  --ink:#171514;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Trebuchet MS",ui-sans-serif,system-ui,sans-serif;
  background:radial-gradient(120% 120% at 50% -10%,#23211d 0%,#100f0d 70%);
  color:#e9e2d2;display:flex;align-items:center;justify-content:center;
  min-height:100%;padding:18px;overflow:hidden;
}

/* ---------- the pedal box ---------- */
.pedal{
  position:relative;width:340px;border-radius:16px;padding:22px 22px 26px;
  background:
    /* hammered-metal speckle */
    radial-gradient(2px 2px at 12% 18%,rgba(255,255,255,.10),transparent 60%),
    radial-gradient(2px 2px at 70% 35%,rgba(0,0,0,.28),transparent 60%),
    radial-gradient(2px 2px at 35% 70%,rgba(255,255,255,.07),transparent 60%),
    radial-gradient(2px 2px at 85% 80%,rgba(0,0,0,.30),transparent 60%),
    radial-gradient(3px 3px at 50% 50%,rgba(255,255,255,.05),transparent 60%),
    linear-gradient(150deg,#9a9b96 0%,#6f706c 38%,#83847f 60%,#56575400 100%),
    linear-gradient(150deg,#7c7d78,#54554f);
  background-blend-mode:overlay,overlay,overlay,overlay,overlay,normal,normal;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.30),
    inset 0 -5px 14px rgba(0,0,0,.55),
    0 22px 40px rgba(0,0,0,.6),
    0 2px 0 rgba(0,0,0,.4);
  border:1px solid #3c3d39;
}
/* corner bolts */
.bolt{position:absolute;width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#e7e3d6,#6b6c66 60%,#3a3b37);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 1px 2px rgba(0,0,0,.7);}
.bolt::after{content:"";position:absolute;inset:4px;border-top:1.5px solid rgba(0,0,0,.45);transform:rotate(35deg)}
.bolt.tl{top:8px;left:8px}.bolt.tr{top:8px;right:8px}
.bolt.bl{bottom:8px;left:8px}.bolt.br{bottom:8px;right:8px}

.brand{text-align:center;margin-bottom:6px}
.brand h1{
  font-family:Georgia,"Times New Roman",serif;font-style:italic;
  font-size:30px;letter-spacing:1px;line-height:1;
  background:linear-gradient(180deg,#f6e6b4,var(--gold) 55%,#8a6f2e);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 1px rgba(0,0,0,.4);filter:drop-shadow(0 1px 0 rgba(0,0,0,.5));
}
.brand .sub{font-size:9px;letter-spacing:4px;color:#cfc7b2;
  text-transform:uppercase;margin-top:3px;opacity:.8}

/* ---------- waveform window ---------- */
.scope{
  position:relative;margin:12px 4px 16px;height:96px;border-radius:8px;
  background:linear-gradient(180deg,#0c0b0a,#1a1714);
  box-shadow:inset 0 0 0 2px #2c2924,inset 0 6px 16px rgba(0,0,0,.8),
    inset 0 0 22px rgba(255,106,61,.05);
  overflow:hidden;
}
.scope svg{display:block;width:100%;height:100%}
.scope .glass{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 30%,transparent 70%,rgba(0,0,0,.25));}

/* ---------- knobs ---------- */
.knobs{display:grid;grid-template-columns:1fr 1fr;gap:14px 10px;margin:2px 6px 4px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:8px 4px 6px;border-radius:10px;
  background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.32));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 -2px 6px rgba(0,0,0,.4);}
.dial{position:relative;width:84px;height:84px;cursor:ns-resize;touch-action:none}
.dial svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}

/* chicken-head pointer */
.chicken{transition:filter .15s}
.dial:hover .chicken{filter:drop-shadow(0 0 5px var(--flame))}
.dial.drag .chicken{filter:drop-shadow(0 0 9px var(--flame))}

.label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#cfc7b2}
.val{font:600 11px ui-monospace,Menlo,monospace;color:var(--gold);
  background:rgba(0,0,0,.4);padding:1px 7px;border-radius:5px;
  box-shadow:inset 0 0 0 1px rgba(200,168,90,.25)}

/* footswitch + LED */
.footrow{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
.led{width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffd9c4,var(--flame) 55%,#7a1d05);
  box-shadow:0 0 10px var(--flame),0 0 22px rgba(255,106,61,.5),inset 0 -1px 2px rgba(0,0,0,.5);
  animation:led 1.6s ease-in-out infinite}
@keyframes led{0%,100%{opacity:.55;box-shadow:0 0 6px var(--flame)}
  50%{opacity:1;box-shadow:0 0 14px var(--flame),0 0 26px rgba(255,106,61,.6)}}
.stomp{width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle at 38% 30%,#d9dad4,#9b9c96 50%,#5f605b 80%,#3c3d39);
  box-shadow:inset 0 2px 2px rgba(255,255,255,.5),inset 0 -4px 8px rgba(0,0,0,.6),0 4px 8px rgba(0,0,0,.5);
  border:2px solid #34352f}
.tag{font-size:8px;letter-spacing:3px;color:#b8b1a0;text-transform:uppercase;opacity:.7}
</style>
</head>
<body>
<div class="pedal">
  <span class="bolt tl"></span><span class="bolt tr"></span>
  <span class="bolt bl"></span><span class="bolt br"></span>

  <div class="brand">
    <h1>Bender&nbsp;Fuzz</h1>
    <div class="sub">Gated&nbsp;&middot;&nbsp;Germanium&nbsp;&middot;&nbsp;MkII</div>
  </div>

  <div class="scope">
    <svg viewBox="0 0 320 96" preserveAspectRatio="none">
      <defs>
        <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffd6a0"/>
          <stop offset="0.5" stop-color="var(--flame)"/>
          <stop offset="1" stop-color="#c8a85a"/>
        </linearGradient>
      </defs>
      <path id="wave" fill="none" stroke="url(#wgrad)" stroke-width="2.2"
            stroke-linejoin="round" stroke-linecap="round"
            style="filter:drop-shadow(0 0 4px rgba(255,106,61,.6))"/>
    </svg>
    <div class="glass"></div>
  </div>

  <div class="knobs" id="knobs"></div>

  <div class="footrow">
    <span class="led"></span>
    <div class="stomp"></div>
    <span class="tag">true&nbsp;bypass</span>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---- host bridge ---------------------------------------------------
  var host = (window.vstai && typeof window.vstai.setParam === "function")
    ? window.vstai : { setParam:function(){}, onReady:null };

  var PARAMS = [
    { name:"Fuzz",  index:0, min:0, max:1, def:0.7  },
    { name:"Gate",  index:1, min:0, max:1, def:0.4  },
    { name:"Tone",  index:2, min:0, max:1, def:0.55 },
    { name:"Level", index:3, min:0, max:1, def:0.5  }
  ];
  var state = {}; // index -> normalized 0..1

  // ---- knob rendering ------------------------------------------------
  var SWEEP = 270, START = -135; // degrees
  function knobSVG(){
    return ''+
      '<svg viewBox="0 0 100 100">'+
        // base body
        '<circle cx="50" cy="50" r="34" fill="#1c1a18" stroke="#000" stroke-width="2"/>'+
        '<circle cx="50" cy="50" r="34" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>'+
        // tick ring
        '<g class="ticks" stroke="#7a766b" stroke-width="1.4"></g>'+
        // active arc
        '<path class="arc" fill="none" stroke="#ff6a3d" stroke-width="3.2" stroke-linecap="round"'+
        ' style="filter:drop-shadow(0 0 3px rgba(255,106,61,.7))"/>'+
        // chicken-head knob
        '<g class="chicken">'+
          '<circle cx="50" cy="50" r="22" fill="url(#kbody)"/>'+
          '<path d="M50 50 L50 18 L57 30 L50 26 L43 30 Z" fill="#161412"'+
          ' stroke="#000" stroke-width="1"/>'+
          '<circle cx="50" cy="50" r="6" fill="#0d0c0b" stroke="#000"/>'+
        '</g>'+
        '<defs>'+
          '<radialGradient id="kbody" cx="40%" cy="32%" r="75%">'+
            '<stop offset="0" stop-color="#3a3631"/>'+
            '<stop offset="0.6" stop-color="#211e1b"/>'+
            '<stop offset="1" stop-color="#0e0d0c"/>'+
          '</radialGradient>'+
        '</defs>'+
      '</svg>';
  }

  function polar(cx,cy,r,deg){
    var a=(deg-90)*Math.PI/180;
    return [cx+r*Math.cos(a), cy+r*Math.sin(a)];
  }
  function arcPath(cx,cy,r,a0,a1){
    var p0=polar(cx,cy,r,a0), p1=polar(cx,cy,r,a1);
    var large=(a1-a0)>180?1:0;
    return 'M'+p0[0].toFixed(2)+' '+p0[1].toFixed(2)+
           ' A'+r+' '+r+' 0 '+large+' 1 '+p1[0].toFixed(2)+' '+p1[1].toFixed(2);
  }

  function buildTicks(g){
    var html='';
    for(var i=0;i<=10;i++){
      var deg=START+SWEEP*(i/10);
      var a=polar(50,50,30,deg), b=polar(50,50,(i%5===0?35:33),deg);
      html+='<line x1="'+a[0].toFixed(1)+'" y1="'+a[1].toFixed(1)+
            '" x2="'+b[0].toFixed(1)+'" y2="'+b[1].toFixed(1)+'"/>';
    }
    g.innerHTML=html;
  }

  function render(cell){
    var p=cell._p, v=state[p.index];
    var deg=START+SWEEP*v;
    cell._chick.setAttribute('transform','rotate('+deg+' 50 50)');
    cell._arc.setAttribute('d', arcPath(50,50,30,START, START+SWEEP*Math.max(0.0001,v)));
    cell._val.textContent=Math.round(v*100);
  }

  function commit(p,v){
    v=Math.max(0,Math.min(1,v));
    state[p.index]=v;
    host.setParam(p.index, p.min + (p.max-p.min)*v); // real value
  }

  // ---- build cells ---------------------------------------------------
  var root=document.getElementById('knobs');
  PARAMS.forEach(function(p){
    state[p.index]=p.def;
    var cell=document.createElement('div'); cell.className='cell';
    var dial=document.createElement('div'); dial.className='dial';
    dial.innerHTML=knobSVG();
    var label=document.createElement('div'); label.className='label'; label.textContent=p.name;
    var val=document.createElement('div'); val.className='val';
    cell.appendChild(dial); cell.appendChild(label); cell.appendChild(val);
    root.appendChild(cell);

    cell._p=p;
    cell._chick=dial.querySelector('.chicken');
    cell._arc=dial.querySelector('.arc');
    cell._val=val;
    buildTicks(dial.querySelector('.ticks'));
    render(cell);

    // ---- interactions ----
    var dragging=false, lastY=0;
    function down(e){
      dragging=true; dial.classList.add('drag');
      lastY=(e.touches?e.touches[0].clientY:e.clientY);
      e.preventDefault();
      window.addEventListener('mousemove',move);
      window.addEventListener('mouseup',up);
      window.addEventListener('touchmove',move,{passive:false});
      window.addEventListener('touchend',up);
    }
    function move(e){
      if(!dragging)return;
      var y=(e.touches?e.touches[0].clientY:e.clientY);
      var dy=lastY-y; lastY=y;
      var step=(e.shiftKey?0.0015:0.005);
      commit(p, state[p.index]+dy*step);
      render(cell); e.preventDefault();
    }
    function up(){
      dragging=false; dial.classList.remove('drag');
      window.removeEventListener('mousemove',move);
      window.removeEventListener('mouseup',up);
      window.removeEventListener('touchmove',move);
      window.removeEventListener('touchend',up);
    }
    dial.addEventListener('mousedown',down);
    dial.addEventListener('touchstart',down,{passive:false});
    dial.addEventListener('wheel',function(e){
      commit(p, state[p.index] - Math.sign(e.deltaY)*0.03);
      render(cell); e.preventDefault();
    },{passive:false});
    dial.addEventListener('dblclick',function(){
      commit(p,p.def); render(cell);
    });
  });

  // push initial defaults to host
  PARAMS.forEach(function(p){ host.setParam(p.index, p.min+(p.max-p.min)*p.def); });

  // ---- animated ragged / gated clipping waveform ---------------------
  var wave=document.getElementById('wave');
  var W=320,H=96,MID=H/2;
  var t=0;
  function rand(seed){ // deterministic-ish jitter per frame
    var x=Math.sin(seed*12.9898)*43758.5453; return x-Math.floor(x);
  }
  function frame(){
    t+=0.045;
    var fuzz=state[0], gate=state[1], tone=state[2];
    var pts=[], N=96;
    // gate phase: a slow "note decay" envelope that periodically chokes
    var phase=(t*0.5)%1;               // 0..1 note cycle
    var decay=Math.exp(-phase*3.0);    // amplitude decays across the note
    // gate threshold: as Gate rises, output cuts off earlier (staccato)
    var cut=decay > (0.08+gate*0.55);  // boolean: is the gate open?
    var amp=cut ? decay : decay*0.06;  // ragged collapse when gated shut
    for(var i=0;i<=N;i++){
      var u=i/N, x=u*W;
      // base oscillation, denser/harder with Fuzz
      var freq=4+fuzz*8;
      var s=Math.sin(u*freq*Math.PI*2 + t*4);
      // square it up into a fuzzy wall (hard clip grows with Fuzz)
      var clip=1.2+ (1-fuzz)*2.5;
      s=Math.max(-1,Math.min(1,s*clip));
      // torn / ragged edge: high-freq jitter, more when gating spits
      var grit=(rand(i*1.7+Math.floor(t*30))-0.5)*(0.10+gate*0.35*(cut?1:1.6));
      // brightness adds fizzy high partials
      s+= Math.sin(u*freq*5*Math.PI*2 + t*9)*0.18*tone;
      s=s*0.42*amp + grit*amp;
      var y=MID - s*MID*0.92;
      pts.push(x.toFixed(1)+' '+y.toFixed(1));
    }
    wave.setAttribute('d','M'+pts.join(' L'));
    // dim the trace when gated shut for visible cut-off
    wave.style.opacity = cut ? '1' : '0.28';
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- ready hook ----------------------------------------------------
  if(host.onReady && typeof host.onReady==="function"){
    host.onReady(function(){
      PARAMS.forEach(function(p){ host.setParam(p.index, p.min+(p.max-p.min)*p.def); });
    });
  }
})();
</script>
</body>
</html>
