<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pocket Tone</title>
<style>
  @property --glow { syntax: '<number>'; inherits: false; initial-value: 0; }

  :root {
    --ac:  #ff5a9e;          /* pink accent  */
    --ac2: #43d6ff;          /* cyan accent  */
    --case:  #c9c8c2;        /* grey gadget body */
    --case2: #aeaca4;
    --case3: #8d8b83;
    --ink:   #2a2a28;
    --lcd:   #b7c6a0;        /* olive LCD glass */
    --lcd2:  #9fb085;
    --lcdink:#1d2614;
    --rubber: #d7d6cf;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, #2c2f36 0%, #16181d 55%, #0b0c0f 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 18px; min-height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------------- the gadget chassis ---------------- */
  .gadget {
    position: relative;
    width: 100%; max-width: 440px;
    border-radius: 20px 20px 26px 26px;
    padding: 16px 16px 20px;
    background:
      linear-gradient(155deg, #e2e1da 0%, var(--case) 26%, var(--case2) 74%, var(--case3) 100%);
    box-shadow:
      0 30px 60px rgba(0,0,0,.55),
      0 2px 0 rgba(255,255,255,.7) inset,
      0 -6px 18px rgba(0,0,0,.28) inset,
      0 0 0 1px rgba(0,0,0,.25);
    animation: drop .6s cubic-bezier(.2,.9,.25,1) both;
  }
  @keyframes drop { from { opacity: 0; transform: translateY(20px) scale(.97); } to { opacity: 1; transform: none; } }

  /* moulded speaker grille dots, top-right */
  .grille {
    position: absolute; top: 18px; right: 18px;
    width: 54px; height: 30px; opacity: .55;
    background-image: radial-gradient(circle, rgba(0,0,0,.4) 1px, transparent 1.4px);
    background-size: 7px 7px;
    border-radius: 4px;
  }

  /* ---------------- brand header ---------------- */
  .head { display: flex; align-items: flex-end; gap: 8px; padding: 2px 4px 12px; }
  .logo {
    display: flex; flex-direction: column; line-height: 1;
  }
  .logo .mk {
    font-size: 8px; letter-spacing: .4em; font-weight: 800;
    color: #5d5c56; text-transform: uppercase;
  }
  .logo h1 {
    margin: 3px 0 0; font-size: 22px; font-weight: 900; letter-spacing: -.01em;
    color: #1f1f1d;
    text-shadow: 0 1px 0 rgba(255,255,255,.6);
  }
  .logo h1 b { color: var(--ac); }
  .logo h1 i { color: var(--ac2); font-style: normal; }
  .model {
    margin-left: auto; align-self: flex-start;
    font-size: 8.5px; font-weight: 800; letter-spacing: .22em;
    color: #44433e; padding: 3px 7px; border-radius: 5px;
    background: linear-gradient(180deg, #d9d8d1, #bfbeb6);
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 1px 2px rgba(0,0,0,.25);
  }

  /* ---------------- LCD screen ---------------- */
  .lcd {
    position: relative; border-radius: 9px; padding: 12px 14px 10px;
    background: linear-gradient(180deg, var(--lcd) 0%, var(--lcd2) 100%);
    box-shadow:
      0 2px 0 rgba(255,255,255,.5),
      0 0 0 3px #6f6e66,
      0 0 0 4px rgba(0,0,0,.3),
      0 6px 10px rgba(0,0,0,.25) inset;
    overflow: hidden;
  }
  /* glass reflection sweep */
  .lcd::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(120deg, rgba(255,255,255,.35) 0%, transparent 35%);
    mix-blend-mode: screen; opacity: .5;
  }
  .lcd-top { display: flex; align-items: center; justify-content: space-between; }
  .lcd-voice {
    font-size: 13px; font-weight: 800; letter-spacing: .12em;
    color: var(--lcdink); text-transform: uppercase;
    font-variant-numeric: tabular-nums;
  }
  .lcd-readout {
    font-size: 9px; font-weight: 700; letter-spacing: .08em;
    color: #3a4a26; min-height: 11px;
    font-variant-numeric: tabular-nums;
  }
  /* the blocky waveform window */
  .scope { display: block; width: 100%; height: 46px; margin-top: 7px; }
  .scope rect.bg { fill: transparent; }

  /* tiny LCD segment-ish note string */
  .lcd-notes {
    margin-top: 5px; font-size: 8px; letter-spacing: .14em;
    color: #46582c; font-weight: 700; min-height: 10px;
    font-variant-numeric: tabular-nums; opacity: .85;
  }

  /* ---------------- control rows ---------------- */
  .panel { margin-top: 14px; }

  .row-label {
    font-size: 8px; letter-spacing: .26em; font-weight: 800;
    color: #5a5952; text-transform: uppercase; margin: 0 2px 6px;
  }

  /* voice selector pads */
  .voices { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
  .vpad {
    position: relative; cursor: pointer; user-select: none;
    border: 0; border-radius: 9px; padding: 9px 2px 7px;
    background: linear-gradient(180deg, var(--rubber), #b9b8b0);
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 -2px 4px rgba(0,0,0,.18) inset,
      0 3px 5px rgba(0,0,0,.28);
    transition: transform .07s ease, box-shadow .15s ease, background .2s ease;
    text-align: center;
  }
  .vpad .num {
    display: block; font-size: 13px; font-weight: 900; color: #3a3a36;
    font-variant-numeric: tabular-nums;
  }
  .vpad .nm {
    display: block; font-size: 7px; letter-spacing: .08em; font-weight: 800;
    color: #6a6962; text-transform: uppercase; margin-top: 2px;
  }
  .vpad:hover { transform: translateY(-1px); }
  .vpad:active { transform: translateY(1px); box-shadow: 0 1px 2px rgba(0,0,0,.3) inset; }
  .vpad.on {
    background: linear-gradient(180deg, var(--ac), #e0407f);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.35) inset,
      0 0 14px rgba(255,90,158,calc(.5 + var(--glow) * .4)),
      0 3px 6px rgba(0,0,0,.3);
    animation: padlit .5s ease;
  }
  .vpad.on .num, .vpad.on .nm { color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
  @keyframes padlit { 0% { --glow: 1; } 100% { --glow: 0; } }

  /* knob bank */
  .knobs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 14px; }
  .knob-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .knob {
    width: 56px; height: 56px; cursor: ns-resize; touch-action: none;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.3));
  }
  .knob:focus { outline: none; }
  .knob .face { transition: filter .15s ease; }
  .knob:hover .face { filter: brightness(1.06); }
  .k-name {
    font-size: 7.5px; letter-spacing: .14em; font-weight: 800;
    color: #5a5952; text-transform: uppercase;
  }
  .k-val {
    font-size: 9px; font-weight: 800; color: #34332f;
    font-variant-numeric: tabular-nums; min-width: 30px; text-align: center;
  }

  /* ---------------- mini keyboard ---------------- */
  .kb-wrap { margin-top: 16px; }
  .keys {
    position: relative; display: flex; height: 92px;
    border-radius: 8px; padding: 6px 6px 0;
    background: linear-gradient(180deg, #6f6e66, #4d4c46);
    box-shadow: 0 2px 5px rgba(0,0,0,.4) inset, 0 1px 0 rgba(255,255,255,.4);
  }
  .key {
    position: relative; flex: 1; margin: 0 1.5px; cursor: pointer;
    border-radius: 0 0 5px 5px; user-select: none; -webkit-user-select: none;
    background: linear-gradient(180deg, #fbfbf7 0%, #ececdf 100%);
    box-shadow: 0 1px 0 rgba(255,255,255,.9) inset, 0 4px 5px rgba(0,0,0,.3);
    transition: background .06s ease, transform .06s ease;
  }
  .key.black {
    position: absolute; top: 6px; width: 8.3%; height: 56px; z-index: 3;
    margin: 0; border-radius: 0 0 4px 4px;
    background: linear-gradient(180deg, #2c2c28 0%, #444 100%);
    box-shadow: 0 3px 4px rgba(0,0,0,.5);
  }
  .key.down {
    background: linear-gradient(180deg, var(--ac2) 0%, #2bb6e0 100%);
    transform: translateY(1px);
  }
  .key.black.down {
    background: linear-gradient(180deg, var(--ac) 0%, #d63f7e 100%);
  }

  .hint {
    margin-top: 9px; text-align: center; font-size: 8px; letter-spacing: .18em;
    font-weight: 700; color: #57564f; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="gadget" role="application" aria-label="Pocket Tone synth">
    <div class="grille"></div>

    <div class="head">
      <div class="logo">
        <span class="mk">Mini Digital Synthesizer</span>
        <h1><b>POCKET</b> <i>TONE</i></h1>
      </div>
      <div class="model">PT&middot;01</div>
    </div>

    <!-- LCD -->
    <div class="lcd">
      <div class="lcd-top">
        <span class="lcd-voice" id="lcdVoice">1 PIANO</span>
        <span class="lcd-readout" id="lcdReadout">READY</span>
      </div>
      <svg class="scope" id="scope" viewBox="0 0 220 46" preserveAspectRatio="none">
        <rect class="bg" x="0" y="0" width="220" height="46"></rect>
        <polyline id="wave" fill="none" stroke="#2c3a18" stroke-width="2"
                  stroke-linejoin="round" points=""></polyline>
      </svg>
      <div class="lcd-notes" id="lcdNotes">- - - - - - - -</div>
    </div>

    <!-- voice pads -->
    <div class="panel">
      <div class="row-label">Voice</div>
      <div class="voices" id="voices"></div>
    </div>

    <!-- knobs -->
    <div class="knobs" id="knobs"></div>

    <!-- keyboard -->
    <div class="kb-wrap">
      <div class="keys" id="keys"></div>
      <div class="hint">Play the keys &middot; A&ndash;K row on your keyboard</div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // ---- host param indices (must match assembly.ts / spec.json) ----
  var P_VOICE = 0, P_ATTACK = 1, P_RELEASE = 2, P_VIBRATO = 3, P_BITS = 4, P_LEVEL = 5;

  var VOICE_NAMES = ["PIANO", "FANTASY", "VIOLIN", "FLUTE", "GUITAR"];

  // knob descriptors (continuous 0..1 params)
  var KNOBS = [
    { idx: P_ATTACK,  name: "Attack",  def: 0.04, unit: "s",  map: function (v) { return (0.001 + v * 0.6).toFixed(2); } },
    { idx: P_RELEASE, name: "Release", def: 0.30, unit: "s",  map: function (v) { return (0.02 + v * 1.8).toFixed(2); } },
    { idx: P_VIBRATO, name: "Vibrato", def: 0.25, unit: "%",  map: function (v) { return Math.round(v * 100); } },
    { idx: P_BITS,    name: "Bits",    def: 0.35, unit: "",   map: function (v) { return Math.round(16 - v * 12) + "b"; } },
    { idx: P_LEVEL,   name: "Level",   def: 0.6,  unit: "%",  map: function (v) { return Math.round(v * 100); } }
  ];

  var state = {};            // current param values
  var voiceSel = 0;          // 0..4

  function send(i, v) {
    if (window.vstai && window.vstai.setParam) window.vstai.setParam(i, v);
  }

  // ====================================================================
  //  LCD readout
  // ====================================================================
  var lcdVoice = document.getElementById("lcdVoice");
  var lcdReadout = document.getElementById("lcdReadout");
  var lcdNotes = document.getElementById("lcdNotes");

  function showReadout(txt) {
    lcdReadout.textContent = txt;
    clearTimeout(showReadout._t);
    showReadout._t = setTimeout(function () { lcdReadout.textContent = "READY"; }, 1400);
  }

  function refreshVoiceLabel() {
    lcdVoice.textContent = (voiceSel + 1) + " " + VOICE_NAMES[voiceSel];
  }

  // ====================================================================
  //  Voice pads
  // ====================================================================
  var voicesEl = document.getElementById("voices");

  function buildVoices() {
    for (var i = 0; i < 5; i++) {
      (function (i) {
        var pad = document.createElement("button");
        pad.className = "vpad";
        pad.innerHTML = '<span class="num">' + (i + 1) + '</span>' +
                        '<span class="nm">' + VOICE_NAMES[i] + '</span>';
        pad.addEventListener("click", function () { selectVoice(i); });
        voicesEl.appendChild(pad);
      })(i);
    }
  }

  function selectVoice(i) {
    voiceSel = i;
    var pads = voicesEl.children;
    for (var k = 0; k < pads.length; k++) {
      pads[k].classList.toggle("on", k === i);
      if (k === i) {
        // retrigger the lit animation
        pads[k].style.animation = "none";
        void pads[k].offsetWidth;
        pads[k].style.animation = "";
      }
    }
    state[P_VOICE] = i;
    send(P_VOICE, i);           // stepped: send the integer value directly
    refreshVoiceLabel();
    showReadout("VOICE " + (i + 1));
    rebuildWavePreview();
  }

  // ====================================================================
  //  Knobs (SVG, vertical drag, dbl-click reset, wheel fine tune)
  // ====================================================================
  var knobsEl = document.getElementById("knobs");

  function buildKnobs() {
    KNOBS.forEach(function (k) {
      var cell = document.createElement("div");
      cell.className = "knob-cell";

      var ns = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(ns, "svg");
      svg.setAttribute("class", "knob");
      svg.setAttribute("viewBox", "0 0 100 100");
      svg.setAttribute("tabindex", "0");

      // outer body
      var body = document.createElementNS(ns, "circle");
      body.setAttribute("class", "face");
      body.setAttribute("cx", "50"); body.setAttribute("cy", "50"); body.setAttribute("r", "40");
      body.setAttribute("fill", "url(#kg)");
      body.setAttribute("stroke", "#8b8a82"); body.setAttribute("stroke-width", "2");

      // gradient + arc track defs (shared per-knob)
      var defs = document.createElementNS(ns, "defs");
      defs.innerHTML =
        '<radialGradient id="kg" cx="42%" cy="34%" r="75%">' +
          '<stop offset="0%" stop-color="#f3f2ec"/>' +
          '<stop offset="58%" stop-color="#d3d2cb"/>' +
          '<stop offset="100%" stop-color="#a9a8a0"/>' +
        '</radialGradient>';
      svg.appendChild(defs);

      // value arc (background + filled)
      var trackBg = document.createElementNS(ns, "path");
      trackBg.setAttribute("d", arcPath(0));
      trackBg.setAttribute("fill", "none");
      trackBg.setAttribute("stroke", "rgba(0,0,0,.18)");
      trackBg.setAttribute("stroke-width", "5");
      trackBg.setAttribute("stroke-linecap", "round");
      trackBg.setAttribute("d", arcPath(1, true));

      var arc = document.createElementNS(ns, "path");
      arc.setAttribute("fill", "none");
      arc.setAttribute("stroke", k.idx === P_BITS ? "var(--ac)" : "var(--ac2)");
      arc.setAttribute("stroke-width", "5");
      arc.setAttribute("stroke-linecap", "round");

      // pointer notch
      var notch = document.createElementNS(ns, "line");
      notch.setAttribute("x1", "50"); notch.setAttribute("y1", "50");
      notch.setAttribute("x2", "50"); notch.setAttribute("y2", "20");
      notch.setAttribute("stroke", "#33322e");
      notch.setAttribute("stroke-width", "4");
      notch.setAttribute("stroke-linecap", "round");
      var pivot = document.createElementNS(ns, "g");
      pivot.appendChild(notch);

      svg.appendChild(body);
      svg.appendChild(trackBg);
      svg.appendChild(arc);
      svg.appendChild(pivot);

      var nameEl = document.createElement("div");
      nameEl.className = "k-name"; nameEl.textContent = k.name;
      var valEl = document.createElement("div");
      valEl.className = "k-val";

      cell.appendChild(svg);
      cell.appendChild(valEl);
      cell.appendChild(nameEl);
      knobsEl.appendChild(cell);

      k._arc = arc; k._pivot = pivot; k._val = valEl;
      setKnob(k, k.def, false);
      wireKnob(k, svg);
    });
  }

  // arc from -135deg to +135deg (270deg sweep)
  function arcPath(frac, full) {
    var a0 = -135, a1 = -135 + 270 * (full ? 1 : frac);
    var r = 33, cx = 50, cy = 50;
    var p0 = polar(cx, cy, r, a0), p1 = polar(cx, cy, r, a1);
    var large = (a1 - a0) > 180 ? 1 : 0;
    return "M " + p0.x + " " + p0.y + " A " + r + " " + r + " 0 " + large + " 1 " + p1.x + " " + p1.y;
  }
  function polar(cx, cy, r, deg) {
    var a = (deg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }

  function setKnob(k, v, doSend) {
    v = Math.max(0, Math.min(1, v));
    state[k.idx] = v;
    var ang = -135 + v * 270;
    k._pivot.setAttribute("transform", "rotate(" + ang + " 50 50)");
    k._arc.setAttribute("d", arcPath(v));
    var mapped = k.map(v);
    k._val.textContent = mapped + (typeof mapped === "number" && k.unit ? k.unit : "");
    if (doSend) {
      send(k.idx, v);
      showReadout(k.name.toUpperCase() + " " + k._val.textContent);
    }
  }

  function wireKnob(k, svg) {
    var dragging = false, startY = 0, startV = 0;

    function onMove(e) {
      if (!dragging) return;
      var y = (e.touches ? e.touches[0].clientY : e.clientY);
      var dv = (startY - y) / 180;           // up = increase
      setKnob(k, startV + dv, true);
      e.preventDefault();
    }
    function onUp() {
      dragging = false;
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    }
    function onDown(e) {
      dragging = true;
      startY = (e.touches ? e.touches[0].clientY : e.clientY);
      startV = state[k.idx];
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("touchend", onUp);
      e.preventDefault();
    }

    svg.addEventListener("mousedown", onDown);
    svg.addEventListener("touchstart", onDown, { passive: false });
    svg.addEventListener("dblclick", function () { setKnob(k, k.def, true); });
    svg.addEventListener("wheel", function (e) {
      setKnob(k, state[k.idx] - Math.sign(e.deltaY) * 0.02, true);
      e.preventDefault();
    }, { passive: false });
    svg.addEventListener("keydown", function (e) {
      if (e.key === "ArrowUp")   { setKnob(k, state[k.idx] + 0.02, true); e.preventDefault(); }
      if (e.key === "ArrowDown") { setKnob(k, state[k.idx] - 0.02, true); e.preventDefault(); }
    });
  }

  // ====================================================================
  //  Keyboard
  // ====================================================================
  var keysEl = document.getElementById("keys");
  var BASE = 60;                                  // middle C
  // white-key offsets for one octave + a bit
  var WHITE = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16]; // C D E F G A B C D E
  var BLACK = [                                   // {after white index, semitone}
    { after: 0, semi: 1 }, { after: 1, semi: 3 },
    { after: 3, semi: 6 }, { after: 4, semi: 8 }, { after: 5, semi: 10 },
    { after: 7, semi: 13 }, { after: 8, semi: 15 }
  ];
  var heldNotes = {};

  function buildKeys() {
    var whites = [];
    WHITE.forEach(function (semi, i) {
      var key = document.createElement("div");
      key.className = "key";
      key.dataset.note = BASE + semi;
      keysEl.appendChild(key);
      whites.push(key);
      bindKey(key);
    });
    // position blacks relative to whites
    var total = WHITE.length;
    BLACK.forEach(function (b) {
      var key = document.createElement("div");
      key.className = "key black";
      key.dataset.note = BASE + b.semi;
      // place between white[after] and white[after+1]
      var leftPct = ((b.after + 1) / total) * 100;
      key.style.left = "calc(" + leftPct + "% - 4.15%)";
      keysEl.appendChild(key);
      bindKey(key);
    });
  }

  function bindKey(key) {
    var note = parseInt(key.dataset.note, 10);
    key.addEventListener("mousedown", function (e) { noteDown(note, key); e.preventDefault(); });
    key.addEventListener("mouseup", function () { noteUp(note, key); });
    key.addEventListener("mouseleave", function () { noteUp(note, key); });
    key.addEventListener("touchstart", function (e) { noteDown(note, key); e.preventDefault(); }, { passive: false });
    key.addEventListener("touchend", function (e) { noteUp(note, key); e.preventDefault(); }, { passive: false });
  }

  function noteDown(note, key) {
    if (heldNotes[note]) return;
    heldNotes[note] = key;
    if (key) key.classList.add("down");
    if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(note, 0.9);
    pulseWave();
    showReadout("NOTE " + noteName(note));
    updateNotesLine();
  }
  function noteUp(note, key) {
    if (!heldNotes[note]) return;
    var k = heldNotes[note];
    delete heldNotes[note];
    if (k) k.classList.remove("down");
    if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(note);
    updateNotesLine();
  }

  function noteName(n) {
    var names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
    return names[n % 12] + (Math.floor(n / 12) - 1);
  }
  function updateNotesLine() {
    var ns = Object.keys(heldNotes).map(Number).sort(function (a, b) { return a - b; });
    lcdNotes.textContent = ns.length ? ns.map(noteName).join(" ") : "- - - - - - - -";
  }

  // computer-keyboard mapping (A S D F G H J K -> white keys)
  var KEYMAP = { a: 0, w: 1, s: 2, e: 3, d: 4, f: 5, t: 6, g: 7, y: 8, h: 9, u: 10, j: 11, k: 12 };
  window.addEventListener("keydown", function (e) {
    if (e.repeat) return;
    var off = KEYMAP[e.key.toLowerCase()];
    if (off === undefined) return;
    var note = BASE + off;
    var key = findKeyEl(note);
    noteDown(note, key);
  });
  window.addEventListener("keyup", function (e) {
    var off = KEYMAP[e.key.toLowerCase()];
    if (off === undefined) return;
    var note = BASE + off;
    noteUp(note, findKeyEl(note));
  });
  function findKeyEl(note) {
    var all = keysEl.querySelectorAll(".key");
    for (var i = 0; i < all.length; i++) if (+all[i].dataset.note === note) return all[i];
    return null;
  }

  // ====================================================================
  //  Animated blocky waveform (reflects voice + a little "energy")
  // ====================================================================
  var waveEl = document.getElementById("wave");
  var energy = 0;            // 0..1 brightness/amplitude, eased
  var rafId = null;
  var phase = 0;

  function voiceShape(sel, t) {
    // crude visual analogues of the DSP timbres, t in 0..1 (one cycle)
    var a = t * Math.PI * 2;
    if (sel === 0) return (Math.sin(a) + 0.45 * Math.sin(2 * a) + 0.22 * Math.sin(3 * a)) * 0.6;
    if (sel === 1) return (Math.sin(a) + 0.5 * Math.sin(3 * a) + 0.3 * Math.sin(5 * a)) * 0.5;
    if (sel === 2) return (2 * t - 1) * 0.85;                       // saw
    if (sel === 3) return Math.sin(a) * 0.9;                        // sine
    return (t < 0.25 ? 1 : -1) * 0.7;                               // pulse
  }

  function buildWavePoints(sel, anim) {
    var N = 56, pts = "";
    var cycles = 2.0;
    // BITS visually steps the wave (sample-and-hold blockiness)
    var bits = state[P_BITS] || 0;
    var steps = Math.max(2, Math.round(28 - bits * 22));
    for (var i = 0; i <= N; i++) {
      var x = (i / N) * 220;
      var tt = (i / N) * cycles + (anim ? phase : 0);
      var q = Math.floor((tt % 1) * steps) / steps;          // quantize phase = blocky
      var y = 23 - voiceShape(sel, q) * 17 * (0.35 + energy * 0.65);
      pts += x.toFixed(1) + "," + y.toFixed(1) + " ";
    }
    return pts.trim();
  }

  function rebuildWavePreview() {
    waveEl.setAttribute("points", buildWavePoints(voiceSel, false));
  }

  function pulseWave() { energy = Math.min(1, energy + 0.7); }

  function loop() {
    if (document.hidden) { rafId = null; return; }
    phase += 0.012;
    energy *= 0.965;                          // ease back to rest
    var held = Object.keys(heldNotes).length > 0;
    if (held) energy = Math.max(energy, 0.55);
    waveEl.setAttribute("points", buildWavePoints(voiceSel, true));
    // brighten the trace with energy (pink<->cyan blend)
    var stroke = held ? "#3a5018" : "#2c3a18";
    waveEl.setAttribute("stroke", stroke);
    rafId = requestAnimationFrame(loop);
  }
  function startLoop() { if (!rafId) rafId = requestAnimationFrame(loop); }
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) startLoop();
  });

  // ====================================================================
  //  Init
  // ====================================================================
  function ready() {
    buildVoices();
    buildKnobs();
    buildKeys();

    // push defaults to the engine
    selectVoice(0);
    KNOBS.forEach(function (k) { setKnob(k, k.def, true); });

    rebuildWavePreview();
    startLoop();
    lcdReadout.textContent = "READY";
  }

  if (window.vstai && window.vstai.onReady) window.vstai.onReady(ready);
  else ready();
})();
</script>
</body>
</html>
