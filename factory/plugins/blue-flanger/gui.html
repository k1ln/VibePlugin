<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Blue Flanger</title>
<style>
  :root{ --acc:#3a8aff; --acc2:#5ae0d0; --bg0:#060a14; --bg1:#0b1428; --ink:#e6eefb; --dim:#6f83a8; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background:radial-gradient(120% 90% at 50% -10%,#122344 0%,var(--bg1) 46%,var(--bg0) 100%); color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden; background:linear-gradient(160deg,#0e1c38,#060a14); border:1px solid rgba(58,138,255,.22); box-shadow:0 22px 64px rgba(0,0,0,.62),inset 0 1px 0 rgba(230,238,251,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc2); box-shadow:0 0 10px var(--acc2); animation:pulse 2.2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
  .screen{ height:104px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:linear-gradient(180deg,#0a1428,#060b16); border:1px solid rgba(58,138,255,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.55); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(210,224,248,.13); stroke-width:7; stroke-linecap:round; } .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(58,138,255,.6)); }
  .pcap{ fill:#0a1020; stroke:rgba(58,138,255,.22); stroke-width:1; } .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); } .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(58,138,255,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(58,138,255,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style></head>
<body>
  <div class="unit">
    <header><span class="logo">BLUE&nbsp;FLANGER</span><span class="sub">deep stereo flange</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">COMB&nbsp;SWEEP</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){"use strict";
  var P=[{name:"Rate",idx:0,def:0.28},{name:"Depth",idx:1,def:0.7},{name:"Feedbk",idx:2,def:0.6},{name:"Manual",idx:3,def:0.25},{name:"Width",idx:4,def:0.5},{name:"Mix",idx:5,def:0.5}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; }); var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135; var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){ var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a8aff"/><stop offset="1" stop-color="#5ae0d0"/></linearGradient></defs><circle class="track" cx="40" cy="40" r="33"></circle><circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle><circle class="pcap" cx="40" cy="40" r="20"></circle><line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el); var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString()); var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); }); render(p.def); return {render:render}; });
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); } window.addEventListener("resize",resize); resize();
  function comb(x,delay,fb){ // magnitude response of feedforward+feedback comb at freq bin x(0..1)
    var w=x*Math.PI*delay; var c=Math.cos(w);
    return (1+fb)*0.5*(1+c)/(1+fb*fb-2*fb*c*0.9+0.05); }
  function frame(ts){ ctx.clearRect(0,0,W,H); var rate=vals[0], depth=vals[1], fb=vals[2], man=vals[3], width=vals[4];
    var lfo=0.5+0.5*Math.sin(ts/1000*(0.05+rate*6)); var tri=lfo;
    var delay=(2+man*30)+(depth*40)*tri;   // notch spacing in display units
    var baseY=H-14, top=20;
    // draw comb response curves for L (blue) and R (teal, phase-offset by Width)
    for(var ch=0;ch<2;ch++){ var lfo2=0.5+0.5*Math.sin(ts/1000*(0.05+rate*6)+(ch?width*Math.PI:0));
      var dly=(2+man*30)+(depth*40)*lfo2;
      ctx.beginPath();
      for(var xx=0;xx<=W;xx+=2){ var t=xx/W; var m=comb(t,dly,fb*0.9); var y=baseY-(m/(1+fb))* (baseY-top); if(xx===0)ctx.moveTo(xx,y); else ctx.lineTo(xx,y); }
      ctx.strokeStyle=ch? "rgba(90,224,208,0.7)":"rgba(58,138,255,0.85)"; ctx.lineWidth=ch?1.4:1.8;
      ctx.shadowColor=ch?"#5ae0d0":"#3a8aff"; ctx.shadowBlur=6; ctx.stroke(); ctx.shadowBlur=0; }
    // fill under blue curve faintly
    ctx.globalAlpha=0.08; ctx.fillStyle="#3a8aff"; ctx.fillRect(0,top,W,baseY-top); ctx.globalAlpha=1;
    // stereo L/R orbit indicator (top-right)
    var ox=W-24, oy=18, rr=8; ctx.strokeStyle="rgba(120,150,200,0.25)"; ctx.beginPath(); ctx.arc(ox,oy,rr,0,Math.PI*2); ctx.stroke();
    var aL=ts/1000*(0.05+rate*6)*2; ctx.fillStyle="#3a8aff"; ctx.beginPath(); ctx.arc(ox+Math.cos(aL)*rr,oy+Math.sin(aL)*rr,2.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#5ae0d0"; ctx.beginPath(); ctx.arc(ox+Math.cos(aL+width*Math.PI)*rr,oy+Math.sin(aL+width*Math.PI)*rr,2.4,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script></body></html>
