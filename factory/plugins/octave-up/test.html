<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Octave Up — test bench</title><style>
  :root{--ac:#c08cff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

    <div class="row"><label>Source

         <input type="file" id="file" accept="audio/*" style="display:none"></div>
  </div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Octave Up<\/title>\n<style>\n  :root {\n    --accent: #c08cff;\n    --accent2: #ff8cf0;\n    --bg0: #160a26;\n    --bg1: #2a0f47;\n    --ink: #f3e9ff;\n    --ink-dim: #b79ad6;\n    --glass: rgba(255,255,255,0.06);\n    --line: rgba(255,255,255,0.10);\n  }\n\n  * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }\n\n  html, body {\n    margin: 0;\n    height: 100%;\n    background: var(--bg0);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    overflow: hidden;\n  }\n\n  /* ---------- swirling purple-haze backdrop ---------- */\n  .haze {\n    position: fixed;\n    inset: -30%;\n    z-index: 0;\n    background:\n      radial-gradient(40% 50% at 25% 30%, rgba(192,140,255,0.45), transparent 70%),\n      radial-gradient(45% 55% at 78% 65%, rgba(255,140,240,0.40), transparent 72%),\n      radial-gradient(60% 60% at 55% 90%, rgba(120,60,200,0.50), transparent 75%),\n      conic-gradient(from 0deg at 50% 50%, #2a0f47, #3a1366, #2a0f47, #45106e, #2a0f47);\n    filter: blur(40px) saturate(140%);\n    animation: swirl 38s linear infinite;\n    opacity: 0.85;\n  }\n  .haze.b {\n    inset: -40%;\n    mix-blend-mode: screen;\n    animation: swirl 26s linear infinite reverse;\n    opacity: 0.55;\n  }\n  @keyframes swirl {\n    0%   { transform: rotate(0deg)   scale(1.05); }\n    50%  { transform: rotate(180deg) scale(1.25); }\n    100% { transform: rotate(360deg) scale(1.05); }\n  }\n\n  /* film-grain / vignette */\n  .vignette {\n    position: fixed;\n    inset: 0;\n    z-index: 1;\n    pointer-events: none;\n    background: radial-gradient(120% 90% at 50% 35%, transparent 55%, rgba(8,2,18,0.75) 100%);\n  }\n\n  .wrap {\n    position: relative;\n    z-index: 2;\n    height: 100%;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    padding: clamp(12px, 3vw, 28px);\n    gap: clamp(10px, 2vh, 20px);\n    overflow: auto;\n  }\n\n  /* ---------- header ---------- */\n  header {\n    width: 100%;\n    max-width: 760px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n  }\n  .brand { display: flex; align-items: center; gap: 14px; }\n  .sigil {\n    width: 46px; height: 46px;\n    flex: none;\n    filter: drop-shadow(0 0 10px rgba(192,140,255,0.8));\n  }\n  .title {\n    font-weight: 800;\n    font-size: clamp(20px, 3.4vw, 30px);\n    letter-spacing: 0.5px;\n    line-height: 1;\n    background: linear-gradient(92deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .subtitle {\n    font-size: 10px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    margin-top: 5px;\n  }\n  .badge {\n    font-size: 10px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--accent2);\n    border: 1px solid var(--line);\n    border-radius: 999px;\n    padding: 6px 12px;\n    background: var(--glass);\n    backdrop-filter: blur(6px);\n  }\n\n  /* ---------- waveform / octave viz ---------- */\n  .scope {\n    width: 100%;\n    max-width: 760px;\n    height: clamp(120px, 22vh, 190px);\n    border-radius: 16px;\n    border: 1px solid var(--line);\n    background:\n      linear-gradient(180deg, rgba(20,6,40,0.7), rgba(8,2,20,0.85));\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.08),\n      inset 0 0 40px rgba(120,40,200,0.25),\n      0 18px 40px rgba(0,0,0,0.45);\n    position: relative;\n    overflow: hidden;\n  }\n  .scope canvas { display: block; width: 100%; height: 100%; }\n  .scope .legend {\n    position: absolute;\n    top: 10px; left: 14px;\n    font-size: 10px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    display: flex; gap: 16px;\n  }\n  .legend .dot { display: inline-flex; align-items: center; gap: 6px; }\n  .legend .dot i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }\n\n  /* ---------- knob panel ---------- */\n  .panel {\n    width: 100%;\n    max-width: 760px;\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: clamp(10px, 2vw, 22px);\n    padding: clamp(14px, 3vw, 26px);\n    border-radius: 20px;\n    border: 1px solid var(--line);\n    background:\n      linear-gradient(160deg, rgba(60,20,100,0.42), rgba(20,8,40,0.55));\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.10),\n      0 24px 60px rgba(0,0,0,0.5);\n    backdrop-filter: blur(10px);\n  }\n  @media (max-width: 520px) {\n    .panel { grid-template-columns: repeat(2, 1fr); }\n  }\n\n  .knobcell {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 10px;\n  }\n  .knob {\n    position: relative;\n    width: clamp(86px, 16vw, 116px);\n    height: clamp(86px, 16vw, 116px);\n    cursor: ns-resize;\n    touch-action: none;\n  }\n  .knob svg { width: 100%; height: 100%; overflow: visible; display: block; }\n  .knob .cap {\n    transition: filter 0.18s ease;\n    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.55));\n  }\n  .knob:hover .cap,\n  .knob.drag .cap {\n    filter: drop-shadow(0 0 14px rgba(192,140,255,0.85)) drop-shadow(0 6px 12px rgba(0,0,0,0.55));\n  }\n\n  .label {\n    font-size: 11px;\n    letter-spacing: 2.5px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n  }\n  .value {\n    font-size: 15px;\n    font-weight: 700;\n    font-variant-numeric: tabular-nums;\n    color: var(--ink);\n    min-width: 48px;\n    text-align: center;\n  }\n\n  footer {\n    font-size: 10px;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    opacity: 0.7;\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn
