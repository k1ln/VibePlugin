<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pin Matrix — test bench</title><style>
  :root{--ac:#6ad0ff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Pin Matrix<\/title>\n<style>\n  :root {\n    --accent:  #6ad0ff;\n    --accent2: #ff7a7a;\n    --teal:    #1f6e6a;\n    --teal-d:  #0f3b3a;\n    --panel:   #173436;\n    --panel-d: #0c2122;\n    --ivory:   #e9e3d2;\n    --ink:     #07181a;\n    --pin-off: #2a4d4e;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    background:\n      radial-gradient(120% 90% at 50% -10%, #1a4042 0%, #0a1b1c 60%, #050d0e 100%);\n    color: var(--ivory);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    min-height: 100%;\n  }\n\n  .wrap {\n    max-width: 900px;\n    margin: 0 auto;\n    padding: 16px 16px 28px;\n  }\n\n  /* ---- the enclosure ---- */\n  .enclosure {\n    position: relative;\n    border-radius: 18px;\n    padding: 18px;\n    background:\n      linear-gradient(180deg, #235c5b 0%, #16403f 38%, #102f2e 100%);\n    box-shadow:\n      inset 0 2px 0 rgba(255,255,255,0.12),\n      inset 0 -10px 26px rgba(0,0,0,0.55),\n      0 26px 60px rgba(0,0,0,0.6),\n      0 2px 0 rgba(0,0,0,0.4);\n    border: 1px solid #0a2322;\n    overflow: hidden;\n  }\n  /* corner screws */\n  .screw {\n    position: absolute;\n    width: 13px; height: 13px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 35% 30%, #c9c2ad, #5b5747 70%, #2e2b22);\n    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.6);\n  }\n  .screw::after {\n    content: \"\";\n    position: absolute; inset: 4px 2px;\n    border-radius: 1px;\n    background: rgba(40,38,30,0.8);\n    transform: rotate(35deg);\n  }\n  .screw.tl { top: 8px; left: 8px; }\n  .screw.tr { top: 8px; right: 8px; }\n  .screw.bl { bottom: 8px; left: 8px; }\n  .screw.br { bottom: 8px; right: 8px; }\n\n  /* ---- header ---- */\n  header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 14px;\n    margin: 2px 8px 14px;\n    flex-wrap: wrap;\n  }\n  .brand { display: flex; align-items: baseline; gap: 12px; }\n  .logo-dot {\n    width: 14px; height: 14px; border-radius: 50%;\n    background: var(--accent2);\n    box-shadow: 0 0 10px var(--accent2);\n    align-self: center;\n    animation: pwr 2.4s ease-in-out infinite;\n  }\n  @keyframes pwr {\n    0%, 100% { opacity: 0.5; box-shadow: 0 0 6px var(--accent2); }\n    50%      { opacity: 1;   box-shadow: 0 0 16px var(--accent2); }\n  }\n  h1 {\n    font-size: clamp(20px, 4vw, 30px);\n    margin: 0;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    font-weight: 800;\n    color: var(--ivory);\n    text-shadow: 0 1px 0 #000, 0 0 16px rgba(106,208,255,0.25);\n  }\n  .sub {\n    font-size: 10px;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--accent);\n    opacity: 0.85;\n  }\n  .plate {\n    font-size: 9px;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: #9fc7c4;\n    padding: 6px 10px;\n    border: 1px solid rgba(106,208,255,0.25);\n    border-radius: 6px;\n    background: rgba(0,0,0,0.25);\n    text-align: right;\n    line-height: 1.5;\n  }\n\n  /* ---- main layout ---- */\n  .body {\n    display: grid;\n    grid-template-columns: minmax(280px, 1.4fr) minmax(180px, 0.9fr);\n    gap: 16px;\n  }\n  @media (max-width: 720px) {\n    .body { grid-template-columns: 1fr; }\n  }\n\n  .module {\n    background:\n      linear-gradient(180deg, rgba(8,24,26,0.9), rgba(4,14,15,0.95));\n    border: 1px solid rgba(106,208,255,0.12);\n    border-radius: 12px;\n    padding: 14px;\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -8px 18px rgba(0,0,0,0.5);\n  }\n  .module h2 {\n    margin: 0 0 12px;\n    font-size: 10px;\n    letter-spacing: 0.34em;\n    text-transform: uppercase;\n    color: #7fb6b3;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .module h2::before {\n    content: \"\";\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--accent);\n    box-shadow: 0 0 8px var(--accent);\n  }\n\n  /* ---- the PIN PATCH MATRIX ---- */\n  .matrix-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }\n  .matrix {\n    background:\n      radial-gradient(140% 120% at 50% 0%, #14373a 0%, #0a2123 70%, #061516 100%);\n    border-radius: 10px;\n    padding: 12px;\n    border: 1px solid rgba(0,0,0,0.55);\n    box-shadow: inset 0 0 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);\n  }\n  .matrix svg { display: block; width: 100%; height: auto; }\n\n  .axis-label {\n    fill: #8fb9b6;\n    font-size: 7px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    font-family: ui-sans-serif, system-ui, sans-serif;\n  }\n\n  .pin {\n    cursor: pointer;\n    transition: filter 0.15s ease;\n  }\n  .pin:hover { filter: brightness(1.4); }\n\n  .hint {\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: #6e9794;\n  }\n\n  /* ---- knobs ---- */\n  .knob-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(86px, 1fr));\n    gap: 12px 8px;\n  }\n  .knob {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 5px;\n    user-select: none;\n  }\n  .knob svg { width: 64px; height: 64px; cursor: ns-resize; touch-action: none; }\n  .knob .name {\n    font-size: 9px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: #a9d4d1;\n    text-align: center;\n  }\n  .knob .val {\n    font-size: 10px;\n    font-variant-numeric: tabular-nums;\n    color: var(--accent);\n    letter-spacing: 0.04em;\n    min-height: 13px;\n  }\n\n  /* ---- joystick ---- */\n  .joy-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }\n  .joy {\n    position: relative;\n    width: 132px; height: 132px;\n    border-radius: 14px;\n    background:\n      radial-gradient(circle at 50% 42%, #11393b 0%, #0a2425 60%, #061617 100%);\n    border: 1px solid rgba(0,0,0,0.6);\n    box-shadow: inset 0 0 26px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);\n    touch-action: none;\n    cursor: grab;\n    overflow: hidden;\n  }\n  .joy.grabbing { cursor: grabbing; }\n  .joy .cross-h, .joy .cross-v {\n    position: absolute;\n    background: rgba(106,208,255,0.12);\n  }\n  .joy .cross-h { left: 8%; right: 8%; top: 50%; height: 1px; }\n  .joy .cross-v { top: 8%; bottom: 8%; left: 50%; width: 1px; }\n  .joy .ring {\n    position: absolute; inset: 14px;\n    border-radius: 50%;\n    border: 1px dashed rgba(255,122,122,0.18);\n  }\n  .joy .stick {\n    position: absolute;\n    left: 50%; top: 50%;\n    width: 34px; height: 34px;\n    margin: -17px 0 0 -17px;\n    border-radius: 50%;\n    background:\n      radial-gradient(circle at 38% 32%, #ff9d9d, #ff7a7a 45%, #b53d3d 80%, #6e2222);\n    box-shadow:\n      0 0 0 4px rgba(255,122,122,0.12),\n      0 6px 14px rgba(0,0,0,0.6),\n      inset 0 2px 3px rgba(255,255,255,0.5);\n    transition: box-shadow 0.15s ease;\n  }\n  .joy .stick.lit { box-shadow: 0 0 22px rgba(255,122,122,0.7), 0 6px 14px rgba(0,0,0,0.6), inset 0 2px 3px rgba(255,255,255,0.5); }\n\n  /* ---- keyboard ---- */\n  .keys-module { margin-top: 16px; }\n  .keys {\n    position: relative;\n    display: flex;\n    height: 108px;\n    border-radius: 8px;\n    overflow: hidden;\n    border: 1px solid #06181a;\n    box-shadow: 0 8px 18px rgba(0,0,0,0.5), inset 0 -6px 12px rgba(0,0,0,0.4);\n    user-select: none;\n    touch-action: none;\n  }\n  .wkey {\n    position: relative;\n    flex: 1;\n    background: linear-gradient(180deg, #f4eedd 0%, #d8cfb6 100%);\n    border-right: 1px solid #b3a98c;\n    border-radius: 0 0 5px 5px;\n    cursor: pointer;\n    transition: background 0.06s ease;\n  }\n  .wkey:last-child { border-right: none; }\n  .wkey.down {\n    background: linear-gradient(180deg, var(--accent) 0%, #3f9bc4 100%);\n    box-shadow: l === 0) c0++; else if (r.col === 1) c1++;\n      else if (r.col === 2) c2++; else if (r.col === 3) c3++;\n      else if (r.col === 4) { if (r.row === 0) o1 = true; else if (r.row === 1) o2 = true; else if (r.row === 2) o3 = true; }\n    }\n    pushParam(1, Math.min(1, 0.05 + c0 * 0.30));   // RING column -> Ring Mod\n    pushParam(3, Math.min(1, 0.30 + c1 * 0.18));   // FILT column -> Resonance\n    pushParam(4, Math.min(1, 0.15 + c2 * 0.28));   // ENV  column -> Env Amount\n    pushParam(6, Math.min(1, 0.35 + c3 * 0.22));   // AMP  column -> Level\n    pushParam(0, Math.max(0, Math.min(1, 0.5 + (o3 ? 0.30 : 0) - (o1 ? 0.30 : 0) - (o2 ? 0.15 : 0)))); // OUT -> Osc Mix\n  }\n\n  // ===================================================================\n  //  JOYSTICK  -> Cutoff (X) + Ring Mod (Y)\n  // ===================================================================\n  var joy = document.getElementById(\"joy\");\n  var stick = document.getElementById(\"stick\");\n  var joyDrag = false;\n\n  function placeStick() {\n    // reflect current Cutoff/RingMod onto the stick position\n    var x = values[2];       // 0..1\n    var y = values[1];       // 0..1\n    var px = (x - 0.5) * 0.78;   // -0.39..0.39 of half-size\n    var py = (0.5 - y) * 0.78;\n    stick.style.transform = \"translate(\" + (px * 132) + \"px,\" + (py * 132) + \"px)\";\n  }\n  function joyTo(clientX, clientY) {\n    var r = joy.getBoundingClientRect();\n    var nx = (clientX - r.left) / r.width;   // 0..1\n    var ny = (clientY - r.top) / r.height;   // 0..1\n    pushParam(2, Math.max(0, Math.min(1, nx)));         // cutoff\n    pushParam(1, Math.max(0, Math.min(1, 1 - ny)));     // ring mod\n    placeStick();\n  }\n  joy.addEventListener(\"pointerdown\", function (e) {\n    joyDrag = true; joy.classList.add(\"grabbing\"); stick.classList.add(\"lit\");\n    joy.setPointerCapture(e.pointerId);\n    joyTo(e.clientX, e.clientY);\n  });\n  joy.addEventListener(\"pointermove\", function (e) { if (joyDrag) jo ========================\n  var meterBar = document.getElementById(\"meterBar\");\n  var pulse = 0;          // decays; jumps on note\n  var lit = 0;            // smoothed audio \"activity\"\n  function flashMatrix() { pulse = 1; }\n\n  var t0 = performance.now();\n  function loop(now) {\n    if (document.hidden) { requestAnimationFrame(loop); return; }\n    var dt = (now - t0) / 1000; t0 = now;\n\n    var active = Object.keys(down).length > 0;\n    var target = active ? 1 : 0;\n    lit += (target - lit) * Math.min(1, dt * 6);\n    pulse *= Math.pow(0.06, dt);   // fast decay\n\n    var energy = Math.max(lit, pulse);\n    var phase = now / 1000;\n\n    // pulse the seated pins; intensity ties to ring-mod + activity\n    var ringGlow = values[1];\n    for (var k = 0; k < pins.length; k++) {\n      var pn = pins[k];\n      if (!pn.on) { pn.glow.setAttribute(\"opacity\", 0); continue; }\n      // staggered shimmer so the routed dots feel alive\n      var s = 0.5 + 0.5 * Math.sin(phase * 4 + (pn.row * 1.3 + pn.col * 0.7));\n      var amp = energy * (0.35 + 0.65 * s) * (0.5 + 0.5 * ringGlow);\n      pn.glow.setAttribute(\"opacity\", (0.15 + 0.75 * amp).toFixed(3));\n      pn.glow.setAttribute(\"stroke-width\", (1 + 4 * amp).toFixed(2));\n      pn.circle.setAttribute(\"r\", (5 + 0.8 * amp).toFixed(2));\n    }\n\n    // output meter reflects level * activity\n    var m = energy * values[6];\n    meterBar.style.width = (m * 100).toFixed(1) + \"%\";\n\n    requestAnimationFrame(loop);\n  }\n  requestAnimationFrame(loop);\n\n  // ===================================================================\n  //  INIT — push every default to the engine once\n  // ===================================================================\n  function initParams() {\n    PARAMS.forEach(function (p) { pushParam(p.index, p.def); });\n    recomputeMatrix();   // the seated patch defines the mapped params\n    placeStick();\n  }\n  if (window.vstai && window.vstai.onReady) {\n    window.vstai.onRea     var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  var KB=document.getElementById('kb'), KEYS=[['C',60,0],['C#',61,1],['D',62,0],['D#',63,1],['E',64,0],['F',65,0],['F#',66,1],['G',67,0],['G#',68,1],['A',69,0],['A#',70,1],['B',71,0],['C',72,0]];
  var KMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72};
  var oct=0;                                              // octave offset (−4..+4), applied at note-on
  function hz(m){return 440*Math.pow(2,(m-69)/12);}
  function setOct(o){ oct=o<-4?-4:(o>4?4:o); var ov=document.getElementById('octval'); if(ov)ov.textContent=(4+oct); }
  function down(m,el){ ensure().then(function(){ if(ctx.state==='suspended')ctx.resume(); if(ex&&ex.noteOn) ex.noteOn(m,hz(m),0.9); }); if(el)el.classList.add('dn'); }
  function up(m,el){ if(ex&&ex.noteOff) ex.noteOff(m); if(el)el.classList.remove('dn'); }
  KEYS.forEach(function(k){ var el=document.createElement('div'); el.className='key'+(k[2]?' bk':''); el.textContent=k[0];
    el.addEventListener('pointerdown',function(e){e.preventDefault();el._n=k[1]+oct*12;down(el._n,el);});
    el.addEventListener('pointerup',function(){up(el._n,el);}); el.addEventListener('pointerleave',function(){if(el.classList.contains('dn'))up(el._n,el);});
    KB.appendChild(el); });
  document.getElementById('octdn').addEventListener('click',function(){setOct(oct-1);});
  document.getElementById('octup').addEventListener('click',function(){setOct(oct+1);});
  var held={};                                            // base note -> actual note played (so releases survive an octave change)
  window.addEventListener('keydown',function(e){ if(e.repeat)return;
    if(e.key==='z'||e.key==='Z'){setOct(oct-1);return;} if(e.key==='x'||e.key==='X'){setOct(oct+1);return;}
    var b=KMAP[e.key]; if(b&&!held[b]){var m=b+oct*12;held[b]=m;down(m,null);} });
  window.addEventListener('keyup',function(e){ var b=KMAP[e.key]; if(b&&held[b]!=null){up(held[b],null);held[b]=null;} });
  setOct(0);
  
  </script></body></html>
