<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pin Matrix</title>
<style>
  :root {
    --accent:  #6ad0ff;
    --accent2: #ff7a7a;
    --teal:    #1f6e6a;
    --teal-d:  #0f3b3a;
    --panel:   #173436;
    --panel-d: #0c2122;
    --ivory:   #e9e3d2;
    --ink:     #07181a;
    --pin-off: #2a4d4e;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background:
      radial-gradient(120% 90% at 50% -10%, #1a4042 0%, #0a1b1c 60%, #050d0e 100%);
    color: var(--ivory);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    min-height: 100%;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 16px 28px;
  }

  /* ---- the enclosure ---- */
  .enclosure {
    position: relative;
    border-radius: 18px;
    padding: 18px;
    background:
      linear-gradient(180deg, #235c5b 0%, #16403f 38%, #102f2e 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.12),
      inset 0 -10px 26px rgba(0,0,0,0.55),
      0 26px 60px rgba(0,0,0,0.6),
      0 2px 0 rgba(0,0,0,0.4);
    border: 1px solid #0a2322;
    overflow: hidden;
  }
  /* corner screws */
  .screw {
    position: absolute;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #c9c2ad, #5b5747 70%, #2e2b22);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.6);
  }
  .screw::after {
    content: "";
    position: absolute; inset: 4px 2px;
    border-radius: 1px;
    background: rgba(40,38,30,0.8);
    transform: rotate(35deg);
  }
  .screw.tl { top: 8px; left: 8px; }
  .screw.tr { top: 8px; right: 8px; }
  .screw.bl { bottom: 8px; left: 8px; }
  .screw.br { bottom: 8px; right: 8px; }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin: 2px 8px 14px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .logo-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
    align-self: center;
    animation: pwr 2.4s ease-in-out infinite;
  }
  @keyframes pwr {
    0%, 100% { opacity: 0.5; box-shadow: 0 0 6px var(--accent2); }
    50%      { opacity: 1;   box-shadow: 0 0 16px var(--accent2); }
  }
  h1 {
    font-size: clamp(20px, 4vw, 30px);
    margin: 0;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 800;
    color: var(--ivory);
    text-shadow: 0 1px 0 #000, 0 0 16px rgba(106,208,255,0.25);
  }
  .sub {
    font-size: 10px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.85;
  }
  .plate {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #9fc7c4;
    padding: 6px 10px;
    border: 1px solid rgba(106,208,255,0.25);
    border-radius: 6px;
    background: rgba(0,0,0,0.25);
    text-align: right;
    line-height: 1.5;
  }

  /* ---- main layout ---- */
  .body {
    display: grid;
    grid-template-columns: minmax(280px, 1.4fr) minmax(180px, 0.9fr);
    gap: 16px;
  }
  @media (max-width: 720px) {
    .body { grid-template-columns: 1fr; }
  }

  .module {
    background:
      linear-gradient(180deg, rgba(8,24,26,0.9), rgba(4,14,15,0.95));
    border: 1px solid rgba(106,208,255,0.12);
    border-radius: 12px;
    padding: 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -8px 18px rgba(0,0,0,0.5);
  }
  .module h2 {
    margin: 0 0 12px;
    font-size: 10px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: #7fb6b3;
    display: flex; align-items: center; gap: 8px;
  }
  .module h2::before {
    content: "";
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* ---- the PIN PATCH MATRIX ---- */
  .matrix-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .matrix {
    background:
      radial-gradient(140% 120% at 50% 0%, #14373a 0%, #0a2123 70%, #061516 100%);
    border-radius: 10px;
    padding: 12px;
    border: 1px solid rgba(0,0,0,0.55);
    box-shadow: inset 0 0 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .matrix svg { display: block; width: 100%; height: auto; }

  .axis-label {
    fill: #8fb9b6;
    font-size: 7px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }

  .pin {
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  .pin:hover { filter: brightness(1.4); }

  .hint {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6e9794;
  }

  /* ---- knobs ---- */
  .knob-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(86px, 1fr));
    gap: 12px 8px;
  }
  .knob {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .knob svg { width: 64px; height: 64px; cursor: ns-resize; touch-action: none; }
  .knob .name {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #a9d4d1;
    text-align: center;
  }
  .knob .val {
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    letter-spacing: 0.04em;
    min-height: 13px;
  }

  /* ---- joystick ---- */
  .joy-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .joy {
    position: relative;
    width: 132px; height: 132px;
    border-radius: 14px;
    background:
      radial-gradient(circle at 50% 42%, #11393b 0%, #0a2425 60%, #061617 100%);
    border: 1px solid rgba(0,0,0,0.6);
    box-shadow: inset 0 0 26px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
    touch-action: none;
    cursor: grab;
    overflow: hidden;
  }
  .joy.grabbing { cursor: grabbing; }
  .joy .cross-h, .joy .cross-v {
    position: absolute;
    background: rgba(106,208,255,0.12);
  }
  .joy .cross-h { left: 8%; right: 8%; top: 50%; height: 1px; }
  .joy .cross-v { top: 8%; bottom: 8%; left: 50%; width: 1px; }
  .joy .ring {
    position: absolute; inset: 14px;
    border-radius: 50%;
    border: 1px dashed rgba(255,122,122,0.18);
  }
  .joy .stick {
    position: absolute;
    left: 50%; top: 50%;
    width: 34px; height: 34px;
    margin: -17px 0 0 -17px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 32%, #ff9d9d, #ff7a7a 45%, #b53d3d 80%, #6e2222);
    box-shadow:
      0 0 0 4px rgba(255,122,122,0.12),
      0 6px 14px rgba(0,0,0,0.6),
      inset 0 2px 3px rgba(255,255,255,0.5);
    transition: box-shadow 0.15s ease;
  }
  .joy .stick.lit { box-shadow: 0 0 22px rgba(255,122,122,0.7), 0 6px 14px rgba(0,0,0,0.6), inset 0 2px 3px rgba(255,255,255,0.5); }

  /* ---- keyboard ---- */
  .keys-module { margin-top: 16px; }
  .keys {
    position: relative;
    display: flex;
    height: 108px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #06181a;
    box-shadow: 0 8px 18px rgba(0,0,0,0.5), inset 0 -6px 12px rgba(0,0,0,0.4);
    user-select: none;
    touch-action: none;
  }
  .wkey {
    position: relative;
    flex: 1;
    background: linear-gradient(180deg, #f4eedd 0%, #d8cfb6 100%);
    border-right: 1px solid #b3a98c;
    border-radius: 0 0 5px 5px;
    cursor: pointer;
    transition: background 0.06s ease;
  }
  .wkey:last-child { border-right: none; }
  .wkey.down {
    background: linear-gradient(180deg, var(--accent) 0%, #3f9bc4 100%);
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
  }
  .bkeys { position: absolute; top: 0; left: 0; right: 0; height: 64%; pointer-events: none; }
  .bkey {
    position: absolute;
    width: 5.2%;
    height: 100%;
    margin-left: -2.6%;
    background: linear-gradient(180deg, #16292b 0%, #06141500 100%), linear-gradient(180deg, #1d3537, #07191a);
    border-radius: 0 0 4px 4px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 -3px 4px rgba(0,0,0,0.5);
    cursor: pointer;
    pointer-events: auto;
  }
  .bkey.down {
    background: linear-gradient(180deg, #ff7a7a, #b53d3d);
    box-shadow: 0 0 14px rgba(255,122,122,0.6);
  }

  .footer {
    margin: 14px 8px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #5e8482;
  }
  .footer .meter {
    width: 120px; height: 6px;
    border-radius: 3px;
    background: rgba(0,0,0,0.4);
    overflow: hidden;
    border: 1px solid rgba(106,208,255,0.15);
  }
  .footer .meter span {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.07s linear;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="enclosure">
    <div class="screw tl"></div><div class="screw tr"></div>
    <div class="screw bl"></div><div class="screw br"></div>

    <header>
      <div class="brand">
        <span class="logo-dot"></span>
        <div>
          <h1>Pin Matrix</h1>
          <div class="sub">Patch &nbsp;Synthesiser</div>
        </div>
      </div>
      <div class="plate">Model PM&middot;3<br>Mono / Paraphonic</div>
    </header>

    <div class="body">
      <!-- LEFT: the iconic pin patch matrix -->
      <div class="module">
        <h2>Pin Patch Matrix</h2>
        <div class="matrix-wrap">
          <div class="matrix">
            <svg id="matrixSvg" viewBox="0 0 260 220" aria-label="patch matrix"></svg>
          </div>
          <div class="hint">Click a hole to seat / pull a routing pin</div>
        </div>
      </div>

      <!-- RIGHT: joystick + voice tone -->
      <div class="module">
        <h2>Control Stick</h2>
        <div class="joy-wrap">
          <div class="joy" id="joy">
            <div class="cross-h"></div>
            <div class="cross-v"></div>
            <div class="ring"></div>
            <div class="stick" id="stick"></div>
          </div>
          <div class="hint">X &rarr; Cutoff &nbsp;&middot;&nbsp; Y &rarr; Ring Mod</div>
        </div>
      </div>
    </div>

    <!-- KNOB BANK -->
    <div class="module keys-module">
      <h2>Voice</h2>
      <div class="knob-grid" id="knobBank"></div>
    </div>

    <!-- KEYBOARD -->
    <div class="module keys-module">
      <h2>Keyboard</h2>
      <div class="keys" id="keys">
        <div class="bkeys" id="bkeys"></div>
      </div>
    </div>

    <div class="footer">
      <span>EMS-lineage &middot; Ring &middot; Diode Ladder</span>
      <div class="meter"><span id="meterBar"></span></div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---- host bridge ---------------------------------------------------
  var bridge = {
    setParam: function (i, v) { if (window.vstai && window.vstai.setParam) window.vstai.setParam(i, v); },
    noteOn:   function (n, v) { if (window.vstai && window.vstai.noteOn)  window.vstai.noteOn(n, v); },
    noteOff:  function (n)    { if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(n); }
  };

  // ---- parameter model ----------------------------------------------
  // index, name, default. All ranges are 0..1.
  var PARAMS = [
    { index: 0, name: "Osc Mix",   def: 0.5  },
    { index: 1, name: "Ring Mod",  def: 0.45 },
    { index: 2, name: "Cutoff",    def: 0.5  },
    { index: 3, name: "Resonance", def: 0.55 },
    { index: 4, name: "Env Amount",def: 0.7  },
    { index: 5, name: "Decay",     def: 0.45 },
    { index: 6, name: "Level",     def: 0.7  }
  ];
  var values = {};         // index -> current 0..1 value
  var knobEls = {};        // index -> { update() }

  function pushParam(index, v) {
    v = Math.max(0, Math.min(1, v));
    values[index] = v;
    bridge.setParam(index, v);
    if (knobEls[index]) knobEls[index].update();
  }

  // ===================================================================
  //  KNOBS (hand-drawn SVG, drag-vertical, dblclick reset, wheel fine)
  // ===================================================================
  var SVGNS = "http://www.w3.org/2000/svg";
  function el(tag, attrs) {
    var e = document.createElementNS(SVGNS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  function buildKnob(p) {
    var wrap = document.createElement("div");
    wrap.className = "knob";

    var svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("viewBox", "0 0 64 64");

    // outer well
    svg.appendChild(el("circle", { cx: 32, cy: 32, r: 27, fill: "#0a1c1d", stroke: "#04100f", "stroke-width": 2 }));
    // track arc background
    var A0 = 135, A1 = 405; // degrees (sweep 270)
    function polar(deg, r) {
      var a = (deg - 90) * Math.PI / 180;
      return [32 + r * Math.cos(a), 32 + r * Math.sin(a)];
    }
    function arcPath(fromDeg, toDeg, r) {
      var s = polar(fromDeg, r), e2 = polar(toDeg, r);
      var large = (toDeg - fromDeg) > 180 ? 1 : 0;
      return "M " + s[0] + " " + s[1] + " A " + r + " " + r + " 0 " + large + " 1 " + e2[0] + " " + e2[1];
    }
    var bg = el("path", { d: arcPath(A0, A1, 23), fill: "none", stroke: "#16383a", "stroke-width": 3.5, "stroke-linecap": "round" });
    svg.appendChild(bg);
    var arc = el("path", { fill: "none", stroke: "var(--accent)", "stroke-width": 3.5, "stroke-linecap": "round" });
    arc.style.filter = "drop-shadow(0 0 4px var(--accent))";
    svg.appendChild(arc);

    // knob body
    var body = el("circle", { cx: 32, cy: 32, r: 18, fill: "url(#kbody" + p.index + ")", stroke: "#05201f", "stroke-width": 1 });
    var defs = el("defs", {});
    var grad = el("radialGradient", { id: "kbody" + p.index, cx: "38%", cy: "30%", r: "75%" });
    grad.appendChild(el("stop", { offset: "0%", "stop-color": "#3b6e6c" }));
    grad.appendChild(el("stop", { offset: "60%", "stop-color": "#1d4544" }));
    grad.appendChild(el("stop", { offset: "100%", "stop-color": "#0c2625" }));
    defs.appendChild(grad);
    svg.appendChild(defs);
    svg.appendChild(body);

    // pointer notch
    var notch = el("line", { x1: 32, y1: 32, x2: 32, y2: 17, stroke: "var(--accent2)", "stroke-width": 2.5, "stroke-linecap": "round" });
    notch.style.filter = "drop-shadow(0 0 3px var(--accent2))";
    svg.appendChild(notch);
    svg.appendChild(el("circle", { cx: 32, cy: 32, r: 2.2, fill: "#e9e3d2" }));

    wrap.appendChild(svg);

    var name = document.createElement("div");
    name.className = "name"; name.textContent = p.name;
    var val = document.createElement("div");
    val.className = "val";
    wrap.appendChild(name);
    wrap.appendChild(val);

    function update() {
      var v = values[p.index];
      var deg = A0 + (A1 - A0) * v;
      arc.setAttribute("d", arcPath(A0, deg, 23));
      var pt = polar(deg, 14);
      notch.setAttribute("x2", pt[0]);
      notch.setAttribute("y2", pt[1]);
      val.textContent = Math.round(v * 100) + "%";
    }

    // interactions
    var dragging = false, lastY = 0;
    svg.addEventListener("pointerdown", function (e) {
      dragging = true; lastY = e.clientY;
      svg.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    svg.addEventListener("pointermove", function (e) {
      if (!dragging) return;
      var dy = lastY - e.clientY;
      lastY = e.clientY;
      pushParam(p.index, values[p.index] + dy * 0.005);
    });
    svg.addEventListener("pointerup", function (e) { dragging = false; });
    svg.addEventListener("pointercancel", function () { dragging = false; });
    svg.addEventListener("dblclick", function () { pushParam(p.index, p.def); });
    svg.addEventListener("wheel", function (e) {
      e.preventDefault();
      pushParam(p.index, values[p.index] - Math.sign(e.deltaY) * 0.02);
    }, { passive: false });

    knobEls[p.index] = { update: update };
    return wrap;
  }

  var bank = document.getElementById("knobBank");
  PARAMS.forEach(function (p) {
    values[p.index] = p.def;
    bank.appendChild(buildKnob(p));
  });

  // ===================================================================
  //  PIN PATCH MATRIX  (decorative routing grid that pulses with audio)
  // ===================================================================
  var ROWS = ["OSC 1", "OSC 2", "OSC 3", "RING", "NOISE", "FILTER"];
  var COLS = ["RING", "FILT", "ENV", "AMP", "OUT"];
  var matrix = document.getElementById("matrixSvg");
  var GX = 70, GY = 26, CW = 38, CH = 30;
  var pins = []; // { circle, glow, on, row, col, base }

  // pre-seated pins (the patch that matches the default sound)
  var seeded = { "0-0": 1, "1-0": 1, "3-1": 1, "0-2": 1, "5-2": 1, "5-3": 1, "4-3": 1, "0-4": 1, "2-4": 1 };

  // column labels
  COLS.forEach(function (c, j) {
    var t = el("text", { x: GX + j * CW + CW / 2, y: 16, "text-anchor": "middle", "class": "axis-label" });
    t.textContent = c;
    matrix.appendChild(t);
  });
  // row labels + holes
  ROWS.forEach(function (r, i) {
    var t = el("text", { x: GX - 8, y: GY + i * CH + CH / 2 + 3, "text-anchor": "end", "class": "axis-label" });
    t.textContent = r;
    matrix.appendChild(t);

    COLS.forEach(function (c, j) {
      var cx = GX + j * CW + CW / 2;
      var cy = GY + i * CH + CH / 2;
      // hole
      matrix.appendChild(el("circle", { cx: cx, cy: cy, r: 7, fill: "#06181a", stroke: "#0c2b2c", "stroke-width": 1.5 }));
      // glow halo (animated)
      var glow = el("circle", { cx: cx, cy: cy, r: 7, fill: "none", stroke: "var(--accent)", "stroke-width": 0, opacity: 0 });
      matrix.appendChild(glow);
      // the pin itself
      var key = i + "-" + j;
      var on = !!seeded[key];
      var fill = (j === 0 || i === 3) ? "var(--accent2)" : "var(--accent)";
      var pin = el("circle", { cx: cx, cy: cy, r: 5, "class": "pin",
        fill: on ? fill : "var(--pin-off)" });
      pin.dataset.key = key;
      matrix.appendChild(pin);

      var rec = { circle: pin, glow: glow, on: on, row: i, col: j, fill: fill };
      pins.push(rec);
      pin.addEventListener("click", function () {
        rec.on = !rec.on;
        pin.setAttribute("fill", rec.on ? rec.fill : "var(--pin-off)");
        recomputeMatrix();
      });
    });
  });

  // The matrix is a REAL patch router: each destination COLUMN sums the
  // sources seated into it and drives a live parameter, so seating / pulling
  // pins genuinely reshapes the sound (not just a light show).
  function recomputeMatrix() {
    var c0 = 0, c1 = 0, c2 = 0, c3 = 0, o1 = false, o2 = false, o3 = false;
    for (var q = 0; q < pins.length; q++) {
      var r = pins[q]; if (!r.on) continue;
      if (r.col === 0) c0++; else if (r.col === 1) c1++;
      else if (r.col === 2) c2++; else if (r.col === 3) c3++;
      else if (r.col === 4) { if (r.row === 0) o1 = true; else if (r.row === 1) o2 = true; else if (r.row === 2) o3 = true; }
    }
    pushParam(1, Math.min(1, 0.05 + c0 * 0.30));   // RING column -> Ring Mod
    pushParam(3, Math.min(1, 0.30 + c1 * 0.18));   // FILT column -> Resonance
    pushParam(4, Math.min(1, 0.15 + c2 * 0.28));   // ENV  column -> Env Amount
    pushParam(6, Math.min(1, 0.35 + c3 * 0.22));   // AMP  column -> Level
    pushParam(0, Math.max(0, Math.min(1, 0.5 + (o3 ? 0.30 : 0) - (o1 ? 0.30 : 0) - (o2 ? 0.15 : 0)))); // OUT -> Osc Mix
  }

  // ===================================================================
  //  JOYSTICK  -> Cutoff (X) + Ring Mod (Y)
  // ===================================================================
  var joy = document.getElementById("joy");
  var stick = document.getElementById("stick");
  var joyDrag = false;

  function placeStick() {
    // reflect current Cutoff/RingMod onto the stick position
    var x = values[2];       // 0..1
    var y = values[1];       // 0..1
    var px = (x - 0.5) * 0.78;   // -0.39..0.39 of half-size
    var py = (0.5 - y) * 0.78;
    stick.style.transform = "translate(" + (px * 132) + "px," + (py * 132) + "px)";
  }
  function joyTo(clientX, clientY) {
    var r = joy.getBoundingClientRect();
    var nx = (clientX - r.left) / r.width;   // 0..1
    var ny = (clientY - r.top) / r.height;   // 0..1
    pushParam(2, Math.max(0, Math.min(1, nx)));         // cutoff
    pushParam(1, Math.max(0, Math.min(1, 1 - ny)));     // ring mod
    placeStick();
  }
  joy.addEventListener("pointerdown", function (e) {
    joyDrag = true; joy.classList.add("grabbing"); stick.classList.add("lit");
    joy.setPointerCapture(e.pointerId);
    joyTo(e.clientX, e.clientY);
  });
  joy.addEventListener("pointermove", function (e) { if (joyDrag) joyTo(e.clientX, e.clientY); });
  joy.addEventListener("pointerup", function () { joyDrag = false; joy.classList.remove("grabbing"); stick.classList.remove("lit"); });
  joy.addEventListener("pointercancel", function () { joyDrag = false; joy.classList.remove("grabbing"); stick.classList.remove("lit"); });
  joy.addEventListener("dblclick", function () { pushParam(2, 0.5); pushParam(1, 0.45); placeStick(); });

  // ===================================================================
  //  KEYBOARD  (two octaves from C3) -> noteOn / noteOff
  // ===================================================================
  var keys = document.getElementById("keys");
  var bkeys = document.getElementById("bkeys");
  var START = 48;                       // C3
  var WHITE = [0, 2, 4, 5, 7, 9, 11];
  var BLACK = { 0: 1, 1: 3, 3: 6, 4: 8, 5: 10 }; // white-index -> black semitone
  var OCTAVES = 2;
  var down = {};                        // midi -> el

  var whiteList = [];
  for (var o = 0; o < OCTAVES; o++) {
    for (var w = 0; w < 7; w++) {
      var midi = START + o * 12 + WHITE[w];
      var k = document.createElement("div");
      k.className = "wkey";
      k.dataset.midi = midi;
      keys.appendChild(k);
      whiteList.push({ el: k, midi: midi });
    }
  }
  // place black keys over the gaps
  var totalWhite = OCTAVES * 7;
  for (var o2 = 0; o2 < OCTAVES; o2++) {
    for (var wi in BLACK) {
      wi = +wi;
      var whiteIdx = o2 * 7 + wi;
      var midiB = START + o2 * 12 + BLACK[wi];
      var b = document.createElement("div");
      b.className = "bkey";
      b.dataset.midi = midiB;
      b.style.left = ((whiteIdx + 1) / totalWhite * 100) + "%";
      bkeys.appendChild(b);
    }
  }

  function keyDown(elm) {
    var midi = +elm.dataset.midi;
    if (down[midi]) return;
    down[midi] = elm;
    elm.classList.add("down");
    bridge.noteOn(midi, 0.9);
    flashMatrix();
  }
  function keyUp(midi) {
    if (!down[midi]) return;
    down[midi].classList.remove("down");
    delete down[midi];
    bridge.noteOff(midi);
  }

  function targetKey(t) {
    if (!t) return null;
    if (t.classList && (t.classList.contains("wkey") || t.classList.contains("bkey"))) return t;
    return null;
  }
  var pointerHeld = false;
  function handleDown(e) {
    var t = targetKey(e.target);
    if (!t) return;
    pointerHeld = true;
    keyDown(t);
    e.preventDefault();
  }
  function handleMove(e) {
    if (!pointerHeld) return;
    var t = targetKey(document.elementFromPoint(e.clientX, e.clientY));
    // release keys no longer under the pointer
    for (var m in down) {
      if (!t || +t.dataset.midi !== +m) keyUp(+m);
    }
    if (t) keyDown(t);
  }
  function handleUp() {
    pointerHeld = false;
    for (var m in down) keyUp(+m);
  }
  keys.addEventListener("pointerdown", handleDown);
  window.addEventListener("pointermove", handleMove);
  window.addEventListener("pointerup", handleUp);

  // computer keyboard: A W S E D F T G Y H U J K
  var KEYMAP = { a:0, w:1, s:2, e:3, d:4, f:5, t:6, g:7, y:8, h:9, u:10, j:11, k:12 };
  window.addEventListener("keydown", function (e) {
    if (e.repeat) return;
    var sk = KEYMAP[e.key.toLowerCase()];
    if (sk === undefined) return;
    var midi = START + sk;
    if (down[midi]) return;
    down[midi] = { classList: { remove: function () {}, add: function () {} }, dataset: { midi: midi } };
    bridge.noteOn(midi, 0.9);
    flashMatrix();
  });
  window.addEventListener("keyup", function (e) {
    var sk = KEYMAP[e.key.toLowerCase()];
    if (sk === undefined) return;
    var midi = START + sk;
    if (down[midi]) { bridge.noteOff(midi); delete down[midi]; }
  });

  // ===================================================================
  //  ANIMATION — matrix routing dots pulse + meter, on rAF
  // ===================================================================
  var meterBar = document.getElementById("meterBar");
  var pulse = 0;          // decays; jumps on note
  var lit = 0;            // smoothed audio "activity"
  function flashMatrix() { pulse = 1; }

  var t0 = performance.now();
  function loop(now) {
    if (document.hidden) { requestAnimationFrame(loop); return; }
    var dt = (now - t0) / 1000; t0 = now;

    var active = Object.keys(down).length > 0;
    var target = active ? 1 : 0;
    lit += (target - lit) * Math.min(1, dt * 6);
    pulse *= Math.pow(0.06, dt);   // fast decay

    var energy = Math.max(lit, pulse);
    var phase = now / 1000;

    // pulse the seated pins; intensity ties to ring-mod + activity
    var ringGlow = values[1];
    for (var k = 0; k < pins.length; k++) {
      var pn = pins[k];
      if (!pn.on) { pn.glow.setAttribute("opacity", 0); continue; }
      // staggered shimmer so the routed dots feel alive
      var s = 0.5 + 0.5 * Math.sin(phase * 4 + (pn.row * 1.3 + pn.col * 0.7));
      var amp = energy * (0.35 + 0.65 * s) * (0.5 + 0.5 * ringGlow);
      pn.glow.setAttribute("opacity", (0.15 + 0.75 * amp).toFixed(3));
      pn.glow.setAttribute("stroke-width", (1 + 4 * amp).toFixed(2));
      pn.circle.setAttribute("r", (5 + 0.8 * amp).toFixed(2));
    }

    // output meter reflects level * activity
    var m = energy * values[6];
    meterBar.style.width = (m * 100).toFixed(1) + "%";

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ===================================================================
  //  INIT — push every default to the engine once
  // ===================================================================
  function initParams() {
    PARAMS.forEach(function (p) { pushParam(p.index, p.def); });
    recomputeMatrix();   // the seated patch defines the mapped params
    placeStick();
  }
  if (window.vstai && window.vstai.onReady) {
    window.vstai.onReady(initParams);
  } else {
    initParams();
  }
})();
</script>
</body>
</html>
