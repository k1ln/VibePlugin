<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patch Tower</title>
<style>
  :root{
    --amber:#ffae42;
    --violet:#9a6aff;
    --wood1:#2a1a10;
    --wood2:#3c2516;
    --panel:#161018;
    --ink:#0b0710;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Futura","Avenir Next",system-ui,sans-serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #241730 0%, #0b0710 60%),
      var(--ink);
    color:#e8dccb;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
    display:flex;align-items:center;justify-content:center;
  }

  /* ============ THE TOWER ============ */
  .tower{
    position:relative;
    width:560px;
    height:660px;
    border-radius:14px;
    padding:18px;
    /* wood cabinet */
    background:
      repeating-linear-gradient(92deg,
        rgba(255,210,150,.05) 0 6px,
        rgba(0,0,0,.10) 6px 13px),
      linear-gradient(150deg,var(--wood2),var(--wood1) 60%,#1c1109);
    box-shadow:
      0 40px 80px -20px #000,
      inset 0 0 0 2px rgba(0,0,0,.6),
      inset 0 0 0 4px rgba(255,180,90,.10),
      inset 0 60px 120px -60px rgba(255,174,66,.18);
    transform:perspective(1400px) rotateX(3deg);
  }
  /* brass corner screws */
  .screw{position:absolute;width:11px;height:11px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ffe3a8,#7a5a1e 70%,#2a1c08);
    box-shadow:0 1px 2px #000, inset 0 0 2px #000;}
  .screw::after{content:"";position:absolute;inset:3px;border-top:1.5px solid rgba(0,0,0,.5);transform:rotate(40deg)}
  .screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}
  .screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}

  /* ---- nameplate ---- */
  .plate{
    position:relative;
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;margin-bottom:14px;
    border-radius:8px;
    background:linear-gradient(180deg,#120b18,#070409);
    box-shadow:inset 0 0 0 1px rgba(255,174,66,.25), 0 4px 10px #000;
  }
  .plate h1{
    font-size:23px;letter-spacing:6px;font-weight:800;
    background:linear-gradient(90deg,var(--amber),#fff2d6 50%,var(--violet));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 18px rgba(255,174,66,.25);
  }
  .plate .sub{font-size:9px;letter-spacing:4px;color:#9a7d63}
  .pwr{display:flex;gap:7px;align-items:center}
  .led{width:9px;height:9px;border-radius:50%;background:var(--amber);
    box-shadow:0 0 10px var(--amber);animation:pulse 2.4s ease-in-out infinite}
  .led.v{background:var(--violet);box-shadow:0 0 10px var(--violet);animation-delay:.8s}
  @keyframes pulse{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}

  /* ---- oscilloscope: three stacked osc waves ---- */
  .scope{
    position:relative;height:96px;margin-bottom:14px;border-radius:8px;overflow:hidden;
    background:linear-gradient(180deg,#04060a,#0a0410);
    box-shadow:inset 0 0 0 1px rgba(154,106,255,.22), inset 0 0 30px #000;
  }
  .scope canvas{display:block;width:100%;height:100%}
  .scope .glass{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 80% at 50% -20%,rgba(255,255,255,.06),transparent 60%);}

  /* ---- module rack ---- */
  .rack{
    position:relative;
    display:grid;grid-template-columns:repeat(4,1fr);gap:12px 14px;
    z-index:2;
  }
  .mod{
    position:relative;
    background:linear-gradient(180deg,#1d141f,#0d0810);
    border-radius:9px;padding:10px 8px 12px;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.04),
      inset 0 1px 0 rgba(255,210,150,.10),
      0 6px 14px -6px #000;
    display:flex;flex-direction:column;align-items:center;
  }
  .mod .lbl{font-size:9.5px;letter-spacing:2px;color:#cdb191;text-transform:uppercase;margin-bottom:6px}
  .mod .val{font-size:10px;font-variant-numeric:tabular-nums;color:var(--amber);
    margin-top:7px;letter-spacing:1px;min-height:12px;text-shadow:0 0 6px rgba(255,174,66,.5)}

  /* knob */
  .knob{position:relative;width:62px;height:62px;cursor:ns-resize;touch-action:none}
  .knob svg{position:absolute;inset:0;overflow:visible}
  .knob .cap{filter:drop-shadow(0 3px 4px rgba(0,0,0,.6))}
  .knob:hover .ring{filter:drop-shadow(0 0 6px var(--amber))}

  /* patch jacks per module (top-right) */
  .jack{position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#444,#0a0a0a 70%);
    box-shadow:inset 0 0 0 2px #6a5638, 0 0 0 1px #000;}
  .jack.b{top:auto;bottom:8px;left:8px;right:auto;box-shadow:inset 0 0 0 2px #5a4a7a,0 0 0 1px #000}

  /* cable overlay */
  .cables{position:absolute;inset:0;pointer-events:none;z-index:5}
  .cables path{fill:none;stroke-linecap:round}

  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:13px;
    font-size:8.5px;letter-spacing:3px;color:#7c6248}
  .vents{display:flex;gap:4px}
  .vents i{display:block;width:3px;height:13px;border-radius:2px;background:#0a0509;
    box-shadow:inset 0 0 0 1px rgba(255,174,66,.12)}
</style>
</head>
<body>
  <div class="tower" id="tower">
    <span class="screw tl"></span><span class="screw tr"></span>
    <span class="screw bl"></span><span class="screw br"></span>

    <div class="plate">
      <div>
        <h1>PATCH&nbsp;TOWER</h1>
        <div class="sub">SEMI-MODULAR · 3-OSC · MONO</div>
      </div>
      <div class="pwr"><span class="led"></span><span class="led v"></span></div>
    </div>

    <div class="scope"><canvas id="scope" width="520" height="96"></canvas><div class="glass"></div></div>

    <div class="rack" id="rack"></div>

    <svg class="cables" id="cables" viewBox="0 0 560 660" preserveAspectRatio="none"></svg>

    <div class="foot">
      <span>PATCH TOWER · ORIGINAL MODULAR</span>
      <div class="vents"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    </div>
  </div>

<script>
(function(){
  var PARAMS=[
    {name:"Cutoff",   index:0, def:0.42},
    {name:"Reso",     index:1, def:0.5 },
    {name:"Env Amt",  index:2, def:0.65},
    {name:"Detune",   index:3, def:0.4 },
    {name:"Sync",     index:4, def:0.25},
    {name:"Noise",    index:5, def:0.15},
    {name:"Glide",    index:6, def:0.2 },
    {name:"Level",    index:7, def:0.7 }
  ];

  var rack=document.getElementById('rack');
  var states=[]; // {p, val, valEl, ringEl, capEl}

  function send(idx,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(idx,v); }

  function fmt(p,v){
    if(p.name==="Cutoff") return Math.round(28*Math.exp(v*6.6))+" Hz";
    if(p.name==="Glide")  return Math.round((0.001+v*v*0.6)*1000)+" ms";
    return Math.round(v*100)+"%";
  }

  function makeModule(p){
    var mod=document.createElement('div'); mod.className='mod';
    var lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=p.name;
    var jt=document.createElement('span'); jt.className='jack';
    var jb=document.createElement('span'); jb.className='jack b';

    var knob=document.createElement('div'); knob.className='knob';
    knob.innerHTML=
      '<svg viewBox="0 0 62 62">'+
        '<circle cx="31" cy="31" r="27" fill="none" stroke="#0a0510" stroke-width="6"/>'+
        '<circle class="ringbg" cx="31" cy="31" r="27" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="6"/>'+
        '<circle class="ring" cx="31" cy="31" r="27" fill="none" stroke="url(#g'+p.index+')" '+
          'stroke-width="6" stroke-linecap="round" '+
          'transform="rotate(135 31 31)"/>'+
        '<defs><linearGradient id="g'+p.index+'" x1="0" y1="0" x2="1" y2="1">'+
          '<stop offset="0" stop-color="#ffae42"/><stop offset="1" stop-color="#9a6aff"/>'+
        '</linearGradient></defs>'+
        '<g class="cap">'+
          '<circle cx="31" cy="31" r="19" fill="#1a1118" stroke="#000" stroke-width="1"/>'+
          '<circle cx="31" cy="31" r="19" fill="url(#cap'+p.index+')"/>'+
          '<line class="ind" x1="31" y1="31" x2="31" y2="16" stroke="#ffae42" stroke-width="2.5" stroke-linecap="round"/>'+
        '</g>'+
        '<defs><radialGradient id="cap'+p.index+'" cx="38%" cy="30%" r="75%">'+
          '<stop offset="0" stop-color="#3a2a3e"/><stop offset="1" stop-color="#120a16"/>'+
        '</radialGradient></defs>'+
      '</svg>';

    var val=document.createElement('div'); val.className='val';

    mod.appendChild(lbl); mod.appendChild(jt); mod.appendChild(jb);
    mod.appendChild(knob); mod.appendChild(val);
    rack.appendChild(mod);

    var ring=knob.querySelector('.ring');
    var ind=knob.querySelector('.ind');
    var circ=2*Math.PI*27;
    ring.style.strokeDasharray=circ*0.75+' '+circ; // 270deg arc

    var st={p:p,val:p.def,valEl:val,ring:ring,ind:ind,circ:circ,knob:knob};
    states.push(st);

    function paint(){
      var v=st.val;
      ring.style.strokeDashoffset = circ*0.75*(1-v);
      var ang=-135+270*v;
      ind.setAttribute('transform','rotate('+ang+' 31 31)');
      val.textContent=fmt(p,v);
    }
    function setVal(v){ st.val=Math.max(0,Math.min(1,v)); paint(); send(p.index,st.val); }
    st.setVal=setVal; st.paint=paint;

    // drag (vertical) + wheel
    var dragging=false, lastY=0;
    knob.addEventListener('pointerdown',function(e){
      dragging=true; lastY=e.clientY; knob.setPointerCapture(e.pointerId); e.preventDefault();
    });
    knob.addEventListener('pointermove',function(e){
      if(!dragging) return;
      var dy=lastY-e.clientY; lastY=e.clientY;
      setVal(st.val + dy*0.006);
    });
    knob.addEventListener('pointerup',function(e){dragging=false;});
    knob.addEventListener('pointercancel',function(){dragging=false;});
    knob.addEventListener('wheel',function(e){ e.preventDefault(); setVal(st.val - e.deltaY*0.0008); },{passive:false});
    knob.addEventListener('dblclick',function(){ setVal(p.def); });

    setVal(p.def);
    return st;
  }

  // ---- cables across the rack ----
  function drawCables(){
    var svg=document.getElementById('cables');
    var tower=document.getElementById('tower').getBoundingClientRect();
    svg.innerHTML='';
    var cols=['#ffae42','#9a6aff','#ff7a4a','#6ad0ff'];
    var pairs=[[0,5],[3,4],[1,6],[2,7],[0,2],[4,5]];
    pairs.forEach(function(pr,i){
      var a=states[pr[0]], b=states[pr[1]];
      if(!a||!b) return;
      var ra=a.knob.getBoundingClientRect(), rb=b.knob.getBoundingClientRect();
      var ax=ra.left-tower.left+ra.width/2, ay=ra.top-tower.top+4;
      var bx=rb.left-tower.left+rb.width/2, by=rb.top-tower.top+4;
      var sag=Math.max(40,Math.abs(bx-ax)*0.4);
      var mx=(ax+bx)/2, my=Math.max(ay,by)+sag;
      var p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d','M '+ax+' '+ay+' Q '+mx+' '+my+' '+bx+' '+by);
      p.setAttribute('stroke',cols[i%cols.length]);
      p.setAttribute('stroke-width','3');
      p.setAttribute('opacity','0.5');
      p.setAttribute('fill','none');
      p.setAttribute('stroke-linecap','round');
      p.style.filter='drop-shadow(0 2px 3px rgba(0,0,0,.6))';
      svg.appendChild(p);
      // plug ends
      [[ax,ay],[bx,by]].forEach(function(pt){
        var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',pt[0]);c.setAttribute('cy',pt[1]);c.setAttribute('r','3.5');
        c.setAttribute('fill',cols[i%cols.length]);c.setAttribute('opacity','0.85');
        svg.appendChild(c);
      });
    });
  }

  // ---- oscilloscope: three stacked osc waveforms driven by params ----
  var cv=document.getElementById('scope'), ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height,t0=performance.now();
  function val(name){ var s=states.find(function(x){return x.p.name===name;}); return s?s.val:0; }
  function scope(){
    var t=(performance.now()-t0)/1000;
    ctx.clearRect(0,0,W,H);
    // faint grid
    ctx.strokeStyle='rgba(154,106,255,.10)';ctx.lineWidth=1;
    for(var gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    var detune=val("Detune"), sync=val("Sync"), noise=val("Noise"), cut=val("Cutoff");
    var lanes=[
      {y:H*0.26,c:'#ffae42',f:2.0+detune*0.4,sh:'saw'},
      {y:H*0.5, c:'#ff7a4a',f:(2.0)*(1+sync*1.5),sh:'pulse'},
      {y:H*0.74,c:'#9a6aff',f:2.0-detune*0.4,sh:'tri'}
    ];
    lanes.forEach(function(L){
      ctx.beginPath();
      var amp=14*(0.5+cut*0.6);
      for(var x=0;x<=W;x++){
        var ph=(x/W*L.f*Math.PI*2)+t*2.4;
        var s;
        if(L.sh==='saw'){ var u=(ph/(Math.PI*2))%1; s=u*2-1; }
        else if(L.sh==='pulse'){ s=(Math.sin(ph)>0)?1:-1; }
        else { s=Math.asin(Math.sin(ph))*(2/Math.PI); }
        s+= (Math.random()*2-1)*noise*0.5;
        var y=L.y - s*amp;
        if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.strokeStyle=L.c;ctx.lineWidth=1.8;
      ctx.shadowColor=L.c;ctx.shadowBlur=8;
      ctx.stroke();ctx.shadowBlur=0;
    });
    requestAnimationFrame(scope);
  }

  function build(){
    PARAMS.forEach(makeModule);
    drawCables();
    requestAnimationFrame(scope);
    window.addEventListener('resize',drawCables);
    setTimeout(drawCables,60);
  }

  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(build); else build();
})();
</script>
</body>
</html>
