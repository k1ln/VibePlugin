<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patch Tower — test bench</title><style>
  :root{--ac:#ffae42}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Patch Tower<\/title>\n<style>\n  :root{\n    --amber:#ffae42;\n    --violet:#9a6aff;\n    --wood1:#2a1a10;\n    --wood2:#3c2516;\n    --panel:#161018;\n    --ink:#0b0710;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%}\n  body{\n    font-family:\"Futura\",\"Avenir Next\",system-ui,sans-serif;\n    background:\n      radial-gradient(1200px 700px at 50% -10%, #241730 0%, #0b0710 60%),\n      var(--ink);\n    color:#e8dccb;\n    overflow:hidden;\n    -webkit-user-select:none;user-select:none;\n    display:flex;align-items:center;justify-content:center;\n  }\n\n  /* ============ THE TOWER ============ */\n  .tower{\n    position:relative;\n    width:560px;\n    height:660px;\n    border-radius:14px;\n    padding:18px;\n    /* wood cabinet */\n    background:\n      repeating-linear-gradient(92deg,\n        rgba(255,210,150,.05) 0 6px,\n        rgba(0,0,0,.10) 6px 13px),\n      linear-gradient(150deg,var(--wood2),var(--wood1) 60%,#1c1109);\n    box-shadow:\n      0 40px 80px -20px #000,\n      inset 0 0 0 2px rgba(0,0,0,.6),\n      inset 0 0 0 4px rgba(255,180,90,.10),\n      inset 0 60px 120px -60px rgba(255,174,66,.18);\n    transform:perspective(1400px) rotateX(3deg);\n  }\n  /* brass corner screws */\n  .screw{position:absolute;width:11px;height:11px;border-radius:50%;\n    background:radial-gradient(circle at 35% 30%,#ffe3a8,#7a5a1e 70%,#2a1c08);\n    box-shadow:0 1px 2px #000, inset 0 0 2px #000;}\n  .screw::after{content:\"\";position:absolute;inset:3px;border-top:1.5px solid rgba(0,0,0,.5);transform:rotate(40deg)}\n  .screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}\n  .screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}\n\n  /* ---- nameplate ---- */\n  .plate{\n    position:relative;\n    display:flex;align-items:center;justify-content:space-between;\n    padding:10px 16px;margin-bottom:14px;\n    border-radius:8px;\n    background:linear-gradient(180deg,#120b18,#070409);\n    box-shadow:inset 0 0 0 1px rgba(255,174,66,.25), 0 4px 10px #000;\n  }\n  .plate h1{\n    font-size:23px;letter-spacing:6px;font-weight:800;\n    background:linear-gradient(90deg,var(--amber),#fff2d6 50%,var(--violet));\n    -webkit-background-clip:text;background-clip:text;color:transparent;\n    text-shadow:0 0 18px rgba(255,174,66,.25);\n  }\n  .plate .sub{font-size:9px;letter-spacing:4px;color:#9a7d63}\n  .pwr{display:flex;gap:7px;align-items:center}\n  .led{width:9px;height:9px;border-radius:50%;background:var(--amber);\n    box-shadow:0 0 10px var(--amber);animation:pulse 2.4s ease-in-out infinite}\n  .led.v{background:var(--violet);box-shadow:0 0 10px var(--violet);animation-delay:.8s}\n  @keyframes pulse{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}\n\n  /* ---- oscilloscope: three stacked osc waves ---- */\n  .scope{\n    position:relative;height:96px;margin-bottom:14px;border-radius:8px;overflow:hidden;\n    background:linear-gradient(180deg,#04060a,#0a0410);\n    box-shadow:inset 0 0 0 1px rgba(154,106,255,.22), inset 0 0 30px #000;\n  }\n  .scope canvas{display:block;width:100%;height:100%}\n  .scope .glass{position:absolute;inset:0;pointer-events:none;\n    background:radial-gradient(120% 80% at 50% -20%,rgba(255,255,255,.06),transparent 60%);}\n\n  /* ---- module rack ---- */\n  .rack{\n    position:relative;\n    display:grid;grid-template-columns:repeat(4,1fr);gap:12px 14px;\n    z-index:2;\n  }\n  .mod{\n    position:relative;\n    background:linear-gradient(180deg,#1d141f,#0d0810);\n    border-radius:9px;padding:10px 8px 12px;\n    box-shadow:\n      inset 0 0 0 1px rgba(255,255,255,.04),\n      inset 0 1px 0 rgba(255,210,150,.10),\n      0 6px 14px -6px #000;\n    display:flex;flex-direction:column;align-items:center;\n  }\n  .mod .lbl{font-size:9.5px;letter-spacin an class=\"led\"><\/span><span class=\"led v\"><\/span><\/div>\n    <\/div>\n\n    <div class=\"scope\"><canvas id=\"scope\" width=\"520\" height=\"96\"><\/canvas><div class=\"glass\"><\/div><\/div>\n\n    <div class=\"rack\" id=\"rack\"><\/div>\n\n    <svg class=\"cables\" id=\"cables\" viewBox=\"0 0 560 660\" preserveAspectRatio=\"none\"><\/svg>\n\n    <div class=\"foot\">\n      <span>PATCH TOWER · ORIGINAL MODULAR<\/span>\n      <div class=\"vents\"><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><i><\/i><\/div>\n    <\/div>\n  <\/div>\n\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"Cutoff\",   index:0, def:0.42},\n    {name:\"Reso\",     index:1, def:0.5 },\n    {name:\"Env Amt\",  index:2, def:0.65},\n    {name:\"Detune\",   index:3, def:0.4 },\n    {name:\"Sync\",     index:4, def:0.25},\n    {name:\"Noise\",    index:5, def:0.15},\n    {name:\"Glide\",    index:6, def:0.2 },\n    {name:\"Level\",    index:7, def:0.7 }\n  ];\n\n  var rack=document.getElementById('rack');\n  var states=[]; // {p, val, valEl, ringEl, capEl}\n\n  function send(idx,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(idx,v); }\n\n  function fmt(p,v){\n    if(p.name===\"Cutoff\") return Math.round(28*Math.exp(v*6.6))+\" Hz\";\n    if(p.name===\"Glide\")  return Math.round((0.001+v*v*0.6)*1000)+\" ms\";\n    return Math.round(v*100)+\"%\";\n  }\n\n  function makeModule(p){\n    var mod=document.createElement('div'); mod.className='mod';\n    var lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=p.name;\n    var jt=document.createElement('span'); jt.className='jack';\n    var jb=document.createElement('span'); jb.className='jack b';\n\n    var knob=document.createElement('div'); knob.className='knob';\n    knob.innerHTML=\n      '<svg viewBox=\"0 0 62 62\">'+\n        '<circle cx=\"31\" cy=\"31\" r=\"27\" fill=\"none\" stroke=\"#0a0510\" stroke-width=\"6\"/>'+\n        '<circle class=\"ringbg\" cx=\"31\" cy=\"31\" r=\"27\" fill=\"none\" stroke=\"rgb istener('resize',drawCables);\n    setTimeout(drawCables,60);\n  }\n\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(build); else build();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
