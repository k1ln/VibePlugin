<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
@property --p{syntax:'<number>';inherits:false;initial-value:0}
:root{
  --ac:#ff7ad1; --ac2:#b08cff;
  --cream:#efe7d4; --cream2:#e2d7bd; --ink:#2b2620;
  --wood:#5a3d28; --wood2:#3c2718;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font:13px ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(120% 90% at 50% -10%,#23211c 0%,#13110d 60%,#0a0907 100%);
  display:flex;align-items:center;justify-content:center;padding:18px;-webkit-font-smoothing:antialiased;
}

/* ---- the boutique chassis: cream surface in a wood frame ---- */
.synth{
  position:relative;width:100%;max-width:760px;
  border-radius:14px;
  padding:9px;
  background:
    linear-gradient(150deg,var(--wood) 0%,var(--wood2) 100%);
  box-shadow:
    0 36px 80px rgba(0,0,0,.62),
    0 2px 0 rgba(255,255,255,.06) inset,
    0 -3px 14px rgba(0,0,0,.5) inset;
  animation:rise .7s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(22px) scale(.985)}to{opacity:1;transform:none}}
.surface{
  position:relative;border-radius:8px;overflow:hidden;
  background:
    linear-gradient(180deg,#f4ecda,#e7dcc2 62%,#ddd0b2 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,.7) inset,
    0 -10px 26px rgba(120,96,52,.22) inset,
    0 0 0 1px rgba(90,61,40,.35);
}
/* faint silk-screen print noise / brushed feel */
.surface::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background:
    repeating-linear-gradient(92deg,rgba(120,96,52,.045) 0 2px,transparent 2px 5px),
    radial-gradient(140% 70% at 50% 0%,rgba(255,255,255,.5),transparent 60%);
  mix-blend-mode:multiply;
}

/* ---------------- header / brand plate ---------------- */
.head{
  position:relative;z-index:2;display:flex;align-items:flex-end;gap:14px;
  padding:16px 22px 12px;
  border-bottom:2px solid rgba(90,61,40,.28);
}
.brand{display:flex;flex-direction:column;line-height:1}
.brand .mk{font-size:9.5px;letter-spacing:.42em;color:#8a7048;font-weight:700;text-transform:uppercase}
.brand h1{
  margin:3px 0 0;font-size:25px;font-weight:900;letter-spacing:.02em;
  color:#2b2620;
  text-shadow:0 1px 0 rgba(255,255,255,.55), 0 -1px 0 rgba(90,61,40,.2);
}
.brand h1 em{font-style:normal;
  background:linear-gradient(90deg,var(--ac),var(--ac2));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.tag{font-size:9.5px;letter-spacing:.28em;color:#9a8255;text-transform:uppercase;margin-top:3px}

/* ---------------- VOICE LED bank (the motif) ---------------- */
.voices{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.voices .vlbl{font-size:8.5px;letter-spacing:.34em;color:#8a7048;text-transform:uppercase;font-weight:700}
.bank{display:flex;gap:9px;padding:8px 11px;border-radius:9px;
  background:linear-gradient(180deg,#26211a,#161209);
  box-shadow:0 1px 0 rgba(255,255,255,.18),0 -2px 6px rgba(0,0,0,.5) inset, 0 2px 5px rgba(0,0,0,.4)}
.voice{position:relative;width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#5e564a,#221d15 75%);
  box-shadow:0 1px 1px rgba(0,0,0,.6) inset,0 1px 0 rgba(255,255,255,.07)}
.voice::after{content:"";position:absolute;inset:2px;border-radius:50%;
  background:var(--ac);opacity:0;transform:scale(.55);
  box-shadow:0 0 9px var(--ac),0 0 18px var(--ac);transition:opacity .12s,transform .12s}
.voice.on::after{opacity:1;transform:scale(1)}
.voice .num{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);
  font-size:7px;color:#8a7048;font-weight:700}

/* ---------------- main body ---------------- */
.body{position:relative;z-index:2;padding:18px 22px 6px}

/* section title rule, screen-printed style */
.sect{display:grid;gap:14px}
.row{display:flex;gap:22px;align-items:stretch;flex-wrap:wrap}
.module{
  flex:1 1 0;min-width:220px;position:relative;
  padding:14px 16px 16px;border-radius:9px;
  background:linear-gradient(180deg,rgba(255,255,255,.34),rgba(255,255,255,0));
  box-shadow:0 0 0 1px rgba(90,61,40,.18),0 1px 0 rgba(255,255,255,.5) inset;
}
.module>.mt{font-size:9px;letter-spacing:.3em;color:#8a7048;text-transform:uppercase;font-weight:800;margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.module>.mt::after{content:"";flex:1;height:1px;background:repeating-linear-gradient(90deg,rgba(90,61,40,.3) 0 5px,transparent 5px 9px)}

.knobs{display:flex;gap:8px;justify-content:space-around;flex-wrap:wrap}

/* ---------------- bakelite knob ---------------- */
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;width:80px;
  animation:pop .55s both;animation-delay:var(--d)}
@keyframes pop{from{opacity:0;transform:translateY(9px) scale(.92)}to{opacity:1;transform:none}}
.knob{--p:0;position:relative;width:62px;height:62px;cursor:ns-resize;touch-action:none;user-select:none}
/* outer scale ticks etched into cream */
.knob .scale{position:absolute;inset:-9px;border-radius:50%;
  background:repeating-conic-gradient(from 215deg,rgba(90,61,40,.55) 0 1.1deg,transparent 1.1deg 13.5deg);
  -webkit-mask:radial-gradient(circle,transparent 33px,#000 34px,#000 36px,transparent 37px);
  mask:radial-gradient(circle,transparent 33px,#000 34px,#000 36px,transparent 37px)}
/* glowing active arc, themed */
.knob .arc{position:absolute;inset:-5px;border-radius:50%;
  background:conic-gradient(from 215deg,
    var(--ac) calc(var(--p)*290deg),
    color-mix(in srgb,var(--ac2) 60%,var(--ac)) calc(var(--p)*290deg),
    rgba(90,61,40,.14) calc(var(--p)*290deg) 290deg,
    transparent 290deg);
  -webkit-mask:radial-gradient(circle,transparent 30px,#000 31px,#000 33.5px,transparent 34.5px);
  mask:radial-gradient(circle,transparent 30px,#000 31px,#000 33.5px,transparent 34.5px);
  filter:drop-shadow(0 0 calc(2px + var(--p)*7px) color-mix(in srgb,var(--ac) 70%,transparent));
  transition:--p .12s cubic-bezier(.2,.8,.25,1)}
/* the cap — ivory/bakelite */
.knob .cap{position:absolute;inset:8px;border-radius:50%;
  background:
    radial-gradient(circle at 42% 30%,#fbf5e8,#e6dcc6 52%,#bcaa86 100%);
  box-shadow:
    0 2px 5px rgba(60,39,24,.45),
    0 1px 0 rgba(255,255,255,.85) inset,
    0 -4px 8px rgba(120,96,52,.35) inset}
.knob.act .cap{box-shadow:0 2px 5px rgba(60,39,24,.45),0 1px 0 rgba(255,255,255,.85) inset,0 -4px 8px rgba(120,96,52,.35) inset,0 0 0 2px color-mix(in srgb,var(--ac) 60%,transparent)}
/* pointer notch */
.knob .ptr{position:absolute;left:50%;top:9px;width:3px;height:18px;margin-left:-1.5px;border-radius:2px;
  background:linear-gradient(var(--ink),#5a3d28);
  box-shadow:0 0 0 1px rgba(255,255,255,.3);
  transform-origin:50% 22px;
  transform:rotate(calc((var(--p) - .5)*290deg));
  transition:transform .12s cubic-bezier(.2,.8,.25,1)}
.cnm{font-size:9.5px;letter-spacing:.13em;color:#6a5536;text-transform:uppercase;font-weight:800;text-align:center}
.cval{font-size:11px;font-weight:800;color:#2b2620;font-variant-numeric:tabular-nums;
  background:rgba(90,61,40,.1);padding:1px 8px;border-radius:5px;min-width:38px;text-align:center}
.cell:hover .cval{background:color-mix(in srgb,var(--ac) 28%,rgba(90,61,40,.1))}

/* ---------------- ADSR module : live envelope graph ---------------- */
.envwrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.graph{flex:1 1 200px;min-width:200px;height:96px;border-radius:7px;position:relative;
  background:linear-gradient(180deg,#1b1710,#0e0b06);
  box-shadow:0 -2px 7px rgba(0,0,0,.5) inset,0 1px 0 rgba(255,255,255,.18)}
.graph svg{position:absolute;inset:0;width:100%;height:100%}
.graph .grid line{stroke:rgba(255,255,255,.05)}
.envline{fill:none;stroke:url(#eg);stroke-width:2.4;stroke-linejoin:round;
  filter:drop-shadow(0 0 5px var(--ac))}
.envfill{fill:url(#ef);opacity:.5}
.dot{fill:#fff;filter:drop-shadow(0 0 4px var(--ac))}
.sweep{stroke:var(--ac);stroke-width:1.5;opacity:.0}

footer{position:relative;z-index:2;display:flex;align-items:center;gap:10px;
  padding:11px 22px 16px;font-size:10px;color:#8a7048;letter-spacing:.04em}
footer .dotL{width:7px;height:7px;border-radius:50%;background:var(--ac);
  box-shadow:0 0 8px var(--ac);animation:bp 2.4s ease-in-out infinite}
@keyframes bp{0%,100%{opacity:.5}50%{opacity:1}}
footer b{color:#6a5536;font-weight:800;letter-spacing:.22em;text-transform:uppercase}
footer .sp{margin-left:auto;font-style:italic;color:#9a8255;max-width:430px;text-align:right;line-height:1.4}
</style></head><body>
<div class="synth">
 <div class="surface">
  <div class="head">
    <div class="brand">
      <span class="mk">Vibe Instruments</span>
      <h1>Analog <em>Poly</em></h1>
      <span class="tag">8-Voice · Two-Oscillator · 4-Pole</span>
    </div>
    <div class="voices">
      <span class="vlbl">Voices</span>
      <div class="bank" id="bank"></div>
    </div>
  </div>

  <div class="body">
   <div class="sect">
    <div class="row">

      <!-- OSCILLATOR / DETUNE -->
      <div class="module">
        <div class="mt">Oscillators</div>
        <div class="knobs" id="oscK"></div>
      </div>

      <!-- FILTER -->
      <div class="module">
        <div class="mt">Resonant Filter</div>
        <div class="knobs" id="filtK"></div>
      </div>

    </div>

    <!-- ENVELOPE -->
    <div class="module">
      <div class="mt">Amplitude Envelope</div>
      <div class="envwrap">
        <div class="graph">
          <svg viewBox="0 0 300 96" preserveAspectRatio="none">
            <defs>
              <linearGradient id="eg" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#ff7ad1"/><stop offset="1" stop-color="#b08cff"/>
              </linearGradient>
              <linearGradient id="ef" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#ff7ad1" stop-opacity=".55"/>
                <stop offset="1" stop-color="#b08cff" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <g class="grid">
              <line x1="0" y1="24" x2="300" y2="24"/><line x1="0" y1="48" x2="300" y2="48"/><line x1="0" y1="72" x2="300" y2="72"/>
            </g>
            <path class="envfill" id="envfill" d=""/>
            <path class="envline" id="envline" d=""/>
            <line class="sweep" id="sweep" x1="0" y1="6" x2="0" y2="90"/>
            <circle class="dot" id="dA" r="2.6"/><circle class="dot" id="dD" r="2.6"/><circle class="dot" id="dS" r="2.6"/>
          </svg>
        </div>
        <div class="knobs" id="envK"></div>
      </div>
    </div>
   </div>
  </div>

  <footer>
    <span class="dotL"></span><b>Analog Poly</b>
    <span class="sp" id="sp"></span>
  </footer>
 </div>
</div>

<script>
(function(){
  // ---- exact param contract (re-read from spec) ----
  var P=[
    {name:"Detune",      index:0,min:0,max:1,def:0.3 },
    {name:"Cutoff",      index:1,min:0,max:1,def:0.55},
    {name:"Resonance",   index:2,min:0,max:1,def:0.35},
    {name:"FilterEnvAmt",index:3,min:0,max:1,def:0.6 },
    {name:"Attack",      index:4,min:0,max:1,def:0.02},
    {name:"Decay",       index:5,min:0,max:1,def:0.35},
    {name:"Sustain",     index:6,min:0,max:1,def:0.7 },
    {name:"Release",     index:7,min:0,max:1,def:0.3 }
  ];
  var byName={}; P.forEach(function(p){byName[p.name]=p;});
  var SP=document.getElementById('sp');
  SP.textContent="A warm polyphonic analog synth — two detuned oscillators per voice into a resonant 4-pole low-pass.";

  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }
  function fmtPct(v){ return Math.round(v*100)+"%"; }
  function fmtMs(v){ // map 0..1 to a friendly time-ish readout
    var ms = Math.round((v*v)*4000)+1;
    return ms>=1000 ? (ms/1000).toFixed(2)+"s" : ms+"ms";
  }
  function labelFor(p,v){
    if(p.name==="Attack"||p.name==="Decay"||p.name==="Release") return fmtMs(v);
    if(p.name==="Cutoff"){ var hz=Math.round(40*Math.pow(360,v)); return hz>=1000?(hz/1000).toFixed(1)+"k":hz+"Hz"; }
    return fmtPct(v);
  }

  // store live normalized values for the env graph
  var live={}; P.forEach(function(p){ live[p.name]=(p.def-p.min)/(p.max-p.min); });

  function makeKnob(host,p){
    var cell=document.createElement('div'); cell.className='cell';
    cell.style.setProperty('--d',(p.index*55)+'ms');
    cell.innerHTML=
      '<div class="knob"><i class="scale"></i><i class="arc"></i><i class="cap"></i><i class="ptr"></i></div>'+
      '<div class="cnm">'+p.name.replace("FilterEnvAmt","Env Amt")+'</div>'+
      '<div class="cval"></div>';
    host.appendChild(cell);
    var knob=cell.querySelector('.knob'), arc=cell.querySelector('.arc'), val=cell.querySelector('.cval');
    var v=p.def;
    function norm(){ return (v-p.min)/(p.max-p.min||1); }
    function paint(){
      var n=norm(); knob.style.setProperty('--p',n);
      val.textContent=labelFor(p,n);
      live[p.name]=n;
      send(p.index,v);
      if(p.name==="Attack"||p.name==="Decay"||p.name==="Sustain"||p.name==="Release") drawEnv();
    }
    function setN(n){ n=n<0?0:n>1?1:n; v=p.min+(p.max-p.min)*n; paint(); }
    knob.addEventListener('pointerdown',function(e){
      knob._d=1; knob._y=e.clientY; knob._n=norm(); knob.classList.add('act');
      knob.setPointerCapture(e.pointerId); e.preventDefault();
    });
    knob.addEventListener('pointermove',function(e){
      if(!knob._d)return;
      var spd = e.shiftKey ? 620 : 200;
      setN(knob._n+(knob._y-e.clientY)/spd);
    });
    function end(){ knob._d=0; knob.classList.remove('act'); }
    knob.addEventListener('pointerup',end);
    knob.addEventListener('pointercancel',end);
    knob.addEventListener('dblclick',function(){ v=p.def; paint(); });
    knob.addEventListener('wheel',function(e){ e.preventDefault(); setN(norm()+(e.deltaY<0?0.025:-0.025)); },{passive:false});
    paint();
  }

  makeKnob(document.getElementById('oscK'),  byName["Detune"]);
  makeKnob(document.getElementById('filtK'), byName["Cutoff"]);
  makeKnob(document.getElementById('filtK'), byName["Resonance"]);
  makeKnob(document.getElementById('filtK'), byName["FilterEnvAmt"]);
  makeKnob(document.getElementById('envK'),  byName["Attack"]);
  makeKnob(document.getElementById('envK'),  byName["Decay"]);
  makeKnob(document.getElementById('envK'),  byName["Sustain"]);
  makeKnob(document.getElementById('envK'),  byName["Release"]);

  // ---- live ADSR envelope graph ----
  var W=300,H=96, fillEl=document.getElementById('envfill'), lineEl=document.getElementById('envline');
  var dA=document.getElementById('dA'),dD=document.getElementById('dD'),dS=document.getElementById('dS');
  function drawEnv(){
    var a=live["Attack"], d=live["Decay"], s=live["Sustain"], r=live["Release"];
    var x0=4, top=8, bot=H-8;
    var aw=8+a*90, dw=8+d*80, sw=46, rw=8+r*80;
    var total=aw+dw+sw+rw, scale=(W-x0*2)/total;
    aw*=scale; dw*=scale; sw*=scale; rw*=scale;
    var xa=x0+aw, xd=xa+dw, xs=xd+sw, xr=xs+rw;
    var yA=top, yS=bot-(bot-top)*s, yB=bot;
    var line="M "+x0+" "+yB+" L "+xa.toFixed(1)+" "+yA.toFixed(1)+
             " L "+xd.toFixed(1)+" "+yS.toFixed(1)+
             " L "+xs.toFixed(1)+" "+yS.toFixed(1)+
             " L "+xr.toFixed(1)+" "+yB+" ";
    lineEl.setAttribute('d',line);
    fillEl.setAttribute('d',line+" L "+x0+" "+yB+" Z");
    dA.setAttribute('cx',xa);dA.setAttribute('cy',yA);
    dD.setAttribute('cx',xd);dD.setAttribute('cy',yS);
    dS.setAttribute('cx',xs);dS.setAttribute('cy',yS);
  }
  drawEnv();

  // ---- voice LED bank: 8 voices light per active note ----
  var BANK=document.getElementById('bank'), voices=[];
  for(var i=0;i<8;i++){
    var vv=document.createElement('div'); vv.className='voice';
    vv.innerHTML='<span class="num">'+(i+1)+'</span>';
    BANK.appendChild(vv); voices.push(vv);
  }
  // round-robin voice allocation driven by host noteOn/noteOff if available,
  // otherwise a gentle idle shimmer so the bank always feels alive.
  var held=[], nextV=0, voiceOfNote={};
  function lightOn(note){
    if(voiceOfNote[note]!=null) return;
    var v=nextV; nextV=(nextV+1)%8;
    voiceOfNote[note]=v; voices[v].classList.add('on');
  }
  function lightOff(note){
    var v=voiceOfNote[note];
    if(v!=null){ voices[v].classList.remove('on'); delete voiceOfNote[note]; }
  }
  // expose hooks; host bench posts note events we can mirror
  window.addEventListener('message',function(e){
    var d=e.data||{};
    if(d.t==='on') lightOn(d.id);
    else if(d.t==='off') lightOff(d.id);
  });

  // idle shimmer (only when nothing is actively held) via rAF, no busy loop
  var t0=performance.now(), idleV=-1, idleT=0;
  function idle(now){
    requestAnimationFrame(idle);
    if(Object.keys(voiceOfNote).length) return; // real notes take over
    if(now-idleT>520){
      idleT=now;
      if(idleV>=0) voices[idleV].classList.remove('on');
      idleV=(idleV+1)%8;
      voices[idleV].classList.add('on');
    }
  }
  requestAnimationFrame(idle);

  function ready(){ /* params already initialised on construction */ }
  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();
})();
</script>
</body></html>
