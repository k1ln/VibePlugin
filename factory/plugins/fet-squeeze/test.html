<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FET Squeeze — test bench</title><style>
  :root{--ac:#ff5a6e}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .krow{display:flex;gap:8px;align-items:center;color:#aeb9cc;font-size:12px}
  .krow .klabel{font-weight:600;letter-spacing:.03em}
  .krow .oct{padding:4px 13px;font-size:16px;line-height:1;background:#28313f;color:#e7eef6;border-radius:8px}
  .krow .octval{min-width:22px;text-align:center;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums}
  .krow .khint{margin-left:4px;color:#7c8aa3;font-size:11px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>FET Squeeze</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

    <div class="row"><label>Source

  </div>

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>FET Squeeze<\/title>\n<style>\n  :root{\n    --accent:#ff5a6e;\n    --accent2:#ff9a6a;\n    --metal0:#2b2d31;\n    --metal1:#4a4d54;\n    --metal2:#6b6f78;\n    --ink:#0d0e10;\n  }\n  *{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}\n  html,body{margin:0;height:100%;background:#101113;overflow:hidden;\n    font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif;color:#e8e9ec;}\n  #stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;\n    background:radial-gradient(120% 120% at 50% -10%,#26282c 0%,#0c0d0f 70%);}\n\n  /* ---------- the rack unit ---------- */\n  .unit{\n    position:relative;width:760px;height:392px;border-radius:10px;\n    background:\n      linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.30)),\n      repeating-linear-gradient(90deg,#54585f 0px,#62666e 1px,#4d5158 2px,#5a5e66 3px),\n      linear-gradient(180deg,#5a5e66,#3e4148);\n    background-blend-mode:overlay,overlay,normal;\n    border:1px solid #2b2d31;\n    box-shadow:\n      0 30px 60px rgba(0,0,0,.6),\n      0 2px 0 rgba(255,255,255,.18) inset,\n      0 -3px 8px rgba(0,0,0,.5) inset;\n    display:flex;\n  }\n  /* brushed sheen sweeping across the faceplate */\n  .unit::after{\n    content:\"\";position:absolute;inset:0;border-radius:10px;pointer-events:none;\n    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.10) 47%,rgba(255,255,255,.18) 50%,rgba(255,255,255,.10) 53%,transparent 70%);\n    background-size:300% 100%;\n    animation:sheen 9s linear infinite;\n    mix-blend-mode:screen;opacity:.5;\n  }\n  @keyframes sheen{0%{background-position:130% 0}100%{background-position:-130% 0}}\n\n  /* ---------- rack ears ---------- */\n  .ear{width:54px;flex:0 0 54px;position:relative;\n    background:linear-gradient(180deg,#3b3e44,#23252a);\n    border-right:1px solid rgba(0,0,0,.5);box-shadow:1px 0 0 rgba(255,255,255,.06) inset;}\n  .ear.right{border-right:none;border-left:1px solid rgba(0,0,0,.5);box-shadow:-1px 0 0 rgba(255,255,255,.06) inset;}\n  .screw{position:absolute;left:50%;width:22px;height:22px;border-radius:50%;transform:translateX(-50%);\n    background:radial-gradient(circle at 35% 30%,#9aa,#4c4f55 60%,#222 100%);\n    box-shadow:0 1px 2px rgba(0,0,0,.7),0 0 0 2px rgba(0,0,0,.25);}\n  .screw::before,.screw::after{content:\"\";position:absolute;left:50%;top:50%;background:#1a1b1e;border-radius:1px;}\n  .screw::before{width:14px;height:2.5px;transform:translate(-50%,-50%) rotate(var(--sl,28deg));}\n  .screw.t{top:16px}.screw.b{bottom:16px}\n\n  /* ---------- main faceplate ---------- */\n  .face{flex:1;position:relative;padding:16px 22px 14px;display:flex;flex-direction:column;}\n\n  .brand{display:flex;align-items:baseline;gap:10px;}\n  .brand .mark{\n    width:14px;height:14px;border-radius:3px;transform:rotate(45deg);\n    background:linear-gradient(135deg,var(--accent),var(--accent2));\n    box-shadow:0 0 10px var(--accent),0 0 3px #fff inset;align-self:center;}\n  .brand h1{margin:0;font-size:20px;font-weight:800;letter-spacing:3px;\n    background:linear-gradient(180deg,#fff,#aeb1b8);-webkit-background-clip:text;background-clip:text;color:transparent;\n    text-shadow:0 1px 0 rgba(0,0,0,.4);}\n  .brand .sub{margin-left:auto;font-size:9px;letter-spacing:3px;color:#8b8f97;font-weight:700;text-transform:uppercase;}\n  .pwr{width:8px;height:8px;border-radius:50%;background:var(--accent);\n    box-shadow:0 0 8px var(--accent),0 0 2px #fff inset;animation:pulse 2.4s ease-in-out infinite;align-self:center;}\n  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}\n\n  .body{flex:1;display:flex;gap:18px;margin-top:12px;}\n\n  /* ---------- VU meter ---------- */\n  .meter{flex:0 0 268px;position:relative;border-radius:8px;padding:8px;\n    background:linear-gradient(180deg,#1b1c1f,#0a0b0c);\n    border:1px solid #000;box-shadow:0 2px 6px rgba(0,0,0,.6) inset,0 1px 0 rgba(255,255,255,.08);}\n  .meter .glass{position:relative;height:178px;border-radius:6px;overflow:hidden;\n    background:radial-gradient(120% 150% at 50% 120%,#f3e7c4 0%,#e9d59a 45%,#d9be78 100%);\n    box-shadow:0 0 0 2px #0a0b0c, 0 6px 14px rgba(0,0,0,.5) inset;}\n  .meter svg{display:block;width:100%;height:100%;}\n  .meter .label{position:absolute;left:0;right:0;bottom:9px;text-align:center;\n    font-size:9px;letter-spacing:3px;color:#6b5a2e;font-weight:800;}\n  .meter .vu{position:absolute;left:50%;top:14px;transform:translateX(-50%);\n    font-size:12px;letter-spacing:6px;color:#7a6630;font-weight:800;}\n  /* glass reflection */\n  .meter .glass::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:linear-gradient(125deg,rgba(255,255,255,.45),transparent 40%);}\n  .meter .gr{position:absolute;left:8px;bottom:8px;font-size:8px;letter-spacing:1px;color:#3aa;}\n\n  /* ---------- knob bank ---------- */\n  .knobs{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;\n    gap:8px 6px;align-content:center;}\n  .knob{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;\n    padding:4px 2px;border-radius:7px;}\n  /* 5 knobs auto-flow into the 3x2 grid (last bottom-right cell stays empty) */\n  .dial{position:relative;width:74px;height:74px;cursor:grab;touch-action:none;}\n  .dial.drag{cursor:grabbing;}\n  .dial svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;}\n  .cap{position:absolute;inset:9px;border-radius:50%;\n    background:\n      radial-gradient(circle at 38% 30%,#5b5f67,#33363c 55%,#1b1d20 100%);\n    box-shadow:0 4px 8px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.18) inset,0 -3px 6px rgba(0,0,0,.5) inset;}\n  .cap::before{content:\"\";position:absolute;inset:0;border-radius:50%;\n    background:conic-gradient(from 0deg,rgba(255,255,255,.10),transparent 25%,rgba(0,0,0,.25) 50%,transparent 75%,rgba(255,255,255,.10));}\n  /* pointer notch on the cap */\n  .pointer{position:absolute;left:50%;top:8px;width:4px;height:20px;border-radius:2px;transform:translateX(-50%);\n    transform-origin:50% 29px;\n    background:linear-gradient(180deg,var(--accent),var(--accent2));\n    box-shadow:0 0 8px var(--accent),0 0 2px #fff;}\n  .ring{fill:none;stroke:#0c0d0f;stroke-width:5;}\n  .ringFill{fill:none;stroke:url(#kg);stroke-width:5;stroke-linecap:round;\n    filter:drop-shadow(0 0 3px var(--accent));transition:stroke-dashoffset .03s linear;}\n  .tick{stroke:#1d1f23;stroke-width:1.5;}\n  .name{font-size:9px;letter-spacing:2px;color:#cdd0d6;font-weight:800;text-transform:uppercase;text-shadow:0 1px 0 rgba(0,0,0,.5);}\n  .val{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.5px;\n    font-variant-numeric:tabular-nums;min-height:12px;}\n\n  .footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;\n    font-size:8px;letter-spacing:2px;color:#7d818a;font-weight:700;}\n  .footer .vents{display:flex;gap:4px;}\n  .footer .vents i{width:26px;height:5px;border-radius:3px;\n    background:linear-gradient(180deg,#15161a,#2a2c31);box-shadow:0 1px 0 rgba(255,255,255,.05);}\n\n  @media (max-width:780px){\n    .unit{transform:scale(.82);}\n  }\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(n,v){parent.postMessage({t:\"on\",id:n,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div id=\"stage\">\n  <div class=\"unit\">\n    <!-- left ear -->\n    <div class=\"ear\">\n      <div class=\"screw t\" style=\"--sl:35deg\"><\/div>\n      <div class=\"screw b\" style=\"--sl:-15deg\"><\/div>\n    <\/div>\n\n    <!-- faceplate -->\n    <div class=\"face\">\n      <div class=\"brand\">\n        <span class=\"mark\"><\/span>\n        <h1>FET&nbsp;SQUEEZE<\/h1>\n        <span class=\"pwr\"><\/span>\n        <span class=\"sub\">peak&nbsp;compressor<\/span>\n      <\/div>\n\n      <div class=\"body\">\n        <!-- VU / gain-reduction meter -->\n        <div class=\"meter\">\n          <div class=\"glass\">\n            <svg viewBox=\"0 0 252 178\" id=\"vuSvg\">\n              <!-- scale arc -->\n              <path d=\"M26 150 A 120 120 0 0 1 226 150\" fill=\"none\" stroke=\"#8a7536\" stroke-width=\"2\"/>\n              <path d=\"M26 150 A 120 120 0 0 1 226 150\" fill=\"none\" stroke=\"#c0392b\" stroke-width=\"3\"\n                    stroke-dasharray=\"0 250 64 0\"/>\n              <g id=\"vuTicks\" stroke=\"#5a4d24\" stroke-width=\"2\"><\/g>\n              <text x=\"126\" y=\"92\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"800\"\n                    fill=\"#7a6630\" letter-spacing=\"2\">GAIN&nbsp;REDUCTION<\/text>\n              <!-- needle -->\n              <g id=\"needle\" transform=\"rotate(-50 126 168)\">\n                <line x1=\"126\" y1=\"168\" x2=\"126\" y2=\"40\" stroke=\"#1a1208\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n                <line x1=\"126\" y1=\"168\" x2=\"126\" y2=\"44\" stroke=\"#b03028\" stroke-width=\"1.6\" stroke-linecap=\"round\"/>\n              <\/g>\n              <circle cx=\"126\" cy=\"168\" r=\"9\" fill=\"#2a2415\" stroke=\"#6b5a2e\" stroke-width=\"1.5\"/>\n              <circle cx=\"126\" cy=\"168\" r=\"3\" fill=\"#7a6630\"/>\n            <\/svg>\n            <div class=\"vu\">VU<\/div>\n            <div class=\"gr\" id=\"grReadout\">-0.0 dB<\/div>\n          <\/div>\n        <\/div>\n\n        <!-- knob bank -->\n        <div class=\"knobs\" id=\"knobs\"><\/div>\n      <\/div>\n\n      <div class=\"footer\">\n        <span>FET&nbsp;·&nbsp;CLASS-A&nbsp;DISCRETE<\/span>\n        <span class=\"vents\"><i><\/i><i><\/i><i><\/i><i><\/i><\/span>\n        <span>MADE&nbsp;BY&nbsp;VIBE<\/span>\n      <\/div>\n    <\/div>\n\n    <!-- right ear -->\n    <div class=\"ear right\">\n      <div class=\"screw t\" style=\"--sl:18deg\"><\/div>\n      <div class=\"screw b\" style=\"--sl:48deg\"><\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<script>\n(function(){\n  \"use strict\";\n\n  // ---- params from spec (indices are load-bearing) ----\n  var PARAMS = [\n    { name:\"Input\",   index:0, min:0, max:1, def:0.5, unit:\"dB\",  fmt:gainFmt },\n    { name:\"Attack\",  index:1, min:0, max:1, def:0.7, unit:\"ms\",  fmt:attackFmt },\n    { name:\"Release\", index:2, min:0, max:1, def:0.5, unit:\"ms\",  fmt:releaseFmt },\n    { name:\"Ratio\",   index:3, min:0, max:1, def:0.5, unit:\":1\",  fmt:ratioFmt },\n    { name:\"Output\",  index:4, min:0, max:1, def:0.5, unit:\"dB\",  fmt:gainFmt }\n  ];\n\n  // ---- value formatters (display only; setParam always gets raw [min,max]) ----\n  function gainFmt(v){ var db=(v*2-1)*24; return (db>=0?\"+\":\"\")+db.toFixed(1)+\" dB\"; }\n  function attackFmt(v){ var ms=0.05*Math.pow(2000,v); return ms<10?ms.toFixed(2)+\" ms\":ms.toFixed(0)+\" ms\"; }\n  function releaseFmt(v){ var ms=20*Math.pow(75,v); return ms<1000?ms.toFixed(0)+\" ms\":(ms/1000).toFixed(2)+\" s\"; }\n  function ratioFmt(v){ var r=2+v*18; return r.toFixed(1)+\":1\"; }\n\n  var ARC_START = -135, ARC_SWEEP = 270; // degrees\n\n  // current values keyed by index, for the meter sim\n  var state = {};\n\n  // ---- build VU ticks ----\n  (function(){\n    var g=document.getElementById(\"vuTicks\");\n    for(var i=0;i<=8;i++){\n      var a=(-50 + (i/8)*100) * Math.PI/180; // -50..+50 deg\n      var cx=126, cy=168, r1=118, r2=128;\n      var sx=cx+Math.sin(a)*r1, sy=cy-Math.cos(a)*r1;\n      var ex=cx+Math.sin(a)*r2, ey=cy-Math.cos(a)*r2;\n      var ln=document.createElementNS(\"http://www.w3.org/2000/svg\",\"line\");\n      ln.setAttribute(\"x1\",sx.toFixed(1));ln.setAttribute(\"y1\",sy.toFixed(1));\n      ln.setAttribute(\"x2\",ex.toFixed(1));ln.setAttribute(\"y2\",ey.toFixed(1));\n      if(i>=6){ln.setAttribute(\"stroke\",\"#b03028\");ln.setAttribute(\"stroke-width\",\"3\");}\n      g.appendChild(ln);\n    }\n  })();\n\n  // ---- build knobs ----\n  var knobsEl = document.getElementById(\"knobs\");\n  var ARC_LEN = 2*Math.PI*30 * (ARC_SWEEP/360);\n\n  PARAMS.forEach(function(p){\n    state[p.index] = p.def;\n\n    var cell=document.createElement(\"div\"); cell.className=\"knob\";\n\n    var nm=document.createElement(\"div\"); nm.className=\"name\"; nm.textContent=p.name;\n\n    var dial=document.createElement(\"div\"); dial.className=\"dial\"; dial.dataset.idx=p.index;\n\n    dial.innerHTML =\n      '<svg viewBox=\"0 0 74 74\">'+\n        '<defs><linearGradient id=\"kg'+p.index+'\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">'+\n          '<stop offset=\"0\" stop-color=\"var(--accent)\"/>'+\n          '<stop offset=\"1\" stop-color=\"var(--accent2)\"/>'+\n        '<\/linearGradient><\/defs>'+\n        '<circle class=\"ring\" cx=\"37\" cy=\"37\" r=\"30\" '+\n          'stroke-dasharray=\"'+ARC_LEN+' 1000\" transform=\"rotate(135 37 37)\"/>'+\n        '<circle class=\"ringFill\" cx=\"37\" cy=\"37\" r=\"30\" stroke=\"url(#kg'+p.index+')\" '+\n          'stroke-dasharray=\"'+ARC_LEN+' 1000\" stroke-dashoffset=\"'+ARC_LEN+'\" '+\n          'transform=\"rotate(135 37 37)\"/>'+\n      '<\/svg>'+\n      '<div class=\"cap\"><\/div>'+\n      '<div class=\"pointer\"><\/div>';\n\n    var val=document.createElement(\"div\"); val.className=\"val\";\n\n    cell.appendChild(nm); cell.appendChild(dial); cell.appendChild(val);\n    knobsEl.appendChild(cell);\n\n    var fill = dial.querySelector(\".ringFill\");\n    var ptr  = dial.querySelector(\".pointer\");\n\n    function render(v){\n      var t=(v-p.min)/(p.max-p.min);\n      ptr.style.transform = \"translateX(-50%) rotate(\"+(ARC_START + t*ARC_SWEEP)+\"deg)\";\n      fill.setAttribute(\"stroke-dashoffset\", (ARC_LEN*(1-t)).toFixed(2));\n      val.textContent = p.fmt(v);\n    }\n\n    function commit(v){\n      v=Math.max( 0.35*transient);\n    target = Math.max(0,Math.min(1,target));\n    // smooth toward target (asymmetric: fast attack, slow recover) influenced by Release knob\n    var rel = 0.02 + state[2]*0.10;\n    var k = target>shownGR ? 0.35 : rel;\n    shownGR += (target-shownGR)*k;\n    // map to needle angle -50..+50 deg\n    var ang = -50 + shownGR*100;\n    needle.setAttribute(\"transform\",\"rotate(\"+ang.toFixed(2)+\" 126 168)\");\n    grOut.textContent = \"-\"+(shownGR*18).toFixed(1)+\" dB\";\n    requestAnimationFrame(loop);\n  }\n  requestAnimationFrame(loop);\n\n  // ---- init + host hook ----\n  function ready(){\n    PARAMS.forEach(function(p){\n      p._render(p.def);\n      if(window.vstai && window.vstai.setParam) window.vstai.setParam(p.index,p.def);\n    });\n  }\n  if(window.vstai && window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;

  function makeRiff(){
