<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
/* ============================================================
   BIT CRUSHER — 8-bit pixel-art lo-fi degrader.
   Everything is built on a chunky pixel grid: blocky sliders,
   a real-time quantized waveform canvas, dithered shadows,
   scanlines, and a retro-game palette. No external assets.
   ============================================================ */
:root{
  --ac:#7cff6b;        /* spec accent  */
  --ac2:#b0ff9a;       /* spec accent2 */
  --mag:#ff4ec7;       /* retro magenta accent for contrast */
  --cyan:#3ad6ff;
  --px:4px;            /* base pixel unit */
  --ink:#0a160c;
  --paper:#0d1a10;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:ui-monospace,"Courier New",monospace;
  color:var(--ac2);
  background:
    /* dither field */
    repeating-conic-gradient(#091308 0% 25%,#0b1a0d 0% 50%) 0 0/8px 8px,
    radial-gradient(120% 90% at 50% -10%,#13301a 0%,#08130b 60%,#040906 100%);
  display:flex;align-items:center;justify-content:center;
  padding:18px;min-height:100vh;
  image-rendering:pixelated;
  -webkit-font-smoothing:none;
}

/* ---- the cabinet ------------------------------------------ */
.cab{
  position:relative;width:100%;max-width:540px;
  background:linear-gradient(180deg,#10241410,#0a150c);
  /* hard pixel border drawn with stacked box-shadows */
  border:var(--px) solid #06100a;
  box-shadow:
    0 0 0 var(--px) #1d3d24,
    0 0 0 calc(var(--px)*2) #06100a,
    0 0 0 calc(var(--px)*3) #0c1f12,
    calc(var(--px)*2) calc(var(--px)*2) 0 calc(var(--px)*2) #020604,
    0 22px 60px rgba(0,0,0,.7);
  padding:18px 18px 16px;
  animation:boot .5s steps(4) both;
}
@keyframes boot{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}

/* scanline + flicker overlay */
.cab::after{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:9;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0 1px,transparent 1px 3px);
  mix-blend-mode:multiply;animation:flick 5.5s steps(30) infinite;
}
@keyframes flick{0%,97%,100%{opacity:.55}98%{opacity:.38}99%{opacity:.62}}

/* ---- title bar -------------------------------------------- */
.head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo{display:flex;flex-direction:column;line-height:1}
.logo b{
  font-size:21px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:var(--ac);
  text-shadow:var(--px) var(--px) 0 #063b1a, calc(var(--px)*2) calc(var(--px)*2) 0 #021c0c;
  font-family:ui-monospace,monospace;
}
.logo b i{font-style:normal;color:var(--mag);text-shadow:var(--px) var(--px) 0 #4a0033}
.logo small{font-size:9px;letter-spacing:4px;color:#4f8a5f;margin-top:5px}
.pwr{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:9px;letter-spacing:2px;color:#3f7a4f}
.led{width:9px;height:9px;background:var(--ac);box-shadow:0 0 8px var(--ac),0 0 0 2px #063b1a;animation:blip 1.1s steps(2) infinite}
@keyframes blip{0%,49%{opacity:1}50%,100%{opacity:.25}}

/* ---- the crush display (waveform) ------------------------- */
.screen{
  position:relative;background:#020a05;
  border:var(--px) solid #0a2914;
  box-shadow:inset 0 0 0 2px #05130a, inset 0 0 26px rgba(0,40,10,.8);
  padding:0;margin-bottom:14px;overflow:hidden;
}
.screen canvas{display:block;width:100%;height:118px;image-rendering:pixelated}
/* readout chips over the screen */
.hud{position:absolute;top:6px;left:7px;right:7px;display:flex;justify-content:space-between;
  font-size:9px;letter-spacing:1px;color:#2fbf57;pointer-events:none;z-index:3;text-shadow:0 0 4px #0a3}
.hud .r{color:var(--mag);text-shadow:0 0 4px #f0a}
.crt-glow{position:absolute;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(120% 80% at 50% 40%,transparent 55%,rgba(0,0,0,.55));}

/* ---- control rack ----------------------------------------- */
.rack{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.slot{
  position:relative;background:#0a1810;
  border:var(--px) solid #06100a;
  box-shadow:inset 0 0 0 2px #102a18, inset 0 calc(var(--px)*-1) 0 #061309, 0 var(--px) 0 #03080500;
  padding:9px 10px 10px;
  animation:popin .45s steps(5) both;
}
.slot:nth-child(1){animation-delay:.05s}
.slot:nth-child(2){animation-delay:.10s}
.slot:nth-child(3){animation-delay:.15s}
.slot:nth-child(4){animation-delay:.20s}
@keyframes popin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.slot .top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.slot .nm{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#76c98a}
.slot .vl{font-size:13px;font-weight:800;color:var(--ac);font-variant-numeric:tabular-nums;
  text-shadow:0 0 6px rgba(124,255,107,.5)}
.slot.drag{box-shadow:inset 0 0 0 2px var(--ac), inset 0 0 14px rgba(124,255,107,.25)}
.slot.drag .nm{color:var(--ac2)}

/* the BLOCKY pixel meter — a row of stacked LED bars the user drags */
.meter{
  position:relative;height:54px;cursor:ns-resize;user-select:none;touch-action:none;
  background:
    repeating-linear-gradient(90deg,#04100800 0 0),
    #030c06;
  border:2px solid #06120a;
  box-shadow:inset 2px 2px 0 #02080500, inset 0 0 0 0 #000;
  display:flex;align-items:flex-end;gap:2px;padding:3px;overflow:hidden;
}
/* segmented light columns (drawn purely in CSS, animated) */
.meter .col{flex:1;display:flex;flex-direction:column-reverse;gap:2px;height:100%}
.meter .col i{
  display:block;flex:1;background:#0a1d10;border-radius:0;
  box-shadow:inset 0 0 0 1px #04100800;transition:background .05s steps(2),box-shadow .05s;
}
.meter .col i.on{background:linear-gradient(180deg,var(--ac2),var(--ac));
  box-shadow:0 0 6px rgba(124,255,107,.7),inset 0 0 0 1px #d6ffce}
.meter .col i.hot{background:linear-gradient(180deg,#fff,var(--ac))}
/* sweep glint */
.meter::after{content:"";position:absolute;top:0;bottom:0;width:30%;left:-30%;z-index:4;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(180,255,154,.10),transparent);
  animation:sweep 3.4s steps(20) infinite}
@keyframes sweep{to{left:130%}}

.hint{margin-top:11px;font-size:8.5px;letter-spacing:2px;color:#3f7a4f;text-align:center;
  text-transform:uppercase}
.hint b{color:var(--mag)}

/* pixel grain pulse on the whole rack accent */
@keyframes glitch{0%,92%,100%{transform:translate(0,0)}93%{transform:translate(-1px,0)}94%{transform:translate(1px,0)}95%{transform:translate(0,-1px)}}
.logo b{animation:glitch 4s steps(1) infinite}
</style>
</head>
<body>
<div class="cab">
  <div class="head">
    <div class="logo">
      <b>BIT<i>CRUSH</i></b>
      <small>8-BIT LO-FI DEGRADER</small>
    </div>
    <div class="pwr"><span>SIG</span><span class="led"></span></div>
  </div>

  <div class="screen">
    <div class="hud"><span id="hudL">DEPTH ·· bit</span><span class="r" id="hudR">SR ··· %</span></div>
    <canvas id="scope" width="256" height="118"></canvas>
    <div class="crt-glow"></div>
  </div>

  <div class="rack" id="rack"></div>

  <div class="hint">DRAG ▲▼ &nbsp;·&nbsp; <b>DOUBLE-CLICK</b> TO RESET &nbsp;·&nbsp; WHEEL FINE</div>
</div>

<script>
(function(){
  /* ---- params: re-read from spec (index/min/max/default) ---- */
  var PARAMS=[
    {name:"Bits",       index:0, min:0, max:1, def:0.5},
    {name:"Downsample", index:1, min:0, max:1, def:0.3},
    {name:"Mix",        index:2, min:0, max:1, def:1.0},
    {name:"Level",      index:3, min:0, max:1, def:0.7}
  ];
  var COLS=14, ROWS=8;          /* meter pixel grid */
  var state={};                 /* index -> value  */

  function host(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }

  /* humanised display: Bits/Downsample as their musical meaning */
  function fmt(p,v){
    if(p.name==="Bits")       return (1+v*15).toFixed(1)+" bit";
    if(p.name==="Downsample") return Math.round(v*100)+" %";
    return Math.round(v*100)+" %";
  }

  var rack=document.getElementById('rack');
  PARAMS.forEach(function(p){
    state[p.index]=p.def;
    var slot=document.createElement('div'); slot.className='slot';
    slot.innerHTML='<div class="top"><span class="nm">'+p.name+'</span><span class="vl"></span></div>'+
                   '<div class="meter"></div>';
    var meter=slot.querySelector('.meter'), vl=slot.querySelector('.vl');
    /* build column grid */
    var cells=[];
    for(var c=0;c<COLS;c++){
      var col=document.createElement('div'); col.className='col';
      var rowEls=[];
      for(var r=0;r<ROWS;r++){ var i=document.createElement('i'); col.appendChild(i); rowEls.push(i); }
      meter.appendChild(col); cells.push(rowEls);
    }

    function norm(){ return (state[p.index]-p.min)/(p.max-p.min||1); }
    function paint(){
      var n=norm();
      vl.textContent=fmt(p,state[p.index]);
      /* fill a staircase: each column lit up to n, with a little jitter for life */
      var lit=n*ROWS;
      for(var c=0;c<COLS;c++){
        var h=lit;                                   // height in rows for this col
        for(var r=0;r<ROWS;r++){
          var el=cells[c][r];
          var onF=(r<Math.floor(h));
          var topRow=(r===Math.floor(h)&&(h-Math.floor(h))>0.001);
          el.className = onF? 'on' : (topRow?'on hot':'');
        }
      }
      host(p.index, state[p.index]);
    }
    function setN(n){ n=n<0?0:(n>1?1:n); state[p.index]=p.min+(p.max-p.min)*n; paint(); }

    var dragN=0, dragY=0, active=false;
    meter.addEventListener('pointerdown',function(e){
      active=true; dragY=e.clientY; dragN=norm(); slot.classList.add('drag');
      meter.setPointerCapture(e.pointerId); e.preventDefault();
    });
    meter.addEventListener('pointermove',function(e){
      if(!active) return; setN(dragN+(dragY-e.clientY)/150);
    });
    function end(){ active=false; slot.classList.remove('drag'); }
    meter.addEventListener('pointerup',end);
    meter.addEventListener('pointercancel',end);
    meter.addEventListener('dblclick',function(){ state[p.index]=p.def; paint(); });
    meter.addEventListener('wheel',function(e){ e.preventDefault();
      setN(norm()+(e.deltaY<0?0.02:-0.02)); },{passive:false});

    p._paint=paint;
    rack.appendChild(slot);
  });

  /* ===================================================================
     LIVE CRUSH SCOPE — draws a sine that is quantized (Bits) and
     sample-held (Downsample), Mix blends crushed vs clean, Level scales.
     Pure rAF, blocky pixel rendering. This visually IS the effect.
     =================================================================== */
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var W=cv.width, H=cv.height, t=0;
  var hudL=document.getElementById('hudL'), hudR=document.getElementById('hudR');

  function px(){ return Math.max(2, Math.round(W/64)); } // chunky sample block width

  function frame(){
    requestAnimationFrame(frame);
    t+=0.045;
    var bits=state[0], ds=state[1], mix=state[2], lvl=state[3];

    /* map controls to crusher params (mirrors the DSP description) */
    var depth = 1 + bits*15;                 // 1..16 bit
    var levels = Math.pow(2, depth);
    var hold = 1 + Math.round(ds*22);        // sample-hold span in px-blocks
    hudL.textContent='DEPTH '+depth.toFixed(1)+' bit';
    hudR.textContent='SR '+Math.round((1-ds*0.94)*100)+' %';

    g.clearRect(0,0,W,H);
    /* faint grid */
    g.strokeStyle='rgba(40,150,70,.10)'; g.lineWidth=1;
    for(var x=0;x<=W;x+=px()*2){ g.beginPath(); g.moveTo(x+.5,0); g.lineTo(x+.5,H); g.stroke(); }
    g.beginPath(); g.moveTo(0,H/2+.5); g.lineTo(W,H/2+.5);
    g.strokeStyle='rgba(40,150,70,.18)'; g.stroke();

    var bw=px();
    var heldVal=0, heldClean=0, holdCount=0;
    for(var i=0;i<W;i+=bw){
      var phase=(i/W)*Math.PI*4 + t;
      var clean=Math.sin(phase)*0.5 + Math.sin(phase*2)*0.18; // a touch of harmonic
      clean=Math.max(-1,Math.min(1,clean));
      /* sample-and-hold (downsample) */
      if(holdCount<=0){ heldClean=clean; holdCount=hold; }
      holdCount--;
      var s=heldClean;
      /* bit quantize */
      var q=Math.round((s*0.5+0.5)*(levels-1))/(levels-1)*2-1;
      /* mix crushed vs clean, then level */
      var outV=(q*mix + clean*(1-mix))*lvl;

      /* draw clean ghost (thin, dim) */
      var yC=H/2 - clean*H*0.40;
      g.fillStyle='rgba(58,214,255,.20)';
      g.fillRect(i, Math.round(yC), bw-1, 2);

      /* draw the crushed BLOCK */
      var yQ=H/2 - outV*H*0.40;
      var top=Math.min(H/2,yQ), bot=Math.max(H/2,yQ);
      var grad=outV>=0?'rgba(124,255,107,':'rgba(255,78,199,';
      g.fillStyle=grad+'.18)';
      g.fillRect(i, top, bw-1, Math.max(1,bot-top));        // vertical column
      g.fillStyle=grad+'1)';
      g.fillRect(i, Math.round(yQ)-1, bw-1, 3);             // bright cap
    }

    /* quantization rungs (horizontal levels) — denser when more bits */
    if(depth<8.5){
      var visLevels=Math.min(levels,32);
      g.strokeStyle='rgba(124,255,107,.07)';
      for(var L=0;L<=visLevels;L++){
        var yy=H/2 - ((L/visLevels)*2-1)*H*0.40;
        g.beginPath(); g.moveTo(0,yy+.5); g.lineTo(W,yy+.5); g.stroke();
      }
    }
  }
  requestAnimationFrame(frame);

  /* ---- host handshake: paint defaults & push every param ---- */
  function ready(){ PARAMS.forEach(function(p){ p._paint(); }); }
  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();
})();
</script>
</body>
</html>
