<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hyper VA</title>
<style>
  :root {
    --accent:  #ff3d7a;
    --accent2: #3d8cff;
    --bg0: #05060a;
    --bg1: #0b0e16;
    --panel: #0d1018;
    --line: rgba(255,255,255,0.06);
    --ink: #eef2ff;
    --dim: #7d86a0;
    --glass-hi: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg0);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 18px;
  }

  .machine {
    width: 100%;
    max-width: 720px;
    border-radius: 20px;
    background:
      radial-gradient(120% 90% at 12% -10%, rgba(255,61,122,0.14), transparent 55%),
      radial-gradient(120% 90% at 92% 0%, rgba(61,140,255,0.16), transparent 55%),
      linear-gradient(160deg, #11141f 0%, #080a11 60%, #05060a 100%);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,0.9),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.6);
    padding: 20px 22px 18px;
    position: relative;
    overflow: hidden;
  }

  .machine::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    position: relative;
    z-index: 2;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: linear-gradient(145deg, var(--accent), var(--accent2));
    box-shadow: 0 0 18px rgba(255,61,122,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
    display: grid; place-items: center;
    position: relative;
  }
  .logo svg { width: 24px; height: 24px; display: block; }

  .titles h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1.5px;
    background: linear-gradient(90deg, #fff, #cfe0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .titles .sub {
    font-size: 9.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 2px;
  }

  /* ---- LED meter cluster ---- */
  .meters { display: flex; gap: 5px; align-items: flex-end; height: 34px; }
  .led-col { display: flex; flex-direction: column-reverse; gap: 2px; }
  .led {
    width: 5px; height: 3px;
    border-radius: 1px;
    background: rgba(255,255,255,0.08);
    transition: background 60ms linear, box-shadow 60ms linear;
  }
  .led.on  { background: var(--accent2); box-shadow: 0 0 5px var(--accent2); }
  .led.mid { background: #ffd23d; box-shadow: 0 0 5px #ffd23d; }
  .led.hot { background: var(--accent); box-shadow: 0 0 7px var(--accent); }

  /* ---- saw fan visualiser ---- */
  .viz {
    position: relative;
    z-index: 2;
    height: 132px;
    border-radius: 14px;
    background:
      linear-gradient(180deg, rgba(61,140,255,0.05), rgba(0,0,0,0.4)),
      #06080e;
    border: 1px solid var(--line);
    box-shadow: inset 0 2px 18px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.02);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .viz canvas { display: block; width: 100%; height: 100%; }
  .viz .tag {
    position: absolute;
    top: 8px; left: 12px;
    font-size: 9px; letter-spacing: 2.5px;
    color: var(--dim); text-transform: uppercase;
  }

  /* ---- knob grid ---- */
  .rack {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 10px;
    position: relative;
    z-index: 2;
    margin-bottom: 16px;
  }

  .knob {
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.25));
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 10px 6px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    user-select: none;
    transition: border-color 160ms, box-shadow 160ms, transform 120ms;
  }
  .knob:hover { border-color: rgba(255,61,122,0.4); }
  .knob.active {
    border-color: rgba(255,61,122,0.7);
    box-shadow: 0 0 22px -4px rgba(255,61,122,0.45);
  }

  .knob .dial { width: 64px; height: 64px; cursor: ns-resize; touch-action: none; }

  .knob .name {
    font-size: 9px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--dim);
  }
  .knob .val {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.5px;
  }
  .knob.active .val { color: var(--accent); }

  /* ---- keyboard ---- */
  .kbd {
    position: relative;
    z-index: 2;
    height: 92px;
    border-radius: 12px;
    background: #04050a;
    border: 1px solid var(--line);
    box-shadow: inset 0 3px 14px rgba(0,0,0,0.8);
    padding: 8px;
    display: flex;
    gap: 0;
  }
  .keys { position: relative; flex: 1; height: 100%; }

  .wkey {
    position: absolute;
    top: 0; bottom: 0;
    border-radius: 0 0 6px 6px;
    background: linear-gradient(180deg, #e9edf6, #b9c1d4);
    border: 1px solid #2a2f3d;
    box-shadow: inset 0 -6px 8px rgba(0,0,0,0.18);
    cursor: pointer;
    transition: background 70ms, box-shadow 70ms;
  }
  .wkey.down {
    background: linear-gradient(180deg, var(--accent2), #2a6bff);
    box-shadow: inset 0 -4px 10px rgba(0,0,0,0.4), 0 0 16px rgba(61,140,255,0.6);
  }
  .bkey {
    position: absolute;
    top: 0;
    height: 58%;
    border-radius: 0 0 5px 5px;
    background: linear-gradient(180deg, #20242f, #05060a);
    border: 1px solid #000;
    box-shadow: inset 0 -3px 4px rgba(255,255,255,0.06), 0 3px 6px rgba(0,0,0,0.6);
    cursor: pointer;
    z-index: 3;
    transition: background 70ms, box-shadow 70ms;
  }
  .bkey.down {
    background: linear-gradient(180deg, var(--accent), #c01f54);
    box-shadow: 0 0 16px rgba(255,61,122,0.7);
  }

  footer {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    position: relative;
    z-index: 2;
  }
  .hint { font-size: 8.5px; letter-spacing: 1px; text-transform: none; color: #4d566e; }
</style>
</head>
<body>
  <div class="machine">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M2 18 L7 6 L7 18 L12 6 L12 18 L17 6 L17 18 L22 6"
                  stroke="#fff" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="titles">
          <h1>HYPER VA</h1>
          <div class="sub">Hypersaw Virtual Analog</div>
        </div>
      </div>
      <div class="meters" id="meters"></div>
    </header>

    <div class="viz">
      <span class="tag">Saw Stack</span>
      <canvas id="viz"></canvas>
    </div>

    <div class="rack" id="rack"></div>

    <div class="kbd">
      <div class="keys" id="keys"></div>
    </div>

    <footer>
      <span>POLY · 8 VOICES</span>
      <span class="hint">drag knobs · double-click to reset · play the keys</span>
      <span>48k</span>
    </footer>
  </div>

<script>
(function () {
  "use strict";

  // ---- parameter model (indices MUST match assembly.ts / spec.json) ----
  var PARAMS = [
    { name: "Detune",   index: 0, min: 0, max: 1, def: 0.45 },
    { name: "Cutoff",   index: 1, min: 0, max: 1, def: 0.60 },
    { name: "Reso",     index: 2, min: 0, max: 1, def: 0.30 },
    { name: "Env Amt",  index: 3, min: 0, max: 1, def: 0.55 },
    { name: "Spread",   index: 4, min: 0, max: 1, def: 0.70 },
    { name: "Attack",   index: 5, min: 0, max: 1, def: 0.05 },
    { name: "Release",  index: 6, min: 0, max: 1, def: 0.40 },
    { name: "Level",    index: 7, min: 0, max: 1, def: 0.70 }
  ];

  var values = {};

  function vstaiReady(fn) {
    if (window.vstai && typeof window.vstai.onReady === "function") {
      window.vstai.onReady(fn);
    } else {
      fn();
    }
  }

  function pushParam(p) {
    if (window.vstai && typeof window.vstai.setParam === "function") {
      window.vstai.setParam(p.index, values[p.index]);
    }
  }

  // ---- knob factory ----
  var rack = document.getElementById("rack");

  function fmt(p) {
    var v = values[p.index];
    if (p.name === "Cutoff") {
      var hz = 80 * Math.pow(225, v);
      return hz >= 1000 ? (hz / 1000).toFixed(1) + "k" : Math.round(hz) + "";
    }
    if (p.name === "Attack")  return (2.0 * v * 1000 + 2).toFixed(0) + "ms";
    if (p.name === "Release") return (3.0 * v + 0.01).toFixed(2) + "s";
    return Math.round(v * 100) + "%";
  }

  function buildKnob(p) {
    var cell = document.createElement("div");
    cell.className = "knob";

    var dial = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    dial.setAttribute("viewBox", "0 0 100 100");
    dial.setAttribute("class", "dial");

    // static rim
    var rim = arc(50, 50, 38, -135, 135);
    var track = path(rim, "rgba(255,255,255,0.08)", 7);
    dial.appendChild(track);

    // value arc (gradient stroke via id)
    var gradId = "g" + p.index;
    var defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    var lg = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
    lg.id = gradId;
    lg.setAttribute("x1", "0"); lg.setAttribute("y1", "0");
    lg.setAttribute("x2", "1"); lg.setAttribute("y2", "1");
    var st1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    st1.setAttribute("offset", "0%"); st1.setAttribute("stop-color", "#ff3d7a");
    var st2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    st2.setAttribute("offset", "100%"); st2.setAttribute("stop-color", "#3d8cff");
    lg.appendChild(st1); lg.appendChild(st2); defs.appendChild(lg);
    dial.appendChild(defs);

    var fill = document.createElementNS("http://www.w3.org/2000/svg", "path");
    fill.setAttribute("fill", "none");
    fill.setAttribute("stroke", "url(#" + gradId + ")");
    fill.setAttribute("stroke-width", "7");
    fill.setAttribute("stroke-linecap", "round");
    dial.appendChild(fill);

    // body
    var body = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    body.setAttribute("cx", "50"); body.setAttribute("cy", "50"); body.setAttribute("r", "27");
    body.setAttribute("fill", "#0c0f17");
    body.setAttribute("stroke", "rgba(255,255,255,0.1)");
    dial.appendChild(body);

    // pointer
    var ptr = document.createElementNS("http://www.w3.org/2000/svg", "line");
    ptr.setAttribute("stroke", "#fff");
    ptr.setAttribute("stroke-width", "3");
    ptr.setAttribute("stroke-linecap", "round");
    dial.appendChild(ptr);

    var name = document.createElement("div");
    name.className = "name"; name.textContent = p.name;
    var val = document.createElement("div");
    val.className = "val";

    cell.appendChild(dial);
    cell.appendChild(val);
    cell.appendChild(name);
    rack.appendChild(cell);

    function render() {
      var v = values[p.index];
      var t = (v - p.min) / (p.max - p.min);
      var a = -135 + t * 270;
      fill.setAttribute("d", arc(50, 50, 38, -135, a));
      var rad = (a - 90) * Math.PI / 180;
      ptr.setAttribute("x1", 50 + Math.cos(rad) * 11);
      ptr.setAttribute("y1", 50 + Math.sin(rad) * 11);
      ptr.setAttribute("x2", 50 + Math.cos(rad) * 24);
      ptr.setAttribute("y2", 50 + Math.sin(rad) * 24);
      val.textContent = fmt(p);
    }

    function setNorm(t) {
      t = Math.max(0, Math.min(1, t));
      values[p.index] = p.min + t * (p.max - p.min);
      render();
      pushParam(p);
    }

    // drag
    var dragging = false, startY = 0, startV = 0;
    dial.addEventListener("pointerdown", function (e) {
      dragging = true; startY = e.clientY;
      startV = (values[p.index] - p.min) / (p.max - p.min);
      cell.classList.add("active");
      dial.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    dial.addEventListener("pointermove", function (e) {
      if (!dragging) return;
      var dy = (startY - e.clientY) / 180;
      setNorm(startV + dy);
    });
    dial.addEventListener("pointerup", function (e) {
      dragging = false; cell.classList.remove("active");
    });
    dial.addEventListener("pointercancel", function () {
      dragging = false; cell.classList.remove("active");
    });
    dial.addEventListener("dblclick", function () {
      values[p.index] = p.def; render(); pushParam(p);
    });
    dial.addEventListener("wheel", function (e) {
      e.preventDefault();
      var t = (values[p.index] - p.min) / (p.max - p.min);
      setNorm(t - e.deltaY * 0.0006);
    }, { passive: false });

    values[p.index] = p.def;
    render();
  }

  // polar arc path helper
  function arc(cx, cy, r, a0, a1) {
    var p0 = pol(cx, cy, r, a0);
    var p1 = pol(cx, cy, r, a1);
    var large = (a1 - a0) <= 180 ? 0 : 1;
    return "M " + p0.x + " " + p0.y + " A " + r + " " + r + " 0 " + large + " 1 " + p1.x + " " + p1.y;
  }
  function pol(cx, cy, r, deg) {
    var rad = (deg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }
  function path(d, stroke, w) {
    var pe = document.createElementNS("http://www.w3.org/2000/svg", "path");
    pe.setAttribute("d", d); pe.setAttribute("fill", "none");
    pe.setAttribute("stroke", stroke); pe.setAttribute("stroke-width", w);
    pe.setAttribute("stroke-linecap", "round");
    return pe;
  }

  PARAMS.forEach(buildKnob);

  // ---- LED meters ----
  var meters = document.getElementById("meters");
  var ledRows = [];
  for (var c = 0; c < 8; c++) {
    var col = document.createElement("div");
    col.className = "led-col";
    var leds = [];
    for (var i = 0; i < 9; i++) {
      var led = document.createElement("div");
      led.className = "led";
      col.appendChild(led);
      leds.push(led);
    }
    meters.appendChild(col);
    ledRows.push(leds);
  }

  // ---- saw fan visualiser ----
  var canvas = document.getElementById("viz");
  var ctx = canvas.getContext("2d");
  var DPR = window.devicePixelRatio || 1;

  function resize() {
    var r = canvas.getBoundingClientRect();
    canvas.width = r.width * DPR;
    canvas.height = r.height * DPR;
  }
  window.addEventListener("resize", resize);
  resize();

  var activity = 0;   // 0..1 envelope follower for playing intensity
  var t0 = performance.now();

  function draw(now) {
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    var time = (now - t0) / 1000;
    var detune = values[0], cutoff = values[1], spread = values[4];

    // background glow
    var g = ctx.createRadialGradient(w * 0.5, h * 1.1, 0, w * 0.5, h * 1.1, w * 0.7);
    g.addColorStop(0, "rgba(61,140,255," + (0.05 + activity * 0.12).toFixed(3) + ")");
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    var mid = h * 0.5;
    var saws = 7;
    for (var s = 0; s < saws; s++) {
      var off = (s - 3) / 3;                 // -1..1
      var detAmt = off * detune;             // detune fans them apart
      var freq = 3.0 + detAmt * 2.4;         // visual cycles across width
      var panX = off * spread;               // horizontal shift = stereo spread
      var amp = (h * 0.22) * (0.55 + cutoff * 0.55) * (0.4 + activity * 0.9);
      var phase = time * (1.4 + detAmt * 1.1) + s * 0.5;

      var hue = s / (saws - 1);
      var col = mixColor("#ff3d7a", "#3d8cff", hue);
      var glow = 0.22 + activity * 0.55;
      ctx.strokeStyle = "rgba(" + col + "," + glow.toFixed(3) + ")";
      ctx.lineWidth = (s === 3 ? 2.2 : 1.3) * DPR;
      ctx.beginPath();
      var step = Math.max(2, Math.floor(w / 220));
      for (var x = 0; x <= w; x += step) {
        var u = x / w;
        // sawtooth shape
        var ph = (u * freq + phase) % 1;
        var saw = (ph * 2 - 1);
        var yy = mid + saw * amp + panX * w * 0.04 * 0 + Math.sin(u * 6.28 + phase) * 0 ;
        // horizontal pan offset shifts the whole wave left/right visually
        var xx = x + panX * w * 0.06;
        if (x === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
      }
      ctx.stroke();
    }

    // decay activity
    activity *= 0.94;

    // update LED meters from activity + level
    var level = values[7];
    var lit = Math.round(activity * level * 9);
    for (var ci = 0; ci < ledRows.length; ci++) {
      var jitter = Math.round(Math.sin(time * 9 + ci) * 1.5);
      var n = Math.max(0, Math.min(9, lit + jitter));
      for (var li = 0; li < 9; li++) {
        var on = li < n;
        var cls = "led";
        if (on) cls += li >= 7 ? " hot" : (li >= 5 ? " mid" : " on");
        ledRows[ci][li].className = cls;
      }
    }

    requestAnimationFrame(loop);
  }

  function loop(now) {
    if (document.hidden) { return; }
    draw(now);
  }

  function mixColor(a, b, t) {
    var pa = hex(a), pb = hex(b);
    var r = Math.round(pa[0] + (pb[0] - pa[0]) * t);
    var g = Math.round(pa[1] + (pb[1] - pa[1]) * t);
    var bl = Math.round(pa[2] + (pb[2] - pa[2]) * t);
    return r + "," + g + "," + bl;
  }
  function hex(h) {
    return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
  }

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) requestAnimationFrame(loop);
  });
  requestAnimationFrame(loop);

  // ---- on-screen keyboard ----
  var keysEl = document.getElementById("keys");
  var START = 48;   // C3
  var OCTAVES = 2;
  var WHITE = [0, 2, 4, 5, 7, 9, 11];
  var BLACK = { 1: 0, 3: 1, 6: 3, 8: 4, 10: 5 };
  var whiteCount = WHITE.length * OCTAVES + 1;
  var down = {};

  function buildKeys() {
    var wW = 100 / whiteCount;
    var idx = 0;
    var notes = [];
    for (var o = 0; o < OCTAVES; o++) {
      for (var i = 0; i < 12; i++) notes.push(START + o * 12 + i);
    }
    notes.push(START + OCTAVES * 12); // top C

    // whites first
    var whiteOrder = [];
    notes.forEach(function (n) {
      var pc = n % 12;
      if (WHITE.indexOf(pc) >= 0) whiteOrder.push(n);
    });
    whiteOrder.forEach(function (n, w) {
      var k = document.createElement("div");
      k.className = "wkey";
      k.style.left = (w * wW) + "%";
      k.style.width = wW + "%";
      k.dataset.note = n;
      keysEl.appendChild(k);
      bindKey(k, n);
    });

    // blacks positioned relative to preceding white
    var wpos = 0;
    notes.forEach(function (n) {
      var pc = n % 12;
      if (WHITE.indexOf(pc) >= 0) { wpos++; return; }
      if (pc in BLACK) {
        var k = document.createElement("div");
        k.className = "bkey";
        var left = (wpos * wW) - (wW * 0.3);
        k.style.left = left + "%";
        k.style.width = (wW * 0.6) + "%";
        k.dataset.note = n;
        keysEl.appendChild(k);
        bindKey(k, n);
      }
    });
  }

  function noteOn(n) {
    if (down[n]) return;
    down[n] = true;
    activity = Math.min(1, activity + 0.6);
    if (window.vstai && window.vstai.noteOn) window.vstai.noteOn(n, 0.9);
  }
  function noteOff(n) {
    if (!down[n]) return;
    down[n] = false;
    if (window.vstai && window.vstai.noteOff) window.vstai.noteOff(n);
  }

  function bindKey(el, n) {
    el.addEventListener("pointerdown", function (e) {
      el.classList.add("down"); noteOn(n);
      el.setPointerCapture(e.pointerId); e.preventDefault();
    });
    el.addEventListener("pointerup", function () {
      el.classList.remove("down"); noteOff(n);
    });
    el.addEventListener("pointerleave", function (e) {
      if (e.buttons) { el.classList.remove("down"); noteOff(n); }
    });
    el.addEventListener("pointerenter", function (e) {
      if (e.buttons) { el.classList.add("down"); noteOn(n); }
    });
    el.addEventListener("pointercancel", function () {
      el.classList.remove("down"); noteOff(n);
    });
  }

  // computer keyboard mapping (A W S E D ...)
  var KEYMAP = { a: 0, w: 1, s: 2, e: 3, d: 4, f: 5, t: 6, g: 7, y: 8, h: 9, u: 10, j: 11, k: 12 };
  window.addEventListener("keydown", function (e) {
    if (e.repeat) return;
    var m = KEYMAP[e.key.toLowerCase()];
    if (m === undefined) return;
    var n = START + m;
    noteOn(n);
    var el = keysEl.querySelector('[data-note="' + n + '"]');
    if (el) el.classList.add("down");
  });
  window.addEventListener("keyup", function (e) {
    var m = KEYMAP[e.key.toLowerCase()];
    if (m === undefined) return;
    var n = START + m;
    noteOff(n);
    var el = keysEl.querySelector('[data-note="' + n + '"]');
    if (el) el.classList.remove("down");
  });

  buildKeys();

  // ---- push all defaults to the engine on load ----
  vstaiReady(function () {
    PARAMS.forEach(function (p) { pushParam(p); });
  });
})();
</script>
</body>
</html>
