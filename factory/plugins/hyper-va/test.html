<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hyper VA — test bench</title><style>
  :root{--ac:#ff3d7a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Hyper VA<\/title>\n<style>\n  :root {\n    --accent:  #ff3d7a;\n    --accent2: #3d8cff;\n    --bg0: #05060a;\n    --bg1: #0b0e16;\n    --panel: #0d1018;\n    --line: rgba(255,255,255,0.06);\n    --ink: #eef2ff;\n    --dim: #7d86a0;\n    --glass-hi: rgba(255,255,255,0.07);\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    background: var(--bg0);\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  body {\n    min-height: 100vh;\n    display: flex;\n    justify-content: center;\n    align-items: flex-start;\n    padding: 18px;\n  }\n\n  .machine {\n    width: 100%;\n    max-width: 720px;\n    border-radius: 20px;\n    background:\n      radial-gradient(120% 90% at 12% -10%, rgba(255,61,122,0.14), transparent 55%),\n      radial-gradient(120% 90% at 92% 0%, rgba(61,140,255,0.16), transparent 55%),\n      linear-gradient(160deg, #11141f 0%, #080a11 60%, #05060a 100%);\n    border: 1px solid rgba(255,255,255,0.08);\n    box-shadow:\n      0 40px 80px -30px rgba(0,0,0,0.9),\n      inset 0 1px 0 rgba(255,255,255,0.08),\n      inset 0 -1px 0 rgba(0,0,0,0.6);\n    padding: 20px 22px 18px;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .machine::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background-image:\n      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);\n    pointer-events: none;\n    mix-blend-mode: screen;\n  }\n\n  /* ---- header ---- */\n  header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 14px;\n    position: relative;\n    z-index: 2;\n  }\n\n  .brand { display: flex; align-items: center; gap: 12px; }\n\n  .logo {\n    width: 38px; height: 38px;\n    border-radius: 11px;\n    background: linear-gradient(145deg, var(--accent), var(--accent2));\n    box-shadow: 0 0 18px rgba(255,61,122,0.5), inset 0 1px 0 rgba(255,255,255,0.5);\n    display: grid; place-items: center;\n    position: relative;\n  }\n  .logo svg { width: 24px; height: 24px; display: block; }\n\n  .titles h1 {\n    font-size: 20px;\n    font-weight: 800;\n    letter-spacing: 1.5px;\n    background: linear-gradient(90deg, #fff, #cfe0ff);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .titles .sub {\n    font-size: 9.5px;\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    color: var(--dim);\n    margin-top: 2px;\n  }\n\n  /* ---- LED meter cluster ---- */\n  .meters { display: flex; gap: 5px; align-items: flex-end; height: 34px; }\n  .led-col { display: flex; flex-direction: column-reverse; gap: 2px; }\n  .led {\n    width: 5px; height: 3px;\n    border-radius: 1px;\n    background: rgba(255,255,255,0.08);\n    transition: background 60ms linear, box-shadow 60ms linear;\n  }\n  .led.on  { background: var(--accent2); box-shadow: 0 0 5px var(--accent2); }\n  .led.mid { background: #ffd23d; box-shadow: 0 0 5px #ffd23d; }\n  .led.hot { background: var(--accent); box-shadow: 0 0 7px var(--accent); }\n\n  /* ---- saw fan visualiser ---- */\n  .viz {\n    position: relative;\n    z-index: 2;\n    height: 132px;\n    border-radius: 14px;\n    background:\n      linear-gradient(180deg, rgba(61,140,255,0.05), rgba(0,0,0,0.4)),\n      #06080e;\n    border: 1px solid var(--line);\n    box-shadow: inset 0 2px 18px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.02);\n    overflow: hidden;\n    margin-bottom: 16px;\n  }\n  .viz canvas { display: block; width: 100%; height: 100%; }\n  .viz .tag {\n    position: absolute;\n    top: 8px; left: 12px;\n    font-size: 9px; letter-spacing: 2.5px;\n    color: var(--dim); text-transform: uppercase;\n  }\n s\" id=\"keys\"><\/div>\n    <\/div>\n\n    <footer>\n      <span>POLY · 8 VOICES<\/span>\n      <span class=\"hint\">drag knobs · double-click to reset · play the keys<\/span>\n      <span>48k<\/span>\n    <\/footer>\n  <\/div>\n\n<script>\n(function () {\n  \"use strict\";\n\n  // ---- parameter model (indices MUST match assembly.ts / spec.json) ----\n  var PARAMS = [\n    { name: \"Detune\",   index: 0, min: 0, max: 1, def: 0.45 },\n    { name: \"Cutoff\",   index: 1, min: 0, max: 1, def: 0.60 },\n    { name: \"Reso\",     index: 2, min: 0, max: 1, def: 0.30 },\n    { name: \"Env Amt\",  index: 3, min: 0, max: 1, def: 0.55 },\n    { name: \"Spread\",   index: 4, min: 0, max: 1, def: 0.70 },\n    { name: \"Attack\",   index: 5, min: 0, max: 1, def: 0.05 },\n    { name: \"Release\",  index: 6, min: 0, max: 1, def: 0.40 },\n    { name: \"Level\",    index: 7, min: 0, max: 1, def: 0.70 }\n  ];\n\n  var values = {};\n\n  function vstaiReady(fn) {\n    if (window.vstai && typeof window.vstai.onReady === \"function\") {\n      window.vstai.onReady(fn);\n    } else {\n      fn();\n    }\n  }\n\n  function pushParam(p) {\n    if (window.vstai && typeof window.vstai.setParam === \"function\") {\n      window.vstai.setParam(p.index, values[p.index]);\n    }\n  }\n\n  // ---- knob factory ----\n  var rack = document.getElementById(\"rack\");\n\n  function fmt(p) {\n    var v = values[p.index];\n    if (p.name === \"Cutoff\") {\n      var hz = 80 * Math.pow(225, v);\n      return hz >= 1000 ? (hz / 1000).toFixed(1) + \"k\" : Math.round(hz) + \"\";\n    }\n    if (p.name === \"Attack\")  return (2.0 * v * 1000 + 2).toFixed(0) + \"ms\";\n    if (p.name === \"Release\") return (3.0 * v + 0.01).toFixed(2) + \"s\";\n    return Math.round(v * 100) + \"%\";\n  }\n\n  function buildKnob(p) {\n    var cell = document.createElement(\"div\");\n    cell.className = \"knob\";\n\n    var dial = document.createElementNS(\"http://www.w3.org/2000/svg\", \"svg\");\n    dial.setAttribute(\"view dial.appendChild(ptr);\n\n    var name = document.createElement(\"div\");\n    name.className = \"name\"; name.textContent = p.name;\n    var val = document.createElement(\"div\");\n    val.className = \"val\";\n\n    cell.appendChild(dial);\n    cell.appendChild(val);\n    cell.appendChild(name);\n    rack.appendChild(cell);\n\n    function render() {\n      var v = values[p.index];\n      var t = (v - p.min) / (p.max - p.min);\n      var a = -135 + t * 270;\n      fill.setAttribute(\"d\", arc(50, 50, 38, -135, a));\n      var rad = (a - 90) * Math.PI / 180;\n      ptr.setAttribute(\"x1\", 50 + Math.cos(rad) * 11);\n      ptr.setAttribute(\"y1\", 50 + Math.sin(rad) * 11);\n      ptr.setAttribute(\"x2\", 50 + Math.cos(rad) * 24);\n      ptr.setAttribute(\"y2\", 50 + Math.sin(rad) * 24);\n      val.textContent = fmt(p);\n    }\n\n    function setNorm(t) {\n      t = Math.max(0, Math.min(1, t));\n      values[p.index] = p.min + t * (p.max - p.min);\n      render();\n      pushParam(p);\n    }\n\n    // drag\n    var dragging = false, startY = 0, startV = 0;\n    dial.addEventListener(\"pointerdown\", function (e) {\n      dragging = true; startY = e.clientY;\n      startV = (values[p.index] - p.min) / (p.max - p.min);\n      cell.classList.add(\"active\");\n      dial.setPointerCapture(e.pointerId);\n      e.preventDefault();\n    });\n    dial.addEventListener(\"pointermove\", function (e) {\n      if (!dragging) return;\n      var dy = (startY - e.clientY) / 180;\n      setNorm(startV + dy);\n    });\n    dial.addEventListener(\"pointerup\", function (e) {\n      dragging = false; cell.classList.remove(\"active\");\n    });\n    dial.addEventListener(\"pointercancel\", function () {\n      dragging = false; cell.classList.remove(\"active\");\n    });\n    dial.addEventListener(\"dblclick\", function () {\n      values[p.index] = p.def; render(); pushParam(p);\n    });\n    dial.addEventListener(\"wheel\", function (e) {\n      e.preventDefault();\n      var t = (values[p.index] - p.min) / (p.max - p.min);\n      setNorm(t - e.deltaY * 0.0006);\n    }, { passive: false });\n\n    values[p.index] = p.def;\n    render();\n  }\n\n  // polar arc path helper\n  function arc(cx, cy, r, a0, a1) {\n    var p0 = pol(cx, cy, r, a0);\n    var p1 = pol(cx, cy, r, a1);\n    var large = (a1 - a0) <= 180 ? 0 : 1;\n    return \"M \" + p0.x + \" \" + p0.y + \" A \" + r + \" \" + r + \" 0 \" + large + \" 1 \" + p1.x + \" \" + p1.y;\n  }\n  function pol(cx, cy, r, deg) {\n    var rad = (deg - 90) * Math.PI / 180;\n    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };\n  }\n  function path(d, stroke, w) {\n    var pe = document.createElementNS(\"http://www.w3.org/2000/svg\", \"path\");\n    pe.setAttribute(\"d\", d); pe.setAttribute(\"fill\", \"none\");\n    pe.setAttribute(\"stroke\", stroke); pe.setAttribute(\"stroke-width\", w);\n    pe.setAttribute(\"stroke-linecap\", \"round\");\n    return pe;\n  }\n\n  PARAMS.forEach(buildKnob);\n\n  // ---- LED meters ----\n  var meters = document.getElementById(\"meters\");\n  var ledRows = [];\n  for (var c = 0; c < 8; c++) {\n    var col = document.createElement(\"div\");\n    col.className = \"led-col\";\n    var leds = [];\n    for (var i = 0; i < 9; i++) {\n      var led = document.createElement(\"div\");\n      led.className = \"led\";\n      col.appendChild(led);\n      leds.push(led);\n    }\n    meters.appendChild(col);\n    ledRows.push(leds);\n  }\n\n  // ---- saw fan visualiser ----\n  var canvas = document.getElementById(\"viz\");\n  var ctx = canvas.getContext(\"2d\");\n  var DPR = window.devicePixelRatio || 1;\n\n  function resize() {\n    var r = canvas.getBoundingClientRect();\n    canvas.width = r.width * DPR;\n    canvas.height = r.height * DPR;\n  }\n  window.addEventListener(\"resize\", resize);\n  resize();\n\n  var activity = 0;   // 0..1 envelope follower for playing intensity\n  var t0 = performance.now();\n\n  function draw(now) {\n    var w = canvas.width, h = can
