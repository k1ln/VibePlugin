<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duo Synth</title>
<style>
  :root{
    --acc:#d4b04a;          /* gold */
    --acc-hi:#f5e3a0;       /* bright gold */
    --acc-dim:#7a6322;      /* dim gold */
    --panel:#2a2a2a;        /* chassis */
    --panel-d:#171717;
    --panel-l:#383838;
    --slot:#0c0c0c;
    --ink:#0a0a0a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(130% 100% at 50% -20%, #2c2c2c 0%, #1a1a1a 50%, #050505 100%);
    color:#cfc7b0;
    font-family:"Helvetica Neue",Arial,sans-serif;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    letter-spacing:.02em;
  }

  /* ===================== CHASSIS ===================== */
  .panel{
    position:relative;
    width:760px;height:432px;
    border-radius:10px;
    padding:16px 20px 18px;
    background:
      linear-gradient(180deg,#3a3a3a 0%,#262626 4%,#2a2a2a 6%,#222 55%,#1b1b1b 96%,#101010 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.10) inset,
      0 -2px 8px rgba(0,0,0,.7) inset,
      0 26px 60px rgba(0,0,0,.7),
      0 2px 0 #000;
    overflow:hidden;
  }
  /* faint vertical brushed grain */
  .panel::before{
    content:"";position:absolute;inset:0;border-radius:10px;pointer-events:none;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.022) 0 1px,rgba(0,0,0,.05) 1px 3px);
    mix-blend-mode:overlay;opacity:.6;
  }
  /* gold hairline border */
  .panel::after{
    content:"";position:absolute;inset:5px;border-radius:7px;pointer-events:none;
    border:1px solid rgba(212,176,74,.18);
    box-shadow:0 0 0 1px rgba(0,0,0,.4) inset;
  }
  .screw{position:absolute;width:11px;height:11px;border-radius:50%;z-index:5;
    background:radial-gradient(circle at 35% 30%,#5a5a5a,#2a2a2a 60%,#0c0c0c 100%);
    box-shadow:0 1px 1px rgba(0,0,0,.7),0 0 0 1px rgba(212,176,74,.12) inset;}
  .screw::after{content:"";position:absolute;inset:2.5px;border-radius:1px;
    background:linear-gradient(90deg,transparent 44%,#000 44% 56%,transparent 56%);transform:rotate(38deg)}
  .screw.tl{top:8px;left:8px}.screw.tr{top:8px;right:8px}
  .screw.bl{bottom:8px;left:8px}.screw.br{bottom:8px;right:8px}

  /* ===================== HEADER ===================== */
  .head{display:flex;align-items:center;justify-content:space-between;margin:0 4px 12px;height:50px}
  .brand{display:flex;flex-direction:column;line-height:1;position:relative}
  .brand .sub{font-size:8px;letter-spacing:.46em;color:var(--acc-dim);font-weight:700;margin-bottom:6px;text-transform:uppercase}
  .brand .name{font-size:27px;font-weight:800;letter-spacing:.02em;color:#e8e0c8;
    text-shadow:0 1px 0 #000,0 0 1px rgba(0,0,0,.6)}
  .brand .name b{color:var(--acc);font-weight:800;
    text-shadow:0 0 10px rgba(212,176,74,.45),0 1px 0 #000}
  .duo-tag{font-size:7.5px;letter-spacing:.34em;color:#7c7458;margin-top:5px;font-weight:700}

  /* mini dual-voice oscilloscope */
  .scope{
    position:relative;width:248px;height:50px;border-radius:5px;
    background:linear-gradient(180deg,#0a0a0a,#000);
    border:1px solid #000;
    box-shadow:0 0 0 1px rgba(212,176,74,.16),0 2px 5px rgba(0,0,0,.7) inset;
    overflow:hidden;
  }
  .scope canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .scope .grid{position:absolute;inset:0;pointer-events:none;
    background:
      repeating-linear-gradient(90deg,rgba(212,176,74,.06) 0 1px,transparent 1px 16px),
      repeating-linear-gradient(0deg,rgba(212,176,74,.06) 0 1px,transparent 1px 12px);}
  .scope .tag{position:absolute;top:3px;left:6px;font-size:7px;letter-spacing:.18em;
    color:var(--acc);font-weight:700;text-shadow:0 0 5px rgba(212,176,74,.7)}
  .scope .tag2{position:absolute;top:3px;right:6px;font-size:7px;letter-spacing:.12em;
    color:#6a6450;font-weight:700}

  /* ===================== VOICE LANES ===================== */
  .lanes{display:flex;gap:14px;margin:0 4px 12px}
  .lane{
    flex:1;position:relative;border-radius:7px;padding:7px 10px 8px;
    background:linear-gradient(180deg,#202020,#161616);
    box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 2px 5px rgba(0,0,0,.55) inset;
    border:1px solid #000;
  }
  .lane-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .lane-h .lab{font-size:8px;letter-spacing:.26em;font-weight:800;color:#8a825f}
  .lane-h .lab b{color:var(--acc)}
  .vu{display:flex;gap:2px;align-items:center}
  .vu i{width:3px;height:7px;border-radius:1px;background:#2b2b2b;transition:background .08s,box-shadow .08s}
  .vu i.on{background:var(--acc);box-shadow:0 0 4px var(--acc)}
  .vu i.hot{background:var(--acc-hi);box-shadow:0 0 6px var(--acc-hi)}
  /* moving pitch bar for each voice */
  .lane-bar{position:relative;height:14px;border-radius:3px;overflow:hidden;
    background:#0a0a0a;box-shadow:0 1px 2px rgba(0,0,0,.6) inset}
  .lane-bar i{position:absolute;top:0;bottom:0;width:9px;border-radius:2px;
    background:linear-gradient(180deg,var(--acc-hi),var(--acc));
    box-shadow:0 0 8px rgba(212,176,74,.6);
    transition:left .14s cubic-bezier(.4,1.4,.5,1)}

  /* ===================== SLIDER RACK ===================== */
  .rack{display:grid;grid-template-columns:repeat(8,1fr);gap:0;padding:4px 2px 0;height:208px}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative}
  .cell:not(:last-child)::after{content:"";position:absolute;right:0;top:6px;bottom:30px;width:1px;
    background:linear-gradient(180deg,transparent,rgba(212,176,74,.10),transparent)}
  .cap{font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:#8a825f;font-weight:800;margin-bottom:6px;text-align:center;height:10px}

  /* the slider track */
  .sl{position:relative;width:30px;height:138px;cursor:ns-resize;touch-action:none}
  .sl .slot{position:absolute;left:50%;top:4px;bottom:4px;width:6px;transform:translateX(-50%);
    border-radius:4px;background:linear-gradient(90deg,#000,#1c1c1c,#000);
    box-shadow:0 1px 2px rgba(0,0,0,.8) inset,0 0 0 1px rgba(212,176,74,.10)}
  /* gold tick marks beside the slot */
  .sl .ticks{position:absolute;left:50%;top:4px;bottom:4px;width:24px;transform:translateX(-50%);pointer-events:none}
  .sl .ticks i{position:absolute;left:0;right:0;height:1px;background:rgba(212,176,74,.20)}
  /* glowing fill that rises with value */
  .sl .fill{position:absolute;left:50%;width:6px;transform:translateX(-50%);bottom:4px;
    border-radius:4px;background:linear-gradient(180deg,var(--acc-hi),var(--acc) 60%,var(--acc-dim));
    box-shadow:0 0 8px rgba(212,176,74,.55);}
  /* the fader cap (cap moves) */
  .sl .knob{position:absolute;left:50%;width:26px;height:16px;transform:translate(-50%,-50%);
    border-radius:4px;cursor:grab;
    background:linear-gradient(180deg,#4a4a4a 0%,#2c2c2c 45%,#1a1a1a 55%,#333 100%);
    box-shadow:0 2px 4px rgba(0,0,0,.7),0 1px 0 rgba(255,255,255,.14) inset,0 -1px 0 rgba(0,0,0,.5) inset;
    border:1px solid #000;transition:box-shadow .15s}
  /* gold indicator line across the cap */
  .sl .knob::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);
    border-radius:2px;background:var(--acc);box-shadow:0 0 5px var(--acc);opacity:.85;transition:opacity .15s}
  .sl:hover .knob{box-shadow:0 2px 6px rgba(0,0,0,.7),0 0 10px rgba(212,176,74,.35),0 1px 0 rgba(255,255,255,.18) inset}
  .sl.drag .knob{cursor:grabbing;box-shadow:0 2px 8px rgba(0,0,0,.8),0 0 16px rgba(212,176,74,.6),0 1px 0 rgba(255,255,255,.2) inset}
  .sl.drag .knob::after{opacity:1}
  .sl.drag .fill{box-shadow:0 0 14px rgba(212,176,74,.8)}

  /* value readout */
  .vbox{margin-top:8px;font-size:9px;font-weight:700;color:var(--acc-hi);
    background:linear-gradient(180deg,#1a1a1a,#0c0c0c);
    border:1px solid #000;border-radius:3px;padding:2px 0;min-width:46px;text-align:center;
    box-shadow:0 0 0 1px rgba(212,176,74,.15),0 1px 2px rgba(0,0,0,.6) inset;
    text-shadow:0 0 6px rgba(212,176,74,.5);font-variant-numeric:tabular-nums}

  /* SYNC switch (discrete) replaces a fader visually but lives in the rack */
  .sw{position:relative;width:30px;height:138px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;touch-action:none}
  .sw .body{position:relative;width:24px;height:70px;border-radius:5px;
    background:linear-gradient(180deg,#0a0a0a,#1a1a1a);
    box-shadow:0 1px 2px rgba(0,0,0,.8) inset,0 0 0 1px rgba(212,176,74,.12)}
  .sw .toggle{position:absolute;left:3px;right:3px;height:30px;border-radius:4px;
    background:linear-gradient(180deg,#444,#222);border:1px solid #000;
    box-shadow:0 2px 3px rgba(0,0,0,.7),0 1px 0 rgba(255,255,255,.12) inset;
    transition:top .18s cubic-bezier(.5,1.6,.5,1),box-shadow .18s;top:37px}
  .sw.on .toggle{top:3px;box-shadow:0 2px 6px rgba(0,0,0,.7),0 0 12px rgba(212,176,74,.6),0 1px 0 rgba(255,255,255,.16) inset}
  .sw .toggle::after{content:"";position:absolute;left:4px;right:4px;top:50%;height:2px;transform:translateY(-50%);
    border-radius:2px;background:#6a6450;transition:background .18s,box-shadow .18s}
  .sw.on .toggle::after{background:var(--acc);box-shadow:0 0 6px var(--acc)}
  .sw .marks{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:6px 0;align-items:center;pointer-events:none}
  .sw .marks span{font-size:6px;letter-spacing:.1em;color:#6a6450;font-weight:800}
  .sw.on .marks .u{color:var(--acc)}
  .sw:not(.on) .marks .d{color:#9a9276}

  .credit{position:absolute;bottom:7px;right:46px;font-size:7px;letter-spacing:.32em;
    color:#5a543f;font-weight:700}
  .credit b{color:var(--acc-dim)}
</style>
</head>
<body>
  <div class="panel" id="panel">
    <span class="screw tl"></span><span class="screw tr"></span>
    <span class="screw bl"></span><span class="screw br"></span>

    <div class="head">
      <div class="brand">
        <span class="sub">duophonic · analog</span>
        <span class="name">DUO<b>SYNTH</b></span>
        <span class="duo-tag">2-VOICE · 2-VCO · 4-POLE VCF</span>
      </div>
      <div class="scope">
        <canvas id="scope" width="496" height="100"></canvas>
        <div class="grid"></div>
        <span class="tag" id="scTag">VCO 1+2</span>
        <span class="tag2" id="scTag2">CUT 042</span>
      </div>
    </div>

    <div class="lanes">
      <div class="lane">
        <div class="lane-h">
          <span class="lab">OSC <b>1</b> · LOW NOTE</span>
          <div class="vu" id="vu1"></div>
        </div>
        <div class="lane-bar"><i id="bar1" style="left:14%"></i></div>
      </div>
      <div class="lane">
        <div class="lane-h">
          <span class="lab">OSC <b>2</b> · NEW NOTE</span>
          <div class="vu" id="vu2"></div>
        </div>
        <div class="lane-bar"><i id="bar2" style="left:62%"></i></div>
      </div>
    </div>

    <div class="rack" id="rack"></div>
    <div class="credit">VIBE <b>·</b> BOUTIQUE</div>
  </div>

<script>
(function(){
  "use strict";

  var ACC="#d4b04a", ACC_HI="#f5e3a0";

  // ---- params straight from spec.json (exact indices) ----
  var PARAMS=[
    {name:"Detune",   index:0, min:0, max:1, def:0.18, fmt:"semi"},
    {name:"Sync",     index:1, min:0, max:1, def:0,    fmt:"sw"},
    {name:"Cutoff",   index:2, min:0, max:1, def:0.42, fmt:"hz"},
    {name:"Resonance",index:3, min:0, max:1, def:0.45, fmt:"pct"},
    {name:"Env Amt",  index:4, min:0, max:1, def:0.6,  fmt:"pct"},
    {name:"Attack",   index:5, min:0, max:1, def:0.05, fmt:"ms"},
    {name:"Release",  index:6, min:0, max:1, def:0.3,  fmt:"ms"},
    {name:"Level",    index:7, min:0, max:1, def:0.8,  fmt:"pct"}
  ];

  function clamp(v,a,b){return v<a?a:v>b?b:v;}
  function fmtVal(p,v){
    var n=(v-p.min)/(p.max-p.min);
    switch(p.fmt){
      case "pct": return Math.round(n*100)+"%";
      case "semi":return "+"+(n*12).toFixed(1)+"st";
      case "hz":  return Math.round(30+n*n*11000)+"Hz";
      case "ms":  { var ms=Math.round(5+n*n*1900); return ms>=1000?(ms/1000).toFixed(2)+"s":ms+"ms"; }
      case "sw":  return n>=0.5?"ON":"OFF";
      default:    return n.toFixed(2);
    }
  }

  var STATE={};
  PARAMS.forEach(function(p){STATE[p.index]=p.def;});

  var host=window.vstai||null;
  function send(i,v){ if(host&&host.setParam) host.setParam(i,v); }

  var rack=document.getElementById("rack");
  var controls=[];

  // ============== SYNC SWITCH (discrete 0/1) ==============
  function buildSwitch(p){
    var cell=document.createElement("div"); cell.className="cell";
    var cap=document.createElement("div"); cap.className="cap"; cap.textContent=p.name;
    var sw=document.createElement("div"); sw.className="sw"; sw.title="click to toggle · double-click resets";
    sw.innerHTML='<div class="body"><div class="marks"><span class="u">ON</span><span class="d">OFF</span></div><div class="toggle"></div></div>';
    var vbox=document.createElement("div"); vbox.className="vbox";
    cell.appendChild(cap); cell.appendChild(sw); cell.appendChild(vbox);
    rack.appendChild(cell);

    var cur=p.def;
    function render(){
      var on=cur>=0.5;
      sw.classList.toggle("on",on);
      vbox.textContent=fmtVal(p,cur);
      STATE[p.index]=cur;
    }
    function setVal(v,push){ cur=v>=0.5?1:0; render(); if(push) send(p.index,cur); }
    render();
    sw.addEventListener("click",function(e){ setVal(cur>=0.5?0:1,true); e.preventDefault(); });
    sw.addEventListener("dblclick",function(e){ setVal(p.def,true); e.preventDefault(); e.stopPropagation(); });
    controls.push({p:p,set:setVal,get:function(){return cur;}});
  }

  // ============== VERTICAL FADER ==============
  function buildFader(p){
    var cell=document.createElement("div"); cell.className="cell";
    var cap=document.createElement("div"); cap.className="cap"; cap.textContent=p.name;
    var sl=document.createElement("div"); sl.className="sl"; sl.title="drag · shift = fine · double-click resets";
    var slot=document.createElement("div"); slot.className="slot";
    var ticks=document.createElement("div"); ticks.className="ticks";
    for(var t=0;t<=10;t++){ var ti=document.createElement("i"); ti.style.top=(t*10)+"%"; ti.style.opacity=(t%5===0)?".5":".22"; ticks.appendChild(ti); }
    var fill=document.createElement("div"); fill.className="fill";
    var knob=document.createElement("div"); knob.className="knob";
    sl.appendChild(slot); sl.appendChild(ticks); sl.appendChild(fill); sl.appendChild(knob);
    var vbox=document.createElement("div"); vbox.className="vbox";
    cell.appendChild(cap); cell.appendChild(sl); cell.appendChild(vbox);
    rack.appendChild(cell);

    var TRAVEL=130; // px the knob center travels (4px pad top/bottom of 138)
    var cur=p.def;
    function render(){
      var n=(cur-p.min)/(p.max-p.min);
      var top=4 + (1-n)*TRAVEL; // y of knob center within sl
      knob.style.top=top+"px";
      fill.style.top=top+"px";
      fill.style.height=(138-4-top)+"px";
      vbox.textContent=fmtVal(p,cur);
      STATE[p.index]=cur;
    }
    function setVal(v,push){ cur=clamp(v,p.min,p.max); render(); if(push) send(p.index,cur); }
    render();

    var dragging=false,startY=0,startV=0;
    function onMove(e){
      if(!dragging)return;
      var y=(e.touches?e.touches[0].clientY:e.clientY);
      var dy=startY-y;
      var fine=e.shiftKey?0.28:1;
      var span=p.max-p.min;
      setVal(startV + dy/TRAVEL*span*fine, true);
      e.preventDefault();
    }
    function onUp(){ if(!dragging)return; dragging=false; sl.classList.remove("drag");
      window.removeEventListener("pointermove",onMove); window.removeEventListener("pointerup",onUp); }
    sl.addEventListener("pointerdown",function(e){
      dragging=true; sl.classList.add("drag"); startY=e.clientY; startV=cur;
      window.addEventListener("pointermove",onMove); window.addEventListener("pointerup",onUp);
      e.preventDefault();
    });
    sl.addEventListener("dblclick",function(e){ setVal(p.def,true); e.preventDefault(); });
    sl.addEventListener("wheel",function(e){
      setVal(cur - Math.sign(e.deltaY)*(p.max-p.min)*0.02, true); e.preventDefault();
    },{passive:false});

    controls.push({p:p,set:setVal,get:function(){return cur;}});
  }

  PARAMS.forEach(function(p){ if(p.fmt==="sw") buildSwitch(p); else buildFader(p); });

  // ============== VU METERS ==============
  function buildVu(el,count){ var arr=[]; for(var i=0;i<count;i++){ var b=document.createElement("i"); el.appendChild(b); arr.push(b);} return arr; }
  var vu1=buildVu(document.getElementById("vu1"),7);
  var vu2=buildVu(document.getElementById("vu2"),7);
  function setVu(arr,lvl){ for(var i=0;i<arr.length;i++){ var on=(i/arr.length)<lvl; arr[i].className=on?(i>=arr.length-2?"hot":"on"):""; } }

  // ============== ANIMATION ==============
  var scope=document.getElementById("scope"), sctx=scope.getContext("2d");
  var W=scope.width,H=scope.height;
  var scTag2=document.getElementById("scTag2");
  var bar1=document.getElementById("bar1"), bar2=document.getElementById("bar2");
  var t0=performance.now(), phase=0, pitchPhase=0, lastBarT=0;

  function pad3(v){return ("00"+Math.round(v*100)).slice(-3);}

  function loop(now){
    var dt=(now-t0)/1000; t0=now;
    var detune=STATE[0], sync=STATE[1], cut=STATE[2], reso=STATE[3], envA=STATE[4],
        atk=STATE[5], rel=STATE[6], lvl=STATE[7];

    scTag2.textContent="CUT "+pad3(cut);

    // animated demo envelope so the panel "breathes" like a played note
    var period=0.6 + atk*1.5 + rel*1.5;
    phase += dt/period; if(phase>=1) phase-=1;
    var atkT=clamp(atk*0.45+0.05,0.02,0.5);
    var demoEnv = phase<atkT ? (phase/atkT) : Math.exp(-(phase-atkT)/(0.12+rel*0.7));
    demoEnv=clamp(demoEnv,0,1);

    // VU meters track per-voice level (osc2 reflects detune energy)
    var l1=demoEnv*(0.55+lvl*0.45);
    var l2=demoEnv*(0.55+lvl*0.45)*(0.7+detune*0.3);
    setVu(vu1,l1); setVu(vu2,l2);

    // pitch bars wander (decorative voice-tracking); osc2 spreads by detune & locks under sync
    pitchPhase += dt*0.55;
    var p1 = 0.5 + Math.sin(pitchPhase)*0.32;
    var p2 = sync>=0.5 ? p1 : clamp(p1 + 0.10 + detune*0.30, 0.05, 0.92);
    bar1.style.left=(p1*100).toFixed(1)+"%";
    bar2.style.left=(p2*100).toFixed(1)+"%";

    // ---- scope: two saw oscillators through a resonant filter sweep ----
    sctx.clearRect(0,0,W,H);
    var cutHz = 0.10 + (cut + envA*demoEnv*(1-cut)); // visual cutoff position
    var f1=3, f2=3*(1+ (sync>=0.5?0:detune*0.6) ); // osc2 detuned cycles
    var q=1+reso*9;
    var amp=(0.28+lvl*0.5);

    var grad=sctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,ACC_HI); grad.addColorStop(1,ACC);
    sctx.lineWidth=1.6; sctx.strokeStyle=grad;
    sctx.shadowColor=ACC; sctx.shadowBlur=6;
    sctx.beginPath();
    for(var x=0;x<=W;x+=2){
      var u=x/W;
      var saw1=2*(((u*f1)+phase)%1)-1;
      var ph2=sync>=0.5 ? ((u*f1)+phase)%1 : ((u*f2)+phase)%1;
      var saw2=2*(ph2%1)-1;
      var osc=(saw1+saw2)*0.5;
      // resonant ring riding the cutoff
      var ring=Math.sin(u*f1*Math.PI*2*(1+cutHz*1.2))*Math.exp(-((u*f1)%1)*q*0.5)*reso*demoEnv;
      var y=(osc*(0.4+cutHz*0.4)+ring*0.5)*amp*(0.4+demoEnv*0.6);
      var py=H/2 - y*(H*0.42);
      if(x===0) sctx.moveTo(x,py); else sctx.lineTo(x,py);
    }
    sctx.stroke();
    sctx.shadowBlur=0;

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ============== HOST WIRING ==============
  function ready(){ controls.forEach(function(c){ send(c.p.index, c.get()); }); }
  if(host && host.onReady) host.onReady(ready); else ready();

})();
</script>
</body>
</html>
