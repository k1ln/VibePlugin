<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soft Opto</title>
<style>
  :root{ --acc:#ffcf6a; --acc2:#e0d0b0; --bg0:#0d0a06; --bg1:#1d160c; --ink:#f5ecda; --dim:#a99467; }
  *{ box-sizing:border-box; margin:0; padding:0; } html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,#2c2113 0%,var(--bg1) 44%,var(--bg0) 100%);
    color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(94vw,700px); border-radius:14px; padding:16px 22px 20px; position:relative; overflow:hidden;
    background:linear-gradient(160deg,#2a2013,#0e0a06); border:1px solid rgba(255,207,106,.2); box-shadow:0 22px 64px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,235,200,.07); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:20px; background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 10px var(--acc); animation:pulse 2.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4; transform:scale(.85);} 50%{ opacity:1; transform:scale(1.2);} }
  .meter{ height:92px; border-radius:10px; overflow:hidden; margin-bottom:14px; position:relative; background:radial-gradient(circle at 50% 120%,#3a2c14,#160f06); border:1px solid rgba(255,207,106,.18); box-shadow:inset 0 2px 18px rgba(0,0,0,.5); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .ml{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.24em; color:var(--dim); z-index:2; }
  .knobs{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:74px; height:74px; position:relative; } .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(255,210,160,.14); stroke-width:7; stroke-linecap:round; }
  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(255,207,106,.6)); }
  .pcap{ fill:#160f06; stroke:rgba(255,207,106,.22); stroke-width:1; }
  .ptr{ stroke:var(--acc); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim); }
  .kv{ font-size:11px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(255,207,106,.1); padding:1px 8px; border-radius:7px; border:1px solid rgba(255,207,106,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style>
</head>
<body>
  <div class="unit">
    <header><span class="logo">SOFT&nbsp;OPTO</span><span class="sub">optical leveler</span><span class="led"></span></header>
    <div class="meter"><div class="ml">GAIN REDUCTION</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){
  "use strict";
  var P=[{name:"Threshold",idx:0,def:0.45},{name:"Ratio",idx:1,def:0.5},{name:"Makeup",idx:2,def:0.55},{name:"Tone",idx:3,def:0.5},{name:"Mix",idx:4,def:1.0}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });
  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135;
  var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){
    var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 86 86"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffcf6a"/><stop offset="1" stop-color="#e0d0b0"/></linearGradient></defs>'+
      '<circle class="track" cx="43" cy="43" r="33"></circle><circle class="arc" cx="43" cy="43" r="33" transform="rotate(135 43 43)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'+
      '<circle class="pcap" cx="43" cy="43" r="21"></circle><line class="ptr" x1="43" y1="43" x2="43" y2="26"></line></svg></div><span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el);
    var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString());
      var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(43+Math.sin(ang)*17).toFixed(2)); ptr.setAttribute("y2",(43-Math.cos(ang)*17).toFixed(2)); val.textContent=Math.round(v*100)+"%"; }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; }); el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });
    render(p.def); return {render:render};
  });
  // swinging VU-style gain-reduction needle (driven by Threshold/Ratio + a fake program env)
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener("resize",resize); resize();
  var needle=0;
  function frame(ts){ ctx.clearRect(0,0,W,H); var thr=vals[0], ratio=vals[1];
    var prog=0.5+0.5*Math.sin(ts/500)+0.2*Math.sin(ts/170);
    var grAmt=Math.max(0,(prog-(1-thr))) * (0.3+ratio*0.7); // 0..~1 reduction
    needle += (grAmt - needle)*0.08;
    var cx=W/2, cy=H+8;
    // arc scale
    ctx.strokeStyle="rgba(255,207,106,0.18)"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,cy,H*0.78,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
    // needle (more GR = swings left)
    var ang=Math.PI*1.5 + (needle-0.5)* -0.6;
    ctx.strokeStyle="rgba(255,207,106,0.95)"; ctx.lineWidth=2.5; ctx.shadowColor="#ffcf6a"; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ang)*H*0.72, cy+Math.sin(ang)*H*0.72); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle="rgba(255,207,106,0.6)"; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(frame); }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script>
</body>
</html>
