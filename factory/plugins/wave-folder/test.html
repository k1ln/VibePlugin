  <title>Wave Folder — test bench</title><style>
  :root{--ac:#c08cff}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}
  .top b{font-size:15px;letter-spacing:.05em;color:var(--ac)}
  .top .sub{font-size:11px;color:#7c8aa3;margin-left:auto}
  iframe{width:100%;max-width:620px;height:400px;border:0;background:transparent}
  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}
  </style></head><body>
  <div class="top"><span class="led"></span><b>Wave Folder</b><span class="sub">live test bench — turn the knobs, play audio</span></div>

  document.getElementById('gui').srcdoc="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Wave Folder<\/title>\n<style>\n  :root {\n    --accent:   #c08cff;\n    --accent2:  #ff8cf0;\n    --panel:    #1a1622;\n    --panel-2:  #221b2e;\n    --metal:    #2a2336;\n    --ink:      #efe7ff;\n    --ink-dim:  #9a8fb5;\n    --jack:     #d9b85a;\n    --jack-rim: #6f5a1f;\n  }\n\n  * { box-sizing: border-box; }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: #0c0a12;\n    color: var(--ink);\n    font-family: ui-sans-serif, -apple-system, \"Segoe UI\", system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  #app {\n    max-width: 720px;\n    margin: 0 auto;\n    padding: 18px 16px 26px;\n  }\n\n  /* ---- the modular panel ---- */\n  .panel {\n    position: relative;\n    border-radius: 16px;\n    padding: 18px 18px 22px;\n    background:\n      radial-gradient(120% 90% at 12% -10%, rgba(192,140,255,0.16), transparent 60%),\n      radial-gradient(120% 90% at 95% 0%, rgba(255,140,240,0.12), transparent 55%),\n      linear-gradient(180deg, var(--panel-2), var(--panel));\n    border: 1px solid rgba(192,140,255,0.22);\n    box-shadow:\n      0 24px 60px rgba(0,0,0,0.6),\n      inset 0 1px 0 rgba(255,255,255,0.06),\n      inset 0 -2px 14px rgba(0,0,0,0.5);\n  }\n\n  /* mounting screws at the corners (modular vibe) */\n  .screw {\n    position: absolute;\n    width: 12px; height: 12px;\n    border-radius: 50%;\n    background: radial-gradient(circle at 35% 30%, #4a4256, #1a1622 70%);\n    box-shadow: inset 0 1px 1px rgba(255,255,255,0.18), inset 0 -1px 2px #000;\n  }\n  .screw::after {\n    content: \"\";\n    position: absolute;\n    top: 50%; left: 50%;\n    width: 8px; height: 1.5px;\n    background: #0d0a13;\n    transform: translate(-50%,-50%) rotate(35deg);\n    border-radius: 1px;\n  }\n  .screw.tl { top: 8px;  left: 8px; }\n  .screw.tr { top: 8px;  right: 8px; }\n  .screw.bl { bottom: 8px; left: 8px; }\n  .screw.br { bottom: 8px; right: 8px; }\n\n  header {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    padding: 2px 6px 12px;\n  }\n  .brand {\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n  }\n  .brand .kind {\n    font-size: 10px;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .brand h1 {\n    margin: 0;\n    font-size: 26px;\n    font-weight: 800;\n    letter-spacing: 0.02em;\n    background: linear-gradient(90deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n  .modnum {\n    font-size: 10px;\n    letter-spacing: 0.28em;\n    text-transform: uppercase;\n    color: var(--ink-dim);\n    text-align: right;\n    line-height: 1.5;\n  }\n\n  /* ---- the folding scope ---- */\n  .scope-wrap {\n    position: relative;\n    border-radius: 12px;\n    padding: 10px;\n    background: linear-gradient(180deg, #0a0810, #120e1a);\n    border: 1px solid rgba(192,140,255,0.18);\n    box-shadow: inset 0 2px 18px rgba(0,0,0,0.8), inset 0 0 40px rgba(192,140,255,0.05);\n    margin: 0 6px 18px;\n  }\n  .scope-wrap svg { display: block; width: 100%; height: 132px; }\n  .grid line { stroke: rgba(192,140,255,0.10); stroke-width: 1; }\n  .axis { stroke: rgba(192,140,255,0.22); stroke-width: 1; }\n\n  /* ---- control rack ---- */\n  .rack {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 8px;\n    padding: 4px 6px 0;\n  }\n  @media (max-width: 560px) {\n    .rack { grid-template-columns: repeat(3, 1fr); }\n  }\n\n  .mod {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 8px;\n    padding: 12px 6px 14px;\n    border-radius: 12px;\n    background: linear-gradient(180deg, var(--metal), #1c1726);\n    border: 1px solid rgba(255,255,255,0.05);\n    box-shadow: inset 0 1px 0 rgb
