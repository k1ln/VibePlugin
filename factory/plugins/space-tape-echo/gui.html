<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Tape Echo</title>
<style>
  :root{
    --accent:#ff8c5a;
    --accent2:#ffb37a;
    --wood1:#3a241a;
    --wood2:#241008;
    --metal1:#cdb7a3;
    --metal2:#8a7160;
    --metal3:#5b4636;
    --ink:#1a0f08;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#0c0704;
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;color:#f0e2d4}
  #stage{
    position:relative;width:100%;height:100%;min-height:520px;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% -10%, #2a1810 0%, #100805 60%, #050302 100%);
    padding:18px;
  }
  /* ---- the chassis ---- */
  #panel{
    position:relative;width:760px;max-width:100%;height:480px;border-radius:18px;
    /* warm metal faceplate with wood frame */
    background:
      linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.35)),
      repeating-linear-gradient(92deg, #b39a85 0px, #b39a85 2px, #a98e78 4px),
      linear-gradient(135deg, var(--metal1), var(--metal2) 55%, var(--metal3));
    border:10px solid;
    border-image:linear-gradient(160deg,#5a3a26,#2c160c) 1;
    box-shadow:
      0 40px 90px rgba(0,0,0,.7),
      inset 0 2px 0 rgba(255,255,255,.25),
      inset 0 -3px 18px rgba(0,0,0,.5),
      0 0 0 2px rgba(0,0,0,.5);
    padding:18px 22px;
    overflow:hidden;
  }
  /* brushed-metal sheen sweeping slowly */
  #panel::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(115deg,transparent 40%,rgba(255,240,225,.10) 50%,transparent 60%);
    transform:translateX(-30%);
    animation:sheen 9s ease-in-out infinite;
    mix-blend-mode:screen;
  }
  @keyframes sheen{0%,70%{transform:translateX(-60%)}85%,100%{transform:translateX(60%)}}

  /* top brand bar */
  #brand{position:relative;display:flex;align-items:center;justify-content:space-between;
    z-index:3;margin-bottom:8px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo .dot{width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--accent) 55%, #7a2f0d);
    box-shadow:0 0 10px var(--accent),0 0 22px rgba(255,140,90,.5);
    animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 8px var(--accent),0 0 16px rgba(255,140,90,.35)}
    50%{box-shadow:0 0 16px var(--accent),0 0 34px rgba(255,140,90,.7)}}
  .logo h1{font-size:19px;letter-spacing:3px;font-weight:800;text-transform:uppercase;
    color:#2a160c;text-shadow:0 1px 0 rgba(255,255,255,.3)}
  .logo h1 b{color:#7a2f0d}
  .model{font-size:10px;letter-spacing:2px;color:#3a2418;opacity:.8;
    border:1px solid rgba(58,36,24,.4);padding:3px 8px;border-radius:4px;
    text-transform:uppercase}

  /* ---- transport deck (reels + tape) ---- */
  #deck{position:relative;height:200px;border-radius:12px;z-index:2;
    background:
      radial-gradient(110% 140% at 50% -20%, rgba(255,255,255,.06),transparent 50%),
      linear-gradient(180deg,#22120a,#150a05);
    box-shadow:inset 0 4px 22px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,180,140,.08),
      0 1px 0 rgba(255,255,255,.12);
    overflow:hidden;}
  /* tape path SVG sits above the deck */
  #tapeSvg{position:absolute;inset:0;width:100%;height:100%}
  .reelWrap{position:absolute;top:50%;transform:translateY(-50%);width:150px;height:150px}
  #reelL{left:34px}#reelR{right:34px}
  .reel{width:100%;height:100%;transform-origin:50% 50%;
    will-change:transform}
  /* reel hub glow when running */
  .reelGlow{filter:drop-shadow(0 0 6px rgba(255,140,90,.0))}

  /* center capstan / head block */
  #headBlock{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:118px;height:150px;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-end;gap:8px;z-index:3}
  .heads{display:flex;gap:9px;align-items:flex-end;height:42px}
  .head{width:18px;border-radius:3px 3px 1px 1px;
    background:linear-gradient(180deg,#e7d4c2,#7a604b);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 4px rgba(0,0,0,.6);
    position:relative;transition:height .25s,box-shadow .25s,opacity .25s;opacity:.35}
  .head.on{opacity:1;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),
    0 0 12px var(--accent),0 0 2px var(--accent)}
  .head::after{content:"";position:absolute;left:50%;top:-4px;transform:translateX(-50%);
    width:3px;height:6px;background:var(--accent);border-radius:2px;opacity:0;transition:opacity .25s}
  .head.on::after{opacity:1;box-shadow:0 0 8px var(--accent)}
  .capstan{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#888);
    box-shadow:0 0 6px rgba(0,0,0,.7)}

  /* ---- controls row ---- */
  #controls{position:relative;z-index:3;margin-top:16px;display:grid;
    grid-template-columns:repeat(6,1fr);gap:10px;align-items:start}
  .ctl{display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:8px 4px 6px;border-radius:10px;
    background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,0,0,.18));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25),inset 0 -2px 6px rgba(0,0,0,.3)}
  .clabel{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:#2a160c;font-weight:700}
  .cval{font-size:11px;font-weight:700;color:#7a2f0d;font-variant-numeric:tabular-nums;
    min-height:14px}

  /* knob */
  .knob{position:relative;width:62px;height:62px;cursor:ns-resize;touch-action:none}
  .knob svg{display:block;width:100%;height:100%}
  .knob .cap{transition:filter .15s}
  .knob:hover .cap{filter:brightness(1.12)}
  .knob:active{cursor:grabbing}

  /* mode toggle switch */
  .switch{position:relative;width:58px;height:62px;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .swBody{width:38px;height:54px;border-radius:8px;
    background:linear-gradient(180deg,#1a0d06,#0c0603);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.8),0 1px 0 rgba(255,255,255,.2);
    position:relative;overflow:hidden}
  .swLever{position:absolute;left:50%;top:6px;transform:translateX(-50%);
    width:18px;height:24px;border-radius:6px;
    background:linear-gradient(180deg,#e7d4c2,#8a7160);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 4px 6px rgba(0,0,0,.6);
    transition:transform .22s cubic-bezier(.5,1.6,.4,1)}
  .switch.up .swLever{transform:translateX(-50%) translateY(0)}
  .switch.down .swLever{transform:translateX(-50%) translateY(24px)}
  .swLED{position:absolute;left:50%;bottom:5px;transform:translateX(-50%);
    width:7px;height:7px;border-radius:50%;background:#3a1a0c;transition:.22s}
  .switch.up .swLED{background:var(--accent);box-shadow:0 0 9px var(--accent)}

  /* ---- right-side VU meter glow strip embedded as a control flourish ---- */
  #vuBar{position:absolute;right:22px;top:64px;width:8px;height:200px;border-radius:5px;z-index:3;
    background:#160a05;box-shadow:inset 0 0 6px rgba(0,0,0,.9),0 0 0 1px rgba(255,180,140,.12);
    overflow:hidden;display:none}
  /* screws */
  .screw{position:absolute;width:11px;height:11px;border-radius:50%;z-index:4;
    background:radial-gradient(circle at 35% 30%,#e9d9c8,#6b5440);
    box-shadow:inset 0 0 2px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.5)}
  .screw::after{content:"";position:absolute;inset:3px;border-top:1.5px solid rgba(0,0,0,.45);
    transform:rotate(35deg)}
  .screw.tl{top:6px;left:6px}.screw.tr{top:6px;right:6px}
  .screw.bl{bottom:6px;left:6px}.screw.br{bottom:6px;right:6px}
</style>
</head>
<body>
<div id="stage">
  <div id="panel">
    <span class="screw tl"></span><span class="screw tr"></span>
    <span class="screw bl"></span><span class="screw br"></span>

    <div id="brand">
      <div class="logo"><span class="dot"></span>
        <h1>SPACE <b>TAPE</b> ECHO</h1></div>
      <div class="model">RTR-3 · MULTI-HEAD</div>
    </div>

    <div id="deck">
      <!-- tape path: two diagonals from reel hubs over the head block -->
      <svg id="tapeSvg" viewBox="0 0 760 200" preserveAspectRatio="none">
        <defs>
          <linearGradient id="tapeG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#5a3a28"/>
            <stop offset=".5" stop-color="#8a5a3a"/>
            <stop offset="1" stop-color="#5a3a28"/>
          </linearGradient>
        </defs>
        <!-- the running tape ribbon -->
        <path id="tapePath" d="M 109 100 C 230 40, 280 30, 380 60 C 480 30, 530 40, 651 100"
              fill="none" stroke="url(#tapeG)" stroke-width="7" stroke-linecap="round"
              opacity=".9"/>
        <path id="tapeDash" d="M 109 100 C 230 40, 280 30, 380 60 C 480 30, 530 40, 651 100"
              fill="none" stroke="rgba(255,200,160,.55)" stroke-width="1.4"
              stroke-dasharray="6 14" stroke-linecap="round"/>
      </svg>

      <div class="reelWrap" id="reelL">
        <svg class="reel reelGlow" viewBox="0 0 100 100" id="reelSvgL"></svg>
      </div>
      <div class="reelWrap" id="reelR">
        <svg class="reel reelGlow" viewBox="0 0 100 100" id="reelSvgR"></svg>
      </div>

      <div id="headBlock">
        <div class="heads">
          <div class="head" id="h0"></div>
          <div class="head" id="h1"></div>
          <div class="head" id="h2"></div>
        </div>
        <div class="capstan"></div>
      </div>
    </div>

    <div id="controls"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var ACCENT="#ff8c5a";

  // ---- param definitions (mirror spec; indices are authoritative) ----
  var PARAMS=[
    {name:"Time",     index:0, min:0, max:1, default:0.3,  fmt:function(v){return Math.round(120+v*880)+" ms";}},
    {name:"Feedback", index:1, min:0, max:1, default:0.45, fmt:function(v){return Math.round(v*100)+" %";}},
    {name:"Mode",     index:2, min:0, max:1, default:0,    step:1, type:"switch",
       opts:["SINGLE","MULTI"]},
    {name:"Wow",      index:3, min:0, max:1, default:0.3,  fmt:function(v){return Math.round(v*100)+" %";}},
    {name:"Tone",     index:4, min:0, max:1, default:0.55, fmt:function(v){return Math.round(v*100)+" %";}},
    {name:"Mix",      index:5, min:0, max:1, default:0.45, fmt:function(v){return Math.round(v*100)+" %";}}
  ];

  function send(i,v){ if(window.vstai&&window.vstai.setParam) window.vstai.setParam(i,v); }
  function clamp(v,a,b){return v<a?a:v>b?b:v;}

  var state={}; // index -> normalized 0..1 stored as real value

  // ---- build reel SVG (hub + spokes + flange) ----
  function reelMarkup(){
    var s='<defs><radialGradient id="flange" cx="40%" cy="35%" r="70%">'+
      '<stop offset="0" stop-color="#3a2418"/><stop offset=".6" stop-color="#22120a"/>'+
      '<stop offset="1" stop-color="#0c0603"/></radialGradient>'+
      '<radialGradient id="hub" cx="40%" cy="35%" r="70%">'+
      '<stop offset="0" stop-color="#e7d4c2"/><stop offset="1" stop-color="#6b5440"/>'+
      '</radialGradient></defs>';
    s+='<circle cx="50" cy="50" r="48" fill="url(#flange)" stroke="#000" stroke-width="1"/>';
    // tape wound on reel
    s+='<circle cx="50" cy="50" r="40" fill="none" stroke="#2c1c12" stroke-width="14"/>';
    s+='<circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,180,140,.12)" stroke-width="1"/>';
    // three open windows in the flange
    for(var k=0;k<3;k++){
      var a=k*120*Math.PI/180;
      var cx=50+18*Math.cos(a), cy=50+18*Math.sin(a);
      s+='<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="9" fill="#0a0502" stroke="#1a0d06" stroke-width="1"/>';
    }
    // spokes
    for(var j=0;j<3;j++){
      var b=j*120;
      s+='<rect x="48.5" y="14" width="3" height="20" rx="1.5" fill="#5b4636" transform="rotate('+b+' 50 50)"/>';
    }
    s+='<circle cx="50" cy="50" r="12" fill="url(#hub)" stroke="#000" stroke-width="1"/>';
    s+='<circle cx="50" cy="50" r="4" fill="#1a0d06"/>';
    return s;
  }
  document.getElementById("reelSvgL").innerHTML=reelMarkup();
  document.getElementById("reelSvgR").innerHTML=reelMarkup();

  // ---- knob renderer (SVG arc + indicator) ----
  function knobSvg(){
    return '<svg viewBox="0 0 100 100">'+
      '<defs>'+
        '<radialGradient id="kcap" cx="38%" cy="32%" r="75%">'+
          '<stop offset="0" stop-color="#5b4636"/><stop offset=".55" stop-color="#2c1b12"/>'+
          '<stop offset="1" stop-color="#120a06"/></radialGradient>'+
      '</defs>'+
      // outer track
      '<circle cx="50" cy="50" r="44" fill="none" stroke="rgba(0,0,0,.45)" stroke-width="6"/>'+
      // active arc
      '<path class="arc" d="" fill="none" stroke="'+ACCENT+'" stroke-width="6" '+
        'stroke-linecap="round" style="filter:drop-shadow(0 0 4px '+ACCENT+')"/>'+
      // cap
      '<circle class="cap" cx="50" cy="50" r="33" fill="url(#kcap)" '+
        'stroke="rgba(255,255,255,.18)" stroke-width="1"/>'+
      '<circle cx="50" cy="50" r="33" fill="none" stroke="rgba(0,0,0,.55)" stroke-width="2" '+
        'transform="translate(0,1.5)" opacity=".5"/>'+
      // pointer
      '<line class="ptr" x1="50" y1="50" x2="50" y2="22" stroke="'+ACCENT+'" '+
        'stroke-width="3" stroke-linecap="round" style="filter:drop-shadow(0 0 3px '+ACCENT+')"/>'+
      '<circle cx="50" cy="50" r="3" fill="#e7d4c2"/>'+
    '</svg>';
  }
  var A0=-135, A1=135; // sweep range in degrees
  function polar(cx,cy,r,deg){var a=(deg-90)*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
  function arcPath(norm){
    var end=A0+(A1-A0)*norm;
    var p0=polar(50,50,44,A0), p1=polar(50,50,44,end);
    var large=(end-A0)>180?1:0;
    if(norm<=0.0001) return "";
    return "M "+p0[0].toFixed(1)+" "+p0[1].toFixed(1)+
           " A 44 44 0 "+large+" 1 "+p1[0].toFixed(1)+" "+p1[1].toFixed(1);
  }

  // ---- build controls ----
  var wrap=document.getElementById("controls");
  var controlRefs={};

  PARAMS.forEach(function(p){
    var cell=document.createElement("div");
    cell.className="ctl";
    var lbl=document.createElement("div");lbl.className="clabel";lbl.textContent=p.name;
    var val=document.createElement("div");val.className="cval";

    var real=p.default; state[p.index]=real;
    var norm=(real-p.min)/(p.max-p.min);

    if(p.type==="switch"){
      var sw=document.createElement("div");sw.className="switch";
      sw.innerHTML='<div class="swBody"><div class="swLever"></div><div class="swLED"></div></div>';
      cell.appendChild(lbl);cell.appendChild(sw);cell.appendChild(val);
      function setSwitch(v){
        v=Math.round(v); state[p.index]=v;
        sw.classList.toggle("up", v>=1);
        sw.classList.toggle("down", v<1);
        val.textContent=p.opts[v];
        send(p.index,v); applyMode(v);
      }
      sw.addEventListener("click",function(){ setSwitch(state[p.index]>=1?0:1); });
      controlRefs[p.index]={set:setSwitch};
      setSwitch(real);
    } else {
      var knob=document.createElement("div");knob.className="knob";
      knob.innerHTML=knobSvg();
      cell.appendChild(lbl);cell.appendChild(knob);cell.appendChild(val);
      var arc=knob.querySelector(".arc"), ptr=knob.querySelector(".ptr");

      function render(n){
        arc.setAttribute("d",arcPath(n));
        var deg=A0+(A1-A0)*n;
        ptr.setAttribute("transform","rotate("+deg+" 50 50)");
        var rv=p.min+n*(p.max-p.min);
        state[p.index]=rv;
        val.textContent=p.fmt?p.fmt(n):(Math.round(n*100)+"%");
      }
      function commit(n){ n=clamp(n,0,1); render(n); send(p.index,p.min+n*(p.max-p.min)); reactTo(p,n); }

      // drag
      var dragging=false, startY=0, startN=0;
      function down(e){dragging=true;startY=(e.touches?e.touches[0].clientY:e.clientY);
        startN=(state[p.index]-p.min)/(p.max-p.min);
        e.preventDefault();
        window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
        window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);}
      function move(e){if(!dragging)return;
        var y=(e.touches?e.touches[0].clientY:e.clientY);
        var dy=startY-y; var fine=e.shiftKey?0.0025:0.007;
        commit(startN+dy*fine); e.preventDefault();}
      function up(){dragging=false;
        window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);
        window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);}
      knob.addEventListener("mousedown",down);
      knob.addEventListener("touchstart",down,{passive:false});
      knob.addEventListener("dblclick",function(){var dn=(p.default-p.min)/(p.max-p.min);commit(dn);});
      // wheel
      knob.addEventListener("wheel",function(e){e.preventDefault();
        var n=(state[p.index]-p.min)/(p.max-p.min);
        commit(n+(e.deltaY<0?0.03:-0.03));},{passive:false});

      controlRefs[p.index]={set:function(v){commit((v-p.min)/(p.max-p.min));}};
      render(norm); // visual init (send happens in ready)
    }
    wrap.appendChild(cell);
  });

  // ---- motif reactions ----
  var reelL=document.getElementById("reelSvgL"),
      reelR=document.getElementById("reelSvgR");
  var dash=document.getElementById("tapeDash");
  var heads=[document.getElementById("h0"),document.getElementById("h1"),document.getElementById("h2")];

  // speed from Time (slower time => slower reels feel); animation handled by rAF
  var spinSpeed=0.6;     // deg per frame baseline
  var dashOffset=0, dashSpeed=1.2;
  var feedbackGlow=0.45;

  function reactTo(p,n){
    if(p.index===0){ spinSpeed=0.35+ (1-n)*1.1; dashSpeed=0.6+(1-n)*2.4; } // time
    if(p.index===1){ feedbackGlow=n; }                                     // feedback
    if(p.index===3){ wowAmt=n; }                                           // wow
    if(p.index===4){ /* tone tint handled via filter below */ toneAmt=n; }
    if(p.index===5){ mixAmt=n; }
  }
  var wowAmt=0.3, toneAmt=0.55, mixAmt=0.45;

  function applyMode(v){
    // SINGLE => only center head active; MULTI => all three
    heads[0].classList.toggle("on", v>=1);
    heads[2].classList.toggle("on", v>=1);
    heads[1].classList.add("on"); // center always reads
    heads.forEach(function(h,i){
      var base= v>=1 ? (30+ i*6) : (i===1?40:20);
      h.style.height=base+"px";
    });
  }

  // ---- animation loop ----
  var angL=0, angR=0;
  function frame(){
    angL=(angL+spinSpeed)%360;
    angR=(angR+spinSpeed*0.94)%360; // take-up slightly different
    reelL.style.transform="rotate("+angL+"deg)";
    reelR.style.transform="rotate("+(-angR)+"deg)";

    dashOffset=(dashOffset-dashSpeed);
    dash.setAttribute("stroke-dashoffset",dashOffset);

    // feedback => head glow intensity + reel hub drop shadow
    var g=0.2+feedbackGlow*0.8;
    reelL.parentNode.style.filter="drop-shadow(0 0 "+(feedbackGlow*14)+"px rgba(255,140,90,"+(feedbackGlow*.5)+"))";
    reelR.parentNode.style.filter=reelL.parentNode.style.filter;

    // wow => subtle vertical wobble of the tape ribbon via transform on svg
    var t=performance.now()/1000;
    var wob=Math.sin(t*(2+wowAmt*6))*wowAmt*4;
    document.getElementById("tapeSvg").style.transform="translateY("+wob.toFixed(2)+"px)";

    // tone => warm/bright tint on the active-arc accent (panel hue shift)
    var hue= -8 + toneAmt*24;
    document.getElementById("deck").style.filter="hue-rotate("+hue.toFixed(1)+"deg) saturate("+(0.9+toneAmt*0.3)+")";

    // mix => head LED brightness already via .on; modulate capstan glow with mix
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- host ready: send every param at its default ----
  function ready(){
    PARAMS.forEach(function(p){
      var v=state[p.index];
      send(p.index, v);
      if(p.index===0){ var n=(v-p.min)/(p.max-p.min); spinSpeed=0.35+(1-n)*1.1; dashSpeed=0.6+(1-n)*2.4; }
      if(p.index===1) feedbackGlow=(v-p.min)/(p.max-p.min);
      if(p.index===3) wowAmt=(v-p.min)/(p.max-p.min);
      if(p.index===4) toneAmt=(v-p.min)/(p.max-p.min);
      if(p.index===5) mixAmt=(v-p.min)/(p.max-p.min);
    });
  }
  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();

  // expose for host-driven param updates (optional)
  window.setParamFromHost=function(i,v){ if(controlRefs[i]) controlRefs[i].set(v); };
})();
</script>
</body>
</html>
