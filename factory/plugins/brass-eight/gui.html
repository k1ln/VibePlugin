<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brass Eight</title>
<style>
  :root{ --acc:#ffae42; --acc2:#ff5a6a; --bg0:#0e0905; --bg1:#1c1208; --ink:#f6e9d8; --dim:#a8896a; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    background:radial-gradient(120% 90% at 50% -10%,#2e1d0c 0%,var(--bg1) 44%,var(--bg0) 100%);
    color:var(--ink); overflow:hidden; user-select:none; -webkit-user-select:none;
    display:flex; align-items:center; justify-content:center; min-height:100%; }
  .unit{ width:min(95vw,760px); border-radius:15px; padding:16px 22px 20px; position:relative; overflow:hidden;
    background:linear-gradient(160deg,#33240f,#140c06); border:1px solid rgba(255,174,66,.2);
    box-shadow:0 22px 64px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,225,180,.06); }
  header{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .logo{ font-weight:800; letter-spacing:.16em; font-size:21px;
    background:linear-gradient(90deg,var(--acc),var(--acc2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub{ font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim); }
  .led{ margin-left:auto; width:9px; height:9px; border-radius:50%; background:var(--acc2); box-shadow:0 0 10px var(--acc2); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.4; transform:scale(.85);} 50%{ opacity:1; transform:scale(1.2);} }
  .screen{ height:92px; border-radius:9px; overflow:hidden; margin-bottom:14px; position:relative;
    background:linear-gradient(180deg,#160f06,#1c1208); border:1px solid rgba(255,174,66,.16); box-shadow:inset 0 2px 18px rgba(0,0,0,.5); }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  .scrlbl{ position:absolute; left:12px; top:8px; font-size:9px; letter-spacing:.22em; color:var(--dim); z-index:2; }
  .mode{ position:absolute; right:12px; top:8px; font-size:10px; letter-spacing:.14em; color:var(--acc); z-index:2; font-weight:700; }
  .knobs{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .knob{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:4px 1px; cursor:ns-resize; touch-action:none; }
  .dial{ width:70px; height:70px; position:relative; }
  .dial svg{ width:100%; height:100%; display:block; overflow:visible; }
  .track{ fill:none; stroke:rgba(255,200,140,.14); stroke-width:7; stroke-linecap:round; }
  .arc{ fill:none; stroke:url(#g); stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 0 5px rgba(255,174,66,.6)); }
  .pcap{ fill:#1a1106; stroke:rgba(255,174,66,.22); stroke-width:1; }
  .ptr{ stroke:var(--acc2); stroke-width:3; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--acc)); }
  .kn{ font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); }
  .kv{ font-size:10.5px; font-variant-numeric:tabular-nums; color:var(--ink); background:rgba(255,174,66,.1); padding:1px 7px; border-radius:7px; border:1px solid rgba(255,174,66,.2); }
  .knob:hover .kn{ color:var(--acc); }
</style>
</head>
<body>
  <div class="unit">
    <header><span class="logo">BRASS&nbsp;EIGHT</span><span class="sub">fat analog poly · multimode</span><span class="led"></span></header>
    <div class="screen"><div class="scrlbl">FILTER</div><div class="mode" id="modelbl">LOW-PASS</div><canvas id="cv"></canvas></div>
    <div class="knobs" id="knobs"></div>
  </div>
<script>
(function(){
  "use strict";
  var P=[{name:"Cutoff",idx:0,def:0.62},{name:"Reso",idx:1,def:0.4},{name:"Mode",idx:2,def:0.0},{name:"Env",idx:3,def:0.55},{name:"Detune",idx:4,def:0.3},{name:"Level",idx:5,def:0.8}];
  var vals={}; P.forEach(function(p){ vals[p.idx]=p.def; });
  var host=null; function send(i,v){ try{ if(host&&host.setParam) host.setParam(i,v); }catch(e){} }
  var modelbl=document.getElementById("modelbl");
  function setMode(){ var m=vals[2]; modelbl.textContent = m<0.34?"LOW-PASS":(m<0.67?"BAND-PASS":"HIGH-PASS"); }
  var R=33, C=2*Math.PI*R, A0=-135, A1=135;
  var kw=document.getElementById("knobs");
  var knobs=P.map(function(p){
    var el=document.createElement("div"); el.className="knob";
    el.innerHTML='<div class="dial"><svg viewBox="0 0 80 80">'+
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffae42"/><stop offset="1" stop-color="#ff5a6a"/></linearGradient></defs>'+
      '<circle class="track" cx="40" cy="40" r="33"></circle>'+
      '<circle class="arc" cx="40" cy="40" r="33" transform="rotate(135 40 40)" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle>'+
      '<circle class="pcap" cx="40" cy="40" r="20"></circle>'+
      '<line class="ptr" x1="40" y1="40" x2="40" y2="23"></line></svg></div>'+
      '<span class="kn">'+p.name+'</span><span class="kv"></span>';
    kw.appendChild(el);
    var arc=el.querySelector(".arc"), ptr=el.querySelector(".ptr"), val=el.querySelector(".kv");
    function render(v){ var sweep=(A1-A0)/360; arc.setAttribute("stroke-dashoffset",(C*(1-sweep*v)).toString());
      var ang=(A0+(A1-A0)*v)*Math.PI/180; ptr.setAttribute("x2",(40+Math.sin(ang)*16).toFixed(2)); ptr.setAttribute("y2",(40-Math.cos(ang)*16).toFixed(2));
      val.textContent=Math.round(v*100)+"%"; if(p.idx===2) setMode(); }
    var drag=null;
    el.addEventListener("pointerdown",function(e){ drag={y:e.clientY,v:vals[p.idx]}; el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener("pointermove",function(e){ if(!drag)return; var nv=Math.max(0,Math.min(1,drag.v+(drag.y-e.clientY)/170)); vals[p.idx]=nv; render(nv); send(p.idx,nv); });
    el.addEventListener("pointerup",function(){ drag=null; });
    el.addEventListener("pointercancel",function(){ drag=null; });
    el.addEventListener("dblclick",function(){ vals[p.idx]=p.def; render(p.def); send(p.idx,p.def); });
    render(p.def);
    return {render:render};
  });
  // filter-response curve morphing LP->BP->HP
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d"), W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function resize(){ var r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
  window.addEventListener("resize",resize); resize();
  function frame(ts){
    ctx.clearRect(0,0,W,H); var cut=vals[0], reso=vals[1], mode=vals[2]; var base=H-12;
    ctx.strokeStyle="rgba(255,174,66,0.10)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,base); ctx.lineTo(W,base); ctx.stroke();
    var fcx=cut*W*0.85; var peak=1+reso*2.4;
    ctx.beginPath();
    for(var x=0;x<=W;x+=2){ var f=x/W; var fc=cut*0.85;
      var lp=1/(1+Math.pow(Math.max(0,(f-fc))/0.10,2.2));
      var hpf=1/(1+Math.pow(Math.max(0,(fc-f))/0.10,2.2));
      var bp=Math.exp(-Math.pow((f-fc)/0.08,2));
      var wL=Math.max(0,1-mode*2), wB=1-Math.abs(mode-0.5)*2, wH=Math.max(0,mode*2-1);
      var mag=(lp*wL+bp*wB+hpf*wH);
      var bump=peak*Math.exp(-Math.pow((f-fc)/0.05,2))*0.3;
      mag=Math.min(1.4,mag+bump);
      var y=base - mag*(H*0.62);
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
    ctx.strokeStyle="rgba(255,174,66,0.95)"; ctx.lineWidth=2.4; ctx.shadowColor="#ff5a6a"; ctx.shadowBlur=9; ctx.stroke(); ctx.shadowBlur=0;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  function boot(){ host=window.vstai||null; setMode(); P.forEach(function(p,i){ send(p.idx,vals[p.idx]); knobs[i].render(vals[p.idx]); }); }
  if(window.vstai&&window.vstai.onReady){ try{ window.vstai.onReady(boot); }catch(e){ boot(); } } else boot();
})();
</script>
</body>
</html>
