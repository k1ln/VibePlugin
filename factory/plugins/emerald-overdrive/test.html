  <title>Emerald Overdrive — test bench</title><style>
  :root{--ac:#3fd07a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font:13px ui-sans-serif,system-ui,-apple-system,sans-serif;color:#e7eef6;
    background:radial-gradient(130% 100% at 50% -20%,#171f2d,#070a0f 72%);display:flex;flex-direction:column;align-items:center;gap:13px;padding:18px}
  .top{display:flex;align-items:center;gap:11px;width:100%;max-width:620px}
  .top .led{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 10px var(--ac)}

  .bar{width:100%;max-width:620px;display:flex;flex-direction:column;gap:11px;

    border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 16px;
    box-shadow:0 16px 40px rgba(0,0,0,.4)}
  canvas{width:100%;height:74px;display:block;border-radius:10px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.06)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  button{font:inherit;color:#06080c;background:var(--ac);border:0;border-radius:10px;padding:9px 17px;font-weight:800;cursor:pointer;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button.off{background:#28313f;color:#e7eef6}
  select,input[type=file]{font:inherit;color:#e7eef6;background:#10151e;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:7px 9px}
  label{display:flex;gap:8px;align-items:center;color:#aeb9cc}
  .st{font-size:12px;color:#8da0bd;min-height:16px}
  .kb{display:flex;gap:3px;flex-wrap:wrap}
  .kb .key{width:30px;height:80px;border-radius:0 0 7px 7px;background:linear-gradient(#f4f7fb,#cdd5e0);
    border:1px solid #2a3344;cursor:pointer;color:#1a2230;font-size:9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.08s}
  .kb .key.bk{background:linear-gradient(#2b3340,#10151d);color:#9fb0c8;height:52px;width:22px;margin:0 -12px;z-index:2}
  .kb .key.dn{background:linear-gradient(var(--ac),#fff);color:#06080c;transform:translateY(2px)}

  document.getElementById('gui').srcdoc="<!doctype html>\n<html>\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>\n:root{\n  --ac:#3fd07a;       /* emerald accent */\n  --ac2:#9ae66e;      /* lime highlight */\n  --enclosure:#0f5b3a;\n  --enclosure2:#0a3d28;\n  --metal:#cdd6dd;\n  --ink:#06140d;\n}\n*{box-sizing:border-box}\nhtml,body{height:100%}\nbody{\n  margin:0;\n  font:13px ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;\n  color:#dff6e8;\n  background:\n    radial-gradient(120% 90% at 50% -10%,#13241c 0%,#0a130e 55%,#05090a 100%);\n  display:flex;align-items:center;justify-content:center;\n  padding:24px;overflow:hidden;\n}\n\n/* ===== stompbox enclosure ===== */\n.stomp{\n  position:relative;\n  width:330px;\n  border-radius:26px;\n  padding:22px 24px 26px;\n  background:\n    linear-gradient(160deg,#1aa15f 0%,var(--enclosure) 30%,var(--enclosure2) 78%,#072a1b 100%);\n  box-shadow:\n    0 40px 80px -20px rgba(0,0,0,.75),\n    0 2px 0 rgba(255,255,255,.12) inset,\n    0 -22px 40px -18px rgba(0,0,0,.6) inset,\n    0 0 0 2px rgba(0,0,0,.4),\n    0 0 0 5px #0a1a12,\n    0 0 0 6px rgba(120,255,180,.05);\n  animation:rise .7s cubic-bezier(.2,.8,.25,1) both;\n}\n@keyframes rise{from{opacity:0;transform:translateY(26px) scale(.96)}to{opacity:1;transform:none}}\n\n/* brushed-anodised micro texture + sheen */\n.stomp::before{\n  content:\"\";position:absolute;inset:0;border-radius:26px;pointer-events:none;\n  background:\n    repeating-linear-gradient(115deg,rgba(255,255,255,.035) 0 1px,transparent 1px 3px),\n    radial-gradient(140% 70% at 30% 0%,rgba(255,255,255,.16),transparent 55%);\n  mix-blend-mode:screen;opacity:.6;\n}\n/* corner mounting screws */\n.screw{position:absolute;width:13px;height:13px;border-radius:50%;\n  background:radial-gradient(circle at 35% 30%,#eef3f0,#7e8c85 55%,#3a443e);\n  box-shadow:0 1px 2px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.3) inset;}\n.screw::after{content:\"\";position:absolute;inset:3px;border-radius:1px;\n  background:linear-gradient(45deg,transparent 44%,#4a544d 44% 56%,transparent 56%);}\n.screw.tl{top:12px;left:12px}.screw.tr{top:12px;right:12px}\n.screw.bl{bottom:12px;left:12px}.screw.br{bottom:12px;right:12px}\n\n/* ===== header ===== */\n.head{position:relative;text-align:center;margin:2px 0 14px}\n.brand{font-size:9px;letter-spacing:.42em;color:#bdf3cf;opacity:.7;text-transform:uppercase}\nh1{\n  margin:3px 0 0;font-size:24px;font-weight:900;letter-spacing:.02em;line-height:1;\n  font-style:italic;\n  background:linear-gradient(180deg,#f4fff3,#9ae66e 55%,#2faa5c);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n  text-shadow:0 1px 0 rgba(0,0,0,.25);\n  filter:drop-shadow(0 2px 6px rgba(0,40,20,.5));\n}\n.sub{font-size:8.5px;letter-spacing:.28em;color:#8fd6a8;opacity:.65;text-transform:uppercase;margin-top:5px}\n\n/* ===== diode-clip window (the signature graphic) ===== */\n.window{\n  position:relative;height:96px;margin:4px 6px 18px;border-radius:14px;overflow:hidden;\n  background:radial-gradient(120% 140% at 50% 120%,#06241a,#020a07 70%);\n  box-shadow:0 0 0 1px rgba(0,0,0,.6),\n             0 0 0 2px rgba(120,255,180,.08),\n             inset 0 2px 10px rgba(0,0,0,.85),\n             inset 0 0 36px rgba(63,208,122,.10);\n}\n.window svg{position:absolute;inset:0;width:100%;height:100%}\n/* glass curvature highlight */\n.window::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 30%);}\n.glow{filter:drop-shadow(0 0 4px var(--ac))}\n.diode{transform-origin:center;animation:diodePulse 1.6s ease-in-out infinite}\n@keyframes diodePulse{0%,100%{opacity:.55}50%{opacity:1}}\n.wavepath{fill:none;stroke:var(--ac2);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;\n  filter:drop-shadow(0 0 6px var(--ac));}\n.gridln{stroke:rgba(120,255,180,.10);stroke-width:1}\n.flow{stroke-dasharray:5 9;animation:flow 1.1s linear infinite}\n@keyframes flow{to{stroke-dashoffset:-14}}\n\n/* ===== knob deck ===== */\n.deck{display:grid;grid-template-columns:1fr 1fr;gap:18px 14px;margin:0 2px}\n.pot{display:flex;flex-direction:column;align-items:center;gap:7px;\n  animation:pop .5s both;animation-delay:var(--d)}\n@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}\n.knob{position:relative;width:82px;height:82px;cursor:ns-resize;touch-action:none;user-select:none}\n/* numbered skirt ring */\n.skirt{position:absolute;inset:-3px;border-radius:50%;\n  background:repeating-conic-gradient(from 215deg,rgba(220,255,235,.55) 0 1deg,transparent 1deg 13.846deg);\n  -webkit-mask:radial-gradient(circle,transparent 41px,#000 42px,#000 45px,transparent 46px);\n  mask:radial-gradient(circle,transparent 41px,#000 42px,#000 45px,transparent 46px)}\n/* glowing value arc */\n.arc{position:absolute;inset:2px;border-radius:50%;\n  background:conic-gradient(from 215deg,var(--ac) calc(var(--n)*270deg),rgba(255,255,255,.06) calc(var(--n)*270deg) 270deg,transparent 270deg);\n  filter:drop-shadow(0 0 calc(2px + var(--n)*8px) var(--ac));\n  transition:--n .12s cubic-bezier(.2,.8,.25,1)}\n/* metal cap */\n.cap{position:absolute;top:11px;left:11px;width:60px;height:60px;border-radius:50%;\n  background:\n    radial-gradient(circle at 50% 28%,#3a4a42 0%,#16221c 60%,#0a120d 100%);\n  box-shadow:\n    inset 0 2px 6px rgba(255,255,255,.12),\n    inset 0 -6px 14px rgba(0,0,0,.8),\n    0 4px 10px rgba(0,0,0,.55);\n}\n.cap::before{content:\"\";position:absolute;inset:6px;border-radius:50%;\n  background:repeating-conic-gradient(#202c25 0 9deg,#0c130f 9deg 18deg);opacity:.5}\n.cap::after{content:\"\";position:absolute;inset:14px;border-radius:50%;\n  background:radial-gradient(circle at 50% 30%,#46584e,#141d18);\n  box-shadow:inset 0 1px 2px rgba(255,255,255,.18)}\n/* pointer notch */\n.ptr{position:absolute;top:7px;left:50%;width:4px;height:22px;margin-left:-2px;border-radius:3px;\n  background:linear-gradient(var(--ac2),var(--ac));\n  box-shadow:0 0 8px var(--ac),0 0 2px #fff;\n  transform-origin:50% 34px;\n  transform:rotate(calc((var(--n) - .5) * 270deg));\n  transition:transform .12s cubic-bezier(.2,.8,.25,1)}\n.pname{font-size:10px;font-weight:800;letter-spacing:.18em;color:#0b1a12;\n  background:linear-gradient(var(--ac2),var(--ac));padding:2px 10px;border-radius:999px;\n  text-transform:uppercase;box-shadow:0 1px 0 rgba(255,255,255,.3) inset,0 2px 5px rgba(0,0,0,.4)}\n.pval{font-size:12px;font-weight:800;color:#eafff2;font-variant-numeric:tabular-nums;\n  min-height:14px;text-shadow:0 0 8px rgba(63,208,122,.4)}\n.knob.act .cap{box-shadow:inset 0 2px 6px rgba(255,255,255,.12),inset 0 -6px 14px rgba(0,0,0,.8),0 4px 14px rgba(63,208,122,.5)}\n\n/* ===== footswitch + status LED ===== */\n.foot{display:flex;align-items:center;justify-content:space-between;margin:20px 8px 2px}\n.statusled{position:relative;width:14px;height:14px;border-radius:50%;\n  background:radial-gradient(circle at 40% 35%,#d8ffe6,var(--ac) 45%,#0c4427 90%);\n  box-shadow:0 0 14px var(--ac),0 0 4px #fff inset;\n  animation:ledpulse 2.2s ease-in-out infinite}\n@keyframes ledpulse{0%,100%{box-shadow:0 0 7px var(--ac),0 0 4px #fff inset;opacity:.8}\n  50%{box-shadow:0 0 18px var(--ac),0 0 6px #fff inset;opacity:1}}\n.ledlabel{font-size:7.5px;letter-spacing:.2em;color:#9fe3b6;opacity:.7;margin-top:3px;text-align:center;text-transform:uppercase}\n.switchwrap{display:flex;flex-direction:column;align-items:center;gap:5px}\n.switch{width:54px;height:54px;border-radius:50%;cursor:pointer;border:0;padding:0;\n  background:radial-gradient(circle at 50% 32%,#e9eef0,#aab4af 45%,#5a6661 78%,#2a312d);\n  box-shadow:0 6px 14px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.6) inset,0 -3px 6px rgba(0,0,0,.4) inset;\n  transition:transform .07s ease,box-shadow .1s ease}\n.switch:active{transform:translateY(3px);box-shadow:0 2px 6px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.5) inset}\n.switchlabel{font-size:8px;letter-spacing:.24em;color:#bdf3cf;opacity:.65;text-transform:uppercase}\n.serial{font-size:7px;letter-spacing:.18em;color:#7fc99a;opacity:.5;writing-mode:vertical-rl;position:absolute;right:4px;bottom:30px}\n<\/style>\n<script>window.vstai={onReady:function(f){f()},setParam:function(i,v){parent.postMessage({t:\"p\",i:i,v:v},\"*\")},noteOn:function(id,f,v){parent.postMessage({t:\"on\",id:id,f:f,v:v},\"*\")},noteOff:function(id){parent.postMessage({t:\"off\",id:id},\"*\")}};<\/script><\/head>\n<body>\n<div class=\"stomp\">\n  <span class=\"screw tl\"><\/span><span class=\"screw tr\"><\/span>\n  <span class=\"screw bl\"><\/span><span class=\"screw br\"><\/span>\n\n  <div class=\"head\">\n    <div class=\"brand\">Boutique Series<\/div>\n    <h1>Emerald Overdrive<\/h1>\n    <div class=\"sub\">Tube-Style Soft Clipper<\/div>\n  <\/div>\n\n  <!-- signature diode-clip window -->\n  <div class=\"window\">\n    <svg viewBox=\"0 0 300 96\" preserveAspectRatio=\"none\">\n      <!-- center grid -->\n      <line class=\"gridln\" x1=\"0\" y1=\"48\" x2=\"300\" y2=\"48\"/>\n      <line class=\"gridln flow\" x1=\"0\" y1=\"24\" x2=\"300\" y2=\"24\"/>\n      <line class=\"gridln flow\" x1=\"0\" y1=\"72\" x2=\"300\" y2=\"72\"/>\n      <!-- soft-clip waveform, redrawn live -->\n      <path id=\"wave\" class=\"wavepath\" d=\"\"/>\n      <!-- anti-parallel diode pair (the clip element) -->\n      <g class=\"diode glow\" transform=\"translate(150,48)\">\n        <polygon points=\"-22,-9 -8,0 -22,9\" fill=\"var(--ac2)\"/>\n        <line x1=\"-8\" y1=\"-11\" x2=\"-8\" y2=\"11\" stroke=\"var(--ac2)\" stroke-width=\"2.5\"/>\n        <polygon points=\"22,9 8,0 22,-9\" fill=\"var(--ac)\"/>\n        <line x1=\"8\" y1=\"-11\" x2=\"8\" y2=\"11\" stroke=\"var(--ac)\" stroke-width=\"2.5\"/>\n      <\/g>\n    <\/svg>\n  <\/div>\n\n  <!-- knob deck -->\n  <div class=\"deck\" id=\"deck\"><\/div>\n\n  <!-- footswitch row -->\n  <div class=\"foot\">\n    <div class=\"switchwrap\">\n      <div class=\"statusled\"><\/div>\n      <div class=\"ledlabel\">On<\/div>\n    <\/div>\n    <div class=\"switchwrap\">\n      <button class=\"switch\" id=\"bypass\" title=\"True bypass\"><\/button>\n      <div class=\"switchlabel\">Engage<\/div>\n    <\/div>\n    <div class=\"switchwrap\" style=\"visibility:hidden\">\n      <div class=\"statusled\"><\/div><div class=\"ledlabel\">On<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"serial\">EM-OD&middot;8P7SXGP<\/div>\n<\/div>\n\n<script>\n(function(){\n  var PARAMS=[\n    {name:\"Drive\",index:0,min:0,max:1,def:0.5},\n    {name:\"Tone\", index:1,min:0,max:1,def:0.5},\n    {name:\"Level\",index:2,min:0,max:1,def:0.6},\n    {name:\"Mix\",  index:3,min:0,max:1,def:1}\n  ];\n  var state={};            // index -> current value\n  var deck=document.getElementById('deck');\n  var waveEl=document.getElementById('wave');\n\n  function pct(v){ return Math.round(v*100)+\"%\"; }\n\n  function buildKnob(p,i){\n    var cell=document.createElement('div');\n    cell.className='pot'; cell.style.setProperty('--d',(i*70)+'ms');\n    cell.innerHTML=\n      '<div class=\"knob\" tabindex=\"0\">'+\n        '<i class=\"skirt\"><\/i>'+\n        '<i class=\"arc\"><\/i>'+\n        '<i class=\"cap\"><\/i>'+\n        '<i class=\"ptr\"><\/i>'+\n      '<\/div>'+\n      '<div class=\"pname\">'+p.name+'<\/div>'+\n      '<div class=\"pval\"><\/div>';\n    deck.appendChild(cell);\n\n    var knob=cell.querySelector('.knob');\n    var arc=cell.querySelector('.arc');\n    var ptr=cell.querySelector('.ptr');\n    var val=cell.querySelector('.pval');\n    var v=p.def;\n\n    function norm(){ return (v-p.min)/((p.max-p.min)||1); }\n    function paint(){\n      var n=norm();\n      arc.style.setProperty('--n',n);\n      ptr.style.setProperty('--n',n);\n      val.textContent=pct(n);\n      state[p.index]=v;\n      if(window.vstai&&window.vstai.setParam) window.vstai.setParam(p.index,v);\n      onChange();\n    }\n    function setNorm(n){\n      n=n<0?0:n>1?1:n;\n      v=p.min+(p.max-p.min)*n;\n      paint();\n    }\n\n    var drag=false, startY=0, startN=0;\n    knob.addEventListener('pointerdown',function(e){\n      drag=true; startY=e.clientY; startN=norm();\n      knob.classList.add('act'); knob.setPointerCapture(e.pointerId); e.preventDefault();\n    });\n    knob.addEventListener('pointermove',function(e){\n      if(!drag)return;\n      var speed=e.shiftKey?600:200;\n      setNorm(startN+(startY-e.clientY)/speed);\n    });\n    function end(){ drag=false; knob.classList.remove('act'); }\n    knob.addEventListener('pointerup',end);\n    knob.addEventListener('pointercancel',end);\n    knob.addEventListener('dblclick',function(){ v=p.def; paint(); });\n    knob.addEventListener('wheel',function(e){\n      e.preventDefault(); setNorm(norm()+(e.deltaY<0?0.025:-0.025));\n    },{passive:false});\n    knob.addEventListener('keydown',function(e){\n      if(e.key==='ArrowUp'||e.key==='ArrowRight'){setNorm(norm()+0.02);e.preventDefault();}\n      else if(e.key==='ArrowDown'||e.key==='ArrowLeft'){setNorm(norm()-0.02);e.preventDefault();}\n    });\n\n    paint();\n  }\n\n  // ---- live diode-clip waveform: drive sets clip hardness, tone tilts ----\n  function onChange(){\n    var drive=state[0]!=null?state[0]:0.5;\n    var tone =state[1]!=null?state[1]:0.5;\n    var level=state[2]!=null?state[2]:0.6;\n    var mix  =state[3]!=null?state[3]:1;\n    // input gain rises steeply with drive; saturate via tanh-like soft clip\n    var g=1+drive*9;\n    var amp=(0.30+0.55*level);            // visual amplitude from level\n    var pts=[], N=120;\n    for(var x=0;x<=N;x++){\n      var t=x/N;\n      var ph=t*Math.PI*4;                 // ~2 cycles across the window\n      var dry=Math.sin(ph);\n      // soft clip (op-amp + diode): tanh shape, harder as drive climbs\n      var wet=Math.tanh(dry*g)/Math.tanh(g);\n      // tone: tilt brightness with a touch of 2nd harmonic when bright\n      var bright=(tone-0.5)*2;\n      wet+=bright*0.18*Math.sin(ph*2)*Math.abs(wet);\n      var y=dry*(1-mix)+wet*mix;\n      var py=48 - y*amp*40;\n      pts.push((x*(300/N)).toFixed(1)+\",\"+py.toFixed(1));\n    }\n    waveEl.setAttribute('d','M'+pts.join(' L'));\n  }\n\n  PARAMS.forEach(buildKnob);\n\n  // cosmetic engage footswitch — purely visual stomp animation\n  var engaged=true, box=document.querySelector('.stomp');\n  document.getElementById('bypass').addEventListener('click',function(){\n    engaged=!engaged;\n    box.style.filter=engaged?'none':'saturate(.35) brightness(.85)';\n    document.querySelector('.statusled').style.animationPlayState=engaged?'running':'paused';\n    document.querySelector('.statusled').style.opacity=engaged?'':'0.25';\n  });\n\n  function ready(){ onChange(); }\n  if(window.vstai&&window.vstai.onReady) window.vstai.onReady(ready); else ready();\n})();\n<\/script>\n<\/body>\n<\/html>\n";
  var ctx,node,src,analyser,wav,ex,inPtr,outPtr,parPtr,STRIDE=8192,started=false,running=false;
  var pcache=new Float32Array(64);
  function memF(){return new Float32Array(ex.memory.buffer);}
  window.addEventListener('message',function(e){var d=e.data||{};
    if(d.t==='p'){pcache[d.i]=d.v; if(ex) memF()[parPtr+d.i]=d.v;}
    else if(d.t==='on'&&ex&&ex.noteOn) ex.noteOn(d.id,d.f,d.v);
    else if(d.t==='off'&&ex&&ex.noteOff) ex.noteOff(d.id);});
  function st(m){document.getElementById('st').textContent=m;}
  var cv=document.getElementById('scope'), g=cv.getContext('2d');
  var ACC=getComputedStyle(document.documentElement).getPropertyValue('--ac').trim()||'#ffb454';
  function draw(){
    requestAnimationFrame(draw);
    var W=cv.width,H=cv.height; g.clearRect(0,0,W,H);
    g.strokeStyle='rgba(255,255,255,.07)'; g.lineWidth=1; g.beginPath(); g.moveTo(0,H/2); g.lineTo(W,H/2); g.stroke();
    if(!analyser){ return; }
    analyser.getFloatTimeDomainData(wav);
    g.lineWidth=2; g.strokeStyle=ACC; g.shadowBlur=10; g.shadowColor=ACC; g.beginPath();
    for(var i=0;i<wav.length;i++){ var x=i/(wav.length-1)*W, y=H/2 - wav[i]*H*0.46; if(i===0)g.moveTo(x,y); else g.lineTo(x,y); }
    g.stroke(); g.shadowBlur=0;
  }
  draw();
  function makeRiff(){
    var sr=ctx.sampleRate, len=Math.floor(sr*3.2), b=ctx.createBuffer(2,len,sr), d=b.getChannelData(0);
    var riff=[45,52,57,60,64,57,52,48], nl=Math.floor(sr*0.4);
    for(var i=0;i<len;i++){var idx=Math.floor(i/nl),lt=(i-idx*nl)/sr,hz=440*Math.pow(2,(riff[idx%riff.length]-69)/12),
      ph=2*Math.PI*hz*(i/sr),env=Math.exp(-lt*5);
      d[i]=env*(Math.sin(ph)+0.5*Math.sin(2*ph)+0.3*Math.sin(3*ph))*0.18;}
    b.copyToChannel(d,1); return b;
  }
  async function ensure(){
    if(started)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    var bytes=Uint8Array.from(atob(WB),function(c){return c.charCodeAt(0);});
    var inst=await WebAssembly.instantiate(await WebAssembly.compile(bytes),{env:{abort:function(){},seed:function(){return 0;}}});
    ex=inst.exports; ex.init(ctx.sampleRate,STRIDE,2);
    inPtr=ex.getInputPtr()>>>2; outPtr=ex.getOutputPtr()>>>2; parPtr=ex.getParamsPtr()>>>2;
    var m=memF(); for(var i=0;i<64;i++) m[parPtr+i]=pcache[i];
    node=ctx.createScriptProcessor(1024,2,2);
    node.onaudioprocess=function(e){var n=e.outputBuffer.length,m=memF(),
      iL=e.inputBuffer.getChannelData(0),iR=e.inputBuffer.numberOfChannels>1?e.inputBuffer.getChannelData(1):e.inputBuffer.getChannelData(0);
      for(var i=0;i<n;i++){m[inPtr+i]=iL[i];m[inPtr+STRIDE+i]=iR[i];}
      ex.process(n);
      var oL=e.outputBuffer.getChannelData(0),oR=e.outputBuffer.getChannelData(1);
      for(var i=0;i<n;i++){oL[i]=m[outPtr+i];oR[i]=m[outPtr+STRIDE+i];}};
    analyser=ctx.createAnalyser(); analyser.fftSize=1024; wav=new Float32Array(analyser.fftSize);
    node.connect(analyser); node.connect(ctx.destination); started=true;
  }
  function disconnectSrc(){ if(src){try{src.disconnect();}catch(e){}; src=null;} }
  function setSource(kind){
    disconnectSrc();
    if(kind==='riff'){ src=ctx.createBufferSource(); src.buffer=makeRiff(); src.loop=true; src.connect(node); src.start(); st('playing musical riff through the plugin'); }
    else if(kind==='mic'){ navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){ src=ctx.createMediaStreamSource(s); src.connect(node); st('microphone → plugin'); }).catch(function(){ st('mic blocked'); }); }
  }
  document.getElementById('go').addEventListener('click',async function(){
    await ensure();
    if(ctx.state==='suspended') await ctx.resume();
    if(!running){ running=true; this.textContent='⏸ Stop'; this.className='';
      if(!IS_SYNTH){ setSource(document.getElementById('src').value); } else { st('press the keys (or computer keys A–K) to play'); }
    } else { running=false; this.textContent='▶ Start audio'; this.className='off'; disconnectSrc(); st('stopped'); }
  });
  
  document.getElementById('src').addEventListener('change',function(){
    var v=this.value, fi=document.getElementById('file'); fi.style.display=v==='file'?'inline-block':'none';
    if(running&&v!=='file') setSource(v);
  });
  document.getElementById('file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return; ensure().then(function(){ f.arrayBuffer().then(function(ab){ ctx.decodeAudioData(ab,function(buf){
      disconnectSrc(); src=ctx.createBufferSource(); src.buffer=buf; src.loop=true; src.connect(node); if(ctx.state==='suspended')ctx.resume(); src.start(); st('looping '+f.name+' through the plugin'); }); }); });
  });
  
  </script></body></html>
