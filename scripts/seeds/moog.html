<!doctype html><html><head><meta charset="utf-8">
<style>
  :root{
    --bg:#0a0b0e; --surface:#14161c; --surface-2:#191c24; --line:rgba(255,255,255,.08);
    --line-2:rgba(255,255,255,.13); --ink:#eceef3; --ink-2:#c2c8d4; --muted:#79818f;
    --accent:#4f8dff; --accent-2:#9d7bff; --ok:#46d39a;
    --sans:ui-sans-serif,-apple-system,"Segoe UI",system-ui,Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px var(--sans);color:var(--ink);
    background:radial-gradient(130% 100% at 50% -10%,#1a1e27,var(--surface) 60%);
    padding:14px 16px 18px;user-select:none;-webkit-user-select:none}
  .head{display:flex;align-items:baseline;gap:10px;margin:0 0 12px}
  .head b{font-size:14px;letter-spacing:.02em}
  .head span{font:600 11px var(--mono);color:var(--muted);letter-spacing:.06em}

  /* ---- control sections ---- */
  .rack{display:grid;grid-template-columns:repeat(auto-fit,minmax(206px,1fr));gap:11px;align-items:start}
  .sect{background:linear-gradient(180deg,var(--surface-2),#15171d);border:1px solid var(--line);
    border-radius:13px;padding:12px 13px 14px;box-shadow:0 1px 0 rgba(255,255,255,.04) inset}
  .sect h3{font:600 9px var(--mono);letter-spacing:.17em;color:var(--accent);opacity:.9;margin:0 0 11px;
    text-transform:uppercase;display:flex;align-items:center;gap:7px}
  .sect h3::after{content:"";flex:1;height:1px;background:var(--line)}
  .knobs{display:flex;gap:15px 14px;flex-wrap:wrap;justify-content:center}

  .knob{width:54px;display:flex;flex-direction:column;align-items:center;gap:5px}
  .ring{width:48px;height:48px;border-radius:50%;padding:3px;cursor:ns-resize;position:relative;
    background:conic-gradient(from 225deg,
      var(--accent) 0 var(--deg,0deg),
      rgba(255,255,255,.09) var(--deg,0deg) 270deg,
      transparent 270deg 360deg);
    filter:drop-shadow(0 0 0 transparent);transition:filter .12s}
  .knob:hover .ring{filter:drop-shadow(0 0 6px rgba(79,141,255,.45))}
  .dial{position:absolute;inset:3px;border-radius:50%;
    background:radial-gradient(58% 58% at 38% 30%,#333845,#181b22 70%,#0d0f14);
    border:1px solid rgba(0,0,0,.55);box-shadow:0 2px 6px #0009,0 1px 0 rgba(255,255,255,.06) inset}
  .dial::after{content:"";position:absolute;left:50%;top:5px;width:2px;height:13px;border-radius:2px;
    background:#eef3fc;transform-origin:50% 16px;transform:translateX(-50%) rotate(var(--rot,-135deg));
    box-shadow:0 0 6px var(--accent)}
  .knob label{font:600 9px var(--sans);letter-spacing:.05em;color:var(--ink-2);text-align:center}
  .knob .val{font:600 9px var(--mono);color:var(--muted)}

  .oscname{font:700 9px var(--sans);letter-spacing:.1em;color:var(--ink-2);margin-bottom:6px;text-transform:uppercase}
  .waves{display:flex;gap:3px;margin-bottom:8px}
  .waves button{flex:1;background:#0e1015;border:1px solid var(--line);color:var(--muted);border-radius:7px;
    padding:6px 0;cursor:pointer;font:600 13px var(--mono);line-height:1;transition:.12s}
  .waves button:hover{color:var(--ink-2);border-color:var(--line-2)}
  .waves button.on{color:#fff;background:linear-gradient(180deg,#5b97ff,var(--accent));border-color:#3f74e0;
    box-shadow:0 0 11px rgba(79,141,255,.4)}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body>
  <div class="head"><b>VibeSynth</b><span>monophonic analog · 3 osc · ladder filter · FX</span></div>

  <div class="rack" id="rack"></div>

<script>
const K=(label,idx,min,max,def,unit,step)=>({type:'knob',label,idx,min,max,def,unit,step});
const OSC=(name,wIdx,octIdx,detIdx,defWave,defOct,defDet)=>({type:'osc',name,wIdx,octIdx,detIdx,defWave,defOct,defDet});
const SECTIONS=[
  {h:'Oscillator Bank',items:[ OSC('Osc 1',2,3,null,1,0,0), OSC('Osc 2',4,5,6,1,0,7), OSC('Osc 3',7,8,9,2,-1,-5) ]},
  {h:'Mixer',items:[ K('Osc 1',10,0,1,0.9), K('Osc 2',11,0,1,0.7), K('Osc 3',12,0,1,0.5), K('Noise',13,0,1,0.06) ]},
  {h:'Ladder Filter',items:[ K('Cutoff',14,0,1,0.42), K('Reso',15,0,1,0.55), K('Env',16,0,1,0.6),
     K('Atk',17,0,1,0.04), K('Dec',18,0,1,0.5), K('Sus',19,0,1,0.25), K('Rel',20,0,1,0.4) ]},
  {h:'Loudness · Glide',items:[ K('Atk',21,0,1,0.02), K('Dec',22,0,1,0.4), K('Sus',23,0,1,0.8), K('Rel',24,0,1,0.35),
     K('Drive',25,0,1,0.3), K('Glide',1,0,1,0.05), K('Tune',0,-12,12,0,'st',1), K('Vol',26,0,1,0.8) ]},
  {h:'Chorus',items:[ K('Mix',27,0,1,0.35), K('Rate',28,0,1,0.3), K('Depth',29,0,1,0.5) ]},
  {h:'Ping-Pong Delay',items:[ K('Mix',30,0,1,0.22), K('Time',31,0,1,0.4), K('F.back',32,0,1,0.4) ]},
  {h:'Reverb',items:[ K('Mix',33,0,1,0.3), K('Size',34,0,1,0.6), K('Damp',35,0,1,0.4) ]},
];
const WAVES=['◺','◹','⊓','⊔'];
function setP(i,v){ if(window.vstai) window.vstai.setParam(i,v); }

function knob(s){
  const wrap=document.createElement('div'); wrap.className='knob';
  const ring=document.createElement('div'); ring.className='ring';
  const dial=document.createElement('div'); dial.className='dial'; ring.append(dial);
  const lab=document.createElement('label'); lab.textContent=s.label;
  const val=document.createElement('div'); val.className='val';
  wrap.append(ring,lab,val); let v=s.def;
  const snap=(x)=> s.step? Math.round(x/s.step)*s.step : x;
  function apply(send){
    v=Math.max(s.min,Math.min(s.max,snap(v)));
    const t=(v-s.min)/(s.max-s.min);
    ring.style.setProperty('--deg',(t*270)+'deg');
    dial.style.setProperty('--rot',(-135+t*270)+'deg');
    val.textContent = s.unit==='st'?(v>0?'+':'')+v.toFixed(0)+'st':(s.step?v.toFixed(0):v.toFixed(2));
    if(send) setP(s.idx,v);
  }
  let drag=false,ly=0;
  const dn=(e)=>{drag=true;ly=(e.touches?e.touches[0].clientY:e.clientY);e.preventDefault();};
  const mv=(e)=>{if(!drag)return;const y=(e.touches?e.touches[0].clientY:e.clientY);v+=(ly-y)*(s.max-s.min)/170;ly=y;apply(true);};
  const up=()=>drag=false;
  ring.addEventListener('mousedown',dn); ring.addEventListener('touchstart',dn,{passive:false});
  window.addEventListener('mousemove',mv); window.addEventListener('touchmove',mv,{passive:false});
  window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
  ring.addEventListener('dblclick',()=>{v=s.def;apply(true);});
  apply(true); return wrap;
}
function osc(s){
  const col=document.createElement('div'); col.className='col';
  const name=document.createElement('div'); name.className='oscname'; name.textContent=s.name;
  const waves=document.createElement('div'); waves.className='waves';
  const btns=WAVES.map((g,wi)=>{const b=document.createElement('button');b.textContent=g;b.title=['Triangle','Saw','Square','Pulse'][wi];
    b.onclick=()=>{setP(s.wIdx,wi);btns.forEach(x=>x.classList.remove('on'));b.classList.add('on');};return b;});
  btns[s.defWave].classList.add('on'); setP(s.wIdx,s.defWave); waves.append(...btns);
  const knobs=document.createElement('div'); knobs.className='knobs';
  knobs.append(knob(K('Oct',s.octIdx,-2,2,s.defOct,'',1)));
  if(s.detIdx!=null) knobs.append(knob(K('Detune',s.detIdx,-50,50,s.defDet)));
  col.append(name,waves,knobs); return col;
}
const rack=document.getElementById('rack');
for(const sec of SECTIONS){
  const el=document.createElement('div'); el.className='sect';
  const h=document.createElement('h3'); h.textContent=sec.h; el.append(h);
  const k=document.createElement('div'); k.className='knobs';
  for(const it of sec.items) k.append(it.type==='osc'?osc(it):knob(it));
  el.append(k); rack.append(el);
}
</script>
</body></html>
